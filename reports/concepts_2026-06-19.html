y.", "speaker": "Keith Mason", "type": "data_point", "entities": ["United States", "nonfarm payrolls"], "conviction": "high", "so_what": "Above-breakeven hiring without overheating supports a steady unemployment rate; a key input for rates and duration positioning.", "quote": "monthly nonfarm payroll gains have averaged 92,000 over the past six months and 188,000 over the past three", "locator": "Recent data shows that monthly nonfarm payroll gains", "quote_verified": true}, {"claim": "Oxford Economics expects the Federal Reserve to maintain interest rates this year, citing neutral wage growth and a lack of inflationary pressures in a balanced labor market.", "speaker": "Keith Mason", "type": "prediction", "entities": ["Federal Reserve", "United States"], "conviction": "high", "so_what": "A hold-through-2026 base case; positioning for cuts would be premature on this view.", "quote": "The Federal Reserve is expected to maintain interest rates this year due to neutral wage growth and a lack of inflationary pressures.", "locator": "The current labour market is balanced", "quote_verified": true}, {"claim": "With productivity growth averaging over 2% and expected to accelerate as AI adoption increases, wage growth approaching 4.5% may not pose a significant inflationary threat versus the Fed's 2% target.", "speaker": "Keith Mason", "type": "causal", "entities": ["United States", "Federal Reserve", "AI"], "conviction": "high", "so_what": "Frames AI-driven productivity as the mechanism that decouples wage growth from inflation; bullish for the soft-landing/no-cut-needed narrative.", "quote": "even if wage growth approaches 4.5%, it may not pose a significant inflationary threat, aligning with the Federal Reserve's inflation target of 2%.", "locator": "Productivity growth has averaged over 2%", "quote_verified": true}, {"claim": "Uncertainty around US immigration trends complicates interpretation of payroll figures, warranting caution in assessing labor market conditions.", gging several quarters behind; tourism is the slowest sector while AI, diversification capex, and defense spending become new structural tailwinds.", "themes": [{"theme": "Sequencing of the GCC recovery", "insights": [{"claim": "Oxford Economics' base case is that GCC normalisation—a return to pre-conflict trends in growth, investment and capital flows—takes roughly one to two years from a definitive end to the Middle East conflict.", "speaker": "Suki Masana", "type": "prediction", "entities": ["Oxford Economics", "GCC"], "conviction": "high", "so_what": "Sets a concrete time horizon for re-entering GCC risk assets after a peace settlement.", "quote": "Our base case is roughly one to two years from a definitive end to the conflict, though the path will be uneven across activity, confidence and capital.", "locator": "By normalisation, we mean a return to pre-conflict trends", "quote_verified": true}, {"claim": "Day-to-day GCC activity such as cross-border trade and tourism should recover relatively quickly, with oil production normalising fast once the Strait of Hormuz fully opens and manufacturing and construction rebounding sharply but in staggered fashion.", "speaker": "Suki Masana", "type": "prediction", "entities": ["GCC", "Strait of Hormuz", "oil"], "conviction": "high", "so_what": "Real activity leads the recovery, so production and trade volumes rebound before sentiment-driven assets do.", "quote": "oil production will normalise quickly once the Strait of Hormuz fully opens", "locator": "Activity rebounds first", "quote_verified": true}, {"claim": "Confidence and capital lag the real economy: capital flows typically trail by several quarters once a clear political settlement is in place, and absent that clarity risk premiums stay elevated even as activity normalises.", "speaker": "Suki Masana", "type": "framework", "entities": ["GCC"], "conviction": "high", "so_what": "Expect elevated risk premiums and weak inflows to persist for quarters after activity recov rent today.", "quote_verified": true}, {"claim": "Wolff cites independent analysis showing the costs of the tariffs are largely borne by the US consumer, a fact he says a majority of Americans understand.", "speaker": "Alan Wm. Wolff", "type": "causal", "entities": ["United States"], "conviction": "high", "so_what": "Tariff incidence on consumers implies inflationary pressure and political vulnerability for the policy.", "quote": "Independent analysis shows that the costs of the tariffs are largely borne(link is external) by the US consumer", "locator": "The economic harm due to higher and unpredictable levels", "quote_verified": true}, {"claim": "Wolff predicts coerced trade agreements regarded by others as humiliating will not prove durable, because history shows unequal treaties create long-lived grievances despite short-term advantages to the stronger party.", "speaker": "Alan Wm. Wolff", "type": "prediction", "entities": ["United States"], "conviction": "high", "so_what": "Implies current US-imposed deals carry reversal risk; durable trade arrangements need reciprocity, informing long-horizon trade-policy bets.", "quote": "Coerced agreements regarded by others as humiliating(link is external) will not prove durable.", "locator": "There is little reason to believe", "quote_verified": true}, {"claim": "Wolff argues there is no superior alternative to MFN treatment, binding commitments and national treatment, and abandoning them would mean a trading system based on power rather than rules and a world of unending uncertainty.", "speaker": "Alan Wm. Wolff", "type": "thesis", "entities": ["WTO"], "conviction": "high", "so_what": "Frames the choice as rules vs. power; persistent uncertainty would raise risk premia across global trade-exposed assets.", "quote": "Abandoning them would mean a trading system based on power rather than rules and a world of unending uncertainty.", "locator": "There is no superior alternative", "quote_verified": true}]}], "insight_total": 10 interpreting its return forecasts.", "quote": "We use the Vanguard Megatrends Model™ to quantify the impact of the long-term nature of shifts in technology, demographics, globalization, and more", "locator": "Megatrends", "quote_verified": true}]}], "insight_total": 2, "top_entities": ["Vanguard", "United States", "AI"], "source_meta": {"author": "The Vanguard Group", "word_count": 392, "paywalled": false}}, {"record_id": "152ab0f1b75aedd6", "source_type": "concepts", "source_name": "Works in Progress", "source_url": "https://worksinprogress.co/issue/how-abolishing-the-stakeholder-state-caused-the-industrial-revolution/", "title": "How the Glorious Revolution crushed the NIMBYs", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-19T10:44:12Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Macro"], "gist": "The Industrial Revolution was enabled by a prior political revolution: after 1688, an empowered landowner Parliament dismantled overly rigid, fragmented property rights — through enclosure, breaking entails, and turnpike/canal infrastructure acts — by working with incumbents and compensating losers rather than overriding them. The piece argues today's Western 'vetocracy' is the same disease, and that supermajority, beneficiary-aligned reform (in housing and labor) is the proven cure.", "themes": [{"theme": "Strong property rights as the obstacle, not weak ones", "insights": [{"claim": "Early modern European growth stalled because property rights were too strong and too rigid, not too weak — fragmented ownership and inheritance rules meant no one investing in improvements could expect a return.", "speaker": "WorksInProgMag", "type": "contrarian", "entities": ["Europe"], "conviction": "high", "so_what": "Reframes the institutional-economics consensus: the binding constraint on development can be overly entrenched rights, a lens applicable to today's zoning and regulatory gridlock.", "quote": "Early modern Europe’s property rights held back growth not because they were too weak but because they were too strong and too rigid.", "locator": "A new Glorious Revolution?", "quote_verified": true}, {"claim": "Continental reform efforts repeatedly failed because monarchs depended on landowning aristocrats and clergy who had no confidence reforms would leave them better off — Spain's Fernando VI (1746), France's Turgot (1776), and Austria's Joseph II (1781) were all blocked or nullified.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Spain", "France", "Turgot", "Joseph II", "Fernando VI"], "conviction": "high", "so_what": "Demonstrates that top-down reform against incumbent stakeholders systematically fails — a template for why modern anti-NIMBY mandates stall.", "quote": "monarchs depended on the support of landowning aristocrats and clergy, and those landowners had no confidence that reforms would leave them better off.", "locator": "Many European states tried to solve", "quote_verified": true}, {"claim": "England uniquely modernized property rights because the Glorious Revolution handed the country to the landowners, who — precisely because they were empowered — dismantled the fossilized arrangements their continental counterparts could not touch.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["England", "Glorious Revolution"], "conviction": "high", "so_what": "Core counterintuitive mechanism: empowering incumbents, not overriding them, unlocked reform — the central transferable lesson of the piece.", "quote": "The Glorious Revolution resolved the conflict between landowners and the Crown by handing the country to the landowners.", "locator": "Only one country succeeded", "quote_verified": true}]}, {"theme": "Legislative capacity unlocked by 1688", "insights": [{"claim": "After the Glorious Revolution, requiring annual military-funding renewals forced Parliament to sit annually for over 100 days, raising output from about 25 acts per session (1660-1689) to 50-75 by 1688-1724 and eventually over 200 per session by the late eighteenth century.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Parliament", "Glorious Revolution", "England"], "conviction": "high", "so_what": "State capacity to legislate frequently and predictably was a precondition for reform throughput — implies modern reform requires institutional bandwidth, not just political will.", "quote": "From 1660 to 1689, about 25 acts passed per session. Between 1688 and 1724, the average increased to 50–75 acts per session, rising to over 100 and eventually 200", "locator": "Before 1688, bills frequently failed", "quote_verified": true}, {"claim": "Access to Parliament broadened after 1688: whereas only the largest landowners previously brought bills, many minor gentry with no political connections began applying, with the vast majority of bills seeking to reform or consolidate landholdings and property rights.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Parliament", "England"], "conviction": "high", "so_what": "Broad-based legislative access channeled bottom-up demand for property reform — a model for distributing reform initiative beyond elite gatekeepers.", "quote": "Before the Revolution, only the largest landowners brought bills to Parliament. Afterwards, many more minor gentry with no obvious political connections applied.", "locator": "Before 1688, bills frequently failed", "quote_verified": true}]}, {"theme": "Enclosure: consolidating fragmented land", "insights": [{"claim": "The open-field system and common land crippled productivity — under Russia's equivalent peasants wasted up to half their time moving between strips, and the Norfolk four-course rotation was nearly impossible on shared fields because turnips and clover could not be protected from neighbors' grazing animals.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["England", "Russia"], "conviction": "high", "so_what": "Concretely quantifies the cost of fragmented rights, the historical analogue to land-assembly problems in modern development.", "quote": "Under Russia’s equivalent system, peasants wasted as much as half their time moving between land strips.", "locator": "The problems with small fields grew", "quote_verified": true}, {"claim": "Parliament progressively lowered the consent threshold for enclosure — from unanimity to 90 percent of affected landowners by the 1740s, 80 percent by the 1750s, and 75 percent later in the century — passing 3,682 enclosure acts between 1600 and 1815, almost all after 1688.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Parliament", "England"], "conviction": "high", "so_what": "The supermajority mechanism is the precise, replicable tool the author advocates for modern land assembly and densification.", "quote": "By the 1740s, it was passing enclosure laws with 90 percent support of the landowners affected; by the 1750s, 80 percent; and later in the century, 75 percent.", "locator": "Over the century following the Glorious Revolution", "quote_verified": true}, {"claim": "Supermajority field-consolidation schemes worked far beyond England: Germany consolidated land only after WWII (tripling wheat yields), Taiwan, Korea and Japan used similar schemes, Stolypin's reforms made Russia the world's top grain exporter, and consolidated 'rational squares' made the Punjab the breadbasket of India and Pakistan.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Germany", "Taiwan", "Korea", "Japan", "Russia", "Stolypin", "Punjab", "India", "Pakistan"], "conviction": "high", "so_what": "Establishes the supermajority-consolidation playbook as a repeatedly validated growth lever across very different polities.", "quote": "Pyotr Stolypin’s land reforms used supermajority petitions by peasant farmers to divide their landholdings, boosting productivity so much that the country became the world’s top grain exporter.", "locator": "Other countries took rmany"], "conviction": "high", "so_what": "Top-down rights abolition produced a different failure mode; the lesson is that reform method, not just direction, determines outcomes.", "quote": "the top-down approach caused a different problem across the territories where it was imposed: morcellement, the excessive subdivision that entails had been designed to prevent", "locator": "It was possible to fix settlements", "quote_verified": true}]}, {"theme": "Infrastructure via turnpikes and canals", "insights": [{"claim": "Fragmented tolling gave operators perverse incentives: in the Holy Roman Empire each road stretch overcharged without investing, and Rhine timber merchants between Andernach and Dordrecht paid around twenty separate tolls.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Holy Roman Empire", "Rhine"], "conviction": "high", "so_what": "Splitting infrastructure into the wrong units destroys investment incentives — directly analogous to fragmented modern permitting and jurisdictional veto points.", "quote": "they had to pay around twenty separate tolls.", "locator": "For whom the road tolls", "quote_verified": true}, {"claim": "Turnpike trusts — non-profit corporations of landowners and merchants who improved roads and charged cost-covering tolls — gave Britain 20,000 miles of turnpikes by 1840, over twice France's paved-road density and nearly ten times Spain's, quadrupling British travel speeds to eight mph by 1820.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["England", "France", "Spain"], "conviction": "high", "so_what": "Aligning infrastructure ownership with beneficiaries (who gained via higher land rents) solved the incentive problem — a model for value-capture infrastructure finance.", "quote": "By 1840, Britain had 20,000 miles of turnpikes, more than twice France’s density of paved road per square mile, and nearly ten times Spain’s.", "locator": "Turnpikes dramatically improved road quality", "quote_verified": tru des once delivery is solved, setting a realistic timeline for other programs.", "quote": "By 1999, fox-mediated rabies was eliminated from Switzerland entirely.", "locator": "Following this success, Switzerland scaled up", "quote_verified": true}]}, {"theme": "Conservation and ecosystem-value applications", "insights": [{"claim": "White-nose syndrome has killed over six million North American bats since 2007, with three bat species declining by over 90 percent, and the USGS estimates bats contribute billions of dollars to the US agricultural economy annually through pest control.", "speaker": "Works in Progress", "type": "data_point", "entities": ["white-nose syndrome", "bats", "USGS", "US agriculture"], "conviction": "high", "so_what": "Bat collapse carries quantifiable agricultural and disease-control costs, framing bat vaccines as an economic, not just conservation, intervention.", "quote": "the USGS estimates that bats contribute billions of dollars to the US agricultural economy annually", "locator": "Vaccines for other diseases are still in the pipeline", "quote_verified": true}, {"claim": "In September 2025 Australia approved the world's first chlamydia vaccine for koalas, developed over a decade by Peter Timms, with a trial showing it cut koala mortality by around 65 percent.", "speaker": "Works in Progress", "type": "data_point", "entities": ["Australia", "koala", "chlamydia vaccine", "Peter Timms", "University of the Sunshine Coast"], "conviction": "high", "so_what": "First-of-kind wildlife disease vaccines are now reaching regulatory approval, signaling a maturing pipeline of species-specific veterinary products.", "quote": "In September 2025, Australia approved the world's first chlamydia vaccine for koalas.", "locator": "Wild animal vaccines are emerging as a promising tool", "quote_verified": true}, {"claim": "Researchers are field-trialing a vaccine gel or paste applied to roosting bats that the animals spread through grooming, with epidemiologists running trials at a Wyoming site since September 2025 because bats cannot be lured with food baits.", "speaker": "Works in Progress", "type": "anecdote", "entities": ["bats", "white-nose syndrome", "Wyoming"], "conviction": "medium", "so_what": "Self-spreading transmissible delivery methods are an active frontier; success would dramatically lower the cost of immunizing hard-to-reach wild populations.", "quote": null, "locator": "So researchers are experimenting with novel delivery methods", "quote_verified": false}]}], "insight_total": 10, "top_entities": ["rabies", "Switzerland", "Texas", "koala", "bats", "white-nose syndrome", "USDA National Rabies Management Program", "George Baer", "CDC", "Peter Timms"], "source_meta": {"author": "WorksInProgMag", "word_count": 2522, "paywalled": false}}, {"record_id": "04e39b8f3bbf1535", "source_type": "concepts", "source_name": "World Economic Forum", "source_url": "https://www.weforum.org/stories/2026/06/energy-transition-index-shows-fragmenting-and-more-top-energy-stories/", "title": "Global energy transition is fragmenting, and more energy stories", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-19T10:45:26Z", "processor": "claude-code-sub-opus", "tags": ["Energy", "Macro", "Geopolitics", "AI"], "gist": "The 2026 WEF Energy Transition Index shows the transition is fracturing rather than reversing, with transition readiness (finance, policy, innovation) declining for the first time in over a decade even as absolute investment hits records. Energy security concerns and the US-Iran conflict around the Strait of Hormuz are reshaping country pathways and metals markets.", "themes": [{"theme": "Energy transition momentum and fragmentation", "insights": [{"claim": "The 2026 WEF Energy Transition Index finds the global energy transition is not reversing but is becoming more uneven and fractured, with average scores broadly unchanged signaling lost momentum.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["World Economic Forum", "Energy Transition Index"], "conviction": "high", "so_what": "Investors should expect transition exposure to diverge sharply by country rather than rise uniformly; pick winners by national readiness, not the sector broadly.", "quote": "The energy transition is not reversing, but it is fracturing and becoming more uneven", "locator": "1. Energy transition progress fragments", "quote_verified": true}, {"claim": "Transition readiness (the foundations enabling future progress: finance, infrastructure, policy, innovation, human capital) turned downward in 2026 for the first time in over a decade, with finance and investment falling alongside declines in regulation, political commitment and innovation.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["Energy Transition Index"], "conviction": "high", "so_what": "Weakening readiness is a leading indicator of slower future clean-energy buildout; watch for funding gaps and policy retrenchment as headwinds to renewables developers.", "quote": "the trajectory has turned downward for the first time in over a decade", "locator": "And on transition readiness", "quote_verified": true}, {"claim": "Global energy investment reached $3.3 trillion in 2025, with renewables and nuclear generating 42% of global electricity and renewable capacity rising by nearly 800 gigawatts.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["renewables", "nuclear"], "conviction": "high", "so_what": "Record absolute capital and capacity figures confirm structural demand for clean-energy equipment and grid buildout despite the momentum slowdown.", "quote": "Global energy investment reached $3.3 trillion in 2025, with renewables and nuclear generating 42% of global electricity, and renewable energy capacity increased by nearly 800 gigawatts (GW).", "locator": "In 2026, the ETI's sixteenth year", "quote_verified": true}, {"claim": "Energy security was the only ETI system- athways", "quote_verified": true}, {"claim": "Sweden leads the Energy Transition Index, with Nordic and advanced European economies holding many top positions, while China, the US and Brazil remain central because of their scale in demand, investment and emissions.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["Sweden", "China", "United States", "Brazil", "Nordic economies"], "conviction": "high", "so_what": "Leadership concentration in Nordics signals durable policy/infrastructure moats; China/US/Brazil remain the swing markets for global transition outcomes.", "quote": null, "locator": "2. Energy security is reshaping country pathways", "quote_verified": false}, {"claim": "There is no single global energy transition but multiple transitions, with each country finding its own path shaped by import exposure, infrastructure readiness and policy frameworks.", "speaker": "World Economic Forum", "type": "framework", "entities": ["Nicholas Wagner"], "conviction": "high", "so_what": "Treat energy transition as a country-selection problem, not a single thematic trade.", "quote": "There isn't a single global energy transition. There are multiple transitions. Each country will find its own way to do it.", "locator": "There isn't a single global energy transition", "quote_verified": true}]}, {"theme": "Hormuz disruption and commodity markets", "insights": [{"claim": "US President Trump said the Strait of Hormuz would reopen under a deal to end the conflict with Iran, but experts warn it could take weeks or months for oil to fully flow even once open.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["Donald Trump", "Strait of Hormuz", "Iran", "oil"], "conviction": "medium", "so_what": "Even a Hormuz reopening implies a lagged oil-flow recovery; near-term oil supply risk premium may persist beyond headline ceasefire news.", "quote": "once open, it could still take weeks or months for oil to fully flow", "locator": "3. News in bri // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
