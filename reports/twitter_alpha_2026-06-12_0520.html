@media (max-width: 640px) {

// ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
