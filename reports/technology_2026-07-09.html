type": "data_point", "entities": ["Samsung", "PM1763", "V-NAND"], "conviction": "high", "so_what": "Concrete Gen6 performance bar for enterprise SSD competitors (Solidigm, SK Hynix, Micron) to match.", "quote": "sequential read speeds up to 28,400 MB/s while writes hit 21,900 MB/s in the 16TB configuration", "locator": "Incorporating Samsung's 9th-generation V-NAND", "quote_verified": true}, {"claim": "The PM1763 delivers more than double the performance of Samsung's previous PM1753 model.", "speaker": "Cliff Robinson", "type": "data_point", "entities": ["Samsung", "PM1763", "PM1753"], "conviction": "high", "so_what": "Generational doubling justifies AI-server refresh spend on storage.", "quote": "This represents more than double the performance of the previous PM1753 model.", "locator": "Incorporating Samsung's 9th-generation V-NAND", "quote_verified": true}]}, {"theme": "Liquid cooling and AI rack design", "insights": [{"claim": "The PM1763 is optimized for liquid cooling, a differentiator versus most current enterprise SSDs, because newer AI servers will be fully liquid-cooled to remove fans from the compute rack.", "speaker": "Cliff Robinson", "type": "thesis", "entities": ["Samsung", "PM1763", "Solidigm"], "conviction": "high", "so_what": "Liquid-coolable SSD orientation becomes a design requirement for AI racks, favoring vendors that adapt physical drive designs.", "quote": "Newer AI servers will be completely liquid-cooled to move fans out of the compute rack, and so the SSDs must also be oriented so they can be liquid-cooled.", "locator": "Samsung's new drive is also said to be optimized for liquid cooling", "quote_verified": true}]}, {"theme": "Security and quantum-resistance", "insights": [{"claim": "The PM1763 supports post-quantum cryptography (PQC) algorithms and TEE Device Interface Security Protocol (TDISP) for securing data pathways in virtualized environments, reflecting long deployment lifespans.", "speaker": "Cliff Robinson", "type": "data_point", ystems that can be deployed, scaled, manufactured, and integrated into real computing environments.", "speaker": "Jeff Burt", "type": "thesis", "entities": ["QuiX Quantum", "Dedalo"], "conviction": "high", "so_what": "Investors should weight quantum vendors on manufacturability and datacenter fit, not just qubit counts.", "quote": "the central challenge is no longer only to demonstrate high-performing qubits, but to build systems that can be deployed, scaled, manufactured, and integrated within real computing environments", "locator": "The executives and scientists behind QuiX Quantum", "quote_verified": true}, {"claim": "Low infrastructure burden, ease of deployment, compatibility with existing environments, and manageable operating overhead are architectural requirements for quantum systems rather than secondary considerations, because quantum will operate alongside classical HPC rather than replace it.", "speaker": "Jeff Burt", "type": "framework", "entities": ["QuiX Quantum", "HPC", "quantum-classical"], "conviction": "high", "so_what": "Hybrid quantum-classical is the long-term deployment model; datacenter operators and HPC vendors are the channel.", "quote": "quantum computing is not expected to replace classical computing, but to operate alongside it", "locator": "The work on creating fault tolerant photonic", "quote_verified": true}]}, {"theme": "Photonic architecture advantages", "insights": [{"claim": "Dedalo hardware is built on CMOS-compatible silicon-nitride photonic integrated circuits, meaning it can be manufactured through established semiconductor fabrication processes and facilities.", "speaker": "Jeff Burt", "type": "data_point", "entities": ["QuiX Quantum", "Dedalo", "silicon-nitride", "PICs", "CMOS"], "conviction": "high", "so_what": "Leveraging existing semiconductor fabs lowers the scaling and cost barrier versus exotic quantum modalities.", "quote": "built on CMOS-compatible, silicon-nitride photonic integrated circuits (PICs), which means it n what Whoop called one of his most significant investments to date, and Whoop's UAE expansion is backed by the Qatar Investment Authority and Mubadala Investment Company.", "speaker": "Omnia Al Desoukie", "type": "data_point", "entities": ["Ronaldo", "Whoop", "Qatar Investment Authority", "Mubadala Investment Company", "UAE"], "conviction": "high", "so_what": "Ties Ronaldo and Gulf sovereign wealth to the wearables/health-analytics category.", "quote": null, "locator": "Ronaldo became an investor in Whoop", "quote_verified": false}, {"claim": "Ronaldo paid $7.5 million for a 10 percent stake in HBL Pro2col Software (a Herbalife subsidiary) in February 2026, and Herbalife agreed a month later to acquire London-based Bioniq, an AI supplements firm Ronaldo already backed, in a deal worth up to $150 million.", "speaker": "Omnia Al Desoukie", "type": "data_point", "entities": ["Ronaldo", "HBL Pro2col Software", "Herbalife", "Bioniq"], "conviction": "high", "so_what": "Shows Ronaldo layering equity across a vertically integrating personalized-wellness stack with an M&A exit path.", "quote": "Ronaldo's most concrete move came in February 2026, when he paid $7.5 million for a 10 percent stake in HBL Pro2col Software", "locator": "Ronaldo's most concrete move", "quote_verified": true}, {"claim": "Ronaldo reportedly received a 5 percent ownership stake in Saudi Pro League club Al-Nassr, finalized in June 2025 and valued at roughly £50 million ($66.7 million).", "speaker": "Omnia Al Desoukie", "type": "data_point", "entities": ["Ronaldo", "Al-Nassr", "Saudi Pro League"], "conviction": "medium", "so_what": "Another equity-for-star arrangement, aligning Ronaldo's wealth with Saudi sports investment.", "quote": null, "locator": "Ronaldo has also reportedly received a 5 percent", "quote_verified": false}]}, {"theme": "Salah's traditional path", "insights": [{"claim": "Salah has largely avoided disclosed tech-startup investing, concentrating his interests in commercial holding com rk that shapes export controls, alliances, and where AI capital and compute flow.", "quote": null, "locator": "Harding believes that casting AI as a lethal weapon", "quote_verified": false}, {"claim": "Believing the AI arms race framing makes it true, turning smaller countries into interchangeable chess pieces on one superpower's side rather than independent actors.", "speaker": "Joel Khalili", "type": "causal", "entities": ["Verity Harding"], "conviction": "high", "so_what": "Narrative itself is treated as a causal driver of geopolitical alignment, not just commentary.", "quote": "By believing it to be true, you make it true, turning yourself into a small chess piece on one side or the other. You are always lesser.", "locator": "The point is to not allow the arms race framing", "quote_verified": true}, {"claim": "AI research was rooted in international cooperation as recently as 2016-2020 before shifting toward a framing of civilizational battle between the West and China.", "speaker": "Joel Khalili", "type": "anecdote", "entities": ["Verity Harding", "DeepMind", "China"], "conviction": "high", "so_what": "Dates the cooperation-to-rivalry inflection, useful for gauging how entrenched the current stance is.", "quote": "AI research “was rooted in international cooperation.”", "locator": "As the head of global public policy at Google DeepMind", "quote_verified": true}]}, {"theme": "Forces and triggers behind the shift", "insights": [{"claim": "Two forces drove the arms-race narrative: a sincere belief that dangerous AI means democracies should hold the keys, and an anti-regulation stream that finds China useful as a bogeyman to argue 'if you regulate us, you let China win.'", "speaker": "Joel Khalili", "type": "framework", "entities": ["Verity Harding", "China"], "conviction": "high", "so_what": "Identifies who benefits from the framing, including firms using it to deflect regulation.", "quote": "“If you regulate us, you let China win.”", "locator": "What were the forces behind that shift?", "quote_verified": true}, {"claim": "ChatGPT's November 2022 launch, coinciding with the pandemic's reversal of a borderless world and the Ukraine war making AI weaponry feel real, rapidly cemented AI as 'the new arms race' mapped onto the Cold War.", "speaker": "Joel Khalili", "type": "causal", "entities": ["ChatGPT", "OpenAI", "Ukraine", "Cold War"], "conviction": "medium", "so_what": "Pinpoints the confluence of events that hardened the nuclear-analogy framing.", "quote": "It very quickly became accepted wisdom that AI is the new arms race.", "locator": "ChatGPT emerged at the same time as a global pandemic", "quote_verified": true}, {"claim": "Major AI labs are complicit in shifting rhetoric from collaboration to competition because arms-race language accrues power to them by implying only they are equipped to control the solution.", "speaker": "Joel Khalili", "type": "contrarian", "entities": ["Verity Harding", "Anthropic", "OpenAI"], "conviction": "high", "so_what": "Suggests incumbent labs have an incentive to sustain the narrative that entrenches their moat.", "quote": "Talking about AI as an arms race accrues power to them, by saying it's so powerful, new, and unique, that only we have the answer, and only we should be in charge of the solution.", "locator": "Do you think the major labs are complicit", "quote_verified": true}]}, {"theme": "US policy and Anthropic model withdrawal", "insights": [{"claim": "Harding reads the Trump administration's nationalist AI rhetoric and its bid to impose export controls on homegrown models as symptoms of the arms-race framing and evidence a worst-case scenario is forming.", "speaker": "Joel Khalili", "type": "thesis", "entities": ["Verity Harding", "Trump administration", "export controls"], "conviction": "high", "so_what": "Signals policy risk of tightening US controls even on domestic frontier models.", "quote": null, "locator": "Harding sees the Trump administration's nationalist AI rhetoric", ition.", "locator": "But the internationalist approach isn't in opposition", "quote_verified": true}, {"claim": "Continuing down the arms-race road leads to excessive government control and centralization over AI systems, less safe and beneficial systems, and many vassal states forced to pick a superpower.", "speaker": "Joel Khalili", "type": "prediction", "entities": ["Verity Harding"], "conviction": "high", "so_what": "A bearish long-run scenario for open, distributed AI development and independent national tech policy.", "quote": "The natural long-term conclusion is excessive government control and centralization of power over these systems", "locator": "So, if we continue down this road", "quote_verified": true}]}], "insight_total": 11, "top_entities": ["Verity Harding", "DeepMind", "Anthropic", "OpenAI", "ChatGPT", "US", "China", "Trump administration", "Lawrence Freedman", "Taro Kono"], "source_meta": {"author": "Joel Khalili", "word_count": 1459, "paywalled": false}}, {"record_id": "e103900ef3191f5a", "source_type": "technology", "source_name": "Wired", "source_url": "https://www.wired.com/story/best-food-dehydrators-for-stocking-a-smarter-pantry/", "title": "The Best Food Dehydrators for Saving Food (and Money)", "published_date": "2026-07-09", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Society"], "gist": "A buyer's guide to food dehydrators framed around household economics and food preservation, ranking the Excalibur DH08SCSS13 as best overall ($180) and the $50 Cosori as best budget, with a clear price/performance ladder from $46 stackable units to a $138 solar model.", "themes": [{"theme": "Household economics driver", "insights": [{"claim": "The guide frames dehydrators as a money-saving response to the current economy, letting households preserve surplus seasonal produce, wild game, and fish more cheaply and compactly than canning or freezing.", "speaker": "Kat Merck", "type": "thesis", "ent s use, showing a niche for solar/emergency preservation appliances.", "speaker": "Kat Merck", "type": "data_point", "entities": ["Dehytray"], "conviction": "medium", "so_what": "Prepper/off-grid demand supports a specialized solar appliance sub-segment.", "quote": null, "locator": "Best for Emergency Preparedness", "quote_verified": false}, {"claim": "Dehydrators ($50-$100 typically) and freeze dryers (thousands of dollars, up to 25-year shelf life) occupy distinct price and performance tiers, with freeze dryers far more expensive but far longer-lasting.", "speaker": "Kat Merck", "type": "framework", "entities": ["food dehydrators", "freeze dryers"], "conviction": "high", "so_what": "Clarifies the large price gap between adjacent preservation categories.", "quote": "freeze dryers typically cost thousands of dollars.", "locator": "Is a Food Dehydrator the Same as a Freeze Dryer?", "quote_verified": true}, {"claim": "Multitasking appliances are encroaching on dehydration, with the $320 Breville Smart Oven Air Fryer Pro offering a dehydrating function though limited to four-tray capacity.", "speaker": "Kat Merck", "type": "data_point", "entities": ["Breville"], "conviction": "low", "so_what": "Convergence of appliance functions may pressure single-purpose dehydrator demand.", "quote": null, "locator": "Breville Smart Oven Air Fryer Pro", "quote_verified": false}]}], "insight_total": 7, "top_entities": ["Excalibur", "Cosori", "Nesco", "Dehytray", "Breville", "Elite Gourmet", "Magic Mill", "freeze dryers"], "source_meta": {"author": "Kat Merck", "word_count": 1840, "paywalled": false}}, {"record_id": "e72d740ee8f81cb7", "source_type": "technology", "source_name": "Wired", "source_url": "https://www.wired.com/story/onlyfans-creators-dmca-hacked-government-websites/", "title": "OnlyFans Models Are Accidentally Making Hacked Government Websites Disappear", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Tech", "Geopolitics"], "gist": "UpGuard research shows that DMCA copyright takedowns filed for adult creators have inadvertently exposed and cleaned up thousands of compromised .gov and .edu sites, revealing a booming creator anti-piracy industry, insecure government web infrastructure, and questions about DMCA overreach.", "themes": [{"theme": "Scale of the compromise", "insights": [{"claim": "More than 2,000 government and education domains across 80 countries have received adult-creator copyright takedown requests over 15 years, an indicator the sites were compromised, per UpGuard analysis shared with WIRED.", "speaker": "Matt Burgess", "type": "data_point", "entities": ["UpGuard", "WIRED"], "conviction": "high", "so_what": "Quantifies pervasive insecurity in official web infrastructure exploitable for SEO scams.", "quote": "More than 2,000 domains belonging to governments and education institutions, across 80 countries, have received copyright takedown requests linked to adult content creators over the past 15 years", "locator": "However, these DMCA requests", "quote_verified": true}, {"claim": "UpGuard counted 384,286 adult-creator takedown requests covering 631,193 URLs to government and education sites since 2011, of which Google removed roughly 130,000 URLs while taking no action on 460,000.", "speaker": "Matt Burgess", "type": "data_point", "entities": ["UpGuard", "Google", "Greg Pollock"], "conviction": "high", "so_what": "Shows most flagged malicious URLs on official domains remain live in Google's index.", "quote": "there have been 384,286 takedown requests, covering 631,193 URLs, from adult content creators to government and education websites since 2011.", "locator": "Pollock's analysis says there have been", "quote_verified": true}, {"claim": "Hijackings of official sites tied to individual adult creators' leaked OnlyFans content rose dramatically since 2020, with compromised .gov and .edu pages exploited because they rank high in Google results.", "speaker": "Matt Burgess", "type": "causal", "entities": ["OnlyFans", "Google"], "conviction": "high", "so_what": "The authority of .gov/.edu domains is itself the attack surface being monetized by scammers.", "quote": "a “dramatic” increase in hijackings related to individual adult creators and their “leaked” OnlyFans content since 2020", "locator": "Many of the sites have been repeatedly compromised", "quote_verified": true}]}, {"theme": "Scam monetization mechanism", "insights": [{"claim": "Scammers hijack authoritative .gov and .edu domains to upload pages baiting searches for free movies, iPhones, porn, and Fortnite skins, then redirect victims to scam or malware pages, increasingly using adult creators' names as the lure.", "speaker": "Matt Burgess", "type": "framework", "entities": ["Fortnite", "malware"], "conviction": "high", "so_what": "Details the SEO-poisoning funnel that turns trusted domains into fraud infrastructure.", "quote": "A compromised .gov page ranking for a trending creator's name is a near-perfect funnel", "locator": "For years, scammers have hijacked official websites", "quote_verified": true}, {"claim": "Because the malicious asset has no visibility outside Google, getting Google to remove the search result is extremely effective at neutralizing these hijack scams, per UpGuard's Greg Pollock.", "speaker": "Matt Burgess", "type": "causal", "entities": ["Google", "Greg Pollock", "UpGuard"], "conviction": "medium", "so_what": "Search delisting functions as a de facto security control, elevating Google's gatekeeper role.", "quote": "having Google remove the search result is extremely effective, because there's no real visibility of the asset outside of Google.", "locator": "The OnlyFans models are not setting out to help", "quote_verified": true}]}, {"theme": "Creator anti-piracy industry", "insights": [{"claim": "A whole industry of DMCA-service firms now polices creator piracy, with Lux calling anti-piracy filing e // YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#7c3aed', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
