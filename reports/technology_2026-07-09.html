0911-see-autonomous-chip-design-in-action-with-chipagents-at-dac-2026/", "title": "See Autonomous Chip Design in Action with ChipAgents at DAC 2026 - Semiwiki", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-09T13:05:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "ChipAgents is showcasing production-grade agentic AI for chip design at DAC 2026, claiming 3x higher pass-at-one accuracy than generic AI agents on root-cause analysis and, in a joint paper with STMicroelectronics, verification speedups of 15x (spec reading), 240x (formal assertion generation) and 400x (UVM environment creation) under full engineer control.", "themes": [{"theme": "Agentic AI moving into production EDA", "insights": [{"claim": "For chip design and verification teams the debate has shifted from whether AI can assist engineers to where AI delivers measurable value today, how it integrates into established EDA flows, and what trust level is required before autonomous agents run in production.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["ChipAgents", "EDA", "agentic AI", "DAC 2026"], "conviction": "high", "so_what": "Trust and integration, not capability, are now the gating factors for agentic-EDA adoption—the metric to watch for the sector's inflection.", "quote": "The more urgent questions are where AI is delivering measurable value today, how it can be integrated into established EDA flows, and what level of trust is required before autonomous agents can be deployed in production design.", "locator": "Making the AI wave at DAC 2026", "quote_verified": true}, {"claim": "ChipAgents' multi-agent platform automates design, verification and debugging tasks while integrating with existing EDA tools rather than replacing them.", "speaker": "Daniel Nenni", "type": "framework", "entities": ["ChipAgents", "multi-agent platform", "EDA"], "conviction": "medium", "so_what": "Integration-with-incumbents positioning lowers adoption friction; a go-to-market pattern for AI-EDA startups versus rip-and-replace.", "quote": null, "locator": "Experience the Future of Chip Design at ChipAgents Booth", "quote_verified": false}]}, {"theme": "Benchmarked debug and verification gains", "insights": [{"claim": "On end-to-end root cause analysis using code and waveform data across commercial-scale IPs including bus fabrics, RISC-V cores, PCIe and DDR, ChipAgents achieved over 3x higher pass-at-one accuracy than state-of-the-art generic AI agents.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["ChipAgents", "RISC-V", "PCIe", "DDR", "root cause analysis"], "conviction": "high", "so_what": "A 3x accuracy edge on debug—the most time-consuming ASIC task—is the kind of quantified moat that could drive domain-specific AI-EDA adoption over generic LLM agents.", "quote": "ChipAgents achieved over 3× higher pass-at-one accuracy than state-of-the-art generic AI agents", "locator": "#1 Autonomous Root Cause Analysis at Commercial Scale", "quote_verified": true}, {"claim": "In a joint paper with STMicroelectronics, ChipAgents reduced specification reading time by 15x, formal assertion generation by 240x, and UVM environment creation by 400x, while keeping the verification engineer in full control.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["ChipAgents", "STMicroelectronics", "UVM", "formal verification"], "conviction": "high", "so_what": "Order-of-magnitude verification speedups with a named partner (STMicro) lend credibility; if reproducible, this compresses design cycles and headcount needs.", "quote": "specification reading time was reduced by 15×, formal assertion generation by 240×, and UVM environment creation by 400×", "locator": "#3 The New Era of Digital Verification", "quote_verified": true}, {"claim": "ChipAgents argues effective AI timing closure requires domain-specific capabilities beyond general code generation—timing report understanding, RTL mapping, design-intent preservation and PPA-aware decision-making.", "speaker": "Daniel Nenni", "type": "framework", "entities": ["ChipAgents", "timing closure", "RTL", "PPA"], "conviction": "medium", "so_what": "Reinforces the thesis that generic LLMs are insufficient for EDA; domain specialization is the differentiator and barrier to entry.", "quote": null, "locator": "#2 AI-Driven Timing Closure", "quote_verified": false}]}, {"theme": "Ecosystem validation at DAC", "insights": [{"claim": "ChipAgents CEO William Wang will join Analog Devices Senior Director Nimay Shah at DAC 2026 to discuss agentic AI across architectural exploration, RTL quality analysis, verification acceleration, physical design and design closure.", "speaker": "Daniel Nenni", "type": "anecdote", "entities": ["ChipAgents", "William Wang", "Analog Devices", "Nimay Shah"], "conviction": "medium", "so_what": "Analog Devices engagement signals blue-chip customer interest in agentic EDA—an adoption signal beyond vendor marketing.", "quote": null, "locator": "Catch the TechTalk on Where Agentic AI Delivers Real Value", "quote_verified": false}, {"claim": "DAC comes to Long Beach for the first time in 2026 with AI expected to be a central topic across the program and exhibition floor, and ChipAgents took the largest booth on the show floor.", "speaker": "Daniel Nenni", "type": "anecdote", "entities": ["DAC 2026", "Long Beach", "ChipAgents"], "conviction": "low", "so_what": "AI dominance at DAC and a startup taking the largest booth signals capital and mindshare shifting toward agentic EDA.", "quote": null, "locator": "Making the AI wave at DAC 2026", "quote_verified": false}]}], "insight_total": 7, "top_entities": ["ChipAgents", "DAC 2026", "STMicroelectronics", "Analog Devices", "William Wang", "UVM", "RISC-V", "EDA", "agentic AI", "timing closure"], "source_meta": {"author": "Daniel Nenni", "word_count": 879, "paywalled": false}}, {"record_id": "47d6a551118b2a8c", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/forum/threads/25466", "title": "John Carmack on how high-bandwdith flash can power AI inference", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-09T13:05:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "John Carmack argues NAND flash—over 100x cheaper per GB than HBM—can serve AI inference because model inference has a deterministic, sequential memory-access pattern that tolerates millisecond cold-start latency, enabling much larger and cheaper models via high-bandwidth flash (HBF), though training remains a poor fit due to flash write-wear.", "themes": [{"theme": "Flash economics vs HBM for inference", "insights": [{"claim": "NAND flash is over 100 times cheaper per GB than HBM, creating an opportunity for AI accelerators even after giving a flash controller a 1024-bit interface with HBM-class bandwidth.", "speaker": "S", "type": "data_point", "entities": ["NAND flash", "HBM", "AI accelerators", "high-bandwidth flash"], "conviction": "high", "so_what": "A 100x cost gap is a large enough wedge to reshape inference memory hierarchies—bullish for NAND makers and a potential threat to pure-HBM demand growth.", "quote": "NAND flash is over 100 times cheaper per GB than HBM, so there should be opportunity there, even after giving a flash controller a 1024 bit interface with HBM bandwidth.", "locator": "NAND flash is over 100 times cheaper", "quote_verified": true}, {"claim": "Model inference has a deterministic memory-access pattern that needs no true random access for weights and can tolerate multi-millisecond cold-start latency as long as continuous reads deliver the necessary bandwidth.", "speaker": "S", "type": "thesis", "entities": ["model inference", "memory access", "NAND flash"], "conviction": "high", "so_what": "Determinism is the technical key unlocking cheap sequential flash for weights—the core enabler of the HBF-for-inference thesis.", "quote": "Unlike game rendering, model inference can have a deterministic memory access pattern. You don’t need “random access memory” at all for model weights, and you could tolerate cold-start latencies in the multiple milliseconds", "locator": "Memory cost and capacity are significant issues", "quote_verified": true}]}, {"theme": "Interface design tradeoffs", "insights": [{"claim": "Carmack proposes either a specialized pin protocol pipelining full 16KB+ pages from flash to accelerator scratchpad, or emulating random-access memory with a 1000x+ performance cliff for non-sequential reads that reuses existing cache hierarchies and eases model-weight updates.", "speaker": "S", "type": "framework", "entities": ["flash controller", "scratchpad memory", "cache hierarchy"], "conviction": "medium", "so_what": "The RAM-emulation path lowers adoption risk by working immediately (slowly) before optimization—an incremental deployment route chipmakers could favor.", "quote": "the ram-emulation interface will start off just extremely slow, and you can incrementally sort out the changes for full performance", "locator": "You could make a specialized pin protocol", "quote_verified": true}, {"claim": "When scratchpad SRAM is too small to hold a layer's weights, Carmack suggests reviving the old optical-drive trick of duplicating data at multiple sequential locations to avoid seeking, noting there would be capacity to burn.", "speaker": "S", "type": "anecdote", "entities": ["SRAM", "scratchpad", "flash"], "conviction": "low", "so_what": "Flash's cheap capacity permits redundancy-for-performance tradeoffs impossible with expensive HBM—an architectural degree of freedom.", "quote": "the old optical drive optimization technique of duplicating data in multiple places on a sequential read to avoid seeking, but there would be capacity to burn", "locator": "There may be cases where there isn’t enough scratchpad SRAM", "quote_verified": true}, {"claim": "A split memory system mixing flash and HBM channels would likely be suboptimal versus uniform memory but could be much cheaper and allow much larger models to run.", "speaker": "S", "type": "prediction", "entities": ["HBM", "NAND flash", "split memory"], "conviction": "medium", "so_what": "Hybrid flash/HBM designs point to a new accelerator memory tier; watch for controller and interface IP opportunities.", "quote": "A split memory system consisting of some channels of flash and some channels of HBM will probably be suboptimal compared to a uniform memory, but it could be much cheaper, and allow much larger models to be run.", "locator": "A split memory system consisting of some channels", "quote_verified": true}]}, {"theme": "Training limits and DRAM alternative", "insights": [{"claim": "Carmack argues the case is strong for inference but weak for training, because flash memory would quickly wear out from the writes even if perfectly page-aligned.", "speaker": "S", "type": "causal", "entities": ["flash memory", "training", "write endurance"], "conviction": "high", "so_what": "Bounds the HBF opportunity to inference; training memory demand still favors HBM/DRAM, limiting the disruption's scope.", "quote": "flash memory would quickly wear out from the writes, even if they were all perfectly page aligned", "locator": "I think th case is strong for inference", "quote_verified": true}, {"claim": "For training, Carmack suggests replacing low-latency HBM with massively parallel cheaper DRAM at high latency could still yield worthwhile cost savings.", "speaker": "S", "type": "thesis", "entities": ["HBM", "DRAM", "training"], "conviction": "low", "so_what": "Even in training, a cost-driven shift toward high-latency parallel DRAM could pressure HBM's premium positioning.", "quote": "Replacing low-latency HBM with massively parallel cheap(er) DRAM at high latency might still be a worthwhile cost savings.", "locator": "I think th case is strong for inference", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["John Carmack", "NAND flash", "HBM", "high-bandwidth flash", "AI accelerators", "DRAM", "SRAM", "model inference", "scratchpad memory"], "source_meta": {"author": "S", "word_count": 491, "paywalled": false}}, {"record_id": "47d7e0b83ec09ae1", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/security/caspia-technologies/370802-caspia-dac-plan-2026/", "title": "Caspia Technologies is pioneering a new, agentic chip and system security approach at DAC 2026 - Semiwiki", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "Caspia Technologies, a 2020-founded Gainesville, Florida startup, is bringing an agentic AI platform (CODAx) for static RTL security verification to DAC 2026, positioning silicon security verification as a mandatory design-flow step in response to AI-powered cyberattacks.", "themes": [{"theme": "Agentic RTL security verification as a product category", "insights": [{"claim": "Caspia Technologies is commercializing CODAx, a static RTL security enhancement tool that uses AI agents to let general engineering teams perform expert-level chip security verification without dedicated security specialists.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["Caspia Technologies", "CODAx", "RTL security verification", "EDA"], "conviction": "high", "so_what": "A new EDA sub-category (agentic silicon security) is emerging that could become a required signoff step, expanding the security-verification TAM within chip design flows.", "quote": "Rather than relying on manual reviews or a small group of security specialists, CODAx enables engineering teams to continuously identify, analyze, and remediate security vulnerabilities throughout development.", "locator": "At Caspia's DAC booth 759", "quote_verified": true}, {"claim": "Caspia's initial CODAx product focuses on static analysis of RTL designs, with a roadmap to expand into automated security-assertion generation for formal tools and system-level hardware/software security testing.", "speaker": "Daniel Nenni", "type": "prediction", "entities": ["Caspia Technologies", "CODAx", "RTL", "formal verification"], "conviction": "high", "so_what": "Signals the platform's expansion path from point tool toward full-flow security coverage, a directional read on where security-EDA spend is heading.", "quote": null, "locator": "Target Applications", "quote_verified": false}, {"claim": "Caspia is adding agentic capabilities to CODAx including Asset Assist (automated identification of security assets) and Report Assist (accelerated violation triaging).", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Caspia Technologies", "CODAx", "Asset Assist", "Report Assist"], "conviction": "high", "so_what": "Concrete feature set to benchmark against incumbent EDA security offerings from Synopsys/Cadence/Siemens.", "quote": null, "locator": "You will also learn about the latest agentic security verification capabilities", "quote_verified": false}]}, {"theme": "AI-driven threat landscape as demand driver", "insights": [{"claim": "AI-powered cyber tools are lowering the expertise barrier to discovering and exploiting hardware vulnerabilities, which Caspia argues makes RTL security verification a mandatory design step rather than an afterthought.", "speaker": "Daniel Nenni", "type": "causal", "entities": ["Caspia Technologies", "AI", "RTL", "cybersecurity"], "conviction": "high", "so_what": "Frames a structural demand tailwind: if AI attackers scale, every complex chip design team becomes a buyer of automated security verification.", "quote": "AI-powered cyber tools are already transforming the threat landscape. What once required highly specialized expertise can now be automated, accelerated, and scaled", "locator": "Challenges Being Addressed", "quote_verified": true}, {"claim": "Caspia performed a security analysis on a popular open-source root-of-trust design and will present its findings at DAC, implying discoverable weaknesses in widely reused security IP.", "speaker": "Daniel Nenni", "type": "anecdote", "entities": ["Caspia Technologies", "root-of-trust IP", "open-source hardware"], "conviction": "medium", "so_what": "If widely used open-source root-of-trust IP carries exploitable weaknesses, downstream chips embedding it inherit risk, strengthening the case for automated RTL security scanning.", "quote": "We'll review the analysis we recently performed on a popular open-source root-of-trust design.", "locator": "You will also learn about the latest agentic security verification", "quote_verified": true}]}], "insight_total": 5, "top_entities": ["Caspia Technologies", "CODAx", "DAC 2026", "RTL security verification", "root-of-trust IP", "Asset Assist", "Report Assist", "EDA"], "source_meta": {"author": "Daniel Nenni", "word_count": 667, "paywalled": false}}, {"record_id": "54100c596edd0524", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/forum/threads/25473", "title": "Analysis: AI supercycle could drive semiconductor market beyond US$2 trillion by 2030", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Macro"], "gist": "An analysis argues the AI supercycle is turning semiconductors from a cyclical consumer-led market into infrastructure-driven growth, with WSTS forecasting ~US$1.5 trillion in 2026 and Digitimes seeing a path beyond US$2 trillion by 2030, gated by supply-side bottlenecks in lithography, substrates, HBM, and advanced packaging.", "themes": [{"theme": "Structural regime shift in semiconductor demand", "insights": [{"claim": "The AI supercycle is reshaping semiconductor demand from a cyclical, consumer-led model into an infrastructure-driven growth phase, shifting value from CPUs and mobile SoCs toward GPUs, AI accelerators, HBM, advanced packaging, networking ASICs, and power management ICs.", "speaker": "B", "type": "thesis", "entities": ["semiconductors", "GPUs", "AI accelerators", "HBM", "advanced packaging", "networking ASICs", "PMICs"], "conviction": "high", "so_what": "Reframes semis as a secular capital-goods story; favors leverage to accelerator, HBM, and packaging suppliers over consumer-CPU/mobile exposure.", "quote": "The AI supercycle is reshaping semiconductor demand from a cyclical, consumer-led model into an infrastructure-driven growth phase.", "locator": "opening paragraph", "quote_verified": true}, {"claim": "Digitimes' view is that the global semiconductor market could exceed US$2 trillion by 2030, driven by rapid expansion of AI computing.", "speaker": "B", "type": "prediction", "entities": ["Digitimes", "semiconductor market", "AI computing"], "conviction": "medium", "so_what": "A concrete TAM anchor for sizing long-run semi exposure; roughly a doubling from mid-decade levels.", "quote": "the market could exceed US$2 trillion by 2030", "locator": "opening paragraph", "quote_verified": true}, {"claim": "WSTS's June forecast projects global semiconductor revenue growing by nearly 90% in 2026 to approximately US$1.5 trillion.", "speaker": "B", "type": "data_point", "entities": ["WSTS", "semiconductor revenue"], "conviction": "medium", "so_what": "A near-term milestone against which to track whether the supercycle thesis is on pace; the cited ~90% growth is unusually steep and worth scrutiny.", "quote": "global semiconductor revenue is projected to grow by nearly 90% in 2026, reaching approximately US$1.5 trillion", "locator": "Analysis: AI supercycle could drive", "quote_verified": true}]}, {"theme": "Data-center AI as the technical value driver", "insights": [{"claim": "Training and inference of large language models require dense compute clusters with high memory bandwidth, low-latency interconnects, and advanced thermal management, shifting value toward leading-edge foundry nodes, chiplet architectures, CoWoS-like advanced packaging, HBM stacks, and optical/electrical networking.", "speaker": "B", "type": "causal", "entities": ["LLMs", "leading-edge foundry", "chiplets", "CoWoS", "HBM", "networking"], "conviction": "high", "so_what": "Names the specific technology beneficiaries (advanced nodes, CoWoS packaging, HBM) that capture disproportionate value as compute clusters scale.", "quote": "This shifts value toward leading-edge foundry nodes, chiplet architectures, CoWoS-like advanced packaging, HBM stacks, and optical/electrical networking components.", "locator": "The key technical driver", "quote_verified": true}, {"claim": "Frontier AI system performance, hardware cost, and power requirements have been rising extremely quickly, reinforcing the scale of semiconductor demand behind AI infrastructure.", "speaker": "B", "type": "data_point", "entities": ["AI supercomputers", "semiconductor demand"], "conviction": "medium", "so_what": "Rising per-system hardware cost and power is a bullish signal for semiconductor content but also flags a power/cost ceiling risk to monitor.", "quote": null, "locator": "Research on AI supercomputers", "quote_verified": false}]}, {"theme": "Supply-side execution as the binding constraint", "insights": [{"claim": "The path to a US$2 trillion market depends on supply-side execution, with bottlenecks in advanced lithography, substrate capacity, HBM supply, and packaging throughput potentially constraining shipment growth even if demand stays strong.", "speaker": "B", "type": "contrarian", "entities": ["advanced lithography", "substrates", "HBM", "advanced packaging"], "conviction": "high", "so_what": "Identifies the real bottlenecks (substrates, HBM, packaging throughput) where scarcity creates pricing power and where shortfalls could cap the bull case.", "quote": "Bottlenecks in advanced lithography, substrate capacity, HBM supply, and packaging throughput could constrain shipment growth even if demand remains strong.", "locator": "However, the path to a US$2 trillion", "quote_verified": true}, {"claim": "The AI supercycle could structurally raise semiconductor content per server, per data center, and per watt of computing capacity, making semiconductors the core capital-good layer of the global digital economy by 2030 if enterprise AI, sovereign AI, and hyperscaler capex keep expanding.", "speaker": "B", "type": "thesis", "entities": ["semiconductors", "sovereign AI", "hyperscalers", "data centers"], "conviction": "medium", "so_what": "Rising silicon content per server is the durable margin story; watch hyperscaler capex and sovereign-AI programs as the demand tell.", "quote": "semiconductors may become the core capital-good layer of the global digital economy by 2030", "locator": "Overall, the AI supercycle", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["semiconductor market", "AI accelerators", "HBM", "advanced packaging", "CoWoS", "WSTS", "Digitimes", "hyperscalers", "GPUs", "leading-edge foundry"], "source_meta": {"author": "B", "word_count": 298, "paywalled": false}}, {"record_id": "8347748a2db9079f", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/3dic/370709-the-packaging-pdk-is-the-missing-layer-for-co-packaged-optics/", "title": "The Packaging PDK Is the Missing Layer for Co-Packaged Optics - Semiwiki", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "Moh Kolb argues that co-packaged optics (CPO) will not scale on photonic device performance alone; the missing enabler is a packaging PDK that acts as a realization contract binding optical, electrical, thermal, mechanical, test, and manufacturing domains, elevating CPO from a device-design problem to a system-realization problem for AI infrastructure.", "themes": [{"theme": "PDK redefinition: from device kit to realization interface", "insights": [{"claim": "For co-packaged optics, the process design kit must evolve from a device-design kit into a realization interface kit that describes the packaged electro-optical system, not just the photonic device.", "speaker": "Moh Kolb", "type": "framework", "entities": ["CPO", "PDK", "packaging PDK", "photonics"], "conviction": "high", "so_what": "Signals a new EDA/packaging tooling layer whose absence is a bottleneck; vendors who deliver packaging PDKs could capture a strategic control point in the optics supply chain.", "quote": "For CPO, the PDK must evolve from a device-design kit into a realization interface kit.", "locator": "From Photonic Device Design to Electro-Optical Realization", "quote_verified": true}, {"claim": "A traditional PDK is not merely a file set but a contract between design and manufacturing that defines the design space realizable with confidence.", "speaker": "Moh Kolb", "type": "framework", "entities": ["PDK", "foundry", "design-manufacturing interface"], "conviction": "high", "so_what": "Framing the PDK as a contract clarifies why a missing packaging PDK stalls productization even when devices work in the lab.", "quote": "The PDK is not only a convenience file set. It is a contract between design and manufacturing.", "locator": "The Traditional Role of the PDK", "quote_verified": true}, {"claim": "The author proposes a three-tier PDK hierarchy: the PDK defines what can be drawn, the packaging PDK defines what can be integrated, and electro-optical realization defines what can be built, tested, yielded, calibrated, and trusted.", "speaker": "Moh Kolb", "type": "framework", "entities": ["PDK", "packaging PDK", "electro-optical realization"], "conviction": "high", "so_what": "A mental model for mapping where new tool and IP investment must go; the highest tier (realization) is the least served today.", "quote": "PDK defines what can be drawn. Packaging PDK defines what can be integrated. Electro-optical realization defines what can be built, tested, yielded, calibrated, and trusted.", "locator": "The New PDK Hierarchy", "quote_verified": true}]}, {"theme": "The copper-light boundary as the decisive integration point", "insights": [{"claim": "CPO is fundamentally about moving the copper-light boundary closer to the compute engine, and that boundary carries its own burden of coupling loss, alignment sensitivity, thermal drift, package stress, calibration, and reliability exposure.", "speaker": "Moh Kolb", "type": "framework", "entities": ["CPO", "copper-light boundary", "ASIC", "optical coupling"], "conviction": "high", "so_what": "Reframes CPO evaluation around the boundary rather than the device, redirecting where yield and reliability risk actually concentrate.", "quote": "It is about moving the copper-light boundary closer to the compute engine. That boundary is not free.", "locator": "The Copper-Light Boundary", "quote_verified": true}, {"claim": "Electrical signals over copper face reach, loss, crosstalk, impedance discontinuity, equalization power, and heat challenges as bandwidth and distance increase, which is the physical driver pushing optics toward the compute engine.", "speaker": "Moh Kolb", "type": "causal", "entities": ["copper interconnect", "SerDes", "optics", "bandwidth"], "conviction": "high", "so_what": "Explains why copper's limits make CPO adoption a when-not-if for high-bandwidth AI systems; equalization power is a specific cost lever to watch.", "quote": null, "locator": "The Copper-Light Boundary", "quote_verified": false}, {"claim": "A common CPO failure mode is where the device looks good and the package looks good but the system still fails at the interface, which realization-aware packaging PDKs are meant to prevent.", "speaker": "Moh Kolb", "type": "causal", "entities": ["CPO", "packaging PDK", "system integration"], "conviction": "high", "so_what": "Interface-level failure is the hidden yield killer in CPO; tooling that de-risks it addresses the true blocker to volume deployment.", "quote": "A realization-aware packaging PDK should help prevent the common failure mode where the device looks good, the package looks good, and the system still fails at the interface.", "locator": "From Static Rules to Realization-Aware Environments", "quote_verified": true}]}, {"theme": "Device excellence is necessary but insufficient", "insights": [{"claim": "A good modulator, laser, PIC, and EIC each still have to survive the package, couple into the optical path, align with fiber attach, and drive through a clean electrical path, so better photonic devices alone will not scale CPO.", "speaker": "Moh Kolb", "type": "thesis", "entities": ["modulator", "laser", "PIC", "EIC", "fiber attach"], "conviction": "high", "so_what": "Directs investor attention away from device-performance headlines toward packaging, test, and calibration capability as the real differentiators.", "quote": "The industry needs better photonic devices. But better photonic devices alone are not enough.", "locator": "Better Devices Are Not Enough", "quote_verified": true}, {"claim": "For CPO the package is not passive but becomes the place where optical, electrical, thermal, mechanical, and manufacturing domains converge.", "speaker": "Moh Kolb", "type": "thesis", "entities": ["CPO", "advanced packaging", "thermal", "mechanical stress"], "conviction": "high", "so_what": "Elevates advanced packaging vendors and OSATs as the locus of CPO value capture and risk, not just PIC/EIC makers.", "quote": "For CPO, the package is not passive.", "locator": "The Packaging PDK as a Realization Contract", "quote_verified": true}]}, {"theme": "AI infrastructure and the data-movement bottleneck", "insights": [{"claim": "AI infrastructure is increasingly constrained by data movement between accelerators, memory, switches, racks, and clusters, which drives power, latency, thermal load, bandwidth limits, and system cost and is why optical I/O and CPO are receiving heavy attention.", "speaker": "Moh Kolb", "type": "causal", "entities": ["AI infrastructure", "optical I/O", "CPO", "data movement"], "conviction": "high", "so_what": "Data movement, not compute, is the framed constraint, supporting a durable demand thesis for optical interconnect and CPO enablers.", "quote": "AI infrastructure is increasingly constrained by data movement.", "locator": "Why This Matters for AI Infrastructure", "quote_verified": true}, {"claim": "A data center cannot operate on record-setting lab performance; it needs manufacturable modules, stable coupling, reliable attach, controlled thermal behavior, test coverage, calibration flows, field diagnostics, and supply-chain repeatability.", "speaker": "Moh Kolb", "type": "thesis", "entities": ["data center", "optical modules", "supply chain", "calibration"], "conviction": "high", "so_what": "Manufacturability and supply-chain repeatability, not peak specs, will determine which CPO suppliers win volume design-ins.", "quote": "A data center cannot operate on record-setting lab performance.", "locator": "Why This Matters for AI Infrastructure", "quote_verified": true}, {"claim": "The next phase of CPO will be won not by optical performance alone but by teams that can define, integrate, test, calibrate, manufacture, and trust the full electro-optical realization path.", "speaker": "Moh Kolb", "type": "prediction", "entities": ["CPO", "electro-optical realization", "AI photonics"], "conviction": "high", "so_what": "A competitive-moat thesis: integration and test capability, not device benchmarks, is the differentiator to screen suppliers on.", "quote": "The next phase of CPO will not be won by optical performance alone.", "locator": "Conclusion", "quote_verified": true}]}], "insight_total": 11, "top_entities": ["CPO", "packaging PDK", "PDK", "PIC", "EIC", "copper-light boundary", "AI infrastructure", "optical I/O", "advanced packaging", "fiber attach"], "source_meta": {"author": "Moh Kolb", "word_count": 1612, "paywalled": false}}, {"record_id": "ab60345b21872726", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/forum/threads/25478", "title": "Why SAR Radar Is Driving Renewed Demand for C-Band GaN and GaAs Front-End IP", "published_date": "2026-07-09", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "Geopolitics"], "gist": "A commercial small-SAR satellite boom led by ICEYE, Capella, Umbra, and Synspective has roughly tripled SAR satellites in orbit in five years and is concentrating demand on C-band phased-array front-end IP (GaN HPAs, GaAs LNAs, beamformer ICs), a gap the traditional defense-primes' closed supply chain leaves unmet and that fabless IP vendors like VSI (Viettel Semiconductor) are moving to fill.", "themes": [{"theme": "Commercial small-SAR constellation boom", "insights": [{"claim": "The SAR market has grown faster than almost any other defense-and-space electronics segment over the past three years, driven not by military programs but by commercial remote-sensing startups.", "speaker": "SemiWiki", "type": "thesis", "entities": ["SAR", "remote sensing", "defense electronics"], "conviction": "high", "so_what": "A commercial-led demand shift changes procurement timescales and volumes, opening a market for merchant RF front-end IP.", "quote": "the SAR market has begun growing faster than almost any other segment of the defense and space electronics industry, and the growth is being driven not by military programs but by commercial remote sensing startups", "locator": "opening paragraph", "quote_verified": true}, {"claim": "Starting around 2020, ICEYE (Finland), Capella Space (US), Umbra (US), and Synspective (Japan) began launching small-SAR constellations at a fraction of traditional program cost using commercial smallsat buses and data-subscription business models.", "speaker": "SemiWiki", "type": "data_point", "entities": ["ICEYE", "Capella Space", "Umbra", "Synspective", "smallsat"], "conviction": "high", "so_what": "Names the specific constellation builders that constitute the new merchant demand base for C-band front-end IP.", "quote": null, "locator": "What changed", "quote_verified": false}, {"claim": "ICEYE alone had launched more than 30 satellites by mid-2025, and the number of SAR-capable satellites in orbit has roughly tripled in five years with the deployment rate still accelerating.", "speaker": "SemiWiki", "type": "data_point", "entities": ["ICEYE", "SAR satellites"], "conviction": "high", "so_what": "Quantifies the demand ramp; a tripling of orbital SAR assets translates directly into recurring T/R module and front-end IP volume.", "quote": "ICEYE alone had launched more than 30 satellites by mid-2025.", "locator": "What changed", "quote_verified": true}]}, {"theme": "Smallsat form factor tightens RF integration", "insights": [{"claim": "Every SAR satellite requires a phased-array antenna with per-element T/R modules containing PA, LNA, T/R switch, and beam-steering control, and the smallsat form factor forces the same function into half the area at a third of the power versus heritage designs.", "speaker": "SemiWiki", "type": "causal", "entities": ["phased array", "T/R modules", "PA", "LNA", "beamformer"], "conviction": "high", "so_what": "Integration pressure favors highly integrated beamformer ICs and compound-semi front ends, raising the value of qualified merchant IP.", "quote": "A tile that might have used 20 discrete components in a heritage design now needs to fit the same function in half the area at a third of the power consumption.", "locator": "This matters for RF front-end designers", "quote_verified": true}, {"claim": "SAR imaging is a coherent process requiring exceptional phase and amplitude stability between low-duty-cycle (5-15%) chirp pulses, so fraction-of-a-degree drift directly degrades azimuth resolution and drives beamformer RMS phase-error specs below 2.5 degrees (some builders below 2 degrees).", "speaker": "SemiWiki", "type": "data_point", "entities": ["SAR", "beamformer IC", "phase error", "azimuth resolution"], "conviction": "high", "so_what": "Hard spec thresholds define the technical bar merchant beamformer IP must clear to win SAR design-ins.", "quote": "RMS phase error below 2.5° is a common requirement, with some constellation builders specifying below 2°.", "locator": "The RF front-end integration challenge at C-band", "quote_verified": true}, {"claim": "A typical C-band SAR tile uses 8-32 elements with a beamformer IC controlling groups of 4 channels each, using LGA packaging and an SPI control interface as standard integration assumptions.", "speaker": "SemiWiki", "type": "data_point", "entities": ["C-band SAR tile", "beamformer IC", "LGA", "SPI"], "conviction": "medium", "so_what": "Defines the concrete integration profile that IP must match; availability of silicon-proven parts with real phase-error data compresses tile development by months.", "quote": null, "locator": "At the tile level", "quote_verified": false}]}, {"theme": "Why C-band, and the data-ecosystem lock-in", "insights": [{"claim": "C-band (5-6 GHz) offers wider swath, better vegetation and dry-soil penetration, and more established regulatory access, making it the default for agricultural monitoring, sea-ice mapping, deforestation, and most commercial earth observation, versus X-band's higher resolution.", "speaker": "SemiWiki", "type": "framework", "entities": ["C-band", "X-band", "earth observation"], "conviction": "high", "so_what": "Explains why the commercial wave concentrates on C-band, focusing IP demand on that allocation rather than X-band.", "quote": null, "locator": "Why C-band specifically, and why now", "quote_verified": false}, {"claim": "Sentinel-1 created a global C-band data baseline that commercial customers know how to interpret, so new constellations default to C-band for interoperability with that established data ecosystem.", "speaker": "SemiWiki", "type": "causal", "entities": ["Sentinel-1", "C-band", "data ecosystem"], "conviction": "high", "so_what": "A data-standard lock-in reinforces C-band's dominance, giving the front-end IP demand a durable, self-reinforcing driver.", "quote": "New constellations targeting the same application verticals are defaulting to C-band to be interoperable with that established data ecosystem.", "locator": "Why C-band specifically, and why now", "quote_verified": true}]}, {"theme": "Supply-chain gap and merchant-IP entry", "insights": [{"claim": "Dominant compound-semi vendors in this space (Qorvo, MACOM, Northrop Grumman Microelectronics Center) develop C-band front-end components primarily for internal use or restrictive program-specific licenses, leaving constellation builders outside the US/European defense supply chain with an unsolved sourcing problem.", "speaker": "SemiWiki", "type": "thesis", "entities": ["Qorvo", "MACOM", "Northrop Grumman", "compound semiconductors"], "conviction": "high", "so_what": "A structural open-market gap creates room for fabless RF IP entrants to win commercial-terms business the incumbents don't serve.", "quote": "A constellation builder outside the traditional US/European defense supply chain who needs C-band beamformer IC and HPA at commercial terms faces a sourcing problem that has not yet been comprehensively solved by the open IP market.", "locator": "The supply chain gap", "quote_verified": true}, {"claim": "VSI (Viettel Semiconductor), the fabless IP arm of Vietnam's Viettel Group, is offering silicon-proven C-band front-end IP through Design & Reuse, including the VBF0644 4T4R GaAs beamformer (5-6 GHz, RMS phase error <2.3 degrees) and the VPA06100 GaN HPA (5.2-5.7 GHz, >50 dBm Psat, PAE >45%).", "speaker": "SemiWiki", "type": "data_point", "entities": ["VSI", "Viettel Semiconductor", "VBF0644", "VPA06100", "GaAs", "GaN"], "conviction": "high", "so_what": "A non-Western fabless entrant with silicon-proven parts signals both a new competitor and geopolitical diversification of the RF front-end supply chain.", "quote": "VSI — Viettel Semiconductor is a fabless semiconductor IP design company based in Hanoi, Vietnam, and the semiconductor arm of Viettel Group.", "locator": "A note from VSI", "quote_verified": true}]}], "insight_total": 10, "top_entities": ["SAR", "C-band", "ICEYE", "Capella Space", "beamformer IC", "GaN", "GaAs", "Qorvo", "MACOM", "VSI (Viettel Semiconductor)", "Sentinel-1", "T/R modules"], "source_meta": {"author": "SemiWiki", "word_count": 1017, "paywalled": false}}, {"record_id": "cd8a3f176d5fb828", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/forum/threads/25470", "title": "Why CPUs Are Now at the Center of the AI Race", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Geopolitics"], "gist": "As AI systems become heterogeneous, distributed, and agentic, CPUs are re-emerging as strategic AI infrastructure for control-plane functions, with Nvidia's Vera CPU targeting agentic/always-on agent workloads and Intel and AMD repositioning server CPUs as AI platforms, while US export controls give Chinese vendors (Huawei, Alibaba, Baidu, DeepSeek-linked) a localization opening.", "themes": [{"theme": "CPU as control plane for agentic AI", "insights": [{"claim": "The AI hardware race is shifting beyond GPUs because modern AI systems are heterogeneous, distributed, and agentic, and control-plane functions (retrieving data, calling tools, managing context, scheduling workflows, running containers, coordinating memory, orchestrating thousands of concurrent inference tasks) depend heavily on CPU performance, memory bandwidth, cache hierarchy, and I/O lanes.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["CPUs", "GPUs", "agentic AI", "AI infrastructure"], "conviction": "high", "so_what": "Reframes CPUs as a growth vector in AI infrastructure rather than commoditized hosts, supporting exposure to server-CPU and rack-scale system vendors.", "quote": "Large language models do not only perform matrix multiplication; they retrieve data, call tools, manage context, schedule workflows, run containers, coordinate memory movement and orchestrate thousands of concurrent inference tasks.", "locator": "opening paragraph", "quote_verified": true}, {"claim": "Nvidia's Vera CPU is designed for agentic AI and reinforcement-learning environments, extending Nvidia beyond GPUs into full rack-scale systems combining CPUs, GPUs, networking, and DPUs.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Nvidia", "Vera CPU", "DPUs", "rack-scale systems"], "conviction": "high", "so_what": "Nvidia's move into CPUs expands its TAM and pressures Intel/AMD in the server-CPU segment they historically owned.", "quote": "Nvidia's Vera CPU is designed for \"agentic AI\" and reinforcement-learning environments, extending the company beyond GPUs into full rack-scale systems", "locator": "This is why US chipmakers", "quote_verified": true}, {"claim": "Perplexity plans to use Nvidia's Vera CPU, positioned for always-on AI agent workloads, per a Reuters report.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Perplexity", "Nvidia", "Vera CPU"], "conviction": "medium", "so_what": "An early named customer validates demand for CPU silicon tuned to persistent agent workloads.", "quote": "Perplexity plans to use Nvidia's Vera CPU, with the chip positioned for always-on AI agent workloads", "locator": "This is why US chipmakers", "quote_verified": true}, {"claim": "Intel and AMD are emphasizing server CPUs as AI platforms, pairing high core counts, DDR5/HBM memory support, chiplet packaging, and accelerator interconnects with GPUs.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Intel", "AMD", "server CPUs", "DDR5", "HBM", "chiplets"], "conviction": "medium", "so_what": "Confirms a broad industry pivot; CPU roadmaps now compete on memory support and accelerator interconnect, not just cores.", "quote": null, "locator": "This is why US chipmakers", "quote_verified": false}]}, {"theme": "Export controls and China localization", "insights": [{"claim": "US export controls constraining access to advanced Nvidia GPUs are pressuring Chinese cloud providers, AI labs, and state-backed buyers to adopt domestic compute stacks, creating a localization opportunity for local CPU and accelerator vendors.", "speaker": "Daniel Nenni", "type": "causal", "entities": ["US export controls", "Nvidia", "China", "domestic compute"], "conviction": "high", "so_what": "Export controls accelerate a bifurcated compute market; domestic demand gives Chinese silicon vendors a captive path to share gains.", "quote": "US export controls have constrained access to advanced Nvidia GPUs, increasing pressure on Chinese cloud providers, AI labs and state-backed buyers to adopt domestic compute stacks.", "locator": "China's opportunity lies in localization", "quote_verified": true}, {"claim": "Nvidia has pitched Vera CPUs to Chinese clients partly to recover ground in a market hit by export restrictions and China's self-reliance push, per Reuters.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Nvidia", "Vera CPU", "China"], "conviction": "medium", "so_what": "Shows Nvidia routing around GPU restrictions via CPUs; watch whether Vera CPU exports face the same regulatory scrutiny.", "quote": null, "locator": "China's opportunity lies in localization", "quote_verified": false}, {"claim": "Huawei, Alibaba, Baidu, and DeepSeek-linked efforts are pushing local AI chips and server ecosystems, though China still trails in advanced process nodes, high-bandwidth memory, and software maturity.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["Huawei", "Alibaba", "Baidu", "DeepSeek", "China semiconductors"], "conviction": "medium", "so_what": "Identifies China's specific gaps (advanced nodes, HBM, software) as the constraints that determine how fast localization can close.", "quote": "China still trails in advanced process nodes, high-bandwidth memory and software maturity, but domestic demand gives local CPU and accelerator vendors a path to increase market share.", "locator": "Meanwhile, Huawei, Alibaba", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["Nvidia", "Vera CPU", "Intel", "AMD", "Perplexity", "Huawei", "Alibaba", "Baidu", "DeepSeek", "US export controls", "GPUs", "CPUs"], "source_meta": {"author": "Daniel Nenni", "word_count": 303, "paywalled": false}}, {"record_id": "d75902f6a54a0b7e", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/eda/moores-lab-ai/370928-mooreslabai-at-dac-2026-why-the-future-of-semiconductor-engineering-is-agentic-not-just-generative/", "title": "MooresLabAI at DAC 2026: Why the Future of Semiconductor Engineering Is Agentic, Not Just Generative - Semiwiki", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "MooresLabAI, led by CEO Shelly Henry (ex-ARM, Microsoft), is building an end-to-end suite of specialized reasoning agents (SpecAgent, DesignAgent, VerifAgent, DebugAgent, CoverageAgent, MooreIP, MooreSoC) that share context across the full silicon lifecycle, arguing the next semiconductor revolution comes from agentic autonomous development rather than generative RTL snippets, and targeting verification as the largest opportunity.", "themes": [{"theme": "Agentic vs generative as the core thesis", "insights": [{"claim": "MooresLabAI argues the next semiconductor revolution will come not from a better EDA tool or faster compiler but from autonomous silicon development powered by AI agents that reason, collaborate, and execute alongside human engineers.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["MooresLabAI", "Shelly Henry", "agentic AI", "EDA"], "conviction": "high", "so_what": "Positions agentic orchestration, not point-tool improvement, as the disruptive vector in EDA; a competitive threat and partner-opportunity for Synopsys/Cadence/Siemens.", "quote": "The future isn't AI generating snippets of RTL. The future is AI understanding the entire engineering problem.", "locator": "CEO Shelly Henry", "quote_verified": true}, {"claim": "Semiconductor innovation has been constrained not by imagination but by engineering capacity, with teams spending more time coordinating fragmented work across specs, RTL, verification, debugging, coverage, and signoff than creating innovation.", "speaker": "Daniel Nenni", "type": "framework", "entities": ["MooresLabAI", "semiconductor engineering", "verification"], "conviction": "high", "so_what": "Frames the bottleneck as coordination/capacity, implying the biggest productivity unlock is workflow orchestration, not faster code generation.", "quote": "semiconductor innovation has been constrained not by imagination, but by engineering capacity", "locator": "Key takeaways", "quote_verified": true}]}, {"theme": "Verification as the largest opportunity", "insights": [{"claim": "Verification is the phase that now dominates modern chip schedules and represents MooresLabAI's largest opportunity, addressed by VerifAgent (autonomous verification environments and test plans), DebugAgent (isolating failures in minutes instead of days), and CoverageAgent (regression analysis and shortest-path coverage closure).", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["MooresLabAI", "VerifAgent", "DebugAgent", "CoverageAgent", "verification"], "conviction": "high", "so_what": "Verification's schedule dominance makes it the highest-value target for AI automation; the claimed days-to-minutes debug speedup is the metric to validate.", "quote": "DebugAgent™ reasons across specifications, RTL, waveforms, and simulation logs to isolate failures in minutes instead of days.", "locator": "The largest opportunity", "quote_verified": true}, {"claim": "Experienced verification engineers are increasingly difficult to hire while design complexity explodes and tapeout schedules compress, making semiconductor engineering an infrastructure problem that faster code writing alone does not solve.", "speaker": "Daniel Nenni", "type": "causal", "entities": ["verification engineers", "tapeout", "design complexity"], "conviction": "high", "so_what": "A structural labor-scarcity driver for AI verification tools; talent shortage is the demand tailwind to track.", "quote": "Design complexity is exploding, experienced verification engineers are increasingly difficult to hire, and tapeout schedules continue to compress.", "locator": "This distinction matters", "quote_verified": true}]}, {"theme": "Shared-context platform and ecosystem strategy", "insights": [{"claim": "MooresLabAI's differentiation is that its agents share context across the development lifecycle so engineering knowledge persists from architecture through verification and signoff, unlike disconnected generative coding assistants.", "speaker": "Daniel Nenni", "type": "framework", "entities": ["MooresLabAI", "SpecAgent", "context persistence"], "conviction": "high", "so_what": "Persistent shared context is the claimed moat; evaluate whether cross-agent context is a defensible advantage versus point AI tools.", "quote": "these agents share context across the development lifecycle, allowing engineering knowledge to persist from architecture through verification and signoff", "locator": "Rather than functioning as disconnected AI assistants", "quote_verified": true}, {"claim": "MooresLabAI integrates with industry-standard EDA environments from Synopsys, Cadence, and Siemens, augmenting existing methodologies rather than replacing them.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["MooresLabAI", "Synopsys", "Cadence", "Siemens"], "conviction": "high", "so_what": "A complement-not-replace strategy lowers adoption friction and hints the incumbents' flows remain the substrate agentic layers sit atop.", "quote": "The platform integrates with industry-standard EDA environments from Synopsys, Cadence, and Siemens, augmenting established methodologies rather than replacing them.", "locator": "Importantly, MooresLabAI is not asking", "quote_verified": true}, {"claim": "CEO Shelly Henry frames agentic AI as democratizing silicon engineering, lowering the barrier so startups, research organizations, and emerging innovators can design world-class chips much as cloud computing lowered the barrier to building software.", "speaker": "Daniel Nenni", "type": "prediction", "entities": ["Shelly Henry", "MooresLabAI", "silicon engineering"], "conviction": "medium", "so_what": "If barriers to chip design fall, the pool of chip designers widens, expanding the EDA/IP customer base beyond large semiconductor firms.", "quote": "Just as cloud computing lowered the barrier to building software, he believes agentic AI will dramatically lower the barrier to designing world-class silicon.", "locator": "That vision extends beyond productivity gains", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["MooresLabAI", "Shelly Henry", "VerifAgent", "DebugAgent", "CoverageAgent", "SpecAgent", "Synopsys", "Cadence", "Siemens", "verification", "EDA"], "source_meta": {"author": "Daniel Nenni", "word_count": 825, "paywalled": false}}, {"record_id": "f206c831bf9d14cc", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/eda/easy-logic/370861-demonstrating-the-easyai-eco-suite-an-ai-powered-functional-eco-solution-at-dac-2026/", "title": "Demonstrating the EasyAI ECO Suite - An AI-Powered Functional ECO Solution at DAC 2026 - Semiwiki", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "Easy-Logic will showcase its EasyAI ECO Suite at DAC 2026, embedding AI engines across the full functional ECO flow (SYN, DFT, PR) via three engines (Auto Partition, Learning/I-Learning, Smart Caching) that CEO Dr. Xing Wei says deliver smaller patches, faster iterations, and more accurate timing in the final 'golden window' of chip design.", "themes": [{"theme": "AI across the functional ECO workflow", "insights": [{"claim": "Easy-Logic's EasyAI ECO Suite integrates AI engines across the entire functional ECO flow (SYN ECO, DFT ECO, PR ECO) to attack traditional bottlenecks in patch size, runtime, and timing accuracy rather than being a single-feature upgrade.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["Easy-Logic", "EasyAI ECO Suite", "ECO", "EDA"], "conviction": "high", "so_what": "Positions ECO as another EDA sub-flow being disrupted by embedded AI; a competitive datapoint versus incumbent ECO tools.", "quote": "EasyAI ECO Suite is not a single-feature upgrade,  it is a systematic integration of AI across the entire ECO workflow, delivering smaller patches, faster iterations, and more accurate timing.", "locator": "Dr. Xing Wei, CEO of Easy-Logic, commented", "quote_verified": true}, {"claim": "Easy-Logic CEO Dr. Xing Wei frames ECO efficiency gains in the final 'golden window' of chip design as directly impacting time-to-market, arguing AI-EDA convergence gives designers true controllability over product schedules.", "speaker": "Daniel Nenni", "type": "framework", "entities": ["Easy-Logic", "Dr. Xing Wei", "time-to-market"], "conviction": "high", "so_what": "Schedule controllability is the pitched value; late-stage ECO speed is a lever on tapeout timing that buyers pay for.", "quote": "In the final 'golden window' of chip design, every ECO efficiency gain directly impacts time-to-market.", "locator": "Dr. Xing Wei, CEO of Easy-Logic, commented", "quote_verified": true}]}, {"theme": "Three intelligent engines and benchmark claims", "insights": [{"claim": "Easy-Logic's Auto Partition engine uses AI to analyze circuit node correlations in an Analysis-Partitioning-Solve loop to break multimillion-gate ECO changes into manageable sub-problems, reducing patch size by over 20% on average and up to 90% in certain cases.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Easy-Logic", "Auto Partition", "patch size"], "conviction": "high", "so_what": "Quantified patch-size reduction is the headline benchmark to validate against competing ECO tools; smaller patches reduce risk and rework at tapeout.", "quote": "Auto Partition reduces patch size by over 20% on average, and up to 90% in certain cases.", "locator": "Auto Partition: Making Ultra-Large-Scale", "quote_verified": true}, {"claim": "Easy-Logic's Learning/I-Learning engine analyzes structural and logic equivalences between old and new netlists to iteratively approach the optimal patch, reducing patch size by over 20% on average and exceeding 50% in some instances even on already-optimized netlists.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Easy-Logic", "Learning", "I-Learning", "netlist"], "conviction": "high", "so_what": "Claiming further gains on already-optimized netlists is a differentiation angle; verify with customer benchmarks.", "quote": "patch size is reduced by over 20% on average, with some instances exceeding 50%", "locator": "Learning/I-Learning: Iteratively Approaching", "quote_verified": true}, {"claim": "Easy-Logic's Smart Caching engine uses a Store-Reuse-Iterate cycle that deep-learns circuit structure on the first run and reuses results on subsequent runs, reducing runtime by up to 80% or more in multi-iteration ECO scenarios without parameter changes.", "speaker": "Daniel Nenni", "type": "data_point", "entities": ["Easy-Logic", "Smart Caching", "runtime"], "conviction": "high", "so_what": "Since multiple ECO rounds are the norm, an 80% runtime cut in iterations is a meaningful schedule/cost benefit to benchmark.", "quote": "runtime is reduced by up to 80% or more in multi-iteration scenarios", "locator": "Smart Caching: Accelerating Multiple ECO Rounds", "quote_verified": true}]}], "insight_total": 5, "top_entities": ["Easy-Logic", "EasyAI ECO Suite", "Dr. Xing Wei", "Auto Partition", "Learning/I-Learning", "Smart Caching", "ECO", "DAC 2026"], "source_meta": {"author": "Daniel Nenni", "word_count": 619, "paywalled": false}}, {"record_id": "fcbd591177efc7a8", "source_type": "technology", "source_name": "SemiWiki", "source_url": "https://semiwiki.com/forum/threads/25477", "title": "How TSMC Will Surpass 2nm and Other Insights from New IMEC CEO", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T12:45:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "New IMEC CEO Patrick Vandenameele laid out four trends at ITF World: AI shifting to multi-agentic inference (a 150x compute increase), 'CMOS 2.0' vertical transistor stacking via wafer-to-wafer hybrid bonding (2nm-to-0.5nm plus stacking targeting a 10x performance gain over a decade), HBM/DRAM moving to the compute core, and silicon photonics replacing copper (100x interconnect efficiency), with TSMC's Kevin Zhang confirming FinFET-to-nanosheet-to-CFET scaling and a ~50x transistor-per-package increase.", "themes": [{"theme": "AI demand shift from training to multi-agentic inference", "insights": [{"claim": "IMEC CEO Patrick Vandenameele estimates that moving from AI training to multi-agentic inference will increase computing workloads 150-fold, as systems shift to dozens or hundreds of AI agents working together.", "speaker": "B", "type": "prediction", "entities": ["IMEC", "Patrick Vandenameele", "multi-agentic AI", "inference"], "conviction": "high", "so_what": "A 150x inference-compute estimate underpins the entire hardware-scaling thesis; a bullish anchor for accelerator, memory, and interconnect demand.", "quote": "Vandenameele estimates that moving from training to inference will increase computing workloads 150-fold.", "locator": "Trend One: Demand from AI is Surging", "quote_verified": true}, {"claim": "The shift to multi-agentic AI fundamentally changes hardware requirements: memory and logic chips must sit physically closer together, and simply packing in more GPUs is no longer the optimal solution.", "speaker": "B", "type": "thesis", "entities": ["multi-agentic AI", "memory", "logic", "GPUs"], "conviction": "high", "so_what": "Reinforces the shift from raw GPU count toward architecture and memory-logic proximity, favoring advanced packaging and 3D integration.", "quote": "Simply packing in more GPUs is no longer the optimal solution; engineers must design the right computing architecture.", "locator": "Trend One: Demand from AI is Surging", "quote_verified": true}]}, {"theme": "CMOS 2.0 and 3D transistor stacking", "insights": [{"claim": "IMEC's 'CMOS 2.0' is a next-generation scaling platform that vertically stacks transistors with different functions across multiple layers connected through wafer-to-wafer hybrid bonding, with each layer optimized for a different function, rather than only shrinking transistors.", "speaker": "B", "type": "framework", "entities": ["IMEC", "CMOS 2.0", "wafer-to-wafer hybrid bonding", "3D stacking"], "conviction": "high", "so_what": "Defines the post-planar scaling roadmap; hybrid bonding and 3D stacking become the value-capture layer, benefiting bonding-equipment and advanced-packaging players.", "quote": "it stacks transistors with different functions vertically across multiple layers, connected through wafer-to-wafer hybrid bonding, with each layer optimized for a different function", "locator": "Trend Two: Chip Scaling Enters the \"CMOS 2.0\" Era", "quote_verified": true}, {"claim": "IMEC's roadmap projects that shrinking chips from 2nm to 0.5nm combined with CMOS 2.0 stacking could deliver a tenfold performance improvement over the next decade, with even a two-layer stack delivering a significant energy-efficiency boost.", "speaker": "B", "type": "prediction", "entities": ["IMEC", "CMOS 2.0", "2nm", "0.5nm"], "conviction": "high", "so_what": "A concrete 10x/decade performance roadmap and named node path (2nm to 0.5nm) for tracking scaling progress and capex direction.", "quote": "shrinking chips from 2nm to 0.5nm combined with CMOS 2.0 stacking gains could deliver a tenfold performance improvement over the next decade", "locator": "IMEC's latest results show", "quote_verified": true}, {"claim": "TSMC Co-COO Kevin Zhang confirmed transistor architecture is moving from FinFET to nanosheet with CFET as the next step, and that transistor scaling plus higher density plus 3D stacking could increase transistors per package nearly 50-fold in coming years.", "speaker": "B", "type": "data_point", "entities": ["TSMC", "Kevin Zhang", "FinFET", "nanosheet", "CFET"], "conviction": "high", "so_what": "TSMC endorsing the CFET/3D path with a ~50x transistor-per-package figure signals where its leading-edge roadmap and packaging investment are heading.", "quote": "the number of transistors within a single package could increase nearly 50-fold in coming years", "locator": "Zhang confirmed the direction", "quote_verified": true}, {"claim": "TSMC's Kevin Zhang acknowledged the biggest current obstacle to stacking logic chips is that EDA tools do not yet support the approach, stating the whole ecosystem has to evolve in tandem.", "speaker": "B", "type": "causal", "entities": ["TSMC", "Kevin Zhang", "EDA", "3D stacking"], "conviction": "high", "so_what": "An explicit EDA-tooling gap is a bottleneck and an opportunity for EDA vendors (Synopsys/Cadence/Siemens) building 3D-stacking support.", "quote": "the biggest current obstacle to stacking logic chips is that electronic design automation (EDA) tools don't yet support the approach", "locator": "Zhang confirmed the direction", "quote_verified": true}]}, {"theme": "Memory moving to the compute core", "insights": [{"claim": "Memory demand from agentic AI is growing explosively because each AI agent must continuously access and update its own status, and IMEC's architecture places high-bandwidth memory at the center of the compute module rather than at the chip edge.", "speaker": "B", "type": "causal", "entities": ["IMEC", "HBM", "agentic AI", "memory"], "conviction": "high", "so_what": "Memory-at-the-core reduces data-access energy and time, structurally raising HBM content and favoring near-memory-compute architectures.", "quote": "IMEC's new architecture instead places high-bandwidth memory (HBM) at the center of the compute module.", "locator": "Trend Three: Memory Is Moving Toward the Core", "quote_verified": true}, {"claim": "TSMC is working with DRAM partners to develop technology that stacks DRAM directly atop advanced logic chips, and Kevin Zhang cited Cerebras (which IPO'd this year) integrating more than 50 compute chips on a single wafer paired with large SRAM to accelerate inference as an early example of memory moving to the core.", "speaker": "B", "type": "data_point", "entities": ["TSMC", "DRAM", "Cerebras", "SRAM", "wafer-scale"], "conviction": "high", "so_what": "DRAM-on-logic stacking and the Cerebras wafer-scale example flag concrete near-memory-compute commercialization; watch DRAM makers partnering with TSMC.", "quote": "Cerebras worked with TSMC to integrate more than 50 compute chips on a single wafer, paired with large amounts of high-speed SRAM to accelerate inference", "locator": "Zhang also revealed", "quote_verified": true}]}, {"theme": "Silicon photonics replacing copper interconnect", "insights": [{"claim": "As the number of chips in a rack rises, copper cabling is hitting bandwidth and physical-space limits, with Vandenameele noting the cables are already too big to fit in the rack, and the solution is silicon photonics using light instead of electricity.", "speaker": "B", "type": "causal", "entities": ["copper interconnect", "silicon photonics", "rack", "IMEC"], "conviction": "high", "so_what": "A physical-limit driver for optical interconnect adoption; copper's space/bandwidth ceiling is the catalyst for silicon-photonics/CPO demand.", "quote": "The cables are already too big to fit in the rack.", "locator": "Trend Four: Photonic Links Will Replace Copper", "quote_verified": true}, {"claim": "IMEC's roadmap aims to push optical connections from between racks to within racks and eventually to an 'optical highway' inside the interposer itself, a goal requiring more than 100-fold improvement in interconnect efficiency via coordinated breakthroughs in materials science, device design, and 3D integration.", "speaker": "B", "type": "prediction", "entities": ["IMEC", "silicon photonics", "interposer", "optical interconnect"], "conviction": "high", "so_what": "Optics-in-the-interposer is the long-run endgame for CPO; the 100x efficiency target sets the bar and the materials/3D dependencies to monitor.", "quote": "eventually achieving what is called an \"optical highway\" inside the interposer itself", "locator": "Trend Four: Photonic Links Will Replace Copper", "quote_verified": true}]}, {"theme": "IMEC's roadmap-setting role and industry convergence", "insights": [{"claim": "IMEC does not make chips but defines the roadmap the global semiconductor industry follows, with TSMC, Samsung, Intel, and ASML as long-time partners and a technology roadmap already extending into the early 2040s.", "speaker": "B", "type": "framework", "entities": ["IMEC", "TSMC", "Samsung", "Intel", "ASML"], "conviction": "high", "so_what": "IMEC's roadmap functions as an industry leading indicator; its trend calls foreshadow where foundry and equipment capex will concentrate.", "quote": "doesn't make chips—but it defines the roadmap the global semiconductor industry follows", "locator": "Interuniversity Microelectronics Centre", "quote_verified": true}, {"claim": "TSMC Co-COO Kevin Zhang credited IMEC's pioneering research in new materials and new transistor architectures as a guiding beacon the industry follows toward mass production.", "speaker": "B", "type": "anecdote", "entities": ["TSMC", "Kevin Zhang", "IMEC"], "conviction": "medium", "so_what": "TSMC's public deference to IMEC underscores the institute's outsized influence on the leading-edge roadmap.", "quote": null, "locator": "TSMC Co-COO", "quote_verified": false}]}], "insight_total": 12, "top_entities": ["IMEC", "Patrick Vandenameele", "TSMC", "Kevin Zhang", "CMOS 2.0", "CFET", "HBM", "silicon photonics", "ASML", "Cerebras", "nanosheet", "hybrid bonding"], "source_meta": {"author": "B", "word_count": 829, "paywalled": false}}, {"record_id": "241c1d8640ea6574", "source_type": "technology", "source_name": "ServeTheHome", "source_url": "https://www.servethehome.com/ibm-expands-z17-and-linuxone-5-mainframe-lineups-with-single-frame-and-rackmount-servers/", "title": "IBM Expands z17 and LinuxONE 5 Mainframe Lineups With Single Frame and Rackmount Servers", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-09T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "IBM is extending its record-selling z17/Telum II mainframe generation downmarket with single-frame, rackmount, and a fixed-price $165,000 LinuxONE Express box, using AI acceleration and on-premise AI positioning to onboard new customers, with LinuxONE now driving the majority of IBM's mainframe revenue growth.", "themes": [{"theme": "Mainframe demand resurgence", "insights": [{"claim": "IBM recorded its best year for mainframe sales in two decades in 2025, driven by a demand surge tied to the new z17 series and Telum II processor.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "z17", "Telum II"], "conviction": "high", "so_what": "Mainframes remain a durable, growing profit engine for IBM despite the narrative that agentic AI and Arm servers are displacing legacy iron.", "quote": "IBM just had its best year in the last two decades for mainframe sales", "locator": "In this age of agentic AI and Arm servers", "quote_verified": true}, {"claim": "In their first three quarters on the market, IBM z17 and LinuxONE Emperor 5 mainframes outpaced z16 sales, which had themselves already outpaced z15 sales.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "z17", "LinuxONE Emperor 5", "z16", "z15"], "conviction": "high", "so_what": "Three consecutive accelerating mainframe generations signal a structural upcycle, not a one-off, supporting IBM systems-and-software revenue.", "quote": null, "locator": "Thanks in big part to Telum II and Spyre", "quote_verified": false}]}, {"theme": "Telum II and Spyre silicon", "insights": [{"claim": "IBM's Telum II is an 8-core chip built on Samsung's 5nm (5HPP) process at 600mm2 running 5.5GHz, prioritizing single-core performance and scaling out to clusters of up to 32 chips rather than core density.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "Telum II", "Samsung", "5HPP"], "conviction": "high", "so_what": "Samsung retains IBM as a leading-edge foundry customer for a large-die, high-clock design distinct from x86/Arm density plays.", "quote": "IBM built a chip that approaches the limits of Samsung's 5nm process node while still pulling off a 5.5GHz clockspeed", "locator": "At 600mm2, Telum II puts the", "quote_verified": true}, {"claim": "The z17 generation added a 24 TOPS on-CPU AI accelerator block for CPU-based inference plus a dedicated Spyre PCIe accelerator card that is essentially a larger version of that block.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "Spyre", "Telum II", "z17"], "conviction": "high", "so_what": "IBM is embedding inference directly in transactional mainframe workloads, defending its franchise against off-mainframe AI stacks.", "quote": null, "locator": "In a sign of the times", "quote_verified": false}]}, {"theme": "Downmarket product expansion", "insights": [{"claim": "IBM's new z17 ME2 single-frame system supports up to 82 cores across 16 Telum II processors and up to 18TB of memory, with spare rack units left for customer-installed non-IBM equipment.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "z17 ME2", "Telum II"], "conviction": "high", "so_what": "Opens the mainframe TAM to customers needing a single rack or less, a segment the initial multi-rack z17 could not serve.", "quote": null, "locator": "At the mid-scale level is the new z17 ME2", "quote_verified": false}, {"claim": "The z17 MER rackmount version is sold as individual server drawers for standard 19-inch racks, explicitly targeting colocation facilities where IBM's turnkey frames are inappropriate.", "speaker": "Ryan Smith", "type": "thesis", "entities": ["IBM", "z17 MER"], "conviction": "medium", "so_what": "Rackmount form factor lets IBM chase colo and hybrid-cloud deployments previously closed to mainframes.", "quote": null, "locator": "Meanwhile the rack mount version of the z17 family", "quote_verified": false}, {"claim": "The new single-frame z17 hardware delivers roughly a 10% increase in throughput per core, 20% more total core count, and 12% more memory capacity versus the z16-generation systems it replaces.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "z17", "z16 A02"], "conviction": "high", "so_what": "Generational uplift gives existing z16 customers a concrete refresh incentive.", "quote": "a 10% increase in throughput per core, a 20% increase in total core counts, and a 12% increase in memory capacity", "locator": "Ultimately, these new mainframes replace their z16-generation counterparts", "quote_verified": true}]}, {"theme": "LinuxONE growth engine and Express pricing", "insights": [{"claim": "IBM's LinuxONE business is already delivering the majority of IBM's mainframe revenue growth because it targets contemporary customers rather than the legacy-focused Z family, despite sharing hardware.", "speaker": "Ryan Smith", "type": "thesis", "entities": ["IBM", "LinuxONE", "Z"], "conviction": "high", "so_what": "LinuxONE, not classic Z, is the growth vector to watch for IBM Infrastructure segment upside.", "quote": "the LinuxONE side of the business is already delivering the majority of IBM's revenue growth", "locator": "Of all of the systems being announced today", "quote_verified": true}, {"claim": "The LinuxONE Express is an 18U turnkey rackmount box with a published fixed starting price of $165,000, breaking from IBM's per-customer Tailored Fit Pricing model to simplify customer onboarding.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "LinuxONE Express"], "conviction": "high", "so_what": "A transparent list price and eval-sized box is a deliberate funnel to convert new customers into larger LinuxONE deployments.", "quote": "The LinuxONE Express will also be unique among IBM mainframes because it will have a public and published starting price tag: $165,000", "locator": "The LinuxONE Express will also be unique", "quote_verified": true}, {"claim": "IBM is designing the LinuxONE Express as a low-cost on-ramp evaluation system so customers can later grow into larger LinuxONE offerings, which the author calls potentially the most significant of the announcements.", "speaker": "Ryan Smith", "type": "prediction", "entities": ["IBM", "LinuxONE Express"], "conviction": "medium", "so_what": "Land-and-expand strategy could widen the mainframe installed base and lengthen the current upcycle.", "quote": "the Express may very well prove to be the most significant", "locator": "Of all of the systems being announced today", "quote_verified": true}]}, {"theme": "On-premise AI and security positioning", "insights": [{"claim": "IBM is targeting the on-premise AI computing push because it overlaps heavily with the security-paranoid, heavily-regulated customers (finance, insurance, healthcare) that mainframes traditionally serve.", "speaker": "Ryan Smith", "type": "thesis", "entities": ["IBM", "z17"], "conviction": "medium", "so_what": "Data-sovereignty and on-prem AI demand is a tailwind that plays to the mainframe's compliance and reliability strengths.", "quote": "the company is taking a particular interest in the push for on-premise AI computing", "locator": "Based on IBM's pre-briefing", "quote_verified": true}, {"claim": "IBM emphasizes eight-nines reliability of under one second of downtime per year plus backward compatibility to the 60-year-old System/360 as core differentiators of the z17 platform.", "speaker": "Ryan Smith", "type": "framework", "entities": ["IBM", "z17", "System/360"], "conviction": "high", "so_what": "Extreme uptime and multi-decade compatibility remain the moat that keeps regulated customers locked to IBM iron.", "quote": "the eight-nines reliability of the systems (under 1 second of downtime per year)", "locator": "For IBM that means an emphasis on backwards compatibility", "quote_verified": true}]}, {"theme": "Availability", "insights": [{"claim": "All of IBM's new single-frame, rackmount, and LinuxONE Express mainframe systems reach general availability on August 12th, 2026.", "speaker": "Ryan Smith", "type": "data_point", "entities": ["IBM", "z17", "LinuxONE"], "conviction": "high", "so_what": "Near-term catalyst; revenue contribution from the expanded lineup begins in Q3 2026.", "quote": "The company says to expect general availability on August 12th", "locator": "Wrapping things up", "quote_verified": true}]}], "insight_total": 13, "top_entities": ["IBM", "z17", "LinuxONE", "Telum II", "Spyre", "LinuxONE Express", "Samsung", "z17 ME2", "LinuxONE Emperor 5", "z16"], "source_meta": {"author": "Ryan Smith", "word_count": 1732, "paywalled": false}}, {"record_id": "622867e68b700053", "source_type": "technology", "source_name": "ServeTheHome", "source_url": "https://www.servethehome.com/samsung-pm1763-pcie-gen6-enterprise-ssd-in-production/", "title": "Samsung PM1763 PCIe Gen6 Enterprise SSD in Production", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-09T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "Samsung has begun mass production of the PM1763, its first PCIe Gen6 enterprise SSD, hitting 28,400 MB/s reads with 9th-gen V-NAND and a 4nm controller, signaling that AI workloads are driving the PCIe Gen6 server transition alongside CPUs like NVIDIA Vera and AMD EPYC Venice.", "themes": [{"theme": "PCIe Gen6 transition", "insights": [{"claim": "The PCIe Gen6 server transition is beginning, gated by CPU support arriving with hyperscale CPUs, NVIDIA Vera, and the upcoming AMD EPYC Venice.", "speaker": "Cliff Robinson", "type": "thesis", "entities": ["PCIe Gen6", "NVIDIA Vera", "AMD EPYC Venice", "Samsung"], "conviction": "high", "so_what": "A platform inflection is underway; component vendors that ship Gen6-native parts early capture the AI server refresh cycle.", "quote": "We are just starting the transition to PCIe Gen6 systems with some hyper-scale CPUs, NVIDIA Vera, and soon AMD EPYC Venice launching with support.", "locator": "Samsung Electronics announced mass production", "quote_verified": true}, {"claim": "AI, not video or file workloads, is now the primary driver of PCIe Gen6 SSD adoption, benchmarked by the ability to transfer a 40GB large language model in about 1.4 seconds.", "speaker": "Cliff Robinson", "type": "causal", "entities": ["Samsung", "PM1763", "PCIe Gen6"], "conviction": "high", "so_what": "SSD demand is increasingly tied to AI model-loading latency, reframing enterprise storage as an accelerator-feeding component.", "quote": "AI is driving PCIe Gen6 SSD adoption", "locator": "Samsung claims this performance level", "quote_verified": true}]}, {"theme": "PM1763 performance and technology", "insights": [{"claim": "Samsung's PM1763 uses 9th-generation V-NAND and a newly developed 4nm controller to deliver up to 28,400 MB/s sequential reads and 21,900 MB/s writes in the 16TB configuration.", "speaker": "Cliff Robinson", "
