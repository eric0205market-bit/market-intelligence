function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(srcName) {
  activeSrc = srcName;
  activeCat = "all";
  activeUrg = "all";
  updateCatPills();
  updateUrgPills();
  renderCards();
}

function updateCatPills() {
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.cat === activeCat);
  });
}

function updateUrgPills() {
  document.querySelectorAll('.pill[data-urg]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.urg === activeUrg);
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = ITEMS.filter(function(item) {
    if (activeSrc && item.source.indexOf(activeSrc) === -1) return false;

    if (activeUrg !== "all" && item.urgency !== activeUrg) return false;
    return true;
  });

    var color = CAT_COLORS[item.cat] || "#666";

    var pill = document.createElement('span');
    pill.className = 'pill' + (pair[0] === 'all' ? ' active' : '');
    pill.dataset.urg = pair[0];
    var cnt = pair[0] === 'all' ? ITEMS.length : urgCounts[pair[0]];
    pill.textContent = pair[1] + ' (' + cnt + ')';
    pill.onclick = function() {
      activeUrg = pair[0];
      activeSrc = null;
      updateUrgPills();
      renderCards();
    };
    urgRow.appendChild(pill);
  });
}

function buildSessionReport() {
  var body = document.getElementById('sr-body');
  var html = '<p><strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</p>';
  html += '<p style="margin-top:8px"><strong>Emails in window:</strong> ' + META.emailsInWindow + ' | <strong>Read:</strong> ' + META.emailsRead + ' | <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<p style="margin-top:12px"><strong>Included Sources (' + META.includedSources.length + '):</strong></p><ul style="margin-top:6px;padding-left:16px;">';
  META.includedSources.forEach(function(s) {
    var srcName = s.name.split(' / ')[0];
    html += '<li style="margin-bottom:3px"><span class="src-link" onclick="filterBySrc(\'' + srcName + '\')">' + s.name + '</span> — ' + s.items + ' item(s)</li>';
  });
  html += '</ul>';
  html += '<p style="margin-top:12px"><strong>Skipped Sources (' + META.skippedSources.length + '):</strong></p><ul style="margin-top:6px;padding-left:16px;">';
  META.skippedSources.forEach(function(s) {
    html += '<li style="margin-bottom:3px"><strong>' + s.name + '</strong>: ' + s.reason + '</li>';
  });
  html += '</ul>';
  body.innerHTML = html;
}

function toggleReport() {
  document.getElementById('session-report').classList.toggle('open');
}

buildFilters();
renderCards();
buildSessionReport();
</script>
</body>
</html>
