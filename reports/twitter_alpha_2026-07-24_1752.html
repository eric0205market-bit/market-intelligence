<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_type": "TWITTER ALPHA INTELLIGENCE", "collected_at": "2026-07-24T17:20:58Z", "input_stats": {"total_tweets": 200, "unique_authors": 69, "tweets_with_images": 44, "after_noise_filter": 59}, "summary": "**Iran/Hormuz:** Brent trades above $100 but markets are calmer today — oil fell on Pakistan-driven mediation talk and reports that tankers are moving through the Strait again. **@JavierBlas** flags a WSJ report that Bahrain and Kuwait secretly struck targets inside Iran (first direct Arab retaliation), and separately notes an Iran-Oman FM call on shipping safety. **@RayDalio** calls it \"the final battle\" for Hormuz; **@elerianm** says confidence in an actual endpoint is still missing; **@BobEUnlimited** notes prediction markets are pricing a longer disruption than the oil curve implies.\n\n**Markets:** Nearly $1T wiped off US stocks in one session — Google -7% on AI-capex worries, Tesla -14% (worst day in 18 months), while Intel jumped 11% on an AI-driven beat. **@jimcramer** ran a live tape on the Intel/AMD rotation (\"there is room for others\"); **@spotgamma** sees the March oil/rates/stocks negative-correlation regime (semis-long + energy barbell) reasserting itself into next week's FOMC.\n\n**AI:** Jensen Huang's first-ever tweet — a NVIDIA-signed letter arguing open-weight models are US strategic infrastructure — drew reactions across the timeline, including a rare **@sama** reply (\"glad to see this\"). **@cryptopunk7213** gives the most substantive read: banning open source creates single points of failure for closed US labs, and it's good business for NVIDIA (more models = more GPU demand).\n\n**Crypto:** **@DefiIgnas** lays out five ways to still make money this cycle (revenue tokens, narrative, yield, institutional adoption, airdrops) with specific tickers. BitMEX is shutting down rather than selling — **@hasufl** traces it back to a poorly-structured insurance fund he warned about in 2018. CLARITY Act odds swung on a Polymarket dump after Thune signaled no pre-recess vote, even as police unions and industry groups push for a floor vote.\n\n**Notable:** **@stacy_muur** contributed data to a report finding zero dollars of the $12.4B attributable tokenized-RWA flow came from pensions, asset managers or banks — this remains a crypto-native trade despite the institutional-adoption narrative.", "sections": {"A_events": [{"cluster": "Iran War / Strait of Hormuz — Oil Retreats, Diplomacy Signals", "category": ["geopolitics", "energy", "macro"], "items": [{"author": "JavierBlas", "summary": "Per the WSJ, Bahrain and Kuwait secretly sent jets to strike targets inside Iran in recent days — their first direct retaliation against Tehran, and a sign of the difficult position Arab states are in as the war grinds on.", "tweet_url": "https://x.com/JavierBlas/status/2080696301075710321", "images": [], "type": "tweet"}, {"author": "JavierBlas", "summary": "Signs of diplomacy: Iranian and Omani foreign ministers held a call on the security situation for maritime navigation and commercial shipping through the Strait of Hormuz.", "tweet_url": "https://x.com/JavierBlas/status/2080692901433008159", "images": [], "type": "tweet"}, {"author": "elerianm", "summary": "Better day for markets broadly as oil falls on Pakistan-driven mediation and signs some tankers are getting through the two chokepoints — but confidence in an actual endpoint to the US-Iran conflict is still missing (CNBC chart attached).", "tweet_url": "https://x.com/elerianm/status/2080688973492494752", "images": ["https://pbs.twimg.com/media/HOAXl8pXwAA_wZB.jpg"], "type": "tweet"}, {"author": "RayDalio", "summary": "Calls the current moment \"the final battle\" for the Strait of Hormuz, referencing the piece he shared back in March when the war started laying out what he thought would happen.", "tweet_url": "https://x.com/RayDalio/status/2080637989621768543", "images": [], "type": "tweet"}, {"author": "BobEUnlimited", "summary": "Political betting markets are pricing Iran-war supply disruption continuing for a while, while the oil futures curve prices a relatively swift resolution — a real divergence worth watching (\"It Takes Two To TACO, Or Is It Three?\").", "tweet_url": "https://x.com/BobEUnlimited/status/2080603504368832623", "images": ["https://pbs.twimg.com/media/HN_JyDMW0AALtK7.png"], "type": "tweet"}, {"author": "AndreasSteno", "summary": "Contrarian pushback on the oil-driven inflation panic: after \"thousands of research reports\" everyone concludes rising oil means inflation is out of control — he calls that conclusion \"unbelievably stupid.\" Separately notes some commentators seem to want the war to continue just so their bearish calls are proven right.", "tweet_url": "https://x.com/AndreasSteno/status/2080536485049110613", "images": [], "type": "tweet"}, {"author": "BillAckman", "summary": "Shares a Senate floor speech (Sen. Tim Sheehy) on why the US is at war with Iran, calling it one of the most important speeches of the year — part of a broader thread of Ackman posts on the conflict and its domestic political fallout.", "tweet_url": "https://x.com/BillAckman/status/2080635066959491088", "images": [], "type": "tweet"}, {"author": "rektmando", "summary": "Daily digest flags: Brent above $100 as the Gulf conflict rages, US strikes Iran for a 13th consecutive night, Trump vows punishment for Houthi tanker strikes, and the House voted 214-208 to try to halt the Iran war.", "tweet_url": "https://x.com/rektmando/status/2080616294102216858", "images": ["https://pbs.twimg.com/media/HN_VKc0awAAP2Kq.jpg"], "type": "tweet"}]}, {"cluster": "Jensen Huang's First-Ever X Post — NVIDIA's Open-Weights Letter", "category": ["AI", "tech"], "items": [{"author": "aleabitoreddit", "summary": "Flags that Jensen Huang joined X for the first time specifically to share a NVIDIA-signed letter arguing open models matter for safety, innovation diffusion and sovereignty.", "tweet_url": "https://x.com/aleabitoreddit/status/2080689966045348047", "images": [], "type": "tweet"}, {"author": "cryptopunk7213", "summary": "The most substantive take: banning open-source models would make closed US labs a single point of failure; distillation isn't illegal (unlawful extraction is the actual problem); and NVIDIA benefits commercially since more models in the wild means more GPU demand. Notes NVIDIA's own Nemotron model topped benchmarks this week.", "tweet_url": "https://x.com/cryptopunk7213/status/2080667276139692243", "images": ["https://pbs.twimg.com/media/HOAD3FsWoAAh6Ee.jpg"], "type": "tweet"}, {"author": "sama", "summary": "Sam Altman replied approvingly: \"i want the US to win in AI both in open source and proprietary models, and i am glad to see this\" — a notable public nod from a closed-model lab CEO.", "tweet_url": "https://x.com/sama/status/2080683363174945065", "images": [], "type": "tweet"}, {"author": "EMostaque", "summary": "\"Models based on our collective should be available to the collective. Intelligence for all!\" — Stability AI founder pushing the open-access framing further than NVIDIA's letter does.", "tweet_url": "https://x.com/EMostaque/status/2080701992192626688", "images": [], "type": "tweet"}, {"author": "nic_carter", "summary": "Reads the letter as a blow against AI-safety-driven regulatory capture.", "tweet_url": "https://x.com/nic_carter/status/2080680768469082148", "images": [], "type": "tweet"}, {"author": "0xSammy / hooeem / Geiger_Capital / sjdedic / fejau_inc / stevehou / zeroxkyle", "summary": "Broad wave of quick reactions — mostly celebratory (\"welcome to the trenches,\" \"cult mode activated\"), with 0xSammy separately arguing it's bullish for crypto-AI infrastructure and stevehou wondering if AMD's Lisa Su comment (\"there is room for others\") was a subtweet threat.", "tweet_url": "https://x.com/0xSammy/status/2080660494935806000", "images": [], "type": "tweet"}]}, {"cluster": "CLARITY Act — Police Endorsement, Polymarket Odds Swing, Push for a Vote", "category": ["regulation", "crypto"], "items": [{"author": "DefiIgnas", "summary": "The Fraternal Order of Police (largest US law-enforcement union) endorsed the CLARITY Act, yet Polymarket's odds of passage dumped 11 points to 30% the same day after Senate Majority Leader Thune signaled no pre-recess vote — flags the disconnect and asks whether the market is inefficient or the endorsement is simply irrelevant to the real blocker (scheduling).", "tweet_url": "https://x.com/DefiIgnas/status/2080679368733659561", "images": ["https://pbs.twimg.com/media/HOAO3CxbIAAhUeg.jpg"], "type": "thread"}, {"author": "brian_armstrong", "summary": "Notes law enforcement now recognizes CLARITY strengthens their own investigative tools (roughly 70 pages of the bill address this) — calls it \"one more objection overturned.\"", "tweet_url": "https://x.com/brian_armstrong/status/2080693387070771639", "images": [], "type": "tweet"}, {"author": "jchervinsky", "summary": "Argues there are no serious substantive objections left to CLARITY — it's a compromise product as good as it will get — and calls for a floor vote to put every self-described pro-crypto senator on the record.", "tweet_url": "https://x.com/jchervinsky/status/2080650498303054108", "images": [], "type": "tweet"}]}, {"cluster": "Tech/Semis Selloff — Nearly $1T Wiped Off US Stocks", "category": ["macro", "tech", "positioning"], "items": [{"author": "rektmando", "summary": "Daily digest: NASDAQ -2%, roughly $1T wiped off US equities in one session, Google -7% on AI-spending worries, Tesla -14% (worst day in 18 months), Intel +11% on an AI-driven earnings beat.", "tweet_url": "https://x.com/rektmando/status/2080616294102216858", "images": ["https://pbs.twimg.com/media/HN_VKc0awAAP2Kq.jpg"], "type": "tweet"}, {"author": "jimcramer", "summary": "Running live commentary through the session: bearish Intel analysts \"doubling down\" on negativity even as fear of an Intel equity offering fades (they have willing foundry-output funders); \"the market only has eyes for AMD right now\" after its Advancing AI event with Lisa Su, \"but there is room for others\"; later flags a rotation into non-semi tech (WDAY, CRM, NOW, JNJ) as a software-day counter-trend.", "tweet_url": "https://x.com/jimcramer/status/2080643521967521950", "images": [], "type": "thread"}, {"author": "spotgamma", "summary": "The March regime — all assets negatively correlated with oil (oil up = rates up = stocks down) that gave rise to the semis-long + energy-barbell trade — looks to be reasserting itself in vol pricing just as FOMC approaches next week.", "tweet_url": "https://x.com/spotgamma/status/2080627238257471568", "images": ["https://pbs.twimg.com/media/HN_fMkPXkAADhv-.jpg"], "type": "thread"}, {"author": "Tyler_Neville_", "summary": "Predicts the next narrative shift: hyperscalers issuing more equity to fund AI buildout as fixed-income investors demand higher yield for the debt, which would end the 15-year buyback-and-ad-arbitrage valuation machine.", "tweet_url": "https://x.com/Tyler_Neville_/status/2080695744877449249", "images": ["https://pbs.twimg.com/media/HOAdwOvXgAA7WvI.jpg"], "type": "tweet"}, {"author": "pboockvar", "summary": "Shares a Bloomberg chart (via @5thrule) on the growing lease obligations of the big-five hyperscalers — direct data point for the AI-capex-financing debate.", "tweet_url": "https://x.com/pboockvar/status/2080659270324965765", "images": ["https://pbs.twimg.com/media/HN_8hL1XcAAiTOf.png"], "type": "tweet"}, {"author": "stevehou", "summary": "Reads Cramer's AMD \"room for others\" line as an implicit threat to Intel/rival chip bulls.", "tweet_url": "https://x.com/stevehou/status/2080696063183196507", "images": [], "type": "tweet"}]}, {"cluster": "BitMEX Shuts Down Rather Than Sell", "category": ["crypto", "regulation"], "items": [{"author": "hasufl", "summary": "Traces BitMEX's shutdown (effective Sept 23) back to a poorly structured insurance fund he first warned about in a 2018 post: unse // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- schema normalization ----------
// Some producer runs emit the "sections" schema documented in the routine
// spec (report_type/input_stats/sections.A_events.../coverage) instead of
// the flat schema this renderer reads (date/events/insights/contrarian/
// positioning/links/stats). Normalize so either shape renders correctly.
function firstOf(v) {
  return Array.isArray(v) ? v[0] : v;
}

function normalizeItem(it) {
  if (!it || typeof it !== 'object') return it;
  return {
    author: it.author || it.author_username,
    text: it.text != null ? it.text : it.summary,
    category: firstOf(it.category),
    tweet_url: firstOf(it.tweet_url),
    images: it.images,
    created_at: it.created_at,
    is_thread: it.is_thread != null ? it.is_thread : (it.type === 'thread'),
  };
}

function normalizeData(d) {
  if (!d || typeof d !== 'object') return {};
  const hasFlat = d.events || d.insights || d.contrarian || d.positioning || d.links || d.stats;
  if (hasFlat) return d;

  const s = d.sections;
  if (!s) return d;

  const out = Object.assign({}, d);
  out.date = d.date || (d.collected_at ? String(d.collected_at).replace('T', ' ').replace('Z', ' UTC') : '');
  if (s.A_events) {
    out.events = s.A_events.map(cl => ({
      title: cl.cluster || cl.title,
      category: firstOf(cl.category),
      description: cl.description,
      items: (cl.items || []).map(normalizeItem),
    }));
  }
  if (s.B_insights) out.insights = s.B_insights.map(normalizeItem);
  if (s.C_contrarian) out.contrarian = s.C_contrarian.map(normalizeItem);
  if (s.D_positioning) out.positioning = s.D_positioning.map(normalizeItem);
  if (s.E_links) {
    out.links = s.E_links.map(l => ({
      author: l.author,
      url: l.url,
      tweet_url: firstOf(l.tweet_url),
      description: l.note || l.description,
    }));
  }
  const stats = d.stats || {};
  out.stats = {
    received: stats.received != null ? stats.received : (d.input_stats && d.input_stats.total_tweets),
    after_filter: stats.after_filter != null ? stats.after_filter : (d.input_stats && d.input_stats.after_noise_filter),
    authors: stats.authors != null ? stats.authors : (d.coverage && d.coverage.authors_total),
    coverage: stats.coverage != null ? stats.coverage : (d.coverage && d.coverage.coverage_pct),
  };
  return out;
}

// ---------- main ----------
function renderReport(d) {
  d = normalizeData(d);
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
