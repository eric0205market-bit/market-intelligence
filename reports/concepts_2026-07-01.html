easury futures"], "conviction": "high", "so_what": "The CTD volume premium is largest in the 5-year sector, suggesting basis traders and hedgers concentrate the most futures-related activity there — a quantifiable liquidity bonus worth pricing into relative-value trades that reference CTD bonds.", "quote": null, "locator": "we show that being the cheapest to deliver is associated with", "quote_verified": false}, {"claim": "The CTD exception demonstrates that off-the-run illiquidity is not purely a function of a bond's age; rather it reflects changes in investor use cases, the trading venues bonds rely on, and the degree of natural two-way flow — meaning structural demand (like futures delivery) can preserve liquidity despite seasoning.", "speaker": "Elena Botogoeva", "type": "framework", "entities": ["cheapest-to-deliver (CTD) securities", "off-the-run securities", "Treasury futures"], "conviction": "high", "so_what": "This reframes the liquidity-decay narrative: the driver isn't calendar age per se but loss of a functional role in the market, so any policy or product change that gives a security a persistent use case (e.g., new futures baskets, repo specialness) could keep it liquid despite being off-the-run.", "quote": "They become less liquid because the uses investors have for them change, the trading venue they rely on changes, and/or the degree of natural two-way trading flow changes.", "locator": "This exception matters because it shows that off-the-run securities", "quote_verified": true}]}], "insight_total": 13, "top_entities": ["U.S. Treasury market", "on-the-run securities", "off-the-run securities", "2-year Treasury note", "5-year Treasury note", "10-year Treasury note", "cheapest-to-deliver (CTD) securities", "Treasury futures", "dealer-to-customer trading", "effective bid-ask spread", "March 2020 Treasury market stress", "FINRA TRACE"], "source_meta": {"author": "Elena Botogoeva", "word_count": 2216, "paywalled": false}}, {"record_id": "0368821d3ced48c7", "source_type": "concepts", "source_name": "Oxford Economics", "source_url": "https://www.oxfordeconomics.com/resource/oxford-economics-launches-askoe-executive-lens/", "title": "Oxford Economics launches AskOE Executive Lens", "published_date": "2026-06-30", "language": "en", "processed_at": "2026-07-01T09:24:10Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Macro"], "gist": "Oxford Economics launched a beta conversational AI tool, AskOEAI Executive Lens, that personalizes its proprietary economic research by user role, sector and geography, positioning it as a premium alternative to general-purpose AI tools reliant on the firm's four-decade research moat.", "themes": [{"theme": "Research firms productizing proprietary data via AI", "insights": [{"claim": "Oxford Economics is betting that its defensible moat against general-purpose AI (ChatGPT-style tools) is proprietary, exclusive data and forecasts rather than the AI layer itself, since Executive Lens draws exclusively on Oxford Economics' own analysis and forecasts rather than external or public data.", "speaker": "Sally Li", "type": "thesis", "entities": ["Oxford Economics", "AskOEAI", "Executive Lens"], "conviction": "high", "so_what": "Watch for other research/advisory incumbents (e.g., Gartner, IHS Markit/S&P Global, Moody's Analytics) racing to wrap proprietary datasets in personalized AI agents to defend subscription revenue against generic LLM substitution.", "quote": "Unlike general-purpose AI tools, Executive Lens is purpose-built by Oxford Economics’ economists and technology team and draws exclusively on Oxford Economics’ proprietary analysis and forecasts.", "locator": "Unlike general-purpose AI tools, Executive Lens is purpose-built", "quote_verified": true}, {"claim": "Oxford Economics frames its AI strategy explicitly as augmenting rather than replacing human expert judgment, per CEO Innes McFee's statement that 'AI should make trusted expertise easier to access, not replace it.'", "sp ortages are more severe than headcount-based labour market indicators suggest, because average working hours are declining fast enough to offset gains in the labour force population.", "speaker": "Keith Mason", "type": "thesis", "entities": ["Japan", "labour market"], "conviction": "high", "so_what": "Investors and policymakers reading Japanese employment/participation statistics at face value are likely underestimating the true tightness of the labour market and the drag on effective output.", "quote": "As a result, labour shortages are becoming more severe than implied by labour market indicators based on headcounts.", "locator": "Japan's average working hours have been declining quickly", "quote_verified": true}, {"claim": "The decline in Japan's average working hours is also hindering household income gains and weighing on consumption.", "speaker": "Keith Mason", "type": "causal", "entities": ["Japan", "household income", "consumption"], "conviction": "high", "so_what": "Suggests a structural (not cyclical) headwind to Japanese consumer spending growth, relevant for domestic-demand-exposed equities and BoJ policy calculus.", "quote": null, "locator": "Japan's average working hours have been declining quickly", "quote_verified": false}]}, {"theme": "Drivers of the decline: composition shift plus policy-induced hour limits", "insights": [{"claim": "The decline in Japan's average working hours has accelerated since the late 2010s as labour participation improved, because the participation gains came mainly from part-time workers, particularly women and the elderly, who work fewer hours on average.", "speaker": "Keith Mason", "type": "causal", "entities": ["Japan", "part-time workers", "women", "elderly workers"], "conviction": "high", "so_what": "Rising headline labour force participation in Japan is a misleading positive indicator if the composition is shifting toward lower-hour part-time roles; watch hours-based metrics, not just participation rates.", "quote": " cating the reserve of easily activated additional workers is nearly exhausted.", "speaker": "Keith Mason", "type": "data_point", "entities": ["Japan", "labour pool"], "conviction": "high", "so_what": "This is a concrete, quantifiable sign that the domestic participation lever is running dry, making future labour supply increasingly dependent on immigration policy or productivity gains rather than mobilizing idle domestic workers.", "quote": "the size of the potential labour pool – the non-labour force population who wish to work – has halved over the past decade", "locator": "Indeed, the size of the potential labour pool", "quote_verified": true}, {"claim": "Oxford Economics believes the recent sharp increase in foreign workers in Japan will prove unsustainable, because the surge is causing public tensions and prompting the government to tighten visa regulations.", "speaker": "Keith Mason", "type": "causal", "entities": ["Japan", "foreign workers", "immigration policy"], "conviction": "medium", "so_what": "A contrarian, against-consensus signal: rather than assuming immigration will keep expanding to plug Japan's labour gap, investors should watch for tightening visa policy that could choke off this supply channel and worsen labour shortages in sectors reliant on foreign labour (construction, caregiving, hospitality, manufacturing).", "quote": "The surge in foreign workers is causing public tensions, and the government is moving to tighten visa regulations.", "locator": "We also believe that the recent sharp increase in foreign workers", "quote_verified": true}, {"claim": "Even if Japan successfully boosts elderly labour participation or sustains rapid foreign worker growth, these measures could only moderate -- not reverse -- the pace of labour force shrinkage, and both come with unspecified costs.", "speaker": "Keith Mason", "type": "prediction", "entities": ["Japan", "elderly workers", "foreign workers"], "conviction": "high", "so_what": "Treat Japan's labour force decline as a base-case structural trend rather than a risk that policy can fully avert; this supports theses around automation/robotics adoption, wage inflation in labour-scarce sectors, and long-term potential growth downgrades for Japan.", "quote": "Still, we think a decline is inevitable, while these measures will come with costs.", "locator": "If the government successfully encourages further participation", "quote_verified": true}]}], "insight_total": 5, "top_entities": ["Japan", "labour force", "working-age population", "foreign workers", "visa regulations", "Bank of Japan"], "source_meta": {"author": "Keith Mason", "word_count": 378, "paywalled": false}}, {"record_id": "a5e60a16e4899080", "source_type": "concepts", "source_name": "Peterson Institute (PIIE)", "source_url": "https://www.piie.com/blogs/realtime-economics/2026/why-us-china-trade-war-lacks-guardrails-past", "title": "Why the US-China trade war lacks the guardrails of the past", "published_date": "2026-06-29", "language": "en", "processed_at": "2026-07-01T09:24:10Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics", "Positioning"], "gist": "Cullen Hendrix argues the US-China trade war is structurally more dangerous than past trade wars (Pasta War, US-Japan) because the two sides are security rivals rather than allies, the fight is over intermediate inputs (rare earths, semiconductors) rather than finished goods, and both Trump and Xi treat the conflict as a test of personal legacy rather than an economic policy dispute.", "themes": [{"theme": "Rhetoric vs. reality on US-China de-escalation", "insights": [{"claim": "Despite Pete Hegseth's shift from warning of a Chinese Taiwan invasion (May 2025) to declaring US-China relations 'better than they've been in many years' after a Trump-Xi summit, the underlying structural risk of escalation has not actually diminished.", "speaker": "Cullen S. Hendrix", "type": "contrarian", "entities": ["Pete Hegseth", "China", "United States", "Taiwan", "Donald Trump", "Xi Jinping"], "conviction": "high", "so_what": "Investors should discount softer official rhetoric on US-China relations as a signal of reduced tail risk; the diplomatic tone has changed but the structural drivers of conflict have not.", "quote": "US-China relations were \"better than they've been in many years,\"", "locator": "US Secretary of Defense Pete Hegseth said in a May 2025 speech", "quote_verified": true}, {"claim": "The standard reassurances that trade wars rarely turn violent, that great powers have too much to lose, and that leaders act rationally, are either wrong or inapplicable to the current US-China standoff.", "speaker": "Cullen S. Hendrix", "type": "thesis", "entities": ["China", "United States"], "conviction": "high", "so_what": "Standard mean-reversion assumptions used to price geopolitical risk (that things settle down because they always have) may not apply this cycle, warranting a higher persistent risk premium on US-China exposed assets.", "quote": null, "locator": "The typical stylized facts that provide reassurance of eventual peaceful resolution", "quote_verified": false}]}, {"theme": "Why past trade wars stayed peaceful", "insights": [{"claim": "Historical post-WWII trade wars, including the 1985-86 Pasta War (US vs. EEC) and the US-Japan trade disputes of the 1980s-90s, never escalated to armed conflict because the combatants were military allies of the United States, which put a hard ceiling on the conflict.", "speaker": "Cullen S. Hendrix", "type": "framework", "entities": ["United States", "European Economic Community", "Japan"], "conviction": "high", "so_what": "The historical base rate of 'trade wars rarely turn violent' is built on alliance-constrained cases and should not be extrapolated to non-allied strategic rivals like the US and China.", "quote": null, "locator": "Many post-WWII trade wars have involved the United States and its security clients", "quote_verified": false}, {"claim": "US grand strategists tolerated import competition costs from Japan and Germany during the Cold War because having vibrant capitalist allies flanking the Soviet Union was judged more valuable than protecting domestic industry.", "speaker": "Cullen S. Hendrix", "type": "causal", "entities": ["United States", "Japan", "Germany", "Soviet Union"], "conviction": "medium", "so_what": "That strategic trade-off (tolerating economic pain for a security ally) has no analog with China, which is why the current conflict lacks the same self-limiting logic.", "quote": null, "locator": "US grand strategists assessed that the costs of import competition", "quote_verified": false}, {"claim": "Trade wars are structurally easier to start than to end because the political economy of protectionism favors small, well-organized interest groups over diffuse consumers, biasing both domestic politics and interstate dynamics toward escalation rather than de-escalation.", "speaker": "Cullen S. Hendrix", "type": "framework", "entities": [], "conviction": "high", "so_what": "Investors should expect tariff and export-control measures to ratchet upward over time rather than resolve quickly, since de-escalation requires overcoming embedded escalation incentives on both sides.", "quote": null, "locator": "Trade wars are easier to start than end.", "quote_verified": false}]}, {"theme": "Intermediate goods as the new battlefield", "insights": [{"claim": "Unlike pre-20th century trade wars that were fought over finished goods and market share, the modern global economy runs on trade in intermediate goods (like auto parts), which now exceeds trade in finished goods, meaning modern trade wars can cripple an economy's ability to produce anything at all rather than just shifting market share.", "speaker": "Cullen S. Hendrix", "type": "framework", "entities": [], "conviction": "high", "so_what": "Supply-chain chokepoints in intermediate inputs are now the primary geopolitical weapon; investors should map portfolio exposure to single-source intermediate inputs (rare earths, specialty chemicals, advanced chips) rather than just finished-goods tariff exposure.", "quote": null, "locator": "Pre-WWII trade wars were different in character.", "quote_verified": false}, {"claim": "China controls nearly 80 percent of the world's neodymium magnet production, a critical input spanning electric vehicles to guitar speakers, and its April 2025 export controls on rare earths and magnets targeted foreign manufacturers' ability to make finished goods at all, not just their competitiveness.", "speaker": "Cullen S. Hendrix", "type": "data_point", "entities": ["China", "neodymium", "rare earths", "electric vehicles"], "conviction": "high", "so_what": "Rare-earth and magnet supply chains remain a high-conviction chokepoint trade: expect continued Western reshoring/diversification investment (e.g., MP Materials-type plays) and periodic EV/auto production disruption risk tied to Chinese export licensing decisions.", "quote": "China produces nearly 80 percent of the world's neodymium magnets, a key input in everything from electric vehicles to guitar speakers.", "locator": "Recent flashpoints over critical minerals and neodymium magnets", "quote_verified": true}, {"claim": "The rare-earth export control mechanism illustrates a cascading supply-chain logic: no neodymium leads to no magnets, no magnets leads to no motors, no motors leads to no electric vehicles, meaning the collateral damage of these controls reaches far beyond the intended target industry, hitting unrelated businesses like school music programs that can no longer afford student violins.", "speaker": "Cullen S. Hendrix", "type": "causal", "entities": ["neodymium", "electric vehicles"], "conviction": "high", "so_what": "Second-order and third-order effects of critical mineral export controls will surface in unexpected sectors; investors should stress-test supply chains for indirect exposure to Chinese rare-earth choke points, not just direct EV/battery names.", "quote": "No neodymium, no magnets; no magnets, no motors; no motors, no electric vehicles.", "locator": "When China imposed export controls on rare earth materials", "quote_verified": true}, {"claim": "The author frames the shift from old-style trade wars to the current conflict as a shift from legible, symmetric 17th-century-style battles to medieval siege warfare, emphasizing the asymmetric, chokepoint-based nature of modern economic conflict.", "speaker": "Cullen S. Hendrix", "type": "framework", "entities": [], "conviction": "medium", "so_what": "Expect asymmetric, targeted chokepoint escalation (export bans on specific critical inputs) rather than broad symmetric tariff exchanges as the primary tool of future US-China economic conflict.", "quote": "If old trade wars were 17th century–style battles—legible, fought by symmetrically armed and organized forces, the US-China trade war is more like medieval siege warfare.", "locator": "A pre-WWII trade war could not have been waged this way", "quote_verified": true}]}, {"theme": "US-China as security rivals, not allies", "insights": [{"claim": "The US-China trade war is historically unique because it involves security rivals rather than a patron and client, and the underlying competition is over strategic inputs determining future capability in AI and semiconductors, not just current finished-goods market share.", "speaker": "Cullen S. Hendrix", "type": "thesis", "entities": ["China", "United States", "artificial intelligence", "semiconductors"], "conviction": "high", "so_what": "AI and semiconductor supply chains are the central strategic battleground of this conflict, implying sustained, bipartisan US policy support for chip export controls and domestic AI/semiconductor investment regardless of near-term diplomatic tone.", "quote": null, "locator": "In contrast, the US-China trade war is historically unique", "quote_verified": false}, {"claim": "The pre-WWI Germany-UK trade war and arms race is the closest historical precedent to the current US-China dynamic, but even that analogy is imperfect since Germany and the UK continued substantial bilateral trade in finished and intermediate goods even while competing for spheres of influence in third markets, and their rivalry did not directly cause WWI's triggering assassination.", "speaker": "Cullen S. Hendrix", "type": "framework", "entities": ["Germany", "United Kingdom"], "conviction": "medium", "so_what": "Historical analogies to WWI-era great power trade rivalry should be used cautiously as a risk framework; they suggest elevated tension but not a deterministic path to war.", "quote": null, "locator": "The closest historical precedent might be the trade war and arms race", "quote_verified": false}, {"claim": "The US-China trading relationship remains the third-largest bilateral trade relationship in the world, and mutually-assured destruction plus continued economic interdependence still act as brakes on escalation to armed conflict.", "speaker": "Cullen S. Hendrix", "type": "data_point", "entities": ["China", "United States"], "conviction": "medium", "so_what": "Despite elevated structural risk, base-rate odds of near-term military conflict remain low given the sheer scale of continued bilateral trade dependency, a stabilizing factor investors shouldn't ignore.", "quote": "the US-China trading relationship is still the third-largest bilateral trade relationship in the world", "locator": "None of this means a US-China shooting war is very likely.", "quote_verified": true}]}, {"theme": "Leadership psychology as an escalation driver", "insights": [{"claim": "Donald Trump and Xi Jinping are both unusually driven by personal legacy and historic destiny, viewing the trade war primarily as a test of will rather than an economic policy instrument, which means being seen to lose may feel more costly to each leader than the mounting economic damage itself.", "speaker": "Cullen S. Hendrix", "type": "thesis", "entities": ["Donald Trump", "Xi Jinping"], "conviction": "high", "so_what": "Because both leaders' political incentives reward not backing down, investors should expect prolonged tariff/export-control conflict even when it is economically costly to both sides, and should be skeptical of quick resolution driven by pure economic rationality.", "quote": "For both men, the trade war is not primarily an economic policy instrument. It is a test of will, and being seen to lose that test may feel more costly than any economic damage.", "locator": "Very few people rise to positions like president", "quote_verified": true}, {"claim": "The absence of a shared security umbrella, credible diplomatic off-ramps or third-party mediators, and mutual recognition that the relationship is worth preserving means the historical mechanisms that resolved past trade wars peacefully are largely absent or severely weakened in the US-China case.", "speaker": "Cullen S. Hendrix", "type": "framework", "entities": ["China", "United States"], "conviction": "high", "so_what": "Do not expect a neutral third-party mediated resolution mechanism to defuse US-China tensions; any de-escalation will likely have to come from direct leader-to-leader bargaining, making outcomes more binary and headline-driven.", "quote": null, "locator": "the US-China trade war is unusual in that the factors", "quote_verified": false}, {"claim": "The author explicitly states this analysis is not a general argument against economic openness or globalization, but is specific to the combination of deep economic integration with growing strategic rivalry between adversaries lacking guardrails.", "speaker": "Cullen S. Hendrix", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "This framework should be applied narrowly to US-China (and possibly other adversarial-but-integrated pairs) rather than used to justify broad-based economic nationalism or deglobalization theses across all trade relationships.", "quote": "These liers), without needing a full structural economic model.", "speaker": "Aayush Singh", "type": "framework", "entities": ["Federal Reserve", "SF Fed", "FOMC", "Regis Barnichon", "Aayush Singh"], "conviction": "high", "so_what": "This is a lightweight, model-agnostic tool investors and Fed-watchers could use to reverse-engineer what rate path a given FOMC member's stated economic views imply, improving the ability to forecast dissent and policy surprises.", "quote": "The PCT computes the federal funds rate path that will best achieve the dual mandate given two inputs.", "locator": "Recent research by Barnichon and Mesters (2023) introduced a new methodology", "quote_verified": true}, {"claim": "The PCT works by comparing a baseline (status-quo) macro forecast against alternative policy-scenario forecasts generated using estimated policy multipliers, letting a policymaker search across counterfactual rate paths for the one that best matches their preferred inflation/employment tradeoff.", "speaker": "Aayush Singh", "type": "framework", "entities": ["Federal Reserve", "SF Fed"], "conviction": "high", "so_what": "Analysts can use this same counterfactual logic to stress-test how the Fed might respond to any given shock (tariffs, energy prices, financial stress) once they estimate the multipliers and the shock's demand/supply split.", "quote": null, "locator": "Barnichon and Mesters (2023) propose an approach that does not require", "quote_verified": false}, {"claim": "Monetary policy inherently forces a tradeoff between price stability and maximum employment, because the Fed generally cannot fully counter an adverse supply shock's inflationary effect without imposing some cost on employment.", "speaker": "Aayush Singh", "type": "thesis", "entities": ["Federal Reserve", "FOMC"], "conviction": "high", "so_what": "This tradeoff framing is the analytical backbone for interpreting any future supply-shock (tariffs, oil, supply chains) as a forced choice, not a free lunch, for the FOMC.", "quote": "monetary policy cannot generally counter the inflationary effects of an adverse supply shock without some cost to employment", "locator": "In particular, monetary policymakers sometimes need to balance a tradeoff", "quote_verified": true}]}, {"theme": "Estimated policy multipliers and their limits", "insights": [{"claim": "Using 1990-2007 U.S. data (chosen to be stable and to avoid the post-2008 zero lower bound period), Barnichon and Mesters estimate that a 25-basis-point federal funds rate shock sustained over a year takes about a year to substantially affect inflation.", "speaker": "Aayush Singh", "type": "data_point", "entities": ["Federal Reserve", "Barnichon and Mesters"], "conviction": "medium", "so_what": "Confirms long, variable lags in monetary transmission — investors should not expect current hikes/cuts to show up in inflation prints for roughly a year, supporting patience in front-running Fed pivots.", "quote": "monetary policy may take about a year to substantially affect inflation", "locator": "The estimated policy multipliers, shown by solid lines in Figure 1", "quote_verified": true}, {"claim": "The estimated multipliers imply that a federal funds rate shock large enough to lower inflation by 0.1 percentage point after two years would raise unemployment by about 0.3 percentage point over the same period, quantifying a roughly 3-to-1 unemployment cost per unit of disinflation.", "speaker": "Aayush Singh", "type": "data_point", "entities": ["Federal Reserve"], "conviction": "medium", "so_what": "Gives investors a concrete rule-of-thumb ratio for how much labor-market pain the Fed is implicitly willing to accept per point of disinflation, useful for gauging how aggressive future tightening cycles might get before the Fed backs off.", "quote": "a federal funds rate shock large enough to bring inflation down about 0.1 percentage point after two years would be expected to increase unemployment about 0.3 percentage point over the same period", "locator": "Second, a federal funds rate shock large enough to bring inflation down", "quote_verified": true}, {"claim": "The multiplier estimates carry wide 95% confidence bands and the PCT assumes the economy responds linearly to shocks (treating small and large recessions the same way), meaning the tool's prescriptions should be treated as indicative rather than precise.", "speaker": "Aayush Singh", "type": "framework", "entities": ["Federal Reserve"], "conviction": "medium", "so_what": "Investors should discount the PCT's specific rate-path numbers and instead use it directionally; large, nonlinear shocks (e.g., a severe recession) could make the tool's guidance materially wrong.", "quote": "The tool also uses an assumption that the economy behaves linearly", "locator": "We caution that the PCT should be seen only as an indicative tool", "quote_verified": true}]}, {"theme": "Tariffs as an ambiguous shock: two scenarios, two opposite rate calls", "insights": [{"claim": "In the SF Fed's illustrative cost-push tariff scenario, inflation rises to near 6% (from the professional forecaster baseline) before slowly reverting to the Fed's 2% goal, and unemployment rises to about 6% in tandem, reflecting tariffs acting as a supply-side cost shock.", "speaker": "Aayush Singh", "type": "data_point", "entities": ["Federal Reserve", "tariffs"], "conviction": "exploratory", "so_what": "Marks the upper bound of a stagflationary tariff scenario the Fed is explicitly modeling; a 6% CPI print alongside 6% unemployment would be a genuine stagflation shock investors should have tail-risk hedges for.", "quote": "the scenario assumes that inflation rises substantially, close to 6%", "locator": "In the first scenario, the tariff increase has a cost-push effect", "quote_verified": true}, {"claim": "Under this cost-push tariff scenario, the PCT prescribes sharply raising the federal funds rate above baseline in the first year, then gradually returning toward the baseline path, accepting higher unemployment as the cost of fighting tariff-driven inflation.", "speaker": "Aayush Singh", "type": "prediction", "entities": ["Federal Reserve", "tariffs"], "conviction": "exploratory", "so_what": "If incoming data shows tariffs feeding through primarily as cost-push inflation, investors should expect a more hawkish Fed path than currently priced by market-implied forward rates.", "quote": "the PCT would call for raising the interest rate to fight off inflation, even though this comes at the cost of higher unemployment", "locator": "Under the cost-push scenario (triangle line), the PCT would call for", "quote_verified": true}, {"claim": "In the SF Fed's alternative weak-demand tariff scenario, tariff-induced policy uncertainty depresses consumer and investor confidence, pushing unemployment up (similarly to the cost-push case) but pushing inflation down, falling below 1.5% by end-2026 rather than up toward 6%.", "speaker": "Aayush Singh", "type": "data_point", "entities": ["Federal Reserve", "tariffs"], "conviction": "exploratory", "so_what": "This is the disinflationary/recessionary tail case for tariffs — if inflation surprises to the downside alongside rising unemployment, that is a strong signal the market and Fed should be repricing toward rate cuts, not hikes.", "quote": "inflation dips below the baseline forecast, falling below 1.5% by the end of 2026", "locator": "The second scenario is motivated by recent research that finds", "quote_verified": true}, {"claim": "Under the weak-demand tariff scenario, the PCT prescribes cutting the federal funds rate rather than raising it, since a more expansionary stance would help both inflation and unemployment revert faster to target/natural-rate levels.", "speaker": "Aayush Singh", "type": "prediction", "entities": ["Federal Reserve", "tariffs"], "conviction": "exploratory", "so_what": "The exact same tariff shock — same headline event — justifies rate cuts instead of hikes depending on the demand/supply read; investors should track uncertainty/confidence indicators (not just CPI) to determine which regime is unfolding.", "quote": "the PCT would call for the policy path to go in the opposite direction: If uncertainty stemming from tariff or other policy changes were to lead to lower inflation, the PCT would call for cutting the interest rate", "locator": "Under the weak demand scenario (circle line), the PCT would call for", "quote_verified": true}, {"claim": "Because the correct Fed response to the 2025-26 tariff increases depends entirely on whether one views them as primarily a demand shock (via uncertainty) or a supply shock (via cost-push), disagreement among individual FOMC policymakers about the right rate path could be substantial.", "speaker": "Aayush Singh", "type": "contrarian", "entities": ["Federal Reserve", "FOMC", "tariffs"], "conviction": "high", "so_what": "Investors should expect wider-than-usual dispersion in FOMC dot plots and more contentious policy votes as long as the tariff transmission channel remains unresolved — a source of rate-path volatility distinct from the data itself.", "quote": "The uncertainty surrounding the effects of large tariff changes implies that uncertainty about the best course of action and thus disagreement among policymakers could also be substantial.", "locator": "Conclusion", "quote_verified": true}, {"claim": "The tariff scenarios presented are explicitly illustrative constructs and not a quantitative assessment of the actual 2025 tariffs' effects, so they should be read as bounding cases rather than the Fed's actual forecast.", "speaker": "Aayush Singh", "type": "framework", "entities": ["Federal Reserve", "tariffs"], "conviction": "high", "so_what": "Investors should not mistake this letter for an official SF Fed tariff forecast; it is a methodology demonstration, so the 6% inflation and sub-1.5% inflation figures are illustrative bounds, not point predictions to trade on directly.", "quote": "they are illustrative and do not reflect any specific quantitative assessment of the actual effects of the 2025 tariffs", "locator": "To simplify the analysis, we consider two hypothetical scenarios", "quote_verified": true}]}, {"theme": "Identifying policy shocks via natural experiments", "insights": [{"claim": "Because economists cannot run controlled experiments on the macroeconomy, researchers rely on 'natural experiments' — Fed policy changes made for reasons unrelated to the short-run path of inflation and unemployment, such as responses to financial-market stress or shifts in FOMC membership — to isolate the causal effect of rate changes.", "speaker": "Aayush Singh", "type": "framework", "entities": ["Federal Reserve", "FOMC"], "conviction": "high", "so_what": "Explains the empirical basis for the multiplier estimates underlying the PCT; investors evaluating the tool's credibility should understand its causal identification rests on a fairly narrow set of historical 'clean' shocks, not the full history of Fed moves.", "quote": null, "locator": "Estimating policy multipliers", "quote_verified": false}]}], "insight_total": 13, "top_entities": ["Federal Reserve", "FOMC", "SF Fed", "Regis Barnichon", "Aayush Singh", "Policy Calibration Tool", "tariffs", "federal funds rate", "inflation", "unemployment"], "source_meta": {"author": "Aayush Singh", "word_count": 2057, "paywalled": false}}, {"record_id": "5d0d1ca563bd2ead", "source_type": "concepts", "source_name": "St. Louis Fed — FRED Blog", "source_url": "https://fredblog.stlouisfed.org/2026/06/ai-investment-and-semiconductor-prices/", "title": "AI investment and semiconductor prices", "published_date": "", "language": "en", "processed_at": "2026-07-01T09:24:10Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Tech", "AI"], "gist": "The PPI for semiconductor and electronic component manufacturing jumped ~19% in four months (61.6 in Jan 2026 to 73.1 in May 2026) after staying flat for years, suggesting AI-driven chip demand is only now hitting producer prices even though AI capex already hit a post-1947 high share of business investment in Q3 2025 — because data center construction and semiconductor procurement occur at different stages of the investment cycle.", "themes": [{"theme": "Semiconductor PPI inflection", "insights": [{"claim": "The US Producer Price Index for semiconductor and other electronic component manufacturing rose from 61.6 in January 2026 to 73.1 in May 2026, a roughly 19% increase in four months, after having changed slowly for years even during earlier semiconductor shortage episodes.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["Producer Price Index", "semiconductors", "PCU33443344"], "conviction": "high", "so_what": "A sharp, recent break in a historically sluggish producer price series signals that AI-driven chip demand is now flowing into pricing power for a broad set of component makers, not just the most advanced AI processor makers — watch this PPI series as a leading indicator of margin expansion across the semiconductor supply chain.", "quote": "The index rose from 61.6 in January 2026 to 73.1 in May 2026, an increase of about 19% in four months.", "locator": "Producer price index", "quote_verified": true}, {"claim": "Recent semiconductor company earnings reports indicate AI data center demand has broadened out to a wider set of chip producers beyond the makers of the most advanced AI processors, including memory, networking, and power-management chip suppliers.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["semiconductor firms", "memory chips", "networking equipment", "power-management chips"], "conviction": "medium", "so_what": "The AI capex boom's beneficiaries are widening beyond the obvious AI-chip leaders (e.g., Nvidia-type processor makers) into memory, networking, and power-management component suppliers — a broader basket of semiconductor names may benefit as data centers move from construction to equipping.", "quote": "Recent earnings reports from semiconductor firms suggest that AI data center demand has started to reach a wider set of chip producers and not only firms that make the most advanced AI processors.", "locator": "A question of timing", "quote_verified": true}]}, {"theme": "AI capex already at record share of business investment", "insights": [{"claim": "A study by Kalyani and Li (2026) found that information processing equipment, software, and data center construction accounted for one-third of total US business investment in Q3 2025, the highest share since 1947.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["Kalyani and Li (2026)", "data center construction", "business investment"], "conviction": "high", "so_what": "AI-related capex is not a future story but already the dominant driver of US business investment at a scale unseen in nearly 80 years — implies continued high sensitivity of GDP/investment data to AI capex trends and potential concentration risk if AI spending decelerates.", "quote": "Information processing equipment, software, and data center construction accounted for one-third of total business investment in the third quarter of 2025, the highest share since 1947.", "locator": "A question of timing", "quote_verified": true}]}, {"theme": "Investment-cycle staging framework", "insights": [{"claim": "Data center construction and semiconductor demand hit at different stages of the AI investment process: early spending goes to land, buildings, cooling systems, and power connections (physical infrastructure not captured in the semiconductor PPI), while semiconductor price pressure emerges later once data centers are closer to being equipped with processors, memory, networking gear, and power-management chips.", "speaker": "St. Louis Fed — FRED Blog", "type": "framework", "entities": ["data centers", "semiconductors", "power-management chips", "cooling systems"], "conviction": "medium", "so_what": "Investors tracking the AI buildout should expect a staggered sequence of price/margin signals: construction and materials costs move first, semiconductor and component pricing moves later as projects near completion — use this to time entry into chip-exposed equities versus construction/industrial suppliers.", "quote": "One possibility is that data center construction and semiconductor demand may arrive at different points in the investment process.", "locator": "A question of timing", "quote_verified": true}, {"claim": "Supply bottlenecks and capacity constraints in AI-related construction and component sourcing are not obvious in advance; they become clearer as projects progress and orders firm up, which is why firms learn where price pressure will emerge only as the buildout matures.", "speaker": "St. Louis Fed — FRED Blog", "type": "causal", "entities": ["supply bottlenecks", "data center construction"], "conviction": "medium", "so_what": "Expect further surprise price spikes in specific AI-supply-chain subcomponents as more projects reach the equipping stage — bottlenecks will likely be revealed incrementally rather than predictable in advance.", "quote": "Also, supply bottlenecks and capacity constraints in the investment and construction process aren't always obvious in advance.", "locator": "A question of timing", "quote_verified": true}]}, {"theme": "Inventory normalization as a price trigger", "insights": [{"claim": "Some semiconductor markets were still working through excess post-pandemic-cycle inventories, meaning a surge in expected AI demand does not raise prices immediately if suppliers can ramp production or draw down existing inventory; the pricing boom is expected to show up more fully once inventories normalize and data center orders strengthen further.", "speaker": "St. Louis Fed — FRED Blog", "type": "causal", "entities": ["semiconductor inventories", "pandemic-era supply cycle"], "conviction": "medium", "so_what": "The recent 19% PPI jump may understate the coming price pressure — once residual post-pandemic chip inventories are cleared, semiconductor prices could rise further and more broadly, a signal to monitor inventory-normalization data alongside the PPI series.", "quote": "Once these inventories have fully normalized and data center orders have strengthened, the boom could begin to fully and clearly show up in the price index.", "locator": "Inventories", "quote_verified": true}]}], "insight_total": 6, "top_entities": ["Producer Price Index", "semiconductors", "data center construction", "Kalyani and Li (2026)", "PCU33443344", "memory chips", "networking equipment", "power-management chips", "AI investment", "business investment"], "source_meta": {"author": "", "word_count": 480, "paywalled": false}}, {"record_id": "ab378857bd13785c", "source_type": "concepts", "source_name": "Works in Progress", "source_url": "https://worksinprogress.co/issue/how-to-lie-about-radiation/", "title": "How to lie about radiation -", "published_date": "2026-06-29", "language": "en", "processed_at": "2026-07-01T09:24:10Z", "processor": "claude-code-sub-opus", "tags": ["Energy", "Society"], "gist": "The article argues that the global radiation-protection regime overstates the harm of low-dose ionizing radiation, using Chernobyl, Fukushima, and a 1980s Taiwan cobalt-60 building-contamination episode as evidence, and contends this exaggerated fear has needlessly strangled nuclear power with costly regulation.", "themes": [{"theme": "Chernobyl's actual death toll vs. its reputation", "insights": [{"claim": "Of the 600 workers present during the Chernobyl explosion, 134 received high radiation doses (800-16,000 millisieverts), 28 died within three months, and 19 more died before 2004 (not all from radiation), while first responders show only a slight leukemia increase and no increase in solid cancers.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Chernobyl"], "conviction": "high", "so_what": "The direct death toll from the world's worst nuclear accident is measured in dozens, not thousands, undercutting the popular perception of nuclear catastrophe risk.", "quote": "Twenty-eight of these died in the first three months, and another 19 died before 2004, though not all from radiation-related causes.", "locator": "Chernobyl was the world's worst ever nuclear disaster", "quote_verified": true}, {"claim": "Chernobyl caused about 6,000 thyroid cancers in exposed children via radioactive iodine concentrated from contaminated milk, of which 15 have died and up to 200 might eventually die, but these deaths were entirely avoidable since iodine-131 has an eight-day half-life.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Chernobyl", "Ukraine"], "conviction": "high", "so_what": "The avoidable harm was a policy/response failure (not discarding contaminated milk), not an inherent property of radiation exposure — implying better civil-defense protocols, not less nuclear power, is the fix.", "quote": "These thyroid cancers were completely avoidable because the iodine has a half-life of eight days.", "locator": "When the reactor exploded, it released massive amounts", "quote_verified": true}, {"claim": "After the 1957 Windscale fire contaminated grazing land in Britain with fallout, authorities discarded contaminated milk for 44 days and thereby avoided any measurable harm, showing the Chernobyl thyroid cancer wave was a preventable regulatory failure rather than an inevitable consequence of the accident.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Windscale", "Britain"], "conviction": "high", "so_what": "A cheap, simple intervention (temporary milk bans) can neutralize the single largest source of civilian harm from a reactor accident, an actionable policy lesson for future nuclear regulation.", "quote": null, "locator": "After the Windscale fire released radioactive fallout", "quote_verified": false}, {"claim": "Neither Fukushima nor Three Mile Island — the other two major nuclear disasters — saw any responder die from direct radiation effects, and neither shows any clear impact on cancer rates, while evacuations and relocations undertaken to avoid small background radiation increases may have caused more harm than they prevented.", "speaker": "WorksInProgMag", "type": "contrarian", "entities": ["Fukushima", "Three Mile Island"], "conviction": "high", "so_what": "Evacuation policy itself, driven by precautionary radiation fears, may be the actual harm vector — a case for redesigning nuclear emergency response to weigh relocation costs against genuine radiation risk.", "quote": "Evacuations and relocations to avoid small additional background radiation levels may have caused more harm than they averted.", "locator": "Chernobyl is the only accident in commercial nuclear history", "quote_verified": true}]}, {"theme": "Nuclear fear is disproportionate to actual industrial risk", "insights": [{"claim": "The 1984 Bhopal pesticide plant gas leak killed at least 2,000 people instantly, permanently disabled 4,000 more, and caused 550,000 total injuries, while the 1975 Banqiao Dam failure in China drowned at least 25,000 people and destroyed roughly five million houses — yet both are far less culturally famous than Chernobyl, which caused far fewer deaths.", "speaker": "WorksInProgMag", "type": "contrarian", "entities": ["Bhopal", "Banqiao Dam", "China", "India"], "conviction": "high", "so_what": "Public risk perception is not calibrated to actual body count; nuclear power bears a reputational tax disproportionate to its real-world harm relative to other industrial accidents, which is directly relevant to nuclear energy policy and investment risk premia.", "quote": "Whereas Chernobyl is a household name, Bhopal and Banqiao are mostly familiar only to specialists.", "locator": "Two years before Chernobyl, an explosion at a pesticide plant", "quote_verified": true}, {"claim": "The global radiation-protection regime is built on the premise that any release of radioactive material from a nuclear plant is intolerable, and this premise has driven regulatory costs that made nuclear electricity widely perceived as slow, backward, and ineffective.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["nuclear power"], "conviction": "high", "so_what": "If the underlying safety premise is unsound, current nuclear regulatory frameworks are mispricing risk, implying regulatory reform could be a lever to unlock cheaper nuclear buildout — a key variable for energy-sector capital allocation.", "quote": "This has led to regulations that have increased the costs of nuclear electricity over time to the point where it is widely considered a slow, backward, and ineffective technology.", "locator": "People have much greater familiarity with and concern", "quote_verified": true}, {"claim": "The author states plainly that the scientific claim underlying nuclear radiation regulation — that low, spread-out doses of radiation are harmful — is not well supported by the evidence, and that treating unconvincing low-dose studies as credible may be foreclosing one of the world's most powerful technologies.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["nuclear power"], "conviction": "high", "so_what": "This is the article's central investment-relevant thesis: mispriced radiation risk is a solvable regulatory/scientific problem standing between the world and much cheaper nuclear energy.", "quote": "By giving them undeserved credence, we may be foreclosing one of the world's most powerful technologies.", "locator": "The idea that any release of radioactive material", "quote_verified": true}]}, {"theme": "The Taiwan cobalt-60 buildings as a natural experiment", "insights": [{"claim": "Between 1982 and 1984, recycled steel contaminated with cobalt-60 was unknowingly used to build over 180 structures in Taiwan, including roughly 2,000 apartments, exposing more than 10,000 people over two decades to an average total dose of 400 millisieverts — about seven times the typical American's background radiation over the same period.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Taiwan", "cobalt-60"], "conviction": "high", "so_what": "This accidental mass, long-duration, high-dose human exposure is one of the best real-world natural experiments available for testing whether chronic low-level radiation causes cancer.", "quote": null, "locator": "Trouble in Taipei", "quote_verified": false}, {"claim": "Dose mapping within the Taiwan cobalt-60 buildings found most units received under 10 millisieverts/year (less than one annual CT scan), a small fraction received nearly 1,000 millisieverts/year (about 100 CT scans), and some room sections were exposed to over 8,000 millisieverts/year (about two CT scans per day).", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Taiwan", "cobalt-60"], "conviction": "high", "so_what": "The huge dose range within one dataset lets researchers test a dose-response relationship directly, making the quality of subsequent statistical analysis the crux of the whole radiation-safety debate.", "quote": null, "locator": "A series of academic papers reconstructed the doses", "quote_verified": false}, {"claim": "The earliest studies of the Taiwan cobalt-60 population (a 2004 preliminary report and 2006 Chen et al) found no radiation sickness, no major chromosomal aberrations, and unexpectedly lower cancer rates than the general population, leading Chen to interpret the data as evidence for radiation hormesis — the theory that low radiation doses trigger beneficial repair responses like exercise does for the cardiovascular system.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Taiwan", "cobalt-60", "hormesis"], "conviction": "medium", "so_what": "Hormesis is a fringe but non-trivial hypothesis that, if true, would flip the entire regulatory logic of radiation protection — worth tracking as a scientific tail risk/opportunity for nuclear policy debates.", "quote": null, "locator": "A 2004 preliminary report, followed by a 2006 study", "quote_verified": false}, {"claim": "The hormesis interpretation of the Chen et al Taiwan data is undermined by a confound: the irradiated population was far younger than the average Taiwanese, and younger people are less commonly diagnosed with cancer, so the apparent cancer-rate reduction may simply reflect age rather than a health benefit of radiation.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Taiwan", "hormesis"], "conviction": "high", "so_what": "Confounding by age is a recurring analytical trap in this literature on both sides of the debate — an investor evaluating any radiation-health claim should first ask whether age was controlled for.", "quote": null, "locator": "This interpretation of the Taiwan data is dubious", "quote_verified": false}]}, {"theme": "P-hacking: how the 'low-dose radiation causes cancer' studies were built", "insights": [{"claim": "A 2006 study (Hwang et al) of 7,271 Taiwan cobalt-60-exposed people found slightly elevated thyroid cancer in women and leukemia in men only after splitting cancer cases into 77 subtypes, even though overall cancer rates in the exposed group remained lower than the general population after controlling for age.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Taiwan", "Hwang et al"], "conviction": "high", "so_what": "Splitting outcomes into 77 subgroups without pre-registration statistically guarantees a handful of false-positive 'significant' findings — a textbook p-hacking pattern investors should recognize when reading any epidemiology-based claim.", "quote": null, "locator": "Torture the data and it will confess", "quote_verified": false}, {"claim": "Across 77 independent statistical tests for cancer subtypes, random chance alone would be expected to produce roughly four spuriously 'statistically significant' results, and every significant site-specific finding in the Hwang et al study relied on seven or fewer observed cases.", "speaker": "WorksInProgMag", "type": "framework", "entities": ["Hwang et al"], "conviction": "high", "so_what": "A generalizable statistical-literacy heuristic: when a study reports significance only in a handful of many subgroup tests with tiny case counts and no pre-registration, treat the finding as likely noise regardless of the field.", "quote": "Across 77 different statistical tests, we would expect to see statistically significant results in four cases purely due to random variation.", "locator": "This approach has two problems", "quote_verified": true}, {"claim": "A 2017 British Journal of Cancer study (Hsieh et al) followed roughly 6,000 exposed Taiwanese apartment dwellers and schoolchildren for ten more years and claimed low-dose-rate radiation raises breast cancer and leukemia risk (100 millisieverts linked to an 11 percent higher breast cancer risk), but again failed to pre-register hypotheses and found significance in only a few of dozens of tested outcomes.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Hsieh et al", "Taiwan"], "conviction": "medium", "so_what": "Even peer-reviewed, higher-profile follow-up studies replicate the same methodological flaw, suggesting the 'radiation causes cancer at low doses' literature is structurally weaker than its publication venues imply.", "quote": "low-dose-rate radiation exposure increases risks of breast cancer and leukaemia", "locator": "Don't back down, double down", "quote_verified": true}, {"claim": "By 2012 the irradiated Taiwan apartment dwellers had experienced 247 cancers across 97,106 person-years (about 254 per 100,000 person-years), versus Taiwan's overall rate of about 390 per 100,000 person-years — roughly 35 percent lower cancer incidence in the irradiated group even after adjusting for their older average age (about 45 vs. Taiwan's overall average, seven years younger).", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Taiwan", "Hsieh et al", "UN Scientific Committee on the Effects of Atomic Radiation"], "conviction": "high", "so_what": "The headline number that should dominate any honest reading of this dataset is a 35 percent lower cancer rate in the high-dose group, which implies the site-specific 'radiation causes cancer' findings are statistical artifacts, not a real signal.", "quote": "Overall, cancer rates seem to be almost 35 percent lower in the affected group.", "locator": "And once more, the authors don't highlight", "quote_verified": true}, {"claim": "When challenged on the 35 percent lower cancer rate in irradiated Taiwanese, the Hsieh and Hwang study authors attributed it to socioeconomic status, but Taiwan-wide data shows socioeconomic cancer-rate gaps (e.g., doctors have ~10 percent lower cancer incidence than the general population, and colorectal cancer is ~20 percent lower at the bottom of the wage ladder) are far too small to explain a 35 percent gap.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Taiwan", "Hwang et al", "Hsieh et al"], "conviction": "high", "so_what": "The authors' own post-hoc explanation for their inconvenient result doesn't survive a basic sanity check against real socioeconomic-health data, reinforcing that their 'radiation causes cancer' conclusion is unsupported.", "quote": null, "locator": "Made aware of this, Hsieh responded", "quote_verified": false}, {"claim": "The author explicitly rejects using the Taiwan data as strong evidence for radiation hormesis (health benefits of radiation) just as much as for radiation harm, concluding the most likely correct interpretation is that the anomalous results are statistical noise in both directions.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["Taiwan", "hormesis"], "conviction": "high", "so_what": "The article's intellectual honesty here — refusing to over-claim in the pro-nuclear direction too — strengthens its credibility as balanced analysis rather than industry advocacy.", "quote": "Most likely, these results are evidence of nothing.", "locator": "This is not to claim that Hsieh's paper provides strong evidence", "quote_verified": true}]}, {"theme": "Replication crisis parallel and the p-hacking playbook", "insights": [{"claim": "The Taiwan radiation studies bear the classic signature of the post-2011 replication crisis that debunked findings like power posing and the 'Mozart effect' in psychology: p-hacking via slicing a population into as many subgroups as possible to manufacture statistically significant results by chance.", "speaker": "WorksInProgMag", "type": "framework", "entities": ["replication crisis"], "conviction": "high", "so_what": "Frames the radiation-health debate as a specific instance of a general, cross-disciplinary methodological failure mode, useful for evaluating any 'surprising' epidemiological finding, not just nuclear-related ones.", "quote": null, "locator": "The perils of low-dose science", "quote_verified": false}]}, {"theme": "INWORKS: the best available low-dose evidence, and why it's still weak", "insights": [{"claim": "INWORKS (first published 2015, updated 2023), the most rigorous study on chronic low-dose radiation, tracked 300,000 nuclear workers in France, the US, and Britain via badge dosimeters and found each additional 100 millisieverts of lifetime exposure is associated with a 5 percent relative increase in cancer mortality, adding about 1 percentage point to a lifetime cancer death risk baseline of about 34 percent.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["INWORKS", "France", "United States", "Britain"], "conviction": "medium", "so_what": "This is the single best piece of positive evidence for a low-dose radiation harm effect, but the effect size (34% to 35%) is tiny relative to the sample size needed to detect it, so it should anchor any risk model rather than more sensational claims.", "quote": null, "locator": "INWORKS, first published in 2015 and updated in 2023", "quote_verified": false}, {"claim": "The median INWORKS nuclear worker received a lifetime occupational dose of only 4 millisieverts (equivalent to less than one CT scan), and applying INWORKS's own model this dose raises lifetime cancer death risk from the US baseline of 17.2 percent to just 17.23 percent — an effect so small it is barely distinguishable from noise even with 300,000 subjects.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["INWORKS"], "conviction": "medium", "so_what": "Puts a hard number on how negligible realistic occupational/medical radiation exposure is as a cancer risk factor, useful context for evaluating nuclear-industry worker safety regulation costs.", "quote": null, "locator": "The median INWORKS worker received a dose of four millisieverts", "quote_verified": false}, {"claim": "INWORKS does not control for background radiation exposure even though more than 90 percent of subjects' total dose came from natural background sources (UK/US/France average lifetime background dose is about 70 millisieverts), and its significant result is driven almost entirely by the 75th-90th percentile exposure band (roughly 20-50 millisieverts), with no significant relationship at 0-20 millisieverts.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["INWORKS"], "conviction": "medium", "so_what": "The 'best' pro-low-dose-harm study has a fragile, narrow statistical basis and an uncontrolled major confound, meaning policymakers citing INWORKS as settled science are overstating its certainty.", "quote": "This sensitivity makes the results fragile and is one reason why many look instead at studies with higher doses.", "locator": "Another problem is that INWORKS's significant result", "quote_verified": true}, {"claim": "For risk-magnitude comparison: eating 50 grams of processed meat daily raises lifetime colorectal cancer risk by 18 perc // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
