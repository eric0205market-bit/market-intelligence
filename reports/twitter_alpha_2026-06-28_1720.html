<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

const REPORT_DATA = {"date": "2026-06-28 · 17:20 UTC", "summary": "**Iran/Hormuz:** Two oil tankers and LPG carriers transited the Strait via the Omani route under heavy US Navy and Air Force escort, AIS on. Iran's FM warned that any 'separate arrangements' beyond Iran's current process 'will only lead to more complicated situations and delays in the reopening' — signaling Hormuz remains an active risk, not a resolved one.\n\n**Markets — AI Rotation:** **Jim Bianco** flags a sharp week-long divergence: SPX −2%, AI stocks −4.52%, non-AI stocks +2.31% — asking whether the market is telling us that crushing AI is actually bullish for the broader economy. **Quinn Thompson** adds that Nasdaq and S&P are quietly back to early May levels while inflation swaps just broke below pre-war levels, ruling out central bank hikes. **Bob Elliott** argues today's AI mania is just another historical example of markets pricing extraordinary outcomes as certainty — a pattern that has marked turning points before.\n\n**AI Infrastructure:** **Aleabitoreddit** surfaces that Google reportedly restricted Meta's cloud capacity in March due to compute constraints — explaining both Meta's rush to sign with neoclouds like $NBIS and why Gemini was nerfed. **jvisserlabs** argues the hyperscaler selloff is not AI collapse: the market is rotating from infrastructure spenders to application beneficiaries — memory, healthcare, agentic commerce are outperforming.\n\n**Crypto:** $ANSEM reignited Solana meme mania, reminding the market how fast sentiment can flip. **Mando** sees MSTR as a 'slow moving car crash' after mNAV returned to 1; expects Saylor to cut the dividend. **CZ's** net worth surpassing Bill Gates sparked pointed industry criticism from **Simon Dedic**.\n\n**Notable:** **Bill Ackman** issued a detailed warning that Mayor Mamdani's NYC rent freeze stacks the Rent Guidelines Board to deliver a preordained freeze — predicting hundreds of underwater small-property mortgages, deteriorating maintenance, and a supply crunch that will paradoxically harm the market-rate renters it ignores. **Tyler Neville** separately flags a rarely-discussed disinflationary force: the 2009 birth-year cohort is now absent from college rolls and entry-level job pools — 7.4M fewer Americans born 2008–2025 than at the 2007 peak rate.", "events": [{"title": "Iran/Strait of Hormuz — Tankers Under US Navy Escort", "category": "geopolitics", "description": "Iran signals ongoing control over Hormuz timing; US scrambles to keep Omani route open.", "items": [{"author": "JavierBlas", "tweet_url": "https://x.com/JavierBlas/status/2071155042569052229", "text": "Two oil tankers and two LPG carriers crossing the Strait of Hormuz inbound via the Omani route with their AIS turned on, under heavy US Navy / Airforce watch. Washington trying hard to keep the Omani route on.", "images": [], "created_at": "2026-06-28T08:53:37.000Z", "is_thread": false}, {"author": "JavierBlas", "tweet_url": "https://x.com/JavierBlas/status/2071188694862594353", "text": "Iran FM: '…Any attempt to adopt new or separate arrangements compared to what is underway by the Islamic Republic of Iran, will only lead to more complicated situations and delays in the reopening of the Strait of Hormuz, and will increase the tensions, as we witnessed in the past two nights…'", "images": [], "created_at": "2026-06-28T11:07:20.000Z", "is_thread": false}, {"author": "AndreasSteno", "tweet_url": "https://x.com/AndreasSteno/status/2071251789786091647", "text": "After questioning whether the oil bull thesis holds, notes: 'The risk/reward is starting to become more interesting' after the sell-off. Defended analyst @Rory_Johnston who got the recent move wrong: 'he got this one wrong, but we all get things wrong.'", "images": [], "created_at": "2026-06-28T15:18:03.000Z", "is_thread": false}]}, {"title": "AI Stocks −4.5% vs Non-AI +2.3% — Rotation or Regime Change?", "category": "macro", "description": "SPX down ~2% past week. AI-related names and non-AI S&P names are diverging sharply. Multiple voices ask if this is disinflationary signal, not just profit-taking.", "items": [{"author": "biancoresearch", "tweet_url": "https://x.com/biancoresearch/status/2071268650405798006", "text": "SPX −2% over the last week. AI-related stocks (~50–75 names): −4.52%. Non-AI stocks (~425–450 names): +2.31%. 'Is this market telling us it is bullish for the economy if AI stocks get crushed?' Chart attached.", "images": ["https://pbs.twimg.com/media/HL6fmNBW4AAExXv.png"], "created_at": "2026-06-28T16:25:03.000Z", "is_thread": false}, {"author": "qthomp", "tweet_url": "https://x.com/qthomp/status/2071221829285617874", "text": "The Nasdaq and S&P are quietly back to early May levels despite the tech mania. Inflation swaps just broke below pre-war levels — not something a central bank hikes into.", "images": [], "created_at": "2026-06-28T13:19:00.000Z", "is_thread": false}, {"author": "BobEUnlimited", "tweet_url": "https://x.com/BobEUnlimited/status/2071189885042455027", "text": "The pricing in of extraordinary outcomes as certainty has often marked a turning point in markets. Today's AI mania is just another example in a long history. CNBC Overtime interview linked.", "images": [], "created_at": "2026-06-28T11:12:04.000Z", "is_thread": false}]}, {"title": "Google Restricts Meta Cloud in March — AI Compute Crunch Confirmed", "category": "ai", "description": "Google reportedly cut Meta's capacity due to compute constraints, Google Cloud backlog doubled. Bullish for independent AI datacenter capex buildout.", "items": [{"author": "aleabitoreddit", "tweet_url": "https://x.com/aleabitoreddit/status/2071135874100990438", "text": "Google reportedly restricted Meta's capacity in March 2026 because of compute restraints. This explains why Meta signed massive agreements with neoclouds like $NBIS back in March — and why Gemini got super nerfed. Google Cloud backlog nearly doubled per the CEO's last earnings. Positive for the AI DC founder CZ is now wealthier than Bill Gates, prompting Simon Dedic to publish a pointed critique of who crypto elevates.", "items": [{"author": "sjdedic", "tweet_url": "https://x.com/sjdedic/status/2071264977571250560", "text": "Bill Gates built the entire software industry then spent decades giving his fortune away to fight disease and poverty. CZ built a monopoly that extracted billions from retail, pleaded guilty to violating anti-money laundering laws, went to prison, and came out richer than ever. 'I love our industry… but it's just a shame that this is still the kind of person who ends up on top of it.'", "images": [], "created_at": "2026-06-28T16:10:27.000Z", "is_thread": false}]}, {"title": "NYC Rent Freeze — Ackman Warns of Small Landlord Cascade", "category": "macro", "description": "Mayor Mamdani stacks the Rent Guidelines Board to deliver a preordained freeze. Ackman's detailed thread argues hundreds of underwater mortgages are coming — and the 2M market-rate renters it ignores will suffer from supply reduction.", "items": [{"author": "BillAckman", "tweet_url": "https://x.com/BillAckman/status/2071226941856719202", "text": "Families who saved for generations to buy rent-stabilized brownstones took out mortgages premised on rent increases tracking costs. The new mayor stacked the Rent Guidelines Board — an RGB member resigned in protest over the preordained freeze. NYC utilities, taxes, insurance, and maintenance are all inflating; frozen rents mean plummeting cash flows. Expects hundreds if not thousands of small owners to go underwater. Market-rate renters (~2M apartments) will also suffer: a landlord-hostile environment won't add supply and market rents will keep rising. Disclosure: does not own NYC rental apartments. 'All of this seems quite unfair and wrong — why am I wrong?'", "images": [], "created_at": "2026-06-28T13:38:57.000Z", "is_thread": false}]}, {"title": "SpaceX IPO — Breakthrough Proof or Bubble Signal? Two Camps, Same Data", "category": "macro", "description": "El-Erian notes a heated split: bonds already trading wider than issuance, stock below post-IPO trading level — bears see bubble; bulls see proof capital markets fund breakthroughs.", "items": [{"author": "elerianm", "tweet_url": "https://x.com/elerianm/status/2071254511704822080", "text": "Both sides cite current data. Bulls: SpaceX shows capital markets can mobilize substantial funds for technological breakthroughs. Bears: bonds trading with wider risk spreads than issuance, stock fallen below post-IPO trading level (still above IPO price). 'Where do you stand in this heated debate?'", "images": [], "created_at": "2026-06-28T15:28:52.000Z", "is_thread": false}]}], "insights": [{"author": "jvisserlabs", "category": "ai", "tweet_url": "https://x.com/jvisserlabs/status/2071209501332546038", "text": "Hyperscalers are collapsing. The AI market is consolidating. Those are not the same thing.\n\nJune has been brutal for Mag 7 and hyperscalers, but beneath the surface the rotation is clear: healthcare, small caps, equal weight, AI infrastructure receivers, memory, biotech, and agentic commerce are all telling a very different story. 'This is what an AI midcycle slowdown looks like.'\n\nThe market is starting to separate who spends on AI from who benefits from it. Weekly video covers: why hyperscalers are under pressure; Micron/memory as the real AI bottleneck; why token usage may explode from loops and tags; the shift from infrastructure to applications; Stripe Sessions and agentic commerce; healthcare/GLP-1s. Chart showing sector divergence attached.", "images": ["https://pbs.twimg.com/media/HL3OUZjXQAAvXyz.jpg"], "created_at": "2026-06-28T12:14:44.000Z", "is_thread": true}, {"author": "aleabitoreddit", "category": "tech", "tweet_url": "https://x.com/aleabitoreddit/status/2071164721299112316", "text": "Schaeffler $SHA0 as the ideal example of auto/humanoid supply chain convergence. The €7.47B MC auto player is working with 45 humanoid makers covering bearings, gearboxes, sensors/ECUs, actuators, power electronics — potentially ~50% of a humanoid BOM. Targeting 10% market share but projecting only a few hundred million in 2030 revenue (likely sandbagged vs Elon's numbers).\n\nOther plays: Nabtesco (6268) for joints; Sanhua in China for Tesla Optimus. These auto names trade at depressed valuations from auto sector drag. Humanoids + AI Auto should be a catalyst past 2027. Currently ~1% of their revenue — needs a downstream breakout leader first. Disclosure: not currently positioned.", "images": ["https://pbs.twimg.com/media/HL5BVOJawAAjQ1L.jpg", "https://pbs.twimg.com/media/HL5BVOFa0AACujU.jpg", "https://pbs.twimg.com/media/HL5BVOMaQAA0h8i.jpg"], "created_at": "2026-06-28T09:32:04.000Z", "is_thread": true}, {"author": "hosseeb", "category": "ai", "tweet_url": "https://x.com/hosseeb/status/2071176253982261598", "text": "Why aren't US firms buying bootlegged AI tokens from Chinese resellers? That seems like the logical regulatory arbitrage outcome.\n\nThe economics: resellers fence stolen/botted subscription accounts. Subscription tokens are structurally underpriced vs API tokens — pure digital pricing arbitrage. Haseeb proposes a technical solution (auto-test the bootleg endpoint vs canonical Opus daily; switch if model drifts).\n\nLearns from replies: US firms avoid it due to compliance — specifically the distinction between 'zero data retention' vs 'zero training.' Also: the labs would have ultimate incentive to nuke resellers once US firm adoption reaches scale. Thread evolves into a nuanced grey market analysis.", "images": [], "created_at": "2026-06-28T10:17:54.000Z", "is_thread": true}, {"author": "Tyler_Neville_", "category": "macro", "tweet_url": "https://x.com/Tyler_Neville_/status/2071228028911337913", "text": "A rarely-discussed disinflationary force: the 2009 birth cohort (born at the start of the fertility cliff) is now turning 18 — absent from college enrollment lists, military recruiting pools, and entry-level job applicants.\n\nFrom @mansharamani: 3.6M babies born last year — 700k below the 2007 peak. Fertility at 1.6, expected to hold through 2055. 7.4M fewer Americans born 2008–2025 vs the 2007 rate.\n\nThe enrollment cliff: Syracuse cut 93 academic programs. Ohio State cut 8 majors. University of North Texas slashed 70 programs amid a $45M deficit. University of Chicago paused doctoral admissions in a dozen humanities. A projected 5–10% decline in freshman class sizes is now arriving.\n\nNeville's key question: what if this structural labor demand headwind + AI productivity causes inflation to roll over in a way nobody is modeling?", "images": [], "created_at": "2026-06-28T13:43:38.000Z", "is_thread": false}, {"author": "dampedspring", "category": "macro", "tweet_url": "https://x.com/dampedspring/status/2071181383058292912", "text": "Andy Constan (DSR) teases his next report: 'bull market in calls.' IVs are pumped and skew is flat. The subtlety: trading IV vs RV is not clean due to path dependency — even when IV equals RV, you can still have high PnL vol. 'Nonetheless we have a trade.' Chart showing current vol environment attached. Specific trade is behind his paid DSR report.", "images": ["https://pbs.twimg.com/media/HL5QfeZXsAAibuZ.jpg"], "created_at": "2026-06-28T10:38:17.000Z", "is_thread": false}, {"author": "cryptopunk7213", "category": "ai", "tweet_url": "https://x.com/cryptopunk7213/status/2071245895656509521", "text": "Things becoming increasingly valuable over the next 6 months:\n- Which AI models you use for which tasks\n- How you route across multiple models per task (the harness)\n- Caching to reduce token spend\n- AI cloud: efficiently managing memory and databases\n\n'The bottleneck is shifting from LLMs to aggregation.' Value is moving up the stack.", "images": [], "created_at": "2026-06-28T14:55:20.000Z", "is_thread": false}, {"author": "goodalexander", "category": "ai", "tweet_url": "https://x.com/goodalexander/status/2071246245134545083", "text": "When moving from trading to e-commerce, masterminds and courses actually worked — in trading they never do. The distinction: positive-sum rising-tide markets vs zero-sum PvP are fundamentally different. AI bootstrapping is closer to rising tide.\n\nSeparately: technical people will crush harder with AI because tools at the frontier are always innately technical — they'll be more able to leverage them.", "images": [], "created_at": "2026-06-28T14:56:01.000Z", "is_thread": true}, {"author": "PeterDiamandis", "category": "ai", "tweet_url": "https://x.com/PeterDiamandis/status/2071232712329793915", "text": "Three related points:\n1. If frontier AI is export-controlled by default, the US and China exploit it domestically while the rest of the world is locked out. 'Access should be UNIVERSAL — from the smallest town in Cheyenne Wyoming, to a kid in Kathmandu Nepal.'\n2. We're sending data centers to space because Earth cannot generate power fast enough to meet AI compute demand. 'Orbit can solve what Earth cannot.'\n3. Doom is loud, progress is quiet — every year more goes right than wrong.", "images": [], "created_at": "2026-06-28T14:02:14.000Z", "is_thread": false}, {"author": "Fiskantes", "category": "em", "tweet_url": "https://x.com/Fiskantes/status/2071238421666734461", "text": "Chinese don't trust their stock market — next best thing was real estate, which got inflated and curbed. Now the capital is sitting in gold. That entire pool of capital sitting in yellow bricks 'could pump the AI stock bubble in China instead.' A potential capital rotation unlock thesis for Chinese AI equities.", "images": [], "created_at": "2026-06-28T14:20:04.000Z", "is_thread": false}, {"author": "Fiskantes", "category": "ai", "tweet_url": "https://x.com/Fiskantes/status/2071177055731961918", "text": "How is Duolingo not being disrupted by AI? Solid LLMs capable of language teaching have existed for 2+ years, yet Duolingo's business metrics keep crushing. The counterpoint from replies: that's not disruption, that's the market already pricing it in. Duolingo has also integrated AI to extend its moat. A useful case study in AI-disruption thesis vs reality.", "images": [], "created_at": "2026-06-28T10:18:34.000Z", "is_thread": true}, {"author": "0xJeff", "category": "crypto", "tweet_url": "https://x.com/0xJeff/status/2071147106845487554", "text": "Open AI, Decentralized AI, and Self-Sovereign Intelligence theses are all getting their biggest validation this week. BUT: investable opportunities remain limited. High-revenue DeAI projects accrue value to equity and only use the token as an incentive mechanism — which creates a fundamental question for the crypto-native investor. After Hour EP.61 covers: self-sovereign thesis + structural tailwinds + biggest DeAI sectors now and in the future + where asymmetric opportunities are.", "images": [], "created_at": "2026-06-28T08:21:01.000Z", "is_thread": false}, {"author": "Delphi_Digital", "category": "ai", "tweet_url": "https://x.com/Delphi_Digital/status/2071096598650929194", "text": "Tommy's mental model on AI workload distribution: '10% of requests should go to a frontier model, 90% should go to open source.' Frontier for high-value complex reasoning; open source for high-volume routine tasks. The split has major implications for where AI cost/margin settles. Full podcast on YouTube.", "images": [], "created_at": "2026-06-28T05:01:22.000Z", "is_thread": false}, {"author": "elerianm", "category": "macro", "tweet_url": "https://x.com/elerianm/status/2071231490533253468", "text": "Atlanta Fed GDPNow has US Q2 GDP tracking at a 2.5% pace as the quarter closes. Two charts showing the tracking model and data components.", "images": ["https://pbs.twimg.com/media/HL598dsWAAAxjb_.jpg", "https://pbs.twimg.com/media/HL59_tvW8AA4egh.jpg"], "created_at": "2026-06-28T13:57:23.000Z", "is_thread": false}, {"author": "elerianm", "category": "macro", "tweet_url": "https://x.com/elerianm/status/207124066196623809 // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
