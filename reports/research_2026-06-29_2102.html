// Category color map
const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27",
  "AI/infra": "#1d9e75", crypto: "#7f77dd", geopolitics: "#d85a30",
  energy: "#f97316", tech: "#06b6d4", gold: "#d4a017",
  culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16", biotech: "#14b8a6"
};

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

var activeCategory = 'all';
var activeUrgency = 'all';
var activeSource = null;

function urgLabel(u) {
  return u === 'act' ? '🔴' : u === 'deep' ? '🔵' : '🟡';
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = ITEMS.filter(function(item) {
    var catOk = activeCategory === 'all' || item.cat === activeCategory;
    var urgOk = activeUrgency === 'all' || item.urgency === activeUrgency;
    var srcOk = !activeSource || item.source.indexOf(activeSource) >= 0;
    return catOk && urgOk && srcOk;
  });
  container.innerHTML = filtered.map(function(item, idx) {
    var col = CAT_COLORS[item.cat] || '#999';
    var chartBadge = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var html = '<div class="card" data-id="' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">' + (idx + 1) + '</span>';
    html += '<span class="urg">' + urgLabel(item.urgency) + '</span>';
    html += '<span class="src-badge" style="background:' + col + '">' + item.source.split(' / ')[0].split(' (')[0] + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartBadge) html += '<span class="chart-badge">' + chartBadge + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '</div>';
    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="angle-block" style="border-color:' + col + ';background:' + col + '18">';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-text">' + item.angle + '</div>';
    html += '</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box tweet-a"><div class="tweet-label">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box tweet-b"><div class="tweet-label">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0) {
      html += '<div class="charts-line' + (item.charts.hot ? ' hot-chart' : '') + '">';
      html += (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s): ' + item.charts.desc;
      html += '</div>';
    }
    html += '<div class="link-line"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
    return html;
  }).join('');
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function buildFilters() {
  // Category filters
  var cats = {};
  ITEMS.forEach(function(i) { cats[i.cat] = (cats[i.cat] || 0) + 1; });
  var catBar = document.getElementById('cat-filters');
  var allPill = '<span class="pill pill-all active" onclick="filterCat(\'all\', this)">All (' + ITEMS.length + ')</span>';
  var catPills = Object.keys(cats).map(function(c) {
    var col = CAT_COLORS[c] || '#999';
    return '<span class="pill" style="--col:' + col + '" onclick="filterCat(\'' + c + '\', this)">' + c + ' (' + cats[c] + ')</span>';
  }).join('');
  catBar.innerHTML = allPill + catPills;

  // Urgency filters
  var acts = ITEMS.filter(function(i) { return i.urgency === 'act'; }).length;
  var deeps = ITEMS.filter(function(i) { return i.urgency === 'deep'; }).length;
  var watches = ITEMS.filter(function(i) { return i.urgency === 'watch'; }).length;
  var urgBar = document.getElementById('urg-filters');
  urgBar.innerHTML = '<span class="pill pill-urgency active" onclick="filterUrg(\'all\', this)">All urgency</span>' +
    '<span class="pill pill-urgency" onclick="filterUrg(\'act\', this)">🔴 Act Now (' + acts + ')</span>' +
    '<span class="pill pill-urgency" onclick="filterUrg(\'deep\', this)">🔵 Deep (' + deeps + ')</span>' +
    '<span class="pill pill-urgency" onclick="filterUrg(\'watch\', this)">🟡 Watch (' + watches + ')</span>';
}

function filterCat(cat, el) {
  activeCategory = cat;
  activeSource = null;
  document.querySelectorAll('#cat-filters .pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  if (el.classList.contains('pill-all')) {
    el.style.background = '';
    el.style.borderColor = '';
    el.style.color = '';
  } else {
    var col = CAT_COLORS[cat] || '#999';
    el.style.background = col;
    el.style.borderColor = col;
    el.style.color = '#fff';
  }
  renderCards();
}

function filterUrg(urg, el) {
  activeUrgency = urg;
  document.querySelectorAll('#urg-filters .pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.borderColor = '';
    p.style.color = '';
  });
  el.classList.add('active');
  el.style.background = '#555';
  el.style.borderColor = '#555';
  el.style.color = '#fff';
  renderCards();
}

function filterBySrc(name) {
  activeSource = name;
  activeCategory = 'all';
  activeUrgency = 'all';
  document.querySelectorAll('#cat-filters .pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.borderColor = '';
    p.style.color = '';
  });
  document.getElementById('cat-filters').querySelector('.pill-all').classList.add('active');
  document.querySelectorAll('#urg-filters .pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.borderColor = '';
    p.style.color = '';
  });
  document.getElementById('urg-filters').querySelector('.pill-urgency').classList.add('active');
  document.getElementById('urg-filters').querySelector('.pill-urgency').style.background = '#555';
  document.getElementById('urg-filters').querySelector('.pill-urgency').style.color = '#fff';
  renderCards();
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function buildReport() {
  var el = document.getElementById('report-body');
  var html = '<p><strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<h3>Included Sources</h3><ul>';
  META.includedSources.forEach(function(s) {
    html += '<li><span class="src-link" onclick="filterBySrc(\'' + s.name.split(' / ')[0] + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items > 1 ? 's' : '') + '</li>';
  });
  html += '</ul><h3>Skipped Sources</h3><ul>';
  META.skippedSources.forEach(function(s) {
    html += '<li><strong>' + s.name + '</strong>: ' + s.reason + '</li>';
  });
  html += '</ul>';
  el.innerHTML = html;
}

function init() {
  document.getElementById('item-count').textContent = ITEMS.length;
  document.getElementById('src-count').textContent = META.includedSources.length;
  buildFilters();
  renderCards();
  buildReport();
  // Initialize first urgency pill style
  var firstUrgPill = document.querySelector('#urg-filters .pill-urgency');
  if (firstUrgPill) {
    firstUrgPill.style.background = '#555';
    firstUrgPill.style.borderColor = '#555';
    firstUrgPill.style.color = '#fff';
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
