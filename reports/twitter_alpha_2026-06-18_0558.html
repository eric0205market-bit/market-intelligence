<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"date":"2026-06-18 05:20 UTC","summary":"**Warsh's Hawkish Debut Dominates:** Kevin Warsh chaired his first FOMC meeting and dropped forward guidance entirely — July hike odds jumped to 38% via SOFR futures. The committee was hawkish even if Warsh himself read as neutral; the 2yr popped +9bps while the long bond fell -3bps, flattening the curve. Multiple traders closed risk into the long weekend, though contrarians note equities may end exactly where they started.\n\n**US-Iran MoU Signed Digitally:** JavierBlas broke the news that both presidents signed the agreement digitally tonight; the previously-scheduled Geneva ceremony for Friday is cancelled though delegations still meet. DCinvestor reads this as Trump laying groundwork for an unprecedented Gulf-Iran economic cooperation framework — possibly the most significant geopolitical repositioning since Camp David.\n\n**STRC Depegs to $88.88:** MicroStrategy's preferred STRC traded at $88.88, triggering heated debate about the mechanism. DonAlt calls it \"the worst ponzi I've ever seen\" as Saylor's reflexive loop breaks down. thedefivillain notes STRC vs SATA mispricing creates an explicit arb, while udiWertheimer argues everything crypto-related revolves around Saylor's ability to raise capital — which he's now losing.\n\n**Fable 5 Ban Fallout & AI Structural:** garrytan calculates $12M/hour in productivity destroyed by the Fable 5 export ban. laurashin amplifies the legal slippery-slope argument: if no statutory basis is required to ban a model, the same authority reaches any US-based API or DeFi protocol. Meanwhile sama announced Noam Shazeer — Google's Transformer co-author — is joining OpenAI, and cryptopunk7213 flags Unreal Engine 5.8 shipping today with experimental MCP server support.\n\n**Macro Framing:** RayDalio posts a formal warning: \"we are on the brink\" entering the 2026-2028 window with $7T spending vs $5T revenue and declining demand for Treasuries. jvisserlabs notes hyperscalers continue to see multiple compression as the funding side of AI rotation. saxena_puru flags hyperscaler capex YoY growth will peak this year — stocks peak when the best is discounted.","events":[{"title":"Warsh Debut — Forward Guidance Dropped, July Hike Odds at 38%","category":"macro","description":"Kevin Warsh's first FOMC meeting ended guidance-free. SOFR curve priced a hike; 2yr yields +9bps, long bond -3bps. Most active discussion thread of the batch.","items":[{"author":"Fullcarry","text":"July FOMC is now ALIVE.... hike odds 38%","tweet_url":"https://x.com/Fullcarry/status/2067342203635032333","images":[],"created_at":"2026-06-17T20:22:00Z"},{"author":"saxena_puru","text":"FOMC summary: - Fed leaves the FFR unchanged - 9 out of 18 officials expect at least one hike in 2026 - PCE inflation not seen returning to 2% target until '28","tweet_url":"https://x.com/saxena_puru/status/2067312576560607524","images":[],"created_at":"2026-06-17T18:25:00Z"},{"author":"fejau_inc","text":"For years now, the actual rate change announced at every FOMC meeting did not matter. By the time the meeting occurred, the move was priced into the SOFR curve weeks in advance. The only exception was September 2024 when Powell surprised with 50bps. SOFR futures have been priced for a rate hike by end of year for weeks now.","tweet_url":"https://x.com/fejau_inc/status/2067352890507972709","images":[],"created_at":"2026-06-17T21:05:00Z"},{"author":"EconguyRosie","text":"Post-Fed, the 2-year T-note yield has popped +9 basis points while the long bond has come down -3 basis points. The bond market's way of telling the Fed that its hawkish tone will prove to be a policy blunder. Flatter yield curves = weaker growth and a nail driven into the risk-on trade.","tweet_url":"https://x.com/EconguyRosie/status/2067322109383131453","images":[],"created_at":"2026-06-17T19:02:00Z"},{"author":"dampedspring","text":"He was neutral. The committee was hawkish. SOFR curve is evidence of what markets perception was — NOT equities. Unanimous forward guidance without dissent, extended hiking/cutting cycles, real QE/QT are valuable tools when policy is far from neutral. None of them are useful when close to neutral.","tweet_url":"https://x.com/dampedspring/status/2067407287560311081","images":[],"created_at":"2026-06-18T00:41:00Z"},{"author":"krugermacro","text":"Warsh: 'Markets perform best when reacting to incoming data.' Price action around events is going to change dramatically. The FOMC press conference will cease to be the most volatile event in financial markets. It will now be all about the FOMC statement and economic data releases. Buying vol around CPI and NFP for the next three months should be free money.","tweet_url":"https://x.com/krugermacro/status/2067404242869244125","images":[],"created_at":"2026-06-18T00:29:00Z"}]},{"title":"US-Iran MoU Signed Digitally — Geneva Ceremony Cancelled","category":"geopolitics","description":"Both presidents signed the MoU digitally tonight per Iranian FM spokesman on state TV. Delegations still meet in Geneva but no signing ceremony.","items":[{"author":"JavierBlas","text":"BREAKING: The US-Iran MoU was signed digitally by the presidents of both nations tonight, Iranian Foreign Ministry spokesman says on state television. The previously scheduled signing ceremony in Geneva for Friday won't go ahead anymore, although the delegations will still meet.","tweet_url":"https://x.com/JavierBlas/status/2067366563573879187","images":[],"created_at":"2026-06-17T21:59:00Z"},{"author":"DCinvestor","text":"Trump is putting all his cards on the table — saying he couldn't keep Hormuz closed any longer without global catastrophe, that every time he talked peace the stock market jumped, and that Netanyahu/Israel are overplaying their hand in Lebanon. He's giving Iran almost everything they could want and is possibly laying groundwork for Gulf countries to economically cooperate with Iran in an unprecedentedly historic way.","tweet_url":"https://x.com/DCinvestor/status/2067423159536730547","images":[],"created_at":"2026-06-18T01:44:00Z"},{"author":"stevehou","text":"The war was practically over by the end of March, a month after it started. What ensued was a bunch of posturing and agonizing to look like we won even though we lost. Handing the Strait of Hormuz to Iran to let them charge a reasonable toll — seems like that's what happened.","tweet_url":"https://x.com/stevehou/status/2067439229613867292","images":[],"created_at":"2026-06-18T02:48:00Z"},{"author":"zriboua","text":"They always agree, they will always say yes, but they never ever follow through.","tweet_url":"https://x.com/zriboua/status/2067425266071200212","images":[],"created_at":"2026-06-18T01:52:00Z"}]},{"title":"STRC Depegs to $88.88 — Mechanism Debate Intensifies","category":"crypto","description":"MicroStrategy's preferred STRC stock closed at $88.88 (-11.5% from $100 par), with SATA still at par. Debate rages on whether this is the unwind scenario.","items":[{"author":"rektmando","text":"STRC closed at $88.88","tweet_url":"https://x.com/rektmando/status/2067337078820471029","images":[],"created_at":"2026-06-17T20:02:00Z"},{"author":"DonAlt","text":"So do I get this right — Saylor buys BTC, issues STRC, buys more BTC as market goes up, average buy price to infinity, eventually market goes down, STRC depegs, Saylor sells BTC below his average to repeg STRC, market moves lower, sells even more BTC... I'm a duck but even to me this sounds very retarded. If I understand this correctly it's the worst ponzi I've ever seen.","tweet_url":"https://x.com/DonAlt/status/2067406037850943942","images":[],"created_at":"2026-06-18T00:36:00Z"},{"author":"thedefivillain","text":"STRC is trading at $89 while SATA is still at $100. Main explanation is that the marginal buyer differs significantly between a $700M mcap pref and a $10bn mcap pref — but that's a clear mispricing. If you think STRC is correctly priced, you can short SATA risk-free.","tweet_url":"https://x.com/thedefivillain/status/2067383105510342696","images":[],"created_at":"2026-06-17T23:05:00Z"},{"author":"udiWertheimer","text":"I've been saying for a year now that everything crypto-related revolves around Saylor's situation — both when it was bullish and now when it's bearish. His situation is reflexive. When he was able to raise infinite capital it was bullish; when he lost that ability it is bearish.","tweet_url":"https://x.com/udiWertheimer/status/2067373759120507164","images":[],"created_at":"2026-06-17T22:28:00Z"}]},{"title":"Fable 5 Export Ban — $12M/Hour Productivity Loss + Legal Slippery Slope","category":"ai","description":"garrytan quantifies the ban cost at $12M/hour; laurashin escalates to the broader legal precedent: same authority could reach any US-based API or DeFi protocol.","items":[{"author":"garrytan","text":"Rough estimate on $ productivity lost by Fable 5 ban: $12M per hour. Frontier AI-coding daily actives mid-2026: 5M devs. Fully-loaded cost: $90/hr. Work routed to Fable in 48hrs: 17.8%. Fable ~15% more productive. Effective throughput loss per dev = 17.8% x 15% ~2.7%. 2.7% x $90/hr = ~$2.40/dev/hr x 5M devs = $12M per working hour.","tweet_url":"https://x.com/garrytan/status/2067366749411176831","images":[],"created_at":"2026-06-17T22:00:00Z"},{"author":"laurashin","text":"Sam Enzer's argument on @bitsandbips: if export controls can reach Fable 5 with no disclosed statutory basis, the same authority can reach any US-based API or DeFi protocol.","tweet_url":"https://x.com/laurashin/status/2067456222811623430","images":[],"created_at":"2026-06-18T03:55:00Z"}]},{"title":"Noam Shazeer Joins OpenAI","category":"ai","description":"Sam Altman announces Google's Transformer co-author Noam Shazeer is joining OpenAI after 10 years of wanting to work together.","items":[{"author":"sama","text":"noam is one of the people I have most wanted to work with since the very beginning of openai. only took 10 years. i think it will be worth the wait!","tweet_url":"https://x.com/sama/status/2067427421083652131","images":[],"created_at":"2026-06-18T02:01:00Z"},{"author":"sama","text":"We offer no explanation as to why Noams are so good at AI; we attribute their success, as all else, to divine benevolence.","tweet_url":"https://x.com/sama/status/2067427678529974740","images":[],"created_at":"2026-06-18T02:02:00Z"}]},{"title":"Solana Flips Hyperliquid","category":"crypto","description":"beaniemaxi reports Solana has flipped Hyperliquid in volume/TVL metric; also notes crypto coordination is alive and well.","items":[{"author":"beaniemaxi","text":"Solana just flipped Hyperliquid. HYPE bulls in absolute shambles.","tweet_url":"https://x.com/beaniemaxi/status/2067382809124118977","images":[],"created_at":"2026-06-17T23:04:00Z"},{"author":"beaniemaxi","text":"Crypto cabal doesn't exist they say.","tweet_url":"https://x.com/beaniemaxi/status/2067429452661817616","images":[],"created_at":"2026-06-18T02:09:00Z"}]}],"insights":[{"author":"RayDalio","category":"macro","text":"I believe we are currently on the brink. We are entering a particularly risky period between the 2026 midterm election and the 2028 presidential election. The monetary situation is becoming increasingly threatening. The U.S. government currently spends $7 trillion while only taking in approximately $5 trillion — 40% overspending. The government has significant debt to finance while demand for that debt is falling.","tweet_url":"https://x.com/RayDalio/status/2067415948298969102","images":[],"is_thread":false,"created_at":"2026-06-18T01:15:00Z"},{"author":"krugermacro","category":"macro","text":"No more forward guidance from the Fed means Trump is now the market's supreme overlord. He has no more competition from the Fed's Chair. Buying vol around CPI and NFP for the next three months should be free money — price action around these events is going to change dramatically going forward.","tweet_url":"https://x.com/krugermacro/status/2067386270083592323","images":[],"is_thread":false,"created_at":"2026-06-17T23:17:00Z"},{"author":"RaoulGMI","category":"macro","text":"For me the big tell about Warsh is the focus on productivity growth. As long as he gets that, he is more likely to ease or hold pat into growth and even rising headline CPI — just as Greenspan did, as it should suppress PCE inflation. My guess: 'productivity' will be the key word markets learn to look out for.","tweet_url":"https://x.com/RaoulGMI/status/2067332756456018115","images":[],"is_thread":false,"created_at":"2026-06-17T19:45:00Z"},{"author":"jvisserlabs","category":"macro","text":"The hyperscalers continue to be the funding side of the rotation into AI names. Equal weight (GOOGL, META, MSFT, AMZN) relative to SPX breaks to lowest level since early 2024 — 2nd worst relative month in the last decade heading into end of quarter. The spenders continue to see multiple compression.","tweet_url":"https://x.com/jvisserlabs/status/2067324805880185206","images":[],"is_thread":false,"created_at":"2026-06-17T19:13:00Z"},{"author":"saxena_puru","category":"macro","text":"Hyperscaler capex YoY growth rate to peak this year. Stocks peak when the best has been discounted — worth keeping in mind. When growth decelerates next year, the related stocks will feel it.","tweet_url":"https://x.com/saxena_puru/status/2067449367947345931","images":[],"is_thread":false,"created_at":"2026-06-18T03:28:00Z"},{"author":"qthomp","category":"macro","text":"Warsh hinted numerous times at understanding this bifurcated economy, something Powell largely avoided. He vaguely mentioned 'rebalancing' via rate vs balance sheet transmission and unevenness on different groups. Tightening balance sheet by reducing footprint in Treasury market and duration would do a lot more for all of the Fed's goals than 25 or 50 bps in hikes. Also: Yen shorts back to highest since 2017, basically equivalent to positioning just before the 2024 carry unwind.","tweet_url":"https://x.com/qthomp/status/2067363944583340239","images":[],"is_thread":true,"created_at":"2026-06-17T21:49:00Z"},{"author":"TruthGundlach","category":"macro","text":"This is the first day in a long time AI is not the top story. It is the Fed.","tweet_url":"https://x.com/TruthGundlach/status/2067439786219159631","images":[],"is_thread":false,"created_at":"2026-06-18T02:50:00Z"},{"author":"cryptopunk7213","category":"ai","text":"Leopold Aschenbrenner's Anthropic investment is reportedly worth $7 billion — 20% of his entire portfolio. Initial investment was March 2025 at a $60B Anthropic valuation. That's a 15x markup to the current $965B val, bringing total fund AUM to $20B — on par with Ackman's Pershing Capital. The guy is 24 years old.","tweet_url":"https://x.com/cryptopunk7213/status/2067398118685995015","images":[],"is_thread":false,"created_at":"2026-06-18T00:04:00Z"},{"author":"cryptopunk7213","category":"ai","text":"Unreal Engine 5.8 ships today with experimental MCP server support. Imagine coming home from school, connecting your $20 Claude subscription and in ~10 mins playing a AAA quality game that never existed before. Millions of kids are about to unlock an entire universe of gaming — simulated worlds that adapt as you play and evolve as you feed the AI model more data.","tweet_url":"https://x.com/cryptopunk7213/status/2067456829035049204","images":[],"is_thread":false,"created_at":"2026-06-18T03:58:00Z"},{"author":"theallinpod","category":"ai","text":"OpenAI's CFO teases their first device (Jony Ive-designed, dropping late 2026/early 2027). Descriptors: 'Lovable, feels human, seamless, no thumbs, can talk to it, made for the post-iPhone Era.' CFO Sarah Friar: 'We're changing into a consumer substrate... by end of this year we will unveil it. I've seen it, I've tried it. When you use it you feel seen.'","tweet_url":"https://x.com/theallinpod/status/2067329577731359112","images":[],"is_thread":false,"created_at":"2026-06-17T19:32:00Z"},{"author":"AndreCronjeTech","category":"crypto","text":"FlyingTulip just passed $10M in deposits. $941k yield generated. $1.2M of FT already bought back and burned. All buyers in profit. PUT marketplace exceeding spot volume and settled premium 3-4%. Delta Neutral on ETH activated for ftUSD — forward projection puts APY ~9%, only dropping to ~6% post $20M TVL.","tweet_url":"https://x.com/AndreCronjeTech/status/2067370462191993187","images":[],"is_thread":false,"created_at":"2026-06-17T22:15:00Z"},{"author":"zriboua","category":"ai","text":"The more nebulous the task and the more expansive the scope of information the bot has to root through, the less useful it is. The more caged the model, the more reliable it is. Cages both filter out noise and concentrate output. The whole game is focusing its attention. [Via 'The Death of the Chatbot' essay]","tweet_url":"https://x.com/zriboua/status/2067332762604859463","images":[],"is_thread":false,"created_at":"2026-06-17T19:45:00Z"},{"author":"nicbstme","category":"ai","text":"Excited to receive Surface Laptop Ultra — 20-core NVIDIA Grace CPU and NVIDIA Blackwell RTX. A lot of AI inference will run locally in near future: voice commands, grammar checking, real-time transcription, meeting summaries, coding assistance, semantic search, image generation, translation, and personalized copilots that don't need to send every request to the cloud.","tweet_url":"https://x.com/nicbstme/status/2067367998370033981","images":[],"is_thread":false,"created_at":"2026-06-17T22:05:00Z"},{"author":"munster_gene","category":"tech","text":"The biggest takeaway from Cook's comments on pricing and Gurman's comments on the staggered iPhone release is that there is upside to FY27 gross margins.","tweet_url":"https://x.com/munster_gene/status/2067386047319650450","images":[],"is_thread":false,"created_at":"2026-06-17T23:16:00Z"},{"author":"ASvanevik","category":"crypto","text":"Try running this prompt in Nansen AI: 'Look at all my trading history. What are my top areas of improvement? What am :"https://x.com/MelMattison1/status/2067333835197399321","images":[],"is_thread":false,"created_at":"2026-06-17T19:49:00Z"},{"author":"krugermacro","category":"macro","text":"My view is the war is over, and there will be no hikes. Many FOMC members are looking in the rear mirror — they want to see inflation data come down. But given the war is over (its kinetic phase at least), inflation has already peaked, and hikes may not be appropriate. Warsh has criticized the Fed for data dependence; he wants less forward guidance but more forward thinking.","tweet_url":"https://x.com/krugermacro/status/2067313780099588593","images":[],"is_thread":false,"created_at":"2026-06-17T18:29:00Z"},{"author":"Fullcarry","category":"macro","text":"Word to the leveraged wise. Need to reduce position size for Warsh's Fed. I will give him a pass since it was his first presser but I am not sure I know anything about him and/or how he thinks about monetary policy and the economy. I endorse eliminating forward guidance but he still needs to articulate his reaction function.","tweet_url":"https://x.com/Fullcarry/status/2067344042682097837","images":[],"is_thread":false,"created_at":"2026-06-17T20:30:00Z"},{"author":"lord_fed","category":"macro","text":"Everyone is saying that Warsh is a breath of fresh air. Am I the only one thinking he comes across as extremely arrogant?","tweet_url":"https://x.com/lord_fed/status/2067334463923658963","images":[],"is_thread":false,"created_at":"2026-06-17T19:52:00Z"},{"author":"Fiskantes","category":"ai","text":"One year deep in actual capable models, with every non-dev vibecoding and devs getting 10x efficiency gains — we would have some really cool new apps already. Companies delivering big new value to customers. We should be in a completely new world. Not sure if I am just out of touch, but I don't feel like our reality changed that much on the value unlock front. None of the crypto roadmaps materially compressed.","tweet_url":"https://x.com/Fiskantes/sta s year.","tweet_url":"https://x.com/MelMattison1/status/2067333835197399321","images":[],"is_thread":false,"created_at":"2026-06-17T19:49:00Z"},{"author":"krugermacro","category":"positioning","text":"Buying vol around CPI and NFP for the next three months should be free money — the FOMC press conference will cease to be the most volatile event in financial markets. It will now be all about the FOMC statement and economic data releases.","tweet_url":"https://x.com/krugermacro/status/2067404242869244125","images":[],"is_thread":false,"created_at":"2026-06-18T00:29:00Z"},{"author":"qthomp","category":"positioning","text":"We will soon find out how much policymakers care about 160 USDJPY. If there were ever a time to send a message, it'd be now with record Yen shorts built up — Yen shorts are back to highest since 2017, basically equivalent to positioning just before the 2024 carry unwind.","tweet_url":"https://x.com/qthomp/status/2067340536197816577","images":[],"is_thread":false,"created_at":"2026-06-17T20:16:00Z"},{"author":"thedefivillain","category":"crypto","text":"STRC is trading at $89 while SATA is still at $100 — that's a clear mispricing driven by marginal buyer differences ($700M vs $10B mcap pref). If you think STRC is correctly priced, you can short SATA risk-free. STRC is flawed by design: no way to peg an asset at $100 with a dividend that moves so slowly and such volatile collateral.","tweet_url":"https://x.com/thedefivillain/status/2067383105510342696","images":[],"is_thread":false,"created_at":"2026-06-17T23:05:00Z"},{"author":"hooeem","category":"crypto","text":"$SPCX for dummies: SpaceX, Starlink, xAI, X, and AI infra. The moat is real. The float is tiny. Options, attention, and passive flows. That tiny float prices the whole FDV — creates major pumpability. Elon is the ultimate KOL. X is part of the disclosure/attention machine. Starlink is the current profit engine. AI has the biggest upside and biggest risk.","tweet_url":"https://x.com/hooeem/st // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;''"':'&quot;',"'"'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet &#8594;</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet &#8594;</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">&#8212;</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">&#9658;</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
