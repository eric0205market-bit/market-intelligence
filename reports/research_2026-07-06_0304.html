const CAT_COLORS = {
  macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27", "AI/infra":"#1d9e75",
  crypto:"#7f77dd", geopolitics:"#d85a30", energy:"#f97316", tech:"#06b6d4",
  gold:"#d4a017", culture:"#ec4899", labor:"#8b5cf6", regulation:"#64748b",
  science:"#14b8a6", venture:"#84cc16"
};
const URG_LABEL = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URG_EMOJI = { act: "🔴", deep: "🔵", watch: "🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

function buildFilters(){
  const catCounts = {};
  ITEMS.forEach(function(i){ catCounts[i.cat] = (catCounts[i.cat]||0)+1; });
  const catWrap = document.getElementById("catFilters");
  let html = '<button class="pill' + (activeCat==="all"?" active":"") + '" style="' + (activeCat==="all"?"background:#333":"") + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(function(cat){
    const color = CAT_COLORS[cat] || "#999";
    const isActive = activeCat === cat;
    html += '<button class="pill' + (isActive?" active":"") + '" style="' + (isActive ? ("background:"+color+";border-color:"+color) : ("color:"+color+";border-color:"+color)) + '" onclick="setCat(' + JSON.stringify(cat) + ')">' + esc(cat) + ' (' + catCounts[cat] + ')</button>';
  });
  catWrap.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(function(i){ urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1; });
  const urgWrap = document.getElementById("urgFilters");
  let uhtml = '<button class="pill' + (activeUrg==="all"?" active":"") + '" style="' + (activeUrg==="all"?"background:#333":"") + '" onclick="setUrg(\'all\')">All</button>';
  ["act","deep","watch"].forEach(function(u){
    if(!urgCounts[u]) return;
    const isActive = activeUrg === u;
    uhtml += '<button class="pill' + (isActive?" active":"") + '" style="' + (isActive?"background:#333":"") + '" onclick="setUrg(' + JSON.stringify(u) + ')">' + URG_LABEL[u] + ' (' + urgCounts[u] + ')</button>';
  });
  urgWrap.innerHTML = uhtml;
}

function setCat(cat){ activeCat = cat; activeSrc = null; buildFilters(); renderCards(); }
function setUrg(urg){ activeUrg = urg; activeSrc = null; buildFilters(); renderCards(); }

function filterBySrc(name){
  activeCat = "all"; activeUrg = "all"; activeSrc = name;
  buildFilters();
  renderCards();
  const matching = ITEMS.filter(function(i){ return i.source.indexOf(name) !== -1; });
  setTimeout(function(){
    matching.forEach(function(i){
      const el = document.getElementById("card-" + i.id);
      if(el) el.classList.add("open");
    });
    if(matching.length){
      const first = document.getElementById("card-" + matching[0].id);
      if(first) first.scrollIntoView({behavior:"smooth", block:"start"});
    }
  }, 30);
}

function toggleCard(id){
  const el = document.getElementById("card-" + id);
  el.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderCards(){
  let list = ITEMS;
  if(activeCat !== "all") list = list.filter(function(i){ return i.cat === activeCat; });
  if(activeUrg !== "all") list = list.filter(function(i){ return i.urgency === activeUrg; });
  if(activeSrc) list = list.filter(function(i){ return i.source.indexOf(activeSrc) !== -1; });

  const wrap = document.getElementById("cards");
  const empty = document.getElementById("emptyMsg");
  if(!list.length){
    wrap.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  wrap.innerHTML = list.map(function(item){
    const color = CAT_COLORS[item.cat] || "#999";
    const chartFlag = item.charts && item.charts.count > 0 ? (item.charts.hot ? " 🔥" : " 📊") : "";
    const chartsBoxHtml = (item.charts && (item.charts.count > 0 || item.charts.desc)) ?
      '<div class="charts-box' + (item.charts.hot ? " hot" : "") + '">' +
        (item.charts.hot ? "🔥 CHART WORTH SAVING — " : (item.charts.count > 0 ? "📊 " + item.charts.count + " chart(s) — " : "")) +
        esc(item.charts.desc) +
      '</div>' : '';

    return (
      '<div class="card" id="card-' + item.id + '">' +
        '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
          '<span class="idx">#' + item.id + '</span>' +
          '<span class="urg">' + URG_EMOJI[item.urgency] + '</span>' +
          '<span class="src-badge" style="background:' + color + '">' + esc(item.source) + '</span>' +
          '<span class="cat-tag">' + esc(item.cat) + '</span>' +
          '<span class="chart-flag">' + chartFlag + '</span>' +
          '<span class="title">' + esc(item.title) + '</span>' +
          '<span class="chevron">▶</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="section-label">The Idea</div>' +
          '<div class="idea-text">' + esc(item.idea) + '</div>' +
          '<div class="section-label">My Angle</div>' +
          '<div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '10;">' + esc(item.angle) + '</div>' +
          '<div class="section-label">Tweets</div>' +
          '<div class="tweets">' +
            '<div class="tweet-col">' +
              '<div class="tweet-label a">TWEET A</div>' +
              '<div class="tweet-box">' + esc(item.tweetA) + '</div>' +
              '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
            '</div>' +
            '<div class="tweet-col">' +
              '<div class="tweet-label b">TWEET B</div>' +
              '<div class="tweet-box">' + esc(item.tweetB) + '</div>' +
              '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
            '</div>' +
          '</div>' +
          chartsBoxHtml +
          '<div class="link-row"><a href="' + esc(item.link) + '" target="_blank" rel="noopener">↗ Read full article</a></div>' +
        '</div>' +
      '</div>'
    );
  }).join("");
}

function renderReport(){
  document.getElementById("headerMeta").textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.emailsRead + " emails";

  const incRows = META.includedSources.map(function(s){
    return '<div><span class="src-link" onclick="filterBySrc(' + JSON.stringify(s.name) + ')">' + esc(s.name) + '</span> — ' + s.count + ' item(s)</div>';
  }).join("");

  const skipRows = META.skippedSources.map(function(s){
    return '<div class="skip-item">' + esc(s.name) + ' — ' + esc(s.reason) + '</div>';
  }).join("");

  document.getElementById("reportBody").innerHTML =
    '<h4>Time Window</h4>' +
    '<div>' + esc(META.windowStart) + ' → ' + esc(META.windowEnd) + '. Emails outside this window were not processed.</div>' +
    '<h4>Included Sources (click to filter)</h4>' + incRows +
    '<h4>Skipped Sources</h4>' + skipRows +
    '<h4>Totals</h4>' +
    '<div>Emails in window: ' + META.emailsInWindow + ' · Emails read: ' + META.emailsRead + ' · Items extracted: ' + META.itemsExtracted + '</div>';
}

buildFilters();
renderCards();
renderReport();
</script>
