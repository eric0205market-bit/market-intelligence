function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function toggleReport() {
  var rc = document.getElementById('reportCard');
  rc.classList.toggle('open');
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? null : name;
  activeCat = 'all';
  activeUrg = 'all';
  updateCatPills();
  updateUrgPills();
  renderCards();
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  updateCatPills();
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  updateUrgPills();
  renderCards();
}

function updateCatPills() {
  document.querySelectorAll('.filter-pill').forEach(function(p) {
    var v = p.dataset.cat;
    p.classList.toggle('active', v === activeCat);
    if (p.classList.contains('active') && v !== 'all') {
      p.style.background = CAT_COLORS[v] || '#333';
      p.style.borderColor = CAT_COLORS[v] || '#333';
    } else if (p.classList.contains('active')) {
      p.style.background = '#333';
      p.style.borderColor = '#333';
    } else {
      p.style.background = '#fff';
      p.style.borderColor = '#ccc';
      p.style.color = '#666';
    }
  });
}

function updateUrgPills() {
  document.querySelectorAll('.urg-pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.urg === activeUrg);
  });
}

function visibleItems() {
  return ITEMS.filter(function(item) {
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    var srcOk = !activeSrc || item.source.indexOf(activeSrc) >= 0;
    return catOk && urgOk && srcOk;
  });
}

function renderCards() {
  var visible = visibleItems();
  var html = '';
  visible.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var chartHtml = '';
    if (item.charts && item.charts.count > 0) {
      var cls = item.charts.hot ? 'chart-note hot' : 'chart-note';
      var hotLabel = item.charts.hot ? ' 🔥 CHART WORTH SAVING' : '';
      chartHtml = '<div class="' + cls + '">📊 ' + item.charts.count + ' chart(s)' + hotLabel + (item.charts.desc ? ': ' + escHtml(item.charts.desc) : '') + '</div>';
    }
    var chartIcon = (item.charts && item.charts.count > 0) ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    html += '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="card-num">' + item.id + '</span>' +
        '<span class="urgency-emoji">' + (URG_EMOJI[item.urgency] || '') + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + escHtml(item.source) + '</span>' +
        '<span class="cat-tag">' + escHtml(item.cat) + '</span>' +
        (chartIcon ? '<span class="chart-icon">' + chartIcon + '</span>' : '') +
        '<span class="card-title">' + escHtml(item.title) + '</span>' +
        '<span class="chevron">▼</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + escHtml(item.idea) + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-box" style="border-color:' + color + ';background:' + hexToRgba(color, 0.05) + '">' + escHtml(item.angle) + '</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + escHtml(item.tweetA) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ','a')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + escHtml(item.tweetB) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ','b')">📋 Copy</button>' +
          '</div>' +
        '</div>' +

        (item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '') +

  document.getElementById('itemCount').textContent = 'Showing ' + visible.length + ' of ' + ITEMS.length + ' items';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function buildFilters() {
  // Category counts
  var catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  var catBar = document.getElementById('catFilters');
  var allPill = '<button class="filter-pill active" data-cat="all" onclick="setCat('all')" style="background:#333;border-color:#333;color:#fff">All (' + ITEMS.length + ')</button>';
  var pills = Object.keys(catCounts).sort().map(function(cat) {
    var color = CAT_COLORS[cat] || '#888';
    return '<button class="filter-pill" data-cat="' + cat + '" onclick="setCat('' + cat + '')" style="border-color:' + color + ';color:' + color + '">' + cat + ' (' + catCounts[cat] + ')</button>';
  }).join('');
  catBar.innerHTML = allPill + pills;

  // Urgency counts
  var urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  var urgBar = document.getElementById('urgFilters');
  var urgOrder = ['actnow','deep','watch'];
  var urgPills = '<button class="urg-pill active" data-urg="all" onclick="setUrg('all')">All (' + ITEMS.length + ')</button>';
  urgOrder.forEach(function(u) {
    if (urgCounts[u]) {
      urgPills += '<button class="urg-pill" data-urg="' + u + '" onclick="setUrg('' + u + '')">' + URG_MAP[u] + ' (' + urgCounts[u] + ')</button>';
    }
  });
  urgBar.innerHTML = urgPills;
}

function buildReport() {
  var rb = document.getElementById('reportBody');
  var html = '<div class="report-row"><strong>Time window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</div>' +
    '<div class="report-row"><strong>Emails in window:</strong> ' + META.emailsInWindow + '</div>' +
    '<div class="report-row"><strong>Emails read:</strong> ' + META.emailsRead + '</div>' +
    '<div class="report-row"><strong>Items extracted:</strong> ' + META.itemsExtracted + '</div>' +
    '<div class="report-row" style="margin-top:10px"><strong>Included sources:</strong></div>';
  META.includedSources.forEach(function(s) {
    html += '<div style="padding-left:20px;margin-bottom:3px"><span class="source-link" onclick="filterBySrc('' + s.name.replace(/'/g,"\'") + '')">' + s.name + '</span> — ' + s.items + ' item(s)</div>';
  });
  html += '<div class="report-row" style="margin-top:10px"><strong>Skipped sources:</strong></div>';
  META.skippedSources.forEach(function(s) {
    html += '<div style="padding-left:20px;margin-bottom:3px" class="skipped-source">' + s.name + ' — ' + s.reason + '</div>';
  });
  rb.innerHTML = html;

  document.getElementById('headerMeta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsInWindow + ' emails';
}

function init() {
  buildFilters();
  buildReport();
  renderCards();
}

init();
</script>
</body>
</html>
