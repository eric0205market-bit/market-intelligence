function getUrgencyEmoji(u) {
  if (u === "red") return "🔴";
  if (u === "deep") return "🔵";
  return "🟡";
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function filterBySrc(srcName) {
  currentFilters.cat = 'all';
  currentFilters.urg = 'all';
  currentFilters.src = srcName;
  renderCards();
  updatePills();
}

var currentFilters = { cat: 'all', urg: 'all', src: null };

function setCat(cat) {
  currentFilters.cat = cat;
  currentFilters.src = null;
  renderCards();
  updatePills();
}

function setUrg(urg) {
  currentFilters.urg = urg;
  currentFilters.src = null;
  renderCards();
  updatePills();
}

function updatePills() {
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.cat === currentFilters.cat);
  });
  document.querySelectorAll('.pill[data-urg]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.urg === currentFilters.urg);
  });
}

function renderCards() {
  var filtered = ITEMS.filter(function(item) {
    var catOk = currentFilters.cat === 'all' || item.cat === currentFilters.cat;
    var urgOk = currentFilters.urg === 'all' || item.urgency === currentFilters.urg;
    var srcOk = !currentFilters.src || item.source.indexOf(currentFilters.src) !== -1;
    return catOk && urgOk && srcOk;
  });

  var container = document.getElementById('cards-container');
  container.innerHTML = '';

  filtered.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var chartFlag = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var html = '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + item.id + '</span>' +
        '<span class="urgency">' + getUrgencyEmoji(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-tag">' + item.cat + '</span>' +
        (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="border-color:' + color + '; background:' + color + '11">' + item.angle + '</div>' +
        '<div class="section-label">Tweets</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>';

    if (item.charts.count > 0) {
      html += '<div class="chart-block' + (item.charts.hot ? ' hot' : '') + '">' +
        (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 Charts (' + item.charts.count + ') — ') +
        item.charts.desc +
      '</div>';
    }

    if (item.link) {
      html += '<div class="link-block"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    }

    html += '</div></div>';
    container.innerHTML += html;
  });
}

function init() {
  var catCounts = { all: ITEMS.length };
  var urgCounts = { all: ITEMS.length, red: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
    urgCounts[item.urgency] = (urgCounts[item.urgency] || 0) + 1;
  });

  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · Window: ' + META.windowStart + ' → ' + META.windowEnd +
    ' · ' + META.emailsRead + '/' + META.emailsInWindow + ' emails read · ' + META.itemsExtracted + ' items';

  var catContainer = document.getElementById('cat-filters');
  var cats = ['all'].concat(Object.keys(catCounts).filter(function(c) { return c !== 'all'; }).sort());
  cats.forEach(function(cat) {
    var p = document.createElement('span');
    p.className = 'pill' + (cat === 'all' ? ' active' : '');
    p.dataset.cat = cat;
    p.textContent = (cat === 'all' ? 'All' : cat) + ' (' + (catCounts[cat] || 0) + ')';
    p.onclick = function() { setCat(cat); };
    catContainer.appendChild(p);
  });

  var urgContainer = document.getElementById('urg-filters');
  [['all', 'All'], ['red', '🔴 Act Now'], ['deep', '🔵 Deep'], ['watch', '🟡 Watch']].forEach(function(pair) {
    var p = document.createElement('span');
    p.className = 'pill' + (pair[0] === 'all' ? ' active' : '');
    p.dataset.urg = pair[0];
    p.textContent = pair[1] + ' (' + (urgCounts[pair[0]] || 0) + ')';
    p.onclick = function() { setUrg(pair[0]); };
    urgContainer.appendChild(p);
  });

  var reportHtml = '<p><strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '</p>' +
    '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>' +
    '<p style="margin-top:10px"><strong>Included sources:</strong></p><ul style="padding-left:16px">';
  META.includedSources.forEach(function(s) {
    var shortName = s.name.split('/')[0].trim();
    reportHtml += '<li><a onclick="filterBySrc(\'' + shortName + '\')">' + s.name + '</a> — ' + s.items + ' items</li>';
  });
  reportHtml += '</ul>';
  if (META.skippedSources.length > 0) {
    reportHtml += '<p style="margin-top:10px"><strong>Skipped:</strong></p><ul style="padding-left:16px">';
    META.skippedSources.forEach(function(s) {
      reportHtml += '<li>' + s.name + ' — ' + s.reason + '</li>';
    });
    reportHtml += '</ul>';
  } else {
    reportHtml += '<p style="margin-top:8px; color:#888">No sources skipped.</p>';
  }
  document.getElementById('report-body').innerHTML = reportHtml;

  renderCards();
}

window.onload = init;
