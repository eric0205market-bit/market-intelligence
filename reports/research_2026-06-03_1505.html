// COPY FUNCTION — reads from ITEMS array, never from onclick attribute
// ——————————————————————————————————————————————
function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

var activeUrg = 'all';

// ——————————————————————————————————————————————
// BUILD FILTERS
// ——————————————————————————————————————————————
function buildFilters() {
  var cats = ['all'];
  ITEMS.forEach(function(i) { if (!cats.includes(i.cat)) cats.push(i.cat); });
  var cf = document.getElementById('cat-filters');
  cats.forEach(function(c) {
    var count = c === 'all' ? ITEMS.length : ITEMS.filter(function(i){ return i.cat === c; }).length;
    var p = document.createElement('span');
    p.className = 'pill' + (c === 'all' ? ' active' : '');
    p.textContent = c + ' (' + count + ')';
    p.dataset.cat = c;
    if (c !== 'all' && CAT_COLORS[c]) {
      p.style.borderColor = CAT_COLORS[c];
      if (c === activeCat) { p.style.background = CAT_COLORS[c]; p.style.color = '#fff'; }
    } else if (c === 'all' && activeCat === 'all') {
      p.style.background = '#444'; p.style.color = '#fff'; p.style.borderColor = '#444';
    }
    p.onclick = function() { activeCat = c; activeSrc = null; applyFilters(); buildFilters(); buildUrgFilters(); };
    cf.appendChild(p);
  });

  var uf = document.getElementById('urg-filters');
  var urgs = [
    { key: 'all', label: 'All' },
    { key: 'act-now', label: '🔴 Act Now' },
    { key: 'deep', label: '🔵 Deep' },
    { key: 'watch', label: '🟡 Watch' }
  ];
  uf.innerHTML = '<span class="filter-label">Urgency:</span>';
  urgs.forEach(function(u) {
    var count = u.key === 'all' ? ITEMS.length : ITEMS.filter(function(i){ return i.urgency === u.key; }).length;
    var p = document.createElement('span');
    p.className = 'pill' + (u.key === activeUrg ? ' active' : '');
    p.textContent = u.label + ' (' + count + ')';
    if (u.key === activeUrg) { p.style.background = '#444'; p.style.color = '#fff'; p.style.borderColor = '#444'; }
    p.onclick = function() { activeUrg = u.key; activeSrc = null; applyFilters(); buildFilters(); buildUrgFilters(); };
    uf.appendChild(p);
  });
}
function buildUrgFilters() { /* merged into buildFilters */ }

// ——————————————————————————————————————————————
// APPLY FILTERS
// ——————————————————————————————————————————————
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  cards.forEach(function(card) {
    var id = parseInt(card.dataset.id);
    var item = ITEMS.find(function(i){ return i.id === id; });
    var show = true;
    if (activeCat !== 'all' && item.cat !== activeCat) show = false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) show = false;
    if (activeSrc && item.source.indexOf(activeSrc) === -1) show = false;
    card.classList.toggle('hidden', !show);
    if (activeSrc && show) {
      var body = card.querySelector('.card-body');
      if (body) body.classList.add('open');
    }
  });
  buildFilters();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  applyFilters();
}

function toggleCard(id) {
  var body = document.querySelector('#card-body-' + id);
  if (body) body.classList.toggle('open');
}

function urgEmoji(u) {
  if (u === 'act-now') return '🔴';
  if (u === 'watch') return '🟡';
  return '🔵';
}

function init() {

  ITEMS.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var chartHtml = '';
    if (item.charts && item.charts.count > 0) {
      var hotClass = item.charts.hot ? 'hot-chart' : '';
      chartHtml = '<div class="charts-info ' + hotClass + '">' +
        (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 Charts (' + item.charts.count + '): ') +
        item.charts.desc + '</div>';
    }
    var chartIcon = item.charts && item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var linkHtml = item.link ? '<a class="read-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '';

    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;
    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="card-num">' + String(item.id).padStart(2,'0') + '</span>' +
        '<span>' + urgEmoji(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + item.cat + '</span>' +
        '<span class="cat-tag">' + item.source.split('/')[0].trim().split(' ').slice(0,3).join(' ') + '</span>' +
        chartIcon +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="card-body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +

          '</div>' +
        '</div>' +
        chartHtml +
        linkHtml +
      '</div>';
    container.appendChild(card);
  });
}

function buildReport() {
  var rb = document.getElementById('report-body');
  var html = '<p><strong>Time Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' | <strong>Read:</strong> ' + META.emailsRead + ' | <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p><br>';
  html += '<p><strong>✅ Included Sources (' + META.includedSources.length + '):</strong></p><ul style="margin:8px 0 12px 16px">';
  META.includedSources.forEach(function(s) {
    html += '<li><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</li>';
  });
  html += '</ul>';
  html += '<p><strong>⛔ Skipped Sources (' + META.skippedSources.length + '):</strong></p><ul style="margin:8px 0 12px 16px">';
  META.skippedSources.forEach(function(s) {
    html += '<li><strong>' + s.name + '</strong>: <span class="skip-reason">' + s.reason + '</span></li>';
  });
  html += '</ul>';
  rb.innerHTML = html;
}
