<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Twitter Shitpost Radar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root {
  --bg: #faf8f5; --surface: #ffffff; --border: #e8e4df; --border-light: #f0ede4; --text: #1a1a1a;
  --text-2: #555; --text-3: #8a8a8a; --accent: #d97706; --accent-bg: #fffbeb; --accent-2: #b45309;
  --bull: #16a34a; --bear: #dc2626; --neutral: #9a9590; --yellow: #fff5b3; --yellow-border: #f0d966;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55; background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }
.header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 16px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: var(--accent); }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }
.volume { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 6px;
          padding: 10px 14px; margin-bottom: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
          color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.volume strong { color: var(--text); font-weight: 600; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--accent-bg); cursor: pointer;
                user-select: none; font-weight: 600; font-size: 13px; color: var(--accent-2); }
.section-head:hover { background: #fef3c7; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px; min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); }
.section-arrow { font-size: 10px; transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; }
.section.open .section-body { display: block; }
.ticker-row { display: flex; align-items: center; gap: 14px; padding: 10px 16px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
.ticker-row:last-child { border-bottom: none; }
.ticker-row.is-new { border-left: 3px solid var(--accent); background: var(--accent-bg); }
.ticker-sym { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; min-width: 72px; }
.ticker-mentions { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-3); min-width: 70px; }
.new-pill { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; background: var(--accent); color: #fff;
            padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .05em; }
.sentiment { display: flex; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-2); }
.sentiment .pair { display: inline-flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-bull { background: var(--bull); }
.dot-bear { background: var(--bear); }
.dot-neutral { background: var(--neutral); }
.ticker-who { flex: 1 1 100%; font-size: 12.5px; color: var(--text-2); padding-left: 4px; }
.ticker-who .who-item { margin-right: 10px; }
.ticker-who .who-item .ctx { color: var(--text-3); font-style: italic; }
.ticker-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.ticker-author:hover { text-decoration: underline; }
.outlier-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.outlier-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.outlier-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.outlier-author:hover { text-decoration: underline; }
.outlier-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; background: var(--accent-bg);
               color: var(--accent-2); padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; border: 1px solid var(--accent); }
.outlier-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); text-decoration: none; }
.outlier-link:hover { text-decoration: underline; }
.outlier-summary { font-size: 13.5px; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-wrap: break-word; }
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px; cursor: zoom-in; background: #f0ede4; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; } .outlier-card { margin: 8px 10px; } .ticker-row { gap: 8px; }
  .ticker-sym { min-width: 56px; font-size: 14px; } .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">Twitter Shitpost Radar</div>
    <div class="subtitle" id="report-date">May 27, 2026</div>
  </div>
  <div class="volume" id="volume"></div>
  <div id="app"></div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" alt="">
</div>
<script>
const REPORT_DATA = {
  "date": "May 27, 2026",
  "volume": {"total_tweets":62,"active_authors":24,"total_authors":216,"silent_authors":192},
  "tickers": [
    {"ticker":"$SNOW","mentions":3,"is_new":false,"bull":2,"bear":0,"neutral":1,"who":[{"author":"SixSigmaCapital","context":"Amazon external CPU"},{"author":"Mr_Derivatives","context":"+31% vs $ZS -31%"}]},
    {"ticker":"$AMZN","mentions":2,"is_new":false,"bull":2,"bear":0,"neutral":0,"who":[{"author":"SixSigmaCapital","context":"Graviton deal"}]},
    {"ticker":"$CRM","mentions":1,"is_new":false,"bull":1,"bear":0,"neutral":0,"who":[{"author":"SixSigmaCapital","context":"lean long"}]},
    {"ticker":"$ZS","mentions":1,"is_new":false,"bull":0,"bear":1,"neutral":0,"who":[{"author":"Mr_Derivatives","context":"-31%"}]},
    {"ticker":"$BTC","mentions":6,"is_new":false,"bull":2,"bear":2,"neutral":2,"who":[{"author":"CryptoGodJohn","context":"68-82k range"},{"author":"CryptoKaleo","context":"be bullish"},{"author":"saylor","context":"DeFi-TradFi"},{"author":"ByzGeneral","context":"decoupling"}]},
    {"ticker":"$ETH","mentions":2,"is_new":false,"bull":0,"bear":2,"neutral":0,"who":[{"author":"ThinkingUSD","context":"shorts hedge"},{"author":"R89Capital","context":"Vitalik sarcasm"}]},
    {"ticker":"$HYPE","mentions":1,"is_new":true,"bull":0,"bear":1,"neutral":0,"who":[{"author":"ByzGeneral","context":"exhaustion"}]},
    {"ticker":"$MSTR","mentions":2,"is_new":false,"bull":1,"bear":1,"neutral":0,"who":[{"author":"PeterSchiff","context":"critique"},{"author":"saylor","context":"dynamics"}]},
    {"ticker":"$STRC","mentions":1,"is_new":true,"bull":0,"bear":0,"neutral":1,"who":[{"author":"saylor","context":"Digital Credit"}]},
    {"ticker":"ZEC","mentions":1,"is_new":false,"bull":0,"bear":1,"neutral":0,"who":[{"author":"R89Capital","context":"bearish"}]},
    {"ticker":"$again","mentions":1,"is_new":true,"bull":1,"bear":0,"neutral":0,"who":[{"author":"koreanjewcrypto","context":"good vibes"}]}
  ],
  "outliers": [
    {"author":"CryptoKaleo","usual_length":68,"this_length":1270,"summary":"Deep halving cycle analysis: peaks ~536d post-halving, bottoms ~908d. Currently ~769d. Expects Oct 2026 bottom.","tweet_url":"https://x.com/CryptoKaleo/status/2059733967406870899","images":["https://pbs.twimg.com/media/HJWfYeyXYAA6ypg.jpg"]},
    {"author":"Mr_Derivatives","usual_length":47,"this_length":512,"summary":"Mortgage math: $2M home, 20% down. At 3% = $6.7k/mo, at 6.65% = $10.3k/mo. Will 3% rates return?","tweet_url":"https://x.com/Mr_Derivatives/status/2059727072889852106","images":[]},
    {"author":"CL207","usual_length":71,"this_length":463,"summary":"Busan shipbuilding: Gyeongsan ~40% world capacity. East Asia economic convergence observation.","tweet_url":"https://x.com/CL207/status/2059572176110436604","images":[]},
    {"author":"HFI_Research","usual_length":67,"this_length":370,"summary":"Petroleum data: API to EIA forecast logic for crude inventory moves.","tweet_url":"https://x.com/HFI_Research/status/2059727110940565686","images":[]},
    {"author":"DeeZe","usual_length":57,"this_length":327,"summary":"Career paradox: no job but checking email for time-sensitive opportunities (Murakami pre-order, raffles).","tweet_url":"https://x.com/DeeZe/status/2059675486830084235","images":[]},
    {"author":"ByzGeneral","usual_length":82,"this_length":307,"summary":"Coinbase BTC selling vs SPX holding = negative decoupling signal.","tweet_url":"https://x.com/ByzGeneral/status/2059644121640276159","images":["https://pbs.twimg.com/media/HJVS7RZWAAIQAGA.jpg"]},
    {"author":"ByzGeneral","usual_length":82,"this_length":310,"summary":"$HYPE: OI drop during pump = shorts liquidated. No OI rise on rally = no sustained demand.","tweet_url":"https://x.com/ByzGeneral/status/2059673717022581144","images":["https://pbs.twimg.com/media/HJVuTEqWMAUOXXM.jpg"]},
    {"author":"PeterSchiff","usual_length":77,"this_length":286,"summary":"$MSTR critique: convertible buyback not a bargain, gave up free financing.","tweet_url":"https://x.com/PeterSchiff/status/2059747718608593184","images":[]},
    {"author":"PeterSchiff","usual_length":77,"this_length":280,"summary":"Government accountability: IRS conspiracy, most statements are lies.","tweet_url":"https://x.com/PeterSchiff/status/2059702825500697004","images":[]},
    {"author":"PeterSchiff","usual_length":77,"this_length":391,"summary":"Rand Paul response on IRS accountability needed.","tweet_url":"https://x.com/PeterSchiff/status/2059663271469236491","images":[]},
    {"author":"PeterSchiff","usual_length":77,"this_length":302,"summary":"Gold/silver miners holding despite metal selloff, smart accumulation.","tweet_url":"https://x.com/PeterSchiff/status/2059654454668898480","images":[]},
    {"author":"awawat","usual_length":57,"this_length":340,"summary":"Privacy wallet UX issues: slow sync, confusing toggle, server-switching needed.","tweet_url":"https://x.com/awawat/status/2059598152278426072","images":[]},
    {"author":"AlessioTMAD","usual_length":82,"this_length":295,"summary":"TMAD app launch: AI + GEX for retail, institutional edge claim.","tweet_url":"https://x.com/AlessioTMAD/status/2059655568634053116","images":["https://pbs.twimg.com/media/HJVdS6XWgAEgelV.jpg"]},
    {"author":"saylor","usual_length":48,"this_length":213,"summary":"Schwab Network: $BTC pricing, $STRC digital credit, DeFi-TradFi convergence.","tweet_url":"https://x.com/saylor/status/2059629992703656435","images":[]}
  ]
};

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g,'&#96;'); }
function authorTag(name) { return `<span class="ticker-author" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`; }
function renderVolume(v) {
  const parts = [];
  if (v.total_tweets) parts.push(`<strong>${v.total_tweets}</strong> tweets`);
  if (v.active_authors && v.total_authors) parts.push(`<strong>${v.active_authors}/${v.total_authors}</strong> authors active`);
  if (v.silent_authors) parts.push(`<strong>${v.silent_authors}</strong> silent`);
  document.getElementById('volume').innerHTML = parts.join('<span style="color:var(--text-3)">·</span>');
}
function renderTickerWho(who) {
  if (!who || !who.length) return '';
  return '<div class="ticker-who">' + who.map(w => 
    `<span class="who-item" data-author="${escapeAttr((w.author||'').toLowerCase())}">` +
    authorTag(w.author||'') + (w.context ? ` <span class="ctx">${escapeHtml(w.context)}</span>` : '') +
    '</span>'
  ).join('') + '</div>';
}
function renderTicker(t) {
  const bull = t.bull || 0, bear = t.bear || 0, neutral = t.neutral || 0;
  const mentions = t.mentions || (bull + bear + neutral);
  const isNew = t.is_new ? ' is-new' : '';
  return `<div class="ticker-row${isNew}"><div class="ticker-sym">${escapeHtml(t.ticker||'?')}</div>` +
    `<div class="ticker-mentions">${mentions} mention${mentions===1?'':'s'}</div>` +
    (t.is_new ? '<span class="new-pill">new</span>' : '') +
    `<div class="sentiment"><span class="pair"><span class="dot dot-bull"></span>${bull}</span>` +
    `<span class="pair"><span class="dot dot-bear"></span>${bear}</span>` +
    `<span class="pair"><span class="dot dot-neutral"></span>${neutral}</span></div>` +
    renderTickerWho(t.who) + '</div>';
}
function renderOutlier(o) {
  const author = o.author || '';
  const tag = (o.usual_length && o.this_length) ? `<span class="outlier-tag">usual ${o.usual_length} · this ${o.this_length}</span>` : '';
  const link = o.tweet_url ? `<a class="outlier-link" href="${escapeAttr(o.tweet_url)}" target="_blank">tweet →</a>` : '';
  const thumbs = o.images && o.images.length ? `<div class="thumbs">${o.images.map(u=>`<img src="${escapeAttr(u)}" class="thumb" onclick="openLightbox('${escapeAttr(u)}')">`).join('')}</div>` : '';
  return `<div class="outlier-card" data-author="${escapeAttr(author.toLowerCase())}"><div class="outlier-head">` +
    `<span class="outlier-author" onclick="filterAuthor('${escapeAttr(author)}')">${authorTag(author).replace('class="ticker-author"','class="outlier-author"')}</span>` +
    `${tag}${link}</div><div class="outlier-summary">${escapeHtml(o.summary||'')}</div>${thumbs}</div>`;
}
function renderSection(letter, name, body, count) {
  return `<div class="section"><div class="section-head" onclick="toggleSection(this)"><span class="section-letter">${letter}.</span>` +
    `<span class="section-name">${escapeHtml(name)}</span><span class="section-count">${count}</span><span class="section-arrow">▸</span></div>` +
    `<div class="section-body">${body}</div></div>`;
}
function toggleSection(el) { el.parentElement.classList.toggle('open'); }
function openLightbox(src) { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightbox-img').src=''; }
function filterAuthor(name) {
  document.querySelectorAll('[data-author]').forEach(el => {
    if ((el.dataset.author||'').toLowerCase() === name.toLowerCase()) el.style.opacity='1';
    else el.style.opacity='0.25';
  });
}
function renderReport(d) {
  document.getElementById('report-date').textContent = d.date || '';
  renderVolume(d.volume);
  const tickersBody = (d.tickers || []).map(renderTicker).join('') || '<div class="empty">No tickers.</div>';
  const outliersBody = (d.outliers || []).map(renderOutlier).join('');
  const sections = [
    renderSection('A', 'Tickers', tickersBody, (d.tickers||[]).length),
    outliersBody ? renderSection('B', 'Outliers', outliersBody, (d.outliers||[]).length) : ''
  ].join('');
  document.getElementById('app').innerHTML = sections || '<div class="empty">No data.</div>';
  document.querySelectorAll('.section').forEach(s => s.classList.add('open'));
}
renderReport(REPORT_DATA);
</script>
</body>
</html>
