  skippedSources: [
    {source: "TMAD", reason: "Paywall/teaser only — mentioned SPX moving higher into July 4th weekend, no extractable analysis"},
    {source: "Danny Dayan / Macro Themes", reason: "Paywall/teaser only — AI investment cycle and healthcare use case teased but full analysis behind paywall"},
    {source: "Rosenberg / Early Morning with Dave", reason: "Paywall/teaser only — headline data (Q2 best in 6 years, Asia-Pac best in 17 years) incorporated into item #16 from Bespoke"}
  ]
};

var activeCat = 'all';
var activeUrg = 'all';
var activeSource = null;

function buildSourcePills() {
  var container = document.getElementById('sourcePills');
  META.includedSources.forEach(function(s) {
    var pill = document.createElement('button');
    pill.className = 'source-pill';
    pill.setAttribute('data-source', s.source);
    pill.innerHTML = s.source + '<span class="badge">' + s.items + '</span>';
    pill.addEventListener('click', function() {
      if (activeSource === s.source) {
        activeSource = null;
        pill.classList.remove('active');
      } else {
        document.querySelectorAll('.source-pill').forEach(function(p) { p.classList.remove('active'); });
        activeSource = s.source;
        pill.classList.add('active');
      }
      applyFilters();
    });
    container.appendChild(pill);
  });
  var skippedDiv = document.getElementById('skippedDiv');
  if (META.skippedSources.length > 0) {
    var text = 'Skipped: ';
    text += META.skippedSources.map(function(s) { return '<span title="' + s.reason + '">' + s.source + '</span>'; }).join(', ');
    skippedDiv.innerHTML = text;
  }
}

function buildCards() {
  var grid = document.getElementById('itemsGrid');
  ITEMS.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', item.id);
    card.setAttribute('data-cat', item.cat);
    card.setAttribute('data-urg', item.urg);
    card.setAttribute('data-source', item.source);

    var urgLabel = {now: '🔴 Now', deep: '🔵 Deep', watch: '🟡 Watch'}[item.urg];
    var catLabel = {macro:'Macro',credit:'Credit',positioning:'Positioning',ai:'AI/Infra',crypto:'Crypto',geopolitics:'Geopolitics',energy:'Energy',tech:'Tech',gold:'Gold',culture:'Culture',labor:'Labor',regulation:'Regulation',science:'Science',venture:'Venture'}[item.cat];

    card.innerHTML =
      '<div class="card-header">' +
        '<span class="cat-dot ' + item.cat + '"></span>' +
        '<div class="card-title-wrap">' +
          '<div class="card-title">' + item.title + '</div>' +
          '<div class="card-meta">' +
            '<span class="tag tag-cat ' + item.cat + '">' + catLabel + '</span>' +
            '<span class="tag tag-urg">' + urgLabel + '</span>' +
            '<span class="tag tag-source">' + item.source + '</span>' +
          '</div>' +
        '</div>' +
        '<span class="chevron">›</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="insight">' + item.insight + '</div>' +
        '<div class="so-what"><strong>So what:</strong> ' + item.soWhat + '</div>' +
        '<div class="tweets">' +
          '<div class="tweet-row">' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-row">' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    card.querySelector('.card-header').addEventListener('click', function() {
      card.classList.toggle('open');
    });

    grid.appendChild(card);
  });
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var catMatch = activeCat === 'all' || card.getAttribute('data-cat') === activeCat;
    var urgMatch = activeUrg === 'all' || card.getAttribute('data-urg') === activeUrg;
    var srcMatch = !activeSource || card.getAttribute('data-source') === activeSource;
    if (catMatch && urgMatch && srcMatch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('countBar').textContent = 'Showing ' + visible + ' of ' + ITEMS.length + ' items';
  var noResults = document.getElementById('noResults');
  if (visible === 0) {
    noResults.classList.remove('hidden');
  } else {
    noResults.classList.add('hidden');
  }
}

document.querySelectorAll('.filter-btn[data-cat]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn[data-cat]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeCat = btn.getAttribute('data-cat');
    applyFilters();
  });
});

document.querySelectorAll('.filter-btn[data-urg]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn[data-urg]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeUrg = btn.getAttribute('data-urg');
    applyFilters();
  });
});

buildSourcePills();
buildCards();
</script>
</body>
</html>
