    el.style.background = "";
    if (u === "all") { el.style.color = "#555"; el.style.borderColor = "#ccc"; }
    else { el.style.color = URG_CONFIG[u].color; el.style.borderColor = URG_CONFIG[u].color; }
  });
  if (activeUrg === "all") {
    const el = document.getElementById("urg-all");
    if (el) { el.classList.add("active"); el.style.background = "#444"; el.style.color = "#fff"; el.style.borderColor = "#444"; }
  } else {
    const el = document.getElementById("urg-" + activeUrg);
    if (el) { el.classList.add("active"); el.style.background = URG_CONFIG[activeUrg].color; el.style.color = "#fff"; el.style.borderColor = URG_CONFIG[activeUrg].color; }
  }
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  updateCatPills();
  updateUrgPills();
  render();
}

function render() {
  const container = document.getElementById("cards-container");
  container.innerHTML = "";
  const filtered = ITEMS.filter(i => {
    if (activeSrc) return i.source.indexOf(activeSrc) !== -1;
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrg !== "all" && i.urgency !== activeUrg) return false;
    return true;
  });

  filtered.forEach(item => {
    const color = getColor(item.cat);
    const urgEmoji = item.urgency === "actnow" ? "🔴" : item.urgency === "deep" ? "🔵" : "🟡";
    const chartFlag = item.charts.count > 0 ? (item.charts.hot ? " 🔥" : " 📊") : "";

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = item.id;

    const header = document.createElement("div");
    header.className = "card-header";
    header.innerHTML =
      '<span class="item-num">' + String(item.id).padStart(2, "0") + '</span>' +
      '<span class="urgency">' + urgEmoji + '</span>' +
      '<span class="src-badge" style="background:' + color + '">' + item.source.split("/")[0].trim() + '</span>' +
      '<span class="cat-tag">' + item.cat + '</span>' +
      (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
      '<span class="card-title">' + item.title + '</span>';
    header.onclick = function() {
      const body = card.querySelector(".card-body");
      body.classList.toggle("open");
    };

    const angleColor = color;
    const angleBg = color + "18";

    let chartHtml = "";
    if (item.charts.count > 0) {
      chartHtml = '<div class="chart-info' + (item.charts.hot ? " hot" : "") + '">' +
        (item.charts.hot ? "🔥 CHART WORTH SAVING — " : "📊 Chart: ") +
        item.charts.desc + '</div>';
    }

    let linkHtml = item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : "";

    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML =
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + item.idea + '</div>' +
      '<div class="section-label" style="margin-top:10px">My Angle</div>' +
      '<div class="angle-block" style="border-left-color:' + angleColor + ';background:' + angleBg + '">' + item.angle + '</div>' +
      '<div class="section-label" style="margin-top:10px">Tweets</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label a">TWEET A</div>' +
          '<div class="tweet-text" id="ta-' + item.id + '">' + item.tweetA + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label b">TWEET B</div>' +
          '<div class="tweet-text" id="tb-' + item.id + '">' + item.tweetB + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartHtml +
      linkHtml;

    card.appendChild(header);
    card.appendChild(body);
    container.appendChild(card);
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">No items match this filter.</div>';
  }
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleReport() {
  const body = document.getElementById("report-body");
  const h = document.querySelector(".report-card h3");
  if (body.classList.contains("hidden")) {
    body.classList.remove("hidden");
    h.textContent = "▼ Session Report";
  } else {
    body.classList.add("hidden");
    h.textContent = "▶ Session Report";
  }
}

function buildReport() {
  const body = document.getElementById("report-body");
  let html = "<strong>Window:</strong> " + META.windowStart + " → " + META.windowEnd + "<br>";
  html += "<strong>Emails in window:</strong> " + META.emailsInWindow + " &nbsp;|&nbsp; <strong>Read:</strong> " + META.emailsRead + " &nbsp;|&nbsp; <strong>Items extracted:</strong> " + META.itemsExtracted + "<br><br>";
  html += "<strong>Included Sources:</strong><br>";
  META.includedSources.forEach(s => {
    html += '&nbsp;&nbsp;<span class="src-link" onclick="filterBySrc(\'' + s.name.split("/")[0].trim().replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '<br>';
  });
  if (META.skippedSources.length > 0) {
    html += "<br><strong>Skipped:</strong><br>";
    META.skippedSources.forEach(s => {
      html += "&nbsp;&nbsp;" + s.name + " — " + s.reason + "<br>";
    });
  }
  body.innerHTML = html;
}

function buildHeader() {
  const el = document.getElementById("header-meta");
  el.textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items · " + META.includedSources.length + " sources · Window: " + META.windowStart + " → " + META.windowEnd;
}

buildHeader();
buildFilters();
buildReport();
render();
</script>
</body>
</html>
