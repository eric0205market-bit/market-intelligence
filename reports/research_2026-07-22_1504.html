{ id:22, cat:"macro", urgency:"deep", source:"The Bond Beat (Morgan Stanley)",
  title:`The Fed is no longer the marginal buyer of Treasuries — private, price-sensitive buyers are`,
  idea:`Morgan Stanley: Treasury demand is structurally shifting away from the Fed and foreign central banks toward price-sensitive private buyers — money market funds, households, ETFs, broker-dealers, banks, and pensions. The Fed is "no longer a sustained marginal absorber" of Treasury supply.`,
  angle:`A more price-sensitive buyer base means term premium has to do more work to clear the same issuance — structurally higher and more volatile long yields even without a fresh fiscal shock.`,
  tweetA:`The Fed isn't the marginal buyer of Treasuries anymore. Private, price-sensitive buyers are — money funds, ETFs, households. That's structurally different plumbing than the last decade, and it means the same supply now needs a higher term premium to clear.`,
  tweetB:`Foreign central banks bought Treasuries because it was policy. Money market funds buy them because the price is right. Swap the buyer base from policy-driven to price-driven and you've quietly changed how much yield the Treasury has to pay to fund itself — permanently.`,

// ---- rendering ----
let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(cat){ return CATEGORY_COLORS[cat] || "#888"; }

function buildFilters(){
  const catCounts = {};
  ITEMS.forEach(i=>{ catCounts[i.cat] = (catCounts[i.cat]||0)+1; });
  const catWrap = document.getElementById('catFilters');
  let html = `<button class="pill active" data-cat="all" onclick="setCat('all')" style="border-color:#333;">All (${ITEMS.length})</button>`;
  Object.keys(catCounts).sort().forEach(cat=>{
    html += `<button class="pill" data-cat="${cat}" onclick="setCat('${cat}')" style="border-color:${catColor(cat)};color:${catColor(cat)};">${cat} (${catCounts[cat]})</button>`;
  });
  catWrap.innerHTML = html;

  const urgLabels = {"act now":"🔴 Act Now","deep":"🔵 Deep","watch":"🟡 Watch"};
  const urgCounts = {};
  ITEMS.forEach(i=>{ urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1; });
  const urgWrap = document.getElementById('urgFilters');
  let uhtml = `<button class="pill active" data-urg="all" onclick="setUrg('all')" style="border-color:#333;">All (${ITEMS.length})</button>`;
  Object.keys(urgLabels).forEach(u=>{
    if(urgCounts[u]) uhtml += `<button class="pill" data-urg="${u}" onclick="setUrg('${u}')">${urgLabels[u]} (${urgCounts[u]})</button>`;
  });
  urgWrap.innerHTML = uhtml;
}

function setCat(cat){
  activeCat = cat; activeSrc = null;
  document.querySelectorAll('#catFilters .pill').forEach(function(b){
    const isActive = b.getAttribute('data-cat') === cat;
    b.classList.toggle('active', isActive);
    if(isActive){ b.style.background = (cat==='all') ? '#333' : catColor(cat); b.style.color = '#fff'; }
    else { b.style.background = 'transparent'; b.style.color = (b.getAttribute('data-cat')==='all') ? '' : catColor(b.getAttribute('data-cat')); }
  });
  renderCards();
}
function setUrg(urg){
  activeUrg = urg; activeSrc = null;
  document.querySelectorAll('#urgFilters .pill').forEach(function(b){
    const isActive = b.getAttribute('data-urg') === urg;
    b.classList.toggle('active', isActive);
    b.style.background = isActive ? '#333' : 'transparent';
    b.style.color = isActive ? '#fff' : '';
  });
  renderCards();
}
function filterBySrc(name){
  activeCat = "all"; activeUrg = "all"; activeSrc = name;
  document.querySelectorAll('#catFilters .pill').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-cat')==='all');
    b.style.background = (b.getAttribute('data-cat')==='all') ? '#333' : 'transparent';
    b.style.color = (b.getAttribute('data-cat')==='all') ? '#fff' : catColor(b.getAttribute('data-cat'));
  });
  document.querySelectorAll('#urgFilters .pill').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-urg')==='all');
    b.style.background = (b.getAttribute('data-urg')==='all') ? '#333' : 'transparent';
    b.style.color = (b.getAttribute('data-urg')==='all') ? '#fff' : '';
  });
  renderCards(true);
  window.scrollTo({top:0, behavior:'smooth'});
}

const URG_EMOJI = {"act now":"🔴","deep":"🔵","watch":"🟡"};

function renderCards(forceExpandMatches){
  const wrap = document.getElementById('cards');
  let html = "";
  ITEMS.forEach(function(item, idx){
    const matchesCat = (activeCat === "all" || item.cat === activeCat);
    const matchesUrg = (activeUrg === "all" || item.urgency === activeUrg);
    const matchesSrc = (!activeSrc || item.source.indexOf(activeSrc) !== -1);
    const visible = matchesCat && matchesUrg && matchesSrc;
    const shouldOpen = forceExpandMatches && activeSrc && matchesSrc;
    const chartFlag = item.charts.hot ? "🔥" : (item.charts.count > 0 ? "📊" : "");
    html += `<div class="card${visible ? '' : ' hidden'}${shouldOpen ? ' open' : ''}" id="card-${item.id}">
      <div class="card-head" onclick="toggleCard(${item.id})">
        <span class="idx">${String(idx+1).padStart(2,'0')}</span>
        <span class="urg">${URG_EMOJI[item.urgency]||''}</span>
        <span class="src-badge" style="background:${catColor(item.cat)};">${item.source}</span>
        <span class="cat-tag">${item.cat}</span>
        <span class="chart-flag">${chartFlag}</span>
        <span class="card-title">${item.title}</span>
      </div>
      <div class="card-body">
        <div class="block-label">The Idea</div>
        <div class="idea-text">${item.idea}</div>
        <div class="block-label">My Angle</div>
        <div class="angle-box" style="border-left-color:${catColor(item.cat)};background:${catColor(item.cat)}14;">${item.angle}</div>
        <div class="block-label">Tweets</div>
        <div class="tweets">
          <div class="tweet-box">
            <div class="tweet-label a">TWEET A</div>
            <div class="tweet-text">${item.tweetA}</div>
            <button class="copy-btn" onclick="copyTweet(${item.id},'a')">📋 Copy</button>
          </div>
          <div class="tweet-box">
            <div class="tweet-label b">TWEET B</div>
            <div class="tweet-text">${item.tweetB}</div>
            <button class="copy-btn" onclick="copyTweet(${item.id},'b')">📋 Copy</button>
          </div>
        </div>
        <div class="chart-block">
          <div class="chart-placeholder${item.charts.hot ? ' hot' : ''}">${item.charts.hot ? '🔥 ' : (item.charts.count>0 ? '📊 ' : '')}${item.charts.desc}</div>
        </div>
        <a class="read-link" href="${item.link}" target="_blank" rel="noopener">↗ Read full article</a>
      </div>
    </div>`;
  });
  wrap.innerHTML = html;
}

function toggleCard(id){
  const el = document.getElementById('card-'+id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

  document.getElementById('reportCard').classList.toggle('open');
  document.getElementById('reportChevron').textContent =
    document.getElementById('reportCard').classList.contains('open') ? '▾' : '▸';
}

function buildReport(){
  document.getElementById('headerMeta').textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.includedSources.length + " sources · window " + META.windowStart + " → " + META.windowEnd;

  let html = `<p><strong>Window:</strong> ${META.windowStart} to ${META.windowEnd} (last 6 hours). Emails outside this window were not processed.</p>
  <p><strong>Emails in window:</strong> ${META.emailsInWindow} &nbsp;·&nbsp; <strong>Emails read:</strong> ${META.emailsRead} &nbsp;·&nbsp; <strong>Items extracted:</strong> ${META.itemsExtracted}</p>
  <h4>Included Sources</h4><ul>`;
  META.includedSources.forEach(function(s){
    html += `<li><button class="src-link" onclick="filterBySrc('${s.name.replace(/'/g,"\\'")}')">${s.name}</button> — ${s.count} item${s.count>1?'s':''}. <span style="color:var(--muted);">${s.note}</span></li>`;
  });
  html += `</ul><h4>Skipped Sources</h4><ul>`;
  META.skippedSources.forEach(function(s){
    html += `<li><strong>${s.name}</strong> — ${s.reason}</li>`;
  });
  html += `</ul>`;
  document.getElementById('reportBody').innerHTML = html;
}

buildFilters();
renderCards();
buildReport();
</script>
</body>
</html>
