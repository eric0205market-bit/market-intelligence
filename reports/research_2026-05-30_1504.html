const META = {
  date: "2026-05-30",
  time: "15:04 CEST",
  windowStart: "2026-05-30 09:04 CEST",
  windowEnd: "2026-05-30 15:04 CEST",
  emailsInWindow: 9,
  emailsRead: 9,
  itemsExtracted: 18,
  includedSources: [
    { name: "Dale Pinkert / The Market House", items: 6 },
    { name: "Peter Frankopan / Substack", items: 1 },
    { name: "Helene Meisler / Saturday Chart Fest", items: 2 },
    { name: "Ironsides Macro", items: 3 },
    { name: "Hardfork / Substack", items: 1 },
    { name: "Princeton Chen / Tiger Capital Research", items: 3 },
    { name: "Hermit Ventures / HRMT", items: 1 },
    { name: "Seven c Premium / Stoic", items: 1 }
  ],
  skippedSources: [
    { name: "Macro Mornings (macromornings@substack.com)", reason: "Promotional paywall teaser — zero analytical content in email body, only subscription pitch" }
  ]
};

let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function buildFilters() {
  var catDiv = document.getElementById('cat-filters');
  var urgDiv = document.getElementById('urg-filters');
  var catCounts = {};
  var urgCounts = {};
  ITEMS.forEach(function(i) {
    catCounts[i.cat] = (catCounts[i.cat] || 0) + 1;
    urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1;
  });
  var seenCats = [];
  ITEMS.forEach(function(i) { if (seenCats.indexOf(i.cat) < 0) seenCats.push(i.cat); });
  var catHTML = '<span class="pill pill-all active" onclick="setCat(\'all\')" style="background:#333;color:#fff;border-color:transparent;">All (' + ITEMS.length + ')</span>';
  seenCats.forEach(function(cat) {
    var col = CATS[cat] || '#666';
    catHTML += '<span class="pill" data-cat="' + cat + '" onclick="setCat(\'' + cat + '\')">' + cat + ' (' + catCounts[cat] + ')</span>';
  });
  catDiv.innerHTML = catHTML;
  var urgLabels = { 'act': '🔴 Act Now', 'deep': '🔵 Deep', 'watch': '🟡 Watch' };
  var urgHTML = '<span class="upill active" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</span>';
  ['act', 'deep', 'watch'].forEach(function(u) {
    if (urgCounts[u]) {
      urgHTML += '<span class="upill" data-urg="' + u + '" onclick="setUrg(\'' + u + '\')">' + urgLabels[u] + ' (' + urgCounts[u] + ')</span>';
    }
  });
  urgDiv.innerHTML = urgHTML;
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('.pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.color = '';
    p.style.borderColor = '';
  });
  var target = cat === 'all' ? document.querySelector('.pill-all') : document.querySelector('[data-cat="' + cat + '"]');
  if (target) {
    target.classList.add('active');
    if (cat !== 'all') {
      target.style.background = CATS[cat] || '#666';
      target.style.color = '#fff';
      target.style.borderColor = 'transparent';
    } else {
      target.style.background = '#333';
      target.style.color = '#fff';
      target.style.borderColor = 'transparent';
    }
  }
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  document.querySelectorAll('.upill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.color = '';
  });
  var pills = document.querySelectorAll('.upill');
  if (urg === 'all') {
    if (pills[0]) { pills[0].classList.add('active'); pills[0].style.background = '#333'; pills[0].style.color = '#fff'; }
  } else {
    var t = document.querySelector('[data-urg="' + urg + '"]');
    if (t) { t.classList.add('active'); t.style.background = '#333'; t.style.color = '#fff'; }
  }
  renderCards();
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? null : name;
  activeCat = 'all';
  activeUrg = 'all';
  document.querySelectorAll('.pill').forEach(function(p) {
    p.classList.remove('active'); p.style.background = ''; p.style.color = ''; p.style.borderColor = '';
  });
  var allPill = document.querySelector('.pill-all');
  if (allPill) { allPill.classList.add('active'); allPill.style.background = '#333'; allPill.style.color = '#fff'; allPill.style.borderColor = 'transparent'; }
  document.querySelectorAll('.upill').forEach(function(p) { p.classList.remove('active'); p.style.background = ''; p.style.color = ''; });
  var firstUrg = document.querySelectorAll('.upill')[0];
  if (firstUrg) { firstUrg.classList.add('active'); firstUrg.style.background = '#333'; firstUrg.style.color = '#fff'; }
  renderCards();
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var visible = ITEMS.filter(function(item) {
    if (activeSrc && item.source.indexOf(activeSrc) < 0) return false;
    if (activeCat !== 'all' && item.cat !== activeCat) return false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return false;
    return true;
  });
  container.innerHTML = visible.map(function(item) {
    var col = CATS[item.cat] || '#666';
    var urgEmoji = item.urgency === 'act' ? '🔴' : item.urgency === 'deep' ? '🔵' : '🟡';
    var chartBadge = item.charts.count > 0 ? (item.charts.hot ? '🔥' : '📊') : '';
    var chartInfo = item.charts.count > 0
      ? '<div class="chart-info ' + (item.charts.hot ? 'hot' : 'normal') + '">' + (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.desc + '</div>'
      : '';
    var autoOpen = activeSrc ? ' open' : '';
    return '<div class="card" id="card-' + item.id + '">'
      + '<div class="card-header" onclick="toggleCard(' + item.id + ')">'
      + '<span class="item-num">' + (item.id < 10 ? '0' + item.id : item.id) + '</span>'
      + '<span class="urgency-badge">' + urgEmoji + '</span>'
      + '<span class="source-badge" style="background:' + col + '">' + item.source + '</span>'
      + '<span class="cat-tag">' + item.cat + '</span>'
      + (item.charts.count > 0 ? '<span class="chart-badge">' + chartBadge + '</span>' : '')
      + '<span class="card-title">' + item.title + '</span>'
      + '</div>'
      + '<div class="card-body' + autoOpen + '" id="body-' + item.id + '">'
      + '<div class="section-label">THE IDEA</div>'
      + '<div class="idea-text">' + item.idea + '</div>'
      + '<div class="section-label">MY ANGLE</div>'
      + '<div class="angle-box" style="border-left-color:' + col + ';background:' + col + '18">' + item.angle + '</div>'
      + '<div class="section-label">TWEETS</div>'
      + '<div class="tweets-row">'
      + '<div class="tweet-box">'
      + '<div class="tweet-label a">TWEET A</div>'
      + '<div class="tweet-text">' + item.tweetA + '</div>'
      + '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>'
      + '</div>'
      + '<div class="tweet-box">'
      + '<div class="tweet-label b">TWEET B</div>'
      + '<div class="tweet-text">' + item.tweetB + '</div>'
      + '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>'
      + '</div>'
      + '</div>'
      + chartInfo
      + (item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">&#8599; Read full article</a>' : '')
      + '</div>'
      + '</div>';
  }).join('');
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var arrow = document.getElementById('report-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function buildReport() {
  var body = document.getElementById('report-body');
  var html = '<div class="report-section"><div class="report-section-title">Time Window</div>';
  html += '<div class="report-item">' + META.windowStart + ' → ' + META.windowEnd + '</div>';
  html += '<div class="report-item">Emails in window: ' + META.emailsInWindow + ' &nbsp;|&nbsp; Read: ' + META.emailsRead + ' &nbsp;|&nbsp; Items extracted: ' + META.itemsExtracted + '</div></div>';
  html += '<div class="report-section"><div class="report-section-title">Included Sources (' + META.includedSources.length + ')</div>';
  META.includedSources.forEach(function(s) {
    html += '<div class="report-item"><span class="src-link" onclick="filterBySrc(\'' + s.name + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</div>';
  });
  html += '</div>';
  html += '<div class="report-section"><div class="report-section-title">Skipped Sources (' + META.skippedSources.length + ')</div>';
  META.skippedSources.forEach(function(s) {
    html += '<div class="report-item"><strong>' + s.name + '</strong>: ' + s.reason + '</div>';
  });
  html += '</div>';
  body.innerHTML = html;
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function init() {
  buildFilters();
  renderCards();
  buildReport();
}

window.onload = init;
</script>
