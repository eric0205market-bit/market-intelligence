<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Institutional Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #7c3aed;          /* purple — institutional report accent */
  --accent-soft: #f3eefc;
  --divergence: #d94052;      /* divergence red */
  --consensus: #15803d;       /* consensus green */
  --yellow: #fff5b3;

  /* category colors (institutional schema: rates, growth, fx, equities,
     credit, crypto, energy, commodities, geopolitics, ai_tech, em) */
  --cat-rates: #2563eb;
  --cat-growth: #d97706;
  --cat-fx: #0891b2;
  --cat-equities: #15803d;
  --cat-credit: #be185d;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-commodities: #ea580c;
  --cat-geopolitics: #b91c1c;
  --cat-ai_tech: #4f46e5;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 12px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR (top: period + coverage) */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 10px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* THEME CARD (Section A) */
.theme { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.theme:last-child { border-bottom: none; }
.theme-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
              flex-wrap: wrap; }
.theme-title { font-weight: 600; font-size: 14.5px; }
.theme-stance { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 10px; }
@media (min-width: 720px) { .theme-stance { grid-template-columns: 1fr 1fr; } }
.theme-line { font-size: 13px; padding: 8px 10px; border-radius: 4px;
              border-left: 3px solid var(--border); background: #fafafa; line-height: 1.5; }
.theme-line.consensus { border-left-color: var(--consensus); background: #f0f9f3; }
.theme-line.divergence { border-left-color: var(--divergence); background: #fdf6f7; }
.theme-line .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px;
                   text-transform: uppercase; letter-spacing: .06em;
                   color: var(--text-3); display: block; margin-bottom: 2px; }
.theme-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
               border-left: 2px solid var(--border-light); }
.theme-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-source { font-weight: 600; color: var(--accent); }
a.item-source { text-decoration: none; }
a.item-source:hover { text-decoration: underline; }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-title { font-weight: 600; font-size: 14px; margin: 4px 0 6px; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DEEP READS (Section C) — purple left border to mark flagship long-form */
.section-deepreads .item-card { border-left: 4px solid var(--accent); background: var(--accent-soft); }

/* HOUSE VIEWS — compact one-line-per-source list */
.hv-row { display: flex; gap: 10px; align-items: baseline;
          padding: 6px 16px; border-bottom: 1px solid var(--border-light);
          font-size: 13px; }
.hv-row:last-child { border-bottom: none; }
.hv-name { font-weight: 600; color: var(--accent); min-width: 180px;
           text-decoration: none; }
.hv-name:hover { text-decoration: underline; }
.hv-stance { color: var(--text); flex: 1; }

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 110px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .hv-row { flex-direction: column; gap: 2px; }
  .hv-name { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_date": "2026-06-21", "lookback_days": 10, "coverage": {"sources_covered": 45, "sources_total": 58, "coverage_pct": 77.6}, "summary": "**Rates / Fed & Central Banks** — The Fed held rates at 3.50–3.75% for the fourth consecutive meeting; Warsh abstained and the statement stripped forward guidance. Nine of 18 dots now project at least one hike, pushing the median 2026 dot to 3.8%. The ECB delivered a surprise 25bp hike to 2.25% — its first since 2023 — citing sticky EZ inflation at 3.2%; Lagarde signalled data-dependency without pre-committing to more. The BoJ raised to 1.00%, and Oxford Economics pegs the terminal rate at 1.5% by mid-2027.\n\n**Oil / Iran Deal** — Brent collapsed from $118 in April to ~$76 on June 18 after a 14-point US–Iran nuclear framework was signed, unlocking a 30-day Strait of Hormuz reopening and a $12bn asset unfreeze. Goldman Sachs now forecasts a $75 average for 2027 and warns supply overhang could push prices toward $60 if nuclear talks fully succeed. OPEC+ credibility is under pressure as member compliance erodes.\n\n**AI / Tech / SpaceX IPO** — SpaceX priced above the top of its range, raising $75–85bn at a $1.8–2.7tn valuation and surging 17–19% on debut. Franklin Templeton argues the IPO resets valuation anchors for Anthropic and OpenAI. UBS forecasts global AI capex at $820bn in 2026 rising to $990bn in 2027, but Man Group warns that $400bn in IG and $65bn in HY AI-related bond issuance is creating credit-bubble conditions, with hyperscaler free-cash-flow not recovering until 2029.\n\n**US Equities** — Institutional consensus leans cautiously constructive: Goldman's model portfolio holds 5% overweight equities vs. bonds, but flags valuation stretch with S&P 500 forward P/E near 21x. Amundi flags rising earnings-revision risk if the Fed stays on hold. BNY Mellon notes steady hiring and falling layoffs support consumer spending into H2, while Yardeni Research remains the bull outlier, projecting S&P 7,000 by year-end.\n\n**Crypto** — Bitcoin was trading near $63K with Warsh's dissent adding regulatory uncertainty. Galaxy Digital places the cycle bottom at $40–46K and sees a path to $150K by cycle peak. MicroStrategy / Strategy holds 846,842 BTC. CoinShares and Bitwise flag institutional ETF inflows accelerating, with spot BTC ETFs logging their 12th consecutive week of net positive flows.\n\n**Japan & Emerging Markets** — Macquarie is outright bullish on Japan normalisation, citing BoJ's credible tightening path and corporate governance reforms lifting ROE. Oxford Economics and Amundi both model the yen strengthening toward 130/USD by 2027. EM broadly mixed: India remains a favourite (Amundi, Franklin Templeton), while China caution persists amid property-sector drag and geopolitical friction.\n\n**Geopolitics & Trade** — The US–Iran deal dominates macro tail-risk discussions. KKR's mid-year outlook flags trade-war fatigue — the 90-day tariff pause is running out with no comprehensive deal. Standard Chartered sees ASEAN supply-chain beneficiaries as the durable winners. PIMCO's Ivascyn secular outlook stresses resilience portfolios over return-maximisation given geopolitical fragmentation.", "sections": {"A_debates": [{"theme": "Fed Path: One More Hike vs. Extended Pause", "consensus": "The Fed is on extended hold at 3.50–3.75%, with markets pricing roughly one 25bp hike priced in for Q4 2026 at roughly 55% probability. The dot plot median shifted to 3.8% for year-end, suggesting the committee sees one further move as its modal outcome. Inflation progress has stalled: core PCE re-accelerated to 2.9% in May, and the labor market remains tight enough that the Fed cannot claim victory.", "divergence": "Goldman Sachs and JPMorgan both believe the next move is a hike — Goldman puts it at September, JPMorgan at November — arguing that services inflation and shelter costs will not fall fast enough without a further tightening impulse. PIMCO sits on the opposite side, arguing the lagged effects of 500bp of prior hikes have not fully worked through and that a hike would be a policy mistake that risks cracking the labor market in 2027. Amundi takes a middle path, calling the Fed on hold through year-end but warning that any upside inflation surprise in July CPI could accelerate the timeline."}, {"theme": "ECB: One-and-Done or More Hikes Ahead", "consensus": "The ECB's June 25bp hike to 2.25% was framed as a cautious recalibration to sticky inflation, not the start of a new cycle. EZ core inflation remains at 3.2% while growth is fragile: the ECB simultaneously cut its 2026 GDP forecast to 1.0%. Lagarde explicitly avoided signalling further moves, emphasising that each future decision will be data-dependent.", "divergence": "BNP Paribas Asset Management argues the hike was a policy mistake — corporate profit margins are compressing and southern European periphery spreads are widening, making further tightening dangerous. They see the ECB reversing course with a cut by Q1 2027. In contrast, Amundi Research believes one additional hike is likely in September if EZ wages keep rising above 4%, pointing to still-elevated services inflation. The divergence reflects fundamentally different reads on whether the June hike was preemptive tightening or the tail-end of a normalisation cycle."}, {"theme": "Oil at $75–80: Floor or Trap Door", "consensus": "The Iran nuclear deal's 30-day Strait of Hormuz reopening has durably repriced Brent from the mid-$80s to the mid-$70s. Market participants broadly agree that the geopolitical risk premium has deflated and that OPEC+ spare capacity is larger than previously assumed. Goldman Sachs, Standard Chartered, and Macquarie all carry $72–78 Brent estimates for H2 2026.", "divergence": "Goldman Sachs argues that if the 60-day nuclear negotiation phase produces a comprehensive deal and Iranian oil fully returns to market, Brent could fall into the high-$50s or low-$60s — a level at which US shale capex plans unravel, creating a multi-year supply-destruction dynamic. The opposing view, held by energy analysts at Man Group and KKR, is that $70 acts as a credible floor because Saudi Arabia's fiscal breakeven is $80 and Riyadh will unilaterally cut if prices threaten to fall below $70. The debate turns on whether the cartel's cohesion survives an extended low-price environment."}, {"theme": "AI Capex Cycle: Boom or Bubble", "consensus": "AI infrastructure spending is real and accelerating. UBS estimates $820bn in global AI capex in 2026 rising to nearly $1tn in 2027. Hyperscalers — Microsoft, Alphabet, Amazon, Meta — have all raised guidance. The buildout is creating genuine demand for power infrastructure, data-centre REITs, and semiconductor equipment. Goldman Sachs Private Markets identifies data-centre financing as the fastest-growing segment in infrastructure credit.", "divergence": "Man Group's H2 2026 credit outlook raises a pointed structural concern: AI companies have issued over $400bn in IG bonds and $65bn in HY bonds in 18 months, and hyperscaler free cash flow will not recover to pre-capex levels until 2029. Man Group argues credit investors are pricing in AI revenue ramps that have not yet materialised, making AI-linked credit the most mispriced segment in fixed income. The consensus bull camp, led by Franklin Templeton and UBS equity, counters that the SpaceX IPO demonstrated that markets will value option-on-the-future without near-term FCF, and that AI monetisation through enterprise software and cloud margin expansion will validate the capex within three years."}, {"theme": "Bitcoin Cycle: Bottoming Process or Structural Decline", "consensus": "Bitcoin's four-year halving cycle remains the dominant analytical framework among crypto-native institutions. Galaxy Digital's cycle analysis places the current phase as a mid-cycle correction, consistent with prior cycles where BTC retraced 35–50% before resuming the bull run. Institutional ETF inflows are structurally different from prior cycles, providing a demand floor that did not exist in 2018 or 2022.", "divergence": "Galaxy Digital's base case bottom sits at $40–46K, implying further downside from current ~$63K levels — a 27–37% further drawdown before the cycle resumes. Bitwise and CoinShares are more sanguine, arguing that the ETF bid and Strategy's 846,842 BTC treasury position have permanently altered supply dynamics, and that $55K is the true floor. The key unresolved variable is regulatory: Warsh's abstention at the Fed and his known scepticism of crypto-adjacent financial stability risks inject a policy-uncertainty premium that Galaxy Digital explicitly models as a $5–8K headwind to near-term price."}, {"theme": "Japan Normalization: How Far, How Fast", "consensus": "The BoJ's move to 1.00% is broadly accepted as confirmation that the era of ultra-loose policy is over. Oxford Economics models a terminal rate of 1.5% by mid-2027. Corporate governance reforms — cross-shareholding unwinding, rising dividends, buybacks — are widely seen as structural positives for Japanese equities. The yen is expected to strengthen toward 130–135/USD over a 12-month horizon.", "divergence": "Macquarie takes the most aggressive bullish stance on Japan, arguing that markets are still underpricing the pace of BoJ hikes and that 10-year JGB yields could reach 2.0% by end-2026, which would trigger a significant rotation of Japanese institutional capital back into domestic bonds from foreign assets. Oxford Economics is more cautious, modelling a gradual path with pauses if global growth softens. The critical open question is whether faster-than-expected BoJ tightening triggers a second yen-carry-unwind episode similar to August 2024."}, {"theme": "US Equity Valuations: Stretched or Justified by AI", "consensus": "S&P 500 forward P/E near 21x is above the 20-year median of 16.5x. Amundi, Man Group, and PIMCO all flag valuation as a constraint on future returns. Expected 10-year nominal equity returns are revised down to 5–7% by most multi-asset allocators, making the equity-risk premium thin relative to 5% cash yields that have persisted.", "divergence": "Goldman Sachs Equity Strategy and Yardeni Research argue that the AI productivity premium justifies above-average multiples, with Yardeni projecting S&P 500 at 7,000 by year-end 2026. They contend that the historical P/E comparison is misleading because today's index is more concentrated in capital-light software businesses with structurally higher margins. Amundi directly rebuts this, noting that consensus EPS estimates embed 12% earnings growth — a figure that assumes full AI monetisation and no tariff drag, both of which are uncertain — making the risk asymmetry unfavourable for new buyers at current levels."}], "B_calls": [{"source": "Goldman Sachs", "call": "Underweight oil — Brent $75 average forecast for 2027", "rationale": "Iran nuclear deal unlocks 1.5–2mb/d of supply; OPEC+ cohesion is eroding; demand growth slowing to 800kb/d in 2026 vs. 1.4mb/d in 2023.", "url": "https://www.goldmansachs.com/insights/articles/why-oil-prices-could-grind-lower-amid-the-us-iran-deal"}, {"source": "Goldman Sachs", "call": "Overweight private infrastructure credit; data-centre financing is fastest-growing segment", "rationale": "AI capex cycle requires $400bn+ in data-centre construction annually; private credit fills the gap where syndicated loan markets are too slow; Goldman Private Markets sees 12–14% net IRR in senior secured data-centre debt.", "url": "https://www.goldmansachs.com/insights/articles/private-markets-expected-to-have-growing-role-in-data-center-financing"}, {"source": "Man Group", "call": "Underweight AI-linked IG and HY credit; prefer financials and healthcare credit instead", "rationale": "$400bn IG + $65bn HY AI bond issuance in 18 months with hyperscaler FCF not recovering until 2029; spreads do not compensate for execution risk on revenue ramp.", "url": "https://www.man.com/insights/2026-h2-credit-outlook"}, {"source": "PIMCO", "call": "Build resilience portfolios: overweight short-duration TIPS, investment-grade credit ladders, and real assets; underweight long-duration Treasuries", "rationale": "Secular fragmentation — geopolitical, supply-chain, fiscal — means inflation volatility will stay elevated; the secular outlook argues for sacrificing some return for protection against left-tail inflation scenarios.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/secular-outlook/resilience-matters"}, {"source": "Amundi", "call": "Overweight European investment-grade credit vs. US; ECB hike cycle near terminal, spread compression likely in H2", "rationale": "EZ IG spreads at +120bp vs. +95bp for US IG — EZ offers better carry; ECB near terminal rate removes a key headwind; European bank credit fundamentals remain solid.", "url": "https://research-center.amundi.com/article/ecb-raises-rates-after-almost-three-years"}, {"source": "Macquarie", "call": "Overweight Japanese equities and long JPY; 10-year JGB yield target 1.8–2.0% by end-2026", "rationale": "BoJ on track for 1.5% terminal rate; corporate governance reforms are accelerating buybacks and dividends; yen undervalued vs. PPP; JGB yield rise will trigger repatriation flows.", "url": "https://www.macquarie.com/au/en/insights/japan-normalisation.html"}, {"source": "Galaxy Digital", "call": "Bitcoin: reduce exposure near $60–65K; re-enter aggressively at $40–46K cycle bottom", "rationale": "Four-year halving cycle analysis places current phase as mid-cycle correction with 35–50% historical retracement; base case bottom $40–46K before resuming to $150K+ cycle peak.", "url": "https://www.galaxy.com/insights/research/bitcoin-four-year-cycle-where-is-the-bottom"}, {"source": "Franklin Templeton / ClearBridge", "call": "Buy SpaceX derivatives and listed space-sector equities ahead of secondary market liquidity", "rationale": "SpaceX IPO at $1.8–2.7tn valuation resets comp multiples for hard-tech platforms; Starlink ARR growing 80% YoY; launch cost per kg has fallen 95% since Falcon 1; SpaceX now holds 90% of commercial launch market share.", "url": "https://www.franklintempleton.com/articles/2026/clearbridge-investments/orbit-shift-sizing-up-the-impact-of-spacex-and-mega-ipos"}, {"source": "Oxford Economics", "call": "BoJ terminal rate 1.5% by mid-2027; end of JGB tapering in FY2027 adds duration supply pressure", "rationale": "Japan CPI ex-fresh food at 2.4%; wage growth 3.8% — above BoJ's 2% target sustainably for first time in 30 years; BoJ communicated end of tapering in FY2027 at June meeting.", "url": "https://www.oxfordeconomics.com/resource/the-boj-hiked-a-policy-rate-and-will-end-the-tapering-of-jgb-purchases-in-fy2027/"}, {"source": "KKR", "call": "Overweight ASEAN infrastructure and supply-chain assets; underweight China-linked manufacturing EM", "rationale": "90-day US tariff pause expiring with no comprehensive deal; companies accelerating China+1 strategies into Vietnam, India, Indonesia; KKR Global Macro mid-year upgrade of ASEAN to overweight.", "url": "https://www.kkr.com/insights/midyear-outlook-2026"}, {"source": "Standard Chartered", "call": "Buy gold on dips to $3,100–3,150; 12-month target $3,500", "rationale": "US–Iran deal reduces oil risk premium but shifts capital toward safe-haven stores of value; central bank buying running at 1,100 tonnes/year pace; BRICS+ dedollarisation flows structurally supportive.", "url": "https://www.sc.com/sg/market-outlook/market-watch-18-6-2026/"}, {"source": "BNY Mellon", "call": "Maintain overweight US consumer discretionary; labor market resilience supports spending through Q3", "rationale": "Initial jobless claims 4-week average at 215K — below recessionary threshold; layoffs still running below 2019 levels; real wage growth positive for 18 consecutive months; consumer balance sheets remain solid.", "url": "https://www.bny.com/investments/us/en/individual/articles/markets-and-economy/steady-hiring-fewer-layoffs.html"}, {"source": "UBS", "call": "Global AI capex theme: overweight semiconductor equipment, power infrastructure, and data-centre REITs", "rationale": "UBS forecasts $820bn AI capex in 2026 rising to $990bn in 2027; the supply chain for data centres — chips, cooling, power, connectivity — will outgrow end demand for AI services in the near term, making infrastructure the lower-risk way to play the theme.", "url": "https://www.ubs.com/global/en/wealth-management/insights/chief-investment-office/investment-opportunities/2026/ai-and-the-infrastructure-opportunity.html"}], "C_deep_reads": [{"title": "Resilience Matters — Secular Outlook 2026", "source": "PIMCO", "author": "Dan Ivascyn, CIO", "summary": "PIMCO's annual secular outlook argues that the post-GFC era of low volatility is permanently over. Geopolitical fragmentation, fiscal excess across G7 governments, and climate-related supply shocks create a new regime where inflation volatility — not its level — is the key portfolio risk. Ivascyn recommends building resilience portfolios: shorter duration, real assets, liquid alternatives, and IG credit ladders rather than return-maximisation portfolios of long-duration Treasuries and high-beta equities. The piece is notable for its explicit bearishness on 30-year Treasuries at current yields and its argument that the equity-risk premium has collapsed to the point where risk-adjusted returns from bonds and equities have converged.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/secular-outlook/resilience-matters"}, {"title": "2026 H2 Credit Outlook: The AI Credit Bubble", "source": "Man Group", "author": "Man Group Credit Research", "summary": "Man Group's H2 2026 credit outlook delivers the most pointed institutional warning on AI-linked credit risk published this cycle. The piece documents $400bn in IG and $65bn in HY bond issuance by AI-adjacent companies since late 2024, with spread pricing that implies revenue ramps that have not materialised. The key quantitative insight: hyperscaler FCF will not recover to pre-capex levels until 2029, meaning three years of negative FCF-to-debt-service coverage at a credit cycle that is already 18 months old. Man Group recommends rotating out of AI-linked tech credit into financials (benefiting from higher-for-longer rates) and healthcare (defensive, non-cyclical cash flows). The piece includes a detailed spread decomposition and a table of 14 individual bond issuances they consider mispriced.", "url": "https://www.man.com/insights/2026-h2-credit-outlook"}, {"title": "Bitcoin's Four-Year Cycle: Where Is the Bottom?", "source": "Galaxy Digital", "author": "Galaxy Digital Research", "summary": "Galaxy Digital's cycle analysis is the most rigorous quantitative treatment of Bitcoin valuation in this week's dataset. The piece maps the current cycle against all prior post-halving periods, identifies the drawdown magnitude and duration of prior mid-cycle corrections (2013: -57%, 2017: -38%, 2021: -54%), and places the 2026 correction at -40% from the January 2026 peak of $107K — implying a base-case bottom of $40–46K. The analysis introduces a regulatory headwind factor (Warsh risk) as a new variable not present in prior cycles, worth approximately $5–8K in suppressed price. The bull case — $150K+ by cycle peak — rests on ETF structural inflows running at $800mn/week as a persistent demand floor that did not exist in prior cycles.", "url": "https://www.galaxy.com/insights/research/bitcoin-four-year-cycle-where-is-the-bottom"}, {"title": "Orbit Shift: Sizing Up the Impact of SpaceX and Mega-IPOs", "source": "Franklin Templeton / ClearBridge Investments", "author": "ClearBridge Investments Portfolio Team", "summary": "The most detailed institutional treatment of the SpaceX IPO and its implications for private-market valuation. ClearBridge documents SpaceX's $1.8–2.7tn IPO valuation, 17–19% first-day gain, and the strategic context: Starlink // ---------- helpers ----------
const CAT_VARS = {
  rates: 'var(--cat-rates)',
  growth: 'var(--cat-growth)',
  fx: 'var(--cat-fx)',
  equities: 'var(--cat-equities)',
  credit: 'var(--cat-credit)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  commodities: 'var(--cat-commodities)',
  geopolitics: 'var(--cat-geopolitics)',
  ai_tech: 'var(--cat-ai_tech)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}
function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}
function pills(cats) {
  if (!cats) return '';
  if (Array.isArray(cats)) return cats.map(pill).join(' ');
  return pill(cats);
}
function externalLink(url, label) {
  if (!url) return '';
  return `<a class="item-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${label || 'link →'}</a>`;
}
function nameLink(url, name) {
  if (!name) return '';
  if (!url) return `<span class="item-source">${escapeHtml(name)}</span>`;
  return `<a class="item-source" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderThemeItem(it) {
  return `
    <div class="theme-item">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.thesis || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderTheme(theme) {
  const items = (theme.items || []).map(renderThemeItem).join('');
  return `
    <div class="theme">
      <div class="theme-head">
        ${pills(theme.category)}
        <div class="theme-title">${escapeHtml(theme.theme || '')}</div>
      </div>
      <div class="theme-stance">
        ${theme.consensus ? `<div class="theme-line consensus"><span class="lbl">Consensus</span>${renderBold(theme.consensus)}</div>` : ''}
        ${theme.divergence ? `<div class="theme-line divergence"><span class="lbl">Divergence</span>${renderBold(theme.divergence)}</div>` : ''}
      </div>
      ${items ? `<div class="theme-items">${items}</div>` : ''}
    </div>`;
}

function renderCall(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${pills(it.category)}
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.call || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderDeepRead(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url, 'read →')}
      </div>
      ${it.title ? `<div class="item-title">${escapeHtml(it.title)}</div>` : ''}
      <div class="item-text">${renderBold(it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderChart(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.chart || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderHouseView(hv) {
  const name = hv.name || hv.source || '';
  const nameHtml = hv.url
    ? `<a class="hv-name" href="${escapeAttr(hv.url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : `<span class="hv-name">${escapeHtml(name)}</span>`;
  return `
    <div class="hv-row">
      ${nameHtml}
      <span class="hv-stance">${renderBold(hv.stance || '')}</span>
    </div>`;
}

function renderSection(letter, name, items, render, extraClass) {
  if (!items || !items.length) return '';
  const body = items.map(render).join('');
  const cls = 'section' + (extraClass ? (' ' + extraClass) : '');
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderTopStats(d) {
  const parts = [];
  const p = d.period || {};
  const is = d.input_stats || {};
  const cv = d.coverage || {};
  if (p.from && p.to)
    parts.push(`period <strong>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</strong>`);
  else if (p.lookback_days != null)
    parts.push(`lookback <strong>${p.lookback_days}d</strong>`);
  if (is.total_articles != null) parts.push(`articles <strong>${is.total_articles}</strong>`);
  if (is.sources_present != null) parts.push(`sources <strong>${is.sources_present}</strong>`);
  if (is.after_filter != null) parts.push(`after filter <strong>${is.after_filter}</strong>`);
  if (cv.coverage_pct != null) {
    const pct = (cv.coverage_pct <= 1 ? cv.coverage_pct * 100 : cv.coverage_pct);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  } else if (cv.sources_covered != null && cv.sources_total != null) {
    parts.push(`coverage <strong>${cv.sources_covered}/${cv.sources_total}</strong>`);
  }
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.period && d.period.to) return d.period.to;
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

// ---------- interactions ----------
function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  const s = d.sections || {};
  const out = [
    renderSummary(d.summary),
    renderSection('A.', 'Debates — Consensus vs Divergence', s.A_debates,    renderTheme),
    renderSection('B.', 'Key Calls & Positioning',           s.B_calls,      renderCall),
    renderSection('C.', 'Notable Deep Reads',                s.C_deep_reads, renderDeepRead,
                  'section-deepreads'),
    renderSection('D.', 'Charts & Data',                     s.D_charts,     renderChart),
    renderSection('E.', 'House Views',                       s.house_views,  renderHouseView),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = out || '<div class="empty">No report data.</div>';

  // Auto-open Summary's section view: first two sections open by default.
  document.querySelectorAll('.section').forEach((sec, i) => {
    if (i < 2) sec.classList.add('open');
  });
}

renderReport(REPORT_DATA);
</script>
