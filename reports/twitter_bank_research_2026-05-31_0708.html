<style>

:root {
  --bg: #faf8f5;

  --accent-bg: #f0f5ff;
  --accent-2: #1d4ed8;
  --tag-text: #0e7490;

  --yellow: #fff5b3;
  --yellow-border: #f0d966;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: var(--accent); }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS (top-level collapsible) */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: var(--accent-bg); cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; color: var(--accent-2); }
.section-head:hover { background: #e1ecff; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* TOPIC (nested collapsible inside Topics section) */
.topic { border-bottom: 1px solid var(--border-light); }
.topic:last-child { border-bottom: none; }
.topic-head { display: flex; align-items: center; gap: 10px; padding: 10px 16px;
              background: var(--accent-bg); cursor: pointer; user-select: none;
              font-size: 13px; font-weight: 600; color: var(--accent-2); }
.topic-head:hover { background: #e1ecff; }
.topic-name { flex: 1; }
.topic-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); }
.topic-arrow { font-size: 10px; transition: transform .2s; }
.topic.open .topic-arrow { transform: rotate(90deg); }
.topic-body { display: none; padding: 4px 0 6px; }
.topic.open .topic-body { display: block; }

/* ITEM CARDS */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;

.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DATA POINT TAGS */
.data-points { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.dp-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
          background: var(--tag-bg); color: var(--tag-text);
          padding: 2px 7px; border-radius: 4px; }

/* CHARTS (large, NOT thumbnails) */
.charts { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.chart { width: 100%; max-width: 420px; height: auto;
         border: 1px solid var(--border); border-radius: 4px; cursor: zoom-in;
         background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
  .chart { max-width: 100%; }
}
</style>
</head>

      "items": [
        {

          "text": "Another week of record highs in the major indices, yet Goldman’s U.S. Equity Sentiment Indicator moved even closer to neutral this past week, once again reinforcing the point that broader sentiment remains far from stretched and still sits well below the levels typically associated with true market euphoria",
          "tweet_url": "https://x.com/eliant_capital/status/2060842052926287952",

          "text": "Goldman's Tony Pasquariello reminds us there's more than tech making money.\n\nAs of mid-May a basket of global stocks leveraged to rare earths and critical minerals was up 133% in the last 12 months. https://t.co/Oh6AOXKkab",

        {

          "text": "Goldman's Analyst Index (basically a PMI based on input from their analysts) increased by 7.8pt to 66.4 in May to the highest level since May 2022. The composition was strong, as the new orders (+21.2pt to 77.7), employment (+6.0pt to 51.2), and shipments (+3.0pt to 63.9) components all increased. \n\nThe GSAI’s output prices component increased to its highest level since June 2021.",
          "tweet_url": "https://x.com/neilksethi/status/2060730451824947646",

          "created_at": "2026-05-30T14:30:00.000Z",
          "relayers": []
        },
        {
          "author": "MikeZaccardi",
          "text": "GS: M&amp;A will be another source of corporate demand for US equity in the coming quarters. \n\nUS M&amp;A activity has been resilient this year despite market volatility, with almost $900 billion of announced transactions YTD (+48% year/year). https://t.co/PyaYMKNrbV",
          "tweet_url": "https://x.com/MikeZaccardi/status/2060723152624201921",

          "text": "GS: Despite weak recent buyback growth, US companies remain a large source of equity demand. \n\nWe expect US companies to execute more than $1.3 trillion in buybacks in 2026. https://t.co/RlMgqg6SiK",
          "tweet_url": "https://x.com/MikeZaccardi/status/2060719378597847084",

          "created_at": "2026-05-30T13:46:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "Goldman: US IPO activity has recently accelerated following four consecutive years of muted issuance. \n\n24 US companies have come to market so far in Q2 2026, bringing the YTD total to 40. This represents more than double the number of IPOs at this point in 2025 and the largest total through May since the 95 IPOs launched in the first five months of 2021. \n\nNonetheless, despite the recent pickup in activity, the number of deals so far this year has lagged the average total of 50 IPOs through May since 1995.\n\nSimilarly, US IPOs have raised $28 billion in gross proceeds YTD, the largest total at this point in the year since 2021 (which ended with a record $115 billion).",
          "tweet_url": "https://x.com/neilksethi/status/2060717866316423514",

        {

          "text": "GS: Slowing buyback growth alongside equity market appreciation has continued to push the S&amp;P 500 buyback yield lower. \n\nThe S&amp;P 500 trailing 12-month net buyback yield sits at 1.9%, compared with a median of 2.4% since 2005. https://t.co/PQ1XO5AuhK",
          "tweet_url": "https://x.com/MikeZaccardi/status/2060715602507923583",
          "images": [
            "https://pbs.twimg.com/media/HJkh67gWIAIToKg.png"
          ],
          "created_at": "2026-05-30T13:31:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "From the upcoming Week Ahead.  Sub here and you'll get the full report this Sunday: https://t.co/q0o89SNAmO\n\nGoldman’s US Equity Sentiment Indicator* fell for a fifth week to 0.2 down from 1.7 five weeks ago, which was the highest level since late 2024.\n\nThis reading sees positive returns over the next month nearly 60% of the time and has been associated with an ~0.7% return.",
          "tweet_url": "https://x.com/neilksethi/status/2060712833298641197",
          "images": [
            "https://pbs.twimg.com/media/HJkXHfLW4AQxvVQ.png",
            "https://pbs.twimg.com/media/HJkXH4WW0AU6xZz.jpg"
          ],
          "created_at": "2026-05-30T13:20:00.000Z",
          "relayers": []
        },
        {
          "author": "MikeZaccardi",
          "text": "GS: Corporate buybacks have continued to give way to surging capex spending. https://t.co/TjOI1c4VYK",
          "tweet_url": "https://x.com/MikeZaccardi/status/2060711828452212846",
          "images": [
            "https://pbs.twimg.com/media/HJkefOiWYAIgUdI.png"
          ],
          "created_at": "2026-05-30T13:16:00.000Z",

        {
          "author": "MikeZaccardi",
          "text": "IPO issuance may not be the risk... but expiring lockups... \n\nBased on historical patterns, we estimate that recent and upcoming IPOs will unlock roughly $500 billion in additional shares available for sale in 2026, with a likely larger amount in 2027. GS https://t.co/UuU6Fds6iy",
          "tweet_url": "https://x.com/MikeZaccardi/status/2060708053096227042",
          "images": [

          "tweet_url": "https://x.com/MikeZaccardi/status/2060698780500939177",
          "images": [
            "https://pbs.twimg.com/media/HJkSmYRXMAk3Irz.png"

    },
    {
      "bank": "BofA",
      "theme": "Hartnett — financial assets at record vs GDP; geopolitics/midterms; Taylor Rule/hike risk resurfaces; speculative cycle not yet broken",
      "items": [
        {
          "author": "neilksethi",
          "text": "BoA from three weeks ago: The longer the war continues, the closer the midterms, and the more likely it becomes that higher gas prices have an impact. This could affect the US Administration's calculus around the war. But it also likely factors into Iran's thinking, as delaying any agreement could deter potential future strikes. \n\nAlthough our base case remains a resolution in the next few weeks, markets could be underpricing risks of a more extended conflict. \n\nBesides the war, the midterms are also likely to impact the calculus around trade policy. With Section 122 tariffs expiring no later than July, the US Administration is expected to announce additional tariffs under Sections 232 and 301. However, we think the decline in tariff revenues that we have already observed since the SCOTUS ruling on IEEPA could continue. We see effective tariffs likely to end up in the 6-8% range, though the latest escalation with the EU poses some upside risks to this view.",
          "tweet_url": "https://x.com/neilksethi/status/2060783301674025226",
          "images": [
            "https://pbs.twimg.com/media/HJkYH1sWsAIocWo.png"
          ],
          "created_at": "2026-05-30T18:00:01.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "Putting together two posts from earlier this month:\n\nBoA: \"weight differences on computer software & accessories and calculators, typewriters & other information processing equipment explain over 50% of the wedge between PCE and CPI prices\".\n\nBLS: Import prices for semiconductors/electrical equipment were +7.2% m/m and +20.3% Y/Y.",
          "tweet_url": "https://x.com/neilksethi/status/2060752846652596314",
          "images": [
            "https://pbs.twimg.com/media/HJkXpe5WoAApT0s.jpg"
          ],
          "created_at": "2026-05-30T15:59:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "BoA (Hartnett): The stock of US private sector financial  assets (stocks & bonds, but also cash deposits, loans, private equity, and pension fund reserves) is [at a record high] relative to US GDP, illustrating the “financialization” of  the US economy and the high degree of wealth inequality.\n\nThe value of financial assets (Wall St)  relative to GDP (Main St) is currently  6.5x…a new high, well above the range of  2.5x-3.5x in the 30–40-year period prior to  the globalization & deregulation of the 1980s & early 1990s.",
          "tweet_url": "https://x.com/neilksethi/status/2060745549100290243",
          "images": [
            "https://pbs.twimg.com/media/HJkXVBNXEAUvk7d.png"
          ],
          "created_at": "2026-05-30T15:30:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "BoA: With the Fed conversation moving from cuts to hikes, there has been renewed interest  in the Taylor Rule. \n\nThe Fed looks at a range of Taylor Rule models that assess how policy should be set in response to inflation and activity data. The two most important models are: i) the original Taylor Rule from 1993 and ii) the balanced approach, which doubles the weight on the activity side of the mandate. \n\nWe replicate these models using the unemployment gap (the equilibrium u-rate minus the actual u-rate) instead of the output gap, and adjusting the corresponding weight based on Okun’s Law [which posits when unemployment increases by ~1% GDP falls by ~2% and vice versa]. For the neutral real rate, the equilibrium u-rate and the inflation  objective, we use the median longer run estimates from the Fed’s SEP. We assume the  target variable for inflation is y/y core PCE.\n\nExhibit 1 shows that Fed policy was in line with the 1993 Taylor Rule and Balanced Approach models for most of last year. Policy now looks loose again, due to i) a pickup in  core PCE inflation, ii) a decline in the u-rate relative to 4Q 2025, and iii) a small uptick in the Fed’s median longer run policy rate estimate. Taken at face value, both models call  for about 100bp of hikes.",
          "tweet_url": "https://x.com/neilksethi/status/2060722900592972213",
          "images": [
            "https://pbs.twimg.com/media/HJiLWkIWsAILwPr.png"
          ],
          "created_at": "2026-05-30T14:00:00.000Z",
          "relayers": []
        },

        {

          "text": "Goldman: Our base case is for US equities to generate positive returns on net through year-end. \n\nOur US equity Sentiment Indicator currently registers just 0.2, pointing to modest investor positioning. \n\nAn improvement in the geopolitical outlook or dovish shift in rate market pricing would spur further equity market upside.",

        {

          "text": "GS: M&amp;A will be another source of corporate demand for US equity in the coming quarters. \n\nUS M&amp;A activity has been resilient this year despite market volatility, with almost $900 billion of announced transactions YTD (+48% year/year). https://t.co/PyaYMKNrbV",

        {
          "author": "neilksethi",
          "text": "Goldman: US IPO activity has recently accelerated following four consecutive years of muted issuance. \n\n24 US companies have come to market so far in Q2 2026, bringing the YTD total to 40. This represents more than double the number of IPOs at this point in 2025 and the largest total through May since the 95 IPOs launched in the first five months of 2021. \n\nNonetheless, despite the recent pickup in activity, the number of deals so far this year has lagged the average total of 50 IPOs through May since 1995.\n\nSimilarly, US IPOs have raised $28 billion in gross proceeds YTD, the largest total at this point in the year since 2021 (which ended with a record $115 billion).",

          "text": "GS: Slowing buyback growth alongside equity market appreciation has continued to push the S&amp;P 500 buyback yield lower. \n\nThe S&amp;P 500 trailing 12-month net buyback yield sits at 1.9%, compared with a median of 2.4% since 2005. https://t.co/PQ1XO5AuhK",

        {
          "author": "neilksethi",
          "text": "From the upcoming Week Ahead.  Sub here and you'll get the full report this Sunday: https://t.co/q0o89SNAmO\n\nGoldman’s US Equity Sentiment Indicator* fell for a fifth week to 0.2 down from 1.7 five weeks ago, which was the highest level since late 2024.\n\nThis reading sees positive returns over the next month nearly 60% of the time and has been associated with an ~0.7% return.",

    {
      "topic": "BofA — Hartnett — financial assets at record vs GDP; geopolitics/midterms; Taylor Rule/hike risk resurfaces; speculative cycle not yet broken",
      "items": [
        {
          "author": "neilksethi",
          "text": "BoA from three weeks ago: The longer the war continues, the closer the midterms, and the more likely it becomes that higher gas prices have an impact. This could affect the US Administration's calculus around the war. But it also likely factors into Iran's thinking, as delaying any agreement could deter potential future strikes. \n\nAlthough our base case remains a resolution in the next few weeks, markets could be underpricing risks of a more extended conflict. \n\nBesides the war, the midterms are also likely to impact the calculus around trade policy. With Section 122 tariffs expiring no later than July, the US Administration is expected to announce additional tariffs under Sections 232 and 301. However, we think the decline in tariff revenues that we have already observed since the SCOTUS ruling on IEEPA could continue. We see effective tariffs likely to end up in the 6-8% range, though the latest escalation with the EU poses some upside risks to this view.",
          "tweet_url": "https://x.com/neilksethi/status/2060783301674025226",
          "images": [
            "https://pbs.twimg.com/media/HJkYH1sWsAIocWo.png"
          ],
          "created_at": "2026-05-30T18:00:01.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "Putting together two posts from earlier this month:\n\nBoA: \"weight differences on computer software & accessories and calculators, typewriters & other information processing equipment explain over 50% of the wedge between PCE and CPI prices\".\n\nBLS: Import prices for semiconductors/electrical equipment were +7.2% m/m and +20.3% Y/Y.",
          "tweet_url": "https://x.com/neilksethi/status/2060752846652596314",
          "images": [
            "https://pbs.twimg.com/media/HJkXpe5WoAApT0s.jpg"
          ],
          "created_at": "2026-05-30T15:59:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "BoA (Hartnett): The stock of US private sector financial  assets (stocks & bonds, but also cash deposits, loans, private equity, and pension fund reserves) is [at a record high] relative to US GDP, illustrating the “financialization” of  the US economy and the high degree of wealth inequality.\n\nThe value of financial assets (Wall St)  relative to GDP (Main St) is currently  6.5x…a new high, well above the range of  2.5x-3.5x in the 30–40-year period prior to  the globalization & deregulation of the 1980s & early 1990s.",
          "tweet_url": "https://x.com/neilksethi/status/2060745549100290243",
          "images": [
            "https://pbs.twimg.com/media/HJkXVBNXEAUvk7d.png"
          ],
          "created_at": "2026-05-30T15:30:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "BoA: With the Fed conversation moving from cuts to hikes, there has been renewed interest  in the Taylor Rule. \n\nThe Fed looks at a range of Taylor Rule models that assess how policy should be set in response to inflation and activity data. The two most important models are: i) the original Taylor Rule from 1993 and ii) the balanced approach, which doubles the weight on the activity side of the mandate. \n\nWe replicate these models using the unemployment gap (the equilibrium u-rate minus the actual u-rate) instead of the output gap, and adjusting the corresponding weight based on Okun’s Law [which posits when unemployment increases by ~1% GDP falls by ~2% and vice versa]. For the neutral real rate, the equilibrium u-rate and the inflation  objective, we use the median longer run estimates from the Fed’s SEP. We assume the  target variable for inflation is y/y core PCE.\n\nExhibit 1 shows that Fed policy was in line with the 1993 Taylor Rule and Balanced Approach models for most of last year. Policy now looks loose again, due to i) a pickup in  core PCE inflation, ii) a decline in the u-rate relative to 4Q 2025, and iii) a small uptick in the Fed’s median longer run policy rate estimate. Taken at face value, both models call  for about 100bp of hikes.",
          "tweet_url": "https://x.com/neilksethi/status/2060722900592972213",
          "images": [
            "https://pbs.twimg.com/media/HJiLWkIWsAILwPr.png"
          ],
          "created_at": "2026-05-30T14:00:00.000Z",
          "relayers": []
        },
        {
          "author": "neilksethi",
          "text": "BoA's Hartnett says \"central banks & bonds [will] end [the] speculative price action... but not happening yet [with] global rate cuts (31) still outpacing hikes (12 – Chart 2), [and] real policy rates in Japan & Korea negative (why Nikkei & Kospi soaring as yen & won collapse), [with] traders happy to front-run [the] bubble until new Chair Warsh forced to enact tightening of financial conditions.\"",
          "tweet_url": "https://x.com/neilksethi/status/2060697733644820726",
          "images": [
            "https://pbs.twimg.com/media/HJiCaAZWIAAQXXd.png"
          ],
          "created_at": "2026-05-30T12:20:00.000Z",
          "relayers": []
        }
      ]

// ---------- helpers ----------
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderCharts(images) {
  if (!images || !images.length) return '';
  return `<div class="charts">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="chart" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderDataPoints(points) {
  if (!points || !points.length) return '';
  return `<div class="data-points">` + points.map(p =>
    `<span class="dp-tag">${escapeHtml(p)}</span>`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  const body = item.description || item.text || '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      ${body ? `<div class="item-text">${escapeHtml(body)}</div>` : ''}
      ${renderDataPoints(item.data_points)}
      ${renderCharts(item.images)}
    </div>`;
}

function renderTopic(topic, idx) {
  const items = (topic.items || []).map(renderItem).join('');
  const name = topic.topic || topic.name || `Topic ${idx + 1}`;
  return `
    <div class="topic">
      <div class="topic-head" onclick="toggleTopic(this)">
        <span class="topic-name">${escapeHtml(name)}</span>
        <span class="topic-count">${(topic.items || []).length}</span>
        <span class="topic-arrow">▸</span>
      </div>
      <div class="topic-body">${items || '<div class="empty">No items.</div>'}</div>
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author ? authorTag(author, 'link-author') : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, body, count) {
  return `
    <div class="section">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${count}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const parts = [];
  const cov = d.coverage || {};
  if (cov.authors_covered != null && cov.authors_total != null) {
    const pct = cov.authors_total ? (100 * cov.authors_covered / cov.authors_total) : 0;
    parts.push(`coverage <strong>${cov.authors_covered}/${cov.authors_total}</strong> (${pct.toFixed(0)}%)`);
  }
  const topicCount = (d.topics || []).length;
  const itemCount = (d.topics || []).reduce((n, t) => n + (t.items || []).length, 0);
  parts.push(`topics <strong>${topicCount}</strong>`);
  parts.push(`items <strong>${itemCount}</strong>`);
  if ((d.links || []).length) parts.push(`links <strong>${d.links.length}</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(el) { el.parentElement.classList.toggle('open'); }
function toggleTopic(el)   { el.parentElement.classList.toggle('open'); }

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) { el.classList.add('match'); el.classList.remove('dim'); }
    else                    { el.classList.add('dim'); el.classList.remove('match'); }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match'); el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
    else if (activeFilter) clearFilter();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';

  const topicsBody = (d.topics || []).map(renderTopic).join('')
                  || '<div class="empty">No topics.</div>';
  const linksBody = (d.links || []).map(renderLink).join('');

  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Topics', topicsBody, (d.topics || []).length),
    linksBody ? renderSection('B', 'Link Queue', linksBody, (d.links || []).length) : '',
  ].join('');

  document.getElementById('app').innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open the main section and the first topic.
  document.querySelectorAll('.section').forEach((s, i) => { if (i === 0) s.classList.add('open'); });
  const firstTopic = document.querySelector('.topic');
  if (firstTopic) firstTopic.classList.add('open');

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
