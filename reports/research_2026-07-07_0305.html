.tweetlabel.b{color:#7f77dd;}

let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderCatBar();
  renderCards();
}
function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderUrgBar();
  renderCards();
}
function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderCatBar();
  renderUrgBar();
  renderCards(true);
}

function renderCatBar() {
  var cats = {};
  ITEMS.forEach(function(i){ cats[i.cat] = (cats[i.cat]||0)+1; });
  var bar = document.getElementById('catbar');
  var html = '<button class="pill' + (activeCat==='all'?' active':'') + '" style="' + (activeCat==='all'?'background:#333;':'') + '" onclick="setCat(\'all\')">All<span class="n">' + ITEMS.length + '</span></button>';
  Object.keys(cats).sort().forEach(function(c){
    var color = CAT_COLORS[c] || "#999";
    var isActive = activeCat === c;
    html += '<button class="pill' + (isActive?' active':'') + '" style="' + (isActive? 'background:'+color+';border-color:'+color+';' : 'color:'+color+';border-color:'+color+';') + '" onclick="setCat(\'' + c + '\')">' + c + '<span class="n">' + cats[c] + '</span></button>';
  });
  bar.innerHTML = html;
}

function renderUrgBar() {
  var urgs = {};
  ITEMS.forEach(function(i){ urgs[i.urgency] = (urgs[i.urgency]||0)+1; });
  var bar = document.getElementById('urgbar');
  var html = '<button class="pill' + (activeUrg==='all'?' active':'') + '" style="' + (activeUrg==='all'?'background:#333;':'') + '" onclick="setUrg(\'all\')">All<span class="n">' + ITEMS.length + '</span></button>';
  ['act','deep','watch'].forEach(function(u){
    if(!urgs[u]) return;
    var isActive = activeUrg === u;
    html += '<button class="pill' + (isActive?' active':'') + '" style="' + (isActive? 'background:#555;border-color:#555;' : '') + '" onclick="setUrg(\'' + u + '\')">' + URG_META[u].label + '<span class="n">' + urgs[u] + '</span></button>';
  });
  bar.innerHTML = html;
}

function renderCards(expandMatches) {
  var container = document.getElementById('cards');
  var filtered = ITEMS.filter(function(i){
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== 'all' && i.cat !== activeCat) return false;
    if (activeUrg !== 'all' && i.urgency !== activeUrg) return false;
    return true;
  });
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">No items match this filter.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(item){
    var color = CAT_COLORS[item.cat] || "#999";
    var openClass = (activeSrc && expandMatches) ? ' open' : '';
    var chartMark = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += '<div class="card' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-head" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span class="urg">' + URG_META[item.urgency].emoji + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source.split(' / ')[0].split(' (')[0] + '</span>';
    html += '<span class="tag">' + item.cat + '</span>';
    if (chartMark) html += '<span class="chartmark">' + chartMark + '</span>';
    html += '<span class="htitle">' + item.title + '</span>';
    html += '<span class="arrow">▶</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="block"><div class="label">The Idea</div><div class="idea">' + item.idea + '</div></div>';
    html += '<div class="block"><div class="angle" style="border-left-color:' + color + '">' + item.angle + '</div></div>';
    html += '<div class="tweets">';
    html += '<div class="tweetbox"><div class="tweetlabel a">TWEET A</div><div class="tweettext">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweetbox"><div class="tweetlabel b">TWEET B</div><div class="tweettext">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="charts' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '<span class="hotlabel">🔥 CHART WORTH SAVING — </span>' : '') + (item.charts.desc || (item.charts.count + ' chart(s) in this email')) + '</div>';
    }
    html += '<div class="linkrow"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderMeta() {
  document.getElementById('metaline').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function renderReport() {
  var html = '<h3>Time Window</h3>';
  html += '<p>' + META.windowStart + ' → ' + META.windowEnd + ' (6-hour hard boundary). Emails outside this window were not processed.</p>';
  html += '<h3>Coverage</h3>';
  html += '<p>' + META.emailsInWindow + ' emails in window · ' + META.emailsRead + ' read in full · ' + META.itemsExtracted + ' items extracted.</p>';
  html += '<h3>Included Sources</h3>';
  META.includedSources.forEach(function(s){
    html += '<div><span class="srcline" onclick="filterBySrc(\'' + s.name.split(' (')[0].split(' /')[0] + '\')">' + s.name + '</span> — ' + s.count + ' item(s)</div>';
  });
  html += '<h3>Skipped Sources</h3>';
  META.skippedSources.forEach(function(s){
    html += '<div class="skipline">' + s.name + ' — ' + s.reason + '</div>';
  });
  document.getElementById('reportbody').innerHTML = html;
}

function init() {
  renderMeta();
  renderCatBar();
  renderUrgBar();
  renderCards();
  renderReport();
}
init();
</script>
</body>
</html>
