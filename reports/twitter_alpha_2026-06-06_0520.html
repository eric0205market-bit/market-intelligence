<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_type":"TWITTER ALPHA INTELLIGENCE","date":"2026-06-06 05:20 UTC","collected_at":"2026-06-06T05:20:33Z","stats":{"received":241,"after_filter":120,"authors":66,"coverage":0.82},"summary":"**MSTR/STRC Crisis — Market's Biggest Overhang:** Strategy (MSTR) and its preferred stock STRC became the week's central drama as BTC fell ~10% to test $59-60K. STRC has been trading below par ($80 range vs $100 face value), creating a confidence crisis. Multiple analysts (**Evan_ss6**, **Fiskantes**, **thedefivillain**, **Udi Wertheimer**) mapped the decision tree: if Saylor sold BTC he gets relief but \"still f'd\"; if he sold only MSTR shares it's \"f'd\"; if he sold nothing it's \"maximally f'd.\" The Monday 8-K disclosure is the single most market-moving event traders are watching.\n\n**Ethereum Under Pressure — Foundation Selling + Lubin Wallet Move:** **Beanie** reported the Ethereum Foundation sold 25,000 ETH to BitMine at a $2,400 average price — a 35% premium to spot — and has sold ~$700M in ETH over five years at a $3,500 average to \"fund operations.\" Separately, a wallet linked to Ethereum co-founder **Joseph Lubin** moved 80,001 ETH (~$121.6M) after three years of dormancy, flagged by **Nansen** (ASvanevik) and **Evan_ss6** citing on-chain data.\n\n**Circle/USDC Freeze + Hyperliquid/Perps Regulation:** **Laura Shin's** Uneasy Money podcast covered Circle's compliance with a judge's TRO order freezing a commingled DeFi pool — no warning, no notice — with Taylor Van Orden arguing this removes Circle's ability to push back on any future bad freeze. Separately, the CFTC proposed reclassifying perps as futures, and the NYSE CEO called Hyperliquid \"bigger than the Nasdaq.\" However, **Laura Shin** also featured a contrarian take that the CFTC perp order has no direct effect on Hyperliquid and could even be bearish for perp DEXs.\n\n**Equities Selloff — XLK -6.66%, QQQ Volume 90M:** Tech led the selldown; **Helene Meisler** flagged XLK -6.66% and QQQ volume at 90M shares — the highest since late March — noting buyers became sellers and that a VIX DSI reading of 10 had been a contrarian signal the prior day. META fell 7.1% on a report it was weighing a stock offering. **Citrini** noted Google's strategic advantage in having moved first on AI spend, making others follow with worse outcomes. **Puru Saxena** (AlphaTarget, +76.3% vs S&P +41.6% over 2 years) is positioned for a 10% SPX / 15% NDX / 30-40% growth stock correction.\n\n**AI & Robotics Catalysts Ahead:** **Andrew Kang** (Rewkang) sees GPT-5 level robot foundation models within a year, with Figure Robot as his highest-conviction bet. **Gene Munster** is bullish on AAPL rerating ahead of WWDC on Monday and expects SpaceX IPO ($SPCX) in one week. **Paul Graham** flagged a startup that cuts LLM token costs by ~50% with a TAM equal to a quarter of model companies' corporate revenue. **ZachXBT** called out Arthur Hayes for creating exit liquidity with NEAR/HYPE/ZEC and now WLD calls, with **Stacy Muur** noting WLD ran +68% in three weeks on Hayes/Maelstrom's AI proxy thesis before cooling to $0.52.","events":[{"title":"MSTR/STRC Crisis: BTC Selloff Disclosure Imminent","category":"crypto","description":"Strategy's STRC preferred stock trading below par, BTC sold or not sold — Monday 8-K disclosure is the market pivot.","items":[{"author":"Evan_ss6","text":"Mental model for Monday: Saylor sold 10-fig BTC = some relief, STRC can repeg but still damaged; Saylor sold only MSTR commons = bad; Saylor sold nothing = maximally f'd. The worst outcome is a surprise BTC purchase announcement. Notes that if he sells at this mNAV after pledging not to, confidence collapses, STRC can't raise meaningfully, and the era of buying ends.","tweet_url":"https://x.com/Evan_ss6/status/2062999743173697875","images":["https://pbs.twimg.com/media/HKGBhk3XsAELdT5.jpg","https://pbs.twimg.com/media/HKGBhk2WsAAxjoE.jpg"],"type":"thread"},{"author":"Fiskantes","text":"Working theory: Saylor is already selling BTC to cover next few years of STRC dividends — actually calls this \"hopium\" because if he's NOT selling, he'll be a forced seller later at lower prices. Won't default on STRC as it's his flagship product. Also warns Saylor is \"poisoning Bitcoin\" by controlling ~5% of supply, turning BTC into a bet on his execution ability.","tweet_url":"https://x.com/Fiskantes/status/2062942259788615707","images":[],"type":"thread"},{"author":"udiWertheimer","text":"Walks through STRC math: at $80, outstanding STRC valued at $8B vs only $600M cash, so Saylor can't buy back meaningfully. The BTC bought with STRC proceeds is down >20% too. Fanfic scenario that would send BTC to ATH: Saylor announces $5B BTC sale + locks rest for 4 years.","tweet_url":"https://x.com/udiWertheimer/status/2063016654976459180","images":[],"type":"thread"},{"author":"thedefivillain","text":"Pushes back on forced-seller narrative: Saylor has already been a de facto forced seller every month since STRC launched — selling MSTR shares to pay dividends, it's just nobody cared. Best Monday announcement would be $5B BTC sale; most likely scenario is they sold nothing.","tweet_url":"https://x.com/thedefivillain/status/2062972188995514525","images":[],"type":"tweet"},{"author":"Delphi_Digital","text":"Yan explains why Strategy may need to sell some Bitcoin: 'He can sell some now and that lengthens his runway considerably... and that also gives the Bitcoin market time.'","tweet_url":"https://x.com/Delphi_Digital/status/2062944530182398301","images":[],"type":"tweet"},{"author":"DonAlt","text":"$60K is the test level. If Saylor sells significantly more, $45K becomes possible; if this is the extent of selling, $60K is probably a good spot.","tweet_url":"https://x.com/DonAlt/status/2063030129220264324","images":["https://pbs.twimg.com/media/HKFaT9MaEAALZVk.png"],"type":"tweet"}]},{"title":"Ethereum Foundation Selling + Joseph Lubin Wallet Moves 80K ETH","category":"crypto","description":"EF sold 25K ETH to BitMine at 35% premium to spot; Lubin-linked wallet moved $121M ETH after 3 years dormant.","items":[{"author":"beaniemaxi","text":"Ethereum Foundation sold 25,000 ETH to BitMine at a $2,400 average — a 35% premium to today's price. In total the EF has sold ~$700M worth of ETH over five years at a $3,500 average to 'fund operations.'","tweet_url":"https://x.com/beaniemaxi/status/2063011846626382122","images":["https://pbs.twimg.com/media/HKFKVsZWEAAf2uv.jpg"],"type":"tweet"},{"author":"ASvanevik","text":"Nansen flagged a massive ETH ICO participant sending 80,000 ETH across two transactions in real time, identifiable as linked to Joseph Lubin. Transaction hash dropped for on-chain analysis via Nansen AI.","tweet_url":"https://x.com/ASvanevik/status/2063118687612354649","images":["https://pbs.twimg.com/media/HKGrgila4AA9VXn.jpg","https://pbs.twimg.com/media/HKGsT7XboAAhQKL.jpg"],"type":"thread"},{"author":"Evan_ss6","text":"Quoted the Lubin move with 'Et tu, Broseph?' — linking the on-chain report showing 80,001 ETH ($121.6M) moved from a wallet holding 243,300 ETH after 3+ years of inactivity.","tweet_url":"https://x.com/Evan_ss6/status/2063121691807498248","images":[],"type":"tweet"}]},{"title":"Circle/USDC Freeze — DeFi Pool Locked on Judge's Order","category":"regulation","description":"Circle complied with ex-parte TRO, freezing a commingled DeFi pool with no warning. Any USDC-exposed pool faces this risk.","items":[{"author":"laurashin","text":"New Uneasy Money episode: Taylor Van Orden's pointed argument that Circle's policy of complying with any judge's TRO order removes its ability to push back on a bad freeze. Any pool with USDC exposure is 'one ex-parte TRO away from a weekend lockdown.' Covers timeline from 31:28 on how Circle froze a commingled DeFi pool with no warning and no notice.","tweet_url":"https://x.com/laurashin/status/2063087372753907972","images":[],"type":"thread"}]},{"title":"Hyperliquid / Perps: NYSE CEO Hype vs CFTC Reclassification","category":"crypto","description":"NYSE CEO calls HYPE 'bigger than Nasdaq'; CFTC proposes perps-as-futures rule; contrarian argues no direct effect on HYPE.","items":[{"author":"laurashin","text":"Uneasy Money also covered: NYSE CEO calling Hyperliquid 'bigger than the Nasdaq' and Arthur Hayes betting $100K on it. Kyle Samani's 'Binance 2.0' knock examined. Separately, Laura Shin noted a take that the CFTC perp reclassification as futures has no direct effect on Hyperliquid and could even be bearish for perp DEXs.","tweet_url":"https://x.com/laurashin/status/2063086791264178389","images":[],"type":"thread"},{"author":"Evan_ss6","text":"Skeptical on CME perps: CME futures have poor spreads, so why would their perps be better? Suspects AmericaPerps will follow eventually but will wait to see.","tweet_url":"https://x.com/Evan_ss6/status/2063078405671686521","images":[],"type":"thread"}]},{"title":"META -7.1% Stock Offering + XLK -6.66% Tech Selloff","category":"macro","description":"META weighing a stock offering; tech sector hit hard; XLK -6.66% and QQQ volume at multi-month highs.","items":[{"author":"citrini","text":"Google acted first on AI capex, ensuring others follow with worse outcomes rather than risk being outspent. This strategic framing is why META's offering headline was damaging — Zuck is burning money without cleanly articulating ad value.","tweet_url":"https://x.com/citrini/status/2063023241006924287","images":[],"type":"tweet"},{"author":"Chartfest1","text":"XLK -6.66% on the day. QQQ volume 90 million shares — highest since late March. Transports were green. VIX DSI hit 10 yesterday — a contrarian signal that preceded today's move. 'Buyers become sellers' as AI trade positions got unwound.","tweet_url":"https://x.com/Chartfest1/status/2062993633754661102","images":[],"type":"tweet"},{"author":"buccocapital","text":"Zuck doesn't respect ads and the stock reflects that. If he clearly articulated how incredible AI is for ads and how good ads are for society, the stock would be materially higher.","tweet_url":"https://x.com/buccocapital/status/2063086995883061664","images":[],"type":"tweet"}]},{"title":"Zcash Controversy: Supply Exploit + Scam Allegations","category":"crypto","description":"ZEC supply bug / validator inflation alleged; Beanie accuses KOLs of paid pumping and calls it a scam.","items":[{"author":"beaniemaxi","text":"Detailed thread calling Zcash a scam: KOLs paid to post anything for money; ZEC printed for free and sold at $200-$800 with massive liquidity. The initial trusted setup requires trusting participants destroyed their keys — unverifiable. Notes a privacy engineer cited was not credible.","tweet_url":"https://x.com/beaniemaxi/status/2062998517254180912","images":[],"type":"thread"},{"author":"Fiskantes","text":"Compares BTC and ZEC: both down ~50% from ATH. ZEC has a potential exploit with newly minted supply in unknown hands; BTC has a 'madman' holding 5% who may be a forced seller. At current cap ZEC ~= XMR market cap — possibly around fair value with no clear upside.","tweet_url":"https://x.com/Fiskantes/status/2062940741303726170","images":["https://pbs.twimg.com/tweet_video_thumb/HKEKUjbWsAAfwAt.jpg"],"type":"thread"},{"author":"udiWertheimer","text":"ZEC is being repriced purely as a privacy coin now — the 'meme is dead.' ZEC market cap roughly equals XMR, suggesting we may be around fair value with no clear upside catalyst.","tweet_url":"https://x.com/udiWertheimer/status/2062964361748963715","images":[],"type":"tweet"}]},{"title":"WLD +68% in 3 Weeks — Hayes/Maelstrom AI Proxy Thesis","category":"crypto","description":"Worldcoin surged on Hayes's AI proxy narrative; ZachXBT accuses Hayes of creating exit liquidity.","items":[{"author":"stacy_muur","text":"WLD ran from $0.24 to ~$0.59 (+68%) in three weeks while the broad market fell ~10%. Thesis: WLD is the cheapest liquid way to bet on the AI IPO wave (OpenAI, Anthropic are locked in expensive SPVs at huge valuations). Hayes/Maelstrom called $5 by August. Honest caveat: this is a story-and-positioning trade, not a product one — no new shipping from Worldcoin. Already cooling to ~$0.52.","tweet_url":"https://x.com/stacy_muur/status/2062983301296799764","images":["https://pbs.twimg.com/media/HKEwYQmbcAEmKA1.jpg"],"type":"tweet"},{"author":"zachxbt","text":"Directly calls out Hayes: 'How much exit liquidity was created from your followers over the past couple days? First NEAR HYPE ZEC, now WLD.' Attaches charts showing the pattern.","tweet_url":"https://x.com/zachxbt/status/2063119034925895988","images":["https://pbs.twimg.com/media/HKGrz_Ab0AAsSMN.jpg"],"type":"tweet"}]},{"title":"Treasury Market Systemic Risk — El-Erian FT Quote","category":"macro","description":"Short-term Treasury funding + record debt = systemic risk according to FT's John Plender, amplified by El-Erian.","items":[{"author":"elerianm","text":"Quotes FT's John Plender: Treasury funding increasingly reliant on shorter-term securities creating 'constant rollover risk.' With US public debt near record highs, this is 'the very definition of a non-geopolitical financial chokepoint, with vulnerability to shocks' — and suggests systemic risks in the Treasury market.","tweet_url":"https://x.com/elerianm/status/2063126018932555805","images":["https://pbs.twimg.com/media/HKGyLROXMAAhy6X.jpg"],"type":"tweet"}]},{"title":"AAPL WWDC Monday + SPCX IPO in One Week","category":"tech","description":"Gene Munster bullish on AAPL rerating from AI follower to leader; SpaceX IPO window still open despite market slide.","items":[{"author":"munster_gene","text":"WWDC on Monday should mark the start of a rerating for AAPL — from 'AI follower' to 'personalized AI leader.' Full analysis at his blog.","tweet_url":"https://x.com/munster_gene/status/2063013780951343498","images":[],"type":"tweet"},{"author":"munster_gene","text":"SPCX IPO one week away. Today's Nasdaq -3% slide is a 'healthy sign' — biggest risk was overly optimistic investors going into the first trade. The SpaceX window is still open despite soft market.","tweet_url":"https://x.com/munster_gene/status/2062941343148544015","images":[],"type":"tweet"}]},{"title":"Uranium / Silver / Gold Selloff on NFP — Buying Opportunity?","category":"macro","description":"Anders (Swedish_uranium) argues strong jobs report was noise for commodity fundamentals.","items":[{"author":"Swedish_uranium","text":"Ugly day across uranium, silver, gold and base metals following the strong US jobs report. Calls it noise: the world didn't suddenly stop consuming uranium or silver. Uranium and silver remain in structural supply deficits (consumption > production). Dry powder investors may find a great buying opportunity — doesn't see any reason to sell.","tweet_url":"https://x.com/Swedish_uranium/status/2062978316936593662","images":[],"type":"tweet"}]}],"insights":[{"author":"laurashin","text":"Uneasy Money comprehensive episode covering five major crypto topics: (1) Polymarket's unnecessary dispute over whether Strategy sold BTC by end of May — still outsourcing truth to UMA for a $20B platform; (2) Solana's third tokenomics proposal — does the SOL inflation cut actually change anything?; (3) Vitalik accidentally created the 'ultrasound money' meme; (4) Circle's USDC freeze in a commingled DeFi pool on a judge's order with zero notice; (5) NYSE CEO calling Hyperliquid bigger than Nasdaq vs apps fleeing MegaETH for Monad. Also covers chains-as-cities thesis from Luca Netz.","tweet_url":"https://x.com/laurashin/status/2063087372753907972","images":[],"type":"thread","category":"crypto"},{"author":"Fiskantes","text":"Extended thesis: Saylor is 'poisoning Bitcoin.' Bitcoin's value as a sovereign SoV depends on distributed ownership creating white noise. One entity controlling 5% means Bitcoin becomes a bet on Saylor's execution — the market must front-run his every move. On the upside this is a flywheel, but it cuts both ways and increases volatility and systemic risk. Bitcoin 'essentially becomes a cornered, un-free asset.' Separately, keeping dry powder for the upcoming mega-IPOs (SpaceX, Anthropic, possibly OpenAI) not to bid them, but because index rebalancing could create buying opportunities.","tweet_url":"https://x.com/Fiskantes/status/2063005017779384447","images":[],"type":"thread","category":"crypto"},{"author":"Rewkang","text":"Andrew Kang's robotics thesis: GPT-3 level robot foundation models already exist but aren't obvious because GPT-3 was only partially successful — acceptable for knowledge work but insufficient for physical tasks. GPT-5 level intelligence for robots could arrive within a year because research compounds. The FigureAI livestream was the ChatGPT moment for many. Highest-conviction bet is Figure Robot, comparing its product 'taste' to Apple's UX differentiation.","tweet_url":"https://x.com/Rewkang/status/2062944637552120223","images":[],"type":"tweet","category":"AI"},{"author":"_tolks","text":"Weekly wrap: tradfi account down ~4% on the week, up ~43% YTD. Crypto shorts (BTC, ETH, SOL exclusively) were the saving grace — described as 'uninteresting, overvalued assets given the focus on Manhattan Project 2.0, no buyers outside Saylor/Tom Lee, and increasing ETF outflows.' HL and lighter accounts at new ATHs. Still short but feeling less confident for the first time all week. Saylor's Monday disclosure will likely decide next direction. 'Tradfi bias remains up by default but essentially every chart is on the verge of seriously breaking.'","tweet_url":"https://x.com/_tolks/status/2062999534951641422","images":["https://pbs.twimg.com/media/HKE_GhaXsAAsBya.png","https://pbs.twimg.com/media/HKE_F5LXwAAEBdT.png"],"type":"thread","category":"positioning"},{"author":"EMostaque","text":"Stability AI lessons: if they had stuck with API + a business integration/FDE subsidiary or partnership, that alone would have funded everything sustainably. The key wasn't the models themselves but community buy-in (why they did ComfyUI etc.) and being a Schelling point. Even the API alone as shown by fal.ai demonstrates this. Happy to share notes.","tweet_url":"https://x.com/EMostaque/status/2063082654812041595","images":[],"type":"tweet","category":"AI"},{"author":"EMostaque","text":"GPU compute pricing nuance: 90-day termination clauses make cloud GPU contracts closer to on-demand pricing (~$12/hr effective) — roughly double the multi-year rate. Analogous to short-let vs long-let property. This has significant implications for cost modeling in AI infrastructure.","tweet_url":"https://x.com/EMostaque/status/2063083304497168541","images":[],"type":"tweet","category":"AI"},{"author":"paulg","text":"Startup insight: best pitches make unequivocal claims. A lot of his demo day office hours are spent discovering exactly how much the startup can truly claim — particularly whether they are the current market leader, which many founders aren't consciously aware of. Unequivocal claims are either definitively true or false, which holds founders to account.","tweet_url":"https://x.com/paulg/status/2062957298512003556","images":[],"type":"thread","category":"tech"},{"author":"paulg","text":"Office hours with a startup that cuts companies' LLM token costs by ~50% by optimizing requests, splitting the savings with the customer. TAM observation: this equals roughly a quarter of model companies' corporate revenue — a very large addressable market.","tweet_url":"https://x.com/paulg/status/2063091245334044902","images":[],"type":"tweet","category":"AI"},{"author":"paulg","text":"White House website content described as reading 'like something written about a third world dictator.' Paul Graham states he has not seen any branch of the federal government sink this low in his lifetime. Screenshot attached.","tweet_url":"https://x.com/paulg/status/2063086788043026589","images":["https://pbs.twimg.com/media/HKGN3xMb0AANK7V.jpg"],"type":"tweet","category":"society"},{"author":"aleabitoreddit","text":"JP Morgan moved from 0.4% to 5%+ ownership of Sivers Semiconductors ($SIVE) in one month — a purely institutional accumulation that retail cannot replicate (requires prime brokerage execution and equity swaps for a Swedish-listed company). Argues this validates $SIVE's critical role in CPO (co-packaged optics), a thesis she's been pushing publicly for months. US/West institutions now control the majority of the float.","tweet_url":"https://x.com/aleabitoreddit/status/2063048067432239598","images":["https://pbs.twimg.com/media/HKFrSAVbcAAe8yv.jpg","https://pbs.twimg.com/media/HKFrSAZbEAAiNcI.jpg"],"type":"thread","category":"tech"},{"author":"saxena_puru","text":"AlphaTarget 2-year anniversary: +76.3% (32.79% CAGR) vs S&P +41.6% (19.00% CAGR). Recently refined portfolio management and hedging strategy to reduce drawdowns. Currently positioned defensively with put options, expecting ~10% SPX correction, ~15% NDX correction, and 30-40% correction in growth stocks.","tweet_url":"https://x.com/saxena_puru/status/2062942857321943409","images":["https://pbs.twimg.com/media/HKEJDReagAABVVj.jpg"],"type":"thread","category":"macro"},{"author":"brian_armstrong","text":"Argues people conflate Bitcoin with crypto broadly. Derivatives/perps, stablecoins, prediction markets are all up while BTC is down. Crypto now touches every area of finance and is much broader than Bitcoin — will take time for this to sink in. Coincides with Coinbase launching a new developer portal offering wallets, payment APIs, x402, and the ability to launch branded stablecoins backed 100% by USDC.","tweet_url":"https://x.com/brian_armstrong/status/2063027072461935084","images":[],"type":"tweet","category":"crypto"},{"author":"zeroxkyle","text":"Describes running a fully AI-powered investment team: morning market reports at 9am SGT covering JP/KR open and US overnight; portfolio manager analyzing earnings/news for holdings; research analyst for new names; coverage of Substack/FinTwit accounts tracking new positions; technical alerts for BTFD scenarios (large % drops with big volume); ideation engine ingesting cross-platform content to answer questions like 'what should I long for optical networking.'","tweet_url":"https://x.com/zeroxkyle/status/2063111760094368103","images":[],"type":"tweet","category":"AI"},{"author":"nicbstme","text":"Emerging concept: Business-to-Agents (B2A). AI agents are already making significant software purchasing decisions — recommending specific tools (e.g., Resend over Sendgrid/Mailgun/Amazon SES) and users typically accept. The question: how do companies get LLMs to favor their product? Similar to Google SEO but the difference is agents actually go and use the software. 'When I say use Resend, it starts using it.'","tweet_url":"https://x.com/nicbstme/status/2062947422016545046","images":["https://pbs.twimg.com/media/HKEO2asbQAAe08E.jpg"],"type":"thread","category":"AI"},{"author":"cryptopunk7213","text":"Two observations: (1) Claude Opus 4.7 now matches and on some tasks beats dedicated NMR spectroscopy software for chemists — science is the next domino after coding to be disrupted by generalized LLMs. Anthropic, OpenAI and Google all signed a government petition this week warning about ease of creating bio-weapons. (2) SpaceX booked ~$30B more revenue from Google ($1B/month for 3 years, accessing 110K GPUs/CPUs/memory for Gemini scaling), bringing total AI alliance revenue to ~$85B across Anthropic, Cursor, and Google.","tweet_url":"https://x.com/cryptopunk7213/status/2063062917193552268","images":["https://pbs.twimg.com/media/HKF4o03WMAA18_i.jpg"],"type":"tweet","category":"AI"}],"contrarian":[{"author":"laurashin","text":"Crypto Twitter cheered the CFTC perp reclassification as a win for Hyperliquid. But @kkirkbos argues: it has no direct effect on Hyperliquid at all, and could even be bearish for perp DEXs. A take Laura says she 'keeps thinking about.'","tweet_url":"https://x.com/laurashin/status/2063086791264178389","images":[],"contrarian_against":"Prevailing CT narrative that CFTC perp order is a bullish catalyst for Hyperliquid/HYPE"},{"author":"thedefivillain","text":"People don't realize how awful BTC would have to get for Saylor to truly be taken out — not just price but sustained price. 'It needs to go quite low but also remain there for a while, there's no exact level.' Pushes back on the 'Saylor as imminent forced seller' narrative: he's been selling MSTR shares for STRC dividends all along, it just didn't matter psychologically.","tweet_url":"https://x.com/thedefivillain/status/2062968398233919524","images":[],"contrarian_against":"Widespread expectation that Saylor is imminently forced to sell BTC and liquidation cascade is near"},{"author":"DCinvestor","text":"Market should dump ahead of pending mega-IPOs (SpaceX, Anthropic, OpenAI) as 'mass extraction IPOs' — while Hormuz remains closed, everything has melted up, and the prevailing world order crumbles. 'A real correction might actually give me some faith that markets still work and are not completely cabal'd.'","tweet_url":"https://x.com/DCinvestor/status/2063097850951774595","images":[],"contrarian_against":"Consensus that mega-IPOs like SpaceX are bullish catalysts for the market"},{"author":"Fiskantes","text":"Holding dry powder before SpaceX IPO — not to bid it, but because the listing may mess up market structure and force index rebalancing, creating better buying opportunities in crypto and growth stocks as capital is temporarily diverted.","tweet_url":"https://x.com/Fiskantes/status/2062941947048685842","images":[],"contrarian_against":"Most crypto/growth investors treating SpaceX IPO as purely additive to risk appetite"},{"author":"goodalexander","text":"Suggests current market conditions would make a move in ETH/BTC only bring it back to where it was a week ago — implying any relief bounce is modest and the structural damage is already done.","tweet_url":"https://x.com/goodalexander/status/2063113978092360144","images":[],"contrarian_against":"ETH bulls expecting outsized relief rally if BTC stabilizes"},{"author":"stacy_muur","text":"WLD's +68% run is a pure narrative/positioning trade — Worldcoin didn't ship anything new. The proxy thesis lives and dies on risk appetite; already cooling from $0.59 back to $0.52. Loud stories fade.","tweet_url":"https://x.com/stacy_muur/status/2062983301296799764","images":["https://pbs.twimg.com/media/HKEwYQmbcAEmKA1.jpg"],"contrarian_against":"Hayes/Maelstrom AI proxy thesis driving WLD to $5 by August"}],"positioning":[{"author":"saxena_puru","text":"Bought put options over the past 10-12 days. Targets: ~10% correction on SPX, ~15% on NDX, and 30-40% on growth stocks. AlphaTarget +76.3% in 2 years vs S&P +41.6%.","tweet_url":"https://x.com/saxena_puru/status/2062933559531466759","images":[]},{"author":"_tolks","text":"Short BTC, ETH, SOL as hedges for AI long exposure. Still short at week's end but confidence declining for the first time. Tradfi account down ~4% on week, up ~43% YTD. HL account at new ATH.","tweet_url":"https://x.com/_tolks/status/2062999534951641422","images":[]},{"author":"beaniemaxi","text":"$59K level has held so far. Bitcoin is a buy if $59K holds with a stop at $58K. Short-term tactical level.","tweet_url":"https://x.com/beaniemaxi/status/2063000067364053024","images":[]},{"author":"cointradernik","text":"Sold leveraged SPX long positions near 7630 (not because he doesn't think highs continue — he does — but levered longs are less favorable at this level). Now manifesting SPX→BTC rotation from 60K in relative terms. Added BTC at 60.9K.","tweet_url":"https://x.com/cointradernik/status/2062954050534944976","images":["https://pbs.twimg.com/media/HKEVxjVWYAAm8Q8.jpg"]},{"author":"marcvanderchijs","text":"Bought back into Bitcoin at $59,000. Sold around $90-95K late last year and set $60K as re-entry target. Acknowledges could go to $50K if equities crash. Plan: sell when it doubles. Also bought WLD (recently) and added to SOL — trading these with a sell-half-at-2x rule.","tweet_url":"https://x.com/marcvanderchijs/status/2062976921739411693","images":[]},{"author":"DonAlt","text":"BTC $60K is the test. Significant selling by Saylor → $45K possible. If this is the full extent of selling → $60K is probably a good spot. Chart attached.","tweet_url":"https://x.com/DonAlt/status/2063030129220264324","images":["https://pbs.twimg.com/media/HKFaT9MaEAALZVk.png"]},{"author":"Evan_ss6","text":"Quotes a tweet about buying IBIT + ETHA put options for September as a broad portfolio hedge — flows tied to Saylor/STRC/Tom Lee have downside risk.","tweet_url":"https://x.com/Evan_ss6/status/2063053106808562103","images":["https://pbs.twimg.com/media/HKFv3icXMAA9tK-.jpg"]},{"author":"lord_fed","text":"Called Trump Iran comments as a generational dip-buying opportunity at the moment of headline drop. Long SFRH7 and software — taking a hit on the software side.","tweet_url":"https://x.com/lord_fed/status/2062979555376201878","images":[]},{"author":"Swedish_uranium","text":"Not selling uranium, silver, gold, or base metals on NFP strength. Structural supply deficits in uranium and silver (consumption > production for years) unchanged. Dry powder investors may find this a great buying opportunity.","tweet_url":"https://x.com/Swedish_uranium/status/2062978316936593662","images":[]},{"author":"aleabitoreddit","text":"Continues to hold $SIVE (Sivers Semiconductors) and $MRVL, $AAOI as high-beta individual stock positions rather than broad index exposure. Key message: directional timing can be off by a week or month with no consequence if conviction on the name is right.","tweet_url":"https://x.com/aleabitoreddit/status/2063118835105014006","images":["https://pbs.twimg.com/media/HKGrowna4AAMv-M.jpg"]}],"links":[{"author":"laurashin","text":"Uneasy Money podcast: HYPE/Hyperliquid bull case, Circle USDC freeze, Polymarket, Solana tokenomics, MegaETH vs Monad","tweet_url":"https://x.com/laurashin/status/2063101074987503731" // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || item.summary || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description || l.url_description ? `<span class="link-desc">${escapeHtml(l.description || l.url_description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || d.collected_at || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',        d.events,     'events'),
    renderSection('B', 'Alpha & Insights',           d.insights,   'items'),
    renderSection('C', 'Contrarian Views',           d.contrarian, 'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas',  d.positioning,'items'),
    renderSection('E', 'Link Queue',                 d.links,      'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
