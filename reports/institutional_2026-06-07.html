<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Institutional Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #7c3aed;          /* purple — institutional report accent */
  --accent-soft: #f3eefc;
  --divergence: #d94052;      /* divergence red */
  --consensus: #15803d;       /* consensus green */
  --yellow: #fff5b3;

  /* category colors (institutional schema: rates, growth, fx, equities,
     credit, crypto, energy, commodities, geopolitics, ai_tech, em) */
  --cat-rates: #2563eb;
  --cat-growth: #d97706;
  --cat-fx: #0891b2;
  --cat-equities: #15803d;
  --cat-credit: #be185d;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-commodities: #ea580c;
  --cat-geopolitics: #b91c1c;
  --cat-ai_tech: #4f46e5;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 12px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR (top: period + coverage) */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 10px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* THEME CARD (Section A) */
.theme { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.theme:last-child { border-bottom: none; }
.theme-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
              flex-wrap: wrap; }
.theme-title { font-weight: 600; font-size: 14.5px; }
.theme-stance { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 10px; }
@media (min-width: 720px) { .theme-stance { grid-template-columns: 1fr 1fr; } }
.theme-line { font-size: 13px; padding: 8px 10px; border-radius: 4px;
              border-left: 3px solid var(--border); background: #fafafa; line-height: 1.5; }
.theme-line.consensus { border-left-color: var(--consensus); background: #f0f9f3; }
.theme-line.divergence { border-left-color: var(--divergence); background: #fdf6f7; }
.theme-line .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px;
                   text-transform: uppercase; letter-spacing: .06em;
                   color: var(--text-3); display: block; margin-bottom: 2px; }
.theme-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
               border-left: 2px solid var(--border-light); }
.theme-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-source { font-weight: 600; color: var(--accent); }
a.item-source { text-decoration: none; }
a.item-source:hover { text-decoration: underline; }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-title { font-weight: 600; font-size: 14px; margin: 4px 0 6px; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DEEP READS (Section C) — purple left border to mark flagship long-form */
.section-deepreads .item-card { border-left: 4px solid var(--accent); background: var(--accent-soft); }

/* HOUSE VIEWS — compact one-line-per-source list */
.hv-row { display: flex; gap: 10px; align-items: baseline;
          padding: 6px 16px; border-bottom: 1px solid var(--border-light);
          font-size: 13px; }
.hv-row:last-child { border-bottom: none; }
.hv-name { font-weight: 600; color: var(--accent); min-width: 180px;
           text-decoration: none; }
.hv-name:hover { text-decoration: underline; }
.hv-stance { color: var(--text); flex: 1; }

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 110px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .hv-row { flex-direction: column; gap: 2px; }
  .hv-name { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_type": "INSTITUTIONAL RESEARCH", "collected_at": "2026-06-07T12:08:53.000Z", "period": {"lookback_days": 10, "from": "2026-05-28", "to": "2026-06-07"}, "input_stats": {"total_articles": 436, "sources_present": 56, "after_filter": 298}, "summary": "**Iran Conflict & Energy:** The US-Iran war, now entering its fourth month, has disrupted Strait of Hormuz flows with ~300M barrels of lost production. **WTI briefly dipped below $92/bbl** on ceasefire optimism, though RBC Capital Markets cautions that \"headlines are running ahead of reality.\" OFAC simultaneously sanctioned Iran's largest crypto exchanges in Treasury's largest-ever action against Iran's digital asset economy.\n\n**US Equities — AI Rally with Froth Warnings:** **S&P 500 Q1 EPS growth came in at 28.6% YoY** (fastest since Q4 2021), with 85% of companies beating estimates. Yet the Nasdaq fell **-4.68%** in the latest week — its first meaningful pullback — as strong May payrolls raised concern about a restrictive Fed path. Standard Chartered flags stretched investor positioning and major upcoming IPOs as near-term pullback risks.\n\n**Fed/Rates/Inflation — Hold With Hawkish Tilt:** PIMCO warns that surface resilience in US growth masks a sharp drop in real disposable personal income as tariffs, energy costs, and slowing wages erode consumer purchasing power. The Fed faces a policy trap: it cannot cut (oil/inflation risk) nor hike (slowing growth). **ECB is expected to deliver a 25bps \"insurance\" hike** then pause. BoE's Megan Greene warns Iran's energy shock risks persistent second-round inflation effects in the UK.\n\n**AI & Technology Infrastructure:** PIMCO estimates **$5T+ will be needed through 2030** for data centers, GPU stacks, power, and cooling. Man Group flags rising defaults and margin compression in private credit AI/software deals, urging selectivity. Citi GPS elevates agentic AI to a board-level fiduciary risk, while Wood Mackenzie notes AI companies are pursuing collocated power solutions to avoid raising household electricity bills.\n\n**Gold & USD Diversification:** **Gold now represents 27% of total official global reserves** (end-2025), surpassing US Treasuries at 22% and the euro at 15%, per the ECB June Review cited by UBS CIO. BCA Research's \"Get Out of the Dollar\" thesis is characterized as paused, not reversed, with structural dollar weakness still intact.\n\n**European Equities & Defense:** Goldman Sachs makes a positive relative-value case for European stocks versus the S&P 500. **BNP Paribas** highlights a structural defense spending wave creating investment opportunities via ETFs. BNP Multi-Asset holds long 5-year German bonds and is positioned for **China currency appreciation** versus USD and EUR. European activity indicators have moved into contractionary territory, per BNP's Daniel Morris.\n\n**Crypto — Institutional Selling & Regulatory Crackdown:** Professional institutional holdings of Bitcoin via 13F fell **-17% QoQ to 261k BTC** (total value -35% to $17.8B) in Q1 2026 — the deepest quarter of selling since US ETF launch. Hedge funds cut -39% and brokerages -53%, though banks grew 4x YoY. Galaxy Digital confirms BTC hit a **$126,080 ATH** in October 2025 but a 2026 bear market is now underway.\n\n**Emerging Markets & Geopolitics:** Gavekal is bullish on a continuing **Latin America bull market** driven by commodities and conservative fiscal/monetary policy. The Peterson Institute documents nine US \"Agreements on Reciprocal Trade\" (ARTs) signed by May 22, 2026, explicitly designed to push trade partners away from China. Oxford Economics revised Asia Pacific industrial production up to **4.9% for 2026** from 4.3%, with AI-linked industrial orders offsetting Iran-related energy headwinds.", "sections": {"A_debates": [{"theme": "Can the Fed normalize policy given simultaneous supply shocks and AI-driven demand?", "category": ["rates"], "consensus": "BCA Research argues the Fed is trapped — it cannot cut rates because oil-driven inflation remains elevated, yet it cannot hike because underlying growth is slowing, leaving it effectively paralyzed above the neutral rate. PIMCO's Tiffany Wilding reinforces this view, contending that AI-driven demand is interacting with supply constraints in historically unusual ways that prevent the Fed from simply 'looking through' supply shocks, and that recent Fed communications have appropriately turned more hawkish as a result.", "divergence": "PIMCO's Lotfi Karoui counters that the yield backup since late February reflects shifting policy expectations more than any AI-specific term premium repricing, meaning cyclical forces still dominate the rate outlook and bonds continue to serve their traditional portfolio-hedging function. PIMCO Group CIO Dan Ivascyn adds that elevated yields are creating compelling opportunities globally across bond markets, and that navigating the shifting credit cycle amid AI-related issuance is the key risk management challenge — not the direction of the next Fed move per se.", "items": []}, {"theme": "Is the Iran ceasefire close enough to de-risk oil and equity positions?", "category": ["energy", "geopolitics"], "consensus": "RBC Capital Markets argues that ceasefire headlines are running well ahead of ground-level reality: fighting continues, the US has intercepted Iranian drones, the IRGC launched a ballistic missile at a US base in Kuwait, and reports of a 60-day extension are premature. With approximately 300 million barrels of lost production already accumulated, RBC believes Feb 27, 2026 may mark the structural high point of Hormuz throughput for years, regardless of near-term diplomatic noise.", "divergence": "Citi GPS models an explicit de-escalation scenario in which an Iran deal produces an oil-price sell-off, is positive for fixed income, leaves the US dollar resilient, and warrants tactical caution on equities despite an ultimately constructive medium-term outlook. JPMorgan notes that momentum dispersion is at its widest since 1990 and a summer de-escalation could open the door for rotation into overlooked sectors. BNP Paribas's Chris Iggo (AXA IM Core) even asks publicly whether Trump could announce an Iran deal before the FIFA World Cup kickoff on June 11.", "items": []}, {"theme": "Is the AI-driven equity rally sustainable or showing signs of dangerous froth?", "category": ["ai_tech"], "consensus": "Gavekal Research points to S&P 500 Q1 EPS growth of 28.6% YoY as the fastest since Q4 2021, with 85% of companies beating estimates and all but one of eleven sectors posting positive results, led by IT, communication services, materials, and consumer discretionary. Goldman Sachs has forecast the S&P 500 to continue climbing as earnings growth powers stocks higher, and Amundi notes that equities hit new highs on the tech rally with Asian tech also performing strongly alongside US names.", "divergence": "Standard Chartered warns that resilient earnings fundamentals are meeting investor froth, with stretched positioning, major upcoming IPOs, and proposed new US tariff threats all raising near-term pullback risk. BNP Paribas Multi-Asset notes it moved from maximum overweight equities in April to progressively reducing that position and is now only at a modest overweight, with put-call skew data on the Nasdaq showing elevated tail-risk hedging activity. Schroders explicitly asks whether markets are back to 1999, concluding that while broad balance-sheet excess is not yet present, interest rate volatility will remain elevated.", "items": []}, {"theme": "Will European equities outperform or continue to lag US markets?", "category": ["equities"], "consensus": "Goldman Sachs makes a positive case for European stocks to outperform the S&P 500 on relative valuation grounds, while separately highlighting Spain's economy growing three times faster than the euro area average and arguing investors may be overlooking the UK's economic potential. BNP Paribas Multi-Asset is long 5-year German bonds and sees European defense spending as a structural multi-year investment opportunity.", "divergence": "BNP Paribas's Daniel Morris notes that European activity indicators have moved into contractionary territory, and that despite Brent oil's global significance, the Brent/WTI spread has averaged only a 7% premium — insufficient to explain the degree of European equity underperformance relative to US equities. Oxford Economics documents that the Iran conflict and AI investment pull in opposite directions for the global economy, with European economies more exposed to energy cost headwinds than to AI-linked industrial order upside.", "items": []}, {"theme": "Is private credit AI/software lending prudently structured or building systemic risk?", "category": ["ai_tech"], "consensus": "Man Group argues that private credit deals in AI and software are coming under increasing scrutiny following high-profile defaults, with margin compression, rising PIK (payment-in-kind) usage, and valuations compressed versus post-COVID peaks. Software and technology is the single largest sector in private credit, meaning stress in AI-related lending is not a niche concern but a systemic one that requires rigorous selectivity and enhanced due diligence from allocators.", "divergence": "PIMCO argues that the AI infrastructure boom requires $5T+ of investment through 2030, and that the biggest opportunities for disciplined credit investors lie in bonds and loans of large, established technology companies borrowing to fund infrastructure — particularly secured financings, which offer downside protection. The firm emphasizes investment discipline rather than wholesale avoidance, noting that established hyperscalers present a very different credit profile from smaller AI software ventures.", "items": []}], "B_calls": [{"source": "pimco", "name": "PIMCO, BCA Research, Amundi", "call": "Overweight bonds: elevated yields create compelling cross-market opportunity. PIMCO Group CIO Dan Ivascyn argues that energy shocks and rising yields have created globally compelling bond opportunities. PIMCO separately recommends above-benchmark duration. BCA Research also recommends above-benchmark duration given the Fed policy trap. Amundi flags yield curve steepening as the key signal, with medium-term steepening thesis intact.", "category": ["rates"], "url": "https://www.pimco.com/en-us/insights/video/energy-shocks-rising-yields-and-the-case-for-bonds", "images": []}, {"source": "ubs_cio", "name": "UBS CIO", "call": "Long gold as reserve diversification trade structural, not cyclical. UBS CIO notes gold has risen to 27% of total official global reserves (surpassing US Treasuries at 22%), with central bank purchases remaining substantial at ~850 tonnes in 2025. The reserve diversification trend is structural and underpins gold's long-term demand base irrespective of near-term Iran ceasefire noise.", "category": ["growth"], "url": "https://www.ubs.com/us/en/wealth-management/insights/article.1843210.html", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs, BNP Paribas", "call": "Rotate into European equities and defense sector on relative value and geopolitical catalyst. Goldman Sachs makes an explicit positive case for European stocks to outperform the S&P 500. BNP Paribas highlights that geopolitical pressure is creating a structural defense spending wave with billions needed to build EU autonomous defense capability, accessible via ETFs. BNP Multi-Asset is long 5-year German bonds and European duration.", "category": ["equities"], "url": "https://www.goldmansachs.com/insights/the-markets/are-european-stocks-poised-to-outperform-the-s-and-p", "images": []}, {"source": "gavekal_research", "name": "Gavekal Research, Franklin Templeton, Vanguard", "call": "Broad-based EM debt and equity overweight, led by Latin America. Gavekal Research sees the Latin America bull market continuing, driven by commodities, conservative fiscal and monetary policies, and rightward electoral shifts. Franklin Templeton's 2026 outlook highlights broadening opportunities led by EM debt and equity. Vanguard argues international fixed income is a strategic necessity for portfolio diversification that investors systematically underweight.", "category": ["equities"], "url": "https://research.gavekal.com/article/wind-in-latin-americas-sails", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital, CoinShares, Delphi Digital", "call": "Reduce Bitcoin / crypto momentum exposure; bear market underway. Galaxy Digital confirms BTC hit a $126,080 ATH in October 2025 but states a 2026 bear market is now underway. CoinShares documents the deepest quarter of institutional selling since US ETF launch, with hedge funds -39% QoQ and brokerages -53% QoQ in Q1 2026. Delphi Digital warns crypto is breaking away from BTC leadership as AI pulls capital and momentum breaks down.", "category": ["crypto"], "url": "https://coinshares.com/research/bitcoin-13f-q1-2026", "images": []}, {"source": "pimco", "name": "PIMCO, Man Group", "call": "Selective overweight AI infrastructure credit (secured, investment-grade issuers only). PIMCO recommends focusing on bonds and loans of large established technology companies borrowing to fund AI infrastructure, with emphasis on secured financings. Man Group warns against undifferentiated AI/software credit exposure given rising defaults and PIK usage at smaller issuers. The $5T+ capex cycle through 2030 creates both opportunity and dispersion risk.", "category": ["ai_tech"], "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/general-market-update/investment-discipline-amid-the-ai-infrastructure-boom", "images": []}, {"source": "bnp_paribas_multi_asset", "name": "BNP Paribas Multi-Asset", "call": "Position for China currency appreciation versus USD and EUR. BNP Paribas Multi-Asset is explicitly positioned for China's structural shift and currency appreciation versus both the US dollar and the euro, as part of a broader \"new investment regime\" framework that views the old dollar-centric order as structurally challenged by geopolitics and AI-driven realignment.", "category": ["growth"], "url": "https://www.bnpparibas-am.com/en/professional/viewpoint/multi-asset-investment-views-from-extreme-caution-to-upside-chasing/", "images": []}, {"source": "invesco", "name": "Invesco", "call": "Real estate credit (ex-office) as low-correlation portfolio diversifier. Invesco argues real estate credit offers near-zero correlation to real estate equity, providing genuine diversification. Office represents only 2.5% of the US CRE market, making sector-level concerns manageable. Apartments and industrial segments offer better prospects and support an allocation to real estate credit as a distinct portfolio sleeve.", "category": ["credit"], "url": "https://www.invesco.com/us/en/insights/emerging-opportunities-in-real-estate-credit.html", "images": []}], "C_deep_reads": [{"source": "rbc_capital_markets", "name": "RBC Capital Markets", "title": "Three months in: Iran war tests energy markets as stockpiles deplete", "summary": "The most comprehensive single-source account of the Iran conflict's energy market impact, quantifying ~300M barrels of lost production and providing ground-level assessment of why ceasefire headlines are materially ahead of reality. Essential reading for any energy or macro positioning decision.", "url": "https://www.rbccm.com/en/insights/article-page.page?dcr=templatedata/article/entry/data/three-months-in-iran-war-tests-energy-markets", "images": []}, {"source": "pimco", "name": "PIMCO (Tiffany Wilding)", "title": "The Quiet Erosion Beneath US Growth", "summary": "PIMCO's most important macro piece of the period: documents how tariffs, higher energy costs, and slowing wages are combining to produce a sharp drop in real disposable personal income that households cannot smooth as they would a temporary shock, undermining the consensus view of US consumer resilience.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/macro-signposts/the-quiet-erosion-beneath-us-growth", "images": []}, {"source": "coinshares", "name": "CoinShares", "title": "Bitcoin 13F Q1 2026: Institutional Holdings Analysis", "summary": "The definitive quantitative record of institutional crypto positioning: professional holdings fell from 313k to 261k BTC (-17% QoQ, -35% in dollar value) — the deepest selling quarter since the US ETF launch — with hedge funds and brokerages leading the exit while banks quietly grew 4x YoY.", "url": "https://coinshares.com/research/bitcoin-13f-q1-2026", "images": []}, {"source": "pimco", "name": "PIMCO (Tiffany Wilding)", "title": "Supply Shocks and AI-Related Demand Blur Inflation Signals for the Fed", "summary": "Sets out the analytical framework for why standard central bank playbooks are failing: AI-driven demand is interacting with supply constraints in historically unprecedented ways, preventing the Fed from applying its usual 'look through' heuristic to supply-side inflation and forcing a more hawkish stance with uncertain consequences.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/macro-signposts/supply-shocks-and-ai-related-demand-blur-inflation-signals-for-the-fed", "images": []}, {"source": "pimco", "name": "PIMCO", "title": "Investment Discipline Amid the AI Infrastructure Boom", "summary": "Provides the clearest investment framework for the $5T+ AI capex supercycle, distinguishing between investment-grade secured credit of established hyperscalers (attractive) and undifferentiated AI/software lending (risky), with specific guidance on where in the capital structure opportunity and risk are concentrated.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/general-market-update/investment-discipline-amid-the-ai-infrastructure-boom", "images": []}, {"source": "man_group", "name": "Man Group", "title": "Private Credit, Software and AI: A Manual for Markets", "summary": "The most candid institutional assessment of stress in private credit AI/software — documenting high-profile defaults, rising PIK usage, margin compression, and compressed valuations — from a firm with direct exposure. Required reading for any allocator with private credit in the portfolio.", "url": "https://www.man.com/maninstitute/private-credit-software-and-ai-a-manual-for-markets", "images": []}, {"source": "peterson_institute_for_international_economics", "name": "Peterson Institute for International Economics", "title": "US Reciprocal Trade Deals Built to Push America's Trade Partners Away from China", "summary": "Documents the architecture of the nine ARTs signed by May 22, 2026, explaining how bilateral tariff concessions are explicitly structured to accelerate decoupling from China — with significant implications for EM supply chains, trade finance, and the geopolitical investment regime.", "url": "https://www.piie.com/blogs/realtime-economics/us-reciprocal-trade-deals-built-to-push-americas-trade-partners-away-from-china", "images": []}, {"source": "chainalysis", "name": "Chainalysis", "title": "OFAC Sanctions Nobitex and Iranian Cryptocurrency Exchanges", "summary": "Provides the most detailed breakdown of Treasury's largest-ever action against Iran's digital asset economy: sanctions on Nobitex (50% of Iranian crypto volumes), Bitpin, Ramzinex, and Wallex, covering a $7.78B ecosystem in 2025 — with implications for crypto compliance frameworks globally and for the intersection of sanctions and DeFi infrastructure.", "url": "https://www.chainalysis.com/blog/ofac-sanctions-nobitex-iranian-cryptocurrency-exchanges/", "images": []}, {"source": "bank_of_england", "name": "Bank of England (Megan Greene)", "title": "Here We Go Again? Assessing the Inflation Risks of the Recent Energy Shock", "summary": "A BoE MPC member's rigorous comparison of the current Iran-driven energy shock with prior episodes, examining price-setting and wage-setting channels in the UK economy. Directly relevant to BoE rate path and UK fixed income positioning, and provides a template for how other central banks are stress-testing second-round inflation risks.", "url": "https://www.bankofengland.co.uk/speech/2026/june/megan-greene-here-we-go-again-assessing-the-inflation-risks", "images": []}, {"source": "citi_gps", "name": "Citi GPS", "title": "The Boardroom's New Mandate: Governing Agentic AI Responsibly", "summary": "Elevates agentic AI from an IT project to a board-level fiduciary risk, arguing that organizations without robust governance frameworks face material regulatory exposure and will scale AI more slowly than peers who invest in oversight infrastructure — a thesis with implications for technology sector differentiation and ESG-adjacent governance scoring.", "url": "https://www.citigroup.com/us/en/institutional/markets-and-economy/the-boardrooms-new-mandate.html", "images": []}], "D_charts": [{"source": "bnp_paribas_asset_management", "name": "BNP Paribas Asset Management (Daniel Morris)", "chart": "Brent vs WTI Price Differential — Brent Premium Averaged Only 7% — Shows the Brent/WTI price spread during the Iran conflict period, demonstrating that despite Brent's global benchmark status, the premium has averaged only 7% — a key data point explaining why Europe has suffered disproportionate economic damage relative to what oil spread metrics alone would predict.", "url": "https://www.bnpparibas-am.com/en/professional/viewpoint/multi-asset-investment-views-from-extreme-caution-to-upside-chasing/", "images": ["https://www.bnpparibas-am.com/wp-content/uploads/2026/05/Exhibit-1-The-increase-in-Brent-oil-prices-has-averaged-just-7-more-than-for-WTI.png"]}, {"source": "bnp_paribas_asset_management", "name": "BNP Paribas Asset Management (Daniel Morris)", "chart": "European Activity Indicators Have Moved Into Contractionary Territory — Plots European composite activity indicators versus US equivalents, showing European indicators crossing below the contractionary threshold — the quantitative underpinning of BNP's thesis that European equities are underperforming due to genuine economic weakness rather than simply valuation or sentiment.", "url": "https://www.bnpparibas-am.com/en/professional/viewpoint/multi-asset-investment-views-from-extreme-caution-to-upside-chasing/", "images": ["https://www.bnpparibas-am.com/wp-content/uploads/2026/05/Exhibit-2-European-activity-indicators-have-moved-into-contractionary-territory.png"]}, {"source": "pimco", "name": "PIMCO", "chart": "PIMCO AI Infrastructure Capex Requirement Through 2030 — Illustrates the $5T+ cumulative investment requirement in data centers, GPU stacks, power infrastructure, and cooling systems through 2030, broken down by component, providing the scale context for PIMCO's thesis that AI infrastructure financing is a generational credit opportunity requiring disciplined capital allocation.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/general-market-update/investment-discipline-amid-the-ai-infrastructure-boom", "images": ["https://www.pimco.com/us/en/-/media/global-assets/insights/economic-and-market-commentary/general/2026/05/investment-discipline-amid-the-ai-infrastructure-boom/ai-infrastructure-chart-55160-v4-final-1_2026-05-28t21_41_17.webp"]}, {"source": "pimco", "name": "PIMCO (Tiffany Wilding)", "chart": "PIMCO: Real Disposable Personal Income — The Quiet Erosion — Charts the trajectory of US real disposable personal income showing the sharp deterioration driven by the combined effect of tariffs, elevated energy costs, and slowing wage growth — the core evidence for PIMCO's warning that surface-level US growth resilience is masking structural consumer fragility.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/macro-signposts/the-quiet-erosion-beneath-us-growth", "images": ["https://www.pimco.com/us/en/-/media/global-assets/insights/economic-and-market-commentary/macro-signposts/2026/06/the-quiet-erosion-beneath-us-growth/pimco_chart_1.webp"]}, {"source": "pimco", "name": "PIMCO (Tiffany Wilding)", "chart": "PIMCO: AI Supply Shock — Inflation Signal Blurring for the Fed — Visualizes how AI-related demand is interacting with energy and goods supply constraints in an unusual configuration that prevents straightforward application of the Fed's standard inflation-response framework, providing the empirical basis for PIMCO's view that the Fed's hawkish turn is analytically justified.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/macro-signposts/supply-shocks-and-ai-related-demand-blur-inflation-signals-for-the-fed", "images": ["https://www.pimco.com/us/en/-/media/global-assets/insights/economic-and-market-commentary/macro-signposts/2026/05/supply-shocks-and-ai-related-demand-blur-inflation-signals-for-the-fed/msp-w22-ai-supply-shocks-chart-57336-final_2026-05-28t20_03_56.webp"]}, {"source": "pimco", "name": "PIMCO (Lotfi Karoui)", "chart": "PIMCO: Yield Drivers — Cyclical Forces vs AI Term Premium — Decomposes the yield backup since late February 2026 into its constituent drivers, demonstrating that cyclical policy expectation shifts — not AI-related term premium repricing — account for the dominant share of the move, supporting PIMCO's contention that bonds retain their traditional portfolio-hedging characteristics.", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/credit-market-lens/ai-financing-needs-do-not-override-cyclical-drivers-of-yield", "images": ["https://www.pimco.com/us/en/-/media/global-assets/insights/economic-and-market-commentary/the-credit-market-lens/06/ai-financing-needs-do-not-override-cyclical-drivers-of-yield/lotfi-w23-tcml-chart-56980-v3-final-1.webp"]}, {"source": "bnp_paribas_asset_management", "name": "BNP Paribas Asset Management (Laurent Clavel)", "chart": "Nasdaq 90-110 Put-Call Ske  on the Fed's constrained options — a succinct visual representation of the key Fed decision tree that Barclays' economists are navigating given the dual pressures of Iran-driven inflation and slowing US growth.", "url": "https://www.ib.barclays/ourinsights/barclays-brief/episode-34-the-feds-next-move.html", "images": ["https://www.ib.barclays/content/dam/barclaysmicrosites/ibpublic/Images/ourinsights/BarclaysBrief/Ep34/1024x576_BB_WebArticleThumbnail_Ep34.jpg"]}, {"source": "pimco", "name": "PIMCO (Dan Ivascyn)", "chart": "PIMCO Energy Shocks and Rising Yields — Case for Bonds — Video thumbnail and framing for PIMCO Group CIO Dan Ivascyn's presentation on how elevated yields across global bond markets are creating compelling opportunities, with specific attention to the intersection of energy shocks and the shifting credit cycle driven by AI-related issuance.", "url": "https://www.pimco.com/en-us/insights/video/energy-shocks-rising-yields-and-the-case-for-bonds", "images": ["https://cf-images.us-east-1.prod.boltdns.net/v1/static/3895904614001/45fbe724-e756-45ef-a2bf-a5032e747a0d/ac98af45-fe27-4d28-b044-3fd57e7a7f41/1280x720/match/image.jpg"]}], "house_views": [{"source": "pimco", "name": "PIMCO", "stance": "Overweight bonds globally; above-benchmark duration. Elevated yields create compelling cross-market fixed income opportunities. AI infrastructure credit favored in secured, investment-grade large-cap tech issuers only. US consumer resilience overstated — real disposable income deteriorating. Fed cannot 'look through' current supply shocks given AI demand interaction.", "category": "asset_manager", "url": "https://www.pimco.com/en-us/insights/economic-and-market-commentary/macro-signposts/the-quiet-erosion-beneath-us-growth"}, {"source": "goldman_sachs", "name": "Goldman Sachs", "stance": "S&P 500 forecast to continue climbing on earnings growth. European equities poised to outperform S&P 500 on relative value. UK economic potential underappreciated by investors.  "oxford_economics", "name": "Oxford Economics", "stance": "Iran conflict and AI investment pull in opposite directions for Asia Pacific: energy cost headwinds are a drag, but AI-linked industrial orders are providing partial offset. Asia Pacific industrial production revised up to 4.9% for 2026 from 4.3%. US effective tariff rate rising to 9.7% from late July but not materially changing GDP/inflation forecasts. UK debt predicament: net debt over 90% of GDP with budget deficit among highest in G7.", "category": "general_independent", "url": "https://www.oxfordeconomics.com/resource/ai-and-energy-pull-in-opposite-directions-in-asia-pacific/"}, {"source": "citi_gps", "name": "Citi GPS", "stance": "Iran de-escalation scenario maps to: oil sell-off, fixed income rally, USD resilience, and tactical equity caution despite positive medium-term outlook. Agentic AI is a board-level fiduciary risk requiring formal governance frameworks — organizations with robust oversight will scale faster and face less regulatory exposure.", "category": "bank_bulge", "url": "https://www.citigroup.com/us/en/institutional/markets-and-economy/markets-edition-deal-or-no-deal.html"}, {"source": "schroders", "name": "Schroders", "stance": "MSCI World +4.5% in May 2026; EM outperformed DM; corporate bonds outperformed governments. AI infrastructure is the dominant market driver. Markets are not yet at 1999-style excess — broad balance-sheet excess is absent — but interest rate volatility will remain elevated. Prospective bond returns attractive at current high starting yields. Treasuries snapped back as oil fell on Hormuz hopes.", "category": "asset_manager", "url": "https://www.schroders.com/en-gb/uk/professional-investor/insights/markets/weekly-bond-market-update-are-markets-back-to-1999/"}, {"source": "franklin_templeton", "name": "Franklin Templeton", "stance": "2026 broadening opportunities theme led by EM debt and equity, European equities, and US smaller-cap stocks — a meaningful shift from the narrow leadership of hyperscalers and large-cap tech that dominated 2024-2025.", "category": "asset_manager", "url": "https://www.franklintempleton.com/insights/outlooks/2026-global-investment-outlook"}, {"source": "vanguard", "name": "Vanguard", "stance": "International fixed income is a strategic necessity for portfolio diversification that is systematically underweighted relative to international equities. The asset category is overlooked despite offering genuine diversification benefits, particularly relevant in a period of elevated domestic rate volatility.", "category": "asset_manager", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/the-asset-category-no-one-talks-about.html"}, {"source": "invesco", "name": "Invesco", "stance": "Real estate credit offers near-zero correlation to real estate equity, providing genuine portfolio diversification. Office is only 2.5% of the US CRE market, limiting sector-level concern. Apartments and industrial segments offer better fundamentals for real estate credit allocation.", "category": "asset_manager", "url": "https://www.invesco.com/us/en/insights/emerging-opportunities-in-real-estate-credit.html"}, {"source": "rbc_capital_markets", "name": "RBC Capital Markets", "stance": "Iran war is now three months old with ~300M barrels of lost Hormuz production. Ceasefire headlines are running ahead of reality: fighting continues and supply disruption is structural, not near-term reversible. Feb 27, 2026 may mark the structural high point of Hormuz throughput.", "category": "bank_regional", "url": "https://www.rbccm.com/en/insights/article-page.page?dcr=templatedata/article/entry/data/three-months-in-iran-war-tests-energy-markets"}, {"source": "coinshares", "name": "CoinShares", "stance": "Q1 2026 was the deepest quarter of institutional Bitcoin selling since the US ETF launch, with professional 13F holdings falling 17% QoQ to 261k BTC (dollar value -35% to $17.8B). Hedge funds -39%, brokerages // ---------- helpers ----------
const CAT_VARS = {
  rates: 'var(--cat-rates)',
  growth: 'var(--cat-growth)',
  fx: 'var(--cat-fx)',
  equities: 'var(--cat-equities)',
  credit: 'var(--cat-credit)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  commodities: 'var(--cat-commodities)',
  geopolitics: 'var(--cat-geopolitics)',
  ai_tech: 'var(--cat-ai_tech)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}
function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}
function pills(cats) {
  if (!cats) return '';
  if (Array.isArray(cats)) return cats.map(pill).join(' ');
  return pill(cats);
}
function externalLink(url, label) {
  if (!url) return '';
  return `<a class="item-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${label || 'link →'}</a>`;
}
function nameLink(url, name) {
  if (!name) return '';
  if (!url) return `<span class="item-source">${escapeHtml(name)}</span>`;
  return `<a class="item-source" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderThemeItem(it) {
  return `
    <div class="theme-item">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.thesis || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderTheme(theme) {
  const items = (theme.items || []).map(renderThemeItem).join('');
  return `
    <div class="theme">
      <div class="theme-head">
        ${pills(theme.category)}
        <div class="theme-title">${escapeHtml(theme.theme || '')}</div>
      </div>
      <div class="theme-stance">
        ${theme.consensus ? `<div class="theme-line consensus"><span class="lbl">Consensus</span>${renderBold(theme.consensus)}</div>` : ''}
        ${theme.divergence ? `<div class="theme-line divergence"><span class="lbl">Divergence</span>${renderBold(theme.divergence)}</div>` : ''}
      </div>
      ${items ? `<div class="theme-items">${items}</div>` : ''}
    </div>`;
}

function renderCall(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${pills(it.category)}
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.call || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderDeepRead(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url, 'read →')}
      </div>
      ${it.title ? `<div class="item-title">${escapeHtml(it.title)}</div>` : ''}
      <div class="item-text">${renderBold(it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderChart(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.chart || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderHouseView(hv) {
  const name = hv.name || hv.source || '';
  const nameHtml = hv.url
    ? `<a class="hv-name" href="${escapeAttr(hv.url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : `<span class="hv-name">${escapeHtml(name)}</span>`;
  return `
    <div class="hv-row">
      ${nameHtml}
      <span class="hv-stance">${renderBold(hv.stance || '')}</span>
    </div>`;
}

function renderSection(letter, name, items, render, extraClass) {
  if (!items || !items.length) return '';
  const body = items.map(render).join('');
  const cls = 'section' + (extraClass ? (' ' + extraClass) : '');
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderTopStats(d) {
  const parts = [];
  const p = d.period || {};
  const is = d.input_stats || {};
  const cv = d.coverage || {};
  if (p.from && p.to)
    parts.push(`period <strong>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</strong>`);
  else if (p.lookback_days != null)
    parts.push(`lookback <strong>${p.lookback_days}d</strong>`);
  if (is.total_articles != null) parts.push(`articles <strong>${is.total_articles}</strong>`);
  if (is.sources_present != null) parts.push(`sources <strong>${is.sources_present}</strong>`);
  if (is.after_filter != null) parts.push(`after filter <strong>${is.after_filter}</strong>`);
  if (cv.coverage_pct != null) {
    const pct = (cv.coverage_pct <= 1 ? cv.coverage_pct * 100 : cv.coverage_pct);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  } else if (cv.sources_covered != null && cv.sources_total != null) {
    parts.push(`coverage <strong>${cv.sources_covered}/${cv.sources_total}</strong>`);
  }
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.period && d.period.to) return d.period.to;
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

// ---------- interactions ----------
function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  const s = d.sections || {};
  const out = [
    renderSummary(d.summary),
    renderSection('A.', 'Debates — Consensus vs Divergence', s.A_debates,    renderTheme),
    renderSection('B.', 'Key Calls & Positioning',           s.B_calls,      renderCall),
    renderSection('C.', 'Notable Deep Reads',                s.C_deep_reads, renderDeepRead,
                  'section-deepreads'),
    renderSection('D.', 'Charts & Data',                     s.D_charts,     renderChart),
    renderSection('E.', 'House Views',                       s.house_views,  renderHouseView),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = out || '<div class="empty">No report data.</div>';

  // Auto-open Summary's section view: first two sections open by default.
  document.querySelectorAll('.section').forEach((sec, i) => {
    if (i < 2) sec.classList.add('open');
  });
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
