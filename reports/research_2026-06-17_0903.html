    angle: "Rebalance additions are one of the cleanest short-term flows trades in markets. The buying happens over a defined 3-5 day window and the price impact is measurable. CoreWeave and Nebius as AI infrastructure plays getting mandatory passive buying is a tailwind on top of the AI capex narrative. The positioning signal: being added to the Nasdaq-100 is the ultimate validation of institutional-grade liquid AI exposure.",
    tweetA: "Nasdaq-100 adds CoreWeave, Nebius, Astera Labs, Rocket Lab, and Teradyne on June 22. Trillions in indexed AUM must buy these names in a 3-5 day window. CoreWeave and Nebius are the AI infrastructure plays. Astera Labs is the PCIe connectivity pick-and-shovel. This is the forced-buying event that follows the SpaceX forced-buying event. The passive complex is becoming an AI capex allocation machine.",

    charts: { count: 0, hot: false, desc: "" },
    link: "https://princetonchen.substack.com/p/daily-news-wall-june-16-2026"
  }
];

const META = {
  date: "2026-06-17",
  time: "09:03 CEST",
  windowStart: "2026-06-17 03:03 CEST",
  windowEnd: "2026-06-17 09:03 CEST",
  emailsInWindow: 13,
  emailsRead: 13,
  itemsExtracted: 25,
  includedSources: [
    { name: "Dark Side of the Boom", count: 8 },
    { name: "Princeton Chen / Daily News Wall", count: 7 },
    { name: "Bloomberg / John Authers (Points of Return)", count: 3 },
    { name: "Viks Newsletter", count: 2 },
    { name: "McKinsey / Only McKinsey Perspectives", count: 3 },
    { name: "Michael Parekh / AI-RTZ #1120", count: 1 },
    { name: "WealthVest / Tim", count: 1 },
    { name: "TMAD / Trading Mindset and Data", count: 1 }
  ],
  skippedSources: [
    { name: "Capital Flows Research (capitalflows@substack.com)", reason: "Primarily a livestream promo — no extractable analytical content in email body beyond credit-cycle-melt-up framing (already covered by TMAD and Dark Side on Warsh)" }
  ]
};

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27",
  "AI/infra": "#1d9e75", crypto: "#7f77dd", geopolitics: "#d85a30",
  energy: "#f97316", tech: "#06b6d4", gold: "#d4a017", culture: "#ec4899",
  labor: "#8b5cf6", regulation: "#64748b", science: "#14b8a6", venture: "#84cc16"
};

let activeCategory = "all";
let activeUrgency = "all";
let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function urgencyLabel(u) {
  if (u === 'actnow') return '🔴';
  if (u === 'deep') return '🔵';
  return '🟡';
}

function renderMeta() {
  document.getElementById('meta-line').textContent =
    META.date + ' · ' + META.time + ' · Window: ' + META.windowStart + '–' + META.windowEnd + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
}

function getCats() {
  var cats = {};
  ITEMS.forEach(function(i) { cats[i.cat] = (cats[i.cat] || 0) + 1; });
  return cats;
}

function getUrgs() {
  var u = { actnow: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(i) { u[i.urgency]++; });
  return u;
}

function renderFilters() {
  var cats = getCats();
  var urgs = getUrgs();
  var cf = document.getElementById('cat-filters');
  var uf = document.getElementById('urg-filters');

  var allPill = '<span class="pill pill-all active" id="pill-cat-all" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</span>';
  cf.innerHTML = allPill;
  Object.keys(cats).sort().forEach(function(cat) {
    var col = CAT_COLORS[cat] || '#888';
    cf.innerHTML += '<span class="pill" id="pill-cat-' + cat + '" onclick="setCat(\'' + cat + '\')" style="color:' + col + '; border-color:' + col + ';">' + cat + ' (' + cats[cat] + ')</span>';
  });

  uf.innerHTML = '<span class="pill pill-all active" id="pill-urg-all" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</span>' +
    '<span class="pill" id="pill-urg-actnow" onclick="setUrg(\'actnow\')" style="color:#e24b4a; border-color:#e24b4a;">🔴 Act Now (' + urgs.actnow + ')</span>' +
    '<span class="pill" id="pill-urg-deep" onclick="setUrg(\'deep\')" style="color:#378add; border-color:#378add;">🔵 Deep (' + urgs.deep + ')</span>' +
    '<span class="pill" id="pill-urg-watch" onclick="setUrg(\'watch\')" style="color:#ef9f27; border-color:#ef9f27;">🟡 Watch (' + urgs.watch + ')</span>';
}

function setCat(cat) {
  activeCategory = cat;
  activeSrc = null;
  document.querySelectorAll('[id^="pill-cat-"]').forEach(function(p) { p.classList.remove('active'); p.style.background = '#fff'; p.style.color = ''; });
  var pill = document.getElementById('pill-cat-' + cat);
  if (pill) {
    pill.classList.add('active');
    if (cat === 'all') { pill.style.background = '#333'; pill.style.color = '#fff'; }
    else { var col = CAT_COLORS[cat] || '#888'; pill.style.background = col; pill.style.color = '#fff'; }
  }
  renderCards();
}

function setUrg(urg) {
  activeUrgency = urg;
  activeSrc = null;
  document.querySelectorAll('[id^="pill-urg-"]').forEach(function(p) { p.classList.remove('active'); p.style.background = '#fff'; });
  var pill = document.getElementById('pill-urg-' + urg);
  if (pill) {
    pill.classList.add('active');
    var col = urg === 'all' ? '#333' : (urg === 'actnow' ? '#e24b4a' : (urg === 'deep' ? '#378add' : '#ef9f27'));
    pill.style.background = col; pill.style.color = '#fff';
  }
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCategory = 'all';
  activeUrgency = 'all';
  document.querySelectorAll('[id^="pill-cat-"], [id^="pill-urg-"]').forEach(function(p) { p.classList.remove('active'); p.style.background = '#fff'; p.style.color = ''; });
  var allCat = document.getElementById('pill-cat-all');
  if (allCat) { allCat.classList.add('active'); allCat.style.background = '#333'; allCat.style.color = '#fff'; }
  var allUrg = document.getElementById('pill-urg-all');
  if (allUrg) { allUrg.classList.add('active'); allUrg.style.background = '#333'; allUrg.style.color = '#fff'; }
  renderCards();
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var visible = ITEMS.filter(function(i) {
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    if (activeCategory !== 'all' && i.cat !== activeCategory) return false;
    if (activeUrgency !== 'all' && i.urgency !== activeUrgency) return false;
    return true;
  });

  if (visible.length === 0) {
    container.innerHTML = '<div style="padding:40px; color:#999; text-align:center;">No items match the current filters.</div>';
    return;
  }

  container.innerHTML = visible.map(function(item) {
    var col = CAT_COLORS[item.cat] || '#888';
    var chartBadge = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    return '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2,'0') + '</span>' +
        '<span class="urgency-badge">' + urgencyLabel(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + col + ';">' + item.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-tag">' + item.cat + '</span>' +
        (chartBadge ? '<span class="chart-badge">' + chartBadge + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label" style="margin-top:12px;">My Angle</div>' +
        '<div class="angle-block" style="border-color:' + col + '; background:' + col + '18;">' +
          '<div class="angle-text">' + item.angle + '</div>' +
        '</div>' +
        '<div class="section-label" style="margin-top:12px;">Tweets</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        (item.charts.count > 0 ? '<div class="chart-note' + (item.charts.hot ? ' chart-hot' : '') + '">📊 ' + item.charts.count + ' chart(s) — ' + item.charts.desc + '</div>' : '') +
        '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderReport() {
  var inc = document.getElementById('included-sources');
  var skip = document.getElementById('skipped-sources');
  var totals = document.getElementById('report-totals');
  inc.innerHTML = META.includedSources.map(function(s) {
    return '<div class="src-item"><span class="src-link" onclick="filterBySrc(\'' + s.name.split('/')[0].trim() + '\')">' + s.name + '</span> — ' + s.count + ' item' + (s.count > 1 ? 's' : '') + '</div>';
  }).join('');
  skip.innerHTML = META.skippedSources.map(function(s) {
    return '<div class="skip-item"><strong>' + s.name + '</strong>: ' + s.reason + '</div>';
  }).join('');
  totals.textContent = 'Window: ' + META.windowStart + ' → ' + META.windowEnd + ' | Emails in window: ' + META.emailsInWindow + ' | Read: ' + META.emailsRead + ' | Items extracted: ' + META.itemsExtracted;
}

renderMeta();
renderFilters();
renderCards();
renderReport();
</script>
</body>
</html>
