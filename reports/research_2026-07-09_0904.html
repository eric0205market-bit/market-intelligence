  const allUrgBtn = el("button", "pill" + (activeUrg === "all" ? " active" : ""), "All (" + ITEMS.length + ")");
  if (activeUrg === "all") allUrgBtn.style.background = "#3a3733";
  allUrgBtn.onclick = function () { activeUrg = "all"; activeSrc = null; render(); };
  urgBar.appendChild(allUrgBtn);

  Object.keys(URGENCY_META).forEach(function (u) {
    const btn = el("button", "pill" + (activeUrg === u ? " active" : ""), URGENCY_META[u].label + " (" + uc[u] + ")");
    if (activeUrg === u) { btn.style.background = "#3a3733"; }
    btn.onclick = function () { activeUrg = u; activeSrc = null; render(); };
    urgBar.appendChild(btn);
  });
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function (i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function () { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(cardEl) {
  cardEl.classList.toggle("open");
}

function renderCards() {
  const wrap = document.getElementById("cards");
  wrap.innerHTML = "";
  const filtered = ITEMS.filter(function (item) {
    if (activeCat !== "all" && item.cat !== activeCat) return false;
    if (activeUrg !== "all" && item.urgency !== activeUrg) return false;
    if (activeSrc && item.source.toLowerCase().indexOf(activeSrc.toLowerCase()) === -1) return false;
    return true;
  });

  filtered.forEach(function (item) {
    const color = CATEGORY_COLORS[item.cat] || "#888";
    const card = el("div", "card" + (activeSrc ? " open" : ""));
    card.id = "card-" + item.id;

    const header = el("div", "card-header");
    header.appendChild(el("span", "idx", "#" + String(item.id).padStart(2, "0")));
    header.appendChild(el("span", "urg", URGENCY_META[item.urgency].emoji));
    const badge = el("span", "badge", item.source);
    badge.style.background = color;
    header.appendChild(badge);
    header.appendChild(el("span", "cattag", item.cat));
    if (item.charts.count > 0) {
      header.appendChild(el("span", "chartflag", item.charts.hot ? "🔥" : "📊"));
    }
    header.appendChild(el("span", "card-title", item.title));
    header.appendChild(el("span", "chevron", "▸"));
    header.onclick = function () { toggleCard(card); };
    card.appendChild(header);

    const body = el("div", "card-body");

    body.appendChild(el("div", "section-label", "The Idea"));
    body.appendChild(el("div", "idea-text", item.idea));

    body.appendChild(el("div", "section-label", "My Angle"));
    const angleBox = el("div", "angle-box", item.angle);
    angleBox.style.borderLeft = "2px solid " + color;
    angleBox.style.background = color + "14";
    body.appendChild(angleBox);

    body.appendChild(el("div", "section-label", "Tweets"));
    const tweetsWrap = el("div", "tweets");

    const tA = el("div", "tweet-card");
    const labelA = el("div", "tweet-label", "TWEET A");
    labelA.style.color = "#378add";
    tA.appendChild(labelA);
    tA.appendChild(el("div", "tweet-text", item.tweetA));
    const btnA = document.createElement("button");
    btnA.className = "copy-btn";
    btnA.textContent = "📋 Copy";
    btnA.onclick = function (e) { copyTweet(item.id, 'a'); };
    tA.appendChild(btnA);
    tweetsWrap.appendChild(tA);

    const tB = el("div", "tweet-card");
    const labelB = el("div", "tweet-label", "TWEET B");
    labelB.style.color = "#7f77dd";
    tB.appendChild(labelB);
    tB.appendChild(el("div", "tweet-text", item.tweetB));
    const btnB = document.createElement("button");
    btnB.className = "copy-btn";
    btnB.textContent = "📋 Copy";
    btnB.onclick = function (e) { copyTweet(item.id, 'b'); };
    tB.appendChild(btnB);
    tweetsWrap.appendChild(tB);

    body.appendChild(tweetsWrap);

    body.appendChild(el("div", "section-label", "Charts"));
    const chartBox = el("div", "chart-box" + (item.charts.hot ? " hot" : ""),
      (item.charts.hot ? "🔥 CHART WORTH SAVING — " : "") +
      (item.charts.count > 0 ? item.charts.count + " chart(s): " : "") + item.charts.desc);
    body.appendChild(chartBox);

    const link = el("a", "readlink", "↗ Read full article");
    link.href = item.link;
    link.target = "_blank";
    link.style.color = color;
    body.appendChild(link);

    card.appendChild(body);
    wrap.appendChild(card);
  });
}

function filterBySrc(name) {
  activeCat = "all";
  activeUrg = "all";
  activeSrc = name;
  render();
  const cardsEl = document.getElementById("cards");
  if (cardsEl) cardsEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderReport() {
  const body = document.getElementById("reportBody");
  let html = "";
  html += "<h4>Time Window</h4>";
  html += "<div>" + META.windowStart + " → " + META.windowEnd + "</div>";
  html += "<h4>Totals</h4>";
  html += "<div>" + META.emailsInWindow + " emails in window · " + META.emailsRead + " opened · " + META.itemsExtracted + " items extracted</div>";
  html += "<h4>Included Sources</h4>";
  META.includedSources.forEach(function (s) {
    html += '<div class="skip-item"><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + "</span> — " + s.count + " item(s)</div>";
  });
  html += "<h4>Skipped Sources</h4>";
  META.skippedSources.forEach(function (s) {
    html += '<div class="skip-item">' + s.name + " — " + s.reason + "</div>";
  });
  body.innerHTML = html;
}

function render() {
  renderFilters();
  renderCards();
}

document.getElementById("headerMeta").textContent =
  META.date + " · " + META.time + " · " + META.itemsExtracted + " items · window " +
  META.windowStart.split(" ")[1] + "–" + META.windowEnd.split(" ")[1] + " CEST";

render();
renderReport();
</script>
