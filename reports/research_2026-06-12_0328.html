  if (!body) return;
  var html = '';
  html += '<p><strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + ' (' + META.newItemsThisRun + ' new vs prior run)</p>';
  html += '<div class="divider"></div>';
  html += '<p><strong>Sources covered (' + META.includedSources.length + '):</strong></p>';
  html += '<table class="source-table"><thead><tr><th>Source</th><th>Items</th></tr></thead><tbody>';
  META.includedSources.forEach(function(s) {
    html += '<tr><td>' + s.name + '</td><td>' + s.count + '</td></tr>';
  });
  html += '</tbody></table>';
  if (META.skippedSources && META.skippedSources.length) {
    html += '<div class="divider"></div>';
    html += '<p><strong>Skipped (' + META.skippedSources.length + '):</strong></p><ul>';
    META.skippedSources.forEach(function(s) {
      html += '<li><strong>' + s.name + '</strong> — ' + s.reason + '</li>';
    });
    html += '</ul>';
  }
  if (META.droppedFromPriorRun && META.droppedFromPriorRun.length) {
    html += '<div class="divider"></div>';
    html += '<p><strong>Dropped vs prior run (window shift):</strong></p><ul>';
    META.droppedFromPriorRun.forEach(function(s) {
      html += '<li><strong>' + s.name + '</strong> — ' + s.reason + '</li>';
    });
    html += '</ul>';
  }
  body.innerHTML = html;
}

buildFilters();
buildCards();
buildReport();
</script>
</body>
</html>
