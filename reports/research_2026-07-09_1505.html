es mean companies now have to earn their multiples.", "angle": "Same week, a German industrial (Deutz) bought a military vehicle maker for \u20ac1.6B \u2014 the AI-capex-into-industrials-and-defense thesis playing out in a live M&A deal.", "tweetA": "Goldman's framing: H1 was earnings-driven, not multiple-driven, and AI capex is leaking out of Mag7 into industrials, electrical equipment, and defense. Same week, a German industrial (Deutz) bought a military vehicle maker for \u20ac1.6B. The broadening thesis has receipts.", "tweetB": "'The market moved from the telescope to the microscope' \u2014 cute line, real point: nobody's getting paid anymore just for saying AI three times on an earnings call. Delivery is the new alpha.", "charts": {"count": 0, "hot": false, "desc": "Charts inside \u2014 worth opening"}, "link": "https://thedarksideoftheboom.substack.com/p/goldman-roadmap-equities-enter-the"}, {"id": 14, "cat": "positioning", "urgency": "deep", "source": "Dale Pinkert via The Market House", "title": "Short Micron to $600 using silver's 50% post-parabola drop as the analog", "idea": "Pinkert's cross-asset book from one interview: silver target $50 (buy physical there), gold 'one more flush' possible under $3,900 before a rally, Micron short with a $600 target \u2014 using silver's own 50% drop off its parabolic high as the analog \u2014 copper target $5.40-$5.00 (bearish), DXY one more leg to 102-103, long the grain complex (soybeans 'strongest,' corn 'accumulate,' sugar 'buy pullbacks').", "angle": "He's shorting the exact stock everyone else this week is bullish on (chips, off SK Hynix's 7x-oversubscribed ADR) \u2014 same sector, opposite conviction, same week.", "tweetA": "While the whole market is bullish semis off SK Hynix's 7x oversubscribed ADR, one trader is short Micron with a $600 target \u2014 using silver's 50% post-parabola drop as the analog. Same sector, opposite conviction, same week.", "tweetB": "Buy physical silver under $50, buy gold under $3,900, short Micron to $600, long the grain complex. That's a fully-formed cross-asset book from one interview \u2014 and none of it is an AI trade.", "charts": {"count": 1, "hot": false, "desc": "Micron 'meteorite to relative weakness' chart"}, "link": "https://themarkethouse.substack.com/p/dale-pinkert-on-an-embryonic-bull"}, {"id": 15, "cat": "credit", "urgency": "deep", "source": "Big Moves Explained", "title": "Six brokers cut Capital One's target this year \u2014 all six kept it at Buy", "idea": "Barclays, Wells Fargo, Goldman, Evercore ISI, Truist, and Bank of America have all trimmed COF price targets this year while maintaining positive ratings \u2014 sector-wide multiple compression, not a COF-specific issue. A full collapse scenario needs four things simultaneously: severe consumer-credit downturn (COF lost >80% in the GFC, >40% in the Covid crash on a smaller card book than today's), a regulatory cap on card economics, a Discover-integration failure, and tighter capital requirements forcing buyback/dividend cuts.", "angle": "The target cut itself signals something bigger than one stock \u2014 the whole consumer-finance complex is quietly being repriced.", "tweetA": "Six different brokers have cut Capital One's price target this year. All six kept Buy or Overweight. That's not a stock call \u2014 that's the whole consumer-credit sector quietly getting a lower multiple assigned to it while nobody downgrades anything.", "tweetB": "COF lost 80% in the GFC and 40% in the Covid crash \u2014 both times on a smaller card book than it has now post-Discover. The bear case isn't earnings, it's optionality: four things have to go wrong at once, but the book is bigger than it's ever been.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://bigmoves.substack.com/p/big-moves-july-8-2026"}, {"id": 16, "cat": "positioning", "urgency": "deep", "source": "Compounding Quality", "title": "Dino Polska: -40% in a year, revenue +15%, cheapest valuation ever", "idea": "Dino Polska (Poland's Costco-equivalent grocery chain) is down over 40% over the past year while revenue grew 15%, it opened 345 new stores, 10-year EPS CAGR is 19.3%, and ROIC is above 15% \u2014 trading at its lowest valuation ever. Author's target: 2.4 PLN EPS by 2028 x 20 fwd P/E = 48 PLN vs 28.7 PLN current, implying 70% upside.", "angle": "Textbook Templeton-style boring-business-at-a-discount setup, invisible next to SpaceX at 90x revenue.", "tweetA": "Dino Polska: stock -40% in a year, revenue +15%, opened 345 new stores, ROIC >15%, cheapest valuation in its history. Nobody wants a Polish grocery chain when SpaceX trades at 90x revenue. That's exactly the setup Templeton bought in 1939.", "tweetB": "70% implied upside on a grocery chain with a 19.3% 10-year EPS CAGR, priced at a multiple that assumes it stops growing. The 'boring stock in a momentum market' trade is quietly one of the cleanest setups in this window.", "charts": {"count": 1, "hot": true, "desc": "\ud83d\udd25 Dino Polska 10-year valuation and price chart"}, "link": "https://www.compoundingquality.net/p/buy-hold-sell-list-july-2026"}, {"id": 17, "cat": "tech", "urgency": "watch", "source": "Young & Calculated", "title": "HFT's trunk-line arms race is basically over \u2014 physics won", "idea": "A 1ms edge on the Chicago-New Jersey route is worth ~$100M/year to a large trading firm. Fiber (Spread Networks, $300M build, 2010) hit the speed-of-light-in-glass ceiling at 13.1ms round trip; microwave networks (McKay Brothers, Jump Trading, 15+ networks now) pushed it to ~8ms. The theoretical vacuum-speed-of-light floor is only 0.6ms faster than what the best microwave route already delivers.", "angle": "Useful case study on moats: firms spent hundreds of millions competing down to the last 600 microseconds against a hard physical limit \u2014 the frontier has now shifted to rack-level (tick-to-trade) latency instead.", "tweetA": "A trading firm just spent hundreds of millions of dollars to get within 0.6 milliseconds of the literal speed of light in a vacuum. That's not a moat anymore, that's a monument. The real edge moved into the server rack years ago and most investors still think HFT is about fiber routes.", "tweetB": "A $300M fiber route (Spread Networks, 2010) got beaten by microwave within two years. The physical medium is basically arbitraged to zero now \u2014 0.6ms of room left on the entire Chicago-NJ corridor. Whatever 'the next microwave' is for AI compute routing is worth studying.", "charts": {"count": 1, "hot": true, "desc": "\ud83d\udd25 Chicago-NJ latency compression timeline, 1980s to today"}, "link": "https://youngandcalculated.substack.com/p/latency-arbitrage-explained-how-microwave"}, {"id": 18, "cat": "crypto", "urgency": "watch", "source": "Sidelined Co / Gaming Chronicles", "title": "Pump.fun's 80/20 float flips the broken gaming-token launch model", "idea": "Kintara's $KINS token sparked a wave of crypto-gaming launches on Pump.fun. PF's bonding curve starts at a $2-5K market cap and graduates to a DEX at ~$70K once 793M of 1B tokens sell, giving an 80/20 community/team float split \u2014 versus the typical CEX-launch gaming token's 10-20% float with 80-90% still to unlock over 3-4 years. Clash of Perps' 2-person team nets ~$12K/month purely from creator fees.", "angle": "A structural fix for the 'low float, high FDV' problem that killed most 2021-23 gaming tokens \u2014 though Kintara's own $KINS shows signs of coordinated 'cabal' pumping in its first days.", "tweetA": "Old gaming-token model: 10-20% float at launch, 80% unlocks over 4 years, guaranteed sell pressure. Pump.fun model: 80% float on day one, team only gets paid via trading fees. A 2-person team (Clash of Perps) is clearing $12K/month just from fees. The incentive structure finally points the right direction \u2014 mostly.", "tweetB": "Every 'renaissance' in crypto gaming starts the same way: one token works, and a hundred sloppy clones follow within weeks. The tell that it's cabal-driven, not organic, is usually in the first 48 hours of coordinated account activity \u2014 worth watching if $KINS-style pumps keep multiplying.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.sidelinedco.com/p/pumpfun-the-future-of-gaming-token"}, {"id": 19, "cat": "venture", "urgency": "deep", "source": "Lucky Trader / Morning Minute", "title": "Crypto's largest VC just raised its biggest fund ever \u2014 to chase AI, not crypto", "idea": "AI startups pulled in roughly 70% of all global VC funding last quarter while crypto deal counts dropped and BTC sits ~30% down on the year. Paradigm (Matt Huang, Fred Ehrsam) raised a $1.2B fourth fund, its largest ever, explicitly to expand into AI and robotics \u2014 already backing Zipline (drone delivery, $7.6B valuation) and True Anomaly (space defense, $2.2B).", "angle": "The largest crypto-native VC just told you, with its own capital allocation, where the next decade of venture returns live \u2014 without officially admitting it's leaving crypto.", "tweetA": "AI took 70% of global VC dollars last quarter. Crypto's largest VC just raised its biggest fund ever \u2014 to chase AI and robotics. Paradigm didn't leave crypto, but its own capital allocation just told you where the next decade of venture returns live.", "tweetB": "Zipline (drones) at $7.6B, True Anomaly (space defense) at $2.2B \u2014 both Paradigm bets, neither one crypto. When the 'crypto-native' funds start writing checks for space defense, that's not diversification, that's a category admitting its TAM shrank.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://luckytrader.substack.com/p/paradigm-raises-12b-fund-as-cryptos"}, {"id": 20, "cat": "ai", "urgency": "watch", "source": "Lucky Trader / Morning Minute", "title": "BNB builds a whole new chain for AI trading agents that settled $73M last year", "idea": "BNB Chain's roadmap targets 100,000+ TPS, sub-50ms preconfirmation, and sub-second finality \u2014 explicitly built for autonomous trading agents, removing the public mempool to kill front-running. Reality check: autonomous agents settled just $73M across 176M onchain transactions in the past year. McKinsey projects agentic commerce could hit $5T by the end of the decade.", "angle": "Infrastructure being built years ahead of the market it's meant to serve \u2014 a bet the puck is coming, not that it's already here.", "tweetA": "BNB is building a whole new Layer-1 for autonomous trading agents. Total volume settled by autonomous agents on any chain in the past year: $73 million. McKinsey's agentic-commerce number for 2030: $5 trillion. That's either the best infrastructure bet of the decade or a chain built for a market that doesn't exist yet.", "tweetB": "Removing the public mempool to stop front-running only matters if there's enough agent-driven flow to front-run in the first place. Right now there isn't. BNB is pricing in demand that's currently a rounding error of the projection.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://luckytrader.substack.com/p/paradigm-raises-12b-fund-as-cryptos"}, {"id": 21, "cat": "ai", "urgency": "act", "source": "Mando Minutes", "title": "TeraWulf signs a $19B, 400MW power lease with Anthropic", "idea": "TeraWulf signed a $19B, 400MW power lease with Anthropic \u2014 one of the largest single AI-infrastructure power deals disclosed to date.", "angle": "The AI capex story stopped being about GPUs a while ago \u2014 it's an electricity-procurement story now, and crypto miners are the ones sitting on the megawatts to sell.", "tweetA": "TeraWulf just signed a $19B, 400MW lease with Anthropic. That's not a chip deal, that's a power deal. The AI capex story stopped being about GPUs a while ago \u2014 it's an electricity-procurement story now, and crypto miners are the ones sitting on the megawatts.", "tweetB": "400MW is roughly a mid-sized power plant's worth of dedicated capacity, leased to run inference and training for one company. Data-center power deals are starting to look like utility contracts, not tech deals.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://mandominutes.beehiiv.com/p/mando-minutes-d80f"}, {"id": 22, "cat": "ai", "urgency": "deep", "source": "Mando Minutes", "title": "Nvidia trades under 20x earnings for the first time in years, same week BofA pencils in $1T revenue by 2030", "idea": "Nvidia is trading under 20x earnings for the first time in years, per the day's flow. Same week, BofA projects roughly $1 trillion in NVDA revenue by 2030.", "angle": "Pairs with Dauber's NVDA -$1T-market-cap item \u2014 the multiple is compressing even as the long-term revenue call gets more aggressive, either the buying opportunity of the cycle or confirmation growth is decelerating faster than price.", "tweetA": "Nvidia under 20x earnings for the first time in years, same week BofA pencils in $1 trillion of NVDA revenue by 2030. Either the market is handing you a gift, or it knows something about 2027-28 growth that the 2030 model doesn't.", "tweetB": "A stock can be 'cheap' on next-twelve-months earnings and still be pricing in a growth deceleration the sell-side hasn't modeled yet. Under-20x NVDA is the number bulls will quote all week \u2014 watch what happens to the multiple, not the target price.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://mandominutes.beehiiv.com/p/mando-minutes-d80f"}, {"id": 23, "cat": "positioning", "urgency": "deep", "source": "Mando Minutes", "title": "JPY shorts most crowded since the GFC, while US financial conditions are the loosest in 11 years", "idea": "JPY short positioning is at its highest since the Global Financial Crisis, while the Chicago Fed's National Financial Conditions Index sits at its loosest in 11 years \u2014 even as FOMC minutes turn hawkish and a live shooting war escalates.", "angle": "Financial conditions this loose, in a war, with the Fed turning hawkish, is the kind of setup that ends in a violent unwind \u2014 crowded JPY shorts are the likely fault line.", "tweetA": "US financial conditions are the loosest in 11 years. JPY shorts are the most crowded since the GFC. Layer in hawkish FOMC minutes and a live shooting war, and you have every ingredient for a violent carry-trade unwind \u2014 just not the timing.", "tweetB": "Nobody blows up a crowded JPY short on a calm Tuesday. They blow it up on the day everyone's simultaneously wrong about oil, rates, AND the Fed. Today has three of those variables live at once.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://mandominutes.beehiiv.com/p/mando-minutes-d80f"}, {"id": 24, "cat": "macro", "urgency": "deep", "source": "Checkonchain / Nik Bhatia", "title": "Forget rates and oil \u2014 the dollar vs. Asian FX is the chart to watch", "idea": "Nik Bhatia's specific claim on the monthly onchain/macro call: more than interest rates, oil prices, or equity wobbles, the strengthening US dollar against key Asian currencies is what should be commanding attention right now.", "angle": "Connects three separate items in this window into one thread \u2014 China's CPI miss, record JPY short positioning, and dollar strength against Asia are the same macro story told three ways.", "tweetA": "Nik Bhatia's specific call: forget rates, forget oil \u2014 the dollar vs. Asian currencies is the chart to watch right now. Put that next to China's CPI miss and record JPY short positioning and you get one macro thread instead of three separate stories.", "tweetB": "Everyone's macro dashboard has 10 charts on it. Bhatia's argument is that right now, one of them \u2014 USD/Asia FX \u2014 is doing more work than the other nine combined.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://newsletter.checkonchain.com/p/onchain-and-macro-update-with-nik"}, {"id": 25, "cat": "culture", "urgency": "watch", "source": "Hardfork", "title": "A prequel about honor is resonating in the 'Golden Age of Grifters'", "idea": "HBO's 'A Knight of the Seven Kingdoms' (the Dunk & Egg prequel) built its standout scene around a trial-by-combat where a knight publicly shames a room of lords into fighting for a stranger's honor. The newsletter frames the show's reception explicitly against what it calls the current 'Golden Age of Grifters.'", "angle": "A culture-consumption signal worth logging: prestige-TV appetite is swinging toward old-fashioned honor narratives amid a news cycle dominated by cynicism and grift.", "tweetA": "A Song of Ice and Fire spent a decade teaching audiences that no one's honorable and everyone dies for it. The prequel just did the opposite \u2014 a knight publicly shames a room of lords into fighting for a stranger, and it's resonating. Cultural appetite for old-fashioned honor doesn't show up in any earnings call, but it shows up in what gets renewed.", "tweetB": "'The Golden Age of Grifters' is doing real work as a phrase for 2026. A slow, unglamorous prequel about chivalry hitting is the counter-programming version of value stocks outperforming momentum \u2014 the unfashionable thing working precisely because everything else got too cynical.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://hardfork.substack.com/p/knight-of-the-seven-kingdoms"}, {"id": 26, "cat": "venture", "urgency": "watch", "source": "The Founder's Corner", "title": "The Maslow's-hierarchy pitch for why SaaS messaging is selling status, not software", "idea": "Framework argument: most SaaS positioning operates at the 'safety' layer of Maslow's hierarchy (efficiency, compliance, cost savings), but the real buying trigger sits higher up \u2014 esteem, status, fear of falling behind. 'Our platform reduces reporting time by 40%' underperforms 'become the leader who transformed operational efficiency' because the second speaks to identity, not process.", "angle": "Applies directly to how AI vendors are pitching enterprise deals right now \u2014 fear of being the department that didn't adopt AI is doing more selling than any ROI slide.", "tweetA": "Every enterprise AI pitch right now is either 'saves you 40% on reporting time' or 'become the leader who transformed the business.' The second one is outselling the first by a wide margin, and it has nothing to do with the product being better.", "tweetB": "Buyers don't buy software, they buy cover for a career bet. That's not a cynical read \u2014 it's the entire reason enterprise AI budgets got approved this fast. Fear of being the team that didn't adopt AI is doing more selling than any ROI slide.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.the-founders-corner.com/p/the-psychological-blueprint-that"}, {"id": 27, "cat": "science", "urgency": "act", "source": "Neil Sethi / As We Approach The Open", "title": "AstraZeneca/Ionis gene-silencer Wainua fails its cardiac trial", "idea": "AstraZeneca and Ionis Pharmaceuticals' gene-silencer drug Wainua failed to prevent heart problems in patients with a rare, potentially fatal heart disease in trial. AstraZeneca shares slumped on the news.", "angle": "A clean binary biotech readthrough in a tape where almost everything else is priced on vibes \u2014 worth checking any RNAi-adjacent positions.", "tweetA": "AstraZeneca and Ionis' gene-silencer Wainua just failed its cardiac trial. Binary biotech readthroughs like this are still the cleanest 'you were right or you were wrong, today' trades left in a market where everything else is priced on vibes.", "tweetB": "Shares slumped on a single trial failure \u2014 a reminder that even in an AI-obsessed tape, old-fashioned phase-3 binary risk hasn't gone anywhere for the names still doing actual drug discovery.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-7926"}, {"id": 28, "cat": "geopolitics", "urgency": "deep", "source": "Neil Sethi / As We Approach The Open", "title": "German industrial buys a military vehicle maker for \u20ac1.6B, citing rearmament", "idea": "Deutz AG agreed to buy military vehicle maker Flensburger Fahrzeugbau for \u20ac1.6B ($1.8B), expanding into defense explicitly to benefit from Europe's rearmament drive.", "angle": "Direct evidence of the Goldman 'AI capex spreading into industrials/defense' thesis (item 13) \u2014 except this isn't AI capex, it's rearmament capex, a second parallel capex supercycle running alongside AI.", "tweetA": "A German engine maker just paid \u20ac1.6B for a military vehicle company, explicitly citing Europe's rearmament drive. There are now two parallel capex supercycles running at once \u2014 AI and rearmament \u2014 and industrials are positioning for both simultaneously.", "tweetB": "Everyone's capex chart this year is about GPUs. Europe's industrial base is quietly running its own capex chart, and it's about armor plating.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-7926"}, {"id": 29, "cat": "regulation", "urgency": "watch", "source": "Neil Sethi / As We Approach The Open", "title": "UK housing freezes ahead of an unelected PM's property-tax plans", "idea": "RICS survey shows buyer enquiries still falling (though less sharply than the prior month) amid speculation over incoming PM Andy Burnham's property-tax plans. Burnham \u2014 succeeding Starmer through internal party mechanics, not an election \u2014 is reportedly considering sweeping changes to property taxation. Prime Central London: 'one is searching for some positive news,' per a property consultant.", "angle": "A leadership transition decided entirely inside a party, with no popular mandate, is now a bigger driver of UK housing activity than mortgage rates.", "tweetA": "The UK's next PM hasn't won an election \u2014 he's on course to succeed Starmer through party mechanics alone \u2014 and the property market has already frozen in anticipation of his tax plans. Political uncertainty is outweighing rate moves as the swing factor in UK housing right now.", "tweetB": "Prime Central London: 'one is searching for some positive news.' That's an estate agent's quote, not a hedge fund note, and it's a more honest read on UK real estate sentiment than anything from a bank desk this week.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-7926"}, {"id": 30, "cat": "macro", "urgency": "deep", "source": "Neil Sethi / As We Approach The Open", "title": "Porsche deliveries down a third in China \u2014 the luxury-demand crack the CPI print won't show you", "idea": "Porsche H1 2026 deliveries slumped 16% globally, dragged by weak North American demand and a decline of nearly a third in China specifically.", "angle": "A cleaner read on wealthy Chinese consumer sentiment than any survey \u2014 worth checking against this window's China CPI/PPI scissors item.", "tweetA": "Porsche deliveries in China down almost a third year-over-year. Forget the CPI print \u2014 a third fewer Porsches sold is the China consumer-confidence indicator that doesn't get revised.", "tweetB": "16% down globally, a third down in China specifically. The luxury-demand crack in China isn't new, but the magnitude here is bigger than what this week's reflation headlines are implying.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-7926"}, {"id": 31, "cat": "geopolitics", "urgency": "watch", "source": "Neil Sethi / As We Approach The Open", "title": "China buys the most US soybeans in a single day since November", "idea": "USDA reported sales of 472,000 metric tons of soybeans to China for delivery \u2014 the biggest daily export amount reported to China since November 2025, extending a recent wave of buying.", "angle": "Even as US-Iran tensions escalate and China's own reflation stalls, the agricultural trade channel between the US and China keeps normalizing \u2014 a quiet decoupling counter-signal.", "tweetA": "China just bought the most US soybeans in a single day since November, in the same week Trump reopened the Iran war. Whatever 'decoupling' means in 2026, it apparently doesn't include soybeans.", "tweetB": "Ag trade between the US and China is thawing in the background while every headline is about oil and Iran. That's the story nobody's tweeting about because it's boring \u2014 which is usually why it matters.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-7926"}, {"id": 32, "cat": "crypto", "urgency": "watch", "source": "Unchained Crypto", "title": "Bitmine now holds 4.8% of the entire ETH supply \u2014 while Zapper shuts down after 7 years", "idea": "Tom Lee's Bitmine added 40,000 ETH (~$70M), pushing its treasury to 5.74M ETH \u2014 about 4.8% of total ETH supply, the largest corporate Ethereum treasury. Same week, DeFi portfolio tracker Zapper (peaked at 2M monthly users, $13B processed) announced an orderly shutdown after nearly 7 years, citing failure to drive broader DeFi adoption.", "angle": "Concentration is rising (one entity approaching 5% of ETH supply) while a tool that measured actual DeFi usage is shutting down for lack of adoption \u2014 that combination is not what ETH bulls want to see together.", "tweetA": "Bitmine now holds 4.8% of the entire ETH supply. One corporate treasury. Same week, Zapper \u2014 the tool that tracked what people actually did in DeFi \u2014 shut down after failing to grow adoption for 7 years. Concentration is up, usage is down. That's not the setup ETH bulls want.", "tweetB": "A single company holding almost 5% of a $200B+ asset's supply used to be called a whale risk. Now it's called a treasury strategy. Same math, better marketing.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://unchainedcrypto.beehiiv.com/p/trump-s-iran-remarks-unwind-bitcoin-s-july-rebound"}, {"id": 33, "cat": "crypto", "urgency": "watch", "source": "Crypto Integrat / Salazar Slytherin", "title": "Base ships a new token standard and Robinhood's chain crosses $250M in DEX volume \u2014 same week VC funding flees crypto for AI", "idea": "Base's second network upgrade, 'Beryl,' went live on mainnet introducing the B20 native token standard. Separately, N1 is acquiring 01 Exchange, and Robinhood's own chain surpassed $250M in Uniswap trading volume.", "angle": "Three different L1/L2 ecosystems making infrastructure moves the same week Paradigm's capital pivots to AI \u2014 the on-chain build-out doesn't care that the funding narrative moved on.", "tweetA": "Same week crypto VC funding craters and Paradigm pivots to AI: Base ships a new token standard, Robinhood's chain crosses $250M in DEX volume, and N1 buys an exchange. The infrastructure build-out doesn't care that the capital narrative moved on.", "tweetB": "Robinhood built a blockchain 'for RWAs' and it turns out to 'work great for memes too,' per their own CEO. That's not a compliment \u2014 that's a tell about what's actually driving volume on every new consumer chain right now.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.cryptointegrat.com/p/crypto-news-july-9-2026"}];

const CATS = {"macro": {"label": "macro", "color": "#e24b4a"}, "credit": {"label": "credit", "color": "#378add"}, "positioning": {"label": "positioning", "color": "#ef9f27"}, "ai": {"label": "AI/infra", "color": "#1d9e75"}, "crypto": {"label": "crypto", "color": "#7f77dd"}, "geopolitics": {"label": "geopolitics", "color": "#d85a30"}, "energy": {"label": "energy", "color": "#f97316"}, "tech": {"label": "tech", "color": "#06b6d4"}, "gold": {"label": "gold", "color": "#d4a017"}, "culture": {"label": "culture", "color": "#ec4899"}, "labor": {"label": "labor", "color": "#8b5cf6"}, "regulation": {"label": "regulation", "color": "#64748b"}, "science": {"label": "science", "color": "#14b8a6"}, "venture": {"label": "venture", "color": "#84cc16"}};
const URGENCY = {"act": {"emoji": "\ud83d\udd34", "label": "Act Now"}, "deep": {"emoji": "\ud83d\udd35", "label": "Deep"}, "watch": {"emoji": "\ud83d\udfe1", "label": "Watch"}};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(c) { return CATS[c] ? CATS[c].color : "#888"; }
function catLabel(c) { return CATS[c] ? CATS[c].label : c; }

function renderHeader() {
  document.getElementById('headerSub').textContent =
    META.date + " · " + META.time + " · " + ITEMS.length + " items from " + META.includedSources.length + " sources";
}

function renderFilters() {
  const catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catKeys = Object.keys(CATS).filter(function(k) { return catCounts[k]; });

  const catBar = document.getElementById('catFilters');
  let html = '<button class="pill' + (activeCat === 'all' ? ' active' : '') + '" style="' + (activeCat === 'all' ? 'background:#333;' : '') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  catKeys.forEach(function(k) {
    const active = activeCat === k;
    const style = active ? ('background:' + catColor(k) + ';border-color:' + catColor(k) + ';') : '';
    html += '<button class="pill' + (active ? ' active' : '') + '" style="' + style + '" onclick="setCat(\'' + k + '\')">' + catLabel(k) + ' (' + catCounts[k] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgBar = document.getElementById('urgFilters');
  let uhtml = '<button class="pill' + (activeUrg === 'all' ? ' active' : '') + '" style="' + (activeUrg === 'all' ? 'background:#333;' : '') + '" onclick="setUrg(\'all\')">All</button>';
  ['act','deep','watch'].forEach(function(u) {
    if (!urgCounts[u]) return;
    const active = activeUrg === u;
    const style = active ? 'background:#333;border-color:#333;' : '';
    uhtml += '<button class="pill' + (active ? ' active' : '') + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + URGENCY[u].emoji + ' ' + URGENCY[u].label + ' (' + urgCounts[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c) { activeCat = c; activeSrc = null; renderFilters(); renderCards(); }
function setUrg(u) { activeUrg = u; activeSrc = null; renderFilters(); renderCards(); }

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards(true);
}

function renderCards(expandMatched) {
  const container = document.getElementById('cards');
  let visible = ITEMS.filter(function(i) {
    if (activeCat !== 'all' && i.cat !== activeCat) return false;
    if (activeUrg !== 'all' && i.urgency !== activeUrg) return false;
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    return true;
  });

  if (visible.length === 0) {
    container.innerHTML = '<div class="empty-msg">No items match this filter.</div>';
    return;
  }

  let html = '';
  visible.forEach(function(item) {
    const openClass = (expandMatched && activeSrc) ? ' open' : '';
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += '<div class="card' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span>' + URGENCY[item.urgency].emoji + '</span>';
    html += '<span class="badge" style="background:' + catColor(item.cat) + '">' + item.source + '</span>';
    html += '<span class="tag">' + catLabel(item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chevron">▸</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left:2px solid ' + catColor(item.cat) + ';background:' + catColor(item.cat) + '14;">' + item.angle + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="section-label">Charts</div>';
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.desc || 'No chart in email — article may contain one.') + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank" rel="noopener">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderReport() {
  let html = '<div class="report-grid">';
  html += '<div><div class="section-label">Window</div>';
  html += '<div>' + META.windowStart + ' → ' + META.windowEnd + '</div>';
  html += '<div style="margin-top:6px;color:var(--text-dim);">' + META.emailsRead + ' of ' + META.emailsInWindow + ' emails read · ' + META.itemsExtracted + ' items extracted</div>';
  html += '<div class="section-label">Included Sources</div>';
  META.includedSources.forEach(function(s) {
    html += '<div class="src-line" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')"><span class="src-name">' + s.name + '</span><span>' + s.count + '</span></div>';
  });
  html += '</div>';
  html += '<div><div class="section-label">Skipped Sources</div>';
  if (META.skippedSources.length === 0) {
    html += '<div style="color:var(--text-dim);">None — every email in the window had extractable content.</div>';
  }
  META.skippedSources.forEach(function(s) {
    html += '<div class="skip-line"><b>' + s.name + '</b><br>' + s.reason + '</div>';
  });
  html += '</div></div>';
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('reportToggle').addEventListener('click', function() {
  document.getElementById('reportCard').classList.toggle('open');
});

renderHeader();
renderFilters();
renderCards();
renderReport();
</script>
