function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var icon = document.getElementById('icon-' + id);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    icon.textContent = '▼';
  } else {
    body.classList.add('open');
    icon.textContent = '▲';
  }
}

  var body = document.getElementById('report-body');
  var tog = document.getElementById('report-toggle');

  activeSrc = srcName;

  activeUrg = "All";

  renderCards();
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderPills();
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderPills();
  renderCards();
}

function getVisibleItems() {
  return ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
    var catOk = (activeCat === "All") || (item.cat === activeCat);
    var urgOk = (activeUrg === "All") || (item.urgency === activeUrg.toLowerCase().replace(' ','').replace('🔴','').replace('🔵','').replace('🟡','').trim());
    if (activeUrg === "🔴 Act Now") urgOk = item.urgency === "red";
    else if (activeUrg === "🔵 Deep") urgOk = item.urgency === "deep";
    else if (activeUrg === "🟡 Watch") urgOk = item.urgency === "watch";
    return catOk && urgOk;
  });
}

function urgEmoji(u) {
  return u === "red" ? "🔴" : u === "deep" ? "🔵" : "🟡";
}

function renderPills() {
  var catEl = document.getElementById('cat-filters');
  var urgEl = document.getElementById('urg-filters');
  var cats = ["All"];
  ITEMS.forEach(function(i) { if (cats.indexOf(i.cat) === -1) cats.push(i.cat); });
  var catHTML = '<span class="filter-label">Category</span>';
  cats.forEach(function(c) {
    var count = c === "All" ? ITEMS.length : ITEMS.filter(function(i){ return i.cat === c; }).length;
    var active = activeCat === c && !activeSrc;
    var col = CAT_COLORS[c] || "#888";
    var style = active ? ('background:' + col + ';border-color:' + col + ';color:#fff') : ('border-color:' + col + ';color:' + col);
    catHTML += '<span class="pill" style="' + style + '" onclick="setCat(\'' + c + '\')">' + c + ' <span class="cnt">' + count + '</span></span>';
  });
  catEl.innerHTML = catHTML;

  var urgs = ["All", "🔴 Act Now", "🔵 Deep", "🟡 Watch"];
  var urgCounts = {
    "All": ITEMS.length,
    "🔴 Act Now": ITEMS.filter(function(i){ return i.urgency === "red"; }).length,
    "🔵 Deep": ITEMS.filter(function(i){ return i.urgency === "deep"; }).length,
    "🟡 Watch": ITEMS.filter(function(i){ return i.urgency === "watch"; }).length
  };
  var urgHTML = '<span class="filter-label">Urgency</span>';

    var active = activeUrg === u && !activeSrc;

  });
  urgEl.innerHTML = urgHTML;
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var visible = getVisibleItems();
  if (visible.length === 0) {
    container.innerHTML = '<p style="color:#aaa;text-align:center;padding:40px">No items match the current filter.</p>';
    return;
  }
  var html = '';
  visible.forEach(function(item) {
    var col = CAT_COLORS[item.cat] || "#888";
    var chartFlag = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var angleStyle = 'border-left-color:' + col + ';background:' + hexToRgba(col, 0.06);
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">' + String(item.id).padStart(2,'0') + '</span>';

    html += '<div class="angle-block" style="' + angleStyle + '">' + escHtml(item.angle) + '</div>';

    html += '<div class="tweet-box tweet-box-b"><div class="tweet-label tweet-label-b">TWEET B</div><div class="tweet-text">' + escHtml(item.tweetB) + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0) {
      html += '<div class="charts-row"><div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">';

}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderReport() {
  var body = document.getElementById('report-body');
  var html = '<div class="report-grid">';
  html += '<div><strong>Time window</strong><br>' + META.windowStart + ' → ' + META.windowEnd + '<br><br>';
  html += '<strong>Emails in window:</strong> ' + META.emailsInWindow + '<br>';
  html += '<strong>Emails read:</strong> ' + META.emailsRead + '<br>';
  html += '<strong>Items extracted:</strong> ' + META.itemsExtracted + '</div>';
  html += '<div><strong>Included Sources</strong><br>';
  META.includedSources.forEach(function(s) {
    html += '<span class="src-link" onclick="filterBySrc(\'' + s.name.split('/')[0].trim() + '\')">' + s.name + '</span> — ' + s.items + ' items<br>';
  });
  html += '<br><strong>Skipped Sources</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += s.name + ' — ' + s.reason + '<br>';
  });
  html += '</div></div>';
  body.innerHTML = html;
}

function init() {
  document.getElementById('header-meta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources · Window: ' + META.windowStart + ' → ' + META.windowEnd;
  renderPills();
  renderCards();
  renderReport();
}

init();
</script>
</body>
</html>
