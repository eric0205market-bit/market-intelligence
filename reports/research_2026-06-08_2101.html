const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27",
  ai: "#1d9e75", crypto: "#7f77dd", geopolitics: "#d85a30",
  energy: "#f97316", tech: "#06b6d4", gold: "#d4a017",
  culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};

const URG_LABELS = { actnow: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function getColor(cat) { return CAT_COLORS[cat] || "#6b7280"; }

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
  document.getElementById('report-arrow').textContent =
    document.getElementById('report-body').classList.contains('open') ? '▲' : '▼';
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderFilters();
  renderCards();
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderFilters();
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderFilters();
  renderCards();
}

function renderFilters() {
  var cats = ["all"];
  ITEMS.forEach(function(i) { if (!cats.includes(i.cat)) cats.push(i.cat); });
  var catBar = document.getElementById('cat-filters');
  catBar.innerHTML = '<span class="filter-label">Category</span>';
  cats.forEach(function(c) {
    var count = c === "all" ? ITEMS.length : ITEMS.filter(function(i) { return i.cat === c; }).length;
    var label = c === "all" ? "All" : c.charAt(0).toUpperCase() + c.slice(1);
    var active = (activeCat === c && !activeSrc) ? " active pill-" + c : "";
    catBar.innerHTML += '<button class="pill pill-' + c + active + '" onclick="setCat(\'' + c + '\')">' + label + ' <small>(' + count + ')</small></button>';
  });

  var urgBar = document.getElementById('urg-filters');
  urgBar.innerHTML = '<span class="filter-label">Urgency</span>';
  [["all","All"], ["actnow","🔴 Act Now"], ["deep","🔵 Deep"], ["watch","🟡 Watch"]].forEach(function(u) {
    var count = u[0] === "all" ? ITEMS.length : ITEMS.filter(function(i) { return i.urgency === u[0]; }).length;
    var active = (activeUrg === u[0] && !activeSrc) ? " active pill-" + u[0] : "";
    urgBar.innerHTML += '<button class="pill pill-' + u[0] + active + '" onclick="setUrg(\'' + u[0] + '\')">' + u[1] + ' <small>(' + count + ')</small></button>';
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';
  var filtered = ITEMS.filter(function(i) {
    if (activeSrc) return i.source.indexOf(activeSrc) !== -1;
    var catOk = activeCat === "all" || i.cat === activeCat;
    var urgOk = activeUrg === "all" || i.urgency === activeUrg;
    return catOk && urgOk;
  });

  filtered.forEach(function(item) {
    var col = getColor(item.cat);
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var catLabel = item.cat.charAt(0).toUpperCase() + item.cat.slice(1);
    var urgEmoji = item.urgency === 'actnow' ? '🔴' : (item.urgency === 'deep' ? '🔵' : '🟡');

    var cardHtml = '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span class="urgency-emoji">' + urgEmoji + '</span>' +
        '<span class="source-badge" style="background:' + col + '">' + item.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-tag">' + catLabel + '</span>' +
        (chartIcon ? '<span class="chart-icon">' + chartIcon + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">THE IDEA</div>' +
        '<div class="the-idea">' + item.idea + '</div>' +
        '<div class="my-angle" style="border-left-color:' + col + '; background:' + col + '14">' +
          '<strong>MY ANGLE:</strong> ' + item.angle +
        '</div>' +
        '<div class="tweets">' +
          '<div class="tweet-box a">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box b">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>';

    if (item.charts.count > 0) {
      var chartClass = item.charts.hot ? 'chart-note hot' : 'chart-note';
      cardHtml += '<div class="' + chartClass + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }

    if (item.link && item.link !== '#') {
      cardHtml += '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    }

    cardHtml += '</div></div>';
    container.innerHTML += cardHtml;
  });
}

function renderReport() {
  var body = document.getElementById('report-body');
  var html = '<b>Window:</b> ' + META.windowStart + ' to ' + META.windowEnd + '<br><br>';
  html += '<b>Emails in window:</b> ' + META.emailsInWindow + ' | <b>Read:</b> ' + META.emailsRead + ' | <b>Items extracted:</b> ' + META.itemsExtracted + '<br><br>';
  html += '<b>Included Sources:</b><br>';
  META.includedSources.forEach(function(s) {
    html += '&nbsp;&nbsp;• <span class="src-link" onclick="filterBySrc(\'' + s.name.split('/')[0].trim() + '\')">' + s.name + '</span> (' + s.items + ' items)<br>';
  });
  html += '<br><b>Skipped Sources:</b><br>';
  META.skippedSources.forEach(function(s) {
    html += '&nbsp;&nbsp;• <b>' + s.name + '</b>: ' + s.reason + '<br>';
  });
  body.innerHTML = html;
}

function init() {
  document.getElementById('header-meta').innerHTML =
    META.date + ' &nbsp;|&nbsp; ' + META.time + ' &nbsp;|&nbsp; ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
  renderFilters();
  renderCards();
  renderReport();
}

window.onload = init;
