 Road to Housing Act", "quote_verified": true}, {"claim": "President Trump initially refused to sign the housing bill, leveraging it to push his SAVE America voter-ID legislation and stating he does not want to lower home prices for existing owners.", "speaker": "Packy McCormick", "type": "causal", "entities": ["Trump", "Mike Johnson", "SAVE America Act"], "conviction": "medium", "so_what": "Execution/timing risk on housing-supply policy; political horse-trading can delay or dilute the build-more agenda even with veto-proof support.", "quote": "nobody gives a f*ck about housing", "locator": "To that end, President Trump is currently refusing", "quote_verified": true}, {"claim": "Not Boring Capital invested in Cuby to address the technical/construction side of cheaper housing, complementing the bill's regulatory push.", "speaker": "Packy McCormick", "type": "anecdote", "entities": ["Not Boring Capital", "Cuby"], "conviction": "medium", "so_what": "Construction-tech is positioned as the private-sector complement to housing deregulation; a thesis area for venture exposure.", "quote": null, "locator": "Not Boring Capital invested in Cuby", "quote_verified": false}]}, {"theme": "Nuclear Power Financing and Buildout", "insights": [{"claim": "The DOE Loan Program Office conditionally committed $17.5 billion to support construction of 10 Westinghouse AP1000 (1GW) reactors, structured as up to five loans each backing two reactors.", "speaker": "Packy McCormick", "type": "data_point", "entities": ["DOE", "Loan Program Office", "Westinghouse", "AP1000"], "conviction": "high", "so_what": "Large-scale government de-risking of gigawatt nuclear could revive the AP1000 supply chain (containment vessels, turbines) and utility partners; bullish for nuclear-exposed names.", "quote": "conditionally commited $17.5 billion in funding to support the construction of 10 Westinghouse AP1000 reactors.", "locator": "U.S. Bets Billions in Low-Cost Loans", "quote_verified": true}, {"claim": "Under the DOE structure, Westinghouse and each utility partner must commit $500M each ($1B total per project) upfront, after which DOE provides $3.5B in low-cost loans early to fund long-lead-time items.", "speaker": "Packy McCormick", "type": "framework", "entities": ["DOE", "Westinghouse", "EDF"], "conviction": "high", "so_what": "The upfront-equity-then-cheap-debt structure targets the highest-leverage delay point (procurement), a template that could be replicated to accelerate other capital-intensive infrastructure.", "quote": "Both Westinghouse and the partner are required to fully commit their project equity, $500 million each ($1 billion total per project), upfront prior to accessing DOE loan funds.", "locator": "EDF financing will support up to five loans", "quote_verified": true}, {"claim": "Advanced reactor startups are racing to criticality before July 4th 2026, with Aalo Atomics receiving DOE approval to turn on its Aalo-X reactor and Valar Atomics having demonstrated 24 hours of continuous operation at 100% power.", "speaker": "Packy McCormick", "type": "data_point", "entities": ["Aalo Atomics", "Valar Atomics", "Chris Wright", "DOE"], "conviction": "high", "so_what": "Advanced/small reactor companies are hitting real operational milestones, validating the SMR thesis and a policy-driven push to demonstrate US nuclear leadership.", "quote": "Valar Atomics, whose criticality we covered last week, has gone on to generate power and then demonstrated 24 hours of continuous operations at 100% power.", "locator": "Big win for the big reactors", "quote_verified": true}]}, {"theme": "Brain Interfaces and Ultrasound", "insights": [{"claim": "Aleph Neuro obtained the highest-resolution 3D images of the human brain ever taken from outside the skull, using ultrafast ultrasound through the skull plus injected contrast microbubbles, with founders experimenting on their own brains.", "speaker": "Packy McCormick", "type": "data_point", "entities": ["Aleph Neuro", "ultrasound", "Marley", "Lev"], "conviction": "high", "so_what": "Non-invasive ultrasound brain imaging is advancing rapidly toward brain-computer interfaces; a potential challenger path to invasive BCI approaches like Neuralink.", "quote": "obtained the highest-resolution 3D images of the human brain ever taken from outside the skull", "locator": "Aleph Neuro Obtains Highest Resolution", "quote_verified": true}, {"claim": "Ultrasound-based neurotech is clustering as a hot category, with Prophetic's dreaming headband, Midjourney's scanner, and Aleph Neuro's imaging all emerging in close succession.", "speaker": "Packy McCormick", "type": "thesis", "entities": ["Prophetic", "Midjourney", "Aleph Neuro", "ultrasound"], "conviction": "medium", "so_what": "An emerging investable theme in non-invasive neurotech; watch ultrasound-based BCI as a distinct frontier from electrode implants.", "quote": "Ultrasound is on an absolute tear.", "locator": "Aleph Neuro Obtains Highest Resolution", "quote_verified": true}]}, {"theme": "Reviving Neglected Research as Startup IP", "insights": [{"claim": "Analogue Group's Revival Fund is funding translation of ~15,540 Soviet papers (Doklady Akademii Nauk SSSR, 1957-1970) via SovietRxiv, premised on the idea that overlooked Soviet research is a source of buildable startup IP.", "speaker": "Packy McCormick", "type": "thesis", "entities": ["Analogue Group", "Revival Fund", "SovietRxiv", "Aishwarya Khanduja"], "conviction": "medium", "so_what": "Surfacing forgotten/foreign research as a deal-sourcing strategy; a contrarian angle on where deep-tech defensible IP comes from.", "quote": "an experimental fund dedicated to restoring neglected, illegible, or prematurely dismissed research to active circulation.", "locator": "Analogue Group Funds Soviet Papers Translation", "quote_verified": true}, {"claim": "Longshot Space raised $20M (including $5M from South Park Commons) to build a ground-based hypersonic launcher derived from an old Soviet research paper, illustrating the Soviet-IP-to-startup thesis in practice.", "speaker": "Packy McCormick", "type": "data_point", "entities": ["Longshot Space", "South Park Commons", "Mike Grace"], "conviction": "medium", "so_what": "Concrete proof point that old Soviet research is fundable into venture-scale companies; a cheap-launch alternative to conventional rockets worth tracking.", "quote": "We're building a ground-based launcher that fires payloads to hypersonic speed, and eventually to orbit, for a fraction of what rockets cost.", "locator": "Poetically, the same day that Aish announced", "quote_verified": true}]}], "insight_total": 12, "top_entities": ["Stripe", "Intercept", "Westinghouse", "DOE", "AP1000", "Aalo Atomics", "Valar Atomics", "Aleph Neuro", "Analogue Group", "Longshot Space", "Trump", "Anthropic"], "source_meta": {"author": "Packy McCormick", "word_count": 2103, "paywalled": false}}, {"record_id": "0fe16893566ebd39", "source_type": "concepts", "source_name": "RAND Corporation", "source_url": "https://www.rand.org/pubs/commentary/2026/06/the-texas-screwworm-cases-are-a-wake-up-call-for-us.html", "title": "The Texas Screwworm Cases Are a Wake-Up Call for U.S. Biosecurity", "published_date": "2026-06-26", "language": "en", "processed_at": "2026-06-27T14:45:46Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society", "Macro"], "gist": "A RAND biosecurity researcher uses the June 2026 reemergence of New World screwworm in Texas to argue that U.S. crop agriculture, especially the Corn Belt, is dangerously underprotected against natural and engineered pathogens, and proposes leveraging existing CDC/USDA surveillance and rapid-response infrastructure as cheap insurance against tail-risk losses that would dwarf the prevention cost.", "themes": [{"theme": "Screwworm reemergence as warning", "insights": [{"claim": "New World screwworm, a flesh-eating parasite eradicated from the U.S. ~60 years ago, was reconfirmed in livestock and pets on June 3, 2026, with 15 cases across Texas and southeastern New Mexico within three weeks.", "speaker": "Tyler Hoard", "type": "data_point", "entities": ["New World screwworm", "USDA", "Texas", "New Mexico"], "conviction": "high", "so_what": "Live, escalating animal-health event in U.S. cattle country; watch beef supply chains, cattle futures, and USDA quarantine zones for disruption.", "quote": "Within three weeks, 15 cases in livestock and pets have been confirmed across Texas and southeastern New Mexico.", "locator": "The U.S. Department of Agriculture confirmed June 3", "quote_verified": true}, {"claim": "The screwworm response worked only because the USDA had a decades-old playbook of quarantine zones, trapping, sterile-fly releases, and pre-approved emergency drugs; the author argues no comparable playbook exists for crop pathogens.", "speaker": "Tyler Hoard", "type": "thesis", "entities": ["USDA", "New World screwworm"], "conviction": "high", "so_what": "The system is only prepared for rehearsed threats; an off-script crop pathogen would find no equivalent containment apparatus.", "quote": "And screwworm is the threat we rehearsed for. What happens when the next threat arrives, one that doesn't come with a playbook?", "locator": "Still, we were unable to prevent", "quote_verified": true}]}, {"theme": "Corn Belt monoculture fragility", "insights": [{"claim": "The U.S. Corn Belt produces more than one-third of all U.S. corn and 34 percent of the world's soybeans, with combined export value exceeding $34 billion.", "speaker": "Tyler Hoard", "type": "data_point", "entities": ["Corn Belt", "corn", "soybeans"], "conviction": "high", "so_what": "Quantifies the concentrated economic exposure a single crop-pathogen event could threaten; relevant to grain export, ag-input, and crop-insurance risk.", "quote": "Their combined export value exceeds $34 billion.", "locator": "The Corn Belt produces more than one-third", "quote_verified": true}, {"claim": "Tens of millions of acres are planted with a small number of high-yield varieties in rotation, making U.S. row-crop agriculture efficient but genetically fragile.", "speaker": "Tyler Hoard", "type": "framework", "entities": ["Corn Belt", "corn", "soybeans"], "conviction": "high", "so_what": "Genetic uniformity is the transmission mechanism that turns a localized outbreak into a systemic crop failure.", "quote": "This kind of farming is efficient but also fragile.", "locator": "But modern agricultural practices magnify", "quote_verified": true}, {"claim": "In the 1970s, with a single genetic strain dominating commercial corn, Southern corn leaf blight destroyed 15 percent of the North American crop, and crop-strain concentration is by some measures more pronounced today.", "speaker": "Tyler Hoard", "type": "causal", "entities": ["Southern corn leaf blight", "corn"], "conviction": "high", "so_what": "Historical precedent showing a double-digit percentage crop loss is achievable; current concentration implies the tail risk has grown, not shrunk.", "quote": "an outbreak of Southern corn leaf blight destroyed 15 percent (PDF) of the North American crop", "locator": "In the 1970s, when a single genetic strain", "quote_verified": true}]}, {"theme": "Low-tech agro-sabotage precedents", "insights": [{"claim": "Agricultural sabotage historically requires little sophistication: in 1989 cyanide-laced Chilean grapes triggered a U.S. import suspension that cost Chile's ag sector $330 million.", "speaker": "Tyler Hoard", "type": "data_point", "entities": ["Chile", "grapes"], "conviction": "high", "so_what": "A handful of tampered units can crater an entire export channel via import bans, not just direct contamination losses.", "quote": "In 1989, terrorists laced a few grapes exported from Chile to the United States with cyanide. The import suspension that followed cost Chile's agriculture sector $330 million.", "locator": "Further, history shows that agricultural sabotage", "quote_verified": true}, {"claim": "In 1978 a Palestinian group claimed responsibility for injecting mercury into Israeli oranges exported to Europe, after which European orange imports from Israel fell by 40 percent.", "speaker": "Tyler Hoard", "type": "data_point", "entities": ["Israel", "oranges", "Europe"], "conviction": "high", "so_what": "Demonstrates the durable demand and trade-flow damage from a single deliberate contamination claim.", "quote": "European orange imports from Israel fell by 40 percent (PDF).", "locator": "In 1978, a Palestinian group claimed", "quote_verified": true}]}, {"theme": "Engineered-pathogen threat from synthetic biology", "insights": [{"claim": "Advances in synthetic biology mean novel pathogens could be engineered to kill crops, and if released covertly during a growing season could go undetected for weeks, long enough to spread beyond any containable perimeter.", "speaker": "Tyler Hoard", "type": "thesis", "entities": ["synthetic biology"], "conviction": "high", "so_what": "Deliberate, engineered crop bioterror is now technically plausible and may exceed natural-disease losses; an emerging national-security risk category.", "quote": "Released covertly during a growing season, it could go undetected for weeks—long enough to spread beyond any containable perimeter.", "locator": "With advances in synthetic biology", "quote_verified": true}, {"claim": "RAND research published spring 2026 found the U.S. biosecurity system is poorly prepared for crop diseases not yet present domestically, which could cause billions in losses, with engineered deliberate pathogens potentially far worse.", "speaker": "Tyler Hoard", "type": "thesis", "entities": ["RAND Corporation", "synthetic biology"], "conviction": "high", "so_what": "Frames an under-covered, large-magnitude national risk; potential driver of future USDA/DHS biosecurity spending.", "quote": "Naturally occurring crop diseases not yet present in the United States could cause billions of dollars in losses if introduced here.", "locator": "In research published this spring by RAND", "quote_verified": true}]}, {"theme": "Surveillance gap and proposed fixes", "insights": [{"claim": "The U.S. monitors human pathogens (e.g., CDC wastewater surveillance for COVID-19) but crop-pathogen screening such as the National Plant Diagnostic Network is minimal, and there is no crop-equivalent of the screwworm playbook.", "speaker": "Tyler Hoard", "type": "framework", "entities": ["CDC", "National Plant Diagnostic Network"], "conviction": "high", "so_what": "Identifies a concrete capability gap; companies in biosurveillance, rapid diagnostics, and ag-biotech could benefit if policy closes it.", "quote": "But screening for new crop pathogens, such as the National Plant Diagnostic Network, is minimal.", "locator": "The United States performs disease surveillance", "quote_verified": true}, {"claim": "The author proposes four low-cost fixes leveraging existing systems: extend CDC-style wastewater surveillance to ag pathogens, fund rapid field crop diagnostics for extension agents, create a USDA RAPID-style rapid-response research mechanism, and build forensic attribution capability across USDA, CDC, State, Justice and possibly CIA.", "speaker": "Tyler Hoard", "type": "framework", "entities": ["CDC", "USDA", "National Science Foundation", "CIA"], "conviction": "high", "so_what": "A concrete policy roadmap signaling where future federal ag-biosecurity dollars may flow (diagnostics, surveillance, forensics).", "quote": "Closing the gap doesn't require building from scratch. It just requires leveraging systems that already exist.", "locator": "Closing the gap doesn't require building", "quote_verified": true}, {"claim": "Rapid forensic attribution matters because determining whether an outbreak is natural or deliberate dictates a fundamentally different response, requiring interagency collaboration up to the CIA.", "speaker": "Tyler Hoard", "type": "causal", "entities": ["USDA", "CDC", "CIA"], "conviction": "medium", "so_what": "Attribution capability is a missing link; its absence could delay or misdirect response to a deliberate agro-attack.", "quote": "When the next outbreak occurs, we will need to determine quickly whether it was natural or deliberate. The response to each is fundamentally different.", "locator": "And finally, we must invest in forensic", "quote_verified": true}]}, {"theme": "Cost-benefit / insurance framing", "insights": [{"claim": "The author argues prevention is asymmetric insurance: a single novel-pathogen introduction reducing yields by even a fraction of the worst-case would dwarf the cost of the surveillance and research infrastructure needed to prevent it.", "speaker": "Tyler Hoard", "type": "framework", "entities": ["Corn Belt"], "conviction": "high", "so_what": "Classic low-probability/high-consequence insurance logic; supports the case for proactive ag-biosecurity budget even under thin producer margins.", "quote": "We insure against low-probability, high-consequence events in every other domain of national security", "locator": "These investments will cost money", "quote_verified": true}]}], "insight_total": 13, "top_entities": ["New World screwworm", "USDA", "Corn Belt", "RAND Corporation", "CDC", "Texas", "synthetic biology", "Southern corn leaf blight", "soybeans", "corn"], "source_meta": {"author": "Tyler Hoard", "word_count": 994, "paywalled": false}}, {"record_id": "54e1d8b6e76328ce", "source_type": "concepts", "source_name": "RAND Corporation", "source_url": "https://www.rand.org/pubs/podcasts/policy-minded/2026/how-societies-can-succeed-in-the-ai-era.html", "title": "How Societies Can Succeed in the AI Era", "published_date": "2026-06-25", "language": "en", "processed_at": "2026-06-27T14:46:14Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Geopolitics", "Society", "Tech"], "gist": "RAND's Michael Mazarr argues that national success in the AI era will hinge less on chips, models, and data centers than on social qualities — ambition, shared opportunity, and a learning/adapting society — and on whether AI is steered to enhance citizen agency rather than drain it; the biggest risk is AI intensifying existing social fragmentation and distrust.", "themes": [{"theme": "Social, not technical, basis of AI advantage", "insights": [{"claim": "The competitive challenge of the AI era is primarily social rather than technological: nations that thrive will be those best able to absorb AI's shocks and harness its benefits as a society, not necessarily those with the best models or largest data centers.", "speaker": "RAND Corporation", "type": "thesis", "entities": ["Michael Mazarr", "RAND"], "conviction": "high", "so_what": "Reframes AI-race investment theses away from pure compute/model leadership toward social adaptability — relevant when assessing which nations sustain advantage over decades.", "quote": "the countries that thrive in the AI era may not simply be the ones with the best AI models or the largest data centers", "locator": "In a recent RAND paper, Michael Mazarr", "quote_verified": true}, {"claim": "Historical techno-industrial transitions show first-movers in technology do not necessarily prosper most: France matched Britain in industrial-era science but Britain won by having private-sector capital reservoirs, entrepreneur-friendly society, and engineer networks that experimented with new tech.", "speaker": "RAND Corporation", "type": "framework", "entities": ["Britain", "France", "Industrial Revolution"], "conviction": "high", "so_what": "Frames a durable filter for national-competitiveness bets — capital availability, institutional openness, and implementation networks predict who compounds a technology's gains.", "quote": "France had scientists that were pushing the boundaries of a lot of industrial era innovations just as much as Britain. But it did not become the world leader", "locator": "that's partly a lesson we draw from earlier", "quote_verified": true}, {"claim": "In the Cold War, the open, dynamic, adaptable nature of American and allied societies — not raw basic-science output, where Sputnik suggested Soviet leadership — is what let the U.S. prevail.", "speaker": "RAND Corporation", "type": "causal", "entities": ["United States", "Soviet Union", "Cold War", "Sputnik"], "conviction": "high", "so_what": "Supports a U.S.-over-China long-run thesis grounded in social dynamism rather than model benchmarks; a watchpoint for whether U.S. social cohesion is eroding.", "quote": "it was the nature of American and allied societies, more dynamic, more innovative, more open, more adaptable, that meant that they prevailed", "locator": "another great historical example", "quote_verified": true}]}, {"theme": "AI as general purpose technology", "insights": [{"claim": "AI is positioned as potentially the most wide-ranging general purpose technology in history, with applications across virtually every economic, social, and political activity simultaneously — unlike electricity, which transformed some industries (and not education) at the start.", "speaker": "RAND Corporation", "type": "thesis", "entities": ["AI", "electricity"], "conviction": "high", "so_what": "Implies cross-sector disruption rather than a contained tech vertical — supports broad exposure to AI-enabled productivity across manufacturing, medicine, and education.", "quote": "potentially the most wide-ranging and influential general purpose technology in human history", "locator": "you write that the world stands on the cusp", "quote_verified": true}, {"claim": "AI is already being deployed by industrial manufacturers for efficiency/productivity gains and is transforming medicine in discovery and the patient-doctor relationship, while universities face existential questions about whether the current education model survives.", "speaker": "RAND Corporation", "type": "data_point", "entities": ["manufacturing", "medicine", "universities", "education"], "conviction": "high", "so_what": "Education is flagged as the sector under deepest structural threat — a watch area for disruption to the higher-ed and ed-tech business model.", "quote": "whether, in fact, the current model of education as we understand it will continue", "locator": "industrial manufacturers are already using it", "quote_verified": true}]}, {"theme": "Seven traits of competitive societies", "insights": [{"claim": "RAND work for the Office of Net Assessment on long-term U.S.-China competition identified seven societal qualities that drive outputs like innovation and military power, including national ambition/willpower, shared opportunity, and a 'learning and adapting society.'", "speaker": "RAND Corporation", "type": "framework", "entities": ["RAND", "Office of Net Assessment", "United States", "China"], "conviction": "high", "so_what": "A reusable diagnostic lens for scoring nations' AI-era prospects beyond GDP or compute — useful for sovereign and country-allocation theses.", "quote": "we eventually came up with a list of seven", "locator": "in this work we did for the Office of Net Assessment", "quote_verified": false}, {"claim": "Shared opportunity is a competitiveness multiplier: societies that suppress segments of their population through bias, discrimination, or lack of economic opportunity forfeit human talent and thus national strength.", "speaker": "RAND Corporation", "type": "framework", "entities": ["shared opportunity"], "conviction": "medium", "so_what": "Frames inclusion/mobility as strategic inputs, not just social goods — a lens for whether AI widens or narrows opportunity within an economy.", "quote": null, "locator": "Another one is shared opportunity", "quote_verified": false}]}, {"theme": "Agency vs cognitive offloading", "insights": [{"claim": "The decisive variable is whether AI is steered to enhance citizen agency or to strip agency and transfer it to abstract entities; the same tool can empower individuals (e.g., as a legal co-pilot against government agencies) or disempower them via job loss.", "speaker": "RAND Corporation", "type": "thesis", "entities": ["AI"], "conviction": "high", "so_what": "Suggests AI tools that visibly augment individuals (co-pilots, citizen-empowerment apps) are the socially durable design pattern — a product-design and policy fault line.", "quote": "it's all about the choices we make to make this technology empowering and increase the agency of citizens in the society—as opposed to stealing their agency", "locator": "And that gets to sort of a fundamental theme", "quote_verified": true}, {"claim": "'Cognitive offloading' is a named risk where people lose ambition and come to rely on AI to do their thinking, so AI could empower a small elite and strengthen a society by some measures while draining the broader population of willpower.", "speaker": "RAND Corporation", "type": "causal", "entities": ["cognitive offloading", "AI"], "conviction": "medium", "so_what": "A second-order societal risk that could undercut the very dynamism that makes nations competitive — a hidden cost behind productivity-gain narratives.", "quote": "there's evidence that people can come to rely on it to kind of do their thinking for them, hence the term cognitive offloading", "locator": "The flip side is the phenomenon", "quote_verified": true}, {"claim": "China's DeepSeek open-source model, by reaching the realm of competitiveness with leading American frontier models, triggered an outpouring of nationalist pride in China, illustrating how AI success can fuel national ambition and willpower.", "speaker": "RAND Corporation", "type": "anecdote", "entities": ["DeepSeek", "China", "United States"], "conviction": "high", "so_what": "Open-source model parity functions as a geopolitical morale and soft-power lever, not just a benchmark event — relevant to U.S.-China AI sentiment.", "quote": "there was kind of an outpouring of nationalist pride", "locator": "An interesting case of that is when DeepSeek came out", "quote_verified": true}]}, {"theme": "Grassroots response and policy posture", "insights": [{"claim": "The socially empowering response to AI cannot be dictated top-down from Washington; it requires a pluralistic, grassroots movement of state/local governments, philanthropies, private firms, and individuals — mirroring Britain's 1830s-to-1900 reform movements on child labor, workers' rights, and the environment.", "speaker": "RAND Corporation", "type": "thesis", "entities": ["Washington", "Britain", "philanthropies"], "conviction": "high", "so_what": "Signals that federal AI legislation will lag the real action at state/local and private levels — where to watch for de facto AI governance norms forming.", "quote": "the answer to that in the way that makes it socially empowering is not dictated from the top", "locator": "One thing I would say is, it's not about Washington", "quote_verified": true}, {"claim": "Unlike the Industrial Revolution's 50-75 year reform runway, society lacks time to iterate on AI's social adaptation, compressing experimentation into roughly the next two to five years.", "speaker": "RAND Corporation", "type": "prediction", "entities": ["Industrial Revolution", "AI"], "conviction": "high", "so_what": "Compressed adaptation timeline raises the odds of disorderly social disruption — a tail risk for any AI-deployment thesis assuming gradual societal absorption.", "quote": "We don't have that much time is part of the problem with AI.", "locator": "So if this were Industrial Revolution", "quote_verified": true}, {"claim": "The latest U.S. executive order introduced some degree of government pre-evaluation of AI models before release, a public-private dialogue step balanced against the fear that going too far constrains innovation.", "speaker": "RAND Corporation", "type": "data_point", "entities": ["executive order", "United States government"], "conviction": "medium", "so_what": "Pre-release model evaluation is an emerging regulatory touchpoint for frontier labs — a co // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
