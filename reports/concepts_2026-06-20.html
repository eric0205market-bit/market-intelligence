* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }

             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }

/* CONTROLS (display-only: sort + filter by source) */
.controls { display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
            margin-bottom: 16px; padding: 8px 12px; background: var(--surface);

            font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-2); }

/* THEME */

.insight-so .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;

                color: var(--c-high); margin-left: 6px; }
.quote .vmark.no { color: var(--text-3); }
/* INSIGHT META CHIPS — YouTube-aligned: type/conviction tinted, speaker w/ icon,

.pill.tag { background: var(--accent); }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }

const REPORT_DATA = {"date": "2026-06-20", "generated_at": "2026-06-20T11:22:51.000Z", "stats": {"cards": 24, "insights": 350, "sources": 13, "quote_verified_pct": 85}, "cards": [{"record_id": "106d5ce18cef7e10", "source_type": "concepts", "source_name": "a16z Blog", "source_url": "https://a16z.com/what-is-new-media-in-2026/", "title": "New Media, One Year In | Andreessen Horowitz", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-20T11:17:39Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Society", "Positioning"], "gist": "a16z details its one-year-old 'New Media' platform as a 'go-direct as a service' for portfolio founders, built on four motions (in-house creative, owned channels, concierge portco services, and a networked talent engine) and argues that in an attention-saturated world, winning capital and customers now hinges on being interesting, owning distribution, and compounding personal brand signal over time.", "themes": [{"theme": "Go-Direct as a Service", "insights": [{"claim": "a16z has built a one-year-old internal function called 'New Media' that operates as 'go-direct as a service' for startups, structured around four motions: in-house creative, owned distribution channels, full-service concierge portfolio support, and a networked talent engine augmented by software and AI.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "framework", "entities": ["a16z", "New Media"], "conviction": "high", "so_what": "Signals that top-tier VC is industrializing founder marketing as a core platform service; founders and competing firms should treat go-direct media capability as a differentiating fund feature, not a nice-to-have.", "quote": "at first estimate you can think of a16z New Media is “go-direct as a service” for startups. We have four primary motions", "locator": "What do we actually do?", "quote_verified": true}, {"claim": "a16z uses a 'Reverse Pitch' (which competitors call 'the Bear Hug') in which the firm pitches the founder on the resources it will deploy and follows up with roughly 20 tangible commitments in the first week of working together, with New Media now a headline element of that pitch.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "anecdote", "entities": ["a16z", "Marc Andreessen"], "conviction": "high", "so_what": "Shows the competitive mechanics of elite venture deal-winning; media/brand support is being weaponized to win allocation in hot rounds.", "quote": "we’ll follow up the next morning with 20 tangible things we’ll help you with in our first week of working together.", "locator": "If you’re ever pitching a16z", "quote_verified": true}]}, {"theme": "Old Media vs New Media regime shift", "insights": [{"claim": "Media has shifted from a polished, defensive 'don't say anything that gets you in trouble' discipline dependent on gatekeeper channels into an authentic, unfiltered practice where being interesting is the decisive advantage.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["Ben Horowitz", "Marc Andreessen"], "conviction": "high", "so_what": "Reframes corporate comms strategy: defensive PR loses to authenticity; investors should weight a founder's ability to be interesting as a real competitive moat.", "quote": "to win you must go direct, and to go direct you must be interesting.", "locator": "Ben & Marc are both genuine aficionados", "quote_verified": true}, {"claim": "The old binary that a founder was 'either journalism or PR flack' has collapsed, opening a new middle category where founders can tell their own story and be authentically understood without relying on a gatekeeping press.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "framework", "entities": ["New Media"], "conviction": "high", "so_what": "The decline of press gatekeeping power means traditional media businesses lose leverage while owned-channel and creator-led distribution capture the value.", "quote": "the old line used to be, “Either you’re journalism, or you’re PR Flack.”", "locator": "Even worse, the old line", "quote_verified": true}, {"claim": "New Media is not actually new content but rather a deliberate offensive business strategy and a type of packaging, now pursued by ambitious people and 'very profitable business models' because the world changed in ways that reward being interesting over everything else.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["New Media"], "conviction": "high", "so_what": "Points to investable business models built around attention/packaging; the edge is structural strategy, not novel media formats.", "quote": "now there are ambitious people, and very profitable business models, pursuing New Media as a deliberate offensive business strategy.", "locator": "The funny thing about New Media", "quote_verified": true}]}, {"theme": "Launch Videos and in-house creative speed", "insights": [{"claim": "Launch Videos are framed as a new and enduring format letting founders make a statement at a critical moment without needing permission from another outlet, with a16z's in-house video team producing them on timelines agencies call impossible.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "prediction", "entities": ["a16z", "Launch Videos"], "conviction": "high", "so_what": "Speed-to-market in creative is being treated as alpha; agencies with multi-month lead times are structurally disadvantaged versus embedded VC creative teams.", "quote": "When video production timelines stretch into months (which is usually the kind of lead time an agency asks for), you’re probably going to lose some of the magic.", "locator": "“Tell your whole story", "quote_verified": true}, {"claim": "For the World Labs Marble launch, a16z's New Media team proposed shooting the announcement video on a 3D LED volume stage with the company's own product generating the environments in real time, and the launch went viral; per Dr. Fei-Fei Li, World Labs had not yet built its marketing muscle.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "anecdote", "entities": ["World Labs", "Marble", "Fei-Fei Li", "a16z"], "conviction": "high", "so_what": "Concrete proof point that product-native creative can drive viral launches; a notable named case study for AI/spatial-computing portfolio companies.", "quote": "They wanted to shoot our announcement video on a 3D LED volume stage, with our own product generating the environments in real time.", "locator": "Here’s AI legend Dr. Fei-Fei Li", "quote_verified": true}, {"claim": "a16z claims it can hire better creative talent than the average agency because the job is more interesting and more incentive-aligned, with founders preferring to work with people like Gaby Goldberg, Alex Danco and James Reina who are 'on their level.'", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "contrarian", "entities": ["a16z", "Gaby Goldberg", "Alex Danco", "James Reina"], "conviction": "medium", "so_what": "Talent and incentive alignment, not just budget, is the wedge VC uses to disintermediate marketing agencies.", "quote": "we can hire much better people than your average agency. The job is more interesting, and the work is more incentive-aligned.", "locator": "Now, this in-house creative work", "quote_verified": true}]}, {"theme": "Owned channels and guaranteed distribution", "insights": [{"claim": "a16z owns large distribution assets it can guarantee to ndant platform feature, deepening founder lock-in to the firm.", "quote": "we’re about helpful-maxxing, not gatekeeping and withholding our distribution only for the very select.", "locator": "Our goal with our channels", "quote_verified": true}]}, {"theme": "Signal, preferential attachment and Insider Media", "insights": [{"claim": "Venture capital and startups are fundamentally an exercise in preferential attachment, where people must eagerly want to attach to a founder's idea, product and vision amid limitless competing opportunities.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "framework", "entities": ["a16z"], "conviction": "high", "so_what": "A mental model for evaluating startups: the ability to attract attachment (talent, customers, capital) is itself a measurable competitive variable.", "quote": "venture capital, and startups in general, are an exercise in preferential attachment.", "locator": "It’s important that founders are interesting!", "quote_verified": true}, {"claim": "A core New Media principle is that signal is what matters and people confer signal, not brands; founders, partners, researchers, power users and great X accounts are the characters who make an idea legible and credible.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["New Media", "X"], "conviction": "high", "so_what": "Brand value is migrating from companies to individuals; investors should track founder/operator personal brand as a real asset that can move with people.", "quote": "signal is what’s important, and people confer signal, not brands.", "locator": "The second reason is more interesting", "quote_verified": true}, {"claim": "a16z endorses Anu's framing that 'New Media is Insider Media' (media for insiders by insiders where proximity is the product) but diverges by arguing being in-group is more positive-sum than people think because tech is a growing pie with more interesting people and ideas each year.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "contrarian", "entities": ["Anu", "New Media", "Insider Media"], "conviction": "medium", "so_what": "Counters the 'echo chamber' critique of insider tech media by reframing it as expandable; relevant to assessing the durability of creator/insider-media business models.", "quote": "“being in-group” is more positive-sum than people think. The whole point of tech is that it’s a growing pie", "locator": "Anu is right on with her definition", "quote_verified": true}]}, {"theme": "Concierge portco services and business impact", "insights": [{"claim": "a16z's portfolio services team coordinates launches concierge-style by stitching together video assets, writing, press and timing, and still uses traditional comms because 'the right story in the right publication can still matter a lot,' working as part of a larger founder-framed system.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "framework", "entities": ["a16z"], "conviction": "high", "so_what": "Traditional press is not dead but subordinated; the integrated system (owned + earned) is the unit of competitive advantage, not any single channel.", "quote": "the press hit works best when it is part of the larger system, and undergirded by the founder’s own framing.", "locator": "After the close, our “portco services” team", "quote_verified": true}, {"claim": "a16z claims its launches drive measurable business impact, including startups gaining tens of millions of dollars in contract value, growing massive product waitlists, and doubling their hiring pipeline.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "data_point", "entities": ["a16z"], "conviction": "medium", "so_what": "Quantifies marketing-as-revenue: a strong launch can directly move pipeline, contracts and recruiting, justifying spend on go-direct capability.", "quote": "We’ve seen startups gain tens of millions of dollars in contract value, growing massive waitlists for their products, doubling their hiring pipeline", "locator": "These launches aren’t just about looking good", "quote_verified": true}, {"claim": "After working with a16z's team, portfolio companies show enormous demand to hire newly-named roles like 'data storytellers,' 'heads of socials,' and 'technical long-form writers,' and a16z is scaling up help for CEOs to build internal New Media capabilities.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "data_point", "entities": ["a16z"], "conviction": "high", "so_what": "A new category of marketing roles is emerging inside startups, a hiring trend worth tracking for talent platforms and labor-market signals.", "quote": "we’ve seen enormous demand to hire “data storytellers”, “heads of socials”, and “technical long-form writers” after working with our team.", "locator": "Once founders see this impact", "quote_verified": true}, {"claim": "New Media works not only for already-resonant founders like Brian Armstrong or Palmer Luckey but also for founders with important work who need help fighting the attention battle, because being compelling on a timeline is a distinct, hard-to-cultivate skill.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["Brian Armstrong", "Palmer Luckey"], "conviction": "medium", "so_what": "Suggests the platform's value is broadly distributable rather than reserved for charismatic founders, widening the addressable benefit across a portfolio.", "quote": "being compelling on a timeline is its own hard-to-cultivate skill.", "locator": "It’s tempting to read all of this", "quote_verified": true}]}, {"theme": "Packaging formats and amplification tactics", "insights": [{"claim": "New Media as practiced is a type of packaging, not content, deploying formats like the 'longform conversation/essay + short-form clips' barbell, guerilla-style amplification such as mastering the QT (quote-tweet) format for algorithmic traction, and press campaigns that land because you don't need them.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "framework", "entities": ["X", "New Media"], "conviction": "high", "so_what": "A concrete, repeatable distribution playbook (barbell + clips + QT amplification) that operators can copy to break longform ideas through to niche audiences.", "quote": "the “one hour podcast, one minute clip” format has proven effective at bringing out what’s interesting about people with something to say", "locator": "In this sense, “New Media” as we practice it", "quote_verified": true}, {"claim": "The goal is not one great launch day but brands that compound over time; founders can learn to make great content by being interesting, while a16z's distinctive teachable skill is how to consistently package it so the brand compounds for the long haul.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["a16z"], "conviction": "high", "so_what": "Reframes brand as a compounding asset like capital; consistent packaging cadence, not one-off virality, is what builds durable advantage.", "quote": "where we teach them a useful skill is how to consistently package it, so that their brand will compound and strengthen for the long haul.", "locator": "This is why having a portfolio services team", "quote_verified": true}]}, {"theme": "Network, talent dataset and AI leverage", "insights": [{"claim": "a16z's fourth motion leverages a proprietary dataset of 'who is everybody in tech,' meticulously accumulated over years of meetings, now activated with a sprinkle of software and AI to put the network to work for founders, most obviously for hiring.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["a16z", "AI"], "conviction": "high", "so_what": "Decades of relationship data plus AI is being framed as a defensible network-intelligence asset; data accumulation is a long-game VC moat.", "quote": "We have a pretty great dataset of “who is everybody in tech.”", "locator": "We have a pretty great dataset", "quote_verified": true}, {"claim": "a16z runs talent fellowships (starting with the New Media Fellowship) that gather the best operators in fields like new media, design, growth and forward-deployed engineering, hosting dinners, groupchats and 90+ person multi-day gatherings in Carmel.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "data_point", "entities": ["a16z", "New Media Fellowship", "Carmel"], "conviction": "high", "so_what": "Fellowships function as an early-relationship funnel for future founders and a talent-supply channel for the portfolio, deepening the firm's network flywheel.", "quote": "sometimes invite 90+ people to Carmel for a couple of days to learn from each other and share wisdom.", "locator": "Fellowships help you meet really high-quality people", "quote_verified": true}, {"claim": "The fellowships 'containerize' roles that did not really exist until a few years ago, illustrating the claim that as tools change, jobs change too.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "causal", "entities": ["New Media Fellowship"], "conviction": "medium", "so_what": "New tooling (and AI) is spawning entirely new job categories; a leading indicator for labor-market and edtech/recruiting opportunities.", "quote": "they all containerize roles that never really existed before until a few years ago. As our tools change, our jobs change too.", "locator": "One thing you might notice about the fellowships", "quote_verified": true}, {"claim": "a16z teased upcoming launches of similar communities for executives, emerging investors, and 'something very cool on the help make hiring better for everybody front.'", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "prediction", "entities": ["a16z"], "conviction": "low", "so_what": "Forward signal that a16z is expanding its platform into executive networks and possibly a hiring product; watch for new community/recruiting offerings.", "quote": "including similar communities for executives, emerging investors, and something very cool on the “help make hiring better for everybody” front", "locator": "There’s a lot more coming soon", "quote_verified": true}]}, {"theme": "Firm-as-network strategy and compounding", "insights": [{"claim": "a16z's founding 2009 bet was that a venture firm should be built like a network or like CAA (Firm > Fund) rather than a collection of solo investors, with operating teams constructing platforms that harness network effects, a bet a Harvard Business School study framed and that has decidedly paid off thirteen years later.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["a16z", "CAA", "Harvard Business School"], "conviction": "high", "so_what": "Frames New Media as the latest expression of a proven network-effects strategy; the platform model is presented as the structural reason a16z is hard to replicate.", "quote": "a venture firm should be built like a network (or like CAA) rather than a collection of solo investors (basically Firm > Fund)", "locator": "When a16z was founded in 2009", "quote_verified": true}, {"claim": "Helping founders be interesting constantly over time compounds in value across founder goodwill, portfolio outcomes, follower growth, channel reach, and tacit launch knowledge, but requires both quality and relentless quantity to make a media asset actually compound.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["a16z", "Elon Musk"], "conviction": "high", "so_what": "Volume plus consistency, not one-off brilliance, is the compounding mechanism; the cited Elon paraphrase (anyone can make one car) reframes media as a scaled production problem.", "quote": "To paraphrase Elon, “Anyone can make a nice car once. I’ll be impressed when you can make a million cars.”", "locator": "A16Z New Media is the newest expression", "quote_verified": true}, {"claim": "a16z asserts it has 'one of the most incentive-aligned business models in the world' for helping founders with New Media, because if something is helpful for founders the firm will do it and do it a lot.", "speaker": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "type": "thesis", "entities": ["a16z"], "conviction": "high", "so_what": "Incentive alignment (equity upside vs agency fees) is the firm's claimed structural edge over fee-based marketing providers; a recruiting and positioning argument competitors must counter.", "quote": "we have one of the most incentive-aligned business models in the world to help founders with New Media.", "locator": "Fortunately, we have one of the most", "quote_verified": true}]}], "insight_total": 27, "top_entities": ["a16z", "New Media", "Marc Andreessen", "Ben Horowitz", "World Labs", "Fei-Fei Li", "New Media Fellowship", "X", "CAA", "Alex Danco", "Erik Torenberg"], "source_meta": {"author": "Erik Torenberg, Alex Danco, Elena Burger, Henry Williams, Tom Hollands, Brent Liang, Gaby Goldberg", "word_count": 5543, "paywalled": false}}, {"record_id": "160caee50d7fd93f", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/", "title": "Musings on Markets", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-20T11:17:47Z", "processor": "claude-code-sub-opus", "tags": ["Positioning", "AI", "Tech"], "gist": "Damodaran argues the fight over whether SpaceX, OpenAI and Anthropic should enter the S&P 500 is driven by self-serving agendas of active managers, academics and politicians, and that inclusion will barely move these stocks' prices because the index-inclusion bump has faded to near zero. He uses the debate to mount a broader defense of passive investing, dismantling the 'passive feeds momentum,' 'hidden risk to retail,' and 'money-losing equals bad investment' arguments.", "themes": [{"theme": "Who opposes index inclusion and why", "insights": [{"claim": "Opposition to including SpaceX, OpenAI and Anthropic in the S&P 500 comes mainly from three self-interested groups: active managers losing the war against passive funds, academics claiming to protect retail investors, and politicians attacking billionaires.", "speaker": "Posted by Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "OpenAI", "Anthropic", "S&P 500", "active investors", "index funds"], "conviction": "high", "so_what": "Discount the 'protect investors' and 'market efficiency' framing in the inclusion debate as motivated reasoning; weigh the underlying mechanics instead.", "quote": "I see a combination of hidden agendas and misguided views about investing behind each of the three groups that are most vehemently against inclusions.", "locator": "I am skeptical, since I see a combination", "quote_verified": true}, {"claim": "Active managers frame likely index inclusion of mega-cap money-losers as an added risk to passive investing that can supposedly be avoided by paying active managers to sidestep it.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["active investors", "index funds", "ETFs"], "conviction": "medium", "so_what": "Treat marketing that reframes index risk as a reason to pay active fees as a sales tactic, not analysis.", "quote": "present this as an added risk to passive investing that can be avoided by paying these professional money managers to avoid that risk", "locator": "First, you have a cadre of active investors", "quote_verified": true}]}, {"theme": "How indices are constructed", "insights": [{"claim": "S&P 500 inclusion requires being listed at least a year, having sufficient free-float liquidity, and positive profits in the four quarters leading into listing.", "speaker": "Posted by Aswath Damodaran", "type": "framework", "entities": ["S&P 500", "Standard & Poor's"], "conviction": "high", "so_what": "These three gating rules are exactly what bars money-losing newly-public mega-caps from immediate inclusion.", "quote": "caveats on inclusion relating to listing age (listed at least a year), liquidity (measured by looking at shares that are available for investors to trade in the market, i.e., free float) and profitability (positive profits in the four quarters leading into the listing)", "locator": "Constituents: The first and perhaps most critical", "quote_verified": true}, {"claim": "Price-weighting, as used by the Dow 30, has no redeeming analytical quality and breaks down right after stock splits.", "speaker": "Posted by Aswath Damodaran", "type": "framework", "entities": ["Dow 30"], "conviction": "high", "so_what": "Treat Dow 30 moves as a poor proxy for market performance versus cap-weighted measures.", "quote": "I cannot think of a single redeeming quality to price weighting, since it measures very little of consequence, and suffers from breakdowns, right after stock splits.", "locator": "Weights:  You can have two indices", "quote_verified": true}, {"claim": "Because the S&P 500 weights by free float, Meta is counted below its true weight (Zuckerberg's class B voting shares are excluded) and Walmart is similarly understated due to family-controlled holdings.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["Meta", "Mark Zuckerberg", "Walmart", "S&P 500"], "conviction": "high", "so_what": "Float-adjustment means founder/family-controlled stocks carry less index influence than their headline market cap implies.", "quote": "Meta punches in below its true weight, since the bulk of class B shares (which are voting shares held by Zuckerberg) are not counted, as does Walmart, where some family-controlled holdings are treated as non-traded", "locator": "The third and most widely used mechanism", "quote_verified": true}, {"claim": "On June 15, 2026 the S&P 500 closed at 7554.29 against a float-adjusted market cap of $63,498.44 billion, implying index units of 0.1190 (index level divided by float-adjusted market cap).", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["S&P 500"], "conviction": "high", "so_what": "The index-units mechanic is what lets a trillion-dollar addition enter without jolting the index level.", "quote": "Index units = Index level / Float-adjusted market capitalization = 7554.29/ 63498.44 = 0.1190", "locator": "Consider, for instance, the S&P 500 which ended trading", "quote_verified": true}, {"claim": "Aggregated dollar dividends on the S&P 500 were $664.90 billion in 2025, which times the 0.1190 index units yields an index dividend of 79.12 for the year.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["S&P 500"], "conviction": "high", "so_what": "Adding money-losing mega-caps mechanically dilutes index earnings and dividend fundamentals.", "quote": "the aggregated dollar dividends on the S&P 500 was $664.90 billion, and multiplying that value by the index units (0.1190) yields an index dividend of 79.12 for the year", "locator": "In 2025, for instance, the aggregated dollar dividends", "quote_verified": true}, {"claim": "When a company is swapped into an index, the index level is held steady by adjusting the index units, so a trillion-dollar entrant replacing a one-billion-dollar exit leaves the level unchanged but lowers index units (in the example from 0.1190 to 0.1171).", "speaker": "Posted by Aswath Damodaran", "type": "framework", "entities": ["S&P 500"], "conviction": "high", "so_what": "Inclusion is a non-event for the index level on day one but reshapes its forward fundamentals.", "quote": "Note that while the index level will be unchanged by the addition of the trillion dollar company, the other components that it brings with it, including higher growth and perhaps negative earnings, will alter the fundamentals of the index going forward.", "locator": "Index changes (inclusions and exclusions)", "quote_verified": true}, {"claim": "Including SpaceX, OpenAI and Anthropic in the S&P 500 would leave the index level unchanged at the moment of replacement but bring more risk, a near-term hit to earnings, and possibly higher long-term growth.", "speaker": "Posted by Aswath Damodaran", "type": "prediction", "entities": ["SpaceX", "OpenAI", "Anthropic", "S&P 500"], "conviction": "high", "so_what": "Passive S&P 500 holders should expect a changed risk/earnings profile, not an index jump, if these names are added.", "quote": "it will change the index fundamentally going forward, bringing in more risk, a near term hit to earnings and perhaps a long term increase in growth", "locator": "With these index mechanics in mind", "quote_verified": true}]}, {"theme": "S&P 500 as benchmark and the SPIVA verdict", "insights": [{"claim": "The S&P 500's 500 names represent over 80% of the market cap of nearly 6000 publicly traded US equities, making it the single best proxy for aggregate US equity performance.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["S&P 500", "US equities"], "conviction": "high", "so_what": "For aggregate-market exposure the cap-weighted S&P 500 is hard to beat; use equal-weight only to gauge the average stock.", "quote": "the index represents more than 80% of the market capitalization of all US equities", "locator": "The reason that the S&P 500 has acquired primacy", "quote_verified": true}, {"claim": "Over the last twenty-five years there have been only three years in which more than 50% of active large-cap funds beat the S&P 500, and only barely.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["S&P 500", "active funds", "S&P Global"], "conviction": "high", "so_what": "The base rate for large-cap active outperformance is so low that paying for it is rarely justified.", "quote": "Over the last twenty five years, there have been three years where more than 50% of active funds have beaten the S&P 500 index, and barely so", "locator": "Over the last twenty five years", "quote_verified": true}, {"claim": "SPIVA and Morningstar broke the active-management excuse by comparing fund returns to style-matched index funds, and across every style category no fund group outperformed its respective index over the past ten years.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["SPIVA", "Morningstar", "value funds", "small-cap funds", "growth funds"], "conviction": "high", "so_what": "Style-adjusted data removes the 'wrong benchmark' defense, strengthening the case for indexing in every category.", "quote": "there is not a single fund group in any style that outperforms its respective index past ten years", "locator": "There is very little hope in these numbers", "quote_verified": true}, {"claim": "As private equity and hedge funds have grown larger, their performance has come to resemble mutual funds, eroding the two-decade-old belief that they could systematically beat the market.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["private equity", "hedge funds", "endowments", "pension funds"], "conviction": "medium", "so_what": "Endowment and pension allocations to alternatives chasing alpha face the same scale-driven mediocrity as mutual funds.", "quote": "as they have become larger, they have come to resemble mutual funds, in terms of performance", "locator": "Thus, two decades ago, the notion that private equity", "quote_verified": true}]}, {"theme": "Index-fund business conflicts of interest", "insights": [{"claim": "Vanguard, which listed an S&P 500 index fund in 1976, now offers more than a hundred ETFs and more than two hundred index funds.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["Vanguard", "S&P 500", "ETFs"], "conviction": "high", "so_what": "Product proliferation lets investors index almost any market or subset, deepening passive's structural advantage.", "quote": "Vanguard, a pioneer when it listed the S&P 500 index fund in 1976, now lists more than a hundred ETFs and more than two hundred index funds", "locator": "Today, you can not only invest in index funds", "quote_verified": true}, {"claim": "The fees the index-fund business generates create an incentive for index creators to favor a poorly constructed index that investors love to trade over a better-constructed but less attractive one.", "speaker": "Posted by Aswath Damodaran", "type": "causal", "entities": ["index creators", "index funds"], "conviction": "medium", "so_what": "Scrutinize index methodology; commercial incentives can degrade construction quality in popular products.", "quote": "it is possible and perhaps even likely that the fund creators will pick the former", "locator": "The size of the index fund business", "quote_verified": true}]}, {"theme": "The vanishing index-inclusion bump", "insights": [{"claim": "The price bump from being added to the S&P 500 (and the drop from removal) has shrunk and become more transitory over time, and in the last decade or two has largely disappeared.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["S&P 500"], "conviction": "high", "so_what": "Do not trade index inclusion or exclusion as a durable price catalyst; the edge is gone.", "quote": "bump in stock prices from being included in the index has become smaller and more transitory over time, and in the last decade or two decades, it has largely disappeared", "locator": "Looking across these studies, there seems to be a consensus", "quote_verified": true}, {"claim": "An S&P study of 715 additions and 711 deletions to the S&P 500 between January 1995 and June 2021 showed the positive and negative excess-return effects of index changes depleting over time.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["S&P 500", "Standard & Poor's"], "conviction": "high", "so_what": "Robust large-sample evidence backs fading inclusion effects, undercutting the 'passive flows lift included stocks' thesis.", "quote": "S&P took a look at the 715 companies added and 711 company deletions made to the S&P 500 between January 1995 and June 2021", "locator": "To back this up, I look at one of the most complete studies", "quote_verified": true}, {"claim": "Despite surging assets indexed to the S&P 500, the effect of being added or removed has become smaller, not larger, and added companies are now more likely to underperform than outperform in the twelve months after inclusion.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["S&P 500"], "conviction": "high", "so_what": "Buying stocks because they just joined the index is more likely to lose than win over the following year.", "quote": "there is evidence accumulating that companies that get added to the S&P 500 are more likely to underperform than outperform in the twelve months after the addition", "locator": "Instead, as the value of funds indexed to the S&P 500 has surged", "quote_verified": true}, {"claim": "Tesla, which replaced Apartment Investment and Management (AIV) in the S&P 500 on December 18, 2020, underperformed the S&P 500 and massively underperformed the company it replaced in the months after inclusion.", "speaker": "Posted by Aswath Damodaran", "type": "anecdote", "entities": ["Tesla", "Apartment Investment and Management", "AIV", "S&P 500"], "conviction": "high", "so_what": "The marquee inclusion case study refutes the bullish-inclusion narrative for high-profile additions.", "quote": "Tesla not only under performed the S&P 500 in the months after its inclusion in the index, but massively underperformed the company (AIV) that it replaced in the index", "locator": "I would recommend that you look at the chart from this study", "quote_verified": true}, {"claim": "The price trajectories of SpaceX, OpenAI and Anthropic will not be altered by whether they are included in or excluded from the S&P 500.", "speaker": "Posted by Aswath Damodaran", "type": "prediction", "entities": ["SpaceX", "OpenAI", "Anthropic", "S&P 500"], "conviction": "high", "so_what": "Don't position around index inclusion for these names; their fate hinges on the AI story, not index membership.", "quote": "I don't think the price trajectories of any of these firms will be altered by whether they are included in or excluded from the S&P 500", "locator": "I am sure that there will be some who will disagree with me", "quote_verified": true}]}, {"theme": "Passive investing vs momentum and market structure", "insights": [{"claim": "Inclusion in a widely-tracked index increases intraday and short-term volatility but not price levels, because index-fund flows can reverse and momentum can cut both ways.", "speaker": "Posted by Aswath Damodaran", "type": "thesis", "entities": ["S&P 500", "index funds"], "conviction": "high", "so_what": "Expect index membership to raise a stock's volatility profile rather than create lasting price support.", "quote": "inclusion in a widely-tracked index (like the S&P 500) will increase intraday and short term volatility, but not price levels", "locator": "Momentum can cut in both directions", "quote_verified": true}, {"claim": "Top-heavy markets reflect winner-take-all economics rather than passive flows, because not all large-cap companies have been winners and the winning large caps delivered a disproportionate share of earnings growth.", "speaker": "Posted by Aswath Damodaran", "type": "causal", "entities": ["Mag Seven", "large-cap companies", "small-cap companies"], "conviction": "high", "so_what": "Concentration is fundamentals-driven; betting on mean reversion against dominant winners ignores their earnings reality.", "quote": "the winning large cap companies have delivered a disproportionate portion of increased earnings", "locator": "Winner-take-all economics: If momentum is the reason", "quote_verified": true}, {"claim": "Most active investors and analysts are not seeking out original information or market inefficiencies but rely on publicly available information and a belief in mean reversion, so passive growth does little damage to genuine price discovery.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["active investors", "equity research analysts"], "conviction": "high", "so_what": "The 'passive kills price discovery' alarm overstates how much active research actually informs prices.", "quote": "Much of active investing is built around publicly available information and a belief in the power of mean reversion, not original research and seeking information.", "locator": "Active investing and equity research", "quote_verified": true}, {"claim": "Any endowment or pension fund manager who steers funds to active managers in service of preserving market efficiency, while accepting underperformance, would be in violation of fiduciary responsibility.", "speaker": "Posted by Aswath Damodaran", "type": "thesis", "entities": ["endowments", "pension funds", "active money managers"], "conviction": "high", "so_what": "The market-efficiency justification for active fees cannot override the fiduciary duty to minimize cost drag.", "quote": "any endowment or pension fund manager who uses this argument to steer endowment funds to active money managers would be in violation of his or her fiduciary responsibility", "locator": "In fact, any endowment or pension fund manager", "quote_verified": true}, {"claim": "The 'passive makes markets inefficient' argument is hypocritical and self-serving because it is often advanced by the same fund managers who previously derided efficient markets as an academic fever dream.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["fund managers"], "conviction": "medium", "so_what": "Recognize the rhetorical flip as livelihood protection, possibly aimed at getting regulators to restrict index funds.", "quote": "they also strike me as both hypocritical and self-serving", "locator": "Since these stories are often being told by fund managers", "quote_verified": true}]}, {"theme": "The 'protect retail investors' fallacy", "insights": [{"claim": "An investor in an S&P 500 index fund is far less exposed to underperforming the market than a typical active manager who either over-invests in or avoids a name like SpaceX.", "speaker": "Posted by Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "S&P 500", "index funds", "active money managers"], "conviction": "high", "so_what": "Diversified index exposure neutralizes single-name risk far better than concentrated active bets on volatile newcomers.", "quote": "an investor in a S&P 500 index fund is far less exposed to underperforming the market than the typical active money manager who either over invests in SpaceX (if it goes down) or chooses not to invest in it (if it goes up)", "locator": "Risk and Diversification: Is it true that individual investors", "quote_verified": true}, {"claim": "Institutional 'smart money' is more trader than investor, making them market followers rather than leaders, so the notion they can reliably time whether SpaceX is over- or undervalued is fanciful.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["SpaceX", "institutional investors", "hedge funds"], "conviction": "high", "so_what": "Don't assume institutions have a timing edge over retail; the smart-versus-stupid-money dichotomy is overdrawn.", "quote": "institutional investors are more traders than investors, making them market followers, not leader", "locator": "Smart and Stupid Money", "quote_verified": true}, {"claim": "An investor constrained to only money-making businesses over the last two decades would have underperformed an unconstrained investor even after adjusting for risk, because at the right price a money-losing company can be a good investment.", "speaker": "Posted by Aswath Damodaran", "type": "contrarian", "entities": ["money-losing companies", "money-making companies"], "conviction": "high", "so_what": "Screening out unprofitable companies on principle has been a return drag; price, not current profitability, defines a good investment.", "quote": "I will wager than an investor who was constrained to invest only in money-making businesses in the last two decades would have under performed an investor operating without those constraints, even after adjusting for risk.", "locator": "Good businesses and good investments", "quote_verified": true}]}, {"theme": "Outlook for SpaceX, OpenAI and Anthropic", "insights": [{"claim": "In the week before SpaceX's IPO, S&P confirmed it would keep its one-year-listed requirement, meaning SpaceX, OpenAI and Anthropic must wait a year after listing before index consideration.", "speaker": "Posted by Aswath Damodaran", "type": "data_point", "entities": ["SpaceX", "OpenAI", "Anthropic", "S&P 500", "Standard & Poor's"], "conviction": "high", "so_what": "These names are off the index-inclusion table for at least a year post-IPO, removing any near-term inclusion catalyst.", "quote": "S&P removed some of the suspense in the question of whether the company would be inc  determined by how the AI story continues to play out in terms of both substance (growth, unit economics, reinvestment) and perception (hype and momentum)", "locator": "As for the companies (SpaceX, OpenAI and Anthropic)", "quote_verified": true}]}], "insight_total": 34, "top_entities": ["S&P 500", "SpaceX", "OpenAI", "Anthropic", "SPIVA", "Tesla", "Vanguard", "Meta", "hedge funds", "Dow 30"], "source_meta": {"author": "Posted by Aswath Damodaran", "word_count": 5234, "paywalled": false}}, {"record_id": "ce2920d1c6344ab1", "source_type": "concepts", "source_name": "BCG Henderson Institute", "source_url": "https://www.bcg.com/publications/2026/agentic-ai-turns-every-team-into-its-own-transformation-engine", "title": "Agentic AI Turns Every Team into Its Own Transformation Engine", "published_date": "2026-06-19", "language": "en", "processed_at": "2026-06-20T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Society"], "gist": "BCG argues the bottleneck in AI transformation has shifted from technology to organizational capability, and that agentic AI is making transformation distributed and team-led rather than driven by central programs. Value comes from quality adoption tied to two or three strategic domains, with the CHRO leading the reshape.", "themes": [{"theme": "Adoption-value gap in enterprise AI", "insights": [{"claim": "GenAI has reached 70% adoption within three years, yet only 16% of Australian executives report significant value from it today.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "data_point", "entities": ["GenAI", "Australia"], "conviction": "high", "so_what": "Wide adoption without value signals that enterprise AI ROI is gated by execution, not access; watch for vendors and firms that close the gap.", "quote": "GenAI has reached 70% adoption in just three years. It’s high on the agenda at every boardroom and management meeting, yet only 16% of Australian executives report significant value from GenAI today.", "locator": "GenAI has reached 70% adoption", "quote_verified": true}, {"claim": "The bottleneck in AI transformation has shifted from the technology itself to whether teams have the confidence, capability and permission to change how they work.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "thesis", "entities": ["agentic AI", "GenAI"], "conviction": "high", "so_what": "Differentiates winners from laggards on organizational change capacity rather than tech spend; a screen for which enterprises will realize AI returns.", "quote": "the bottleneck in AI transformation has shifted from technology to organisational capability", "locator": "The adoption-value constraint is no longer", "quote_verified": true}]}, {"theme": "C-suite ownership of AI", "insights": [{"claim": "More than 70% of CEOs state they are now the primary decision-maker on AI, treating it as an enabler of strategy rather than a purely technical capability.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "data_point", "entities": ["CEOs", "CIO"], "conviction": "high", "so_what": "AI budgets and direction are moving out of the CIO's hands toward the CEO, reshaping who enterprise AI vendors must sell to.", "quote": "more than 70% of CEOs state that they are now the primary decision-maker when it comes to AI", "locator": "That shift is already visible in the C-suite", "quote_verified": true}, {"claim": "The CHRO is best positioned to lead the AI agenda as a Chief Transformation and Capability Officer, translating strategy into integrated human-AI structures.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "framework", "entities": ["CHRO", "HR"], "conviction": "medium", "so_what": "Signals a rising strategic mandate for HR functions and reskilling spend as AI reshapes org design.", "quote": "Agentic AI puts organisation design at the centre of the AI agenda, and the CHRO is best placed to lead it", "locator": "Context and culture matter", "quote_verified": true}]}, {"theme": "Distributed, team-led transformation", "insights": [{"claim": "When nearly every team is affected by agentic AI, transformation no longer scales through a handful of large central programs but through hundreds of small, parallel local reinventions.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "framework", "entities": ["agentic AI"], "conviction": "high", "so_what": "Implies demand for self-serve, governable AI tooling deployable across many teams rather than centralized platforms.", "quote": "It scales through hundreds of small, local reinventions happening in parallel.", "locator": "Transformation multiplies", "quote_verified": true}, {"claim": "Organizations getting real value point team-led energy at the two or three domains that move a business metric and reshape those domains end to end, rather than letting every team experiment at once.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "thesis", "entities": ["agentic AI"], "conviction": "high", "so_what": "Focus and discipline, not breadth of pilots, predict which firms convert AI into measurable returns.", "quote": "they are pointing this team-led energy at the two or three domains that move a business metric, and reshaping these domains end to end", "locator": "Agentic AI does more than improve productivity", "quote_verified": true}, {"claim": "Grassroots access to generative AI tools creates pockets of innovation regardless of company guidance, raising effectiveness but also introducing organizational risk if left unaddressed.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "causal", "entities": ["GenAI"], "conviction": "medium", "so_what": "Ungoverned shadow AI usage is a growing enterprise risk and a market opening for AI governance and observability tooling.", "quote": "pockets of innovation are occurring regardless of company guidance", "locator": "Innovation becomes grassroots", "quote_verified": true}]}, {"theme": "Pace of model capability", "insights": [{"claim": "Agentic AI capabilities are evolving weekly, with Anthropic releasing the Mythos-class Claude Fable 5 in June 2026 and OpenAI releasing GPT-5.5 rebuilt for agentic workflows in April 2026.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "data_point", "entities": ["Anthropic", "Claude Fable 5", "OpenAI", "GPT-5.5"], "conviction": "high", "so_what": "Rapid model release cadence means central transformation programs cannot keep up, favoring adaptable, decentralized adoption.", "quote": "Anthropic releasing the Mythos-class Claude Fable 5 in June 2026 and OpenAI releasing GPT-5.5 – rebuilt for agentic workflows – in April 2026", "locator": "Work is changing faster than central programs", "quote_verified": true}]}, {"theme": "AWS software-development case study", "insights": [{"claim": "AWS used GenAI to reshape software engineering by tying adoption to business outcomes and embedding experienced peer engineers into teams, resulting in 27% more features shipped.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "anecdote", "entities": ["AWS", "GenAI", "software engineering"], "conviction": "high", "so_what": "Concrete proof point that habit and workflow change, not tool access, drives measurable AI productivity gains.", "quote": "resulting in 27% more features shipped", "locator": "These changes reshaped the role of the developer", "quote_verified": true}, {"claim": "At AWS only about a third of software work is coding, so most AI value lies in reshaping the design, maintenance and ops processes before and after coding.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "data_point", "entities": ["AWS", "software development lifecycle"], "conviction": "medium", "so_what": "Coding-assistant gains alone understate AI's potential; the larger opportunity is full-lifecycle automation.", "quote": "about a third of the work due to coding", "locator": "Finally, AWS is extending this reshape", "quote_verified": true}]}, {"theme": "Executive playbook for scaling AI", "insights": [{"claim": "Access to AI tools without governance reliably produces ungoverned workarounds and little measurable value, so productivity tools must be paired with AI risk governance.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "framework", "entities": ["AI governance"], "conviction": "high", "so_what": "Reinforces the investment case for AI governance, identity, sandbox and observability infrastructure.", "quote": "Access without governance reliably produces ungoverned workarounds and little measurable value", "locator": "Giving teams a licence is the start", "quote_verified": true}, {"claim": "Defaulting to building AI capabilities internally is often the slowest and most expensive route to value, so firms should use an explicit build/buy/partner framework while retaining strategic control over assets like ownership of the customer in agentic commerce.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "framework", "entities": ["agentic commerce"], "conviction": "medium", "so_what": "Favors ecosystems of AI service and technology partners over in-house builds for most non-core capabilities.", "quote": "The instinct to build everything internally is often the slowest and most expensive route to value.", "locator": "Do you have a framework for build/buy/partner", "quote_verified": true}, {"claim": "Transformation bolted onto teams already at capacity tends to fail quietly, so leadership must separate running the business from transforming it and fund dedicated capacity through backfilling or temporary support.", "speaker": "https://www.bcg.com/about/people/experts/gavin-parker", "type": "causal", "entities": [], "conviction": "medium", "so_what": "Highlights that protected transformation capacity is an investment cost firms must budget for to realize AI returns.", "quote": "Transformation bolted onto teams already at capacity tends to fail quietly.", "locator": "Have you invested in the capacity", "quote_verified": true}]}], "insight_total": 13, "top_entities": ["agentic AI", "GenAI", "AWS", "Anthropic", "Claude Fable 5", "OpenAI", "GPT-5.5", "CHRO", "CEOs", "BCG"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/gavin-parker", "word_count": 2304, "paywalled": false}}, {"record_id": "ee6083464e12168b", "source_type": "concepts", "source_name": "BCG Henderson Institute", "source_url": "https://www.bcg.com/publications/2026/listening-to-patients-in-the-digital-age", "title": "Patients Are Sending Digital Signals. Are Companies Listening?", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-20T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Society"], "gist": "Pharma and medtech brands lose prospective patients because fragmented digital signals never become coordinated next steps, and tightening privacy rules are eroding the third-party data legacy acquisition depended on. BCG argues agentic AI tying together predictive and generative AI into a real-time decisioning layer over unified first-party data delivers large conversion and ROI gains.", "themes": [{"theme": "Why legacy patient programs underperform", "insights": [{"claim": "Most patients now begin their health care journey online, yet most direct-to-patient programs still run on predetermined sequences and broad segments whose cadence never changes based on patient behavior.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "thesis", "entities": ["direct-to-patient programs", "pharma", "medtech"], "conviction": "high", "so_what": "Static DTP models are leaking conversions, creating a market for real-time decisioning vendors in healthcare marketing.", "quote": "Many DTP models still run on predetermined sequences and broad segments whose cadence never changes based on what the patient is actually doing.", "locator": "Static programs miss the moment.", "quote_verified": true}, {"claim": "Industrywide, only about 2% of brands have reached individual-customer-level, cross-channel data-driven marketing.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "data_point", "entities": ["healthcare brands"], "conviction": "high", "so_what": "A vast addressable gap exists for AI-driven personalization tooling in pharma and medtech marketing.", "quote": "only about 2% of brands have reached a level of data-driven marketing where decisions are made at the individual customer level across channels", "locator": "The organizational dimension makes coordination harder.", "quote_verified": true}, {"claim": "The bottleneck in patient marketing is rarely the platform but the absence of a shared patient data model and a journey roadmap connecting capability to measurable outcomes.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "causal", "entities": ["patient data model"], "conviction": "high", "so_what": "Investment should target data unification and activation, not more technology platforms.", "quote": "Technology investment consistently outpaces activation. The bottleneck is rarely the platform; it is the absence of a shared patient data model", "locator": "Technology investment consistently outpaces activation.", "quote_verified": true}]}, {"theme": "Privacy reshaping acquisition economics", "insights": [{"claim": "As data regulations tighten, broad-tracking tools become harder and more expensive to scale, making first-party consent-based data the most defensible conversion asset a health care brand can develop because it compounds rather than depreciates.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "thesis", "entities": ["first-party data", "third-party data", "privacy regulation"], "conviction": "high", "so_what": "First-party data assets become a durable competitive moat; brands dependent on third-party tracking face rising costs.", "quote": "First-party, consent-based data——built directly from patient engagement——is now the most defensible conversion asset a health care brand can develop, because it compounds over time rather than depreciating.", "locator": "Privacy concerns are reshaping acquisition economics.", "quote_verified": true}]}, {"theme": "The three-layer AI stack for conversion", "insights": [{"claim": "Predictive AI scores each patient's likelihood of converting or dropping out, generative AI produces MLR-compliant content variants at scale, and agentic AI is the execution layer that decides and acts on the next best action while feeding outcomes back into the patient profile.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "framework", "entities": ["predictive AI", "generative AI", "agentic AI", "MLR review"], "conviction": "high", "so_what": "Conversion value accrues to whoever orchestrates the three AI layers into a self-improving loop, not to any single tool.", "quote": "Agentic AI is the execution layer. It observes real-time signals, decides the next best action for each patient (channel, timing, content variant, or escalation to a human) and acts.", "locator": "AI in patient marketing is not a single tool.", "quote_verified": true}, {"claim": "Most health care organizations already have predictive or generative AI somewhere in production, but the conversion gains come only when agentic AI ties them together into a continuously improving system.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "thesis", "entities": ["predictive AI", "generative AI", "agentic AI"], "conviction": "high", "so_what": "Agentic orchestration is the missing layer where the next wave of healthcare AI value will be captured.", "quote": "The conversion gains come when agentic AI ties them together into a system that continuously improves.", "locator": "Most health care organizations today", "quote_verified": true}]}, {"theme": "Quantified ROI evidence", "insights": [{"claim": "A BCG analysis in health care provider systems benchmarked AI-driven personalized digital marketing at roughly six times return on marketing spend and a 20% incremental revenue lift when underlying data and decisioning are in place.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "data_point", "entities": ["BCG", "healthcare provider systems"], "conviction": "high", "so_what": "Concrete ROI benchmark supports the investment case for unified-data AI marketing in healthcare.", "quote": "roughly six times return on marketing spend and a 20% incremental revenue lift when the underlying data and decisioning are in place", "locator": "The upside is visible in the results.", "quote_verified": true}, {"claim": "At a major medtech company, an AI effort to convert leads into loyal customers delivered a 10% reduction in cost per lead and a six-point lift in lead conversion rate in the first year.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "data_point", "entities": ["medtech"], "conviction": "high", "so_what": "Demonstrates near-term, first-year payback from AI lead conversion programs.", "quote": "a 10% reduction in cost per lead and a six-point lift in lead conversion rate", "locator": "Recent client engagements confirm the pattern.", "quote_verified": true}, {"claim": "An AI-powered activation program in cardiac monitoring-device adherence produced an 85% lift in patient-reported activation and reversed a multiyear decline in 120-day device return rates.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "data_point", "entities": ["cardiac monitoring devices", "medtech"], "conviction": "high", "so_what": "Shows AI activation improves clinical adherence and program economics, not just marketing metrics.", "quote": "an 85% lift in patient-reported activation and reversed a multiyear decline in 120-day device return rates", "locator": "In a separate engagement focused on cardiac monitoring", "quote_verified": true}]}, {"theme": "Practical implementation path", "insights": [{"claim": "The fastest route to better patient conversion is a focused four-to-six-week diagnostic that quantifies funnel drop-off and aligns on two or three priority journeys scored by impact versus effort, rather than rebuilding everything.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "framework", "entities": ["patient journey diagnostic"], "conviction": "medium", "so_what": "A low-cost diagnostic-first approach lowers the barrier to entry and de-risks AI adoption for healthcare leaders.", "quote": "A focused four-to-six-week diagnostic should do five things", "locator": "Commercial and digital leaders do not need", "quote_verified": true}, {"claim": "A minimum viable foundation for patient conversion needs five elements, and having three of the five in place is enough to begin a focused pilot, with the first AI-led journey generally measurable within eight to twelve weeks of build kickoff.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "framework", "entities": ["MLR-approved content", "consented identity spine"], "conviction": "medium", "so_what": "Single-quarter measurable results lower the investment threshold versus multiyear transformations.", "quote": "The first AI-led direct-to-patient journey is generally measurable within eight to twelve weeks of build kickoff", "locator": "For chief medical officers who are deciding", "quote_verified": true}, {"claim": "Creativity and media spend still matter but no longer determine the ceiling on patient conversion; fragmented signals do, and unifying them turns scattered interactions into conversion leverage.", "speaker": "https://www.bcg.com/about/people/experts/alex-baxter", "type": "thesis", "entities": ["direct-to-patient programs"], "conviction": "high", "so_what": "Reframes the competitive battleground in healthcare marketing from creative spend to data integration.", "quote": "Creativity and media spend still matter, but they no longer determine the ceiling on patient conversion. Fragmented signals do.", "locator": "The strategic implication is straightforward.", "quote_verified": true}]}], "insight_total": 12, "top_entities": ["agentic AI", "predictive AI", "generative AI", "direct-to-patient programs", "first-party data", "BCG", "medtech", "pharma", "MLR review", "cardiac monitoring devices"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/alex-baxter", "word_count": 1991, "paywalled": false}}, {"record_id": "a9836b0df5dbca7f", "source_type": "concepts", "source_name": "Carnegie Endowment", "source_url": "https://carnegieendowment.org/research/2026/06/retreat-rebel-replace-or-reform-making-sense-of-multilateralism-under-trump-20", "title": "Retreat, Rebel, Replace, or Reform? Making Sense of Multilateralism Under Trump 2.0", "published_date": "2026-06-16", "language": "en", "processed_at": "2026-06-20T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Macro", "Energy", "AI", "Society"], "gist": "Carnegie argues the conventional view that Trump 2.0 simply repudiates multilateralism is wrong; its conduct splits into four overlapping modes (disengagement, coercion/disruption, substitution, conditional continuity), and the cumulative effect is an erosion of U.S. credibility and influence that hands openings above all to China, even as some forced institutional reform may be a silver lining.", "themes": [{"theme": "Four-mode framework for Trump-era multilateralism", "insights": [{"claim": "The Trump administration's behavior toward international organizations can be sorted into four overlapping categories that the authors label retreat (disengagement), rebellion (coercion/disruption), replacement (substitution), and reform (conditional continuity), and these are pursued in parallel even within the same institution.", "speaker": "Gustavo Romero", "type": "framework", "entities": ["Trump administration", "United Nations", "multilateral institutions"], "conviction": "high", "so_what": "Gives investors a structured lens to map U.S. posture institution-by-institution rather than assuming blanket exit, which mispriced risk for bodies the U.S. is actually deepening engagement with.", "quote": "disengagement, disruption, substitution, and conditional continuity. Or, for the more alliteratively minded: retreat, rebellion, replacement, and reform.", "locator": "The administration’s behaviors toward multilateralism", "quote_verified": false}, {"claim": "The authors contend the administration's animating impulses are sovereigntist, transactional, ideological, and leverage-focused, producing a selective and ideologically conditioned engagement rather than pure hostility or wholesale exit.", "speaker": "Gustavo Romero", "type": "thesis", "entities": ["Trump administration"], "conviction": "high", "so_what": "Signals U.S. moves are predictable along these axes: watch for sovereignty triggers, ideological flashpoints (climate, gender), and where the U.S. holds financial leverage.", "quote": "the administration’s animating impulses have been sovereigntist, transactional, ideological, and leverage focused.", "locator": "In sum, the administration’s animating impulses", "quote_verified": false}, {"claim": "The authors argue the U.S. has always been ambivalent and selective toward multilateralism, so Trump differs from predecessors in the intensity of his antipathy and appetite for disruption rather than in kind on most fronts.", "speaker": "Gustavo Romero", "type": "thesis", "entities": ["Trump administration", "United States"], "conviction": "high", "so_what": "Frames Trump as an acceleration of a structural U.S. ambivalence, suggesting reversion risk after political turnover but also that disruption is path-dependent, not purely personal.", "quote": "What sets the Trump administration apart from its predecessors is the intensity of its antipathy.", "locator": "What sets the Trump administration apart", "quote_verified": false}]}, {"theme": "Disengagement and treaty/IO withdrawals", "insights": [{"claim": "On inauguration day Trump initiated withdrawal from the Paris Climate Agreement and the WHO and pulled the U.S. out of the OECD global minimum corporate tax agreement, framing the tax deal as a sovereignty infringement and the climate accord as a rip-off.", "speaker": "Gustavo Romero", "type": "data_point", "entities": ["Paris Climate Agreement", "WHO", "OECD", "global minimum corporate tax"], "conviction": "high", "so_what": "OECD pillar-two exit reshapes multinational tax planning; Paris/WHO exits reroute global climate and health funding flows away from U.S. influence.", "quote": "He also pulled the United States out of the Organization for Economic Cooperation and Development’s global minimum corporate tax agreement.", "locator": "On inauguration day, Trump signed executive orders", "quote_verified": false}, {"claim": "The U.S. WHO withdrawal completed January 22, 2026 stripped the body of its largest donor (about $1.284 billion per year), prompting the WHO to cut roughly a quarter of its workforce and consolidate ten divisions into four.", "speaker": "Gustavo Romero", "type": "data_point", "entities": ["WHO"], "conviction": "high", "so_what": "A diminished WHO weakens global pandemic surveillance, a tail risk for global supply chains, travel, and pharma; watch capacity gaps and successor arrangements.", "quote": "the WHO has initiated plans to slash roughly one-quarter of its workforce and consolidate its ten divisions into four.", "locator": "The administration justified its WHO withdrawal", "quote_verified": false}, {"claim": "China is set to replace the U.S. as the WHO's top state donor, pledging an additional $500 million over five years—roughly a f
