ociety", "Positioning"], "gist": "Trump's July 17 speech promising revelations about 2020 election interference produced no new evidence, but the election-denial movement (Byrne, Jones, Logan, Rogers, Creech) is treating it as the opening move in a plan to pass the SAVE America Act and, failing that, invoke the Insurrection Act to deploy military and federal law enforcement at 2026 midterm polling sites; even Trump's own White House document reviewer, John Solomon, admits the intelligence community has 'zero evidence' any foreign power flipped votes.", "themes": [{"theme": "Insurrection Act as the End-Game", "insights": [{"claim": "Election deniers interpret Trump's election-interference speech as laying the groundwork for invoking the Insurrection Act to deploy the military to polling locations for the November 2026 midterms.", "speaker": "David Gilbert", "type": "prediction", "entities": ["Donald Trump", "Insurrection Act", "2026 midterms"], "conviction": "high", "so_what": "Watch for further pretext-building rhetoric from the administration ahead of the 2026 midterms; a real invocation would be a major political-risk/market shock, though the article notes the military's legal scope in such a scenario remains unclear.", "quote": "Conspiracy theorists claimed the speech would provide the basis for Trump to enact the Insurrection Act, a law that could allow the president to deploy the military to the polls in November", "locator": "paragraph beginning 'Conspiracy theorists claimed the speech would provide'", "quote_verified": true}, {"claim": "A member of the election-denial group Sarasota Patriots wrote on Telegram that Trump has 'the optics to do whatever is necessary' to secure the 2026 midterms, including invoking the Insurrection Act with military and federal law enforcement at polling locations.", "speaker": "David Gilbert", "type": "anecdote", "entities": ["Donald Trump", "Insurrection Act", "Sarasota Patriots", "2026 midterms"], "conviction": "high", "so_what": "Grassroots election-denial networks are explicitly pre-committing to an Insurrection Act narrative, signaling coordinated messaging rather than a one-off reaction.", "quote": "Trump has the optics to do whatever is necessary to secure the 2026 midterms, to include invoking the Insurrection Act to secure polling locations with Military and Federal Law Enforcement", "locator": "Sarasota Patriots Telegram quote", "quote_verified": true}, {"claim": "Conspiracy influencer Jacob Creech (WarClandestine) predicts a two-step sequence: Trump will first exhaust every other option before ultimately invoking the Insurrection Act.", "speaker": "David Gilbert", "type": "prediction", "entities": ["Jacob Creech", "Insurrection Act", "Donald Trump"], "conviction": "medium", "so_what": "This staged framing (exhaust options, then Insurrection Act) is being used to justify escalation as reasonable rather than authoritarian, worth tracking as a rhetorical pattern.", "quote": "After Trump proves that he exercised every option before going the Executive route, he will invoke the Insurrection Act and save the Republic", "locator": "Jacob Creech (WarClandestine) X post", "quote_verified": true}, {"claim": "Arizona state senator Wendy Rogers publicly endorsed the Insurrection Act prediction, framing it as 'laying the predicate' happening in real time, giving the narrative validation from a sitting elected official.", "speaker": "David Gilbert", "type": "anecdote", "entities": ["Wendy Rogers", "Insurrection Act", "Jacob Creech"], "conviction": "high", "so_what": "Amplification by an elected official moves this from fringe social media chatter into a narrative with institutional legitimacy, raising its real-world escalation risk.", "quote": "This is what's called 'laying the predicate' and it is EXACTLY what'll happen. You're watching it in REAL TIME.", "locator": "Wendy Rogers X post sharing Creech", "quote_verified": true}, {"claim": "The election-denial movement's stated plan runs through Congress first: push the SAVE America Act, and only invoke 'even greater powers' (i.e., the Insurrection Act) if that legislative effort fails.", "speaker": "David Gilbert", "type": "framework", "entities": ["SAVE America Act", "Insurrection Act", "Donald Trump", "Congress"], "conviction": "medium", "so_what": "The SAVE America Act's legislative fate becomes a leading indicator for whether the Insurrection Act threat escalates from rhetoric toward action.", "quote": null, "locator": "paragraph on Lara Logan and 'a much bigger plan'", "quote_verified": false}]}, {"theme": "Speech Delivered No Evidence", "insights": [{"claim": "Trump's speech made sweeping claims about Chinese interference and 'deep state' cover-ups in the 2020 election and repeated debunked claims about noncitizen voting, but the document drop on the White House website did not contain evidence to back up the assertions.", "speaker": "David Gilbert", "type": "causal", "entities": ["Donald Trump", "China", "White House"], "conviction": "high", "so_what": "A high-profile 'evidence' event that produces no verifiable evidence is itself a signal that the goal is narrative-building rather than disclosure, an information-risk pattern worth tracking into the midterms.", "quote": null, "locator": "opening paragraph", "quote_verified": false}, {"claim": "Alexandra Chandler of Protect Democracy characterizes the speech and document release as a 'tired playbook' of cherry-picked intelligence dressed up as a national-security revelation, designed to build a pretext for followers to reject the 2026 election results if their side loses.", "speaker": "David Gilbert", "type": "thesis", "entities": ["Alexandra Chandler", "Protect Democracy", "2026 midterms"], "conviction": "high", "so_what": "A former 13-year intelligence-community analyst frames this explicitly as pretext-building for post-election contestation, not a genuine security disclosure — a useful lens for evaluating future 'revelation' events from the administration.", "quote": "Tonight the White House ran a tired playbook: cherry-picked intelligence and a flood of raw, discredited reports, dressed up as a national security revelation, to build a pretext for lawless action.", "locator": "Alexandra Chandler quote", "quote_verified": true}, {"claim": "Though not mentioned by Trump in the speech, the released White House documents cited Russia in an assessment that Russia was the only country that tried to meddle in the 2020 election, and it targeted then-candidate Joe Biden rather than aiding Trump.", "speaker": "David Gilbert", "type": "data_point", "entities": ["Russia", "Donald Trump", "Joe Biden", "White House"], "conviction": "medium", "so_what": "The documents' own content undercuts the China-focused narrative being pushed by allies like Cleta Mitchell, exposing an internal inconsistency in the White House's own evidentiary release.", "quote": null, "locator": "paragraph on John Solomon's White House role", "quote_verified": false}, {"claim": "A 2021 Office of the Director of National Intelligence report, not included in the White House document dump, concluded China did not deploy interference or influence efforts to change the outcome of the 2020 US presidential election.", "speaker": "David Gilbert", "type": "data_point", "entities": ["China", "Office of the Director of National Intelligence"], "conviction": "high", "so_what": "A prior official intelligence assessment directly contradicts the China-attack narrative being amplified by Cleta Mitchell and the Election Integrity Network, showing selective evidence use.", "quote": "We assess that China did not deploy interference efforts and considered but did not deploy influence efforts intended to change the outcome of the US presidential election.", "locator": "2021 ODNI report quote", "quote_verified": true}]}, {"theme": "Cracks From Inside the Administration", "insights": [{"claim": "John Solomon, a conservative journalist appointed by the Trump administration to review documents on alleged election interference, told reporters after the speech that the intelligence community has 'zero evidence' a foreign power flipped a vote in 2020, 2022, or 2024.", "speaker": "David Gilbert", "type": "contrarian", "entities": ["John Solomon", "Donald Trump", "White House"], "conviction": "high", "so_what": "The administration's own appointed document reviewer publicly contradicts the speech's core premise, undermining the credibility of the entire 'revelation' event from within.", "quote": "I only know the intelligence community has zero evidence that a foreign power flipped a vote in 2020, '22, or '24.", "locator": "John Solomon quote to reporters", "quote_verified": true}, {"claim": "When asked directly whether the 2020 election results were accurate, John Solomon declined to affirm fraud claims, saying only 'I'm still researching.'", "speaker": "David Gilbert", "type": "anecdote", "entities": ["John Solomon"], "conviction": "medium", "so_what": "Even the official tasked with substantiating the fraud narrative won't commit to it publicly, a tell that the internal evidentiary case is weaker than the public rhetoric suggests.", "quote": "I'm still researching.", "locator": "John Solomon quote on 2020 results", "quote_verified": true}, {"claim": "Cleta Mitchell, who runs the Election Integrity Network, publicly praised John Solomon for exposing 'the Chinese Communist Party's attack on the 2020 US election,' a claim Solomon's own subsequent statements failed to substantiate.", "speaker": "David Gilbert", "type": "contrarian", "entities": ["Cleta Mitchell", "Election Integrity Network", "John Solomon", "China"], "conviction": "medium", "so_what": "Shows the movement's leadership will claim vindication even when the underlying source contradicts them days later, a pattern useful for discounting future claims from the same network.", "quote": "John even took the unusual step recently of going into the government, into the belly of the beast, to make certain the jig was finally up. No more hiding the truth of the Chinese Communist Party's attack on the 2020 US election. John got it done.", "locator": "Cleta Mitchell X post on John Solomon", "quote_verified": true}]}, {"theme": "Establishment Pushback", "insights": [{"claim": "Michael Flynn, Trump's former national security adviser, called for the immediate arrest of the CIA and NSA directors from Trump's first term for treason, citing no evidence beyond Trump's speech itself.", "speaker": "David Gilbert", "type": "anecdote", "entities": ["Michael Flynn", "CIA", "NSA", "Donald Trump"], "conviction": "high", "so_what": "Calls for arrests of former intelligence officials from prominent Trump-aligned figures indicate the rhetoric is escalating toward targeting specific individuals, not just abstract 'deep state' claims.", "quote": "The CIA and NSA directors during his first term should immediately be arrested for treason.", "locator": "Michael Flynn X post", "quote_verified": true}, {"claim": "Nevada Secretary of State Cisco Aguilar and Maryland Congressman Jamie Raskin publicly dismissed Trump's speech as unsubstantiated, with Raskin calling it 'gibberish,' 'drivel,' and 'almost self-debunking.'", "speaker": "David Gilbert", "type": "anecdote", "entities": ["Cisco Aguilar", "Jamie Raskin", "Donald Trump"], "conviction": "high", "so_what": "Direct, blunt pushback from a sitting secretary of state and a former House impeachment manager signals institutional actors are not treating the speech as credible, which matters for how contested any 2026 election-integrity disputes will be litigated.", "quote": "This is all bullshit.", "locator": "Cisco Aguilar statement to WIRED", "quote_verified": true}]}], "insight_total": 14, "top_entities": ["Donald Trump", "Insurrection Act", "SAVE America Act", "John Solomon", "Michael Flynn", "Lara Logan", "Wendy Rogers", "Cleta Mitchell", "Election Integrity Network", "Protect Democracy", "China", "2026 midterms"], "source_meta": {"author": "David Gilbert", "word_count": 928, "paywalled": false}}, {"record_id": "f30f9fa25033bba1", "source_type": "technology", "source_name": "Wired", "source_url": "https://www.wired.com/story/security-news-this-week-your-period-tracker-is-probably-spying-on-you/", "title": "Your Period Tracker Is (Probably) Spying on You", "published_date": "2026-07-18", "language": "en", "processed_at": "2026-07-19T12:27:25Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Society", "Geopolitics"], "gist": "Wired's weekly security roundup: a Mozilla/Harvard audit finds most period-tracker apps leak reproductive health data to ad-tech, Anthropic lobbies states for tougher AI transparency rules, Western governments pin a near-blackout Polish grid attack on Russia's FSB, DHS twice missed a real breach as a false positive, and a hack of AI music startup Suno exposes internal evidence of mass unlicensed scraping.", "themes": [{"theme": "Period-tracker data leakage", "insights": [{"claim": "A Mozilla Foundation audit (with Harvard's Berkman Klein Center) scored the astrology-themed period tracker Stardust 2 out of 10 for privacy, the worst of six popular trackers tested, finding it sends reproductive health details like birth control type, pregnancy status, and symptoms to a data firm not disclosed in its privacy policy.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Stardust", "Mozilla Foundation", "Berkman Klein Center"], "conviction": "high", "so_what": "Consumer health apps with weak data governance carry real regulatory and reputational risk; investors/operators in femtech should audit third-party data-sharing before it surfaces in press or litigation.", "quote": "Stardust scored 2 out of 10, the worst of the group.", "locator": "Mozilla Graded Period Trackers on Privacy", "quote_verified": true}, {"claim": "Stardust pings third-party analytics firm RudderStack from the moment the app opens (before any user input), attaches a persistent user ID to logged symptoms, and sends Facebook an ad identifier linking in-app health behavior to users' existing ad profiles, with no in-app way to disable the sharing.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Stardust", "RudderStack", "Facebook"], "conviction": "high", "so_what": "Shows a concrete default data pipeline from a health app into ad-tech; a template for the kind of undisclosed data flow that draws regulatory and class-action attention.", "quote": null, "locator": "Mozilla researcher Shoshana Wodinsky found the app pings third-party trackers", "quote_verified": false}, {"claim": "Euki, a nonprofit-run period tracker, scored a perfect 10 in the same audit by requiring no account, keeping health data on-device only, and offering a PIN, auto-deletion, and a decoy screen, showing privacy-by-design is achievable in the category without ad-based monetization.", "speaker": "Andy Greenberg", "type": "contrarian", "entities": ["Euki"], "conviction": "medium", "so_what": "Sets a public benchmark competitors and regulators can point to, raising pressure on ad-supported period trackers to change data practices or lose users/goodwill.", "quote": null, "locator": "Euki, a nonprofit-run tracker, earned a perfect 10", "quote_verified": false}]}, {"theme": "State-level AI regulation push", "insights": [{"claim": "Anthropic is actively lobbying US states to pass and expand AI transparency regulation beyond the 2025 California and New York laws, with its head of US state and local government relations arguing that policy must keep pace as AI capabilities advance quickly.", "speaker": "Andy Greenberg", "type": "thesis", "entities": ["Anthropic", "Cesar Fernandez"], "conviction": "high", "so_what": "Anthropic is positioning itself as a pro-regulation actor at the state level, which could shape compliance costs and competitive moats for AI labs; watch state legislatures for new transparency bills modeled on CA/NY.", "quote": "The transparency-focused safety bills of 2025 were a really important start, but as the capabilities of AI systems continue to advance quickly—the policy responses need to match.", "locator": "Anthropic continued a push to get US states to regulate AI", "quote_verified": true}]}, {"theme": "State-sponsored cyber threats", "insights": [{"claim": "The EU, UK, and US (via CISA, FBI, and NSA advisories) formally attributed a cyberattack that came \"very close\" to causing a blackout in Poland's electric and water utilities to Center 16 of Russia's FSB, overturning cybersecurity firms Dragos and ESET's initial attribution to GRU-linked Sandworm (Unit 74455).", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["FSB", "Poland", "Sandworm", "GRU", "Dragos", "ESET"], "conviction": "high", "so_what": "Suggests the FSB is adopting GRU-style disruptive, near-destructive cyber operations rather than pure espionage, raising the threat profile for European critical infrastructure and utilities.", "quote": "very close", "locator": "Russia's FSB Sanctioned for Cyberattack on Polish Infrastructure", "quote_verified": true}, {"claim": "Denis Obrezko, a Russian man facing US hacking charges for alleged membership in the Void Blizzard/Laundry Bear group that breached NATO governments and at least 11 US companies, spent two years working at Kaspersky before joining Yutek-NN and allegedly took part in the campaign, having reportedly worked at the FSB before Kaspersky.", "speaker": "Andy Greenberg", "type": "anecdote", "entities": ["Kaspersky", "Denis Obrezko", "Void Blizzard", "Yutek-NN"], "conviction": "medium", "so_what": "Adds concrete personnel-level evidence to long-standing (but hard-to-prove) allegations of Kaspersky-Russian government ties, reinforcing the case for continued Western restrictions on Kaspersky products.", "quote": "the offenses charged cannot be related to the individual's role or responsibilities during the employment at Kaspersky", "locator": "An Alleged Russian State-Sponsored Hacker Worked for Kaspersky", "quote_verified": true}]}, {"theme": "Federal detection failures", "insights": [{"claim": "DHS's Homeland Security Information Network (HSIN) was breached by hackers starting mid-May, but FEMA analysts twice dismissed clear signs of intrusion (altered files/code, a hijacked web server, deleted logs) as false positives before the hackers returned repeatedly.", "speaker": "Andy Greenberg", "type": "causal", "entities": ["DHS", "HSIN", "FEMA", "Mark Warner"], "conviction": "high", "so_what": "Points to systemic weakness in federal threat-detection processes against 'living off the land' techniques that abuse legitimate network features instead of deploying detectable malware; relevant to demand for gov cybersecurity vendors and oversight.", "quote": "its exposure risks national security", "locator": "A Real DHS Breach Was Twice Ruled a False Positive", "quote_verified": true}]}, {"theme": "AI training-data provenance (Suno breach)", "insights": [{"claim": "A hack of AI music startup Suno exposed internal 2023-2024 source-code notes showing it scraped 113,879 hours of YouTube Music audio plus tens of thousands more hours from Pond5, Deezer, and other stock-audio libraries, and roughly 1 million hours of podcasts via PodcastIndex, routing its YouTube scraping through Bright Data proxies.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Suno", "YouTube Music", "Deezer", "Pond5", "PodcastIndex", "Bright Data"], "conviction": "high", "so_what": "Directly corroborates the record industry's core allegation that Suno pulled copyrighted songs from YouTube, strengthening labels' litigation/settlement leverage and raising training-data liability risk for AI music startups.", "quote": null, "locator": "Hack Exposes an AI Music Generator's Scraping Secrets", "quote_verified": false}, {"claim": "The Suno breach also exposed account data for hundreds of thousands of customers, including emails, phone numbers, and Stripe payment records; Suno attributed the intrusion to outdated code and said no sensitive personal information was exposed, but affected customers said they were never notified.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Suno", "Stripe"], "conviction": "medium", "so_what": "Creates potential breach-notification liability exposure independent of the copyright issue; watch for regulatory action or customer litigation over the lack of notification.", "quote": null, "locator": "The intrusion also exposed account information for hundreds of thousands of customers", "quote_verified": false}, {"claim": "Suno settled a copyright lawsuit with Warner Music Group in November while maintaining its training practices qualify as fair use, but the leaked internal files appear to directly corroborate the labels' central allegation that Suno pulled songs straight from YouTube rather than licensed sources.", "speaker": "Andy Greenberg", "type": "causal", "entities": ["Suno", "Warner Music Group"], "conviction": "medium", "so_what": "Weakens the fair-use defense narrative for AI music generators broadly once internal scraping logs leak, a risk template for other generative-audio startups facing label litigation.", "quote": null, "locator": "settled with Warner Music Group last November", "quote_verified": false}]}, {"theme": "Surveillance, platforms and disinformation", "insights": [{"claim": "Hours of San Francisco Police Department drone video footage were exposed on the open web, an operational-security failure the author frames as illustrating a new era of granular urban surveillance with consequential exposure risk.", "speaker": "Andy Greenberg", "type": "anecdote", "entities": ["San Francisco Police Department"], "conviction": "medium", "so_what": "Highlights a data-security gap in municipal surveillance programs, relevant to vendors and cities deploying drone/camera surveillance without adequate access controls.", "quote": null, "locator": "Hours of San Francisco Police Department drone video footage exposed", "quote_verified": false}, {"claim": "The San Francisco City Attorney's Office sent cease-and-desist letters to Apple and Google demanding removal of 13 AI 'nudifying' face-swap apps from their app stores, apps the office says are used almost exclusively to target women and girls.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Apple", "Google", "San Francisco City Attorney's Office"], "conviction": "high", "so_what": "Signals growing municipal and legal liability for app-store gatekeepers hosting generative-AI abuse tools, a precedent that could push Apple/Google toward stricter genAI app-review policies.", "quote": null, "locator": "cease-and-desist letters to Apple and Google", "quote_verified": false}, {"claim": "Meta has given opaque and conflicting statements about whether its NameTag face-recognition system for smart glasses actually exists, following Wired's June report and a subsequent report that Meta deleted face-recognition code from its smart-glasses app.", "speaker": "Andy Greenberg", "type": "contrarian", "entities": ["Meta", "NameTag"], "conviction": "medium", "so_what": "Signals reputational and regulatory overhang for Meta's wearables/AI hardware line from undisclosed or inconsistently described facial-recognition capabilities.", "quote": null, "locator": "made opaque and conflicting comments about whether the feature even exists", "quote_verified": false}, {"claim": "President Trump promised 'massive revelations' in documents posted to the White House website to substantiate unsubstantiated 2020 election-interference claims, but the released files did not prove his assertions and in some cases contradicted them.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Donald Trump", "White House"], "conviction": "high", "so_what": "Illustrates continued information-integrity and credibility risk around official government document releases relevant to political-risk and disinformation tracking.", "quote": null, "locator": "the files did not prove his assertions", "quote_verified": false}]}], "insight_total": 14, "top_entities": ["Suno", "Kaspersky", "FSB", "Mozilla Foundation", "Anthropic", "Meta", "Stardust", "Euki", "HSIN", "Sandworm", "Warner Music Group"], "source_meta": {"author": "Andy Greenberg", "word_count": 1354, "paywalled": false}}, {"record_id": "9e482f665f29faf8", "source_type": "technology", "source_name": "Wood Mackenzie", "source_url": "https://www.woodmac.com/blogs/energy-pulse/battery-storage-proves-value-in-moderating-texas-power-price-volatility/", "title": "Battery storage proves its value in moderating Texas power price volatility", "published_date": "2026-07-17", "language": "en", "processed_at": "2026-07-19T12:28:20Z", "processor": "claude-code-sub-opus", "tags": ["Energy", "Tech", "Geopolitics", "AI", "Macro"], "gist": "Wood Mackenzie's Ed Crooks reports that Texas's rapid battery storage buildout (857 MW to 21.7 GW since 2021) has suppressed ERCOT summer power price spikes despite rising gas prices and a growing renewables share, but this cannibalizes storage investors' own returns even as ERCOT peak demand is projected to more than triple by 2032 on data centre growth. The same newsletter issue also covers an escalating US-Iran conflict pushing oil and gas prices sharply higher, a new data centre moratorium in New York, and a PJM capacity auction reliability shortfall.", "themes": [{"theme": "Texas Battery Storage Moderates Price Volatility", "insights": [{"claim": "Texas battery storage capacity surged from about 857 megawatts in 2021 to about 21.7 gigawatts in 2026, making Texas the second-largest battery storage market in the US after California.", "speaker": "Ed Crooks", "type": "data_point", "entities": ["Texas", "ERCOT", "battery storage", "California"], "conviction": "high", "so_what": "Rapid buildout signals a maturing storage market and warns of return compression as capacity keeps scaling.", "quote": "Battery supply capacity on the ERCOT grid has risen from about 857 megawatts in 2021 to about 21.7 gigawatts this year.", "locator": "Another proposed explanation for the moderation in price extremes", "quote_verified": true}, {"claim": "ERCOT wholesale power price peaks have moderated sharply since 2023: North zone average prices rose from $34/MWh in January to $123/MWh in July 2022, and from $25/MWh in January to $266/MWh in August 2023, but summer spikes have been much smaller in 2024, 2025 and so far in 2026.", "speaker": "Ed Crooks", "type": "data_point", "entities": ["ERCOT", "Wood Mackenzie", "Texas"], "conviction": "high", "so_what": "A sharp reduction in extreme price spikes reduces the value proposition for merchant storage and peaker investments underwritten on historical volatility.", "quote": "In 2022, average power prices in ERCOT’s North zone rose from US$34/MWh in January to US$123/MWh in July... In 2023, prices rose from US$25/MWh in January to US$266/MWh in August.", "locator": "In the early 2020s, rising electricity demand and warm weather", "quote_verified": true}]}, {"theme": "Volatility Framework and the Cannibalization Problem", "insights": [{"claim": "Wood Mackenzie's research attributes power price volatility to three principal factors: natural gas prices, the share of wind and solar generation on the grid, and the flexibility of thermal power generation.", "speaker": "Ed Crooks", "type": "framework", "entities": ["Wood Mackenzie", "Kasim Khan", "ERCOT", "natural gas", "wind", "solar"], "conviction": "high", "so_what": "Gives investors a repeatable model to forecast volatility regimes in any power market by tracking these three inputs.", "quote": "Our research shows that power price volatility is driven principally by three factors: gas prices, the proportion of wind and solar on the grid, and the flexibility of thermal power generation.", "locator": "The Wood Mackenzie view", "quote_verified": true}, {"claim": "Despite rising gas prices and a growing share of wind and solar (13% of ERCOT generation in 2021 to 19% in 2026) — both factors that should increase price volatility — realized volatility fell rather than rose since 2023, which Wood Mackenzie analyst Kasim Khan attributes primarily to increased battery storage availability.", "speaker": "Ed Crooks", "type": "contrarian", "entities": ["Kasim Khan", "Wood Mackenzie", "ERCOT", "battery storage", "wind", "solar", "natural gas"], "conviction": "high", "so_what": "A structural, non-weather explanation for suppressed volatility implies storage capacity is now large enough to cap tail-risk price events across a major US grid.", "quote": "We would have expected a big increase in volatility since 2023, but instead we saw a decrease. The extreme prices have all but disappeared.", "locator": "The Wood Mackenzie view", "quote_verified": true}, {"claim": "Battery storage in Texas is exhibiting cannibalization: by discharging during high-price periods and capping price spikes, the growing storage fleet is suppressing the very price volatility that generates its own investment returns.", "speaker": "Ed Crooks", "type": "thesis", "entities": ["battery storage", "ERCOT", "Kasim Khan", "Wood Mackenzie"], "conviction": "high", "so_what": "Storage investors should expect declining per-unit returns as the fleet scales, even as absolute deployment keeps growing — a warning for late entrants underwriting deals on historical volatility.", "quote": "The problem for investors, Khan says, is that by preventing extreme price spikes, the storage industry weakens its own returns. It is a phenomenon sometimes known as cannibalisation: new investments can eat the profits of the entire sector.", "locator": "The Wood Mackenzie view", "quote_verified": true}, {"claim": "The Texas battery storage market has not yet become saturated, and investment returns for battery projects remain attractive even though they are lower than during the extreme-price years of 2022-2023.", "s // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#7c3aed', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
