function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards();
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var chev = document.getElementById('report-chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function getCatColor(cat) {
  return CAT_COLORS[cat] || "#888";
}

function urgEmoji(u) {
  if (u === "act_now") return "🔴";
  if (u === "watch") return "🟡";
  return "🔵";
}

function matchesFilters(item) {
  if (activeSrc && item.source.indexOf(activeSrc) < 0) return false;
  if (activeCat !== "all" && item.cat !== activeCat) return false;
  if (activeUrg !== "all" && item.urgency !== activeUrg) return false;
  return true;
}

function buildCard(item) {
  var col = getCatColor(item.cat);
  var urg = urgEmoji(item.urgency);
  var chartBadge = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
  var catStyle = 'background:' + col;
  var angleStyle = 'border-left:2px solid ' + col + ';background:' + col + '18';
  var html = '<div class="card" id="card-' + item.id + '">' +
    '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
    '<span class="item-num">' + String(item.id).padStart(2,'0') + '</span>' +
    '<span class="urgency">' + urg + '</span>' +
    '<span class="source-badge" style="' + catStyle + '">' + item.source + '</span>' +
    '<span class="cat-tag">' + item.cat + '</span>' +
    '<span class="card-title">' + chartBadge + ' ' + item.title + '</span>' +
    '<span class="chevron" id="chev-' + item.id + '">▼</span>' +
    '</div>' +
    '<div class="card-body" id="body-' + item.id + '">' +
    '<div class="section-label">The Idea</div>' +
    '<div class="idea-text">' + item.idea + '</div>' +
    '<div class="section-label">My Angle</div>' +
    '<div class="angle-box" style="' + angleStyle + '">' + item.angle + '</div>' +
    '<div class="tweets">' +
    '<div class="tweet-box a">' +
    '<div class="tweet-label a">TWEET A</div>' +
    '<div class="tweet-text">' + item.tweetA + '</div>' +
    '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
    '</div>' +
    '<div class="tweet-box b">' +
    '<div class="tweet-label b">TWEET B</div>' +
    '<div class="tweet-text">' + item.tweetB + '</div>' +
    '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
    '</div>' +
    '</div>';
  if (item.charts.count > 0) {
    html += '<div style="margin-top:10px;padding:8px 10px;border:1.5px dashed ' + (item.charts.hot ? '#d97706' : '#bbb') + ';border-radius:6px;font-size:12px;color:#666">' +
      '📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
  }
  html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
  html += '</div></div>';
  return html;
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = ITEMS.filter(matchesFilters);
  if (filtered.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:#aaa;text-align:center">No items match the selected filters.</div>';
    return;
  }
  container.innerHTML = filtered.map(buildCard).join('');
}

function renderFilters() {
  // Category filter
  var cats = ["all"].concat(Object.keys(ITEMS.reduce(function(a, i) { a[i.cat]=1; return a; }, {})));
  var catHtml = cats.map(function(c) {
    var count = c === "all" ? ITEMS.length : ITEMS.filter(function(i){ return i.cat === c; }).length;
    var isActive = activeCat === c && !activeSrc;
    var col = c === "all" ? "#555" : getCatColor(c);
    var style = isActive ? 'background:' + col + ';border-color:' + col + ';color:#fff' : '';
    return '<span class="pill" style="' + style + '" onclick="setCat(\'' + c + '\')">' +
      (c === "all" ? "All" : c) + ' <span class="count">(' + count + ')</span></span>';
  }).join('');
  document.getElementById('cat-filters').innerHTML = catHtml;

  // Urgency filter
  var urgs = [
    { key: "all", label: "All" },
    { key: "act_now", label: "🔴 Act Now" },
    { key: "deep", label: "🔵 Deep" },
    { key: "watch", label: "🟡 Watch" }
  ];
  var urgHtml = urgs.map(function(u) {
    var count = u.key === "all" ? ITEMS.length : ITEMS.filter(function(i){ return i.urgency === u.key; }).length;
    var isActive = activeUrg === u.key && !activeSrc;
    var col = u.key === "act_now" ? "#e24b4a" : u.key === "deep" ? "#378add" : u.key === "watch" ? "#d4a017" : "#555";
    var style = isActive ? 'background:' + col + ';border-color:' + col + ';color:#fff' : '';
    return '<span class="pill" style="' + style + '" onclick="setUrg(\'' + u.key + '\')">' +
      u.label + ' <span class="count">(' + count + ')</span></span>';
  }).join('');
  document.getElementById('urg-filters').innerHTML = urgHtml;
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderFilters();
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderFilters();
  renderCards();
}

function buildSourceList() {
  var list = document.getElementById('src-list');
  list.innerHTML = META.includedSources.map(function(s) {
    return '<div class="report-row">' +
      '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span>' +
      '<span>' + s.items + ' item' + (s.items > 1 ? 's' : '') + '</span>' +
      '</div>';
  }).join('');
}

function init() {
  document.getElementById('meta-line').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' +
    META.includedSources.length + ' sources · Window: ' + META.windowStart + ' – ' + META.windowEnd;
  renderFilters();
  renderCards();
  buildSourceList();
}
