function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
  document.getElementById('report-arrow').textContent =

}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  updateFilters();
  renderCards();
}

function updateFilters() {
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.cat === activeCat);
  });
  document.querySelectorAll('.pill[data-urg]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.urg === activeUrg);
  });

function visibleItems() {
  return ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    return catOk && urgOk;
  });
}

function urgEmoji(u) {
  return u === 'act-now' ? '🔴' : u === 'deep' ? '🔵' : '🟡';

function renderCards() {

  if (items.length === 0) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  container.innerHTML = items.map(function(item) {
    var color = CAT_COLORS[item.cat] || '#999';
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';

    }
    var linkHTML = item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '';
    return '<div class="card" id="card-' + item.id + '">' +

function buildFilters() {
  var catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat]||0)+1; });
  var cats = ['all'].concat(Object.keys(catCounts).sort());
  var catBar = document.getElementById('cat-filters');
  cats.forEach(function(c) {
    var pill = document.createElement('button');
    pill.className = 'pill' + (c === 'all' ? ' active' : '');
    pill.dataset.cat = c;
    pill.textContent = c === 'all' ? 'All (' + ITEMS.length + ')' : c + ' (' + (catCounts[c]||0) + ')';
    if (c !== 'all' && CAT_COLORS[c]) pill.style.borderColor = CAT_COLORS[c];
    pill.onclick = function() { activeCat = c; activeSrc = null; updateFilters(); renderCards(); };
    catBar.appendChild(pill);
  });

  var urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency]=(urgCounts[i.urgency]||0)+1; });
  var urgDefs = [{key:'all',label:'All'},{key:'act-now',label:'🔴 Act Now'},{key:'deep',label:'🔵 Deep'},{key:'watch',label:'🟡 Watch'}];
  var urgBar = document.getElementById('urg-filters');
  urgDefs.forEach(function(u) {
    var pill = document.createElement('button');
    pill.className = 'pill' + (u.key === 'all' ? ' active' : '');
    pill.dataset.urg = u.key;
    var cnt = u.key === 'all' ? ITEMS.length : (urgCounts[u.key]||0);
    pill.textContent = u.label + ' (' + cnt + ')';
    pill.onclick = function() { activeUrg = u.key; activeSrc = null; updateFilters(); renderCards(); };
