  ITEMS.forEach(function(i){ catCounts[i.cat]=(catCounts[i.cat]||0)+1; });

  var catRow = document.getElementById("cat-filters");
  catRow.innerHTML = '<span class="filter-label">Category</span>';
  cats.forEach(function(c){
    var btn = document.createElement("button");
    btn.className = "pill" + (c==="all"?" active":"");
    btn.setAttribute("data-cat", c);
    btn.textContent = c==="all" ? "All ("+ITEMS.length+")" : c+" ("+(catCounts[c]||0)+")";
    if(c!=="all"){ btn.style.borderColor = CAT_COLORS[c]||"#888"; }
    btn.onclick = function(){ activeCat=c; activeSrc=null; renderFilters(); renderCards(); };
    catRow.appendChild(btn);
  });

  var urgs = ["all","act","deep","watch"];
  var urgCounts = {};
  ITEMS.forEach(function(i){ urgCounts[i.urgency]=(urgCounts[i.urgency]||0)+1; });
  var urgRow = document.getElementById("urg-filters");
  urgRow.innerHTML = '<span class="filter-label">Urgency</span>';
  urgs.forEach(function(u){
    var btn = document.createElement("button");
    btn.className = "pill" + (u==="all"?" active":"");
    btn.setAttribute("data-urg", u);
    btn.textContent = u==="all" ? "⬜ All" : urgEmoji(u)+" "+urgLabel(u)+" ("+(urgCounts[u]||0)+")";
    btn.onclick = function(){ activeUrg=u; activeSrc=null; renderFilters(); renderCards(); };
    urgRow.appendChild(btn);
  });

  renderCards();
  buildReport();
}

function renderFilters(){
  document.querySelectorAll("#cat-filters .pill").forEach(function(btn){
    var c = btn.getAttribute("data-cat");
    var isActive = activeSrc===null && activeCat===c;
    btn.classList.toggle("active", isActive);
    if(isActive && c!=="all"){
      btn.style.background = CAT_COLORS[c]||"#888";
      btn.style.color = "#fff";
      btn.style.borderColor = CAT_COLORS[c]||"#888";
    } else if(isActive){
      btn.style.background = "#555";
      btn.style.color = "#fff";
      btn.style.borderColor = "#555";
    } else {
      btn.style.background = "transparent";
      btn.style.color = "#555";
      if(c!=="all") btn.style.borderColor = CAT_COLORS[c]||"#ccc";
      else btn.style.borderColor = "#ccc";
    }
  });
  document.querySelectorAll("#urg-filters .pill").forEach(function(btn){
    var u = btn.getAttribute("data-urg");
    var isActive = activeSrc===null && activeUrg===u;
    btn.classList.toggle("active", isActive);
    btn.style.background = isActive ? "#555" : "transparent";
    btn.style.color = isActive ? "#fff" : "#555";
    btn.style.borderColor = isActive ? "#555" : "#ccc";
  });
}

function renderCards(){
  var container = document.getElementById("cards-container");
  container.innerHTML = "";
  ITEMS.forEach(function(item){
    var card = buildCard(item);
    if(!checkVisible(item)) card.classList.add("hidden");
    container.appendChild(card);
  });
}

function checkVisible(item){
  if(activeSrc!==null) return item.source.indexOf(activeSrc)>=0;
  var catOk = activeCat==="all" || item.cat===activeCat;
  var urgOk = activeUrg==="all" || item.urgency===activeUrg;
  return catOk && urgOk;
}

function buildCard(item){
  var card = document.createElement("div");
  card.className = "card";
  card.id = "card-"+item.id;

  var col = CAT_COLORS[item.cat]||"#888";
  var chartFlag = item.charts.count>0 ? (item.charts.hot?" 🔥":" 📊") : "";

  var hdr = document.createElement("div");
  hdr.className = "card-header";
  hdr.innerHTML =
    '<span class="item-num">'+String(item.id).padStart(2,"0")+'</span>'+
    '<span class="urgency">'+urgEmoji(item.urgency)+'</span>'+
    '<span class="source-badge" style="background:'+col+'">'+item.source.split("/")[0].trim()+'</span>'+
    '<span class="cat-tag">'+item.cat+'</span>'+
    (chartFlag?'<span class="chart-flag">'+chartFlag+'</span>':'')+
    '<span class="card-title">'+item.title+'</span>';
  hdr.onclick = function(){ toggleCard(item.id); };

  var body = document.createElement("div");
  body.className = "card-body";
  body.id = "body-"+item.id;

  var angleStyle = "border-left-color:"+col+";background:"+col+"18;";

  var chartHtml = "";
  if(item.charts.count>0){
    if(item.charts.hot){
      chartHtml = '<div class="hot-chart">🔥 CHART WORTH SAVING — '+item.charts.desc+'</div>';
    } else {
      chartHtml = '<div class="chart-note">📊 '+item.charts.desc+'</div>';
    }
  }

  body.innerHTML =
    '<div class="section-label">The Idea</div>'+
    '<div class="idea-text">'+item.idea+'</div>'+
    '<div class="section-label">My Angle</div>'+
    '<div class="angle-box" style="'+angleStyle+'">'+item.angle+'</div>'+
    '<div class="tweets">'+
      '<div class="tweet-box a">'+
        '<div class="tweet-label a">TWEET A</div>'+
        '<div class="tweet-text">'+item.tweetA+'</div>'+
        '<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button>'+
      '</div>'+
      '<div class="tweet-box b">'+
        '<div class="tweet-label b">TWEET B</div>'+
        '<div class="tweet-text">'+item.tweetB+'</div>'+
        '<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button>'+
      '</div>'+
    '</div>'+
    chartHtml+
    (item.link?'<a class="card-link" href="'+item.link+'" target="_blank">↗ Read full article</a>':'');

  card.appendChild(hdr);
  card.appendChild(body);
  return card;
}

function toggleCard(id){
  var body = document.getElementById("body-"+id);
  if(body) body.classList.toggle("open");
}

function copyTweet(itemId, which){
  var item = ITEMS.find(function(i){ return i.id===itemId; });
  var text = which==="a" ? item.tweetA : item.tweetB;
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = "✓ Copied";
  setTimeout(function(){ btn.textContent = "📋 Copy"; }, 1500);
}

function toggleReport(){
  var body = document.getElementById("report-body");
  var chev = document.getElementById("report-chevron");
  body.classList.toggle("open");
  chev.textContent = body.classList.contains("open") ? "▼" : "▶";
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards();
  ITEMS.forEach(function(item){
    if(item.source.indexOf(name)>=0){
      var b = document.getElementById("body-"+item.id);
      if(b) b.classList.add("open");
    }
  });
  window.scrollTo(0,0);
}

function buildReport(){
  var body = document.getElementById("report-body");
  var html = "";
  html += '<div class="report-row"><span>Time window</span><span>'+META.windowStart+' → '+META.windowEnd+'</span></div>';
  html += '<div class="report-row"><span>Emails in window</span><span>'+META.emailsInWindow+'</span></div>';
  html += '<div class="report-row"><span>Emails read</span><span>'+META.emailsRead+' / '+META.emailsInWindow+'</span></div>';
  html += '<div class="report-row"><span>Items extracted</span><span>'+META.itemsExtracted+'</span></div>';
  html += '<br><div class="section-label" style="padding:4px 0">Included Sources</div>';
  META.includedSources.forEach(function(s){
    var safeName = s.name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    html += '<div class="report-row"><span class="src-link" onclick="filterBySrc(\''+safeName+'\')">'+s.name+'</span><span>'+s.items+' items</span></div>';
  });
  if(META.skippedSources.length>0){
    html += '<br><div class="section-label" style="padding:4px 0">Skipped</div>';
    META.skippedSources.forEach(function(s){
      html += '<div class="report-row"><span>'+s.name+'</span><span style="color:#aaa;font-size:11px;max-width:55%;text-align:right">'+s.reason+'</span></div>';
    });
  }
  body.innerHTML = html;
}

init();
</script>
</body>
</html>
