*{box-sizing:border-box;}
body{
  margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5;
}
.wrap{max-width:960px;margin:0 auto;padding:24px 16px 80px;}
header.top{margin-bottom:20px;}
header.top h1{font-size:22px;margin:0 0 4px;font-weight:800;letter-spacing:-.3px;}
header.top .meta{color:var(--sub);font-size:14px;}
.filterbar{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
.pill{
  border:1.5px solid var(--border); background:transparent; color:var(--text);
  border-radius:999px; padding:6px 14px; font-size:13px; font-weight:600;
  cursor:pointer; user-select:none; transition:all .15s ease; white-space:nowrap;
}
.pill:hover{border-color:#bbb;}
.pill.active{color:#fff; border-color:transparent;}
.count{opacity:.75;font-weight:500;margin-left:4px;}

.cards{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.card{
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  overflow:hidden; transition:box-shadow .15s ease;
}
.card-header{
  display:flex; align-items:center; gap:10px; padding:14px 16px; cursor:pointer;
  flex-wrap:wrap;
}
.idx{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#999;font-size:12px;min-width:22px;}
.urgency{font-size:15px;}
.badge{
  font-size:11px; font-weight:700; color:#fff; padding:3px 9px; border-radius:999px;
  white-space:nowrap;
}
.cattag{
  font-size:11px; font-weight:600; color:#666; background:#eeece7; padding:3px 9px;
  border-radius:999px; white-space:nowrap;
}
.chartflag{font-size:13px;}
.title{font-weight:600; font-size:14.5px; flex:1; min-width:180px;}
.chevron{color:#999; font-size:13px; transition:transform .15s ease;}
.card.open .chevron{transform:rotate(90deg);}
.card-body{display:none; padding:0 18px 18px;}
.card.open .card-body{display:block;}
.section-label{
  font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  color:#8a8a8a; margin:14px 0 6px;
}
.section-label:first-child{margin-top:2px;}
.idea-text{font-size:14.5px;}
.angle-box{
  font-style:italic; font-size:14px; padding:10px 12px; border-radius:6px;
  background:rgba(0,0,0,.03);
}
.tweets{display:flex; gap:12px; flex-wrap:wrap; margin-top:6px;}
.tweet{
  flex:1 1 260px; background:#fff; border:1px solid var(--border); border-radius:10px;
  padding:12px;
}
.tweet .tlabel{font-size:11px; font-weight:800; letter-spacing:.05em; margin-bottom:6px;}
.tweet.a .tlabel{color:var(--credit);}
.tweet.b .tlabel{color:var(--crypto);}
.tweet p{font-size:13.5px; margin:0 0 10px; white-space:pre-wrap;}
.copy-btn{
  border:1px solid var(--border); background:#f3f2ee; border-radius:6px; font-size:12px;
  padding:5px 10px; cursor:pointer; font-weight:600;
}
.copy-btn:hover{background:#ebe9e3;}
.chart-box{
  margin-top:8px; border:1.5px dashed #c9c6bd; border-radius:8px; padding:10px 12px;
  font-size:13px; color:#666;
}
.chart-box.hot{border-color:#e0a832; background:#fdf7e8; color:#7a5b0a;}
.linkrow{margin-top:12px;}
.linkrow a{font-size:13.5px; font-weight:600; text-decoration:none; color:var(--macro);}
.linkrow a:hover{text-decoration:underline;}

.report{
  margin-top:28px; border:1px solid var(--border); border-radius:14px; background:var(--card);
}
.report summary{cursor:pointer; padding:14px 18px; font-weight:700; font-size:14px;}
.report .rbody{padding:0 18px 18px; font-size:13.5px;}
.report .rbody h4{font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:#8a8a8a; margin:14px 0 6px;}
.srcline{cursor:pointer; text-decoration:underline; text-decoration-style:dotted;}
.srcline:hover{color:var(--macro);}
</style>

<script>
const CAT_COLORS = {
  macro:"var(--macro)", credit:"var(--credit)", positioning:"var(--positioning)",
  "AI/infra":"var(--aiinfra)", crypto:"var(--crypto)", geopolitics:"var(--geopolitics)",
  energy:"var(--energy)", tech:"var(--tech)", gold:"var(--gold)", culture:"var(--culture)",
  labor:"var(--labor)", regulation:"var(--regulation)", science:"var(--science)", venture:"var(--venture)"
};
const URG = {
  act:{emoji:"🔴", label:"Act Now"},
  deep:{emoji:"🔵", label:"Deep"},
  watch:{emoji:"🟡", label:"Watch"}
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function resolveColor(varStr){
  const m = varStr.match(/--([a-zA-Z]+)/);
  return getComputedStyle(document.documentElement).getPropertyValue('--'+m[1]).trim();
}

function buildFilterBars(){
  const catCounts = {};
  ITEMS.forEach(i => catCounts[i.cat] = (catCounts[i.cat]||0)+1);
  const catbar = document.getElementById('catbar');
  let html = '<button class="pill active" data-cat="all" onclick="setCat(\'all\')">All <span class="count">'+ITEMS.length+'</span></button>';
  Object.keys(catCounts).sort().forEach(cat => {
    const color = CAT_COLORS[cat] ? resolveColor(CAT_COLORS[cat]) : '#888';
    html += '<button class="pill" data-cat="'+cat+'" style="--pc:'+color+'" onclick="setCat(\''+cat+'\')">'+cat+' <span class="count">'+catCounts[cat]+'</span></button>';
  });
  catbar.innerHTML = html;

  const urgCounts = {act:0, deep:0, watch:0};
  ITEMS.forEach(i => urgCounts[i.urgency]++);
  const urgbar = document.getElementById('urgbar');
  let uhtml = '<button class="pill active" data-urg="all" onclick="setUrg(\'all\')">All <span class="count">'+ITEMS.length+'</span></button>';
  ['act','deep','watch'].forEach(u => {
    uhtml += '<button class="pill" data-urg="'+u+'" onclick="setUrg(\''+u+'\')">'+URG[u].emoji+' '+URG[u].label+' <span class="count">'+urgCounts[u]+'</span></button>';
  });
  urgbar.innerHTML = uhtml;
}

function setCat(cat){
  activeCat = cat; activeSrc = null;
  document.querySelectorAll('#catbar .pill').forEach(function(p){
    const isActive = p.getAttribute('data-cat') === cat;
    p.classList.toggle('active', isActive);
    if(isActive && cat !== 'all'){ p.style.background = p.style.getPropertyValue('--pc'); p.style.borderColor = p.style.getPropertyValue('--pc'); }
    else if(cat === 'all' && isActive){ p.style.background = '#232323'; p.style.borderColor = '#232323'; }
    else { p.style.background = 'transparent'; p.style.borderColor = ''; }
  });
  renderCards();
}
function setUrg(urg){
  activeUrg = urg; activeSrc = null;
  document.querySelectorAll('#urgbar .pill').forEach(function(p){
    const isActive = p.getAttribute('data-urg') === urg;
    p.classList.toggle('active', isActive);
    p.style.background = isActive ? '#232323' : 'transparent';
    p.style.borderColor = isActive ? '#232323' : '';
  });
  renderCards();
}
function filterBySrc(name){
  activeCat = 'all'; activeUrg = 'all'; activeSrc = name;
  document.querySelectorAll('#catbar .pill').forEach(function(p){ p.classList.toggle('active', p.getAttribute('data-cat')==='all'); p.style.background = p.getAttribute('data-cat')==='all' ? '#232323':'transparent'; p.style.borderColor = p.getAttribute('data-cat')==='all' ? '#232323':''; });
  document.querySelectorAll('#urgbar .pill').forEach(function(p){ p.classList.toggle('active', p.getAttribute('data-urg')==='all'); p.style.background = p.getAttribute('data-urg')==='all' ? '#232323':'transparent'; p.style.borderColor = p.getAttribute('data-urg')==='all' ? '#232323':''; });
  renderCards();
  document.getElementById('reportCard').open = true;
  window.scrollTo({top:0, behavior:'smooth'});
}

function cardHtml(item){
  const color = CAT_COLORS[item.cat] ? resolveColor(CAT_COLORS[item.cat]) : '#888';
  const chartFlag = item.charts && (item.charts.count > 0 || item.charts.hot) ? '<span class="chartflag">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '';
  let html = '';
  html += '<div class="card" id="card-'+item.id+'">';
  html += '  <div class="card-header" onclick="toggleCard('+item.id+')">';
  html += '    <span class="idx">#'+item.id+'</span>';
  html += '    <span class="urgency">'+URG[item.urgency].emoji+'</span>';
  html += '    <span class="badge" style="background:'+color+'">'+item.source+'</span>';
  html += '    <span class="cattag">'+item.cat+'</span>';
  html += chartFlag;
  html += '    <span class="title">'+item.title+'</span>';
  html += '    <span class="chevron">&#9654;</span>';
  html += '  </div>';
  html += '  <div class="card-body">';
  html += '    <div class="section-label">The Idea</div>';
  html += '    <div class="idea-text">'+item.idea+'</div>';
  html += '    <div class="section-label">My Angle</div>';
  html += '    <div class="angle-box" style="border-left:2px solid '+color+'; background:'+color+'12;">'+item.angle+'</div>';
  html += '    <div class="section-label">Tweets</div>';
  html += '    <div class="tweets">';
  html += '      <div class="tweet a"><div class="tlabel">TWEET A</div><p>'+item.tweetA+'</p><button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button></div>';
  html += '      <div class="tweet b"><div class="tlabel">TWEET B</div><p>'+item.tweetB+'</p><button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button></div>';
  html += '    </div>';
  if(item.charts){
    html += '    <div class="chart-box'+(item.charts.hot ? ' hot':'')+'">'+(item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ')+item.charts.count+' chart(s). '+item.charts.desc+'</div>';
  }
  html += '    <div class="linkrow"><a href="'+item.link+'" target="_blank" rel="noopener">&#8599; Read full article</a></div>';
  html += '  </div>';
  html += '</div>';
  return html;
}

function renderCards(){
  const container = document.getElementById('cards');
  let filtered = ITEMS.filter(function(i){
    if(activeSrc !== null){ return i.source.indexOf(activeSrc) !== -1; }
    if(activeCat !== 'all' && i.cat !== activeCat) return false;
    if(activeUrg !== 'all' && i.urgency !== activeUrg) return false;
    return true;
  });
  container.innerHTML = filtered.map(cardHtml).join('');
  if(activeSrc !== null){
    filtered.forEach(function(i){
      const el = document.getElementById('card-'+i.id);
      if(el) el.classList.add('open');
    });
  }
}

function toggleCard(id){
  const el = document.getElementById('card-'+id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderMeta(){
  document.getElementById('metaline').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function renderReport(){
  var b = document.getElementById('reportBody');
  var html = '';
  html += '<h4>Time Window</h4>';
  html += '<div>' + META.windowStart + ' &rarr; ' + META.windowEnd + '. Emails outside this window were not processed.</div>';
  html += '<h4>Coverage</h4>';
  html += '<div>' + META.emailsInWindow + ' emails found in window &middot; ' + META.emailsRead + ' opened and read in full &middot; ' + META.itemsExtracted + ' items extracted.</div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(function(s){
    html += '<div><span class="srcline" onclick="filterBySrc(\''+s.name.replace(/'/g,"\\'")+'\')">'+s.name+'</span> — '+s.count+' item(s)</div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(function(s){
    html += '<div>'+s.name+' — '+s.reason+'</div>';
  });
  html += '<h4>Totals</h4>';
  html += '<div>'+META.itemsExtracted+' items &middot; '+META.includedSources.length+' included sources &middot; '+META.skippedSources.length+' skipped sources.</div>';
  b.innerHTML = html;
}

buildFilterBars();
renderMeta();
renderCards();
renderReport();
setCat('all');
setUrg('all');
</script>
</body>
</html>
