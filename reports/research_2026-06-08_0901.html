  var html = '';
  html += '<p><strong>Time Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<br><p><strong>Included Sources:</strong></p>';
  META.includedSources.forEach(function(s) {
    html += '<p>&nbsp;&nbsp;<span class="src-link" onclick="filterBySrc(\'' + s.name + '\')">' + s.name + '</span> — ' + s.items + ' items</p>';
  });
  if (META.skippedSources.length > 0) {
    html += '<br><p><strong>Skipped Sources:</strong></p>';
    META.skippedSources.forEach(function(s) {
      html += '<p>&nbsp;&nbsp;' + s.name + ' — ' + s.reason + '</p>';
    });
  } else {
    html += '<br><p><strong>Skipped Sources:</strong> None — all 12 emails in window were substantive and fully processed.</p>';
  }
  document.getElementById('report-body').innerHTML = html;
}

function init() {
  renderHeader();
  renderFilters();
  renderCards();
  renderReport();
}

init();
</script>
</body>
</html>
