// Category color map
const CAT_COLORS = {
  macro: '#e24b4a', credit: '#378add', positioning: '#ef9f27', 'AI/infra': '#1d9e75',
  crypto: '#7f77dd', geopolitics: '#d85a30', energy: '#f97316', tech: '#06b6d4',
  gold: '#d4a017', culture: '#ec4899', labor: '#8b5cf6', regulation: '#64748b',
  science: '#14b8a6', venture: '#84cc16'
};

// Active filters
let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function getColor(cat) { return CAT_COLORS[cat] || '#888'; }

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderFilters();
  renderCards();
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  renderFilters();
  renderCards();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderFilters();
  renderCards();
}

function renderFilters() {
  // Category filters
  var cats = ['all'];
  var catCounts = { all: ITEMS.length };
  ITEMS.forEach(function(it) {
    if (!cats.includes(it.cat)) cats.push(it.cat);
    catCounts[it.cat] = (catCounts[it.cat] || 0) + 1;
  });
  var catHtml = '';
  cats.forEach(function(c) {
    var isActive = activeCat === c && !activeSrc;
    var color = c === 'all' ? '#333' : getColor(c);
    var style = isActive ? 'background:' + color + ';border-color:' + color + ';color:#fff;' : '';
    var label = c === 'all' ? 'All (' + catCounts.all + ')' : c + ' (' + (catCounts[c] || 0) + ')';
    catHtml += '<span class="filter-pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setCatFilter(\'' + c + '\')">' + label + '</span>';
  });
  document.getElementById('cat-filters').innerHTML = catHtml;

  // Urgency filters
  var urgLabels = { all: 'All', 'act-now': '🔴 Act Now', deep: '🔵 Deep', watch: '🟡 Watch' };
  var urgCounts = { all: ITEMS.length, 'act-now': 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(it) { urgCounts[it.urgency] = (urgCounts[it.urgency] || 0) + 1; });
  var urgHtml = '';
  ['all','act-now','deep','watch'].forEach(function(u) {
    var isActive = activeUrg === u && !activeSrc;
    var color = u === 'act-now' ? '#e24b4a' : u === 'deep' ? '#378add' : u === 'watch' ? '#ef9f27' : '#333';
    var style = isActive ? 'background:' + color + ';border-color:' + color + ';color:#fff;' : '';
    var label = urgLabels[u] + ' (' + urgCounts[u] + ')';
    urgHtml += '<span class="filter-pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setUrgFilter(\'' + u + '\')">' + label + '</span>';
  });
  document.getElementById('urg-filters').innerHTML = urgHtml;
}

function renderCards() {
  var filtered = ITEMS.filter(function(it) {
    if (activeSrc) return it.source.indexOf(activeSrc) !== -1;
    if (activeCat !== 'all' && it.cat !== activeCat) return false;
    if (activeUrg !== 'all' && it.urgency !== activeUrg) return false;
    return true;
  });

  var noResults = document.getElementById('no-results');
  noResults.style.display = filtered.length === 0 ? 'block' : 'none';

  var html = '';
  filtered.forEach(function(it) {
    var color = getColor(it.cat);
    var urg = it.urgency === 'act-now' ? '🔴' : it.urgency === 'deep' ? '🔵' : '🟡';
    var chartFlag = it.charts.count > 0 ? (it.charts.hot ? ' 🔥' : ' 📊') : '';
    var angleStyle = 'border-left-color:' + color + ';background:' + color + '1a;';
    var chartsHtml = '';
    if (it.charts.count > 0) {
      var hotClass = it.charts.hot ? ' hot' : '';
      chartsHtml = '<div class="charts-row' + hotClass + '">📊 ' + it.charts.count + ' chart(s): ' + it.charts.desc + '</div>';
    }
    var linkHtml = it.link ? '<div class="link-row"><a href="' + it.link + '" target="_blank">↗ Read full article</a></div>' : '';

    html += '<div class="card" data-id="' + it.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + it.id + ')">' +
        '<span class="item-num">' + String(it.id).padStart(2,'0') + '</span>' +
        '<span class="urgency">' + urg + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + it.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-tag">' + it.cat + '</span>' +
        (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
        '<span class="card-title">' + it.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + it.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + it.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-box" style="' + angleStyle + '">' + it.angle + '</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box tweet-a-box">' +
            '<div class="tweet-label tweet-a-label">TWEET A</div>' +
            '<div class="tweet-text">' + it.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + it.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box tweet-b-box">' +
            '<div class="tweet-label tweet-b-label">TWEET B</div>' +
            '<div class="tweet-text">' + it.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + it.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartsHtml +
        linkHtml +
      '</div>' +
    '</div>';
  });

  // Replace cards but keep no-results
  var container = document.getElementById('cards-container');
  container.innerHTML = '<div class="no-results" id="no-results" style="display:' + (filtered.length === 0 ? 'block' : 'none') + '">No items match the selected filters.</div>' + html;
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var arrow = document.getElementById('report-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function buildReport() {
  var html = '<strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '<br>' +
    META.emailsRead + ' of ' + META.emailsInWindow + ' emails read &nbsp;·&nbsp; ' + META.itemsExtracted + ' items extracted<br><br>' +
    '<strong>Included Sources (' + META.includedSources.length + '):</strong><br>';
  META.includedSources.forEach(function(s) {
    html += '&nbsp;&nbsp;• <a onclick="filterBySrc(\'' + s.name.split('/')[0].trim() + '\')">' + s.name + '</a> — ' + s.items + ' item(s)<br>';
  });
  html += '<br><strong>Skipped (' + META.skippedSources.length + '):</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += '&nbsp;&nbsp;• ' + s.name + ': ' + s.reason + '<br>';
  });
  document.getElementById('report-body').innerHTML = html;
}

// Init
document.getElementById('item-count').textContent = META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
renderFilters();
renderCards();
buildReport();
</script>
