      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + esc(item.idea) + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="border-left:3px solid ' + color + ';background:' + color + '18">' + esc(item.angle) + '</div>' +
        '<div class="tweets">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label" style="color:#378add">TWEET A</div>' +
            '<div class="tweet-text">' + esc(item.tweetA) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>' +
            '<div class="tweet-text">' + esc(item.tweetB) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartNote +
        linkStr +
      '</div>' +
    '</div>';

    container.insertAdjacentHTML('beforeend', card);
  });
}

function renderReport() {
  var body = document.getElementById('report-body');
  var html = '<div class="report-row">' +
    '<div class="report-col">' +
      '<h4>Time Window</h4>' +
      '<p>' + META.windowStart + ' → ' + META.windowEnd + '</p>' +
      '<p style="margin-top:6px">Emails in window: <strong>' + META.emailsInWindow + '</strong><br>' +
      'Emails read: <strong>' + META.emailsRead + '</strong><br>' +
      'Items extracted: <strong>' + META.itemsExtracted + '</strong></p>' +
    '</div>' +
    '<div class="report-col">' +
      '<h4>Included Sources</h4>';

  META.includedSources.forEach(function(s) {
    var safeName = s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<p><a class="source-link" onclick="filterBySrc(\'' + safeName + '\')">' + esc(s.name) + '</a> &mdash; ' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</p>';
  });

  html += '</div><div class="report-col"><h4>Skipped Sources</h4>';
  META.skippedSources.forEach(function(s) {
    html += '<p><strong>' + esc(s.name) + '</strong>: ' + esc(s.reason) + '</p>';
  });
  html += '</div></div>';
  body.innerHTML = html;
}

function init() {
  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
  renderFilters();
  renderCards();
  renderReport();
}

init();
</script>
</body>
</html>
