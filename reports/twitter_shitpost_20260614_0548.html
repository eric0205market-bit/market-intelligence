function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function authorTag(name, cls = 'ticker-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

function renderVolume(v) {
  if (!v || typeof v !== 'object') {
    document.getElementById('volume').innerHTML = '<span>no volume data</span>';
    return;
  }
  const parts = [];
  if (v.total_tweets   != null) parts.push(`<strong>${v.total_tweets}</strong> tweets`);
  if (v.active_authors != null && v.total_authors != null) {
    parts.push(`<strong>${v.active_authors}/${v.total_authors}</strong> authors active`);
  } else if (v.active_authors != null) {
    parts.push(`<strong>${v.active_authors}</strong> authors active`);
  }
  if (v.silent_authors != null) parts.push(`<strong>${v.silent_authors}</strong> silent`);
  document.getElementById('volume').innerHTML = parts.join('<span style="color:var(--text-3)">·</span>')
    || '<span>—</span>';
}

function renderTickerWho(who) {
  if (!who || !who.length) return '';
  return `<div class="ticker-who">` + who.map(w => {
    const name = w.author || w.author_username || '';
    const ctx = w.context ? `<span class="ctx">${escapeHtml(w.context)}</span>` : '';
    return `<span class="who-item filterable" data-author="${escapeAttr(name).toLowerCase()}">${authorTag(name)} ${ctx}</span>`;
  }).join('') + `</div>`;
}

function renderTicker(t) {
  const isNew = t.is_new ? ' is-new' : '';
  const bull = t.bull ?? 0, bear = t.bear ?? 0, neutral = t.neutral ?? 0;
  const mentions = (t.mentions != null) ? t.mentions : (bull + bear + neutral);
  return `
    <div class="ticker-row${isNew}">
      <div class="ticker-sym">${escapeHtml(t.ticker || '?')}</div>
      <div class="ticker-mentions">${mentions} mention${mentions === 1 ? '' : 's'}</div>
      ${t.is_new ? '<span class="new-pill">new</span>' : ''}
      <div class="sentiment">
        <span class="pair"><span class="dot dot-bull"></span>${bull}</span>
        <span class="pair"><span class="dot dot-bear"></span>${bear}</span>
        <span class="pair"><span class="dot dot-neutral"></span>${neutral}</span>
      </div>
      ${renderTickerWho(t.who)}
    </div>`;
}

function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderOutlier(o) {
  const author = o.author || o.author_username || '';
  const usual = o.usual_length, current = o.this_length;
  const tag = (usual != null && current != null)
    ? `<span class="outlier-tag">usual ${usual} · this ${current}</span>` : '';
  const time = relativeTime(o.created_at);
  const link = o.tweet_url
    ? `<a class="outlier-link" href="${escapeAttr(o.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="outlier-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="outlier-head">
        <span class="outlier-author" onclick="filterAuthor('${escapeAttr(author)}')">@${escapeHtml(author)}</span>
        ${tag}
        ${time ? `<span class="outlier-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="outlier-summary">${escapeHtml(o.summary || '')}</div>
      ${renderThumbs(o.images)}
    </div>`;
}

function renderSection(letter, name, body, count) {
  return `
    <div class="section">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${count}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function toggleSection(el) { el.parentElement.classList.toggle('open'); }

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) { el.classList.add('match'); el.classList.remove('dim'); }
    else                    { el.classList.add('dim'); el.classList.remove('match'); }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match'); el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
    else if (activeFilter) clearFilter();
  }
});

function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  renderVolume(d.volume);

  const tickersBody = (d.tickers || []).map(renderTicker).join('')
                   || '<div class="empty">No tickers.</div>';
  const outliersBody = (d.outliers || []).map(renderOutlier).join('');

  const sections = [
    renderSection('A', 'Tickers', tickersBody, (d.tickers || []).length),
    outliersBody ? renderSection('B', 'Outliers', outliersBody, (d.outliers || []).length) : '',
  ].join('');

  document.getElementById('app').innerHTML = sections || '<div class="empty">No data.</div>';

  document.querySelectorAll('.section').forEach(s => s.classList.add('open'));
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
