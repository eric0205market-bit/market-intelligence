const CAT_COLORS = {
  "macro": "#e24b4a",
  "credit": "#378add",
  "positioning": "#ef9f27",
  "ai/infra": "#1d9e75",
  "crypto": "#7f77dd",
  "geopolitics": "#d85a30",

  "tech": "#06b6d4",

  "culture": "#ec4899",
  "labor": "#8b5cf6",
  "regulation": "#64748b",
  "science": "#14b8a6",
  "venture": "#84cc16"
};

const URG_CONFIG = {
  "act-now": { emoji: "🔴", label: "Act Now" },
  "deep": { emoji: "🔵", label: "Deep" },
  "watch": { emoji: "🟡", label: "Watch" }
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(cat) {
  return CAT_COLORS[cat] || "#888";
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) {
    body.classList.toggle('open');
  }
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var tog = document.getElementById('report-toggle');
  body.classList.toggle('open');
  tog.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderPills();
  renderCards();
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  renderPills();
  renderCards();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderPills();
  renderCards();
}

function renderPills() {
  // Category bar
  var catBar = document.getElementById('cat-bar');
  var cats = ['all'];
  var catCounts = {};
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
    if (cats.indexOf(item.cat) === -1) cats.push(item.cat);
  });
  var catHTML = '<label>CAT</label>';
  cats.forEach(function(c) {
    var isActive = activeCat === c && !activeSrc;
    var count = c === 'all' ? ITEMS.length : (catCounts[c] || 0);
    var color = c === 'all' ? '#555' : catColor(c);
    var style = isActive ? 'background:' + color + ';border-color:' + color + ';color:#fff' : '';
    catHTML += '<span class="pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setCatFilter(\'' + c + '\')">' +
      (c === 'all' ? 'All' : c) + ' <span class="cnt">' + count + '</span></span>';
  });
  catBar.innerHTML = catHTML;

  // Urgency bar
  var urgBar = document.getElementById('urg-bar');
  var urgCounts = {};
  ITEMS.forEach(function(item) { urgCounts[item.urgency] = (urgCounts[item.urgency] || 0) + 1; });
  var urgHTML = '<label>URGENCY</label>';
  ['all', 'act-now', 'deep', 'watch'].forEach(function(u) {
    var cfg = u === 'all' ? { emoji: '', label: 'All' } : URG_CONFIG[u];
    var isActive = activeUrg === u && !activeSrc;
    var count = u === 'all' ? ITEMS.length : (urgCounts[u] || 0);
    var color = u === 'act-now' ? '#e24b4a' : u === 'deep' ? '#378add' : u === 'watch' ? '#ef9f27' : '#555';
    var style = isActive ? 'background:' + color + ';border-color:' + color + ';color:#fff' : '';
    urgHTML += '<span class="pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setUrgFilter(\'' + u + '\')">' +
      (cfg.emoji ? cfg.emoji + ' ' : '') + cfg.label + ' <span class="cnt">' + count + '</span></span>';
  });
  urgBar.innerHTML = urgHTML;
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var html = '';
  var visible = 0;
  ITEMS.forEach(function(item) {
    var show = true;
    if (activeSrc) {
      show = item.source.indexOf(activeSrc) !== -1;
    } else {
      if (activeCat !== 'all' && item.cat !== activeCat) show = false;
      if (activeUrg !== 'all' && item.urgency !== activeUrg) show = false;
    }
    if (!show) { html += '<div class="card hidden" id="card-' + item.id + '"></div>'; return; }
    visible++;
    var urg = URG_CONFIG[item.urgency] || { emoji: '🔵' };
    var color = catColor(item.cat);
    var chartIcon = item.charts && item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>';
    html += '<span class="urgency">' + urg.emoji + '</span>';
    html += '<span class="source-badge" style="background:' + color + '">' + item.source.split(' / ')[0].split(' + ')[0] + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartIcon) html += '<span class="chart-icon">' + chartIcon + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '</div>';

    // Card body
    var angleColor = color;
    var angleBg = color.replace('#', '');
    html += '<div class="card-body" id="body-' + item.id + '">';

    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';

    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left-color:' + angleColor + '">' + item.angle + '</div>';

    html += '<div class="tweets">';
    // Tweet A
    html += '<div class="tweet-box">';
    html += '<div class="tweet-label" style="color:#378add">TWEET A</div>';
    html += '<div class="tweet-text">' + item.tweetA + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>';
    html += '</div>';
    // Tweet B
    html += '<div class="tweet-box">';
    html += '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>';
    html += '<div class="tweet-text">' + item.tweetB + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>';
    html += '</div>';
    html += '</div>';

    if (item.charts && item.charts.count > 0) {
      html += '<div class="chart-note' + (item.charts.hot ? ' chart-hot' : '') + '">';
      html += (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s): ' + item.charts.desc;
      html += '</div>';
    }

    if (item.link) {
      html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    }

    html += '</div>'; // card-body
    html += '</div>'; // card
  });
  container.innerHTML = html;
}

function renderMeta() {
  document.getElementById('meta-line').textContent =
    META.date + ' · ' + META.time + ' · Window: ' + META.windowStart + ' → ' + META.windowEnd +

}

function renderReport() {
  var body = document.getElementById('report-body');
  var html = '<table>';
  html += '<tr><td><strong>Time Window</strong></td><td>' + META.windowStart + ' → ' + META.windowEnd + '</td></tr>';
  html += '<tr><td><strong>Emails in Window</strong></td><td>' + META.emailsInWindow + '</td></tr>';
  html += '<tr><td><strong>Emails Read</strong></td><td>' + META.emailsRead + '</td></tr>';
  html += '<tr><td><strong>Items Extracted</strong></td><td>' + META.itemsExtracted + '</td></tr>';
  html += '</table>';
  html += '<br><strong>Included Sources:</strong><br>';
  META.includedSources.forEach(function(s) {
    html += '<span class="src-link" onclick="filterBySrc(\'' + s.name + '\')">' + s.name + '</span> (' + s.items + ' items)<br>';
  });
  html += '<br><strong>Skipped Sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += s.name + ' — ' + s.reason + '<br>';
  });
  body.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  renderMeta();
  renderPills();
