function catClass(cat) {
  return cat.replace('/', '').replace(' ', '');
}

function urgIcon(u) {
  if (u === 'act') return '🔴';
  if (u === 'deep') return '🔵';
  return '🟡';
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
  var h = document.querySelector('.report-header');
  h.textContent = document.getElementById('report-body').classList.contains('open') ? '▼ Session Report' : '▶ Session Report';
}

function filterCat(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.cat === cat);
  });
  renderCards();
}

function filterUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  document.querySelectorAll('[data-urg]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.urg === urg);
  });
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  document.querySelectorAll('[data-cat]').forEach(function(p) { p.classList.toggle('active', p.dataset.cat === 'all'); });
  document.querySelectorAll('[data-urg]').forEach(function(p) { p.classList.toggle('active', p.dataset.urg === 'all'); });
  renderCards();
}
