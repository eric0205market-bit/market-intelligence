      p.style.borderColor = '#ccc';
    });
    var activePillU = document.querySelector('#urg-filter .pill[data-val="' + val + '"]');
    if(activePillU) {
      activePillU.classList.add('active');
      activePillU.style.background = '#333';
      activePillU.style.borderColor = '#333';
      activePillU.style.color = '#fff';
    }
  }
  applyFilters();
}

function init() {
  // Header
  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items · ' + META.emailsRead + '/' + META.emailsInWindow + ' emails · Window ' + META.windowStart + ' – ' + META.windowEnd;

  // Count categories
  var catCounts = {all: ITEMS.length};
  var urgCounts = {all: ITEMS.length, actnow: 0, deep: 0, watch: 0};
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
    urgCounts[item.urgency] = (urgCounts[item.urgency] || 0) + 1;
  });

  // Category filter
  var catBar = document.getElementById('cat-filter');
  var allPill = document.createElement('span');
  allPill.className = 'pill active';
  allPill.setAttribute('data-val', 'all');
  allPill.style.background = '#333';
  allPill.style.borderColor = '#333';
  allPill.style.color = '#fff';
  allPill.textContent = 'All (' + catCounts.all + ')';
  allPill.onclick = function() { setFilter('cat', 'all'); };
  catBar.appendChild(allPill);

  var cats = Object.keys(catCounts).filter(function(c) { return c !== 'all'; });
  cats.sort();
  cats.forEach(function(cat) {
    var p = document.createElement('span');
    p.className = 'pill';
    p.setAttribute('data-val', cat);
    p.style.borderColor = getCatColor(cat);
    p.style.color = getCatColor(cat);
    p.textContent = cat + ' (' + catCounts[cat] + ')';
    p.onclick = function() { setFilter('cat', cat); };
    catBar.appendChild(p);
  });

  // Urgency filter
  var urgBar = document.getElementById('urg-filter');
  var urgDefs = [
    {val:'all', label:'All (' + urgCounts.all + ')'},
    {val:'actnow', label:'🔴 Act Now (' + urgCounts.actnow + ')'},
    {val:'deep', label:'🔵 Deep (' + urgCounts.deep + ')'},
    {val:'watch', label:'🟡 Watch (' + urgCounts.watch + ')'}
  ];
  urgDefs.forEach(function(u, i) {
    var p = document.createElement('span');
    p.className = 'pill' + (i === 0 ? ' active' : '');
    p.setAttribute('data-val', u.val);
    if(i === 0) {
      p.style.background = '#333';
      p.style.borderColor = '#333';
      p.style.color = '#fff';
    }
    p.textContent = u.label;
    p.onclick = function() { setFilter('urg', u.val); };
    urgBar.appendChild(p);
  });

  // Cards
  var cardsEl = document.getElementById('cards');
  ITEMS.forEach(function(item) {
    var color = getCatColor(item.cat);
    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + item.id;

    var chartIcon = (item.charts.count > 0) ? (item.charts.hot ? ' 🔥' : ' 📊') : '';

    var angleStyle = 'border-left-color:' + color + ';background:' + color + '18;';

    var tweetLabelA = '<span class="tweet-label" style="color:#378add;">TWEET A</span>';
    var tweetLabelB = '<span class="tweet-label" style="color:#7f77dd;">TWEET B</span>';

    var chartsHtml = '';
    if(item.charts.count > 0) {
      var hotClass = item.charts.hot ? ' hot' : '';
      chartsHtml = '<div class="charts-block' + hotClass + '">📊 ' + item.charts.count + ' chart(s) — ' + item.charts.desc + '</div>';
    }

    var linkHtml = item.link ? '<div class="link-block"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>' : '';

    var copyBtnA = '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>';
    var copyBtnB = '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>';

    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2,'0') + '</span>' +
        '<span class="urgency-badge">' + getUrgLabel(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + color + ';">' + item.source + '</span>' +
        '<span class="cat-tag">' + item.cat + '</span>' +
        chartIcon +
        '<span class="card-title">' + item.title + '</span>' +
        '<span class="expand-icon">▼</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-header">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="angle-block" style="' + angleStyle + '">' +
          '<div class="section-header" style="margin-top:0">My Angle</div>' +
          item.angle +
        '</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-block">' +
            tweetLabelA +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            copyBtnA +
          '</div>' +
          '<div class="tweet-block">' +
            tweetLabelB +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            copyBtnB +
          '</div>' +
        '</div>' +
        chartsHtml +
        linkHtml +
      '</div>';

    cardsEl.appendChild(card);
  });

  // Report card
  var rb = document.getElementById('report-body');
  var inclHtml = '<div class="report-section"><div class="report-title">Included Sources (' + META.includedSources.length + ')</div>';
  META.includedSources.forEach(function(s) {
    inclHtml += '<div class="source-item" onclick="filterBySource(\'' + s.name.replace(/'/g,'') + '\')">' + s.name + ' — ' + s.items + ' item(s)</div>';
  });
  inclHtml += '</div>';

  var skipHtml = '<div class="report-section"><div class="report-title">Skipped Sources (' + META.skippedSources.length + ')</div>';
  META.skippedSources.forEach(function(s) {
    skipHtml += '<div class="skip-item">✗ ' + s.name + ' — ' + s.reason + '</div>';
  });
  skipHtml += '</div>';

  rb.innerHTML =
    '<div class="report-section"><div class="report-title">Time Window</div>' +
    '<div>' + META.windowStart + ' → ' + META.windowEnd + '</div>' +
    '<div>' + META.emailsRead + ' of ' + META.emailsInWindow + ' emails read · ' + META.itemsExtracted + ' items extracted</div>' +
    '</div>' +
    inclHtml + skipHtml;
}

init();
</script>
</body>
</html>
