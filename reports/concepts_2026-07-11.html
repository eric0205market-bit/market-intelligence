 response to shocks such as rising energy prices.", "speaker": "European Central Bank", "type": "framework", "entities": ["monetary policy", "household wealth", "fiscal policy"], "conviction": "medium", "so_what": "Distributional analysis could inform more targeted fiscal offsets alongside ECB tightening, reducing political backlash risk during future energy shocks.", "quote": null, "locator": "Wealth and income matter for how households react to shocks", "quote_verified": false}]}, {"theme": "New scenario methodology and quantified non-linearity", "insights": [{"claim": "In the ECB's March 2026 staff projections, facing the prospect of Middle East conflict escalation, the ECB did not simply scale up a baseline pass-through coefficient for the scenario but instead adjusted core model elasticities based on scenario severity, reflecting empirical evidence that inflation pass-through is state-dependent and strongest when shocks are large and the economy is already running hot with high inflation.", "speaker": "European Central Bank", "type": "causal", "entities": ["Middle East conflict", "March 2026 ECB projections", "scenario analysis"], "conviction": "high", "so_what": "The ECB's own scenario work assumes convex, not linear, inflation risk from a Middle East escalation — investors pricing euro-area inflation/rate paths under such a scenario should expect asymmetric upside risk rather than a simple linear extrapolation.", "quote": "the exercise went beyond simply scaling up a baseline pass-through coefficient. Instead, the core model elasticities were adjusted in line with the severity of the scenario.", "locator": "To conclude", "quote_verified": true}, {"claim": "According to ECB estimates, a 10% rise in HICP energy and food prices raises HICP core inflation by 0.09% under a linear model, but by between 0.12% and 0.22% under the ECB's new non-linear model, depending on the level of prevailing inflation and how tight the labor market is.", "speaker": "European Central Bank", "type": "data_point", "entities": ["HICP", "core inflation", "energy prices", "labor market"], "conviction": "high", "so_what": "A concrete, quantified range showing a 33%-144% larger core-inflation response than the old linear estimate — a directly usable input for forecasting the ECB's reaction to the next energy price spike.", "quote": "a 10% rise in HICP energy and food raises HICP core by 0.09% according to the linear model, and by between 0.12% and 0.22% in the non-linear model, depending on the state of the economy.", "locator": "Chart 1 note", "quote_verified": true}]}, {"theme": "Forward agenda: remaining modeling gaps", "insights": [{"claim": "The ECB acknowledges its modeling toolkit still has analytical gaps and is developing new models to evaluate structural long-term issues combined with macro-financial linkages, including defence spending, competitiveness policy, geopolitical developments, artificial intelligence, demographic change and long-term fiscal challenges.", "speaker": "European Central Bank", "type": "prediction", "entities": ["defence spending", "artificial intelligence", "demographic change", "fiscal policy", "ECB"], "conviction": "exploratory", "so_what": "A preview of what may show up in future ECB scenario analyses — defence spending, AI diffusion and demographic shifts are being framed as structural macro variables worth modeling explicitly.", "quote": "This will enable analyses of the macroeconomic effects of such key issues as defence spending, competitiveness policies, geopolitical developments, artificial intelligence, demographic change and long-term fiscal challenges.", "locator": "However, some analytical gaps still persist", "quote_verified": true}]}], "insight_total": 20, "top_entities": ["ECB", "ECB-BASE", "NAWM II", "HANK models", "BVAR models", "Strait of Hormuz", "EU Emissions Trading System 2 (ETS 2)", "Russia's invasion of Ukraine", "Liberation Day tariffs", "Phillips curve"], "source_meta": {"author": "European rch.gavekal.com/teaser/france-and-the-limits-of-eurozone-spread-compression/", "title": "France And The Limits Of Eurozone Spread Compression", "published_date": "2026-07-10", "language": "en", "processed_at": "2026-07-11T11:10:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics"], "gist": "France, Spain, and Italy — 59% of the eurozone's €13.9trn public debt stock — all hold national elections in 2027, and Gavekal argues this leaves limited room for further eurozone sovereign spread compression, with France's political dysfunction now the binding constraint rather than currency-union breakup risk.", "themes": [{"theme": "2027 Eurozone Election Calendar", "insights": [{"claim": "France, Spain, and Italy all hold national elections in 2027: France's presidential election first round is April 18 with a runoff on May 2, while Spain and Italy must hold general elections by August 22 and December 22 respectively.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["France", "Spain", "Italy", "Eurozone"], "conviction": "high", "so_what": "These three election windows in 2027 are concrete dates to watch as potential volatility triggers for eurozone sovereign spreads.", "quote": "France holds the first round of its presidential election on April 18, followed by the runoff on May 2, while Spain and Italy must hold general elections by August 22 and December 22, respectively.", "locator": "The 2027 electoral calendar, however, is unusually heavy", "quote_verified": true}, {"claim": "France, Spain, and Italy together account for 59% of the eurozone's €13.9 trillion public debt stock.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["France", "Spain", "Italy", "Eurozone sovereign debt"], "conviction": "high", "so_what": "Election risk is concentrated in countries holding a majority of eurozone debt, so spread-compression trades carry outsized exposure to just three national political outcomes.", "quote": "Together, these three countries account for 59% of the eurozone’s €13.9trn public debt stock.", "locator": "Together, these three countries account for 59%", "quote_verified": true}]}, {"theme": "Spread Compression Outlook", "insights": [{"claim": "The scope for further compression in eurozone sovereign spreads is limited as the heavy 2027 election calendar approaches.", "speaker": "Gavekal Research", "type": "thesis", "entities": ["Eurozone sovereign spreads"], "conviction": "medium", "so_what": "Investors positioned for continued periphery/core spread tightening should temper expectations heading into 2027.", "quote": "The short answer is that the scope for further compression is limited.", "locator": "This raises a simple question: can eurozone sovereign spreads compress much further", "quote_verified": true}, {"claim": "The eurozone's sovereign bond market structure and fiscal risk profile have changed profoundly since the 2012 crisis, such that investors no longer need to price in a breakup of the currency union.", "speaker": "Gavekal Research", "type": "framework", "entities": ["Eurozone", "2012 eurozone crisis", "Currency union"], "conviction": "high", "so_what": "The structural tail risk (redenomination/breakup) that drove past spread blowouts is now largely off the table, changing what actually needs to be priced into eurozone spreads.", "quote": "Investors no longer need to price in a breakup of the currency union, but France’s persistent political dysfunction remains a key constraint on further spread compression.", "locator": "The eurozone’s sovereign bond market structure and fiscal risk profile have changed profoundly", "quote_verified": true}, {"claim": "France's persistent political dysfunction, rather than broader eurozone breakup risk, is now the key constraint limiting further eurozone spread compression.", "speaker": "Gavekal Research", "type": "thesis", "entities": ["France", "Eurozone sovereign spreads"], "conviction": "high", "so_what": "France-specific political risk (not periphery or systemic euro risk) is the variable to monitor for OAT and related spread pricing.", "quote": "France’s persistent political dysfunction remains a key constraint on further spread compression.", "locator": "Investors no longer need to price in a breakup of the currency union", "quote_verified": true}]}], "insight_total": 5, "top_entities": ["France", "Spain", "Italy", "Eurozone", "Eurozone sovereign debt", "French presidential election", "2012 eurozone crisis"], "source_meta": {"author": "", "word_count": 174, "paywalled": false}}, {"record_id": "00ebff89c8f85e11", "source_type": "concepts", "source_name": "Noema Magazine", "source_url": "https://www.noemamag.com/ais-greatest-gift-to-humanity", "title": "AI’s Greatest Gift To Humanity | NOEMA", "published_date": "2026-07-09", "language": "en", "processed_at": "2026-07-11T11:09:52Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Society"], "gist": "Huffington argues that AI overtaking humans on intelligence exposes a 'category error' in defining humanity by intellect, and that as AI commoditizes resume-building cognitive skills, the scarce and valuable human traits become wisdom, presence and connection to the transcendent — while previewing a product vision (drawing on Thrive Global's mission) for AI designed to measure human flourishing, not just productivity.", "themes": [{"theme": "Redefining Human Intelligence", "insights": [{"claim": "Humanity has increasingly defined itself by intelligence as an ever-expanding, seemingly limitless attribute, but AI now overtaking human intelligence exposes this as a category error, since intelligence is not the same as wisdom.", "speaker": "Arianna Huffington", "type": "thesis", "entities": ["AI"], "conviction": "high", "so_what": "Reframes the AI narrative away from 'AI replaces humans' toward 'AI forces humans to compete on a different axis (wisdom/presence)' — a lens for evaluating which human-capital-heavy sectors (coaching, therapy, education, caregiving) gain relative value as AI commoditizes cognitive execution.", "quote": "AI overtaking us in intelligence lays bare the massive category error we have made in increasingly defining ourselves by our intelligence.", "locator": "Redefining Our Humanness", "quote_verified": true}, {"claim": "Yuval Noah Harari argues that intelligence is overrated in both AI and humans, noting humans are simultaneously the most intelligent and the most 'stupid and deluded and destructive' entities on the planet, implying raw intelligence does not drive constructive outcomes.", "speaker": "Arianna Huffington", "type": "contrarian", "entities": ["Yuval Noah Harari"], "conviction": "medium", "so_what": "Challenges the implicit industry assumption that more capable/intelligent AI systems automatically produce better societal outcomes — relevant to how investors should weight 'capability' benchmarks versus alignment/behavioral outcomes when assessing AI model quality.", "quote": "Intelligence is overrated, not only in AI, also in human beings.", "locator": "Acknowledging our defeat to AI in the game of intelligence", "quote_verified": true}, {"claim": "The word 'homo sapiens' translates not to 'intelligent human' but to 'wise human,' a linguistic fact Huffington uses to argue that wisdom, not intelligence, has always been the defining human trait AI cannot replicate.", "speaker": "Arianna Huffington", "type": "framework", "entities": [], "conviction": "medium", "so_what": "Provides a simple mental model — intelligence vs. wisdom — that product and brand strategists in the AI space could use to differentiate 'smart assistant' products from higher-margin 'wisdom/guidance' products.", "quote": "The translation of “homo sapiens” is not “intelligent human.” It is “wise human.”", "locator": "Even if one day AI knows everything", "quote_verified": true}]}, {"theme": "Silicon Valley's Techno-Religion", "insights": [{"claim": "According to reporting cited by Huffington, a number of A ious institution formally weighing in on AI ethics introduces a new, large-constituency voice into AI governance debates — relevant to gauging policy and public-opinion headwinds in Catholic-majority markets and faith-aligned ESG frameworks.", "quote": "technological divinization", "locator": "opening paragraph on the Vatican encyclical", "quote_verified": true}, {"claim": "Pope Leo XIV's encyclical asserts that large language models 'lack the affective, relational and spiritual perspective through which human beings grow in wisdom,' establishing an authoritative doctrinal position that AI cannot substitute for human wisdom regardless of capability gains.", "speaker": "Arianna Huffington", "type": "contrarian", "entities": ["Pope Leo XIV", "LLMs"], "conviction": "medium", "so_what": "Provides a counter-narrative to maximalist AGI/superintelligence framing from a globally influential institution, useful for handicapping societal and political resistance to AI-replaces-humans narratives.", "quote": "lack the affective, relational and spiritual perspective through which human beings grow in wisdom.", "locator": "As Leo wrote in his encyclical", "quote_verified": true}]}, {"theme": "AI Lab Leaders on the Intelligence Transition", "insights": [{"claim": "OpenAI CEO Sam Altman has publicly described the current period as a 'once-in-human-history transition' in which humans go from being the smartest entity on Earth to no longer being the smartest entity on Earth.", "speaker": "Arianna Huffington", "type": "prediction", "entities": ["Sam Altman", "OpenAI"], "conviction": "medium", "so_what": "Shows how OpenAI's own leadership publicly frames AGI arrival as an irreversible historical discontinuity — a useful marker for how AI lab messaging primes public and investor expectations around AGI timelines and valuations.", "quote": "where humans go from being the smartest thing on planet Earth to not the smartest thing on planet Earth.", "locator": "living through this once-in-hu e every two days by 2010, and by 2025 was creating an estimated 463 exabytes of information every day.", "speaker": "Arianna Huffington", "type": "data_point", "entities": ["Eric Schmidt", "Google"], "conviction": "medium", "so_what": "Quantifies the accelerating information/data supercycle underlying AI training and infrastructure demand — a useful anchor statistic for sizing the secular growth trajectory of data storage, compute and bandwidth markets.", "quote": "By 2025, humanity was creating an estimated 463 exabytes every day.", "locator": "Former Google CEO Eric Schmidt once noted", "quote_verified": true}, {"claim": "The third-century philosopher Plotinus identified three sources of knowledge — opinion, science and illumination (wisdom) — with wisdom drawn from a deeper knowing that reason alone cannot reach, a framework Huffington uses to argue AI operates only in the 'science' register, not the 'wisdom' one.", "speaker": "Arianna Huffington", "type": "framework", "entities": ["Plotinus"], "conviction": "low", "so_what": "Offers a durable mental model to differentiate 'intelligence-as-a-service' AI products from a still-unaddressed 'wisdom/meaning-as-a-service' category, which the article implies is a white-space opportunity.", "quote": null, "locator": "In the third century, the philosopher Plotinus described three different sources of knowledge", "quote_verified": false}, {"claim": "Yuval Noah Harari has argued that 'anything made of words will be taken over by AI,' including religion, but Huffington counters that religion and human meaning-making exceed language, so this claimed AI takeover is incomplete.", "speaker": "Arianna Huffington", "type": "contrarian", "entities": ["Yuval Noah Harari"], "conviction": "medium", "so_what": "Useful boundary condition for evaluating how far generative/language-based AI can realistically encroach on institutions (religion, therapy, coaching) that rely on more than text generation — bearing on TAM estimates for 'AI rep ents for uncertainty signaling and transparency.", "quote": null, "locator": "cognitive surrender, when users believe what AI tells them", "quote_verified": false}]}, {"theme": "Huffington's Wellbeing-AI Product Thesis and the Post-AGI Human Capital Premium", "insights": [{"claim": "Huffington proposes that an AI system 'built in service to our evolution' would not measure progress only by speed, efficiency, productivity and optimization, but would instead track whether users are becoming more forgiving, compassionate, generous and open to life's mystery.", "speaker": "Arianna Huffington", "type": "thesis", "entities": ["Thrive Global"], "conviction": "medium", "so_what": "Effectively previews an alternative product KPI framework — wellbeing/character metrics instead of engagement/productivity metrics — positioning wellbeing-oriented AI as a differentiated frontier against productivity-focused AI incumbents; directly relevant to Thrive Global's own behavior-change tech positioning.", "quote": "would not measure progress only by speed, efficiency, productivity and optimization.", "locator": "An AI system built in service to our evolution", "quote_verified": true}, {"claim": "Huffington envisions a school curriculum in which an AI companion helps students track their 'inner progress' alongside academic progress, noting which stories and historical moments awaken reverence and moral clarity to build a map of who a student wants to become.", "speaker": "Arianna Huffington", "type": "prediction", "entities": [], "conviction": "low", "so_what": "Points to an emerging edtech product category — personalized 'inner growth' AI companions — distinct from the tutoring/test-prep AI tools that currently dominate edtech funding.", "quote": null, "locator": "Imagine a curriculum in which students use AI to track their inner progress", "quote_verified": false}, {"claim": "Huffington outlines three concrete verticals for personalization-first AI: real-time health-habit nudges in healthcare, purpose-connection (not just productivity) tools in the workplace, and personalized pathways into prayer and contemplation in religious communities without replacing clergy.", "speaker": "Arianna Huffington", "type": "prediction", "entities": [], "conviction": "low", "so_what": "Identifies three plausible product markets — behavior-change healthtech, enterprise wellbeing/HR tech, and faith-tech — adjacent to Thrive Global's existing business, worth tracking for new entrants or partnerships.", "quote": null, "locator": "In healthcare, Al could use its power of hyper-personalization", "quote_verified": false}, {"claim": "Huffington argues that once AI can outperform humans on 'outward, resume-building' forms of intelligence, the scarce and valuable human goods become presence, depth, connection, empathy and love.", "speaker": "Arianna Huffington", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "A framework for identifying which human skills retain wage and hiring premiums as AI automates cognitive execution — relevant to human-capital investment theses in education, coaching, therapy and caregiving that benefit from rising scarcity value of 'soft skills.'", "quote": "The scarce goods become presence, depth, connection, empathy and love.", "locator": "So much of modern life has been optimized into emptiness", "quote_verified": true}, {"claim": "Huffington predicts employers will prioritize judgment, creativity and intuition over raw execution speed once AI commoditizes speed, arguing 'the victory won't be in being faster than the machine but in being uniquely human.'", "speaker": "Arianna Huffington", "type": "prediction", "entities": [], "conviction": "medium", "so_what": "Suggests hiring and compensation criteria at AI-exposed employers may shift measurably toward judgment/creativity screening — a signal for HR-tech, assessment, and workforce-development companies to track.", "quote": "The victory won’t be in being faster than the machin d": true}, {"claim": "Radiant, Oklo, X-Energy, Deep Fission, and Last Energy are expected to reach criticality later in 2026 or in 2027, with commercial deployment following within a couple of years.", "speaker": "Packy McCormick", "type": "prediction", "entities": ["Radiant", "Oklo", "X-Energy", "Deep Fission", "Last Energy"], "conviction": "medium", "so_what": "A pipeline of additional advanced reactor designs approaching criticality signals a widening investable cohort beyond the first movers.", "quote": null, "locator": "(1) Aalo Goes Critical on the 4th of July", "quote_verified": false}, {"claim": "Packy McCormick made a small personal (non-fund) investment in Aalo Atomics before interviewing its founder in 2023, at a time he believed nuclear was strategically important but not viable for venture-fund investing — a call he now admits was wrong.", "speaker": "Packy McCormick", "type": "anecdote", "entities": ["Aalo Atomics", "Packy McCormick"], "conviction": "medium", "so_what": "Illustrates that early skepticism about nuclear's venture-investability was mistaken just three years before multiple reactors hit criticality — a cautionary example for investors dismissing capital-intensive hard-tech as un-fundable.", "quote": "I actually wrote a small personal check into Aalo before the podcast, back when I didn't think nuclear was fund investable but that it was incredibly important. I was right on the latter but very wrong on the former.", "locator": "(1) Aalo Goes Critical on the 4th of July", "quote_verified": true}, {"claim": "With four advanced reactor designs now critical and more coming, the competitive bottleneck in advanced nuclear is shifting from scientific and regulatory risk to manufacturing execution — the winner will be whoever deploys fastest, at the best price, with a product customers want.", "speaker": "Packy McCormick", "type": "framework", "entities": ["Aalo Atomics", "Oklo", "X-Energy"], "conviction": "medium", "so_what": "Investors should reweight advanced-nuclear diligence toward supply chain and unit economics rather than technology risk now that criticality has been demonstrated repeatedly.", "quote": "The field shifts from science to manufacturing.", "locator": "(1) Aalo Goes Critical on the 4th of July", "quote_verified": true}, {"claim": "Data centers, not traditional utilities, are becoming the primary customers for advanced reactors, because utilities have historically been poor customers for new nuclear technology while hyperscalers will pay for speed and eventual affordability.", "speaker": "Packy McCormick", "type": "causal", "entities": ["data centers", "utilities", "advanced nuclear reactors"], "conviction": "medium", "so_what": "Reframes the nuclear investment thesis around hyperscaler procurement rather than regulated utility capex cycles — watch data center power purchase agreements as the leading demand signal.", "quote": "One of nuclear's challenges has been that utilities are terrible customers for the product. Fortunately, they are not the main customers for these smaller advanced reactors. Data Centers are, and they will fund whoever gets them something that works fast", "locator": "(1) Aalo Goes Critical on the 4th of July", "quote_verified": true}]}, {"theme": "Data Centers as US Industrial Demand Engine", "insights": [{"claim": "Financial Times contributor Josh Zoffer argues that the data center buildout is a unique opportunity because cash-rich hyperscalers are willing to pay directly for fast, reliable industrial technology, letting the US build domestic supply chains through genuine demand rather than subsidies or tariffs.", "speaker": "Packy McCormick", "type": "thesis", "entities": ["Josh Zoffer", "Financial Times", "hyperscalers", "data centers"], "conviction": "medium", "so_what": "Supports a thesis that data center capex functions as privately-funded industrial policy — a tailwind for US power and hardware supply chains without requiring government subsidy programs.", "qu // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
