var activeCat = 'all';
var activeUrg = 'all';

function catClass(cat) {
  var m = { 'macro': 'macro', 'credit': 'credit', 'positioning': 'positioning', 'AI/infra': 'aiinfra', 'crypto': 'crypto', 'geopolitics': 'geopolitics', 'energy': 'energy', 'gold': 'gold', 'culture': 'culture', 'regulation': 'regulation' };
  return m[cat] || 'macro';
}

function urgTag(u) {
  if (u === 'act') return '🔴 ACT NOW';
  if (u === 'deep') return '🔵 DEEP';
  return '🟡 WATCH';
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterByCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-cat') === cat);
  });
  applyFilters();
}

function filterByUrg(urg) {
  activeUrg = urg;
  document.querySelectorAll('.urg-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-urg') === urg);
  });
  applyFilters();
}

function filterBySrc(srcFragment) {
  document.querySelectorAll('.card').forEach(function(card) {
    var src = card.getAttribute('data-source') || '';
    card.classList.toggle('hidden', src.toLowerCase().indexOf(srcFragment.toLowerCase()) === -1);
  });
}

function applyFilters() {
  document.querySelectorAll('.card').forEach(function(card) {
    var cat = card.getAttribute('data-cat');
    var urg = card.getAttribute('data-urg');
    var catOk = activeCat === 'all' || cat === activeCat;
    var urgOk = activeUrg === 'all' || urg === activeUrg;
    card.classList.toggle('hidden', !(catOk && urgOk));
  });
}

function init() {
  var container = document.getElementById('cards');
  ITEMS.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'card';
    div.setAttribute('data-cat', item.cat);
    div.setAttribute('data-urg', item.urgency);
    div.setAttribute('data-source', item.source);
    div.setAttribute('data-id', item.id);
    var chartsHtml = item.charts ? '<div class="charts-note">📊 ' + item.charts + '</div>' : '';
    var linkHtml = item.link ? '<a class="src-link" href="' + item.link + '" target="_blank">Source ↗</a>' : '';
    div.innerHTML =
      '<div class="card-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
        '<div class="cat-dot ' + catClass(item.cat) + '"></div>' +
        '<span class="urgency-tag">' + urgTag(item.urgency) + '</span>' +
        '<span class="card-title">' + item.title + '</span>' +
        '<span class="card-source">' + item.source + '</span>' +
        '<span class="chevron">▶</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="idea">' + item.idea + '</div>' +
        '<div class="angle">' + item.angle + '</div>' +
        '<div class="tweets">' +
          '<div class="tweet-row">' +
            '<div class="tweet-label">Tweet A <button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
          '</div>' +
          '<div class="tweet-row">' +
            '<div class="tweet-label">Tweet B <button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
          '</div>' +
        '</div>' +
        chartsHtml +
        linkHtml +
      '</div>';
    container.appendChild(div);
  });

  document.getElementById('meta-window').textContent = 'Window: ' + META.windowStart + ' → ' + META.windowEnd;
  document.getElementById('meta-emails').textContent = 'Emails: ' + META.emailsRead + '/' + META.emailsInWindow;
  document.getElementById('meta-items').textContent = 'Items: ' + META.itemsExtracted;
  document.getElementById('meta-sources').textContent = 'Sources: ' + META.includedSources.length;

  document.getElementById('session-meta').innerHTML =
    '<strong>Included sources:</strong> ' + META.includedSources.join(', ') + '<br>' +
    '<strong>Skipped (no substance):</strong> ' + META.skippedSources.join(', ');
}

init();
</script>
