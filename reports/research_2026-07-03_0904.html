const META = {
  date: "2026-07-03",
  time: "09:04 CEST",
  windowStart: "2026-07-03 03:04 CEST",
  windowEnd: "2026-07-03 09:04 CEST",
  emailsInWindow: 12,
  emailsRead: 12,
  itemsExtracted: 25,
  includedSources: [
    { name: "The Dark Side of the Boom (Substack)", count: 4 },

    { name: "McKinsey — The Weekend Read", count: 4 },
    { name: "Michael Parekh (Substack, AI-RTZ)", count: 1 },
    { name: "Crypto News (cryptointegrat / Substack)", count: 5 },
    { name: "AI News (cryptointegrat / Substack)", count: 1 }

  skippedSources: [

};

const CAT_COLORS = { macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27", "AI/infra":"#1d9e75", crypto:"#7f77dd", geopolitics:"#d85a30", energy:"#f97316", tech:"#06b6d4", gold:"#d4a017", culture:"#ec4899", labor:"#8b5cf6", regulation:"#64748b", science:"#14b8a6", venture:"#84cc16" };
const URG_LABEL = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URG_EMOJI = { act: "🔴", deep: "🔵", watch: "🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function catCounts(){
  const m = {};
  ITEMS.forEach(i => { m[i.cat] = (m[i.cat]||0) + 1; });
  return m;
}
function urgCounts(){
  const m = {};
  ITEMS.forEach(i => { m[i.urgency] = (m[i.urgency]||0) + 1; });
  return m;
}

function buildCatBar(){
  const counts = catCounts();
  const cats = Object.keys(CAT_COLORS).filter(c => counts[c]);
  let html = '<button class="pill' + (activeCat==="all"?" active":"") + '" style="' + (activeCat==="all"?"background:#333;":"") + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  cats.forEach(c => {
    const on = activeCat === c;
    html += '<button class="pill' + (on?" active":"") + '" style="' + (on ? ("background:" + CAT_COLORS[c] + ";") : "") + '" onclick="setCat(\'' + c + '\')">' + esc(c) + ' (' + counts[c] + ')</button>';
  });
  document.getElementById("catBar").innerHTML = html;
}
function buildUrgBar(){
  const counts = urgCounts();
  const order = ["act","deep","watch"];
  let html = '<button class="pill' + (activeUrg==="all"?" active":"") + '" style="' + (activeUrg==="all"?"background:#333;":"") + '" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  order.forEach(u => {
    if(!counts[u]) return;
    const on = activeUrg === u;
    html += '<button class="pill' + (on?" active":"") + '" style="' + (on?"background:#555;":"") + '" onclick="setUrg(\'' + u + '\')">' + URG_LABEL[u] + ' (' + counts[u] + ')</button>';
  });
  document.getElementById("urgBar").innerHTML = html;
}

function setCat(c){ activeCat = c; activeSrc = null; render(); }
function setUrg(u){ activeUrg = u; activeSrc = null; render(); }
function filterBySrc(name){
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  render();
  ITEMS.forEach(i => {
    if(i.source.indexOf(name) !== -1){
      const el = document.getElementById("card-" + i.id);
      if(el) el.classList.add("open");
    }
  });
}

function toggleCard(id){
  const el = document.getElementById("card-" + id);
  el.classList.toggle("open");
}

function buildCards(){
  let html = "";
  ITEMS.forEach((item, idx) => {
    const visible = (activeCat === "all" || item.cat === activeCat)
      && (activeUrg === "all" || item.urgency === activeUrg)
      && (activeSrc === null || item.source.indexOf(activeSrc) !== -1);
    const chartMark = item.charts.hot ? "🔥" : (item.charts.count > 0 ? "📊" : "");
    html += '<div class="card' + (visible ? "" : " hidden") + '" id="card-' + item.id + '">';
    html += '<div class="card-head" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(idx+1).padStart(2,"0") + '</span>';
    html += '<span>' + URG_EMOJI[item.urgency] + '</span>';
    html += '<span class="badge" style="background:' + (CAT_COLORS[item.cat]||"#888") + '">' + esc(item.source) + '</span>';
    html += '<span class="tag">' + esc(item.cat) + '</span>';
    if(chartMark) html += '<span class="chartmark">' + chartMark + '</span>';
    html += '<span class="title-txt">' + esc(item.title) + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-txt">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="border-left-color:' + (CAT_COLORS[item.cat]||"#888") + ';background:' + (CAT_COLORS[item.cat]||"#888") + '14;">' + esc(item.angle) + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet a"><div class="lbl">TWEET A</div><p>' + esc(item.tweetA) + '</p><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet b"><div class="lbl">TWEET B</div><p>' + esc(item.tweetB) + '</p><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    html += '<div class="chart-box' + (item.charts.hot ? " hot" : "") + '">' + (item.charts.hot ? "🔥 CHART WORTH SAVING — " : "📊 ") + esc(item.charts.desc || "No chart in email.") + '</div>';
    html += '<div class="linkrow"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div>';
    html += '</div>';
  });
  document.getElementById("cards").innerHTML = html;
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport(){
  let html = "<p><strong>Window:</strong> " + META.windowStart + " to " + META.windowEnd + ". Emails outside this window were not processed.</p>";
  html += "<p><strong>Emails in window:</strong> " + META.emailsInWindow + " &nbsp; <strong>Emails read:</strong> " + META.emailsRead + " &nbsp; <strong>Items extracted:</strong> " + META.itemsExtracted + "</p>";
  html += "<p><strong>Included sources:</strong></p><ul>";
  META.includedSources.forEach(s => {
    html += '<li><span class="srcname" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count>1?"s":"") + '</li>';
  });
  html += "</ul>";
  html += "<p><strong>Skipped sources:</strong></p><ul>";
  META.skippedSources.forEach(s => {
    html += "<li>" + esc(s.name) + " — <em>" + esc(s.reason) + "</em></li>";
  });
  html += "</ul>";
  document.getElementById("reportBody").innerHTML = html;
}

function render(){
  buildCatBar();
  buildUrgBar();
  buildCards();
}

document.getElementById("metaLine").textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.includedSources.length + " sources · window " + META.windowStart + " – " + META.windowEnd;
buildReport();
render();
</script>
