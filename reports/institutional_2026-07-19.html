nding 1.0.' On the AI capex supercycle (~$1.6trn for 2026-27, now largely debt-funded), he sees discipline greater than the late-1990s. Late-cycle, he advocates rebalancing from ~90/10 toward a more balanced 60/40, favouring bonds for convexity and emerging markets for diversification.", "url": "https://www.pimco.com/us/en/insights/podcasts/accrued-interest/lotfi-karoui-on-private-credit-and-the-ai-capex-supercycle", "images": []}, {"source": "schroders", "name": "Schroders (Duncan Lamont)", "title": "Schroders Equity Lens July 2026", "summary": "The Equity Lens says equities are expensive but underpinned by unusually strong earnings growth. 2026 winners: US small caps +23%, EM +24%, Japan +16%; the Magnificent-7 collectively 0% this year vs US ex-Mag-7 +15%; EM is highly concentrated (>80% of EM companies underperforming as Korean/Taiwanese chip names dominate). Earnings are booming — EM >60% growth forecast for 2026, US +24%. For stagflation worriers, Lamont's tactical longs are value and quality styles, conservative-investment companies, energy equities, defensives and gold equities.", "url": "https://www.schroders.com/en-us/us/individual/insights/schroders-equity-lens-july-2026-your-go-to-guide-to-global-equity-markets/", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "title": "Upstream oil and gas 2026 outlook: half-time report", "summary": "WoodMac's mid-year update: Middle East conflict-driven price gains delivered an H1 cash windfall, with Brent potentially averaging at least $15/bbl above the ~$60/bbl companies had budgeted while costs stayed stable, making nearly all firms net beneficiaries. Global upstream development capex is still set for a second year of slight decline as operators favour maintenance deferral over major investment. Geopolitical concentration risk intensifies portfolio-renewal pressure; H1 deal count neared recent highs and a lack of inventory could spur a new M&A wave in 2027.", "url": "https://www.woodmac.com/news/opinion/upstream-oil-and-gas-2026-outlook-half-time-report/", "images": []}, {"source": "moodys_analytics", "name": "Moody's Analytics", "title": "Global Outlook: Running Hot, Running Cold", "summary": "Angrick and Tan describe a 'K-shaped' global economy in which some industries and economies run hot while others run cold, and argue the AI boom has prevented a steeper downturn. They expect global growth to slow to 2.5% in 2026. A companion piece (Begley) argues hopes that AI will lift growth enough to balance the US federal budget are misguided — the productivity boost, while real, will not be sufficient to solve the government's fiscal problems.", "url": "https://www.economy.com/economicview/analysis/423333/Global-Outlook-Running-Hot-Running-Cold", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "title": "The State of Crypto Leverage – Q4 2025: Surviving a Stress Test", "summary": "Galaxy's Q4 2025 leverage report finds crypto-collateralized lending fell 9.81% (-$7.55bn) QoQ to $69.55bn, driven entirely by onchain deleveraging (DeFi loans -24.15% to $33.5bn) while CeFi borrows grew 11.66% to $27.56bn — the eighth straight quarterly gain. Onchain borrows have fallen 40% from the $47.12bn Sept 2025 peak. Despite the largest liquidation event in history on Oct 10, CeFi loanbooks showed few signs of stress (Coinbase grew its book +47.89% with no rehypothecation losses), a structural improvement versus the 2022 Genesis/BlockFi/Celsius collapses. Futures open interest collapsed 39.09% QoQ to $120.11bn; Tether dominates CeFi lending at 61.84% share.", "url": "https://www.galaxy.com/insights/research/state-of-crypto-leverage-q4-2025", "images": []}, {"source": "pimco", "name": "PIMCO", "title": "Real Estate: From Repricing to Relevance", "summary": "PIMCO argues real estate is moving 'from repricing to relevance': as of 31 Dec 2025 it managed ~$169bn across CRE debt/equity. AI-capable data-centre buildout alone is projected to need $5.2 trillion of capex by 2030, diverting capital and pressuring cap rates; AI could automate 25% of US work tasks and displace 6-7% of workers over a decade. Investment implications favour flexibility, durable income, irreplaceable locations, explicit demand-risk underwriting, using the full capital structure, and themes like data centres, logistics, and social/defense infrastructure.", "url": "https://www.pimco.com/us/en/insights/real-estate-from-repricing-to-relevance", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "title": "The Agentic Flywheel: How Zero-Human Companies Will Reshape Onchain Markets", "summary": "Galaxy long-form research on 'Zero Human Companies' (ZHCs) — autonomous, revenue-generating businesses run by AI agents onchain. Building on prior work on agentic payments and Ethereum's ERC-8004 identity standard, it argues the infrastructure for an 'agentic flywheel' is emerging: agents that earn, reinvest, hedge and compound capital natively over crypto rails. An illustrative 2030 scenario has an autonomous AI music composer buying GPU inference, hedging compute exposure on a DEX and routing revenue to yield agents. It frames onchain rails as the settlement substrate for machine-native capital markets.", "url": "https://www.galaxy.com/insights/research/zero-human-companies-ai-agents-defi-crypto", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment", "title": "Europe from Scratch: Visions for a New European Order", "summary": "A long-form Carnegie Europe report (ed. Richard Youngs) asks eleven experts to redesign the European order 'from zero.' It argues the EU's basic settlement has not changed materially since the 2009 Lisbon Treaty despite the eurozone crisis, Brexit, COVID, Russia's 2022 invasion and now Trump 2.0; European leaders wrote to Council President Costa in October 2025 urging substantial change. It cites a March 2026 EU Joint Research Centre report warning the current integration model risks failing to reconcile open-market integration, the climate transition and democracy. Even after Orban's loss of power in April 2026, structural vulnerability to one or two illiberal spoiler governments remains. The experts debate whether a redesigned order should be one forum or many, uniform or differentiated, expert- or citizen-led, defensive or externally engaged.", "url": "https://carnegieendowment.org/europe/research/2026/07/europe-from-scratch-visions-for-a-new-european-order", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment", "title": "Egypt's Military Landlord Economy and its Limitations", "summary": "Since 2020 Egypt's military-led economy has shifted from publicly-funded construction into 'landlord capitalism' — extracting rent from state assets rather than producing goods — a model the author argues faces diminishing returns and deepens dependency on external borrowing. Though the private sector is ~75% of GDP, public-driven investment dominates: the state holds ~94% of land, real estate is 20-30% of GDP, and the military managed 25% of publicly-funded construction in 2013-2018 rising to 28-38% in 2019-2020, levying opaque 5-35% management fees. Marquee Gulf-funded deals underpin the boom (UAE's $35bn Modon Ras El-Hekma, Qatar's $29.7bn Alam al-Roum). The author warns the system is structurally uncompetitive (poverty 33.5-35.7%) and highly vulnerable to external shocks — 'the system works until it doesn't.'", "url": "https://carnegieendowment.org/research/2026/07/egypts-military-landlord-economy-and-its-limitations", "images": []}, {"source": "pwc", "name": "PwC / Strategy&", "title": "Balancing relevance and returns in a profitability paradox", "summary": "PwC's 2025 AWM Revolution research finds a profitability paradox: global AUM is set to rise from ~$139trn to $200trn by 2030 with up to $230bn of new revenue available, yet profit as a share of AUM has fallen ~19% since 2018 and is set to fall a further 9% by 2030. 89% of managers report profitability pressure; the cost-to-income ratio is stuck near 68%. Passive AUM is projected to grow ~10% CAGR to $70trn by 2030, alternatives to $34trn (private markets $26.6trn), and tokenised fund AUM at a 41% CAGR to $715bn. PwC identifies four winning models and stresses AI, personalization and integrate-vs-specialize choices.", "url": "https://www.pwc.com/gx/en/issues/transformation/asset-and-wealth-management-revolution.html", "images": []}], "D_charts": [{"source": "blackrock_investment_institute", "name": "BlackRock", "chart": "Chart of AI vs non-AI contribution to S&P 500 returns / nominal GDP run-rate: a basket of 32 AI names added 12.0% to YTD S&P returns while the rest subtracted 2.3%; hyperscaler capex +80% y/y to ~$715bn. Shows how narrow leadership is and why to build deliberately.", "url": "https://www.blackrock.com/us/individual/insights/summer-markets-ai-investing", "images": ["https://www.blackrock.com/blk-one01-c-assets/cache-1784061131000/images/media-bin/web/shared/charts/june-1.svg"]}, {"source": "bnp_paribas", "name": "BNP Paribas", "chart": "'AI capex multi-year supercycle' exhibit: ~$835bn committed by top US hyperscalers in 2026 plus Japan's ~$600bn 14-year plan. Quantifies the scale of the capex wave driving global growth and credit supply.", "url": "https://www.bnpparibas-am.com/en/front-of-mind/take-two-imf-lowers-global-growth-forecast/", "images": ["https://www.bnpparibas-am.com/wp-content/uploads/2026/07/Exhibit-1-AI-CAPEX-multi-year-supercycle.png"]}, {"source": "pimco", "name": "PIMCO (Lotfi Karoui)", "chart": "Earnings-expectations chart: 1yr EBITDA growth forecasts for USD IG non-financials quadrupled from 5% to >20% (margins 20%→24%); HY from <4% to >14%. Visualises how high the earnings bar has been set into Q2 season — little room for disappointment.", "url": "https://www.pimco.com/us/en/insights/the-credit-market-lens-a-higher-bar-for-earnings-season", "images": ["https://www.pimco.com/us/en/-/media/global-assets/insights/economic-and-market-commentary/the-credit-market-lens/07/a-higher-bar-for-earnings-season/lotfi26-w29-2q26-earnings-chart-gbl-en-68821-v3-final-1.webp"]}, {"source": "schroders", "name": "Schroders", "chart": "Hyperscaler vs IG corporate spreads (July 2026): tracks how the heavy AI/data-center issuance wave has widened hyperscaler spreads while broad IG stayed only marginally wider — the key credit technical of the year.", "url": "https://www.schroders.com/en-us/us/individual/insights/weekly-bond-market-update-softer-cpi-but-not-an-all-clear/", "images": ["https://mybrand.schroders.com/transform/f574b066-a5ef-41df-889b-f86533e6c660/Hypercalers-vs-IC-corporate-spreads-July-2026?quality=85"]}, {"source": "schroders", "name": "Schroders", "chart": "Chart of the Month (Equity Lens): 2026 regional/style return dispersion — US small caps +23%, EM +24%, Japan +16%, Mag-7 flat vs US ex-Mag-7 +15%. Illustrates the breadth-and-concentration story in one view.", "url": "https://www.schroders.com/en-us/us/individual/insights/schroders-equity-lens-july-2026-your-go-to-guide-to-global-equity-markets/", "images": ["https://mybrand.schroders.com/transform/9a40f5c9-c181-4c53-b344-df29a945461b/equity-lens-july-2026-chart-of-the-month?quality=85"]}, {"source": "schroders", "name": "Schroders", "chart": "Q3 US Fixed Income asset-class returns (QTD/MTD): ranks sector returns to support the tilt away from tight corporate credit toward mortgages, munis and EM.", "url": "https://www.schroders.com/en-us/us/individual/insights/fixed-income-markets-now-demand-a-mix-of-tactical-offense-and-resilient-defense/", "images": ["https://mybrand.schroders.com/transform/d7a63e38-b5e6-48b7-a662-1aeb99b4ee0f/Q3-US-FI-outlook-Fig-1-Asset-class-returns-QTD-and-MTD?quality=85"]}, {"source": "rbc", "name": "RBC Capital Markets (Helima Croft)", "chart": "Strait of Hormuz flows / oil-supply figure: seven-day-average Hormuz flows collapsed to 3.9 mb/d after the ceasefire collapse. Quantifies the physical severity of the oil supply shock and thin inventory buffers (Cushing minimums, SPR 43-year lows).", "url": "https://www.rbccm.com/en/insights/2026/07/energy-market-risks-reignited-after-iran-ceasefire-collapses", "images": ["https://www.rbccm.com/assets/rbccm/images/insights/2026/20260716-energy-market-risks-reignited-after-iran-ceasefire-collapses-figure1.webp"]}, {"source": "federal_reserve", "name": "Federal Reserve", "chart": "AI boom and the US current account (figure): investment-specific tech shocks historically drive a ~10% current-account deterioration; ~90% of AI equipment is sourced from East Asia. Shows the external-imbalance and import-price channel of the buildout.", "url": "https://www.federalreserve.gov/econres/notes/feds-notes/technology-shocks-the-ai-boomandthe-u-s-current-account-20260714.html", "images": ["https://www.federalreserve.gov/econres/notes/feds-notes/figure1-4106.png"]}, {"source": "franklin_templeton", "name": "Franklin Templeton", "chart": "'AI boom remains far from dot-com territory' exhibit: compares current valuations/breadth with the dot-com era to argue the rally is broadening to picks-and-shovels and ex-US rather than bubbling.", "url": "https://www.franklintempleton.com/articles/2026/etf/opening-the-aperture-on-global-investing", "images": ["https://franklintempletonprod.widen.net/content/6yym2ggpq1/webp/ai-boom-remains-far-from-dotcom-territory-ex1.png"]}, {"source": "chainalysis", "name": "Chainalysis", "chart": "Iran CBI stablecoin freeze (on-chain): sanctioned wallets received $165m in stablecoins, of which Tether froze $131m immediately; ~$475m total CBI-linked funds now frozen. Shows the freeze-risk inherent in dollar stablecoins used for sanctions evasion.", "url": "https://www.chainalysis.com/blog/ofac-sanctions-iran-central-bank-crypto-wallets-freezing-131m-in-stablecoins/", "images": ["https://www.chainalysis.com/wp-content/uploads/2026/07/screenshot-2026-07-15-at-54326-pm.avif"]}, {"source": "t_rowe_price", "name": "T. Rowe Price", "chart": "Growth of digital-asset ETPs (Fig 1): charts the rise of regulated crypto exchange-traded products that moved crypto into the mainstream — context for its new active spot multi-token ETF (TKNZ).", "url": "https://www.troweprice.com/en/us/insights/crypto-edges-into-the-mainstream", "images": ["https://dynamicmedia.troweprice.com/is/image/trowepriceassociatesinc/fig1-Growth-of-digital-asset-ETPs?ts=1784206174830"]}, {"source": "coinshares", "name": "CoinShares", "chart": "OUSD stablecoin comparison: maps Open USD's revenue-sharing model against USDC/USDT reserve economics; frames pressure on Circle's ~50% USDC reserve-income payment to Coinbase (Circle fell ~17.5% on the announcement).", "url": "https://coinshares.com/insights/research-data/what-is-open-usd-and-what-does-it-mean-for-stablecoins/", "images": ["https://a.storyblok.com/f/176807/1600x1040/b1f0f38a62/ousd-comparing-stablecoins.png/m/"]}, {"source": "citi_gps", "name": "Citi", "chart": "Midyear outlook forecast dashboard: consolidates Citi's cross-asset targets (S&P 8,100; 10y 3.90%; Brent $75/$70/$65; gold $5,000; DXY ~99.96) in one exhibit — a quick reference for the house's base case.", "url": "https://www.citigroup.com/global/insights/midyear-2026-outlook-resilience-ai-and-evolving-market-dynamics", "images": ["https://www.citigroup.com/rcs/v1/siteIds/citigpa/asset/6a57a64dfc255f63a59b7865.jpg"]}, {"source": "world_bank", "name": "World Bank", "chart": "Adaptive social protection (Pakistan flood case): simulations across 131 countries show disasters push ~12.7m into extreme poverty a year; a single 100-year Pakistan flood could push 9.6m into extreme poverty. Depth beats breadth for well-being — an $1.14trn/yr GDP-equivalent impact.", "url": "https://blogs.worldbank.org/en/developmenttalk/when-disaster-strikes--who-gets-help--the-case-for-smarter-socia", "images": ["https://s7d1.scene7.com/is/image/wbcollab/Flood-victims-Pakistan?qlt=90&fmt=webp&resMode=sharp2"]}], "house_views": [{"source": "federal_reserve", "name": "Federal Reserve", "stance": "On hold at 3.50-3.75% under new Chair Warsh, who scrapped forward guidance and the dot-plot; officials split, Waller floating conditional hikes. Staff research frames the AI boom as a current-account/inflation risk and stresses dollar dominance is reinforced by stablecoins.", "category": "central_bank", "url": "https://www.federalreserve.gov/econres/notes/feds-notes/the-ai-buildout-and-the-economy-publicly-available-data-to-assess-ais-impact-20260717.html"}, {"source": "boe", "name": "Bank of England", "stance": "Bank Rate held at 3.75% (previously-expected cuts taken off the table); MPC split between dovish Taylor (neutral ~3%, resume cuts) and hawkish Mann (may need to hike). Energy shock delays 2% target; pushing digital-gilt (DIGIT) and tokenisation.", "category": "central_bank", "url": "https://www.bankofengland.co.uk/speech/2026/july/andrew-bailey-speech-at-manison-house"}, {"source": "goldman_sachs", "name": "Goldman Sachs", "stance": "Constructive but valuation-aware: AI is not yet a bubble (only 1 of 4 signals flashing), dollar can strengthen further, biotech and space themes attractive; hyperscalers need ~$5.5-6trn financing to 2030. High bar into earnings (~22% EPS) but clean positioning.", "category": "bank_bulge", "url": "https://www.goldmansachs.com/insights/the-markets/how-earnings-volatility-and-ai-capex-are-affecting-us-markets"}, {"source": "citi_gps", "name": "Citi", "stance": "Resilience is the base case: S&P 8,100 year-end, Fed's next move a cut (funds to 3.25%), Brent averaging $75/$70/$65, gold to $5,000 (2027), DXY drifting lower. Equity overweight, credit underweight hedge; AI the dominant driver.", "category": "bank_bulge", "url": "https://www.citigroup.com/global/insights/midyear-2026-outlook-resilience-ai-and-evolving-market-dynamics"}, {"source": "ubs", "name": "UBS", "stance": "Fed pricing too hawkish, yields should fall (first cut pushed to early 2027); earnings drive equities to S&P 8,200 by mid-2027, ACWI +10%. Constructive on semis, add quality fixed income, gold and select global-macro hedge funds; upgraded Eurozone/India.", "category": "bank_bulge", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-17072026.html"}, {"source": "bnp_paribas", "name": "BNP Paribas", "stance": "'Bonds keep calm and carry on': hikes not excluded if inflation persists, but carry/income favoured — positive euro IG (financials/BBB), modest OW agency MBS, supportive European HY (single-B), resilient EM debt favouring oil exporters. Inflation the key risk to yields.", "category": "bank_bulge", "url": "https://viewpoint.bnpparibas-am.com/global-fixed-income-outlook-q3-2026-bonds-keep-calm-and-carry-on/"}, {"source": "barclays", "name": "Barclays", "stance": "Debating the Warsh guidance overhaul (right diagnosis, contested execution — term-premium/flash-crash risk); bullish AI compute/power but flags cooling, water and grid execution risks likely to surface in early 2027.", "category": "bank_bulge", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/the-flip-side-podcast/if-the-fed-goes-quiet-do-markets-make-more-noise.html"}, {"source": "jpmorgan", "name": "JPMorgan", "stance": "Reports commodities trading shifting structurally to systematic/quant participation (alpha moving to execution/access); biopharma/medtech capital markets steady with capital moving to later-stage assets (H1 biopharma M&A $96bn, licensing $166.7bn).", "category": "bank_bulge", "url": "https://www.jpmorgan.com/insights/markets-and-economy/outlook/biopharma-medtech-deal-reports"}, {"source": "deutsche_bank", "name": "Deutsche Bank", "stance": "Private Bank: global growth moderating on the Iran energy shock, 2026 inflation forecasts raised, central banks tilting tighter; still expects equity gains over 12 months, likes high-quality bonds, gold and private markets; Q2 bank earnings the brightest spot.", "category": "bank_bulge", "url": "https://wealth.db.com/en/insights/investing-insights/economic-and-market-outlook/perspectives-economic-and-asset-class-outlook-june-2026.html"}, {"source": "bofa", "name": "Bank of America (Institute)", "stance": "Consumer resilient but bifurcating: June card spending +6.3% YoY (strongest in 4 years, discretionary-led, World Cup-aided), payroll growth accelerating to 1.7%, lower-income wages catching up — but consumers are trading down to value grocers/discount apparel and small-business profitability is only just turning positive.", "category": "bank_bulge", "url": "https://institute.bankofamerica.com/economic-insights/consumer-checkpoint-july-2026.html"}, {"source": "blackrock_investment_institute", "name": "BlackRock", "stance": "Shift from broad beta to deliberate construction: AI/growth real but narrow; earn income while yields high, be ready to add duration, keep equities in durable compounders and trim extended winners; Europe the cleaner rates trade.", "category": "asset_manager", "url": "https://www.blackrock.com/us/individual/insights/summer-markets-ai-investing"}, {"source": "kkr", "name": "KKR", "stance": "'Divergence Conundrum' / Regime Change: above-consensus US growth, higher-for-longer inflation, higher long-end yields; stay up-in-quality, overweight Asia (public & private), Real Assets/Infrastructure/power, structured equity and carve-outs. PE edge is real but manager selection decisive.", "category": "asset_manager", "url": "https://www.kkr.com/insights/mid-year-update-2026"}, {"source": "pimco", "name": "PIMCO", "stance": "Fed on hold through 2026; elevated starting yields cushion bonds. Rebalance from 90/10 toward 60/40 (bonds for convexity, EM for diversification); direct-lending stress cyclical not systemic; real estate 'from repricing to relevance'.", "category": "asset_manager", "url": "https://www.pimco.com/us/en/insights/fed-policymaker-comments-raise-the-stakes-for-inflation-data"}, {"source": "franklin_templeton", "name": "Franklin Templeton", "stance": "Constructive with a narrowing margin for error: S&P 7,400-7,800, broadening to small/mid-caps, EM and Japan; recession odds 20%; underweight tight corporate credit; AI's real story is its financing wave. Bullish munis.", "category": "asset_manager", "url": "https://www.franklintempleton.com/articles/series/from-the-market-desk"}, {"source": "schroders", "name": "Schroders", "stance": "Equities expensive but earnings-supported (lean away from the froth, favour quality/value); Fed on hold, futures wrongly pricing hikes; low corporate credit, prefer mortgages/munis/EM; tactical longs in value, energy and gold equities.", "category": "asset_manager", "url": "https://www.schroders.com/en-us/us/individual/insights/video-cio-lens-q3-2026---the-challenge-is-understanding-where-risks-accumulate-/"}, {"source": "bny", "name": "BNY", "stance": "Diversify equity factors toward quality (excess earnings yield near zero, echoing 2000); build a multi-asset income toolkit beyond bonds (dividend growers, infrastructure, munis, core-plus) as the Fed pauses cuts.", "category": "asset_manager", "url": "https://www.bny.com/investments/us/en/individual/articles/equities/a-sense-of-style-why-factor-diversification-matters-now.html"}, {"source": "amundi", "name": "Amundi", "stance": "A 'low-trust', multipolar world where resilience beats efficiency: geopolitical risk highest since WWII pressures bonds' hedging power; favour energy independence, tech supply chains, defence, food and pharma, and a re-emerging Europe. Near-term diversify amid Hormuz volatility.", "category": "asset_manager", "url": "https://research-center.amundi.com/article/investing-low-trust-world"}, {"source": "vanguard", "name": "Vanguard", "stance": "AI's promise is largely priced in; bullish long-term but P/Es compress as earnings mature — tilt to under-priced value and ex-US, with AI end-users (not builders) the likely ultimate winners.", "category": "asset_manager", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/how-much-upside-remains-for-ai-driven-equity-returns.html"}, {"source": "man_group", "name": "Man Group", "stance": "AI trade maturing into winner/loser discrimination — semis in bubble territory, ~49% of cloud backlog tied to OpenAI/Anthropic, lock-up pressure point in 2027; China underpriced. UK gilts cheap on inflation and political instability, not debt.", "category": "asset_manager", "url": "https://www.man.com/insights/h2-2026-technology-outlook"}, {"source": "bridgewater", "name": "Bridgewater", "stance": "Two structural 'resource grabs' — modern mercantilism and AI — are reshaping markets and are inherently inflationary; most investors are dangerously overweight US equities and underweight real assets; compute demand now outpaces supply.", "category": "asset_manager", "url": "https://www.bridgewater.com/research-and-insights/karen-karniol-tambour-on-investing-in-a-more-fragmented-world"}, {"source": "standard_chartered", "name": "Standard Chartered", "stance": "Peak Fed hawkishness likely past (holds through H2); Overweight China/India equities on a broadening rotation and softer USD, raised semis to 35-40%, OW EM USD govvies, hold TIPS; oil in a controlled $70-90 range.", "category": "bank_regional", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-17-7-2026/?mvog=1"}, {"source": "moodys_analytics", "name": "Moody's Analytics", "stance": "A 'K-shaped' global economy where the AI boom has prevented a steeper downturn; global growth slowing to 2.5% in 2026. Cautions AI will not solve US fiscal problems; ECB seen on hold; Middle East volatility skews Europe's risks down.", "category": "rating_agency", "url": "https://www.economy.com/economicview/analysis/423333/Global-Outlook-Running-Hot-Running-Cold"}, {"source": "oxford_economics", "name": "Oxford Economics", "stance": "Sees US H2 with decelerating inflation and reaccelerating growth as oil falls; a patient Fed (possible cut on the horizon) rather than hikes; flags France as the eurozone's next underperformer and widening wealth inequality.", "category": "general_independent", "url": "https://www.oxfordeconomics.com/resource/what-to-watch-for-in-the-us-in-h2/"}, {"source": "gavekal", "name": "Gavekal Research", "stance": "Independent/contrarian: a string of shocks has flipped the world from deflationary-boom to inflationary; US real yields rising (real cost of capital up) without capital flight; eurozone spread compression limited by the 2027 electoral calendar.", "category": "macro_independent", "url": "https://research.gavekal.com/teaser/the-meaning-of-higher-real-yields/"}, {"source": "bca_research", "name": "BCA Research", "stance": "Overweight Private Equity; rotate out of momentum into quality and hyperscalers; downgrade Late-Stage Venture Capital, via its new public-plus-private Portfolio Construction platform.", "category": "macro_independent", "url": "https://www.bcaresearch.com/marketing/webcasts/quarterly-outlook-portfolio-construction/221556"}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "stance": "Bullish gas/power: Henry Hub toward ~$5/mmbtu real by 2035 on AI data-center demand and LNG; oil producers reaping an H1 windfall (Brent ~$15/bbl above budget) while upstream capex still declines; power access, not compute, now the AI constraint.", "category": "energy_commodities", "url": "https://www.woodmac.com/news/opinion/upstream-oil-and-gas-2026-outlook-half-time-report/"}, {"source": "rbc", "name": "RBC Capital Markets", "stance": "Energy risks reignited (Hormuz flows 3.9 mb/d, thin buffers); nuclear resurgence structural; China's EV dominance (65% home share) spreading via European localization, potentially 20-25% of the US market long-term.", "category": "bank_regional", "url": "https://www.rbccm.com/en/insights/2026/07/energy-market-risks-reignited-after-iran-ceasefire-collapses"}, {"source": "lazard", "name": "Lazard", "stance": "2026 LCOE+: renewables remain the cheapest new-build despite inflationary cost pressures; a 'speed-to-power era' where value accrues to whoever delivers capacity fastest, needing a diverse fleet and faster permitting.", "category": "bank_regional", "url": "https://www.lazard.com/research-insights/levelized-cost-of-energyplus-lcoeplus/"}, {"source": "invesco", "name": "Invesco", "stance": "Midstream/MLPs outperforming (AMZ +18.5% YTD TR vs S&P +10.2%) as an energy-volatility hedge; >17 bcf/d of new US LNG export capacity by 2031 backs the structural case.", "category": "asset_manager", "url": "https://www.invesco.com/us/en/insights/latest-steelpath-commentary-on-midstream-energy-infrastructure-industry.html"}, {"source": "hsbc", "name": "HSBC", "stance": "Highlights private markets as a multi-decade secular growth trend (banks' balance-sheet retreat), with the wealth channel and infrastructure/data-centres the next access frontier (via Ares' Arougheti).", "category": "bank_bulge", "url": "https://www.business.hsbc.com/en-gb/insights/five-insights-on-private-markets"}, {"source": "galaxy_digital", "name": "Galaxy Digital", "stance": "Structurally bullish crypto (BTC $250k by end-2027) but 2026 range-bound/chaotic; the big thesis is 'inference capital markets' — GPU futures and onchain compute financing — plus resilient crypto leverage post the Oct stress test.", "category": "crypto_research", "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi"}, {"source": "coinshares", "name": "CoinShares", "stance": "Bitcoin base-building with a likely floor after $8bn of ETF outflows reversed, but upside capped below $80k absent a policy shift; stablecoins the structural growth story (10x view), with sanctions/freeze risk rising.", "category": "crypto_research", "url": "https://coinshares.com/insights/research-data/market-update-17-07-2026/"}, {"source": "chainalysis", "name": "Chainalysis", "stance": "Documents an escalating state crackdown on crypto crime — the largest coordinated cyber-sanctions action to date (Trickbot/'Stern', >$300m) and OFAC freezing ~$475m of Iran-linked stablecoins via Tether.", "category": "crypto_research", "url": "https://www.chainalysis.com/blog/ofac-sanctions-iran-central-bank-crypto-wallets-freezing-131m-in-stablecoins/"}, {"source": "t_rowe_price", "name": "T. Rowe Price", "stance": "Crypto edging mainstream via regulated ETPs (launched active spot multi-token TKNZ); treats Bitcoin as a gold-like macro asset distinct from a broadening altcoin market. Weekly: US equities pulled back on the AI/semis unwind.", "category": "asset_manager", "url": "https://www.troweprice.com/en/us/insights/crypto-edges-into-the-mainstream"}, {"source": "brookings", "name": "Brookings Institution", "stance": "Policy-focused: proposes an institutionalized framework for Chinese-tech risk, maps a fragmenting AI-governance landscape, and analyses fragile-state investment and the decline of ordinary appropriations law.", "category": "geopolitics", "url": "https://www.brookings.edu/articles/a-new-risk-framework-for-chinese-technology-products-and-investments/"}, {"source": "carnegie", "name": "Carnegie Endowment", "stance": "Geopolitics deep-dives: a 'Europe from Scratch' redesign, Egypt's fragile military 'landlord' economy, Haiti stabilization, and how European deference to Trump delivered modest Ukraine wins.", "category": "geopolitics", "url": "https://carnegieendowment.org/europe/research/2026/07/europe-from-scratch-visions-for-a-new-european-order"}, {"source": "peterson_institute", "name": "Peterson Institute", "stance": "Argues US hegemony is ending largely by self-inflicted choices; Trump's Brazil tariffs expose weak US trade leverage as China absorbs ~37% of Brazil's trade.", "category": "geopolitics", "url": "https://www.piie.com/blogs/realtime-economics/2026/end-americas-hegemony"}, {"source": "world_bank", "name": "World Bank", "stance": "Development research: adaptive social protection (depth beats breadth; disasters push ~12.7m into poverty/yr), repurposing East Asia's rice subsidies, jobs-vs-nature 'Erysichthon's Curse', and Africa's water opportunity.", "category": "central_bank", "url": "https://blogs.worldbank.org/en/developmenttalk/when-disaster-strikes--who-gets-help--the-case-for-smarter-socia"}, {"source": "deloitte", "name": "Deloitte", "stance": "On AI, argues adoption metrics mislead and firms should measure true 'adaptation': tool access expanded 50% in a year yet <60% of workers with access use AI and 84% of organizations have not redesigned jobs/workflows around it.", "category": "consulting", "url": "https://www.deloitte.com/us/en/insights/research-centers/center-for-integrated-research.html?icid=disidenav_center-for-integrated-research"}, {"source": "pwc", "name": "PwC / Strategy&", "stance": "Asset & wealth management faces a 'profitability paradox': AUM to $200trn by 2030 but profit/AUM falling; passives, alternatives and tokenised funds the growth vectors, with AI and scale the winners' edge.", "category": "consulting", "url": "https://www.pwc.com/gx/en/issues/transformation/asset-and-wealth-management-revolution.html"}, {"source": "ey", "name": "EY", "stance": "Niche: cross-border remote/flexible work is opening a tax gray zone (payroll withholding, social security, permanent-establishment risk) that digital-nomad visas do not resolve.", "category": "consulting", "url": "https://www.ey.com/en_gl/insights/workforce/why-global-workforce-mobility-faces-a-new-tax-inflection-point"}, {"source": "absolute_strategy_research", "name": "Absolute Strategy Research", "stance": "Thin coverage this period — no substantive research note met the bar; no house view inferred.", "category": "macro_independent", "url": ""}, {"source": "delphi_digital", "name": "Delphi Digital", "stance": "Thin coverage this period — only marketing/thin pages; no substantive crypto view to report.", "category": "crypto_research", "url": ""}, {"source": "ecb", "name": "European Central Ba function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}
function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}
function pills(cats) {
  if (!cats) return '';
  if (Array.isArray(cats)) return cats.map(pill).join(' ');
  return pill(cats);
}
function externalLink(url, label) {
  if (!url) return '';
  return `<a class="item-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${label || 'link →'}</a>`;
}
function nameLink(url, name) {
  if (!name) return '';
  if (!url) return `<span class="item-source">${escapeHtml(name)}</span>`;
  return `<a class="item-source" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderThemeItem(it) {
  return `
    <div class="theme-item">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.thesis || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderTheme(theme) {
  const items = (theme.items || []).map(renderThemeItem).join('');
  return `
    <div class="theme">
      <div class="theme-head">
        ${pills(theme.category)}
        <div class="theme-title">${escapeHtml(theme.theme || '')}</div>
      </div>
      <div class="theme-stance">
        ${theme.consensus ? `<div class="theme-line consensus"><span class="lbl">Consensus</span>${renderBold(theme.consensus)}</div>` : ''}
        ${theme.divergence ? `<div class="theme-line divergence"><span class="lbl">Divergence</span>${renderBold(theme.divergence)}</div>` : ''}
      </div>
      ${items ? `<div class="theme-items">${items}</div>` : ''}
    </div>`;
}

function renderCall(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${pills(it.category)}
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.call || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderDeepRead(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url, 'read →')}
      </div>
      ${it.title ? `<div class="item-title">${escapeHtml(it.title)}</div>` : ''}
      <div class="item-text">${renderBold(it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderChart(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.chart || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderHouseView(hv) {
  const name = hv.name || hv.source || '';
  const nameHtml = hv.url
    ? `<a class="hv-name" href="${escapeAttr(hv.url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : `<span class="hv-name">${escapeHtml(name)}</span>`;
  return `
    <div class="hv-row">
      ${nameHtml}
      <span class="hv-stance">${renderBold(hv.stance || '')}</span>
    </div>`;
}

function renderSection(letter, name, items, render, extraClass) {
  if (!items || !items.length) return '';
  const body = items.map(render).join('');
  const cls = 'section' + (extraClass ? (' ' + extraClass) : '');
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderTopStats(d) {
  const parts = [];
  const p = d.period || {};
  const is = d.input_stats || {};
  const cv = d.coverage || {};
  if (p.from && p.to)
    parts.push(`period <strong>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</strong>`);
  else if (p.lookback_days != null)
    parts.push(`lookback <strong>${p.lookback_days}d</strong>`);
  if (is.total_articles != null) parts.push(`articles <strong>${is.total_articles}</strong>`);
  if (is.sources_present != null) parts.push(`sources <strong>${is.sources_present}</strong>`);
  if (is.after_filter != null) parts.push(`after filter <strong>${is.after_filter}</strong>`);
  if (cv.coverage_pct != null) {
    const pct = (cv.coverage_pct <= 1 ? cv.coverage_pct * 100 : cv.coverage_pct);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  } else if (cv.sources_covered != null && cv.sources_total != null) {
    parts.push(`coverage <strong>${cv.sources_covered}/${cv.sources_total}</strong>`);
  }
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.period && d.period.to) return d.period.to;
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

// ---------- interactions ----------
function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  const s = d.sections || {};
  const out = [
    renderSummary(d.summary),
    renderSection('A.', 'Debates — Consensus vs Divergence', s.A_debates,    renderTheme),
    renderSection('B.', 'Key Calls & Positioning',           s.B_calls,      renderCall),
    renderSection('C.', 'Notable Deep Reads',                s.C_deep_reads, renderDeepRead,
                  'section-deepreads'),
    renderSection('D.', 'Charts & Data',                     s.D_charts,     renderChart),
    renderSection('E.', 'House Views',                       s.house_views,  renderHouseView),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = out || '<div class="empty">No report data.</div>';

  // Auto-open Summary's section view: first two sections open by default.
  document.querySelectorAll('.section').forEach((sec, i) => {
    if (i < 2) sec.classList.add('open');
  });
}

renderReport(REPORT_DATA);
</script>
