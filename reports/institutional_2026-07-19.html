<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Institutional Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #7c3aed;          /* purple — institutional report accent */
  --accent-soft: #f3eefc;
  --divergence: #d94052;      /* divergence red */
  --consensus: #15803d;       /* consensus green */
  --yellow: #fff5b3;

  /* category colors (institutional schema: rates, growth, fx, equities,
     credit, crypto, energy, commodities, geopolitics, ai_tech, em) */
  --cat-rates: #2563eb;
  --cat-growth: #d97706;
  --cat-fx: #0891b2;
  --cat-equities: #15803d;
  --cat-credit: #be185d;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-commodities: #ea580c;
  --cat-geopolitics: #b91c1c;
  --cat-ai_tech: #4f46e5;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 12px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR (top: period + coverage) */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 10px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* THEME CARD (Section A) */
.theme { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.theme:last-child { border-bottom: none; }
.theme-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
              flex-wrap: wrap; }
.theme-title { font-weight: 600; font-size: 14.5px; }
.theme-stance { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 10px; }
@media (min-width: 720px) { .theme-stance { grid-template-columns: 1fr 1fr; } }
.theme-line { font-size: 13px; padding: 8px 10px; border-radius: 4px;
              border-left: 3px solid var(--border); background: #fafafa; line-height: 1.5; }
.theme-line.consensus { border-left-color: var(--consensus); background: #f0f9f3; }
.theme-line.divergence { border-left-color: var(--divergence); background: #fdf6f7; }
.theme-line .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px;
                   text-transform: uppercase; letter-spacing: .06em;
                   color: var(--text-3); display: block; margin-bottom: 2px; }
.theme-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
               border-left: 2px solid var(--border-light); }
.theme-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-source { font-weight: 600; color: var(--accent); }
a.item-source { text-decoration: none; }
a.item-source:hover { text-decoration: underline; }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-title { font-weight: 600; font-size: 14px; margin: 4px 0 6px; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DEEP READS (Section C) — purple left border to mark flagship long-form */
.section-deepreads .item-card { border-left: 4px solid var(--accent); background: var(--accent-soft); }

/* HOUSE VIEWS — compact one-line-per-source list */
.hv-row { display: flex; gap: 10px; align-items: baseline;
          padding: 6px 16px; border-bottom: 1px solid var(--border-light);
          font-size: 13px; }
.hv-row:last-child { border-bottom: none; }
.hv-name { font-weight: 600; color: var(--accent); min-width: 180px;
           text-decoration: none; }
.hv-name:hover { text-decoration: underline; }
.hv-stance { color: var(--text); flex: 1; }

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 110px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .hv-row { flex-direction: column; gap: 2px; }
  .hv-name { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_type": "INSTITUTIONAL RESEARCH", "collected_at": "2026-07-19T02:01:41+00:00", "period": {"lookback_days": 10, "from": "2026-07-09", "to": "2026-07-18"}, "input_stats": {"total_articles": 415, "sources_present": 52, "after_filter": 160}, "summary": "**Fed & rates:** The consensus flipped hawkish — the Fed is on hold at 3.50-3.75% under new Chair **Kevin Warsh**, who scrapped forward guidance, the dot-plot and cut the statement to 132 words, with futures at one point pricing a Sept hike before a soft June CPI (-0.4% m/m) halved it. The sharpest split: **UBS** and **BNP (Iggo)** call market pricing too hawkish and see yields falling (UBS: Brent $85 year-end, first cut pushed to early 2027), while **BoE's Catherine Mann** and the Waller wing **PIMCO** tracks are openly floating actual hikes; Warsh's team sees neutral at 3.5-4.0% vs the FOMC's old 3.0%.\n\n**Middle East & oil:** Near-unanimous that the Iran ceasefire's collapse and Strait of Hormuz closure is the dominant tail risk, but houses disagree on severity — **RBC's Helima Croft** is most alarmed (Hormuz flows down to 3.9 mb/d, Cushing at operational minimums, SPR at 43-year lows), while **Citi** models Brent averaging just $75/$70/bbl into Q4 and **BNP** notes Brent rose only ~6-20% (vs 12% in March), a 'realistic not complacent' market with analysts again floating a 2027 glut.\n\n**AI capex & financing:** Everyone agrees the capex supercycle is real and now debt-funded — estimates run from **UBS's** ~$820bn 2026 hyperscaler capex to **Goldman's** ~$5.5-6trn 2025-30 financing need and **Western Asset's** ~$5.3trn (JPMorgan) through 2030. The divergence is on fragility: **Man Group** flags ~$627bn cloud backlog with ~49% tied to just OpenAI/Anthropic (bubble-territory semis), while **Goldman** counters only one of four bubble signals is flashing and **PIMCO's Karoui** argues discipline exceeds the late-1990s.\n\n**US equities & earnings:** Broad constructive tilt on a ~22-24% Q2 EPS surge, but targets fan out widely — **Citi 8,100** and **UBS 8,200** (by mid-2027) at the bulls' end versus **Franklin Templeton's** more cautious 7,400-7,800 (S&P at 7,458). The real fight is breadth: bulls (StanChart, Franklin, UBS) bet on broadening beyond a flat Mag-7 into small caps/EM/semis, while **BNY**, **Vanguard** and **Schroders** warn valuations are extreme (20 stocks = 74% of MSCI ACWI's return) and favor quality/value ballast.\n\n**Crypto:** Consensus is range-bound, base-building bitcoin — **CoinShares** sees a floor after an 8-week $8bn ETF outflow streak reversed to +$287m but caps upside below $80k absent a policy shift; **Galaxy** is structurally bullish (BTC $250k by end-2027) but says 2026 is 'too chaotic to predict' with downside risk until BTC re-establishes above $100-105k. Stablecoins are the growth story (Ethena's Young: 10x in five years) even as OFAC froze ~$475m of Iran-linked stablecoins.\n\n**UK gilts & politics:** Agreement that UK gilts are uniquely out of favour and the BoE holds Bank Rate at 3.75% through 2026 amid the Starmer-to-Burnham transition, but the diagnosis differs — **Man Group's Neville** says it is NOT a debt story (debt/GDP ~100%) but inflation (25% index-linked) and political instability, while **BoE's Alan Taylor** argues rates are ~75bps above a 3% neutral and should resume falling toward neutral once energy clears.\n\n**Credit:** Universal caution that IG/HY spreads are historically tight (EU HY 315bp, IG targets ~90bp) leaving little room for error, with AI/hyperscaler issuance (>$182bn YTD vs $13bn a year ago) the dominant technical. **Schroders** and **Franklin Templeton** go underweight/low corporate credit, preferring MBS, munis and EM; **BNP** stays constructive on carry, preferring single-B over BB in European HY.\n\n**EM, China & broadening:** Widespread appetite to add outside the US on valuation gaps (China ~11.4x vs S&P ~22x) — **UBS**, **Standard Chartered** and **Franklin Templeton** are overweight China/India/Asia on a broadening rotation and softer dollar, while **KKR** overweights Asia and real assets. The counterpoint: **Goldman** sees the dollar still strengthening on US exceptionalism, and EM debt houses (**BNP**) stress the oil-exporter (GCC) vs importer (India, Turkey) split now dominates country selection.", "sections": {"A_debates": [{"theme": "Rates & Central Banks: the Warsh regime and the hold-vs-hike debate", "category": ["rates"], "consensus": "Houses broadly agree the Fed is on an extended hold at 3.50-3.75% and that new Chair Kevin Warsh has overhauled the framework — scrapping forward guidance and the dot-plot, cutting the FOMC statement to 132 words, doubling down on the 2% target and launching task-forces (Barclays, BNP, Goldman, Gavekal). June FOMC minutes showed officials split but holding; a soft June CPI (-0.4% m/m, headline to 3.5% y/y, core 2.6%) then halved what had been more than a full hike priced for September (CoinShares, Standard Chartered, Schroders).", "divergence": "On direction the houses split hard. UBS argues market pricing is too hawkish, the bar for a hike is high, and 10y yields (~4.57%) should fall as the year progresses, pushing its first-cut call to early 2027; BNP's Chris Iggo warns the opposite — if inflation fails to fall, yields rise further, monthly CPI has averaged 0.5% vs 0.27% since 2016, and Treasuries returned just +0.43% YTD vs ~3% CPI. PIMCO's Wilding flags Governor Waller as the first FOMC voter to publicly float conditional hikes while keeping a 2026-hold baseline, and Goldman sees the dot plot shifted materially hawkish (~a full hike priced by year-end) reinforcing dollar strength. BNP's sovereign team notes markets now price neutral at 3.5-4.0% versus the FOMC's old 3.0% estimate, with the 10y range-bound 4.35-4.65%. Barclays' strategists agree Warsh's diagnosis is right but split on execution: Rajadhyaksha warns removing the anchor amid an oil shock raises term premium and flash-crash risk, while Rogoff says surfaced volatility is healthier than false certainty.", "items": [{"source": "barclays", "name": "Barclays", "thesis": "The Flip Side Ep.85: Warsh scrapped forward guidance, cut the statement to 132 words and dropped his dot; rates ~3.5%, CPI 4.2%. Rajadhyaksha warns removing the anchor amid an oil shock raises term premium/mortgage/credit costs and flash-crash risk; Rogoff says markets can infer the reaction function.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/the-flip-side-podcast/if-the-fed-goes-quiet-do-markets-make-more-noise.html", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "Views market pricing of policy as too hawkish; bar for a Fed hike is high, global yields should fall (10y UST ~4.57%, Bund ~3.07%). Brent ends year at $85 (below $120 wartime peak); lock in yields in short/intermediate quality USD/GBP bonds. Pushed first cut to early 2027.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-09072026.html", "images": []}, {"source": "pimco", "name": "PIMCO", "thesis": "Waller turned unexpectedly hawkish — first FOMC voter to float conditional hikes if inflation runs hot — but cooler June CPI removed a near-term hike. Core PCE accelerated to 3.4% (May), core CPI 2.6-2.9%; baseline still Fed on hold through 2026 with elevated starting yields cushioning bonds.", "url": "https://www.pimco.com/us/en/insights/fed-policymaker-comments-raise-the-stakes-for-inflation-data", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "thesis": "Dollar could keep strengthening on the US-Iran conflict, intact AI trade and a more hawkish Fed; markets price ~6-7bps for July and a bit more than a full hike by year-end, with the dot plot materially more hawkish. Play dollar momentum via options.", "url": "https://www.goldmansachs.com/insights/the-markets/why-the-us-dollar-could-continue-to-strengthen", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "thesis": "'Get real, bonds': inflation is the key variable; the truce collapse pushed oil +20% in July. US Treasuries +0.43% YTD vs ~3% CPI; monthly CPI averaging 0.5% this year. Prefers short-duration/credit (US IG 5.3% vs 3.5% CPI) and equities as an inflation hedge; worst case a sharp yield rise triggering equity de-rating.", "url": "https://viewpoint.bnpparibas-am.com/view-from-the-markets-get-real-bonds/", "images": []}, {"source": "oxford_economics", "name": "Oxford Economics", "thesis": "Warsh's preferred trimmed-mean PCE needs reassessment; inflation breadth widening for goods, narrowing for services amid tariffs/energy. Recommends a cautious, patient Fed rather than immediate hikes to return inflation to 2%.", "url": "https://www.oxfordeconomics.com/resource/warshs-preferred-us-inflation-measure-needs-a-trim/", "images": []}, {"source": "gavekal", "name": "Gavekal Research", "thesis": "US real yields rising — long-term TIPS yields broke above post-2008 highs while nominal 20/30y stay range-bound — so the real cost of capital is rising; not capital flight since the dollar appreciated. Warsh has launched task-forces on AI's impact on productivity, employment and inflation.", "url": "https://research.gavekal.com/teaser/the-meaning-of-higher-real-yields/", "images": []}]}, {"theme": "UK: gilts, the BoE hold, and the Burnham transition", "category": ["rates", "growth"], "consensus": "Consensus sees the BoE on hold at Bank Rate 3.75% through 2026 — the June/April rounds took previously-expected cuts off the table (an active tightening vs market expectations) — amid a soft economy and the political transition from Starmer to front-runner Andy Burnham (BoE speeches, BNP, Citi, Man Group). Gilts are uniquely out of favour, with the UK 10y at/near the joint-highest among large developed peers.", "divergence": "The houses diverge on why gilts are cheap and where rates go. Man Group's Henry Neville argues it is NOT a debt story — UK debt/GDP is ~100% (only slightly above its 95% average) — but rather unusually high inflation (with ~25% of public liabilities index-linked, more than double peers) and political instability lifting the term premium; his fix is fiscal consistency and inflation discipline. Within the MPC, Alan Taylor is dovish-leaning — he puts nominal neutral at 3% (so 3.75% is ~75bps restrictive), expects inflation to peak at ~3.25% (half a point below the April MPR), and argues rates can resume falling toward neutral in a benign scenario. Catherine Mann is the hawk — the Middle East shock has shifted her toward a longer hold and potentially a hike, expecting persistent energy prices and firm pricing to keep inflation above 2% within the horizon. Governor Bailey sits between: he had expected 2% by April/May but the energy shock delays it, and he stresses the UK's deeper ~1.3% potential-growth problem.", "items": [{"source": "man_group", "name": "Man Group", "thesis": "'Andy Burnham, Can You Hear Me?': UK 10y among highest of DM peers, but not a debt story (debt/GDP ~100% vs 95% average). True outliers are high inflation (~25% of liabilities index-linked) and political instability lifting term premium; debt interest added £82bn over 4 years. Prescription: fiscal consistency, continuity, inflation discipline.", "url": "https://www.man.com/insights/road-ahead-andy-burnham", "images": []}, {"source": "boe", "name": "Bank of England (Alan Taylor)", "thesis": "'Central reservations': puts UK nominal neutral at 3%, so Bank Rate 3.75% is ~75bps restrictive; expects inflation to peak ~3.25% (½pt below April MPR), wages normalised to 3-3.5%. In a benign 'Scenario T' rates can resume falling to neutral; an extended hold at 3.75% is the correct measured response for now.", "url": "https://www.bankofengland.co.uk/speech/2026/june/alan-taylor-speech-at-the-barclays-cepr-monetary-policy-forum", "images": []}, {"source": "boe", "name": "Bank of England (Catherine Mann)", "thesis": "Hawkish/activist: the Middle East conflict shifted her from near-cut toward a longer hold and potentially a hike to lean against inflation persistence. Expects higher energy prices to persist; administered prices and NICs added 0.7pp; leans on de-anchoring research to justify her stance.", "url": "https://www.bankofengland.co.uk/speech/2026/july/catherine-l-mann-fireside-chat-at-the-natixis-cib-conference-on-private-debt", "images": []}, {"source": "boe", "name": "Bank of England (Andrew Bailey)", "thesis": "Mansion House: expected inflation back to 2% around April/May but the energy shock delays it; stresses UK potential-supply growth fell from ~2.8% pre-crisis to ~1.3%. Bank returns reached 15.4%, P/B ~1.7x; FPC cut benchmark Tier 1 from 14% to 13% of RWA; flags a future digital gilt (DIGIT).", "url": "https://www.bankofengland.co.uk/speech/2026/july/andrew-bailey-speech-at-manison-house", "images": []}, {"source": "citi_gps", "name": "Citi", "thesis": "Targets Gilt 10y at 4.85%; a UK piece (Manthey, Rostom) weighs rates/FX/equity implications after Starmer's resignation with Burnham the front-runner.", "url": "https://www.citigroup.com/global/insights/global-markets-and-economy", "images": []}]}, {"theme": "Middle East oil shock, energy security and the power crunch", "category": ["energy", "geopolitics", "commodities"], "consensus": "The collapse of the Iran ceasefire and closure of the Strait of Hormuz is treated as the dominant macro tail risk and a negative energy supply shock (Amundi, BoE, RBC, Moody's, UBS, Deutsche Bank). Separately, near-universal agreement that AI data-centre demand is straining power/electricity supply, making 'speed-to-power' and dispatchable gas the swing factor (Wood Mackenzie, Lazard, RBC, Barclays).", "divergence": "Severity estimates split sharply. RBC's Helima Croft is most alarmed: Hormuz seven-day flows collapsed to 3.9 mb/d, the IMO deemed the Strait too dangerous, Cushing is at operational minimums and the US SPR at 43-year lows, with ~4 mb/d of Russian refining knocked offline. Citi is far more sanguine, modelling Brent averaging just $75/bbl in Q3, $70 in Q4 and $65 in 2027; UBS sees Brent ending the year at $85 (well below the $120 wartime peak) with limited core pass-through; Standard Chartered pegs a controlled $70-90 range. BNP reads the market as realistic-not-complacent (Brent up only ~6-20%, analysts again floating a 2027 glut). On gas, Wood Mackenzie is structurally bullish — Henry Hub heading toward ~$5/mmbtu real by 2035 — while Lazard stresses renewables remain the cheapest new-build even as costs rise.", "items": [{"source": "rbc", "name": "RBC Capital Markets (Helima Croft)", "thesis": "Energy risks reignited: Hormuz 7-day-avg flows collapsed to 3.9 mb/d, IMO deemed the Strait too dangerous; Saudi surged Red Sea exports to ~4 mb/d (now at Houthi risk). Cushing at operational minimums, SPR at 43-year lows; Ukraine knocked ~4 mb/d of Russian refining offline, cutting July diesel exports to ~110 kb/d.", "url": "https://www.rbccm.com/en/insights/2026/07/energy-market-risks-reignited-after-iran-ceasefire-collapses", "images": []}, {"source": "amundi", "name": "Amundi", "thesis": "Tensions flared in the Strait of Hormuz (Iran attacked ships, US airstrikes), pushing Brent back toward $80/bbl; expects Brent under pressure near-term and volatile markets; yields rose on hawkish CB expectations, gold fell as hike odds rose. Advises diversification across regions/asset classes.", "url": "https://research-center.amundi.com/article/tensions-flare-amid-fragile-ceasefire", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "thesis": "'Defying gravity': the era of cheap US Henry Hub gas is ending — a sustained rise toward ~$5/mmbtu real by 2035 as AI data-centre demand, record LNG FIDs and depleting supply converge. Separately, ~13-14 mt of LNG is unavailable due to the Middle East conflict, pulling buyers toward North American LNG.", "url": "https://www.woodmac.com/horizons-live/henry-hub-natural-gas-prices-set-to-rise-webinar-replay/", "images": []}, {"source": "lazard", "name": "Lazard", "thesis": "2026 LCOE+: despite inflationary cost pressures across all technologies, renewables remain the cheapest new-build generation unsubsidised. Frames a 'speed-to-power era' where value shifts to whoever delivers capacity fastest; storage costs rose this year, reversing declines.", "url": "https://www.lazard.com/research-insights/levelized-cost-of-energyplus-lcoeplus/", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "thesis": "Upstream 2026 half-time: Brent potentially averaging at least $15/bbl above the ~$60/bbl budgeted, making nearly all firms net beneficiaries; global upstream development capex still set for a second year of slight decline as operators defer. Concentration risk could spur a 2027 M&A wave.", "url": "https://www.woodmac.com/news/opinion/upstream-oil-and-gas-2026-outlook-half-time-report/", "images": []}, {"source": "invesco", "name": "Invesco (SteelPath)", "thesis": "Midstream outperformed in June — Alerian MLP (AMZ) -0.04% vs S&P -0.95% TR; YTD AMZ +18.48% TR vs S&P +10.19%. Over 17 bcf/d of US LNG export capacity due by end-2031, likely filling the void from damaged Middle East export capacity.", "url": "https://www.invesco.com/us/en/insights/latest-steelpath-commentary-on-midstream-energy-infrastructure-industry.html", "images": []}, {"source": "rbc", "name": "RBC Capital Markets", "thesis": "Nuclear's resurgence is structural not cyclical — driven by electrification, AI and hyperscale data centres; affordability/financeability (not safety/waste) is the historic constraint. Utilities extending plant lifetimes and investing in large reactors and SMRs; regulation and supply chains are the bottlenecks.", "url": "https://www.rbccm.com/en/insights/2026/06/perspectives-on-nuclear-what-industry-leaders-see-ahead", "images": []}, {"source": "bridgewater", "name": "Bridgewater (Daniel Yergin)", "thesis": "Podcast with Pulitzer winner Yergin on energy as the hub connecting mercantilism, AI and the Iran war; how producers respond to 'the mother of all supply shocks', the global push for energy security, and the race to power the AI build-out.", "url": "https://www.bridgewater.com/research-and-insights/pulitzer-prize-winner-dan-yergin-on-how-the-iran-war-is-reshaping-the-energy-map-and-the-race-to-power-ai", "images": []}]}, {"theme": "AI capex & financing supercycle — bubble or discipline?", "category": ["ai_tech", "credit", "equities"], "consensus": "There is near-universal agreement that AI capex is the dominant driver of US growth, capex and earnings, that it has moved into a debt-financed phase, and that power/compute (not demand) is now the binding constraint. Scale estimates cluster large: BNP cites ~$835bn committed by top US hyperscalers in 2026; UBS ~$820bn (+68% y/y); BlackRock ~$715bn (+80% y/y); Goldman/Franklin ~$5.3-6trn of financing through 2030; PIMCO ~$1.6trn for 2026-27.", "divergence": "The debate is bubble-vs-discipline. Man Group is the loudest bear — semiconductor valuations are in bubble territory (China's domestic semi index +100% in six months) and there is systemic concentration risk: ~$627bn cloud backlog with nearly 49% tied to just OpenAI and Anthropic, a 2000-style lock-up pressure point likely in 2027. Goldman pushes back — AI has added ~$27trn of market value since 2022 but only one of four bubble signals (accelerating investment) is flashing, since margins rose and balance sheets are stable. PIMCO's Karoui argues discipline is greater than the late-1990s; BlackRock's Rieder rejects the bubble label (Mag-7 forward P/E fell 34.1x to 25.8x). Vanguard is most cautious that AI upside is 'already priced in' and end-users, not builders, may be the winners; Franklin Templeton says the rally is far from dot-com territory and broadening to picks-and-shovels and ex-US. Western Asset reframes the real story as the financing wave itself; Galaxy takes it furthest, building tradeable 'inference capital markets' (GPU futures) around it.", "items": [{"source": "man_group", "name": "Man Group", "thesis": "H2 tech outlook: semis in bubble territory (China domestic semi index +100% in 6 months) yet no correction; systemic concentration — ~$627bn cloud backlog, ~49% tied to just OpenAI/Anthropic; ~$2trn of tech IPO cap coming in NY/HK; 2000-style lock-up pressure point likely 2027. China underpriced in hardware and open-source.", "url": "https://www.man.com/insights/h2-2026-technology-outlook", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "thesis": "US tech investment/GDP has breached its 1990s peak; 2026 capex plans ~50% higher than 6 months ago; AI names added ~$27trn since late 2022. Unlike dotcom, margins rose and balance sheets are stable — only one of four bubble signals (accelerating investment) is flashing. Risk: overestimating how long above-average profits last.", "url": "https://www.goldmansachs.com/insights/articles/are-us-stock-market-valuations-outpacing-fundamentals", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton (Western Asset)", "thesis": "'Beyond the Chips': AI's under-covered story is its financing — one of the largest credit-supply waves ever. Cites MS ~$2.9T data-center investment to 2028, JPM ~$5.3T to 2030 vs big-five operating cash flow $5.5T; ~$500B hyperscaler financing plus ~$186B HY/loans/private credit and ~$150B ABS/CMBS. >$100B hyperscaler bond issuance in 2025.", "url": "https://www.franklintempleton.com/articles/2026/fixed-income/beyond-the-chips-hyperscalers-and-the-financing-of-ai", "images": []}, {"source": "pimco", "name": "PIMCO (Lotfi Karoui)", "thesis": "AI capex supercycle ~$1.6trn for 2026-27, now largely debt-funded, but discipline is greater than the late-1990s. Direct-lending stress is cyclical not systemic (~15% redemption requests, stale BDC marks, default cycle begun). Late-cycle, rebalance from ~90/10 toward 60/40, favouring bonds for convexity and EM.", "url": "https://www.pimco.com/us/en/insights/podcasts/accrued-interest/lotfi-karoui-on-private-credit-and-the-ai-capex-supercycle", "images": []}, {"source": "vanguard", "name": "Vanguard", "thesis": "Much of AI's promise is already priced in: bullish long-term with a genuine 1-2yr earnings boom, but P/Es historically compress as earnings mature; expectations high and concentrated in narrow US/Asian tech. Markets may underestimate value and ex-US; ultimate winners may be AI end-users, not builders.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/how-much-upside-remains-for-ai-driven-equity-returns.html", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs (GSAM)", "thesis": "After a June Silicon Valley trip, enterprise AI adoption is accelerating — an 'unprecedented up-cycle'; compute availability is the binding constraint (top 5% of firms consume 3x the tokens of the median). Sees opportunity in fiber-optic suppliers as data centers switch copper to fiber.", "url": "https://www.goldmansachs.com/insights/articles/ai-investment-is-shifting-as-inference-enterprise-adoption-accelerate", "images": []}, {"source": "gavekal", "name": "Gavekal Research", "thesis": "Will the maturing AI boom prove inflationary or deflationary? Conventional path is inflationary early (heavy capex) then deflationary as productivity materialises; timing is the key uncertainty. If AI raises capacity it could allow stronger growth with less inflation.", "url": "https://research.gavekal.com/teaser/will-the-ai-boom-prove-inflationary-or-deflationary/", "images": []}, {"source": "federal_reserve", "name": "Federal Reserve", "thesis": "Frames the AI boom as an investment-specific tech shock that boosts high-tech capital-goods imports — historically ~10% current-account deterioration, potentially more given ~90% of equipment sourced from East Asia; rising AI input prices could pose greater inflation risk.", "url": "https://www.federalreserve.gov/econres/notes/feds-notes/technology-shocks-the-ai-boomandthe-u-s-current-account-20260714.html", "images": []}, {"source": "barclays", "name": "Barclays", "thesis": "Cooling/water are under-appreciated AI buildout risks: rack power density jumped from 10-20kW to >100kW (heading to ~1MW); Google water use +30% in 2025 to 50bn liters. Hyperscalers diverge (Microsoft/Meta to stop evaporative cooling; Google/Amazon use low-risk-watershed water). Bullish compute/power but flags execution risks surfacing early 2027.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/barclays-brief/cooling-the-ai-buildout.html", "images": []}]}, {"theme": "US equities: earnings season, valuations and the breadth question", "category": ["equities", "ai_tech"], "consensus": "Broadly constructive on US equities into a strong Q2 season — houses cluster around ~22-28% Q2 EPS growth (UBS ~28%, Goldman/StanChart ~22-24%, Franklin 23.9%) with earnings, not multiples, doing the heavy lifting. Most agree the Mag-7 are roughly flat YTD and leadership must broaden for the rally to continue (UBS, Standard Chartered, Franklin Templeton, BofA/Zacks).", "divergence": "Targets and conviction fan out. Citi (8,100 year-end, EPS $350/$400) and UBS (8,200 by mid-2027, ACWI +10%) are the bulls; Franklin Templeton is more measured at 7,400-7,800 (EPS $344, index ~21.9x) with the S&P at 7,458. On whether valuations are dangerous, BNY warns the S&P excess earnings yield has narrowed to near zero, echoing 2000, and favours the quality factor; Schroders' Kyrklund calls valuations 'expensive and extreme' (20 stocks = 74% of MSCI ACWI's return) and leans away from the frothiest parts; Vanguard says AI upside is largely priced. Goldman's desk flags a 'very high bar' — the average S&P stock implies a ~5.5% earnings move — but notes clean (hedge-fund) positioning after ~75% of the April-low buyers sold ahead of earnings. Man Group and CoinShares/T. Rowe recap the mid-July semis unwind (Kospi -6.4%, Nikkei -6.44%, SOX -8.5%) as a positioning shakeout, which UBS reads as idiosyncratic-Korean rather than fundamental.", "items": [{"source": "blackrock_investment_institute", "name": "BlackRock (Rick Rieder)", "thesis": "Growth and AI capex are real but leadership is narrow — shift from broad beta to deliberate construction. A basket of 32 AI names added 12.0% to YTD S&P returns while the rest subtracted 2.3%. Rejects the bubble label (Mag-7 forward P/E 34.1x to 25.8x); flags consumer stress (card delinquencies 13.1%, BNPL late 47%).", "url": "https://www.blackrock.com/us/individual/insights/summer-markets-ai-investing", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "thesis": "US Market Desk constructive: S&P year-end 7,400-7,800 on 15%+ EPS growth, 2026 EPS $344 (up from $310), index 21.9x. 2026 real GDP 2.5%; reiterates a 'broadening' call favouring US small/mid-caps, EM and Japan; 10y UST 4.25-4.75%, bullish munis, USD ~flat.", "url": "https://www.franklintempleton.com/articles/series/from-the-market-desk", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "Earnings, not geopolitics, drive equities: forecasts S&P Q2 EPS +~28% with all 11 sectors growing; AI capex +68% to ~$820bn this year, +21% to ~$1tr next. Expects S&P 500 to reach 8,200 by mid-2027; sees semis contributing >40% of Q2 EPS growth, SOX +92% in 2026.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-15072026.html", "images": []}, {"source": "bny", "name": "BNY", "thesis": "Factor diversification matters now: AI is a powerful theme, not yet a bubble but entering a volatile phase; S&P excess earnings yield narrowed to near zero, echoing 2000. From 1996 through the dot-com bust the Quality index outperformed Value/Momentum/Tech and lost less — diversify style, stay in quality.", "url": "https://www.bny.com/investments/us/en/individual/articles/equities/a-sense-of-style-why-factor-diversification-matters-now.html", "images": []}, {"source": "schroders", "name": "Schroders (Johanna Kyrklund)", "thesis": "CIO Lens Q3: valuations expensive and extreme, but concentration is now less Mag-7 (flat YTD) and more that 20 stocks drove 74% of MSCI ACWI's return, led by AI sub-sectors like memory. Favours style diversification, quality now attractively valued; low recession odds still leave equity upside but lean away from the froth.", "url": "https://www.schroders.com/en-us/us/individual/insights/video-cio-lens-q3-2026---the-challenge-is-understanding-where-risks-accumulate-/", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs (Brian Garrett)", "thesis": "'Very high bar' into earnings: ~22% YoY EPS growth expected, the average S&P stock implying a ~5.5% move (60-70bps above normal). Low index realized vol vs very high single-stock vol; ~75% of April-low buyers sold ahead of earnings, leaving clean HF positioning. Hyperscalers need ~$5.5-6trn 2025-30, now filtering into fixed income.", "url": "https://www.goldmansachs.com/insights/the-markets/how-earnings-volatility-and-ai-capex-are-affecting-us-markets", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "'Understanding semis volatility': the sell-off (Samsung -8.8%, SK Hynix -11.5%, Kospi -6.4%, >25% below June peak) driven by the prior rally and idiosyncratic Korean factors (leveraged single-stock ETFs, 300k+ forced liquidations). Robust earnings (Samsung profit +19x, TSMC +77%); stays constructive on semis.", "url": "https://www.ubs.com/us/en/wealth-management/insights/investment-research/insights-display-adp/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-16072026.html", "images": []}, {"source": "deutsche_bank", "name": "Deutsche Bank", "thesis": "Private Bank quarterly: global growth moderating on the Iran energy shock; raised 2026 inflation forecasts and expects central banks to tilt tighter; still expects further equity gains over 12 months, price potential in high-quality bonds, gold as a diversifier, constructive on private markets.", "url": "https://wealth.db.com/en/insights/investing-insights/economic-and-market-outlook/perspectives-economic-and-asset-class-outlook-june-2026.html", "images": []}]}, {"theme": "Crypto: range-bound bitcoin, ETF flows and the stablecoin land-grab", "category": ["crypto"], "consensus": "Consensus is a range-bound, base-building bitcoin (~low $90,000s after an Oct all-time high of $126,080) with a likely floor in place after an eight-week $8bn spot-ETF outflow streak reversed to +$287m, but limited upside absent a monetary-policy shift (CoinShares, Galaxy, T. Rowe Price). Widespread agreement that stablecoins and tokenisation are the real structural growth vector, now reinforced by central banks (BoE, Fed).", "divergence": "On the path, CoinShares' Butterfill is tactically cautious — the floor is likely in but a break above $80,000 is unlikely without a policy shift, and CLARITY/CLARITY-Act odds fell from 74% to ~48%. Galaxy is structurally bullish — BTC to $250k by end-2027 — but concedes 2026 is 'too chaotic to predict' with options pricing roughly even odds of $50k vs $250k for year-end and downside risk until BTC firmly re-establishes above $100-105k. On stablecoins, Ethena's Guy Young (via CoinShares) sees a 10x, multi-trillion, winner-takes-most market, while the Fed's dollar conference and Prasad argue stablecoin growth reinforces rather than erodes dollar dominance; CoinShares' OUSD note flags margin pressure on Circle. Galaxy's leverage data provides the bullish structural counterpoint — despite the largest liquidation event in history (Oct 10), CeFi loanbooks showed few signs of stress, a structural improvement on 2022.", "items": [{"source": "coinshares", "name": "CoinShares", "thesis": "Sentiment turned on softer macro: after an 8-week $8B global outflow streak, +$287M inflows last week; July CPI/PPI misses halved the September hike priced. Floor likely in but upside capped — a break above $80,000 unlikely absent a monetary-policy shift; expects range trading.", "url": "https://coinshares.com/insights/research-data/market-update-17-07-2026/", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "thesis": "26 predictions for 2026: BTC roundtripped to low $90,000s after an Oct 6 ATH of $126,080. BTC to $250k by end-2027 (2026 too chaotic; options ~even odds of $50k vs $250k for year-end); downside risk until BTC firmly above $100-105k. Solana 'Internet Capital Markets' cap to $2bn from ~$750m.", "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi", "images": []}, {"source": "coinshares", "name": "CoinShares (Guy Young / Ethena)", "thesis": "Macro view stablecoins are 10x bigger within five years, becoming a multi-trillion subsector; USDe-type products to $100B-$200B in 3-5 years. Winner-takes-most (3-4 players ~90% share); USDe fell ~60% from a >$14B Oct 2025 peak to ~$5.9B by Mar 2026. Pursuing GENIUS-compliant USDtb onshore.", "url": "https://coinshares.com/insights/the-node/interview-guy-young-ethena-labs/", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "thesis": "Q4 2025 crypto leverage: crypto-collateralized lending fell 9.81% (-$7.55bn) QoQ to $69.55bn, all onchain deleveraging (DeFi -24.15% to $33.5bn) while CeFi grew 11.66% to $27.56bn. Despite the largest liquidation event in history (Oct 10), CeFi loanbooks showed few signs of stress — a structural improvement vs 2022. Tether 61.84% of CeFi lending.", "url": "https://www.galaxy.com/insights/research/state-of-crypto-leverage-q4-2025", "images": []}, {"source": "t_rowe_price", "name": "T. Rowe Price", "thesis": "Regulated ETPs moved crypto into the mainstream; launches the Active Crypto ETF (TKNZ), first actively managed spot multi-token ETP in the US. Distinguishes Bitcoin — now behaving like a macro asset comparable to gold given fixed supply — from the rest; BTC's share of total market cap has declined as the market broadens.", "url": "https://www.troweprice.com/en/us/insights/crypto-edges-into-the-mainstream", "images": []}, {"source": "federal_reserve", "name": "Federal Reserve", "thesis": "Fifth conference on the dollar's international role: Waller says DLT/tokenized assets and stablecoins largely complement TradFi; Prasad skeptical the dollar's role diminishes given no credible alternatives. Panel: stablecoin/cross-border growth likely reinforces dollar use since dominant stablecoins are dollar-denominated.", "url": "https://www.federalreserve.gov/econres/notes/feds-notes/fifth-conference-on-the-international-roles-of-the-u-s-dollar-stablecoins-digital-payments-and-the-ir-of-the-usd-20260716.html", "images": []}, {"source": "chainalysis", "name": "Chainalysis", "thesis": "OFAC added four crypto addresses to its Central Bank of Iran designation; wallets received $165m in stablecoins, of which Tether immediately froze $131m. Tether has now frozen ~$475m total from CBI-linked addresses — nearly half a billion inaccessible to the regime; warns shipping firms paying a crypto Hormuz toll face sanctions exposure.", "url": "https://www.chainalysis.com/blog/ofac-sanctions-iran-central-bank-crypto-wallets-freezing-131m-in-stablecoins/", "images": []}, {"source": "coinshares", "name": "CoinShares", "thesis": "Blockchain equities index -6.5% in Week 29, underperforming BTC (-1.5%), on a positioning-led unwind of crowded AI trades in Korea/Japan/Taiwan spreading to US tech, amplified by Moonshot's Kimi K3. PayPal +25.2% on a $53bn Stripe/Advent bid (~28% premium); Strategy raised $466.7m but bought no BTC.", "url": "https://coinshares.com/insights/research-data/equities-update-17-07-2026/", "images": []}]}, {"theme": "Credit: tight spreads, the AI issuance wave and private-credit stress", "category": ["credit", "rates"], "consensus": "Unanimous that IG and HY spreads are historically tight, leaving little room for error, so returns must come from carry and selection rather than further compression (BNP, Schroders, Franklin Templeton, PIMCO, Man Group, BlackRock). The AI/hyperscaler issuance wave is the dominant credit technical — Schroders notes >$182bn YTD vs $13bn a year ago, with IG supply ~30% ahead toward ~$1.2trn for 2026.", "divergence": "Positioning splits on how defensive to be. Schroders and Franklin Templeton go underweight/low on corporate credit, rotating into securitized/MBS, munis and EM; PIMCO likewise sees direct-lending in a cyclical (not systemic) default cycle and prefers bonds for convexity plus EM. BNP is the most constructive on carry — positive on euro IG (favouring financials/BBB/industrials), a modest OW to agency MBS, and constructive on European HY (spreads compressed 54bp to 315bp, record ~EUR49bn Q2 issuance, defaults to fall to 2.4%), preferring performing single-B over high-BB and cutting AT1/CCC. On AI-related credit specifically, most treat the hyperscaler supply as opportunity not bubble (Schroders, Franklin), while BNP underweights the long end of tech ahead of a Q4 euro issuance surge and is cautious on data-centre REITs. Ares' Arougheti (via HSBC) frames private markets as a multi-decade secular winner from banks' balance-sheet retreat.", "items": [{"source": "schroders", "name": "Schroders", "thesis": "Q3 FI outlook: Fed on hold, data-dependent, no compelling catalyst for lower Treasury yields (futures price hikes, contrasting the firm's view). Low, defensive corporate credit (spreads tight); prefers mortgages, munis, EM. IG issuance ~30% ahead toward ~$1.2trn 2026; hyperscaler AI issuance >$182bn through July vs $13bn a year ago — opportunity not bubble.", "url": "https://www.schroders.com/en-us/us/individual/insights/fixed-income-markets-now-demand-a-mix-of-tactical-offense-and-resilient-defense/", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "thesis": "European HY constructive but less room for error: spreads compressed 54bp in Q2 to 315bp (CCC 1260bp vs BB 211bp), YTD +1.7%, record ~EUR49bn Q2 issuance, all-in yield 5.74%, defaults to 2.4% by end-2026. Prefer single-B over high BB, neutral beta, reduce hybrid/AT1, cautious CCC; favour telecoms/healthcare/RE and FRNs.", "url": "https://www.bnpparibas-am.com/en/portfolio-perspectives/european-high-yield-market-supportive-despite-geopolitical-tensions/", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "thesis": "Modest overweight US Agency MBS for high-quality carry: mortgage rates ~6.45%, lock-in keeps prepayments stable (only 12% has refi incentive), net supply low. MBS index yield ~5.01%, current-coupon nominal spread ~+100bp, OAS ~+12bp. Neutral on spreads near the tights; would add only cheaper or on peace progress.", "url": "https://www.bnpparibas-am.com/en/portfolio-perspectives/us-agency-mortgage-backed-securities-fundamentals-remain-robust/", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "thesis": "Positive euro IG into H2: with spreads narrow, returns driven by carry/selection. Prefers European financials (banks, select subordinated), BBB issuers, and industrials benefiting from infrastructure/defence/AI-infrastructure. Underweight long-end technology (expects a Q4 hyperscaler euro issuance surge), cautious on data-centre REITs.", "url": "https://www.bnpparibas-am.com/en/portfolio-perspectives/euro-investment-grade-carry-and-income-drive-returns/", "images": []}, {"source": "pimco", "name": "PIMCO (Lotfi Karoui)", "thesis": "Credit Market Lens: bar risen sharply — analysts quadrupled 1yr EBITDA growth forecasts for USD IG non-financials from 5% to >20%, margins 20%→24%; HY EBITDA forecasts <4%→>14%, leaving little room for disappointment. AI hyperscalers ~one-third of USD IG capex in 2025, to 54% ($915bn) by 2027.", "url": "https://www.pimco.com/us/en/insights/the-credit-market-lens-a-higher-bar-for-earnings-season", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "thesis": "Q3 hedge-fund outlook: constructive backdrop with narrowing margin for error, favouring selection over beta. Constructive long/short equity (esp. tech, lower-net); underweight credit amid tight spreads (favour idiosyncratic long-short credit); positive global macro; neutral RV; improving event-driven on record M&A/IPO/LBO; compelling commodities and ILS.", "url": "https://www.franklintempleton.com/articles/series/hedge-fund-strategy-outlook", "images": []}, {"source": "hsbc", "name": "HSBC (Ares' Michael Arougheti)", "thesis": "Private markets in a multi-decade secular growth trend as banks' regulatory/balance-sheet constraints create a lasting financing gap; scaled capital plus proprietary origination is the barrier to entry. Sees the wealth channel (DB-to-DC shift) as the next access frontier, plus infrastructure/data centres and Asia.", "url": "https://www.business.hsbc.com/en-gb/insights/five-insights-on-private-markets", "images": []}, {"source": "schroders", "name": "Schroders", "thesis": "'Softer CPI, but not an all-clear': June CPI headline -0.4% m/m (largest since Apr 2020) gives room to hold in July, but energy is hostage to Iran. AI/data-center issuance is the biggest credit technical (Amazon's $25bn deal); hyperscaler spreads widened, broad IG only marginally. Bias to a steeper curve; favour securitized, munis, EM.", "url": "https://www.schroders.com/en-us/us/individual/insights/weekly-bond-market-update-softer-cpi-but-not-an-all-clear/", "images": []}]}, {"theme": "USD & FX: peaked or still climbing?", "category": ["fx", "rates"], "consensus": "Agreement that the dollar has been supported through Q2/Q3 by the US-Iran conflict, US AI exceptionalism and a hawkish Fed, and that the yen is a key swing variable (Goldman, Citi, Standard Chartered, Franklin Templeton). Consensus DXY is roughly rangebound-to-lower over the medium term.", "divergence": "Direction splits. Goldman is outright bullish the dollar — recommending momentum plays via options on the hawkish-Fed/AI-exceptionalism trade. Citi sees the DXY drifting lower (from 101.82 toward ~99.96 by Q3 2027, EUR/USD ~1.14, USD/JPY falling 159→144) and Franklin Templeton pegs USD ~flat (DXY ~100.86). Standard Chartered sees the DXY rangebound 99.6-101.3 with room for further yen weakness (USD/JPY resistance 165, support 159.6) before intervention. Citi and Standard Chartered both flag yen strength as the key risk to EM carry trades.", "items": [{"source": "goldman_sachs", "name": "Goldman Sachs", "thesis": "Dollar could keep strengthening on the US-Iran conflict, the intact AI trade and a hawkish Fed; play continued momentum via options.", "url": "https://www.goldmansachs.com/insights/the-markets/why-the-us-dollar-could-continue-to-strengthen", "images": []}, {"source": "citi_gps", "name": "Citi", "thesis": "DXY from 101.82 to ~99.96 by Q3 2027; EUR/USD ~1.14; USD/JPY falling from 159 to 144 by end-2027. Flags potential yen strength as a risk to EM carry trades; a hawkish Fed + falling oil offers RV in rates and USD.", "url": "https://www.citigroup.com/global/insights/markets-edition-serving-up-ways-to-ace-your-h2", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "thesis": "Daily Navigator: USD resilient on intensifying US-Iran conflict (DXY +0.3%), rangebound 99.6-101.3; USD/CHF upside limited (resistance 0.8150); USD/JPY intervention risk growing but room for more yen weakness before officials step in (resistance 165, 100-dma support 159.6).", "url": "https://www.sc.com/sg/market-outlook/daily-navigator-17-7-2026/?mvog=1", "images": []}]}, {"theme": "EM, China and the case for going global", "category": ["em", "equities", "fx"], "consensus": "Strong appetite to diversify outside the US on valuation gaps (China ~11.4x, Europe ~16x vs S&P ~22x) and a booming EM earnings picture (Schroders: EM >60% 2026 EPS growth, +24% index; BNP: EM tech hardware +250%). Houses widely expect a broadening rotation into Asia/EM aided by a softer dollar (UBS, Standard Chartered, Franklin Templeton, KKR).", "divergence": "Conviction and vehicle differ. UBS upgraded Eurozone and India to Attractive and likes Japan/China/SE Asia (Asia ex-Japan profits +72% in 2026); Standard Chartered is Overweight China and India, preferring Hang Seng tech and adding Taiwan; Franklin Templeton calls China's risk-reward 'compelling' (~11.4x) while India is 'structurally strong but expensive'; KKR overweights Asia public and private. The caution: Schroders flags EM is dangerously concentrated (>80% of EM companies underperforming as Korean/Taiwanese chip names dominate) and Goldman's dollar-strength call cuts against the softer-USD thesis underpinning the EM trade. On EM debt, BNP stresses the oil-exporter (GCC beneficiaries) vs importer (India, Turkey) split now dominates, favouring disciplined local-currency selection as Fed cut expectations shifted to no-cuts-or-hikes.", "items": [{"source": "franklin_templeton", "name": "Franklin Templeton", "thesis": "AI leadership broadening beyond the US: H1 2026 S&P +~10% while South Korea +101%, Taiwan ~+70%, Japan ~+15%, Brazil +13.3%; China fell >13%. Favours international/EM on valuation (S&P ~22x vs Europe ~16x, China ~11.4x, calling China compelling); Brazil aided by disinflation, India strong but expensive.", "url": "https://www.franklintempleton.com/articles/2026/etf/opening-the-aperture-on-global-investing", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "~10% upside for MSCI ACWI over 12 months; semis >40% of S&P Q2 EPS growth (SOX +92% 2026). Upgraded Eurozone (EPS +8%/+15%) and India to Attractive; likes Japan/China/SE Asia; MSCI Asia ex-Japan profits +72% 2026, +20% 2027. Diversify AI into payment networks, data-center REITs, smartphones.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-17072026.html", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "thesis": "Overweight China and India equities on a broadening rotation and softer USD; prefers Hang Seng tech, adds Taiwan; raised semiconductor exposure within Global Tech to 35-40% from 30-35%, adding beaten-down memory (South Korea). Peak Fed hawkishness likely behind us; OW EM USD government bonds, hold TIPS.", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-17-7-2026/?mvog=1", "images": []}, {"source": "schroders", "name": "Schroders", "thesis": "Equity Lens: equities expensive but with strong earnings. 2026 winners US small caps +23%, EM +24%, Japan +16%; Mag-7 0% vs US ex-Mag-7 +15%; EM highly concentrated (>80% of companies underperforming). EM >60% earnings growth. Tactical longs for stagflation: value, quality, energy and gold equities.", "url": "https://www.schroders.com/en-us/us/individual/insights/schroders-equity-lens-july-2026-your-go-to-guide-to-global-equity-markets/", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas (Alaa Bushehri)", "thesis": "EM debt showed established resilience in Q2; geopolitics splits oil-exporting beneficiaries (GCC) from vulnerable importers (India, Turkey). Fed cut expectations shifted from two cuts to no cuts or hikes, which could keep EM central banks on hold. Local-currency EMD the most compelling area; disciplined country selection as hard-currency valuations tighten.", "url": "https://www.bnpparibas-am.com/en-us/portfolio-perspectives/emerging-market-debt-established-resilience/", "images": []}, {"source": "rbc", "name": "RBC Capital Markets", "thesis": "China's EV dominance anchored by its home market (Chinese OEMs 65% of domestic EV in 2025, potentially 80% by 2030) and battery supply-chain control; aggressive localization in Hungary/Turkey/Spain/Austria for European share. Could ultimately take 20-25% of the US market, though a 100% tariff makes near-term entry unlikely.", "url": "https://www.rbccm.com/en/insights/2026/07/how-chinas-ev-strategy-is-reshaping-the-global-auto-industry", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas (Daniel Morris)", "thesis": "Despite a rocky Q2 start (Samsung -12% on guidance), expects a strong season: S&P EPS +24%, Nasdaq 100 +40%, Europe +14%, EM +66% (EM tech hardware >+250%, Korea ~10-fold). Reads Iran (Brent +6% vs 12% in March) as a realistic market appraisal with analysts floating a 2027 glut.", "url": "https://www.bnpparibas-am.com/en/front-of-mind/view-from-the-markets-i-expected-more/", "images": []}]}, {"theme": "Geopolitics, modern mercantilism and fragmentation", "category": ["geopolitics", "em"], "consensus": "A shared frame that geopolitics is now a first-order market variable — a 'low-trust', multipolar, mercantilist world where resilience replaces efficiency, choke points are weaponised, and supply chains fragment (Amundi, Bridgewater, BNY, Gavekal, Peterson, Carnegie). This is broadly seen as structurally inflationary and supportive of gold, defence, energy independence and real assets.", "divergence": "Emphasis and conclusions differ. Bridgewater's Karniol-Tambour calls modern mercantilism a structural, inherently inflationary force and warns most investors are dangerously overweight US equities and underweight real assets; Amundi similarly favours energy-independence, defence, food and pharma and sees Europe (with UK/Ukraine) re-emerging. Peterson's Wolff argues US hegemony is ending largely by American self-inflicted choices, while Carnegie's Momtaz counters that Europe's 'sycophancy' toward Trump has actually delivered modest wins on Ukraine (a €90bn loan, 67% more military aid). Gavekal is more market-mechanical — the string of shocks (trade war, Covid, Ukraine, rare earths, tariffs, Hormuz) has flipped the world from deflationary-boom to inflationary, and asks where the next shortage hits. Europe's rearmament is contested: Gavekal notes the MSCI Europe defence benchmark is down 6.7% from its January peak as investors doubt Europe's fiscal capacity.", "items": [{"source": "amundi", "name": "Amundi", "thesis": "'Investing in a Low Trust World': geopolitical risk at its highest since WWII; resilience replaces efficiency. Defence/security spending stays high, pressuring bonds and eroding their hedging power. Favours energy independence (solar/nuclear/grid), tech supply chains, defence, food and pharma; Europe (with UK/Ukraine) re-emerges as a heavyweight.", "url": "https://research-center.amundi.com/article/investing-low-trust-world", "images": []}, {"source": "bridgewater", "name": "Bridgewater (Karen Karniol-Tambour)", "thesis": "Modern mercantilism is structural, not cyclical, and inherently inflationary as every country spends to close vulnerabilities. Warns portfolio concentration leaves most investors overweight US equities, underweight real assets; the AI boom is still in its buildout (not adoption) phase; fragmentation creates distinct investable regional ecosystems.", "url": "https://www.bridgewater.com/research-and-insights/karen-karniol-tambour-on-investing-in-a-more-fragmented-world", "images": []}, {"source": "peterson_institute", "name": "Peterson Institute (Alan Wm. Wolff)", "thesis": "US hegemony is ending, largely by America's own choosing (insulting allies, tariffs, export controls, a war of choice with Iran, doubt over Article 5), drawing parallels with Athens' decline — though the dollar remains dominant and an eventual resurgence is possible.", "url": "https://www.piie.com/blogs/realtime-economics/2026/end-americas-hegemony", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment (Momtaz)", "thesis": "Europe's coordinated deference to Trump produced modest but real Ukraine wins — a €90bn ($103bn) support loan, NATO's PURL, a 67% rise in military aid — but funding PURL fragments money needed for Europe's own defence industry, with upheavals looming in France, Germany and the UK.", "url": "https://carnegieendowment.org/europe/strategic-europe/2026/07/european-sycophancy-worked-on-trump", "images": []}, {"source": "gavekal", "name": "Gavekal Research", "thesis": "Capitalism's natural state is the deflationary boom, but a series of shocks (2018 trade war/chip embargo, Covid, Russia-Ukraine, rare-earth weaponisation, tariffs, Hormuz closure) turned the world inflationary — setting up where the next supply shortage emerges.", "url": "https://research.gavekal.com/teaser/where-will-the-next-shortage-be/", "images": []}, {"source": "gavekal", "name": "Gavekal Research", "thesis": "NATO's Ankara summit cemented Europe's rearmament (5% of GDP pledge), but the MSCI Europe defense benchmark is down 6.7% from its January peak as investors doubt Europe's fiscal capacity; open question is whether the buildup runs fast via US purchases or gradually via a domestic industrial base.", "url": "https://research.gavekal.com/teaser/europes-rearmament-is-hardening/", "images": []}, {"source": "brookings", "name": "Brookings Institution", "thesis": "Proposes an institutionalized risk framework for Chinese technology (connected devices, drones, routers, port cranes, vehicles, power inverters), with the NSC overseeing an interagency process and BIS as executive secretariat — urgent given the planned US-China 'board of trade'/'board of investment'.", "url": "https://www.brookings.edu/articles/a-new-risk-framework-for-chinese-technology-products-and-investments/", "images": []}, {"source": "peterson_institute", "name": "Peterson Institute (Monica de Bolle)", "thesis": "Trump's new Brazil tariffs expose weak US leverage: a 25% Section 301 tariff from July 22 (44% of exports exempt) plus a proposed 12.5% forced-labor tariff (stacked ~37.5%). The US runs a surplus with Brazil that doubled in 2025 to $14.4bn, while China now absorbs ~37% of Brazil's trade.", "url": "https://www.piie.com/blogs/realtime-economics/2026/trumps-new-tariffs-brazil-reflect-weakness-us-trade-strategy", "images": []}]}], "B_calls": [{"source": "citi_gps", "name": "Citi", "call": "Raised year-end 2026 S&P 500 target to 8,100 on EPS $350 (2026)/$400 (2027); global equities ~6% higher, STOXX 600 to 640. US 10y 3.90%, Bund 3.00%, Gilt 4.85%; IG 90bp, HY 305bp. Fed's next move a cut, Fed Funds 3.25% end-2026/3.00% 2027. Brent avg $75 Q3/$70 Q4/$65 2027; gold to $5,000 in 2027. Equity overweight, credit underweight hedge, base metals for the cycle.", "category": ["equities", "rates", "commodities"], "url": "https://www.citigroup.com/global/insights/midyear-2026-outlook-resilience-ai-and-evolving-market-dynamics", "images": []}, {"source": "ubs", "name": "UBS", "call": "Expects S&P 500 to reach 8,200 by mid-2027 and ~10% upside for MSCI ACWI over 12 months; S&P Q2 EPS +~28%. Stays constructive on semis (SOX +92% 2026), diversifying AI into payment networks, data-center REITs and smartphones. Fed pricing too hawkish, yields should fall — first cut pushed to early 2027; lock in yields in short/intermediate quality USD/GBP bonds.", "category": ["equities", "rates"], "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-15072026.html", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "call": "Year-end S&P 500 target 7,400-7,800 on 15%+ EPS growth (2026 EPS $344); 10y UST 4.25-4.75%. 'Broadening' call: overweight US small/mid-caps, EM and Japan; favour short-duration and corporate credit over cash; bullish municipal bonds; USD ~flat (DXY ~100.86).", "category": ["equities", "rates"], "url": "https://www.franklintempleton.com/articles/series/from-the-market-desk", "images": []}, {"source": "kkr", "name": "KKR (Henry McVey)", "call": "'Divergence Conundrum': above-consensus US growth, higher-for-longer inflation, a fading easing cycle, higher long-end yields, and an oil curve underpricing risk premium. Tilts: stay up-in-quality; add non-correlated, nominal-GDP-linked assets; overweight Asia (public & private), Real Assets/Infrastructure/power & energy, structured equity/capital solutions and corporate carve-outs.", "category": ["growth", "equities", "rates"], "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}, {"source": "blackrock_investment_institute", "name": "BlackRock (Rick Rieder)", "call": "Earn income while starting yields are high and be ready to add duration/real-rate exposure; even if the Fed hikes 100bps, one-year broad bond returns stay modestly positive (yields need to rise another 75-80bps before total returns turn negative). Keep equity exposure in durable cash-flow compounders while trimming the most extended AI winners; sees Europe as the cleaner rates trade.", "category": ["rates", "equities", "credit"], "url": "https://www.blackrock.com/us/individual/insights/summer-markets-ai-investing", "images": []}, {"source": "pimco", "name": "PIMCO (Lotfi Karoui)", "call": "Late-cycle, rebalance from ~90/10 toward a more balanced 60/40, favouring bonds for convexity and emerging markets for diversification; direct-lending stress is cyclical not systemic. Baseline Fed on hold through 2026.", "category": ["rates", "credit", "em"], "url": "https://www.pimco.com/us/en/insights/podcasts/accrued-interest/lotfi-karoui-on-private-credit-and-the-ai-capex-supercycle", "images": []}, {"source": "bca_research", "name": "BCA Research", "call": "Overweight Private Equity; rotate out of momentum stocks into quality and hyperscalers; downgrade Late-Stage Venture Capital.", "category": ["equities"], "url": "https://www.bcaresearch.com/marketing/webcasts/quarterly-outlook-portfolio-construction/221556", "images": []}, {"source": "schroders", "name": "Schroders (Duncan Lamont)", "call": "Tactical longs for stagflation worriers: value and quality styles, conservative-investment companies, energy equities, defensives and gold equities. 2026 winners: US small caps +23%, EM +24%, Japan +16%; EM >60% earnings growth.", "category": ["equities", "commodities"], "url": "https://www.schroders.com/en-us/us/individual/insights/schroders-equity-lens-july-2026-your-go-to-guide-to-global-equity-markets/", "images": []}, {"source": "schroders", "name": "Schroders (US Multi-Sector FI)", "call": "Q3 FI: low, defensive allocation to corporate credit (spreads historically tight); prefer mortgages, municipals and emerging markets; bias to a steeper yield curve. Fed on hold under Warsh; futures pricing hikes contrasts the firm's on-hold view. Long muni-to-Treasury ratios normalized to ~83%.", "category": ["rates", "credit", "em"], "url": "https://www.schroders.com/en-us/us/individual/insights/fixed-income-markets-now-demand-a-mix-of-tactical-offense-and-resilient-defense/", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "call": "Overweight China and India equities (prefer Hang Seng tech, add Taiwan); raised semiconductor exposure within Global Tech to 35-40% (from 30-35%) adding beaten-down Korean memory. Lock in elevated yields but prefer short maturities; Overweight EM USD government bonds; hold US TIPS as a hedge. Core allocation to US financials post strong bank earnings.", "category": ["equities", "rates", "em"], "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-17-7-2026/?mvog=1", "images": []}, {"source": "ubs", "name": "UBS", "call": "To bolster resilience amid US-Iran tensions: add broad commodities (gold, industrial metals), capital-preservation/structured strategies, and a modest allocation to select hedge funds — favouring global macro and relative value (HFRI +7.6% in H1, best since 2021).", "category": ["commodities", "equities"], "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-13072026.html", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton (ClearBridge)", "call": "12-month recession odds 20% (15% ex-geopolitics), 11 of 12 Recession Risk Dashboard indicators green. With stock-bond correlations negative again, add EM equities (24% annualized historically) and infrastructure equities (20%); a buyer of dips into H2 2026. 2026 consensus EPS growth 23.9%.", "category": ["equities", "growth"], "url": "https://www.franklintempleton.com/articles/2026/clearbridge-investments/aor-update-podcast-two-macro-economic-risks-fading", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "call": "Projects biotech extends its rally on innovation, obesity and M&A — biotech indices returned >56% in the 12 months to July 7 (vs Nasdaq 100 +29%); raised 2030 global obesity-drug sales forecast 15% to $114bn (oral ~40% of the market).", "category": ["equities"], "url": "https://www.goldmansachs.com/insights/articles/biotech-stocks-are-projected-to-extend-rally-amid-innovation", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "call": "BTC to $250k by year-end 2027 (2026 too chaotic to predict; options ~even odds of $50k vs $250k for year-end 2026), downside risk until BTC firmly above $100-105k. Solana 'Internet Capital Markets' cap to surge to $2bn from ~$750m; expects SEC exemptive relief for tokenized securities in DeFi.", "category": ["crypto"], "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "call": "Q3 Global Fixed Income: further rate hikes cannot be excluded if inflation persists but long-dated yields likely range-bound; positive euro IG on carry, modest OW US agency MBS, supportive European HY (selectivity), EM debt resilient favouring oil-exporter selection. Prefer performing single-B over high-BB in EU HY, reduce AT1/CCC.", "category": ["rates", "credit", "em"], "url": "https://viewpoint.bnpparibas-am.com/global-fixed-income-outlook-q3-2026-bonds-keep-calm-and-carry-on/", "images": []}, {"source": "man_group", "name": "Man Group", "call": "AI trade maturing into sharp winner/loser discrimination: semis in bubble territory but no correction yet; opportunity broadening from AI enablers (chipmakers) to builders and beneficiaries; China underpriced in hardware and open-source models. Watch a 2000-style lock-up-expiry pressure point in 2027.", "category": ["equities", "ai_tech"], "url": "https://www.man.com/insights/views-from-the-floor-2026-14-july", "images": []}, {"source": "vanguard", "name": "Vanguard", "call": "Much of AI's promise already priced in; tilt toward under-priced value stocks and broader ex-US equities, as ultimate winners may be AI end-users rather than the technology's builders.", "category": ["equities", "ai_tech"], "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/how-much-upside-remains-for-ai-driven-equity-returns.html", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "call": "Add US TIPS with real yields near their highest since 2008; view Middle East escalation as controlled with US oil in a $70-90/bbl range; advise the under-invested to add global tech exposure ahead of a Q2 earnings beat.", "category": ["rates", "equities"], "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-10-7-2026/?mvog=1", "images": []}], "C_deep_reads": [{"source": "kkr", "name": "KKR (Henry McVey)", "title": "Mid-Year Outlook for 2026: The Divergence Conundrum", "summary": "McVey frames a 'Divergence Conundrum' producing K-shaped outcomes across growth, markets and asset prices, reinforcing KKR's Regime Change framework with a 'higher resting heart rate' for inflation. Versus consensus: above-consensus US growth (more selective abroad), higher-for-longer inflation (except China), a fading easing cycle with the Fed staying patient/restrictive, higher long-end yields as a pressure point, an oil futures curve still underpricing the risk premium, constructive-but-earnings-dependent equities, and a dollar that has peaked without a disorderly unwind. Key tilts: stay up-in-quality and add non-correlated, nominal-GDP-linked assets; overweight Asia (public and private), Real Assets/Infrastructure/power and energy, structured equity/capital solutions and corporate carve-outs.", "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}, {"source": "citi_gps", "name": "Citi", "title": "Midyear 2026 Outlook: Resilience, AI, and Evolving Market Dynamics", "summary": "Citi keeps resilience as the defining theme: global growth 2.5% in 2026, US GDP 2.1% (easing to 1.8% in 2027), China 4.7%, Euro Area 0.3%; US headline inflation falling from 3.2% (2026) to 1.7% (2027). It expects the Fed's next move to be a cut, with Fed Funds ending 2026 at 3.25% and 3.00% in 2027. The equity team raised its year-end S&P 500 target to 8,100 (EPS $350/2026, $400/2027), STOXX 600 to 640. Rates: US 10y 3.90%, Bund 3.00%, Gilt 4.85%; credit IG 90bp, HY 305bp. Commodities: Brent avg $75 Q3/$70 Q4/$65 2027; gold to $5,000 in 2027. FX: DXY toward ~99.96, EUR/USD ~1.14, USD/JPY 159→144. Allocation favours an equity overweight, credit as an underweight hedge and base metals — the AI cycle the dominant driver.", "url": "https://www.citigroup.com/global/insights/midyear-2026-outlook-resilience-ai-and-evolving-market-dynamics", "images": []}, {"source": "blackrock_investment_institute", "name": "BlackRock (Rick Rieder)", "title": "Getting Serious in Summer Markets", "summary": "Rieder argues growth and the AI capex cycle are real but leadership is narrow, so investors should shift from broad beta to deliberate construction. Nominal GDP has averaged 5.7% annually over three years (40% above the 2010s); nonresidential investment (~14% of GDP) drove 48% of real GDP growth since end-2024; hyperscaler capex is up >80% y/y to ~$715bn in 2026 (chip revenues ~$570bn). A basket of 32 AI names added 12.0% to YTD S&P returns while the rest subtracted 2.3%. He rejects the bubble label (Mag-7 forward P/E 34.1x→25.8x) but flags consumer stress (card delinquencies 13.1%, BNPL late-payers 47%, top 20% holding 72% of net worth). On rates, Europe is the cleaner trade; even a 100bp Fed hike keeps one-year broad bond returns modestly positive. Positioning: earn income now, be ready to add duration/real-rate exposure, keep equities in durable compounders while trimming extended winners.", "url": "https://www.blackrock.com/us/individual/insights/summer-markets-ai-investing", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton (Western Asset)", "title": "Beyond the Chips: Hyperscalers and the Financing of AI", "summary": "Western Asset argues the AI buildout's under-covered story is its financing, set to be one of the largest credit-supply waves ever. It cites Morgan Stanley's ~$2.9T of data-center investment through 2028 and JPMorgan's ~$5.3T AI infrastructure spend through 2030, versus big-five hyperscaler operating cash flow of ~$5.5T through 2030. Estimates point to ~$500B of hyperscaler-related financing plus ~$186B of HY/leveraged-loan/private credit and ~$150B of ABS/CMBS. It highlights off-balance-sheet deals (QTS Project Quest $4.6B; Project River Bend $3.25B/Google; Project Beignet $27.3B for Meta's Hyperion; Apollo/Blackstone/Broadcom $35B for Anthropic; CoreWeave ~$3.1B GPU financing) and BIS data showing >$100B of hyperscaler bond issuance in 2025 — a wave now filtering into fixed-income spreads.", "url": "https://www.franklintempleton.com/articles/2026/fixed-income/beyond-the-chips-hyperscalers-and-the-financing-of-ai", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital (Lucas Tcheyan)", "title": "Inference Capital Markets", "summary": "Galaxy's flagship maps the emerging 'inference capital markets' forming around AI inference as inference overtakes training as the dominant GPU-demand share. It covers offchain GPU futures (Morgan Stanley ~$2.9T data-center capex to 2028, McKinsey ~$6.7T to 2030, Goldman ~$7.6T 2026-2031) with cash-settled futures now planned by ICE and CME. Onchain, it details tokenized inference access (Venice's VVV/DIEM), tokenized inference production via useful proof-of-work (Pearl, Ambient), and GPU hardware financing (USD.AI, ~8% staking yield targeting 10-15%, 70-80% LTV CMBS-like loans). Conclusion: financing is the one form with real usage-driven demand, and crypto's edge is building the financial layer around AI compute.", "url": "https://www.galaxy.com/insights/research/inference-capital-markets-ai-compute-gpu-futures-onchain-crypto", "images": []}, {"source": "man_group", "name": "Man Group", "title": "Technology Outlook H2 2026: Still Dancing, But Moving Closer to the Door?", "summary": "Man Group argues the AI trade is maturing from broad thematic exposure toward sharp discrimination between winners and losers across the stack. Semiconductor valuations are in bubble territory (China's domestic semi index +100% over six months) yet no correction has come, with capital rotating rapidly through supply bottlenecks. It flags a systemic concentration risk: major cloud providers report a combined revenue backlog of ~$627bn, of which nearly 49% is tied to spending commitments from just OpenAI and Anthropic, risking valuation compression across the infrastructure layer if AI monetisation is delayed beyond 2026. It sees China's role underpriced in both hardware and open-source models, estimates ~$2trn of tech IPO market cap coming across New York and Hong Kong, and warns of a 2000-style lock-up-expiry pressure point likely hitting in 2027.", "url": "https://www.man.com/insights/h2-2026-technology-outlook", "images": []}, {"source": "boe", "name": "Bank of England (Alan Taylor)", "title": "Central reservations", "summary": "In this flagship MPC speech Taylor defends the central forecast's role even though the April 2026 MPR published only scenarios (A/B/C) with no central projection, and critiques conditioning on a distorted OIS curve. He puts the UK nominal neutral rate at 3% and notes Bank Rate is ~75bps above neutral (3.75%), an already-restrictive stance. After more favourable energy curves and an inflation print 0.4pp below expectations, he expects inflation to peak at ~3.25% later this year, half a point lower than the 3.75% projected in April; wage growth has normalised to 3-3.5%. He argues that in a benign 'Scenario T' rates can and should resume falling toward neutral, in a weaker 'Scenario A' the MPC may need to cut quickly (possibly below neutral), but until there is more clarity an extended hold at 3.75% is the correct measured response, with geopolitics now driving the decision.", "url": "https://www.bankofengland.co.uk/speech/2026/june/alan-taylor-speech-at-the-barclays-cepr-monetary-policy-forum", "images": []}, {"source": "man_group", "name": "Man Group (Henry Neville)", "title": "The Road Ahead: Andy Burnham, Can You Hear Me?", "summary": "Neville examines why UK gilts are so out of favour — the 10-year yield has risen to joint-highest among large developed-market peers. He argues this is not primarily a debt/deficit story: UK debt-to-GDP is ~100%, only slightly above its long-run 95% average, and total non-financial debt is not an outlier versus France, Japan and the US. The true UK outliers are unusually high inflation (with ~25% of public liabilities inflation-linked, versus less than half that share for peers) and political instability, which push up inflation expectations and the term premium. Debt interest added £82bn, welfare £48bn and pensions/old-age costs £37bn over the past four years. His prescription: fiscal consistency, political continuity and inflation discipline to compress the term premium and lower gilt yields.", "url": "https://www.man.com/insights/road-ahead-andy-burnham", "images": []}, {"source": "pimco", "name": "PIMCO (Lotfi Karoui)", "title": "Lotfi Karoui on Private Credit and the AI CapEx Supercycle", "summary": "Karoui frames direct-lending stress as cyclical rather than systemic: semi-liquid vehicles still see ~15% redemption requests, BDC marks are stale and dispersed, and a default cycle has begun even with the economy growing — he expects direct lending to normalize smaller and back toward middle-market 'direct le
