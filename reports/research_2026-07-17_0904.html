const CATCOLORS = { macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27", "ai-infra":"#1d9e75", crypto:"#7f77dd", geopolitics:"#d85a30", energy:"#f97316", tech:"#06b6d4", gold:"#d4a017", culture:"#ec4899", labor:"#8b5cf6", regulation:"#64748b", science:"#14b8a6", venture:"#84cc16" };
const CATLABELS = { macro:"Macro", credit:"Credit", positioning:"Positioning", "ai-infra":"AI/Infra", crypto:"Crypto", geopolitics:"Geopolitics", energy:"Energy", tech:"Tech", gold:"Gold", culture:"Culture", labor:"Labor", regulation:"Regulation", science:"Science", venture:"Venture" };
const URGLABELS = { act:"🔴 Act Now", deep:"🔵 Deep", watch:"🟡 Watch" };
const URGEMOJI = { act:"🔴", deep:"🔵", watch:"🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function buildFilterBars(){
  const catCounts = {};
  ITEMS.forEach(i => catCounts[i.cat] = (catCounts[i.cat]||0)+1);
  const catbar = document.getElementById("catbar");
  let html = '<button class="pill' + (activeCat==="all"?" active":"") + '" style="' + (activeCat==="all"?"background:#333;":"") + '" onclick="setCat(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  Object.keys(catCounts).forEach(function(c){
    const on = activeCat === c;
    const color = CATCOLORS[c] || "#999";
    html += '<button class="pill' + (on?" active":"") + '" style="' + (on ? ("background:"+color+";border-color:"+color+";") : "") + '" onclick="setCat(\'' + c + '\')">' + esc(CATLABELS[c]||c) + ' <span class="count">' + catCounts[c] + '</span></button>';
  });
  catbar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1);
  const urgbar = document.getElementById("urgbar");
  let uhtml = '<button class="pill' + (activeUrg==="all"?" active":"") + '" style="' + (activeUrg==="all"?"background:#333;":"") + '" onclick="setUrg(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  Object.keys(urgCounts).forEach(function(u){
    const on = activeUrg === u;
    uhtml += '<button class="pill' + (on?" active":"") + '" style="' + (on ? "background:#444;border-color:#444;" : "") + '" onclick="setUrg(\'' + u + '\')">' + esc(URGLABELS[u]||u) + ' <span class="count">' + urgCounts[u] + '</span></button>';
  });
  urgbar.innerHTML = uhtml;
}

function setCat(c){ activeCat = c; activeSrc = null; render(); }
function setUrg(u){ activeUrg = u; activeSrc = null; render(); }
function filterBySrc(name){
  activeSrc = name; activeCat = "all"; activeUrg = "all";
  render();
  ITEMS.forEach(function(it){
    if (it.source.indexOf(name) !== -1){
      const el = document.getElementById("card-" + it.id);
      if (el) el.classList.add("open");
    }
  });
}

function toggleCard(id){
  const el = document.getElementById("card-" + id);
  el.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function render(){
  buildFilterBars();
  const cardsEl = document.getElementById("cards");
  let list = ITEMS.filter(function(it){
    if (activeSrc && it.source.indexOf(activeSrc) === -1) return false;
    if (!activeSrc && activeCat !== "all" && it.cat !== activeCat) return false;
    if (!activeSrc && activeUrg !== "all" && it.urgency !== activeUrg) return false;
    return true;
  });
  let html = "";
  list.forEach(function(item, idx){
    const color = CATCOLORS[item.cat] || "#999";
    const chartInd = item.charts.hot ? "🔥" : (item.charts.count > 0 ? "📊" : "");
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-head" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,"0") + '</span>';
    html += '<span class="urg">' + URGEMOJI[item.urgency] + '</span>';
    html += '<span class="srcbadge" style="background:' + color + '">' + esc(item.source.split(" / ")[0].split(" (")[0]) + '</span>';
    html += '<span class="cattag">' + esc(CATLABELS[item.cat]||item.cat) + '</span>';
    if (chartInd) html += '<span class="chartind">' + chartInd + '</span>';
    html += '<span class="hdrtitle">' + esc(item.title) + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="--catcolor:' + color + '">' + esc(item.angle) + '</div>';
    html += '<div class="tweetrow">';
    html += '<div class="tweetbox a"><div class="tweetlabel">TWEET A</div><div class="tweettext">' + esc(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweetbox b"><div class="tweetlabel">TWEET B</div><div class="tweettext">' + esc(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    html += '<div class="chartbox' + (item.charts.hot ? " hot" : "") + '">' + (item.charts.hot ? '<div class="flag">🔥 CHART WORTH SAVING</div>' : '') + esc(item.charts.desc) + '</div>';
    html += '<a class="readlink" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div></div>';
  });
  if (!list.length) html = '<div style="padding:24px;color:#888;text-align:center;">No items match this filter.</div>';
  cardsEl.innerHTML = html;

  document.getElementById("metaline").textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.emailsRead + " emails";
}

function buildReport(){
  let html = "";
  html += "<h4>Time Window</h4><div>" + META.windowStart + " → " + META.windowEnd + " (last 6 hours, strict cutoff)</div>";
  html += "<h4>Emails</h4><div>" + META.emailsInWindow + " in window · " + META.emailsRead + " read · " + META.itemsExtracted + " items extracted</div>";
  html += "<h4>Included Sources</h4>";
  META.includedSources.forEach(function(s){
    html += '<div><span class="srclink" onclick="filterBySrc(\'' + s.name.replace(/'/g,"") + '\')">' + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count===1?"":"s") + '</div>';
  });
  html += "<h4>Skipped Sources</h4>";
  if (!META.skippedSources.length) {
    html += '<div class="skipitem">None — every email in the 6-hour window contained extractable content.</div>';
  }
  META.skippedSources.forEach(function(s){
    html += '<div class="skipitem">' + esc(s.name) + ' — ' + esc(s.reason) + '</div>';
  });
  document.getElementById("reportBody").innerHTML = html;
}
