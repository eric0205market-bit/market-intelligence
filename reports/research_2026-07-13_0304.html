    html += '<div class="tweets">';
    html += '<div class="tweet"><div class="tweet-label a">TWEET A</div><div class="tweet-body">' + esc(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet"><div class="tweet-label b">TWEET B</div><div class="tweet-body">' + esc(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 ' : '📊 ') + esc(item.charts.desc) + '</div>';
    html += '<a class="readlink" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div></div>';
  });
  if (!html) html = '<p style="color:#888;padding:20px 0;">No items match this filter.</p>';
  container.innerHTML = html;

  document.getElementById('headerMeta').textContent = META.date + '  ·  ' + META.time + '  ·  ' + ITEMS.length + ' items';
  buildReport();
}

function toggleCard(id){
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport(){
  let html = '<p><strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '. Emails outside this window were not processed.</p>';
  html += '<p>Emails in window: ' + META.emailsInWindow + ' &nbsp;|&nbsp; Emails read: ' + META.emailsRead + ' &nbsp;|&nbsp; Items extracted: ' + META.itemsExtracted + '</p>';
  html += '<div class="section-label">Included Sources</div><table>';
  META.includedSources.forEach(s => {
    html += '<tr><td class="srcline" onclick="filterBySrc(\'' + esc(s.name).replace(/'/g,"\\'") + '\')">' + esc(s.name) + '</td><td>' + s.count + ' item(s)</td></tr>';
  });
  html += '</table>';
  html += '<div class="section-label">Skipped Sources</div><table>';
  META.skippedSources.forEach(s => {
    html += '<tr><td>' + esc(s.name) + '</td><td>' + esc(s.reason) + '</td></tr>';
  });
  html += '</table>';
  document.getElementById('reportInner').innerHTML = html;
}

render();
</script>
