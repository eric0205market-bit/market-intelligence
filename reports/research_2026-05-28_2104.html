    angle: "The implication: discretionary mid-frequency traders are being automated first, not replaced from the bottom (HFT already automated low-value latency) but from the middle. This is the professional level of the job market starting to compress. Jane Street on Dwarkesh is worth watching for context on how top quant firms think about this.",
    tweetA: "From STAC Summit: LLMs can't compete with HFT (approaches speed of light). But they're already replacing human discretionary traders in the seconds-to-minutes range. The Pareto frontier of speed vs. intelligence has a new equilibrium point — and it's squarely in the middle where human judgment used to live.",

  { id: 17, cat: "science", urgency: "deep", source: "Abi Olvera / Am I Stronger Yet",

    idea: "Part 3 of a Golden Gate Institute for AI series: AI (LLMs) can substantially help with step 1 of bioweapon creation — preliminary research, pathogen biology details, design modifications, connecting aerosolization/fluid dynamics concepts. But actual construction requires: sourcing, DNA assembly, growing live organisms, stabilizing, testing, and deploying. These steps require lab skills, specialized equipment, and troubleshooting intuition from years of hands-on work. The math: 7 steps, each at 50% success, yields less than 1% overall success rate. The key bottleneck is 'tacit knowledge' — unwritten lore that can't be transferred via text.",
    angle: "This is a surprisingly reassuring near-term biosecurity assessment. The moat against bad actors isn't secrecy of information — it's physical bottlenecks that AI can't solve via text. The 10-year concern: as AI-assisted lab automation improves, the physical steps become easier too. The clock on this reassurance is ticking.",
    tweetA: "AI can help plan a bioweapon. It can retrieve pathogen details, suggest modifications, connect ideas across disciplines faster than any literature search. But building one requires 7 physical steps, each at ~50% success rate. That's less than 1% overall. The bottleneck is tacit knowledge — hands-on lab intuition that can't be prompted away.",
    tweetB: "The biosecurity moat isn't information secrecy — it's physical reality. Even with perfect AI planning assistance, someone needs to actually grow and stabilize a live pathogen without killing it. That requires specialized equipment, institutional access, and years of bench experience. For now, the physical bottleneck holds. The 10-year view is less comfortable.",

// State
let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

const CAT_COLORS = {
  macro: '#e24b4a', credit: '#378add', positioning: '#ef9f27', ai: '#1d9e75',
  crypto: '#7f77dd', geopolitics: '#d85a30', energy: '#f97316', tech: '#06b6d4',
  gold: '#d4a017', culture: '#ec4899', labor: '#8b5cf6', regulation: '#64748b',
  science: '#14b8a6', venture: '#84cc16', biotech: '#f59e0b', materials: '#64748b'
};

const URG_LABELS = { now: '🔴 Act Now', deep: '🔵 Deep', watch: '🟡 Watch' };

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) {
    body.classList.toggle('open');
  }
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function filterBySrc(srcName) {
  activeSrc = srcName;
  renderCards();
  renderFilters();
}

function setActiveCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderCards();
  renderFilters();
}

function setActiveUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderCards();
  renderFilters();
}

function isVisible(item) {
  if (activeSrc) {
    return item.source.indexOf(activeSrc) !== -1;
  }
  var catOk = activeCat === 'all' || item.cat === activeCat;
  var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
  return catOk && urgOk;
}

function renderFilters() {
  // Category filters
  var cats = ['all'];
  var catCounts = {};
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
    if (cats.indexOf(item.cat) === -1) cats.push(item.cat);
  });

  var catBar = document.getElementById('cat-filters');
  catBar.innerHTML = '';
  cats.forEach(function(cat) {
    var count = cat === 'all' ? ITEMS.length : (catCounts[cat] || 0);
    var label = cat === 'all' ? 'All (' + ITEMS.length + ')' : cat + ' (' + count + ')';
    var pill = document.createElement('div');
    pill.className = 'pill' + (activeCat === cat && !activeSrc ? ' active all' : '');
    pill.textContent = label.charAt(0).toUpperCase() + label.slice(1);
    if (cat !== 'all' && activeCat === cat && !activeSrc) {
      pill.style.background = CAT_COLORS[cat] || '#888';
    }
    pill.onclick = function() { setActiveCat(cat); };
    catBar.appendChild(pill);
  });

  // Urgency filters
  var urgCounts = { now: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });
  var urgBar = document.getElementById('urg-filters');
  urgBar.innerHTML = '';
  [['all', 'All'], ['now', '🔴 Act Now'], ['deep', '🔵 Deep'], ['watch', '🟡 Watch']].forEach(function(pair) {
    var key = pair[0];
    var label = key === 'all' ? 'All Urgency' : pair[1] + ' (' + urgCounts[key] + ')';
    var pill = document.createElement('div');
    pill.className = 'pill' + (activeUrg === key && !activeSrc ? ' active all' : '');
    pill.textContent = label;
    pill.onclick = function() { setActiveUrg(key); };
    urgBar.appendChild(pill);
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';

  ITEMS.forEach(function(item) {
    var visible = isVisible(item);
    var card = document.createElement('div');
    card.className = 'card' + (visible ? '' : ' hidden');
    card.id = 'card-' + item.id;

    var urgEmoji = item.urgency === 'now' ? '🔴' : (item.urgency === 'deep' ? '🔵' : '🟡');
    var badgeColor = CAT_COLORS[item.cat] || '#888';
    var chartBadge = item.charts && item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';

    var headerHtml = '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
      '<span>' + urgEmoji + '</span>' +
      '<span class="source-badge" style="background:' + badgeColor + '">' + item.source.split(' / ')[0] + '</span>' +
      '<span class="cat-tag">' + item.cat + '</span>' +
      '<span class="card-title">' + item.title + chartBadge + '</span>' +
      '</div>';

    var bodyHtml = '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + item.idea + '</div>' +
      '<div class="section-label">My Angle</div>' +
      '<div class="angle-block angle-' + item.cat + '">' + item.angle + '</div>' +
      '<div class="tweets">' +
      '<div class="tweet-box">' +
      '<div class="tweet-label" style="color:#378add">TWEET A</div>' +
      '<div class="tweet-text">' + item.tweetA + '</div>' +
      '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
      '</div>' +
      '<div class="tweet-box">' +
      '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>' +
      '<div class="tweet-text">' + item.tweetB + '</div>' +
      '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
      '</div>' +
      '</div>';

    if (item.charts && item.charts.count > 0) {
      bodyHtml += '<div class="charts-row' + (item.charts.hot ? ' hot-chart' : '') + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }

    if (item.link) {
      bodyHtml += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    }

    bodyHtml += '</div>';

    card.innerHTML = headerHtml + bodyHtml;
    container.appendChild(card);
  });
}

function renderReport() {
  var body = document.getElementById('report-body');
  var html = '<strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '<br>';
  html += '<strong>Emails in window:</strong> ' + META.emailsInWindow + ' | ';
  html += '<strong>Emails read:</strong> ' + META.emailsRead + ' | ';
  html += '<strong>Items extracted:</strong> ' + META.itemsExtracted + '<br><br>';

  html += '<strong>Included Sources:</strong><br>';
  META.includedSources.forEach(function(s) {
    var shortName = s.name.split(' / ')[0];
    html += '• <span class="src-link" onclick="filterBySrc(\'' + shortName + '\')">' + s.name + '</span> (' + s.items + ' item' + (s.items > 1 ? 's' : '') + ')<br>';
  });

  html += '<br><strong>Skipped Sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += '• ' + s.name + ' — ' + s.reason + '<br>';
  });

  body.innerHTML = html;
}

function renderMeta() {
  document.getElementById('meta-line').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsInWindow + ' emails';
}

// Initialize
renderMeta();
renderFilters();
renderCards();
renderReport();
</script>
