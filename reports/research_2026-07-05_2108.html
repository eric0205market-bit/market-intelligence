const CATEGORY_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "AI/infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};
const URGENCY_META = {
  act: { emoji: "🔴", label: "Act Now" },
  deep: { emoji: "🔵", label: "Deep" },
  watch: { emoji: "🟡", label: "Watch" }
};

let activeCat = "all";
let activeUrgency = "all";
let activeSrc = null;

function catColor(cat) { return CATEGORY_COLORS[cat] || "#999"; }

function buildFilterBars() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catBar = document.getElementById("catFilterBar");
  let html = '<button class="pill' + (activeCat === "all" ? " active" : "") + '" style="' + (activeCat === "all" ? "background:#333;" : "") + '" onclick="setCatFilter(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  Object.keys(catCounts).sort().forEach(cat => {
    const color = catColor(cat);
    const isActive = activeCat === cat;
    html += '<button class="pill' + (isActive ? " active" : "") + '" style="' + (isActive ? "background:" + color + ";border-color:" + color + ";" : "border-color:" + color + ";color:" + color + ";") + '" onclick="setCatFilter(\'' + cat + '\')">' + cat + ' <span class="count">' + catCounts[cat] + '</span></button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgBar = document.getElementById("urgFilterBar");
  let uhtml = '<button class="pill' + (activeUrgency === "all" ? " active" : "") + '" style="' + (activeUrgency === "all" ? "background:#333;" : "") + '" onclick="setUrgFilter(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  ["act", "deep", "watch"].forEach(u => {
    if (!urgCounts[u]) return;
    const isActive = activeUrgency === u;
    const m = URGENCY_META[u];
    uhtml += '<button class="pill' + (isActive ? " active" : "") + '" style="' + (isActive ? "background:#555;" : "") + '" onclick="setUrgFilter(\'' + u + '\')">' + m.emoji + ' ' + m.label + ' <span class="count">' + urgCounts[u] + '</span></button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  buildFilterBars();
  renderCards();
}
function setUrgFilter(u) {
  activeUrgency = u;
  activeSrc = null;
  buildFilterBars();
  renderCards();
}
function filterBySrc(name) {
  activeCat = "all";
  activeUrgency = "all";
  activeSrc = name;
  buildFilterBars();
  renderCards();
  const root = document.getElementById("cardsRoot");
  if (root) root.scrollIntoView({ behavior: "smooth" });
}

function renderCards() {
  const root = document.getElementById("cardsRoot");
  const filtered = ITEMS.filter(i => {
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrgency !== "all" && i.urgency !== activeUrgency) return false;
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    return true;
  });

  if (filtered.length === 0) {
    root.innerHTML = '<div class="empty-state">No items match this filter.</div>';
    return;
  }

  let html = "";
  filtered.forEach(item => {
    const color = catColor(item.cat);
    const urg = URGENCY_META[item.urgency];
    const chartFlag = item.charts.count > 0 ? (item.charts.hot ? "🔥" : "📊") : "";
    const open = activeSrc ? " open" : "";
    html += '<div class="card' + open + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + item.id + '</span>';
    html += '<span class="urgency">' + urg.emoji + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source.split(" / ")[0].split(" — ")[0] + '</span>';
    html += '<span class="tag">' + item.cat + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="title">' + item.title + '</span>';
    html += '<span class="chevron">▶</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left:2px solid ' + color + ';background:' + color + '14;">' + item.angle + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.desc) {
      html += '<div class="charts-box' + (item.charts.hot ? " hot" : "") + '">' + (item.charts.hot ? "🔥 " : "📊 ") + item.charts.desc + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank" rel="noopener">↗ Read full article</a></div>';
    html += '</div>';
    html += '</div>';
  });
  root.innerHTML = html;
}

function toggleCard(id) {
  const card = document.getElementById("card-" + id);
  if (card) card.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport() {
  const body = document.getElementById("reportBody");
  let html = '<p><strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '. Emails outside this window were not processed.</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<h4>Included Sources</h4><ul>';
  META.includedSources.forEach(s => {
    html += '<li><button class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</button> — ' + s.count + ' item' + (s.count === 1 ? "" : "s") + '</li>';
  });
  html += '</ul>';
  html += '<h4>Skipped Sources</h4><ul>';
  META.skippedSources.forEach(s => {
    html += '<li><strong>' + s.name + '</strong> — ' + s.reason + '</li>';
  });
  html += '</ul>';
  body.innerHTML = html;
}

function init() {
  document.getElementById("metaLine").textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.includedSources.length + " sources";
  buildFilterBars();
  renderCards();
  buildReport();
}
init();
</script>
