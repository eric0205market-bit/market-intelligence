  "act-now": "🔴",

};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return "rgba("+r+","+g+","+b+","+alpha+")";
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var card = document.getElementById('card-'+id);
  if (card) card.classList.toggle('open');
}

function filterCat(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-cat') === cat);
  });
  renderCards();
}

function filterUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  document.querySelectorAll('.pill[data-urg]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-urg') === urg);
  });
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-cat') === 'all');
  });
  document.querySelectorAll('.pill[data-urg]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-urg') === 'all');
  });
  renderCards();
}

function matchesSrc(item) {
  if (!activeSrc) return true;
  return item.source.indexOf(activeSrc) !== -1;
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = ITEMS.filter(function(item) {
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    var srcOk = matchesSrc(item);
    return catOk && urgOk && srcOk;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No items match the selected filters.</div>';
    return;
  }

  var shouldExpand = activeSrc !== null;

  container.innerHTML = filtered.map(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var catLabel = item.cat.replace('-',' ').toUpperCase();
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var chartBlock = '';
    if (item.charts.count > 0) {
      var chartClass = item.charts.hot ? 'chart-section hot' : 'chart-section';
      chartBlock = '<div class="' + chartClass + '">' +
        '&#128202; ' + item.charts.count + ' chart(s): ' + item.charts.desc +
        '</div>';
    }
    var angleStyle = 'border-left-color:' + color + ';background:' + hexToRgba(color, 0.06) + ';';
    var openClass = shouldExpand ? ' open' : '';
    return '<div class="card' + openClass + '" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + item.id + '</span>' +
        '<span class="urg-emoji">' + URG_EMOJI[item.urgency] + '</span>' +
        '<span class="src-badge" style="background:' + color + '">' + item.source + '</span>' +
        '<span class="cat-tag">' + catLabel + '</span>' +
        (chartIcon ? '<span class="chart-icon">' + chartIcon + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
        '<span class="expand-arrow">&#9654;</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-box" style="' + angleStyle + '">' + item.angle + '</div>' +
        '<div class="section-label">Tweets</div>' +
        '<div class="tweets">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">&#128203; Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">&#128203; Copy</button>' +
          '</div>' +
        '</div>' +
        (chartBlock ? chartBlock : '') +
        (item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">&#8599; Read full article</a>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var arrow = document.getElementById('report-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▼' : '▶';
}

function buildReport() {
  var el = document.getElementById('report-body');
  var srcList = META.includedSources.map(function(s) {
    return '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> (' + s.items + ' items)';
  }).join('<br>');
  var skipList = META.skippedSources.length > 0 ? META.skippedSources.map(function(s) {
    return s.name + ': ' + s.reason;
  }).join('<br>') : '<em>None — all emails in window had substantive content.</em>';
  el.innerHTML = '<strong>Time Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '<br>' +
    '<strong>Emails in window:</strong> ' + META.emailsInWindow + '<br>' +
    '<strong>Emails read:</strong> ' + META.emailsRead + '<br>' +
    '<strong>Items extracted:</strong> ' + META.itemsExtracted + '<br><br>' +
    '<strong>Included Sources</strong><br>' + srcList + '<br><br>' +
    '<strong>Skipped Sources</strong><br>' + skipList;
}

function updateCatPills() {
  var catCounts = {};
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
  });
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    var cat = p.getAttribute('data-cat');
    if (cat !== 'all') {
      var count = catCounts[cat] || 0;
      if (count === 0) {
        p.style.display = 'none';
      } else {
        p.textContent = p.textContent.replace(/ \(\d+\)/, '') + ' (' + count + ')';
      }
    } else {
      p.textContent = 'All (' + ITEMS.length + ')';
    }
  });
  var urgCounts = { 'act-now': 0, 'deep': 0, 'watch': 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });
  document.querySelectorAll('.pill[data-urg]').forEach(function(p) {
    var urg = p.getAttribute('data-urg');
    if (urg !== 'all') {
      var label = { 'act-now': '🔴 Act Now', 'deep': '🔵 Deep', 'watch': '🟡 Watch' }[urg];
      p.textContent = label + ' (' + (urgCounts[urg] || 0) + ')';
    } else {
      p.textContent = 'All (' + ITEMS.length + ')';
    }
  });
}

function init() {
  document.getElementById('meta-line').textContent =
    'Window: ' + META.windowStart + ' — ' + META.windowEnd + ' | ' +
    META.emailsRead + '/' + META.emailsInWindow + ' emails read | ' +
    META.itemsExtracted + ' items extracted';
  updateCatPills();
  renderCards();
  buildReport();
}

init();
