  {id:18,cat:"regulation",urgency:"deep",source:"Herb Greenberg / The Wrap",
   title:"Andrew Left Appeal: Landmark Ruling on Short-Seller 'Bright Lines' Coming",
   idea:"Andrew Left was convicted of securities fraud for timing trades shortly after publishing opinions that moved stocks. Left plans to appeal. Win or lose, the case could set a long-overdue precedent — drawing clearer lines for both longs and shorts between legitimate market influence and criminal manipulation. Carson Block of Muddy Waters says he is not stopping regardless. The core legal question: is the timing of a trade immediately after your own published opinion enough to constitute fraud?",
   angle:"The ruling will affect every analyst, newsletter writer, and short-seller who publishes views publicly and then trades. The vagueness of current manipulation law means the Left case could create the first clear statutory interpretation of opinion-plus-timing as fraud. This has chilling effect potential across the entire research ecosystem.",
   tweetA:"Andrew Left was convicted for timing trades after his published opinions moved stocks. His appeal could define the line between market commentary and manipulation for every short-seller with a public presence. Carson Block says he is not stopping. The precedent matters far beyond one activist trader.",
   tweetB:"The Left appeal will answer: is it fraud to trade immediately after you publish an opinion that moves the stock? That question has consequences for every analyst, newsletter writer, and short-seller who tweets before adjusting a position. The legal clarity cuts both ways — and the market needs it.",
   charts:{count:0,hot:false,desc:""},
   link:"https://www.herbgreenberg.com/p/the-wrap-andrew-lefts-bright-lines"},

   idea:"A growing number of companies are recording non-cash gains on expected IEEPA tariff recoveries, boosting reported gross margins significantly. G-III Apparel reported 64.9% gross margin vs 42.2% in the prior year — but $102.7M of the improvement was a one-time expected tariff recovery. Excluding that: 45.7% adjusted gross margin, up only 350bps. Herb Greenberg has identified at least a dozen companies doing this. Not all companies agree: Tesla and Adtran took the conservative approach, stating recovery is too uncertain to recognize.",
   angle:"This is an earnings quality issue that will affect sector comparisons through Q2 2026. Any company with significant IEEPA tariff exposure is a candidate for a one-time boost. Greenberg's rule: look for the 'expected recovery of previously incurred tariffs' line item in the gross margin footnotes.",
   tweetA:"A dozen companies are booking non-cash IEEPA tariff recovery gains. G-III Apparel: 64.9% gross margin. Real margin excluding the $102M one-time tariff recovery: 45.7%. Same regulation, same potential refund — Tesla took the conservative approach and recognized nothing. Why is G-III so confident?",

let activeSrc = null;

function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i){ return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var cb = document.getElementById('cb-' + id);
  if (cb) cb.classList.toggle('open');
}

function toggleReport() {
  var rb = document.getElementById('report-body');
  var rt = document.querySelector('.rtoggle');
  if (rb.classList.toggle('open')) {
    rt.textContent = '▼ Session Report';
  } else {
    rt.textContent = '▶ Session Report';
  }
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? null : name;
  activeCat = 'all';
  activeUrg = 'all';
  renderFilters();
  applyFilters();
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderFilters();
  applyFilters();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderFilters();
  applyFilters();
}

function applyFilters() {
  var cards = document.querySelectorAll('.card');
  cards.forEach(function(card) {
    var id = parseInt(card.dataset.id);
    var item = ITEMS.find(function(i){ return i.id === id; });
    var show = true;
    if (activeSrc) {
      show = item.source.indexOf(activeSrc) >= 0;
    } else {
      if (activeCat !== 'all') show = show && (item.cat === activeCat);
      if (activeUrg !== 'all') show = show && (item.urgency === activeUrg);
    }
    if (show) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
      var cb = document.getElementById('cb-' + id);
      if (cb) cb.classList.remove('open');
    }
  });
}

function renderFilters() {
  var cats = ['all'];
  var catCounts = {all: ITEMS.length};
  ITEMS.forEach(function(item) {
    if (!catCounts[item.cat]) { catCounts[item.cat] = 0; cats.push(item.cat); }
    catCounts[item.cat]++;
  });

  var urgCounts = {all: ITEMS.length, act_now:0, deep:0, watch:0};
  ITEMS.forEach(function(item){ urgCounts[item.urgency]++; });

  var cf = document.getElementById('cat-filters');
  cf.innerHTML = '';
  cats.forEach(function(cat) {
    var pill = document.createElement('span');
    pill.className = 'pill' + (activeCat === cat && !activeSrc ? ' active' : '');
    var color = cat === 'all' ? '#888' : (CAT_COLORS[cat] || '#888');
    if (activeCat === cat && !activeSrc) pill.style.background = color;
    else pill.style.borderColor = color;
    pill.style.color = (activeCat === cat && !activeSrc) ? '#fff' : color;
    pill.textContent = (cat === 'all' ? 'All' : cat) + ' ' + catCounts[cat];
    pill.onclick = function(){ setCat(cat); };
    cf.appendChild(pill);
  });

  var uf = document.getElementById('urg-filters');
  uf.innerHTML = '';
  [['all','All',' '],['act_now','🔴 Act Now','#e24b4a'],['deep','🔵 Deep','#378add'],['watch','🟡 Watch','#d97706']].forEach(function(u) {
    var pill = document.createElement('span');
    pill.className = 'pill' + (activeUrg === u[0] && !activeSrc ? ' active' : '');
    var color = u[2];
    if (activeUrg === u[0] && !activeSrc) { pill.style.background = color === ' ' ? '#888' : color; pill.style.borderColor = 'transparent'; pill.style.color = '#fff'; }
    else { pill.style.borderColor = color === ' ' ? '#ccc' : color; pill.style.color = color === ' ' ? '#888' : color; }
    var cnt = u[0] === 'all' ? ITEMS.length : urgCounts[u[0]];
    pill.textContent = u[1] + ' ' + cnt;
    pill.onclick = function(){ setUrg(u[0]); };
    uf.appendChild(pill);
  });
}

function renderCards() {
  var cc = document.getElementById('cards-container');
  cc.innerHTML = '';
  ITEMS.forEach(function(item) {
    var catColor = CAT_COLORS[item.cat] || '#888';
    var urg = URG_CONFIG[item.urgency];
    var chartIco = item.charts.count > 0 ? (item.charts.hot ? '🔥' : '📊') : '';
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;

    var angleColor = catColor + '22';
    var tweetALabel = '<span class="tlbl" style="color:#378add">TWEET A</span>';
    var tweetBLabel = '<span class="tlbl" style="color:#7f77dd">TWEET B</span>';

    card.innerHTML =
      '<div class="ch" onclick="toggleCard(' + item.id + ')">' +
        '<span class="inum">' + String(item.id).padStart(2,'0') + '</span>' +
        '<span>' + urg.emoji + '</span>' +
        '<span class="badge" style="background:' + catColor + '">' + escHtml(item.source).split('/')[0].trim() + '</span>' +
        '<span class="ctag">' + escHtml(item.cat) + '</span>' +
        (chartIco ? '<span class="chart-ico">' + chartIco + '</span>' : '') +
        '<span class="ctitle">' + escHtml(item.title) + '</span>' +
      '</div>' +
      '<div class="cb" id="cb-' + item.id + '">' +
        '<div class="slbl">The Idea</div>' +
        '<div class="itext">' + escHtml(item.idea) + '</div>' +
        '<div class="slbl">My Angle</div>' +
        '<div class="abox" style="border-color:' + catColor + ';background:' + angleColor + '">' + escHtml(item.angle) + '</div>' +
        '<div class="tweets">' +
          '<div class="tbox">' +
            tweetALabel +
            '<div class="ttext">' + escHtml(item.tweetA) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tbox">' +
            tweetBLabel +
            '<div class="ttext">' + escHtml(item.tweetB) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        '<div class="cfoot">' +
          '<span class="cnote">' + (item.charts.count > 0 ? (item.charts.hot ? '<span class="chot">🔥 ' + item.charts.count + ' chart(s) — ' + escHtml(item.charts.desc.substring(0,60)) + '...</span>' : '📊 ' + item.charts.count + ' chart(s)') : '') + '</span>' +
          '<a class="rlink" href="' + escHtml(item.link) + '" target="_blank">↗ Read full article</a>' +
        '</div>' +
      '</div>';
    cc.appendChild(card);
  });
}

function renderMeta() {
  document.getElementById('meta-line').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items · Window: ' +
    META.windowStart + ' → ' + META.windowEnd;
}

function renderReport() {
  var rb = document.getElementById('report-body');
  var srcHtml = META.includedSources.map(function(s) {
    return '<span class="slink" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + escHtml(s.name) + '</span> (' + s.items + ')';
  }).join(', ');
  var skipHtml = META.skippedSources.map(function(s) {
    return '<strong>' + escHtml(s.name) + '</strong>: ' + escHtml(s.reason);
  }).join('<br>');
  rb.innerHTML =
    '<div class="rs"><h4>Time Window</h4><p>' + META.windowStart + ' → ' + META.windowEnd + '</p></div>' +
    '<div class="rs"><h4>Emails</h4><p>' + META.emailsRead + ' read of ' + META.emailsInWindow + ' in window · ' + META.itemsExtracted + ' items extracted</p></div>' +
    '<div class="rs"><h4>Included Sources</h4><p>' + srcHtml + '</p></div>' +
    '<div class="rs"><h4>Skipped / Partial</h4><p>' + skipHtml + '</p></div>';
}

function init() {
  renderMeta();
  renderFilters();
  renderCards();
  renderReport();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
