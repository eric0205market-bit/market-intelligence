function catColor(cat) { return CATCOLORS[cat] || "#888"; }

function buildFilterBars() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catBar = document.getElementById('catBar');
  let html = '<button class="pill active" data-cat="all" onclick="setCatFilter(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(function(cat) {
    html += '<button class="pill" data-cat="' + cat + '" onclick="setCatFilter(\'' + cat + '\')" style="--c:' + catColor(cat) + '">' + cat + ' (' + catCounts[cat] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = { act: 0, deep: 0, watch: 0 };
  ITEMS.forEach(i => { urgCounts[i.urgency]++; });
  const urgBar = document.getElementById('urgBar');
  let uhtml = '<button class="pill active" data-urg="all" onclick="setUrgFilter(\'all\')">All (' + ITEMS.length + ')</button>';
  uhtml += '<button class="pill" data-urg="act" onclick="setUrgFilter(\'act\')">🔴 Act Now (' + urgCounts.act + ')</button>';
  uhtml += '<button class="pill" data-urg="deep" onclick="setUrgFilter(\'deep\')">🔵 Deep (' + urgCounts.deep + ')</button>';
  uhtml += '<button class="pill" data-urg="watch" onclick="setUrgFilter(\'watch\')">🟡 Watch (' + urgCounts.watch + ')</button>';
  urgBar.innerHTML = uhtml;
}

let curCat = 'all', curUrg = 'all', curSrc = null;

function setCatFilter(cat) {
  curCat = cat; curSrc = null;
  document.querySelectorAll('#catBar .pill').forEach(function(b) {
    var active = b.getAttribute('data-cat') === cat;
    b.classList.toggle('active', active);
    b.style.background = active && cat !== 'all' ? catColor(cat) : (active ? '#1a1a1a' : 'transparent');
    b.style.color = active ? '#fff' : '';
  });
  collapseAll();
  applyFilters();
}

function setUrgFilter(urg) {
  curUrg = urg; curSrc = null;
  document.querySelectorAll('#urgBar .pill').forEach(function(b) {
    var active = b.getAttribute('data-urg') === urg;
    b.classList.toggle('active', active);
    b.style.background = active ? '#1a1a1a' : 'transparent';
    b.style.color = active ? '#fff' : '';
  });
  collapseAll();
  applyFilters();
}

function filterBySrc(name) {
  curCat = 'all'; curUrg = 'all'; curSrc = name;
  document.querySelectorAll('#catBar .pill').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-cat') === 'all');
    b.style.background = b.getAttribute('data-cat') === 'all' ? '#1a1a1a' : 'transparent';
    b.style.color = b.getAttribute('data-cat') === 'all' ? '#fff' : '';
  });
  document.querySelectorAll('#urgBar .pill').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-urg') === 'all');
    b.style.background = b.getAttribute('data-urg') === 'all' ? '#1a1a1a' : 'transparent';
    b.style.color = b.getAttribute('data-urg') === 'all' ? '#fff' : '';
  });
  applyFilters();
  ITEMS.forEach(function(item) {
    if (item.source.toLowerCase().indexOf(name.toLowerCase()) !== -1) {
      var card = document.getElementById('card-' + item.id);
      if (card && !card.classList.contains('hidden')) card.classList.add('open');
    }
  });
}

function applyFilters() {
  let visible = 0;
  ITEMS.forEach(function(item) {
    const card = document.getElementById('card-' + item.id);
    let show = true;
    if (curCat !== 'all' && item.cat !== curCat) show = false;
    if (curUrg !== 'all' && item.urgency !== curUrg) show = false;
    if (curSrc && item.source.toLowerCase().indexOf(curSrc.toLowerCase()) === -1) show = false;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
}

function collapseAll() {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('open'); });
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderCards() {
  const wrap = document.getElementById('cards');
  let html = '';
  ITEMS.forEach(function(item) {
    const c = catColor(item.cat);
    const urg = URGMETA[item.urgency];
    const chartIcon = item.charts.count > 0 ? (item.charts.hot ? '🔥' : '📊') : '';
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-head" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2, '0') + '</span>';
    html += '<span class="urg">' + urg.emoji + '</span>';
    html += '<span class="badge" style="background:' + c + '">' + item.source + '</span>';
    html += '<span class="cattag">' + item.cat + '</span>';
    if (chartIcon) html += '<span class="charticon">' + chartIcon + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chevron">▶</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="label">The Idea</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="label">My Angle</div><div class="angle-box" style="border-left:3px solid ' + c + '; background:' + c + '14;">' + item.angle + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet tweet-a"><div class="tweet-label">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet tweet-b"><div class="tweet-label">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="chartbox' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.desc || 'Charts inside — worth opening') + '</div>';
    }
    html += '<div class="linkrow"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  wrap.innerHTML = html;
}

  document.getElementById('headerMeta').textContent =

    html += '<div class="skipitem"><strong>' + s.name + '</strong> — ' + s.reason + '</div>';
  });
  document.getElementById('reportBody').innerHTML = html;
}
