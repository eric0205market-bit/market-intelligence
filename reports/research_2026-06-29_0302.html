function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

var currentCat = 'all';
var currentUrg = 'all';
var currentSrc = null;

function filterCat(cat) {
  currentCat = cat;
  currentSrc = null;
  document.querySelectorAll('[data-cat]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderCards();
}

function filterUrg(urg) {
  currentUrg = urg;
  document.querySelectorAll('[data-urg]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.urg === urg);
  });
  renderCards();
}

function filterBySrc(name) {
  currentSrc = (currentSrc === name) ? null : name;
  currentCat = 'all';
  currentUrg = 'all';
  document.querySelectorAll('[data-cat]').forEach(function(b) { b.classList.toggle('active', b.dataset.cat === 'all'); });
  document.querySelectorAll('[data-urg]').forEach(function(b) { b.classList.toggle('active', b.dataset.urg === 'all'); });
  renderCards();
}

function renderCards() {
  var visible = ITEMS.filter(function(item) {
    if (currentSrc && item.source.indexOf(currentSrc) === -1) return false;
    if (currentCat !== 'all' && item.cat !== currentCat) return false;
    if (currentUrg !== 'all' && item.urgency !== currentUrg) return false;
    return true;
  });

  var grid = document.getElementById('card-grid');
  var html = '';
  visible.forEach(function(item) {
    var catColor = CAT_COLORS[item.cat] || '#64748b';
    var urgColor = URGENCY_COLORS[item.urgency] || '#64748b';
    var chartsRow = '';
    if (item.charts.count > 0) {
      chartsRow = '<div class="charts-row"><span class="chart-count">' + item.charts.count + ' charts</span>'
        + (item.charts.hot ? '<span class="chart-hot">' + item.charts.hot + '</span>' : '')
        + (item.charts.desc ? '<span class="chart-desc">' + item.charts.desc + '</span>' : '')
        + '</div>';
    }
    var linkRow = item.link ? '<div class="link-row"><a href="' + item.link + '" target="_blank">→ Source</a></div>' : '';
    html += '<div class="card" data-id="' + item.id + '">';
    html += '<div class="card-header">';
    html += '<div class="urgency-dot" style="background:' + urgColor + '"></div>';
    html += '<div class="card-title">' + item.title + '</div>';
    html += '<span class="cat-badge" style="background:' + catColor + '">' + item.cat + '</span>';
    html += '</div>';
    html += '<span class="source-chip" onclick="filterBySrc(\'' + item.source.replace(/'/g, "\\'") + '\')">' + item.source + '</span>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="angle-text">' + item.angle + '</div>';
    if (item.charts.count > 0) html += chartsRow;
    html += '<div class="tweets-section">';
    html += '<div class="tweet-row"><span class="tweet-label">A</span><span class="tweet-text">' + item.tweetA + '</span>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-row"><span class="tweet-label">B</span><span class="tweet-text">' + item.tweetB + '</span>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (linkRow) html += linkRow;
    html += '</div>';
  });
  grid.innerHTML = html;

  var countEl = document.getElementById('item-count');
  countEl.textContent = visible.length + ' of ' + ITEMS.length + ' items';
}

function buildCatFilters() {
  var cats = {};
  ITEMS.forEach(function(item) { cats[item.cat] = (cats[item.cat] || 0) + 1; });
  var html = '<button class="filter-btn active" data-cat="all" onclick="filterCat(\'all\')">All <span class="count-badge">' + ITEMS.length + '</span></button>';
  Object.keys(cats).sort().forEach(function(cat) {
    var color = CAT_COLORS[cat] || '#64748b';
    html += '<button class="filter-btn" data-cat="' + cat + '" onclick="filterCat(\'' + cat + '\')" style="border-left:3px solid ' + color + '">'
      + cat + ' <span class="count-badge">' + cats[cat] + '</span></button>';
  });
  document.getElementById('cat-filters').innerHTML = html;
}

function buildSessionReport() {
  var statsHtml = '<div class="sr-stat"><div class="num">' + META.emailsInWindow + '</div><div class="lbl">Emails in window</div></div>'
    + '<div class="sr-stat"><div class="num">' + META.emailsRead + '</div><div class="lbl">Emails read</div></div>'
    + '<div class="sr-stat"><div class="num">' + META.itemsExtracted + '</div><div class="lbl">Items extracted</div></div>'
    + '<div class="sr-stat"><div class="num">' + META.includedSources.length + '</div><div class="lbl">Sources</div></div>';
  document.getElementById('sr-stats').innerHTML = statsHtml;

  var srcHtml = '';
  META.includedSources.forEach(function(s) {
    srcHtml += '<span class="sr-source-chip" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + ' <span class="count-badge">' + s.count + '</span></span>';
  });
  document.getElementById('sr-sources').innerHTML = srcHtml;

  var skippedHtml = '';
  if (META.skippedSources && META.skippedSources.length) {
    skippedHtml = '<div style="font-size:12px;color:#64748b;margin-bottom:6px;margin-top:8px;">Skipped / partial</div>';
    META.skippedSources.forEach(function(s) {
      skippedHtml += '<div class="sr-skipped"><strong>' + s.name + '</strong>: ' + s.reason + '</div>';
    });
  }
  document.getElementById('sr-skipped').innerHTML = skippedHtml;
}

(function init() {
  buildCatFilters();
  renderCards();
  buildSessionReport();
})();
