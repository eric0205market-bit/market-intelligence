ril", "General Atomics", "Lockheed Martin", "Northrop Grumman", "Boeing", "F/A-18E/F Super Hornet", "AeroVironment Switchblade 300", "US Air Force", "Other Transaction Authority"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/diana-dimitrova", "word_count": 2198, "paywalled": false}}, {"record_id": "fc66c6c3be87c635", "source_type": "concepts", "source_name": "BCG Henderson Institute", "source_url": "https://www.bcg.com/publications/2026/building-enterprise-ai-agents-in-regulated-industries", "title": "Building Enterprise AI Agents in Regulated Industries", "published_date": "2026-07-20", "language": "en", "processed_at": "2026-07-20T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Positioning"], "gist": "BCG argues that regulated enterprises in sectors like health care and banking cannot scale agentic AI through fragmented pilots or after-the-fact controls; instead they need a common platform that embeds orchestration, guardrails, evaluations, governance, and human oversight from the start. It presents a three-layer enterprise architecture and a reuse-configure-build decision framework for CIOs and CDAOs.", "themes": [{"theme": "Common platform imperative", "insights": [{"claim": "For regulated businesses scaling agentic AI, a common platform of shared standards and consistent controls is no longer optional but is the operating foundation for AI-first businesses.", "speaker": "Daniel Martines", "type": "thesis", "entities": ["agentic AI", "regulated industries", "AI-first businesses"], "conviction": "high", "so_what": "Enterprises without a unified agentic platform will scale slower and at higher cost; platform vendors and integrators serving regulated sectors are positioned to capture this demand.", "quote": "For agentic AI at scale, the common platform is no longer optional. It is the operating foundation for AI-first businesses.", "locator": "A common platform provides that foundation of capability.", "quote_verified": true}, {"claim": "Without a common platform, enterprise AI efforts become fragmented, harder to govern, more expensive to scale, and slower to deliver impact.", "speaker": "Daniel Martines", "type": "causal", "entities": ["enterprise AI", "governance"], "conviction": "high", "so_what": "Fragmentation is the core risk to watch when assessing an enterprise's AI maturity and cost trajectory.", "quote": "Without a common platform, AI efforts become fragmented, harder to govern, more expensive to scale, and slower to deliver impact.", "locator": "Enterprise value from agentic AI starts with a platform", "quote_verified": true}, {"claim": "A common agentic platform must standardize critical layers including orchestration, model access, evaluations, guardrails, memory and knowledge management, security, and monitoring.", "speaker": "Daniel Martines", "type": "framework", "entities": ["orchestration", "guardrails", "evaluations", "security", "monitoring"], "conviction": "high", "so_what": "This layer list is a checklist for evaluating enterprise AI platform completeness and vendor coverage.", "quote": "It standardizes the critical layers required to scale safely: orchestration, model access, evaluations, guardrails, memory and knowledge management, security, and monitoring.", "locator": "A common platform provides that foundation of capability.", "quote_verified": true}]}, {"theme": "Regulatory and autonomy risk", "insights": [{"claim": "Because agentic systems can observe, plan, act, and respond with increasing independence, the absence of defined controls can create material regulatory and operational risk.", "speaker": "Daniel Martines", "type": "causal", "entities": ["agentic AI", "regulatory risk", "operational risk"], "conviction": "high", "so_what": "Autonomy without controls is the specific failure mode that regulators and risk officers will scrutinize; controls maturity is a due-diligence signal.", "quote": "Without defined controls, that autonomy can create material regulatory and operational risk.", "locator": "This matters because agentic systems can observe, plan, act", "quote_verified": true}, {"claim": "In regulated industries, enterprises need clear rules on what agents can access, what actions they can perform, and how those actions remain traceable and auditable, especially where agents perform regulated activities that create legal exposure.", "speaker": "Daniel Martines", "type": "framework", "entities": ["regulated industries", "auditability", "legal exposure"], "conviction": "high", "so_what": "Traceability and auditability of agent actions become mandatory compliance requirements in health care and banking deployments.", "quote": "Enterprises need clear rules and standards regarding what agents can access, what actions they can perform, and how those actions will remain traceable and auditable.", "locator": "The needs are even more acute in regulated industries", "quote_verified": true}, {"claim": "The controls required for regulated agentic AI cannot be easily implemented by separate business units or added after agents are already operating at scale, so CIOs should address them early rather than after systems are embedded in workflows.", "speaker": "Daniel Martines", "type": "thesis", "entities": ["CIOs", "compliance controls"], "conviction": "high", "so_what": "Retrofitting governance is a red flag; early-stage governance design predicts which enterprises will scale successfully.", "quote": "The necessary controls cannot be easily implemented by separate business units or added after agents are already operating at scale.", "locator": "The needs are even more acute in regulated industries", "quote_verified": true}]}, {"theme": "Three-layer architecture", "insights": [{"claim": "An end-to-end enterprise-grade agentic solution rests on three key layers: a semantic intelligence layer, a data abstraction layer, and a governance and operations layer.", "speaker": "Daniel Martines", "type": "framework", "entities": ["semantic intelligence layer", "data abstraction layer", "governance and operations layer"], "conviction": "high", "so_what": "This reference architecture is a template for assessing whether an enterprise AI stack covers coordination, data readiness, and governance.", "quote": "An end-to-end, enterprise-grade solution accomplishes this by means of three key layers", "locator": "To scale safely, agents should draw on a set of common components", "quote_verified": true}, {"claim": "A data abstraction layer unifies and normalizes data across systems of record to make enterprise information AI-ready within regulated governance boundaries.", "speaker": "Daniel Martines", "type": "framework", "entities": ["data abstraction layer", "systems of record"], "conviction": "medium", "so_what": "Data unification within governance boundaries is a prerequisite investment before agentic use cases can deliver value.", "quote": "A data abstraction layer unifies and normalizes data across systems of record, making enterprise information AI-ready within regulated governance boundaries.", "locator": "A data abstraction layer unifies and normalizes data", "quote_verified": true}, {"claim": "Guardrails, evaluations, and common standards must be embedded from the start rather than added after agents are already in production.", "speaker": "Daniel Martines", "type": "thesis", "entities": ["guardrails", "evaluations"], "conviction": "high", "so_what": "Design-time governance is the differentiator between enterprise-scale AI and disconnected local experiments.", "quote": "guardrails, evaluations, and common standards and rules are embedded from the start, not added after agents are already in production.", "locator": "Together, these layers help ensure that agents operate within defined boundaries", "quote_verified": true}]}, {"theme": "Quantified value pools", "insights": [{"claim": "Companies using common-platform approaches have driven a 25% productivity gain across the software development life cycle and a 20% to 30% improvement in software quality.", "speaker": "Daniel Martines", "type": "data_point", "entities": ["software development life cycle", "productivity"], "conviction": "medium", "so_what": "These benchmarks give investors concrete productivity and quality upside figures to test against vendor and enterprise ROI claims.", "quote": "Companies have used these approaches to drive a 25% productivity gain across the software development life cycle and a 20% to 30% improvement in software quality.", "locator": "Leaders are freed to focus on higher-value innovation", "quote_verified": true}, {"claim": "One large automotive client deployed a trusted GenAI-enabled knowledge assistant to achieve 50% to 75% faster search and more user-friendly access to enterprise knowledge assets.", "speaker": "Daniel Martines", "type": "anecdote", "entities": ["automotive", "GenAI knowledge assistant"], "conviction": "medium", "so_what": "Knowledge-search acceleration is an early, measurable agentic use case with quantified gains applicable across knowledge-heavy enterprises.", "quote": "one large automotive client deployed a trusted GenAI-enabled knowledge assistant to achieve 50% to 75% faster search", "locator": "Data readiness and security are important.", "quote_verified": true}]}, {"theme": "Reuse-configure-build decisions", "insights": [{"claim": "When deploying agents, CIOs should be selective by asking whether an existing agent can meet the need, whether the use case is a commodity capability, and whether the workflow requires custom logic or differentiated business outcomes.", "speaker": "Daniel Martines", "type": "framework", "entities": ["CIOs", "agent deployment"], "conviction": "medium", "so_what": "This three-question filter governs where enterprises spend on custom builds versus reuse, shaping the addressable market for off-the-shelf agents.", "quote": "In many cases, extending, reusing, or reconfiguring a proven agent is faster, cheaper, and easier to govern than building from scratch.", "locator": "When deploying agents, CIOs should be selective", "quote_verified": true}, {"claim": "Most enterprises will require a hybrid model that combines reuse, configuration, and building while maintaining consistent governance across each.", "speaker": "Daniel Martines", "type": "prediction", "entities": ["hybrid model", "governance"], "conviction": "medium", "so_what": "The hybrid default means demand spans both reusable-agent platforms and custom development, not one or the other.", "quote": "most enterprises will require a hybrid model that combines all three options—reuse, configuration, and building—while maintaining consistent governance across each.", "locator": "In practice, most enterprises will require a hybrid model", "quote_verified": true}, {"claim": "Companies must decide where standardization is necessary and where federation makes more sense, managing some capabilities centrally while keeping others closer to specific domains or functions.", "speaker": "Daniel Martines", "type": "framework", "entities": ["standardization", "federation"], "conviction": "medium", "so_what": "The centralize-versus-federate choice determines operating-model design and where control planes sit in the enterprise.", "quote": "Companies also need to decide where standardization is necessary and where federation makes more sense.", "locator": "Organizations need to make several foundational choices", "quote_verified": true}]}, {"theme": "Human oversight and mobilization", "insights": [{"claim": "In regulated industries human judgment and decision making remain invaluable, and human oversight should stay embedded within high-risk workflows and regulated activities.", "speaker": "Daniel Martines", "type": "thesis", "entities": ["human oversight", "regulated activities"], "conviction": "high", "so_what": "Human-in-the-loop is a persistent requirement in regulated sectors, capping the degree of full automation and shaping labor and compliance costs.", "quote": "Human oversight should remain embedded within high-risk workflows and regulated activities.", "locator": "How to Mobilize: Practical Takeaways", "quote_verified": true}, {"claim": "Agentic AI should not scale as a technology exercise but against clear value pools, productivity improvements, customer outcomes, and risk controls.", "speaker": "Daniel Martines", "type": "thesis", "entities": ["value pools", "risk controls"], "conviction": "high", "so_what": "Tie platform investments to measurable outcomes; deployments unconnected to value pools signal weak ROI discipline.", "quote": "It should scale against clear value pools, productivity improvements, customer outcomes, and risk controls.", "locator": "Connect platform choices to measurable business outcomes.", "quote_verified": true}, {"claim": "A shared control plane helps maintain consistency, governance, and auditability as agentic AI adoption grows, and early platform and governance decisions shape how effectively organizations can scale.", "speaker": "Daniel Martines", "type": "thesis", "entities": ["control plane", "governance"], "conviction": "high", "so_what": "Presence of a shared control plane is an indicator of scalable, auditable agentic AI maturity in an enterprise.", "quote": "A shared control plane helps maintain consistency, governance, and auditability as adoption grows.", "locator": "CIO and CDAO leaders should approach agentic AI with enterprise scale", "quote_verified": true}]}], "insight_total": 17, "top_entities": ["agentic AI", "regulated industries", "CIOs", "governance", "guardrails", "orchestration", "semantic intelligence layer", "data abstraction layer", "governance and operations layer", "control plane", "CDAO"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/daniel-martines", "word_count": 1594, "paywalled": false}}, {"record_id": "e313bdb3e0df19e6", "source_type": "concepts", "source_name": "Capital Economics", "source_url": "https://www.capitaleconomics.com/blog/ai-now-key-driver-growth-both-us-and-china", "title": "AI now a key driver of growth in both the US and China", "published_date": "2026-07-20", "language": "en", "processed_at": "2026-07-20T13:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "AI", "Geopolitics", "Positioning", "Tech"], "gist": "Capital Economics argues AI is now driving a significant share of growth in the world's two largest economies - over half of China's Q2 q/q GDP growth and about a third of US growth over the past year - but warns the AI boom is still in its infrastructure-build phase and that AI-related US tech equities are at a much later, riskier stage.", "themes": [{"theme": "China GDP data quality", "insights": [{"claim": "Official China GDP growth slowed from 5.0% y/y in Q1 2026 to 4.3% y/y in Q2 2026, but Capital Economics places little weight on the official rate and notes it has moved closer to its in-house China Activity Proxy, which put growth at around 3.2% y/y in May.", "speaker": "Capital Economics", "type": "data_point", "entities": ["China", "China Activity Proxy", "Capital Economics"], "conviction": "high", "so_what": "Convergence of official data toward the Activity Proxy suggests authorities may report more realistic figures, so watch the ~3% zone rather than the ~4-5% headline as the true read on Chinese demand.", "quote": "Official GDP growth slowed from 5.0% y/y in Q1 to 4.3% in Q2.", "locator": "At first glance, the figures looked underwhelming", "quote_verified": true}]}, {"theme": "AI as a growth driver", "insights": [{"claim": "Capital Economics estimates that more than half of China's quarter-on-quarter GDP growth in Q2 2026 can be attributed, directly or indirectly, to AI-related activity.", "speaker": "Capital Economics", "type": "data_point", "entities": ["China", "AI"], "conviction": "medium", "so_what": "A majority of Chinese marginal growth now hinges on AI, meaning any stall in AI investment would remove the main pillar under China's headline expansion.", "quote": "we think that more than half of quarter-on-quarter GDP growth in Q2 can be attributed, directly or indirectly, to AI-related activity", "locator": "The more interesting story lies beneath the surface", "quote_verified": true}, {"claim": "Capital Economics estimates that about one-third of US growth over the past year can be attributed to AI, making AI a significant driver of activity in both of the world's two largest economies.", "speaker": "Capital Economics", "type": "data_point", "entities": ["US", "AI"], "conviction": "medium", "so_what": "US growth exceptionalism is increasingly an AI story; a slowdown in AI capex or adoption would be a macro headwind, not just a sector rotation.", "quote": "we think that about one-third of growth in the US over the past year can be attributed to AI", "locator": "The more interesting story lies beneath the surface", "quote_verified": true}, {"claim": "Capital Economics frames the macroeconomic effects of AI in three phases - development of the models, investment in supporting infrastructure, and a later growth dividend as adoption widens and total factor productivity rises - and judges the economy is currently around the second phase, with the largest productivity gains still ahead.", "speaker": "Capital Economics", "type": "framework", "entities": ["AI", "total factor productivity"], "conviction": "medium", "so_what": "If the biggest productivity payoff is still ahead, the AI growth story has a long runway - but it also means current gains rest on capex rather than realized productivity.", "quote": "The productivity gains that ultimately matter most for long-term growth are still largely ahead of us.", "locator": "First, the AI boom still appears to be in its early stages", "quote_verified": true}]}, {"theme": "Concentration and geographic winners", "insights": [{"claim": "AI-driven gains so far remain concentrated in the US and China plus a small number of hardware producers including Korea and Taiwan, while Capital Economics estimates AI has added only around 0.1-0.2% to GDP in the UK and euro-zone over the past year.", "speaker": "Capital Economics", "type": "data_point", "entities": ["US", "China", "Korea", "Taiwan", "UK", "euro-zone", "AI"], "conviction": "high", "so_what": "The AI growth premium is a US/China/hardware-supplier trade for now; European and UK exposure to the theme is marginal until later adoption phases arrive.", "quote": "we estimate that it has added only around 0.1-0.2% to GDP in the UK and euro-zone over the past year", "locator": "Second, the gains so far remain concentrated", "quote_verified": true}, {"claim": "Capital Economics' long-run growth forecasts continue to favour the US over Europe, largely because the first two phases of the AI cycle - developing frontier models and investing in infrastructure - are taking place overwhelmingly in the US and China.", "speaker": "Capital Economics", "type": "thesis", "entities": ["US", "Europe", "China", "AI"], "conviction": "high", "so_what": "Structural US-over-Europe growth divergence is a durable macro call underpinning relative asset allocation between the two blocs.", "quote": "That is one reason why our long-run growth forecasts continue to favour the US over Europe.", "locator": "Second, the gains so far remain concentrated", "quote_verified": true}, {"claim": "Capital Economics expects AI to boost Chinese growth but thinks deepening structural headwinds, including demographics, could still push China's GDP growth down to just 2% a year in the 2030s.", "speaker": "Capital Economics", "type": "prediction", "entities": ["China", "AI", "demographics"], "conviction": "medium", "so_what": "Even an AI tailwind will not rescue China's long-run trajectory from demographic drag, capping the structural case for Chinese growth assets.", "quote": "we think could still push GDP growth to just 2% a year in the 2030s", "locator": "Second, the gains so far remain concentrated", "quote_verified": true}]}, {"theme": "AI as geopolitical fault line", "insights": [{"claim": "Capital Economics argues the AI race is becoming another dimension of global economic fragmentation, with most advanced Western economies adopting US models and cloud infrastructure while many emerging economies, particularly those with closer ties to China, turn to Chinese alternatives, driven increasingly by national security rather than just cost.", "speaker": "Capital Economics", "type": "thesis", "entities": ["US", "China", "AI", "cloud computing"], "conviction": "high", "so_what": "AI ecosystems are splitting along US-China lines, so cloud and hardware providers should be assessed on which geopolitical bloc they can sell into.", "quote": "The result is that AI is emerging as another dimension of global economic fragmentation.", "locator": "Third, the AI race is becoming another fault line", "quote_verified": true}, {"claim": "Capital Economics observes that countries aligning with the US in its fracturing map overwhelmingly use US cloud computing, while those aligning with China are more likely to use Chinese cloud technology.", "speaker": "Capital Economics", "type": "causal", "entities": ["US", "China", "cloud computing"], "conviction": "medium", "so_what": "Cloud provider nationality maps onto geopolitical alignment, a signal for forecasting addressable markets for US versus Chinese tech vendors.", "quote": "those countries that align with the US in our fracturing map overwhelmingly use US cloud computing, while those that align with China are more likely to use Chinese cloud technology", "locator": "Third, the AI race is becoming another fault line", "quote_verified": true}]}, {"theme": "US equities positioning", "insights": [{"claim": "Capital Economics holds a more cautious stance on US equities and US tech stocks, arguing the AI-related market boom is at a much later stage than the macro benefits, and that the concern is not primarily valuations but the difficulty of sustaining the exceptionally strong earnings expectations embedded in markets.", "speaker": "Capital Economics", "type": "contrarian", "entities": ["US equities", "US tech stocks", "AI"], "conviction": "high", "so_what": "Even AI bulls on the macro can be bearish on the stocks; the risk is earnings disappointment against elevated expectations, not just multiples.", "quote": "Our more cautious stance on US equities is not primarily about valuations.", "locator": "Finally, while the macroeconomic benefits of AI", "quote_verified": true}, {"claim": "After being among the most bullish forecasters of US equities for the past three years, Capital Economics now thinks the balance of risks is becoming less favourable.", "speaker": "Capital Economics", "type": "contrarian", "entities": ["US equities"], "conviction": "high", "so_what": "A shift from bull to caution by a previously bullish forecaster is a notable sentiment inflection worth weighting in US equity risk management.", "quote": "Having been among the most bullish forecasters of US equities for the past three years, we think the balance of risks is becoming less favourable.", "locator": "Finally, while the macroeconomic benefits of AI", "quote_verified": true}]}], "insight_total": 11, "top_entities": ["AI", "China", "US", "Capital Economics", "US equities", "US tech stocks", "cloud computing", "euro-zone", "UK", "Korea", "Taiwan", "China Activity Proxy"], "source_meta": {"author": "", "word_count": 854, "paywalled": false}}, {"record_id": "04888f23109aeff4", "source_type": "concepts", "source_name": "Chatham House", "source_url": "https://www.chathamhouse.org/2026/07/why-us-plans-power-sharing-libya-will-not-work", "title": "Why US plans for power-sharing in Libya will not work", "published_date": "2026-07-20", "language": "en", "processed_at": "2026-07-20T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Energy", "Macro"], "gist": "Chatham House argues that the US push, led by Trump adviser Massad Boulos, to reunify Libya via power-sharing between the Haftar and Dabaiba families will fail because it formalizes elite rent-seeking without fixing governance. Anti-corruption reports show a $9bn+ fuel-import subsidy bill and captured medicine supply chains that a unity deal would likely worsen, deterring the oil investment the plan aims to unlock.", "themes": [{"theme": "US-brokered Libya unification plan", "insights": [{"claim": "Trump adviser Massad Boulos is pushing to break Libya's political deadlock by merging the two rival administrations, the Tripoli-based GNU controlled by the Dabaiba family and the Benghazi-based GNS aligned with Khalifa Haftar's LAAF, into a single unified government.", "speaker": "Chatham House", "type": "framework", "entities": ["Massad Boulos", "Donald Trump", "GNU", "GNS", "Dabaiba family", "Khalifa Haftar", "LAAF", "Libya"], "conviction": "high", "so_what": "Watch Boulos's shuttle diplomacy as the key catalyst for any Libyan reunification and the oil-sector opening tied to it.", "quote": "The US plan is to bring the Haftars and the Dabaibas together with other key constituencies and form a unified government.", "locator": "In recent weeks, Massad Boulos", "quote_verified": true}, {"claim": "LAAF deputy commander Saddam Haftar travelled to Washington in June to meet US Secretary of State Marco Rubio, signaling the Haftar family is engaging on power-sharing, while the Dabaiba family declined to travel but remains a target for the deal.", "speaker": "Chatham House", "type": "data_point", "entities": ["Saddam Haftar", "Marco Rubio", "LAAF", "Dabaiba family", "United States"], "conviction": "high", "so_what": "Haftar-side buy-in is advancing faster than Dabaiba engagement, so the Tripoli faction's willingness is the swing variable for a deal.", "quote": null, "locator": "In June, LAAF deputy commander Saddam Haftar", "quote_verified": false}, {"claim": "Critics see the proposed Libyan unity deal as a return of family rule that legitimizes two rival dynasties while focusing on elite power-sharing rather than delivering public services to ordinary citizens.", "speaker": "Chatham House", "type": "thesis", "entities": ["Dabaiba family", "Haftar family", "Libya"], "conviction": "medium", "so_what": "Domestic opposition raises the risk that any signed deal lacks legitimacy and fails to hold, keeping political risk elevated.", "quote": "it looks like the return of family rule and a way to legitimize the two rival families", "locator": "For the deal's opponents", "quote_verified": true}]}, {"theme": "Fuel subsidy corruption", "insights": [{"claim": "Libya's fuel-import subsidy bill exceeded $9 billion by 2024, roughly $1,200 per person, with import volumes more than doubling since 2021 in an increase unjustifiable by any reasonable market demand.", "speaker": "Chatham House", "type": "data_point", "entities": ["Libya", "National Oil Corporation", "Audit Bureau", "National Anti-Corruption Commission"], "conviction": "high", "so_what": "The ballooning subsidy quantifies the fiscal drain and black-market leakage a naive unity deal would entrench rather than curb.", "quote": "the import bill had reached over $9 billion by 2024, the equivalent of nearly $1,200 per person in Libya", "locator": "The provision of fuel has been a major source of controversy", "quote_verified": true}, {"claim": "Libyan state-affiliated armed groups increased diesel consumption by 1,527 per cent in 2024 versus 2021 and the Tripoli South Power Plant by 1,368 per cent, indicating fuel is being diverted to black markets or smuggled internationally.", "speaker": "Chatham House", "type": "data_point", "entities": ["Libya", "Tripoli South Power Plant"], "conviction": "high", "so_what": "The scale of diversion shows vested armed interests capture the subsidy, a structural constraint on any governance reform.", "quote": "Libya's patchwork of state-affiliated armed groups increased their diesel consumption by 1,527 per cent // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
