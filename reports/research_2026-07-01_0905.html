const CAT_COLORS = {
  "macro": "#e24b4a",
  "credit": "#378add",
  "positioning": "#ef9f27",
  "AI/infra": "#1d9e75",
  "crypto": "#7f77dd",
  "geopolitics": "#d85a30",
  "energy": "#f97316",
  "tech": "#06b6d4",
  "gold": "#d4a017",
  "culture": "#ec4899",
  "labor": "#8b5cf6",
  "regulation": "#64748b",
  "science": "#14b8a6",
  "venture": "#84cc16"
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

const URG_LABELS = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URG_EMOJI = { act: "🔴", deep: "🔵", watch: "🟡" };

function catCounts() {
  const counts = {};
  ITEMS.forEach(function(i) { counts[i.cat] = (counts[i.cat] || 0) + 1; });
  return counts;
}
function urgCounts() {
  const counts = {};
  ITEMS.forEach(function(i) { counts[i.urgency] = (counts[i.urgency] || 0) + 1; });
  return counts;
}

function renderHeaderMeta() {
  document.getElementById('headerMeta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function renderCatFilterBar() {
  const counts = catCounts();
  const bar = document.getElementById('catFilterBar');
  let html = '<button class="pill' + (activeCat === 'all' ? ' active' : '') + '" style="' + (activeCat === 'all' ? 'background:#333;' : '') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(CAT_COLORS).forEach(function(cat) {
    if (!counts[cat]) return;
    const isActive = activeCat === cat;
    const style = isActive ? 'background:' + CAT_COLORS[cat] + ';' : '';
    html += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setCat(\'' + cat + '\')">' + cat + ' (' + counts[cat] + ')</button>';
  });
  bar.innerHTML = html;
}

function renderUrgFilterBar() {
  const counts = urgCounts();
  const bar = document.getElementById('urgFilterBar');
  let html = '<button class="pill' + (activeUrg === 'all' ? ' active' : '') + '" style="' + (activeUrg === 'all' ? 'background:#333;' : '') + '" onclick="setUrg(\'all\')">All</button>';
  ['act', 'deep', 'watch'].forEach(function(u) {
    if (!counts[u]) return;
    const isActive = activeUrg === u;
    const style = isActive ? 'background:#333;' : '';
    html += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + URG_LABELS[u] + ' (' + counts[u] + ')</button>';
  });
  bar.innerHTML = html;
}

function setCat(cat) { activeCat = cat; activeSrc = null; renderAll(); }
function setUrg(urg) { activeUrg = urg; activeSrc = null; renderAll(); }
function filterBySrc(name) {
  activeSrc = name; activeCat = 'all'; activeUrg = 'all';
  renderAll();
  ITEMS.forEach(function(i) {
    if (i.source.indexOf(name) !== -1) {
      const el = document.getElementById('card-' + i.id);
      if (el) el.classList.add('expanded');
    }
  });
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  let html = '';
  ITEMS.forEach(function(item) {
    if (activeCat !== 'all' && item.cat !== activeCat) return;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return;
    if (activeSrc && item.source.indexOf(activeSrc) === -1) return;
    const color = CAT_COLORS[item.cat] || '#888';
    const chartFlag = item.charts && item.charts.hot ? '🔥' : (item.charts && item.charts.count > 0 ? '📊' : '');
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">#' + item.id + '</span>';
    html += '<span>' + URG_EMOJI[item.urgency] + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + escapeHtml(item.source) + '</span>';
    html += '<span class="cat-tag">' + escapeHtml(item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + escapeHtml(item.title) + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + escapeHtml(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left: 2px solid ' + color + '; background:' + color + '18;">' + escapeHtml(item.angle) + '</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add">TWEET A</div><div class="tweet-text">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd">TWEET B</div><div class="tweet-text">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts && (item.charts.count > 0 || item.charts.desc)) {
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + escapeHtml(item.charts.desc || 'Charts inside') + (item.charts.count ? ' (' + item.charts.count + ' chart' + (item.charts.count > 1 ? 's' : '') + ')' : '') + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div>'; // card-body
    html += '</div>'; // card
  });
  if (!html) html = '<p style="color:#888; padding: 20px 0;">No items match this filter.</p>';
  container.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('expanded');
}

function toggleReport() {
  document.getElementById('reportCard').classList.toggle('expanded');
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderReport() {
  const body = document.getElementById('reportBody');
  let html = '';
  html += '<div><strong>Time window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</div>';
  html += '<div><strong>Emails in window:</strong> ' + META.emailsInWindow + ' · <strong>Emails read:</strong> ' + META.emailsRead + ' · <strong>Items extracted:</strong> ' + META.itemsExtracted + '</div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(function(s) {
    html += '<div><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + escapeHtml(s.name) + '</span> — ' + s.count + ' item' + (s.count > 1 ? 's' : '') + '</div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(function(s) {
    html += '<div>' + escapeHtml(s.name) + ' — <em>' + escapeHtml(s.reason) + '</em></div>';
  });
  body.innerHTML = html;
}

function renderAll() {
  renderCatFilterBar();
  renderUrgFilterBar();
  renderCards();
}

renderHeaderMeta();
renderAll();
renderReport();
</script>
