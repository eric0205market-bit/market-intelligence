026-06-16T15:05:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Geopolitics", "Society"], "gist": "Anthropic launches Fable 5, its first generally-available model from the new 'Mythos-class' tier above Opus, alongside the safeguard-lifted Mythos 5 for vetted cyber-defenders. The model claims state-of-the-art results across coding, finance, vision, and life sciences, but the launch is gated by aggressive cyber/bio/distillation classifiers, conservative subscription rollout, and 30-day mandatory data retention. Note: a Jun 12 update banner says access to both models has since been suspended (separately, a US government export-control directive ordered the suspension).", "themes": [{"theme": "Mythos-class tier and capability jump", "insights": [{"claim": "Anthropic has introduced a 'Mythos-class' model tier that sits above its Opus class in capability; Fable 5 is the first generally-available model from this tier and Mythos 5 is the same underlying model with cyber safeguards lifted for vetted users.", "speaker": "Anthropic Blog", "type": "framework", "entities": ["Anthropic", "Claude Fable 5", "Claude Mythos 5", "Claude Opus 4.8", "Claude Mythos Preview"], "conviction": "high", "so_what": "Signals Anthropic is now tiering frontier capability behind safety gating rather than shipping one flagship — watch for a recurring two-SKU (gated/ungated) release pattern that competitors and regulators will react to.", "quote": "Mythos-class models are a tier of Claude models that sit above our Opus class in capability.", "locator": "Footnotes", "quote_verified": true}, {"claim": "Fable 5 and Mythos 5 are priced at $10 per million input tokens and $50 per million output tokens — described as less than half the price of Claude Mythos Preview — despite being more capable.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Fable 5", "Claude Mythos 5", "Claude Mythos Preview"], "conviction": "high", "so_what": "Frontier-capability price cuts continue; pressures per-token economics for rivals and erodes the assumption that better models cost more — relevant to AI-infra and model-API margin theses.", "quote": "Fable 5 and Mythos 5 are being offered at $10 per million input tokens and $50 per million output tokens—less than half the price of Claude Mythos Preview.", "locator": "Opening / pricing", "quote_verified": true}, {"claim": "Anthropic frames capability advantage as scaling with task length: the longer and more complex the task, the larger Fable 5's lead over its other models, positioning long-horizon agentic work as the differentiator.", "speaker": "Anthropic Blog", "type": "thesis", "entities": ["Claude Fable 5"], "conviction": "high", "so_what": "Long-horizon autonomy is the competitive frontier; firms whose moat depends on short-task accuracy are most exposed to displacement.", "quote": "The longer and more complex the task, the larger Fable 5’s lead over our other models.", "locator": "Opening", "quote_verified": true}]}, {"theme": "Coding and enterprise productivity claims", "insights": [{"claim": "Stripe reported during early testing that Fable 5 performed a codebase-wide migration on a 50-million-line Ruby codebase in a day — work Anthropic says would otherwise have taken a team over two months by hand.", "speaker": "Anthropic Blog", "type": "anecdote", "entities": ["Stripe", "Claude Fable 5", "Ruby"], "conviction": "high", "so_what": "Concrete enterprise-scale automation datapoint; if reproducible, it pressures headcount and billable-hours models in software engineering and IT services.", "quote": "In a 50-million-line Ruby codebase, the model performed a codebase-wide migration in a day that would otherwise have taken a whole team over two months by hand.", "locator": "Software engineering", "quote_verified": true}, {"claim": "On Hebbia's Finance Benchmark for senior-level reasoning, Fable 5 posts the highest score of any model, and trading firm IMC reported it aced their trading-analysis evaluations nearly across the board including factual lookup, root-cause analysis, and expected-value analysis.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Hebbia", "IMC", "Claude Fable 5"], "conviction": "high", "so_what": "Direct relevance to buy-side/sell-side workflows — model is being positioned for senior financial reasoning, a watch-item for displacement of analyst labor.", "quote": null, "locator": "Knowledge work", "quote_verified": false}, {"claim": "Fable 5 is claimed as state-of-the-art on vision tasks, including rebuilding a web app's source code from screenshots alone and beating Pokemon FireRed with a minimal vision-only harness where earlier models needed complex scaffolding.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Fable 5", "Pokemon FireRed"], "conviction": "high", "so_what": "Reduced scaffolding need lowers the engineering cost of deploying agents and weakens the value of bespoke harness/tooling middleware layers.", "quote": null, "locator": "Vision", "quote_verified": false}, {"claim": "Persistent file-based memory boosted Fable 5's performance on Slay the Spire three times more than it boosted Opus 4.8, and Fable reached the game's final act three times more often.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Fable 5", "Claude Opus 4.8", "Slay the Spire"], "conviction": "medium", "so_what": "Suggests the capability gain compounds with external memory/tools — agent products that supply memory infrastructure may see disproportionate uplift on frontier models.", "quote": null, "locator": "Memory and long-context", "quote_verified": false}]}, {"theme": "Life sciences and scientific discovery", "insights": [{"claim": "Anthropic's internal protein-design experts say Mythos 5 accelerated aspects of the drug-design process by around 10x, with the model autonomously choosing binding sites, running protein-design tools, and recovering from failures — matching or beating skilled human operators on 9 of 14 protein targets.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Mythos 5", "Anthropic"], "conviction": "high", "so_what": "Autonomous end-to-end protein design is a direct threat/opportunity for biotech and CRO workflows; watch trusted-access biology program for which firms get early leverage.", "quote": "our internal protein design experts accelerated aspects of the drug design process by around 10 times", "locator": "Drug design", "quote_verified": true}, {"claim": "Mythos 5 is Anthropic's first model to consistently produce novel scientific hypotheses: in blinded comparisons against Opus-class models, scientists preferred its molecular-biology hypotheses ~80% of the time, and one hypothesis (a novel mechanism for an E. coli protein) was independently corroborated by another lab.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Mythos 5", "E. coli"], "conviction": "high", "so_what": "Crossing from execution to hypothesis generation reframes AI as a research originator, not just a tool — material for the 'AI accelerates R&D' thesis underpinning compute demand.", "quote": "In blinded head-to-head comparisons against Opus-class models, our scientists preferred Mythos’s molecular biology hypotheses ~80% of the time", "locator": "Novel hypotheses in molecular biology", "quote_verified": true}, {"claim": "In over a week of largely autonomous work, Mythos 5 assembled single-cell data for millions of cells across 138 animal species and trained a custom ML model that outperformed a recent model published in Science despite being 100x smaller.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Mythos 5", "Science (journal)"], "conviction": "high", "so_what": "Demonstrates autonomous multi-day research runs producing publishable results — strengthens the automated-R&D narrative driving long-horizon compute consumption.", "quote": "Mythos 5’s trained model outperformed a recent model published in the journal Science—despite being 100 times smaller", "locator": "Novel research in genomics", "quote_verified": true}]}, {"theme": "Safeguards, classifiers and dual-use risk", "insights": [{"claim": "Fable 5 ships with classifiers that route any request touching cybersecurity, biology/chemistry, or distillation to the less-capable Opus 4.8 instead of answering directly; Anthropic tuned them conservatively so they trigger in under 5% of sessions but sometimes catch harmless queries.", "speaker": "Anthropic Blog", "type": "framework", "entities": ["Claude Fable 5", "Claude Opus 4.8", "Anthropic"], "conviction": "high", "so_what": "Capability is now deliberately throttled by topic-gating — enterprise users in regulated/dual-use fields get degraded service, a friction point competitors without such gating may exploit.", "quote": "When Fable’s classifiers detect a request related to cybersecurity, biology and chemistry, or distillation, the response is automatically handled by Claude Opus 4.8 instead.", "locator": "Safety classifiers", "quote_verified": true}, {"claim": "Anthropic ran an external bug bounty that produced no universal jailbreaks in over 1,000 hours of testing, though it acknowledges the UK AISI made progress toward one in a brief window and that completely preventing universal jailbreaks is likely impossible.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Anthropic", "UK AISI"], "conviction": "medium", "so_what": "Safeguard robustness is the gating factor for unlocking frontier capability to the broad market — jailbreak progress by evaluators is the key risk to watch for forced rollbacks.", "quote": "we ran an external bug bounty that produced no universal jailbreaks in over 1,000 hours of testing", "locator": "Safety classifiers / cybersecurity", "quote_verified": true}, {"claim": "Anthropic broadened its biology/chemistry blocking after finding Mythos 5 could outperform dedicated protein language models at predicting viral-shell assembly for adeno-associated viruses (AAVs) using biological reasoning alone, on unpublished Dyno Therapeutics candidates it was not trained on.", "speaker": "Anthropic Blog", "type": "causal", "entities": ["Claude Mythos 5", "Dyno Therapeutics", "adeno-associated virus"], "conviction": "high", "so_what": "Dual-use bio capability is now strong enough to force broader blocking — the same capability is gold for gene-therapy R&D, so trusted-access enrollment is the key value-unlock to track.", "quote": "Mythos-class models outperformed sophisticated models dedicated to protein tasks (known as “protein language models”) using their biological reasoning alone.", "locator": "Biology and chemistry", "quote_verified": true}, {"claim": "Anthropic says it identified large-scale attempts to distill Claude's capabilities to train competing models in authoritarian countries, and now routes flagged distillation requests to Opus 4.8 to prevent proliferation of near-frontier capabilities without safeguards.", "speaker": "Anthropic Blog", "type": "causal", "entities": ["Anthropic", "Claude Opus 4.8"], "conviction": "medium", "so_what": "Model distillation is treated as a national-security/IP threat vector — feeds the export-control and model-weight-security policy narrative shaping the sector.", "quote": "We’ve previously identified large-scale attempts to extract (“distill”) Claude’s capabilities to train competing models in authoritarian countries.", "locator": "Distillation", "quote_verified": true}, {"claim": "Anthropic now requires 30-day data retention for all traffic on Mythos-class and future similar/higher-capability models, on first- and third-party surfaces, used only for safety purposes and not training.", "speaker": "Anthropic Blog", "type": "framework", "entities": ["Anthropic", "Claude Mythos 5", "Claude Fable 5"], "conviction": "high", "so_what": "Mandatory retention is a new compliance/privacy cost for enterprise adopters of frontier models — relevant to procurement decisions in regulated industries.", "quote": "We will require 30-day retention for all traffic on Mythos-class models, on both first- and third-party surfaces.", "locator": "A new data retention policy", "quote_verified": true}]}, {"theme": "Rollout, access gating and demand", "insights": [{"claim": "Anthropic expects Fable 5 demand to be very high and hard to predict, so it is staging subscription access: included free on Pro/Max/Team/seat-based Enterprise through June 22, removed (requiring usage credits) on June 23, with intent to restore as standard once capacity allows.", "speaker": "Anthropic Blog", "type": "prediction", "entities": ["Claude Fable 5", "Anthropic"], "conviction": "high", "so_what": "Capacity-constrained staging signals compute is the binding constraint on monetizing frontier capability — bullish read-through for AI-infra/compute demand.", "quote": "We expect demand for Fable 5 to be very high, and difficult to predict.", "locator": "Availability", "quote_verified": true}, {"claim": "Mythos 5 was initially deployed via Project Glasswing in collaboration with the US government as an upgrade to Mythos Preview, with cyber safeguards lifted for vetted defenders, and Anthropic plans to expand access through a systematic trusted-access program plus a separate biology program.", "speaker": "Anthropic Blog", "type": "thesis", "entities": ["Claude Mythos 5", "Project Glasswing", "US government", "Anthropic"], "conviction": "high", "so_what": "Government-coordinated, tiered access to frontier capability deepens the AI-defense public-private nexus — watch which partners gain privileged compute/capability access.", "quote": "Mythos 5 will initially be deployed through Project Glasswing, in collaboration with the US government, as an upgrade to Claude Mythos Preview.", "locator": "Opening / trusted access", "quote_verified": true}, {"claim": "A Jun 12, 2026 update banner on the post states Anthropic is suspending access to both Fable 5 and Mythos 5, and related content notes the US government issued an export-control directive to suspend all access to the two models.", "speaker": "Anthropic Blog", "type": "data_point", "entities": ["Claude Fable 5", "Claude Mythos 5", "US government", "Anthropic"], "conviction": "high", "so_what": "A government directive halting a just-launched frontier model is a major regulatory-risk precedent — directly material to the policy/geopolitics overhang on frontier AI deployment.", "quote": "The US government has issued an export control directive to suspend all access to Fable 5 and Mythos 5.", "locator": "Update banner / Related content", "quote_verified": true}]}], "insight_total": 18, "top_entities": ["Claude Fable 5", "Claude Mythos 5", "Anthropic", "Claude Opus 4.8", "Claude Mythos Preview", "Project Glasswing", "US government", "Stripe", "Dyno Therapeutics", "UK AISI", "Hebbia", "IMC"], "source_meta": {"author": "@AnthropicAI", "word_count": 3862, "paywalled": false}}, {"record_id": "c9db294a6311b200", "source_type": "concepts", "source_name": "NBER Working Papers", "source_url": "https://www.nber.org/programs-projects/programs-working-groups/economic-fluctuations-and-growth", "title": "Economic Fluctuations and Growth", "published_date": "", "language": "en", "processed_at": "2026-06-16T19:06:10Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "AI", "Geopolitics", "Tech", "Society"], "gist": "This is an NBER research-AREA listing page for the Economic Fluctuations and Growth program, not a single paper: it enumerates dozens of recent working papers with one-sentence abstracts. The most notable individual findings cluster around dollar/reserve-currency erosion, AI and data as economic inputs, US productivity and labor-supply puzzles, and monetary-policy transmission.", "themes": [{"theme": "Dollar dominance & reserve-currency erosion", "insights": [{"claim": "Losing US reserve-currency status would cost roughly 1% of GDP per annum in lost seigniorage, forcing American households to spend less and a real depreciation to clear excess US goods, per NBER WP 35328 by Jiang, Krishnamurthy, Lustig & Richmond.", "speaker": "NBER", "type": "data_point", "entities": ["US dollar", "reserve currency", "seigniorage", "Zhengyang Jiang", "Arvind Krishnamurthy", "Hanno Lustig"], "conviction": "medium", "so_what": "Quantifies the tail-risk cost of de-dollarization for USD assets and US consumption — a level to watch as dollar-alternative narratives grow.", "quote": "the loss of seigniorage (1% of GDP per annum) makes American households spend less, mostly on U.S. goods, leaving an excess supply of U.S. goods to be cleared by a real depreciation", "locator": "Dollar Erosion: Understanding the Loss of Reserve Currency Status", "quote_verified": true}, {"claim": "Dollar debt dominance becomes fragile when borrowing countries hold dollar-denominated liabilities but increasingly earn yuan-linked revenues, creating a currency mismatch, per NBER WP 35272 by Benguria, Rojas & Saffie.", "speaker": "NBER", "type": "thesis", "entities": ["dollar debt", "yuan", "sovereign debt", "geopolitical fragmentation"], "conviction": "medium", "so_what": "Frames a mechanism for EM sovereign-debt stress and a potential channel for yuan internationalization.", "quote": "countries have inherited dollar liabilities but increasingly earn yuan-linked revenues", "locator": "Geopolitical Fragmentation, Sovereign Debt, and Dollar Dominance", "quote_verified": true}, {"claim": "Convenience yields on the US dollar and on US Treasury securities have diverged markedly since the early 2010s, decoupling 'dollar privilege' from 'Treasury privilege', per Du, Keerati & Schreger (NBER WP 35000).", "speaker": "NBER", "type": "data_point", "entities": ["US dollar", "US Treasuries", "convenience yield", "Wenxin Du", "Jesse Schreger"], "conviction": "medium", "so_what": "Suggests safe-asset demand for Treasuries and for dollar cash can move apart — relevant to Treasury term-premium and funding-market analysis.", "quote": "a pronounced divergence between the convenience yields on the US dollar and US Treasury securities since the early 2010s", "locator": "Convenience Yields: The US Dollar vs. US Treasuries", "quote_verified": true}, {"claim": "Japan's public sector borrowed mainly at floating rates while investing in longer-duration risky assets, earning about 6.25% of GDP per year above its below-market funding costs over the past decade, per Chien, Cole & Lustig.", "speaker": "NBER", "type": "data_point", "entities": ["Japan", "public sector", "carry trade", "Hanno Lustig"], "conviction": "medium", "so_what": "Quantifies the sovereign carry trade embedded in Japanese public finances — a vulnerability if rates or risk assets reverse.", "quote": "earning an annual return of 6.25 percent of gross domestic product (GDP) above its below-market funding costs", "locator": "What About Japan?", "quote_verified": true}]}, {"theme": "AI, data, and compute as economic inputs", "insights": [{"claim": "Measured AI exposure overstates actual workplace AI adoption; the paper proposes a new adoption index based on comparative advantage, validated on the German DiWaBe survey, per Lindenlaub, Oh, Rodriguez & Veldkamp (WP 35271).", "speaker": "NBER", "type": "framework", "entities": ["AI adoption", "AI exposure", "comparative advantage", "Laura Veldkamp"], "conviction": "medium", "so_what": "Cautions against using AI-exposure scores to predict real productivity/adoption — relevant to AI-winner stock screens.", "quote": "the gap between measures of AI exposure and measures of AI adoption in the workplace", "locator": "Beyond Exposure: Predicting AI Adoption Based on Comparative Advantage", "quote_verified": true}, {"claim": "Data is an intangible asset largely missed by national accounts and firm balance sheets, so its investment and depreciation go unmeasured, per Bhutani, Ordoñez & Veldkamp's 'The Missing Value of Data' (WP 35266).", "speaker": "NBER", "type": "thesis", "entities": ["data", "intangible assets", "national accounts", "Laura Veldkamp"], "conviction": "medium", "so_what": "Implies official productivity/GDP statistics understate the data economy — a measurement gap behind productivity-puzzle debates.", "quote": "investments in data are missed in national accounts, and depreciation losses are missed in firms balance sheets", "locator": "The Missing Value of Data", "quote_verified": true}, {"claim": "Rapid AI diffusion is accelerating data-center investment and raising concerns about local economic and other effects, studied via a shift-share approach by Alvarez, Argente, Chow & Van Patten (WP 35194).", "speaker": "NBER", "type": "data_point", "entities": ["data centers", "AI", "cloud computing", "compute demand"], "conviction": "medium", "so_what": "Frames data-center buildout as a measurable local economic shock — relevant to power, real estate, and AI-infra theses.", "quote": "The rapid diffusion of artificial intelligence (AI) is intensifying demand for compute, accelerating investment in data centers", "locator": "Data Centers and Local Economies in the Age of AI", "quote_verified": true}, {"claim": "AI algorithms, software, and hardware can cut structural estimation of dynamic equilibrium models from days to minutes by treating prices as pseudo-parameters and market clearing as moment conditions, per Duarte & Fonseca (WP 35283).", "speaker": "NBER", "type": "framework", "entities": ["AI", "structural estimation", "dynamic equilibrium models"], "conviction": "medium", "so_what": "Signals AI is reshaping the economics research toolkit itself, not just being studied as an object.", "quote": "reduces estimation time from days to minutes", "locator": "AI for Structural Estimation", "quote_verified": true}, {"claim": "A graph-based deep-learning model on security-level intermediary holdings data could improve macroprudential financial regulation, per Clayton & Coppola's 'The Optimal Use of AI in Financial Regulation' (WP 35227).", "speaker": "NBER", "type": "framework", "entities": ["AI", "macroprudential regulation", "financial intermediaries", "Christopher Clayton"], "conviction": "exploratory", "so_what": "Points to AI-driven supervision as an emerging regulatory tool affecting financial firms' holdings disclosure.", "quote": null, "locator": "The Optimal Use of AI in Financial Regulation", "quote_verified": false}]}, {"theme": "US productivity & growth puzzles", "insights": [{"claim": "US manufacturing productivity growth collapsed from +3.3% annually in 1987-2010 to -0.3% from 2010 to 2023, and Gordon & Ryu argue the puzzle actually starts a decade before 2010 (WP 35285).", "speaker": "NBER", "type": "data_point", "entities": ["US manufacturing", "productivity growth", "Robert J. Gordon"], "conviction": "high", "so_what": "A hard data point on the depth of the US manufacturing productivity slump — central to long-run growth and reshoring debates.", "quote": "evaporating from an annual rate of +3.3 percent during 1987-2010 to -0.3 percent from 2010 to 2023", "locator": "Does the Import Invasion Explain the Mysterious Disappearance of Productivity Growth in U.S. Manufacturing?", "quote_verified": true}, {"claim": "Flat US productivity growth despite rising R&D may reflect growth getting harder to find rather than ideas getting harder to find, per Fort, Goldschlag, Liang, Schott & Zolas using a 45-year firm patenting panel (WP 35182).", "speaker": "NBER", "type": "contrarian", "entities": ["productivity growth", "R&D", "ideas", "patenting"], "conviction": "medium", "so_what": "Reframes the 'ideas are getting harder to find' consensus — implications for how to value R&D-intensive firms.", "quote": "Growth is Getting Harder to Find, Not Ideas", "locator": "Growth is Getting Harder to Find, Not Ideas", "quote_verified": true}, {"claim": "Falling transportation costs over the past century yielded substantial economic benefits, quantified for the US 1947-2017 by Coşar, Osotimehin & Popov.", "speaker": "NBER", "type": "data_point", "entities": ["transportation costs", "US economy", "productivity"], "conviction": "medium", "so_what": "Provides a long-run baseline for the growth contribution of logistics — context for current supply-chain and freight dynamics.", "quote": "transportation costs have fallen dramatically, yielding substantial economic benefits", "locator": "Transportation Productivity and the US Economy, 1947–2017", "quote_verified": true}]}, {"theme": "Labor supply & participation", "insights": [{"claim": "The 50-year decline in US male labor force participation is partly caused by men's beliefs about the returns to work, shaped by lifetime experiences of the aggregate male labor market, per Levin & Vidart (WP 35327).", "speaker": "NBER", "type": "causal", "entities": ["male labor force participation", "US labor market", "beliefs"], "conviction": "medium", "so_what": "Adds a belief/experience channel to the structural labor-supply decline behind tight-but-shrinking workforce dynamics.", "quote": "changes in men's beliefs about the returns to work, shaped by lifetime experiences of the aggregate male labor market", "locator": "'Nobody Wants to Work Anymore'", "quote_verified": true}, {"claim": "Small positive micro Marshallian labor-supply elasticities can be reconciled with the strongly negative macro wage-hours relationship using a single utility function, per Karabarbounis (WP 35329).", "speaker": "NBER", "type": "framework", "entities": ["labor supply elasticity", "wages", "hours", "Loukas Karabarbounis"], "conviction": "medium", "so_what": "Resolves a long-standing micro-macro contradiction relevant to potential-output and slack estimates.", "quote": "Micro estimates of the Marshallian elasticity of labor supply are small and typically positive, whereas cross-country and time-series patterns of hours imply a strong negative relationship", "locator": "Reconciling Micro Elasticities with the Macro Decline in Labor Supply", "quote_verified": true}, {"claim": "The canonical employer-size wage effect disappears completely across establishments within the same firm, even in different local labor markets, per Diegmann, Müller & Schoefer (WP 35265).", "speaker": "NBER", "type": "contrarian", "entities": ["employer size wage effect", "labor markets", "wages"], "conviction": "medium", "so_what": "Challenges a basic labor-economics fact, with implications for monopsony and wage-setting models.", "quote": "this canonical fact disappears completely across establishments within the same firm", "locator": "Off the Labor Supply Curve: The Zero Employer Size Wage Effect Within Large Firms", "quote_verified": true}]}, {"theme": "Monetary & fiscal policy transmission", "insights": [{"claim": "Firms with high monopsony power (those accounting for over 10% of the local wage bill) respond less to monetary policy in their wage bill, dampening transmission, per Bardóczy, Bornstein & Salgado using US Census data (WP 35335).", "speaker": "NBER", "type": "causal", "entities": ["monopsony power", "monetary policy transmission", "wages"], "conviction": "medium", "so_what": "Implies labor-market concentration weakens the wage channel of monetary policy — relevant to Fed transmission assumptions.", "quote": "firms with high monopsony powerdefined as those accounting for over 10 percent of the local wage billrespond less to monetary policy", "locator": "Monopsony Power and the Transmission of Monetary Policy", "quote_verified": true}, {"claim": "Quantitative easing should be judged mainly on achieving core macro objectives and its effect on the consolidated fiscal position, not solely blamed for post-COVID inflation and central-bank losses, per Adrian, Erceg, Kolasa, Lindé & Zabczyk (WP 35297).", "speaker": "NBER", "type": "thesis", "entities": ["quantitative easing", "inflation", "central bank losses", "fiscal position"], "conviction": "medium", "so_what": "Pushes back on the dominant critique of QE — relevant to expectations for future balance-sheet policy.", "quote": "QE should be evaluated mainly on its ability to achieve core macro-objectives as well for its effects on the consolidated fiscal position", "locator": "Macroeconomic and Fiscal Consequences of Quantitative Easing", "quote_verified": true}, {"claim": "The aggregate consumption response to a fiscal transfer is strongly concave in its size because MPCs are highly non-linear in wealth, so larger transfers have proportionally smaller effects, per Bianchi & Kaplan (WP 35311).", "speaker": "NBER", "type": "causal", "entities": ["MPC", "fiscal transfer", "consumption", "Greg Kaplan"], "conviction": "medium", "so_what": "Implies diminishing bang-for-buck of large stimulus checks — relevant to sizing fiscal-impulse forecasts.", "quote": "the aggregate consumption response to a fiscal transfer is strongly concave in its size", "locator": "How Small is Small? Non-linearities in Heterogeneous Agent Models", "quote_verified": true}, {"claim": "Pessimistic news about France, Italy and Spain's debt-to-GDP ratios raises German firms' debt beliefs and lifts their one- and three-year inflation expectations, evidence of fiscal-dominance fears in a monetary union, per Bianchi, Faccini, Melosi & Wehrhöfer (WP 35341).", "speaker": "NBER", "type": "causal", "entities": ["fiscal dominance", "inflation expectations", "eurozone", "Germany"], "conviction": "medium", "so_what": "Shows sovereign-debt worries can spill into inflation expectations across a currency union — a euro-area inflation risk channel.", "quote": "Pessimistic news raises debt beliefs and increases one- and three-year", "locator": "Lack of Trust and Fiscal Dominance", "quote_verified": true}]}, {"theme": "Inflation, housing & supply chains", "insights": [{"claim": "When upstream input costs rise, similar absolute price increases hit cheap and expensive varieties alike, but the same dollar increase is a larger percentage change for low-price goods, generating 'cheapflation' that worsens inflation inequality, per Sangani (WP 35235).", "speaker": "NBER", "type": "causal", "entities": ["cheapflation", "inflation inequality", "input costs"], "conviction": "medium", "so_what": "Explains why cost-push shocks hit lower-income consumers harder — relevant to distributional inflation narratives.", "quote": "the same absolute price increase constitutes a larger percentage change for low-price products", "locator": "Cheapflation Cycles", "quote_verified": true}, {"claim": "Mortgage rate lock-in drove a 40% drop in US existing home sales between 2022 and 2024 by reducing both supply (households not selling) and demand (households not buying elsewhere), per Fonseca, Liu & Mabille (WP 35237).", "speaker": "NBER", "type": "data_point", "entities": ["mortgage lock-in", "US housing", "existing home sales"], "conviction": "high", "so_what": "Quantifies how rate lock-in froze the housing market — key for housing-turnover and homebuilder analysis.", "quote": "evidenced by a 40% drop in U.S. existing home sales between 2022 and 2024", "locator": "Unlocking Mortgage Lock-In", "quote_verified": true}, {"claim": "Global supply-chain disruptions alter monetary-policy transmission through logistical bottlenecks where upstream slack coexists with downstream shortages, per Bai, Fernández-Villaverde, Li & Zanetti (WP 35209).", "speaker": "NBER", "type": "thesis", "entities": ["supply chain disruptions", "monetary policy", "transportation costs"], "conviction": "medium", "so_what": "Suggests central-bank policy works differently during supply-chain stress — relevant to post-pandemic policy modeling.", "quote": "logistical bottlenecks (upstream slack coexisting with downstream shortages)", "locator": "State Dependence of Monetary Policy During Global Supply Chain Disruptions", "quote_verified": true}]}, {"theme": "Expectations, beliefs & asset pricing", "insights": [{"claim": "Macroeconomic beliefs are shaped by context and emotions that influence which past experiences people recall, an 'animal spirits' mechanism tested by priming Dutch National Bank Survey respondents, per Bordalo, Gennaioli, Shleifer et al. (WP 35214).", "speaker": "NBER", "type": "framework", "entities": ["macroeconomic expectations", "animal spirits", "Andrei Shleifer"], "conviction": "medium", "so_what": "Offers a memory-and-emotion model of sentiment swings — relevant to forecasting consumer/business confidence shifts.", "quote": "context and emotions affect macroeconomic beliefs by shaping which experiences people recall", "locator": "The Psychology of Macroeconomic Expectations", "quote_verified": true}, {"claim": "The Campbell-Shiller (1988) log-linear approximation, widely treated as a model-free accounting identity, does not always hold in sample, in expectation, or under arbitrary subjective beliefs, per Ben-David & Chinco (WP 35189).", "speaker": "NBER", "type": "contrarian", "entities": ["Campbell-Shiller", "asset pricing", "Itzhak Ben-David"], "conviction": "high", "so_what": "Undercuts a foundational asset-pricing identity used to decompose returns — a caution for return-decomposition research.", "quote": "None of these claims is true. The formula is far from automatic even in realized data.", "locator": "Crimes Against Campbell-Shiller", "quote_verified": true}]}, {"theme": "Automation, geoeconomics & development", "insights": [{"claim": "Decentralized automation raises capital's share of national income and, by increasing capital-labor inequality, can raise the likelihood of worker revolt in Acemoglu, Gitmez & Shadmehr's model of automation and repression (WP 35336).", "speaker": "NBER", "type": "causal", "entities": ["automation", "inequality", "Daron Acemoglu", "political economy"], "conviction": "medium", "so_what": "Links automation-driven inequality to political instability — a societal tail-risk of the AI/automation wave.", "quote": "greater inequality between capital and labor increases the likelihood of a revolt", "locator": "Automation and Repression", "quote_verified": true}, {"claim": "Great powers like the US and China use existing trade and financial linkages to exert geoeconomic coercion on both foreign governments and foreign private firms, per Clayton, Maggiori & Schreger (WP 35343).", "speaker": "NBER", "type": "framework", "entities": ["geoeconomic coercion", "US", "China", "Matteo Maggiori"], "conviction": "medium", "so_what": "Provides a framework for who gets targeted by economic statecraft — relevant to sanctions and supply-chain risk.", "quote": "Great powers, like the United States and China, use existing trade and financial linkages of their economies to the rest of the world to exert geoeconomic power", "locator": "The Targets of Geoeconomic Coercion", "quote_verified": true}, {"claim": "Uncertainty about US student-loan forgiveness (announced in 2022 but never implemented) measurably affected households' beliefs and their borrowing, spending and debt-payment behavior, per Koustas, Weber & Yannelis (WP 35319).", "speaker": "NBER", "type": "causal", "entities": ["student loan forgiveness", "policy uncertainty", "household debt"], "conviction": "medium", "so_what": "Shows announced-but-undelivered policy still moves consumer behavior — a channel for tracking policy-driven spending.", "quote": "which following electoral promises, was announced in 2022 but never", "locator": "Beliefs and Actions under Government Policy Uncertainty", "quote_verified": true}]}], "insight_total": 27, "top_entities": ["US dollar", "AI", "US Treasuries", "data centers", "Daron Acemoglu", "China", "US manufacturing", "monetary policy", "Japan", "mortgage lock-in", "quantitative easing", "Laura Veldkamp"], "source_meta": {"author": "", "word_count": 3144, "paywalled": false}}, {"record_id": "142045a5f70af7f5", "source_type": "concepts", "source_name": "SNB Research", "source_url": "https://www.snb.ch/en/the-snb/organisation/snb-joint-stock-company", "title": "Search Keyword", "published_date": "2026-06-16", "language": "en", "processed_at": "2026-06-16T20:20:27Z", "processor": "claude-code-sub-opus", "tags": ["Macro"], "gist": "SNB corporate/shareholder landing page (the raw title 'Search Keyword' is a scraper artifact). It carries no monetary-policy thesis but does disclose the listed SNB share's capped 6%-of-nominal dividend mechanics, its bond-like price behaviour, the 2026 AGM decisions, and a multi-year taxable-value series for the share.", "themes": [{"theme": "SNB share structure & ownership", "insights": [{"claim": "The Swiss National Bank is a listed joint-stock company with CHF 25 million of share capital split into 100,000 registered shares of CHF 250 nominal; ~55% is held by public shareholders (cantons, cantonal banks) and the Confederation holds none.", "speaker": "SNB Research", "type": "data_point", "entities": ["SNB", "SIX Swiss Exchange", "Swiss Confederation"], "conviction": "high", "so_what": "The SNB equity (security no. 131926) is an investable, listed instrument whose ownership is dominated by cantons, not the federal government.", "quote": "The share capital amounts to CHF 25 million, approximately 55% of which is held by public shareholders (cantons, cantonal banks, etc.).", "locator": "The SNB as a joint-stock company", "quote_verified": true}]}, {"theme": "Dividend cap & bond-like pricing", "insights": [{"claim": "By law the SNB share dividend cannot exceed 6% of nominal value, so its price tends to track a long-term Confederation bond carrying a 6% coupon; the 2026 dividend is CHF 15.00 gross (CHF 9.75 net) per share.", "speaker": "SNB Research", "type": "framework", "entities": ["SNB", "Confederation bonds"], "conviction": "high", "so_what": "The SNB share trades as a quasi-fixed-income / rates proxy, not as a claim on central-bank profits or FX-reserve gains, so its valuation moves with long Swiss yields.", "quote": "Due to the legally stipulated maximum dividend of 6%, the price of the SNB share usually develops along similar lines to a long-term Confederation bond with a 6% coupon.", "locator": "Share capital and dividend", "quote_verified": true}, {"claim": "The taxable value of the SNB share has compressed sharply, falling from CHF 5,390 (end-2019) to CHF 3,530 (end-2025) after a low of CHF 3,190 at end-2024.", "speaker": "SNB Research", "type": "data_point", "entities": ["SNB"], "conviction": "high", "so_what": "The multi-year decline in the share's taxable value is consistent with the rates-proxy framing and reflects the higher-yield regime since 2022.", "quote": null, "locator": "Taxable value", "quote_verified": false}]}, {"theme": "2026 AGM decisions", "insights": [{"claim": "At the 24 April 2026 AGM, SNB shareholders approved the 2025 financial report and a total dividend of CHF 1.5 million, granted discharge to the Bank Council, elected Swissmem president Martin Hirzel to the Bank Council, and appointed KPMG Ltd as external auditor for 2026-2027.", "speaker": "SNB Research", "type": "data_point", "entities": ["SNB", "Bank Council", "Martin Hirzel", "Swissmem", "KPMG"], "conviction": "high", "so_what": "Governance continuity at the SNB, with industry representation (Swissmem) added to the Bank Council; routine for shareholders tracking the listed share.", "quote": null, "locator": "Decisions of the 2026 General Meeting of Shareholders", "quote_verified": false}]}], "insight_total": 4, "top_entities": ["SNB", "Confederation bonds", "SIX Swiss Exchange", "Bank Council", "Martin Hirzel", "Swissmem", "KPMG", "Swiss Confederation"], "source_meta": {"author": "", "word_count": 2141, "paywalled": false}}, {"record_id": "1fe0ef90333624e8", "source_type": "concepts", "source_name": "Packy McCormick / Not Boring", "source_url": "https://www.notboring.co/p/return-on-tokens-rot", "title": "Return on Tokens (ROT)", "published_date": "2026-06-10", "language": "en", "processed_at": "2026-06-16T15:05:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Positioning"], "gist": "Co-written with Poetic founder Markie Wagner, the essay argues 'tokenmaxxing' (maximizing AI token spend as a proxy for value) is a market delusion now breaking, and reframes enterprise AI returns as Return on Tokens (ROT = (value of output - token cost)/token cost). Its core thesis: Agents are the wrong architecture for most repetitive economic work; AI should act as a compiler that converts business processes into cheap deterministic code, not as a runtime that improvises forever.", "themes": [{"theme": "Tokenmaxxing as the cycle's dumb metric", "insights": [{"claim": "Enterprises have been maximizing AI token spend as a proxy for value ('tokenmaxxing'), creating an incentive cascade from boards to employees where nobody is rewarded for questioning whether the spend produces useful output.", "speaker": "Packy McCormick", "type": "thesis", "entities": ["Anthropic", "OpenAI", "KPMG", "Claude Code", "Codex"], "conviction": "high", "so_what": "If token spend is decoupled from value, lab consumption revenue is structurally fragile and could reprice sharply once enterprises start measuring output instead of usage.", "quote": "The market incentivized companies to spend tokens, so boards incentivized leaders to spend tokens, so leaders incentivized managers to spend tokens, so managers incentivized employees to spend tokens. Nobody had an incentive to say that the tokens aren't doing useful stuff.", "locator": "Tokenmaxxing Clearly Isn't It", "quote_verified": true}, {"claim": "Lab revenue went parabolic in part because Anthropic and OpenAI switched from subscription to consumption-based pricing just as tokenmaxxing peaked, leaving customers no time to prepare for usage-based bills.", "speaker": "Packy McCormick", "type": "causal", "entities": ["Anthropic", "OpenAI"], "conviction": "high", "so_what": "Consumption-pricing-driven revenue spikes may be a one-time pull-forward; watch for deceleration as enterprises optimize usage rather than a durable growth rate.", "quote": "All of this happened, by the way, right as the labs switched from subscription-based to consumption-based revenue models, so companies had no time to prepare. It is no wonder token usage, and therefore lab revenue, went parabolic.", "locator": "Tokenmaxxing Clearly Isn't It", "quote_verified": true}, {"claim": "Every market cycle elevates a flawed proxy metric — railroad miles in the 1800s, eyeballs in the dot-com era, top-line gross revenue in the 2010s (WeWork) — and this cycle's equivalent is token consumption.", "speaker": "Packy McCormick", "type": "framework", "entities": ["WeWork", "Uber", "Google", "Facebook"], "conviction": "high", "so_what": "Pattern-match AI to prior proxy-metric bubbles: the underlying asset can still be valuable, but valuations pinned to the proxy (tokens) rather than returns are vulnerable to a spell-break.", "quote": "Every cycle has its dumb metric.", "locator": "Every cycle has its dumb metric", "quote_verified": true}]}, {"theme": "The spell breaks (named witnesses)", "insights": [{"claim": "Uber broke the tokenmaxxing spell: its CTO said the company burned its entire 2026 Claude Code token budget by April, and in May its COO said justifying AI spend was getting harder because the link between consumption and shipped features 'is not there yet.'", "speaker": "Packy McCormick", "type": "data_point", "entities": ["Uber", "Claude Code"], "conviction": "high", "so_what": "A marquee, sophisticated buyer publicly questioning ROI is a leading indicator of broader enterprise pullback on token budgets — a demand-side risk for the labs.", "quote": "Its CTO said that the company had burned through its 2026 Claude Code token budget by April. In May, its COO said that the company was having a harder time justifying its AI spend, because the link between AI consumption and shipped features “is not there yet.”", "locator": "It took Uber to break the spell", "quote_verified": true}, {"claim": "Even AI vendors and bulls are conceding the waste: Sam Altman called it a 'huge issue,' Palantir's Alex Karp likened tokenmaxxing to 'a porn addiction,' Ramp's Veeral Patel called it the 'Token Casino,' and Amazon shut down its AI leaderboard.", "speaker": "Packy McCormick", "type": "data_point", "entities": ["Sam Altman", "Alex Karp", "Palantir", "Veeral Patel", "Ramp", "Amazon", "Legora"], "conviction": "high", "so_what": "When even the sellers admit waste, the narrative tide is turning toward measured ROI — a sentiment shift that favors efficiency vendors over raw-consumption providers.", "quote": "Ramp’s Veeral Patel called it the Token Casino: “useful software wrapped in mechanics that make spend feel like progress. It starts with the oldest trick in the book: abstract the money.”", "locator": "the consultant saying his client accidentally burned half a billion", "quote_verified": true}]}, {"theme": "Cost side: routing and the rise of cheap Chinese models", "insights": [{"claim": "The first cost lever enterprises are pulling is 'routing' — using frontier US models only for hard reasoning and running most workloads on ~99% cheaper Chinese open-source models, with Brian Armstrong estimating 80% of workloads will run on 99%-cheaper models within 12-18 months.", "speaker": "Packy McCormick", "type": "prediction", "entities": ["Brian Armstrong", "Coinbase", "OpenRouter", "Anthropic", "OpenAI"], "conviction": "medium", "so_what": "Workload migration to cheap open models compresses frontier-lab pricing power on the bulk of demand; monitor OpenRouter rankings as a real-time gauge of the shift.", "quote": "80% of workloads will be running on 99% cheaper models within 12-18 months", "locator": "Now that the spell has been broken, cooler heads", "quote_verified": true}, {"claim": "The shift toward Chinese models on OpenRouter appeared in lockstep with consumption-based pricing, signaling that usage-based billing directly drives buyers to optimize model cost.", "speaker": "Packy McCormick", "type": "causal", "entities": ["OpenRouter"], "conviction": "medium", "so_what": "Pricing model changes have second-order effects on model market share; consumption billing accelerates commoditization of inference.", "quote": "The move to Chinese models actually showed up in lockstep with consumption-based pricing", "locator": "You can see this in the OpenRouter AI Model Rankings", "quote_verified": true}]}, {"theme": "Agents are the wrong architecture for most work", "insights": [{"claim": "Agents structurally cannot deliver the accuracy real economic work requires: they improvise fresh each run, so for repetitive high-stakes tasks like fraud detection or underwriting, 80% accuracy is effectively 0% usable.", "speaker": "Markie Wagner", "type": "thesis", "entities": ["AI agents"], "conviction": "high", "so_what": "Distinguish AI use cases by accuracy tolerance: prototyping/dashboards tolerate Agents, but core revenue processes do not — a key filter for which AI bets actually monetize.", "quote": "For new features, prototypes, or dashboards, 80% accuracy is fine. For the real repetitive work on which the economy runs, like fraud detection or underwriting decisions, 80% accuracy is 0% usable.", "locator": "Agents Aren't It (For Most Work) Either", "quote_verified": true}, {"claim": "Enterprise AI has failed where coding succeeded because most process work lives as ~3,000 tacit rules in employees' heads far from SF engineers; AI can only evolve what it can touch.", "speaker": "Markie Wagner", "type": "causal", "entities": ["AI agents"], "conviction": "high", "so_what": "The moat in enterprise AI is the ground-game capture of tacit knowledge, not model quality — favoring on-site implementation companies over pure API providers.", "quote": "AI can only evolve what it can touch, which is why it’s been great at coding but has largely failed to do useful things in the enterprise.", "locator": "Engineers don't know what to build", "quote_verified": true}, {"claim": "Without explicit goals to hill-climb against, agent-generated (or human) code decays into slop because there is no purifying force to evaluate good vs bad, and open-ended agents drive token spend without value — a fast track to negative ROT.", "speaker": "Markie Wagner", "type": "causal", "entities": ["AI agents"], "conviction": "high", "so_what": "Deployments lacking measurable objectives are the highest-risk for negative ROI; the presence of explicit goals/eval is a diligence signal for AI projects.", "quote": "Without a goal to hill-climb against, code (whether written by humans or generated by Agents) decays into slop in the limit because there’s no purifying force to evaluate what’s good and bad.", "locator": "The original sin is that there are no goals", "quote_verified": true}]}, {"theme": "AI as compiler, not runtime (the core framework)", "insights": [{"claim": "The central reframe: Agents should replace the software company (the expensive, rare 'thinking' that compiles goals into code), not the software itself (the cheap, perpetual 'doing'); run deterministic code forever and only invoke AI when the rules change.", "speaker": "Markie Wagner", "type": "framework", "entities": ["AI agents"], "conviction": "high", "so_what": "Reframes AI economics as CapEx (one-time compile) not OpEx (perpetual inference) — implying durable token demand is far lower than consumption-revenue extrapolations assume.", "quote": "Agents should do the thinking, code should do the doing.", "locator": "AI is a Compiler, Not a Runtime", "quote_verified": true}, {"claim": "Current AI implementations run a roughly 1000:1 Thinking-to-Doing Ratio (TDR), reflecting a Silicon Valley assumption that work is mostly thinking when in reality work is mostly doing.", "speaker": "Markie Wagner", "type": "framework", "entities": ["Anthropic"], "conviction": "medium", "so_what": "If TDR collapses toward doing-via-code, per-task inference revenue falls by orders of magnitude — bearish for revenue models priced on continuous agent reasoning.", "quote": "The current Thinking-Doing Ratio (TDR) in AI implementations is roughly 1000:1, which is not surprising. San Francisco is a Thinking town.", "locator": "AI is a Compiler, Not a Runtime", "quote_verified": true}, {"claim": "Agents are 'the BlackBerry of doing' — a transitional architecture that will not be where most enterprise work happens in five years; that work will run in the deterministic code agents write.", "speaker": "Markie Wagner", "type": "prediction", "entities": ["AI agents", "BlackBerry"], "conviction": "high", "so_what": "Positions today's agent-centric AI stack as a soon-to-be-displaced paradigm; long the code-generation/process-capture layer, skeptical of perpetual-runtime agent valuations.", "quote": "Agents are the BlackBerry of doing.", "locator": "So we use Agents for Doing", "quote_verified": true}]}, {"theme": "Poetic and the 're-found every business as software' thesis", "insights": [{"claim": "Poetic (Wagner's company, backed by Founders Fund, Kleiner Perkins, Genius Ventures, and OpenAI) sends mostly ex-Palantir engineers on-site for weeks to extract tacit business rules, compiles them into deterministic code, and claims 100x less token usage with nines of accuracy.", "speaker": "Markie Wagner", "type": "data_point", "entities": ["Poetic", "Founders Fund", "Kleiner Perkins", "Genius Ventures", "OpenAI", "Palantir"], "conviction": "high", "so_what": "A vendor explicitly monetizing token-efficiency rather than token-volume is a structural counterweight to the labs; its claimed metrics define the efficiency bar to watch.", "quote": "The result is 100x less token usage and nines of accuracy on complex tasks. Put differently, each token you spend does 100x more, and it does it right.", "locator": "Turning Businesses Into Software That Evolves", "quote_verified": true}, {"claim": "Poetic is deployed at AIG, SoFi, and Chime, with AIG CEO Peter Zaffino stating it has achieved '99%+ quality outcomes on multi-hour processes' delivering real enterprise value.", "speaker": "Markie Wagner", "type": "data_point", "entities": ["Poetic", "AIG", "SoFi", "Chime", "Peter Zaffino"], "conviction": "high", "so_what": "Named blue-chip financial deployments with a CEO accuracy claim are concrete proof points for the deterministic-code approach over improvising agents.", "quote": "AIG CEO Peter Zaffino said that Poetic has already “achieved 99%+ quality outcomes on multi-hour processes - delivering real enterprise value.”", "locator": "We are doing it today, for companies like AIG", "quote_verified": true}, {"claim": "The decade's defining shift is not 'AI becoming a person' but every business being re-founded as living software that backtests changes in shadow and hill-climbs toward an ideal process, with humans defining goals rather than methods.", "speaker": "Markie Wagner", "type": "thesis", "entities": ["Poetic"], "conviction": "high", "so_what": "Frames the durable AI value pool as process-as-code transformation of incumbents — incumbents that refactor into code win, those that throw tokens at problems lose.", "quote": "Everyone thinks the thing that is going to change in the world is that AI is going to become a person, but the real change is that a business is going to become a piece of software.", "locator": "Everyone thinks the thing that is going to change", "quote_verified": true}, {"claim": "Deterministic, in-production process code creates a step-by-step record that makes every process change testable via backtesting, so changes carry little risk and become simple choices for a 'process lead.'", "speaker": "Markie Wagner", "type": "framework", "entities": ["Poetic"], "conviction": "medium", "so_what": "Backtestable process change is the underrated payoff of code-over-agents — a moat that improvising agents structurally cannot offer.", "quote": "After months of running, you’ll be able to ask questions like “What if we approved every dispute under $25?” and know in minutes.", "locator": "To make a change, you have to know what the impact", "quote_verified": true}]}], "insight_total": 17, "top_entities": ["Anthropic", "OpenAI", "Poetic", "Uber", "Claude Code", "Markie Wagner", "AIG", "Palantir", "Sam Altman", "Brian Armstrong", "OpenRouter", "Coinbase"], "source_meta": {"author": "Packy McCormick", "word_count": 4183, "paywalled": false}}, {"record_id": "fb10554e4e3600da", "source_type": "concepts", "source_name": "BCG Henderson Institute", "source_url": "https://www.bcg.com/capabilities/climate-change-sustainability/climate-risk-adaptation-resilience", "title": "Climate Risk, Adaptation, and Resilience", "published_date": "", "language": "en", "processed_at": "2026-06-16T15:05:00Z", "processor": "claude-code-sub-opus", "tags": ["Energy", "Society", "Macro"], "gist": "This is a BCG climate-resilience practice landing page rather than an analytical article—mostly a catalog of public/private-sector offerings and client cases. Genuine signals: the thesis that physical climate risk translates to EBITDA-level financial loss, an adaptation-and-resilience financing gap, and the data point that only ~20% of country governments are planning necessary adaptation actions.", "themes": [{"theme": "Physical risk to financials", "insights": [{"claim": "BCG frames physical climate risks such as extreme heat and flooding as translating directly into operational disruption and financial loss down to the EBITDA level, urging firms to map exposure and sequence adaptation by risk severity and business value.", "speaker": "BCG Henderson Institute", "type": "framework", "entities": ["physical climate risk", "EBITDA", "adaptation"], "conviction": "medium", "so_what": "Pushes climate risk from disclosure box-ticking to a quantifiable earnings driver—relevant to asset-level and EBITDA-at-risk analysis.", "quote": "Assess how risk translates to operational disruption and financial loss down to EBITDA effects.", "locator": "For the Private Sector", "quote_verified": true}]}, {"theme" "source_name": "BlackRock Investment Institute", "source_url": "https://www.blackrock.com/corporate/compliance/best-execution-and-order-placement-policy", "title": "BlackRock Execution & Order placement policy | BlackRock", "published_date": "", "language": "en", "processed_at": "2026-06-16T15:05:00Z", "processor": "claude-code-sub-opus", "tags": [], "gist": "Corporate/regulatory compliance page setting out BlackRock's MiFID II / MiFIR best-execution and order-placement policy, including execution factors and lists of approved brokers and counterparties. No market views or investment signal.", "themes": [], "insight_total": 0, "top_entities": ["BlackRock", "MiFID II", "MiFIR"], "source_meta": {"author": "", "word_count": 11590, "paywalled": false}}, {"record_id": "c781a8764af155eb", "source_type": "concepts", "source_name": "Paul Graham Essays", "source_url": "https://paulgraham.com/greatwork.html", "title": "How to Do Great Work", "published_date": "", "language": "en", "processed_at": "2026-06-16T14:55:00Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Tech"], "gist": "Paul Graham distills the cross-field intersection of how great work gets done into a four-step recipe (pick a field with aptitude and deep interest, reach the frontier, notice gaps, explore them), arguing curiosity is the master heuristic. He develops reusable frameworks an operator/founder can apply: exponential compounding from consistency, 'staying upwind' instead of planning, building successive versions starting small, taking affordable risk, and protecting morale as the substrate of ambitious work.", "themes": [{"theme": "Four-step recipe & choosing what to work on", "insights": [{"claim": "Great work follows a four-step recipe applicable across every field: choose a field, learn enough to reach the frontier of knowledge, notice the gaps there, and explore the promising ones.", "speaker": "Paul Graham", "type": "framework", "entities": ["great work", "frontier of knowledge"], "conviction": "high", "so_what": "Gives a portable, field-agnostic process for allocating effort toward differentiated output rather than diffuse busyness.", "quote": "Four steps: choose a field, learn enough to get to the frontier, notice gaps, explore promising ones.", "locator": "Four steps: choose a field...", "quote_verified": true}, {"claim": "Work worth choosing must satisfy three qualities — natural aptitude, deep interest, and scope to do great work — but the third rarely binds because ambitious people are already too conservative about scope.", "speaker": "Paul Graham", "type": "framework", "entities": ["aptitude", "interest"], "conviction": "high", "so_what": "Reframes opportunity selection: the constraint is matching personal fit, not finding a 'big enough' market.", "quote": "it has to be something you have a\nnatural aptitude for, that you have a\ndeep interest in, and that\noffers scope to do great work.", "locator": "The work you choose needs to have three qualities", "quote_verified": true}, {"claim": "The only way to figure out what to work on is by working — guess if unsure, start, and tolerate guessing wrong, because most kinds of work can't be evaluated except by doing them.", "speaker": "Paul Graham", "type": "framework", "entities": ["career choice"], "conviction": "high", "so_what": "Bias-to-action heuristic: treat exploration as iterative sampling rather than upfront analysis.", "quote": "The way to figure out what to work on is by working. If you're not\nsure what to work on, guess. But pick something and get going.", "locator": "The way to figure out what to work on", "quote_verified": true}, {"claim": "When uncertain, optimize for interestingness; a field that does not become increasingly interesting as you learn more is probably not for you.", "speaker": "Paul Graham", "type": "framework", "entities": ["interestingness"], "conviction": "high", "so_what": "A simple monitoring signal for whether to persist in or exit a line of work.", "quote": "But a field should become increasingly interesting as you\nlearn more about it. If it doesn't, it's probably not for you.", "locator": "When in doubt, optimize for interestingness", "quote_verified": true}, {"claim": "Originality in choosing which problems to work on matters even more than originality in solving them, and is what distinguishes people who discover whole new fields.", "speaker": "Paul Graham", "type": "thesis", "entities": ["problem selection", "originality"], "conviction": "high", "so_what": "Edge comes from contrarian problem choice, not just execution — the highest-leverage decision is what to pursue.", "quote": "Originality in choosing problems seems to matter even more than\noriginality in solving them.", "locator": "Originality in choosing problems", "quote_verified": true}]}, {"theme": "Curiosity as master heuristic", "insights": [{"claim": "Curiosity is the single best guide to great work because it selects the field, drives you to the frontier, makes you notice gaps, and propels exploration — it is the engine for all four steps.", "speaker": "Paul Graham", "type": "framework", "entities": ["curiosity"], "conviction": "high", "so_what": "Suggests routing attention and capital toward what one is genuinely, excessively curious about rather than what is fashionable.", "quote": "If you asked an oracle the\nsecret to doing great work and the oracle replied with a single\nword, my bet would be on \"curiosity.\"", "locator": "Notice how often that word has come up", "quote_verified": true}, {"claim": "What you are excessively curious about — to a degree that would bore most other people — is the signal for what you should work on.", "speaker": "Paul Graham", "type": "framework", "entities": ["curiosity"], "conviction": "high", "so_what": "A concrete filter for identifying personal edge: look for asymmetric, unusual interest.", "quote": "What are you excessively curious about — curious to a degree that\nwould bore most other people? That's what you're looking for.", "locator": "What are you excessively curious about", "quote_verified": true}]}, {"theme": "Compounding, consistency & exponential growth", "insights": [{"claim": "Work that compounds yields exponential growth — learning makes further learning easier and audiences bring more audience — but the curve feels flat early, so people systematically underrate and under-invest in it.", "speaker": "Paul Graham", "type": "framework", "entities": ["exponential growth", "compounding", "learning", "audience"], "conviction": "high", "so_what": "Core investor mental model: undervalued compounding assets in their flat early phase are where outsized returns hide; push through the unrewarding phase deliberately.", "quote": "Something that grows exponentially can become so valuable that it's\nworth making an extraordinary effort to get it started.", "locator": "If you do work that compounds", "quote_verified": true}, {"claim": "Consistency dominates intensity: writing a page a day produces a book a year, so the people who do great things get something done daily rather than nothing, exploiting the cumulative effect we tend to underestimate.", "speaker": "Paul Graham", "type": "framework", "entities": ["consistency"], "conviction": "high", "so_what": "Process discipline beats sporadic heroics; a model for evaluating durable execution in people and companies.", "quote": "People who do great things don't get a lot done every\nday. They get something done, rather than nothing.", "locator": "Writing a page a day", "quote_verified": true}]}, {"theme": "Strategy: stay upwind, don't over-plan", "insights": [{"claim": "For most ambitious work the right strategy is not to plan but to 'stay upwind' — at each stage do whatever is most interesting and preserves the best future options — because planning only works for achievements describable in advance.", "speaker": "Paul Graham", "type": "framework", "entities": ["staying upwind", "planning"], "conviction": "high", "so_what": "Optionality-preserving decision rule for navigating uncertainty where the prize can't be specified upfront.", "quote": "At each stage do whatever seems most\ninteresting and gives you the best options for the future. I call\nthis approach \"staying upwind.\"", "locator": "I think for most people who want to do great work", "quote_verified": true}, {"claim": "Planning is a necessary evil — a response to inflexible media or the need to coordinate many people — and if you keep projects small and use flexible media you can let designs evolve instead.", "speaker": "Paul Graham", "type": "causal", "entities": ["planning", "flexible media"], "conviction": "high", "so_what": "Lower coordination cost and flexible tooling reduce the need for upfront planning, favoring iterative product development.", "quote": "Planning per se isn't good. It's sometimes necessary, but it's a\nnecessary evil — a response to unforgiving conditions.", "locator": "Planning per se isn't good", "quote_verified": true}, {"claim": "Make what you yourself want — write the story you want to read, build the tool you want to use — because trying to make what an imaginary more-sophisticated audience wants leads you astray.", "speaker": "Paul Graham", "type": "framework", "entities": ["product-market fit", "audience"], "conviction": "high", "so_what": "Founder heuristic for product fit: scratch your own itch; your friends become the initial audience.", "quote": "Write the story you want to read; build the tool\nyou want to use.", "locator": "If you're making something for people", "quote_verified": true}]}, {"theme": "Successive versions: start small, ship, evolve", "insights": [{"claim": "Great things are almost always made in successive versions — start with something small, get it in front of people quickly, and evolve it, so the final version is cleverer and more ambitious than anything you could have planned.", "speaker": "Paul Graham", "type": "framework", "entities": ["iteration", "successive versions"], "conviction": "high", "so_what": "Validates the MVP / iterate model over big upfront design; a lens for judging product development teams.", "quote": "Great things are almost always made in\nsuccessive versions.", "locator": "How do you get from starting small", "quote_verified": true}, {"claim": "An early version dismissed by people as a 'toy' is a good sign — it means the project has everything a new idea needs except scale, which tends to follow.", "speaker": "Paul Graham", "type": "contrarian", "entities": ["toys", "disruptive products"], "conviction": "high", "so_what": "Maps to the disruptive-innovation pattern: dismissed 'toys' are early-stage opportunities incumbents and investors discount.", "quote": "An early version of a new project will sometimes be dismissed as a\ntoy. It's a good sign when people do this.", "locator": "An early version of a new project", "quote_verified": true}, {"claim": "Begin by trying the simplest thing that could possibly work — surprisingly often it does, and if not, it at least gets you started.", "speaker": "Paul Graham", "type": "framework", "entities": ["simplicity", "MVP"], "conviction": "high", "so_what": "Reduces activation cost and accelerates learning cycles in building products.", "quote": "Begin by trying the simplest thing that could possibly work.\nSurprisingly often, it does.", "locator": "Begin by trying the simplest thing", "quote_verified": true}, {"claim": "Big things start small: the initial versions of big things were often just experiments, side projects, or talks, so it pays to be promiscuously curious and start lots of small things.", "speaker": "Paul Graham", "type": "framework", "entities": ["side projects", "experiments"], "conviction": "high", "so_what": "Portfolio approach to innovation — seed many cheap bets because winners are unpredictable at the outset.", "quote": "Big things start small. The\ninitial versions of big things were often just experiments, or side\nprojects, or talks, which then grew into something bigger.", "locator": "It's better to be promiscuously curious", "quote_verified": true}]}, {"theme": "Risk, prolificacy & expected value", "insights": [{"claim": "Take as much risk as you can afford: in an efficient market risk is proportionate to reward, so seek high-expected-value bets rather than certainty, and if you're not failing occasionally you're being too conservative.", "speaker": "Paul Graham", "type": "framework", "entities": ["risk", "expected value", "efficient market"], "conviction": "high", "so_what": "Explicit EV framing for risk-taking; absence of occasional failure is itself a warning sign of under-risking.", "quote": "In an efficient market, risk\nis proportionate to reward, so don't look for certainty, but for a\nbet with high expected value.", "locator": "Take as much risk as you can afford", "quote_verified": true}, {"claim": "Being prolific is underrated — the more different things you try the greater the chance of a hit, but this necessarily means producing many bad ideas alongside the good ones.", "speaker": "Paul Graham", "type": "framework", "entities": ["prolificacy", "Linus Pauling"], "conviction": "high", "so_what": "Quantity of attempts drives discovery; tolerate a high failure rate as the cost of upside (Pauling: many ideas to have good ideas).", "quote": "You can't have a lot of good ideas without also\nhaving a lot of bad ones.", "locator": "Being prolific is underrated", "quote_verified": true}, {"claim": "Young/inexperienced people tend to under-take risk out of fear even though youth is precisely when one can afford the most risk; the advantages of youth are energy, time, optimism, and freedom, versus age's knowledge, efficiency, money, and power.", "speaker": "Paul Graham", "type": "framework", "entities": ["youth", "age", "risk"], "conviction": "high", "so_what": "A life-stage allocation framework; misperception of one's own risk capacity is a recurring error.", "quote": "The advantages of youth are energy,\n
