    title:"Gold's West-East mechanics: London sets the price, the East absorbs — the plumbing most investors get backwards",
    idea:`Jan Nieuwenhuijs documented a 90-year pattern: gold flows West when Western institutional money wants it (price rises), and flows East when Western money loses interest (price falls, East absorbs physical). The West sets the marginal price through real yields, ETF flows, COMEX positioning, and London wholesale activity. The East provides the long-horizon physical bid — price sensitive, patient, deeply physical. When gold spikes, Asian physical buyers often step back and SELL, monetizing the move. When gold falls, they absorb. The East is the ballast, not the engine. London is the clearing house. Switzerland recasts 400oz bars into smaller Asian formats — the "refinery valve" of the global gold system.`,

function catClass(cat){ return cat.replace("/","").replace(" ",""); }

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i){ return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  var orig = btn.textContent;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = orig; }, 1500);
}

function toggleCard(id){
  var body = document.getElementById('body-'+id);
  body.classList.toggle('open');
}

function filterCat(cat){
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('#cat-filters .pill').forEach(function(p){
    p.classList.toggle('active', p.dataset.cat === cat || (cat==='all' && p.dataset.cat==='all'));
  });
  renderCards();
}

function filterUrg(urg){
  activeUrg = urg;
  document.querySelectorAll('#urg-filters .pill').forEach(function(p){
    p.classList.toggle('active', p.dataset.urg === urg || (urg==='all' && p.dataset.urg==='all'));
  });
  renderCards();
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  document.querySelectorAll('.pill').forEach(function(p){ p.classList.remove('active'); });
  document.querySelector('#cat-filters .pill[data-cat="all"]').classList.add('active');
  document.querySelector('#urg-filters .pill[data-urg="all"]').classList.add('active');
  renderCards(true);
}

function visible(item){
  if(activeSrc){ return item.source.indexOf(activeSrc) !== -1; }
  var catOk = activeCat==='all' || item.cat===activeCat;
  var urgOk = activeUrg==='all' || item.urgency===activeUrg;
  return catOk && urgOk;
}

function renderCards(expandAll){
  var container = document.getElementById('cards');
  container.innerHTML = '';
  var shown = 0;
  ITEMS.forEach(function(item){
    if(!visible(item)) return;
    shown++;
    var cc = CAT_COLOR[item.cat] || '#999';
    var cb = CAT_BG[item.cat] || '#fafafa';
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var div = document.createElement('div');
    div.className = 'card';
    div.id = 'card-'+item.id;
    div.innerHTML =
      '<div class="card-header" onclick="toggleCard('+item.id+')">' +
        '<span class="item-num">#'+item.id+'</span>' +
        '<span class="urgency-dot">'+URG_EMOJI[item.urgency]+'</span>' +
        '<span class="source-badge" style="background:'+cc+'">'+item.source.split('/')[0].trim()+'</span>' +
        '<span class="cat-tag">'+item.cat+'</span>' +
        (chartIcon ? '<span class="chart-icon">'+chartIcon+'</span>' : '') +
        '<span class="card-title">'+item.title+'</span>' +
      '</div>' +
      '<div class="card-body'+(expandAll?' open':'') +'" id="body-'+item.id+'">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">'+item.idea+'</div>' +
        '<div class="section-label" style="margin-top:10px">My Angle</div>' +
        '<div class="angle-block" style="border-color:'+cc+';background:'+cb+'">'+item.angle+'</div>' +
        (item.charts.count > 0 ? '<div class="chart-note">📊 '+item.charts.count+' chart'+(item.charts.count>1?'s':'')+': '+item.charts.desc+'</div>' : '') +
        '<div class="section-label" style="margin-top:10px">Tweets</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box tweet-box-a">' +
            '<div class="tweet-label tweet-label-a">TWEET A</div>' +
            '<div class="tweet-text">'+item.tweetA+'</div>' +
            '<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box tweet-box-b">' +
            '<div class="tweet-label tweet-label-b">TWEET B</div>' +
            '<div class="tweet-text">'+item.tweetB+'</div>' +
            '<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        '<a class="read-link" href="'+item.link+'" target="_blank">↗ Read full article</a>' +

    container.appendChild(div);
  });
  document.getElementById('visible-count').textContent = shown + ' item' + (shown!==1?'s':'');
}

function buildCatFilters(){
  var cats = {};
  ITEMS.forEach(function(i){ cats[i.cat] = (cats[i.cat]||0)+1; });
  var row = document.getElementById('cat-filters');
  var allPill = document.createElement('button');
  allPill.className = 'pill active'; allPill.dataset.cat='all';
  allPill.textContent = 'All ('+ITEMS.length+')';
  allPill.onclick = function(){ filterCat('all'); };
  row.appendChild(allPill);
  Object.keys(cats).forEach(function(cat){
    var p = document.createElement('button');
    p.className='pill'; p.dataset.cat=cat;
    p.textContent = cat+' ('+cats[cat]+')';
    p.style.setProperty('--c', CAT_COLOR[cat]||'#999');
    p.onclick = function(){ filterCat(cat); };
    row.appendChild(p);
  });
}

function buildUrgFilters(){
  var urgs = {act:0,deep:0,watch:0};
  ITEMS.forEach(function(i){ urgs[i.urgency]++; });
  var row = document.getElementById('urg-filters');
  var allPill = document.createElement('button');
  allPill.className='pill active'; allPill.dataset.urg='all';
  allPill.textContent='All urgency';
  allPill.onclick=function(){ filterUrg('all'); };
  row.appendChild(allPill);
  ['act','deep','watch'].forEach(function(u){
    var p=document.createElement('button');
    p.className='pill '+({act:'pill-act',deep:'pill-deep',watch:'pill-watch'}[u]);
    p.dataset.urg=u;
    p.textContent=URG_LABEL[u]+' ('+urgs[u]+')';
    p.onclick=function(){ filterUrg(u); };
    row.appendChild(p);
  });
}

function buildReport(){
  var body = document.getElementById('report-body');
  var srcRows = META.includedSources.map(function(s){
    return '<tr><td><span class="src-link" onclick="filterBySrc(\''+s.name.replace(/'/g,"\\'")+'\')">'
      +s.name+'</span></td><td>'+s.items+' items</td></tr>';
  }).join('');
  var skipRows = META.skippedSources.map(function(s){
    return '<tr><td>'+s.name+'</td><td>'+s.reason+'</td></tr>';
  }).join('');
  body.innerHTML =
    '<p><strong>Window:</strong> '+META.windowStart+' → '+META.windowEnd+'</p>' +
    '<p><strong>Emails in window:</strong> '+META.emailsInWindow+' &nbsp;|&nbsp; <strong>Read:</strong> '+META.emailsRead+' &nbsp;|&nbsp; <strong>Items extracted:</strong> '+META.itemsExtracted+'</p>' +
    '<h3 style="margin-top:10px">Included Sources</h3>' +
    '<table><tr><th>Source</th><th>Items</th></tr>'+srcRows+'</table>' +
    '<h3 style="margin-top:10px">Skipped / Limited</h3>' +
    '<table><tr><th>Source</th><th>Reason</th></tr>'+skipRows+'</table>';
}

function toggleReport(){
  var body=document.getElementById('report-body');
  var tog=document.getElementById('report-toggle');
  if(body.style.display==='block'){body.style.display='none';tog.textContent='▶ Session Report';}
  else{body.style.display='block';tog.textContent='▼ Session Report';}
}

// init
buildCatFilters();
buildUrgFilters();
renderCards();
buildReport();
</script>
</body>
</html>
