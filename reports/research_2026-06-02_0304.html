function toggleCard(id) {
  const body = document.getElementById("body-"+id);
  if(body.classList.contains("open")) body.classList.remove("open");
  else body.classList.add("open");
}

function filterCat(cat) {
  activeCategory = cat;
  activeSource = null;
  document.querySelectorAll("#catFilters .pill").forEach(function(p) { p.classList.remove("active"); p.style.background=""; p.style.color=""; p.style.borderColor=""; });
  const active = document.getElementById("cat-"+cat);
  if(active) {
    active.classList.add("active");
    if(cat!=="all") {
      const col = CAT_COLORS[cat]||"#666";
      active.style.background=col; active.style.color="#fff"; active.style.borderColor=col;
    } else { active.style.background="#222"; active.style.color="#fff"; active.style.borderColor="#222"; }
  }
  applyFilters();
}

  activeUrgency = urg;
  activeSource = null;
  document.querySelectorAll("#urgFilters .pill").forEach(function(p) { p.classList.remove("active"); p.style.background=""; p.style.color=""; });
  const active = document.getElementById("urg-"+urg);
  if(active) { active.classList.add("active"); active.style.background="#222"; active.style.color="#fff"; }
  applyFilters();
}

function filterBySrc(name) {
  activeSource = name;
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll(".card").forEach(function(card) {
    const cat = card.getAttribute("data-cat");
    const urg = card.getAttribute("data-urg");
    const src = card.getAttribute("data-src");
    let show = true;
    if(activeCategory!=="all" && cat!==activeCategory) show=false;
    if(activeUrgency!=="all" && urg!==activeUrgency) show=false;
    if(activeSource && src.indexOf(activeSource)===-1) show=false;
    card.style.display = show?"block":"none";
    if(show && activeSource) {
      const body = document.getElementById("body-"+card.id.replace("card-",""));
      if(body) body.classList.add("open");
    }
  });
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport() {
  const rb = document.getElementById("reportBody");
  let html = '<strong>Time Window:</strong> '+META.windowStart+' → '+META.windowEnd+'<br>';
  html += '<strong>Emails in window:</strong> '+META.emailsInWindow+' · <strong>Emails read:</strong> '+META.emailsRead+' · <strong>Items extracted:</strong> '+META.itemsExtracted+'<br><br>';
  html += '<strong>Included Sources:</strong><table><tr><th>Source</th><th>Items</th></tr>';
  META.includedSources.forEach(function(s) {
    const srcKey = s.name.split('/')[0].trim();
    html += '<tr><td><span class="src-link" onclick="filterBySrc(\''+srcKey+'\')">'+s.name+'</span></td><td>'+s.items+'</td></tr>';
  });
  html += '</table><br><strong>Skipped Sources:</strong><table><tr><th>Source</th><th>Reason</th></tr>';
  META.skippedSources.forEach(function(s) {
    html += '<tr><td>'+s.name+'</td><td>'+s.reason+'</td></tr>';
  });
  html += '</table>';
  rb.innerHTML = html;
}

function toggleReport() {
  const rb = document.getElementById("reportBody");
  if(rb.classList.contains("open")) rb.classList.remove("open");
  else rb.classList.add("open");
}

window.onload = init;
</script>
</body>
