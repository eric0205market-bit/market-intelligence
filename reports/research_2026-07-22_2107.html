 idea:"Brent printed $95.47 then faded to $93.92 (day low $91.33) despite the 11th straight night of US airstrikes on Iran and Hormuz tanker crossings collapsing to just ONE in seven days (vs. a pre-war run-rate north of 400). Gold sits at 80% of its daily range vs. Brent's 63%. In a genuine geopolitical supply shock crude leads and gold follows the second-order inflation — today the order is inverted, which Dauber reads as a currency-debasement bid dressed as a war trade.",
 angle:"A genuinely contrarian, checkable framework: most desks call the oil fade 'the market not caring about war anymore.' Dauber's read is the opposite mechanism — a monetary bid, not risk complacency — testable against tonight's price action.",
 tweetA:"The physical Strait of Hormuz is running ONE tanker crossing in seven days, versus 400+ pre-war. Oil still got sold from $95 to $93 today. That's not the market shrugging off the war — it's the market telling you the war premium was never really about oil supply. Gold, at 80% of its daily range vs. crude's 63%, is confirming it.",
 tweetB:"Rule of thumb in a real supply shock: crude leads, gold follows the inflation story. Today gold's leading and oil's fading. Flip that ordering and you're not looking at a geopolitical trade anymore — you're looking at a dollar problem wearing a Hormuz costume.",
 charts:{count:2, hot:true, desc:"Brent intraday-range chart and gold-vs-Brent daily-range comparison — the core evidence for the whole thesis."},
 link:"https://phildauber.substack.com/p/nobodys-promise"},

{id:18, cat:"credit", urgency:"act", source:"Phil Dauber / Morning Musings (citing BofA/Hartnett, Apollo/Slok, Nikkei)",
 title:"Hyperscaler AI capex is going from self-funded to debt-funded within 18 months",
 idea:"BofA has hyperscaler capex at $412B (2025) to $769B (2026) to $967B (2027), against aggregate hyperscaler free cash flow over the same stretch of $191B, then -$19B, then -$26B. Apollo's Slok has the cover ratio on hyperscaler bond issuance falling from roughly 5x in February to under 2x in July. Nikkei puts off-balance-sheet obligations at the five biggest AI spenders at $1.65T — exceeding the $1.35T actually on their balance sheets, with Meta alone at ~$420B off-balance-sheet, nearly triple its recorded debt.",
 angle:"Dauber's trade logic: a capex RAISE tonight from Alphabet is the bearish outcome — the funding gap arrives sooner into a credit market that's already pulled back its bid. A capex CUT would be the bullish print. That inverts how most desks will read the headline.",
 tweetA:"Three unrelated shops — BofA, Apollo, Nikkei — independently show the same thing: hyperscaler capex triples by 2027 while free cash flow goes negative, and appetite to fund that gap with bonds already fell from 5x oversubscribed to under 2x. Meta alone carries nearly 3x its recorded debt off-balance-sheet. Tonight's 'raise capex = bullish' read has this backwards.",
 tweetB:"Everyone's watching whether Alphabet's cloud revenue outruns its AI capex tonight. Wrong question. Does a bigger capex number mean a bigger debt raise sooner, into a bond market whose cover ratio just got cut in half in five months? A capex CUT would be the bullish print here.",
 charts:{count:1, hot:true, desc:"Three-source capex-vs-FCF trajectory (BofA/Apollo/Nikkei) through 2027 — the single most tradeable chart in the AI-debt debate."},
 link:"https://phildauber.substack.com/p/nobodys-promise"},

{id:19, cat:"positioning", urgency:"deep", source:"Phil Dauber / Morning Musings (citing UBS, Simon White/Daily Chartbook, Macro Charts)",
 title:"The AI-momentum leverage isn't in the US anymore — it's Korean and Vietnamese retail, and it's already unwinding",
 idea:"UBS shows hedge funds already cut momentum/semi longs by 5%+ of gross exposure back toward April levels — institutional de-risking already happened. Tencent had its worst session in over a year (-7.1%), Vietnam fell 3.6% (13% off its peak) on margin calls, and Korean CFD balances have tripled in two years to as much as 2.5x leverage. Separately, the top 24 S&P names now exceed half of total market cap — below the 2000-bubble peak concentration of ~32 names but converging on it.",
 angle:"Reframes 'where's the AI bubble leverage' — it's not US hedge funds (already de-grossed), it's Asian retail margin books, meaning a bad print produces forced margin calls in Seoul and Ho Chi Minh City, not an orderly institutional de-risk.",
 tweetA:"US hedge funds already cut momentum and semi longs back to April levels — that de-risking already happened, quietly. The leverage about to blow up is Korean CFD accounts running up to 2.5x, tripled in two years, and Vietnamese margin books already down 13% from peak. When this cracks, it won't look like an orderly Western de-gross.",
 tweetB:"Top 24 S&P names are now over half the index's market cap. The 2000 bubble topped out around 32 names for that same 50% threshold — we're MORE concentrated than dot-com was, in fewer names, and the leverage funding it has already migrated to Asian retail CFD accounts.",
 charts:{count:2, hot:true, desc:"S&P concentration vs. 2000 peak chart, and Korean CFD balance growth chart."},
 link:"https://phildauber.substack.com/p/nobodys-promise"},

{id:20, cat:"credit", urgency:"deep", source:"Phil Dauber / Morning Musings (citing Financials Daily/Octus)",
 title:"Private credit stress is hiding in retail-perpetual vehicles, not the index spreads everyone watches",
 idea:"BDC non-accruals jumped ~40% sequentially in Q1 to 2.01% at cost (3.24% per Octus adjustment). BCRED cut its July distribution to $0.18 — the second cut in nine months — with NAV down 3.4% YTD, while returning 7.9% of assets against a 5% gate. Ares Strategic Income and BCRED have both breached gates this year. Meanwhile investment-grade and high-yield spreads haven't widened at all — US high yield is the only bond index positive month-to-date.",
 angle:"'Credit is calm' readings from index spreads are measuring the wrong instrument — the stress sits specifically in gated, non-traded retail-credit vehicles where the gate itself is now the price-discovery mechanism.",
 tweetA:"Index credit spreads say nothing's wrong — high yield OAS at 266bp, investment grade at 77bp, both calm. Meanwhile BCRED just cut its distribution for the second time in nine months and BDC non-accruals jumped 40% in a single quarter. The stress isn't absent from credit — it's just not in the index.",
 tweetB:"You don't get a warning from the option-adjusted spread when the actual leverage sits in retail-perpetual private credit funds. You get it from a distribution cut. BCRED just gave the second one in nine months. If your credit dashboard only watches HY OAS, you're watching the wrong instrument.",
 charts:{count:1, hot:false, desc:"BDC non-accrual and BCRED distribution-cut trend chart."},
 link:"https://phildauber.substack.com/p/nobodys-promise"},

{id:21, cat:"tech", urgency:"watch", source:"Vik's Newsletter / SemiExponent (Substack)",
 title:"Lumentum's 2007 patent is still why nobody else can cheaply build the laser CPO/NPO needs",
 idea:"Lumentum (then JDSU) solved ultra-high-power laser linewidth broadening back in 2007 by finding the 'goldilocks' cavity design ratio, kappa*L = 0.7 — too low and light leaks to the chip edges, too high and it piles up mid-chip causing spatial hole burning. That single design constant is still central to how UHP lasers for co-packaged optics get built today, nearly two decades later.",
 angle:"A genuine 'is the moat physics or execution' question for the whole CPO/NPO optical-interconnect trade underpinning AI datacenter buildout — worth understanding before betting on who wins the laser-supply bottleneck.",
 tweetA:"The company that solved the physics constraint every high-power laser for AI datacenter optics still runs into did it in a patent filed in 2007, under a different corporate name, for a different application. Nineteen years later it's still the reference design. That's either an extremely durable moat or a sign nobody's tried hard enough to design around it.",
 tweetB:"Everyone's moat story for AI datacenter optics is 'best packaging' or 'best scale.' Lumentum's actual moat is a single design ratio solved in a 2007 paper. If the hard part was solved once, cheaply, two decades ago, the real question is why competitors still haven't designed around it.",
 charts:{count:2, hot:false, desc:"Cavity-length / linewidth engineering charts (flatness curves) — technical but core to the thesis."},
 link:"https://www.viksnewsletter.com/p/lasers-for-cponpo-part-2-lumentums-tech-and-moat"},

{id:23, cat:"geopolitics", urgency:"deep", source:"Neil Sethi (citing Bloomberg / Japan Finance Ministry)",
 title:"Japan's trade deficit widens as weak yen and war-inflated oil imports collide",
 idea:"Japan's June trade deficit expanded to the widest since January, as oil imports from the US alone soared roughly 900% in value and 460% in volume even as Japan bought less Middle East oil in volume terms — oil import value still rose nearly 60%. The yen traded at 159.69/USD in June, 10.9% weaker YoY, and has since fallen further to a fresh four-decade low near 163.2, forcing a leaked BOJ story about faster rate hikes to stop the bleeding.",
 angle:"The clearest real-economy evidence that the Iran war is now showing up in a G7 trade balance, not just in oil futures — Japan is paying for the war twice: once in yen weakness, once in the oil bill that weakness inflates further.",
 tweetA:"Japan's oil imports from the US rose in value by roughly 900% even as the volume Japan actually bought from the Middle East fell. That's not a demand story — it's a currency-and-war-premium story landing directly in a G7 trade balance, amplified by a yen at a four-decade low.",
 tweetB:"The BOJ needed a leaked story about hiking faster just to stop the yen's bleeding today. Japan's trade deficit is getting squeezed from both directions at once — a currency too weak to defend and an oil price too geopolitically charged to hedge away.",
 charts:{count:1, hot:false, desc:"Japan trade balance / yen chart."},
 link:"https://neilsethi.substack.com/p/as-we-approach-the-open-72226"},

{id:24, cat:"macro", urgency:"deep", source:"Neil Sethi (citing Bloomberg / ONS)",
 title:"UK inflation falls to a 15-month low but gilts stay bearish on fiscal fears, not price fears",
 idea:"UK CPI eased to 2.6% YoY in June, the lowest since March last year and the third straight month of undershooting forecasts, on cheaper fuel and food. Yet gilt yields remain above 5% and investors stayed bearish, focused instead on new PM Andy Burnham's 'expansionary fiscal bent' — strategists warn the Treasury's role as an internal spending brake has 'gradually softened.'",
 angle:"A textbook decoupling: the inflation print says 'buy duration,' the fiscal-credibility read says 'sell it' — and the market is siding with the fiscal read over the data.",
 tweetA:"UK inflation just hit a 15-month low, undershooting forecasts for the third month running. Gilt yields didn't move. When cooler-than-expected inflation stops being bullish for bonds, the market has stopped pricing the data and started pricing the government issuing it.",
 tweetB:"Three straight inflation undershoots and gilts are still bearish because of who's now running fiscal policy, not what CPI says. That's the same pattern that broke the UK bond market under Truss. Nobody's calling it that yet because the number itself looks fine.",
 charts:{count:0, hot:false, desc:""},
 link:"https://neilsethi.substack.com/p/as-we-approach-the-open-72226"},

function fmtCatLabel(c){return c;}

function buildFilters(){
  const catCounts = {};
  ITEMS.forEach(i=>{catCounts[i.cat]=(catCounts[i.cat]||0)+1;});
  const catBar = document.getElementById('catBar');
  let html = '<button class="pill active" data-filter-cat="all" onclick="setCatFilter(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(c=>{
    const color = CATCOLORS[c] || '#888';
    html += '<button class="pill" data-filter-cat="' + c + '" onclick="setCatFilter(\'' + c + '\')" data-color="' + color + '">' + c + ' (' + catCounts[c] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {act:0, deep:0, watch:0};
  ITEMS.forEach(i=>{urgCounts[i.urgency]++;});
  const urgBar = document.getElementById('urgBar');
  let uhtml = '<button class="pill active" data-filter-urg="all" onclick="setUrgFilter(\'all\')">All (' + ITEMS.length + ')</button>';
  uhtml += '<button class="pill" data-filter-urg="act" onclick="setUrgFilter(\'act\')">🔴 Act Now (' + urgCounts.act + ')</button>';
  uhtml += '<button class="pill" data-filter-urg="deep" onclick="setUrgFilter(\'deep\')">🔵 Deep (' + urgCounts.deep + ')</button>';
  uhtml += '<button class="pill" data-filter-urg="watch" onclick="setUrgFilter(\'watch\')">🟡 Watch (' + urgCounts.watch + ')</button>';
  urgBar.innerHTML = uhtml;
}

let curCat = 'all', curUrg = 'all', curSrc = null;

function setCatFilter(c){
  curCat = c; curSrc = null;
  document.querySelectorAll('[data-filter-cat]').forEach(b=>b.classList.toggle('active', b.getAttribute('data-filter-cat')===c));
  renderCards();
}
function setUrgFilter(u){
  curUrg = u; curSrc = null;
  document.querySelectorAll('[data-filter-urg]').forEach(b=>b.classList.toggle('active', b.getAttribute('data-filter-urg')===u));
  renderCards();
}
function filterBySrc(name){
  curSrc = name; curCat='all'; curUrg='all';
  document.querySelectorAll('[data-filter-cat]').forEach(b=>b.classList.toggle('active', b.getAttribute('data-filter-cat')==='all'));
  document.querySelectorAll('[data-filter-urg]').forEach(b=>b.classList.toggle('active', b.getAttribute('data-filter-urg')==='all'));
  renderCards(true);
}

function renderCards(expandMatches){
  const wrap = document.getElementById('cards');
  let html = '';
  ITEMS.forEach((item, idx)=>{
    if(curCat!=='all' && item.cat!==curCat) return;
    if(curUrg!=='all' && item.urgency!==curUrg) return;
    if(curSrc && item.source.indexOf(curSrc)===-1) return;
    const color = CATCOLORS[item.cat] || '#888';
    const urgEmoji = item.urgency==='act' ? '🔴' : (item.urgency==='deep' ? '🔵' : '🟡');
    const chartFlag = item.charts.count>0 ? (item.charts.hot ? '🔥' : '📊') : '';
    const openClass = expandMatches ? 'open' : '';
    html += '<div class="card ' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + (idx+1) + '</span>';
    html += '<span class="urgency">' + urgEmoji + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source.split(' (')[0] + '</span>';
    html += '<span class="cattag">' + item.cat + '</span>';
    if(chartFlag) html += '<span class="chartflag">' + chartFlag + '</span>';
    html += '<span class="title">' + item.title + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '14;">' + item.angle + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if(item.charts.count>0 || item.charts.desc){
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }
    html += '<a class="readlink" href="' + item.link + '" target="_blank" style="color:' + color + '">↗ Read full article</a>';
    html += '</div></div>';
  });
  if(!html) html = '<p style="color:var(--sub); padding:20px 0;">No items match this filter.</p>';
  wrap.innerHTML = html;
}

function toggleCard(id){
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport(){
  let html = '<h4>Time Window</h4>';
  html += '<div>' + META.windowStart + ' &rarr; ' + META.windowEnd + '</div>';
  html += '<div style="margin-top:4px; color:var(--sub);">Emails in window: ' + META.emailsInWindow + ' &middot; Read: ' + META.emailsRead + ' &middot; Items extracted: ' + META.itemsExtracted + '</div>';
  html += '<h4>Included sources</h4>';
  META.includedSources.forEach(s=>{
    html += '<div><span class="srcline" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + '</span> — ' + s.count + ' item(s)</div>';
  });
  html += '<h4>Skipped sources</h4>';
  META.skippedSources.forEach(s=>{
    html += '<div style="margin-bottom:6px;"><strong>' + s.name + '</strong> — ' + s.reason + '</div>';
  });
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('metaLine').textContent =
  META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails read';

buildFilters();
renderCards();
buildReport();
</script>
