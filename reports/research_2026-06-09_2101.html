title:"Equity supply trap opens: the negative net supply tailwind is turning into a headwind",
idea:"Bloomberg macro strategist Simon White warns that a wave of new equity issuance — from AI-linked firms, private giants going public, and listed companies issuing shares — risks turning the market\'s \'negative net supply tailwind\' into a headwind. That tailwind existed because buybacks exceeded new issuance, creating a structural net buyer. Historical pattern: major peaks in gross issuance have appeared near market tops. Meanwhile households are at historically high equity allocations, leaving less incremental buying power, and earnings expectations have margin assumptions doing heavy lifting.",

idea:"Apple unveiled Gemini-powered Siri at WWDC, described by Phil Dauber as \'the biggest AI monetization partnership of this cycle.\' The partnership distributes Google\'s AI to approximately 2 billion Apple devices. Apple stock fell 5% on the announcement — the market apparently pricing in margin compression from the revenue-sharing arrangement rather than the distribution moat being built.",

{id:17,cat:"regulation",urgency:"deep",
source:"Binary Breakaway / Nick Reese",
title:"Bipartisan House bill: $300M AI safety center + federal preemption of all state AI laws",
idea:"A bipartisan House bill (Republican Obernolte + Democrat Trahan, 269 pages) proposes a $300M Center for AI Standards and Innovation under Commerce/NIST ($100M/year for FY2027-29) and federal preemption of all state AI laws. The One Big Beautiful Bill\'s moratorium on state AI laws was defeated 99-1, but this bill threads the needle: Republicans get federal standardization, Democrats get safety infrastructure. Florida\'s AG separately sued OpenAI and Sam Altman over ChatGPT harms.",
angle:"Federal preemption of state AI laws is the corporate AI lobby win of the decade if it passes. California, Colorado, Texas and others all have or are developing separate AI liability and safety frameworks. One federal standard eliminates the compliance patchwork for every AI company operating in the US.",
tweetA:"A bipartisan House bill would put $300M into AI safety evaluation AND federally preempt all state AI laws. One national standard replacing California, Colorado, Texas, and every other state\'s framework. The corporate AI lobby has wanted this for years. It\'s moving.",
tweetB:"The $300M AI safety center is the headline. The real story is federal preemption of state AI regulation. If this passes, 50 different state AI laws become one federal standard. Most consequential deregulatory move for AI since Section 230.",
charts:{count:0,hot:false,desc:""},
link:"https://binarybreakaway.substack.com"},

{id:18,cat:"tech",urgency:"deep",
source:"a16z / Rillet",
title:"99.86% of journal entries now automated; B2B companies have 4x more period-end work than B2C",
idea:"Analysis of 56 companies using Rillet (AI-native ERP) shows 99.86% of journal entries are fully automated with no manual review needed. Only 2% of companies still do an old-fashioned monthly close. B2B companies have more than 4x as much period-end work as B2C, and ~5x more human-keyed entries. The thesis: \'the back office is just the first function rebuilt this way\' by AI — traditional competitors NetSuite and Dynamics face disruption.",
angle:"Every company selling to B2B enterprises has a moat in replacing the month-end close workflow. The 4x complexity difference between B2B and B2C means the highest-value ERP customers are also most trapped in legacy ERP hell. NetSuite and Dynamics have a real problem they\'re not pricing.",
tweetA:"99.86% of journal entries automated. B2B companies have 4x more period-end accounting work than B2C. The monthly close is dying — 98% of companies using AI-native ERP have already eliminated it. NetSuite and Dynamics have a real problem.",
tweetB:"The month-end close ritual is a relic. Rillet data: 99.86% of journal entries fully automated, 98% of companies no longer do a traditional close. And B2B enterprises — the highest-value ERP customers — have 4x more work to automate. The back office disruption is underway.",

{id:21,cat:"AI/infra",urgency:"watch",
source:"Agentic Future / 0xSammy",
title:"ZCash Orchard bug found by Claude Opus 4.8 — AI is now an active participant in protocol security research",
idea:"Security researcher Taylor Hornby found a soundness flaw in Zcash\'s Orchard shielded pool using Anthropic\'s Claude Opus 4.8 alongside a custom analysis suite. The bug could have enabled undetectable counterfeit ZEC creation and had sat undetected since Orchard activated in 2022. This triggered an emergency soft fork on June 2 and hard fork on June 3. Key observation: \'AI is now an active participant in protocol-level security research — the same capability is available to attackers, so the window before an old vulnerability gets found is shrinking for every legacy contract.\'",
angle:"This is the dual-use AI security thesis becoming concrete. Claude found a bug humans missed for 4 years. Every old smart contract, every DeFi vault written before LLM-assisted auditing is now being re-scanned by AI — by researchers and potentially by attackers simultaneously.",
tweetA:"Anthropic\'s Claude Opus 4.8 found a 4-year-old zero-day in Zcash\'s shielded pool that could have enabled undetectable counterfeit supply. AI is now doing protocol-level security research. Every legacy smart contract exists in a shrinking window before AI finds what humans missed.",
tweetB:"Claude found a bug in ZCash that humans missed for 4 years. The same capability is available to attackers. The window for undiscovered vulnerabilities in legacy contracts is closing fast — by AI on both sides of the table simultaneously.",
charts:{count:0,hot:false,desc:""},

{id:22,cat:"AI/infra",urgency:"watch",

title:"OpenServ: 107x performance per dollar vs standard inference; 70x+ cost reduction vs GPT-5",
idea:"OpenServ\'s SERV Reasoning Framework replaces free-form chain-of-thought with structured, machine-readable reasoning graphs (Mermaid diagrams). The large model writes the plan once; a cheap model executes it repeatedly. Published benchmarks: up to 99% reasoning accuracy on its 3-layer architecture, 107x performance per dollar vs standard inference, and 70x+ cost reduction vs GPT-5 in a foundational partnership with Neol. Fully OpenAI and Anthropic compatible via one-line base-URL swap.",
angle:"107x performance per dollar is the kind of claim that, if it holds in production, changes enterprise AI deployment economics overnight. The audit-grade traceable reasoning trail for regulated industries is the real wedge — if the performance holds, compliance-heavy verticals get a 2-for-1.",
tweetA:"OpenServ claims 107x performance per dollar vs standard inference and 70x+ cost reduction vs GPT-5 using structured reasoning graphs where large model plans once, cheap model executes repeatedly. If benchmarks hold in production, enterprise AI economics just changed.",
tweetB:"Separate planning from execution: large model writes the Mermaid diagram plan once, small model runs it on repeat. OpenServ: 107x performance per dollar, 99% reasoning accuracy, auditable trail for regulated industries. Worth watching. arXiv 2512.15959.",
charts:{count:0,hot:false,desc:""},

{id:24,cat:"crypto",urgency:"deep",
source:"Tiger Research / Henry Kim & Ryan Yoon",
title:"Binance, Bybit, Coinbase, Kraken all launching stock trading — crypto volume down 80%; \'this downturn will be harder than prior ones\'",
idea:"Since June 1, Binance lets users buy AAPL, GOOGL, and KOSPI stocks directly. Binance spot volume has fallen ~80% from its $45B daily peak to $7.7B. Hyperliquid now has 23 of its top 30 assets by perpetual futures volume as stocks and commodities — not crypto. Coinbase went commission-free on stocks in December 2025; Kraken acquired NinjaTrader for $1.5B in March 2025 and Bitnomial for $550M in April 2026. Tiger Research: \'In previous downturns, exchanges weathered the bear alongside crypto. Now they are looking for ways to grow without it. That is why this downturn is likely to be harder for crypto than previous ones.\'",
angle:"The CEX pivot to stocks is the most honest admission in crypto that the asset class alone can\'t sustain these businesses at current volumes. Binance routing through Alpaca, Kraken buying a futures broker — this is permanent structural diversification, not a temporary hedge.",
tweetA:"Binance launched stocks. Bybit added TradFi perps. Coinbase went commission-free on stocks. Kraken bought a futures broker for $1.5B. Crypto spot volume is down 80% from peak. Tiger Research: this bear market will be harder than prior ones because exchanges are now growing without crypto.",
tweetB:"Hyperliquid: 23 of 30 top perp assets are now stocks and commodities, not crypto. This isn\'t a product tweak — it\'s a category migration. Crypto exchanges are becoming stock exchanges. The thing they were supposed to disrupt is what\'s keeping them alive.",

title:"AI-designed universal coronavirus vaccine: first human trial shows antibodies against multiple strains simultaneously",
idea:"Cambridge researchers and spin-out DIOSynVax completed the first human trial of an AI-designed \'universal\' coronavirus vaccine. Unlike existing vaccines that target specific strains, AI and computer modelling identified common structural features across the entire sarbecovirus family, designing a \'super-antigen\' that trains the immune system broadly. Early trial result: recipients developed antibodies against multiple coronaviruses simultaneously rather than a single variant. Paper published in this month\'s Journal of Infection.",
angle:"The key claim is \'protection across the entire sarbecovirus family\' — not just SARS-CoV-2, but original SARS and any related coronavirus that could cause future outbreaks. If it holds through larger trials, this is the platform-level vaccine breakthrough that makes pandemic preparedness fundamentally different.",
tweetA:"Cambridge/DIOSynVax just completed the first human trial of an AI-designed universal coronavirus vaccine. Recipients developed antibodies against multiple coronaviruses simultaneously. If it scales: no more variant chasing. AI designed the super-antigen. Journal of Infection, this month.",

{id:32,cat:"venture",urgency:"deep",
source:"Damped Spring",
title:"IPO lies thesis: every participant lies in the same direction — and nothing changed since Spitzer",
idea:"The author — former global head of equity derivatives at Salomon Smith Barney/Citigroup, one of fewer than 100 people who processed thousands of tech bubble IPOs — lays out a comprehensive thesis: every participant in an IPO (issuer, founders, banks, analysts, large institutions, hedge funds, HNW, retail, regulators, media) lies, and almost all lies point in the same direction: making the deal succeed and the aftermarket rally. Fidelity used to demand 10% of every hot deal and inflated orders 2-10x knowing they wouldn\'t be held to them. Founders sold via collars while claiming long-term conviction. Key punchline: despite Spitzer\'s 2001 reforms exposing all of this, \'nothing has really changed because the incentives are too strong.\'",
angle:"With SpaceX IPO\'ing Friday at $1.8T and 2x oversubscribed, the timing of this analysis is perfect. Pure retail IPO orders are \'substantially negative expected value\' — full fills on outsized orders signal the deal will trade down. Every FOMO market order at open is paying the top tick.",
tweetA:"Former Salomon Smith Barney equity derivatives head: every IPO participant lies — issuer, founders, banks, institutions, retail, regulators. Fidelity inflated orders 10x. Founders sold via collars while claiming conviction. Nothing changed since Spitzer. SpaceX IPOs Friday.",
tweetB:"Pure retail in an IPO: \'only lies to themselves.\' Full fills on large orders = the deal will trade down. FOMO market orders at open = paying the top tick. The author processed thousands of these at Citi. He\'s not being cynical: \'it\'s reality. It works. It\'s just messy.\'",
charts:{count:0,hot:false,desc:""},
link:"https://dampedspring101.substack.com"},

// ===================== STATE =====================
var activeCat="all";
var activeUrg="all";
var activeSrc=null;

// ===================== RENDER =====================
function catColor(cat){return CAT_COLOR[cat]||"#888";}

function urgEmoji(u){
  if(u==="act-now")return "🔴";
  if(u==="deep")return "🔵";
  return "🟡";
}

function buildFilters(){
  var cats={};
  var urgs={"act-now":0,"deep":0,"watch":0};
  ITEMS.forEach(function(it){
    cats[it.cat]=(cats[it.cat]||0)+1;
    urgs[it.urgency]=(urgs[it.urgency]||0)+1;
  });
  var cb=document.getElementById("cat-bar");
  var ub=document.getElementById("urg-bar");
  cb.innerHTML="";
  ub.innerHTML="";
  // Cat filters
  var allP=document.createElement("span");
  allP.className="pill active";allP.textContent="All ("+ITEMS.length+")";
  allP.style.borderColor="#888";allP.style.backgroundColor="#888";
  allP.onclick=function(){setFilter("all","cat");};
  cb.appendChild(allP);
  Object.keys(cats).sort().forEach(function(c){
    var p=document.createElement("span");
    p.className="pill";p.dataset.cat=c;
    p.textContent=c+" ("+cats[c]+")";
    p.style.borderColor=catColor(c);p.style.color=catColor(c);
    p.onclick=function(){setFilter(c,"cat");};
    cb.appendChild(p);
  });
  // Urg filters
  var ul=document.createElement("span");
  ul.className="pill active";ul.textContent="All urgency";
  ul.style.borderColor="#555";ul.style.backgroundColor="#555";
  ul.onclick=function(){setFilter("all","urg");};
  ub.appendChild(ul);
  [["act-now","🔴 Act Now"],["deep","🔵 Deep"],["watch","🟡 Watch"]].forEach(function(pair){
    var u=pair[0],lbl=pair[1];
    var p=document.createElement("span");
    p.className="pill";p.dataset.urg=u;
    p.textContent=lbl+" ("+urgs[u]+")";
    p.style.borderColor="#777";p.style.color="#777";
    p.onclick=function(){setFilter(u,"urg");};
    ub.appendChild(p);
  });
}

function setFilter(val,type){
  activeSrc=null;
  if(type==="cat"){activeCat=val;}
  else{activeUrg=val;}
  updatePills();
  renderCards();
}

function filterBySrc(name){
  activeSrc=name;
  activeCat="all";activeUrg="all";
  updatePills();
  renderCards();
}

function updatePills(){
  document.querySelectorAll("#cat-bar .pill").forEach(function(p){
    var c=p.dataset.cat||"all";
    var isActive=(activeSrc===null&&activeCat===c)||(activeCat==="all"&&c==="all"&&activeSrc===null);
    if(!p.dataset.cat)isActive=(activeCat==="all"&&activeSrc===null);
    var col=p.dataset.cat?catColor(p.dataset.cat):"#888";
    p.className="pill"+(isActive?" active":"");
    if(isActive){p.style.backgroundColor=col;p.style.borderColor=col;p.style.color="#fff";}
    else{p.style.backgroundColor="transparent";p.style.borderColor=col;p.style.color=col;}
  });
  document.querySelectorAll("#urg-bar .pill").forEach(function(p){
    var u=p.dataset.urg||"all";
    var isActive=(activeSrc===null&&activeUrg===u)||(u==="all"&&activeUrg==="all"&&activeSrc===null);
    p.className="pill"+(isActive?" active":"");
    if(isActive){p.style.backgroundColor="#555";p.style.borderColor="#555";p.style.color="#fff";}
    else{p.style.backgroundColor="transparent";p.style.borderColor="#999";p.style.color="#777";}
  });
}

function renderCards(){
  var container=document.getElementById("cards");
  var existing={};
  container.querySelectorAll(".card").forEach(function(el){
    var id=parseInt(el.dataset.id);
    var isOpen=el.querySelector(".card-bd").classList.contains("open");
    existing[id]=isOpen;
  });
  container.innerHTML="";
  var shown=0;
  ITEMS.forEach(function(item){
    var show=true;
    if(activeSrc!==null){
      show=item.source.indexOf(activeSrc)>=0;
    } else {
      if(activeCat!=="all"&&item.cat!==activeCat)show=false;
      if(activeUrg!=="all"&&item.urgency!==activeUrg)show=false;
    }
    var card=buildCard(item,existing[item.id]||false);
    if(!show)card.classList.add("hidden");
    else shown++;
    container.appendChild(card);
  });
}

function buildCard(item,open){
  var col=catColor(item.cat);
  var card=document.createElement("div");
  card.className="card";card.dataset.id=item.id;
  // header
  var hd=document.createElement("div");
  hd.className="card-hd";
  hd.onclick=function(){toggleCard(item.id);};
  var chartFlag=item.charts&&(item.charts.count>0||item.charts.hot)?("<span class='chart-icon'>"+(item.charts.hot?"🔥":"📊")+"</span>"):"";
  hd.innerHTML="<span class='item-num'>"+String(item.id).padStart(2,"0")+"</span>"
    +"<span class='urg-icon'>"+urgEmoji(item.urgency)+"</span>"
    +"<span class='src-badge' style='background:"+col+"'>"+escH(truncate(item.source,28))+"</span>"
    +"<span class='cat-pill'>"+escH(item.cat)+"</span>"
    +"<span class='card-title'>"+escH(item.title)+"</span>"
    +chartFlag;
  card.appendChild(hd);
  // body
  var bd=document.createElement("div");
  bd.className="card-bd"+(open?" open":"");
  var angleStyle="border-left-color:"+col+";background:"+col+"18";
  var chartHtml="";
  if(item.charts&&item.charts.count>0){
    var hotClass=item.charts.hot?" hot":"";
    chartHtml="<div class='chart-blk"+hotClass+"'>📊 "+item.charts.count+" chart"+(item.charts.count>1?"s":"")+(item.charts.hot?" 🔥 CHART WORTH SAVING":"")+": "+escH(item.charts.desc)+"</div>";
  }
  var linkHtml=item.link?"<a class='art-link' href='"+item.link+"' target='_blank'>↗ Read full article</a>":"";
  bd.innerHTML="<div class='sec-label'>THE IDEA</div>"
    +"<div class='idea-text'>"+escH(item.idea)+"</div>"
    +"<div class='sec-label' style='margin-top:10px'>MY ANGLE</div>"
    +"<div class='angle-blk' style='"+angleStyle+"'>"+escH(item.angle)+"</div>"
    +"<div class='sec-label' style='margin-top:10px'>TWEETS</div>"
    +"<div class='tweets-row'>"
    +"<div class='tweet-box'>"
    +"<div class='tweet-lbl' style='color:#378add'>TWEET A</div>"
    +"<div class='tweet-txt'>"+escH(item.tweetA)+"</div>"
    +"<button class='copy-btn' onclick='copyTweet("+item.id+",\\'a\\')'>📋 Copy</button>"
    +"</div>"
    +"<div class='tweet-box'>"
    +"<div class='tweet-lbl' style='color:#7f77dd'>TWEET B</div>"
    +"<div class='tweet-txt'>"+escH(item.tweetB)+"</div>"
    +"<button class='copy-btn' onclick='copyTweet("+item.id+",\\'b\\')'>📋 Copy</button>"
    +"</div>"
    +"</div>"
    +chartHtml
    +linkHtml;
  card.appendChild(bd);
  return card;
}

function truncate(str,n){return str.length>n?str.slice(0,n-1)+"…":str;}

function escH(str){
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function toggleCard(id){
  var bd=document.querySelector(".card[data-id='"+id+"'] .card-bd");
  if(bd)bd.classList.toggle("open");
}

function copyTweet(itemId,which){
  var item=ITEMS.find(function(i){return i.id===itemId;});
  var text=which==="a"?item.tweetA:item.tweetB;
  var ta=document.createElement("textarea");
  ta.value=text;
  ta.style.position="fixed";
  ta.style.left="-9999px";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  var btn=event.target;
  btn.textContent="✓ Copied";
  setTimeout(function(){btn.textContent="📋 Copy";},1500);
}

function toggleRep(){
  var b=document.getElementById("rep-body");
  var t=document.getElementById("rep-toggle");
  b.classList.toggle("open");
  t.textContent=(b.classList.contains("open")?"▼":"▶")+" Session Report";
}

function buildReport(){
  var b=document.getElementById("rep-body");
  var inc=META.includedSources.map(function(s){
    return "<div class='rep-row'><span class='src-clickable' onclick=\"filterBySrc('"+s.name.replace(/'/g,"\\'")+"')\">"+escH(s.name)+"</span><span>"+s.items+" item"+(s.items>1?"s":"")+"</span></div>";
  }).join("");
  var skip=META.skippedSources.map(function(s){
    return "<div class='skip-row'>⊘ <b>"+escH(s.name)+"</b> — "+escH(s.reason)+"</div>";
  }).join("");
  b.innerHTML="<div class='rep-section'>"
    +"<h4>Session Summary</h4>"
    +"<div class='rep-row'><span>Time window</span><span>"+META.windowStart+" → "+META.windowEnd+"</span></div>"
    +"<div class='rep-row'><span>Emails in window</span><span>"+META.emailsInWindow+"</span></div>"
    +"<div class='rep-row'><span>Emails read</span><span>"+META.emailsRead+"</span></div>"
    +"<div class='rep-row'><span>Items extracted</span><span>"+META.itemsExtracted+"</span></div>"
    +"</div>"
    +"<div class='rep-section'><h4>Included Sources (click to filter)</h4>"+inc+"</div>"
    +"<div class='rep-section'><h4>Skipped</h4>"+skip+"</div>"
    +"<div class='window-note'>Window: "+META.windowStart+" to "+META.windowEnd+". Emails outside this window were not processed.</div>";
}

function setHeader(){
  document.getElementById("hdr-meta").textContent=
    META.date+" · "+META.time+" · "+META.itemsExtracted+" items from "+META.includedSources.length+" sources";
}

// ===================== INIT =====================
setHeader();
buildFilters();
renderCards();
buildReport();
</script>
