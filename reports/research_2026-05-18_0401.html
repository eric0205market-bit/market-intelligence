  emailsRead: 7,
  itemsExtracted: 11,
  includedSources: [
    { name: "Hi Mount Research", items: 2 },
    { name: "Neil Sethi / Substack", items: 4 },
    { name: "CubicAnalytics / Caleb", items: 1 },
    { name: "The Pressure Point / whatsthelatest.ai", items: 1 },
    { name: "McKinsey & Company", items: 1 },
    { name: "SixSigmaCapital / Substack", items: 1 }
  ],
  skippedSources: [
    { name: "SixSigmaCapital Chat Notification (2nd email from this source)", reason: "Subscriber chat thread notification — actual position list is behind the paid app wall. Substantive content (24 thematic setups, last week performers) covered in the trade ideas email above." }
  ]
};

const CAT_COLORS = {
  "macro": "#e24b4a",
  "credit": "#378add",
  "positioning": "#ef9f27",
  "AI/infra": "#1d9e75",
  "crypto": "#7f77dd",
  "geopolitics": "#d85a30",
  "energy": "#f97316",
  "tech": "#06b6d4",
  "gold": "#d4a017",
  "culture": "#ec4899",
  "labor": "#8b5cf6",
  "regulation": "#64748b",
  "science": "#14b8a6",
  "venture": "#84cc16"
};

const URG_EMOJI = { "act-now": "🔴", "deep": "🔵", "watch": "🟡" };
const URG_LABEL = { "act-now": "🔴 Act Now", "deep": "🔵 Deep", "watch": "🟡 Watch" };
const URG_COLOR = { "act-now": "#e24b4a", "deep": "#378add", "watch": "#f9a825" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  updatePills();
  render();
}

function updatePills() {
  document.querySelectorAll('#cat-pills .pill').forEach(function(p) {
    var v = p.dataset.cat;
    var isActive = v === activeCat;
    p.classList.toggle('active', isActive);
    if (isActive) {
      p.style.backgroundColor = v === 'all' ? '#333' : (CAT_COLORS[v] || '#666');
      p.style.color = '#fff';
      p.style.borderColor = 'transparent';
    } else {
      p.style.backgroundColor = '';
      p.style.color = '';
      p.style.borderColor = '';
    }
  });
  document.querySelectorAll('#urg-pills .pill').forEach(function(p) {
    var v = p.dataset.urg;
    var isActive = v === activeUrg;
    p.classList.toggle('active', isActive);
    if (isActive) {
      p.style.backgroundColor = v === 'all' ? '#333' : (URG_COLOR[v] || '#666');
      p.style.color = '#fff';
      p.style.borderColor = 'transparent';
    } else {
      p.style.backgroundColor = '';
      p.style.color = '';
      p.style.borderColor = '';
    }
  });
}

function init() {
  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items · Window: ' + META.windowStart + ' → ' + META.windowEnd;

  var catCounts = {};
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
  });
  var cats = ['all'];
  ITEMS.forEach(function(item) { if (cats.indexOf(item.cat) === -1) cats.push(item.cat); });

  var catPills = document.getElementById('cat-pills');
  cats.forEach(function(cat) {
    var p = document.createElement('span');
    p.className = 'pill';
    p.dataset.cat = cat;
    p.textContent = cat === 'all' ? 'All (' + ITEMS.length + ')' : cat + ' (' + (catCounts[cat] || 0) + ')';
    if (cat === 'all') {
      p.classList.add('active');
      p.style.backgroundColor = '#333';
      p.style.color = '#fff';
      p.style.borderColor = 'transparent';
    }
    p.onclick = function() { activeCat = cat; activeSrc = null; updatePills(); render(); };
    catPills.appendChild(p);
  });

  var urgCounts = {};
  ITEMS.forEach(function(item) { urgCounts[item.urgency] = (urgCounts[item.urgency] || 0) + 1; });
  var urgPills = document.getElementById('urg-pills');
  ['all','act-now','deep','watch'].forEach(function(u) {
    var p = document.createElement('span');
    p.className = 'pill';
    p.dataset.urg = u;
    p.textContent = u === 'all' ? 'All (' + ITEMS.length + ')' : (URG_LABEL[u] + ' (' + (urgCounts[u] || 0) + ')');
    if (u === 'all') {
      p.classList.add('active');
      p.style.backgroundColor = '#333';
      p.style.color = '#fff';
      p.style.borderColor = 'transparent';
    }
    p.onclick = function() { activeUrg = u; activeSrc = null; updatePills(); render(); };
    urgPills.appendChild(p);
  });

  render();
  buildReport();
}

function render() {
  var container = document.getElementById('cards');
  container.innerHTML = '';
  var visible = ITEMS.filter(function(item) {
    if (activeSrc && item.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== 'all' && item.cat !== activeCat) return false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return false;
    return true;
  });

  if (visible.length === 0) {
    container.innerHTML = '<div class="empty-msg">No items match the current filters.</div>';
    return;
  }

  visible.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#666';
    var urg = URG_EMOJI[item.urgency] || '';
    var card = document.createElement('div');
    card.className = 'card';

    var chartsHtml = '';
    if (item.charts.count > 0) {
      var hotCls = item.charts.hot ? ' hot' : '';
      chartsHtml = '<div class="charts-note' + hotCls + '">' +
        (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s): ' + escHtml(item.charts.desc) +
        '</div>';
    }

    var headerHtml = '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="item-num">#' + item.id + '</span>' +
      '<span class="urgency">' + urg + '</span>' +
      '<span class="source-badge" style="background:' + color + '">' + escHtml(item.source) + '</span>' +
      '<span class="cat-tag">' + escHtml(item.cat) + '</span>' +
      (item.charts.hot ? '<span class="chart-icon">🔥</span>' : (item.charts.count > 0 ? '<span class="chart-icon">📊</span>' : '')) +
      '<span class="card-title">' + escHtml(item.title) + '</span>' +
      '</div>';

    var bodyHtml = '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + escHtml(item.idea) + '</div>' +
      '<div class="section-label">My Angle</div>' +
      '<div class="angle-box" style="border-left-color:' + color + ';background:' + color + '18">' + escHtml(item.angle) + '</div>' +
      '<div class="tweets">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label" style="color:#378add">TWEET A</div>' +
          '<div class="tweet-text">' + escHtml(item.tweetA) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>' +
          '<div class="tweet-text">' + escHtml(item.tweetB) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartsHtml +
      '<a class="link-btn" href="' + escHtml(item.link) + '" target="_blank">&#8599; Read full article</a>' +
      '</div>';

    card.innerHTML = headerHtml + bodyHtml;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function buildReport() {
  var html = '<p><strong>Window:</strong> ' + escHtml(META.windowStart) + ' &rarr; ' + escHtml(META.windowEnd) + '</p>';
  html += '<p style="margin-top:6px"><strong>Emails in window:</strong> ' + META.emailsInWindow +
    ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead +
    ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';

  html += '<p style="margin-top:14px;font-weight:700;color:#555;">Included Sources</p><table>';
  META.includedSources.forEach(function(s) {
    var safeName = s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<tr><td><span class="src-link" onclick="filterBySrc(\'' + safeName + '\')">' + escHtml(s.name) + '</span></td><td>' + s.items + ' item(s)</td></tr>';
  });
  html += '</table>';

  if (META.skippedSources && META.skippedSources.length > 0) {
    html += '<p style="margin-top:14px;font-weight:700;color:#555;">Skipped / Merged</p><table>';
    META.skippedSources.forEach(function(s) {
      html += '<tr><td>' + escHtml(s.name) + '</td><td>' + escHtml(s.reason) + '</td></tr>';
    });
    html += '</table>';
  }

  document.getElementById('report-body').innerHTML = html;
}

init();
</script>
</body>
</html>
