<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  --cat-macro: #2563eb;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-tech: #0d9488;
  --cat-ai: #4f46e5;
  --cat-geopolitics: #dc2626;
  --cat-positioning: #15803d;
  --cat-regulation: #7c3aed;
  --cat-society: #d97706;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

<script>
const REPORT_DATA = {"date":"2026-06-01 05:20 UTC","summary":"**Iran/Hormuz:** biancoresearch issues a major structural warning — markets are dangerously treating the Strait of Hormuz closure as a short-term liquidity problem. US distillate inventories sit at their lowest since 2003 with zero spare refining capacity; Chevron CEO Mike Wirth warned the system is structurally tight. Tanks could run dry within 30-60 days. biancoresearch argues the market has built scar tissue from 5 years of false expert alarms and is reflexively buying the dip when physical reality is genuinely different this time.\n\n**Markets:** Equities hit 9 straight weeks of record highs (spotgamma), but a mid-June triple threat looms: SpaceX IPO, FOMC, and major OPEX. stevehou argues the Iran conflict mirrors Liberation Day 2025 exactly — the exogenous shock submerged the AI-turbocharged economy like an \"inflated basketball,\" and the melt-up likely runs through October. saxena_puru is already trimming, locking in 90% gains in 6 weeks and 520% over 2 years.\n\n**AI Infrastructure:** aleabitoreddit teases the next AI bottleneck to be revealed at NVDA GTC/Computex — a mysterious Japanese company (0.6 P/B, 180-year history) holding a de facto monopoly on CPO co-packaged optics inspection and thermal alignment for NVIDIA Rubin. $AAOI photonics thesis: 4-5x return potential in 12-24M. biancoresearch charts AI token usage exploding parabolically since agentic AI went mainstream in January 2026.\n\n**Crypto:** HYPE flips DOGE, enters top 10 (ASvanevik). CT is aggressively bullish while udiWertheimer provides sober pushback: not non-custodial, not the second coming. TCG/CARDS meta goes parabolic — Bluntz_Capital calls it the \"hip-3 moment\" for crypto collectibles with $gacha protocol buying physical Pokemon booster packs every 30 minutes.\n\n**Notable:** Colombia election shock — right-wing Abelardo de la Espriella wins first round outright, zero polls predicted it (Geiger_Capital). cryptopunk7213 flags OpenAI releasing Rosalind biodefense AI to government partners to develop an Ebola vaccine in under 100 days — the first private AI lab deployed in national health defense. citrini calls the $RVMD RASolute 302 phase 3 win at ASCO26 a copy-paste breakthrough with TAM beyond pancreatic cancer.","events":[{"category":"energy","title":"Iran/Hormuz — Structural Supply Crisis, Not Temporary Liquidity Glitch","items":[{"author":"biancoresearch","tweet_url":"https://x.com/biancoresearch/status/2061280001136238636","text":"Major long thread warning: every crisis (1997, 2008, 2020) starts with Wall Street treating a structural problem as a temporary liquidity glitch. Governments and oil companies are draining inventories to bridge the Hormuz closure, assuming a guaranteed resolution. Chevron CEO Wirth confirmed: US distillate and gasoline inventories at lowest since 2003, zero spare refining capacity, and cautious insurers will prevent quick supply chain normalization even post-resolution. biancoresearch concludes the market may be confusing past false alarms with a looming physical reality — tanks truly running dry within 30-60 days.","images":["https://pbs.twimg.com/media/HJszn3-XQAIjTsU.png"],"created_at":"2026-06-01T02:53:00.000Z"},{"author":"zriboua","tweet_url":"https://x.com/zriboua/status/2061181525442375938","text":"IRGC is constantly trying to buy time. This time it will be harder due to the combination of military AND economic/financial pressures. Separately, zriboua flagged a significant development: a Chinese-made shoulder-launched MANPAD missile likely hit the F-15E Strike Eagle shot down over southwestern Iran in April. China may have also supplied Iran with a long-range early-warning radar capable of detecting stealth aircraft — a significant escalation in China-US-Iran dynamics.","images":["https://pbs.twimg.com/media/HJqfxCNWUAISFfI.jpg"],"created_at":"2026-05-31T20:22:00.000Z"},{"author":"pboockvar","tweet_url":"https://x.com/pboockvar/status/2061194167317942540","text":"Calls Goehring & Rozencwajg's \"Could the Tanks Run Dry?\" an essential read for anyone in commodity markets/stocks. Covers tightening inventories, slowing shale growth, oil and LNG supply risks, and commodity scarcity. Also asks biancoresearch whether AI data centers are also getting more expensive to use.","created_at":"2026-05-31T21:12:00.000Z"}]},{"category":"macro","title":"Summer Melt-Up — Iran as Liberation Day 2.0, Running to October","items":[{"author":"stevehou","tweet_url":"https://x.com/stevehou/status/2061284848371667281","text":"This year's summer melt-up started earlier because the Iran shock happened earlier (Feb 28) vs Liberation Day 2025 (Apr 2). The thesis: exogenous shocks submerge the AI-turbocharged US economy like an inflated basketball — and the Iran conflict ending is the release. War is already thematically over; melt-up likely ends in October. Bloomberg earnings inflection index has had a good year and will capture software names when they finally turn.","images":["https://pbs.twimg.com/media/HJs2nW2WgAU-btS.jpg"],"created_at":"2026-06-01T03:12:00.000Z"},{"author":"Evan_ss6","tweet_url":"https://x.com/Evan_ss6/status/2061214245077782909","text":"War is over, uranium will be handed over, Hormuz will open. Warsh will cut rates using AI deflation and a deteriorating jobs market as justification — even easier once oil heads back to $50-65. Also floats the bear case: BTC $40K, ETH $800, HYPE falling from $250 to $189.","created_at":"2026-05-31T22:32:00.000Z"}]},{"category":"macro","title":"Markets — 9 Straight Weeks ATH + Mid-June Triple Threat","items":[{"author":"spotgamma","tweet_url":"https://x.com/spotgamma/status/2061204069880901810","text":"9 straight weeks of record highs, characterized by significant vol dispersion. The bull run soon meets a mid-June triple threat: SpaceX IPO, FOMC, and major OPEX. Full weekly analysis covers SPX dispersion risk and June catalysts.","created_at":"2026-05-31T21:52:00.000Z"},{"author":"biancoresearch","tweet_url":"https://x.com/biancoresearch/status/2061120858467291589","text":"Reposts BofA's May 22 Flow Show chart: the market has not been this concentrated around a single theme in 150 years. Notes data centers are bringing their own power and bypassing utilities — not raising electric bills, which is a key pushback to the AI bubble narrative.","created_at":"2026-05-31T16:21:00.000Z"}]},{"category":"geopolitics","title":"Colombia Election Shock — Abelardo Wins Round 1 Outright, Zero Polls Predicted It","items":[{"author":"Geiger_Capital","tweet_url":"https://x.com/Geiger_Capital/status/2061215604669829306","text":"\"Far-right\" Abelardo de la Espriella wins the first round outright. Not one poll predicted this. Paloma Valencia (7%) and former president Alvaro Uribe have endorsed Abelardo, who becomes the clear heavy favorite for the June 21 runoff. Geiger_Capital argues the Milei/Bukele model will bring sweeping prosperity to South America while Europe declines. Subscribers were positioned months ahead.","images":["https://pbs.twimg.com/media/HJroqygWkAIo86H.jpg","https://pbs.twimg.com/media/HJrtmp9XsAAgAHd.jpg"],"created_at":"2026-05-31T22:37:00.000Z"}]},{"category":"crypto","title":"HYPE Enters Top 10 — Flips DOGE, Solana Becomes #3 Spot Venue","items":[{"author":"ASvanevik","tweet_url":"https://x.com/ASvanevik/status/2061247544399904905","text":"Breaking: HYPE flips DOGE to enter the top 10 by market cap. Solana is now the 3rd largest spot HYPE trading venue by 24h volume ($56M), surpassing Coinbase and OKX. \"The future is onchain.\"","images":["https://pbs.twimg.com/media/HJsFtvkaIAA_yjT.jpg"],"created_at":"2026-06-01T00:44:00.000Z"},{"author":"rektmando","tweet_url":"https://x.com/rektmando/status/2061216352682037532","text":"Observes the HYPE move from $45 to $72 felt like CT sold just as TradFi started buying. Notes @based16z and @KookCapitalLLC made well-timed calls on the entry.","created_at":"2026-05-31T22:40:00.000Z"},{"author":"jchervinsky","tweet_url":"https://x.com/jchervinsky/status/2061139743371309138","text":"HyperliquidPC sponsoring @hypurr_co Gathers at Token2049 in Singapore. Notes the Hyperliquid community has \"something else\" energy and represents the best of the ecosystem.","created_at":"2026-05-31T17:36:00.000Z"}]},{"category":"crypto","title":"CARDS/TCG Crypto Meta — Hip-3 Moment with $GACHA Flywheel","items":[{"author":"Bluntz_Capital","tweet_url":"https://x.com/Bluntz_Capital/status/2061208750825107804","text":"$gacha is triggering the \"hip-3 moment\" for @Collector_Crypt $CARDS. Protocol flywheel: 100% of $GACHA trading fees buy graded Pokemon booster packs every 30 minutes; one random $GACHA holder wins all slabs (redeemable for physical cards or sold for USDC). Bluntz up 265% on $CARDS as top-15 holder — calls it still cheap, targets a market cap \"that makes no sense to most.\" All TCG gacha coins going parabolic simultaneously.","images":["https://pbs.twimg.com/media/HJrypxkaYAEVexl.png","https://pbs.twimg.com/media/HJsukOFbEAAIzTF.jpg"],"created_at":"2026-05-31T22:10:00.000Z"},{"author":"ColdBloodShill","tweet_url":"https://x.com/ColdBloodShill/status/2061232061684347147","text":"$CARDS broke out cleanly, targeting $100M market cap. Bandai printing capacity remains constrained — Feb/March reprint fears were nothing burgers. Flags EB03 as sleeper set (minuscule print run). Recommends rotating TCG profits into physical Pokemon with prices pulling back from highs.","images":["https://pbs.twimg.com/media/HJr3ccvWAAAOVIN.jpg"],"created_at":"2026-05-31T23:43:00.000Z"},{"author":"sjdedic","tweet_url":"https://x.com/sjdedic/status/2061161173815316634","text":"Asks \"what is the Hyperliquid of $10M or $50M market caps?\" and posts $CARDS contract address — framing the protocol as the next-tier size play in on-chain infrastructure.","images":["https://pbs.twimg.com/media/HJq3J1aWsAExAtO.jpg"],"created_at":"2026-05-31T19:01:00.000Z"}]},{"category":"tech","title":"$RVMD — RAS(ON) Inhibitor Phase 3 Win at ASCO26, Copy-Paste Potential Beyond Pancreatic Cancer","items":[{"author":"citrini","tweet_url":"https://x.com/citrini/status/2061291930768588949","text":"Calls $RVMD's RASolute 302 phase 3 trial result an \"amazing breakthrough\" — daraxonrasib showed significantly longer OS and PFS vs chemotherapy in previously treated metastatic pancreatic ductal adenocarcinoma. The bigger alpha: RAS being a druggable target has \"copy-paste\" potential across multiple cancer types. citrini had this in his 26 Trades for 2026. Also observes a fire at a chip facility — notes less memory supply = higher chip prices, which would benefit chip investors.","images":["https://pbs.twimg.com/media/HJsuFbmWoAQJRPb.jpg"],"created_at":"2026-06-01T03:41:00.000Z"}]},{"category":"AI","title":"OpenAI Rosalind — Biodefense AI Deployed for Ebola Vaccine in <100 Days","items":[{"author":"cryptopunk7213","tweet_url":"https://x.com/cryptopunk7213/status/2061283240548147650","text":"OpenAI built Rosalind, a biodefense AI model so capable it could assist in bioweapon creation — held back. Now selectively releasing to government entities including CEPI. 12 days ago an Ebola emergency was called with no vaccine; CEPI is using Rosalind to develop one in under 100 days. Likely the first time a private AI lab has been used in national health defense. Draws parallel to Anthropic's Project Glasswing for cyber defense.","images":["https://pbs.twimg.com/media/HJsmLtGXUAUAcd5.jpg","https://pbs.twimg.com/media/HJsmLtBWMAYS8ih.jpg"],"created_at":"2026-06-01T03:06:00.000Z"}]},{"category":"tech","title":"Meta/Instagram — Massive Account Exploit Patched Over Weekend","items":[{"author":"zachxbt","tweet_url":"https://x.com/zachxbt/status/2061251183675949365","text":"Massive Instagram/Meta exploit just patched: Meta AI support had excessive access permissions allowing password resets for any user without 2FA verification. Telegram black-market channels on Instagram made large amounts of money. No official comms from Meta yet. Notes reaching Meta support still requires paying \"unreasonable amounts to corrupt employees.\"","created_at":"2026-06-01T00:59:00.000Z"}]},{"category":"crypto","title":"Strategy (MSTR) — June Prioritizing Common Over STRC Preferred","items":[{"author":"qthomp","tweet_url":"https://x.com/qthomp/status/2061263243121967293","text":"Strategy is prioritizing MSTR shareholders over STRC holders in June — no dividend rate increase for STRC. Chart shows MSTR has been down since the STRC launch, suggesting the preferred equity has cannibalized common. Quinn also flags first signs of another TACO trade (Trump Always Chickens Out) as political capital runs thin after the Iran war.","images":["https://pbs.twimg.com/media/HJsT_sobkAAttRX.jpg","https://pbs.twimg.com/media/HJsVK5fagAACdO3.jpg"],"created_at":"2026-06-01T01:47:00.000Z"}]}],"insights":[{"author":"biancoresearch","tweet_url":"https://x.com/biancoresearch/status/2061125427633008710","text":"AI token usage has been exploding higher since January 2026, when agentic AI (Claude Code-style agents) went mainstream. Users are creating agents and writing code, leading to exponential growth in AI usage. \"It's just starting.\" biancoresearch argues this is a more important chart than the concentration narrative — demand is real, not just hype.","images":["https://pbs.twimg.com/media/HJqV2D9WEAA2rEO.jpg"],"created_at":"2026-05-31T16:39:00.000Z","category":"AI","is_thread":true},{"author":"aleabitoreddit","tweet_url":"https://x.com/aleabitoreddit/status/2061252644195504239","text":"Serenity's favorite photonics exposure in the US market: $AAOI, long from $28 (initial hyperscaler qualification guess), added conviction at $70 post-earnings (1.6T+ volume orders with AMZN/MSFT), capacity projections bullish at $90, now at $150. Thesis intact: laser fab bottlenecks, GS optical TAM projections, Made in America tailwinds, NVDA/AMD rumors. Only headwind: ATM after ATM ($600M latest = mechanical selling). Expects clean rerate once pressure stops. Projects 4-5x return in 12-24M. Notes screener forward P/Es are wildly off for hypergrowth names — needs custom calculation ($AAOI, $SNDK methodology).","created_at":"2026-06-01T01:05:00.000Z","category":"tech","is_thread":true},{"author":"aleabitoreddit","tweet_url":"https://x.com/aleabitoreddit/status/2061265938612465817","text":"Serenity teases the \"next AI bottleneck\" to be revealed at NVDA GTC/Computex in Taipei: owned by a 0.6 P/B Japanese company with a 180-year history whose owner cooks potatoes in night markets for 160 yen. The same \"potato farming equipment\" optimizing sunlight is now required for CPO (co-packaged optics) optical alignment. Their \"cooking technique\" is mandatory for thermal requirements for NVIDIA Rubin. MSScorps mentioned as de facto monopoly over CPO inspection yields — but scale hasn't arrived yet. Nippon Chemical (4092) — red phosphorus for InP substrates — already up ~100% as the bottleneck of the bottleneck play.","images":["https://pbs.twimg.com/media/HJs4IMXbUAAauxW.jpg"],"created_at":"2026-06-01T01:57:00.000Z","category":"AI","is_thread":true},{"author":"aleabitoreddit","tweet_url":"https://x.com/aleabitoreddit/status/2061233888454988260","text":"$ARM went from $134 to $354 since Serenity's entry. NVDA is unveiling ARM-based processors at Computex. GPU:CPU ratios require more and more CPUs per accelerator cluster. Counterpoint projects ARM dominating AI ASIC servers by 2029. Parts of localized inference will increasingly run on CPUs as models like Gemma get lighter. Multiple catalysts converging.","images":["https://pbs.twimg.com/media/HJr5Srba8AAYAzE.jpg","https://pbs.twimg.com/media/HJr5SrZa0AAIx94.jpg"],"created_at":"2026-05-31T23:50:00.000Z","category":"tech","is_thread":false},{"author":"Crypto_McKenna","tweet_url":"https://x.com/Crypto_McKenna/status/2061129317665349800","text":"Structural ETH rotation has been underway for ~6 months and is only now being felt. Every underwater DAO with ETH on its balance sheet will sell into rallies and buy back its own token — creating persistent, low-profile sell flows with no institutional or retail demand to absorb them. No announcement will come; it will \"unravel slowly.\" Target: ETH $1000.","created_at":"2026-05-31T16:54:00.000Z","category":"crypto","is_thread":false},{"author":"Crypto_McKenna","tweet_url":"https://x.com/Crypto_McKenna/status/2061122408548061206","text":"Bitcoin's quantum threat is a major blocker for institutional flows and changes how much BTC institutions are willing to underwrite. Post-CLARITY, a credible migration plan for affected public keys would trigger sizable institutional inflows. McKenna is puzzled that Michael Saylor — one of the largest public BTC holders — has not been proactive in this conversation. \"Head in the sand for longer increases risks and reduces flows.\"","created_at":"2026-05-31T16:27:00.000Z","category":"crypto","is_thread":true},{"author":"udiWertheimer","tweet_url":"https://x.com/udiWertheimer/status/2061260061196837332","text":"Don't spend serious money on computer hardware. Buy a MacBook Neo for $700 and put the rest into ChatGPT Pro or Claude Max. \"AI PC\" as a category is a scam — the hardware industry has tried to make it a thing for years and nobody cares. Investors are subsidizing hundreds of billions in cloud AI infrastructure every quarter. \"Why on earth would you spend your own money on local inference?\" Geforce Now handles gaming too.","created_at":"2026-06-01T01:34:00.000Z","category":"AI","is_thread":true},{"author":"loomdart","tweet_url":"https://x.com/loomdart/status/2061149441818841334","text":"Pokemon cards are the ice breaker for a much larger societal shift from aspirational luxury consumption toward collectibles as investment stores of value. Old guard dying: diamonds collapsing, Rolex/AP artificial scarcity exposed by Chinese manufacturers revealing production costs. Pokemon cards work uniquely because: no fugazi intrinsic value, genuinely supply-constrained unlike Nike/Adidas, and no cartel control. A new class of wealthy, financially-savvy consumers (\"even NBA players now buy investments, not diamonds\") is seeking a new category. Crypto is uniquely suited to dominate the next phase — but needs to be done properly.","images":["https://pbs.twimg.com/media/HJqznGxbQAARFyh.jpg"],"created_at":"2026-05-31T18:14:00.000Z","category":"society","is_thread":true},{"author":"hooeem","tweet_url":"https://x.com/hooeem/status/2061122714727760209","text":"Debunks the viral Wharton/BU \"AI Layoff Trap\" paper (peer-reviewed, March 2026) that claims mathematical proof AI will destroy the economy. Fatal flaw: the model assumes money saved from job displacement simply vanishes — owners never spend it, no new jobs appear, nothing gets cheaper. This is economically impossible. The paper's scariest result also requires \"special knife-edge conditions\" and the authors themselves admit that allowing money to recirculate makes the problem shrink toward nothing. Fear-mongering content that the algorithm rewards.","images":["https://pbs.twimg.com/tweet_video_thumb/HJri7-gW0AIZQk_.jpg"],"created_at":"2026-05-31T16:28:00.000Z","category":"AI","is_thread":true},{"author":"saxena_puru","tweet_url":"https://x.com/saxena_puru/status/2061148699682828408","text":"Citing Bloomberg Intelligence data from Cerebras' April 2026 S-1: AI inference market (Cerebras-addressable slice) grows from ~$66B (2025) to $292B (2029) at 45% CAGR. This dramatically outpaces training infrastructure at ~20% CAGR. Inference-focused plays may be the next phase of the AI trade.","created_at":"2026-05-31T18:11:00.000Z","category":"AI","is_thread":true},{"author":"RaoulGMI","tweet_url":"https://x.com/RaoulGMI/status/2061235886122062025","text":"Under-appreciated: the AI race cannot be stopped by governments, markets, or anyone. \"There is no world in which you can allow one superpower to have AGI.\" Game theory means neither the US nor China can slow down. Even if OpenAI collapsed tomorrow, the US government would auction the technology. The race is structurally unstoppable.","created_at":"2026-05-31T23:58:00.000Z","category":"AI","is_thread":false},{"author":"Melt_Dem","tweet_url":"https://x.com/Melt_Dem/status/2061121928560271362","text":"Thesis piece on portco Verne Robotics: industrial robotics business model is broken (high integration cost, long contracts, poor cost fit for most businesses). Fix: \"Robotics as a Service\" — physical intelligence like SaaS, low/no integration cost, right-sized contracts. Verne believes every American business deserves a robot. 10-20 minutes to learn most tasks at scale. \"Software ate the world. Robots are up next.\"","images":["https://pbs.twimg.com/media/HJqSWt0aUAAMweo.jpg","https://pbs.twimg.com/media/HJqTqMza0AA1xhT.jpg"],"created_at":"2026-05-31T16:25:00.000Z","category":"tech","is_thread":true},{"author":"cryptopunk7213","tweet_url":"https://x.com/cryptopunk7213/status/2061199112410722738","text":"Hottest AI job right now: Forward Deployed Engineer (FDE). Salaries hitting $300K before equity, up 15-20% YoY. Part-engineer, part-consultant, part-PM — goes inside companies to build AI agents that actually work. Palantir is the biggest hirer. Cursor, Softbank, Notion listed 4,000 new FDE roles this year. Anthropic and OpenAI planning thousands more hires in this role over 1-2 years.","images":["https://pbs.twimg.com/media/HJrZqvTX0Ak1CQA.jpg","https://pbs.twimg.com/media/HJrZqwhWYAUzREE.jpg"],"created_at":"2026-05-31T21:32:00.000Z","category":"AI","is_thread":false},{"author":"DCinvestor","tweet_url":"https://x.com/DCinvestor/status/2061302524095918588","text":"Everything is now targeting 401K money: private equity needing to exit before IPO, crypto, and newly listed equities that don't meet criteria held in place for decades. Separately, global world order collapse is deeply underappreciated — \"the scaffolding has been removed or exposed as never having been there.\" US hegemony survived the 1971 dollar-gold break because adversaries collapsed. That may not hold this time.","created_at":"2026-06-01T04:23:00.000Z","category":"macro","is_thread":false},{"author":"PeterDiamandis","tweet_url":"https://x.com/PeterDiamandis/status/2061213751466942972","text":"AGI threshold crossed: on MOONSHOTS podcast they defined AGI as 50% on Humanity's Last Exam. Claude Opus 4.8 scored 57.9%. EMostaque's take: \"We should worry less about being turned into paperclips and more about being annoyed to death\" — while also noting Claude 4.6 Max is \"pretty nice.\" Diamandis adds: if machines can write, reason, diagnose, and persuade, human value cannot be based on productivity.","created_at":"2026-05-31T22:30:00.000Z","category":"AI","is_thread":false},{"author":"nicbstme","tweet_url":"https://x.com/nicbstme/status/2061141377371771134","text":"Codex (OpenAI) spent 11+ hours attempting to solve the Navier-Stokes Millennium Prize problem ($1M reward) with no tools. Long-running agents are a demonstrated reality. This specific attempt will not succeed without a far more powerful model, custom mathematical verification tools, and scaffolding. Key question: how many tokens ($) will it eventually cost an advanced AI to solve a Millennium Prize problem?","images":["https://pbs.twimg.com/media/HJqkagVbUAAQYja.jpg"],"created_at":"2026-05-31T17:42:00.000Z","category":"AI","is_thread":true},{"author":"fejau_inc","tweet_url":"https://x.com/fejau_inc/status/2061302021110763882","text":"Prediction markets as the cheapest hedge in finance: $50 protects a $10K portfolio against a specific binary event — no options chain, no broker, no greeks, no slippage. If liquidity scales, this could enable sophisticated corporate treasury hedging for specific event risks. Key caveat: assumes liquidity is available, which is a huge assumption.","created_at":"2026-06-01T04:21:00.000Z","category":"macro","is_thread":false},{"author":"buccocapital","tweet_url":"https://x.com/buccocapital/status/2061161363959894043","text":"Tokenmaxxing and grindmaxxing are both commoditized, undifferentiated inputs — the wrong things to focus on. What actually matters are scarce, differentiated inputs. The jokes about tech people being obsessed with \"taste\" but having none contain a real signal: differentiated inputs are what compound.","created_at":"2026-05-31T19:02:00.000Z","category":"society","is_thread":false},{"author":"Fiskantes","tweet_url":"https://x.com/Fiskantes/status/2061159652113473982","text":"Links article documenting the huge disconnect between what people on podcasts/social media claim they're achieving with AI and what they're actually achieving. \"Emperor has a bit less clothes than previously imagined.\"","created_at":"2026-05-31T18:55:00.000Z","category":"AI","is_thread":false}],"contrarian":[{"author":"beaniemaxi","tweet_url":"https://x.com/beaniemaxi/status/2061239043925454932","text":"\"Solana is basically cooked. Everybody with money on it either lost it to DeFi protocol hackers or memecoin ruggers. There's no coming back from this.\" A strong directional call against the prevailing Solana bull narrative dominant in crypto CT.","created_at":"2026-06-01T00:10:00.000Z","category":"crypto","is_thread":false},{"author":"biancoresearch","tweet_url":"https://x.com/biancoresearch/status/2061280001136238636","text":"Against the dominant \"war is over, buy the dip\" trade: the market's scar tissue from 5 years of false alarms has made it reflexively buy every crisis. The energy sector today is genuinely different — inventories are physically tight, tanks are truly running dry, and treating the Hormuz closure as a temporary glitch will cause demand destruction to hit all at once when inventories hit operational minimums. This is not another false alarm.","images":["https://pbs.twimg.com/media/HJszn3-XQAIjTsU.png"],"created_at":"2026-06-01T02:53:00.000Z","category":"energy","is_thread":true},{"author":"udiWertheimer","tweet_url":"https://x.com/udiWertheimer/status/2061173495375991046","text":"Against HYPE mania: \"bullish takes over the past week have transcended beyond all levels of retardation.\" Key point: Hyperliquid is NOT non-custodial — an important qualifier for the decentralization narrative. \"It's a great app, not the second coming.\" Also notes Hyperliquid lacks native SOL deposit support, hinting at product gaps in the bull case.","created_at":"2026-05-31T19:50:00.000Z","category":"crypto","is_thread":true},{"author":"citrini","tweet_url":"https://x.com/citrini/status/2061249503341015455","text":"Responding to \"I really have to get better at buying what the President says to buy\": \"I don't care if IBM is up six thousand percent at the open tomorrow, I'm not making this mistake again.\" A pointed refusal to chase politically-driven market signals — with implicit warning about the sustainability of presidential stock picks.","images":["https://pbs.twimg.com/tweet_video_thumb/HJsN7UpW4AMBGKo.jpg"],"created_at":"2026-06-01T00:52:00.000Z","category":"macro","is_thread":false},{"author":"Crypto_McKenna","tweet_url":"https://x.com/Crypto_McKenna/status/2061129317665349800","text":"Against the ETH revival narrative: structural rotation out of ETH has been underway for ~6 months. Underground sell pressure from underwater DAOs unloading ETH balance sheets has no demand to meet it. No announcement, just a slow unravel. Target: $1000.","created_at":"2026-05-31T16:54:00.000Z","category":"crypto","is_thread":false},{"author":"DCinvestor","tweet_url":"https://x.com/DCinvestor/status/2061228562087281143","text":"Against prevailing market optimism: most people have \"dramatically underweighted\" how far into the collapse of the global world order we already are. The scaffolding was either removed or was never there. 1971 dollar-gold break is the closest analog — but back then, adversaries were structurally weaker and collapsed over the following decades. That may not be the case today.","created_at":"2026-05-31T23:29:00.000Z","category":"macro","is_thread":true},{"author":"Evan_ss6","tweet_url":"https://x.com/Evan_ss6/status/2061263984100090182","text":"Posts the full bear case alongside his bull Iran macro thesis: BTC $40K, ETH $800, HYPE falling from $250 to $189. Also advises \"just always short ETH\" and notes he doesn't see POTUS taking a 10% stake in it (as a potential upside catalyst) as likely.","created_at":"2026-06-01T01:50:00.000Z","category":"crypto","is_thread":false}],"positioning":[{"author":"saxena_puru","tweet_url":"https://x.com/saxena_puru/status/2061277057653641482","text":"New Trading Alert: trimming overextended AI stocks. (i) Trimming 40% of a position at ~90% profit in 6 weeks. (ii) Selling entire position at ~520% profit over 2 years. Signals the AI equity run is getting long in the tooth near-term — taking chips off the table.","created_at":"2026-06-01T02:42:00.000Z","category":"positioning","is_thread":false},{"author":"aleabitoreddit","tweet_url":"https://x.com/aleabitoreddit/status/2061252644195504239","text":"Long $AAOI at $150 (entered $28, added at $70). Thesis: laser fab bottlenecks, hyperscaler volume orders (1.6T+), Made in America, NVDA/AMD integration. Only headwind: $600M ATM mechanical selling. Projects 4-5x in 12-24M. Also long Nippon Chemical Japan (4092), up ~100% — red phosphorus for InP substrates = bottleneck of the Western hyperscaler buildout.","created_at":"2026-06-01T01:05:00.000Z","category":"positioning","is_thread":true},{"author":"Bluntz_Capital","tweet_url":"https://x.com/Bluntz_Capital/status/2061194719624155636","text":"$ZEC technical long: perfect ABC pullback, 5 subwaves in C, 4H bull div, 4H 200MA bounce. Target: all-time highs by end of next week. Also top-15 holder of $CARDS (up 265%), watching $GACHA protocol flywheel drive revenue into Collector Crypt.","images":["https://pbs.twimg.com/media/HJrVqUZbIAAtQGp.jpg"],"created_at":"2026-05-31T21:14:00.000Z","category":"positioning","is_thread":true},{"author":"ZeeContrarian1","tweet_url":"https://x.com/ZeeContrarian1/status/2061251549767373126","text":"Discloses 7% personal portfolio position in $STAA.","created_at":"2026-06-01T01:00:00.000Z","category":"positioning","is_thread":false},{"author":"zeroxkyle","tweet_url":"https://x.com/zeroxkyle/status/2061247613262086468","text":"HYPE + $CARDS as the most asymmetric barbell: HYPE ($16B MC) = perps will eat the world; $CARDS ($61M MC) = TCGs are a new art form. HYPE uncorrelated from BTC is a new-era signal where fundamental analysis wins. \"Strong alts uncorrelated to BTC = good signal of a new era.\"","created_at":"2026-06-01T00:45:00.000Z","category":"positioning","is_thread":false},{"author":"stevehou","tweet_url":"https://x.com/stevehou/status/2061284848371667281","text":"Directional long equity / melt-up through October. Iran conflict is the Liberation Day analog — exogenous shock absorbed, now bounce in progress. Also bullish on Tesla FSD competitive advantage vs Waymo via willingness to be aggressive (\"Mad Max\" mode). Endorses Bloomberg earnings inflection index as the right tool to capture the software name rotation.","created_at":"2026-06-01T03:12:00.000Z","category":"positioning","is_thread":true},{"author":"jimcramer","tweet_url":"https://x.com/jimcramer/status/2061190265243603433","text":"Berkshire Hathaway buying Taylor Morrison signals possible value in hated homebuilders. Cramer floats: deploying Clayton prefab homes on Taylor Morrison land could be a compelling combination.","created_at":"2026-05-31T20:57:00.000Z","category":"positioning","is_thread":false},{"author":"AndreasSteno","tweet_url":"https://x.com/AndreasSteno/status/2061124769957748799","text":"Bought a load of cybersecurity earlier in the year. A couple of the trades are up ~100%. Quiet outperformer of the thematic basket trades.","created_at":"2026-05-31T16:36:00.000Z","category":"positioning","is_thread":false},{"author":"goodalexander","tweet_url":"https://x.com/goodalexander/status/2061280737651794141","text":"A wise woman taught him not to hedge the Vision Fund — just run it vs. the Nikkei. Directional positioning implication: unhedged long on Japanese tech/venture-adjacent exposure vs Nikkei benchmark.","created_at":"2026-06-01T02:56:00.000Z","category":"positioning","is_thread":false},{"author":"thedefivillain","tweet_url":"https://x.com/thedefivillain/status/2061178430146625595","text":"$STG squeezing shorts on a low cap: STG-to-ZRO migration is one-way, making STG a permanently depegged low-float Binance Futs listing with no natural sellers. Risk: exchange delisting. $LAB at $9B FDV called a scam coin — but with potential 120x from the bottom. Advises against shorting $LAB (use strict stop loss only). Not buy recommendations; informational tracking.","images":["https://pbs.twimg.com/media/HJrGbyJWUAQq1en.jpg"],"created_at":"2026-05-31T20:10:00.000Z","category":"positioning","is_thread":false}],"links":[{"author":"spotgamma","url":"https://spotgamma.com/spx-dispersion-risk-volatility-spasm-june-catalysts/","description":"SPX Dispersion, Volatility Risk, June Catalysts — 9 weeks ATH, SpaceX IPO + FOMC + OPEX triple threat"},{"author":"laurashin","url":"https://www.youtube.com/watch?v=1XUdNpnwhBY&feature=youtu.be","description":"Bits + Bips: Steve Sosnick on ETF tourists, PCE at 3-year high, Kevin Warsh week 1, BTC at $73K vol at 9-month low, AI-bandwidth parallel"},{"author":"pboockvar","url":"https://t.co/X32oU63QLU","description":"Goehring & Rozencwajg: 'Could the Tanks Run Dry?' — tightening inventories, slowing shale growth, oil and LNG supply risks"},{"author":"Melt_Dem","url":"https://t.co/drgNl9UpsQ","description":"Verne Robotics (portco) long-form piece: Robotics as a Service — why the industrial robotics business model is broken"},{"author":"Fiskantes","url":"https://t.co/DGrg5VHgm2","description":"Disconnect between AI productivity claims on social media vs reality — 'Emperor has less clothes than imagined'"},{"author":"laurashin const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
