    card.id = 'card-' + item.id;

    var chartsHtml = '';
    if (item.charts.count > 0) {
      chartsHtml = '<div class="charts-note' + (item.charts.hot ? ' hot-chart' : '') + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }
    var linkHtml = item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '';

    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + (item.id < 10 ? '0' + item.id : item.id) + '</span>' +
        '<span class="urgency">' + urgEmoji + '</span>' +
        '<span class="source-badge" style="background:' + catColor + '">' + item.source + '</span>' +
        '<span class="cat-tag">' + item.cat + '</span>' +
        (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-box" style="border-color:' + catColor + ';background:' + catColor + '18">' +
          '<div class="angle-text">' + item.angle + '</div>' +
        '</div>' +
        '<div class="section-label">Tweets</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box tweet-a">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box tweet-b">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartsHtml +
        linkHtml +
      '</div>';

    container.appendChild(card);
  });
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) {
    if (body.className.indexOf('open') !== -1) {
      body.className = 'card-body';
    } else {
      body.className = 'card-body open';
    }
  }
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var toggle = document.getElementById('report-toggle');
  if (body.className.indexOf('open') !== -1) {
    body.className = 'report-body';
    toggle.textContent = '▶';
  } else {
    body.className = 'report-body open';
    toggle.textContent = '▼';
  }
}

function buildReport() {
  var body = document.getElementById('report-body');
  var html = '<div class="report-row"><strong>Time Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</div>';
  html += '<div class="report-row"><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</div>';
  html += '<br><div class="report-row"><strong>Included Sources:</strong></div>';
  META.includedSources.forEach(function(s) {
    var safeName = s.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += '<div class="report-row">&nbsp;&nbsp;• <span class="src-link" onclick="filterBySrc(\'' + safeName + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</div>';
  });
  html += '<br><div class="report-row"><strong>Skipped Sources:</strong></div>';
  META.skippedSources.forEach(function(s) {
    html += '<div class="report-row">&nbsp;&nbsp;• <em>' + s.name + '</em>: ' + s.reason + '</div>';
  });
  body.innerHTML = html;
}

init();
</script>
</body>
</html>
