k,' but a duration mismatch between capex now and monetization later, worsened by falling token prices.", "tweetA": "Nobody is pricing AI failure. Everyone is pricing AI arriving exactly on schedule. Slok's point: token prices are already falling, which means monetization is getting harder, not easier, right when the market needs the payoff to accelerate.", "tweetB": "The AI trade's real risk factor isn't compute demand, it's discount-rate patience. If the payoff slips from 2027 to 2029, that's not a thesis break, it's a multiple compression across every semi, power and data center name at once. Concentration is the vulnerability.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://thedarksideoftheboom.substack.com/p/apollos-slok-warns-a-slower-ai-payoff"}, {"id": 4, "cat": "ai", "urgency": "watch", "source": "ChartStorm / Callum Thomas", "title": "KOSPI down 20% off highs, Softbank down 33% — and the US semiconductor market-cap-weight chart just rolled over", "idea": "Callum Thomas's subscriber survey found 'AI Bubble Burst' as the top-voted answer to 'biggest H2 surprise.' His chart of US semiconductor market-cap weight has pulled back from record highs for a third time in two years — the first two pullbacks became bull flags, this one is unconfirmed. Global corroboration: KOSPI -20% off peak, US SOX forming a major topping pattern, Softbank -33%.", "angle": "A genuine global cross-check, not just a US phenomenon — Korea's chip-heavy index and Japan's AI-proxy conglomerate are both flashing the same signal simultaneously as the US semis chart. Third-time-is-the-charm setups are exactly where 'buy the dip' muscle memory gets punished.", "tweetA": "Two prior pullbacks in US semi market-cap weight became bull flags. This is the third. KOSPI -20%, Softbank -33%, SOX topping. When three unrelated markets roll over on the same chart shape at the same time, that's not noise, that's correlation risk showing up.", "tweetB": "Th de instead. That's a liquidity rotation story, not a Bitcoin-is-broken story.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://thenewsblock.substack.com/p/lyn-alden-on-bitcoins-price-strategys"}, {"id": 6, "cat": "science", "urgency": "watch", "source": "Binary Breakaway", "title": "GM is betting on sodium-ion batteries — a raw material so cheap it's basically table salt", "idea": "Sodium-ion batteries are emerging as a supply-chain hedge against lithium dependence, with GM among the majors exploring scaling the technology. Sodium is vastly more abundant and geographically distributed than lithium, cutting both cost and geopolitical exposure in the battery supply chain.", "angle": "The under-the-radar counter-trade to the lithium/critical-minerals narrative — if sodium-ion scales even partially, it decouples EV and grid-storage economics from the China-dominated lithium refining chokepoint everyone's been pricing in.", "tweetA": "Lithium supply chain risk has been priced into every EV and grid-storage stock for two years. GM quietly exploring sodium-ion batteries is the market's answer: sodium is everywhere, cheap, and nobody controls it geopolitically. That's a real hedge against the China chokepoint, not a marketing line.", "tweetB": "Energy storage's real constraint was never chemistry, it was geography — who controls where the inputs are. Sodium fixes the geography problem even without matching lithium's energy density. Good enough plus abundant beats great plus scarce in a supply chain fight.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://binarybreakaway.substack.com/p/raw-materials-rethought-sodium-ion"}, {"id": 7, "cat": "macro", "urgency": "deep", "source": "Neil Sethi", "title": "Existing home sales just missed by 3.4 points — inventory falling even as prices hit a new record", "idea": "June existing home sales fell -2.4% m/m vs +1.0% expected, pulling sales ginal seller turned out to be the local bottom. Positioning data is more useful than sentiment data right now.", "charts": {"count": 2, "hot": true, "desc": "🔥 BTC Percent Supply in Profit + LTH Realized Loss charts, both flashing prior-bottom shapes"}, "link": "https://blocmates.beehiiv.com/p/fud-stopped-working-4-charts-say-we-bottomed"}, {"id": 11, "cat": "positioning", "urgency": "deep", "source": "James Bulltard", "title": "SPY tested the 50-day, reclaimed it in 2 days — the 1% you'd have missed by being 'prudent' is the whole trading lesson", "idea": "SPY briefly undercut its 50-day moving average on war headlines, tested and held the 21-day, then reclaimed all key moving averages within two sessions. QQQ closed below its 50-day for two sessions before gapping back above it. Bulltard's point: stepping aside under the 50-day would have cost roughly 1% of the move (709.43 to 718.33) — but staying long under a lost 50-day risks multi-month drawdowns like January 2022's three-month QQQ washout.", "angle": "A clean, quantified example of the discipline-vs-FOMO tradeoff that's more useful than the usual vague 'stay disciplined' advice — it puts an actual number (1%) on the cost of following the rule.", "tweetA": "QQQ lost its 50-day for exactly 2 sessions, then gapped back over it. Cost of waiting for confirmation instead of guessing the bottom: about 1%. Cost of NOT waiting, if this had been January 2022 instead: a 3-month washout. That asymmetry is the entire case for mechanical rules over conviction.", "tweetB": "Markets shrugged off actual war headlines in 2 trading sessions and reclaimed every key moving average. If geopolitical escalation can't break a 50-day for more than 48 hours, that tells you more about current positioning (everyone's already hedged) than about the news being unimportant.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://www.jamesbulltard.com/p/7926-recap"}, {"id": 12, "cat": "ai", "urgency": "watch", "source": "AI Futures Project", "title": "A team that predicted AI 2027 now says superintelligence could be delayed to 2040 — if the US and China act now", "idea": "AI Futures Project's new scenario 'AI 2040: Plan A' argues superintelligence would arrive by 2030 by default, but coordinated US-China governmental action could push it to 2040 — an explicit recommendation (what should happen), not a prediction (what will happen). It's the sequel to their widely-discussed AI 2027 forecast, built as a detailed, step-by-step scenario rather than a high-level abstraction.", "angle": "The framing shift from AI 2027 (a prediction) to AI 2040: Plan A (a recommendation with an explicit if-this-then-that structure) is itself a signal — the same team that got attention for forecasting is now trying to influence policy, which says something about where they think the leverage actually is.", "tweetA": "The team behind AI 2027 just published their sequel, and the headline number moved from 2030 (default path) to 2040 (coordinated US-China intervention path). A 10-year delta is the entire policy argument in one number.", "tweetB": "AI 2027 was a prediction. AI 2040: Plan A is a lobbying document dressed as a scenario. Read the shift in genre, not just the content — forecasters who start writing recommendations think the forecast alone isn't moving anyone.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://blog.aifutures.org/p/ai-2040-plan-a"}, {"id": 13, "cat": "macro", "urgency": "watch", "source": "McKinsey & Company", "title": "McKinsey: earnings misses only move stocks when they signal a weaker outlook, not just a bad quarter", "idea": "A new McKinsey investor survey finds that consensus-estimate misses matter to markets only when they signal a genuinely weaker forward outlook, implying 'beat/miss' as a standalone metric is less predictive of stock reaction than whether the miss changes the trajectory story. Note: the email itself was a link-only teaser — full findings sit behind the linked article.", "angle": "Validates something practitioners already intuit but rarely see confirmed by a formal survey — worth pairing with actual earnings-season examples where a 'miss' got no punishment because guidance held, versus a 'beat' that got hammered because guidance softened.", "tweetA": "McKinsey's investor survey confirms what every earnings season already shows: a miss with unchanged guidance gets a shrug, a beat with softer guidance gets crushed. The number that matters was never the quarter, it was the trajectory.", "tweetB": "If misses only move stocks when they change the outlook story, then management's real skill this earnings season isn't hitting numbers, it's controlling the narrative around next quarter regardless of this quarter's print.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.mckinsey.com/capabilities/strategy-and-corporate-finance/our-insights"}, {"id": 14, "cat": "energy", "urgency": "watch", "source": "Commodity Context / Context Call", "title": "Hormuz tanker traffic still hasn't recovered — even with a 'mini-glut' forming elsewhere", "idea": "Commodity Context's monthly call flags three live threads: post-MOU shipping flows through the Strait of Hormuz still haven't normalized, China's crude import appetite remains in a prolonged depression, and a 'mini-glut' is emerging in global crude even as regional risk stays elevated.", "angle": "The coexistence of a physical shipping bottleneck (Hormuz) with a supply glut elsewhere is unusual — the crude oversupply story and the geopolitical risk premium are running in parallel rather than offsetting, exactly the kind of setup that produces sharp regional price dislocations.", "tweetA": "Hormuz traffic still hasn't recovered post-MOU, China's still on an import strike, and there's a 'mini-glut' building at the same time. Three contradictory oil signals running simultaneously is how you get a violent repricing in either direction the moment one of them resolves.", "tweetB": "A supply glut and a shipping-chokepoint risk premium aren't supposed to coexist for long. When they do, it means the market hasn't decided which regime it's in — and whichever resolves first will whipsaw the other.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening (70-min video)"}, "link": "https://www.commoditycontext.com/p/context-call-july-2026"}, {"id": 15, "cat": "crypto", "urgency": "deep", "source": "Chamath / Social Capital", "title": "Privacy tokens got delisted 73 times in 2025 and still returned 127.3% — the best performing sector in crypto", "idea": "Chamath's deep dive: every crypto category lost value over the past year except privacy tokens, which climbed 127.3% even as 73 exchange delistings hit the sector in 2025. His thesis: Bitcoin's public ledger breaks fungibility (tainted coins trade at a discount, wallets become permanently traceable once linked to an identity), and zero-knowledge proofs fix this by letting the network verify a payment without seeing it.", "angle": "Regulatory hostility (73 delistings) and price performance (+127.3%) moving in completely opposite directions in the same sector is a genuine anomaly — the market is pricing eventual regulatory acceptance faster than regulators are actually delivering it.", "tweetA": "73 delistings and +127.3% returns, same sector, same year. That's not a market ignoring regulatory risk — that's a market betting current hostility is the last gasp before acceptance, not the start of a crackdown. That bet has historically been right for crypto more often than wrong.", "tweetB": "Bitcoin's biggest weakness was never scalability, it was fungibility — a coin's history now permanently affects its value the moment a wallet gets deanonymized. Privacy tech is fixing the actual monetary property Bitcoin never had. That's why capital rotated there while everything else was down.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://chamath.substack.com/p/privacy-tokens"}, {"id": 16, "cat": "regulation", "urgency": "deep", "source": "Transformer News", "title": "The 2008 credit rating agencies are the exact blueprint for how AI safety auditing will fail", "idea": "A proposal to separate AI safety verification from politics (independent verification orgs certified by government) has a direct historical precedent: credit rating agencies, paid by the banks they rated, certified toxic mortgage packages as AAA because refusing meant losing market share to a more compliant competitor. Penalties never arrived fast or large enough to change behavior — FTX's own accountants were fined just $745,000. The predictable outcome: AI developers will shop for the most lenient 'Independent Verification Organization' the same way banks shopped for lenient rating agencies.", "angle": "A sharp, underused historical parallel — most AI safety commentary focuses on capability risk, not institutional design failure modes we've already lived through with credit rating agencies. Worth using as a framework for evaluating any future 'independent AI auditor' proposal.", "tweetA": "AI safety auditors, paid by the labs they audit, certified by a government license they don't want to lose. That's the exact incentive structure that gave us AAA-rated subprime mortgage bonds in 2007. We've run this experiment before and we know how it ends.", "tweetB": "FTX's accountants got fined $745,000 for missing a multi-billion dollar fraud. If that's the going rate for auditor failure, no 'Independent Verification Organization' for AI models is going to risk its revenue stream to flag a lab's safety gaps either.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.transformernews.ai/p/dont-let-independent-ai-audits-provide-false-safety"}, {"id": 17, "cat": "ai", "urgency": "deep", "source": "Pragmatic Engineer / The Pulse", "title": "90% of Cursor's AI spend is reading your codebase, not writing new code — and caching cuts that 10x", "idea": "Cursor's two-year usage data shows 90% of token usage is input tokens (reading code and docs), not output. Without context caching, token cost would be 10x higher; with caching, output tokens shrink to just 0.6% of total spend, cache reads eat 90%, cache writes 2.5%. Input-token pricing dominates the real cost structure of AI coding despite output tokens being priced 5x higher per-token (Opus 4.7: $5/M input vs $25/M output).", "angle": "Quietly reframes the AI infra cost debate — everyone talks about inference cost per output token, but for agentic coding tools the real cost lever is context caching efficiency, not model choice. Direct implications for which AI infra vendors actually capture margin.", "tweetA": "Cursor's own data: 90% of their AI spend is input tokens, and caching alone is a 10x cost lever, bigger than any model swap. Everyone's optimizing the model bill. The actual moat is the caching layer, and almost nobody rolling their own agent harness builds for that.", "tweetB": "Opus 4.7 costs 5x more per output token than input token. Doesn't matter, 90%+ of the bill is input anyway. If you're benchmarking AI coding costs by output-token price, you're optimizing the wrong 10% of the spend.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://newsletter.pragmaticengineer.com/p/the-pulse-interesting-ai-coding-stats"}, {"id": 18, "cat": "ai", "urgency": "deep", "source": "Pragmatic Engineer / The Pulse", "title": "The top 1% of Cursor users generate as much code weekly as 45 median developers combined", "idea": "Median Cursor user generates ~700 lines/week; the 90th percentile hits ~9,000; the top 1% generates 30-40K lines/week, equivalent to ~45 median devs' output. Meanwhile Opus 4.7 is ~10x more expensive per agent request than Cursor's own Composer 2.5 model, but on a cost-per-accepted-line basis (the more honest metric) it's only about 2x as expensive as GPT-5.5.", "angle": "The 45x power-law gap between median and top-1% Cursor users is starker than any pre-AI developer productivity distribution — worth flagging as a labor-market observation as much as a tech one: AI is concentrating output among a small cohort, not democratizing coding evenly.", "tweetA": "Median Cursor user: 700 lines/week. Top 1%: 30-40K lines/week. That's a 45x gap, wider than any pre-AI productivity distribution among developers I've seen data on. AI isn't flattening the skill curve, it's steepening it.", "tweetB": "Cursor's data quietly kills the 'expensive model = expensive results' framing: Opus 4.7 costs 10x more per request than Composer, but only ~2x more per accepted line. The real efficiency metric is cost-per-outcome, and by that measure the 'cheap model' marketing is weaker than vendors want you to believe.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://newsletter.pragmaticengineer.com/p/the-pulse-interesting-ai-coding-stats"}, {"id": 19, "cat": "geopolitics", "urgency": "act", "source": "Michael Parekh / AI Rambling Daily", "title": "US lawmakers are quietly building a case to ban Chinese AI models — while Anthropic lobbies for exactly that", "idea": "A bipartisan House effort is exploring slowing or banning US company use of Chinese open- and closed-source AI models. Michael Parekh's read: this is regulatory capture dressed as national security — it protects the price umbrella Anthropic and OpenAI benefit from just as model prices are climbing, and Dario Amodei has argued open-source models are 'insecure' despite the internet and PC stack running on 80%+ open-source software.", "angle": "The self-interest angle is underplayed elsewhere — the labs pushing hardest for restrictions on foreign open models are the same labs whose pricing power depends on those models not being available as a substitute.", "tweetA": "Anthropic argues open-source AI models are insecure. The internet, the PC and most enterprise software run on 80%+ open-source code. The 'security' argument conveniently also removes Anthropic's cheapest competitors from the US market. Follow the pricing power, not the safety language.", "tweetB": "Four years after ChatGPT, and the loudest AI safety voices in DC are now the incumbent labs asking for tariffs on their own competition. Not a new pattern in tech regulation, but rarely this explicit this early in a technology's life cycle.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://michaelparekh.substack.com/p/us-and-china-at-cross-purposes-on"}, {"id": 20, "cat": "geopolitics", "urgency": "act", "source": "Michael Parekh / AI Rambling Daily", "title": "China is about to let Alibaba, ByteDance and DeepSeek buy Nvidia H200s — while restricting who outside China can use its own models", "idea": "China is reportedly weighing curbs on overseas access to its top AI models (open or closed) at the same time it's preparing to permit limited Nvidia H200 purchases by its own top AI firms, who've been pushed toward Huawei chips but still want Nvidia despite the chips being regulatorily 'nerfed.' This tit-for-tat sits ahead of a second Xi-Trump meeting in September.", "angle": "Both sides are simultaneously restricting exports of their own AI capability and seeking imports of the other's hardware, a mutual-hostage dynamic that makes any near-term 'grand deal' fragile, echoing the on-again-off-again US-Iran ceasefire pattern.", "tweetA": "China: restricting foreigners from using Chinese AI models, while asking to buy more Nvidia chips. The US: restricting Nvidia sales to China, while its own labs lobby to restrict Chinese model access domestically. Both sides hoarding and gatekeeping at once, ahead of September's Xi-Trump meeting.", "tweetB": "Watch the H200 approval, not the rhetoric. If China actually lets Alibaba, ByteDance and DeepSeek buy meaningful H200 volume, that's the real signal a deal is coming in September. If it stays 'limited' and symbolic, expect this to go the way of the US-Iran ceasefire: announced, walked back, re-announced.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://michaelparekh.substack.com/p/us-and-china-at-cross-purposes-on"}, {"id": 21, "cat": "geopolitics", "urgency": "watch", "source": "Michael Parekh / AI Rambling Daily", "title": "Apple is sourcing memory chips from China's CXMT to dodge the 'RAMageddon' squeeze — but only for China-bound iPhones", "idea": "Apple is reportedly tapping Chinese memory supplier CXMT for China-bound iPhone production, relieving pressure from the global memory-chip shortage and rising prices, even though it only helps the China-market supply chain, not the global one, which still depends on the SK Hynix/Samsung/Micron oligopoly.", "angle": "A narrow but telling crack in the 'decouple from China' narrative — even Apple, the poster child of derisking manufacturing away from China, is going deeper into Chinese chip supply to solve a real global shortage, because the alternative (relying solely on the memory oligopoly) is worse right now.", "tweetA": "Apple sourcing memory from China's CXMT isn't a decoupling story, it's the opposite — Apple choosing a Chinese chip supplier over paying oligopoly prices to Samsung, SK Hynix and Micron. The RAMageddon shortage is forcing exactly the kind of China dependency everyone said was ending.", "tweetB": "The memory shortage is bad enough that even geopolitically cautious Apple will eat the optics of buying Chinese chips. That tells you more about how tight DRAM/NAND supply actually is than any analyst estimate does.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://michaelparekh.substack.com/p/us-and-china-at-cross-purposes-on"}, {"id": 22, "cat": "culture", "urgency": "deep", "source": "Peter Frankopan / Global Threads", "title": "Brazilians are blaming Martin Luther for their World Cup exit", "idea": "A viral explanation for Brazil's 2026 World Cup exit blames the rise of evangelical Protestantism, said to be displacing the 'joyful, carefree' football culture of Pelé, Garrincha and Ronaldinho, for a more disciplined, less expressive national team. Frankopan traces this back to Martin Luther and the Reformation, noting Luther has a long history of being co-opted by nationalist movements (19th-century Prussia, the Nazis) far removed from his original theological arguments.", "angle": "A useful case study in how cultural and religious demographic shifts (evangelical growth across Latin America, which has real second-order effects on politics, fertility and consumer behavior in the region) get folklorized into sports narratives — a live example of how fast a demographic trend becomes a cultural explanation-for-everything.", "tweetA": "Evangelical Christianity has grown faster in Latin America over the past 40 years than almost any demographic shift outside Africa, and it's already reshaping politics there. Blaming it for a World Cup exit is absurd on its face, but the underlying trend, religious demographic shift driving cultural and political realignment across a continent, is very real and very under-covered.", "tweetB": "Martin Luther has been recruited as a nationalist icon by 19th-century Prussia, by the Nazis, and now, completely unseriously, by Brazilian football fans explaining a World Cup exit. Same pattern every time: attach a 500-year-old religious reformer to whatever your present anxiety actually is.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://peterfrankopan.substack.com/p/why-brazil-lost-the-world-cup-500"}, {"id": 23, "cat": "macro", "urgency": "act", "source": "The Dark Side of the Boom / Simon White", "title": "10-year yield pushing back toward 4.60% and tech is finally getting repriced for duration risk", "idea": "As yields rise (10yr near 4.60%, oil adding pressure to the rates complex), the equity market is repricing long-duration AI/tech cash flows against shorter-duration financials and healthcare. Semis aren't broken, but 'the air is coming out of the most stretched parts of the AI trade' as the market starts demanding visible cash flow instead of distant promises.", "angle": "Directly connects to the Slok item and the AI-cyclical item elsewhere in this window — three separate sources converging on the same yield-driven AI-duration-risk thesis on the same day is itself the signal worth flagging as a cluster, not three isolated notes.", "tweetA": "10yr pushing 4.60% and suddenly 'long duration' isn't just a bond term, it's the whole AI trade's problem. Tech's value sits in cash flows years out. When the discount rate moves, the furthest-out promises get hit hardest, that's just math, but it's math the market ignored for two years.", "tweetB": "Financials and healthcare leading today isn't a rotation into 'boring' stocks, it's a rotation into visible cash flow. If oil keeps pushing yields higher, watch which AI names have current-quarter monetization versus which are still selling a 2028 story, that's the split that matters now.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://thedarksideoftheboom.substack.com/p/rising-yields-force-stocks-to-rediscover"}, {"id": 24, "cat": "positioning", "urgency": "act", "source": "Bespoke Investment Group", "title": "The 22 stocks that more than doubled in H1 are down 16.3% in the first week of H2 — while H1's worst 29 stocks are up 5.3%", "idea": "Bespoke's Trend Analyzer: Technology is the worst-performing S&P sector in the first 5 trading days of H2, down 4.8%. The 22 S&P 500 stocks that more than doubled in H1 are down an average 16.3% so far in H2 (20 of 22 red); the 6 stocks that gained 250%+ in H1 are down an average 18.3%. Meanwhile the 29 stocks that fell 20%+ in H1 are up an average 5.3% in H2 (26 of 29 green), and the 6 stocks that got cut in half in H1 have all bounced at least 3%.", "angle": "A textbook, quantified example of year-end-style portfolio rebalancing happening at mid-year instead, institutional flows mechanically selling winners and buying losers regardless of fundamentals. A reason not to overread July's 'rotation' as a fundamental repricing.", "tweetA": "H1's 22 biggest winners are down 16.3% in H2's first week. H1's worst 29 losers are up 5.3%. That's not a fundamental reassessment happening in 5 trading days, that's mechanical rebalancing, ETFs and large funds trimming winners and adding losers on a calendar, not a thesis change.", "tweetB": "If you're reading July's tech underperformance as 'the AI trade is cracking,' Bespoke's data says slow down, this looks exactly like index rebalancing flows, the same pattern you'd see at any year-end, just compressed into the first week of H2. Don't confuse flow-driven rotation with a change in the story.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://bespokeinvest.substack.com/p/selling-winners-buying-losers"}, {"id": 25, "cat": "crypto", "urgency": "deep", "source": "dgt10011", "title": "Solana's founder came from Qualcomm's GPU world — and Solana's core architecture is basically CUDA exported into a blockchain", "idea": "The essay draws a detailed parallel between Nvidia's rise (won not on hardware but on CUDA's software thesis — Stephen Witt's book attributes only 2.5x of Nvidia's speed-up to transistors, ~400x to software) and Solana's Sealevel parallel-execution engine, arguing founder Toly's GPU background produced the same 'parallelism as the core primitive' bet Nvidia made. Also notes Nvidia's own chief scientist rejected Geoffrey Hinton's 2009 request for a free GPU for machine learning research, AI wasn't even a use case Nvidia had planned for.", "angle": "The framing that 'durable edge lives in an ever-expanding mathematical toolbox, not the hardware' is a good lens for evaluating any infrastructure bet. The CUDA-tax analogy (gamers funding chip R&D that later enabled AI) maps onto crypto's 'niche fandom funds infrastructure that later finds its real use case' pattern.", "tweetA": "Nvidia's chief scientist rejected Geoffrey Hinton's request for a free GPU for machine learning in 2009, AI wasn't a planned use case. The most valuable use case for a general-purpose technology is almost never the one its creators originally priced in. Worth remembering for every 'what is this blockchain actually for' argument happening right now.", "tweetB": "The CUDA tax: gamers paid higher GPU prices so Nvidia could fund the R&D that later became AI infrastructure. Solana's meme and trading fandom is doing the same thing for parallel-execution blockchain tech. Niche, unserious-looking demand is how general-purpose infrastructure always gets funded first.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://dgt10011.substack.com/p/before-the-breakthrough"}];
const META = {"date": "2026-07-09", "time": "21:05 CEST", "windowStart": "2026-07-09 15:05 CEST", "windowEnd": "2026-07-09 21:05 CEST", "emailsInWindow": 23, "emailsRead": 22, "itemsExtracted": 25, "includedSources": [{"name": "The Dark Side of the Boom", "count": 4}, {"name": "Michael Parekh / AI Rambling Daily", "count": 3}, {"name": "Pragmatic Engineer / The Pulse", "count": 2}, {"name": "Commodity Context", "count": 2}, {"name": "Unchained Premium", "count": 1}, {"name": "ChartStorm / Callum Thomas", "count": 1}, {"name": "The News Block / Coin Stories (Lyn Alden)", "count": 1}, {"name": "Binary Breakaway", "count": 1}, {"name": "Neil Sethi", "count": 1}, {"name": "AI Street / Matt Robinson", "count": 1}, {"name": "Blocmates", "count": 1}, {"name": "James Bulltard", "count": 1}, {"name": "AI Futures Project", "count": 1}, {"name": "McKinsey & Company", "count": 1}, {"name": "Chamath / Social Capital", "count": 1}, {"name": "Transformer News", "count": 1}, {"name": "Peter Frankopan / Global Threads", "count": 1}, {"name": "Bespoke Investment Group", "count": 1}, {"name": "dgt10011", "count": 1}], "skippedSources": [{"name": "ARK Invest / How Could ARK's DIET ETFs Fit Into Your Portfolio?", "reason": "Pure promotional ETF marketing email — zero analytical content, just a sales pitch for ARK's DIET ETFs."}]};
const CATS = {"macro": {"label": "macro", "color": "#e24b4a"}, "credit": {"label": "credit", "color": "#378add"}, "positioning": {"label": "positioning", "color": "#ef9f27"}, "ai": {"label": "AI/infra", "color": "#1d9e75"}, "crypto": {"label": "crypto", "color": "#7f77dd"}, "geopolitics": {"label": "geopolitics", "color": "#d85a30"}, "energy": {"label": "energy", "color": "#f97316"}, "tech": {"label": "tech", "color": "#06b6d4"}, "gold": {"label": "gold", "color": "#d4a017"}, "culture": {"label": "culture", "color": "#ec4899"}, "labor": {"label": "labor", "color": "#8b5cf6"}, "regulation": {"label": "regulation", "color": "#64748b"}, "science": {"label": "science", "color": "#14b8a6"}, "venture": {"label": "venture", "color": "#84cc16"}};
const URGENCY = {"act": {"emoji": "🔴", "label": "Act Now"}, "deep": {"emoji": "🔵", "label": "Deep"}, "watch": {"emoji": "🟡", "label": "Watch"}};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(c) { return CATS[c] ? CATS[c].color : "#888"; }
function catLabel(c) { return CATS[c] ? CATS[c].label : c; }

function renderHeader() {
  document.getElementById('headerSub').textContent =
    META.date + " · " + META.time + " · " + ITEMS.length + " items from " + META.includedSources.length + " sources";
}

function renderFilters() {
  const catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catKeys = Object.keys(CATS).filter(function(k) { return catCounts[k]; });

  const catBar = document.getElementById('catFilters');
  let html = '<button class="pill' + (activeCat === 'all' ? ' active' : '') + '" style="' + (activeCat === 'all' ? 'background:#333;' : '') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  catKeys.forEach(function(k) {
    const active = activeCat === k;
    const style = active ? ('background:' + catColor(k) + ';border-color:' + catColor(k) + ';') : '';
    html += '<button class="pill' + (active ? ' active' : '') + '" style="' + style + '" onclick="setCat(\'' + k + '\')">' + catLabel(k) + ' (' + catCounts[k] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgBar = document.getElementById('urgFilters');
  let uhtml = '<button class="pill' + (activeUrg === 'all' ? ' active' : '') + '" style="' + (activeUrg === 'all' ? 'background:#333;' : '') + '" onclick="setUrg(\'all\')">All</button>';
  ['act','deep','watch'].forEach(function(u) {
    if (!urgCounts[u]) return;
    const active = activeUrg === u;
    const style = active ? 'background:#333;border-color:#333;' : '';
    uhtml += '<button class="pill' + (active ? ' active' : '') + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + URGENCY[u].emoji + ' ' + URGENCY[u].label + ' (' + urgCounts[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c) { activeCat = c; activeSrc = null; renderFilters(); renderCards(); }
function setUrg(u) { activeUrg = u; activeSrc = null; renderFilters(); renderCards(); }

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards(true);
}

function renderCards(expandMatched) {
  const container = document.getElementById('cards');
  let visible = ITEMS.filter(function(i) {
    if (activeCat !== 'all' && i.cat !== activeCat) return false;
    if (activeUrg !== 'all' && i.urgency !== activeUrg) return false;
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    return true;
  });

  if (visible.length === 0) {
    container.innerHTML = '<div class="empty-msg">No items match this filter.</div>';
    return;
  }

  let html = '';
  visible.forEach(function(item) {
    const openClass = (expandMatched && activeSrc) ? ' open' : '';
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += '<div class="card' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span>' + URGENCY[item.urgency].emoji + '</span>';
    html += '<span class="badge" style="background:' + catColor(item.cat) + '">' + item.source + '</span>';
    html += '<span class="tag">' + catLabel(item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chevron">▸</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left:2px solid ' + catColor(item.cat) + ';background:' + catColor(item.cat) + '14;">' + item.angle + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="section-label">Charts</div>';
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.desc || 'No chart in email — article may contain one.') + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank" rel="noopener">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderReport() {
  let html = '<div class="report-grid">';
  html += '<div><div class="section-label">Window</div>';
  html += '<div>' + META.windowStart + ' → ' + META.windowEnd + '</div>';
  html += '<div style="margin-top:6px;color:var(--text-dim);">' + META.emailsRead + ' of ' + META.emailsInWindow + ' emails read · ' + META.itemsExtracted + ' items extracted</div>';
  html += '<div class="section-label">Included Sources</div>';
  META.includedSources.forEach(function(s) {
    html += '<div class="src-line" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')"><span class="src-name">' + s.name + '</span><span>' + s.count + '</span></div>';
  });
  html += '</div>';
  html += '<div><div class="section-label">Skipped Sources</div>';
  if (META.skippedSources.length === 0) {
    html += '<div style="color:var(--text-dim);">None — every email in the window had extractable content.</div>';
  }
  META.skippedSources.forEach(function(s) {
    html += '<div class="skip-line"><b>' + s.name + '</b><br>' + s.reason + '</div>';
  });
  html += '</div></div>';
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('reportToggle').addEventListener('click', function() {
  document.getElementById('reportCard').classList.toggle('open');
});

renderHeader();
renderFilters();
renderCards();
renderReport();
</script>
