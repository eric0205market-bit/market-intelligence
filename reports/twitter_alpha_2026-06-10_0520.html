<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"date": "2026-06-10 05:20 UTC", "summary": "**Claude Fable 5** launched and dominated the feed \u2014 Karpathy calls it a major version bump comparable to Claude 4.5, noting Jevons paradox as demand for software scales with capability. Field reactions are split: 0xQuit, ASvanevik, and cryptopunk7213 report security queries auto-fallback to Opus 4.8, making the headline 78% cybersecurity benchmark practically irrelevant; cryptopunk7213 also hit token limits in under 2 hours.\n\n**AI regulation** is crystallizing as the next big fight: ASvanevik predicts US hyperscalers will be blocked from running Chinese models within 12 months, calling Fable the canary in the coal mine and its restrictions 'labeled as safety but really regulatory capture.' Dylan Patel published granular DeepSeek V4 inference data \u2014 100x performance improvement in 26 days across GB200, Huawei 950DT, and AMD MI355X.\n\n**SpaceX $SPCX IPO** trades Friday: Gene Munster flags geopolitical near-term headwind but maintains a long-term nation-state-tier thesis. DonAlt expresses Burry-like discomfort with the broader IPO wave while conceding indexes are 'up only forever.'\n\n**Commodities**: All-In Liquidity featured Dan Dreyfus arguing copper is the next AI bottleneck \u2014 the next 18 years need as much copper as the last 10,000 years combined. Dollar debasement ($140T in debt), China critical mineral supply cuts, and a dying US grid support the commodity supercycle thesis.\n\n**Crypto regulation**: 60+ founders signed a Clarity Act Senate letter pushing for BRCA developer protections (Chervinsky: 'there is no clarity without the BRCA'). Dan Tapiero argues today's 99% USD stablecoin dominance won't hold in 5 years as Euro, yen, and other currency stables emerge globally.", "events": [{"title": "Claude Fable 5 Launch \u2014 Practitioner Reactions", "category": "ai", "description": "Multiple practitioners share first impressions. Strong capability praise conflicts with heavy usage restrictions and alarming token costs.", "items": [{"author": "karpathy", "tweet_url": "https://x.com/karpathy/status/2064409694761054332", "text": "Enthusiastic endorsement: calls it a major version bump on par with Claude 4.5 in November. The model 'gets it' and executes ambitious long-horizon tasks without hand-holding. Jevons paradox is kicking in \u2014 his own demand for software has grown substantially as it becomes easier to produce. You can now ask for anything: explainers, visualizers, dashboards, bespoke single-use apps, 10x test suites, giant research projects. Main friction: model quirks and overly trigger-happy safety settings at launch, 'which can hopefully be tuned over time.'", "created_at": "2026-06-09T18:10:00.000Z", "is_thread": false, "images": []}, {"author": "ASvanevik", "tweet_url": "https://x.com/ASvanevik/status/2064542855096594607", "text": "Mixed first impression \u2014 'engineermaxxed.' Clearly optimized for coding to the point where it 'feels autistic on other things.' Strategy, reasoning, and writing responses are overcomplicated and miss the forest for the trees. Biggest gap: nerfed for security use cases. Also flags: Fable does NOT support Zero Data Retention, with 'safety' cited as the reason \u2014 'and so it begins.'", "created_at": "2026-06-10T02:59:08.000Z", "is_thread": false, "images": []}, {"author": "cryptopunk7213", "tweet_url": "https://x.com/cryptopunk7213/status/2064543833442902100", "text": "First 10 hours: BURNS through tokens \u2014 hit limit in under 2 hours, paid for more. Exceptional world simulator; builds game engines and visually stunning graphics unlike prior models. Creative writing is amazing. But: restrictions block basic science research and it won't even analyze Anthropic's own Fable system card due to 'cybersecurity' flagging. Basic math defaults to Opus 4.8. Less sycophantic than Opus. Has huge potential but restrictions need loosening urgently.", "created_at": "2026-06-10T03:03:01.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKa7Qc7WgAAbE2b.jpg", "https://pbs.twimg.com/media/HKa7q9DXgAAGA3Y.jpg"]}, {"author": "0xQuit", "tweet_url": "https://x.com/0xQuit/status/2064396759452016879", "text": "Fable 5 scores 78% on cybersecurity benchmarks vs 40% Opus and 34% GPT \u2014 but this benchmark is useless because any security query auto-falls back to Opus 4.8. First prompt triggered immediate fallback. For security work specifically: 'completely unusable in its current state, every query falls back to Opus.' Includes screenshot of the fallback on first attempt.", "created_at": "2026-06-09T17:18:36.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKY1TFWaUAA0MWh.jpg", "https://pbs.twimg.com/media/HKZHgd2bQAEmsTW.png"]}, {"author": "hooeem", "tweet_url": "https://x.com/hooeem/status/2064473060661514708", "text": "Long satirical thread set in August 2026: a middle-class person automates their life with Fable 5, receives an $86,700 token bill, and has bailiffs arrive in Dario Amodei's name. Core thesis: the real permanent underclass is not defined by job displacement but by the inability to afford frontier AI. The wealthy will use these tools to compound existing advantages while regular users are priced out. Also separately: Mythos burns 2x tokens versus Opus 4.8 despite only 16% capability improvement.", "created_at": "2026-06-09T22:21:48.000Z", "is_thread": true, "images": []}, {"author": "cobie", "tweet_url": "https://x.com/cobie/status/2064488328213229627", "text": "Tongue-in-cheek on Fable token costs: 'I just spent $30,000 in tokens asking Mythos for recipe ideas.' Also notes having access to the 'untamed version with Glasswing harness' \u2014 referencing a less-restricted enterprise or research tier of Mythos.", "created_at": "2026-06-09T23:22:28.000Z", "is_thread": false, "images": []}, {"author": "marcvanderchijs", "tweet_url": "https://x.com/marcvanderchijs/status/2064514843315671112", "text": "In Hong Kong: both Claude and ChatGPT are voluntarily self-blocked by Anthropic and OpenAI respectively \u2014 this is NOT HK government blocking. Grok still works. Had to roam on Singapore mobile data as workaround. Signals increasing geographic service fragmentation driven by US companies' own decisions, not host-country regulation.", "created_at": "2026-06-10T01:07:50.000Z", "is_thread": false, "images": []}]}, {"title": "AI Regulation \u2014 Chinese Model Decoupling Accelerates", "category": "regulation", "description": "Predictions and data on the accelerating US-China AI infrastructure split.", "items": [{"author": "ASvanevik", "tweet_url": "https://x.com/ASvanevik/status/2064559931026780514", "text": "Firm prediction: US hyperscalers, neoclouds, and inference providers will be blocked from running Chinese AI models within 12 months. 'This will be obvious in hindsight.' Fable 5's restrictions are the canary in the coal mine \u2014 will be framed as safety but is regulatory capture by US incumbents. 'It'll be labeled as safety. But it's just regulatory capture.'", "created_at": "2026-06-10T04:06:59.000Z", "is_thread": true, "images": []}, {"author": "dylan522p", "tweet_url": "https://x.com/dylan522p/status/2064418397270757385", "text": "DeepSeek V4 1.6T inference analysis across 44 days: Day 0 benchmarks on GB200 NVL72 Blackwell, AMD MI355X, and Huawei 950DT. Tracked 100x performance improvement in 26 days. Includes cost-per-million-token breakdown and detailed Huawei inference trace analysis. Data from InferenceX, which has tracked all major models and chips daily for 9 months. Link to full SemiAnalysis report in replies.", "created_at": "2026-06-09T18:44:35.000Z", "is_thread": true, "images": []}, {"author": "dylan522p", "tweet_url": "https://x.com/dylan522p/status/2064389698186002531", "text": "Image illustrating what EU AI regulations are doing to the sector \u2014 visual commentary on regulatory drag and European AI competitiveness.", "created_at": "2026-06-09T16:50:33.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYvfRHbQAAisY8.jpg"]}]}, {"title": "SpaceX $SPCX IPO \u2014 Geopolitics vs Long-Term Thesis", "category": "positioning", "description": "Near-term geopolitical headwinds ahead of Friday's listing vs. the multi-year bull case.", "items": [{"author": "munster_gene", "tweet_url": "https://x.com/munster_gene/status/2064439047305535976", "text": "Cautions that geopolitical factors could be a headwind for Friday's SPCX trading \u2014 'be prepared for that possibility.' Long-term thesis unchanged: SpaceX has potential to be a geopolitical player on par with a nation state, making it uniquely valuable but also uniquely exposed to political risk beyond what typical tech IPOs carry.", "created_at": "2026-06-09T20:06:38.000Z", "is_thread": false, "images": []}, {"author": "pboockvar", "tweet_url": "https://x.com/pboockvar/status/2064469350791127333", "text": "Flagged a bull/bear SPCX debate: Dan Ives (Wedbush, bull), Nicolas Owens (Morningstar, bear), Larry McDonald (BearTraps, wider market impact), hosted by Morgan Brennan at CNBC. Timestamped video breakdown covers IPO framing, valuation, and systemic market impact.", "created_at": "2026-06-09T22:07:03.000Z", "is_thread": false, "images": []}, {"author": "DonAlt", "tweet_url": "https://x.com/DonAlt/status/2064505712374640765", "text": "In response to Burry's bearish positioning: 'When did this end up well? Like every time in recorded history.' Then concedes: 'I'm probably in the same boat \u2014 feels uncomfortable with all the IPOs coming. Just thought it was funny given indexes are up only forever.' Captures the tension between historical patterns and current market momentum.", "created_at": "2026-06-10T00:31:33.000Z", "is_thread": true, "images": []}]}, {"title": "Crypto Clarity Act \u2014 60+ Founders Push Senate on BRCA", "category": "regulation", "description": "Industry mobilizes on developer protections in the pending Senate crypto bill.", "items": [{"author": "jchervinsky", "tweet_url": "https://x.com/jchervinsky/status/2064451963404620127", "text": "60+ crypto founders and CEOs signed a letter urging the Senate to pass the Clarity Act with strong developer protections. Key demand: the Banking Committee's bipartisan Blockchain Regulatory Certainty Act (BRCA) must be included. 'There is no clarity without the BRCA.' Letter and four pages of signatories attached.", "created_at": "2026-06-09T20:57:58.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKZn2JxXYAAuS5y.jpg", "https://pbs.twimg.com/media/HKZn24PXgAACXKL.jpg", "https://pbs.twimg.com/media/HKZn3hwXEAA_Lbj.jpg", "https://pbs.twimg.com/media/HKZn4OGWwAIrLe5.jpg"]}]}], "insights": [{"author": "theallinpod", "tweet_url": "https://x.com/theallinpod/status/2064550951982109158", "text": "All-In Liquidity \u2014 Dan Dreyfus on critical minerals: America's 'capital light era' is over, rapid supply/demand shocks are here. The next 18 years will need as much copper as the last 10,000 years combined, driven by AI infrastructure and electrification. China is actively cutting off US access to critical minerals. Dollar debasement ($140T in global debt) makes hard assets the winner. The US grid is dying \u2014 blackouts, infrastructure bottlenecks, and a craft labor crisis are converging. Full investment roadmap for the commodity supercycle.", "created_at": "2026-06-10T03:31:19.000Z", "is_thread": false, "images": [], "category": "macro"}, {"author": "Matt_Hougan", "tweet_url": "https://x.com/Matt_Hougan/status/2064428428498203007", "text": "9 of the 50 most valuable private companies globally are financial services firms: Stripe, Tether, Revolut, Binance, Ramp, Citadel Securities, Kalshi, Ripple, Polymarket. The breadth \u2014 payments, crypto exchanges, prediction markets, market-making \u2014 signals that financial disruption is systemic, not narrow. 'Real disruption coming for finance.'", "created_at": "2026-06-09T19:24:27.000Z", "is_thread": false, "images": [], "category": "macro"}, {"author": "Zeneca", "tweet_url": "https://x.com/Zeneca/status/2064477685452284110", "text": "Long personal essay on dopamine overload and cognitive fragmentation: infinite AI vibe-coding sessions, social media scrolling, Netflix/YouTube switching, TCG pack ripping, gacha pulls, and meme coin trading are collectively destroying memory, focus, and sustained attention. Talks to friends and confirms it is widespread among terminally online people. Took a tech detox Monday \u2014 physical book, puzzle, walk, pen and paper \u2014 and found it 'extremely comforting.' Warning: feels like 'steamrolling to early dementia.' Urges mindfulness about the infinite dopamine machine.", "created_at": "2026-06-09T22:40:11.000Z", "is_thread": false, "images": [], "category": "society"}, {"author": "Bluntz_Capital", "tweet_url": "https://x.com/Bluntz_Capital/status/2064491811570364445", "text": "One Piece TCG grail cards have gone 'absolutely mental' in the past week \u2014 especially mid-tier $2-5k cards. Catalyst identified: a Collector Crypt Discord gacha announcement posted one week ago. Key supply/demand dynamic: PSA pop counts for the best One Piece hits are only 500-2,000 MAX, with just 3-6 cards listing on eBay per week. Compare to Pokemon where top modern cards have 20,000+ pop counts. Diet Serial Luffys were at ~$2.3k in April; now much higher. Believes gacha demand \u2014 not organic collector interest \u2014 is the current repricing driver. Skeptical of pre-OPTCG card narratives ('forced').", "created_at": "2026-06-09T23:36:18.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKaMQHHacAA9SUm.png", "https://pbs.twimg.com/media/HKaV9uObIAASHTU.png"], "category": "positioning"}, {"author": "ASvanevik", "tweet_url": "https://x.com/ASvanevik/status/2064561625596928502", "text": "Key paradox for the AI era: building is 10x easier, which makes effective marketing 10x harder. When everyone can build, the act of building is no longer the differentiator \u2014 distribution, brand, and customer relationships become the actual moat. 'If it's easy for everyone, it's arguably harder than ever.' Still encourages building anyway but warns it won't be easy.", "created_at": "2026-06-10T04:13:43.000Z", "is_thread": true, "images": [], "category": "ai"}, {"author": "buccocapital", "tweet_url": "https://x.com/buccocapital/status/2064452804920418357", "text": "Pushing back against AI-generated slop in professional work: now annotates document sections with 'AI. Bad. Redo.' Advocates making people feel ashamed to deliver AI-slop outputs \u2014 implies AI is being used to cut analytical corners in document-heavy professional contexts rather than genuinely enhance output quality.", "created_at": "2026-06-09T21:01:19.000Z", "is_thread": false, "images": [], "category": "ai"}, {"author": "punk6529", "tweet_url": "https://x.com/punk6529/status/2064399218731544840", "text": "Amplifying a critical DeFi security warning: a billion-dollar protocol secured its multisig with all private keys on a single internet-connected device. Key point: regardless of how many signers a multisig has, if all keys exist on one hot device it IS a hot wallet. Reminder that multisig structure does not substitute for key management hygiene \u2014 and that a billion-dollar protocol apparently made this mistake.", "created_at": "2026-06-09T17:28:23.000Z", "is_thread": false, "images": [], "category": "crypto"}, {"author": "punk6529", "tweet_url": "https://x.com/punk6529/status/2064465270899442114", "text": "The Memes NFT project turns 4 years old. Now 4th in market cap behind CryptoPunks, BAYC, and Pengus. Weekly support for public domain art, science, and infrastructure for a decentralized network state. 'Delusionally, irrationally, unreasonably ambitious goals' \u2014 claims it is not too late to get involved and they are just getting started.", "created_at": "2026-06-09T21:50:51.000Z", "is_thread": false, "images": [], "category": "crypto"}, {"author": // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
