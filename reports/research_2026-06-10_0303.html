let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function getCatColor(cat) { return CAT_COLORS[cat] || '#888'; }

function getUrgEmoji(u) {
  if (u === 'red') return '🔴';
  if (u === 'deep') return '🔵';
  if (u === 'watch') return '🟡';
  return '🔵';
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  updatePillStyles();
  renderCards();
}

function setCat(val) {
  activeCat = val;
  activeSrc = null;
  updatePillStyles();
  renderCards();
}

function setUrg(val) {
  activeUrg = val;
  activeSrc = null;
  updatePillStyles();
  renderCards();
}

function updatePillStyles() {
  document.querySelectorAll('.cat-pill').forEach(function(p) {
    var isActive = p.dataset.val === activeCat;
    if (isActive) {
      var col = p.dataset.val === 'all' ? '#555' : getCatColor(p.dataset.val);
      p.style.cssText = 'background:' + col + ';color:#fff;border-color:transparent';
    } else {
      p.style.cssText = 'background:#fff;color:#666;border-color:#ccc';
    }
  });
  document.querySelectorAll('.urg-pill').forEach(function(p) {
    var isActive = p.dataset.val === activeUrg;
    p.style.cssText = isActive ? 'background:#555;color:#fff;border-color:transparent' : 'background:#fff;color:#666;border-color:#ccc';
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var html = '';
  ITEMS.forEach(function(item) {
    var show = true;
    if (activeSrc) {
      show = item.source.indexOf(activeSrc) !== -1;
    } else {
      if (activeCat !== 'all' && item.cat !== activeCat) show = false;
      if (activeUrg !== 'all' && item.urgency !== activeUrg) show = false;
    }
    if (!show) return;

    var color = getCatColor(item.cat);
    var urgEmoji = getUrgEmoji(item.urgency);
    var srcShort = item.source.split('/')[0].trim();
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var chartNote = '';
    if (item.charts.count > 0) {
      chartNote = '<div class="charts-note' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s) — ' + item.charts.desc + '</div>';
    }
    var linkHtml = item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '';

    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">' + (item.id < 10 ? '0' : '') + item.id + '</span>';
    html += '<span class="urgency">' + urgEmoji + '</span>';
    html += '<span class="source-badge" style="background:' + color + '">' + srcShort + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartIcon) html += '<span class="chart-icon">' + chartIcon + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '</div>';
    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="section-label">THE IDEA</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">MY ANGLE</div><div class="angle-box" style="border-left-color:' + color + ';background:' + color + '18">' + item.angle + '</div>';
    html += '<div class="section-label">TWEETS</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (chartNote) html += chartNote;
    html += linkHtml;
    html += '</div></div>';
  });
  container.innerHTML = html || '<div style="padding:20px;color:#aaa;text-align:center;">No items match current filters.</div>';
}

function initFilters() {
  var catCounts = { all: ITEMS.length };
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  var catOrder = ['all'];
  ITEMS.forEach(function(i) { if (catOrder.indexOf(i.cat) === -1) catOrder.push(i.cat); });

  var catHtml = '<span class="filter-label">Cat:</span>';
  catOrder.forEach(function(c) {
    var col = c === 'all' ? '#555' : getCatColor(c);
    var activeStyle = c === 'all' ? 'background:' + col + ';color:#fff;border-color:transparent' : '';
    catHtml += '<span class="pill cat-pill" data-val="' + c + '" style="' + activeStyle + '" onclick="setCat(\'' + c + '\')">' + c + ' <strong>' + catCounts[c] + '</strong></span>';
  });
  document.getElementById('cat-filters').innerHTML = catHtml;

  var reds = ITEMS.filter(function(i) { return i.urgency === 'red'; }).length;
  var blues = ITEMS.filter(function(i) { return i.urgency === 'deep'; }).length;
  var yellows = ITEMS.filter(function(i) { return i.urgency === 'watch'; }).length;
  document.getElementById('urg-filters').innerHTML =
    '<span class="filter-label">Urgency:</span>' +
    '<span class="pill urg-pill" data-val="all" style="background:#555;color:#fff;border-color:transparent" onclick="setUrg(\'all\')">All <strong>' + ITEMS.length + '</strong></span>' +
    '<span class="pill urg-pill" data-val="red" onclick="setUrg(\'red\')">🔴 Act Now <strong>' + reds + '</strong></span>' +
    '<span class="pill urg-pill" data-val="deep" onclick="setUrg(\'deep\')">🔵 Deep <strong>' + blues + '</strong></span>' +
    '<span class="pill urg-pill" data-val="watch" onclick="setUrg(\'watch\')">🟡 Watch <strong>' + yellows + '</strong></span>';
}

function initReport() {
  var html = '<strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '<br>';

  });
  html += '<br><strong>Skipped sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += '&bull; <em>' + s.name + '</em>: ' + s.reason + '<br>';
  });
  document.getElementById('report-body').innerHTML = html;
}
