var META = {
  date:"2026-05-25",
  time:"09:07 CEST",
  windowStart:"2026-05-25 03:07 CEST",
  windowEnd:"2026-05-25 09:07 CEST",
  emailsInWindow:5,
  emailsRead:5,
  itemsExtracted:20,
  includedSources:[
    {name:"AI-RTZ / Michael Parekh", items:4},
    {name:"Tiger Capital Research / Daily News Wall", items:12},
    {name:"Capital Flows", items:2},
    {name:"MacroEdge / Don", items:1}
  ],
  skippedSources:[
    {name:"Substack Notes Digest (Frank Cappelleri, Azeem Azhar, TMAD)", reason:"Notification email — only short title snippets with 'Read More' links, zero sentences of extractable content"}
  ]
};

var activeCat = "all";
var activeUrgency = "all";
var activeSrc = null;

function getCatColor(cat){return CAT_COLORS[cat]||"#888";}

function urgencyLabel(u){
  if(u==="act") return "🔴";
  if(u==="deep") return "🔵";
  if(u==="watch") return "🟡";
  return "";
}

function copyTweet(itemId, which){
  var item = ITEMS.find(function(i){return i.id===itemId;});
  var text = which==="a" ? item.tweetA : item.tweetB;
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = "✓ Copied";
  setTimeout(function(){btn.textContent="📋 Copy";},1500);
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = "all";
  activeUrgency = "all";
  updatePills();
  renderCards();
}

function toggleCard(id){
  var body = document.getElementById("body-"+id);
  if(body) body.classList.toggle("open");
}

function toggleReport(){
  var rb = document.getElementById("report-body");
  if(rb) rb.classList.toggle("open");
}

function setFilter(type, val){
  activeSrc = null;
  if(type==="cat") activeCat=val;
  else activeUrgency=val;
  updatePills();
  renderCards();
}

function getFilteredItems(){
  return ITEMS.filter(function(item){
    if(activeSrc && item.source.indexOf(activeSrc)===-1) return false;
    if(activeCat!=="all" && item.cat!==activeCat) return false;
    if(activeUrgency!=="all" && item.urgency!==activeUrgency) return false;
    return true;
  });
}

function updatePills(){
  document.querySelectorAll(".pill[data-type='cat']").forEach(function(p){
    var v=p.getAttribute("data-val");
    p.classList.toggle("active", v===activeCat && !activeSrc);
    if(v==="all"){p.style.background=v===activeCat&&!activeSrc?"#333":""; p.style.borderColor=v===activeCat&&!activeSrc?"#333":""; p.style.color=v===activeCat&&!activeSrc?"#fff":"";}
    else{var c=getCatColor(v); p.style.background=v===activeCat&&!activeSrc?c:""; p.style.borderColor=v===activeCat&&!activeSrc?c:c; p.style.color=v===activeCat&&!activeSrc?"#fff":c;}
  });
  document.querySelectorAll(".pill[data-type='urgency']").forEach(function(p){
    var v=p.getAttribute("data-val");
    p.classList.toggle("active", v===activeUrgency && !activeSrc);
    p.style.background=v===activeUrgency&&!activeSrc?"#444":"";
    p.style.color=v===activeUrgency&&!activeSrc?"#fff":"";
    p.style.borderColor=v===activeUrgency&&!activeSrc?"#444":"";
  });
}

function renderCards(){
  var filtered = getFilteredItems();
  var container = document.getElementById("cards-container");
  if(!container) return;
  container.innerHTML = "";
  filtered.forEach(function(item, idx){
    var catColor = getCatColor(item.cat);
    var chartHtml = "";
    if(item.charts.count>0){
      var hotClass = item.charts.hot?"border-color:#f59e0b;background:#fffbeb":"";
      chartHtml = '<div class="chart-note" style="'+(item.charts.hot?"border-color:#f59e0b;background:#fffbeb":"")+'">'+
        (item.charts.hot?"🔥 ":"📊 ")+item.charts.count+' chart'+(item.charts.count>1?"s":"")+
        (item.charts.desc?" — "+item.charts.desc:"")+
        (item.charts.hot?" — CHART WORTH SAVING":"")+
      "</div>";
    }
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<div class="card-header" onclick="toggleCard('+item.id+')">' +
        '<span class="item-num">'+(idx+1)+'</span>' +
        '<span class="urgency">'+urgencyLabel(item.urgency)+'</span>' +
        '<span class="source-badge" style="background:'+catColor+'">'+item.source+'</span>' +
        '<span class="cat-tag">'+item.cat+'</span>' +
        (item.charts.count>0?'<span class="chart-icon">'+(item.charts.hot?"🔥":"📊")+'</span>':'')+
        '<span class="card-title">'+item.title+'</span>' +
      '</div>' +
      '<div class="card-body" id="body-'+item.id+'">' +
        chartHtml +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">'+item.idea+'</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="border-left-color:'+catColor+';background:'+catColor+'11">'+item.angle+'</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label" style="color:#378add">TWEET A</div>' +
            '<div class="tweet-text">'+item.tweetA+'</div>' +
            '<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>' +
            '<div class="tweet-text">'+item.tweetB+'</div>' +
            '<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        (item.link?'<div class="link-row"><a href="'+item.link+'" target="_blank">↗ Read full article</a></div>':'')+
      '</div>';
    container.appendChild(card);
  });
  if(filtered.length===0){
    container.innerHTML='<div style="padding:32px;text-align:center;color:#888;font-size:14px">No items match this filter.</div>';
  }
}

function buildCatCounts(){
  var counts={};
  ITEMS.forEach(function(i){counts[i.cat]=(counts[i.cat]||0)+1;});
  return counts;
}

function buildUrgencyCounts(){
  var counts={act:0,deep:0,watch:0};
  ITEMS.forEach(function(i){counts[i.urgency]=(counts[i.urgency]||0)+1;});
  return counts;
}

function init(){
  var app = document.getElementById("app");
  var catCounts = buildCatCounts();
  var urgCounts = buildUrgencyCounts();
  var cats = Object.keys(catCounts);

  var catPills = '<button class="pill active" data-type="cat" data-val="all" onclick="setFilter(\'cat\',\'all\')">All <span class="cnt">('+ITEMS.length+')</span></button>';
  cats.forEach(function(c){
    var color=getCatColor(c);
    catPills+='<button class="pill" data-type="cat" data-val="'+c+'" onclick="setFilter(\'cat\',\''+c+'\')" style="border-color:'+color+';color:'+color+'">'+c+' <span class="cnt">('+catCounts[c]+')</span></button>';
  });

  var urgPills =
    '<button class="pill active" data-type="urgency" data-val="all" onclick="setFilter(\'urgency\',\'all\')">All <span class="cnt">('+ITEMS.length+')</span></button>'+
    '<button class="pill" data-type="urgency" data-val="act" onclick="setFilter(\'urgency\',\'act\')">🔴 Act Now <span class="cnt">('+urgCounts.act+')</span></button>'+
    '<button class="pill" data-type="urgency" data-val="deep" onclick="setFilter(\'urgency\',\'deep\')">🔵 Deep <span class="cnt">('+urgCounts.deep+')</span></button>'+
    '<button class="pill" data-type="urgency" data-val="watch" onclick="setFilter(\'urgency\',\'watch\')">🟡 Watch <span class="cnt">('+urgCounts.watch+')</span></button>';

  var srcRows = META.includedSources.map(function(s){
    return '<tr><td><span class="src-link" onclick="filterBySrc(\''+s.name+'\')">'+s.name+'</span></td><td>'+s.items+' items</td></tr>';
  }).join("");
  var skipRows = META.skippedSources.map(function(s){
    return '<tr><td>'+s.name+'</td><td style="color:#e24b4a">'+s.reason+'</td></tr>';
  }).join("");

  app.innerHTML =
    '<div class="header">'+
      '<h1>🔵 RESEARCH INTELLIGENCE</h1>'+
      '<div class="meta">'+META.date+' · '+META.time+' · '+META.itemsExtracted+' items extracted · Window: '+META.windowStart+' → '+META.windowEnd+'</div>'+
    '</div>'+
    '<div class="filter-row"><span class="filter-label">Category</span>'+catPills+'</div>'+
    '<div class="filter-row"><span class="filter-label">Urgency</span>'+urgPills+'</div>'+
    '<div class="cards" id="cards-container"></div>'+
    '<div class="report-card">'+
      '<div class="rch" onclick="toggleReport()">📋 Session Report <span style="font-size:12px;font-weight:400;color:#888">'+META.emailsRead+'/'+META.emailsInWindow+' emails read · '+META.itemsExtracted+' items extracted</span> <span style="color:#888">▼</span></div>'+
      '<div class="report-body" id="report-body">'+
        '<p style="font-size:13px;color:#555;margin-bottom:12px"><strong>Window:</strong> '+META.windowStart+' to '+META.windowEnd+'. Emails outside this window were not processed.</p>'+
        '<table>'+
          '<thead><tr><th>Included Source</th><th>Items</th></tr></thead>'+
          '<tbody>'+srcRows+'</tbody>'+
        '</table>'+
        (skipRows?'<br><table><thead><tr><th>Skipped Source</th><th>Reason</th></tr></thead><tbody>'+skipRows+'</tbody></table>':'')+
      '</div>'+
    '</div>';

  renderCards();
  updatePills();
}

document.addEventListener("DOMContentLoaded", init);
</script>
