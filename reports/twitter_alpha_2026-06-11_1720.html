<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"date":"2026-06-11 17:20 UTC","summary":"**Iran/Hormuz escalation:** Trump threatened to hit Iran \"harder than humanity has ever seen\" and explicitly named **Kharg Island** as a target — markets shrugged. **@AndreasSteno** sees current energy market balance holding until September, then a bidding war resumes. **@BobEUnlimited** flags that most institutional investors are in denial about extended oil disruptions.\n\n**Macro: PPI hot, ECB hikes:** US May PPI printed **1.1% MoM vs 0.7% expected** (6.5% YoY); **@elerianm** notes core PPI was softer, suggesting margin absorption rather than full CPI pass-through. **ECB hiked +25bps** (first since 2023) — elerianm sees another hike possible, noting \"greater dispersion among systemically important central banks.\"\n\n**JGB/UST 30y auction risk:** **@Fullcarry** flagged JGB 30s approaching **4%**, compressing spread to UST 30y (at 5%) — automatic foreign bids for US duration may not materialize. **@qthomp** added USDJPY closed at its **3rd highest weekly level in ~50 years**, BOJ meets the day before FOMC next week.\n\n**Vitalik's liquidation-free DeFi lending:** **@DefiIgnas** broke down Vitalik's options-based design — ETH splits into stable + upside tokens, oracle only checked at expiry (no liquidation bots, no cascading bad debt). **@VitalikButerin** confirmed it is already being built. Potentially a Uniswap-scale structural change for DeFi lending.\n\n**Oil: China key, Japan rerouting, Vitol halved:** **@JavierBlas** identified China as the single biggest factor keeping oil below $100. Vitol profits halved to **$4.5B in 2025** (still top-5 year). Japan declared 100% July crude loads outside Hormuz. **@zriboua**: US is now the world's **largest oil exporter**; China sourcing Western Hemisphere barrels cuts IRGC revenue. Corn at **8-month low $4.17/bu**, -50% from 2022 peak.","events":[{"title":"Trump Threatens Kharg Island — Market Shrug","category":"geopolitics","description":"Trump vowed to strike Iran again and named Kharg Island (Iran's main crude export terminal) as a future target. Market reaction: muted.","items":[{"author":"JavierBlas","text":"BREAKING: Trump vows to strike Iran again tonight and adds: \"At some point in the not too distant future we will be taking Kharg Island.\" (Similar threats were made about Kharg early in the conflict.) Also quoted Iranian statement about \"exploding energy infrastructure.\"","tweet_url":"https://x.com/JavierBlas/status/2065048092869615875","category":"geopolitics","created_at":"2026-06-11T14:18:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiGLfGX0AAO7yy.png"]},{"author":"Geiger_Capital","text":"\"TRUMP: WE WILL BE HITTING IRAN HARDER THAN HUMANITY HAS EVER SEEN\" — then shows stock market reaction (implied shrug). Earlier posted PPI fire-emoji with chart (1.1% MoM vs 0.7% exp).","tweet_url":"https://x.com/Geiger_Capital/status/2065072998948765752","category":"geopolitics","created_at":"2026-06-11T15:07:00.000Z","is_thread":false,"images":[]},{"author":"_tolks","text":"\"Even for his standards, 'we will be taking Kharg Island and their oil markets' is an insane statement\" — noting no one cares anymore and won't unless absolutely forced to.","tweet_url":"https://x.com/_tolks/status/2065050010534732030","category":"geopolitics","created_at":"2026-06-11T14:24:00.000Z","is_thread":false,"images":[]},{"author":"Fullcarry","text":"No doubt Trump is a boon to trading, but he is exhausting. His war tweets do swing USTs nicely. Compared to the brutal 2010s when 2s would barely move for days.","tweet_url":"https://x.com/Fullcarry/status/2065054619093393822","category":"geopolitics","created_at":"2026-06-11T14:38:00.000Z","is_thread":false,"images":[]}]},{"title":"US PPI May: 1.1% MoM Hot (exp. 0.7%), Core Softer — ECB Hikes +25bps","category":"macro","description":"Dual macro prints: hot headline PPI but softer core suggesting margin absorption; ECB hikes for first time since 2023.","items":[{"author":"elerianm","text":"US May PPI came in hotter than expected at headline (1.1% MoM vs 0.7% exp; 6.5% YoY vs 6.4% exp) but softer at core. Echoing yesterday's CPI: PPI spillover from energy into broader prices remains relatively muted. Also suggests pass-through from PPI to CPI is being offset by margin pressure — companies absorbing rather than passing on costs fully.","tweet_url":"https://x.com/elerianm/status/2065051491627381094","category":"macro","created_at":"2026-06-11T14:28:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiIpirW0AAMrRd.png"]},{"author":"Geiger_Capital","text":"PPI: 1.1% MoM vs 0.7% exp; 6.5% YoY vs 6.4% exp. \"Accelerating inflation trend...\" Added: \"Good luck with those rate cuts, Kevin.\"","tweet_url":"https://x.com/Geiger_Capital/status/2065054154507092380","category":"macro","created_at":"2026-06-11T14:37:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiLzulWoAErucg.jpg"]},{"author":"elerianm","text":"ECB hiked rates by 25bps — first increase since 2023. Would not surprise if ECB hikes again this year, highlighting a world of greater dispersion among systemically important central banks.","tweet_url":"https://x.com/elerianm/status/2065047046734721443","category":"macro","created_at":"2026-06-11T14:15:00.000Z","is_thread":false,"images":[]},{"author":"Fullcarry","text":"\"Ugly PPI. PCE comp not much better.\" Posted with chart overlay.","tweet_url":"https://x.com/Fullcarry/status/2065049722386059556","category":"macro","created_at":"2026-06-11T14:22:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiHxumXwAADu_M.jpg"]}]},{"title":"JGB 30y Approaching 4% — UST 30y Auction Risk, BOJ Meets Pre-FOMC","category":"macro","description":"Japanese bond yield rise compresses spread to US Treasuries; foreign automatic bids for US duration no longer reliable.","items":[{"author":"Fullcarry","text":"With JGB 30s eyeballing 4%, can't count on automatic foreign bids for UST duration. Today's 30y auction may look like good value at 5% but the spread to JGB 30s is on the low side. JPY carries poorly so the only sustainable relief would be a significant US easing cycle — Ueda too timid to raise rates.","tweet_url":"https://x.com/Fullcarry/status/2065067403751395834","category":"macro","created_at":"2026-06-11T15:04:00.000Z","is_thread":true,"images":["https://pbs.twimg.com/media/HKiXcmZXQAAG3hA.png"]},{"author":"qthomp","text":"Weekly reminder: keep Japan on your radar. USDJPY had its 3rd highest weekly close in almost 50 years last week. The BOJ meets the day before the FOMC next week.","tweet_url":"https://x.com/qthomp/status/2065048652981145997","category":"macro","created_at":"2026-06-11T14:21:00.000Z","is_thread":false,"images":[]}]},{"title":"Oil Market: China Key Factor Below $100, Japan Rerouting, Vitol Profits Halved, US Largest Exporter","category":"energy","description":"Multiple JavierBlas dispatches on oil market structure and strategic implications of Iran war.","items":[{"author":"JavierBlas","text":"\"The global oil market is incredibly complex, with myriad factors interacting to keep prices under $100. But if I had to pick just one, it would be China.\" Also: debate on China tapping SPR vs commercial stockpiles is largely academic — in a command economy, commercial stockpiles are held by state-owned companies following government diktat.","tweet_url":"https://x.com/JavierBlas/status/2065106270785315216","category":"energy","created_at":"2026-06-11T16:18:00.000Z","is_thread":false,"images":[]},{"author":"JavierBlas","text":"Japan PM Sanae Takaichi: in July Japan will import as much crude as a year earlier, 100% of barrels loaded outside Hormuz. Pre-war: Japan imported 90% of oil from the Middle East. Looking ahead: should Japan return to its pre-war pattern? Kuwait, Iraq, Qatar (no Hormuz bypass capacity) face an uphill battle in Tokyo going forward.","tweet_url":"https://x.com/JavierBlas/status/2065078531160261082","category":"energy","created_at":"2026-06-11T15:17:00.000Z","is_thread":true,"images":[]},{"author":"JavierBlas","text":"Vitol Group, the world's largest oil trading house, saw profits roughly halve to ~$4.5B in 2025. Despite the fall, still one of Vitol's best years on record — before 2020, profits had never exceeded $3B.","tweet_url":"https://x.com/JavierBlas/status/2065081664468816141","category":"energy","created_at":"2026-06-11T15:27:00.000Z","is_thread":false,"images":[]},{"author":"zriboua","text":"Reuters: \"The United States has become the world's largest oil exporter, upending a decades-old order long dominated by Saudi Arabia and Russia, as Washington's war with Iran reshapes global energy trade.\" Every future barrel China sources from the Western Hemisphere is a barrel not flowing through IRGC's revenue stream — the revenue that sustains weapons programs and proxy networks.","tweet_url":"https://x.com/zriboua/status/2065121034051711257","category":"energy","created_at":"2026-06-11T17:16:00.000Z","is_thread":false,"images":[]},{"author":"AndreasSteno","text":"On best estimates, the current decently balanced energy markets can be maintained until September. After that, a bidding war resumes. Korean export data first 10 days of June: 85.9% YoY vs 43.7% in May — AI demand acceleration confirmed.","tweet_url":"https://x.com/AndreasSteno/status/2065078191291547850","category":"energy","created_at":"2026-06-11T15:16:00.000Z","is_thread":false,"images":[]},{"author":"BobEUnlimited","text":"Most institutional investors are in total denial that oil markets could see disruptions for an extended period. Makes sense: none are long commodities, up to their eyeballs in stocks and bonds.","tweet_url":"https://x.com/BobEUnlimited/status/2065120131584229517","category":"energy","created_at":"2026-06-11T17:12:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKjH0PyWIAE7yzw.jpg"]}]},{"title":"Corn 8-Month Low $4.17/bu — Food Crisis Narrative vs Reality","category":"macro","description":"Commodity prices sharply below 2022 crisis peaks despite ongoing conflict; urea spike context differs from 2022.","items":[{"author":"JavierBlas","text":"Chart of the Day: Corn prices at 8-month low of $4.17/bushel, down ~50% from 2022 peak. Quite a contrast with apocalyptic famine warnings made by armchair experts. On urea spike: 2022 also hit wheat/soy/corn (Russia/Ukraine food basket); current spike hits a non-food-producing area — impact more limited. El Nino is a separate concern to watch.","tweet_url":"https://x.com/JavierBlas/status/2065068679251837105","category":"macro","created_at":"2026-06-11T15:00:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiZBFEXcAAMPP0.jpg"]}]},{"title":"Colombia Election Runoff June 21 — Abelardo 53% vs Cepeda 45%","category":"geopolitics","description":"New AtlasIntel poll shows right-wing candidate in strong position ahead of runoff.","items":[{"author":"Geiger_Capital","text":"Colombia runoff in 10 days (June 21). New AtlasIntel poll: Abelardo de la Espriella 53% (+8) vs Ivan Cepeda 45%. \"Far-right\" Abelardo in strong position against far-left socialist Cepeda. \"Colombia joins the Golden Age of LatAm.\"","tweet_url":"https://x.com/Geiger_Capital/status/2065104895464595596","category":"geopolitics","created_at":"2026-06-11T16:13:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKi59QNWYAASEsv.jpg"]}]},{"title":"SpaceX $75B IPO: Capital Rotation, Crypto Impact, Liquidity Vacuum","category":"macro","description":"SpaceX IPO as dominant market narrative — capital drain from crypto and tech; retail FOMO; 8% of US current account deficit potentially financed by overseas demand.","items":[{"author":"laurashin","text":"Quoting analyst @shaughnessy119 on SpaceX IPO: \"People who were never able to access these IPOs — they want to tell their friends they're in it. They use these products all day and they're more excited than owning Bitcoin right now.\" Also linked article: Is SpaceX's $75B IPO Pulling Capital Out of Crypto?","tweet_url":"https://x.com/laurashin/status/2065114494532263950","category":"macro","created_at":"2026-06-11T17:00:00.000Z","is_thread":false,"images":[]},{"author":"aleabitoreddit","text":"Frankfurt Bank strategists: 8% of US current-account deficit could be refinanced in a single day by overseas demand for SpaceX ($SPCX) shares. Questions whether META/MSFT correction is macro or just SpaceX Nasdaq 100 rebalancing pulling liquidity.","tweet_url":"https://x.com/aleabitoreddit/status/2065073494220849660","category":"macro","created_at":"2026-06-11T15:09:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKib3b5bQAE6OXG.jpg"]},{"author":"qthomp","text":"Tin-foil theory gaining credibility: Trump's escalating Iran war rhetoric designed to manufacture volatility and fear, then reverse and drive a relief rally into SpaceX IPO day. \"This will gain credibility if Trump repeats his 'bomb Iran back to stone ages' saga.\"","tweet_url":"https://x.com/qthomp/status/2065049407175774496","category":"macro","created_at":"2026-06-11T14:22:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiG1Y8WEAA25Jt.png"]}]},{"title":"Vitalik's DeFi-Without-Liquidations Proposal — Already Being Built","category":"crypto","description":"Options-based lending splits ETH collateral into stable+upside tokens, oracle only at expiry. Vitalik confirmed implementation underway; DefiIgnas thread is the most detailed breakdown.","items":[{"author":"DefiIgnas","text":"Vitalik's new proposal: DeFi without liquidations, built on options instead of debt. Your 1 ETH splits into a \"stable dollars\" token and an \"ETH upside\" token. Borrowing = sell stable token for cash, keep upside; if ETH dumps you lose upside only — no bot, no penalty. Stablecoin = hold stable token (worst case slowly turns back to ETH, no overnight depeg). Leverage = buy upside token (max loss = premium paid, no wick liquidation since only expiry price counts). Oracle is checked once at expiry — slow prediction-market style oracles suffice. Positions must be rolled at expiry, creating Pendle-like vault opportunities. The design removes cascading liquidations from DeFi lending entirely. Vitalik was early on Uniswap (2016 Reddit post) and prediction markets — this could be the next structural DeFi layer.","tweet_url":"https://x.com/DefiIgnas/status/2065045806726672838","category":"crypto","created_at":"2026-06-11T14:05:00.000Z","is_thread":true,"images":["https://pbs.twimg.com/media/HKiEN6BagAA5P0D.jpg","https://pbs.twimg.com/media/HKiEfAJXoAAnNXK.jpg"]},{"author":"VitalikButerin","text":"\"Looks like the options thing is happening already!\" — confirmed implementation underway in the thread. Urged formal verification before mainnet deployment. Flagged need for robustness-optimized oracles.","tweet_url":"https://x.com/VitalikButerin/status/2065021415003234519","category":"crypto","created_at":"2026-06-11T13:04:00.000Z","is_thread":false,"images":[]}]},{"title":"Solana Revenue + Ethena/Centrifuge JAAA RWA Expansion","category":"crypto","description":"Stacy Muur covers top Solana protocols and Ethena's first institutional RWA collateral (JAAA) backing USDe.","items":[{"author":"stacy_muur","text":"Top Solana 24h revenue: Pumpfun, Collector, Axiom, ZINC, Phantom, Jupiter, ORE, Dexscreener, FOMO, Meteora. ZINC is the standout — only 2 weeks old, $2M revenue on $20M volume (~10% conversion). It is a proof-of-work mining protocol running on Arcium's confidential compute. Entirely new concept in the space.","tweet_url":"https://x.com/stacy_muur/status/2065002856328147091","category":"crypto","created_at":"2026-06-11T11:59:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKhdJ5kbAAAJIys.jpg"]},{"author":"stacy_muur","text":"Ethena adding JAAA (via Centrifuge) as collateral backing USDe — the first time Ethena diversifies into institutional-grade RWA. This is the first institutional RWA collateral for a major decentralized stablecoin. Signals stablecoins will start competing on what's actually backing them, not just yield.","tweet_url":"https://x.com/stacy_muur/status/2065054446716068031","category":"crypto","created_at":"2026-06-11T14:39:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiME1VbsAEU6u2.jpg"]}]},{"title":"AI Cost Crisis: Subscriptions 40x Subsidized vs API, Uber/Microsoft Cutting Spend","category":"ai","description":"Enterprise AI costs creating a wall; subscription pricing masks true API cost differential; Chinese models gaining.","items":[{"author":"laurashin","text":"Quoting @shaughnessy119: AI subscriptions subsidized ~40x vs API — $200/month gets ~$8,000 worth of API spend. Businesses transitioning to API are hitting a wall. Uber cut AI spending. Microsoft cut AI spending. \"A lot of companies are realizing this is just too expensive.\"","tweet_url":"https://x.com/laurashin/status/2065120220797452778","category":"ai","created_at":"2026-06-11T17:13:00.000Z","is_thread":false,"images":[]},{"author":"cryptopunk7213","text":"AI is getting too expensive — not from lack of demand but the opposite: demand skyrocketing, tokens too expensive. Hit Claude Fable 5 usage limits almost immediately. Chinese open models (80-90% frontier capability, 1/200th the cost of Claude/GPT) are the beneficiaries. US startups switching from Claude subscriptions to cheaper models has 3x'd recently. Uber/Microsoft substituting to cheaper models per task. Bottlenecks: compute, power, memory, cooling.","tweet_url":"https://x.com/cryptopunk7213/status/2065107094907310375","category":"ai","created_at":"2026-06-11T16:19:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKi1vCBWMAA4aIb.jpg"]}]}],"insights":[{"author":"EMostaque","text":"For \"competent intelligence\" — satisficing level, normal human worker you can replace without much effort vs. a difficult-to-replace specialist — we are there for 99% of tasks within the next year.","tweet_url":"https://x.com/EMostaque/status/2065100296523522415","category":"ai","created_at":"2026-06-11T15:53:00.000Z","is_thread":false,"images":[]},{"author":"paulg","text":"AGI is a wide band rather than a sharp finish line — we are already on one edge. If you'd shown a child a version of ChatGPT told to act like a human, they'd have said AI had been achieved. On the EU: it may turn out to be one of the most important accidents of history that we got the EU (with its culture of regulation) at roughly the same time as we got AI.","tweet_url":"https://x.com/paulg/status/2065031413582168067","category":"ai","created_at":"2026-06-11T13:26:00.000Z","is_thread":true,"images":[]},{"author":"nic_carter","text":"Interesting European AI paper arguing Europe is behind and will fall even further behind in the AI race — a 5-year speculative fiction extrapolation. Conclusion: \"Europe will continue to do passably well thanks to their dwindling ability to monetize their history and to ride on American tech coattails — but will end up completely vassalized.\"","tweet_url":"https://x.com/nic_carter/status/2065073129479688520","category":"ai","created_at":"2026-06-11T15:09:00.000Z","is_thread":true,"images":["https://pbs.twimg.com/media/HKidhBjXcAA0UEd.jpg"]},{"author":"Delphi_Digital","text":"AI harnesses may become the new moat, not models. On SWE-bench Pro: swapping scaffolds moves resolve rate by 22 points; swapping the six best frontier models inside the same scaffold moves it by less than 1 point. Meta/Harvard ran Sonnet 4.5 with a custom harness and scored 52.7%, beating Anthropic's own scaffold running the more expensive Opus at 52.0%. Nous Research's Hermes Agent: state to local machine, SQLite conversation history, context in markdown, complex tasks as reusable skill files. Routed 3.2 trillion tokens in one week on OpenRouter — giving open-source a path to closing the long-session fine-tuning gap.","tweet_url":"https://x.com/Delphi_Digital/status/2065060618323816657","category":"ai","created_at":"2026-06-11T14:52:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiRneUXEAAPc7f.jpg"]},{"author":"udiWertheimer","text":"Fable 5's breakthrough is not the quality of results — it is that the model finally understands exactly what you want and just finds a way to do precisely that. Also (separately): not every CEO needs to be public-facing — Dario Amodei's persona on social media described as \"quite possibly the most insufferable\" (in response to discussion about Anthropic messaging).","tweet_url":"https://x.com/udiWertheimer/status/2065109507248672834","category":"ai","created_at":"2026-06-11T16:28:00.000Z","is_thread":false,"images":[]},{"author":"Pentosh1","text":"Chart thread: shifted from momentum chasing to dip buying. Core positions unchanged. New adds: $BB (avg $5.66, up 2x in one week — building long-term position, not trading); $GLXY at $26.74 avg (Galaxy Digital, building largest US data center, 60% of target size, at resistance — watching for pullback or breakout/retest); $MU and $EWY as dip targets; SPX approaching previous ATHs as a natural bid zone.","tweet_url":"https://x.com/Pentosh1/status/2065093228131475675","category":"positioning","created_at":"2026-06-11T15:43:00.000Z","is_thread":true,"images":["https://pbs.twimg.com/media/HKitNZdXkAAaKBo.jpg","https://pbs.twimg.com/media/HKitNZZXsAAriIU.jpg"]},{"author":"Chartfest1","text":"AAII Sentiment: Bulls 30.4% (down 6 week-on-week), Bears 47.7% (up 10). Rapid swing toward bearishness. Chartfest1 notes this validates their pinned tweet thesis — sentiment at levels historically associated with contrarian buy signals.","tweet_url":"https://x.com/Chartfest1/status/2065022661525176761","category":"macro","created_at":"2026-06-11T13:16:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKhvKcCXoAAjISK.png"]},{"author":"AndreasSteno","text":"Macro nowcasts: inflation risks rolling over fast in the US — \"big game changer for rate markets.\" Korean export data first 10 days of June: 85.9% YoY vs 43.7% in May — AI demand is accelerating, not slowing.","tweet_url":"https://x.com/AndreasSteno/status/2065080770054541400","category":"macro","created_at":"2026-06-11T15:23:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKij5W4WUAE2QWY.png"]},{"author":"stacy_muur","text":"VC evolution 2026: investing in distribution, not ideas or prototypes. \"We don't have an idea crisis anymore — everything you might think of is already released or in development. Attention is ultra scarce.\" Illustrated: VC rejected project at $100M val citing bear market; token pumped to $180M FDV; same VC came back asking to invest at the old $100M. Real story.","tweet_url":"https://x.com/stacy_muur/status/2064975169182138533","category":"crypto","created_at":"2026-06-11T10:12:00.000Z","is_thread":false,"images":[]},{"author":"patrick_oshag","text":"Podcast: Josh Wolfe of Thrive Holdings on why humans become MORE valuable with AI, not less. Origin story + framework for the thesis.","tweet_url":"https://x.com/patrick_oshag/status/2065115218737279425","category":"ai","created_at":"2026-06-11T17:02:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKjAqllWUAAEUfE.jpg"]},{"author":"sjdedic","text":"Collector.xyz $2,500 packs launched with Solflare integration, immediately hit a new daily high — printed $800K in daily profit (~$300M annualized). World Cup digital collectibles via TopStrikeIO (pulled Mbappé from a pack). Team described as shipping constantly. $CARDS token.","tweet_url":"https://x.com/sjdedic/status/2065063885372108817","category":"crypto","created_at":"2026-06-11T14:56:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiUHQ7X0AA_BwS.jpg"]},{"author":"0xSammy","text":"Crypto opportunity set for 2026: (1) tokenized collectibles, (2) AI & robotics tokens, (3) low-leverage perps in niches with edge, (4) prediction markets. Meta-advice: master AI tooling, build agentic workflows, grow account distribution in a niche. Long thread on Bittensor/TAO: frontier AI access gating = demand signal for open-source; six institutional TAO vehicles now exist, none pre-dating 2024.","tweet_url":"https://x.com/0xSammy/status/2065098986936229940","category":"crypto","created_at":"2026-06-11T15:51:00.000Z","is_thread":false,"images":[]},{"author":"BobEUnlimited","text":"Asset supply headwinds: surge in stock and bond supply (Google $80B new issuance noted as catalyst) appears to drag nearly every financial asset down. \"We are just getting started.\" Buyback softening by mega caps is a bigger factor vs the 2000 cycle. AI productivity skeptic: global macro productivity line is going down, not up, despite AI claims.","tweet_url":"https://x.com/BobEUnlimited/status/2065026684894490924","category":"macro","created_at":"2026-06-11T13:19:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKhyxUgXgAE1JeH.jpg"]},{"author":"pboockvar","text":"Casey's General Store earnings color on the consumer: \"Hanging in there\" but more discerning about where they shop. Growth across all income cohorts — slightly less in sub-$50K. Fuel: minor behavioral shifts (premium dip, ethanol up, gallons per transaction down, frequency up) all in low single-digit percentages. \"Very nuanced behaviors.\" Useful real-economy data point from 15K+ location chain.","tweet_url":"https://x.com/pboockvar/status/2065094927277515173","category":"macro","created_at":"2026-06-11T15:47:00.000Z","is_thread":false,"images":[]},{"author":"dampedspring","text":"Cryptic post: \"D+. 68.6%\" — appears to be a proprietary market scoring system or indicator. Followed by \"You'll see in the comments soon.\" Possibly a risk-regime or market-breadth score from @dampedspring's (Andy Constan's) systematic framework. Grade and percentage suggest below-average bullish conditions.","tweet_url":"https://x.com/dampedspring/status/2065117489709625488","category":"macro","created_at":"2026-06-11T17:05:00.000Z","is_thread":false,"images":[]},{"autho tps://x.com/mert/status/2065099567696154769","category":"crypto","created_at":"2026-06-11T15:51:00.000Z","is_thread":false,"images":[]},{"author":"BobEUnlimited","text":"AI productivity skeptic: \"You'd think what's being pitched as the most productivity-enhancing technology in human history would show some signs of improving productivity at the macro level globally. Nope. Not a bit. That line is going down.\" [Against the dominant AI productivity-revolution narrative]","tweet_url":"https://x.com/BobEUnlimited/status/2065046044216340860","category":"ai","created_at":"2026-06-11T14:09:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiEQyUX0AAWTlY.png"]},{"author":"udiWertheimer","text":"NFTs not necessarily better on-chain. \"A lot of projects where art is on-chain but complete dogshit, and a lot of amazing pieces that aren't on-chain. If you collect only on-chain stuff and collect everything on-chain, your collection is a big pile of shit.\" Argues on-chain provenance matters for specific use cases (rare ungraded cards) but irrelevant for modern bulk reprints. [Against on-chain absolutism in the NFT/collector space]","tweet_url":"https://x.com/udiWertheimer/status/2065055043213041860","category":"crypto","created_at":"2026-06-11T14:43:00.000Z","is_thread":true,"images":[]},{"author":"qthomp","text":"Theory (explicitly labeled tin-foil): Trump Iran escalation rhetoric is engineered — manufacture fear, then taco and manufacture a relief rally into SpaceX IPO day. \"This will gain credibility if Trump repeats his 'bomb Iran back to stone ages' saga.\" [Goes against the view that Trump rhetoric is pure tough-talk]","tweet_url":"https://x.com/qthomp/status/2065049407175774496","category":"geopolitics","created_at":"2026-06-11T14:22:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiG1Y8WEAA25Jt.png"]},{"author":"JavierBlas","text":"China is the single factor keeping oil below $100 — not Iranian infrastructure damage, not OPEC+ compliance. This is a contrarian read vs. the consensus that geopolitical supply disruption should push oil higher. Also: China's commercial vs SPR stockpile debate is academic — it's a command economy, the government directs both.","tweet_url":"https://x.com/JavierBlas/status/2065106270785315216","category":"energy","created_at":"2026-06-11T16:18:00.000Z","is_thread":false,"images":[]}],"positioning":[{"author":"Pentosh1","text":"$BB: avg cost $5.66, up 2x in one week. Long-term position — will trim only 5% to add back lower + use net proceeds to build more shares at zero cost. $GLXY (Galaxy Digital): avg $26.74, building largest US data center, at resistance — look for pullbacks or breakout/retest, 60% of target position size. $MU and $EWY: dip targets not yet entered. SPX: bidding opportunity approaching previous ATHs. Shift from momentum chasing to dip buying as primary strategy.","tweet_url":"https://x.com/Pentosh1/status/2065093228131475675","category":"positioning","created_at":"2026-06-11T15:43:00.000Z","is_thread":true,"images":["https://pbs.twimg.com/media/HKitNZdXkAAaKBo.jpg","https://pbs.twimg.com/media/HKitNZZXsAAriIU.jpg"]},{"author":"MelMattison1","text":"Gold miners call spreads (described as 10x opportunities): AEM 240/250 calls Mar '27 at $0.80; GDX 125/135 calls Jun '27 at $0.70; NEM 135/140 calls Jan '27 at $0.55; GLD 470/475 calls Nov '26 at $0.35. Fully allocated for the first time all year. Also buying BTC and select equities. Rationale: SpaceX IPO tourist selling flushed gold market; geopolitical fiscal expansion beginning; upcoming dovish Fed chair; chart shows reverse head-and-shoulders + RSI divergence.","tweet_url":"https://x.com/MelMattison1/status/2065096336064631062","category":"positioning","created_at":"2026-06-11T15:50:00.000Z","is_thread":false,"images":["https://pbs.twimg.com/media/HKiwLnEW0AEIg9w.jpg"]},{"author":"Swedish_uranium","text":"[PAID PARTNERSHIP — DISCLOSED] Noble Plains Uranium $NOBL / $NOBL.V: ~$6M market cap. 6.36 Mlb NI 4 };
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet &#8594;</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet &#8594;</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">&#9658;</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
</body>
