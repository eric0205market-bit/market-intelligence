<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Twitter Bank Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e4df;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #2563eb;
  --accent-bg: #f0f5ff;
  --accent-2: #1d4ed8;
  --tag-text: #0e7490;
  --tag-bg: #e8f4f8;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: var(--accent); }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS (top-level collapsible) */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: var(--accent-bg); cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; color: var(--accent-2); }
.section-head:hover { background: #e1ecff; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* TOPIC (nested collapsible inside Topics section) */
.topic { border-bottom: 1px solid var(--border-light); }
.topic:last-child { border-bottom: none; }
.topic-head { display: flex; align-items: center; gap: 10px; padding: 10px 16px;
              background: var(--accent-bg); cursor: pointer; user-select: none;
              font-size: 13px; font-weight: 600; color: var(--accent-2); }
.topic-head:hover { background: #e1ecff; }
.topic-name { flex: 1; }
.topic-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); }
.topic-arrow { font-size: 10px; transition: transform .2s; }
.topic.open .topic-arrow { transform: rotate(90deg); }
.topic-body { display: none; padding: 4px 0 6px; }
.topic.open .topic-body { display: block; }

/* ITEM CARDS */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DATA POINT TAGS */
.data-points { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.dp-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
          background: var(--tag-bg); color: var(--tag-text);
          padding: 2px 7px; border-radius: 4px; }

/* CHARTS (large, NOT thumbnails) */
.charts { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.chart { width: 100%; max-width: 420px; height: auto;
         border: 1px solid var(--border); border-radius: 4px; cursor: zoom-in;
         background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

.theme-line { padding: 8px 16px 4px; font-size: 12.5px; color: var(--text-2); font-style: italic;
              border-bottom: 1px solid var(--border-light); }
.relayers { margin-top: 6px; font-size: 11px; color: var(--text-3); font-style: italic; }

@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
  .chart { max-width: 100%; }
}
</style>
</head>
<body>

// ---------- helpers ----------
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderCharts(images) {
  if (!images || !images.length) return '';
  return `<div class="charts">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="chart" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderDataPoints(points) {
  if (!points || !points.length) return '';
  return `<div class="data-points">` + points.map(p =>
    `<span class="dp-tag">${escapeHtml(p)}</span>`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  const body = item.description || item.text || '';
  const relayers = (item.relayers || []).length
    ? `<div class="relayers">also carried by: ${item.relayers.map(r => '@' + escapeHtml(r)).join(', ')}</div>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      ${body ? `<div class="item-text">${escapeHtml(body)}</div>` : ''}
      ${renderDataPoints(item.data_points)}
      ${renderCharts(item.images)}
      ${relayers}
    </div>`;
}

function renderBank(bank, idx) {
  const items = (bank.items || []).map(renderItem).join('');
  const name = bank.bank || bank.name || `Bank ${idx + 1}`;
  const theme = bank.theme || '';
  return `
    <div class="topic">
      <div class="topic-head" onclick="toggleTopic(this)">
        <span class="topic-name">${escapeHtml(name)}</span>
        <span class="topic-count">${(bank.items || []).length}</span>
        <span class="topic-arrow">▸</span>
      </div>
      <div class="topic-body">
        ${theme ? `<div class="theme-line">${escapeHtml(theme)}</div>` : ''}
        ${items || '<div class="empty">No items.</div>'}
      </div>
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author ? authorTag(author, 'link-author') : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, body, count) {
  return `
    <div class="section">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${count}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const parts = [];
  const s = d.input_stats || {};
  if (s.total_tweets != null) parts.push(`total <strong>${s.total_tweets}</strong>`);
  if (s.considered != null) parts.push(`considered <strong>${s.considered}</strong>`);
  if (s.kept != null) parts.push(`kept <strong>${s.kept}</strong>`);
  if (s.dropped != null) parts.push(`dropped <strong>${s.dropped}</strong>`);
  if (s.deduped != null) parts.push(`deduped <strong>${s.deduped}</strong>`);
  const bankCount = (d.banks || []).length;
  parts.push(`banks <strong>${bankCount}</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(el) { el.parentElement.classList.toggle('open'); }
function toggleTopic(el)   { el.parentElement.classList.toggle('open'); }

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) { el.classList.add('match'); el.classList.remove('dim'); }
    else                    { el.classList.add('dim'); el.classList.remove('match'); }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match'); el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
    else if (activeFilter) clearFilter();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.collected_at || d.date || '';

  const banksBody = (d.banks || []).map(renderBank).join('')
                 || '<div class="empty">No banks.</div>';

  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Bank Research', banksBody, (d.banks || []).length),
  ].join('');

  document.getElementById('app').innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open the main section and the first bank.
  document.querySelectorAll('.section').forEach((s, i) => { if (i === 0) s.classList.add('open'); });
  const firstTopic = document.querySelector('.topic');
  if (firstTopic) firstTopic.classList.add('open');

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
