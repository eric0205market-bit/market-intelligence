// ---------- helpers ----------
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function authorTag(name, cls) {
  cls = cls || 'item-author';
  if (!name) return '';
  return '<span class="' + cls + '" onclick="filterAuthor(\'' + escapeAttr(name) + '\')">@' + escapeHtml(name) + '</span>';
}

// ---------- rendering ----------
function renderCharts(images) {
  if (!images || !images.length) return '';
  return '<div class="charts">' + images.map(function(u) {
    return '<img src="' + escapeAttr(u) + '" class="chart" loading="lazy" alt="" onclick="openLightbox(\'' + escapeAttr(u) + '\')">';
  }).join('') + '</div>';
}

function renderDataPoints(points) {
  if (!points || !points.length) return '';
  return '<div class="data-points">' + points.map(function(p) {
    return '<span class="dp-tag">' + escapeHtml(p) + '</span>';
  }).join('') + '</div>';
}

function renderItem(item) {
  var author = item.author || item.author_username || '';
  var time = relativeTime(item.created_at);
  var link = item.tweet_url
    ? '<a class="item-link" href="' + escapeAttr(item.tweet_url) + '" target="_blank" rel="noopener">tweet →</a>'
    : '';
  var body = item.description || item.text || '';
  var relayersHtml = '';
  if (item.relayers && item.relayers.length > 0) {
    relayersHtml = '<div class="data-points"><span class="dp-tag">also carried by: ' + item.relayers.map(function(r){ return '@' + escapeHtml(r); }).join(', ') + '</span></div>';
  }
  return '\n    <div class="item-card filterable" data-author="' + escapeAttr(author).toLowerCase() + '">\n      <div class="item-head">\n        ' + authorTag(author) + '\n        ' + (time ? '<span class="item-time">' + time + '</span>' : '') + '\n        ' + link + '\n      </div>\n      ' + (body ? '<div class="item-text">' + escapeHtml(body) + '</div>' : '') + '\n      ' + renderDataPoints(item.data_points) + '\n      ' + relayersHtml + '\n      ' + renderCharts(item.images) + '\n    </div>';
}

function renderTopic(topic, idx) {
  var items = (topic.items || []).map(renderItem).join('');
  var name = topic.topic || topic.name || ('Topic ' + (idx + 1));
  return '\n    <div class="topic">\n      <div class="topic-head" onclick="toggleTopic(this)">\n        <span class="topic-name">' + escapeHtml(name) + '</span>\n        <span class="topic-count">' + (topic.items || []).length + '</span>\n        <span class="topic-arrow">▸</span>\n      </div>\n      <div class="topic-body">' + (items || '<div class="empty">No items.</div>') + '</div>\n    </div>';
}

function renderSection(letter, name, body, count) {
  return '\n    <div class="section">\n      <div class="section-head" onclick="toggleSection(this)">\n        <span class="section-letter">' + letter + '.</span>\n        <span class="section-name">' + escapeHtml(name) + '</span>\n        <span class="section-count">' + count + '</span>\n        <span class="section-arrow">▸</span>\n      </div>\n      <div class="section-body">' + body + '</div>\n    </div>';
}

function renderSummary(text) {
  if (!text) return '';
  var paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(function(p) { return '<p>' + renderBold(p) + '</p>'; }).join('');
  return '<div class="summary">' + paragraphs + '</div>';
}

// ---------- interactions ----------
function toggleSection(el) { el.parentElement.classList.toggle('open'); }
function toggleTopic(el)   { el.parentElement.classList.toggle('open'); }

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

var activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(function(el) {
    var a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) { el.classList.add('match'); el.classList.remove('dim'); }
    else                    { el.classList.add('dim'); el.classList.remove('match'); }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(function(el) {
    el.classList.remove('match'); el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
    else if (activeFilter) clearFilter();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';

  var topicsBody = (d.topics || []).map(renderTopic).join('')
                  || '<div class="empty">No topics.</div>';

  var statsHtml = '';
  var is = d.input_stats || {};
  var parts = [];
  if (is.total_tweets != null) parts.push('total <strong>' + is.total_tweets + '</strong>');
  if (is.considered != null)   parts.push('considered <strong>' + is.considered + '</strong>');
  if (is.kept != null)         parts.push('kept <strong>' + is.kept + '</strong>');
  if (is.dropped != null)      parts.push('dropped <strong>' + is.dropped + '</strong>');
  if (is.deduped != null)      parts.push('deduped <strong>' + is.deduped + '</strong>');
  if (d.by_bank_counts) {
    var bc = Object.entries(d.by_bank_counts).map(function(e){ return e[0] + ' ' + e[1]; }).join(' · ');
    parts.push('banks: <strong>' + bc + '</strong>');
  }
  statsHtml = parts.join(' | ');

  var sections = [
    renderSummary(d.summary),
    renderSection('A', 'Bank Research', topicsBody, (d.topics || []).length),
  ].join('');

  document.getElementById('app').innerHTML = sections || '<div class="empty">No report data.</div>';

  document.querySelectorAll('.section').forEach(function(s, i) { if (i === 0) s.classList.add('open'); });
  var firstTopic = document.querySelector('.topic');
  if (firstTopic) firstTopic.classList.add('open');

  document.getElementById('stats').innerHTML = statsHtml;
}

renderReport(REPORT_DATA);
</script>
