    }
    var angleStyle = 'border-left-color:' + color + ';background:' + color + '18;';
    html += '<div class="card" data-id="' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span class="urgency">' + getUrgLabel(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + escapeHtml(item.source.split(' / ')[0].split(' — ')[0]) + '</span>' +
        '<span class="cat-tag">' + escapeHtml(item.cat) + '</span>' +
        (item.charts.count > 0 ? '<span class="chart-icon">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '') +
        '<span class="card-title">' + escapeHtml(item.title) + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + escapeHtml(item.idea) + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="' + angleStyle + '">' + escapeHtml(item.angle) + '</div>' +
        '<div class="tweets">' +
          '<div class="tweet-box tweet-a">' +
            '<div class="tweet-label tweet-label-a">TWEET A</div>' +
            '<div class="tweet-text">' + escapeHtml(item.tweetA) + '</div>' +
            '<div class="tweet-footer"><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>' +
          '</div>' +
          '<div class="tweet-box tweet-b">' +
            '<div class="tweet-label tweet-label-b">TWEET B</div>' +
            '<div class="tweet-text">' + escapeHtml(item.tweetB) + '</div>' +
            '<div class="tweet-footer"><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>' +
          '</div>' +
        '</div>' +
        chartHtml +
        (item.link ? '<div class="link-row"><a href="' + escapeHtml(item.link) + '" target="_blank">↗ Read full article</a></div>' : '') +
      '</div>' +
    '</div>';
  });
  container.innerHTML = html;
}

function buildFilters() {
  var cats = ['all'];
  ITEMS.forEach(function(item) { if (cats.indexOf(item.cat) === -1) cats.push(item.cat); });
  var catCounts = {};
  ITEMS.forEach(function(item) { catCounts[item.cat] = (catCounts[item.cat] || 0) + 1; });

  var urgCounts = { 'act-now': 0, 'deep': 0, 'watch': 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });

  var catHtml = '<span class="filter-label">Category</span>';
  cats.forEach(function(cat) {
    var label = cat === 'all' ? 'All (' + ITEMS.length + ')' : cat + ' (' + (catCounts[cat] || 0) + ')';
    var activeClass = cat === activeCat ? ' active' : '';
    var bgStyle = (cat === activeCat) ? 'style="background:' + (getCatColor(cat) || '#555') + '"' : '';
    catHtml += '<span class="pill' + activeClass + '" data-cat="' + cat + '" ' + bgStyle + ' onclick="setCatFilter(\'' + cat + '\')">' + label + '</span>';
  });
  document.getElementById('cat-filters').innerHTML = catHtml;

  var urgHtml = '<span class="filter-label">Urgency</span>';
  var urgDefs = [
    { key: 'all', label: 'All (' + ITEMS.length + ')', color: '#555' },
    { key: 'act-now', label: '🔴 Act Now (' + urgCounts['act-now'] + ')', color: '#e24b4a' },
    { key: 'deep', label: '🔵 Deep (' + urgCounts['deep'] + ')', color: '#378add' },
    { key: 'watch', label: '🟡 Watch (' + urgCounts['watch'] + ')', color: '#ef9f27' }
  ];
  urgDefs.forEach(function(u) {
    var activeClass = u.key === activeUrg ? ' active' : '';
    var bgStyle = u.key === activeUrg ? 'style="background:' + u.color + '"' : '';
    urgHtml += '<span class="pill' + activeClass + '" data-urg="' + u.key + '" ' + bgStyle + ' onclick="setUrgFilter(\'' + u.key + '\')">' + u.label + '</span>';
  });
  document.getElementById('urg-filters').innerHTML = urgHtml;
}

function buildReport() {
  var html = '<strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '<br>' +
    '<strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '<br><br>' +
    '<strong>Included sources:</strong><br>';
  META.includedSources.forEach(function(s) {
    html += '• <span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.items + ' item(s)<br>';
  });
  html += '<br><strong>Skipped sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += '• ' + s.name + ' — <em>' + s.reason + '</em><br>';
  });
  document.getElementById('report-body').innerHTML = html;
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var toggle = document.querySelector('.report-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '▼ Session Report' : '▶ Session Report';
}

function init() {
  document.getElementById('meta-line').textContent = META.date + '  ·  ' + META.time + '  ·  ' + META.itemsExtracted + ' items  ·  window ' + META.windowStart.split(' ')[1] + '–' + META.windowEnd.split(' ')[1];
  buildFilters();
  renderCards();
  buildReport();
}

init();
</script>
</body>
</html>
