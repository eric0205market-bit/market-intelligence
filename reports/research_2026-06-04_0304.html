const CAT_COLORS = {
  "macro": "#e24b4a",

function getCatColor(cat) {
  return CAT_COLORS[cat] || "#888";
}

// ---- Copy tweet function ----
function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

// ---- State ----
var activeCat = 'all';
var activeUrg = 'all';
var activeSrc = null;

// ---- Build filters ----
function buildFilters() {
  // Category counts
  var catCounts = { all: ITEMS.length };
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
  });
  var urgCounts = { all: ITEMS.length, 'act-now': 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) {
    urgCounts[item.urgency] = (urgCounts[item.urgency] || 0) + 1;
  });

  // Category filter
  var catDiv = document.getElementById('cat-filters');
  var cats = ['all'].concat(Object.keys(catCounts).filter(function(c) { return c !== 'all'; }));
  cats.forEach(function(cat) {
    var pill = document.createElement('span');
    pill.className = 'pill' + (cat === 'all' ? ' all-active' : '');
    pill.setAttribute('data-cat', cat);
    var label = cat === 'all' ? 'All (' + ITEMS.length + ')' : cat + ' (' + (catCounts[cat] || 0) + ')';
    pill.textContent = label;
    if (cat !== 'all') {
      pill.style.borderColor = getCatColor(cat);
      pill.style.color = getCatColor(cat);
    }
    pill.onclick = function() { setCat(cat); };
    catDiv.appendChild(pill);
  });

  // Urgency filter
  var urgDiv = document.getElementById('urg-filters');
  [['all','All'], ['act-now','🔴 Act Now'], ['deep','🔵 Deep'], ['watch','🟡 Watch']].forEach(function(pair) {
    var key = pair[0], label = pair[1];
    var pill = document.createElement('span');
    pill.className = 'pill' + (key === 'all' ? ' all-active' : '');
    pill.setAttribute('data-urg', key);
    pill.textContent = label + ' (' + (urgCounts[key] || 0) + ')';
    pill.onclick = function() { setUrg(key); };
    urgDiv.appendChild(pill);
  });
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('[data-cat]').forEach(function(p) {
    var c = p.getAttribute('data-cat');
    p.className = 'pill';
    if (c === cat) {
      if (c === 'all') { p.className = 'pill all-active'; }
      else {
        p.className = 'pill active';
        p.style.backgroundColor = getCatColor(c);
        p.style.color = '#fff';
        p.style.borderColor = getCatColor(c);
      }
    } else {
      if (c !== 'all') {
        p.style.backgroundColor = '';
        p.style.color = getCatColor(c);
        p.style.borderColor = getCatColor(c);
      }
    }
  });
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  document.querySelectorAll('[data-urg]').forEach(function(p) {
    var u = p.getAttribute('data-urg');
    p.className = 'pill' + (u === urg ? (urg === 'all' ? ' all-active' : ' active') : '');
    if (u === urg && urg !== 'all') {
      p.style.backgroundColor = '#1a1a1a';
      p.style.borderColor = '#1a1a1a';
      p.style.color = '#fff';
    } else {
      p.style.backgroundColor = '';
      p.style.borderColor = '';
      p.style.color = '';
    }
  });
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  // Reset cat/urg pills
  document.querySelectorAll('[data-cat]').forEach(function(p) {
    var c = p.getAttribute('data-cat');
    p.className = 'pill' + (c === 'all' ? ' all-active' : '');
    if (c !== 'all') { p.style.backgroundColor = ''; p.style.color = getCatColor(c); p.style.borderColor = getCatColor(c); }
  });
  document.querySelectorAll('[data-urg]').forEach(function(p) {
    var u = p.getAttribute('data-urg');
    p.className = 'pill' + (u === 'all' ? ' all-active' : '');
    p.style.backgroundColor = ''; p.style.borderColor = ''; p.style.color = '';
  });
  renderCards();
}

// ---- Render cards ----
function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';
  var visible = ITEMS.filter(function(item) {
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    var srcOk = !activeSrc || item.source.indexOf(activeSrc) !== -1;
    return catOk && urgOk && srcOk;
  });

  visible.forEach(function(item) {
    var urgEmoji = item.urgency === 'act-now' ? '🔴' : item.urgency === 'deep' ? '🔵' : '🟡';
    var catColor = getCatColor(item.cat);
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';

    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + item.id;

    var angleStyle = 'border-left: 2px solid ' + catColor + '; background: ' + catColor + '18; padding: 8px 12px; margin-bottom: 14px; font-style: italic; font-size: 13px; color: #444;';

    var chartHtml = '';
    if (item.charts.count > 0) {
      var hot = item.charts.hot;
      chartHtml = '<div class="charts-note' + (hot ? ' hot' : '') + '">' +
        (hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart' + (item.charts.count > 1 ? 's' : '') +
        (item.charts.desc ? ' — ' + item.charts.desc : '') +
        ' — Charts inside, worth opening</div>';
    }

    var linkHtml = item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '';

    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span class="urgency-emoji">' + urgEmoji + '</span>' +
        '<span class="source-badge" style="background:' + catColor + '">' + item.cat + '</span>' +
        '<span class="cat-tag">' + item.source.split('/')[0].trim() + '</span>' +
        (item.charts.count > 0 ? '<span class="chart-icon">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div style="' + angleStyle + '">' + item.angle + '</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box a">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text-content">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box b">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text-content">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartHtml +
        linkHtml +
      '</div>';

    container.appendChild(card);
  });

  if (visible.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;font-size:14px;">No items match current filters</div>';
  }
}

function toggleCard(id) {
  var card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

function toggleReport() {
  document.getElementById('report-card').classList.toggle('open');
}

// ---- Build session report ----
function buildReport() {
  var body = document.getElementById('report-body');
  var html = '<div class="report-row"><span>Time window</span><span>' + META.windowStart + ' → ' + META.windowEnd + '</span></div>';
  html += '<div class="report-row"><span>Emails in window</span><span>' + META.emailsInWindow + '</span></div>';
  html += '<div class="report-row"><span>Emails read</span><span>' + META.emailsRead + '</span></div>';
  html += '<div class="report-row"><span>Items extracted</span><span>' + META.itemsExtracted + '</span></div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(function(s) {
    html += '<div class="report-row"><span class="src-name" onclick="filterBySrc(\'' + s.name.replace(/\//g,'').replace(/'/g,'').trim() + '\')">' + s.name + '</span><span>' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</span></div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(function(s) {
    html += '<div class="report-row"><span>' + s.name + '</span><span style="color:#888;font-size:11px;max-width:300px;text-align:right;">' + s.reason + '</span></div>';
  });
  body.innerHTML = html;
}

// ---- Init ----
function init() {
  document.getElementById('item-count-header').textContent = ITEMS.length + ' items from ' + META.includedSources.length + ' sources';
  buildFilters();
  renderCards();
  buildReport();
}

window.onload = init;
