function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';

  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var header = document.getElementById('header-' + id);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    header.querySelector('.card-title').style.fontWeight = '600';
  } else {
    body.classList.add('open');
  }
}

function toggleReport() {
  var b = document.getElementById('reportBody');
  b.classList.toggle('open');
  var h = b.previousElementSibling;
  h.textContent = b.classList.contains('open') ? '▼ Session Report' : '▶ Session Report';
}

function applyFilters() {
  ITEMS.forEach(function(item) {
    var card = document.getElementById('card-' + item.id);
    if (!card) return;
    var catMatch = activeCat === 'all' || item.cat === activeCat;
    var urgencyMatch = activeUrgency === 'all' || item.urgency === activeUrgency;
    var srcMatch = !activeSrc || item.source.indexOf(activeSrc) !== -1;
    if (catMatch && urgencyMatch && srcMatch) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
      document.getElementById('body-' + item.id).classList.remove('open');
    }
  });
}

function filterByCat(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.classList.remove('active');
    btn.style.backgroundColor = '';
    btn.style.color = '';
  });
  var activeBtn = document.getElementById('cat-btn-' + cat);
  if (activeBtn) {
    activeBtn.classList.add('active');
    if (cat !== 'all') {
      activeBtn.style.backgroundColor = CAT_COLORS[cat] || '#333';
      activeBtn.style.color = '#fff';
    } else {
      activeBtn.style.backgroundColor = '#333';
      activeBtn.style.color = '#fff';
    }
  }
  applyFilters();
}

  activeUrgency = urgency;

        '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span>' + urgEmoji + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-tag">' + (CAT_LABELS[item.cat] || item.cat) + '</span>' +
        (chartIcon ? '<span class="chart-icon">' + chartIcon + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block">' + item.angle + '</div>' +
        '<div class="section-label">Tweets</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-col">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-col">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartsHtml +
        linkHtml +
      '</div>';

    container.appendChild(card);
  });

  // Report card
  var rb = document.getElementById('reportBody');
  var srcRows = META.includedSources.map(function(s) {
    return '<li><button class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</button> — ' + s.count + ' item(s)</li>';
  }).join('');
  var skipRows = META.skippedSources.map(function(s) {
    return '<li><strong>' + s.name + '</strong>: ' + s.reason + '</li>';
  }).join('');
  rb.innerHTML =
    '<strong>Time Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '<br/>' +
    '<strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '<br/><br/>' +
    '<strong>Included Sources</strong> (click to filter):<ul style="margin:6px 0 12px 16px;">' + srcRows + '</ul>' +
    '<strong>Skipped Sources:</strong><ul style="margin:6px 0 0 16px;">' + skipRows + '</ul>' +
    '<div class="window-note">Emails outside the 21:04–03:04 CEST window were not processed.</div>';
}

init();
</script>
</body>
</html>
