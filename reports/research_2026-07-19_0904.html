  skippedSources: [

  ]
};

const CAT_LABELS = { macro:"macro", credit:"credit", positioning:"positioning", ai:"AI/infra", crypto:"crypto",
  geopolitics:"geopolitics", energy:"energy", tech:"tech", gold:"gold", culture:"culture", labor:"labor",
  regulation:"regulation", science:"science", venture:"venture" };
const URG_LABELS = { act:"🔴 Act Now", deep:"🔵 Deep", watch:"🟡 Watch" };
const URG_EMOJI = { act:"🔴", deep:"🔵", watch:"🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id){
  var el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function setCat(cat){
  activeCat = cat;
  activeSrc = null;
  renderCards();
  renderFilters();
}
function setUrg(urg){
  activeUrg = urg;
  activeSrc = null;
  renderCards();
  renderFilters();
}
function filterBySrc(name){
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  var cards = document.querySelectorAll('.card');
  cards.forEach(function(c){
    var id = parseInt(c.id.replace('card-',''));
    var item = ITEMS.find(function(i){ return i.id === id; });
    if (item.source.indexOf(name) !== -1) {
      c.style.display = '';
      c.classList.add('open');
    } else {
      c.style.display = 'none';
      c.classList.remove('open');
    }
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderFilters(){
  var cats = {};
  ITEMS.forEach(function(i){ cats[i.cat] = (cats[i.cat]||0)+1; });
  var catBar = document.getElementById('catBar');
  var html = '<button class="pill' + (activeCat==='all'?' active':'') + '" style="' + (activeCat==='all'?'background:#3a3a3a;':'') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(cats).sort().forEach(function(c){
    var color = getComputedStyle(document.documentElement).getPropertyValue('--' + c).trim();
    var isActive = activeCat === c;
    html += '<button class="pill' + (isActive?' active':'') + '" style="' + (isActive ? ('background:'+color+';border-color:'+color+';') : ('color:'+color+';border-color:'+color+';')) + '" onclick="setCat(\'' + c + '\')">' + CAT_LABELS[c] + ' (' + cats[c] + ')</button>';
  });
  catBar.innerHTML = html;

  var urgs = {};
  ITEMS.forEach(function(i){ urgs[i.urgency] = (urgs[i.urgency]||0)+1; });
  var urgBar = document.getElementById('urgBar');
  var uhtml = '<button class="pill' + (activeUrg==='all'?' active':'') + '" style="' + (activeUrg==='all'?'background:#3a3a3a;':'') + '" onclick="setUrg(\'all\')">All</button>';
  ['act','deep','watch'].forEach(function(u){
    if(!urgs[u]) return;
    var isActive = activeUrg === u;
    uhtml += '<button class="pill' + (isActive?' active':'') + '" style="' + (isActive?'background:#3a3a3a;':'') + '" onclick="setUrg(\'' + u + '\')">' + URG_LABELS[u] + ' (' + urgs[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function renderCards(){
  var container = document.getElementById('cards');
  var filtered = ITEMS.filter(function(i){
    var okCat = activeCat === 'all' || i.cat === activeCat;
    var okUrg = activeUrg === 'all' || i.urgency === activeUrg;
    return okCat && okUrg;
  });
  if (filtered.length === 0){
    container.innerHTML = '<div class="empty-msg">No items match this filter.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(item){
    var color = getComputedStyle(document.documentElement).getPropertyValue('--' + item.cat).trim();
    var chartFlag = item.charts.count > 0 ? (item.charts.hot ? '🔥' : '📊') : '';
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span class="urg-emoji">' + URG_EMOJI[item.urgency] + '</span>';
    html += '<span class="src-badge" style="background:' + color + '">' + escapeHtml(item.source) + '</span>';
    html += '<span class="cat-tag">' + CAT_LABELS[item.cat] + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + escapeHtml(item.title) + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + escapeHtml(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '14;">' + escapeHtml(item.angle) + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0){
      html += '<div class="chart-box' + (item.charts.hot?' hot':'') + '">' + (item.charts.hot ? '🔥 ' : '📊 ') + escapeHtml(item.charts.desc) + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank" rel="noopener">↗ Read full article</a></div>';
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderHeader(){
  document.getElementById('headerMeta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items';
}

function renderReport(){
  var html = '';
  html += '<div class="rline"><strong>Time window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '. Emails outside this window were not processed.</div>';
  html += '<div class="rline"><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</div>';
  html += '<div class="section-label" style="margin-top:14px;">Included Sources</div>';
  META.includedSources.forEach(function(s){
    html += '<div class="rline">• <span class="srclink" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + escapeHtml(s.name) + '</span> — ' + s.count + ' item' + (s.count>1?'s':'') + '</div>';
  });
  if (META.skippedSources.length === 0){
    html += '<div class="section-label" style="margin-top:14px;">Skipped Sources</div>';
    html += '<div class="rline">None — all emails in the time window contained extractable content.</div>';
  } else {
    html += '<div class="section-label" style="margin-top:14px;">Skipped Sources</div>';
    META.skippedSources.forEach(function(s){
      html += '<div class="rline">• ' + escapeHtml(s.name) + ' — <em>' + escapeHtml(s.reason) + '</em></div>';
    });
  }
  document.getElementById('reportInner').innerHTML = html;
}

renderHeader();
renderFilters();
renderCards();
renderReport();
</script>
</body>
</html>
