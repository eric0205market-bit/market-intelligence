he bilateral as a closed two-player game miss this third-party stabilisation dynamic.", "quote": "The rest of the world is 'pushing for the bilateral relationship not to fall apart, not to be confrontational, but to be more cooperative, working together to solve common problems.'", "locator": "US and China: From Here to Where? session", "quote_verified": true}, {"claim": "The June 2026 Xi-Trump summit in Beijing is being read by Davos participants as a credible positive signal for near-term US-China stability.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["Xi Jinping", "Donald Trump", "Beijing"], "conviction": "medium", "so_what": "Summit-level dialogue is a leading indicator watched by credit and equity markets; its occurrence reduces near-term escalation probability and supports risk-on positioning in assets with US-China cross-exposure.", "quote": null, "locator": "US and China: From Here to Where? session", "quote_verified": false}]}, {"theme": "China 15th Five-Year Plan: Green Energy, Demographics, Consumption Deficit", "insights": [{"claim": "China's 15th Five-Year Plan centres on boosting domestic consumption, industrial revamping, and green transition acceleration, but is executing against a backdrop of a peaked population, deflationary pressure, and a social insurance scheme facing demographic stress.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["China", "Guo Lanfeng", "China Society of Economic Reform"], "conviction": "high", "so_what": "The consumption-led rebalancing thesis for China faces a structural headwind from demographics and precautionary saving; investors should discount growth forecasts reliant on a near-term domestic demand surge and focus instead on supply-side industrial and green-tech plays where state backing is firmer.", "quote": "With the reduction of the population we are going to experience downward pressure on China's social insurance scheme.", "locator": "15th Five-Year Plan, Unpacked session", "quote_verified": true}, {"claim": "Green energy paired with innovative battery storage technology is positioned by Chinese industry leaders as the path for any nation to gain energy independence from natural-resource endowment and achieve energy security under rising geopolitical tension.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["HiTHIUM", "Wu Zuyu", "China", "battery storage"], "conviction": "high", "so_what": "Battery storage and green energy infrastructure are framed as sovereign security assets, not just climate tools — this positions Chinese battery manufacturers (and their supply chains) as strategically non-discretionary suppliers globally, supporting premium pricing power and sustained demand even in a fragmented trade environment.", "quote": "Every nation is concerned about their own energy security in the face of rising geopolitical tension... green energy coupled with innovative battery storage technology could be 'ideal.'", "locator": "15th Five-Year Plan, Unpacked session", "quote_verified": true}, {"claim": "China's large-scale solar panel and battery output should be viewed as a net global positive rather than unfair overcapacity, because the world's decarbonisation need is so large that the output is structurally undersupplied in aggregate.", "speaker": "World Economic Forum", "type": "contrarian", "entities": ["Adam Tooze", "China", "photovoltaics", "batteries"], "conviction": "medium", "so_what": "Tariffs and anti-dumping measures on Chinese solar and battery exports impose real costs on the global energy transition; investors in renewable project developers outside China should model for elevated capex if protectionism persists, since the low-cost supply source is being politically constrained.", "quote": "It's very hard for me to see photovoltaics and batteries as anything but a net positive.", "locator": "15th Five-Year Plan, Unpacked session", "quote_verified": true}, {"claim": "China's relative ability to publish clear, multi-year economic plans is perceived by Western observers as a governance advantage — a 'refreshing antidote' compared to the unpredictability of US trade policy, including tariff shocks.", "speaker": "World Economic Forum", "type": "contrarian", "entities": ["Adam Tooze", "China", "United States"], "conviction": "medium", "so_what": "Policy predictability is itself a form of investment-climate quality; the implicit comparison to US tariff volatility ('Liberation Day', 'crazy tariffs') suggests global capital may increasingly price a stability premium into China-exposed industrial plans, even as geopolitical risk remains elevated.", "quote": "China's approach to global trade is straightforward — 'there's no Liberation Day, there's no crazy tariffs.'", "locator": "15th Five-Year Plan, Unpacked session", "quote_verified": true}, {"claim": "Domestic consumption in China is a pressing and unresolved issue requiring job creation and income growth before it can meaningfully contribute to the 15th Five-Year Plan's rebalancing goals.", "speaker": "World Economic Forum", "type": "causal", "entities": ["Guo Lanfeng", "China", "China Society of Economic Reform"], "conviction": "high", "so_what": "Consumer-facing businesses and foreign consumer brands betting on a Chinese spending boom should temper near-term projections; the sequencing (jobs → income → spending) implies a multi-year lag before demand materialises at scale.", "quote": "We first need to ensure that people have money to spend... to ensure people can find jobs, especially quality jobs.", "locator": "15th Five-Year Plan, Unpacked session", "quote_verified": true}]}, {"theme": "AI Transformation Gap: Pilots vs. Real Change", "insights": [{"claim": "Almost every company is doing something with AI, but very few are being truly changed by it — the majority are confusing activity (running pilots) with strategic commitment, meaning the productivity and competitive gains of AI are accruing to a small minority of companies.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["Orit Gadiesh", "Bain & Company", "AI"], "conviction": "high", "so_what": "Equity investors should distinguish between companies in 'pilot purgatory' (broad AI activity, diffuse bets, no scaled impact) and those concentrating resources on proprietary-data advantages with CEO-owned transformation programmes — the latter represent a structurally differentiated cohort likely to separate on margins over a 3-5 year horizon.", "quote": "Almost every company is doing something with AI... but very few are being truly changed by it.", "locator": "Innovating at Scale session", "quote_verified": true}, {"claim": "Companies ceding the architectural integration layer to vendors are surrendering the most strategically valuable component of AI deployment — the connective tissue that ties models to proprietary data and workflows.", "speaker": "World Economic Forum", "type": "causal", "entities": ["Orit Gadiesh", "Bain & Company", "AI"], "conviction": "high", "so_what": "Platform vendors (hyperscalers, AI infrastructure providers) capturing the enterprise integration layer are accruing durable switching-cost moats; enterprises that give this away commoditise their own AI investments and become permanently dependent on vendor pricing.", "quote": "Giving away the architectural layer that ties everything together to a vendor.", "locator": "Innovating at Scale session", "quote_verified": true}, {"claim": "Using AI purely for cost reduction is a strategic error; the correct frame is using AI to create abundance and growth for customers, with cost-cutting as a secondary outcome at best.", "speaker": "World Economic Forum", "type": "contrarian", "entities": ["Padraig McDonnell", "Agilent", "AI", "life sciences"], "conviction": "medium", "so_what": "Companies and sectors where AI is deployed primarily as a headcount reduction tool risk missing revenue-side compounding; life sciences and other R&D-intensive sectors where AI expands the hypothesis-generation frontier (new therapies, new discoveries) may deliver superior long-term returns compared to efficiency-first adopters.", "quote": "It's a fundamental mistake to think you're going to cost-cut your way with AI.", "locator": "Innovating at Scale session", "quote_verified": true}, {"claim": "AI is transitioning from a productivity augmentation tool to a scientific discovery engine capable of generating new hypotheses and therapies, representing a qualitative shift in its economic impact on R&D-intensive industries.", "speaker": "World Economic Forum", "type": "prediction", "entities": ["Le Song", "Genbio AI", "AI", "life sciences"], "conviction": "medium", "so_what": "Biotech and pharma companies integrating AI at the hypothesis-generation layer — not just process automation — are early movers in a capability shift that could compress drug discovery timelines and reshape the economics of the sector; a long position on AI-native biotech relative to legacy discovery pipelines is implied.", "quote": "AI is moving beyond productivity into generating new hypotheses, new therapies, new scientific discoveries.", "locator": "Innovating at Scale session", "quote_verified": true}, {"claim": "The current AI transition for enterprises is analogous to the shift from MS-DOS to Windows XP — a platform-level operating system change, not an application-layer upgrade — meaning companies trying to add AI onto legacy architectures will fail to capture the transition's value.", "speaker": "World Economic Forum", "type": "framework", "entities": ["Michael Liu", "Pheno Innovations", "AI"], "conviction": "medium", "so_what": "This framework implies that AI infrastructure and platform modernisation (cloud migration, data architecture overhaul, model integration layers) is a prerequisite capex cycle that precedes AI ROI realisation; vendors enabling OS-level transformation (not just apps) are positioned in the higher-value segment of the AI stack.", "quote": "AI has effectively taken us from MS-DOS to Windows XP. The solution is to change the operating system — not just download new apps onto an old one it doesn't match with.", "locator": "Innovating at Scale session", "quote_verified": true}]}], "insight_total": 15, "top_entities": ["China", "United States", "Graham Allison", "Adam Tooze", "Bain & Company", "Agilent", "Genbio AI", "HiTHIUM", "McKinsey & Company", "World Economic Forum", "Xi Jinping", "Donald Trump"], "source_meta": {"author": "", "word_count": 1642, "paywalled": false}}, {"record_id": "f5b99a7ee9ea4260", "source_type": "concepts", "source_name": "World Economic Forum", "source_url": "https://www.weforum.org/stories/2026/06/summer-davos-amnc-2026-day-2-live-updates/", "title": "Day 2 at Summer Davos 2026: China's next chapter, growth's new frontiers and the energy transition's hard questions", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-25T12:30:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Energy", "Geopolitics", "AI", "Tech", "Society"], "gist": "Summer Davos Day 2 centered on three structural tensions: China's dual role as both the world's largest carbon emitter and largest renewable installer; the fracturing of the global financial system into rival blocs amid Middle East conflict and US-China decoupling; and the gap between record $3.3 trillion in energy investment and still-fragmenting energy transition progress. The session consensus was that economic statecraft is permanent, patient capital for deep tech is structurally undersupplied, and the Global South has emerged as the decisive swing factor in global growth.", "themes": [{"theme": "China's Innovation Model: Strengths, Limits and Capital Gap", "insights": [{"claim": "China's innovation model rests on three pillars — scale, efficiency and integration of universities, industries and industrial policy — as exemplified by how electrical grids spurred AI advancements, but the model now requires capital flow to commercialise at global scale.", "speaker": "World Economic Forum", "type": "framework", "entities": ["China", "Tsinghua University", "Ya-Qin Zhang"], "conviction": "high", "so_what": "China's innovation bottleneck is not R&D but access to capital markets; HKEX and similar listings channels become strategically critical for translating China's manufacturing depth into investable growth.", "quote": "It's the integration of universities, industries and industrial policies.", "locator": "How Far Can China's Innovation Model Go? session", "quote_verified": true}, {"claim": "Capital constraints are the primary limiter of China's innovation model: companies can innovate but cannot go to market without accessible capital, according to HKEX Chairman Carlson Tong.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["China", "Hong Kong Exchanges and Clearing", "Carlson Tong"], "conviction": "high", "so_what": "Capital market access reform (e.g., HKEX listings, A-share IPO pipeline) is a direct enabler of China's next innovation cycle; watch for policy easing on listing requirements.", "quote": "You need more than to innovate. You need to be able to go to market.", "locator": "How Far Can China's Innovation Model Go? session", "quote_verified": false}, {"claim": "China's auto industry benefits from a long and complete industrial chain, but the same system creates high barriers to entry for new firms, limiting competitive disruption from within.", "speaker": "World Economic Forum", "type": "causal", "entities": ["Guangzhou Automobile Group", "Feng Xingya", "China"], "conviction": "medium", "so_what": "Incumbent Chinese OEMs are structurally protected from domestic disruption; foreign entrants and new-energy startups face a harder competitive moat than commonly assumed.", "quote": null, "locator": "How Far Can China's Innovation Model Go? session", "quote_verified": false}, {"claim": "Chinese Premier Li Qiang framed China as a hub of rapidly emerging new technologies and called for stronger global cooperation as the only path to sustained innovation, signalling an official openness agenda despite ongoing trade tensions.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["Li Qiang", "China", "World Economic Forum"], "conviction": "high", "so_what": "Signals from the Premier at a multilateral forum carry policy weight; investor positioning in China-adjacent global tech themes (AI infrastructure, renewables exports) should factor in this openness framing as a potential thaw signal.", "quote": "I believe innovation that truly transforms and benefits the world must always open up to and embrace the world.", "locator": "Opening Plenary, June 24 2026", "quote_verified": true}]}, {"theme": "Energy Transition: Progress Fragmenting Despite Record Investment", "insights": [{"claim": "A record $3.3 trillion in global energy investment in 2025 has not translated into coherent transition progress; the WEF Energy Transition Index 2026 headline finding is that progress is fragmenting, driven by extreme policy unpredictability in key markets.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["WEF Energy Transition Index 2026", "Roberto Bocca", "Kelly Sims Gallagher"], "conviction": "high", "so_what": "Capital allocation efficiency in the energy transition is poor; investors need country- and policy-specific screens rather than aggregate clean-energy exposure to capture actual returns.", "quote": null, "locator": "Energy: What did we get for $3.3 trillion? session", "quote_verified": false}, {"claim": "China's coal dependency (close to 60% of electricity) coexists with 80% control of global solar panel supply chains and a target to build 150 new nuclear reactors by 2035, creating an energy paradox with major supply-chain implications for the rest of the world.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["China", "State Grid Corporation of China", "TotalEnergies"], "conviction": "high", "so_what": "China's dual position means any acceleration of its coal phase-out would simultaneously tighten global LNG/coal markets and cheapen solar globally; watch for 15th Five-Year Plan targets on coal retirement as a macro catalyst.", "quote": null, "locator": "Driven by the green economy — China's energy system session", "quote_verified": false}, {"claim": "Solar power generation costs in China have dropped 90% in 15 years, making new renewable energy cheaper than fossil fuels in most geographies, yet grid build-out and land access are now the binding constraints on further scale.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["Longi Green Energy", "Zhong Baoshen", "China"], "conviction": "high", "so_what": "The renewable capex story is shifting from generation to grid infrastructure and storage; grid equipment makers and energy storage companies are the next structural winners in the clean energy value chain.", "quote": null, "locator": "Follow the Money: Where Climate Capital is Going session", "quote_verified": false}, {"claim": "India scaled clean energy installations from 18GW to 50GW in 2025, and Saudi Arabia has doubled renewable investment year-over-year, with solar now powering new data centre projects.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["India", "Saudi Arabia", "ReNew", "Sumant Sinha", "Lina Noureddin", "Lamar Holding"], "conviction": "high", "so_what": "Both India and the Gulf are executing renewable scale-up at pace; renewable project developers, EPC contractors and grid-tie storage in these geographies represent near-term deployment-driven investment opportunities.", "quote": null, "locator": "Follow the Money: Where Climate Capital is Going session", "quote_verified": false}, {"claim": "The Middle East conflict accelerated the energy transition by demonstrating that energy security can be met substantially through domestically generated clean energy, creating a national-security argument for renewables beyond the climate argument.", "speaker": "World Economic Forum", "type": "causal", "entities": ["Sumant Sinha", "ReNew", "Middle East", "Strait of Hormuz"], "conviction": "high", "so_what": "Energy security framing re-prices renewables as a strategic infrastructure asset rather than a green premium product; this broadens the political coalition for deployment and improves regulatory durability of renewable investments.", "quote": null, "locator": "Follow the Money: Where Climate Capital is Going session", "quote_verified": false}, {"claim": "China Southern Power Grid's renewable utilisation rate has exceeded 198%, replacing 2,240 billion kilowatt-hours of traditional energy supply — demonstrating that industrial cluster electrification at scale is operationally proven.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["China Southern Power Grid", "Liu Wei"], "conviction": "medium", "so_what": "China's grid operator performance metrics validate the industrial cluster model for green power procurement; this is a benchmark against which other geographies' industrial decarbonisation programmes can be evaluated.", "quote": null, "locator": "The Latest on Industrial Clusters session", "quote_verified": false}]}, {"theme": "Industrial Clusters as Green Transition Vehicles", "insights": [{"claim": "Industrial clusters are being framed as 'the growth opportunity of the century' because they provide co-location of technologies, policy frameworks and business models, enabling full-systems integration that no single company or industry can achieve alone.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["Mercedes Maroto-Valer", "IDRIC", "Roberto Bocca", "WEF"], "conviction": "high", "so_what": "Co-located industrial clusters in China and the UK are demonstrating a replicable model; investors in industrial park operators, hydrogen infrastructure and grid-tied storage around these clusters have structural advantages.", "quote": "The transition of the industrial clusters is without any doubt the growth opportunity of this century.", "locator": "The Latest on Industrial Clusters session", "quote_verified": true}, {"claim": "Jinpu New Area industrial cluster in Dalian achieved 6.2% economic growth in 2025 while cutting carbon emissions by 11%, citing hydrogen fuel cells in public transport as a live deployment.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["Jinpu New Area", "Dalian", "Leng Xuefeng"], "conviction": "medium", "so_what": "Documented decoupling of economic growth and emissions at the cluster level provides a proof-of-concept for green industrial policy; similar clusters globally are the early deployment sites for hydrogen and advanced grid technologies.", "quote": null, "locator": "The Latest on Industrial Clusters session", "quote_verified": false}]}, {"theme": "Geopolitics, Economic Statecraft and Iran Deal Dynamics", "insights": [{"claim": "A 60-day US-Iran ceasefire signed on 17 June 2026 opens negotiations not just on the nuclear issue but a range of economic issues; Iran's decision-making has consolidated into a smaller pragmatic circle that now prioritises economic survival over geopolitical ideology.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["Iran", "United States", "Mahmood Sariolghalam", "Middle East Institute", "Jason Bordoff", "Columbia University"], "conviction": "medium", "so_what": "A durable Iran deal would re-open ~2-3 mb/d of oil supply, compress oil risk premium and ease LNG supply chains; outcome hinges on domestic politics in Iran, Israel (October elections) and the US (November midterms).", "quote": "Their survival in the near to medium term hinges on economics, not much geopolitics anymore.", "locator": "Update on Iran session", "quote_verified": true}, {"claim": "Gulf states view an Iran deal as essential to their own long-term stability and are at risk of 'outsourcing' regional security to the Trump administration if they do not actively shape the negotiation outcome.", "speaker": "World Economic Forum", "type": "causal", "entities": ["Gulf states", "Sanam Vakil", "Chatham House", "Iran"], "conviction": "medium", "so_what": "Gulf sovereign wealth funds and regional investors have a direct economic interest in deal success; watch GCC statements on Iran as a leading indicator of deal momentum.", "quote": "They worry that a no-deal scenario will result in continued instability and perhaps another round of war.", "locator": "Update on Iran session", "quote_verified": true}, {"claim": "Economic statecraft is a permanent feature of the global economy — not a transient shock — and investors must embed local political and geopolitical risk monitoring into investment process rather than treating it as an external variable.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["Aparna Bharadwaj", "Zou Ling", "Leslie Vinjamuri"], "conviction": "high", "so_what": "Portfolio construction needs explicit geopolitical scenario overlays; single-country concentration risk in EM is materially under-priced relative to the stated permanence of economic statecraft.", "quote": "There's no way to predict it, but there's a lot you can do to prevent potential red flags.", "locator": "From economic swing states to economic statecraft: new growth maps session", "quote_verified": true}, {"claim": "Large corporations are not passive recipients of geopolitical disruption but are powerful actors with a responsibility to shape the political and social environment, pointing toward a new form of stakeholder capitalism with harder political edges.", "speaker": "World Economic Forum", "type": "contrarian", "entities": ["Leslie Vinjamuri"], "conviction": "medium", "so_what": "ESG frameworks focused on firm-level compliance understate the agency of large multinationals; expect increasing regulatory and reputational scrutiny of corporate geopolitical positioning, especially in supply chain decisions.", "quote": "Business is not just on the receiving end of geopolitical disruption, but is rather a powerful actor.", "locator": "From economic swing states to economic statecraft session", "quote_verified": true}]}, {"theme": "Deep Tech Capital Structure Mismatch and AI Conflation Risk", "insights": [{"claim": "The deep tech revolution is real but capital structures (VC timelines, return expectations) have not adapted; AI is being systematically conflated with deep tech, causing investors to miss genuine opportunities in biotech, quantum and advanced materials.", "speaker": "World Economic Forum", "type": "contrarian", "entities": ["Annali Domingo", "Jonathan (Bain Capital China)", "Brandon (Archetype)"], "conviction": "high", "so_what": "AI-labelled investment vehicles may be crowded relative to fundamentals while genuine deep tech (quantum, biotech, advanced materials) is structurally underfunded; differentiated allocation within the tech bucket has high alpha potential.", "quote": "AI is not deep tech, and deep tech is not AI.", "locator": "When will deep tech show its promise? session", "quote_verified": true}, {"claim": "Productivity gains from genuine technological change take 20 to 40 years to materialise (Robert Solow, 1987 observation cited in context of current AI/deep tech cycle), implying current AI valuations pricing near-term productivity gains are likely premature.", "speaker": "World Economic Forum", "type": "framework", "entities": ["Robert Solow", "Annali Domingo"], "conviction": "medium", "so_what": "Solow's technology productivity lag applied to AI suggests investors focused on 2-5 year earnings uplift from AI may be disappointed; long-duration patient capital structures are the appropriate vehicle for deep tech exposure.", "quote": null, "locator": "When will deep tech show its promise? session", "quote_verified": false}, {"claim": "Companies that delay their first step into AI forfeit the // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
