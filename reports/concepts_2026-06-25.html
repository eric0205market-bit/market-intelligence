on China, opening a narrow window for U.S./allied trade-control intervention.", "themes": [{"theme": "Scale of damage to Iran's military", "insights": [{"claim": "U.S. and Israeli strikes in 2026 destroyed nearly all of Iran's conventional naval surface fleet and partially blocked principal ports including Bandar Abbas with sunken vessels, halting bulk cargo offloading needed for reconstitution.", "speaker": "CSIS", "type": "data_point", "entities": ["Iran", "Bandar Abbas Naval Base", "Bushehr Naval Base", "Bandar Anzali", "IRIN", "IRGCN"], "conviction": "high", "so_what": "Port blockage is the binding constraint on Iran's entire rebuild; watch salvage activity and channel-clearing as the leading reconstitution indicator.", "quote": null, "locator": "What Is Gone: Assessing the Damage", "quote_verified": false}, {"claim": "U.S. government assessments report Iran retains 70 percent of its prewar missile stockpile but only 40 percent of its drone arsenal after expending an estimated 60 percent of drones and 30 percent of missiles in the conflict.", "speaker": "CSIS", "type": "data_point", "entities": ["Iran", "New York Times", "Washington Post"], "conviction": "medium", "so_what": "Drones are the more depleted and doctrine-central capability, signaling drone-component procurement will be Iran's most urgent and trackable demand.", "quote": null, "locator": "Reports vary on the extent", "quote_verified": false}, {"claim": "Iran's missile and nuclear infrastructure is largely housed in hardened underground facilities, making the true extent of production-capacity damage publicly unknowable from open sources.", "speaker": "CSIS", "type": "framework", "entities": ["Iran", "Parchin Military Complex"], "conviction": "high", "so_what": "Surviving underground capacity means missile reconstitution may be faster and harder to verify than visible surface damage suggests.", "quote": null, "locator": "Weapons and Munitions", "quote_verified": false}]}, {"theme": "Collapse of UAE reexport hub and new procurement routes", "insights": [{"claim": "95 percent of the UAE's direct non-oil exports to Iran in 2024 were reexports rather than UAE-produced goods, making the Emirates Iran's central laundering hub for foreign-origin dual-use items.", "speaker": "CSIS", "type": "data_point", "entities": ["UAE", "Iran", "UAE Ministry of Economy and Tourism"], "conviction": "high", "so_what": "The UAE channel was a transshipment conduit, not a production source; disrupting it forces Iran to expose new and less-developed routes.", "quote": "95 percent of the UAE's direct, non-oil exports to Iran in 2024 were reexports.", "locator": "How Iran Will Seek to Procure New Trade Routes", "quote_verified": true}, {"claim": "Iran launched over 2,800 missiles and drones at the UAE between February and May 2026—more than at any other country including Israel—prompting the UAE to close its Tehran embassy and strike Iranian targets, likely ending the UAE-Iran trade relationship.", "speaker": "CSIS", "type": "causal", "entities": ["Iran", "UAE", "Israel"], "conviction": "high", "so_what": "Iran self-destroyed its own top procurement channel; the collapse of UAE flows is the key inflection point creating the policy window.", "quote": null, "locator": "Iranian strikes on UAE territory", "quote_verified": false}, {"claim": "Pakistan reportedly authorized reexports to Iran through its ports and territory as of April 25, 2026, offering a contiguous land route less exposed to U.S. or Israeli interdiction.", "speaker": "CSIS", "type": "prediction", "entities": ["Pakistan", "Iran"], "conviction": "medium", "so_what": "Watch third-country export increases to Pakistan with no domestic demand as an early indicator of Iran's rebalanced procurement architecture.", "quote": null, "locator": "Pakistan reportedly authorized reexports", "quote_verified": false}, {"claim": "The Caspian Sea route via Azerbaijan, Kazakhstan, and Turkmenistan into Iran's northern ports of Bandar Anzali and Amirabad is an attractive procurement pathway because it bypasses Persian Gulf chokepoints and is governed only by its five littoral states, making it hard to interdict.", "speaker": "CSIS", "type": "thesis", "entities": ["Caspian Sea", "Azerbaijan", "Kazakhstan", "Turkmenistan", "Russia", "Iran"], "conviction": "medium", "so_what": "Caspian transit lies outside U.S./allied maritime interdiction reach, so enforcement must shift to upstream third-country export monitoring.", "quote": null, "locator": "Iran is also likely to develop more procurement pathways", "quote_verified": false}]}, {"theme": "China as supplier of first resort", "insights": [{"claim": "China is the most likely supplier of first resort across all four of Iran's priority procurement categories—marine salvage equipment, machine tools, drone components, and marine engines—as Chinese goods are generally good enough even when Western versions are preferable.", "speaker": "CSIS", "type": "thesis", "entities": ["China", "Iran"], "conviction": "high", "so_what": "China's role is structural and broad-based; sanctions strategy must center on Chinese-origin and China-transiting flows rather than residual Western trade.", "quote": null, "locator": "China-Predominant Sourcing", "quote_verified": false}, {"claim": "China leads global machine tool production at 36.9 percent in 2025 and exports at 21.6 percent in early 2026, and Iran's German CNC tool imports have already been largely replaced by Chinese imports.", "speaker": "CSIS", "type": "data_point", "entities": ["China", "Germany", "Iran"], "conviction": "high", "so_what": "The substitution toward Chinese machine tools is already underway, narrowing the leverage from Western export controls on finished tools.", "quote": null, "locator": "Machine Tool Imports", "quote_verified": false}, {"claim": "Germany's Siemens and Japan's Fanuc dominate CNC machine tool controllers—the 'brain' of every CNC machine—with Fanuc on an estimated 50-60 percent and Siemens on 20-25 percent of CNC machines worldwide, and Chinese CNC machines including Anhui-based WMTCNC embed these same controllers.", "speaker": "CSIS", "type": "framework", "entities": ["Siemens", "Fanuc", "Germany", "Japan", "WMTCNC", "China"], "conviction": "high", "so_what": "The controller chokepoint is the highest-leverage disruption point; extraterritorial controls on Siemens/Fanuc content embedded in Chinese tools could choke Iran's high-end production.", "quote": null, "locator": "However, Germany's Siemens and Japan's Fanuc dominate", "quote_verified": false}, {"claim": "Entities in China are a key source of Western-origin electronics for Iranian drone makers, but Iranian and Russian drone programs are increasingly using domestic Chinese components subject to U.S. foreign direct product rule controls.", "speaker": "CSIS", "type": "causal", "entities": ["China", "Iran", "Russia"], "conviction": "medium", "so_what": "The shift to domestic Chinese components erodes Western chokepoints but keeps items within reach of U.S. extraterritorial FDP rules.", "quote": null, "locator": "Drone Component Imports", "quote_verified": false}]}, {"theme": "Trade-control landscape and policy levers", "insights": [{"claim": "The key gap among allied Iran sanctions regimes is extraterritoriality: U.S. controls follow the item via reexport and foreign direct product rules, while EU and Japanese controls generally stop at the border of the first export.", "speaker": "CSIS", "type": "framework", "entities": ["United States", "European Union", "Japan", "Iran"], "conviction": "high", "so_what": "Closing this extraterritorial gap is the central policy recommendation; EU/Japan adopting U.S.-style reach is the structural fix for circumvention.", "quote": null, "locator": "The main difference between the three sanctions regimes", "quote_verified": false}, {"claim": "Extending the EU's Russia-sanctions tools to Iran—chiefly a 'no reexport to Iran' contract clause and the anti-circumvention authority first used in April 2026 against Kyrgyzstan—is the recommended way to close gaps as UAE reexport networks migrate.", "speaker": "CSIS", "type": "thesis", "entities": ["European Union", "Russia", "Iran", "Kyrgyzstan"], "conviction": "high", "so_what": "The Russia playbook is a ready template; watch for EU adoption of a no-reexport-to-Iran clause as the signal that enforcement is tightening.", "quote": null, "locator": "Conclusion", "quote_verified": false}, {"claim": "Direct trade between Iran and U.S. allies is already limited, with the EU exporting $4.3 billion in goods to Iran in 2024 and Japan only $89 million, meaning the procurement problem is overwhelmingly one of indirect transshipment rather than direct sales.", "speaker": "CSIS", "type": "data_point", "entities": ["European Union", "Japan", "Iran"], "conviction": "high", "so_what": "Enforcement value lies in third-country transshipment controls, not in cutting already-small direct allied trade flows.", "quote": null, "locator": "There is already limited direct trade", "quote_verified": false}, {"claim": "Iran has over 40 years of experience operating worldwide covert acquisition networks, and Iranian distributor Technoset openly advertised import and clearance of sanctioned U.S., German, and Japanese goods on Instagram after EU sanctions were reimposed in December 2025.", "speaker": "CSIS", "type": "anecdote", "entities": ["Iran", "Technoset", "Siemens", "Fanuc", "Heidenhain", "Mitsubishi"], "conviction": "high", "so_what": "Illicit networks are entrenched and brazen; expect increasingly complex multi-intermediary routing that raises costs and slows but does not stop procurement.", "quote": "import and clearance of goods from the United States, Germany, and Japan . . . lifting sanctions", "locator": "Iranian distributors have long had access", "quote_verified": true}]}, {"theme": "Transshipment hubs and trade-data signals", "insights": [{"claim": "Iran claims far more imports of CNC controllers and machine tools from Turkey than Turkey reports sending to Iran, a sizeable discrepancy indicating concealed procurement routes via Turkish intermediary companies shipping from elsewhere.", "speaker": "CSIS", "type": "causal", "entities": ["Turkey", "Iran", "Russia", "China"], "conviction": "medium", "so_what": "Mirror-statistics gaps between importer and exporter reporting are an actionable analytical tool for detecting hidden transshipment.", "quote": null, "locator": "Iran also reports significant imports of CNC machine tools from Russia", "quote_verified": false}, {"claim": "Iran's imports of high-powered gas turbines rose significantly from 2020 to 2025 shipped almost exclusively from Turkey, and marine compression-ignition engine imports rose roughly 500 percent from 2021 to 2025 coming almost exclusively from the UAE, with Iran being essentially the only destination for the UAE's large engine-component shipments.", "speaker": "CSIS", "type": "data_point", "entities": ["Iran", "Turkey", "UAE", "GE Marine", "European Union", "Japan"], "conviction": "high", "so_what": "Concentrated single-source flows with no plausible domestic demand are red flags; these specific commodity-route pairs are the highest-priority monitoring targets.", "quote": null, "locator": "Marine Engine Imports", "quote_verified": false}, {"claim": "China's CAMA (Luoyang) Electromechanic, a military-civil fusion entity under AVIC, contracted to supply Iran with drone engine-testing dynamometers via the sanctioned Iranian company Sahara Thunder, illustrating direct Chinese state-linked support to Iran's drone program.", "speaker": "CSIS", "type": "anecdote", "entities": ["CAMA (Luoyang) Electromechanic", "AVIC", "China Airborne Missile Academy", "Sahara Thunder", "Iran"], "conviction": "medium", "so_what": "Chinese state-affiliated defense entities are directly enabling Iran's drone R&D, raising the stakes for diplomatic pressure on Beijing.", "quote": null, "locator": "Drone Component Imports", "quote_verified": false}]}], "insight_total": 18, "top_entities": ["Iran", "China", "UAE", "Turkey", "Siemens", "Fanuc", "European Union", "Russia", "Pakistan", "Caspian Sea", "United States", "IRGCN"], "source_meta": {"author": "Kate Koren, Patrick Panjeti, Emma Surnow, Kevin Kurland, Omar Al-Ghusbi", "word_count": 4725, "paywalled": false}}, {"record_id": "abea60bbd824b129", "source_type": "concepts", "source_name": "CSIS", "source_url": "https://www.csis.org/analysis/iran-won-negotiation-even-though-it-lost-war", "title": "Iran Won the Negotiation, Even Though It Lost the War", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-25T15:31:31Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Energy", "Macro"], "gist": "A now-public U.S.-Iran framework agreement is heavily tilted toward Tehran, granting it near-immediate sanctions waivers, an end to the naval blockade, release of frozen assets and ~$300B in reconstruction funds, while the U.S. and Israel get little and many enforcement details remain unresolved. The deal reopens Iranian oil flows and clears the Strait of Hormuz, easing a second oil shock in five years.", "themes": [{"theme": "Oil supply and energy market impact", "insights": [{"claim": "The framework ends the U.S. naval blockade within 30 days and grants immediate oil-sale waivers, so Iranian oil starts flowing and clearing the Strait of Hormuz almost immediately, easing what the author calls the second oil shock in five years.", "speaker": "Emily Harding", "type": "causal", "entities": ["Iran", "Strait of Hormuz", "crude oil", "United States"], "conviction": "high", "so_what": "Expect downward pressure on crude prices and shipping/insurance risk premia as Iranian barrels and Hormuz transit normalize; watch tanker rates and Gulf supply restoration.", "quote": "Iranian oil starts flowing out and cash starts flowing in almost immediately, with an expectation of roughly status quo ante shipping.", "locator": "Iran also wins a pledge of noninterference", "quote_verified": true}, {"claim": "Two oil shocks within five years may push the world toward real, permanent steps toward renewables, per the author.", "speaker": "Emily Harding", "type": "prediction", "entities": ["renewables", "crude oil", "Gulf states"], "conviction": "low", "so_what": "A structural tailwind argument for renewable/energy-transition exposure tied to repeated oil-supply volatility.", "quote": "This is the second oil shock in five years, which might be enough to push the world to take real, permanent steps toward renewables.", "locator": "The Bottom Line", "quote_verified": true}]}, {"theme": "Capital flows and reconstruction", "insights": [{"claim": "Iran is in line for an estimated $300 billion in reconstruction and economic development funds, with the author warning the money could flow to IRGC leaders who control Iranian security and own most of its profitable businesses.", "speaker": "Emily Harding", "type": "data_point", "entities": ["Iran", "Islamic Revolutionary Guard Corps (IRGC)", "reconstruction"], "conviction": "medium", "so_what": "A large reconstruction pool plus asset unfreezing signals capital inflows to Iran; sanctions-exposed counterparties and IRGC-linked entities are the key risk/compliance watch items.", "quote": "There is plenty of room for that money to land in the pockets of Islamic Revolutionary Guard Corps (IRGC) leaders.", "locator": "How will the $300 billion", "quote_verified": true}, {"claim": "The U.S. undertakes to terminate all types of sanctions and release frozen Iranian assets to be made fully usable for payment to any beneficiary designated by Iran's central bank, though full sanctions relief belongs to the final deal not the interim framework.", "speaker": "Emily Harding", "type": "data_point", "entities": ["Iran", "United States", "Central Bank of Iran", "sanctions"], "conviction": "medium", "so_what": "Phased sanctions unwind reopens Iranian banking and trade channels; hedge word 'undertakes' means timing risk on relief, so position for gradual, contested implementation.", "quote": "made fully usable for payment to any ultimate beneficiary designated by the Central Bank of [Iran]", "locator": "Same with the release of frozen assets", "quote_verified": true}]}, {"theme": "Deal durability and execution risk", "insights": [{"claim": "The framework is lopsided toward Iran, which receives most of what it wants up front before final-deal negotiations even begin, leaving many 'trap doors' through which Iran can escape or the deal can collapse.", "speaker": "Emily Harding", "type": "thesis", "entities": ["Iran", "United States", "Israel"], "conviction": "high", "so_what": "Treat the ceasefire as fragile and front-loaded; price in re-escalation risk because Iran banks gains before committing to enforceable terms.", "quote": "Iran gets most of what it wants, and it gets it up front—before negotiations on a final deal even start.", "locator": "What Iran Got", "quote_verified": true}, {"claim": "U.S.-Israel interests are not aligned in the deal—the U.S. wants the conflict over, Iran wants to survive and claim a win, and Israel prefers Iran neutralized—making the arrangement a wobbly three-legged stool that Iran could exploit to widen the U.S.-Israel gap.", "speaker": "Emily Harding", "type": "framework", "entities": ["United States", "Israel", "Iran", "Hezbollah"], "conviction": "high", "so_what": "Divergent allied incentives raise odds of unilateral Israeli action or deal breakdown; monitor Lebanon/Hezbollah flashpoints as the most likely trigger.", "quote": "This dynamic is a wobbly three-legged stool", "locator": "Israel, notably, is implicitly included", "quote_verified": true}, {"claim": "The agreement leaves enriched uranium under Iranian control via on-site downblending and leaves IAEA inspection terms unresolved, which the author predicts will become a contested mess.", "speaker": "Emily Harding", "type": "prediction", "entities": ["Iran", "International Atomic Energy Agency", "enriched uranium"], "conviction": "medium", "so_what": "Unresolved nuclear verification keeps tail risk of renewed conflict alive; inspection disputes are the leading indicator of whether the truce holds.", "quote": "If past International Atomic Energy Agency inspection fights are any indication, this is going to be a mess.", "locator": "Then there’s the disposition of the enriched uranium", "quote_verified": true}, {"claim": "The framework assumes the UN Security Council will pass a binding resolution with the U.S. effectively speaking for all permanent members, but Russia could play spoiler with its veto.", "speaker": "Emily Harding", "type": "causal", "entities": ["UN Security Council", "Russia", "United States"], "conviction": "medium", "so_what": "A Russian veto is a concrete path to deal failure at the UN stage; watch Moscow's posture as a swing factor on enforceability.", "quote": null, "locator": "How does the UN Security Council pass a binding resolution", "quote_verified": false}]}, {"theme": "U.S. political and Gulf-relations dimension", "insights": [{"claim": "The U.S. gains two off-text benefits: hope for a global economic recovery before the November midterm elections as Americans feel gas prices and inflation, and a patched-up relationship with Gulf royals who suffered major oil-export losses.", "speaker": "Emily Harding", "type": "thesis", "entities": ["United States", "Gulf states", "midterm elections", "crude oil"], "conviction": "medium", "so_what": "Domestic political incentive to keep oil/inflation easing implies U.S. will push to preserve the truce into November; Gulf normalization supports regional risk-asset stabilization.", "quote": "hope for a global economic recovery before the November midterm elections", "locator": "The Bottom Line", "quote_verified": true}]}], "insight_total": 9, "top_entities": ["Iran", "Israel", "United States", "Strait of Hormuz", "Islamic Revolutionary Guard Corps (IRGC)", "Hezbollah", "International Atomic Energy Agency", "crude oil", "Gulf states", "Russia"], "source_meta": {"author": "Emily Harding", "word_count": 1397, "paywalled": false}}, {"record_id": "c4ff4f823e1fc186", "source_type": "concepts", "source_name": "CSIS", "source_url": "https://www.csis.org/analysis/war-may-be-ending-what-did-epic-fury-cost", "title": "The War May Be Ending. What Did Epic Fury Cost?", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-25T15:31:31Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Macro"], "gist": "CSIS estimates the February 2026 U.S. campaign against Iran (Operation Epic Fury) cost the DOD roughly $40 billion, with munitions ($26.1B) the dominant component and base damage ($4-9.4B) the largest source of disagreement with official estimates. Neither the FY26 nor FY27 budgets include war costs, setting up a contentious funding fight in Congress.", "themes": [{"theme": "War cost magnitude and accounting", "insights": [{"claim": "CSIS estimates the total DOD cost of the February 2026 U.S. campaign against Iran (Operation Epic Fury) at roughly $40 billion (range $34B-$42B), covering only incremental costs above the existing budget across six categories.", "speaker": "CSIS", "type": "data_point", "entities": ["CSIS", "Operation Epic Fury", "Iran", "Department of Defense"], "conviction": "high", "so_what": "Establishes a credible nonpartisan baseline for the supplemental appropriation fight that will shape near-term defense spending and reprogramming risk.", "quote": null, "locator": "With a ceasefire agreement signed, negotiations ongoing", "quote_verified": false}, {"claim": "The CSIS $40B estimate sits below the Iran War Cost Tracker's $113B (which extrapolated a $1B/day early figure) and Moody's $132B Americans-cost figure, but exceeds early official DOD estimates of $25B-$29B that excluded base damage.", "speaker": "CSIS", "type": "framework", "entities": ["CSIS", "Iran War Cost Tracker", "Moody's", "American Enterprise Institute", "Cost of War Project", "Brown University"], "conviction": "medium", "so_what": "Wide dispersion across estimates ($25B to $132B) signals high uncertainty; investors tracking defense budgets should anchor to incremental-cost framing rather than headline daily-burn extrapolations.", "quote": null, "locator": "How This Estimate Compares to Others", "quote_verified": false}, {"claim": "Daily war costs were highly non-linear, falling sharply after the first six days ($11.3 billion) as coalition forces gained air superiority and shifted from expensive long-range missiles to cheaper short-range munitions.", "speaker": "CSIS", "type": "causal", "entities": ["Department of Defense", "Iran"], "conviction": "high", "so_what": "The cost curve shows munitions mix, not duration, drove spend; demand surge concentrated in high-end strike missiles rather than across the board.", "quote": null, "locator": "Some lawmakers have expressed skepticism", "quote_verified": false}]}, {"theme": "Munitions expenditure and replacement", "insights": [{"claim": "Munitions are the single largest war cost at $26.1 billion, with U.S. forces firing 13,629 strike munitions against more than 13,000 targets, plus 49 Tomahawks on June 10 during ceasefire skirmishing; all inventories require replacement given prewar stocks were inadequate.", "speaker": "CSIS", "type": "data_point", "entities": ["Tomahawk", "JASSM", "PrSM", "ATACMS", "Admiral Brad Cooper", "Central Command"], "conviction": "high", "so_what": "Massive replenishment demand for high-end strike missiles (Tomahawk, JASSM, PrSM/ATACMS) points to multiyear order backlogs for prime missile makers like RTX and Lockheed Martin.", "quote": null, "locator": "Munitions: $26.1 billion", "quote_verified": false}, {"claim": "Low-cost strike alternatives such as LUCAS, a U.S. copy of the Iranian Shahed 136 drone, are not yet in serial production, leaving the U.S. reliant on expensive long-range munitions.", "speaker": "CSIS", "type": "thesis", "entities": ["LUCAS", "Shahed 136"], "conviction": "medium", "so_what": "A cost-asymmetry gap creates a procurement opening for cheap attritable munitions; watch for accelerated low-cost drone/missile programs and suppliers entering serial production.", "quote": null, "locator": "Note that all the long-range attack munitions", "quote_verified": false}, {"claim": "Cost per equivalent payload varies dramatically: a JDAM-guided dumb bomb delivers a 1,000-lb payload for about $100,000 versus $2.6 million for a Tomahawk, making interceptor and munition mix the decisive cost driver.", "speaker": "CSIS", "type": "framework", "entities": ["JDAM", "Tomahawk"], "conviction": "high", "so_what": "Demonstrates the procurement value of cheap precision-guidance kits; expect demand emphasis on JDAM-class upgrades over premium cruise missiles where air superiority allows.", "quote": "A single dumb bomb fitted with a JDAM guidance kit and a Tomahawk both deliver 1,000 lb payloads with extreme precision but at a much different cost ($2.6 million versus $100,000).", "locator": "The coalition's success in rapidly suppressing", "quote_verified": true}]}, {"theme": "Base damage, equipment losses and Iranian precision", "insights": [{"claim": "Base and fixed-infrastructure damage is the most contested cost category at $4.0B-$9.4B (rising to $3.2B-$9.2B if Washington Post's 228-structure count is used), and it is excluded entirely from official DOD estimates because the Pentagon is reviewing its Middle East posture.", "speaker": "CSIS", "type": "contrarian", "entities": ["Iran", "Washington Post", "Department of Defense"], "conviction": "medium", "so_what": "The single biggest gap between CSIS and official figures; a satellite-imagery embargo and posture review mean true reconstruction costs and locations remain unresolved budget risk.", "quote": null, "locator": "Damage to Bases and Fixed Infrastructure", "quote_verified": false}, {"claim": "Iranian strikes on U.S. bases were highly precise with no random craters, suggesting Iran developed targeting from decades of preparation and on-the-ground agents, possibly aided by Russian or Chinese intelligence for mobile targets.", "speaker": "CSIS", "type": "thesis", "entities": ["Iran", "Russia", "China"], "conviction": "medium", "so_what": "Demonstrated adversary precision-strike capability against fixed U.S. bases raises the strategic value of base hardening, dispersal, and active missile defense investment.", "quote": "The images make clear the Iranian strikes were precise. There are no random craters indicating misses or wasted assets.", "locator": "The images make clear the Iranian strikes", "quote_verified": true}, {"claim": "The Congressional Research Service identified 42 lost or damaged aircraft (mostly uncrewed drones), with replacement costs of $1.8B-$3.5B; the U.S. deliberately risked uncrewed over crewed aircraft.", "speaker": "CSIS", "type": "data_point", "entities": ["Congressional Research Service", "F-15EX", "F-35A", "A-10", "THAAD"], "conviction": "high", "so_what": "Attrition concentrated in drones validates the unmanned-systems doctrine and points to replacement demand skewing toward attritable platforms plus high-end fighters (F-15EX, F-35A).", "quote": null, "locator": "Equipment Losses and Damages", "quote_verified": false}]}, {"theme": "Economic, human and fuel costs", "insights": [{"claim": "Higher fuel prices added $1.4B in DOD costs as the budgeted $3.67/gallon jet fuel rose to about $4.46/gallon, while the Cost of War Project estimated $40B in additional fuel costs to the broader American public.", "speaker": "CSIS", "type": "data_point", "entities": ["Department of Defense", "Cost of War Project", "Strait of Hormuz"], "conviction": "medium", "so_what": "Energy-price spillover from Hormuz disruption is the main macro channel; a stable peace and reopened strait should ease fuel inflation over the following six months.", "quote": null, "locator": "Fuel: $1.4 billion", "quote_verified": false}, {"claim": "Future veterans' costs are projected at $400 million annually and roughly $12 billion over 30 years for the ~70,000 service members involved, far below Iraq/Afghanistan levels due to shorter duration and fewer personnel.", "speaker": "CSIS", "type": "prediction", "entities": ["Veterans Affairs", "Iraq", "Afghanistan"], "conviction": "medium", "so_what": "A large off-budget future liability with no accrual system; signals long-tail federal obligations that fall outside current appropriation debates.", "quote": null, "locator": "Future Veterans' Costs", "quote_verified": false}]}, {"theme": "Funding mechanism and political risk", "insights": [{"claim": "No war costs are funded in the FY2026 DOD budget or the FY2027 proposal, and defense officials warn of an operating-funds shortage by late summer 2026 unless covered via a supplemental, FY2027 amendment, or reprogramming.", "speaker": "CSIS", "type": "prediction", "entities": ["Department of Defense", "Congress", "White House"], "conviction": "high", "so_what": "Near-term liquidity gap for the Pentagon creates timing risk; watch for a supplemental request, which defense hawks prefer to avoid diverting modernization funds.", "quote": null, "locator": "Now What?", "quote_verified": false}, {"claim": "The $153 billion in FY2026 reconciliation funds (One Big Beautiful Bill) could theoretically cover war costs, but the legislation provided no transfer authority, so any movement requires new congressional legislation rather than simple reprogramming.", "speaker": "CSIS", "type": "framework", "entities": ["Congress", "One Big Beautiful Bill", "Department of Defense"], "conviction": "high", "so_what": "Funding war costs becomes a contentious legislative battle attracting antiwar sentiment, including among Republicans; budget uncertainty persists for defense contractors awaiting replenishment orders.", "quote": "The shooting war has ended, but the budget war has just begun.", "locator": "In theory, some of the $153 billion", "quote_verified": true}]}], "insight_total": 13, "top_entities": ["Iran", "Operation Epic Fury", "Department of Defense", "CSIS", "Tomahawk", "Congress", "Washington Post", "Strait of Hormuz", "JDAM", "Cost of War Project", "One Big Beautiful Bill"], "source_meta": {"author": "Mark F. Cancian and Chris H. Park", "word_count": 3443, "paywalled": false}}, {"record_id": "f4270eca660c2b4d", "source_type": "concepts", "source_name": "CSIS", "source_url": "https://www.csis.org/analysis/after-maduro-human-trafficking-and-vulnerability-venezuelan-migrants-colombia", "title": "After Maduro: Human Trafficking and the Vulnerability of Venezuelan Migrants in Colombia", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-25T15:31:31Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society"], "gist": "Following the U.S. capture of Nicolas Maduro in January 2026, Venezuelan migrants in Colombia face heightened human-trafficking risk amid political instability, with trafficking functioning as a structured revenue stream for armed groups (ELN, Tren de Aragua, Clan del Golfo) and a mechanism that sustains state fragility on both sides of the border.", "themes": [{"theme": "Post-Maduro political transition risk", "insights": [{"claim": "The U.S. captured Nicolas Maduro on January 3, 2026, but Venezuela's political transition remains fragile, with the Maduro regime continuing under Delcy Rodriguez and concerns over a prolonged or indefinite electoral process and slowed economic recovery.", "speaker": "CSIS", "type": "data_point", "entities": ["Nicolas Maduro", "Delcy Rodriguez", "Venezuela", "United States"], "conviction": "high", "so_what": "A drawn-out, contested Venezuelan transition keeps regional instability and migration pressures elevated rather than resolving them; watch electoral timeline and ELN demobilization.", "quote": null, "locator": "Following the U.S. capture of Nicolas Maduro", "quote_verified": false}, {"claim": "Venezuelan migrants in Colombia show no near-term intention of returning home and analysts expect human trafficking to stay stagnant rather than improve until migrants see economic stability in Venezuela.", "speaker": "CSIS", "type": "prediction", "entities": ["Hollie McKay", "Medellin", "Colombia", "Venezuela"], "conviction": "medium", "so_what": "U.S. repatriation push is unlikely to reverse migrant flows soon; Colombia's migrant burden and associated instability persist regardless of regime change.", "quote": "It's going to stay stagnant because people aren't returning until they know they will have some kind of future, economic stability. I don't see the situation improving, might not get worse but won't improve.", "locator": "In March, journalist Hollie McKay visited Medellin", "quote_verified": true}, {"claim": "Colombia's three-phase post-capture plan focused on regularization, resources, and humanitarian response fails to outline concrete steps for trafficking prevention, leaving the country exposed if a sudden migrant surge occurs.", "speaker": "CSIS", "type": "thesis", "entities": ["Colombia"], "conviction": "medium", "so_what": "A policy gap means a migration surge could spike trafficking and destabilize a key U.S. regional ally; monitor Colombian government anti-TIP measures.", "quote": null, "locator": "The Colombian government has warned", "quote_verified": false}]}, {"theme": "Scale of migration and trafficking", "insights": [{"claim": "Over 7.9 million Venezuelans have fled the country since 2014, with 2.8 million in Colombia as of November 2025, making Colombia home to the third-largest refugee population in the world.", "speaker": "CSIS", "type": "data_point", "entities": ["Venezuela", "Colombia", "Latin America"], "conviction": "high", "so_what": "The sheer scale establishes a persistent structural driver of trafficking vulnerability and pressure on Colombian public services and labor markets.", "quote": null, "locator": "Scale of the Problem", "quote_verified": false}, {"claim": "Reported trafficking cases in Colombia rose from 75 in 2016 to 436 in 2024, with Venezuelan TIP victims nearly doubling from 2020 to 2021, showing a strong correlation between rising Venezuelan migration and trafficking.", "speaker": "CSIS", "type": "causal", "entities": ["Colombia", "Venezuela"], "conviction": "high", "so_what": "Migration flows are a leading indicator of trafficking volume; surges in arrivals should be read as forward signals of rising TIP and instability.", "quote": null, "locator": "Migration as a Driving Force of TIP", "quote_verified": false}, {"claim": "By the end of 2025, 67 percent of Venezuelans in Colombia had received legal status, and regularization measures like PEP and the 10-year Temporary Protected Status correlate with increased reporting of trafficking as victims gain confidence to come forward.", "speaker": "CSIS", "type": "framework", "entities": ["Colombia", "Venezuela", "Temporary Protected Status", "PEP"], "conviction": "medium", "so_what": "Rising reported cases may reflect better detection (regularization) rather than worsening conditions; interpret TIP statistics in light of legal-status policy changes.", "quote": null, "locator": "Access to regularization has also correlated", "quote_verified": false}]}, {"theme": "Trafficking as organized-crime business model", "insights": [{"claim": "Armed groups including the ELN, Tren de Aragua, and Clan del Golfo use trafficking not as opportunistic abuse but as a structured business model, paying monthly salaries and forcing migrants into illicit activities to repay debts.", "speaker": "CSIS", "type": "thesis", "entities": ["ELN", "Tren de Aragua", "Clan del Golfo", "Espacios de Mujer", "Bianca Fidone"], "conviction": "high", "so_what": "Trafficking diversifies armed-group revenue beyond drugs, entrenching nonstate actors; counter-TIP becomes a security imperative, not just humanitarian.", "quote": "These are methods that armed groups are using to settle debts...they pay monthly salaries to carry out this type of activity.", "locator": "Bianca Fidone, a project manager", "quote_verified": true}, {"claim": "An ILO study estimates each person subjected to sexual exploitation generates over $27,000 in annual profit, totaling roughly $1.46 billion in aggregate revenue for trafficking organizations across the United States, Colombia, and Peru.", "speaker": "CSIS", "type": "data_point", "entities": ["International Labor Organization", "United States", "Colombia", "Peru"], "conviction": "high", "so_what": "Quantifies the financial incentive sustaining trafficking, explaining why interdiction without disrupting the revenue model fails.", "quote": null, "locator": "An International Labor Organization study reports", "quote_verified": false}, {"claim": "Illegal mining is closely intertwined with sex trafficking and forced labor in remote, weakly governed areas of Colombia and Venezuela, with state complicity in Venezuela making mineral exploitation a revenue source for both traffickers and corrupt officials.", "speaker": "CSIS", "type": "causal", "entities": ["Colombia", "Venezuela"], "conviction": "medium", "so_what": "Illegal mining zones are trafficking and instability hotspots; mineral supply chains touching these regions carry governance and ESG risk.", "quote": null, "locator": "Illegal mining is an important source of revenue", "quote_verified": false}, {"claim": "Trafficking reinforces weak governance by funding bribes and expanding nonstate-actor influence, making TIP both a symptom and a mechanism that sustains state fragility on both sides of the Colombia-Venezuela border.", "speaker": "CSIS", "type": "thesis", "entities": ["Colombia", "Venezuela"], "conviction": "high", "so_what": "Frames trafficking as central to regional stability strategy; investors in the region should treat anti-TIP progress as a governance bellwether.", "quote": null, "locator": "TIP is thus not only a symptom", "quote_verified": false}]}, {"theme": "Structural vulnerability and impunity", "insights": [{"claim": "While 90 percent of working-age Venezuelan migrants in Colombia are employed, only 18 percent work in their respective fields and the vast majority are in the informal sector without labor protections.", "speaker": "CSIS", "type": "data_point", "entities": ["International Organization for Migration", "Center for Global Democracy", "Colombia", "Venezuela"], "conviction": "medium", "so_what": "Informal-labor concentration creates a shadow market that empowers armed groups and undermines Colombia's labor-reform and formalization goals.", "quote": null, "locator": "Discrimination and Structural Vulnerability", "quote_verified": false}, {"claim": "Impunity is severe: only 52 of 908 reported trafficking cases between 2011 and 2016 resulted in convictions, and as of 2023 there were no criminal prosecutions for labor-exploitation trafficking, with no law recognizing armed-group recruitment as trafficking.", "speaker": "CSIS", "type": "data_point", "entities": ["Colombia", "UN Special Rapporteur"], "conviction": "high", "so_what": "Near-total impunity means legal frameworks exist on paper but offer little deterrence; justice-system reform is the bottleneck to reducing TIP.", "quote": null, "locator": "Beyond underreporting, impunity remains", "quote_verified": false}]}], "insight_total": 12, "top_entities": ["Venezuela", "Colombia", "Nicolas Maduro", "ELN", "Tren de Aragua", "Clan del Golfo", "Delcy Rodriguez", "United States", "International Labor Organization", "Espacios de Mujer"], "source_meta": {"author": "", "word_count": 2339, "paywalled": false}}, {"record_id": "910dff4159691fb6", "source_type": "concepts", "source_name": "Noema Magazine", "source_url": "https://www.noemamag.com/what-comes-after-the-refugee-camp", "title": "What Comes After The Refugee Camp | NOEMA", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-25T15:31:31Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society", "Macro"], "gist": "The global humanitarian refugee regime built since the 1950s is collapsing as the US (USAID), EU, UK, France and Germany slash aid, leaving 6.6 million camp residents stranded. As funding-based 'care' disappears, the refugee camp is being replaced by border-externalization and detention-center models, just as climate-driven displacement is projected to quadruple by 2050.", "themes": [{"theme": "Collapse of humanitarian aid funding", "insights": [{"claim": "WFP cut monthly per-refugee assistance at Kakuma from $17 (2023) to $13, then to $5 in 2025, after Trump suspended US foreign assistance and shuttered USAID, stranding 100,000+ residents.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["WFP", "USAID", "Donald Trump", "Kakuma refugee camp", "Kenya"], "conviction": "high", "so_what": "Aid-dependent supply chains and NGO contractors face structural revenue collapse; watch WFP/UNHCR vendor and logistics exposure in the Horn of Africa.", "quote": null, "locator": "After U.S. President Donald Trump abruptly suspended", "quote_verified": false}, {"claim": "UNHCR laid off 30% of its workforce and cut assistance to 13 million refugees, while IOM let 6,000 staff go as its budget fell 25% in 2025 and contracted further in 2026.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["UNHCR", "IOM", "United Nations"], "conviction": "high", "so_what": "The multilateral institutions underpinning displacement response are shrinking fast; counterparty and continuity risk for any program reliant on UN agency delivery.", "quote": null, "locator": "Across the world, humanitarian operations", "quote_verified": false}, {"claim": "Global North aid retreat is structural, not just Trump-driven: the EU, France, Germany cut humanitarian funding and the UK slashed foreign assistance in 2025-26 proportionately even more aggressively than the US.", "speaker": "JOSHUA CRAZE", "type": "thesis", "entities": ["European Union", "United Kingdom", "France", "Germany", "United States"], "conviction": "high", "so_what": "Do not treat aid cuts as a reversible US policy quirk; the entire donor base is in secular retreat, signaling a durable shift in capital flows away from humanitarianism.", "quote": null, "locator": "Humanitarianism has been in retreat", "quote_verified": false}]}, {"theme": "Border externalization and the detention-center economy", "insights": [{"claim": "Capital is shifting from feeding the displaced to 'migration management': border enforcement consumes vastly more spending than aid, and the detention center had replaced the refugee camp as a policy priority even before Trump's cuts.", "speaker": "JOSHUA CRAZE", "type": "thesis", "entities": ["European Union", "migration management", "detention centers"], "conviction": "high", "so_what": "Budget is migrating from humanitarian NGOs toward border-security, surveillance, drone and detention contractors; follow the enforcement money rather than aid budgets.", "quote": "Even before Trump's cuts, the detention center had replaced the refugee camp as a policy priority.", "locator": "European funds frequently flow to", "quote_verified": true}, {"claim": "Europe externalized its frontiers via paid deals, including a $6.6 billion EU-Turkey deal (2016) and EU-funded militias, surveillance and detention in Niger, Libya, Sudan, Tunisia, and now expanding deportation agreements with Senegal and Mauritania.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["European Union", "Turkey", "Libya", "Niger", "Senegal", "Mauritania"], "conviction": "high", "so_what": "Sustained EU outlays to third-country security forces create a recurring contract pipeline; geopolitical risk concentrates in transit states paid to be Europe's border.", "quote": null, "locator": "As the Syrian refugee crisis worsened", "quote_verified": false}, {"claim": "Border hardening reroutes rather than reduces migration: externalizing into North Africa surged the Senegal-Canary Islands sea route, and hardening Morocco's borders skyrocketed departures along the Atlantic route from Mauritania.", "speaker": "JOSHUA CRAZE", "type": "causal", "entities": ["European Union", "Morocco", "Senegal", "Mauritania", "Canary Islands"], "conviction": "high", "so_what": "Enforcement spending displaces flows rather than stopping them, implying perpetual escalation; the detention model offers no terminal solution and locks in recurring spend.", "quote": null, "locator": "As popular as these policies may be", "quote_verified": false}, {"claim": "Migration into Europe is driven by geopolitical conditions (wars, catastrophes) rather than EU border policy, so barbed wire and drones cannot change the underlying number of displaced people.", "speaker": "JOSHUA CRAZE", "type": "contrarian", "entities": ["European Union", "climate migration"], "conviction": "medium", "so_what": "Bets premised on border tech 'solving' migration misread the driver; political volatility in source regions remains the dominant variable to watch.", "quote": null, "locator": "All these schemes ignore the fact", "quote_verified": false}]}, {"theme": "Climate displacement as the next structural shock", "insights": [{"claim": "The number of people displaced by climate catastrophe is projected to quadruple by 2050, yet climate refugees are not granted refugee status under the 1951 UN Refugee Convention and the 1967 Protocol.", "speaker": "JOSHUA CRAZE", "type": "prediction", "entities": ["UN Refugee Convention", "climate migration", "UNHCR"], "conviction": "high", "so_what": "A massive, legally unrecognized displacement wave is building with no institutional framework to absorb it; a long-horizon macro and geopolitical destabilizer.", "quote": "Globally, the number of people displaced by climate catastrophe is projected to quadruple by 2050.", "locator": "Many have already left", "quote_verified": true}, {"claim": "By end-2025, 117 million people were displaced worldwide (down slightly from a record 123 million in 2024), versus 38 million in 2000, with Sudan the largest displacement crisis alongside DRC, Myanmar and Syria.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["Sudan", "Democratic Republic of Congo", "Myanmar", "Syria"], "conviction": "high", "so_what": "Displacement has roughly tripled since 2000 and remains near record highs; a structurally rising baseline that border and aid systems are failing to absorb.", "quote": null, "locator": "The crisis in the global refugee regime", "quote_verified": false}]}, {"theme": "Failure of 'camp as city' economic-zone schemes", "insights": [{"claim": "The Jordan Compact (2016) failed at every level despite $1.4 billion World Bank credit and ~$4 billion in refugee aid: only 11 companies joined within two years, refugees were restricted to low-wage menial labor, and investors stayed uninterested.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["Jordan Compact", "World Bank", "European Union", "Jordan", "Alexander Betts", "Paul Collier"], "conviction": "high", "so_what": "The flagship 'put refugees to work in special economic zones' model has a track record of failure; discount optimistic 'refugee-as-labor' development theses.", "quote": null, "locator": "One scheme that warns against optimistic readings", "quote_verified": false}, {"claim": "Kenya's Shirika Plan will redesignate Dadaab and Kakuma as municipalities at a cost of around a billion dollars (largely World Bank funded), but arid landscapes, aid cuts and absent political/work rights make their economic viability doubtful.", "speaker": "JOSHUA CRAZE", "type": "thesis", "entities": ["Shirika Plan", "Dadaab", "Kakuma", "Kenya", "World Bank", "Turkana", "Garissa"], "conviction": "medium", "so_what": "A billion-dollar World Bank-backed 'camp-to-city' bet rests on shaky agronomic and legal foundations; high execution risk for the 'cities of the future' narrative.", "quote": null, "locator": "The \"Shirika Plan\" unfolding in Kenya", "quote_verified": false}, {"claim": "Kakuma's local economy was about $56 million before Trump's cuts, illustrating that camp economies are real but fragile and heavily aid-dependent.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["Kakuma", "Kenya"], "conviction": "medium", "so_what": "Camp-based commerce represents a measurable but aid-contingent market; demand collapses when rations are cut, undermining self-sustaining-economy claims.", "quote": null, "locator": "Kakuma, at least before the economic crisis", "quote_verified": false}]}, {"theme": "Political economy of the refugee regime", "insights": [{"claim": "UNHCR's three durable solutions (return, resettlement, integration) are all now politically unviable, leaving the agency functioning as a proxy for donor states that fund the Libyan coast guard and police detention rather than enabling refugee movement.", "speaker": "JOSHUA CRAZE", "type": "framework", "entities": ["UNHCR", "IOM", "Libya", "Greece", "European Union"], "conviction": "high", "so_what": "The multilateral refugee architecture has inverted its original mandate; its political capture by donor enforcement priorities is now the operative reality for any partner.", "quote": null, "locator": "Today's UNHCR is in an unenviable position", "quote_verified": false}, {"claim": "Far-right anti-asylum politics are now electorally dominant: Germany's AfD won nearly 21% in the February 2025 election, and Chancellor Merz urged Syrian refugees to return in March 2026 with threats of deportation.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["Alternative für Deutschland", "Friedrich Merz", "Germany", "Syria"], "conviction": "high", "so_what": "Restrictive migration policy is a structural vote-winner across Europe; expect a durable rightward, anti-asylum policy ratchet regardless of which parties govern.", "quote": null, "locator": "The rightward tilt of global politics", "quote_verified": false}, {"claim": "The new European Pact on Migration and Asylum took effect June 12, detaining irregular arrivals and pushing them into accelerated procedures without legal-aid safeguards, effectively criminalizing asylum.", "speaker": "JOSHUA CRAZE", "type": "data_point", "entities": ["European Pact on Migration and Asylum", "European Union"], "conviction": "high", "so_what": "A binding EU-wide legal shift toward detention-first processing signals expanding detention infrastructure demand and durable hostility to inbound asylum.", "quote": null, "locator": "On June 12, a new European Pact", "quote_verified": false}]}], "insight_total": 15, "top_entities": ["UNHCR", "IOM", "WFP", "European Union", "USAID", "Donald Trump", "Kakuma refugee camp", "Jordan Compact", "World Bank", "Sudan", "Alternative für Deutschland", "Shirika Plan"], "source_meta": {"author": "JOSHUA CRAZE", "word_count": 5803, "paywalled": false}}, {"record_id": "80cb4b024ed0e01f", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/06/the-post-covid-decline-in-the-labor-share/", "title": "The Post-COVID Decline in the Labor Share - Liberty Street Economics", "published_date": "2026-06-24", "language": "en", "processed_at": "2026-06-25T15:31:31Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Society"], "gist": "The U.S. labor share of income has fallen 1.6 percentage points below its pre-pandemic level to an all-time post-war low, but NY Fed researchers find the post-COVID decline mirrors prior recession cycles and is driven almost entirely by within-industry changes rather than sectoral reallocation.", "themes": [{"theme": "Labor share at post-war low", "insights": [{"claim": "The U.S. labor share of income (fraction of output paid to workers as wages and salaries) is at its lowest-ever level in the post-war period, having fallen 1.6 percentage points below its pre-pandemic level after COVID.", "speaker": "maureenegan", "type": "data_point", "entities": ["U.S. labor share", "U.S. Bureau of Labor Statistics", "wages"], "conviction": "high", "so_what": "A persistently low labor share signals productivity and/or prices outrunning wages, supporting capital/profit margins over labor income — bullish for corporate earnings durability, bearish for wage-driven consumption.", "quote": "The labor share of income in the U.S. is currently at its lowest-ever level in the post-war period.", "locator": "The labor share of income in the U.S.", "quote_verified": true}, {"claim": "The labor share hovered around 63 percent for much of the post-war period before entering a sustained decline starting in the early 2000s, with a particularly sharp drop during the global financial crisis.", "speaker": "maureenegan", "type": "data_point", "entities": ["U.S. labor share", "global financial crisis"], "conviction": "high", "so_what": "Establishes the long-run baseline; the structural downtrend since the 2000s frames profit margins as a multi-decade tailwind for equity holders.", "quote": null, "locator": "For much of the post-war period", "quote_verified": false}]}, {"theme": "Cyclical, not structural break", "insights": [{"claim": "The post-COVID trajectory of the labor share broadly follows the cyclical patterns of earlier recessions (a sharp rise at onset followed by decline during recovery), implying a longer expansion would be needed before the labor share rises again.", "speaker": "maureenegan", "type": "thesis", "entities": ["U.S. labor share", "COVID pandemic"], "conviction": "medium", "so_what": "If the decline is cyclical rather than a new structural regime, investors should not extrapolate a permanent further drop; labor share could mean-revert in a sufficiently long expansion.", "quote": "Judging by past recessions, we would need a longer expansion to see the labor share rise again.", "locator": "The dynamics of the labor share at the onset", "quote_verified": true}, {"claim": "Following the dotcom recession and the GFC, the labor share's decline during expansion was steeper than in pre-2000 cycles and, unlike earlier episodes, it did not meaningfully rebound later in the expansion.", "speaker": "maureenegan", "type": "contrarian", "entities": ["dotcom recession", "global financial crisis", "U.S. labor share"], "conviction": "medium", "so_what": "The 2000s broke the prior rebound pattern; a risk that post-COVID also fails to rebound, keeping capital's income share elevated.", "quote": null, "locator": "This behavior changes in the 2000s", "quote_verified": false}]}, {"theme": "Within-industry vs sectoral reallocation", "insights": [{"claim": "A shift-share decomposition shows the post-COVID decline in the aggregate payroll share, like the prior two recessions, was driven entirely by within-industry changes, with output movements across sectors contributing nothing or very little.", "speaker": "maureenegan", "type": "causal", "entities": ["payroll share", "U.S. Bureau of Economic Analysis", "COVID pandemic"], "conviction": "high", "so_what": "The labor share decline is not a sector-rotation artifact; it reflects firms paying workers less relative to output across the board, a broad margin-expansion signal rather than a mix effect.", "quote": "declines in the aggregate payroll share during COVID, and the previous two recessions, were entirely driven by changes within industries rather than shifts across industries", "locator": "From this shift–share decomposition", "quote_verified": true}, {"claim": "Sectoral reallocation (measured across fourteen major sectors) spiked at the onset of COVID but then moderated and stabilized at a lower level, whereas earlier recessions showed more persistent and increasing reallocation.", "speaker": "maureenegan", "type": "data_point", "entities": ["sectoral reallocation index", "U.S. Bureau of Economic Analysis", "healthcare", "education", "manufacturing", "agriculture // YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
