   idea:"Meta added a 'pytorch.power_plant_no_blow_up' flag to their ML framework because AI datacenter load swings — a 100K-GPU cluster can create 6MW transient load drops — were crashing grid infrastructure. Traditional transformers simply pass all load noise through to the grid. Solid-State Transformers (SST) regulate load AND reduce reactive power consumption. SST never took off because they were too expensive. Now hyperscalers are being denied grid connections over their load profiles, which fundamentally changes the SST ROI calculation. Author: 'The power chips going between grid and datacenter are the real opportunity, not the Nvidia or OCP power rack.'",
   angle:"Everyone is long rack PSU chips and SiC for inside the datacenter. The power infrastructure between the grid and the datacenter is almost entirely ignored. Delta Electronics and Vertiv/Eaton are the safe SST expressions. The Wolfspeed 10KV part enables drastic simplification of SST control logic and is a key enabler.",
   tweetA:"Meta added a 'pytorch.power_plant_no_blow_up' flag because AI datacenters create 6MW load swings that crash grid infrastructure. Traditional transformers just pass the noise through. Solid-State Transformers regulate load AND reduce reactive power. Hyperscalers are getting denied grid connections over this exact issue. SST just got a 10x demand catalyst.",
   tweetB:"Everyone is long rack PSU chips and SiC for inside the datacenter. Nobody is long the power infrastructure between the grid and the datacenter. SST solves both load regulation AND reactive power — two of the biggest reasons AI datacenters keep failing grid permitting. The real opportunity is $VRT $ETN, not the OCP power rack.",
   charts:{count:2,hot:true,desc:"Circuit simulation diagrams showing SiC vs GaN voltage conversion with ripple analysis. The SST reactive power concept diagram shows why traditional transformers are insufficient for AI datacenter loads. Charts inside — worth opening. 🔥 CHART WORTH SAVING"},
   link:"https://irrationalanalysis.substack.com/p/high-voltage-low-competence"},

  {id:16,cat:"ai-infra",urgency:"watch",source:"Irrational Analysis / Newsletter",
   title:"Power semi market shifts from knife fight to quality premium — datacenter physics replace EV physics by H2 2027",
   idea:"In EV/automotive, you can compensate for lower SiC efficiency with a larger battery — enabling a race to the bottom in cost. In datacenters, efficiency and footprint are absolute constraints: you either fit in the power sidecar rack or you don't, and Chinese parts on US power grid infrastructure face national security headwinds. The author expects a quality-based pricing regime to replace the current oversupply/Chinese competition dynamics by H2 2027.",
   angle:"This is the structural shift in SiC/GaN that the equity market has not priced. The EV demand collapse and Chinese competition killed margins — but the datacenter segment has entirely different physics. Winners in datacenter power get pricing power back. Wolfspeed's oversupply is an EV-era problem that becomes irrelevant in a datacenter quality-premium world.",
   tweetA:"In EV, you add a bigger battery when SiC efficiency is suboptimal. In a datacenter rack you either fit or you do not — no equivalent of a bigger battery. Chinese competition and EV oversupply killed SiC/GaN margins. But datacenter physics are the opposite of EV physics. Quality premium returns by H2 2027.",
   tweetB:"The power semi market is bifurcating: EV dies (race to bottom, Chinese win), datacenter lives (quality premium, national security tailwind). Wolfspeed's oversupply problem is an EV-era artifact. Infineon's 1200V SiC dominance — where they crush everyone on efficiency metrics — is where the margin recovery happens first.",
   charts:{count:3,hot:true,desc:"Comparison tables showing Rds_on, gate charge, and switching loss data across vendors by voltage class. The 1200V SiC table showing Infineon's extraordinary efficiency advantage vs all competitors is the key investment chart. 🔥 CHART WORTH SAVING"},
   link:"https://irrationalanalysis.substack.com/p/high-voltage-low-competence"},

  {id:17,cat:"ai-infra",urgency:"deep",source:"Irrational Analysis / Newsletter",
   title:"Infineon crushes 1200V SiC; TI+Navitas lead GaN; Aixtron near-monopoly on GaN epi equipment",
   idea:"Comprehensive datasheet comparison across voltage classes: For 650V GaN, TI and Navitas lead because they integrate driver and protection circuits in the same package as the FET, eliminating the complex negative gate voltage problem. Infineon is second; STM has a competitive part in development. For 1200V SiC, Infineon dominates with extraordinarily low Rds_on — capable of 800W dissipation in a single device with proper liquid cooling. Navitas has best-in-class GaN but mediocre SiC. Aixtron (AIXA) holds near-monopoly position in GaN epitaxy equipment and strong InP exposure.",
   angle:"'Only TI and Navitas have both integrated protection and high-quality GaN FET. Nobody else has both.' The GaN market share is winner-takes-most as a result. Aixtron as the equipment pick is separate from the semiconductor picks and harder to displace.",
   tweetA:"Datasheet analysis: TI and Navitas lead GaN because they solve the negative gate voltage nightmare with integrated driver and protection in one package. Nobody else has both. Infineon crushes 1200V SiC — 800W in one device with liquid cooling. For GaN epi equipment: $AIXA has near-monopoly. That is the pick.",
   tweetB:"Navitas has world-class GaN FET but mediocre SiC. Why would anyone buy their SiC when Infineon, STM, Wolfspeed, and On Semi all have better parts? Meanwhile Navitas and Infineon have a cross-licensing agreement and IFX just filed patent suit against Chinese competitor Innoscience. The competitive dynamics are consolidating faster than valuations reflect.",
   charts:{count:4,hot:true,desc:"GaN vs SiC 650V head-to-head table and 1200V SiC vendor comparison. These are the core investment charts for the power semi thesis — publicly available datasheets compared systematically. 🔥 CHART WORTH SAVING"},
   link:"https://irrationalanalysis.substack.com/p/high-voltage-low-competence"},

   tweetA:"On Semi and STM both buy GaN wafers from Innoscience (China). Infineon just filed patent suit against Innoscience. National security pressure already pushed hyperscalers away from Chinese optical transceivers — the same argument applies to GaN wafers in US power grid. $ON $STM have supply chain risk. $IFX $GFS benefit.",

   tweetB:"Cisco guided to a $9B AI orders pipeline. Cisco — not Nvidia, not AMD — Cisco. Enterprise AI buildout is real and distributed across the network layer, not just the accelerator. When the networking company is guiding to $9B in AI orders, the AI capex cycle has reached the infrastructure layer that takes years to unwind.",
   charts:{count:0,hot:false,desc:""},
   link:"https://princetonchen.substack.com/p/daily-news-wall-may-16-2026"}
];

var META = {
  date:"2026-05-17",time:"10:05 CEST",
  windowStart:"2026-05-17 04:05 CEST",windowEnd:"2026-05-17 10:05 CEST",
  emailsInWindow:7,emailsRead:7,itemsExtracted:31,
  includedSources:[
    {name:"Princeton Chen / Daily News Wall",items:10},
    {name:"Irrational Analysis / Newsletter",items:4},
    {name:"Michael Parekh / AI-RTZ #1089",items:4},
    {name:"Exponential View #574 / Azeem Azhar",items:4},
    {name:"ChartStorm / Callum Thomas (Topdown Charts)",items:3},
    {name:"Young & Calculated / Newsletter",items:3},
    {name:"DeFi0xJeff / The After Hour EP.55",items:1}
  ],
  skippedSources:[]
};

var CAT_COLORS={"macro":"#e24b4a","credit":"#378add","positioning":"#ef9f27","ai-infra":"#1d9e75","crypto":"#7f77dd","geopolitics":"#d85a30","energy":"#f97316","tech":"#06b6d4","gold":"#d4a017","culture":"#ec4899","labor":"#8b5cf6","regulation":"#64748b","science":"#14b8a6","venture":"#84cc16"};
var CAT_LABELS={"macro":"Macro","credit":"Credit","positioning":"Positioning","ai-infra":"AI/Infra","crypto":"Crypto","geopolitics":"Geopolitics","energy":"Energy","tech":"Tech","gold":"Gold","culture":"Culture","labor":"Labor","regulation":"Regulation","science":"Science","venture":"Venture"};
var URG_CFG={"act-now":{e:"🔴",l:"Act Now"},"deep":{e:"🔵",l:"Deep"},"watch":{e:"🟡",l:"Watch"}};

var activeCat="all",activeUrg="all",activeSrc=null;

function copyTweet(itemId,which){
  var item=ITEMS.find(function(i){return i.id===itemId;});
  var text=which==='a'?item.tweetA:item.tweetB;
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  var btn=event.target;btn.textContent='✓ Copied';
  setTimeout(function(){btn.textContent='📋 Copy';},1500);
}

function buildCard(item){
  var color=CAT_COLORS[item.cat]||"#888";
  var catLabel=CAT_LABELS[item.cat]||item.cat;
  var urg=URG_CFG[item.urgency]||{e:"🔵",l:"Deep"};
  var angleStyle="border-left:3px solid "+(color)+";background:"+color+"18;";
  var chartsHTML="";
  if(item.charts.count>0){
    var hc=item.charts.hot?" hot":"";
    var hl=item.charts.hot?'<span class="hot-label">🔥 CHART WORTH SAVING</span>':"";
    chartsHTML='<div class="charts-block'+hc+'">'+hl+'📊 '+item.charts.count+' chart(s): '+item.charts.desc+'</div>';
  }
  var linkHTML=item.link?'<div class="link-block"><a href="'+item.link+'" target="_blank">↗ Read full article</a></div>':"";
  var chartIco=item.charts.count>0?(item.charts.hot?'<span class="chart-indicator">🔥</span>':'<span class="chart-indicator">📊</span>'):"";

  return '<div class="card" id="card-'+item.id+'" data-cat="'+item.cat+'" data-urg="'+item.urgency+'" data-src="'+item.source.replace(/"/g,"&quot;")+'">'+
    '<div class="card-header" onclick="toggleCard('+item.id+')">'+
      '<span class="item-num">'+String(item.id).padStart(2,'0')+'</span>'+
      '<span class="urgency-em">'+urg.e+'</span>'+
      '<span class="source-badge" style="background:'+color+'">'+item.source.split('/')[0].trim()+'</span>'+
      '<span class="cat-tag">'+catLabel+'</span>'+
      chartIco+
      '<span class="card-title">'+item.title+'</span>'+
    '</div>'+
    '<div class="card-body" id="body-'+item.id+'">'+
      '<div class="section-label">The Idea</div>'+
      '<div class="idea-text">'+item.idea+'</div>'+
      '<div class="section-label">My Angle</div>'+
      '<div class="angle-block" style="'+angleStyle+'">'+item.angle+'</div>'+
      '<div class="tweets-row">'+
        '<div class="tweet-box a">'+
          '<div class="tweet-label a">TWEET A</div>'+
          '<div class="tweet-text">'+item.tweetA+'</div>'+
          '<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button>'+
        '</div>'+
        '<div class="tweet-box b">'+
          '<div class="tweet-label b">TWEET B</div>'+
          '<div class="tweet-text">'+item.tweetB+'</div>'+
          '<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button>'+
        '</div>'+
      '</div>'+
      chartsHTML+linkHTML+
    '</div>'+
  '</div>';
}

function toggleCard(id){
  var b=document.getElementById('body-'+id);
  if(b)b.classList.toggle('open');
}

function applyFilters(){
  var vis=0;
  ITEMS.forEach(function(item){
    var card=document.getElementById('card-'+item.id);
    if(!card)return;
    var cm=activeCat==='all'||item.cat===activeCat;
    var um=activeUrg==='all'||item.urgency===activeUrg;
    var sm=activeSrc===null||item.source.indexOf(activeSrc)!==-1;
    if(cm&&um&&sm){card.classList.remove('hidden');vis++;}
    else{card.classList.add('hidden');}
  });
  document.getElementById('vis-count').textContent=vis+' items';
}

function setCatFilter(cat){
  activeCat=cat;activeSrc=null;
  document.querySelectorAll('#cat-bar .filter-pill').forEach(function(p){p.classList.remove('active');p.style.background='';p.style.color='';p.style.borderColor='';});
  var a=document.querySelector('#cat-bar [data-val="'+cat+'"]');
  if(a){a.classList.add('active');a.style.background=cat==='all'?'#333':(CAT_COLORS[cat]||'#555');a.style.color='#fff';a.style.borderColor='transparent';}
  applyFilters();
}

function setUrgFilter(urg){
  activeUrg=urg;activeSrc=null;
  document.querySelectorAll('#urg-bar .filter-pill').forEach(function(p){p.classList.remove('active');p.style.background='';p.style.color='';p.style.borderColor='';});
  var a=document.querySelector('#urg-bar [data-val="'+urg+'"]');
  if(a){a.classList.add('active');a.style.background='#333';a.style.color='#fff';a.style.borderColor='transparent';}
  applyFilters();
}

function filterBySrc(idx){
  var name=META.includedSources[idx].name;
  activeSrc=name;activeCat='all';activeUrg='all';
  document.querySelectorAll('.filter-pill').forEach(function(p){p.classList.remove('active');p.style.background='';p.style.color='';p.style.borderColor='';});
  var ac=document.querySelector('#cat-bar [data-val="all"]');
  if(ac){ac.classList.add('active');ac.style.background='#333';ac.style.color='#fff';ac.style.borderColor='transparent';}
  var au=document.querySelector('#urg-bar [data-val="all"]');
  if(au){au.classList.add('active');au.style.background='#333';au.style.color='#fff';au.style.borderColor='transparent';}
  ITEMS.forEach(function(item){
    var card=document.getElementById('card-'+item.id);
    var body=document.getElementById('body-'+item.id);
    if(!card||!body)return;
    if(item.source.indexOf(name)!==-1){card.classList.remove('hidden');body.classList.add('open');}
    else{card.classList.add('hidden');body.classList.remove('open');}
  });
  var vis=ITEMS.filter(function(i){return i.source.indexOf(name)!==-1;}).length;
  document.getElementById('vis-count').textContent=vis+' items';
}

function toggleReport(){
  var b=document.getElementById('report-body');
  var t=document.getElementById('report-toggle');
  b.classList.toggle('open');
  t.textContent=b.classList.contains('open')?'▲':'▼';
}

function init(){
  // Build category filter
  var catsSeen={},catsOrder=['all'];
  var catCounts={all:ITEMS.length};
  ITEMS.forEach(function(item){
    if(!catsSeen[item.cat]){catsSeen[item.cat]=true;catsOrder.push(item.cat);catCounts[item.cat]=0;}
    catCounts[item.cat]++;
  });
  var catBar=document.getElementById('cat-bar');
  catsOrder.forEach(function(cat){
    var label=cat==='all'?'All':(CAT_LABELS[cat]||cat);
    var pill=document.createElement('button');
    pill.className='filter-pill'+(cat==='all'?' active':'');
    pill.setAttribute('data-val',cat);
    pill.textContent=label+' ('+(catCounts[cat]||0)+')';
    if(cat==='all'){pill.style.background='#333';pill.style.color='#fff';pill.style.borderColor='transparent';}
    pill.onclick=(function(c){return function(){setCatFilter(c);};})(cat);
    catBar.appendChild(pill);
  });

  // Build urgency filter
  var urgCounts={all:ITEMS.length,'act-now':0,'deep':0,'watch':0};
  ITEMS.forEach(function(item){urgCounts[item.urgency]=(urgCounts[item.urgency]||0)+1;});
  var urgBar=document.getElementById('urg-bar');
  [['all','All'],['act-now','🔴 Act Now'],['deep','🔵 Deep'],['watch','🟡 Watch']].forEach(function(pair){
    var val=pair[0],label=pair[1];
    var pill=document.createElement('button');
    pill.className='filter-pill'+(val==='all'?' active':'');
    pill.setAttribute('data-val',val);
    pill.textContent=label+' ('+(urgCounts[val]||0)+')';
    if(val==='all'){pill.style.background='#333';pill.style.color='#fff';pill.style.borderColor='transparent';}
    pill.onclick=(function(v){return function(){setUrgFilter(v);};})(val);
    urgBar.appendChild(pill);
  });

  // Build cards
  var container=document.getElementById('cards-container');
  var html='';
  ITEMS.forEach(function(item){html+=buildCard(item);});
  container.innerHTML=html;

  // Build session report
  var rb=document.getElementById('report-body');
  var rhtml='<div class="report-row"><strong>Window:</strong> '+META.windowStart+' → '+META.windowEnd+'</div>';
  rhtml+='<div class="report-row"><strong>Emails in window:</strong> '+META.emailsInWindow+' &nbsp;|&nbsp; <strong>Read:</strong> '+META.emailsRead+' &nbsp;|&nbsp; <strong>Items extracted:</strong> '+META.itemsExtracted+'</div>';
  rhtml+='<div class="report-row" style="margin-top:10px"><strong>Included sources:</strong></div>';
  META.includedSources.forEach(function(s,idx){
    rhtml+='<div class="report-row" style="margin-left:12px">• <span class="source-link" onclick="filterBySrc('+idx+')">'+s.name+'</span> — '+s.items+' item(s)</div>';
  });
  rhtml+='<div class="report-row" style="margin-top:8px;color:#1d9e75"><strong>No sources skipped.</strong> All 7 emails in the window were read and fully extracted.</div>';
  rb.innerHTML=rhtml;
}

init();
</script>
</body>
</html>
