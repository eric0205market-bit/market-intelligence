   idea:"Per MUFG\'s George Goncalves, yesterday was the worst day for the US 2Y Treasury on a Fed meeting day since March 2008, when the yield jumped 26bps as the Fed cut 75bps for Bear Stearns. Yesterday\'s 13bps move is in that company. October 27-28 is now fully priced for the first hike. The 50% probability of a second hike by year-end is also rising.",

  {id:6,cat:"geopolitics",urgency:"act-now",source:"Mando Minutes / Phil Dauber",

  {id:7,cat:"gold",urgency:"act-now",source:"Dark Side of the Boom",
   title:"Gold recovered 60% of Warsh-induced decline within 24 hours — the market says prove it",
   idea:"Gold initially sold off on the Warsh hawkish shock, then recovered approximately $75 from its lows and clawed back roughly 60% of the overnight move — even as the dollar remained stronger on the day. Dark Side of the Boom frames this against the classic 24-48 hour rule: genuine central bank shocks don\'t fade within the first window. If it had been a real shock, gold should still be going lower. Gold is telling the Fed: \'The headline said shock. Prove it.\' Gold also broke below its 200-day moving average.",

   title:"Goldman: 70% of pre-war Hormuz traffic can deliver 100% of export normalization",
   idea:"Goldman\'s note argues that if 70% of the old Hormuz flow can deliver 100% of export normalization, the panic premium becomes very hard to defend. The oil market is moving from fear pricing to flow math — once the market stops trading the war story and starts trading the supply-demand balance sheet, the risk premium compresses. Three Saudi Bahri supertankers (~6M barrels) have already transited. Qatar LNG traffic has resumed. But 31 supertankers with ~62M barrels remain stranded.",

   tweetB:"Oil below $78 with the Iran MOU is pricing full normalization. Goldman says 70% of old Hormuz flows = 100% of needed exports. The math works. What the math does not include: Iran just said it will charge Hormuz transit fees. Establishing sovereign taxation over a chokepoint is a new variable no oil model has priced.",

  {id:9,cat:"gold",urgency:"watch",source:"Dark Side of the Boom",

  {id:11,cat:"macro",urgency:"deep",source:"Peter Boockvar",

   idea:"Initial jobless claims came in at 226k, slightly lower than the 230k prior week, about as expected. But the 4-week average ticked up to 223k from 219k as a 210k reading drops out — the highest since December. Continuing claims rose back above 1.8mm to 1.81mm from 1.786mm. Boockvar notes: the labor market still reflects modest firings, but the recent pickup is worth watching.",

   title:"SPY 5-day outflows total $29.8B; AAII bull-bear spread improved to -2.8 from -17.3",
   idea:"SPY has seen five consecutive days of outflows totaling $29.8B, with assets at their lowest since May 5. A concurrent $3.32B single-session QQQ outflow occurred while SQQQ simultaneously shed $156M — suggesting the short-tech trade is being unwound even as institutional money exits the long side. AAII bull-bear spread improved dramatically to -2.8 from -17.3 last week. Dauber is uncertain whether the outflows reflect tax-loss harvesting around the holiday, systematic de-risking ahead of the 60-day Iran cliff, or something more structural.",
   angle:"The AAII improvement to -2.8 while SPY outflows are hitting $30B in a week creates an interesting divergence: retail sentiment is recovering while institutional money is walking out the door. That is not how sustained rallies typically end.",

  {id:13,cat:"aiinfra",urgency:"deep",source:"BEP Research",

   tweetA:"Rack power density: 120kW today (Blackwell) → 300kW at Rubin → ~1MW per rack at Feynman. Air cooling stops working well above 300kW. The liquid cooling integrators are not selling a luxury option for hyperscalers who want efficiency. They are selling the only option that physically works at Feynman densities. That is a different kind of moat.",

  {id:17,cat:"aiinfra",urgency:"act-now",source:"Mando Minutes",

   idea:"Noam Shazeer, co-lead of Google\'s Gemini and one of the authors of the original \'Attention Is All You Need\' Transformer paper (2017), has left to join OpenAI. Shazeer had previously left Google in 2021 and founded Character.ai, then returned to lead Gemini in 2024. This is the second time he has left Google to work elsewhere. He created the architecture underpinning all modern LLMs, then left to build Google\'s primary response to that architecture, and is now at its main competitor.",

  {id:22,cat:"regulation",urgency:"deep",source:"Lucky Traders / Unchained Crypto",
   title:"Illinois: first US state to tax digital assets on activity including simply holding on an exchange",
   idea:"Illinois Governor Pritzker signed a $55.9B state budget including the Digital Asset Privilege Tax Act: 0.2% on ALL digital asset activity — transactions, transfers, and custody — effective January 1, 2027. Unlike capital gains taxes (which hit profits), this tax hits every action, including holding Bitcoin on Coinbase in Illinois. Out-of-state brokers are covered once their Illinois sales exceed $100K. Industry groups call it the first crypto tax modeled on a sales tax rather than an income tax. Industry groups including the Crypto Council for Innovation and a16z say this singles out digital assets in a way no tax applies to stocks or bonds.",
   angle:"The precedent is more dangerous than the Illinois revenue. If Illinois gets away with a 0.2% activity tax on digital assets without capital flight or successful legal challenge, every revenue-hungry state government in the country has a blueprint.",
   tweetA:"Illinois just made it a taxable event to HOLD Bitcoin on an exchange in the state. Not to sell, not to profit — just to hold. 0.2% on every transaction, transfer, and custody arrangement. Signed into a $55.9B budget bill. Effective January 1, 2027. This is not a capital gains tax. It is a digital asset sales tax, and it will be copied.",
   tweetB:"The Illinois crypto tax is structurally designed to be a \'leave the state\' law — but so far exchange operators have not announced exits. 0.2% on holding, trading, and transferring crypto. No similar tax exists for stocks or bonds. a16z and Crypto Council for Innovation are calling it discriminatory. Lawsuits are coming. The question is whether they come before or after the 2027 effective date.",

   link:"https://luckytrader.substack.com/p/crypto-sinks-after-hawkish-fomc"},

  {id:28,cat:"macro",urgency:"deep",source:"Doomberg",
   title:"SpaceX IPO as stealth financial repression — loss-making companies forced into passive retirement accounts",
   idea:"Doomberg frames trillion-dollar IPOs of loss-making companies as a form of stealth financial repression: money-losing private companies are listed at unachievable valuations, then inevitably included in indices, forcing unsuspecting retirement accounts to become mandatory buyers through passive rebalancing. The mechanism is not confiscation at gunpoint but confiscation by index inclusion. SpaceX ($4.9B net loss, $2.5T market cap) is the case study. This echoes David Rogers Webb\'s \'The Great Taking\' thesis that the modern financial plumbing is designed to enable last-second asset pilfering.",
   angle:"The passive indexing mechanism converts individual investor skepticism into forced buying. A retail investor who thinks SpaceX is overvalued and owns a target-date fund is buying SpaceX anyway. Doomberg\'s frame: this is the dollar debasement playbook, just one step more sophisticated.",
   tweetA:"Doomberg\'s frame on the SpaceX IPO: stealth financial repression. The mechanism — list a loss-making company at an unachievable valuation, wait for index inclusion, let passive rebalancing force every 401k to become a buyer. SpaceX doesn\'t need to justify 90x revenue. It just needs to be added to the S&P. Your retirement account does the rest.",
   tweetB:"I keep coming back to this framing. Every bubble needs a distribution mechanism. In 1999 it was retail brokers and stock tips. Today it is index inclusion and passive funds. By the time SpaceX ($4.9B loss, $2.5T market cap) enters the S&P, the marginal buyer will be a Vanguard rebalance. That is not investing. That is forced allocation to a venture outcome.",

   idea:"Young & Calculated reports that the median quant developer pay has moved above the median quant researcher pay at hedge funds like Citadel and Jane Street. The inversion signals what firms are actually paying for: not new signal discovery, but the ability to deploy, iterate, and maintain ML systems faster than competitors. Academic output on language models in finance rose 594% between 2023 and 2025 (36 papers to 250 in leading venues) — meaning the signal you develop today is being replicated at competing funds before you finish backtesting it. The edge has shifted from research to engineering and infrastructure.",

  {id:30,cat:"regulation",urgency:"watch",source:"Mando Minutes",
   title:"France moves to phase out non-quantum-resistant cryptography — countdown to post-quantum deadline begins",
   idea:"France announced it will stop certifying products that lack quantum-resistant encryption, setting the first major deadline in a western country for post-quantum cryptographic migration. Current encryption standards (ECDSA, RSA) are theoretically vulnerable to sufficiently powerful quantum computers. Bitcoin and most DeFi protocols use ECDSA. The National Institute of Standards and Technology (NIST) finalized post-quantum standards in 2024, but France is the first to attach regulatory consequence to non-migration.",
   angle:"This is a decade-long migration project, but France just made it a regulatory timeline rather than a theoretical concern. Every financial infrastructure operator in the EU will eventually face the same requirement. Bitcoin has a known technical obsolescence clock that the protocol has not addressed at the governance level.",
   tweetA:"France just set a deadline: products without quantum-resistant cryptography will not get certified. This is the first regulatory consequence attached to the post-quantum migration in a major economy. Every financial infrastructure operator in Europe will eventually face this. Bitcoin and most DeFi protocols use ECDSA, which is quantum-vulnerable. The clock just started.",
   tweetB:"The quantum threat to cryptography is real and now has a regulatory timeline in France. The NIST post-quantum standards are final. The transition is not theoretical anymore. The interesting question for crypto: Bitcoin cannot migrate ECDSA through soft fork alone — it requires extraordinary protocol coordination. The community has not started that conversation seriously.",
   charts:{count:0,hot:false,desc:""},
   link:"https://mandominutes.beehiiv.com/p/mando-minutes-eb4e"},

  date: "2026-06-18",
  time: "15:02 CEST",

  windowEnd: "2026-06-18 15:02 CEST",

<div id="header">
  <h1>🔵 RESEARCH INTELLIGENCE</h1>
  <div class="meta" id="header-meta"></div>
</div>
<div id="filters">
  <div class="filter-row" id="cat-pills"></div>
  <div class="filter-row" id="urg-pills"></div>
</div>
<div id="cards"></div>
<div id="report">
  <div class="rep-inner">
    <div class="rep-hdr" onclick="toggleReport()"><span>📋</span> <span>Session Report</span> <span id="rep-arrow">▶</span></div>
    <div class="rep-body" id="rep-body"></div>
  </div>
</div>

<script>
var activeCat = 'all';
var activeUrgency = 'all';
var activeSrc = '';

var CAT_COLORS = {
  macro:'#e24b4a', credit:'#378add', positioning:'#ef9f27', aiinfra:'#1d9e75',
  crypto:'#7f77dd', geopolitics:'#d85a30', energy:'#f97316', tech:'#06b6d4',
  gold:'#d4a017', culture:'#ec4899', labor:'#8b5cf6', regulation:'#64748b',
  science:'#14b8a6', venture:'#84cc16'
};

var CAT_LABELS = {
  macro:'macro', credit:'credit', positioning:'positioning', aiinfra:'AI/infra',
  crypto:'crypto', geopolitics:'geopolitics', energy:'energy', tech:'tech',
  gold:'gold', culture:'culture', labor:'labor', regulation:'regulation',
  science:'science', venture:'venture'
};

function cc(cat){ return CAT_COLORS[cat] || '#888'; }
function cl(cat){ return CAT_LABELS[cat] || cat; }

function he(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i){ return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if(body) body.classList.toggle('open');
}

function toggleReport() {
  var body = document.getElementById('rep-body');
  var arrow = document.getElementById('rep-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▼' : '▶';
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? '' : name;
  renderCards();
  renderFilters();
}

function getVisible() {
  return ITEMS.filter(function(item) {
    if(activeCat !== 'all' && item.cat !== activeCat) return false;
    if(activeUrgency !== 'all' && item.urgency !== activeUrgency) return false;
    if(activeSrc && item.source.indexOf(activeSrc) === -1) return false;
    return true;
  });
}

function renderFilters() {
  var cats = ['all'];
  var catCounts = {all: ITEMS.length};
  ITEMS.forEach(function(item){
    if(!catCounts[item.cat]) catCounts[item.cat] = 0;
    catCounts[item.cat]++;
    if(cats.indexOf(item.cat) === -1) cats.push(item.cat);
  });
  var urgCounts = {all: ITEMS.length, 'act-now':0, deep:0, watch:0};
  ITEMS.forEach(function(item){ urgCounts[item.urgency]++; });

  var catHtml = cats.map(function(c) {
    var label = c === 'all' ? 'All' : cl(c);
    var count = catCounts[c] || 0;
    var isActive = activeCat === c;
    var style = isActive ? 'background:' + (c==='all'?'#333':cc(c)) + ';color:#fff;border-color:transparent' : '';
    return '<span class="pill ' + (isActive?'active':'inactive') + '" style="' + style + '" onclick="setCat(\'' + c + '\')">' + label + ' ' + count + '</span>';
  }).join('');
  document.getElementById('cat-pills').innerHTML = catHtml;

  var urgMap = [
    {key:'all', label:'All'},
    {key:'act-now', label:'🔴 Act Now'},
    {key:'deep', label:'🔵 Deep'},
    {key:'watch', label:'🟡 Watch'}
  ];
  var urgColors = {'act-now':'#e24b4a', deep:'#378add', watch:'#ef9f27', all:'#333'};
  var urgHtml = urgMap.map(function(u) {
    var isActive = activeUrgency === u.key;
    var style = isActive ? 'background:' + urgColors[u.key] + ';color:#fff;border-color:transparent' : '';
    return '<span class="pill ' + (isActive?'active':'inactive') + '" style="' + style + '" onclick="setUrg(\'' + u.key + '\')">' + u.label + ' ' + urgCounts[u.key] + '</span>';
  }).join('');
  document.getElementById('urg-pills').innerHTML = urgHtml;
}

function setCat(c) {
  activeCat = c;
  activeSrc = '';
  renderCards();
  renderFilters();
}
function setUrg(u) {
  activeUrgency = u;
  activeSrc = '';
  renderCards();
  renderFilters();
}

function renderCards() {
  var container = document.getElementById('cards');
  var visible = getVisible();
  if(visible.length === 0) {
    container.innerHTML = '<p style="color:#888;padding:20px;text-align:center">No items match the current filters.</p>';
    return;
  }
  container.innerHTML = visible.map(function(item, idx) {
    var color = cc(item.cat);
    var urgEmoji = item.urgency === 'act-now' ? '🔴' : item.urgency === 'deep' ? '🔵' : '🟡';
    var chartHtml = '';
    if(item.charts.count > 0) {
      var hotClass = item.charts.hot ? ' hot' : '';
      var hotPfx = item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ';
      chartHtml = '<div class="cnote' + hotClass + '">' + hotPfx + item.charts.count + ' chart(s): ' + he(item.charts.desc) + '</div>';
    }
    var linkHtml = item.link ? '<a href="' + he(item.link) + '" target="_blank" rel="noopener" class="lnk">↗ Read full article</a>' : '';
    var ci = item.charts.count > 0 ? '<span class="ci">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '';
    return '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="card-num">' + (idx+1) + '</span>' +
        '<span class="urg">' + urgEmoji + '</span>' +
        '<span class="src-badge" style="background:' + color + '">' + he(item.source) + '</span>' +
        '<span class="cat-tag">' + cl(item.cat) + '</span>' +
        ci +
        '<span class="card-title">' + he(item.title) + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="slabel">The Idea</div>' +
        '<div class="idea">' + he(item.idea) + '</div>' +
        '<div class="slabel">My Angle</div>' +
        '<div class="angle" style="border-left:3px solid ' + color + ';background:' + color + '15">' + he(item.angle) + '</div>' +
        chartHtml +
        '<div class="tweets">' +
          '<div class="tbox">' +
            '<div class="tlabel a">TWEET A</div>' +
            '<div class="ttext">' + he(item.tweetA) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tbox">' +
            '<div class="tlabel b">TWEET B</div>' +
            '<div class="ttext">' + he(item.tweetB) + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        linkHtml +
      '</div>' +
    '</div>';
  }).join('');
}

function renderReport() {
  var hdr = document.getElementById('header-meta');
  hdr.textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items · ' + META.emailsRead + '/' + META.emailsInWindow + ' emails read';

  var incl = META.includedSources.map(function(s){
    return '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + he(s.name) + '</span> (' + s.items + ' items)';
  }).join(', ');
  var skip = META.skippedSources.map(function(s){
    return '<b>' + he(s.name) + '</b>: ' + he(s.reason);
  }).join('<br>');
  document.getElementById('rep-body').innerHTML =
    '<p><b>Window:</b> ' + META.windowStart + ' to ' + META.windowEnd + '</p>' +
    '<p style="margin-top:8px"><b>Emails in window:</b> ' + META.emailsInWindow + ' · <b>Emails read:</b> ' + META.emailsRead + ' · <b>Items extracted:</b> ' + META.itemsExtracted + '</p>' +
    '<p style="margin-top:10px"><b>Sources included:</b> ' + incl + '</p>' +
    '<p style="margin-top:10px"><b>Sources skipped:</b><br>' + skip + '</p>';
}

function init() {
  renderFilters();
  renderCards();
  renderReport();
}

init();
</script>
</body>
