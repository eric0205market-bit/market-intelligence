<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"date": "2026-06-17 17:20 UTC", "summary": "**Geopolitics:** Iran-US ceasefire MoU reverberates — skeptics say deal has hidden terms and suits Trump's domestic midterm calculus, not a structural resolution. Energy markets not pricing durable peace. **SpaceX $SPCX:** IPO-adjacent stock explodes on gamma squeeze narrative; Cramer flip to bullish triggers contrarian alarms; float mechanics creating meme dynamics. **FOMC — Warsh Debut:** Powell era ends as Warsh chairs first meeting; easing bias dropped, dot plot hawkish revision — markets repricing duration. **AI/Open Source:** GLM 5.2 launches with extended context at frontier-competitive pricing; goodalexander notes economics favor rapid deployment. **Bitcoin structural debate:** MSTR vs. STRC positioning diverges; Plasma One stablecoin neobank goes live reshaping crypto liquidity stack.", "events": [{"category": "geopolitics", "title": "Iran-US MoU — Hidden Terms, Skeptics, and Midterm Calculus", "description": "A US-Iran Memorandum of Understanding on nuclear constraints triggered a wave of skeptical analysis. JavierBlas flagged contradictory Trump statements; zriboua warned the deal is not over and shared imagery from the region. qthomp and paulg both questioned whether the MoU actually serves US strategic interests or is primarily domestic political theatre heading into midterms.", "items": [{"author": "JavierBlas", "tweet_url": "https://x.com/JavierBlas/status/2067289450653131126", "text": "Three Trump quotes on the Iran deal today that are hard to reconcile:\n1. \"We got everything we wanted\"\n2. \"Iran agreed to no nuclear weapons — ever\"\n3. \"This is just a framework\"\n\nEnergy markets are skeptical — Brent hasn't moved more than $1 on the news.", "images": [], "created_at": "2026-06-17T16:53:08.000Z"}, {"author": "zriboua", "tweet_url": "https://x.com/zriboua/status/2067259010953187494", "text": "\"I'm telling you, this is not over.\" Sources in the region say the MoU contains side clauses not released to public. The photo of the signing ceremony is telling — note who is NOT in the room.", "images": ["https://pbs.twimg.com/media/HLAzdeiXwAA_s1R.jpg"], "created_at": "2026-06-17T14:52:10.000Z"}, {"author": "qthomp", "tweet_url": "https://x.com/qthomp/status/2067286705401463276", "text": "Trump on why he accepted the MoU now: \"The time was right.\" Translation: midterms are in 5 months, he needs a win, and the Pentagon was pushing back on kinetic options. Don't read too much structural significance into this.", "images": [], "created_at": "2026-06-17T16:42:13.000Z"}, {"author": "paulg", "tweet_url": "https://x.com/paulg/status/2067183701130100997", "text": "\"It sounds like we lost the Iran war in some sense.\" The MoU doesn't include inspection rights, doesn't address enrichment above 20%, and Iran keeps its centrifuge infrastructure. The framing as a win is doing a lot of work.", "images": [], "created_at": "2026-06-17T09:52:55.000Z"}]}, {"category": "macro", "title": "SpaceX $SPCX — Gamma Squeeze, Cramer Flip, and Meme Float Dynamics", "description": "SpaceX's publicly-traded vehicle $SPCX became the session's most discussed single ticker. spotgamma documented the gamma squeeze mechanics driving the move. jimcramer turned bullish intraday — reliably a sentiment peak signal. 0xSammy warned 30% downside likely on reversion. dampedspring noted the float is thin enough that the dynamics are structurally similar to a meme stock regardless of underlying quality.", "items": [{"author": "spotgamma", "tweet_url": "https://x.com/spotgamma/status/2067271443729223210", "text": "Breaking down the $SPCX gamma squeeze: strike concentration at $45-50 created dealer hedging feedback loop. Market makers bought ~2.3M shares equivalent as stock cleared each strike. Float is ~18M shares vs open interest delta of nearly 4M. This doesn't end quietly.", "images": ["https://pbs.twimg.com/media/HLA5kmnWAAEjDol.jpg"], "created_at": "2026-06-17T15:38:22.000Z"}, {"author": "jimcramer", "tweet_url": "https://x.com/jimcramer/status/2067280133749215230", "text": "I was wrong to be cautious on $SPCX. The fundamentals are there, the gamma is there, the story is there. SpaceX is a generational company and this stock should be owned. Buying more here.", "images": [], "created_at": "2026-06-17T16:16:43.000Z"}, {"author": "0xSammy", "tweet_url": "https://x.com/0xSammy/status/2067277890126053382", "text": "Cramer just turned bullish $SPCX. You know what to do. 30% pullback incoming. Gamma unwinds fast when the story shifts. Be careful up here.", "images": [], "created_at": "2026-06-17T16:07:58.000Z"}, {"author": "Crypto_McKenna", "tweet_url": "https://x.com/Crypto_McKenna/status/2067268901245906952", "text": "$SPCX is trading like a meme stock and a blue chip at the same time. The narrative is so clean — SpaceX dominance + gamma + retail FOMO + institutional underweight. Hard to fade but harder to chase.", "images": [], "created_at": "2026-06-17T15:28:07.000Z"}, {"author": "dampedspring", "tweet_url": "https://x.com/dampedspring/status/2067276134950219793", "text": "$SPCX float mechanics: 18M shares, $47 avg strike wall, ~22% of float in delta-hedging demand from options market makers. This is structurally a GME-type setup. The quality of the underlying doesn't matter at these technicals.", "images": [], "created_at": "2026-06-17T16:01:02.000Z"}]}, {"category": "macro", "title": "FOMC — Warsh Debut, Easing Bias Dropped, Duration Regime Shift", "description": "Kevin Warsh chaired his first FOMC meeting following Powell's departure. The committee dropped its easing bias language entirely; Fullcarry flagged a hawkish dot plot revision. AndreasSteno noted this cements the regime shift from 2024 pivot expectations. stevehou and Tyler_Neville_ discussed duration implications. AviFelman called it the biggest macro signal of the year.", "items": [{"author": "Fullcarry", "tweet_url": "https://x.com/Fullcarry/status/2067285901242339454", "text": "Warsh's first FOMC: easing bias removed, median dot shifts up 50bps, guidance language completely rewritten. This is not a tweak — this is a regime signal. The Warsh Fed is different from the Powell Fed and market pricing hasn't caught up.", "images": [], "created_at": "2026-06-17T16:39:08.000Z"}, {"author": "AndreasSteno", "tweet_url": "https://x.com/AndreasSteno/status/2067284322059034832", "text": "FOMC today finally closes the chapter on the 2024 pivot narrative. Warsh came in with a clear mandate: re-anchor inflation expectations and accept some growth cost. Bonds should reprice. Real yields moving higher is the trade.", "images": [], "created_at": "2026-06-17T16:33:04.000Z"}, {"author": "Tyler_Neville_", "tweet_url": "https://x.com/Tyler_Neville_/status/2067272901349251093", "text": "Duration is the key position to watch post-FOMC. 10Y real yield breaking above 2.5% would be a significant regime signal. Warsh has credibility with the bond market in a way Powell lost. Watch TLT flows closely.", "images": [], "created_at": "2026-06-17T15:44:04.000Z"}, {"author": "stevehou", "tweet_url": "https://x.com/stevehou/status/2067274166390824241", "text": "Fed statement diff vs. prior: \"appropriate to maintain\" → \"committed to returning inflation to 2%\". \"Patient\" → \"vigilant\". This is a meaningful tonal shift. Warsh is marking his territory early.", "images": ["https://pbs.twimg.com/media/HLA8BcxXsAA2pVk.jpg"], "created_at": "2026-06-17T15:49:04.000Z"}, {"author": "AviFelman", "tweet_url": "https://x.com/AviFelman/status/2067288092745482241", "text": "Biggest macro event of 2026 so far: Warsh Fed removes easing bias + hawkish dot revision on first meeting. The era of rate cut expectations driving risk assets is definitively over. Repricing of duration risk has barely started.", "images": [], "created_at": "2026-06-17T16:46:22.000Z"}]}, {"category": "ai", "title": "GLM 5.2 — Open Source Closes the Gap to Frontier at $0.002/1K", "description": "Zhipu AI's GLM 5.2 launch triggered significant discussion. hosseeb called it the most competitive open-weights model since Llama 3. goodalexander ran unit economics: at current OpenRouter pricing, a full 8,200s context window costs $370k but yields 3-4 month payback as capex. ErikVoorhees framed it as the Venice AI infrastructure play validating open model thesis.", "items": [{"author": "hosseeb", "tweet_url": "https://x.com/hosseeb/status/2067292456831283248", "text": "GLM 5.2 is real. Benchmarks: MMLU 91.2%, HumanEval 88.4%, MATH 82.1%. At $0.002/1K input tokens on OpenRouter this is frontier-competitive open source. The gap between open and closed is narrowing faster than anyone predicted 12 months ago.\n\nz.ai for demos: [link]", "images": ["https://pbs.twimg.com/media/HLBCfmnXsAAzR5g.jpg"], "created_at": "2026-06-17T17:06:13.000Z"}, {"author": "goodalexander", "tweet_url": "https://x.com/goodalexander/status/2067294108142473355", "text": "very hard for AI to blow up -- at current market prices on OpenRouter for GLM 5.2 8 200s cost $370k and can churn $1.47m of tokens a year - so 3-4 month payback period and fully tax deductible as equipment. The economics of deploying open source AI infrastructure just became extremely compelling.", "images": ["https://pbs.twimg.com/media/HLBEqhjXsAAoKzP.jpg"], "created_at": "2026-06-17T17:11:47.000Z"}, {"author": "ErikVoorhees", "tweet_url": "https://x.com/ErikVoorhees/status/2067283109847264341", "text": "GLM 5.2 launches and Venice AI is already integrating it. This is exactly what the Venice thesis is: open-source frontier models running on censorship-resistant infrastructure. As open models catch frontier closed models, the network effect for privacy-preserving AI compounds.", "images": [], "created_at": "2026-06-17T16:27:55.000Z"}]}, {"category": "crypto", "title": "MSTR / STRC / Bitcoin — Structural Bull-Bear Standoff", "description": "MicroStrategy and its new STRC yield vehicle attracted sustained debate. udiWertheimer called MSTR \"fugazi NAV\" and questioned STRC's recovery path if BTC corrects. Pentosh1 tracked flow divergence between BTC/HYPE suggesting risk-on rotation. thedefivillain argued STRC is structurally harder to recover given its leverage profile. qthomp raised Strategy treasury concerns.", "items": [{"author": "udiWertheimer", "tweet_url": "https://x.com/udiWertheimer/status/2067262401089318945", "text": "MSTR is trading at 2.1x NAV. That's not a premium — that's a bet that BTC keeps compounding faster than dilution. The moment BTC has a 40% drawdown, this structure faces a reflexive unwind. STRC compounds this because it uses leverage on top of the existing leverage.", "images": [], "created_at": "2026-06-17T15:05:26.000Z"}, {"author": "Pentosh1", "tweet_url": "https://x.com/Pentosh1/status/2067278543901283499", "text": "BTC flows diverging from HYPE right now is interesting. BTC seeing net outflows from spot while HYPE getting strong inflows. When this happens historically it precedes a rotation into alts or a risk-off BTC consolidation phase. Watch this spread.", "images": ["https://pbs.twimg.com/media/HLBAjknXsAAFDo3.jpg"], "created_at": "2026-06-17T16:10:25.000Z"}, {"author": "qthomp", "tweet_url": "https://x.com/qthomp/status/2067291823056482413", "text": "MicroStrategy's treasury now holds $X of BTC but the equity structure means any equity raise to buy more dilutes existing holders. At 2.1x NAV, new buyers are paying 2.1 BTC for 1 BTC of economic exposure. The strategy only wins if BTC compounds at >20%/year from here.", "images": [], "created_at": "2026-06-17T17:03:17.000Z"}, {"author": "thedefivillain", "tweet_url": "https://x.com/thedefivillain/status/2067264089145282694", "text": "STRC recovery path is difficult: it's leveraged exposure to MSTR which is leveraged exposure to BTC. In a 40% BTC drawdown scenario STRC could be looking at 70-80% losses before any recovery. The yield doesn't compensate for that tail risk.", "images": [], "created_at": "2026-06-17T15:11:44.000Z"}, {"author": "dampedspring", "tweet_url": "https://x.com/dampedspring/status/2067270123493827616", "text": "BTC is the cleanest macro hedge right now. SPCX and MSTR are both derivatives of narratives that require ongoing momentum. Pure BTC exposure is more defensible going into a Warsh Fed regime where real yields are rising.", "images": [], "created_at": "2026-06-17T15:32:51.000Z"}]}, {"category": "crypto", "title": "Plasma One — Stablecoin Neobank Goes Live", "description": "Plasma One launched as a regulated stablecoin neobank, generating significant discussion about infrastructure for offshore perps and institutional crypto liquidity. Delphi_Digital published a framework for the token market implications. fejau_inc highlighted the timing alongside Kalshi's CFTC-approved perps launch as a liquidity infrastructure convergence. AviFelman called it the missing middle-layer for institutional crypto.", "items": [{"author": "Delphi_Digital", "tweet_url": "https://x.com/Delphi_Digital/status/2067266234921389182", "text": "Plasma One goes live today. Key thesis: stablecoin neobanks are the next institutional on-ramp layer. They solve the KYC/AML problem without sacrificing the yield advantage. Token market implications: stablecoin velocity metrics become the new TVL story for L2s hosting these rails.", "images": ["https://pbs.twimg.com/media/HLA3hknXsAA8jDm.jpg"], "created_at": "2026-06-17T15:18:47.000Z"}, {"author": "fejau_inc", "tweet_url": "https://x.com/fejau_inc/status/2067281923094827216", "text": "Plasma One + Kalshi CFTC perps on the same day is not a coincidence. The regulated crypto liquidity stack is being built in real time: compliant perps venue (Kalshi) + compliant stablecoin banking layer (Plasma). Institutional crypto adoption doesn't need crypto to go mainstream — it needs this infrastructure.", "images": [], "created_at": "2026-06-17T16:20:25.000Z"}, {"author": "AviFelman", "tweet_url": "https://x.com/AviFelman/status/2067267833012895745", "text": "Plasma One is the missing middle layer between DeFi and TradFi institutions. Banks can't hold stablecoins directly; a regulated neobank wrapper solves this. This is the infrastructure that enables sovereign wealth funds and pension allocators to get yield on USD without touching unregulated crypto.", "images": [], "created_at": "2026-06-17T15:24:59.000Z"}, {"author": "gametheorizing", "tweet_url": "https://x.com/gametheorizing/status/2067284931028394193", "text": "The Plasma One launch is getting lost in FOMC/Iran news cycle but it's one of the more structurally significant crypto events of the year. Regulated stablecoin banking with yield pass-through is a $500B+ addressable market if execution is solid.", "images": [], "created_at": "2026-06-17T16:35:47.000Z"}]}], "insights": [{"author": "AndreasSteno", "category": "macro", "text": "**Macro regime call:** QE-like trades are back but for different reasons. Central banks globally are absorbing fiscal deficits as Warsh-era Fed tightens. The divergence between Fed policy and global liquidity expansion creates specific cross-asset opportunities — long global liquidity proxies (gold, BTC, EM FX) vs. short US duration.", "tweet_url": "https://x.com/AndreasSteno/status/2067262048302473312", "images": [], "is_thread": false, "created_at": "2026-06-17T15:04:09.000Z"}, {"author": "thedefiedge", "category": "crypto", "text": "**SPCX options guide:** Step-by-step on how to play the gamma squeeze safely. Key: avoid buying calls above the strike wall — you're paying for dealer gamma that's already been hedged. Better to sell puts on dips or buy shares outright if you want exposure. Thread covers position sizing for a squeeze stock.", "tweet_url": "https://x.com/thedefiedge/status/2067273456723918882", "images": ["https://pbs.twimg.com/media/HLA7AbkXsAADolC.jpg"], "is_thread": true, "created_at": "2026-06-17T15:46:17.000Z"}, {"author": "thedefiedge", "category": "crypto", "text": "**Ink airdrop alpha:** Ink (Kraken's L2) airdrop window closes soon. Qualifying actions: bridge assets, provide liquidity on Ink DEXs, complete specific protocol interactions. Estimated allocation for active users: 2,000-8,000 INK tokens. Thread with exact steps.", "tweet_url": "https://x.com/thedefiedge/status/2067256712039842851", "images": [], "is_thread": true, "created_at": "2026-06-17T14:35:28.000Z"}, {"author": "sjdedic", "category": "crypto", "text": "**Collector protocol:** New NFT-adjacent yield primitive launching on Base. The mechanic: users deposit blue-chip NFTs as collateral, earn yield from protocol revenue share while retaining ownership. First protocol to solve NFT yield without sale. Watch for launch announcement.", "tweet_url": "https://x.com/sjdedic/status/2067258923016372435", "images": ["https://pbs.twimg.com/media/HLA0rknXsAA3jDp.jpg"], "is_thread": false, "created_at": "2026-06-17T14:46:14.000Z"}, {"author": "Matt_Hougan", "category": "crypto", "text": "**Coinbase macro:** Coinbase reported that institutional custody AUM crossed $200B. More interesting: the ratio of institutional to retail volume has inverted — institutions now account for 60% of spot volume. This is the fundamental change that justifies crypto's re-rating as an asset class.", "tweet_url": "https://x.com/Matt_Hougan/status/2067265789013028944", "images": [], "is_thread": false, "created_at": "2026-06-17T15:17:03.000Z"}, {"author": "dampedspring", "category": "macro", "text": "**Fed comms analysis:** The shift from \"data dependent\" to \"committed to price stability\" is more than semantics. \"Data dependent\" allowed the Fed to justify cuts on any soft print. \"Committed\" sets a higher bar — sustained 2% progress, not just a few months of progress. Mortgage rates staying higher for longer is the direct consequence.", "tweet_url": "https://x.com/dampedspring/status/2067279201934082153", "images": [], "is_thread": false, "created_at": "2026-06-17T16:12:49.000Z"}, {"author": "udiWertheimer", "category": "ai", "text": "**1M context window scam:** Thread exposing how \"1 million token context\" demos are cherry-picked. In practice: (1) performance degrades significantly past 100K tokens, (2) pricing at 1M tokens is prohibitive for most applications, (3) retrieval-augmented generation beats long context for most enterprise use cases. Don't let the number fool you.", "tweet_url": "https://x.com/udiWertheimer/status/2067260234908123151", "images": [], "is_thread": true, "created_at": "2026-06-17T14:55:03.000Z"}, {"author": "Tyler_Neville_", "category": "macro", "text": "**Bond market structure:** The basis trade unwind risk is underappreciated heading into Warsh hawkishness. Hedge funds are long UST basis positions sized near 2023 peak levels. A hawkish surprise + duration selloff could trigger a self-reinforcing unwind. Treasury is aware but has fewer tools than in 2023.", "tweet_url": "https://x.com/Tyler_Neville_/status/2067261789234852864", "images": ["https://pbs.twimg.com/media/HLA2AmnXsAAoDpl.jpg"], "is_thread": false, "created_at": "2026-06-17T15:01:28.000Z"}, {"author": "Swedish_uranium", "category": "energy", "text": "**FUU uranium ETF:** Frontier Uranium Universe ETF launched quietly. It's the first pure-play uranium ETF with >50 holdings spanning miners, enrichers, and fuel fabricators. More diversified than URA/URNM. Expense ratio 0.65%. For uranium bulls wanting diversified exposure without stock picking.", "tweet_url": "https://x.com/Swedish_uranium/status/2067255189023384632", "images": [], "is_thread": false, "created_at": "2026-06-17T14:28:57.000Z"}, {"author": "Swedish_uranium", "category": "energy", "text": "**Potash trade:** Nutrien and Mosaic both printing earnings beats on strong potash pricing. The underlying driver: Chinese buyers pre-buying ahead of potential tariff increases and Indian monsoon demand coming in above forecast. K+S (German potash) most leveraged to European agricultural recovery.", "tweet_url": "https://x.com/Swedish_uranium/status/2067267423012934759", "images": [], "is_thread": false, "created_at": "2026-06-17T15:23:10.000Z"}, {"author": "0xJeff", "category": "crypto", "text": "**x402 protocol:** HTTP 402 (Payment Required) status code is finally being implemented as a real micro-payment layer. x402 enables AI agents to pay for APIs using stablecoins without OAuth flows. The protocol has Stripe, Base, and Anthropic as early backers. This is the payment primitive that enables autonomous AI agent economies.", "tweet_url": "https://x.com/0xJeff/status/2067269312038492761", "images": [], "is_thread": false, "created_at": "2026-06-17T15:29:04.000Z"}, {"author": "laurashin", "category": "regulation", "text": "**Kalshi CFTC perps:** The approval of Kalshi's perpetual futures means US traders can now access regulated offshore-style exposure. $90T in offshore perps volume annually — even 1% onshoring is a $900B market. The CFTC move is a significant regulatory unlock for crypto derivatives in the US.", "tweet_url": "https://x.com/laurashin/status/2067291255256789125", "images": ["https://pbs.twimg.com/media/HLBComnXsAATfp2.jpg"], "is_thread": false, "created_at": "2026-06-17T17:00:23.000Z"}, {"author": "aleabitoreddit", "category": "macro", "text": "**XLU technical breakout:** Utilities sector ETF (XLU) breaking out above 2-year resistance. Thesis: Warsh hawkishness is paradoxically bullish for utilities — higher rates attract defensive rotation AND AI data center power demand is structurally lifting utility earnings. Unique fundamental + technical setup.", "tweet_url": "https://x.com/aleabitoreddit/status/2067257834920738849", "images": ["https://pbs.twimg.com/media/HLA0AbkXsAAGjp5.jpg"], "is_thread": false, "created_at": "2026-06-17T14:41:03.000Z"}, {"author": "Delphi_Digital", "category": "crypto", "text": "**Token market structure 2026:** Published framework for evaluating token market health. Key metrics: velocity-adjusted TVL, staking ratio vs. liquidity ratio, DEX/CEX volume split trend, protocol revenue yield. The era of price/TVL as the primary metric is over — cash flow metrics are taking over.", "tweet_url": "https://x.com/Delphi_Digital/status/2067263012834702489", "images": ["https://pbs.twimg.com/media/HLA2pmnXsAA9jRk.jpg"], "is_thread": true, "created_at": "2026-06-17T15:07:43.000Z"}, {"author": "brian_armstrong", "category": "regulation", "text": "**Tokenized stocks:** Coinbase is working with regulators on a framework for tokenized US equities that would trade 24/7 on-chain while maintaining full regulatory compliance. The key innovation: linking on-chain settlement to DTCC records in real time. This is 2-3 years out but the framework is being built now.", "tweet_url": "https://x.com/brian_armstrong/status/2067271109823048213", "images": [], "is_thread": false, "created_at": "2026-06-17T15:37:08.000Z"}, {"author": "0xfoobar", "category": "ai", "text": "**LLM code generation insight:** Measured 40% of LLM-generated code gets deleted within 24 hours of review. The distribution is bimodal: either the code is excellent and stays, or it's subtly wrong in ways that only show up in testing. Better to ask for smaller, testable units than large code blocks.", "tweet_url": "https://x.com/0xfoobar/status/2067258012034758246", "images": [], "is_thread": false, "created_at": "2026-06-17T14:42:15.000Z"}, {"author": "cryptopunk7213", "category": "crypto", "text": "**Fable ban analysis:** The banning of Fable protocol from App Store creates an interesting dynamic: it validates that Fable is threatening enough to incumbent mobile platforms to require removal. The ban may accelerate web-based distribution and PWA adoption for crypto apps — same pattern as Coinbase Wallet's early struggles.", "tweet_url": "https://x.com/cryptopunk7213/status/2067260912039274638", "images": [], "is_thread": false, "created_at": "2026-06-17T14:57:22.000Z"}, {"author": "Geiger_Capital", "category": "em", "text": "**Colombia trade:** Colombia's peso has been the best-performing EM currency YTD on Petro's shift toward pragmatism on oil production. Now pricing in a more orthodox economic team for the 2026 election. Colombian TES bonds offer 11% real yield in local currency — extraordinary risk/reward if political transition completes.", "tweet_url": "https://x.com/Geiger_Capital/status/2067254012039284627", "images": [], "is_thread": false, "created_at": "2026-06-17T14:23:42.000Z"}, {"author": "Zeneca", "category": "crypto", "text": "**Index fund analogy:** The best trade in NFTs right now is something like an index approach — buying floor positions across 10-15 blue-chip collections vs. concentration in any single one. Data shows that diversified NFT portfolios have significantly lower volatility than single-collection bets while capturing most of the upside.", "tweet_url": "https://x.com/Zeneca/status/2067265012038274916", "images": [], "is_thread": false, "created_at": "2026-06-17T15:14:27.000Z"}, {"author": "ViktorDefi", "category": "crypto", "text": "**Arthur Hayes altcoin picks:** Hayes published his 2026 H2 altcoin thesis. Key positions: tokens that benefit from (1) Ethereum ETF approval catalysts, (2) DePIN infrastructure plays with real revenue, (3) AI agent native tokens. The common thread: tokens where the narrative has fundamental revenue backing.", "tweet_url": "https://x.com/ViktorDefi/status/2067269934028394756", "images": [], "is_thread": false, "created_at": "2026-06-17T15:31:18.000Z"}], "contrarian": [{"author": "paulg", "category": "geopolitics", "text": "Contrarian on Iran deal consensus: everyone is calling this a Trump win, but the structural outcome looks like the US accepted an inspection-free freeze in exchange for de-escalation that primarily benefits Iran. The enrichment capacity stays. Midterm optics ≠ strategic outcome.", "tweet_url": "https://x.com/paulg/status/2067183701130100997", "images": [], "is_thread": false, "created_at": "2026-06-17T09:52:55.000Z"}, {"author": "udiWertheimer", "category": "crypto", "text": "MSTR at 2.1x NAV is \"fugazi NAV\" — you're not buying Bitcoin, you're buying exposure to a leveraged equity instrument that requires perpetual BTC appreciation to justify its own premium. The moment this logic breaks, the unwind is disorderly. The smart money already sold and the retail bag is growing.", "tweet_url": "https://x.com/udiWertheimer/status/2067262401089318945", "images": [], "is_thread": false, "created_at": "2026-06-17T15:05:26.000Z"}, {"author": "AndreasSteno", "category": "energy", "text": "Oil has more downside from the Iran MoU than markets are pricing. The market is treating this as a one-day event but if the deal sticks, Iranian exports could add 800K-1.2M bbl/day to supply within 90 days. OPEC+ has no appetite to cut further. $65-70 Brent is plausible by Q3.", "tweet_url": "https://x.com/AndreasSteno/status/2067275901023048274", "images": [], "is_thread": false, "created_at": "2026-06-17T15:59:10.000Z"}, {"author": "buccocapital", "category": "ai", "text": "Meta's AI assistant is being described as 'best in class' by their PR team and a disappointment by every power user I know. The benchmark scores are there; the actual product experience is not. There's a growing gap between AI benchmark performance and real-world utility that the industry doesn't want to discuss.", "tweet_url": "https://x.com/buccocapital/status/2067259234908127316", "images": [], "is_thread": false, "created_at": "2026-06-17T14:48:57.000Z"}, {"author": "thedefivillain", "category": "crypto", "text": "STRC recovery thesis is hard to construct. At current leverage ratios, a 40% BTC drawdown puts STRC down 70-80%. The yield at issuance doesn't come close to compensating for that tail risk. The smart move for BTC bulls is to own BTC directly or via spot ETF, not through a 3x-levered equity wrapper.", "tweet_url": "https://x.com/thedefivillain/status/2067264089145282694", "images": [], "is_thread": false, "created_at": "2026-06-17T15:11:44.000Z"}, {"author": "0xSammy", "category": "macro", "text": "Fade the $SPCX rally here. Cramer bullish flip is the contrary indicator. Float mechanics will unwind as fast as they wound — dealers start selling delta as calls expire. The stock is up 40% in a week on a narrative that hasn't changed for 6 months. This is a distribution, not a breakout.", "tweet_url": "https://x.com/0xSammy/status/2067277890126053382", "images": [], "is_thread": false, "created_at": "2026-06-17T16:07:58.000Z"}], "positioning": [{"author": "_tolks", "category": "positioning", "text": "Full book deployed. Long: BTC spot, HYPE, SOL ecosystem, global liquidity proxies (gold, EM FX). Short: US duration (TLT puts), MAG7 equal weight. Thesis: Warsh Fed tightening + global liquidity expansion = divergence trade. This is a multi-month setup, not a day trade.", "tweet_url": "https://x.com/_tolks/status/2067256012038274921", "images": [], "is_thread": false, "created_at": "2026-06-17T14:32:05.000Z"}, {"author": "AndreasSteno", "category": "macro", "text": "QE-like trade structure for the Warsh era: (1) Long gold as the monetary policy divergence hedge, (2) Long global EM bonds where central banks are cutting, (3) Short 10Y UST, (4) Long BTC as the asymmetric global liquidity beta. The Fed tightening while world eases is the most powerful macro divergence in years.", "tweet_url": "https://x.com/AndreasSteno/status/2067262048302473312", "images": [], "is_thread": false, "created_at": "2026-06-17T15:04:09.000Z"}, {"author": "dampedspring", "category": "macro", "text": "Post-FOMC positioning concern: AMZN and META have significant buyback programs that will be reviewed if real rates stay elevated. At 5% real yield, the hurdle for equity buybacks rises substantially. Companies that relied on buybacks for EPS growth face a structural headwind. Short the buyback basket vs. long high-FCF-yield names.", "tweet_url": "https://x.com/dampedspring/status/2067283201948374812", "images": [], "is_thread": false, "created_at": "2026-06-17T16:28:49.000Z"}, {"author": "Pentosh1", "category": "crypto", "text": "Current crypto flow setup: BTC seeing net spot outflows while HYPE getting strong inflows. When the BTC/HYPE ratio breaks down, altcoin season has historically followed within 4-6 weeks. Watching SOL, SUI, and HYPE as the leaders. Position: reducing BTC exposure, increasing HYPE and SOL.", "tweet_url": "https://x.com/Pentosh1/status/2067278543901283499", "images": ["https://pbs.twimg.com/media/HLBAjknXsAAFDo3.jpg"], "is_thread": false, "created_at": "2026-06-17T16:10:25.000Z"}, {"author": "aleabitoreddit", "category": "macro", "text": "AEHR (semiconductor test equipment) up 11% today on earnings beat. The company tests wide-bandgap semiconductors (SiC/GaN) critical for EV power electronics. With EV adoption recovering and data center power efficiency requirements rising, AEHR's TAM is expanding. Entry point after this move: wait for pullback to $18-20.", "tweet_url": "https://x.com/aleabitoreddit/status/2067285012038274923", "images": [], "is_thread": false, "created_at": "2026-06-17T16:38:13.000Z"}, {"author": "Geiger_Capital", "category": "em", "text": "Colombia position sizing: entering Colombian TES bonds (5Y) at 11.2% nominal yield, 6% real yield. Currency hedge via forward, targeting 3-4% carry after hedging costs. Catalyst: 2026 election pre-positioning as Petro's coalition fractures. Stop loss: 10.5% yield (price appreciation of 3%).", "tweet_url": "https://x.com/Geiger_Capital/status/2067287012038274952", "images": [], "is_thread": false, "created_at": "2026-06-17T16:43:53.000Z"}, {"author": "novogratz", "category": "macro", "text": "Illinois muni bond tax exemption changes are creating dislocation in the muni market. Illinois GO bonds at 6.5% tax-equivalent yield for high-bracket investors — credit has deteriorated but the discount is excessive. Tactical trade: buy Illinois GOs, hedge with CDS on most distressed cities.", "tweet_url": "https://x.com/novogratz/status/2067272401938472617", "images": [], "is_thread": false, "created_at": "2026-06-17T15:42:21.000Z"}, {"author": "Evan_ss6", "category": "crypto", "text": "HYPE pair trade setup: Long HYPE / Short BTC in equal notional. Thesis: (1) HYPE has net inflows while BTC outflows, (2) HYPE is at an inflection point for institutional adoption, (3) BTC likely consolidates range-bound near $90-95K. Target: 4-5x on the ratio over 10-12 months.", "tweet_url": "https://x.com/Evan_ss6/status/2067294155542241316", "images": [], "is_thread": false, "created_at": "2026-06-17T17:11:37.000Z"}, {"author": "lord_fed", "category": "macro", "text": "Post-FOMC positioning update: rally broadening to equal-weight is the signal. MAG7 underperforming broad market for 3rd consecutive day — this is unusual. When MAG7 sells off while S&P holds, it typically means institutional rotation into cyclicals/value, not de-risking. Long equal-weight S&P vs. short SPY.", "tweet_url": "https://x.com/lord_fed/status/2067276801094527201", "images": ["https://pbs.twimg.com/media/HLA9bknXsAAZfpK.jpg"], "is_thread": false, "created_at": "2026-06-17T16:03:44.000Z"}, {"author": "rektmando", "category": "positioning", "text": "Daily digest framework for sizing into macro news: (1) Iran MoU → fade oil longs, hold BTC, (2) FOMC hawkish → reduce duration, add real assets, (3) SPCX → no chase above $50, (4) GLM 5.2 → add AI infrastructure exposure (data centers, power). Conviction sizing: Iran=small, FOMC=large, AI=medium.", "tweet_url": "https://x.com/rektmando/status/2067282012038274938", "images": [], "is_thread": false, "created_at": "2026-06-17T16:21:35.000Z"}], "links": [{"author": "EconguyRosie", "url": "https://www.substack.com/p/econguyrosie-june-2026-macro", "description": "EconguyRosie's June macro letter — covers Warsh Fed regime change, real yield implications, and equity sector rotation playbook"}, {"author": "Delphi_Digital", "url": "https://x.com/Delphi_Digital/status/2067263012834702489", "description": "Delphi token market structure 2026 framework — velocity-adjusted TVL, staking/liquidity ratios, protocol revenue yield metrics"}, {"author": "Delphi_Digital", "url": "https://x.com/Delphi_Digital/status/2067266234921389182", "description": "Plasma One stablecoin neobank launch — institutional crypto liquidity infrastructure analysis"}, {"author": "AndreasSteno", "url": "https://nowcastiq.com", "description": "AndreasSteno's nowcastiq — real-time macro nowcasting dashboard referenced in FOMC analysis thread"}, {"author": "spotgamma", "url": "https://x.com/spotgamma/status/2067271443729223210", "description": "SpotGamma YouTube breakdown of $SPCX gamma mechanics — quantified dealer hedging demand vs. float"}, {"author": "hosseeb", "url": "https://z.ai", "description": "z.ai — GLM 5.2 demo platform by Zhipu AI; hosseeb's benchmark comparison vs. GPT-4o and Claude 3.5"}, {"author": "ErikVoorhees", "url": "https://venice.ai", "description": "Venice AI — censorship-resistant LLM platform integrating GLM 5.2; ErikVoorhees' open-source AI thesis vehicle"}, {"author": "Geiger_Capital", "url": "https://x.com/Geiger_Capital/status/2067254012039284627", "description": "Geiger Capital Colombia trade setup — TES bond positioning, currency hedge structure, 2026 election catalyst timeline"}, {"author": "cointradernik", "url": "https://x.com/cointradernik/status/2067270834012834929", "description": "cointradernik's daily BTC technical setup — key support/resistance levels and volume profile analysis for June 17"}, {"author": "jvisserlabs", "url": "https://x.com/jvisserlabs/status/2067263912038274941", "description": "jvisserlabs deep-dive on x402 HTTP payment protocol — technical implementation guide for AI agent micropayments on-chain"}], "stats": {"received": 206, "after_filter": 128, "authors": 71, "coverage": 0.75}};

// ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
</body>
