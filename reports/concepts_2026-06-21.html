e campaign directly addresses this structural gap.", "speaker": "Peter Dickinson", "type": "causal", "entities": ["Ukraine", "Russia"], "conviction": "high", "so_what": "Ukraine's 2026 operational approach is fundamentally different from 2023—if drone interdiction proves effective, the probability of a successful ground offensive materially increases.", "quote": "Ukraine's failed counteroffensive in summer 2023 underlined the cost of attacking well-prepared Russian defenses without first isolating the enemy or achieving local air superiority", "locator": "Ukraine's failed counteroffensive", "quote_verified": true}, {"claim": "Drones have evolved from a 'supporting role' in 2022 to 'the dominant weapons accounting for the vast majority of casualties' in the Ukraine war—a transformation in four years that makes this 'the world's first drone war.'", "speaker": "Peter Dickinson", "type": "data_point", "entities": ["Ukraine", "Russia"], "conviction": "high", "so_what": "The drone-dominant attrition model has profound implications for defense procurement globally; ground forces doctrine and conventional equipment priorities will require fundamental rethinking.", "quote": "When the invasion began in 2022, drones occupied a supporting role in a war that was still led by tanks and artillery. Four years on, drones are now the dominant weapons accounting for the vast majority of casualties.", "locator": "Russia's full-scale invasion of Ukraine is the world's first drone war", "quote_verified": true}]}, {"theme": "Russia's countermeasures and the time-limited window", "insights": [{"claim": "Russia is adapting to Ukraine's drone campaign with camouflage, decoys, mobile fire teams along logistics routes, and netting over highways, but will likely struggle to implement these measures across all of occupied Ukraine given the vast territory involved.", "speaker": "Peter Dickinson", "type": "causal", "entities": ["Russia", "Ukraine"], "conviction": "medium", "so_what": "Russia cannot fully counter Ukraine's drone campaign across all occupied territory simultaneously; strategic prioritization of chokepoints over breadth creates exploitable gaps for Ukraine.", "quote": "Russian forces in southern Ukraine are now using camouflage and decoys, while also deploying mobile fire teams along key logistics routes and erecting netting over highways", "locator": "There are already signs that Russia is adapting", "quote_verified": true}, {"claim": "Ukraine's current drone advantage represents a 'window of opportunity that will not remain open indefinitely'—Russia's own drone capabilities are evolving rapidly, and Kyiv's partners must supply support without delay to exploit the current edge.", "speaker": "Peter Dickinson", "type": "thesis", "entities": ["Ukraine", "Russia"], "conviction": "high", "so_what": "The time-sensitive nature of Ukraine's drone advantage argues for immediate partner support rather than deliberative aid cycles; delay directly reduces strategic return.", "quote": "the recent shift in battlefield momentum represents a window of opportunity that will not remain open indefinitely and must be exploited without delay", "locator": "Ukraine's current advantage in the drone war", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["Ukraine", "Russia", "Crimea", "Zaporizhzhia", "Ukraine Ministry of Defense"], "source_meta": {"author": "Peter Dickinson", "word_count": 1133, "paywalled": false}}, {"record_id": "9882d002936d1885", "source_type": "concepts", "source_name": "Atlantic Council", "source_url": "https://www.atlanticcouncil.org/blogs/econographics/central-banks-cant-afford-to-keep-missing-their-inflation-targets/", "title": "Central banks can't afford to keep missing their inflation targets", "published_date": "2026-06-19", "language": "en", "processed_at": "2026-06-21T07:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro"], "gist": "The Iran war has pushed more major central banks off their inflation targets simultaneously than at any time since COVID-19, with US CPI at 4.2%; new Fed Chair Kevin Warsh is maintaining a hawkish 2% commitment but faces political pressure from Trump who nominated him to cut, while structurally sticky components (gasoline, fertilizer, food) mean price relief will lag any Hormuz peace agreement.", "themes": [{"theme": "Synchronized global inflation overshoot driven by Iran war", "insights": [{"claim": "More of the world's largest central banks are missing their inflation targets simultaneously than at any point since the height of COVID-19, driven by the Iran war's commodity shock via the Strait of Hormuz closure.", "speaker": "Atlantic Council", "type": "data_point", "entities": ["Federal Reserve", "ECB", "Bank of England", "Strait of Hormuz", "Iran"], "conviction": "high", "so_what": "Synchronized global inflation overshoot constrains all major central banks from cutting simultaneously to support growth; watch for coordinated tightening that compresses global risk appetite.", "quote": "More of the world's largest central banks are missing their targets today than at any point since the height of the COVID-19 shock.", "locator": "Warsh isn't the only central bank leader", "quote_verified": true}, {"claim": "US CPI stands at 4.2%—the highest in over three years—with Australia, Brazil, and the Eurozone not far behind; the ECB is raising rates for the first time since 2023 to address eurozone inflation above its 2% target.", "speaker": "Atlantic Council", "type": "data_point", "entities": ["United States", "Australia", "Brazil", "Eurozone", "ECB"], "conviction": "high", "so_what": "The ECB's renewed rate hike cycle is a significant hawkish pivot with implications for European sovereign spreads, credit, and equity multiples—monitor ECB guidance closely.", "quote": "The latest US consumer price index inflation rate sits at 4.2 percent—the highest in over three years—with Australia, Brazil, and the Eurozone not far behind.", "locator": "The latest US consumer price index", "quote_verified": true}, {"claim": "South Korean inflation is at its highest in two years; Jordan was forced to pay an additional $200 million to import fuel in March (95% fuel-import dependent); Egypt raised energy prices by 31% in April—all attributed to the Iran war's commodity shock.", "speaker": "Atlantic Council", "type": "data_point", "entities": ["South Korea", "Jordan", "Egypt", "Iran"], "conviction": "high", "so_what": "Emerging market commodity importers face dual pressure from higher import bills and social instability from subsidy costs; credit and currency risk is acute for countries like Jordan and Egypt.", "quote": "South Korean inflation is at its highest in two years, and according to the finance ministry would have been even higher if not for nationwide fuel price caps", "locator": "Brazil's inflation rate had sat inside the central bank's 1.5 to 4.5 percent band", "quote_verified": true}]}, {"theme": "Fed credibility and Warsh's political dilemma", "insights": [{"claim": "New Fed Chair Kevin Warsh shortened the Fed's rate policy statement, eliminated forward guidance, and launched five task forces to study overhauls—a communication 'regime change' while maintaining a 'strong commitment' to the 2% inflation target.", "speaker": "Atlantic Council", "type": "data_point", "entities": ["Kevin Warsh", "Federal Reserve", "FOMC"], "conviction": "high", "so_what": "Warsh's communication reset increases uncertainty for markets that relied on forward guidance to price rates; expect higher rate volatility and wider option skews on US rates.", "quote": "he shortened the Fed's rate policy statement and opted to stop giving 'forward guidance'", "locator": "Warsh has already moved fast", "quote_verified": true}, {"claim": "Warsh's hawkish stance on the 2% inflation target will draw the ire of Trump, who nominated him expecting rate cuts—creating a structural tension between Fed independence and presidential pressure that is the key tail risk for US rates.", "speaker": "Atlantic Council", "type": "causal", "entities": ["Kevin Warsh", "Federal Reserve", "Donald Trump"], "conviction": "high", "so_what": "If Trump pressures Warsh to cut into an above-target inflation environment, long-end US rates could spike and the dollar weaken sharply on credibility erosion.", "quote": "this hawkishness and the potential for rate hikes later this year will draw the ire of the president who nominated him to do just the opposite", "locator": "This puts Warsh in a delicate situation", "quote_verified": true}, {"claim": "US 5-10 year inflation expectations fell to 3.4% from 3.9% in May despite Strait of Hormuz closure—suggesting the public 'still half-believes that this most recent bout will pass'—but expectations remain well above the 2.8-3.2% range of 2024.", "speaker": "Atlantic Council", "type": "data_point", "entities": ["United States", "Federal Reserve", "University of Michigan"], "conviction": "high", "so_what": "Long-run US inflation expectations are de-anchoring at a moderate pace; if they climb from 3.4% toward 4%+, the Fed faces a credibility crisis requiring aggressive rate hikes regardless of Trump pressure.", "quote": "The University of Michigan's five-to-ten-year measure of those expectations dropped to 3.4 percent this month from 3.9 percent in May.", "locator": "But despite the closure of the Strait of Hormuz", "quote_verified": true}]}, {"theme": "Structural inflation persistence post-Hormuz", "insights": [{"claim": "Even if a peace agreement with Iran reopens the Strait of Hormuz, price relief will not be immediate: gasoline 'rockets up but only slowly floats back down,' fertilizer shortages will spill into food prices, and supply chain uncertainty will keep overall prices elevated well past any ceasefire.", "speaker": "Atlantic Council", "type": "causal", "entities": ["Iran", "Strait of Hormuz"], "conviction": "high", "so_what": "Opening Hormuz is not an immediate inflation cure—the reversal is asymmetric and slow; central banks will face a longer window of above-target inflation constraining their ability to ease.", "quote": "Gasoline prices have a tendency to rocket up but only slowly float back down, fertilizer shortages will spill over into food prices, and lingering uncertainty means elevated prices will not dissipate immediately.", "locator": "A peace agreement with Iran will provide cover", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["Kevin Warsh", "Federal Reserve", "ECB", "Iran", "Strait of Hormuz", "Donald Trump", "United States", "Eurozone", "University of Michigan"], "source_meta": {"author": "jmuldoon", "word_count": 1096, "paywalled": false}}, {"record_id": "c93ad88d5e59cb57", "source_type": "concepts", "source_name": "Atlantic Council", "source_url": "https://www.atlanticcouncil.org/blogs/ukrainealert/putins-obsession-with-denazifying-ukraine-makes-peace-impossible/", "title": "Putin's obsession with 'denazifying' Ukraine makes peace impossible", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-21T07:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics"], "gist": "Putin's repeated invocation of 'denazification' at the St. Petersburg Forum signals he is fighting to erase Ukrainian statehood altogether, not merely secure territory; Ukraine's electoral record—Zelenskyy's landslide win, far-right parties at 2.15%—makes the Nazi narrative factually untenable, while the ideological framing makes a compromise peace structurally impossible and renders US real-estate-style diplomacy fundamentally misguided.", "themes": [{"theme": "Denazification as existential war aim, not territorial framing", "insights": [{"claim": "Putin at the St. Petersburg International Economic Forum in June 2026 again expressed confidence all war aims, including 'denazification,' would be achieved—signaling he views the war as existential for Ukrainian identity, not a negotiable territorial dispute.", "speaker": "Peter Dickinson", "type": "data_point", "entities": ["Vladimir Putin", "Russia", "Ukraine", "St. Petersburg International Economic Forum"], "conviction": "high", "so_what": "Peace negotiations premised on territorial compromise misread Putin's actual war aims; investors and strategists betting on an imminent negotiated settlement should substantially discount that probability.", "quote": "Putin once again expressed confidence that all of Russia's war aims in Ukraine would be achieved, including the 'denazification' of the country", "locator": "Speaking at Russia's flagship St. Petersburg International Economic Forum", "quote_verified": true}, {"claim": "Kremlin-controlled media explicitly spelled out in weeks after the 2022 invasion that 'denazification' actually meant 'de-Ukrainianization'—the disappearance of Ukraine as an independent nation, consistent with Putin's claim that Ukrainians and Russians are 'one people.'", "speaker": "Peter Dickinson", "type": "data_point", "entities": ["Russia", "Ukraine", "Kremlin"], "conviction": "high", "so_what": "The operational definition of Russia's stated war aim is Ukrainian state extinction, not demilitarization or neutrality; any peace framework leaving Ukrainian statehood intact is structurally incompatible with Putin's declared goals.", "quote": "a number of articles appeared in the Kremlin-controlled Russian state media spelling out the chilling reality that 'denazification' actually meant 'de-Ukrainianization'", "locator": "The true meaning of Putin's 'denazification'", "quote_verified": true}, {"claim": "Putin's 'denazification' narrative traces directly to WWII Soviet propaganda depicting Ukrainian anti-Soviet fighters as fascists—an ideology decades in formation, deeply embedded in Russian public consciousness, indicating deep ideological commitment rather than tactical negotiating posture.", "speaker": "Peter Dickinson", "type": "causal", "entities": ["Vladimir Putin", "Russia", "Ukraine"], "conviction": "high", "so_what": "The ideology will not be bargained away in a ceasefire—it survives any near-term pause as a continuing threat to Ukrainian sovereignty; long-term security guarantees for Ukraine must account for this.", "quote": "Russian attempts to smear Ukrainians as 'Nazis' are not new and can be traced directly back to the Kremlin's World War II propaganda", "locator": "Russian attempts to smear Ukrainians", "quote_verified": true}]}, {"theme": "Electoral evidence dismantling the Nazi Ukraine narrative", "insights": [{"claim": "In Ukraine's 2019 elections, Russian-speaking Jewish Zelenskyy won the presidency by a landslide while all far-right parties united under a single banner received just 2.15% of the vote—well below the parliamentary threshold—demolishing the factual basis for Kremlin claims of a 'Nazi' Ukraine.", "speaker": "Peter Dickinson", "type": "data_point", "entities": ["Volodymyr Zelenskyy", "Ukraine"], "conviction": "high", "so_what": "The electoral data makes the Nazi narrative empirically untenable; for allies and markets, this confirms that Russian war propaganda is fabricated justification, not grounded geopolitical analysis.", "quote": "Despite this unprecedented consolidation, they received just 2.15 percent of the vote and fell well short of the threshold to enter parliament.", "locator": "Frustrated by years of ballot box rejection", "quote_verified": true}, {"claim": "Even Tucker Carlson—known for amplifying Kremlin propaganda—dismissed Putin's 'Ukrainian Nazis' claims in 2024 as 'one of the dumbest things I've ever heard,' calling it 'childish': a reflection of how factually untenable the narrative is even among sympathizers.", "speaker": "Peter Dickinson", "type": "anecdote", "entities": ["Tucker Carlson", "Vladimir Putin"], "conviction": "high", "so_what": "When the Kremlin's most prominent Western media sympathizer rejects the denazification narrative, it signals how isolated Russia is in pushing this justification on the global stage.", "quote": "'one of the dumbest things I've ever heard.' ... 'It's a way of calling people evil. I thought it was childish'", "locator": "In the wake of his 2024 interview with Putin", "quote_verified": true}]}, {"theme": "Why peace is structurally impossible on current terms", "insights": [{"claim": "No Kremlin leader could make peace with adversaries they have branded as Nazis; Putin's continued use of this language is 'an unmistakable declaration of a holy war that by definition must be fought to a victorious conclusion,' making compromise peace delusional until Putin abandons imperial ambitions.", "speaker": "Peter Dickinson", "type": "framework", "entities": ["Vladimir Putin", "Russia", "Ukraine"], "conviction": "high", "so_what": "Peace timelines should be modeled as indefinitely long unless Putin abandons the denazification framing—a structural constraint on any negotiation model that investors in Ukraine recovery assets must price.", "quote": "the repeated use of this extraordinarily inflammatory language is an unmistakable declaration of a holy war that by definition must be fought to a victorious conclusion", "locator": "Anyone with even basic knowledge of Russian sensibilities", "quote_verified": true}, {"claim": "Trump's approach to Ukraine-Russia peace as a 'geopolitical real estate deal' fundamentally misreads Putin's goals; Putin's stalling, shifting demands, and questioning of Zelenskyy's legitimacy to sign any deal are not negotiating postures but signals of bad faith.", "speaker": "Peter Dickinson", "type": "contrarian", "entities": ["Donald Trump", "Vladimir Putin", "Volodymyr Zelenskyy", "Russia", "Ukraine"], "conviction": "high", "so_what": "US peace brokerage based on territorial dealmaking is likely to fail; markets pricing in an imminent ceasefire should discount that probability significantly given the structural incompatibility of stated goals.", "quote": "it should by now be obvious that Putin is not fighting for additional territory in Ukraine and seeks to erase Ukrainian statehood altogether", "locator": "Putin's determination to 'denazify' Ukraine makes a mockery", "quote_verified": true}]}], "insight_total": 7, "top_entities": ["Vladimir Putin", "Russia", "Ukraine", "Volodymyr Zelenskyy", "Donald Trump", "Tucker Carlson", "Kremlin", "St. Petersburg International Economic Forum"], "source_meta": {"author": "Peter Dickinson", "word_count": 1587, "paywalled": false}}, {"record_id": "20f1f2701bd79983", "source_type": "concepts", "source_name": "CSIS", "source_url": "https://www.csis.org/analysis/managing-drcs-ebola-crisis", "title": "Managing DRC's Ebola Crisis", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-21T07:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society", "Macro"], "gist": "A Bundibugyo Ebola outbreak in eastern DRC's conflict zones reached 896 confirmed cases and 232 deaths (as of June 17, 2026), exposing a structurally weakened post-COVID global health response; the US has mobilized $377M+ in funding after initial stumbles, but is operating outside WHO's command structure while insecurity from M23 and armed militias—linked to $3B/year in illicit gold mining—directly threatens the healthcare response.", "themes": [{"theme": "Broken post-COVID global health response infrastructure", "insights": [{"claim": "The post-COVID international health response system is 'geopolitically fractured and profoundly weakened' in organizational capacities, staffing, finances, and fundamental functionality—affecting WHO, the US, other major donors, UN agencies, and international NGOs simultaneously.", "speaker": "CSIS", "type": "thesis", "entities": ["WHO", "United States", "USAID"], "conviction": "high", "so_what": "The world enters a major Ebola outbreak with structurally degraded response capacity; even adequate funding cannot substitute for dismantled institutions—expect slower containment and higher mortality than past outbreaks.", "quote": "the system of international response has become geopolitically fractured and profoundly weakened in terms of organizational capacities, staffing, finances, and fundamental functionality", "locator": "A Broken Global Response", "quote_verified": true}, {"claim": "WHO and the Africa Centres for Disease Control and Prevention have jointly launched a new $518 million continental response plan—a notable example of coordinated institutional leadership despite broader system fragmentation.", "speaker": "CSIS", "type": "data_point", "entities": ["WHO", "Africa CDC"], "conviction": "high", "so_what": "The $518M plan is meaningful but insufficient given scale, insecurity, and fragmentation; conversion of pledges to disbursements rapidly is the critical test.", "quote": "a new $518 million continental response plan", "locator": "the WHO and the Africa Centres for Disease Control", "quote_verified": true}]}, {"theme": "Insecurity as the dominant operational constraint", "insights": [{"claim": "Insecurity in eastern DRC in 2026 is 'vastly more' severe than the 2018-2020 outbreak, with armed militias linked to illicit gold mining worth $3B/year treating healthcare responders as a direct threat to their operations and using airport closures as leverage.", "speaker": "CSIS", "type": "data_point", "entities": ["DRC", "Ituri province", "North Kivu", "South Kivu"], "conviction": "high", "so_what": "Containment efforts face a fundamentally adversarial security environment that previous Ebola response playbooks did not address; escalation risk to adjacent countries (Uganda) is structurally higher than in 2018.", "quote": "Insecurity dominates the operating environment far more than in the 2018–2020 outbreak in the eastern Congo, and vastly more than the 2014–2016 outbreak in West Africa.", "locator": "The Centrality of Insecurity", "quote_verified": true}, {"claim": "M23—an armed Congolese Tutsi movement serving as a Rwandan government proxy—controls Goma and most of North and South Kivu, while illicit critical minerals flow through Uganda to the Gulf ($3B+/year), creating financial incentives to obstruct the health response.", "speaker": "CSIS", "type": "data_point", "entities": ["M23", "Rwanda", "DRC", "Goma", "North Kivu", "South Kivu", "Uganda"], "conviction": "high", "so_what": "The security dimension is entangled with critical minerals geopolitics and Rwandan state interests; investors in DRC and regional minerals should factor in that the conflict has no near-term resolution.", "quote": "M23, a proxy and dependent vassal of the Rwandan government, controls Goma and most of North and South Kivus", "locator": "Similarly, the armed Congolese Tutsi movement", "quote_verified": true}]}, {"theme": "US response: funding leadership, coordination failures, and missteps", "insights": [{"claim": "Despite USAID's elimination, the US became the lead funder of the international Ebola response: CDC mobilized $107M in emergency funding, State Department committed $270M+, and a $50M Coalition for Epidemic Preparedness Innovations partnership was re-established.", "speaker": "CSIS", "type": "data_point", "entities": ["United States", "CDC", "State Department", "Coalition for Epidemic Preparedness Innovations"], "conviction": "high", "so_what": "Despite USAID's dismantlement, the US demonstrated institutional muscle memory and is funding the global response; the structural risk is that State's global health infrastructure is thinner and slower than USAID's was.", "quote": "the Centers for Disease Control and Prevention (CDC) has mobilized its experts and flexible financing mechanisms, including $107 million in emergency funding, while the State Department has committed more than $270 million", "locator": "The Centrality of the United States", "quote_verified": true}, {"claim": "The US proposal to establish a quarantine facility on a Kenyan military base triggered angry protests and implied Americans exposed to Ebola would not be repatriated—a 'damaging misstep' that could deter expert volunteers from serving in the response.", "speaker": "CSIS", "type": "anecdote", "entities": ["United States", "Kenya"], "conviction": "high", "so_what": "This misstep has a practical consequence: if US experts fear they cannot be repatriated, recruitment for dangerous field posts will be compromised, reducing response quality at the critical containment phase.", "quote": "The U.S. proposal to establish a quarantine facility on a Kenyan military base rapidly fueled suspicion and angry protests in Kenya", "locator": "The Kenya Debacle", "quote_verified": true}, {"claim": "The US is operating outside the WHO-Africa CDC incident management structure, creating 'risks of duplication and inefficiency antithetical to U.S. national security interests.'", "speaker": "CSIS", "type": "causal", "entities": ["United States", "WHO", "Africa CDC"], "conviction": "high", "so_what": "Coordination failure is a force multiplier for the virus; aligning US operations within WHO's command structure is a straightforward efficiency gain that has not yet happened.", "quote": "the United States is working with under-resourced CDC country offices and a dearth of deployed staff, with its experts and nongovernmental partners operating outside of the WHO-Africa CDC incident management structure", "locator": "Even so, the United States is working", "quote_verified": true}]}, {"theme": "Outbreak trajectory and priority next steps", "insights": [{"claim": "As of June 17, 2026, the Bundibugyo Ebola outbreak has reached 896 confirmed cases and 232 deaths in DRC plus 19 cases and 2 deaths in Uganda; delayed detection, urban infections, and poor contact tracing make exponential growth and geographic spread scenarios that must be actively prepared for.", "speaker": "CSIS", "type": "data_point", "entities": ["DRC", "Uganda", "Ituri province"], "conviction": "high", "so_what": "Scenario planning for exponential growth and export to major capitals must happen now; global health supply chains and stockpiles should be pre-positioned before demand spikes.", "quote": "As of June 17, the outbreak has climbed to 896 confirmed cases and 232 confirmed deaths in the DRC and 19 confirmed cases and 2 deaths in Uganda.", "locator": "Next Steps for the U.S. Response", "quote_verified": true}, {"claim": "Authors recommend appointing an Ebola czar or senior NSC director for biopreparedness to replace the current 'glaring absence of a White House command capacity,' along with a two-year plan, full reengagement with WHO, and bilateral diplomacy to secure airport access for humanitarian flights.", "speaker": "CSIS", "type": "thesis", "entities": ["United States", "White House", "NSC", "CDC"], "conviction": "high", "so_what": "The absence of a White House command authority is the primary organizational gap perpetuating coordination failures; this is a solvable structural problem with clear historical precedent from the 2014 outbreak.", "quote": "That might involve the appointment of an Ebola czar, as happened during the 2014–2016 West Africa outbreak.", "locator": "Strengthen U.S. coordination capabilities", "quote_verified": true}]}], "insight_total": 9, "top_entities": ["DRC", "WHO", "Africa CDC", "United States", "CDC", "M23", "Rwanda", "Uganda", "Ituri province", "Coalition for Epidemic Preparedness Innovations"], "source_meta": {"author": "", "word_count": 2066, "paywalled": false}}, {"record_id": "59d0a9e06de8cd14", "source_type": "concepts", "source_name": "CSIS", "source_url": "https://www.csis.org/analysis/irregular-warfare-winning-cognitive-domain", "title": "Irregular Warfare: Winning the Cognitive Domain", "published_date": "2026-06-18", "language": "en", "processed_at": "2026-06-21T07:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "AI", "Tech"], "gist": "The US is structurally behind in cognitive/irregular warfare because it optimizes for kinetic operations while adversaries (Russia, China, Iran) deploy AI-driven narrative campaigns at ontent at scale", "locator": "The United States possesses the models, compute, resources", "quote_verified": true}, {"claim": "Iran's information campaign turned anti-regime Iranians who initially supported US actions into people who 'hate the regime, but hate the United States more'—demonstrating that kinetic strikes without concurrent cognitive operations create counterproductive strategic outcomes.", "speaker": "CSIS", "type": "causal", "entities": ["Iran", "United States"], "conviction": "high", "so_what": "Kinetic-only strategies can alienate natural allies and generate adversarial blowback; the Iran case is a live demonstration that airpower alone cannot deliver political outcomes.", "quote": "there is a larger group of anti-regime voices who are displeased with Operation Epic Fury. They hate the regime, but they hate the United States more", "locator": "There are Iranian supporters of U.S. and Israeli actions", "quote_verified": true}]}, {"theme": "Intentional data as the unsung competitive asset", "insights": [{"claim": "Most US datasets are 'adapted from commercial markets or legacy intelligence frameworks' optimized for kinetic warfare—'expensive to decipher and often irrelevant'—leaving planners with incomplete pictures of cognitive target audiences.", "speaker": "CSIS", "type": "causal", "entities": ["United States", "Department of Defense"], "conviction": "high", "so_what": "The US requires purpose-built datasets for cognitive operations, not repurposed commercial/intelligence data; this is an emerging investment opportunity in specialized behavioral data platforms serving DoD.", "quote": "Most datasets are adapted from commercial markets or legacy intelligence frameworks that rely on overwhelming big data, which is expensive to decipher and often irrelevant.", "locator": "The answer begins with data", "quote_verified": true}, {"claim": "'Intentional data'—designed around clearly defined strategic outcomes rather than collected opportunistically—paired // YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
