// ── State ──────────────────────────────────────────────────────────────────
let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

// ── Colors ─────────────────────────────────────────────────────────────────
const CAT_COLORS = {
  macro:'#e24b4a', credit:'#378add', positioning:'#ef9f27',
  'AI/infra':'#1d9e75', crypto:'#7f77dd', geopolitics:'#d85a30',
  energy:'#f97316', tech:'#06b6d4', gold:'#d4a017', culture:'#ec4899',
  labor:'#8b5cf6', regulation:'#64748b', science:'#14b8a6', venture:'#84cc16'
};
const URG = {act:{icon:'🔴',label:'🔴 Act Now'}, deep:{icon:'🔵',label:'🔵 Deep'}, watch:{icon:'🟡',label:'🟡 Watch'}};

function catColor(cat){ return CAT_COLORS[cat] || '#888'; }

// ── HTML helpers ───────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Copy ───────────────────────────────────────────────────────────────────
function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i){ return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = '📋 Copy'; }, 1500);
}

// ── Toggle card ────────────────────────────────────────────────────────────
function toggleCard(id){
  var body = document.getElementById('body-'+id);
  var icon = document.getElementById('icon-'+id);
  if(!body) return;
  var isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if(icon) icon.classList.toggle('open', !isOpen);
}

// ── Filter logic ───────────────────────────────────────────────────────────
function setFilter(type, value){
  if(type === 'cat') activeCat = value;
  if(type === 'urg') activeUrg = value;
  activeSrc = null;
  applyFilters();
  updateFilterUI();
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  ITEMS.forEach(function(item){
    var card = document.getElementById('card-'+item.id);
    var body = document.getElementById('body-'+item.id);
    var icon = document.getElementById('icon-'+item.id);
    if(!card) return;
    var match = item.source.indexOf(name) >= 0;
    card.classList.toggle('hidden', !match);
    if(match){ body.classList.add('open'); if(icon) icon.classList.add('open'); }
  });
  updateFilterUI();
}

function applyFilters(){
  ITEMS.forEach(function(item){
    var card = document.getElementById('card-'+item.id);
    if(!card) return;
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    card.classList.toggle('hidden', !(catOk && urgOk));
  });
}

function updateFilterUI(){
  document.querySelectorAll('.filter-pill[data-type]').forEach(function(pill){
    var type = pill.dataset.type;
    var val = pill.dataset.val;
    var isActive;
    if(type === 'cat') isActive = activeSrc === null && activeCat === val;
    else isActive = activeSrc === null && activeUrg === val;
    pill.classList.toggle('active', isActive);
    if(isActive && type === 'cat' && val !== 'all'){
      pill.style.background = catColor(val);
    } else if(isActive){
      pill.style.background = '#555';
    } else {
      pill.style.background = '';
    }
  });
}

// ── Session report ─────────────────────────────────────────────────────────
function toggleReport(){
  var body = document.getElementById('report-body');
  var hdr = document.querySelector('.report-header');
  var open = body.classList.toggle('open');
  hdr.textContent = (open ? '▼' : '▶') + ' Session Report';
}

// ── Build filter pills ─────────────────────────────────────────────────────
function buildFilters(){
  // Categories
  var cats = ['all'];
  var catCounts = {};
  ITEMS.forEach(function(i){
    if(!catCounts[i.cat]) catCounts[i.cat] = 0;
    catCounts[i.cat]++;
    if(cats.indexOf(i.cat) < 0) cats.push(i.cat);
  });
  var catBar = document.getElementById('cat-filters');
  cats.forEach(function(c){
    var pill = document.createElement('button');
    pill.className = 'filter-pill' + (c === 'all' ? ' active' : '');
    pill.dataset.type = 'cat';
    pill.dataset.val = c;
    pill.textContent = c === 'all' ? 'All (' + ITEMS.length + ')' : c + ' (' + (catCounts[c]||0) + ')';
    if(c === 'all'){ pill.style.background = '#555'; pill.style.color = 'white'; pill.style.borderColor = 'transparent'; }
    pill.onclick = function(){ setFilter('cat', c); };
    catBar.appendChild(pill);
  });

  // Urgency
  var urgCounts = {act:0, deep:0, watch:0};
  ITEMS.forEach(function(i){ urgCounts[i.urgency]++; });
  var urgBar = document.getElementById('urg-filters');
  [['all','All'],['act','🔴 Act Now'],['deep','🔵 Deep'],['watch','🟡 Watch']].forEach(function(pair){
    var pill = document.createElement('button');
    pill.className = 'filter-pill' + (pair[0] === 'all' ? ' active' : '');
    pill.dataset.type = 'urg';
    pill.dataset.val = pair[0];
    var cnt = pair[0] === 'all' ? ITEMS.length : urgCounts[pair[0]];
    pill.textContent = pair[1] + ' (' + cnt + ')';
    if(pair[0] === 'all'){ pill.style.background = '#555'; pill.style.color = 'white'; pill.style.borderColor = 'transparent'; }
    pill.onclick = function(){ setFilter('urg', pair[0]); };
    urgBar.appendChild(pill);
  });
}

// ── Build cards ────────────────────────────────────────────────────────────
function buildCards(){
  var container = document.getElementById('cards-container');
  ITEMS.forEach(function(item){
    var color = catColor(item.cat);
    var urgIcon = URG[item.urgency] ? URG[item.urgency].icon : '';
    var numStr = item.id < 10 ? '0'+item.id : ''+item.id;

    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-'+item.id;

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.onclick = function(){ toggleCard(item.id); };

    hdr.innerHTML =
      '<span class="item-num">' + numStr + '</span>' +
      '<span style="font-size:14px;flex-shrink:0">' + urgIcon + '</span>' +
      '<span class="source-badge" style="background:' + color + '" title="' + esc(item.source) + '">' + esc(item.source) + '</span>' +
      '<span class="cat-tag">' + esc(item.cat) + '</span>' +
      (item.charts && item.charts.count > 0 ? '<span style="font-size:12px;flex-shrink:0">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '') +
      '<span class="card-title">' + esc(item.title) + '</span>' +
      '<span class="expand-icon" id="icon-' + item.id + '">▶</span>';

    // Body
    var body = document.createElement('div');
    body.className = 'card-body';
    body.id = 'body-'+item.id;

    var angleStyle = 'border-color:' + color + ';background:#fafaf8';

    body.innerHTML =
      '<div class="slabel">The Idea</div>' +
      '<div class="idea-text">' + esc(item.idea) + '</div>' +
      '<div class="slabel">My Angle</div>' +
      '<div class="angle-box" style="' + angleStyle + '">' + esc(item.angle) + '</div>' +
      '<div class="slabel">Tweets</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label" style="color:#378add">TWEET A</div>' +
          '<div class="tweet-text">' + esc(item.tweetA) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>' +
          '<div class="tweet-text">' + esc(item.tweetB) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      (item.charts && item.charts.count > 0 ?
        '<div class="chart-info">' + (item.charts.hot ? '<span class="chart-hot">🔥 CHART WORTH SAVING — </span>' : '📊 ') + esc(item.charts.desc) + '</div>' : '') +
      (item.link ? '<a class="card-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">↗ Read full article</a>' : '');

    card.appendChild(hdr);
    card.appendChild(body);
    container.appendChild(card);
  });
}

// ── Build session report ───────────────────────────────────────────────────
function buildReport(){
  var el = document.getElementById('report-content');
  var statsHTML = '<div class="stat-row"><span>Window</span><span>' + META.windowStart + ' → ' + META.windowEnd + '</span></div>' +
    '<div class="stat-row"><span>Emails in window</span><span>' + META.emailsInWindow + '</span></div>' +
    '<div class="stat-row"><span>Emails read</span><span>' + META.emailsRead + '</span></div>' +
    '<div class="stat-row"><span>Items extracted</span><span>' + META.itemsExtracted + '</span></div>';

  var inclHTML = '<table class="rtable">';
  META.includedSources.forEach(function(s){
    inclHTML += '<tr><td><button class="src-link" onclick="filterBySrc(\'' + esc(s.name) + '\')">' + esc(s.name) + '</button></td><td>' + s.items + ' items</td></tr>';
  });
  inclHTML += '</table>';

  var skipHTML = '<table class="rtable">';
  META.skippedSources.forEach(function(s){
    skipHTML += '<tr><td><span>' + esc(s.name) + '</span><span class="skip-reason">' + esc(s.reason) + '</span></td></tr>';
  });
  skipHTML += '</table>';

  el.innerHTML =
    '<div class="report-grid">' +
      '<div>' +
        '<div class="report-sub">Stats</div>' + statsHTML +
        '<div style="margin-top:16px"><div class="report-sub">Skipped</div>' + skipHTML + '</div>' +
      '</div>' +
      '<div>' +
        '<div class="report-sub">Included Sources</div>' + inclHTML +
      '</div>' +
    '</div>';
}

// ── Header meta ────────────────────────────────────────────────────────────
function buildHeader(){
  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

// ── Init ───────────────────────────────────────────────────────────────────
buildHeader();
buildFilters();
buildCards();
buildReport();
</script>
</body>
</html>
