ed then deleted from major indexes, or deleted then re-added—are common and expose a structural buy-high/sell-low flaw in cap-weighted indexing, with sharply asymmetric returns favoring deletions over additions.", "themes": [{"theme": "Prevalence of index flip-flops", "insights": [{"claim": "Companies moving in and out of major indexes are common: many firms added to major indexes are later deleted, while a meaningful share of deletions eventually regain membership.", "speaker": "Rob Arnott", "type": "framework", "entities": ["cap-weighted indexes"], "conviction": "high", "so_what": "Index membership is far less stable than passive investors assume, so turnover-driven trades are a recurring, systematic feature rather than rare noise worth ignoring.", "quote": "Many companies added to major indexes are later deleted, while a meaningful share of deletions eventually regain membership.", "locator": "Index “flip-flops” are hardly unusual", "quote_verified": true}]}, {"theme": "Structural flaw in cap-weighted indexing", "insights": [{"claim": "Cap-weighted indexing mechanically buys high and sells low because companies typically enter indexes after strong price gains and exit after prolonged declines.", "speaker": "Rob Arnott", "type": "causal", "entities": ["cap-weighted indexes"], "conviction": "high", "so_what": "The index-construction rule itself imposes a momentum-chasing tax on passive investors, an argument for valuation-aware or fundamentally weighted alternatives.", "quote": "Companies often enter indexes after strong price gains and exit after prolonged declines, which can cause index investors to automatically buy high and sell low.", "locator": "Flip-flops may expose a weakness", "quote_verified": true}, {"claim": "Valuation matters more than index membership, since inclusion is a backward-looking 'prestige' moment rather than a guarantee of future returns.", "speaker": "Rob Arnott", "type": "thesis", "entities": ["cap-weighted indexes"], "conviction": "high", "so_what": "Investors should weight securities on valuation rather than treat index addition as a buy signal, reframing the passive-vs-active debate.", "quote": "Index inclusion is a backward-looking “prestige” moment, not a guarantee of future returns, while deletions may present opportunities rather than automatic sell signals.", "locator": "We believe valuation matters more", "quote_verified": true}]}, {"theme": "Asymmetric returns of additions vs deletions", "insights": [{"claim": "Addition flip-flops typically underperform the market by two-thirds after inclusion, making newly added index members poor forward bets.", "speaker": "Rob Arnott", "type": "data_point", "entities": ["cap-weighted indexes"], "conviction": "high", "so_what": "Buying stocks precisely because they just joined an index has historically been a losing trade, so investors can fade or underweight fresh additions.", "quote": "Addition flip-flops typically underperform the market by two-thirds after inclusion", "locator": "Flip-flop return patterns are highly asymmetric", "quote_verified": true}, {"claim": "Deletion flip-flops often generate nearly three times the benchmark returns before rejoining an index, so deletions may present opportunities rather than automatic sell signals.", "speaker": "Rob Arnott", "type": "data_point", "entities": ["cap-weighted indexes"], "conviction": "high", "so_what": "Deleted names are a contrarian hunting ground; forced index sellers may be handing outperformance to buyers willing to hold through the exit.", "quote": "deletion flip-flops often generate nearly three times the benchmark returns before rejoining an index", "locator": "Flip-flop return patterns are highly asymmetric", "quote_verified": true}]}, {"theme": "Research provenance", "insights": [{"claim": "The analysis is the final installment in a three-part series adapted from 'The Active Side of Indexing,' the authors' 2026 contribution to the CFA Institute Research Foundation.", "speaker": "Rob Arnott", "type": "anecdote", "entities": ["CFA Institute Research Foundation", "The Active Side of Indexing", "Lillian Wu"], "conviction": "medium", "so_what": "Signals a peer-reviewed, foundational body of work rather than a one-off blog, lending weight to the anti-cap-weight thesis for allocators.", "quote": null, "locator": "This article is the final installment", "quote_verified": false}]}], "insight_total": 6, "top_entities": ["Rob Arnott", "Lillian Wu", "CFA Institute Research Foundation", "cap-weighted indexes", "The Active Side of Indexing"], "source_meta": {"author": "Rob Arnott", "word_count": 527, "paywalled": false}}, {"record_id": "1f826f3f8cbc2b78", "source_type": "concepts", "source_name": "SF Fed Economic Letters", "source_url": "https://www.frbsf.org/research-and-insights/publications/economic-letter/2026/07/firms-inflation-expectations-during-pandemic-era-surge/", "title": "Firms’ Inflation Expectations During the Pandemic-Era Surge - San Francisco Fed", "published_date": "2026-07-13", "language": "en", "processed_at": "2026-07-18T10:59:11Z", "processor": "claude-code-sub-opus", "tags": ["Macro"], "gist": "Using the Cleveland Fed's SoFIE panel from 2018-2025, the authors show U.S. firms' inflation expectations broke away from professional forecasters during the pandemic surge and behaved like volatile household expectations, before returning to pre-pandemic characteristics as inflation moderated. Small firms drove the divergence via heightened sensitivity to perceived inflation, and firms' perceptions of the Fed's inflation goal itself drifted up and back down.", "themes": [{"theme": "Firms decouple from forecasters, track households", "insights": [{"claim": "Business one-year-ahead inflation expectations closely tracked professional forecasters from 2019 to early 2020, then abruptly disconnected starting early 2021 and spiked to nearly 7% by 2022, mirroring household expectations.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["SoFIE", "University of Michigan Surveys of Consumers", "Survey of Professional Forecasters"], "conviction": "high", "so_what": "Business expectations are a distinct, more reactive gauge than SPF; when inflation surges, watch firm surveys for signs that price-setters are un-anchoring faster than economists assume.", "quote": "business expectations abruptly disconnected from professional forecasters’ expectations and increased sharply to nearly 7% by 2022, similar to household expectations during the same period", "locator": "Between 2019 and early 2020", "quote_verified": true}, {"claim": "After CPI inflation peaked in mid-2022, firms' expectations fell faster than households', closely following realized inflation and reverting toward professional forecasters' levels.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["CPI", "SoFIE"], "conviction": "high", "so_what": "Firm expectations are backward-looking and mean-reverting, so they may confirm disinflation rather than lead it, unlike stickier household surveys.", "quote": null, "locator": "By mid-2022, after CPI inflation peaked", "quote_verified": false}, {"claim": "Through end-2025, household inflation expectations stayed elevated and rose further amid tariff-related uncertainty, while firms' expectations continued to decline.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["University of Michigan Surveys of Consumers", "tariffs"], "conviction": "medium", "so_what": "The 2025 divergence flags tariffs as a household-sentiment shock; firms are not (yet) pricing the same inflation risk, a gap worth monitoring for pass-through.", "quote": "household expectations remained elevated and even rose further amid tariff-related uncertainty, while firms’ expectations continued to decline", "locator": "Through the end of 2025", "quote_verified": true}, {"claim": "Firms' inflation expectations can deviate substantially from professionals' and converge toward households' views, especially when inflation rises sharply.", "speaker": "Ina Hajdini", "type": "thesis", "entities": ["SoFIE"], "conviction": "high", "so_what": "Policymakers relying mainly on SPF and household surveys may miss the price-setting channel; firm expectations belong in the anchoring dashboard.", "quote": null, "locator": "The behavior of firms’ inflation expectations", "quote_verified": false}]}, {"theme": "Small firms drive divergence via perception sensitivity", "insights": [{"claim": "During the surge, inflation expectations of small firms (1-19 employees) rose faster and stronger than those of larger firms (20+ employees), with a gap of roughly 2 percentage points at the 2022 peak.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["small businesses", "SoFIE"], "conviction": "high", "so_what": "Firm-size heterogeneity means small-business surveys can overstate aggregate un-anchoring; size-weighting matters for reading the signal.", "quote": "The difference in inflation expectations between the two groups reached roughly 2 percentage points at the peak of the inflation surge in 2022", "locator": "Figure 2 shows inflation expectations by firm size", "quote_verified": true}, {"claim": "In 2021, a 1 percentage point rise in perceived inflation was associated with a 1 percentage point rise in small firms' one-year-ahead expectations but only 0.2 percentage point for larger firms.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["small businesses", "CPI"], "conviction": "high", "so_what": "A near one-for-one pass-through of perceived inflation into small-firm expectations quantifies how quickly price-setters extrapolate, a key input for gauging inflation persistence.", "quote": "a 1 percentage point increase in perceived inflation was associated with 1 percentage point higher one-year-ahead inflation expectations for small firms but with only 0.2 percentage point higher one-year-ahead expectations for larger firms", "locator": "Figure 3 reveals that the sensitivity", "quote_verified": true}, {"claim": "The surge in small firms' expectations reflected a temporary spike in their sensitivity to current inflation, and by end-2025 both sensitivity levels and the small-versus-large gap had returned to pre-pandemic levels.", "speaker": "Ina Hajdini", "type": "causal", "entities": ["small businesses"], "conviction": "high", "so_what": "The un-anchoring was a state-dependent response to a large shock, not a structural break, supporting a benign read on expectations once inflation normalizes.", "quote": null, "locator": "Our findings suggest that small firms", "quote_verified": false}, {"claim": "Firms with incomplete information about economy-wide inflation form expectations shaped by firm-specific perceptions, which can diverge from realized inflation based on location or a firm's mix of production inputs.", "speaker": "Ina Hajdini", "type": "framework", "entities": ["SoFIE", "Baumann et al. 2026"], "conviction": "medium", "so_what": "The imperfect-information lens explains why relative-price shocks (energy, inputs) can spill into broad inflation expectations for exposed firms.", "quote": null, "locator": "Inflation expectations can be shaped by firm-specific perceptions", "quote_verified": false}]}, {"theme": "Longer-term expectations and re-anchoring", "insights": [{"claim": "Firms' longer-term (one-to-five-year average) inflation expectations rose from slightly above 2% in late 2019 to 4.8% in late 2022, then fell to 3.3% by late 2025.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["SoFIE"], "conviction": "high", "so_what": "Even long-horizon firm expectations un-anchored materially and remain above 2% into 2025, a residual risk that the last leg of re-anchoring is incomplete.", "quote": "average longer-term inflation expectations rose from slightly above 2% in late 2019 to 4.8% in late 2022", "locator": "Figure 4 shows that average longer-term", "quote_verified": true}, {"claim": "The deviation in firms' longer-term expectations appeared temporary, receding toward pre-pandemic levels following a cycle of policy rate hikes and the ensuing disinflation.", "speaker": "Ina Hajdini", "type": "causal", "entities": ["Federal Reserve", "monetary policy"], "conviction": "medium", "so_what": "Aggressive tightening plausibly re-anchored business expectations, evidence that credibility is defensible but requires active policy response, not automatic.", "quote": null, "locator": "Firms’ longer-term inflation expectations thus deviated", "quote_verified": false}]}, {"theme": "Perceived Fed inflation goal drifts", "insights": [{"claim": "Firms' perceived Federal Reserve inflation goal was stable pre-2021, then rose alongside longer-term expectations in 2022-2023, and fell after 2023 as inflation moderated.", "speaker": "Ina Hajdini", "type": "data_point", "entities": ["Federal Reserve", "SoFIE"], "conviction": "high", "so_what": "Persistently high inflation can distort firms' beliefs about the 2% target itself, meaning the Fed's perceived goal is not fixed and can erode credibility if inflation lingers.", "quote": "both longer-term expectations and the perceived inflation goal increased in 2022 and 2023", "locator": "Figure 4 shows firms’ average perceptions", "quote_verified": true}, {"claim": "Higher perceptions of the Fed's inflation goal contributed to higher longer-term inflation expectations, and moderating inflation can restore the accuracy of those goal perceptions.", "speaker": "Ina Hajdini", "type": "causal", "entities": ["Federal Reserve"], "conviction": "medium", "so_what": "Part of the anchoring channel runs through beliefs about the target, so central-bank communication that reaffirms 2% matters for durably lowering firm expectations.", "quote": null, "locator": "These findings indicate that", "quote_verified": false}]}, {"theme": "Why business expectations matter", "insights": [{"claim": "Business inflation expectations directly shape prices, wages, and investment, yet are less frequently monitored than household and professional-forecaster expectations due to a lack of survey data.", "speaker": "Ina Hajdini", "type": "framework", "entities": ["SoFIE"], "conviction": "high", "so_what": "A data gap in policy monitoring; the growing SoFIE panel offers an edge for anticipating price-setting behavior ahead of consensus.", "quote": null, "locator": "Monetary policymakers routinely monitor", "quote_verified": false}, {"claim": "If firms expect higher inflation they may preemptively raise prices, making inflation more persistent.", "speaker": "Ina Hajdini", "type": "causal", "entities": ["businesses"], "conviction": "high", "so_what": "The self-fulfilling channel is why un-anchored firm expectations are a leading risk indicator for sticky inflation and higher-for-longer rates.", "quote": null, "locator": "Expectations about future inflation affect", "quote_verified": false}]}], "insight_total": 14, "top_entities": ["SoFIE", "Federal Reserve", "Survey of Professional Forecasters", "University of Michigan Surveys of Consumers", "CPI", "Federal Reserve Bank of Cleveland", "small businesses", "tariffs", "Bureau of Labor Statistics"], "source_meta": {"author": "Ina Hajdini", "word_count": 2024, "paywalled": false}}, {"record_id": "e9b06f777354281e", "source_type": "concepts", "source_name": "St. Louis Fed — FRED Blog", "source_url": "https://fredblog.stlouisfed.org/2026/07/us-manufacturing-employment-is-down-but-each-state-has-its-own-story/", "title": "US manufacturing employment is down, but each state has its own story", "published_date": "", "language": "en", "processed_at": "2026-07-18T10:59:23Z", "processor": "claude-code-sub-opus", "tags": ["Macro"], "gist": "US manufacturing employment fell 0.4% year-over-year to May 2026, but that national figure masks wide dispersion: twelve states grew, three were flat, and the rest declined, with small states swinging hardest.", "themes": [{"theme": "National manufacturing employment decline", "insights": [{"claim aming longevity as time-in-illness reorients investment toward quality-of-life outcomes rather than mortality endpoints.", "quote": "even though we live longer we spend more time in ill health and disability", "locator": "There is a really common misconception", "quote_verified": true}, {"claim": "The women's health gap stems from three causes: poor scientific understanding of female biology, chronic underinvestment in studying that biology, and persistent bias across the entire health value chain.", "speaker": "Paula Bellostas Muguerza", "type": "causal", "entities": ["female biology", "health value chain"], "conviction": "high", "so_what": "Naming bias as system-wide (research to diagnosis to treatment) means point solutions underperform; investors should favor platforms attacking multiple links at once.", "quote": null, "locator": "There is a really common misconception", "quote_verified": false}, {"claim": "Women were excluded from clinical trials starting in 1993 following past fetal-development complications, leaving a structural data deficit that persists today.", "speaker": "Paula Bellostas Muguerza", "type": "causal", "entities": ["clinical trials"], "conviction": "medium", "so_what": "Decades of missing female trial data is the root cause of the labeling gap; sex-disaggregated data generation is a foundational, defensible investment theme.", "quote": "women weren't included in clinical trials from 1993", "locator": "It's very multifactorial, the problem", "quote_verified": true}]}, {"theme": "Brain and Mental-Health Biology Gap", "insights": [{"claim": "The brain physiology and biology of males and females are fundamentally different, a distinction only now beginning to be understood.", "speaker": "Paula Bellostas Muguerza", "type": "thesis", "entities": ["brain health", "neuroscience"], "conviction": "high", "so_what": "Sex-specific neuroscience is an early-stage frontier; positioning ahead of consensus could capture value in CNS drug development and diagnostics.", "quote": "the brain physiology and biology of a male and a female are completely different", "locator": "if we expand the definition of the mental health gap", "quote_verified": true}, {"claim": "Women are twice as likely as men to develop depression and twice as likely to develop anxiety.", "speaker": "Paula Bellostas Muguerza", "type": "data_point", "entities": ["depression", "anxiety"], "conviction": "high", "so_what": "2x prevalence concentrates the mental-health market in women, favoring female-tailored digital-therapeutics and pharma approaches.", "quote": "we are more prone to develop depression two times as much, the same with anxiety, two times that much", "locator": "if we expand the definition of the mental health gap", "quote_verified": true}, {"claim": "Women account for roughly 70% of the prevalence of neurodegenerative disorders such as MS, Alzheimer's and dementia.", "speaker": "Paula Bellostas Muguerza", "type": "data_point", "entities": ["multiple sclerosis", "Alzheimer's disease", "dementia"], "conviction": "high", "so_what": "Female-skewed neurodegeneration prevalence argues that Alzheimer's and MS pipelines under-optimized for female biology are leaving efficacy on the table.", "quote": "we actually probably represent about 70% of the prevalence of those diseases", "locator": "if we expand the definition of the mental health gap", "quote_verified": true}, {"claim": "Studying the female brain is a fundamental lever for enabling both longer and healthier lives.", "speaker": "Paula Bellostas Muguerza", "type": "thesis", "entities": ["brain health", "longevity"], "conviction": "medium", "so_what": "Ties women's brain research to the broader longevity investment narrative, expanding its addressable investor audience.", "quote": "studying the brain of women is going to be a real fundamental analogue for us to live healthier lives and also to live longer", "locator": "if we expand the definition of the mental health gap", "quote_verified": true}]}, {"theme": "The Economic Case for Closing the Gap", "insights": [{"claim": "Closing the women's health gap could inject $1 trillion into the global economy over the next 15 years, per a World Economic Forum report.", "speaker": "Linda Lacina", "type": "prediction", "entities": ["World Economic Forum", "global GDP"], "conviction": "high", "so_what": "A headline trillion-dollar GDP figure is the anchor thesis that pulls generalist capital into women's-health as a megatrend, not a niche.", "quote": "They can even provide a trillion-dollar jolt to GDP in the next 15 years.", "locator": "Only 7% of healthcare research focuses", "quote_verified": true}, {"claim": "Bridging the women's health gap could give each woman roughly seven more healthy days per year.", "speaker": "Linda Lacina", "type": "data_point", "entities": ["World Economic Forum"], "conviction": "medium", "so_what": "Converting the gap into per-capita healthy-days quantifies productivity upside relevant to employers and insurers modeling benefit ROI.", "quote": "bridging the women's health gap can give women seven more healthy days a year", "locator": "Only 7% of healthcare research focuses", "quote_verified": true}, {"claim": "Closing the women's health gap is cited as an opportunity to unlock $400 billion annually for the global economy.", "speaker": "World Economic Forum", "type": "data_point", "entities": ["global economy"], "conviction": "medium", "so_what": "An alternate sizing figure gives investors a second data point to triangulate the market's magnitude.", "quote": "How to close the women's health gap and unlock $400 billion annually for the global economy", "locator": "Have you read?", "quote_verified": true}, {"claim": "Women make about 80% of household economic and health decisions, effectively serving as the chief medical officers of the home.", "speaker": "Paula Bellostas Muguerza", "type": "framework", "entities": ["household health decisions"], "conviction": "high", "so_what": "Female purchasing control over health spend makes women the primary customer for consumer-health and femtech go-to-market, not just the patient.", "quote": "women make 80% of the economic and the health decisions of the family, they're the chief medical officers of the home", "locator": "It will be amazing.", "quote_verified": true}, {"claim": "Women represent between 70% and 80% of the healthcare workforce in the US and globally, creating a multiplier effect where their ill health degrades care for everyone.", "speaker": "Paula Bellostas Muguerza", "type": "causal", "entities": ["healthcare workforce"], "conviction": "high", "so_what": "Female health as an input to overall care-system capacity strengthens the systemic case for employer and payer investment in women's health.", "quote": "they represent between 70 and 80% of the healthcare workforce. So if women aren't healthy, they're not gonna be able to look after other people", "locator": "It will be amazing.", "quote_verified": true}]}, {"theme": "Gender-Precision Medicine and System Redesign", "insights": [{"claim": "Health innovation should stop treating women as small men and instead develop drugs and diagnostics tailored to female biology, an approach termed gender precision medicine.", "speaker": "Paula Bellostas Muguerza", "type": "framework", "entities": ["gender precision medicine", "diagnostics", "pharmaceuticals"], "conviction": "high", "so_what": "Gender precision medicine names an emerging product category; first movers in sex-specific dosing and diagnostics can build differentiated pipelines.", "quote": "we don't think as women as small men", "locator": "It will be amazing.", "quote_verified": true}, {"claim": "Care should be organized around a woman's whole life course rather than fragmented body-part appointments, spanning pre-maternal, maternal and menopause stages.", "speaker": "Paula Bellostas Muguerza", "type": "framework", "entities": ["life course care", "menopause"], "conviction": "medium", "so_what": "Integrated life-course care models point to platform opportunities in coordinated women's-health services versus siloed point solutions.", "quote": "They would look at you in the round and across your life course", "locator": "It will be amazing.", "quote_verified": true}, {"claim": "Once investment banks and private equity funds recognize the economic opportunity, funding will flow into women's health and accelerate innovation.", "speaker": "Paula Bellostas Muguerza", "type": "prediction", "entities": ["private equity", "investment banks"], "conviction": "medium", "so_what": "Implies capital is the current bottleneck; an inflection in institutional allocation could re-rate femtech and women's-health assets.", "quote": "all of the investment banks and the private equity funds would see the economic opportunity", "locator": "It will be amazing.", "quote_verified": true}]}, {"theme": "[W]Health Platform and the Gender Health Index", "insights": [{"claim": "[W]Health began as an open letter co-created with FemTechnology and Oriana Craft that recruited 50 organizations and has since grown into a coalition of 350 organizations.", "speaker": "Paula Bellostas Muguerza", "type": "anecdote", "entities": ["[W]Health", "FemTechnology", "Oriana Craft"], "conviction": "high", "so_what": "A 7x-scaled multi-stakeholder coalition signals institutional momentum and a distribution channel investors and vendors can plug into.", "quote": "we are now at 350 organizations that are working on all of the levers", "locator": "when we started to understand the problem", "quote_verified": true}, {"claim": "The organization is premised on the thesis that women's health is wealth and that closing the gap requires collective, cross-organizational action rather than individual effort.", "speaker": "Paula Bellostas Muguerza", "type": "thesis", "entities": ["[W]Health"], "conviction": "medium", "so_what": "The wealth framing reframes women's health from charity to economic strategy, easing corporate and investor buy-in.", "quote": "we think that women's health is wealth", "locator": "when we started to understand the problem", "quote_verified": true}, {"claim": "[W]Health launched an index that lets value-chain players (pharma, consumer health, medtech, investors, providers and payers) benchmark their own operations on closing the gender health gap.", "speaker": "Paula Bellostas Muguerza", "type": "framework", "entities": ["gender health index", "medtech", "payers"], "conviction": "high", "so_what": "A standardized scoring tool creates measurable ESG-style benchmarks that could shape capital allocation and vendor selection across the sector.", "quote": null, "locator": "So [W]Health has launched a special index", "quote_verified": false}, {"claim": "The index is designed for year-on-year benchmarking so organizations and the sector overall can track whether they have moved the needle.", "speaker": "Paula Bellostas Muguerza", "type": "framework", "entities": ["gender health index"], "conviction": "medium", "so_what": "Longitudinal scoring turns the index into a recurring data asset and potential accountability lever for stakeholders.", "quote": null, "locator": "So [W]Health has launched a special index", "quote_verified": false}]}, {"theme": "Corporate Employer Benefits and the Microsoft Pilot", "insights": [{"claim": "Any large employer, regardless of sector, employs women and should manage their health because healthy women drive healthy corporations and a healthy economy.", "speaker": "Paula Bellostas Muguerza", "type": "thesis", "entities": ["employers", "oil and gas", "banking"], "conviction": "high", "so_what": "Positions women's-health benefits as a cross-sector employer-purchasing market, expanding the TAM beyond healthcare companies.", "quote": "it's healthy women, healthy corporations, healthy economy", "locator": "there's a flip side of the index", "quote_verified": true}, {"claim": "A beta test of the employer index with Microsoft found its e epigenetic hemiplegic migraine in the speaker, a permanent condition activated by high cortisol and adrenaline once a genetic predisposition is stressed.", "speaker": "Paula Bellostas Muguerza", "type": "anecdote", "entities": ["hemiplegic migraine", "cortisol", "adrenaline"], "conviction": "high", "so_what": "A concrete case that chronic stress can trigger irreversible physical illness underscores the tangible liability of unmanaged burnout.", "quote": "you have it in your genes that you could have the potential to develop this, but it only manifests if you have put your body under a lot of strain", "locator": "I'd love to tell you about my burnout story", "quote_verified": true}, {"claim": "Superwoman syndrome and chronic people-pleasing led the speaker to absorb a departing colleague's workload, precipitating a health collapse within about three months.", "speaker": "Paula Bellostas Muguerza", "type": "causal", "entities": ["superwoman syndrome", "burnout"], "conviction": "high", "so_what": "Identifies a behavioral pattern managers can screen for as an early leading indicator of burnout risk in high performers.", "quote": "I have this sort of like superwoman syndrome of I must save the situation", "locator": "I'd love to tell you about my burnout story", "quote_verified": true}, {"claim": "The speaker was passed between neurologists, cardiologists and psychologists without diagnosis and was unable to work for six months, illustrating how women's symptoms fall through system gaps.", "speaker": "Paula Bellostas Muguerza", "type": "anecdote", "entities": ["neurologists", "cardiologists", "misdiagnosis"], "conviction": "medium", "so_what": "Diagnostic odyssey exemplifies the fragmented-care failure that coordinated women's-health and diagnostic ventures aim to solve.", "quote": "I got passed between so many different people and it was neurologists and it's cardiologists", "locator": "I'd love to tell you about my burnout story", "quote_verified": true}, {"claim": " t-burnout, I had to kind of like reset", "quote_verified": true}]}], "insight_total": 32, "top_entities": ["Kearney", "Paula Bellostas Muguerza", "World Economic Forum", "[W]Health", "Microsoft", "FemTechnology", "Oriana Craft", "WHO", "gender precision medicine", "Linda Lacina"], "source_meta": {"author": "", "word_count": 10837, "paywalled": false}}, {"record_id": "50e912d3938bdfb3", "source_type": "concepts", "source_name": "World Economic Forum", "source_url": "https://www.weforum.org/stories/health-and-healthcare-systems/", "title": "Health and Healthcare Systems", "published_date": "2026-07-15", "language": "en", "processed_at": "2026-07-18T11:01:03Z", "processor": "claude-code-sub-opus", "tags": ["Society", "AI", "Macro"], "gist": "A World Economic Forum topic index whose headline mix signals where institutional attention on health is concentrating in mid-2026: the climate-health nexus, longevity and aging science, and AI-driven healthcare and pharma.", "themes": [{"theme": "Climate-health nexus as economic and health risk", "insights": [{"claim": "The World Economic Forum is framing climate change as a global health emergency rather than solely an environmental issue, foregrounding this framing via a former Icelandic prime minister.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["climate change", "Iceland"], "conviction": "medium", "so_what": "Signals that health-system and insurance investors should treat climate exposure as a health-cost driver, not just a sustainability line item.", "quote": "Climate change is becoming a global health emergency, warns Iceland’s former prime minister", "locator": "Climate change is becoming a global", "quote_verified": true}, {"claim": "Extreme heat is being positioned as the next major economic risk for Asia and the Pacific, with resilience framed as the key response.", "speaker": "World Economic Forum", "type": "prediction", "entities": ["Asia", "Pacific", "extreme heat"], "conviction": "medium", "so tive strategic stability,' while insisting the underlying Thucydidean structure still dominates. Panelists argue trade is reorienting to the rest of the world, that the US-China AI/tech rivalry may create two booming economies while leaving others behind, and that business must adapt to permanent ambiguity.", "themes": [{"theme": "Thucydides Trap and structural drivers", "insights": [{"claim": "The US-China relationship is governed by a 'great contradiction' of two simultaneous imperatives: the fiercest great-power rivalry of all time and an inextricable entanglement that forces cooperation for mutual survival.", "speaker": "Graham Allison", "type": "framework", "entities": ["United States", "China", "Graham Allison"], "conviction": "high", "so_what": "Investors should treat both decoupling narratives and full-cooperation narratives as incomplete; the base case is managed, unstable coexistence rather than resolution in either direction.", "quote": "On the one hand, this is the fiercest, lucidity and rivalry of all times.", "locator": "OK, so one of the great risks", "quote_verified": true}, {"claim": "Structural forces determine roughly 75% of the outcome in the US-China relationship, leaving only about 25% to leadership agency and diplomacy.", "speaker": "Graham Allison", "type": "framework", "entities": ["Graham Allison", "United States", "China"], "conviction": "high", "so_what": "This quantified framing implies summit optimism is capped: even skilled statecraft can only bend a minority of the trajectory, so tail risk of confrontation stays structurally embedded.", "quote": "the structural reality is 75% of what's happening", "locator": "So to the question, was the summit for real?", "quote_verified": true}, {"claim": "In 12 of the past 16 historical cases where a rising power threatened to displace a ruling power, the result was war, making catastrophic conflict the 'history as usual' baseline rather than an aberration.", "speaker": "Graham Allison", "type": "data_point", "entities": ["Graham Allison"], "conviction": "high", "so_what": "The 12-of-16 base rate is a hard prior for pricing geopolitical tail risk; it argues against complacency even during periods of visible détente.", "quote": "In the last 500 years, 12 of the 16 cases that we've seen ended in war", "locator": "Right. And I think, again, part of the reason", "quote_verified": true}, {"claim": "Left to normal behaviors of countries, companies, and politicians, the relationship is likely to end in catastrophic war within the next generation.", "speaker": "Graham Allison", "type": "prediction", "entities": ["Graham Allison", "United States", "China"], "conviction": "medium", "so_what": "A named authority explicitly betting on generational-horizon war is a signal to maintain long-dated hedges against a US-China military rupture even amid near-term stabilization.", "quote": "I would say in the next generation, it's likely that it ends in a catastrophic war.", "locator": "So to the question, was the summit for real?", "quote_verified": true}, {"claim": "Mutual assured destruction, financial entanglement, and a shared biosphere mean an escalated US-China war could leave no living Chinese and no living Americans, making cooperation a survival requirement rather than a preference.", "speaker": "Graham Allison", "type": "causal", "entities": ["United States", "China", "Graham Allison"], "conviction": "high", "so_what": "The existential downside is the structural brake that keeps both leaders pulling back from the brink; it underpins the 'floor' beneath the relationship that stabilizes risk assets during crises.", "quote": "at the end of that war, there could be no living Chinese in China and no living Americans", "locator": "The other half of problem", "quote_verified": true}, {"claim": "China is projected to keep rising and, with four times the US population, should over time overtake the US in every arena if successful.", "speaker": "Graham Allison", "type": "thesis", // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
