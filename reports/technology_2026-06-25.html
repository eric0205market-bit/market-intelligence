"claim": "The integration was developed by a research team including Dr. René Zander, Matic Petrič, Prof. Dr.-Ing. Nikolay Vassilev Tcholtchev, and Sebastian Bock.", "speaker": "Mohamed Abdel-Kareem", "type": "data_point", "entities": ["René Zander", "Matic Petrič", "Nikolay Vassilev Tcholtchev", "Sebastian Bock"], "conviction": "high", "so_what": "Identifies the Fraunhofer research personnel behind the integration for sourcing and diligence.", "quote": null, "locator": "The integration, developed by a research team", "quote_verified": false}]}, {"theme": "Functional Types and Qubit Recycling", "insights": [{"claim": "Eclipse Qrisp centers on a QuantumVariable data type orchestrated by a QuantumSession tracking layer, with a typing system including QuantumFloat for arbitrary precision arithmetic, QuantumModulus, QuantumBool, QuantumChar, and QuantumString, aggregated into a QuantumArray class supporting indexing, slicing, and reshaping.", "speaker": "Mohamed Abdel-Kareem", "type": "framework", "entities": ["Eclipse Qrisp", "QuantumVariable", "QuantumFloat"], "conviction": "high", "so_what": "High-level typed abstractions move quantum programming toward conventional software engineering, expanding the developer pool.", "quote": null, "locator": "Automated Resource Management and Functional Data Types", "quote_verified": false}, {"claim": "An automated uncomputation module disentangles and recycles physical hardware qubits once a variable's lifecycle ends, allowing separate domain routines to share identical physical quantum registers without intertwining the codebase and minimizing the total physical footprint for deep algorithms.", "speaker": "Mohamed Abdel-Kareem", "type": "framework", "entities": ["Eclipse Qrisp"], "conviction": "high", "so_what": "Automated qubit recycling directly reduces the scarce-qubit footprint, a key efficiency lever for running deep routines on small hardware.", "quote": null, "locator": "By employing an automated uncomputation module", "quote_verified": false}]}, {"theme": "Compilation and Hardware Compatibility", "insights": [{"claim": "Eclipse Qrisp leverages native JAX integration alongside Catalyst and Jaspa tools for real-time hybrid algorithm control and routes synthesized circuit blueprints into LLVM/MLIR-based classical compiler infrastructures, enabling deep routines like Shor's algorithm via Montgomery reduction and Block Encodings for quantum linear algebra.", "speaker": "Mohamed Abdel-Kareem", "type": "framework", "entities": ["Eclipse Qrisp", "JAX", "LLVM", "MLIR"], "conviction": "high", "so_what": "LLVM/MLIR compilation aligns quantum tooling with mainstream compiler infrastructure, easing long-term integration into classical software stacks.", "quote": null, "locator": "Hybrid Compilation Architectures and Structural Comparison", "quote_verified": false}, {"claim": "Eclipse Qrisp lets developers evaluate operations like integer multiplication with a standard operator (res = a*b) using a fixed-width QuantumFloat pair while the compiler infers optimal circuit configurations, versus Qiskit Aer's gate-level approach requiring explicit dual QuantumRegister blocks, separate output registers, classical readout tracks, and manual RGQFTMultiplier invocation, while maintaining compatibility with IQM, IBM Quantum, Quantinuum, and Rigetti backends.", "speaker": "Mohamed Abdel-Kareem", "type": "contrarian", "entities": ["Eclipse Qrisp", "Qiskit Aer", "IQM", "IBM Quantum", "Quantinuum", "Rigetti"], "conviction": "high", "so_what": "Concrete productivity contrast with Qiskit plus multi-backend support positions Qrisp as a vendor-neutral high-level alternative; relevant to which abstraction layer wins developer mindshare.", "quote": null, "locator": "The software allows developers to compress", "quote_verified": false}]}], "insight_total": 6, "top_entities": ["Eclipse Qrisp", "NVIDIA", "CUDA-Q", "Fraunhofer FOKUS", "Qiskit Aer", "IQM", "IBM Quantum", "Quantinuum", "Rigetti", "JAX"], "source_meta": {"author": "Mohamed Abdel-Kareem", "word_count": 541, "paywalled": false}}, {"record_id": "cb11e1ae8b11ce94", "source_type": "technology", "source_name": "ServeTheHome", "source_url": "https://www.servethehome.com/arm-cpus-take-number-1-in-latest-top500-list-with-chinese-lineshine/", "title": "Arm CPUs Take Number 1 in Latest Top500 List with Chinese LineShine", "published_date": "2026-06-24", "language": "en", "processed_at": "2026-06-25T16:02:37Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "Geopolitics", "AI"], "gist": "China's LineShine supercomputer took the #1 Top500 spot at ~2.2 ExaFLOPS Linpack (22% faster than El Capitan), and is notably an all-CPU Arm system with no GPUs, built on Huawei-designed LX2 CPUs with on-chip HBM and 800Gbps NICs. It displaces AMD from the top for the first time in 4 years, demonstrating a Chinese sovereign HPC path around GPU sanctions.", "themes": [{"theme": "All-CPU Arm Supercomputer Tops Top500", "insights": [{"claim": "China's LineShine supercomputer from NSCS Shenzhen took the #1 Top500 spot at just under 2.2 ExaFLOPS on Linpack, roughly 22% faster than El Capitan, and is the first system to publicly surpass 2 ExaFLOPS.", "speaker": "Patrick Kennedy", "type": "data_point", "entities": ["LineShine", "NSCS", "El Capitan", "China"], "conviction": "high", "so_what": "China now publicly leads global supercomputing, a sovereignty and geopolitical compute milestone.", "quote": "the first to publicly surpass 2 ExaFLOPS on Linpack.", "locator": "In a big win for Arm computing", "quote_verified": true}, {"claim": "Unlike GPU-driven El Capitan and Frontier, LineShine is a pure CPU system with no GPUs, relying on Armv9 cores with SVE and SME vector and matrix accelerator blocks.", "speaker": "Patrick Kennedy", "type": "contrarian", "entities": ["LineShine", "Arm", "El Capitan", "Frontier"], "conviction": "high", "so_what": "Shows a viable GPU-free HPC architecture, relevant amid US GPU export controls on China.", "quote": "LineShine is purely a CPU system – there are no GPUs to be found here.", "locator": "Immediately, the most notable aspect", "quote_verified": true}]}, {"theme": "LX2 CPU Architecture", "insights": [{"claim": "The LX2 CPU, thought to be designed by Huawei, comprises two compute dies with onboard HBM, each die holding 152 Armv9 cores, totaling 304 cores, 32GB HBM, and 256GB DDR5 per chip across eight NUMA domains.", "speaker": "Patrick Kennedy", "type": "data_point", "entities": ["LX2", "Huawei", "Arm"], "conviction": "medium", "so_what": "Demonstrates Huawei's advanced domestic CPU and HBM integration capability despite sanctions.", "quote": null, "locator": "The fundamental building block of LineShine is the LX2 CPU.", "quote_verified": false}, {"claim": "Each LX2 processor consumes 690 Watts, GPU-like power, and integrates 800Gbps NICs on chip, a level of integration not widely seen since Intel Xeon with OmniPath.", "speaker": "Patrick Kennedy", "type": "data_point", "entities": ["LX2", "Intel"], "conviction": "medium", "so_what": "On-chip 800Gbps networking signals aggressive vertical integration in Chinese HPC silicon.", "quote": "each LX2 processor consumes 690 Watts of power.", "locator": "With NSCS aiming for GPU-like performance", "quote_verified": true}]}, {"theme": "Efficiency vs GPU Systems", "insights": [{"claim": "LineShine sustained 2.2 EFLOPs versus a 2.74 EFLOPs theoretical peak (80%), beating US exascale GPU systems that run 50-65% of peak, but at 42MW and only ~52 GFLOPs/watt versus El Capitan's 60 GFLOPs/watt.", "speaker": "Patrick Kennedy", "type": "data_point", "entities": ["LineShine", "El Capitan"], "conviction": "high", "so_what": "CPU system wins on sustained-vs-peak efficiency but loses on energy efficiency, the expected CPU-vs-GPU tradeoff.", "quote": "the official Top500 submission for LineShine has it listed as consuming 42MW of power, for about 52 GFLOPs/watt.", "locator": "Still, the entire system is reported to be very power-hungry.", "quo // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#7c3aed', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
