  charts:{count:1,hot:false,desc:"Charts inside — worth opening: Wells Fargo's AI-spending-to-consumer-price pass-through analysis."},
  link:"https://www.thestreet.com/economy/ai-spending-affects-us-inflation-wells-fargo-analysis" },

{ id:18, cat:"AI/infra", urgency:"watch", source:"TheStreet Daily (Wedbush)",
  title:"The AI chip bottleneck nobody's watching: raw wafers",
  idea:"Wedbush is flagging a Micron-GlobalWafers supply deal as an under-the-radar AI chip bottleneck. While the market fixates on HBM and CoWoS packaging capacity, the underlying silicon wafers feeding the entire chip supply chain may be the next chokepoint.",
  angle:"The AI supply-chain story keeps moving one layer down — GPUs, then HBM, then advanced packaging, now raw wafers. Each layer down is a smaller, less-followed company with outsized leverage over the whole stack.",
  tweetA:"Wedbush is flagging a Micron-GlobalWafers deal as the AI chip bottleneck nobody's watching. Everyone's tracking HBM and CoWoS capacity — the actual silicon wafers underneath all of it might be the next chokepoint. $MU $WFR",
  tweetB:"The AI supply chain story keeps moving one layer down: first GPUs, then HBM, then packaging, now raw wafers. Each layer down is a smaller, less-followed company with outsized leverage over the entire stack.",
  charts:{count:0,hot:false,desc:""},
  link:"https://www.thestreet.com/investing/stocks/micron-globalwafers-wedbush-ai-chip-bottleneck" }
];

const META = {
  date: "2026-07-15",
  time: "03:04 CEST",
  windowStart: "2026-07-14 21:04 CEST",
  windowEnd: "2026-07-15 03:04 CEST",
  emailsInWindow: 12,
  emailsRead: 12,
  itemsExtracted: 18,
  includedSources: [
    { name: "Bespoke Investment Group", count: 2 },
    { name: "Daily Chartbook", count: 4 },
    { name: "Michael Parekh / AI Ramblings Daily", count: 4 },
    { name: "The Dark Side of the Boom™", count: 3 },
    { name: "Neil Sethi / Markets Update", count: 1 },
    { name: "Tavi Costa", count: 1 },
    { name: "The Pressure Point (Fulcrum)", count: 1 },
    { name: "TheStreet Daily", count: 2 }
  ],
  skippedSources: [
    { name: "McKinsey & Company (Strategy alert)", reason: "Pure teaser email — headline + link only ('Understand board service'), zero sentences of original body content." },
    { name: "P Equity Research (Substack chat)", reason: "Subscriber-chat notification about a Discord invite; no analytical content." }
  ]
};

const CAT_COLORS = {
  macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27", "AI/infra":"#1d9e75",
  crypto:"#7f77dd", geopolitics:"#d85a30", energy:"#f97316", tech:"#06b6d4",
  gold:"#d4a017", culture:"#ec4899", labor:"#8b5cf6", regulation:"#64748b",
  science:"#14b8a6", venture:"#84cc16"
};
const URG_META = {
  act:{emoji:"🔴", label:"Act Now"},
  deep:{emoji:"🔵", label:"Deep"},
  watch:{emoji:"🟡", label:"Watch"}
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(c){ return CAT_COLORS[c] || "#999"; }

function buildFilterBars(){
  const catCounts = {};
  ITEMS.forEach(i => catCounts[i.cat] = (catCounts[i.cat]||0)+1);
  const catBar = document.getElementById('catBar');
  let html = '<button class="pill active" data-cat="all" style="background:#1a1a1a;border-color:#1a1a1a;color:#fff;" onclick="setCat(\'all\', event)">All <span class="count">' + ITEMS.length + '</span></button>';
  Object.keys(catCounts).sort().forEach(c => {
    html += '<button class="pill" data-cat="' + c + '" onclick="setCat(\'' + c + '\', event)">' + c + ' <span class="count">' + catCounts[c] + '</span></button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1);
  const urgBar = document.getElementById('urgBar');
  let uhtml = '<button class="pill active" data-urg="all" style="background:#1a1a1a;border-color:#1a1a1a;color:#fff;" onclick="setUrg(\'all\', event)">All <span class="count">' + ITEMS.length + '</span></button>';
  ['act','deep','watch'].forEach(u => {
    if(!urgCounts[u]) return;
    uhtml += '<button class="pill" data-urg="' + u + '" onclick="setUrg(\'' + u + '\', event)">' + URG_META[u].emoji + ' ' + URG_META[u].label + ' <span class="count">' + urgCounts[u] + '</span></button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c, ev){
  activeCat = c; activeSrc = null;
  document.querySelectorAll('#catBar .pill').forEach(p => {
    const isActive = p.getAttribute('data-cat') === c;
    p.classList.toggle('active', isActive);
    if(isActive){ p.style.background = c==='all' ? '#1a1a1a' : catColor(c); p.style.borderColor = c==='all' ? '#1a1a1a' : catColor(c); p.style.color = '#fff'; }
    else { p.style.background = 'transparent'; p.style.borderColor = '#d8d4cc'; p.style.color = '#3a3a3a'; }
  });
  render();
}
function setUrg(u, ev){
  activeUrg = u; activeSrc = null;
  document.querySelectorAll('#urgBar .pill').forEach(p => {
    const isActive = p.getAttribute('data-urg') === u;
    p.classList.toggle('active', isActive);
    if(isActive){ p.style.background = '#1a1a1a'; p.style.borderColor = '#1a1a1a'; p.style.color = '#fff'; }
    else { p.style.background = 'transparent'; p.style.borderColor = '#d8d4cc'; p.style.color = '#3a3a3a'; }
  });
  render();
}
function filterBySrc(name){
  activeSrc = name;
  activeCat = "all"; activeUrg = "all";
  document.querySelectorAll('#catBar .pill').forEach(p => {
    const isActive = p.getAttribute('data-cat') === 'all';
    p.classList.toggle('active', isActive);
    p.style.background = isActive ? '#1a1a1a' : 'transparent';
    p.style.borderColor = isActive ? '#1a1a1a' : '#d8d4cc';
    p.style.color = isActive ? '#fff' : '#3a3a3a';
  });
  document.querySelectorAll('#urgBar .pill').forEach(p => {
    const isActive = p.getAttribute('data-urg') === 'all';
    p.classList.toggle('active', isActive);
    p.style.background = isActive ? '#1a1a1a' : 'transparent';
    p.style.borderColor = isActive ? '#1a1a1a' : '#d8d4cc';
    p.style.color = isActive ? '#fff' : '#3a3a3a';
  });
  render(true);
}

function render(expandMatches){
  const container = document.getElementById('cardContainer');
  let html = '';
  let shown = 0;
  ITEMS.forEach(item => {
    let visible = true;
    if(activeCat !== 'all' && item.cat !== activeCat) visible = false;
    if(activeUrg !== 'all' && item.urgency !== activeUrg) visible = false;
    if(activeSrc && item.source.indexOf(activeSrc) === -1) visible = false;
    if(!visible) return;
    shown++;
    const openClass = (expandMatches && activeSrc) ? ' open' : '';
    const urg = URG_META[item.urgency];
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += '<div class="card' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span class="urg">' + urg.emoji + '</span>';
    html += '<span class="src-badge" style="background:' + catColor(item.cat) + ';">' + item.source + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if(chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chev">▾</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="--catcolor:' + catColor(item.cat) + ';">' + item.angle + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if(item.charts.count > 0){
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s) — ' + item.charts.desc + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  if(shown === 0){
    html = '<div class="empty-msg">No items match this filter.</div>';
  }
  container.innerHTML = html;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.innerText = s;
  return d.innerHTML;
}

function toggleCard(id){
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport(){
  document.getElementById('metaLine').textContent = META.date + '  ·  ' + META.time + '  ·  ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
  let html = '<h4>Time Window</h4>';
  html += '<div>' + META.windowStart + ' → ' + META.windowEnd + '. Emails outside this window were not processed.</div>';
  html += '<h4>Emails</h4>';
  html += '<div>' + META.emailsInWindow + ' in window · ' + META.emailsRead + ' read · ' + META.itemsExtracted + ' items extracted</div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(s => {
    html += '<div><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + '</span> — ' + s.count + ' item(s)</div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(s => {
    html += '<div class="skip-item">' + s.name + ' — ' + s.reason + '</div>';
  });
  document.getElementById('reportBody').innerHTML = html;
  document.getElementById('reportHead').addEventListener('click', function(){
    document.getElementById('reportCard').classList.toggle('open');
  });
}

buildFilterBars();
render();
buildReport();
</script>
