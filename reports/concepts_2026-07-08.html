-decade margin uptrend.", "quote": null, "locator": "The most cynical explanation", "quote_verified": false}, {"claim": "The low-interest-rate era of the last decade is only a partial explanation for rising margins, and Damodaran is now skeptical of it as rates have normalized while margins have not reversed and the economy 'limps along.'", "speaker": "Aswath Damodaran", "type": "causal", "entities": [], "conviction": "medium", "so_what": "If margins were purely a low-rate phenomenon they should be mean-reverting now; their persistence argues for a structural rather than cyclical driver.", "quote": null, "locator": "A second explanation is that the macroeconomic environment", "quote_verified": false}, {"claim": "The 'capital gained bargaining power over labor' explanation for rising margins (popular on the political left) doesn't hold broadly: margins in manufacturing and services — the highest employee-count, highest wage-cost sectors — have stagnated or fallen over the last 20 years, meaning neither capital nor labor gained in those sectors.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "medium", "so_what": "Complicates the labor-share-of-income narrative used to justify antitrust or labor-policy interventions targeting 'corporate power.'", "quote": null, "locator": "A third explanation", "quote_verified": false}, {"claim": "The most salient driver of the 20-year margin uptrend, in Damodaran's view, is compositional: technology companies with structurally superior unit economics and economies of scale have displaced old-economy companies in the market, mechanically lifting aggregate market margins.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["technology sector"], "conviction": "high", "so_what": "Index-level margin/valuation comparisons across decades are distorted by sector-composition shift; adjust for this before calling the market 'overvalued' on margin grounds.", "quote": null, "locator": "The fourth, and in my view the most salient rationale", "quote_verified": false}]}, {"theme": "Value creation: most firms fail to earn their cost of capital", "insights": [{"claim": "Profitability alone is too low a bar for business success; the real test is whether a company's return on equity/capital exceeds its cost of equity/capital, since invested capital always has an opportunity cost elsewhere.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Screen for excess returns (ROE minus cost of equity, ROIC minus cost of capital), not just positive earnings, when judging whether a company is actually creating value.", "quote": null, "locator": "Value Creation in Business", "quote_verified": false}, {"claim": "The width (strength) and depth (durability) of a company's competitive moat is what determines whether it can sustainably earn returns above its cost of equity/capital — a framework Damodaran credits partly to Michael Mauboussin's October 2024 Morgan Stanley piece.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["Michael Mauboussin", "Morgan Stanley"], "conviction": "medium", "so_what": "Use moat width/depth as the qualitative overlay for explaining which companies will sustain excess returns rather than mean-revert.", "quote": null, "locator": "width (strength of competitive advantages) and depth", "quote_verified": false}, {"claim": "Only 29% of global firms earn a return on equity above their cost of equity (28% for return on capital vs. cost of capital), and only 19%/17% respectively clear that bar by 5 percentage points or more — meaning the large majority of companies worldwide are not creating shareholder value on an accounting-returns basis.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "Base rates matter: most publicly tracked companies globally destroy or merely tread water on value creation, which should temper broad-market optimism and reward selectivity.", "quote": null, "locator": "only 29% (28%) of global firms earn returns", "quote_verified": false}, {"claim": "US companies collectively delivered excess returns of 8.44% on equity and 1.81% on capital in aggregate, with technology, consumer goods, and communication services the only US sectors posting double-digit excess returns at the aggregate level — evidence that large-cap firms in these sectors carry the market's value creation.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["technology sector"], "conviction": "high", "so_what": "Value creation in the US market is narrowly concentrated in mega-cap tech/consumer/telecom names, reinforcing a barbell rather than broad-based bull case.", "quote": null, "locator": "US companies collectively delivering excess returns", "quote_verified": false}, {"claim": "No country in Damodaran's regional breakdown has more than 50% of its firms earning above their cost of capital; Japan has the highest share of firms clearing the bar, while Canada and Australia have the lowest.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Japan", "Canada", "Australia"], "conviction": "medium", "so_what": "Country-level value-creation base rates argue against assuming any single developed market is broadly 'efficient' at earning above cost of capital; Japan screens relatively better on this metric.", "quote": null, "locator": "Japan ranking highest in percentages", "quote_verified": false}, {"claim": "Using a global sample of 48,156 firms and a US sample of 5,994 firms, Damodaran finds that the share of companies beating their cost of capital rises as companies age through the corporate life cycle, but aggregated excess returns actually peak in middle age rather than continuing to rise — a pattern more pronounced in the US than globally.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "medium", "so_what": "Don't assume excess returns compound indefinitely with company maturity; the life-cycle framework implies mid-life is often the peak value-creation window, with decline following.", "quote": null, "locator": "I break companies down by age into deciles", "quote_verified": false}]}, {"theme": "AI as a margin disruptor, not a margin booster", "insights": [{"claim": "Damodaran takes a 'jaundiced view' of AI's effect on company profitability, predicting it will act as a disruptor that puts downward pressure on margins at most firms while increasing the advantage that already-larger firms hold within each business.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["AI"], "conviction": "high", "so_what": "Positions AI as a net negative for average-firm margins and a further concentrator of winner-take-all dynamics — a reason to prefer scale leaders over the broad basket in AI-exposed industries.", "quote": null, "locator": "A Profitability Wrap Up", "quote_verified": false}, {"claim": "Damodaran's causal argument against the 'AI makes companies more profitable' narrative: unless AI tools are exclusive to a given company (competitors can't buy the same or equivalent tools), the cost savings will be available industry-wide, triggering price competition that erodes the profitability gains rather than letting them flow to the bottom line.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["AI"], "conviction": "high", "so_what": "Be skeptical of corporate 'AI will boost our margins' guidance unless the company has a genuinely proprietary AI advantage; broadly available AI tools get competed away via pricing.", "quote": null, "locator": "Unless the AI tools that you are talking about are exclusive", "quote_verified": false}, {"claim": "Damodaran draws a direct historical analogy: online retail was initially seen as a boon by brick-and-mortar retailers but ended up destroying most of them and reducing margins for the retail sector collectively over the past three decades — offered as the template for how AI will play out across industries.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["AI", "US retail sector"], "conviction": "high", "so_what": "A historical base-rate reference point: treat 'this new tech will help incumbents' claims with skepticism when the tech is broadly accessible, since retail's incumbents were similarly wrong about e-commerce.", "quote": null, "locator": "a revisit of the US retail sector over the last three decades", "quote_verified": false}, {"claim": "The recent AI-driven sell-off in software stocks reflects investors preemptively pricing in the risk that AI will put downward pressure on software margins, even though the actual revenue/margin decline hasn't shown up in the numbers yet — which Damodaran argues is exactly what efficient markets are supposed to do, since these same stocks were earlier marked up ahead of realized margin gains.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["AI", "software industry"], "conviction": "high", "so_what": "Frames the software sell-off as rational forward pricing of margin risk rather than an overreaction, arguing against 'buy the dip' framing based on trailing fundamentals alone.", "quote": "You live by the sword (expectations of growth and high margins), you die by it (expectations that growth rates will hit a cliff and margins will decline)!", "locator": "the AI sell off that we have seen play out", "quote_verified": true}, {"claim": "Damodaran predicts AI's effect on overall corporate profitability will be a 'slow-motion car wreck' — gradual margin slippage playing out over time rather than a sudden shock, but ultimately damaging.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["AI"], "conviction": "medium", "so_what": "Sets a multi-year rather than a quarterly time horizon for watching AI-driven margin compression play out across sectors.", "quote": "I do think that the AI disruption will be more akin to a slow-motion car wreck", "locator": "Time will tell", "quote_verified": true}, {"claim": "Damodaran argues consumers will be net beneficiaries of AI-driven cost and price competition, but investors and employees in disrupted companies will bear a cost that, for a sizable number of them, outweighs those consumer benefits.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["AI"], "conviction": "medium", "so_what": "Implies a distributional trade: broad consumer-welfare gains from AI may come paired with concentrated losses for shareholders/workers in disrupted incumbents — relevant for sector allocation, not just index-level calls.", "quote": null, "locator": "As consumers, we will benefit", "quote_verified": false}]}, {"theme": "Crumbling moats and the winner-take-all tilt", "insights": [{"claim": "Over the last four decades, competitive moats have generally crumbled due to global competition and disruption, yet the corporate landscape has simultaneously tilted toward larger firms as more businesses become winner(s)-take-all — the context in which Damodaran situates his skeptical view of AI's effect on profitability.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "Reconciles seemingly contradictory trends (weaker moats overall, but more concentrated winners) — favor scale/incumbency within disrupted industries rather than assuming disruption is broadly democratizing.", "quote": null, "locator": "moats have crumbled", "quote_verified": false}]}], "insight_total": 30, "top_entities": ["Milton Friedman", "ESG", "Michael Mauboussin", "Morgan Stanley", "AI", "technology sector", "software industry", "S&P 500", "US retail sector", "Japan"], "source_meta": {"author": "Aswath Damodaran", "word_count": 4027, "paywalled": false}}, {"record_id": "3575e527307f5484", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/01/data-update-1-for-2026-push-and-pull-of.html", "title": "Data Update 1 for 2026: The Push and Pull of Data!", "published_date": "2026-01-09", "language": "en", "processed_at": "2026-07-08T13:40:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "AI", "Tech", "Positioning"], "gist": "Damodaran opens his annual data-update series with a warning on the psychology and biases of data use, details how his aggregated industry statistics are built from a 48,156-company global sample, reports that the US market's share of global cap slipped even as tech dominates, and argues an AI 'Damodaran Bot' could eventually automate his entire data process and disrupt quant investing.", "themes": [{"theme": "Psychology and Pitfalls of Data", "insights": [{"claim": "Data's main appeal to investors and businesses is psychological: it creates a feeling of control and a coping mechanism against uncertainty, not necessarily better decisions.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": [], "conviction": "high", "so_what": "Investors should be wary of using data (or models) mainly to feel better rather than to genuinely reduce error.", "quote": null, "locator": "The Push and Pull of Data", "quote_verified": false}, {"claim": "Damodaran estimates the historical equity risk premium at 7.03% (the century-long average of stock returns over treasury bonds), but with a standard error of 2.05%, implying a plausible range of roughly 4% to 11%.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["equity risk premium"], "conviction": "high", "so_what": "Anyone plugging a single ERP number into a DCF or CAPM model is embedding several points of hidden valuation error; sensitivity-test around this wide band rather than treating 7% as precise.", "quote": "The estimate that I will provide is 7.03% (the average over the entire period), but that number comes with a standard error of 2.05%, resulting in a range from a little less than 4% ... to greater than 11%.", "locator": "False precision", "quote_verified": true}, {"claim": "Peer review does not make academic finance research more objective than practitioner research, because academics' incentive systems (publication, tenure) create their own biases just as compensation ties practitioner output to bias.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "medium", "so_what": "Discount 'peer-reviewed' academic finance claims with the same skepticism applied to sell-side research rather than treating them as bias-free.", "quote": null, "locator": "The Role of Bias", "quote_verified": false}, {"claim": "Classic value-investing strategies (buying low price-to-book stocks, calling markets overpriced because P/E exceeds historical norms) rest on an assumption of mean reversion that works most of the time but fails during structural shifts that produce permanent breaks from historical valuation norms.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "A market trading above historical average multiples is not automatically 'overvalued' — check whether the underlying business/earnings structure has permanently shifted before betting on reversion.", "quote": null, "locator": "Lazy mean reversion", "quote_verified": false}, {"claim": "Despite ever-richer datasets and more powerful analytical tools, a version of Gresham's law is operating in investing and policy: bad data and misinformation drive out good data, leading to worse decisions rather than better ones.", "speaker": "Aswath Damodaran", "type": "causal", "entities": [], "conviction": "medium", "so_what": "More data availability is not itself a solve for decision quality; investors should actively filter sources rather than assume abundance equals better signal.", "quote": null, "locator": "Data Coverage", "quote_verified": false}, {"claim": "Damodaran's practical rule for using any third-party data (including his own): check the provider's biases/priors, avoid black-box providers who won't detail methodology, and crosscheck against alternate data sources.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "A concrete due-diligence checklist for vetting any data vendor or dataset before building a valuation or trading decision on it.", "quote": null, "locator": "Data Coverage", "quote_verified": false}]}, {"theme": "How the Damodaran Dataset Is Actually Built", "insights": [{"claim": "Damodaran computes industry-level statistics like PE ratios as aggregated values (total market capitalization of all companies in a group divided by total net income of all companies, including money-losers) rather than as a simple or size-weighted average, specifically to avoid distortion from missing data (e.g. negative-earnings firms) and wide size dispersion within an industry.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Analysts pulling his industry PE/EBITDA multiples should understand they are cap-weighted aggregates, not averages of individual company ratios — using them interchangeably with a simple mean will misstate the comparable.", "quote": null, "locator": "Data Sources", "quote_verified": false}, {"claim": "Damodaran reports industry-level rather than company-level data both because his raw data providers (S&P Capital IQ, Bloomberg) restrict redistribution of company-level data, and because individual company data is already available for free in each firm's own financial filings.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["S&P Capital IQ", "Bloomberg"], "conviction": "high", "so_what": "Users needing single-company figures should go to filings directly rather than expect Damodaran's public datasets to substitute for a Bloomberg/Capital IQ subscription.", "quote": null, "locator": "Data Sources", "quote_verified": false}, {"claim": "For his global dataset, absolute-value figures (e.g. total market capitalization) are converted into US dollars, but ratio-based statistics (PE, margins, accounting returns) are currency-invariant, so a company's PE ratio would compute identically whether measured in dollars or in local currency such as Chilean pesos.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Cross-border multiple comparisons in his dataset are not distorted by FX conversion timing, unlike absolute market-cap figures which are.", "quote": null, "locator": "For global statistics", "quote_verified": false}, {"claim": "Damodaran has argued for three decades that lease commitments should be treated as debt and R&D expenditure as capital rather than an operating expense; accounting standards adopted his lease-as-debt view in 2019, but he still diverges from GAAP on R&D and reports affected metrics (margins, accounting returns) both with and without his adjustment.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["R&D"], "conviction": "high", "so_what": "Investors comparing his margin/return figures to standard GAAP-based data providers should expect a persistent divergence specifically on R&D-heavy companies (e.g. tech, pharma) since he capitalizes R&D and others expense it.", "quote": null, "locator": "As an illustration for consistency", "quote_verified": false}, {"claim": "Damodaran's 2026 global sample includes all publicly traded companies with a market price above zero — 48,156 companies total — deliberately avoiding the sampling bias created by restricting analysis to indices like the S&P 500 or to companies above a market-cap threshold, which would skew industry averages toward large-cap behavior.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "His industry averages are more representative of the full market (including small/micro caps) than benchmarks built only from large-cap indices, which is a reason his multiples can differ from S&P-500-based comparables.", "quote": null, "locator": "Data Universe", "quote_verified": false}]}, {"theme": "2025 Global Market Scorecard", "insights": [{"claim": "Global equity market capitalization rose $26.3 trillion in 2025, a 21.46% increase for the year.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "Sets the baseline scale of the 2025 global equity rally against which regional and sector performance below should be judged.", "quote": null, "locator": "Global equities added", "quote_verified": false}, {"claim": "The United States remains the dominant single market with 5,994 listed firms and $69.8 trillion in market capitalization, and US stocks rose almost 16.8% in aggregate in 2025, yet the US share of total global market capitalization actually fell from 48.7% at the end of 2024 to 46.8% at the end of 2025.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["United States"], "conviction": "high", "so_what": "A rising US market can still mean a shrinking US share of world equity value if other regions rally faster — a de-dollarization/diversification signal for global asset allocators.", "quote": null, "locator": "the United States", "quote_verified": false}, {"claim": "China was the best-performing major sub-region of 2025, up almost 32.5% in US dollar terms, while India was the worst performer among major markets, up only 3.31% in US dollar terms.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["China", "India"], "conviction": "high", "so_what": "A sharp reversal signal for investors who had rotated into India as the preferred emerging-market growth story over China in recent years.", "quote": null, "locator": "The best performing sub-region in 2025", "quote_verified": false}, {"claim": "Technology is now the largest sector globally by market capitalization, at almost 22% of total global equity value, ahead of financial services (17.51%) and industrials (12.76%); technology also delivered the highest sector return in 2025 (20.73%), while real estate and utilities were the weakest performers.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["technology sector", "financial services", "industrials", "real estate", "utilities"], "conviction": "high", "so_what": "Confirms tech's continued concentration of global equity value and outperformance, reinforcing the case for watching sector-concentration risk in global cap-weighted indices.", "quote": null, "locator": "Across all global companies", "quote_verified": false}]}, {"theme": "AI Disruption of Data Work and Quant Investing", "insights": [{"claim": "Damodaran believes his own 'Damodaran Bot' — an AI trained on everything he has published — could already do every mechanical step of his annual data-collection and processing workflow better and faster than he can, and he plans to hand more of next year's data update process over to it, with the eventual goal of having it take over almost the entire process.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["Damodaran Bot"], "conviction": "high", "so_what": "A leading valuation practitioner conceding that AI can fully replace his own core data workflow is a strong signal for how far AI automation of routine financial-analysis labor has progressed.", "quote": "As I looked at the process that I went through to put my datasets together, I realized that there was no aspect of it that a bot cannot do better and faster than I can.", "locator": "The Damodaran Bot!", "quote_verified": true}, {"claim": "Businesses whose core model is collecting and processing data and charging high prices for that service are exposed to AI-driven disruption unless they can find other sources of differentiation.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "A direct warning applicable to data/analytics vendors (financial data providers, research shops) about business-model risk from AI substitution.", "quote": null, "locator": "I do think that there is a message here for businesses", "quote_verified": false}, {"claim": "Quant investing strategies built around large teams of quantitative analysts crunching big datasets for excess returns will become more challenging, not easier, as AI proliferates in that space — a contrarian view relative to the common assumption that AI simply supercharges quant investing.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "medium", "so_what": "Implies alpha from data-crunching quant strategies may compress as AI commoditizes the analytical edge, pushing durable alpha toward judgment/narrative-based approaches instead.", "quote": "To the extent that a great deal of quant investing has been built around smart numbers people working with large datasets to eke out excess returns, it will become more challenging, not less so, with AI in the mix.", "locator": "More generally", "quote_verified": true}, {"claim": "Damodaran's own defense against being replaced by AI is to lean into multi-disciplinary work that combines numbers with narrative and requires intuition, imagination, and generalist judgment — areas he believes bots cannot yet replicate — rather than competing on mechanical, rule-based tasks.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "medium", "so_what": "A template for any knowledge worker facing AI substitution risk: shift value-add from mechanical data processing toward narrative synthesis and judgment calls that don't reduce to rules.", "quote": null, "locator": "In 2024, I talked about the Damodaran Bot", "quote_verified": false}]}], "insight_total": 19, "top_entities": ["Aswath Damodaran", "S&P Capital IQ", "Bloomberg", "Value Line", "China", "India", "United States", "Damodaran Bot", "technology sector", "equity risk premium"], "source_meta": {"author": "Aswath Damodaran", "word_count": 3434, "paywalled": false}}, {"record_id": "48ff5501d82c21f8", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/04/to-trillion-dollars-and-beyond-spacex.html", "title": "To a Trillion(s) Dollars and beyond: A SpaceX IPO Odyssey!", "published_date": "2026-04-23", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Positioning"], "gist": "Damodaran builds a pre-prospectus sum-of-the-parts DCF on SpaceX (launch, Starlink, xAI/Grok, plus expansion options) at an 8% cost of capital, arriving at $1.22 trillion versus a $1.25 trillion private-market price and a rumored $1.75 trillion IPO price, while arguing that pricing off peers is just as assumption-laden as valuation but hides its biases.", "themes": [{"theme": "SpaceX's business mix and growth trajectory", "insights": [{"claim": "SpaceX now operates three distinct core businesses (space launch, Starlink satellite internet, and xAI/Grok LLM) plus a set of expansion options, and Damodaran values each separately because they differ in operating metrics and competitive dynamics.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX", "Starlink", "xAI", "Grok"], "conviction": "high", "so_what": "Investors should model SpaceX as a diversified conglomerate with three separate risk/growth profiles rather than a single aerospace comp, since a single blended multiple will misprice it.", "quote": null, "locator": "To value SpaceX, I consider each of its three core businesses separately", "quote_verified": false}, {"claim": "SpaceX's revenue mix flipped dramatically from launch-dependent to Starlink-dependent: 2021 revenue was just over $2 billion, almost entirely from launch, but by 2025 estimated revenue reached $15.6 billion, with launch only ~30% ($4.1B) and Starlink about $11.4 billion.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX", "Starlink"], "conviction": "high", "so_what": "The bull case for SpaceX now rests on Starlink's subscription economics, not on the launch business that built its reputation — competitive and margin risk in launch matters less to the equity story than it used to.", "quote": "Starlink's subscriber based model has allowed revenues to increase more than five-fold since, reaching an estimated $15.6 billion in 2025", "locator": "SpaceX had a slow start financially", "quote_verified": true}, {"claim": "xAI, acquired by SpaceX in February 2026, had only about $100 million in subscription revenue in 2025 (later cited as ~$80 million from X Premium bundling), making it immaterial to current financials despite driving much of the IPO excitement.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["xAI", "Grok", "SpaceX"], "conviction": "high", "so_what": "The AI narrative around SpaceX is priced well ahead of any revenue reality from xAI; investors are paying for optionality, not current cash flow.", "quote": null, "locator": "xAI, which was acquired in 2026, had subscription revenues of roughly $100 million in 2025", "quote_verified": false}, {"claim": "Starlink held roughly two-thirds of all satellites in orbit (~10,000 of the global count) at end of 2025 and doubled its subscriber base to just over 10 million in the prior year, while Amazon's acquisition of GlobalStar introduces a competitor with only a fraction of Starlink's satellite count.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Starlink", "Amazon", "SpaceX"], "conviction": "high", "so_what": "Starlink's infrastructure lead (satellite count) is currently so large that near-term competitive threats like Amazon/GlobalStar are unlikely to dent market share, supporting the high share assumptions in the valuation.", "quote": null, "locator": "At the end of 2025, Starlink had close to 10,000 satellites in space", "quote_verified": false}, {"claim": "Satellite-based internet is still a niche relative to the ~$1.5 trillion global internet services market, capturing only about 1% (under $15 billion in revenue) in 2025 because broadband quality still lags fiber and cable outside of rural areas, disaster zones, and mobile transit use cases.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Starlink"], "conviction": "high", "so_what": "Starlink's total addressable market is currently much smaller than headline satellite hype implies; the bull case depends entirely on the forecast that satellite share of internet services rises from <1% to 10% by 2036.", "quote": null, "locator": "the total internet service market is estimated to be close to a trillion and a half dollars globally", "quote_verified": false}, {"claim": "Grok/xAI trails Anthropic (Claude), OpenAI (ChatGPT), and Google (Gemini) in both usage and monetization, and Damodaran thinks it may deliberately concede the larger, more competitive business-application market to those rivals in favor of consumer subscriptions.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Grok", "xAI", "Anthropic", "OpenAI", "Google"], "conviction": "medium", "so_what": "Investors should not underwrite SpaceX's LLM segment as a Claude/ChatGPT/Gemini competitor; the more realistic (and monetizable) path is a smaller, higher-margin consumer niche.", "quote": "It is possible that Grok may concede the larger and more competitive business space to Claude and ChatGPT and focus instead on consumer subscriptions, giving it a smaller market, but one with less competition.", "locator": "The Large Language Model (LLM) business", "quote_verified": true}, {"claim": "xAI's recent acquisition of Cursor, an AI coding startup, signals that xAI has not fully abandoned competing for business/enterprise AI applications despite lagging Anthropic, OpenAI and Google.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["xAI", "Cursor", "Grok"], "conviction": "medium", "so_what": "Watch xAI's M&A (like Cursor) as a leading indicator of whether it pivots back toward contesting enterprise AI share rather than staying consumer-only, which would change the margin/growth assumptions in any valuation.", "quote": "The recent acquisition of Cursor, a young AI company in the coding space, suggests that xAI has not thrown in the towel on business applications.", "locator": "The recent acquisition of Cursor", "quote_verified": true}]}, {"theme": "Financials, funding history, and ownership structure", "insights": [{"claim": "SpaceX's estimated $8 billion EBITDA in 2025 masks unclear operating or net profitability once depreciation and other expenses are factored in, because full financial statements are not yet public.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "medium", "so_what": "Any pre-IPO multiple based on EBITDA overstates true profitability quality; investors should discount reported EBITDA until GAAP operating/net income is disclosed in the prospectus.", "quote": null, "locator": "it is estimated that SpaceX generated an EBITDA of $8 billion in 2025", "quote_verified": false}, {"claim": "SpaceX raised over $12 billion across more than thirty venture rounds since a $12 million first round in 2002, funded initially by $100 million of Musk's own PayPal proceeds, with backers including Founders Fund, Andreessen Horowitz, Sequoia, Fidelity, and Google.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX", "Elon Musk", "Founders Fund", "Andreessen Horowitz", "Sequoia", "Fidelity", "Google"], "conviction": "high", "so_what": "The long, capital-intensive private funding history explains why private-market pricing (~$1.25 trillion) already embeds sophisticated investor views, giving Damodaran's DCF a natural benchmark to test against.", "quote": null, "locator": "The first venture capital round of about $12 million was in 2002", "quote_verified": false}, {"claim": "Despite dilution from many funding rounds, Elon Musk still owns about 42% of SpaceX's equity but, due to differential voting rights, controls close to 80% of total voting power.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Elon Musk", "SpaceX"], "conviction": "high", "so_what": "Governance risk is structural and permanent: public shareholders will have limited influence over strategy regardless of the price they pay, a key risk factor for any IPO buyer.", "quote": null, "locator": "he continues to own about 42% of the equity in the company, and with differential voting rights, close to 80% of the total voting rights", "quote_verified": false}]}, {"theme": "Sum-of-the-parts valuation narrative and inputs", "insights": [{"claim": "Damodaran argues that intrinsic (DCF) valuation does not require historical data or a peer group — only a business narrative — and that missing data makes estimates noisier, not impossible, directly rebutting the common claim that SpaceX 'cannot be valued.'", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "Investors shouldn't wait for a prospectus to form a view; a narrative-driven DCF can be built now and refined later, giving early movers a valuation edge before consensus catches up.", "quote": "the fact that you face uncertainty or that you are missing information does not imply that you cannot make estimates, just that the estimates will be noisier", "locator": "It is true that intrinsic valuation", "quote_verified": true}, {"claim": "SpaceX's launch business has an 80%+ 2025 market share within a launch market estimated at $30 billion in 2026, forecast to grow to $100 billion by 2036, with Damodaran assuming share moderates to 70% and operating margins rise to 40% as costs fall with scale.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["SpaceX"], "conviction": "medium", "so_what": "Even with share erosion baked in, the launch business alone implies roughly $28 billion of 2036 revenue at 40% margins — a benchmark investors can use to sanity-check bullish launch-segment assumptions.", "quote": null, "locator": "The space launch market is estimated to be about $30 billion in 2026", "quote_verified": false}, {"claim": "Damodaran forecasts the satellite internet market growing from $15 billion to $160 billion by 2036 (rising from under 1% to 10% share of the total internet services market), with Starlink holding 75% share and operating margins approaching 60% as customer acquisition costs ease.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["Starlink"], "conviction": "medium", "so_what": "This single assumption — satellite internet's addressable share rising 10x — does most of the heavy lifting in the valuation; if it doesn't play out, the $1.22 trillion figure has the most downside from this segment.", "quote": null, "locator": "The satellite internet services market will continue to grow", "quote_verified": false}, {"claim": "Damodaran projects xAI/Grok revenue of $80 billion by 2036 at a 50% operating margin, deliberately smaller than LLM competitors because it avoids costly head-to-head competition with Anthropic, OpenAI and Google for business use.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["xAI", "Grok", "Anthropic", "OpenAI", "Google"], "conviction": "low", "so_what": "The LLM segment's value comes from high assumed margin, not market leadership — a strategic bet that avoiding competition beats fighting for share, worth stress-testing given how volatile LLM economics have been.", "quote": null, "locator": "xAI will target primarily consumer subscription revenues and niche business applications", "quote_verified": false}, {"claim": "Damodaran adds a separate 'expansion options' category (space travel, broadband expansion, xAI business applications) worth $50 billion of 2036 revenue at a 30% margin, with cash flows only starting after year 6 (2032) to reflect low current probability but high payoff.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX", "xAI"], "conviction": "exploratory", "so_what": "This is a real-options overlay on top of the core DCF — investors modeling SpaceX should treat this slice as the most speculative and least reliable component of the total value.", "quote": null, "locator": "This part of the story is built on the expansion options", "quote_verified": false}, {"claim": "Damodaran uses an 8% cost of capital for SpaceX — close to the median for a US company — reasoning that most of SpaceX's risk is company-specific (diversifiable) and cuts both ways, with outliers more likely to skew upside than downside.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "medium", "so_what": "A surprisingly low discount rate for a young, uncertain company is doing real work to inflate the valuation; investors who view SpaceX's risk as non-diversifiable or downside-skewed should use a higher cost of capital and get a materially lower value.", "quote": "much of the risk here is specific to the company (thus reducing the effect in a diversified portfolio) and cuts in both directions (upside and downside)", "locator": "If you are wondering why the cost of capital is only 8%", "quote_verified": true}]}, {"theme": "Valuation output and market pricing gap", "insights": [{"claim": "Damodaran's base-case intrinsic value for SpaceX is $1.22 trillion — about 10% below the private-market price (~$1.25 trillion) and roughly a third below the rumored IPO pricing ($1.75 trillion) — for a company with $15.5 billion of trailing revenue.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX"], "conviction": "high", "so_what": "The base case reads as fair-to-slightly-rich versus the private market but meaningfully overvalued versus the rumored IPO price — a concrete anchor for judging where the IPO should be bought or avoided.", "quote": "the value that I derive is $1.22 trillion, about 10% below the private market pricing and about a third below the expected IPO pricing", "locator": "With my story and inputs", "quote_verified": true}, {"claim": "A Monte Carlo simulation across 10,000 trials centered on the same base-case inputs produces a median value of $1.29 trillion, and prices of $1.75-2 trillion fall within the simulated distribution but leave 'little or no upside' for an investor paying that much.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "medium", "so_what": "The rumored IPO price isn't statistically impossible, but buying at $1.75-2 trillion means paying for the high end of the distribution with asymmetric downside — a clear 'don't chase' signal.", "quote": "a $1.75 trillion or even a $2 trillion pricing falls in the range of the distribution, though with little or no upside left for an investor paying that price", "locator": "Since the simulation is centered on the same expected values", "quote_verified": true}, {"claim": "Damodaran predicts the IPO prospectus itself won't move the intrinsic value story because reported historical numbers will be too small relative to the value driven by future growth expectations, and warns the prospectus's market-size claims will be 'hype' with trillions of dollars thrown around for TAM.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["SpaceX"], "conviction": "high", "so_what": "Investors should treat any SpaceX prospectus TAM figures skeptically and build valuations before the roadshow narrative anchors expectations, rather than waiting for 'more information' that won't actually change the analysis.", "quote": "expect to see trillions of dollars thrown around nonchalantly for market size", "locator": "it is not an either/or proposition", "quote_verified": true}]}, {"theme": "Why pricing SpaceX is as flawed as valuing it", "insights": [{"claim": "Using 2025 trailing revenue and EBITDA against the $1.25 trillion private-market equity value (assuming near-zero net debt) yields 'nosebleed' multiples of 81x revenue and 156x EBITDA.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "high", "so_what": "Anyone justifying the IPO price on trailing multiples is not doing serious analysis; multiples this extreme only make sense if you buy the decade-out growth story, which should be made explicit rather than hidden behind a scalar.", "quote": "the resulting enterprise value of $1.25 trillion yields nosebleed multiples of 81 times revenues and 156 times EBITDA", "locator": "the absence of debt and cash numbers makes it impossible", "quote_verified": true}, {"claim": "Switching from trailing to forward (2030/2035) revenue collapses the EV/Sales multiple from roughly 80x/112x down to about 3.9x/5.5x at the private and IPO pricing levels, which Damodaran warns bullish analysts will exploit by inflating future revenue forecasts to make sky-high prices look reasonable.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["SpaceX"], "conviction": "high", "so_what": "A reasonable-looking forward multiple can be manufactured simply by picking an aggressive enough revenue forecast — investors should demand to see the growth assumptions behind any forward multiple pitched to them, not just the multiple itself.", "quote": "it is inevitable that bullish analysts, unable to justify the sky high pricing values with trailing 12-month numbers, will resort to using forward pricing, and add to the bias, by inflating revenues in future years", "locator": "There is no inherent problem with using forward numbers", "quote_verified": true}, {"claim": "There is no valid peer group for pricing SpaceX: Boeing and Northrop Grumman are too low-growth/low-margin for the launch business, Palantir lacks SpaceX's infrastructure intensity, Verizon and T-Mobile aren't growth comparables for Starlink, and LLM peers are mostly private companies priced on small-sample VC rounds.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["Boeing", "Northrop Grumman", "Palantir", "Verizon", "T-Mobile", "SpaceX"], "conviction": "high", "so_what": "Any relative-value pricing analysts publish for SpaceX will necessarily use cherry-picked, imperfect comps; treat 'comparable company' multiples in sell-side notes as narrative dressing rather than rigorous benchmarking.", "quote": null, "locator": "The even bigger challenge in pricing SpaceX", "quote_verified": false}, {"claim": "Damodaran predicts there will be far more buy than sell/hold recommendations when SpaceX goes public, with analysts using forward multiples, hand-picked peer groups, and unsubstantiated growth stories ('fairy tales') as ex-post rationalization rather than genuine analysis.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["SpaceX"], "conviction": "high", "so_what": "Expect sell-side coverage to be structurally biased bullish; investors should discount the ratio of buy ratings and look instead at the underlying assumptions each analyst uses.", "quote": "I will predict that there will be far more buy than sell or hold recommendations for SpaceX, when it does go public, with analysts doing pricing gymnastics with forward multiples, hand-picked peer groups and fairy tales to justifying their positions", "locator": "No matter what peer group you pick", "quote_verified": true}, {"claim": "The core distinction Damodaran draws is that intrinsic valuation forces explicit judgments about revenue, margins and reinvestment, while multiple-based pricing lets the same biased assumptions remain implicit and unexamined.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "When evaluating any SpaceX price target, investors should reverse-engineer the implied growth/margin assumptions behind the multiple rather than accepting the multiple at face value.", "quote": "the only difference between intrinsic valuation and pricing...is that with the former...you have to face up to the uncertainties and make your best explicit judgments...whereas with the latter...they remain implicit", "locator": "Put simply, the only difference", "quote_verified": true}]}, {"theme": "The Musk factor and investment stance", "insights": [{"claim": "Damodaran expects SpaceX to behave like Tesla under Musk's control: a 'shape shifting entity' that shifts narrative unpredictably rather than following a linear corporate life cycle, causing 'whiplash' for investors expecting orderly growth-to-maturity progression.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Elon Musk", "SpaceX", "Tesla"], "conviction": "high", "so_what": "Standard valuation frameworks that assume a stable maturing narrative will repeatedly be invalidated by sudden strategic pivots (as with the xAI and Cursor acquisitions); investors need to revisit the model frequently rather than set-and-forget.", "quote": "it will shift from one narrative to another, often with no advance warning, causing whiplash for investors", "locator": "SpaceX is an engineering marvel", "quote_verified": true}, {"claim": "Damodaran frames SpaceX as hard to buy but even more dangerous to sell short, citing Tesla short sellers' experience over the last two decades as the cautionary precedent.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "Tesla", "Elon Musk"], "conviction": "high", "so_what": "Asymmetric risk favors staying out or going long selectively rather than shorting overvaluation — the same narrative unpredictability that creates valuation risk for longs has repeatedly destroyed short positions in Musk companies.", "quote": "That makes it a difficult company to buy, but it makes it an even more dangerous company to sell short, as Tesla short sellers have discovered in the last two decades", "locator": "When I bought Tesla in 2019", "quote_verified": true}, {"claim": "Damodaran states he would not buy SpaceX at the rumored $1.75 trillion IPO price but would become a buyer after 'one big correction,' since he views the company as having immense competitive advantages despite the governance baggage of its founder.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "Elon Musk"], "conviction": "high", "so_what": "A concrete, actionable stance: wait for a post-IPO drawdown rather than buying the offering, consistent with the DCF ($1.22T) sitting well below the rumored IPO price ($1.75T).", "quote": "while I would not be interested in buying at the rumored IPO pricing of $1.75 trillion, it is one big correction away from being fairly priced or even cheap. If that happens, I will be a buyer", "locator": "With all that said, SpaceX is a unique company", "quote_verified": true}]}], "insight_total": 27, "top_entities": ["SpaceX", "Elon Musk", "Starlink", "xAI", "Grok", "Tesla", "Anthropic", "OpenAI", "Google", "Cursor", "Boeing", "NASA"], "source_meta": {"author": "Aswath Damodaran", "word_count": 4238, "paywalled": false}}, {"record_id": "5a396ee3732c2e2b", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/06/a-weeks-ago-i-assessed-value-of-spacex.html", "title": "Revisiting the SpaceX Valuation: A Post-Prospectus Update!", "published_date": "2026-06-04", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Positioning", "Tech"], "gist": "Damodaran updates his pre-IPO SpaceX valuation after the May 20, 2026 prospectus, landing at $1.25-1.35 trillion equity value versus a rumored $1.8 trillion offer price ($135/share), and argues the AI business (via xAI/Colossus) is now both the biggest value driver and the biggest risk given Musk's supermajority voting control.", "themes": [{"theme": "Prospectus data reveals a bigger, more levered, more concentrated company", "insights": [{"claim": "SpaceX's prospectus, filed May 20, 2026, is 277 pages plus a 100-page addendum, which Damodaran describes as bloated with soaring narrative and pictures but containing 'weak links and multiple distractions,' consistent with his broader finding that IPO prospectuses have grown four to five times longer than decades ago without becoming more informative.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["SpaceX"], "conviction": "high", "so_what": "Investors should not equate prospectus length or detail with informational value; the decision-relevant data is often buried in footnotes, not the bulk of the document.", "quote": "prospectuses have become more bloated over time, often running four to five times longer than those filed by companies that went public three or four decades ago, but not necessarily more informative", "locator": "The Prospectus: Data versus Information", "quote_verified": true}, {"claim": "SpaceX reported a 2025 operating loss of $2.57 billion (worse than Damodaran's pre-prospectus estimate of $2 billion) and, after nearly $2 billion in interest expense that was previously unknown, a net loss of about $5 billion.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "high", "so_what": "The headline loss is materially larger than pre-IPO leaks suggested, and the debt load (unknown pre-prospectus) adds real interest expense drag even though it barely moves enterprise value given SpaceX's cash position.", "quote": null, "locator": "The Prospectus: Data update", "quote_verified": false}, {"claim": "Because SpaceX's R&D spend is heavy, Damodaran capitalizes it rather than expensing it and estimates earnings before interest, taxes and R&D of $4 billion, implying the reported operating loss overstates how unprofitable the underlying businesses are.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "Analysts using GAAP operating losses at face value will misjudge SpaceX's true earnings power; capitalizing R&D is the correct lens for R&D-heavy young companies.", "quote": null, "locator": "The Prospectus: Data update", "quote_verified": false}, {"claim": "The xAI acquisition pushed SpaceX's book equity to $41.3 billion (versus a pre-prospectus guess of $20 billion) and total debt including leases to $22.9 billion, but with $24.7 billion in cash the company actually has net debt of negative $1.9 billion (net cash), so the debt load has minimal impact on Damodaran's roughly $1.21 trillion enterprise value estimate.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX", "xAI"], "conviction": "high", "so_what": "Headlines about SpaceX's ~$23 billion in debt are misleading in isolation; net of cash the balance sheet is actually net-cash and immaterial to valuation at this enterprise value scale.", "quote": null, "locator": "On the financing front", "quote_verified": false}, {"claim": "The prospectus disclosed 12,535 million basic shares outstanding, far above Damodaran's pre-prospectus backed-out estimate of 2,467 million shares, and this share count still excludes employee restricted stock units that remain undisclosed.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "high", "so_what": "Per-share value estimates built on pre-prospectus share counts were off by roughly 5x; anyone using the earlier $1.2 trillion valuation to infer a per-share price would badly misprice the stock, and further dilution from undisclosed RSUs is still coming.", "quote": null, "locator": "Share count", "quote_verified": false}, {"claim": "SpaceX plans to raise $75 billion in the offering and will hold proceeds in cash to fund infrastructure investment, meaning the cash boosts equity/firm value but not enterprise value.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "high", "so_what": "Nearly all the increase in Damodaran's post-prospectus equity value (from ~$1.2T to $1.3T) comes mechanically from this cash infusion, not from improved operating fundamentals.", "quote": null, "locator": "Use of proceeds", "quote_verified": false}, {"claim": "SpaceX will have two share classes at IPO: 6,932 million Class A shares (one vote each) sold to the public, and 5,602 million Class B shares (ten votes each) held entirely by Elon Musk, giving him control of more than 85% of voting rights.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX", "Elon Musk"], "conviction": "high", "so_what": "Public shareholders will have essentially no governance leverage over capital allocation decisions, which matters directly for how much AI-spending risk they are implicitly underwriting.", "quote": "with Elon Musk holding all of the class B shares, he will control more than 85% of the voting rights in the company", "locator": "governance questions that will overhang the firm", "quote_verified": true}]}, {"theme": "Segment-by-segment story revisions: Starlink carries, AI overreaches", "insights": [{"claim": "SpaceX's total 2025 revenue grew about a third year over year, but growth diverged sharply by segment: connectivity (Starlink) grew almost 50%, AI grew about 22%, and the space launch business grew only 7.64%, leading Damodaran to conclude that Starlink, not the AI or rocket business, actually carried the company in 2025.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX", "Starlink"], "conviction": "high", "so_what": "The market narrative around SpaceX centers on rockets and AI, but the actual 2025 growth engine was Starlink connectivity, which should reframe where investors focus diligence.", "quote": "it is Starlink that carried the company in 2025", "locator": "Revenue Growth (Target Revenues)", "quote_verified": true}, {"claim": "xAI's Colossus compute center has been leased to Anthropic for $1.25 billion a month, which Damodaran expects to kickstart AI segment revenue next year, while also flagging future tension if xAI tries to compete directly against Anthropic in AI products.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["xAI", "Anthropic", "Colossus"], "conviction": "medium", "so_what": "A single counterparty (Anthropic) lease is a near-term revenue driver for xAI, but it simultaneously seeds a future competitive conflict of interest that could jeopardize that revenue stream once xAI pushes into Anthropic's own market.", "quote": "which has been leased to Anthropic for an eye-popping $1.25 billion a month, which should kickstart revenues next year, with the potential of tension in future years if xAI plans to go head-to-head against Anthropic", "locator": "Revenue Growth (Target Revenues)", "quote_verified": true}, {"claim": "The prospectus claims a $28 trillion total addressable market for SpaceX, with $26 trillion of that attributed to AI alone; Damodaran calls this 'borders on fantasy' and compares it to similarly inflated IPO TAM claims from Uber ($5.7 trillion) and Airbnb ($3.4 trillion).", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["SpaceX", "xAI", "Uber", "Airbnb"], "conviction": "high", "so_what": "Bankers' TAM slides in prospectuses are a recurring gamification pattern across major tech IPOs and should be heavily discounted, not used as a valuation anchor.", "quote": "SpaceX has the largest TAM of any company in history, with a total TAM of $28 trillion, and AI accounts for $26 trillion of that market estimate", "locator": "TAM by business", "quote_verified": true}, {"claim": "Despite rejecting the prospectus's $26 trillion AI TAM figure, Damodaran still doubled his own target AI revenue estimate from $80 billion to $160 billion, based on the Cursor acquisition and prospectus signals that xAI wants to seriously compete in enterprise AI, implying his own AI TAM estimate of $3-4 trillion.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["xAI", "SpaceX"], "conviction": "medium", "so_what": "Even a skeptical analyst materially raised AI revenue expectations post-prospectus, showing the AI segment is the single biggest swing factor in the updated valuation.", "quote": null, "locator": "Story takeaway: I will stick with my estimates", "quote_verified": false}, {"claim": "SpaceX's space launch segment has the best unit economics of its three businesses with roughly 67% gross margins, reflecting cost advantages from reusable rocket technology, and Damodaran raised its target operating margin from 40% to 45%.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["SpaceX"], "conviction": "high", "so_what": "The core rocket business is quietly the highest-margin, most defensible part of SpaceX, even though it grew slowest in 2025 and gets the least market attention relative to AI.", "quote": null, "locator": "The space business has the best unit economics", "quote_verified": false}, {"claim": "Starlink's gross margin improved from 37% in 2024 to 48% in 2025 and turned operating-income positive even before capitalizing R&D, but average revenue per subscriber fell from $99/month in 2024 to $66/month in Q1 2026 even as subscribers roughly doubled from 5 million (Q1 2025) to 10.3 million (Q1 2026).", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Starlink", "SpaceX"], "conviction": "high", "so_what": "Starlink is trading average revenue per user for volume/scale and it's working on margins, a classic land-grab pattern worth tracking via subscriber growth and ARPU trends each quarter; Damodaran held its target margin at 60%.", "quote": null, "locator": "the revenues, per month, per subscriber, declined", "quote_verified": false}, {"claim": "SpaceX's AI segment has the lowest gross margins of its three businesses and those margins deteriorated further in 2025 due to intense LLM competition and rising delivery costs, leading Damodaran to cut his target AI operating margin from 45% to 25% even while roughly doubling target AI revenue.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["xAI", "SpaceX"], "conviction": "high", "so_what": "The AI business is becoming a larger but structurally lower-margin part of the SpaceX story — a bigger, less profitable bet — which is the single most important net-negative revision in this update.", "quote": null, "locator": "The AI business not only has the lowest gross margins", "quote_verified": false}, {"claim": "2025 capital expenditures (~$14 billion) and R&D (~$9 billion) roughly doubled from 2024, with AI alone accounting for more than $14 billion of total reinvestment ($9.1 billion capex plus $5.1 billion R&D), which Damodaran calls 'breathtaking in its magnitude.'", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["xAI", "SpaceX"], "conviction": "high", "so_what": "AI capex intensity is now the dominant driver of SpaceX's total reinvestment need, meaning free cash flow generation is being pushed further out and value is increasingly contingent on AI capex paying off.", "quote": null, "locator": "Reinvestment", "quote_verified": false}, {"claim": "Damodaran frames the AI capex surge as a bet with two possible readings: optimistically, it signals SpaceX/xAI intends to genuinely compete with Anthropic, Google and OpenAI in enterprise AI rather than settle for a niche; pessimistically, it locks in tens of billions more in near-term capex and risks major value destruction if xAI loses the AI competition.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["xAI", "Anthropic", "Google", "OpenAI"], "conviction": "medium", "so_what": "The bull/bear case for SpaceX now hinges almost entirely on whether xAI can win share against three well-capitalized AI leaders, making competitive dynamics in enterprise AI a direct read-through to SpaceX equity value.", "quote": null, "locator": "The positive twist that a SpaceX optimist would put", "quote_verified": false}]}, {"theme": "Updated valuation and governance risk", "insights": [{"claim": "Post-prospectus, Damodaran's enterprise value estimate barely moved, edging from $1.21 trillion to $1.22 trillion, but equity value rose to about $1.3 trillion almost entirely because of the $75 billion IPO cash infusion, implying roughly $100/share, well below the reported offer price of $135/share (~$1.8 trillion valuation).", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["SpaceX"], "conviction": "high", "so_what": "There is a roughly 35-45% gap between Damodaran's fundamental value and the rumored/actual IPO pricing, flagging the offering as expensive relative to his DCF-based story.", "quote": "The enterprise value for SpaceX edges up from $1.21 trillion, in my pre-prospectus valuation, to $1.22 trillion with the post-prospectus numbers, and the overall equity value increases to $1.3 trillion", "locator": "With these updated inputs, I reestimate the cash flows", "quote_verified": true}, {"claim": "Damodaran raised his costs of capital used in the valuation (starting cost of capital from 8.02% to 8.37%, steady-state from 8.00% to 8.25%) to reflect the rise in US Treasury rates from 4.20% to 4.56% between his two valuations, noting both figures now sit near the median for all US companies.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "A ~35bp move in discount rate is a mechanical valuation headwind independent of company fundamentals, illustrating how sensitive long-duration growth-story valuations are to the risk-free rate.", "quote": null, "locator": "Since US treasury rates have risen", "quote_verified": false}, {"claim": "Damodaran's single biggest concern about SpaceX is that it will overreach in AI — starting with an overestimated AI target market and competitive position, and compounded by a voting structure that leaves Musk's Class B control unchecked even if shareholders want to rein in AI capex after it becomes clear the market is smaller or xAI's products are inferior to competitors.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "xAI", "Elon Musk"], "conviction": "high", "so_what": "The dual-class structure isn't just a governance footnote — it is the mechanism by which a misjudged AI bet could persist and compound rather than get corrected by market discipline, a key downside catalyst to monitor via capex trajectory.", "quote": null, "locator": "the one that I would be concerned about the most", "quote_verified": false}, {"claim": "Damodaran flags the personal rivalry between Elon Musk and Sam Altman as a real financial risk, warning that it could escalate into what he calls a 'UFC match between two monstrous egos, funded by tens of billions of dollars shareholder money.'", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["Elon Musk", "Sam Altman", "xAI"], "conviction": "medium", "so_what": "Personality-driven competitive escalation (not just market economics) could drive AI capex beyond what unit economics justify, a soft catalyst that's hard to model but worth watching in capex guidance and public statements.", "quote": "you have the potential for a UFC match between two monstrous egos, funded by tens of billions of dollars shareholder money", "locator": "antipathy that exists between Musk and Sam Altman", "quote_verified": true}, {"claim": "Damodaran states his overall SpaceX equity value is about $1.25-1.3 trillion (later refined to $1.25-1.35 trillion), and explicitly says he won't try to convince investors who value it at $3 trillion or half a trillion that they're wrong, framing disagreement over market size and profitability in young companies as natural and healthy.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX"], "conviction": "high", "so_what": "Wide legitimate valuation dispersion ($0.5T-$3T+) for the same company signals this is a high-variance, story-driven stock where position sizing should account for genuine model uncertainty, not just point-estimate error.", "quote": "I think that SpaceX is worth about $1.25-$1.3 trillion, but if you contend that it is worth $3 trillion or only half a trillion, it is neither my job nor my place to convince you", "locator": "In short, based on my inputs and story", "quote_verified": true}]}, {"theme": "IPO mechanics: bankers add little value, pricing is anchored and discounted", "insights": [{"claim": "Damodaran argues the SpaceX IPO exemplifies the 'dwindling value added by bankers on every dimension': banks can't time markets, filing mechanics are largely rote, pricing is really anchored off recent private-market transactions rather than banker judgment, and marketing/roadshows add little when social media and influencers already shape sentiment.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["SpaceX"], "conviction": "high", "so_what": "Investors should discount the idea that bank involvement conveys informational or pricing quality signal for mega-cap, already-liquid private companies like SpaceX.", "quote": "the SpaceX IPO is a testimonial to the dwindling value added by bankers on every dimension", "locator": "The Bankers", "quote_verified": true}, {"claim": "SpaceX's pre-IPO private-market pricing was already about $1.2 trillion, and adding the $75 billion offering proceeds plus liquidity/S&P 500 inclusion benefits, Damodaran expected the offering to price between $1.5 and $2 trillion — and indeed a news report set the offer at $135/share, implying about $1.8 trillion.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["SpaceX"], "conviction": "high", "so_what": "His pricing-range prediction (confirmed by the actual $135/share print) shows IPO pricing was driven mechanically by prior private valuation plus proceeds plus index-inclusion premium, not by fresh fundamental analysis.", "quote": "there is a sense that the offering will be priced at between $1.5 trillion to $2 trillion, with or without the investment banking input", "locator": "Pricing", "quote_verified": true}, {"claim": "Damodaran notes that IPO price guarantees are largely illusory because banks systematically set offer prices 15-20% below what they believe the market will actually pay, which is why he expects SpaceX's offer price to land below the top of its range — a discount partly cushioned because the float represents less than a tenth of total shares.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "A deliberate 15-20% underpricing is a structural first-day 'pop' mechanism baked into IPO design — traders can systematically expect a discount-to-fair-value entry price relative to the top of the marketed range.", "quote": "they systematically set offering prices at below (by 15-20%) what they believe the market will pay", "locator": "Price guarantee", "quote_verified": true}, {"claim": "Damodaran points out that no investment bank has the balance sheet to provide meaningful post-market price support for a company priced near $2 trillion, meaning the traditional after-market stabilization safety net effectively does not exist for SpaceX if investor sentiment turns negative.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX"], "conviction": "medium", "so_what": "Downside volatility in the weeks after listing could be sharper and less cushioned than for typical IPOs, since the usual bank-backstop mechanism is scaled out at this size.", "quote": "no investment bank has the capital to support the pricing of a two-trillion company, if investors turn negative on it", "locator": "Post-market support", "quote_verified": true}]}, {"theme": "Life-cycle framework: why traditional value screens fail on young companies", "insights": [{"claim": "Damodaran's core framework: for young, high-growth companies, value is driven by total addressable market sizing and unit economics found in prospectus footnotes, not by the current-period revenue/earnings figures in the financial statements themselves; as companies mature this shifts toward larger revenue, positive profits, and free cash flow available for dividends/buybacks.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "Investors analyzing pre-profit growth companies should weight footnote disclosures on TAM, unit economics, and capital intensity far more heavily than headline income-statement figures.", "quote": null, "locator": "Financial Statements and Value: The Life Cycle Effect", "quote_verified": false}, {"claim": "Damodaran argues that investors who screen out all money-losing companies or refuse to pay more than 20x earnings will end up holding only mature or declining businesses, and that this is a defensible strategy only if such investors stop complaining about missing high-growth stocks.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["SpaceX"], "conviction": "high", "so_what": "A direct challenge to traditional value-investing screens (low P/E, EV/EBITDA, profitability filters) as structurally unable to ever capture pre-profit compounders like SpaceX — the critique should be about mispriced fundamentals, not accounting losses per se.", "quote": "Investors who are wedded to never buying money losing companies or never paying more than twenty times earnings for a stock will end up with portfolios of mature (and declining) businesses", "locator": "For those who are focused on value metrics", "quote_verified": true}, {"claim": "Damodaran states that paying roughly 100x revenues for SpaceX (the level implied by a $1.8 trillion valuation) 'seems foolhardy' from a pure multiples perspective, even though he thinks dismissing SpaceX solely on the basis of losses, negative cash flow, or high revenue multiples is 'lazy and unconvincing' — the legitimate bear case rests on market-size and margin assumptions, or governance/key-man risk.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "Elon Musk"], "conviction": "high", "so_what": "Separates a weak bear case (valuation-multiple sticker shock) from a strong one (TAM overestimation, margin compression, key-man/governance risk) — investors should build their SpaceX thesis on the latter, not the former.", "quote": "paying a hundred times revenues for it (which is where a $1.8 trillion pricing would put it) seems foolhardy", "locator": "SpaceX is a company with small revenues and large losses", "quote_verified": true}]}, {"theme": "Investor versus trader: positioning around the IPO pop", "insights": [{"claim": "Damodaran distinguishes investors (who buy/sell based on a value gap and wait for it to close) from traders (who buy/sell based on expected price momentum regardless of fundamentals), and self-identifies as an investor who is 'not a very good trader.'", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["SpaceX"], "conviction": "high", "so_what": "A reusable lens for deciding whether to chase an IPO pop (trader logic) versus wait for price to converge to fundamental value (investor logic) — useful for any hyped mega-cap listing, not just SpaceX.", "quote": null, "locator": "Investors and Traders", "quote_verified": false}, {"claim": "At a rumored $1.8 trillion valuation, Damodaran considers SpaceX too richly priced to buy given his own $1.25-1.35 trillion equity estimate, but says he would reconsider if the price fell enough, citing precedent that Facebook traded at half its IPO price within months and Uber lost over 50% of its market cap in the year after its IPO.", "speaker": "Aswath Damodaran", "type": "anecdote", "entities": ["SpaceX", "Uber"], "conviction": "medium", "so_what": "Historical precedent (Facebook, Uber) suggests high-profile IPOs often see 50%+ post-listing drawdowns, implying patience could offer a materially better entry point into SpaceX within the following year.", "quote": "Facebook was selling at half its offering price a few months after its IPO, and that Uber lost more than 50% of its market cap in the year after its public offering", "locator": "It is worth remembering that Facebook", "quote_verified": true}, {"claim": "Damodaran says he would not be surprised to see SpaceX's offering price at $1.8 trillion and then jump further in the days/weeks after listing, making entry at the offer price a plausible winning trade for momentum-driven traders, though he personally would not short the stock even if pricing rose toward $2 trillion, because mood and momentum are too unpredictable to bet against.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["SpaceX"], "conviction": "medium", "so_what": "Even a bear on valuation explicitly avoids shorting an overpriced hype stock, underscoring that overvaluation alone is not sufficient reason to bet against momentum-driven names.", "quote": null, "locator": "I would not be surprised in the least", "quote_verified": false}, {"claim": "Damodaran frames SpaceX overall as 'a loaded bet on the AI and Elon Musk,' noting some investors will draw confidence from Musk's Tesla track record while others will be deterred by the same personality dependence.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["SpaceX", "Elon Musk", "Tesla"], "conviction": "high", "so_what": "Frames the SpaceX investment decision as fundamentally a bet on two correlated factors (AI market outcomes and Musk execution/capital allocation), which investors should size and hedge as a single concentrated risk rather than diversified exposure.", "quote": "this company is a loaded bet on the AI  and Elon Musk", "locator": "A Loaded Bet on AI!", "quote_verified": false}]}], "insight_total": 32, "top_entities": ["SpaceX", "Elon Musk", "xAI", "Starlink", "Anthropic", "Colossus", "Sam Altman", "Uber", "Airbnb", "Tesla", "OpenAI", "Google"], "source_meta": {"author": "Aswath Damodaran", "word_count": 6017, "paywalled": false}}, {"record_id": "5ffb8f75405ee06e", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/03/ai-scenarios-from-economic-doomsday-to.html", "title": "AI Scenarios: From Doomsday Destruction to Do-Nothing Bots!", "published_date": "2026-03-04", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Macro", "Positioning", "Society"], "gist": "Damodaran dissects the Citrini Research AI-doomsday scenario (unemployment above 10% and markets down ~40% by June 2028) and the Citadel rebuttal, then offers his own 'possible-plausible-probable' framework for judging AI disruption, concluding disruption will be real but slower and narrower than doomsayers claim, hitting software, banking and consulting unevenly.", "themes": [{"theme": "The Citrini doomsday scenario and market fallout", "insights": [{"claim": "A sell-off in markets was triggered at least partly by an AI scenario assessment from Citrini Research, a macro and stock research publisher, released on February 22, 2026.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Citrini Research"], "conviction": "high", "so_what": "Watch for research-driven, narrative-based sell-offs even absent new fundamental data — sentiment on AI disruption is now a standalone market catalyst.", "quote": null, "locator": "a sell off last week, in response, at least partially, to an AI scenario assessment from Citrini Research", "quote_verified": false}, {"claim": "The Citrini report's dark scenario projects that by June 30, 2028, AI disruption will have pushed unemployment above 10% and driven the stock market down almost 40%, framed by Citrini as a 'scenario, not a prediction.'", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Citrini Research"], "conviction": "medium", "so_what": "A concrete tail-risk date (mid-2028) and magnitude (10%+ unemployment, -40% market) gives investors a specific hedge-timing reference even if Damodaran doubts its probability.", "quote": "unemployment rates rising above 10% and the market down almost 40% in response", "locator": "The Citrini AI assessment came out on February 22, 2026", "quote_verified": true}, {"claim": "Unlike prior AI doomsday narratives that assume AI fails to deliver and the pain comes from wasted trillions of capex, the Citrini scenario assumes AI works very well and is adopted very quickly, and the pain comes precisely from that success displacing high-earning white-collar workers, cutting their consumption and triggering rising default risk, wider credit spreads, and a private-credit collapse.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Citrini Research"], "conviction": "high", "so_what": "Distinguish 'AI fails, capex wasted' bear cases from 'AI succeeds too well, labor market implodes' bear cases — they imply opposite trades (short AI capex names vs. short consumer discretionary/credit).", "quote": null, "locator": "In contrast, the Citrini story is built on the expectation that not only does AI work well", "quote_verified": false}, {"claim": "Negative market reactions had already appeared around new AI investment announcements at Meta and Amazon, alongside markdowns in software company market capitalizations, before the Citrini-driven sell-off.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Meta", "Amazon"], "conviction": "medium", "so_what": "Capex-announcement reactions at Meta and Amazon are an early tell that the market is repricing AI infrastructure spend as a cost rather than a growth driver.", "quote": null, "locator": "That disquiet has played out as negative market reactions to new AI investments at Meta and Amazon", "quote_verified": false}, {"claim": "Goldman Sachs, Moody's and JP Morgan responded to Citrini with more benign AI scenarios projecting modest and temporary job and income effects, while Citadel published a direct rebuttal arguing for a much more positive end
