tor": "the U.S.-China back-channel talks in 1971", "quote_verified": false}]}, {"theme": "The 2026 Iran-US Mediation", "insights": [{"claim": "After a Feb. 28 war involving Israel, Iran and the US, Pakistan brokered 21 hours of Iran-US negotiations in Islamabad in April that produced a ceasefire holding despite continued Israel-Hezbollah fighting and US-Iran strikes.", "speaker": "BINA SHAH", "type": "data_point", "entities": ["Pakistan", "Iran", "United States", "Israel", "Hezbollah"], "conviction": "high", "so_what": "A concrete, datable data point establishing Pakistan's mediator credentials — relevant for pricing Pakistan-linked geopolitical risk premia or diplomatic-role-driven aid/investment flows.", "quote": null, "locator": "in negotiations that lasted 21 hours in Islamabad", "quote_verified": false}, {"claim": "On June 18, Iran and the US signed an interim agreement to end the war with Pakistan as mediator, followed three days later by talks in Switzerland where Munir and PM Shahbaz Sharif met Vance, Kushner and Witkoff, announcing a 60-day roadmap to peace.", "speaker": "BINA SHAH", "type": "data_point", "entities": ["Pakistan", "Iran", "United States", "Asim Munir", "Shahbaz Sharif", "J.D. Vance", "Jared Kushner", "Stephen Witkoff"], "conviction": "high", "so_what": "A concrete near-term catalyst calendar (60-day roadmap from ~June 21) to watch for follow-through or breakdown in the Iran-US peace process.", "quote": null, "locator": "the parties announced \"major progress\" on a 60-day roadmap", "quote_verified": false}, {"claim": "Trump's personal fascination with Field Marshal Munir is likely to sustain the US-Pakistan relationship regardless of how the Iran war concludes, potentially extending to Pakistan safeguarding Iran's highly-enriched-uranium stockpiles or patrolling the Persian Gulf.", "speaker": "BINA SHAH", "type": "prediction", "entities": ["Donald Trump", "Asim Munir", "Pakistan", "Iran"], "conviction": "medium", "so_what": "Flags a specific emographic stake in mediating rather than sitting out the Iran conflict.", "speaker": "BINA SHAH", "type": "causal", "entities": ["Pakistan", "Iran"], "conviction": "high", "so_what": "Quantifies a concrete economic linkage (trade figures, pilgrim flows) that explains Pakistan's incentive to mediate — useful for tracking whether Pakistan-Iran trade actually scales toward the $10B target as a leading indicator of the relationship's health.", "quote": null, "locator": "2. The Shia Bridge", "quote_verified": false}, {"claim": "Pakistan has sent a sizeable contingent of troops and fighter jets to Saudi Arabia's Eastern Province under an existing defense pact, signaling it is positioning itself to patrol the Persian Gulf or send a message from the Muslim bloc to Israel over its expansion into Lebanon.", "speaker": "BINA SHAH", "type": "data_point", "entities": ["Pakistan", "Saudi Arabia", "Israel"], "conviction": "medium", "so_what": "A concrete military deployment signal worth monitoring for escalation or formalization into a broader regional security role for Pakistan in the Gulf.", "quote": null, "locator": "3. The Gulf Umbrella", "quote_verified": false}, {"claim": "The China-Pakistan Economic Corridor (CPEC), anchored by the Gwadar port, plus Pakistan's largely undeveloped rare minerals, coal and gas reserves, function as leverage Pakistan can use to extract economic assistance and financial capital from both China and the US.", "speaker": "BINA SHAH", "type": "thesis", "entities": ["Pakistan", "China", "CPEC", "Gwadar"], "conviction": "medium", "so_what": "Flags Pakistan's untapped rare-minerals/coal/gas base as an underexploited asset class that could become a bargaining chip in future US or Chinese investment deals — worth tracking for resource-extraction deal announcements.", "quote": null, "locator": "4. Iron Brothers", "quote_verified": false}, {"claim": "The author predicts agricultural diplomacy and water diplomacy will become the primary currency of Global South geopolitics over the next 20 years, with Pakistan well-positioned via its agricultural exports to food-insecure Saudi Arabia and China.", "speaker": "BINA SHAH", "type": "prediction", "entities": ["Pakistan", "Saudi Arabia", "China"], "conviction": "medium", "so_what": "A macro thesis that food/water exporting nations gain outsized diplomatic leverage — relevant to evaluating agricultural-exporting emerging markets more broadly, not just Pakistan.", "quote": null, "locator": "This agricultural diplomacy, along with water diplomacy", "quote_verified": false}, {"claim": "Forty years of fighting the Afghan-Soviet war and the War on Terror have given Pakistan's military an edge in asymmetric warfare, and it is now building out integrated air-force surveillance systems and cyberattack capabilities.", "speaker": "BINA SHAH", "type": "thesis", "entities": ["Pakistan"], "conviction": "medium", "so_what": "Signals Pakistan is investing in next-generation military capability (cyber, air surveillance) beyond legacy counterinsurgency skills — a factor in assessing its long-term defense-sector relevance to allies.", "quote": null, "locator": "5. Military Grit", "quote_verified": false}]}, {"theme": "Middle-Power Multilateralism as the New World-Order Framework", "insights": [{"claim": "Noema editor Nathan Gardels' framework holds that 'middle power multilateralism' — a bloc including Europe, Canada, Japan, Australia and Global South states like India and Brazil — is the only imperfect alternative to a world order governed by might-makes-right, and the author positions Pakistan as a working example of this model.", "speaker": "BINA SHAH", "type": "framework", "entities": ["Pakistan", "India", "Brazil"], "conviction": "medium", "so_what": "Frames a broader macro thesis worth tracking: which mid-sized states (beyond Pakistan) successfully convert multi-directional alignment into diplomatic leverage as the US-China-Russia order fragments.", "quote": "the only imperfect alternative to a world order where might makes right", "locator": "Gardels argues in a Noema essay", "quote_verified": true}, {"claim": "Canadian PM Mark Carney's concept of 'variable geometry' — creating different coalitions for different issues based on shared interests — describes exactly what Pakistan has done simultaneously with Iran, Saudi Arabia, Turkey, Egypt and the UAE, giving it 'strategic autonomy' to resist Indian regional hegemony.", "speaker": "BINA SHAH", "type": "framework", "entities": ["Pakistan", "Iran", "Saudi Arabia", "Turkey", "Egypt", "UAE", "India"], "conviction": "high", "so_what": "A reusable analytical lens — 'variable geometry' — for evaluating any state's foreign policy as an issue-by-issue coalition strategy rather than a fixed alliance bloc.", "quote": "creating different coalitions for different issues based on common values and interests for those issues", "locator": "what Canadian Prime Minister Mark Carney calls \"variable geometry\"", "quote_verified": true}, {"claim": "Iran scholar Reza Aslan argues the best-case democratic outcome for Iran would be to become like Pakistan — a hybrid regime with an elected government and legislature but real power still held by the military — contrasted favorably against outright military dictatorships like Egypt or Myanmar.", "speaker": "BINA SHAH", "type": "contrarian", "entities": ["Iran", "Pakistan", "Reza Aslan", "Egypt", "Myanmar"], "conviction": "medium", "so_what": "A contrarian reframing that Pakistan's flawed hybrid democracy is actually a realistic aspirational ceiling for Iran, not a cautionary tale — worth watching if this framing gains traction in US Iran-policy discourse.", "quote": "Best-case scenario, Iran becomes Pakistan.", "locator": "Aslan's reply", "quote_verified": true}, {"claim": "Aslan characterizes Pakistan's military as ideologically indifferent and purely pragmatic, concerned only with 'who has the biggest guns' — which the author uses to explain why the US comfortably partners with Pakistan's generals despite publicly criticizing its lack of democracy.", "speaker": "BINA SHAH", "type": "framework", "entities": ["Pakistan", "United States", "Reza Aslan"], "conviction": "medium", "so_what": "Explains the durability of US-Pakistan military cooperation across civilian and military governments alike: transactional pragmatism, not shared values, is the operative currency.", "quote": "Whatever you want to say about the military, ideology is not part of their calculus. The military is a very pragmatic force. What they're concerned about is who has the biggest guns.", "locator": "perhaps because, as Aslan says", "quote_verified": true}]}, {"theme": "India's Faltering Claim to Regional Leadership", "insights": [{"claim": "Finnish President Alex Stubbs praised India's 'multi-alignment' — investing in its own security while building partnerships in many directions — as the basis for its future world-order leadership role, but the author counters that the BJP's 12 years of electoral dominance has instead endangered India's democracy.", "speaker": "BINA SHAH", "type": "contrarian", "entities": ["India", "BJP", "Alex Stubbs"], "conviction": "medium", "so_what": "Signals a bear case on India's soft-power narrative: its democratic credentials — the core justification for its Global South leadership claim — are described as actively eroding, a risk factor for India-related geopolitical premiums.", "quote": "Your approach makes sense.", "locator": "But India's tilt toward right-wing politics", "quote_verified": true}, {"claim": "The author argues Trump/America is happy doing business with Pakistan's 'hybrid' regime precisely because Pakistan is already executing the multi-directional security-and-partnership strategy that Stubbs recommended India pursue — implying Pakistan, not India, is currently the more effective practitioner of that strategy.", "speaker": "BINA SHAH", "type": "contrarian", "entities": ["Pakistan", "India", "Donald Trump"], "conviction": "medium", "so_what": "A direct comparative claim that Pakistan is out-executing India on the exact diversification strategy India is praised for — useful for reassessing relative US diplomatic attention/investment between the two rivals.", "quote": null, "locator": "Meanwhile, America — or at least Donald Trump", "quote_verified": false}, {"claim": "The author credits Pakistan with a consistent three-year record of advocating at the United Nations for Palestinian rights and against Israeli violence in Gaza, the West Bank and Lebanon, framing this as evidence its moral position and commitment to a rules-based order exceed what would be expected of a state routinely labeled a 'failed state' or 'banana republic.'", "speaker": "BINA SHAH", "type": "thesis", "entities": ["Pakistan", "Israel"], "conviction": "medium", "so_what": "Positions Pakistan's UN advocacy record as a soft-power asset distinct from its military/economic levers — relevant to assessing its standing within Global South and Muslim-bloc diplomatic coalitions.", "quote": "Pakistan's moral position and its commitment to a rules-based international order have remained consistent.", "locator": "Pakistan, with all its flaws and missteps", "quote_verified": true}]}], "insight_total": 21, "top_entities": ["Pakistan", "India", "Iran", "United States", "China", "Donald Trump", "Asim Munir", "Saudi Arabia", "CPEC", "Reza Aslan", "Nathan Gardels", "BJP"], "source_meta": {"author": "BINA SHAH", "word_count": 2785, "paywalled": false}}, {"record_id": "05a1a14e928a1978", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/07/using-ai-to-let-history-speak-about-bank-runs/", "title": "Using AI to Let History Speak About Bank Runs - Liberty Street Economics", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "AI"], "gist": "Fed researchers used large language models to mine over 374 million digitized historical newspaper pages and built the most comprehensive database of U.S. bank runs (1863-1934), finding that most runs do not end in failure and that distress geography shifted westward with the banking frontier.", "themes": [{"theme": "AI-Powered Historical Data Extraction", "insights": [{"claim": "Researchers built a pipeline that starts from over 374 million digitized newspaper articles, narrows to about a million candidates via keyword search for terms like 'bank run,' 'deposit withdrawals,' 'suspended,' and 'closed its doors,' then feeds each candidate to multiple LLMs to extract structured facts: which bank, what happened, when, and how the bank and its stakeholders responded.", "speaker": "trevordelaney", "type": "framework", "entities": ["large language models (LLMs)", "Chronicling America", "Library of Congress"], "conviction": "high", "so_what": "A reusable template for turning unstructured historical/archival text at massive scale into structured panel data using LLMs — applicable to other historical financial-event mining (defaults, panics, currency crises) beyond bank runs.", "quote": "we use large language models (LLMs) to extract information on bank runs from millions of digitized historical newspaper pages, creating the most comprehensive database of bank runs in U.S. history.", "locator": "How Newspapers Can Help Us to Understand Bank Runs", "quote_verified": true}, {"claim": "LLMs succeed where rigid keyword search fails because nineteenth-century prose describes the same event many different ways (e.g., depositors 'clamoring for their money' with no use of the word 'run'), while also filtering out false positives like a 'ship runs into a riverbank' or a bank owner who 'runs for office.'", "speaker": "trevordelaney", "type": "framework", "entities": ["large language models (LLMs)"], "conviction": "high", "so_what": "Demonstrates a concrete case where LLM contextual understanding materially outperforms keyword/regex-based text mining for noisy historical or informal language — relevant to any NLP pipeline built on archival or unstructured text.", "quote": "False positives can occur when articles describe how “a ship runs into a riverbank” or the owner of a bank “runs for office.”", "locator": "Letting the Newspapers Speak", "quote_verified": true}, {"claim": "To ensure data quality the authors deliberately ran multiple LLMs against each article, flagged disagreements between models for extra scrutiny, and validated the automated output against hand-coded samples, finding high agreement.", "speaker": "trevordelaney", "type": "framework", "entities": ["large language models (LLMs)"], "conviction": "high", "so_what": "A concrete quality-assurance recipe (multi-model ensemble + human-labeled validation set) for anyone using LLMs to generate research-grade structured datasets from text.", "quote": "We further validate our LLM classifications against hand-coded samples and find high agreement, giving us confidence that the automated approach produces reliable data at scale.", "locator": "Letting the Newspapers Speak", "quote_verified": true}, {"claim": "The complete bank-run database is published publicly at finhist.com/bank-runs, browsable by state, city, year, or bank type, with each episode linked back to the original source newspaper articles.", "speaker": "trevordelaney", "type": "data_point", "entities": ["finhist.com"], "conviction": "high", "so_what": "An open, granular historical financial-distress dataset now exists for outside researchers, quants, or policy analysts to build long-run panic/contagion models or stress-test modern banking-crisis frameworks against pre-FDIC history.", "quote": null, "locator": "The complete database is publicly available", "quote_verified": false}]}, {"theme": "Bank Runs vs. Bank Failures Taxonomy", "insights": [{"claim": "The authors define three distinct distress event types — bank runs, suspensions, and failures — and note that by construction any bank failure is also a suspension, since a bank must suspend operations before or at the moment of failure.", "speaker": "trevordelaney", "type": "framework", "entities": ["national banks"], "conviction": "high", "so_what": "Gives investors/analysts a cleaner conceptual vocabulary for distinguishing liquidity events (runs, suspensions) from solvency events (failures) when reading historical or modern banking-crisis narratives.", "quote": null, "locator": "Bank Runs versus Bank Failures", "quote_verified": false}, {"claim": "Contrary to the common conflation of 'bank run' with 'bank failure,' the data show 1,906 run episodes that did not end in failure versus 1,515 that did — meaning the majority of documented bank runs between 1863 and 1934 were survived, not fatal.", "speaker": "trevordelaney", "type": "contrarian", "entities": ["national banks"], "conviction": "high", "so_what": "Suggests historical base rates overstate the lethality of runs; useful prior for modeling how modern deposit runs (digital-era, faster-moving) might still be survivable with adequate backstops rather than automatically fatal.", "quote": "A first major insight from our data is that the majority of bank runs do not involve failure. We find 1,906 runs without failure and 1,515 runs with failure.", "locator": "Bank Runs versus Bank Failures", "quote_verified": true}, {"claim": "Across the full 1863-1934 sample the dataset records 13,069 suspension episodes and 10,330 failure episodes, versus roughly 3,400 identified run episodes — indicating that most newspaper-documented bank distress overall involved a failure, even though most runs specifically did not.", "speaker": "trevordelaney", "type": "data_point", "entities": ["national banks"], "conviction": "high", "so_what": "Highlights that runs are a relatively small subset of total historical bank distress; failure risk analysis needs to look beyond run episodes alone to capture the broader universe of bank closures.", "quote": "We also find 13,069 episodes involving a suspension, and 10,330 episodes involving a failure. Thus, the majority of distress episodes recorded in newspapers involve a bank failure.", "locator": "Bank Runs versus Bank Failures", "quote_verified": true}]}, {"theme": "Crisis Timing Patterns (1863-1934)", "insights": [{"claim": "The rate of bank runs relative to the total number of national banks spikes distinctly in 1873, 1884, 1893, 1907 (to a lesser extent), and during the Great Depression, matching the crisis years already established in the historical banking-panic literature.", "speaker": "trevordelaney", "type": "data_point", "entities": ["national banks", "Great Depression"], "conviction": "high", "so_what": "Validates the new LLM-extracted dataset against known crisis chronology, giving confidence the data can be used for further quantitative work on panic dynamics.", "quote": "The rate of runs spikes during the major crises years: 1873, 1884, 1893, 1907 (to a lesser extent), and the Great Depression.", "locator": "Bank Runs from 1863-1935", "quote_verified": true}, {"claim": "Runs without failure are especially concentrated in major panic years — for example the Panic of 1893 produced an unusually large number of runs that were resolved via temporary suspension rather than permanent failure.", "speaker": "trevordelaney", "type": "data_point", "entities": ["Panic of 1893"], "conviction": "medium", "so_what": "Implies that during systemic (rather than idiosyncratic) panics, temporary suspension was a more common resolution mechanism than outright failure — a pattern relevant to designing modern circuit-breaker/suspension tools during systemic stress.", "quote": null, "locator": "The chart also distinguishes between bank runs with and without failure", "quote_verified": false}, {"claim": "The Panic of 1893 was structurally different from the other National Banking Era panics: it originated in the interior of the country rather than New York, and was tied to distress in railroads, silver mines, and agriculture rather than a money-center shock.", "speaker": "trevordelaney", "type": "causal", "entities": ["Panic of 1893"], "conviction": "medium", "so_what": "Shows financial contagion can originate from real-economy/commodity shocks in the periphery rather than always from a money-center liquidity event — a reminder not to assume every systemic crisis will start in the financial capital.", "quote": "The 1893 crisis, in contrast to the other panics of the National Banking Era, originated in the interior and saw more runs in the West and South, consistent with distress in railroads, silver mines, and agriculture in that panic.", "locator": "The Geography of Bank Runs", "quote_verified": true}]}, {"theme": "Geography of Financial Contagion", "insights": [{"claim": "The geographic center of bank distress shifted westward over the decades: early episodes clustered on the Eastern Seaboard (New York, Philadelphia), but by the 1890s runs were appearing in the Great Plains, Mountain West, and Pacific Coast as the banking system expanded into new agricultural and mining frontiers.", "speaker": "trevordelaney", "type": "causal", "entities": ["national banks"], "conviction": "medium", "so_what": "Financial-system geography tracks the frontier of real economic expansion; a template for thinking about how modern financial contagion follows the geography of newer/less-diversified sectors (e.g., regional banks exposed to a single industry or region).", "quote": null, "locator": "The Geography of Bank Runs", "quote_verified": false}, {"claim": "Nationwide systemic panics spread as visible waves radiating outward from money-center cities — the Panic of 1873 clustered first in New York before radiating to Chicago, St. Louis, and New Orleans, and the Panic of 1907 again started in New York but spread quickly through the national correspondent banking network.", "speaker": "trevordelaney", "type": "causal", "entities": ["national banks"], "conviction": "medium", "so_what": "Confirms correspondent-banking interconnectedness as a contagion transmission channel — directly analogous to modern interbank/counterparty-network contagion risk analysis.", "quote": null, "locator": "During the Panic of 1873, for instance", "quote_verified": false}, {"claim": "The 1920s, popularly remembered as a decade of prosperity, actually show a steady stream of bank failures concentrated in the agricultural Midwest and South on the geographic map, foreshadowing the much larger surge in bank failures during the Great Depression.", "speaker": "trevordelaney", "type": "contrarian", "entities": ["Great Depression"], "conviction": "medium", "so_what": "A cautionary data point that aggregate/national prosperity narratives can mask persistent regional financial deterioration that later becomes systemic — relevant to reading current 'resilient economy' headlines against pockets of regional stress (e.g., agricultural or commodity-exposed regional banks).", "quote": "The 1920s, often remembered as a decade of prosperity, are marked on the map by a steady stream of bank failures in the agricultural Midwest and South, foreshadowing the surge in bank failures during the Great Depression.", "locator": "Third, the map reveals the regional character", "quote_verified": true}]}, {"theme": "Forward Research Agenda", "insights": [{"claim": "The authors state that a companion paper will use this newly built dataset to investigate when and why historical bank runs have led to bank failure, and to draw out implications for current policy discussions.", "speaker": "trevordelaney", "type": "prediction", "entities": [], "conviction": "medium", "so_what": "Signals a forthcoming follow-on study that could directly inform bank-regulation and deposit-insurance policy debates by identifying which conditions historically converted a run into a failure.", "quote": "In our companion post, we show how we use the data to investigate when and why runs have historically led to bank failure, and discuss how these insights affect policy discussions.", "locator": "What Comes Next", "quote_verified": true}]}], "insight_total": 14, "top_entities": ["large language models (LLMs)", "Chronicling America", "Library of Congress", "Panic of 1893", "Great Depression", "national banks", "finhist.com", "Federal Reserve Bank of New York", "Federal Reserve Bank of Richmond", "MIT Sloan School of Management"], "source_meta": {"author": "trevordelaney", "word_count": 1851, "paywalled": false}}, {"record_id": "80ffb981ecbdfc32", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/07/more-tariff-pass-through-is-in-the-pipeline/", "title": "More Tariff Pass-Through Is in the Pipeline - Liberty Street Economics", "published_date": "2026-07-08", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics", "Positioning"], "gist": "NY Fed regional business surveys (May 2026) find that nearly half of firms that directly paid tariffs still plan further price increases to recoup costs, some more than six months out, implying tariff-driven inflation is a gradual, multi-quarter process rather than a one-time shock.", "themes": [{"theme": "Tariff pass-through still in progress", "insights": [{"claim": "Nearly half of firms that have paid tariffs still plan additional price increases to offset these costs, with some expecting to raise prices six months or more into the future.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "data_point", "entities": ["U.S. tariffs", "inflation"], "conviction": "high", "so_what": "Signals more CPI/PPI upward pressure from tariffs is still in the pipeline more than a year after tariffs began, arguing against assuming the price-level adjustment is complete.", "quote": "nearly half , "type": "data_point", "entities": ["service sector", "manufacturers"], "conviction": "medium", "so_what": "Extends the visible tariff-inflation horizon well beyond the current year, a tail investors and policymakers may underweight when assuming pass-through is nearly finished.", "quote": null, "locator": "More Price Increases Are Coming from Businesses That Paid Tariffs", "quote_verified": false}, {"claim": "Just over half of tariff-paying firms fall into categories (insignificant cost impact, already fully passed through, or no plans to raise further) indicating they have no further price increases planned to recoup tariff costs.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "data_point", "entities": ["service sector", "manufacturers"], "conviction": "high", "so_what": "A slim majority have already finished adjusting, so the remaining pipeline is a large minority, not the whole universe of tariff-paying firms — useful for sizing the residual inflation impulse.", "quote": null, "locator": "Many Businesses Are Not Finished Raising Prices to Offset Tariffs", "quote_verified": false}]}, {"theme": "Who actually bears the tariff cost", "insights": [{"claim": "Recent research cited in the piece shows nearly 90 percent of the economic burden of tariffs has fallen on U.S. firms and consumers, not foreign exporters.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "data_point", "entities": ["U.S. tariffs", "U.S. consumers"], "conviction": "high", "so_what": "Confirms tariffs function largely as a domestic tax passed through the supply chain rather than being absorbed abroad, supporting a case for continued consumer-price impact rather than exporter margin compression.", "quote": "nearly 90 percent of the economic burden of tariffs has fallen on U.S. firms and consumers", "locator": "Many Businesses Are Not Finished Raising Prices to Offset Tariffs", "quote_verified": true}, {"claim": "Two-thirds of service firms and almost all manufacturers surveyed import at least some of their inputs, but only 40 percent of service firms versus 70 percent of manufacturers said they directly paid tariffs in the past twelve months.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "data_point", "entities": ["service sector", "manufacturers"], "conviction": "high", "so_what": "Manufacturers are far more directly exposed to tariff costs than services, implying goods-producing firms and their downstream customers carry more direct tariff-inflation risk.", "quote": null, "locator": "Many Businesses Are Not Finished Raising Prices to Offset Tariffs", "quote_verified": false}, {"claim": "Many firms that did not directly pay tariffs still faced higher costs because their suppliers paid the tariffs and passed higher prices upstream, meaning tariff costs cascade through supply chains beyond the direct importer.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "causal", "entities": ["supply chains", "manufacturers", "service sector"], "conviction": "medium", "so_what": "Survey figures on direct tariff payers likely understate the true breadth of tariff-cost exposure across the economy, since indirect exposure via suppliers is not fully captured.", "quote": null, "locator": "Many Businesses Are Not Finished Raising Prices to Offset Tariffs", "quote_verified": false}]}, {"theme": "Why firms are delaying full pass-through", "insights": [{"claim": "Some businesses operate under fixed-price contracts that prevent them from raising prices until the contracts expire, forcing them to absorb tariff costs temporarily and delaying pass-through.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "causal", "entities": ["fixed-price contracts"], "conviction": "medium", "so_what": "Contract renewal cycles create a mechanical, somewhat predictable lag structure for when tariff costs finally hit prices — a factor that could be modeled against known contract durations by sector.", "quote": "long-term contracts can impede businesses from passing through cost increases", "locator": "Why Businesses Are Planning Future Price Increases", "quote_verified": true}, {"claim": "Some firms are deliberately using a 'trickle up' pricing strategy, gradually raising prices over time instead of immediately raising them to fully cover tariffs, to avoid shocking customers while retaining the option to accelerate increases if costs keep rising.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "framework", "entities": ["pricing strategy"], "conviction": "medium", "so_what": "This is a behavioral pricing framework investors can use to expect drawn-out, incremental margin recovery at firms rather than sharp one-off repricing events — watch for gradual gross-margin improvement over multiple quarters rather than a single step-change.", "quote": "a “trickle up” approach to price increases, where they gradually raise prices over time rather than immediately raising prices to fully cover tariffs", "locator": "Why Businesses Are Planning Future Price Increases", "quote_verified": true}, {"claim": "Uncertainty about future tariff policy — including potential rate changes, exemptions, or retaliatory tariffs from other countries — is causing some firms to adopt cautious, incremental pricing rather than large, discrete price adjustments.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "causal", "entities": ["tariff policy", "trade policy uncertainty"], "conviction": "medium", "so_what": "Ties the pace of price pass-through directly to policy volatility, implying that further tariff rate changes or escalation could extend the inflation-pass-through window even more, an angle for tracking policy-uncertainty indices against pricing surveys.", "quote": null, "locator": "Why Businesses Are Planning Future Price Increases", "quote_verified": false}]}, {"theme": "Reframing 'one-time' tariff inflation", "insights": [{"claim": "The authors argue that even though economists and policymakers often expect tariff-driven price increases to be a one-time price-level adjustment, in practice this adjustment can be a drawn-out affair, especially when tariffs change frequently.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "contrarian", "entities": ["inflation", "monetary policy"], "conviction": "high", "so_what": "Directly challenges the standard Fed/market framing of tariffs as a transitory, one-off price shock — a contrarian input for anyone modeling how long the Fed should look through tariff-driven inflation before it becomes embedded.", "quote": "what “one-time” means in practice may be a drawn-out affair, especially when the tariffs change frequently", "locator": "Pricing Pressures May Be Persistent", "quote_verified": true}, {"claim": "Because many firms are spreading tariff-related price increases across extended periods, inflationary pressures due to tariffs may persist for some time to come rather than fading quickly.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "prediction", "entities": ["inflation"], "conviction": "medium", "so_what": "A direct forward-looking call that tariff-related inflation persistence should be priced into rate-path and inflation-expectations views over the coming quarters, not treated as already resolved.", "quote": "inflationary pressures due to tariffs may well last for some time to come", "locator": "Pricing Pressures May Be Persistent", "quote_verified": true}, {"claim": "The pattern of gradual tariff pass-through observed here is consistent with a growing body of research showing tariffs pass through to consumer prices incrementally, building over the better part of a year rather than all at once.", "speaker": "Jaison R. Abel, Mary Amiti, Richard Deitz, Sebastian Heise, and Nick Montalbano", "type": "framework", "entities": ["inflation", "consumer prices"], "conviction": "medium", "so_what": "Establishes a roughly year-long lag framework for tariff pass-through into consumer prices that can anchor expectations for when the current tariff round's inflation effects should fully materialize and fade.", "quote": "tariffs pass through to consumer prices incrementally, building over the better part of a year rather than all at once", "locator": "Many Businesses Are Not Finished Raising Prices to Offset Tariffs", "quote_verified": true}]}], "insight_total": 14, "top_entities": ["U.S. tariffs", "manufacturers", "service sector", "inflation", "fixed-price contracts", "trade policy uncertainty", "U.S. consumers", "supply chains"], "source_meta": {"author": "maureenegan", "word_count": 1199, "paywalled": false}}, {"record_id": "a8dfcc4cbbf358c7", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/07/what-do-over-3000-bank-runs-teach-us-about-banking-crises/", "title": "What Do Over 3,000 Bank Runs Teach Us About Banking Crises? - Liberty Street Economics", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Positioning"], "gist": "Using a new database of 3,000+ historical U.S. bank runs (1863-1934), researchers find that weak bank fundamentals — not self-fulfilling panic dynamics — are the necessary condition for runs to cause failures and for failures to inflict real economic damage on local manufacturing, lending, and deposits.", "themes": [{"theme": "Fundamentals as the Trigger for Runs", "insights": [{"claim": "Banks in the weakest decile of fundamentals (capitalization, profitability, and reliance on cheap core deposits vs. expensive noncore funding) face nearly 100 basis points probability of a run in a given year, versus only about 25 basis points for banks with the strongest fundamentals — roughly a 4x gap.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "data_point", "entities": ["bank fundamentals", "deposits", "Office of the Comptroller of the Currency"], "conviction": "high", "so_what": "A simple, replicable bank-health proxy (capitalization, profitability, funding mix) meaningfully predicts run risk — a template for screening bank credit/equity exposure by fundamentals rather than assuming panics are random.", "quote": "A bank in the lowest decile of fundamentals has a nearly 100 basis point probability of being exposed to a run in a given year, whereas the probability is only about 25 basis points for banks with strong observable fundamentals.", "locator": "A bank in the lowest decile of fundamentals", "quote_verified": true}, {"claim": "Runs on banks with strong fundamentals do occur, but they are comparatively rare and the absolute probability of a run even among weak banks remains low in any given year.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "contrarian", "entities": ["bank fundamentals"], "conviction": "high", "so_what": "Undercuts the narrative that any bank, however sound, is equally vulnerable to a panic — fundamentals-based risk differentiation still matters even in run-prone systems.", "quote": null, "locator": "Thus, runs on strong banks are less common", "quote_verified": false}, {"claim": "The historical U.S. banking system (1863-1934) is an unusually clean laboratory for studying runs because runs were far more common than today, a difference the authors attribute to modern government interventions such as deposit insurance and lender-of-last-resort facilities that alter depositor behavior.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "causal", "entities": ["deposit insurance", "National Banking Era", "Great Depression"], "conviction": "high", "so_what": "Implies deposit insurance and central-bank backstops are the primary reason modern runs are rare, not improved bank fundamentals per se — a reminder that policy scaffolding, not just balance-sheet health, suppresses run frequency today.", "quote": null, "locator": "This contrasts with the contemporary banking system, where runs are much less common", "quote_verified": false}]}, {"theme": "Failure Is Conditional, Not Automatic", "insights": [{"claim": "A bank subject to a run has a 38 percent probability of failing, dramatically higher than the unconditional annual bank failure probability of 0.85 percent — implying a run raises failure odds by roughly 40-45x relative to baseline.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "data_point", "entities": ["bank failure"], "conviction": "high", "so_what": "Quantifies the run-to-failure conversion rate historically — useful as a base-rate anchor when assessing how alarmed to be once a run is confirmed at a given institution.", "quote": "We find that a bank has a 38 percent probability of failing if it is subject to a run. This is a high conditional probability of failure, given that the annual unconditional probability of bank failure is 0.85 percent.", "locator": "We find that a bank has a 38 percent probability of failing", "quote_verified": true}, {"claim": "More historical runs ended without bank failure than with it, meaning a run is not a death sentence for the institution.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "contrarian", "entities": ["bank failure"], "conviction": "high", "so_what": "Challenges the reflexive assumption that a visible run implies imminent collapse — survival is the more common outcome, conditional on solvency.", "quote": "There are more runs without bank failure than runs with failure, highlighting a key novel insight from our approach.", "locator": "There are more runs without bank failure", "quote_verified": true}, {"claim": "Conditional on experiencing a run, a bank in the weakest fundamentals decile has a 63 percent probability of failing, while a bank in the strongest fundamentals decile essentially never fails when run on.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "data_point", "entities": ["bank fundamentals", "bank failure"], "conviction": "high", "so_what": "Gives a concrete stress-test heuristic: fundamentals decile is the dominant determinant of run outcome, so due diligence on capitalization/funding mix should drive risk-weighting far more than the mere presence of a run.", "quote": "conditional on a run, a bank with very weak fundamentals... has a 63 percent probability of failing. In contrast, the strongest banks... essentially never fail when subject to a run.", "locator": "In our paper, we estimate that conditional on a run", "quote_verified": true}]}, {"theme": "Survival Playbook of Strong Banks", "insights": [{"claim": "Newspaper accounts identify seven recurring bank responses to runs: accommodating withdrawals while signaling strength (e.g., a publicized 'truckload of cash'), injecting additional owner equity, borrowing from other banks, partially suspending convertibility via 30/60-day notice rules on savings deposits, fully suspending convertibility in extreme cases, undergoing solvency examinations by state/federal supervisors or clearinghouses, and being closed if deemed insolvent.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "framework", "entities": ["clearinghouses", "deposits"], "conviction": "high", "so_what": "A concrete taxonomy of liquidity-defense tools that historically severed illiquidity from insolvency — a checklist for evaluating whether a modern institution under stress is deploying credible defenses versus merely delaying failure.", "quote": null, "locator": "We identify seven common responses discussed in newspapers", "quote_verified": false}, {"claim": "Clearinghouses are explicitly mentioned as intervening (via loans, examinations, or other measures) in only about 10 percent of historical run episodes, despite their reputation as a central stabilizing mechanism of the era.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "data_point", "entities": ["clearinghouses"], "conviction": "medium", "so_what": "Suggests most surviving banks relied on self-help measures (equity injections, suspension) rather than external institutional backstops — a nuance for anyone modeling systemic safety nets as the primary line of defense.", "quote": "in about 10 percent of runs, newspapers explicitly mention the involvement of clearinghouses, either through the provision of a loan, examination, or other measure.", "locator": "in about 10 percent of runs, newspapers explicitly mention", "quote_verified": true}]}, {"theme": "Real Economic Contagion Requires Insolvency", "insights": [{"claim": "Using Bradstreet's weekly local economic activity data from 1917-1935, the authors find runs that end in bank failure predict a manufacturing activity decline of over 5 percent within the following eighteen months, while runs that do not end in failure show no significant decline in local manufacturing activity.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "causal", "entities": ["Bradstreet's", "manufacturing"], "conviction": "high", "so_what": "Localized real-economy damage tracks bank solvency outcomes, not the mere occurrence of a run — a filter for distinguishing which regional banking stress episodes are likely to spill into local credit and employment versus which are contained.", "quote": "Runs without failure do not result in significantly lower manufacturing activity within the next eighteen months. In contrast, runs with failure predict a decline in manufacturing activity of over 5 percent.", "locator": "Runs without failure do not result in significantly lower manufacturing", "quote_verified": true}, {"claim": "The evidence argues against the view that runs originating as pure liquidity events (i.e., on fundamentally sound banks) can by themselves generate severe disruptions in local credit markets and real economic activity.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "thesis", "entities": ["manufacturing", "bank fundamentals"], "conviction": "high", "so_what": "Investors and policymakers assessing contagion risk from a bank run should weight the target bank's solvency far more heavily than the run's mere existence when forecasting spillover to the local economy.", "quote": null, "locator": "This evidence argues against the view that runs", "quote_verified": false}]}, {"theme": "Reframing Crisis Theory: Trigger vs. Root Cause", "insights": [{"claim": "The authors' overall findings lend little support to the theory that small shocks alone can spark self-fulfilling banking panics severe enough to cause major economic downturns, tempering a long-standing view in banking-crisis literature.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "contrarian", "entities": ["bank fundamentals"], "conviction": "high", "so_what": "Pushes back against pure-panic/multiple-equilibria models of financial crises, implying policy and market attention should prioritize monitoring bank solvency indicators over trying to prevent panics in isolation.", "quote": "Our findings lend little support to the view that small shocks by themselves can result in widespread banking panics that cause major economic downturns.", "locator": "Our findings lend little support to the view that small shocks", "quote_verified": true}, {"claim": "The authors conclude runs should be understood as a trigger for bank failures and crises, but that insolvent (weak-fundamental) banks are the necessary condition for that trigger to devastate the banking system and broader economy.", "speaker": "Sergio Correia, Stephan Luck, and Emil Verner", "type": "framework", "entities": ["bank fundamentals", "bank failure"], "conviction": "high", "so_what": "A clean mental model for crisis-watching: treat visible runs as an alarm bell that should redirect attention to underlying solvency data, not as the causal mechanism itself — solvency screens remain the higher-value signal.", "quote": "Runs should thus be seen as a trigger for bank failures and crises, but insolvent banks are necessary for this trigger to devastate the banking system and the economy.", "locator": "Runs should thus be seen as a trigger for bank failures", "quote_verified": true}]}], "insight_total": 12, "top_entities": ["Sergio Correia", "Stephan Luck", "Emil Verner", "Federal Reserve Bank of New York", "Federal Reserve Bank of Richmond", "MIT Sloan School of Management", "Office of the Comptroller of the Currency", "Bradstreet's", "clearinghouses", "deposit insurance", "bank fundamentals", "bank failure"], "source_meta": {"author": "trevordelaney", "word_count": 1682, "paywalled": false}}, {"record_id": "e1813dc9f238a667", "source_type": "concepts", "source_name": "Peterson Institute (PIIE)", "source_url": "https://www.piie.com/blogs/realtime-economics/2026/why-founding-fathers-did-not-give-president-power-impose-tariffs", "title": "Why the Founding Fathers did not give the president the power to impose tariffs", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-08T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Macro", "Positioning"], "gist": "A trade-law scholar argues the Constitution gives Congress, not the president, exclusive tariff authority, and walks through how courts have now twice struck down Trump's broadest tariff moves (IEEPA's 'reciprocal tariff' and a Section 122 balance-of-payments tariff), leaving only narrow, sector-specific tools like Section 232 and Section 301 as his remaining (legally shakier) levers.", "themes": [{"theme": "Constitutional limits on tariff power", "insights": [{"claim": "There is no inherent presidential tariff power in the US system; tariff authority belongs solely to Congress, and the president only has whatever narrow, explicitly limited tariff powers Congress chooses to grant.", "speaker": "Alan Wm. Wolff", "type": "thesis", "entities": ["Congress", "Donald Trump"], "conviction": "high", "so_what": "Any presidential tariff action not tied to a specific, narrow statutory grant is legally vulnerable to court challenge — a recurring pattern investors should expect to continue.", "quote": "There is no inherent presidential tariff power. That is solely the prerogative of the Congress.", "locator": "opening paragraph", "quote_verified": true}, {"claim": "The Founders' decision to vest tariff and tax power exclusively in Congress traces to English history: King Charles I lost the right to impose taxes (including tariffs) in 1628, which required a civil war and ended in his execution — an event as historically close to the Founders as World War II is to people today.", "speaker": "Alan Wm. Wolff", "type": "framework", "entities": ["Congress"], "conviction": "high", "so_what": "Explains why US courts treat tariff-by-executive-fiat as a near-sacred constitutional violation rather than a technicality, making judicial pushback on unilateral tariffs structurally likely, not a one-off.", "quote": null, "locator": "The Founding Fathers intentionally did not give the president tariff authority", "quote_verified": false}, {"claim": "Supreme Court Justice Neil Gorsuch, in a concurring opinion striking down the president's use of IEEPA for the 'reciprocal' tariffs, argued the deliberative, multi-representative nature of the legislative process is precisely why tariff power belongs to Congress rather than a single official.", "speaker": "Alan Wm. Wolff", "type": "framework", "entities": ["Neil Gorsuch", "IEEPA", "Supreme Court", "Donald Trump"], "conviction": "high", "so_what": "Signals the current Supreme Court's reasoning is philosophically opposed to unilateral executive tariff-setting, a durable headwind for future emergency-authority tariff attempts.", "quote": "the deliberative nature of the legislative process was the whole point of its design. Through that process, the Nation can tap the combined wisdom of the people's elected representatives, not just that of one faction or man. There, deliberation tempers impulse, and compromise hammers disagreements into workable solutions.", "locator": "The Founding Fathers intentionally did not give the president tariff authority", "quote_verified": true}, {"claim": "The author concludes that having now failed twice to impose comprehensive tariffs without Congress, Trump has no broad tariff authority under either the Constitution or any statute Congress has passed, and further workarounds (including Section 301) will also fail.", "speaker": "Alan Wm. Wolff", "type": "prediction", "entities": ["Donald Trump", "Section 301"], "conviction": "high", "so_what": "An explicit forecast that any further attempt at economy-wide tariffs will lose in court, useful for handicapping legal/political risk around future blanket tariff announcements.", "quote": "President Trump has now attempted twice to impose comprehensive tariffs without resort to Congress . Use of Section 301 or a claim of some other device will also not succeed.", "locator": "closing paragraphs", "quote_verified": true}]}, {"theme": "Trump tariffs losing in court", "insights": [{"claim": "Trump's 'reciprocal tariff,' declared April 2, 2025 and put into effect around August 2025 under the International Emergency Economic Powers Act (IEEPA), lasted only about six months before the Supreme Court ruled on February 20, 2026 that sanctions authority under IEEPA is not tariff authority at all.", "speaker": "Alan Wm. Wolff", "type": "data_point", "entities": ["Donald Trump", "IEEPA", "Supreme Court"], "conviction": "high", "so_what": "Confirms the 'reciprocal tariff' regime is dead as of Feb 2026 — any pricing, hedging or sourcing decisions still assuming that tariff schedule are stale.", "quote": "The Supreme Court held on February 20, 2026, that sanctions authority was not tariff authority at all.", "locator": "third president paragraph", "quote_verified": true}, {"claim": "The author personally believed the Supreme Court's IEEPA ruling went too far, arguing there could be circumstances where a tariff functions legitimately as a sanction to regulate trade — but that is not what the Court decided.", "speaker": "Alan Wm. Wolff", "type": "contrarian", "entities": ["IEEPA", "Supreme Court"], "conviction": "medium", "so_what": "A trade-law insider flags the ruling as broader than necessary, hinting at possible future narrowing or litigation over tariff-as-sanction use cases.", "quote": null, "locator": "third president paragraph", "quote_verified": false}, {"claim": "After the IEEPA tariff was struck down, Trump replaced it with a claim of a balance-of-payments problem under Section 122 of the Trade Act of 1974, announcing a 10-15 percent tariff that settled at 10 percent — but the Court of International Trade quickly rejected this too, finding no actual balance-of-payments problem existed to trigger the 150-day emergency authority.", "speaker": "Alan Wm. Wolff", "type": "data_point", "entities": ["Donald Trump", "Court of International Trade"], "conviction": "high", "so_what": "A second blanket-tariff attempt was also invalidated within the same window, reinforcing that broad, non-sector-specific tariffs currently have no durable legal basis in the US courts.", "quote": null, "locator": "fourth paragraph on replaced authority", "quote_verified": false}]}, {"theme": "Remaining tariff tools and sector watchlist", "insights": [{"claim": "Trump has no authority to raise tariffs via trade agreements because President Biden let Trade Promotion Authority (TPA) lapse completely in 2021, and Congress had already removed tariff-increasing authority from TPA in the 1988 Omnibus Trade and Competitiveness Act — meaning deals like those with the EU and UK could not be backed by a unilateral tariff increase under that route.", "speaker": "Alan Wm. Wolff", "type": "causal", "entities": ["Congress", "European Union", "United Kingdom", "Joseph R. Biden Jr.", "Trade Promotion Authority"], "conviction": "high", "so_what": "Trade-agreement-linked tariffs (EU, UK deals) rest on legally weaker ground than assumed, since the traditional TPA tariff-raising mechanism has been unavailable since 1988/2021.", "quote": null, "locator": "paragraph on Trade Promotion Authority", "quote_verified": false}, {"claim": "Under Section 232 of the Trade Expansion Act of 1962 (national security tariffs), Trump has imposed tariffs, following Commerce Department investigation and Defense Secretary input, on steel, aluminum, copper, automobiles and parts, trucks and buses, lumber and wood products, semiconductors, and processed critical minerals — with pharmaceuticals, commercial aircraft and jet engines, drones, wind turbines, medical equipment/devices, PPE, and robotics/industrial automation among the products under active investigation for potential future tariffs.", "speaker": "Alan Wm. Wolff", "type": "data_point", "entities": ["Section 232", "steel", "aluminum", "semiconductors", "robotics"], "conviction": "high", "so_what": "A concrete forward watchlist: pharma, aircraft/jet engines, drones, wind turbines, medical devices, PPE, and robotics/automation are the named sectors most exposed to a near-term Section 232 tariff decision.", "quote": null, "locator": "Section 232 paragraph", "quote_verified": false}, {"claim": "With IEEPA and Section 122 both struck down, USTR has turned to Section 301 trade retaliatory authority, finding 60 countries guilty of not enforcing adequate forced-labor laws and investigating 16 additional countries for maintaining structural excess capacity, as a substitute mechanism for the lost broad tariff power.", "speaker": "Alan Wm. Wolff", "type": "data_point", "entities": ["Section 301", "USTR"], "conviction": "high", "so_what": "Names the specific legal vehicle (Section 301, forced-labor and excess-capacity findings) now driving tariff risk on a widening set of trading partners — worth tracking which of the 60+16 countries face actual tariff action.", "quote": null, "locator": "Section 301 paragraph", "quote_verified": false}, {"claim": "The author argues Section 301 cannot legally substitute for comprehensive tariff power because it is a selective, country-by-country authority never designed to be imposed on all countries at once, and there is no legislative history suggesting it amounts to a transfer of Congress's full tariff authority to the president — nor can Congress constitutionally delegate all its tariff authority to the president in the first place.", "speaker": "Alan Wm. Wolff", "type": "contrarian", "entities": ["Section 301", "Congress", "Donald Trump"], "conviction": "high", "so_what": "Sets up an expectation that Section 301 tariffs, if applied broadly/simultaneously across many countries, are themselves vulnerable to the same court challenges that killed IEEPA and Section 122.", "quote": null, "locator": "Section 301 paragraph", "quote_verified": false}]}, {"theme": "Historical myths about presidential tariffs", "insights": [{"claim": "The 1890 McKinley Tariff is misattributed to presidential action: William McKinley was chairman of the House Ways and Means Committee at the time, but the sitting president who signed the bill was Benjamin Harrison — it was purely a Congressional measure.", "speaker": "Alan Wm. Wolff", "type": "anecdote", "entities": ["William McKinley", "Benjamin Harrison"], "conviction": "high", "so_what": "Debunks a common historical shorthand used to argue presidents have long driven tariff policy, reinforcing the article's core thesis that tariffs have always been a Congressional act.", "quote": null, "locator": "second paragraph on McKinley", "quote_verified": false}, {"claim": "Nixon's 1971 emergency 10 percent import surcharge during a balance-of-payments crisis was not actually authorized by the wartime Trading with the Enemy Act his lawyers claimed to invoke; Congress, mistakenly believing he had used that authority, repealed it — and Nixon's subsequent 1973 Trade Reform Act proposal to unilaterally rewrite US law to remove nontariff barriers was rejected by the Senate.", "speaker": "Alan Wm. Wolff", "type": "anecdote", "entities": ["Richard Nixon", "Congress"], "conviction": "high", "so_what": "Shows a direct historical precedent for courts/Congress rejecting presidential claims to sweeping emergency tariff power — the same playbook now repeating with IEEPA and Section 122.", "quote": null, "locator": "paragraph on Nixon", "quote_verified": false}, {"claim": "After Nixon's unilateral-authority proposal was rejected, Congress instead created the 'fast track' up-or-down vote procedure for trade agreements — later formalized as Trade Promotion Authority — requiring the president to secure a new statute for each grant rather than a standing tariff power.", "speaker": "Alan Wm. Wolff", "type": "data_point", "entities": ["Richard Nixon", "Trade Promotion Authority", "Congress"], "conviction": "medium", "so_what": "Explains the institutional origin of Trade Promotion Authority, the mechanism whose 2021 lapse (per Biden) now blocks Trump from tariff increases tied to trade agreements.", "quote": null, "locator": "paragraph on Nixon", "quote_verified": false}]}], "insight_total": 14, "top_entities": ["Donald Trump", "Congress", "Supreme Court", "IEEPA", "Section 232", "Section 301", "Court of International Trade", "Neil Gorsuch", "Richard Nixon", "Trade Promotion Authority", "Benjamin Harrison"], "source_meta": {"author": "Alan Wm. Wolff", "word_count": 1568, "paywalled": false}}, {"record_id": "2e3f058231202c04", "source_type": "concepts", "source_name": "Research Affiliates", "source_url": "https:/ nance will persist may be disappointed on forward returns; don't assume today's AI winners stay winners.", "quote": "Artificial intelligence (AI) may change the world, but that does not mean the leading AI mega caps of today will remain dominant a few years hence, let alone deliver the best future return.", "locator": "Artificial intelligence (AI) may change the world", "quote_verified": true}, {"claim": "Once the market broadly agrees on which company is the 'winner,' that stock is typically already embedded everywhere: in every index, ETF, model portfolio, and institutional benchmark.", "speaker": "Rob Arnott", "type": "causal", "entities": ["indices", "exchange-traded funds (ETFs)", "model portfolios", "institutional benchmarks"], "conviction": "high", "so_what": "Widespread consensus and ubiquitous holding of a 'winning' stock is itself a signal of crowding and limited remaining alpha, since the good news is already reflected in price and positioning.", "quote": "By the time everyone agrees on the winner, the stock may already be everywhere, in every index, exchange-traded fund (ETF), model portfolio, and institutional benchmark.", "locator": "By the time everyone agrees on the winner", "quote_verified": true}, {"claim": "A business can be genuinely magnificent while the stock market has already fully priced in that magnificence, limiting the scope for future excess returns.", "speaker": "Rob Arnott", "type": "framework", "entities": ["stock market"], "conviction": "high", "so_what": "Investors should focus on the gap between market expectations and future reality rather than business quality alone, since quality without an expectations gap does not generate alpha.", "quote": "The business may be magnificent. And the stock market likely already knows it.", "locator": "The business may be magnificent", "quote_verified": true}]}], "insight_total": 4, "top_entities": ["Rob Arnott", "Artificial Intelligence (AI)", "AI mega caps", "exchange-traded fund (ETF)", "Resea // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
