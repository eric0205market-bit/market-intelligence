nly if they share the same core belief about market mistakes, and only if one philosophy is designated dominant to resolve conflicts with the secondary one.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "If combining strategies (e.g., value + timing), explicitly rank which one wins when they disagree, or the combination will produce incoherent decisions.", "quote": null, "locator": "Do you have to pick a single philosophy? Not necessarily!", "quote_verified": false}, {"claim": "Two costs cause strategies that look good on paper to fail in practice: transaction costs (bid-ask spread, small for large liquid stocks but much larger for smaller/illiquid ones, plus price impact, which is negligible for small investors in large-cap names but substantial for large investors in obscure stocks) and taxes (dividends trigger immediate tax while capital gains are taxed only on sale, and higher turnover generally raises tax liability).", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Backtest results must be discounted for bid-ask spread, price impact and tax drag scaled to the investor's own size and turnover, not assumed away.", "quote": null, "locator": "Step 3: Check for viable strategies", "quote_verified": false}, {"claim": "Return volatility can create the illusion that a strategy is generating excess returns when those returns are almost entirely statistical noise, so active investors need the skill to properly test whether a strategy actually beats the market.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "Demand statistically rigorous backtests (not just a good-looking return chart) before trusting any claimed market-beating strategy.", "quote": null, "locator": "The volatility in returns can sometimes create illusions", "quote_verified": false}, {"claim": "Personal fit factors — capital size (too little blocks activist or illiquid-stock strategies; too much creates price impact in small caps), time horizon (often set by age, health and liquidity needs rather than stated preference), risk tolerance (tied to wealth and income stability), and personality traits (patience, susceptibility to peer pressure, valuation or data skills) — determine whether an investor can actually sustain a philosophy; mismatches cause investors to abandon strategies prematurely and fail what Damodaran calls the 'sleep test.'", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Before adopting any strategy, audit capital, time horizon, risk tolerance and temperament fit — a philosophy that's theoretically correct but personally mismatched will be abandoned at the worst time.", "quote": null, "locator": "Step 4: Check for personal fit", "quote_verified": false}]}, {"theme": "How structural change is invalidating old philosophies", "insights": [{"claim": "Technology and disruption have created winner-take-all businesses in the twenty-first century, which means investment philosophies built around small-cap companies that worked in the twentieth century will no longer deliver the same payoff.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": [], "conviction": "high", "so_what": "Small-cap value strategies premised on 20th-century market structure need re-examination given winner-take-all dynamics concentrating gains in dominant firms.", "quote": null, "locator": "Economic setting", "quote_verified": false}, {"claim": "Since the 2008 financial crisis, the 2020 COVID meltdown, and last April's tariff announcements, asset classes and geographies have increasingly moved in sync with each other compared to the prior century, reducing traditional diversification benefits.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "Re-test cross-asset and cross-geography correlation assumptions in portfolio construction; historical diversification benefits may be overstated going forward.", "quote": null, "locator": "Market lessons", "quote_verified": false}, {"claim": "Easier retail access to data and trading over recent decades has eroded the edge of investment philosophies that were built on the assumption that retail/individual investors could not easily access information or trade quickly.", "speaker": "Aswath Damodaran", "type": "causal", "entities": [], "conviction": "medium", "so_what": "Strategies premised on an information or execution-speed advantage over retail investors are structurally decaying and need adaptation or abandonment.", "quote": null, "locator": "Trading microstructure", "quote_verified": false}, {"claim": "Certitude about one's investment choices and an unwillingness to consider alternatives is flagged as a red flag in both retail and institutional investors, signaling an inability to adapt as markets and the economy change.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "Treat overconfident, unwavering conviction in commentators or managers as a warning sign rather than a mark of credibility.", "quote": null, "locator": "The investing world does not lend itself to absolutes", "quote_verified": false}]}, {"theme": "Damodaran's own disclosed philosophy", "insights": [{"claim": "Damodaran's investment philosophy rests on three principles: every cash-flow-generating asset has an estimable intrinsic value (in contrast to 'pricing' via multiples like PE or EV/EBITDA); markets are mostly right but make significant mistakes during periods of uncertainty such as life-cycle transitions, industry disruption, and crises; and a 'do no harm' commitment to guard against his own overreach.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": [], "conviction": "high", "so_what": "A concrete, three-line personal philosophy statement investors can use as a template to write and test their own.", "quote": "Intrinsic value matters... Markets are for the most part right, but make mistakes during periods of uncertainty and change... Do no harm", "locator": "my investment philosophy is built around three principles", "quote_verified": false}, {"claim": "Damodaran diversifies his own portfolio across roughly three dozen stocks and enforces a strict rule capping any single position at 15% of the portfolio, explicitly because he does not share the high 'conviction' that concentrated investors bring to the game.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "A concrete, checkable position-sizing rule (max 15% per name, ~36 holdings) from a named practitioner who explicitly rejects concentrated conviction investing.", "quote": "I don't share the conviction that concentrated investors bring to the game, and not only spread my portfolio over three dozen stocks, but also follow rigid rules on not letting any single investment exceed 15% of my portfolio.", "locator": "Spreading my bets", "quote_verified": true}, {"claim": "Damodaran trades rarely, does not track the market or his holdings throughout the day, almost never watches financial news, and is not swayed by sales pitches — a deliberate strategy of limiting overactivity that he says is one of his biggest sources of past mistakes.", "speaker": "Aswath Damodaran", "type": "anecdote", "entities": [], "conviction": "high", "so_what": "Illustrates a specific behavioral discipline (low turnover, no news/market monitoring) tied directly to avoiding overreach, not just a stated preference.", "quote": null, "locator": "Acting rarely", "quote_verified": false}, {"claim": "Damodaran deliberately avoids active market timing and sector bets, stating plainly that he is not good at either and that occasional wins would be wiped out by losses over the long term.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "A self-aware, high-conviction refusal to engage in two of the most commonly attempted active strategies, on the grounds of personal skill mismatch rather than theory.", "quote": null, "locator": "Staying away from my weaknesses", "quote_verified": false}, {"claim": "Damodaran names two of his own behavioral blind spots: an aversion to paying taxes that sometimes distorts his optimal investment decisions, and a tendency to fall in love with company narratives because he wants them to be true.", "speaker": "Aswath Damodaran", "type": "anecdote", "entities": [], "conviction": "medium", "so_what": "Even a rules-based, diversified, low-turnover investor admits concrete behavioral biases — a reminder to audit for tax-driven and narrative-driven distortions in one's own decisions.", "quote": null, "locator": "Being aware of my blind spots", "quote_verified": false}]}], "insight_total": 28, "top_entities": ["Aswath Damodaran", "Warren Buffett", "Ben Graham", "Jim Simon", "George Soros", "Berkshire Hathaway", "index funds", "private equity", "venture capital", "active investing"], "source_meta": {"author": "Aswath Damodaran", "word_count": 5816, "paywalled": false}}, {"record_id": "be2f5d855c2cc664", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/01/data-update-3-for-2026-trust-deficit.html", "title": "Data Update 3 for 2026: The Trust Deficit - Bonds, Currencies, Gold and Bitcoin!", "published_date": "2026-01-28", "language": "en", "processed_at": "2026-07-08T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Crypto", "Positioning"], "gist": "Damodaran argues that four 2025 shocks (tariffs, the Moody's downgrade, the record government shutdown, and Fed-independence attacks) eroded institutional trust, but the damage showed up very unevenly across markets: bonds and equities shrugged it off, the dollar weakened moderately, gold and silver went vertical, and bitcoin behaved like a risk asset rather than a trust hedge.", "themes": [{"theme": "The Trust Deficit Framework", "insights": [{"claim": "A loss of trust in institutions (governments, central banks, regulators) is the single thread that best explains the divergent 2025 performance of treasuries, currencies, gold/silver, and bitcoin.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["US Treasuries", "US Dollar", "Gold", "Silver", "Bitcoin", "Federal Reserve"], "conviction": "high", "so_what": "Investors should read cross-asset divergence in 2026 as a trust barometer, not just a rates/inflation story — watch gold/silver and the dollar as the most sensitive gauges.", "quote": "a loss of trust in institutions (governments, central banks, regulatory authorities) was the thread that best explains their performance", "locator": "In this one, I want to focus specifically on four news stories", "quote_verified": true}, {"claim": "The traditional developed-vs-emerging-market trust gap has narrowed in the 21st century because crises and political developments have undercut trust in institutions across the board, including in developed markets like the US.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Emerging Markets", "United States"], "conviction": "medium", "so_what": "The old playbook of treating US/developed-market sovereign risk as categorically different from emerging-market risk needs revisiting; risk premia gaps between the two may keep compressing.", "quote": null, "locator": "one of the divides between developed and emerging markets", "quote_verified": false}, {"claim": "The 2025 trust shocks (tariffs, ratings downgrade, Fed independence fight) are not new phenomena caused solely by Donald Trump but are the culmination of much longer-running trends: trade backlash a decade-plus in the making, prior downgrades by S&P (2011) and Fitch (2023), and Fed independence that was always norm-based rather than legally entrenched.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Donald Trump", "S&P", "Fitch", "Moody's", "Federal Reserve"], "conviction": "medium", "so_what": "Investors shouldn't expect a single political change to reverse the trust erosion; it's structural and likely to persist across administrations.", "quote": "the truth is that in each case, the slippage has been occurring over much longer", "locator": "While Donald Trump is the easy answer", "quote_verified": true}]}, {"theme": "Bond Market: Muted Reaction Despite the Shocks", "insights": [{"claim": "Despite the Moody's downgrade, the record government shutdown, and tariff turmoil, the 10-year US treasury rate actually fell 39 basis points over 2025, from 4.58% to 4.19%, with short-term treasuries falling even more.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US Treasuries", "Moody's"], "conviction": "high", "so_what": "The bond market did not price a default/trust crisis in 2025 — rates fell rather than rose, contradicting the intuitive 'trust deficit means higher yields' narrative.", "quote": "the ten-year treasury rate dropped by 39 basis points (from 4.58% to 4.19%) during the year", "locator": "US Treasury Data", "quote_verified": true}, {"claim": "The yield curve steepened materially in 2025: the 10-year/30-year spread doubled, the 10-year/2-year spread widened by 7 basis points, while the 2-year/3-month spread narrowed, leaving a much more upward-sloping curve by year-end.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US Treasuries"], "conviction": "medium", "so_what": "A steepening curve is a marginal positive signal for future US growth, though Damodaran cautions against over-reading the yield curve as a recession predictor.", "quote": null, "locator": "During 2025, the spread between the 10-year and 30-year treasury doubled", "quote_verified": false}, {"claim": "US sovereign CDS spreads spiked from about 0.4% to just over 0.5% in April 2025 around the tariff shock, but had fully round-tripped back below start-of-year levels by year end.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["United States"], "conviction": "high", "so_what": "Default-risk pricing shows the tariff shock, not the downgrade or shutdown, was the real market-moving event, and even that was fully reversed within the year.", "quote": null, "locator": "sovereign CDS spreads for the US", "quote_verified": false}, {"claim": "Market-implied inflation expectations (10-year treasury minus 10-year TIPS) barely moved in 2025 and ended the year lower than they started, contradicting expert forecasts of an inflation surge after the tariff announcements but matching actual reported inflation.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US Treasuries"], "conviction": "high", "so_what": "The market was a better inflation forecaster than the expert consensus on tariff-driven inflation fears in 2025 — a data point for weighting market-based inflation signals over survey/expert forecasts going forward.", "quote": "That would have put the market at odds with experts, who forecasted a surge in inflation especially after the tariffs were announced", "locator": "To get a sense of how expectation of inflation changed", "quote_verified": true}, {"claim": "Corporate bond spreads diverged sharply by quality in 2025: investment-grade (BBB and above) spreads were flat to lower, while below-investment-grade (sub-BBB) spreads widened.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Corporate bonds"], "conviction": "medium", "so_what": "Credit risk repricing was concentrated in junk-rated issuers, a sign that any stress from the trust deficit is being absorbed at the lower end of credit quality, not broadly.", "quote": null, "locator": "divergence in how the year played out in the corporate bond market", "quote_verified": false}]}, {"theme": "Fed Independence and the Rate-Setting Framework", "insights": [{"claim": "The Fed's influence over interest rates is vastly overstated: long-term treasury rates are driven mainly by expected inflation and real growth, not by Fed Funds rate decisions, which mainly affect short-term treasuries.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["Federal Reserve", "US Treasuries"], "conviction": "high", "so_what": "Investors overweighting Fed meeting outcomes for long-duration positioning may be mispricing the actual drivers — real growth and inflation trajectory matter more for the 10-year+ curve.", "quote": "I believe that the role of Fed in setting interest rates is vastly overstated", "locator": "On the final question of why the Fed independence fight", "quote_verified": true}, {"claim": "Using an intrinsic 10-year riskfree rate (actual inflation plus real GDP growth) as a benchmark, the treasury rate of 4.18% at the start of 2026 is converging toward the intrinsic rate of 5.10%, closing a gap that persisted from 2021-2025 when the intrinsic rate ran well above the actual treasury rate.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US Treasuries"], "conviction": "medium", "so_what": "The gap closing suggests treasury rates may still have room to normalize upward toward the intrinsic rate, or inflation/growth could decelerate to meet the treasury rate instead.", "quote": null, "locator": "the treasury rate of 4.18%, at the start of 2026, is within reach of the intrinsic rate of 5.10%", "quote_verified": false}, {"claim": "Treasury rates stayed below the intrinsic risk-free rate during 2021-2025 because markets trusted the Fed would fight inflation even at the cost of a recession; if the Fed is perceived as becoming an extension of the government, that belief could break, risking a self-reinforcing spiral of higher inflation feeding higher rates feeding more inflation.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["Federal Reserve", "US Treasuries"], "conviction": "medium", "so_what": "A credible attack on Fed independence is a tail risk for a stagflationary spiral, not just a governance story — worth monitoring nominee/appointment news as a leading indicator.", "quote": "creating a cycle where higher inflation causes higher interest rates, and attempts by central banks to lower these rates actually feed into even higher inflation", "locator": "It is this belief that will be put at risk", "quote_verified": true}, {"claim": "It is in politicians' own interest to preserve central bank independence, because it produces better economic outcomes and lower interest rates while giving politicians cover for unpopular but necessary policy choices.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Federal Reserve"], "conviction": "medium", "so_what": "A normative argument for why attacks on Fed independence are self-defeating even from a purely political standpoint — a lens for judging future administration rhetoric.", "quote": null, "locator": "It is in the best interests of governments and politicians", "quote_verified": false}]}, {"theme": "Currency Market: The Dollar Absorbs the Trust Hit", "insights": [{"claim": "Unlike bonds, the currency market clearly registered the trust deficit: the trade-weighted dollar fell 7.24% in 2025, losing more value against developed-market currencies (down 8.19%) than against emerging-market currencies (down 6.34%).", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US Dollar"], "conviction": "high", "so_what": "The dollar was the clearest single-asset expression of the 2025 trust deficit, and its underperformance was concentrated versus developed-market peers rather than emerging markets — worth tracking DM vs EM FX divergence as a trust gauge.", "quote": "it was down 8.19% against the former and 6.34% against the latter", "locator": "The trade-weighted dollar, a broad index of the dollar", "quote_verified": true}]}, {"theme": "Gold and Silver: The Trust-Deficit Trade", "insights": [{"claim": "Gold rose 65% in 2025, one of its best years ever, while silver rose an even larger 148%, even though neither the high-unexpected-inflation nor the intense-crisis conditions that historically drive precious-metal rallies were present.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Gold", "Silver"], "conviction": "high", "so_what": "The magnitude of the 2025 gold/silver rally is anomalous versus historical drivers, implying a structural shift (trust-seeking capital) rather than a cyclical inflation or crisis trade — a signal that could persist rather than mean-revert quickly.", "quote": "Gold had one of its best years ever, rising 65% during the year, and silver... rising 148%", "locator": "Gold and Silver", "quote_verified": true}, {"claim": "The ratio of gold price to CPI broke through historic norms in 2025, invalidating the 'golden rule' heuristic that gold prices roughly track inflation over time.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["Gold"], "conviction": "high", "so_what": "Standard gold valuation heuristics (gold tracks CPI) failed in 2025; investors relying on that anchor to call gold overvalued would have missed a 65% rally.", "quote": "gold price performance in 2025 broke the indicator, as the ratio of gold price to the CPI exploded well above historic norms", "locator": "if you scale gold price to the CPI", "quote_verified": true}, {"claim": "Central banks increased gold holdings in 2025 due to loss of trust in the US government and dollar, but this buying, while contributing to gold's allure, cannot by itself explain the magnitude of the price rise.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["Gold", "US Dollar"], "conviction": "medium", "so_what": "Don't over-attribute the gold rally to central-bank reserve diversification alone — private/speculative trust-driven demand was likely a larger driver.", "quote": "that increase, while contributing to gold's allure, cannot explain its price rise during the year", "locator": "It is worth noting that a loss of trust", "quote_verified": true}, {"claim": "Silver's 2025 surge pushed the gold-to-silver price ratio below its long-term median value.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Gold", "Silver"], "conviction": "medium", "so_what": "Silver outperforming gold enough to compress the ratio below its historical median suggests a broader precious-metals mania rather than a narrow flight-to-gold, a distinction relevant for relative-value trades between the two metals.", "quote": null, "locator": "silver prices rose enough to bring the ratio of gold to silver prices", "quote_verified": false}, {"claim": "Markets are pulling in different directions on the trust question: stocks and bonds are largely dismissing the trust deficit, currencies show moderate concern, and gold/silver imply investors see much larger consequences, reflecting a market that is not a monolith but contains a meaningful subset positioning for catastrophic risk.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Gold", "Silver", "US Dollar", "US Treasuries"], "conviction": "medium", "so_what": "The precious metals rally may reflect a minority but well-capitalized 'catastrophe insurance' cohort rather than consensus market view — useful context for judging how durable the gold/silver bid is.", "quote": "there is a significant segment of investors that see catastrophic risks emerging, and piling into precious metals", "locator": "It seems like the market is pulling in different directions", "quote_verified": true}]}, {"theme": "Bitcoin: Failing the Trust-Hedge Test", "insights": [{"claim": "Bitcoin ended 2025 down 6.4% in US dollar terms and down 17.4% in Euro terms, despite a macro backdrop (weakening dollar, questioned Fed independence) that should have favored a central-bank-free currency/collectible.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Bitcoin", "US Dollar"], "conviction": "high", "so_what": "Bitcoin failed the 2025 real-world test of behaving as a trust hedge, undercutting the thesis that it benefits mechanically from central-bank and government distrust.", "quote": "bitcoin ended the year down 6.4% in US dollar terms and 17.4% in Euro terms", "locator": "The months following have vindicated that view", "quote_verified": true}, {"claim": "Bitcoin surged in the middle of 2025, appearing to validate bullish narratives, but then both bitcoin and MicroStrategy suffered pricing collapses after Damodaran's July 2025 argument against companies putting cash balances into bitcoin proved out.", "speaker": "Aswath Damodaran", "type": "anecdote", "entities": ["Bitcoin", "MicroStrategy"], "conviction": "medium", "so_what": "The corporate-treasury-bitcoin strategy (MicroStrategy-style) took a real hit in 2025, a cautionary data point for other companies or investors considering copying that playbook.", "quote": null, "locator": "In my post on bitcoin on July", "quote_verified": false}, {"claim": "Across 2025 weekly returns, bitcoin was much more highly correlated with US equities than with gold or silver, suggesting it draws in risk-seeking capital rather than risk-averse, trust-hedging capital.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Bitcoin", "Gold", "Silver"], "conviction": "high", "so_what": "Bitcoin should be modeled as a high-beta risk asset correlated with equities for portfolio construction purposes, not as an uncorrelated store-of-value/gold substitute.", "quote": "bitcoin is much more highly correlated with US equities than it is with its collectible counterparts, suggesting that it draws in risk seekers, not the risk averse", "locator": "There are only a few co-movements", "quote_verified": true}, {"claim": "It remains too early to render final judgment on bitcoin's ultimate role, but the 2025 evidence points to gold and silver, not bitcoin, being the actual destination for trust-deficit capital.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["Bitcoin", "Gold", "Silver"], "conviction": "medium", "so_what": "Investors using bitcoin as a portfolio hedge against institutional/currency distrust should reconsider gold/silver as the empirically better-performing hedge in the actual 2025 stress test.", "quote": "gold and silver were the draws, at least in 2025, not bitcoin", "locator": "It remains too early in bitcoin's life", "quote_verified": true}]}, {"theme": "Cross-Asset Correlations and the Fed-Stock Narrative", "insights": [{"claim": "On a week-to-week basis in 2025, higher interest rates (i.e., negative bond returns) were accompanied by higher stock prices, casting doubt on the notion that US stock markets are being propped up by Fed rate activity or inactivity.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["US Treasuries", "US equities", "Federal Reserve"], "conviction": "medium", "so_what": "The popular 'Fed put' narrative that equities rally only because of low/falling rates doesn't hold up in the 2025 weekly correlation data — a reason to be skeptical of rate-cut-dependent equity bull theses.", "quote": "higher interest rates (translating into negative bond returns) were accompanied by higher stock prices, casting doubt on the notion that the stock market is being held afloat by Fed activity or inactivity", "locator": "The second is that notwithstanding the fact that US treasuries", "quote_verified": true}, {"claim": "The overall 2025 conclusion is that the trust deficit did not produce the textbook outcome of rising rates and a bad year for bonds; instead the damage was selectively absorbed by the dollar, and dramatically, by gold and silver, while bitcoin tracked stocks and bonds without their upside.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["US Treasuries", "US Dollar", "Gold", "Silver", "Bitcoin"], "conviction": "high", "so_what": "For 2026 positioning, treat gold/silver and the dollar as the primary transmission channels for any further trust deterioration, not bond yields.", "quote": "Bitcoin remained the outlier, moving more with stocks and bonds, albeit without their upside (at least this year) and less with collectibles", "locator": "Conclusion", "quote_verified": true}]}], "insight_total": 24, "top_entities": ["US Treasuries", "US Dollar", "Gold", "Silver", "Bitcoin", "Federal Reserve", "Moody's", "MicroStrategy", "United States", "Donald Trump"], "source_meta": {"author": "Aswath Damodaran", "word_count": 3046, "paywalled": false}}, {"record_id": "bf2f4b2a3925e6d1", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/02/data-update-8-for-2026-time-for.html", "title": "Data Update 8 for 2026: Time for Harvesting - Dividends and Buybacks", "published_date": "2026-02-24", "language": "en", "processed_at": "2026-07-08T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Positioning", "Macro"], "gist": "Damodaran argues dividend policy is dysfunctional (driven by inertia and peer-group me-tooism rather than free cash flow to equity), buybacks now dominate global cash return and most anti-buyback and pro-buyback 'myths' don't hold up empirically, and dividend-based value-investing strategies (Ben Graham style) are increasingly concentrated in a shrinking, mature-sector universe.", "themes": [{"theme": "The Dividend Decision and Why It's Dysfunctional", "insights": [{"claim": "Every firm makes three core corporate finance decisions in sequence: the investment decision (projects earning above the hurdle rate), the financing decision (debt/equity mix), and the dividend decision (how much cash to return to owners) - with dividends properly being the residual left after the first two decisions.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["dividend policy", "corporate finance"], "conviction": "high", "so_what": "Judge a company's payout against what's actually left over after investment and financing needs, not as an independent, sacrosanct commitment.", "quote": null, "locator": "I start my corporate finance classes with a description of three core decisions", "quote_verified": false}, {"claim": "Dividend policy is dysfunctional because it is driven by two real-world forces rather than residual cash flow logic: inertia (this year's dividend is set equal to last year's) and 'me-tooism' (managers set payout based on peer-group norms, e.g., banks and utilities pay high dividends and tech pays low/none simply because that is sector practice).", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["dividend policy"], "conviction": "high", "so_what": "Peer-mimicking payout policy creates mispriced outliers - fast-growing banks or mature tech firms trapped in a payout norm that doesn't fit their life-cycle stage.", "quote": "the word I would use to describe dividend policy, at least when it comes to conventional dividends, is 'sticky'", "locator": "Inertia / Me-tooism sections", "quote_verified": true}, {"claim": "In every single year from 1988 to 2025, the percentage of US companies that kept dividends unchanged from the prior year exceeded the percentage that changed them, and when dividends were changed, increases outnumbered decreases.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US companies", "dividends"], "conviction": "high", "so_what": "Because cuts are so rare, a dividend cut when it does happen carries outsized negative signaling value and should be treated as a major red flag, not routine noise.", "quote": null, "locator": "track the percentage of companies that increase dividends, decrease dividends or leave them unchanged", "quote_verified": false}, {"claim": "When sustaining or growing the dividend becomes an end in itself, firms become 'dividend monsters' that distort their investing and financing decisions - turning away good investment projects or borrowing more than they should purely to keep the dividend flowing.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["dividend policy"], "conviction": "high", "so_what": "Screen for firms whose dividend exceeds what free cash flow to equity can sustainably support - a signal of capital misallocation or creeping leverage risk.", "quote": "you unleash dividend monsters, where investing and financing decisions are skewed to meet dividend needs", "locator": "When maintaining or increasing dividends become the end game", "quote_verified": true}]}, {"theme": "Why Buybacks Won (and Why the Standard Explanations Are Wrong)", "insights": [{"claim": "In the last decade, more than 60% of the total cash US companies returned to shareholders took the form of buybacks rather than dividends, a reversal from most of the last century when dividends were the primary or only return mechanism.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US companies", "buybacks", "dividends"], "conviction": "high", "so_what": "Buybacks are now the dominant capital-return channel, so cash-return analysis that focuses only on dividend yield materially understates shareholder distributions.", "quote": null, "locator": "in the last decade, more than 60% of cash returned to shareholders took the form of buybacks", "quote_verified": false}, {"claim": "The primary reason buybacks have overtaken dividends is their flexibility - companies can reverse or pause them when macro conditions worsen (as happened in 2008 and 2020) - not stock-based compensation incentives or investor tax preferences, both of which are weaker explanations than commonly assumed.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["buybacks", "stock-based compensation"], "conviction": "high", "so_what": "Don't expect executive comp reform or tax policy changes to meaningfully shrink buyback volume; watch macro conditions instead, since that's the actual lever companies pull.", "quote": null, "locator": "The primary reason, in my view, is that buybacks, unlike dividends, are flexible", "quote_verified": false}, {"claim": "Buybacks are just as prevalent at companies with no or very low stock-based compensation as at companies with high stock-based compensation, and buybacks have kept climbing even as firms shift from stock options to restricted stock (which removes the price-support incentive) - undermining the argument that manager comp is driving the buyback boom.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["stock-based compensation", "buybacks"], "conviction": "medium", "so_what": "Discounts a popular governance narrative that blames buybacks on executives propping up their own option value.", "quote": null, "locator": "buybacks have continued to climb, and they are just as high at companies that have no or very low stock based compensation", "quote_verified": false}, {"claim": "Changes in tax law over the last two decades have reduced or eliminated the tax disadvantage dividends once had relative to capital gains, weakening the argument that investor tax preferences are what pushed companies from dividends toward buybacks.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["dividends", "buybacks", "tax law"], "conviction": "medium", "so_what": "Tax-driven explanations for the dividend-to-buyback shift are largely obsolete and shouldn't guide expectations of future policy shifts.", "quote": null, "locator": "changes in tax law in the last two decades have reduced, if not eliminated, the tax disadvantages", "quote_verified": false}]}, {"theme": "FCFE and the Life-Cycle Framework for Cash Return", "insights": [{"claim": "The correct measure of how much cash a firm can sustainably return is free cash flow to equity (FCFE) - equity earnings plus non-cash charges, minus capex and working-capital changes, adjusted for net debt cash flows - and paying dividends or buying back stock when FCFE is negative violates the basic rule that if you're in a hole, you should stop digging.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["FCFE"], "conviction": "high", "so_what": "Use FCFE, not net income or cash on hand, as the benchmark for judging whether a company's dividend or buyback is sustainable.", "quote": null, "locator": "free cashflow to equity", "quote_verified": false}, {"claim": "Cash return policy should track a company's life-cycle stage: young companies typically have negative FCFE and need equity infusions, young growth companies are self-funding but can't afford dividends, mature growth companies have cash to return but prefer buybacks for flexibility, and mature stable companies - with low reinvestment needs and predictable earnings - are the 'sweet spot' for dividend paying.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["dividend policy", "buybacks", "FCFE"], "conviction": "high", "so_what": "Use life-cycle stage as a screen: a young or high-growth firm paying steady dividends, or a mature firm hoarding cash, is 'acting its age wrong' and worth scrutinizing.", "quote": null, "locator": "you can already see why you should expect cash return policies to change over a company's life cycle", "quote_verified": false}, {"claim": "Companies that 'refuse to act their age' - young firms paying dividends/buybacks, or mature firms hoarding cash - damage themselves and their shareholders; excess cash hoarding can trigger investors to apply a 'lack-of-trust' discount when they don't trust management's capital discipline.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["cash holdings"], "conviction": "medium", "so_what": "A persistently rising cash balance at a mature company, absent clear reinvestment plans, is a candidate for a market discount and activist pressure.", "quote": "you may punish a company for holding too much cash, effectively apply a \"lack-of-trust\" discount to the cash", "locator": "companies that refuse to act their age", "quote_verified": true}]}, {"theme": "2025 Global Dividend Data and the Decline of Income Investing", "insights": [{"claim": "In 2025, the median dividend payout ratio (among dividend payers) was about 35% for US companies and 59% for global companies, with 12% of US firms and 14% of global firms paying out more than 100% of earnings as dividends.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US companies", "dividends"], "conviction": "high", "so_what": "A payout ratio over 100% is a flag to check whether it's a temporary bad-earnings year, deliberate leverage-up, or partial liquidation.", "quote": null, "locator": "the median payout ratio is about 35% (59%) for US (global) companies", "quote_verified": false}, {"claim": "In 2025, the median dividend yield among dividend-paying firms was 1.10% in the US versus 2.43% globally, and the share of firms paying dividends has dropped below 30% in the US, with less than half of firms paying dividends globally.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US companies", "dividends"], "conviction": "high", "so_what": "Dividend-yield screens now apply to a shrinking, non-representative slice of the equity market, especially in the US.", "quote": null, "locator": "the median dividend yield was 1.10% for the former and 2.43% for the latter", "quote_verified": false}, {"claim": "With the US cost of equity at about 8.50% at the start of 2026 and the median dividend yield near 1.10%, equity investors are now almost entirely dependent on price appreciation, not dividends, for their expected returns.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["cost of equity", "US"], "conviction": "high", "so_what": "Income-oriented equity strategies can no longer rely on dividend yield to deliver a meaningful share of expected total return.", "quote": null, "locator": "that expected return was about 8.50% at the start of 2026", "quote_verified": false}, {"claim": "Dividends made up roughly half of the S&P 500's expected total return in 1960 but had fallen to less than 15% of total return by 2025, reflecting a multi-decade structural decline in the dividend yield's contribution to equity returns.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["S&P 500"], "conviction": "high", "so_what": "The long-run shift from dividend-driven to appreciation-driven returns is structural, not cyclical, and shouldn't be expected to revert.", "quote": null, "locator": "In 1960, about half of your expected return on stocks came from dividends", "quote_verified": false}, {"claim": "In 2025, financials, real estate and utilities had the highest percentage of dividend-paying firms and the highest payout ratios, with energy and real estate paying out more than 200% of net income and yielding over 6%, while technology and communication services had the lowest dividend participation and yields.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["financials", "real estate", "utilities", "energy", "technology"], "conviction": "high", "so_what": "Dividend-yield-based sector exposure is now effectively a bet concentrated in financials, real estate, utilities and energy.", "quote": null, "locator": "the sectors with the highest percentage of firms paying dividends are financials, real estate and utilities", "quote_verified": false}, {"claim": "Ben Graham's classic 'principal protection' strategy of buying large dividend-paying firms and holding for the long term has 'hit a wall,' because any dividend-focused strategy today necessarily concentrates a portfolio into mature and increasingly declining sectors like real estate, banking and utilities as the dividend-paying universe shrinks.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["Ben Graham", "financials", "real estate", "utilities"], "conviction": "high", "so_what": "Classic dividend-value investing frameworks need updating for a market where dividend payers are a shrinking, sector-concentrated minority.", "quote": "Ben Graham's strategy of principal protection was built around buying large dividend paying firms and holding on for the long term and it has hit a wall", "locator": "put old time value investing to the test", "quote_verified": true}]}, {"theme": "Debunking the Buyback Myths", "insights": [{"claim": "In 2025, US companies bought back $1.153 trillion in stock (about 60% of all cash returned); Canada, the UK and Japan returned more than 35% via buybacks; the EU returned about 29%; while Africa & the Middle East, Eastern Europe and much of South/Southeast Asia returned relatively little via buybacks, due to weaker corporate governance and regulatory restrictions.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US companies", "Canada", "UK", "Japan", "EU", "buybacks"], "conviction": "high", "so_what": "Buybacks are no longer a US-only phenomenon, so global cash-return comparisons that ignore buybacks understate distributions outside the US too, though governance-weak regions remain an exception.", "quote": null, "locator": "Companies in the United States are still in the lead in the buyback race", "quote_verified": false}, {"claim": "Buybacks do not reduce aggregate corporate investment; they redirect capital away from mature companies with few investment opportunities and, via the market, into younger, higher-growth companies that need the cash, since buyback proceeds mostly flow to investors who reinvest them elsewhere rather than disappearing from the economy.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["buybacks"], "conviction": "high", "so_what": "The 'buybacks starve the economy of investment' critique misidentifies where investment happens - it shifts location (mature to young firms), not aggregate level.", "quote": null, "locator": "Buybacks redirect corporate investment from mature companies to growth businesses", "quote_verified": false}, {"claim": "Younger companies, broken down by corporate age decile, return less cash overall (in both dividends and buybacks, as a percent of market cap) than older companies, consistent with cash rotating from mature to young businesses via the buyback channel.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["buybacks"], "conviction": "medium", "so_what": "Supports treating buybacks as a capital-recycling mechanism from old to new businesses rather than a drain on total investment.", "quote": null, "locator": "younger companies are not only less likely to buy back stock", "quote_verified": false}, {"claim": "Aggregate debt-to-capital ratios for US non-financial firms have declined over the last four decades even as buybacks surged, and US companies that bought back stock in 2025 had lower debt-to-EBITDA and debt-to-capital ratios than companies that did not buy back stock - contradicting the claim that buybacks are debt-funded and over-levering companies.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US companies", "buybacks"], "conviction": "high", "so_what": "The 'buybacks are funded with debt' critique doesn't hold in the aggregate data - leverage concerns should focus on individual outlier firms, not buybacks as a class.", "quote": null, "locator": "companies that bought back stock had much lower debt loads than the companies that did not", "quote_verified": false}, {"claim": "Warren Buffett was a late adopter of buybacks at Berkshire Hathaway and imposed a self-discipline of only buying back stock when it traded below intrinsic value - a constraint most companies don't impose, despite lacking Buffett's credibility to make that call.", "speaker": "Aswath Damodaran", "type": "anecdote", "entities": ["Warren Buffett", "Berkshire Hathaway"], "conviction": "medium", "so_what": "Few companies have the valuation credibility to justify Buffett-style price-disciplined buybacks, so most buyback programs likely lack this safeguard.", "quote": null, "locator": "Warren Buffett was late to the buyback party", "quote_verified": false}, {"claim": "Buybacks, at any price, cannot add or destroy value - they can only transfer wealth between shareholders: an overpriced buyback transfers wealth from remaining holders to those who sell, and an underpriced buyback transfers wealth from sellers to those who remain, so both the 'buybacks destroy value' and 'buybacks create value' narratives misclassify buybacks as investment projects rather than cash returns.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["buybacks"], "conviction": "high", "so_what": "As a shareholder, whether a buyback helps or hurts you depends entirely on your own decision to sell or hold, not on some inherent value creation/destruction by the company.", "quote": "a cash return can neither add nor destroy value, but it can transfer wealth", "locator": "Myth 1.4 / Myth 2.1", "quote_verified": true}, {"claim": "A fair-value buyback leaves per-share value unchanged because share count and firm value shrink proportionally; any real effect on value per share comes from a secondary channel - the buyback's impact on the debt-to-capital mix and cost of capital - and the observed empirical link between buybacks and rising stock prices may reflect selection bias (under-levered, cash-rich firms doing most buybacks) rather than a causal effect.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["buybacks"], "conviction": "medium", "so_what": "Don't assume buyback announcements are inherently bullish signals - the correlation with rising stock prices may just reflect which firms choose to buy back, not the buyback's own effect.", "quote": null, "locator": "Myth 2.2", "quote_verified": false}]}, {"theme": "Dividend Dysfunction by the Numbers, and the Verdict on Cash-Return Investing", "insights": [{"claim": "Globally in 2025, about 18% of money-losing companies still paid dividends and about 70% of money-making companies did; separately, about 37% of companies that returned any cash (dividends or buybacks) had negative FCFE, while 66% of companies with positive FCFE returned cash.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["dividends", "buybacks", "FCFE"], "conviction": "high", "so_what": "Roughly a fifth of dividend payers are cash-flow-negative and roughly a third of cash returners overall have negative FCFE - a sizeable minority of the market is returning cash it arguably can't sustainably afford.", "quote": null, "locator": "Across the globe in 2025, almost 18% of money-losing companies paid dividends", "quote_verified": false}, {"claim": "Investment strategies built entirely around cash return - whether high-dividend-yield screens or concentrated dividend portfolios like the Dogs of the Dow - are likely to 'go off the tracks' because they misread a stock as a bond substitute (dividends replacing coupons plus some appreciation) rather than an equity claim primarily dependent on price appreciation.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["Dogs of the Dow"], "conviction": "high", "so_what": "Reassess dividend-yield-driven allocation strategies given how small a share of total equity return dividends now represent.", "quote": "A stock is not a bond, where dividends replace coupons, and you get some price appreciation on top, and treating it as such will only create disappointment", "locator": "Conclusion", "quote_verified": true}]}], "insight_total": 26, "top_entities": ["Warren Buffett", "Berkshire Hathaway", "S&P 500", "Ben Graham", "Dogs of the Dow", "US companies", "buybacks", "dividends", "financials", "real estate", "utilities", "FCFE"], "source_meta": {"author": "Aswath Damodaran", "word_count": 4159, "paywalled": false}}, {"record_id": "c60c13296cab218b", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/03/the-price-of-risk-equity-risk-premium.html", "title": "The Price of Risk: An Equity Risk Premium Monologue!", "published_date": "2026-03-15", "language": "en", "processed_at": "2026-07-08T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Positioning", "Geopolitics"], "gist": "Damodaran explains why he abandoned historical equity risk premiums for a forward-looking implied ERP, shows the implied ERP has barely moved (4.37% to 4.51%) despite a March 2026 war-and-oil shock even as the 10-year Treasury yield surged, and argues rising bond yields (inflation fear), not equity risk, are currently driving markets.", "themes": [{"theme": "Historical ERP is broken", "insights": [{"claim": "Standard historical equity risk premium methodology, applied at the start of 2026, would produce estimates ranging anywhere from 5.5% to 14.5% depending on the time period used, how averages are computed, and the choice of riskfree rate.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "A method that can output anywhere from 5.5% to 14.5% is not a reliable discount-rate input; treat any hurdle rate built on historical ERP as arbitrary unless the underlying assumptions are disclosed.", "quote": null, "locator": "Status Quo and Standard Practice", "quote_verified": false}, {"claim": "Historical equity risk premiums are backward-looking, statistically noisy, and easily biased because bullish analysts can select lower historical premiums while bearish analysts select higher ones to fit a predetermined conclusion.", "speaker": "Aswath Damodaran", "type": "causal", "entities": [], "conviction": "high", "so_what": "When a valuation cites a historical ERP, check which window/averaging convention was chosen — it is often a tell for the analyst's directional bias, not a neutral input.", "quote": null, "locator": "Status Quo and Standard Practice", "quote_verified": false}, {"claim": "Historical equity risk premiums move in the perverse direction relative to actual risk: they fall during crises (as recent poor returns get folded into the average) and rise during good times, the opposite of how a rational price of risk should behave.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "Discount rates built on trailing historical ERP will understate required returns exactly when risk is rising (crises) and overstate them in calm markets — a built-in procyclical error.", "quote": null, "locator": "Status Quo and Standard Practice", "quote_verified": false}, {"claim": "The lineage of the standard US historical return dataset — originally Ibbotson Associates, later absorbed into Duff & Phelps' cost-of-capital publications, now owned by Kroll — has been repeatedly re-sliced by industry for decades without producing much new insight, because the underlying noise in the data can't be mined away.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Ibbotson Associates", "Duff and Phelps", "Kroll"], "conviction": "medium", "so_what": "Be skeptical of vendor cost-of-capital products that claim finer historical-ERP breakdowns (by size, sector, style) — the source data's noise limits how much real signal can be extracted.", "quote": null, "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": false}, {"claim": "For investors who still want to use historical equity risk premiums, Damodaran recommends the Credit Suisse Yearbook over US-centric datasets because it covers roughly 20 markets over more than a hundred years and avoids the selection bias of focusing solely on US data.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["Credit Suisse Yearbook"], "conviction": "medium", "so_what": "If historical ERP must be used, prefer multi-country long-run datasets over single-market US series to reduce survivorship/selection bias.", "quote": null, "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": false}]}, {"theme": "Implied (forward-looking) ERP as the fix", "insights": [{"claim": "Damodaran's forward-looking implied equity risk premium is derived by backing out the expected return (internal rate of return) markets are pricing into stocks, given current prices and expected cash flows — a model-agnostic measure of what the market is pricing in right now.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Use implied ERP rather than trailing averages as the discount-rate input for valuations; it reflects current market pricing rather than a stale historical average.", "quote": null, "locator": "A Forward-Looking Alternative", "quote_verified": false}, {"claim": "The implied equity risk premium for US stocks at the start of 2026 was 4.23% over the treasury bond rate.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["S&P 500"], "conviction": "high", "so_what": "A concrete, current benchmark (4.23%) against which to sanity-check discount rates used in DCFs on US equities entering 2026.", "quote": null, "locator": "A Forward-Looking Alternative", "quote_verified": false}, {"claim": "Since September 2008, Damodaran shifted from computing the implied equity risk premium once a year to recomputing it at the start of every month for the S&P 500, publishing the updates on his website, precisely because he found the ERP to be a dynamic, shifting number that a single annual estimate cannot capture.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["S&P 500"], "conviction": "high", "so_what": "Investors valuing companies should refresh the discount rate at least monthly rather than locking in a start-of-year ERP, especially in volatile macro regimes.", "quote": null, "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": false}]}, {"theme": "ERP as a real-time crisis barometer", "insights": [{"claim": "During the 2008 financial crisis, the daily-tracked implied ERP started at 4.2% on September 12, 2008 and almost doubled over the following 14 weeks as stocks went into free fall and fear about banks and the economy rose.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "A near-doubling of implied ERP in ~14 weeks is the historical template for how fast discount rates should reprice in a full-blown financial crisis — a reference point for calibrating stress scenarios.", "quote": "the crisis started with the equity risk premiums at 4.2% on September 12, 2008... but almost doubled over the next two months, as stocks went into free fall", "locator": "ERP Estimation during Crises", "quote_verified": true}, {"claim": "Damodaran has since repeated the practice of tracking implied ERP daily during subsequent market stress episodes: the 2016 Brexit vote in the UK, the 2020 COVID-19 shutdown, the tariff-driven market turmoil of 2025, and now the March 2026 war-and-oil-price shock.", "speaker": "Aswath Damodaran", "type": "anecdote", "entities": [], "conviction": "medium", "so_what": "His daily ERP series (available on his site) is a reusable, real-time gauge of market fear during any future crisis, not just a one-off 2008 exercise.", "quote": null, "locator": "ERP Estimation during Crises", "quote_verified": false}, {"claim": "During the two weeks from February 27 to March 13, 2026, amid a Middle East war and oil above $100/barrel with the S&P 500 falling, the implied equity risk premium rose only modestly, from 4.37% to 4.51%.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["S&P 500"], "conviction": "high", "so_what": "A sub-15bp rise in ERP despite a war and $100+ oil signals equity markets are not yet pricing this as a genuine crisis — a gap investors can monitor for a repricing if the conflict escalates.", "quote": null, "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": false}, {"claim": "Over the same Feb 27-Mar 13, 2026 window, the 10-year US Treasury yield rose more sharply than the equity risk premium, from 3.97% to 4.28%, indicating that inflation fears — not equity risk — are currently the dominant force moving markets.", "speaker": "Aswath Damodaran", "type": "causal", "entities": [], "conviction": "high", "so_what": "Watch the bond market, not the equity risk premium, as the leading indicator of this shock's market impact; a bigger move in yields than in ERP implies the trade is about inflation/rates, not equity derating.", "quote": "it is the ten-year US treasury bond that has had the bigger surge, up from 3.97%... to 4.28%... indicating inflation fears are trumping other market concerns right now", "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": true}]}, {"theme": "Market-neutral valuation discipline", "insights": [{"claim": "Using a fixed equity risk premium (e.g., 4%) instead of the current implied premium (e.g., 6% during a crisis) turns every company valuation into an implicit joint bet that the market itself is mispriced, rather than a judgment about the company being valued.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Before calling a stock undervalued off a DCF, check whether the analyst used a stale ERP — the 'undervaluation' may really be a hidden bet that the whole market is cheap.", "quote": "sticking with a 4% equity risk premium during a crisis, when the implied risk premium has surged to 6% will lead you to find most companies to be undervalued, almost entirely because you think that the market is undervalued (not the company)", "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": true}, {"claim": "A properly market-neutral company valuation requires using the current implied equity risk premium, isolating the analyst's view on the company from any view on whether the broader market is over- or under-priced.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Adopt current implied ERP as a discipline to separate stock-picking skill from macro market-timing calls in any DCF-based process.", "quote": null, "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": false}, {"claim": "Every debate about whether the overall market is overpriced or underpriced can be reframed as a debate about whether the current implied equity risk premium is too low (overpricing), too high (underpricing), or fairly set relative to history.", "speaker": "Aswath Damodaran", "type": "framework", "entities": [], "conviction": "high", "so_what": "Use implied ERP versus its historical range as a single consolidated 'is the market cheap or expensive' metric instead of juggling PE ratios, dividend yields, and earnings yields separately.", "quote": null, "locator": "Equity Risk Premiums - Lessons Learned", "quote_verified": false}]}, {"theme": "The 2025-26 'too sanguine about catastrophic risk' call", "insights": [{"claim": "At the start of 2026, Damodaran concluded that while US stocks looked richly priced on conventional metrics (high PE ratios, low dividend yields), the implied equity risk premium was actually in line with what US stocks have generated on average over the last 65 years — i.e., the market was not obviously overpriced through the ERP lens.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["S&P 500"], "conviction": "high", "so_what": "PE ratios and dividend yields alone overstate how 'expensive' the market looks; the ERP-based read at start of 2026 argued against a market that was priced for a bubble.", "quote": null, "locator": "My conclusion, at the start of 2026", "quote_verified": false}, {"claim": "Despite that reassuring ERP reading, Damodaran flagged 2025 as tumultuous — tariffs dominating headlines and the post-war dollar-centric global economic system starting to fray — and argued the market seemed too sanguine about catastrophic (tail) risk; weeks later, a Middle East war broke out and US equities and bonds struggled to price the resulting oil-price shock.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": [], "conviction": "medium", "so_what": "A market whose implied ERP looks 'normal' on average can still be underpricing tail/geopolitical risk specifically; investors should separately stress-test for catastrophic scenarios even when average-case ERP looks fine.", "quote": "the market seems to be too sanguine about catastrophic risk", "locator": "My conclusion, at the start of 2026", "quote_verified": true}]}, {"theme": "Small-cap premium is a zombie factor", "insights": [{"claim": "The small-cap premium, a widely used valuation add-on derived from mining historical US return data (1926-2025), has not only been statistically noisy over the full period but has effectively disappeared entirely since 1981.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "Analysts still tacking a small-cap premium onto discount rates for small companies are applying an effect with roughly 45 years of no supporting evidence; challenge or drop this adjustment.", "quote": null, "locator": "Historical Equity Risk Premiums (and spin offs)", "quote_verified": false}, {"claim": "The continued use of the small-cap premium in practice despite the evidence against it is, in Damodaran's view, a textbook case of how once a bad practice becomes embedded in valuation, it never leaves.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "Treat entrenched valuation conventions (premiums, rules of thumb) as sticky by default regardless of evidence — inertia, not efficacy, often explains their survival.", "quote": "once bad practices become embedded in valuation, they never leave", "locator": "Historical Equity Risk Premiums (and spin offs)", "quote_verified": true}]}, {"theme": "Which ERP measure actually predicts returns", "insights": [{"claim": "Testing the predictive efficacy of different ERP measures against actual subsequent stock returns, the implied equity risk premium shows the strongest positive correlation with returns over 5-year and 10-year horizons, while the historical risk premium performs worst, correlating in the wrong direction (actual returns rise when historical ERP falls, and vice versa).", "speaker": "Aswath Damodaran", "type": "data_point", "entities": [], "conviction": "high", "so_what": "For long-horizon return forecasting or strategic asset allocation, weight implied ERP over historical ERP as the input signal.", "quote": null, "locator": "Efficacy of ERP Estimates", "quote_verified": false}, {"claim": "None of the equity risk premium approaches — implied or historical — forecasts next year's actual stock market return well, and even at 5-year and 10-year horizons the prediction errors remain significant.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "Investors trying to time markets over a 1-year horizon using ERP signals are working with a tool that has essentially no short-term predictive power; don't overweight ERP-based short-term market-timing calls.", "quote": null, "locator": "Efficacy of ERP Estimates", "quote_verified": false}]}], "insight_total": 21, "top_entities": ["S&P 500", "Ibbotson Associates", "Duff and Phelps", "Kroll", "Credit Suisse Yearbook", "Brexit", "VIX"], "source_meta": {"author": "Aswath Damodaran", "word_count": 2688, "paywalled": false}}, {"record_id": "c9439b41fc523f7b", "source_type": "concepts", "source_name": "Aswath Damodaran", "source_url": "https://aswathdamodaran.blogspot.com/2026/02/data-update-4-for-2026-global.html", "title": "Data Update 4 for 2026: The Global Perspective!", "published_date": "2026-02-02", "language": "en", "processed_at": "2026-07-08T14:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics", "Positioning"], "gist": "Damodaran's global data update argues US equity dominance is slipping (47% of world market cap but only 38% of 2025's gain), reframes country risk through a corporate-life-cycle lens, shows sovereign ratings lag reality versus CDS markets, and lays out his post-US-downgrade equity risk premium and currency-based riskfree rate methodology.", "themes": [{"theme": "Global equity shift and diversification", "insights": [{"claim": "US equities returned 17.72% in 2025 while the US dollar weakened by more than 7% during the year, so the currency move materially changed how attractive US returns looked to non-dollar investors.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US equities", "US dollar"], "conviction": "high", "so_what": "A weak dollar can erase much of a strong US equity return for foreign holders, arguing for hedging or currency-aware allocation decisions.", "quote": null, "locator": "Global Equties in 2025", "quote_verified": false}, {"claim": "India was the worst-performing sub-region in 2025 with dollar returns of only 3.31%, driven by both a below-average local return (Sensex up 8.55%) and rupee depreciation, confirming Damodaran's earlier view that the India growth story would face a rockier path than its bulls expected.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["India", "Sensex", "rupee"], "conviction": "medium", "so_what": "Investors betting on the India growth narrative should expect currency drag and volatility, not a smooth compounding story.", "quote": null, "locator": "As I mentioned in my second data update, India was the worst performing", "quote_verified": false}, {"claim": "US equities held 47% of global market capitalization at the start of 2026, but the US captured only 38% of the total increase in global market cap during 2025, with Europe and China taking disproportionately large shares of the gain — early evidence that US market dominance is starting to slip.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["US equities", "Europe", "China"], "conviction": "medium", "so_what": "A widening gap between US market-cap share and US share of incremental gains is an early signal to watch for a slow rotation of capital toward Europe and China.", "quote": null, "locator": "Zeroing in on the aggregate market capitalization", "quote_verified": false}, {"claim": "The premature 'epitaph' many US investors and wealth advisors were writing for international diversification a year ago was wrong: two decades of US outperformance is not proof that global diversification is permanently obsolete, and even though S&P 500 firms get almost 60% of revenue abroad, 2025's US underperformance versus the rest of the world shows genuine international diversification still belongs in a prudent investor's toolkit.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["S&P 500", "international diversification"], "conviction": "high", "so_what": "Investors who abandoned non-US allocations on the 'US always wins' thesis should reconsider, since 2025 already broke the pattern.", "quote": "an epitaph for international diversification that many US investors, wealth advisors and market experts were starting to etch in stone even a year ago", "locator": "To close this section, I will unwrite", "quote_verified": true}]}, {"theme": "Country risk as a life-cycle problem", "insights": [{"claim": "Democracies create continuous, low-grade policy uncertainty because government turnover brings recurring policy change, while autocracies create near-term policy stability but carry a greater risk of catastrophic, wrenching uncertainty later on.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["political structure", "country risk"], "conviction": "medium", "so_what": "Investors should not treat 'stable autocracy' as inherently lower risk than 'noisy democracy' — the risk shows up on a different, longer time horizon.", "quote": null, "locator": "Political Structure", "quote_verified": false}, {"claim": "Corruption functions as an implicit tax on businesses exposed to it and also undercuts trust and willingness to follow rules more broadly, and a meaningful share of cross-country corruption differences comes from structures deliberately designed to encourage and reward it, not just culture.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["corruption", "country risk"], "conviction": "medium", "so_what": "Screening country risk on corruption should look at institutional/structural incentives, not just cultural reputation, since the former is what can change with policy.", "quote": null, "locator": "Corruption", "quote_verified": false}, {"claim": "Damodaran applies his corporate life-cycle framework to countries: young economies have high growth potential but more volatility and need strong governance to deliver on it; middle-aged economies get more stability but slower growth, with governance mattering less; and aging economies can stagnate or shrink outright as they lose competitive edge and their populations age.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["country risk", "corporate life cycle"], "conviction": "medium", "so_what": "Gives investors a structural lens for classifying countries beyond emerging/developed labels — matching governance and growth expectations to a country's economic 'age.'", "quote": null, "locator": "Young economies have higher growth potential", "quote_verified": false}, {"claim": "Damodaran suggests Trump's 2025 policy actions can be read, at least partly, as nostalgia for a past era when the US uniquely combined strong economic growth with stability, a pairing few other economies in history have matched — an application of his country-life-cycle lens to current US politics.", "speaker": "Aswath Damodaran", "type": "thesis", "entities": ["Trump", "United States"], "conviction": "exploratory", "so_what": "Frames US policy unpredictability (tariffs, etc.) as a structural symptom of a maturing economy trying to reclaim youthful growth, useful context for anticipating further nationalist/protectionist moves.", "quote": null, "locator": "it may be worth thinking about the Trump actions in 2025", "quote_verified": false}]}, {"theme": "Sovereign ratings lag reality; CDS moves faster", "insights": [{"claim": "Sovereign credit ratings focus almost entirely on default risk and can diverge sharply from broader political risk — Damodaran singles out Saudi Arabia as a country with low or no default risk yet large exposure to political risk.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["Saudi Arabia", "sovereign ratings"], "conviction": "medium", "so_what": "Investors should not use a country's credit rating as a proxy for overall political/business risk in the Middle East and similar cases — the two can decouple.", "quote": "have low or no default risk, but remain exposed to large political risks", "locator": "The sovereign ratings are focused almost entirely", "quote_verified": true}, {"claim": "Sovereign ratings are structurally slow to react to change: Argentina and Venezuela saw significant shifts in governance and politics over the past year, yet their agency ratings have not changed or barely changed.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["Argentina", "Venezuela", "sovereign ratings"], "conviction": "high", "so_what": "Ratings-based country risk measures can be stale during fast-moving political change, so investors should cross-check with faster market-based signals like CDS.", "quote": null, "locator": "The sovereign ratings have their share of biases", "quote_verified": false}, {"claim": "The 2025 US sovereign ratings downgrade was the most attention-grabbing ratings change of the year; markets largely absorbed it calmly, but it forced Damodaran to alter his own equity risk premium estimation process.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["United States", "sovereign ratings"], "conviction": "high", "so_what": "Even a 'calmly absorbed' US downgrade has downstream effects on standard valuation inputs (equity risk premiums) used across the industry.", "quote": null, "locator": "There were a few ratings changes in 2025", "quote_verified": false}, {"claim": "For the roughly 80 countries with a sovereign CDS market, default spreads are market-priced and update faster than agency ratings; both Argentina and Venezuela CDS-implied spreads improved in 2025, moving from effectively uninsurable to merely very costly to insure.", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Argentina", "Venezuela", "sovereign CDS"], "conviction": "medium", "so_what": "CDS spreads are a more timely alternative to ratings for tracking fast-changing country risk in real time, useful for EM debt/equity positioning.", "quote": null, "locator": "For the 80 countries where sovereign CDS exist", "quote_verified": false}]}, {"theme": "Equity risk premium methodology after the US downgrade", "insights": [{"claim": "Because of the US sovereign ratings downgrade, Damodaran no longer uses the S&P 500's implied equity risk premium directly as the 'mature market' premium; he now strips out the US's own default spread (0.23%) from it, arriving at a mature market equity risk premium of 4.23% as of early 2026.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["S&P 500", "United States", "equity risk premium"], "conviction": "high", "so_what": "Anyone using Damodaran-style ERP inputs in DCF models should adopt the revised 4.23% mature-market baseline rather than the old raw S&P 500 implied premium.", "quote": null, "locator": "It is undeniable that the ratings downgrade for the US", "quote_verified": false}, {"claim": "Country-level equity risk premiums are built by scaling each country's ratings-based default spread up for equities' relative riskiness and adding it to the 4.23% mature-market premium, with frontier (unrated) countries folded in via country risk scores instead of ratings.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["equity risk premium", "country risk"], "conviction": "high", "so_what": "Gives a replicable, updated method for estimating discount rates for any country, including unrated frontier markets, as of start-2026 data.", "quote": null, "locator": "To get to country risk premiums for individual countries", "quote_verified": false}]}, {"theme": "Currency and riskfree rate construction", "insights": [{"claim": "Government bond rates should not be used directly as riskfree rates, contrary to what standard finance textbooks teach, because governments do sometimes default on local-currency bonds rather than devalue; the default-risk component must be stripped out of the government bond rate first.", "speaker": "Aswath Damodaran", "type": "contrarian", "entities": ["riskfree rate", "government bonds"], "conviction": "high", "so_what": "Practitioners using raw local government bond yields as riskfree rates in valuation are overstating true riskfree rates by embedding default risk.", "quote": null, "locator": "In many finance classes and textbooks", "quote_verified": false}, {"claim": "After removing default risk, riskfree rates vary widely across currencies primarily due to differences in expected inflation: very low for Swiss Franc, Japanese yen and Thai Baht; moderate for US dollar and Euro; and very high for Turkish Lira and Zambian Kwacha.", "speaker": "Aswath Damodaran", "type": "causal", "entities": ["Swiss Franc", "Japanese yen", "Thai Baht", "Turkish Lira", "Zambian kwacha"], "conviction": "high", "so_what": "Currency selection for financing/discounting should account for embedded inflation expectations, not just nominal rate levels.", "quote": null, "locator": "After this clean-up, you can see that riskfree rates vary widely", "quote_verified": false}, {"claim": "Damodaran predicts it is unlikely US treasury bond rates will drop much below 4% as long as inflation keeps running hot in the 2.5-3% range, and he extends this same inflation-differential logic to build riskfree rate estimates in any currency, even those without a local-currency government bond.", "speaker": "Aswath Damodaran", "type": "prediction", "entities": ["US treasury", "riskfree rate", "inflation"], "conviction": "medium", "so_what": "A floor near 4% on US treasuries under sustained inflation is a concrete rate-path view relevant to duration positioning and discount-rate assumptions.", "quote": "unlikely that you will see US treasury bond rates drop much below 4%, at least as long as inflation runs hot (2.5-3%)", "locator": "The logic that I used to argue", "quote_verified": true}, {"claim": "Worked example: the Egyptian pound riskfree rate at the start of 2026 is derived as the US dollar riskfree rate (3.95%, i.e. the 4.18% US 10-year Treasury rate minus the 0.23% US default spread) plus the inflation differential between Egypt (7.78%) and the US (2.24%), yielding approximately 9.49% (9.58% on a compounded basis).", "speaker": "Aswath Damodaran", "type": "data_point", "entities": ["Egyptian pound", "US Treasury", "Egypt"], "conviction": "high", "so_what": "Provides a replicable template for deriving a local-currency riskfree rate anywhere using only a US Treasury rate and two inflation forecasts.", "quote": null, "locator": "To illustrate, I will try to estimate an Egyptian pound", "quote_verified": false}]}, {"theme": "Currency invariance and the real effect of inflation on value", "insights": [{"claim": "Damodaran's 'currency invariance theorem' holds that the value of a project or company should not change merely because the analysis is redone in a different currency, as long as inflation assumptions are applied consistently to both cash flows and discount rates — a positive-NPV project in dollars stays positive-NPV in Egyptian pounds, and an overvalued company stays overvalued.", "speaker": "Aswath Damodaran", "type": "framework", "entities": ["currency invariance theorem", "valuation"], "conviction":
