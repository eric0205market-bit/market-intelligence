 compounded with strained food and energy systems from the US-Iran war would amplify already record temperatures; at current 545,000 annual heat deaths and a projected $2T/year economic loss from heat by 2030, immediate action on heat early-warning systems and cooling infrastructure is urgent while the US federal preparedness apparatus is being dismantled.", "themes": [{"theme": "Super El Niño Risk Quantification", "insights": [{"claim": "NOAA has confirmed El Niño is already underway with a two-in-three chance it will grow into a 'Super El Niño' (sea surface temperatures 2.0°C+ above historical average) between November 2026 and January 2027—following eleven consecutive hottest years on record and coming at a time when food and energy systems are already strained from the US-Iran war.", "speaker": "Alice C. Hill", "type": "data_point", "entities": ["NOAA"], "conviction": "high", "so_what": "A Super El Niño in H2 2026 compounding the Iran-war energy/food shock creates a material tail risk for global supply chains, agricultural prices, and insurance losses—especially in tropical/developing economies.", "quote": "two-in-three chance that this pattern will grow very strong—into what is known as a 'Super El Niño'—between November 2026 and January 2027", "locator": "The National Oceanic and Atmospheric Administration (NOAA) has confirmed", "quote_verified": true}, {"claim": "Extreme heat already kills more than 545,000 people annually—a figure considered very conservative due to data gaps—and is the deadliest climate hazard, killing more than floods, fires, and hurricanes combined; without significant adaptation, heat is expected to cost the global economy more than $2 trillion annually by 2030 through lost productivity.", "speaker": "Alice C. Hill", "type": "data_point", "entities": [], "conviction": "high", "so_what": "The $2T/year heat productivity loss estimate by 2030 is an investment-grade macro risk; sectors exposed to outdoor labor (construction, agriculture, logistics) and cooling demand (HVAC, energy) are directly affected.", "quote": "Without significant adaptation, heat is expected to cost the global economy more than $2 trillion annually by 2030 through lost productivity.", "locator": "Extreme heat is the deadliest climate hazard", "quote_verified": true}, {"claim": "The 1997–98 El Niño caused $5.7 trillion in global income losses according to a 2023 Science paper, with consequences particularly severe in poorer tropical regions—suggesting the coming Super El Niño could generate losses of comparable or greater magnitude given baseline warming.", "speaker": "Alice C. Hill", "type": "data_point", "entities": [], "conviction": "medium", "so_what": "The $5.7T benchmark for the 1997-98 El Niño provides a lower-bound reference for potential 2026-27 impacts given higher baseline temperatures; emerging market sovereign and corporate credit in tropical regions is at elevated risk.", "quote": "a paper published in the journal Science in 2023 showing that the 1997–98 El Niño caused $5.7 trillion in global income losses", "locator": "Studies have found that the economic damage from El Niño", "quote_verified": true}]}, {"theme": "Policy Response and Preparedness Gaps", "insights": [{"claim": "France introduced a Heat Early Warning System after the 2003 heatwave that killed tens of thousands; that HEWS achieved 68% lower deaths than expected during a major subsequent heatwave—demonstrating that well-designed early warning systems have proven, large-scale mortality impact.", "speaker": "Alice C. Hill", "type": "data_point", "entities": [], "conviction": "high", "so_what": "HEWS are among the highest-ROI public health investments; governments in heat-exposed markets that lack national heat warning systems are carrying preventable mortality risk that can be substantially reduced at modest cost.", "quote": "the government introduced a HEWS that helped achieve 68 percent lower deaths than expected during a major heatwave three years later", "locator": "France's deadly 2003 heatwave", "quote_verified": true}, {"claim": "Under the Trump administration, US federal heat preparedness is actively eroding: proposed and enacted cuts to NOAA research capacity, sidelining of permanent federal outdoor worker heat regulations, shrinkage of city adaptation grants, and cancellation of NIHHIS Centers of Excellence—dismantling the 2024-2030 National Heat Strategy framework.", "speaker": "Alice C. Hill", "type": "data_point", "entities": ["NOAA", "NIHHIS", "Trump"], "conviction": "high", "so_what": "US federal retreat from heat preparedness increases downside risk for the 2026–2027 El Niño cycle; US cities and states relying on federal infrastructure will be more vulnerable, increasing local government liability exposure.", "quote": null, "locator": "Under the Trump administration, this foundation is now eroding.", "quote_verified": false}, {"claim": "A parametric heat insurance program launched by HERA and India's Self-Employed Women's Association in 2023 provides automatic payouts to informal economy workers when temperatures cross a set threshold, without waiting for damage assessments—a model that has since expanded to other countries including the United States.", "speaker": "Alice C. Hill", "type": "anecdote", "entities": ["HERA"], "conviction": "high", "so_what": "Parametric heat insurance for informal workers is a scalable financial inclusion product that addresses both mortality and economic vulnerability; the expansion to the US signals a growing commercial market for climate parametric insurance.", "quote": null, "locator": "a parametric heat insurance program launched in a partnership between the non-governmental organization HERA", "quote_verified": false}, {"claim": "Only a handful of countries have developed national strategies to address heat as a systemic health and economic risk; the UK's National Heat Risk Commission is cited as a leading example, while hundreds of cities have heat action plans without national coordination frameworks in most countries.", "speaker": "Alice C. Hill", "type": "data_point", "entities": ["United Kingdom"], "conviction": "high", "so_what": "The gap between city-level adaptation and national heat governance is a policy risk that translates into economic and public health exposure—countries without national frameworks will underperform on heat mortality metrics during the coming El Niño.", "quote": null, "locator": "few governments have established comprehensive national frameworks", "quote_verified": false}]}], "insight_total": 7, "top_entities": ["NOAA", "NIHHIS", "HERA", "United Kingdom", "France"], "source_meta": {"author": "Alice C. Hill", "word_count": 1706, "paywalled": false}}, {"record_id": "46f0beb70496bc8a", "source_type": "concepts", "source_name": "Gavekal Research", "source_url": "https://research.gavekal.com/teaser/britains-new-leader-could-bring-new-hope/", "title": "Britain's New Leader Could Bring New Hope", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro", "Geopolitics"], "gist": "Gavekal's Anatole Kaletsky turns contrarian on UK assets exactly one decade after Brexit, arguing Keir Starmer's near-certain removal—triggered by Labour's catastrophic local election losses and Andy Burnham's landslide victory in a Manchester by-election—marks an inflection point that justifies optimism for UK asset investors.", "themes": [{"theme": "UK Political Inflection and Asset Opportunity", "insights": [{"claim": "Gavekal argues Starmer's removal became 'near certain' after Labour suffered 'catastrophic losses' in nationwide local elections in early May 2026, followed by Andy Burnham's landslide win in a Manchester suburban by-election—making a new UK prime minister by September at the latest.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["Keir Starmer", "Andy Burnham", "Labour Party"], "conviction": "high", "so_what": "UK political uncertainty is resolving in a specific direction: a new Labour leader seen as more growth-oriented than Starmer, which markets may price as a modest positive for UK equities and gilts.", "quote": "The removal of Sir Keir Starmer, Britain's most unpopular prime minister since the start of modern polling, has been almost inevitable since early May", "locator": "The removal of Sir Keir Starmer", "quote_verified": true}, {"claim": "Gavekal's Kaletsky turns contrarian on UK assets exactly one decade after the Brexit referendum justified 'unalloyed pessimism'—arguing the current moment is appropriate to 'turn contrarian and offer some optimistic answers' to investors in UK assets.", "speaker": "Gavekal Research", "type": "contrarian", "entities": ["United Kingdom"], "conviction": "medium", "so_what": "Gavekal's contrarian inflection call on UK assets is a potential positioning signal; the Brexit discount that has persisted in UK equities relative to global peers may be starting to unwind.", "quote": "Exactly a decade after the Brexit referendum justified unalloyed pessimism about Britain, it now seems appropriate to turn contrarian", "locator": "Exactly a decade after the Brexit referendum", "quote_verified": true}]}], "insight_total": 2, "top_entities": ["Keir Starmer", "Andy Burnham", "Labour Party", "United Kingdom"], "source_meta": {"author": "", "word_count": 165, "paywalled": false}}, {"record_id": "7668823ca930bdbd", "source_type": "concepts", "source_name": "Gavekal Research", "source_url": "https://research.gavekal.com/teaser/indonesia-beats-the-count-for-now/", "title": "Indonesia Beats The Count, For Now", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro", "Geopolitics"], "gist": "Gavekal reports Indonesia avoided the knockout blow of losing MSCI Emerging Market status—preserving access to global investment mandates—but warns the recovery will prove short-lived unless policymakers change course domestically; the oil shock expanded Indonesia's fuel subsidies budget by IDR100 trillion above the IDR210 trillion baseline, stoking fiscal deterioration fears.", "themes": [{"theme": "Indonesia EM Status and Fiscal Vulnerability", "insights": [{"claim": "Indonesia avoided losing MSCI Emerging Market status following the oil shock, preventing a further wave of foreign capital outflows; staying in the EM index preserves Indonesian stocks in global investment mandates and provides a confidence boost.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["Indonesia", "MSCI"], "conviction": "high", "so_what": "Indonesia's EM index retention is a positive technical signal for Indonesian equities; however, the index threshold risk will persist until domestic policy credibility improves.", "quote": null, "locator": "Not least Indonesia, which after being hit hard by the oil crisis appears to have avoided the knockout blow", "quote_verified": false}, {"claim": "Indonesia's 2026 budget assumed energy subsidies of IDR210 trillion (~$11.8bn, ~1% of GDP) based on $70/bbl crude; after the Iran war started, the government expanded the subsidies budget by IDR100 trillion, sparking fears about Indonesia's deteriorating fiscal position.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["Indonesia"], "conviction": "high", "so_what": "Indonesia's fiscal buffer is being eroded by energy subsidies; if oil prices remain elevated, the subsidy expansion could force either painful subsidy cuts (inflationary) or fiscal slippage (credit negative)—a key near-term risk for Indonesian assets.", "quote": "The government budget for 2026 initially penciled in energy subsidies worth IDR210trn (US$11.8bn), about 1% of GDP, based on a crude oil price of US$70/bbl.", "locator": "the cost of fuel subsidies will fall dramatically", "quote_verified": true}, {"claim": "Gavekal argues the Indonesian recovery could prove short-lived if policymakers do not change tack at home—making domestic policy credibility the key determinant of whether the EM index retention translates into sustained asset price recovery.", "speaker": "Gavekal Research", "type": "thesis", "entities": ["Indonesia"], "conviction": "high", "so_what": "Indonesia EM relief rally is a trading opportunity, not an investment thesis, unless evidence of domestic policy reform emerges; watch for subsidy reform announcements and Bank Indonesia communications as leading indicators.", "quote": "the recovery could prove short-lived if policymakers do not change tack at home", "locator": "the recovery could prove short-lived", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["Indonesia", "MSCI"], "source_meta": {"author": "", "word_count": 181, "paywalled": false}}, {"record_id": "859d1360ae767085", "source_type": "concepts", "source_name": "Gavekal Research", "source_url": "https://research.gavekal.com/teaser/how-the-us-can-meet-ai-energy-demand/", "title": "How The US Can Meet AI Energy Demand", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Energy", "AI"], "gist": "Gavekal argues conventional wisdom is wrong that the US AI buildout will be slowed primarily by electricity scarcity—greater efficiency in grid management and storage could meet much of new AI-driven electricity demand over the next five years without requiring new power plants, making the grid bottleneck a solvable software and optimization problem rather than purely a generation problem.", "themes": [{"theme": "US AI Energy Constraint Is Overstated", "insights": [{"claim": "Gavekal argues the conventional wisdom that the US AI buildout will be slowed by electricity scarcity is wrong—greater efficiency in grid management and storage could meet much of the new AI-driven demand over the next five years, without building new power plants.", "speaker": "Gavekal Research", "type": "contrarian", "entities": [], "conviction": "medium", "so_what": "If Gavekal is right, the near-term investment opportunity is in grid optimization and storage software, not just generation capex—a different positioning than the prevailing 'build more power plants' consensus for AI infrastructure.", "quote": "there is a lot the US can do to squeeze more juice out of the current infrastructure. Greater efficiency in grid management and storage could meet much of the new AI-driven demand over the next five years.", "locator": "But aside from building new power plants", "quote_verified": true}, {"claim": "AI data centers are 'suddenly adding a lot of new electricity demand on a system that has not grown in two decades'—the constraint is connecting new data centers to the electric grid, not energy availability per se.", "speaker": "Gavekal Research", "type": "data_point", "entities": [], "conviction": "high", "so_what": "The grid interconnection bottleneck—not power generation—is the binding constraint for US AI expansion; companies and investors focused only on power generation are solving the wrong problem.", "quote": "AI data centers are suddenly adding a lot of new electricity demand on a system that has not grown in two decades", "locator": "Solving the power constraint is indeed a problem", "quote_verified": true}]}], "insight_total": 2, "top_entities": [], "source_meta": {"author": "", "word_count": 149, "paywalled": false}}, {"record_id": "90e533d1229ffa33", "source_type": "concepts", "source_name": "Gavekal Research", "source_url": "https://research.gavekal.com/teaser/chinese-models-and-the-us-ai-boom/", "title": "Chinese Models And The US AI Boom", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["AI", "Geopolitics"], "gist": "Gavekal's Will Denyer argues that Z.ai's GLM-5.2 model—which nearly matches Anthropic and OpenAI while outperforming Google—and Microsoft's consideration of adding DeepSeek to Copilot confirm Chinese AI is now a front-line competitor with 'far reaching' implications for US and global equities.", "themes": [{"theme": "Chinese AI as Front-Line Competitor", "insights": [{"claim": "Z.ai's GLM-5.2 model almost matches the latest models from Anthropic and OpenAI, and outperforms Google's top model—described as the most impressive Chinese challenge yet to US dominance in artificial intelligence.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["Z.ai", "Anthropic", "OpenAI", "Google"], "conviction": "high", "so_what": "Chinese AI has crossed a performance threshold that makes it a credible substitute for US frontier models; companies and investors treating Chinese AI as inferior face a structural mispricing risk.", "quote": "the new model from Beijing-based and Hong Kong-listed Z.ai (formerly Zhipu AI) almost matches the latest models from Anthropic and OpenAI, and outperforms Google's top model", "locator": "With the launch of its GLM-5.2 model", "quote_verified": true}, {"claim": "Microsoft is considering adding models from China's DeepSeek to its Copilot offerings, betting that many consumers will favor 'cheap good-enough' models over more expensive leading-edge products.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["Microsoft", "DeepSeek"], "conviction": "medium", "so_what": "If Microsoft integrates DeepSeek into Copilot, it validates the 'good-enough AI' commoditization thesis and materially threatens the premium pricing power of US frontier model providers like OpenAI and Anthropic.", "quote": "Microsoft is considering adding models from China's DeepSeek to its Copilot offerings. If it does, it will be betting that many consumers will favor cheap good-enough models over more expensive leading-edge products.", "locator": "At the same time, Microsoft is considering", "quote_verified": true}, {"claim": "Together the GLM-5.2 launch and potential Microsoft/DeepSeek integration confirm that Chinese AI is now a 'front-line competitor' with implications for US and global equities that Gavekal describes as 'far reaching'.", "speaker": "Gavekal Research", "type": "thesis", "entities": ["Z.ai", "DeepSeek", "Microsoft"], "conviction": "high", "so_what": "The investment implications span multiple equity groups: AI hardware suppliers (demand destruction from cheaper models), US software vendors (pricing pressure), and Chinese tech firms (rerating higher); Gavekal's framing suggests these are non-trivial portfolio reallocations.", "quote": "Together, these two developments confirm that Chinese AI is now a front-line competitor. The implications for US and global equities are far reaching.", "locator": "Together, these two developments confirm", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["Z.ai", "Anthropic", "OpenAI", "Google", "Microsoft", "DeepSeek"], "source_meta": {"author": "Will Denyer", "word_count": 147, "paywalled": false}}, {"record_id": "a1076938cc1578ea", "source_type": "concepts", "source_name": "Gavekal Research", "source_url": "https://research.gavekal.com/teaser/corporate-profit-growth-returns/", "title": "Corporate Profit Growth Returns", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro", "AI"], "gist": "Gavekal Dragonomics' Thomas Gatley reports China's corporate profits surged abruptly in early 2026 from the confluence of the global AI investment boom and windfall oil-and-gas earnings from the Iran war energy shock—but expects profits to cool in H2 as the oil windfall ends, while the AI-driven growth continues.", "themes": [{"theme": "China Corporate Profit Cycle: AI Boom Plus Iran War Windfall", "insights": [{"claim": "After little growth from 2023 to 2025 (2–3% per year), China's corporate profits surged abruptly in early 2026 driven by the global AI investment boom and windfall earnings in the oil and gas sector from the Iran war energy price shock.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["China"], "conviction": "high", "so_what": "China's profit cycle has inflected sharply higher on a dual-driver basis (AI + energy windfall); this supports Chinese equity earnings revisions to the upside—but investors need to decompose the drivers since one (oil windfall) is transitory.", "quote": "China's corporate profits have started off 2026 with an abrupt surge, thanks to a combination of the global investment boom in artificial intelligence and windfall earnings from the energy-price shock during the Iran war.", "locator": "After years of little growth", "quote_verified": true}, {"claim": "Chinese mainland and Hong Kong-listed industrial and services firms (~5,000 total) posted 40% revenue growth in 2021-22, but that pace slowed to just 2-3% per year from 2023 to 2025.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["China"], "conviction": "high", "so_what": "The 2021-22 boom was a post-COVID demand surge that has since normalized; the new 2026 acceleration is structurally different (AI-driven capex + oil windfall), not a replay of the pandemic recovery.", "quote": "mainland and Hong Kong-listed industrial and services-sector firms—numbering about 5,000 in total, excluding financial and real-estate companies—posted 40% revenue growth, while sales among the roughly half a million firms included in the official industrial survey rose 30%. But that pace slowed to a crawl from 2023 to 2025, rising by only about 2-3% per year.", "locator": "Chinese companies enjoyed a phenomenal two-year run in 2021 and 2022", "quote_verified": true}, {"claim": "Gavekal expects China's profit growth to cool in H2 2026 as the oil-and-gas windfall ends, but still come in stronger for the full year; the AI boom is expected to continue while domestic demand remains weak.", "speaker": "Gavekal Research", "type": "thesis", "entities": ["China"], "conviction": "high", "so_what": "China corporate earnings have a clear H1/H2 bifurcation risk: overweight companies with AI exposure (durable driver) and underweight those whose 2026 earnings are oil-windfall-driven; the H2 deceleration is already telegraphed by Gavekal.", "quote": "growth in China's corporate profits will cool off in the second half of the year, but will still come in stronger this year.", "locator": "The net result is that", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["China"], "source_meta": {"author": "Thomas Gatley", "word_count": 202, "paywalled": false}}, {"record_id": "6c8248d047035b8e", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/06/the-new-york-fed-dsge-model-forecast-june-2026/", "title": "The New York Fed DSGE Model Forecast—June 2026", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro"], "gist": "The NY Fed's DSGE model revised 2026 core PCE inflation sharply upward from 2.4% to 3.1%—attributing the miss to tariff and energy (mark-up) shocks viewed as transient—while simultaneously upgrading the output outlook due to positive AI investment (MEI) shocks, and raising the short-run real natural rate r* by 10 basis points to 2.0% for 2026.", "themes": [{"theme": "NY Fed DSGE: Stagflationary Miss Partially Offset by AI Investment Boom", "insights": [{"claim": "The NY Fed DSGE model revised 2026 core PCE inflation from 2.4% to 3.1% (Q4/Q4), attributing the forecast error to 'mark-up shocks' that may capture the effects of both tariff and energy shocks—but the model treats these as transient, with inflation forecasts largely unchanged for 2027 onward.", "speaker": "NY Fed — Liberty Street Economics", "type": "data_point", "entities": ["Federal Reserve"], "conviction": "high", "so_what": "The DSGE's tariff/energy inflation attribution with a 'transient' label is key: if the model is right, the current inflation spike does not justify sustained Fed tightening—a dovish read for rates despite the upward revision.", "quote": "the model revised its inflation forecasts upward in 2026, from 2.4 to 3.1 percent. The DSGE attributes the forecast error to mark-up shocks, which may capture the effects of both tariff and energy shocks. The model views the impact of these shocks as vanishing by the end of the year", "locator": "the SPF turns out to be correct", "quote_verified": true}, {"claim": "The DSGE model is more upbeat on output than in March, seeing positive 'marginal efficiency of investment' (MEI) shocks from the AI-related boom pushing output up especially in 2026—though adverse markup shocks are expected to push down growth in the future. GDP growth forecast: 1.2% (Q4/Q4) for 2026.", "speaker": "NY Fed — Liberty Street Economics", "type": "data_point", "entities": ["Federal Reserve"], "conviction": "high", "so_what": "The DSGE explicitly models AI as a positive investment shock lifting near-term output; this provides formal quantitative validation for the view that AI capex is already boosting US growth in 2026, even as the model sees future headwinds from markup shocks.", "quote": "The model does see the positive growth effect of the AI-related boom in investment—positive MEI (marginal efficiency of investment) shocks push output up, especially in 2026", "locator": "On the output front", "quote_verified": true}, {"claim": "The DSGE model raised its estimate of the short-run real natural rate of interest (r*) by 0.1 percentage point relative to March, to 2.0%, 1.7%, and 1.3% for 2026, 2027, and 2028 respectively, partly reflecting higher total factor productivity (TFP).", "speaker": "NY Fed — Liberty Street Economics", "type": "data_point", "entities": ["Federal Reserve"], "conviction": "high", "so_what": "Rising r* estimates driven by higher TFP (partially AI-related) imply a structurally higher neutral rate—supporting the view that the Fed may need to keep rates higher for longer even after transient inflation fades; this is bearish for rate-sensitive assets.", "quote": "The model's predictions for the short-run real natural rate of interest (r*) increased by 0.1 percentage point relative to March (2.0, 1.7, and 1.3 percent for 2026, 2027, and 2028, versus 1.9, 1.6, and 1.3 percent), partly reflecting higher total factor productivity (TFP).", "locator": "Projections for the short-run real natural rate", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["Federal Reserve"], "source_meta": {"author": "Marco Del Negro, Keshav Dogra, Elena Elbarmi, Donggyu Lee, Michael Pham", "word_count": 1112, "paywalled": false}}, {"record_id": "b7e91cbc95107f73", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/06/", "title": "June 2026 - Liberty Street Economics", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro"], "gist": "The NY Fed Liberty Street Economics June 2026 index covers four research findings: remote work explains 64% of the rise in youth unemployment (not generative AI); interest rate caps reallocate credit away from risky borrowers without improving their delinquencies; regional small businesses in the NY metro area are severely pessimistic about 2026; and synthetic stablecoins transmitted and amplified the Oct 10 tariff shock across crypto markets.", "themes": [{"theme": "Remote Work, Rate Caps, and Regional Economy", "insights": [{"claim": "NY Fed research finds that remote work can explain 64% of the recent increase in unemployment among young college graduates—and that remote work, not generative AI, explains the bulk of the rise in youth unemployment, because remote arrangements make it harder for managers to train and mentor new employees.", "speaker": "Natalia Emanuel, Emma Harrington, Amanda Pallais", "type": "data_point", "entities": [], "conviction": "high", "so_what": "The AI-is-displacing-youth narrative is overstated; the dominant driver of youth unemployment is structural (remote work + training friction), not automation—repositioning the policy and investment debate toward office/hybrid work design rather than AI job displacement.", "quote": "We estimate that remote work can explain 64 percent of the recent increase in unemployment among young college graduates. Further, the timing of this surge suggests that remote work—not generative AI—explains the bulk of the rise in youth unemployment.", "locator": "Remote Work Leaves Younger Workers Sidelined", "quote_verified": true}, {"claim": "State-level interest rate caps on consumer loans lead riskier borrowers to face credit rationing—but despite taking on less debt, these borrowers did not experience an improvement in delinquencies, and lenders reallocate credit to somewhat safer borrowers instead.", "speaker": "Rajashri Chakrabarti, Gabriel Leonard, Donald P. Morgan, Thu Pham, Lee Seltzer", "type": "data_point", "entities": [], "conviction": "high", "so_what": "Interest rate caps have the perverse effect of excluding risky borrowers from credit without improving their financial health—relevant to state-level consumer lending regulation debates and to investors assessing alternative credit providers' exposure to cap-related revenue loss.", "quote": "loan balances for the riskiest borrowers declined substantially relative to counterparts in states without caps. Despite taking on less debt, these borrowers did not experience an improvement in delinquencies.", "locator": "The Unintended Effects of Interest Rate Caps", "quote_verified": true}, {"claim": "Small businesses in the NY/NJ/CT Second District reported severe declines in employment and revenue growth in 2025 and became more pessimistic about 2026, significantly underperforming national small businesses which saw stable revenues and shallower expectation declines.", "speaker": "Will Aarons, Asani Sarkar", "type": "data_point", "entities": [], "conviction": "high", "so_what": "The NY metro area small business picture is materially worse than national trends—a leading indicator for regional employment and consumer spending that could weigh on NY-area banks' loan quality and local government revenues.", "quote": "regional small businesses reported severe declines in employment and revenue growth in 2025 and became more pessimistic about growth in 2026", "locator": "Struggling Regional Small Businesses", "quote_verified": true}]}], "insight_total": 3, "top_entities": [], "source_meta": {"author": "", "word_count": 879, "paywalled": false}}, {"record_id": "c9d549e173d300c8", "source_type": "concepts", "source_name": "NY Fed — Liberty Street Economics", "source_url": "https://libertystreeteconomics.newyorkfed.org/2026/06/synthetic-stablecoins-and-financial-stability/", "title": "Synthetic Stablecoins and Financial Stability", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Crypto", "Macro"], "gist": "NY Fed researchers document how the Oct 10 2025 tariff shock was transmitted and amplified through synthetic stablecoins—specifically Ethena's USDe, which peaked at ~$15B and then contracted more than 13% in a self-reinforcing deleveraging spiral—and warn that growing crypto-TradFi linkages (US crypto ETFs ~$95B) make such episodes increasingly relevant to systemic financial stability.", "themes": [{"theme": "Synthetic Stablecoin Mechanics and Systemic Risk", "insights": [{"claim": "Synthetic stablecoins like Ethena's USDe maintain their dollar peg not through fiat reserves but through financial engineering: a long position in staked ether (stETH) combined with an offsetting short in ether perpetual futures. The yield is the sum of staking rewards and positive funding rates.", "speaker": "Pablo D. Azar, Jeff Garofano", "type": "framework", "entities": ["Ethena"], "conviction": "high", "so_what": "The synthetic stablecoin peg mechanism is inherently fragile: it depends on continuous positive funding rates and liquid derivatives markets—conditions that can rapidly reverse in risk-off environments, creating endogenous instability that fiat-backed stablecoins avoid.", "quote": "Each minted coin represents a matched position: long staked ether (ETH) and short perpetual futures. The Ethena DeFi protocol earns the sum of staking rewards and any funding rate income from the short position.", "locator": "Synthetic stablecoins rely on this structure", "quote_verified": true}, {"claim": "Between early 2024 and mid-2025, Ethena's USDe supply expanded to nearly $15 billion, making it the third-largest stablecoin by market cap (after Tether's USDT and Circle's USDC)—driven by strong inflows seeking the high yield from staking plus positive funding rates.", "speaker": "Pablo D. Azar, Jeff Garofano", "type": "data_point", "entities": ["Ethena", "Tether", "Circle"], "conviction": "high", "so_what": "USDe's growth to $15B made it systemically significant enough to transmit shocks to the broader crypto market; investors and regulators who ignored synthetic stablecoins as niche underestimated their amplification potential.", "quote": "Between early 2024 and mid‑2025, Ethena's total supply expanded to nearly $15 billion, reflecting strong inflows of collateral and speculative demand for the high yields. By August 2025, Ethena had become the third-largest stablecoin by market capitalization", "locator": "As long as that sum remains positive", "quote_verified": true}, {"claim": "On October 10, 2025, the announcement of a potential additional 100% tariff on Chinese goods triggered a risk-off shock; the yield spread between USDe and ether staking turned negative, causing a forced deleveraging spiral—USDe market cap contracted more than 13% as investors raced for exits, forcing Ethena to close short futures and sell ether collateral simultaneously.", "speaker": "Pablo D. Azar, Jeff Garofano", "type": "causal", "entities": ["Ethena"], "conviction": "high", "so_what": "The Oct 10 event reveals a specific transmission channel: tariff policy shock → crypto risk-off → negative funding rates → synthetic stablecoin forced redemptions → ether spot sell pressure → broader crypto deleveraging; understanding this chain is essential for crypto risk management.", "quote": "USDe's market capitalization contracted by more than 13 percent following a sharp funding-rate reversal, as the spread between its yield and ether staking turned negative and investors raced for the exits.", "locator": "As a result of this unwinding", "quote_verified": true}, {"claim": "On Binance, USDe prices briefly fell to $0.65 despite on-chain peg integrity elsewhere, because Binance's price oracle referenced its own price feed—creating a procyclical de-peg for several hours that amplified the crisis.", "speaker": "Pablo D. Azar, Jeff Garofano", "type": "data_point", "entities": ["Binance", "Ethena"], "conviction": "high", "so_what": "Oracle fragmentation creates a liquidity stratification risk within crypto markets: the same stablecoin can simultaneously hold its peg on-chain and de-peg sharply on centralized exchanges—a critical distinction for risk modeling and regulatory design.", "quote": "On the centralized exchange Binance, where USDe trading was thinner, prices briefly fell to US $0.65 despite on-chain peg integrity elsewhere.", "locator": "The timing of these flows mattered", "quote_verified": true}, {"claim": "Fiat-backed stablecoins USDT and USDC both maintained their dollar peg during the USDe deleveraging episode; USDC lost $280 million in market cap and USDT gained a nearly equivalent $282 million—suggesting a flight-to-quality within stablecoins during crypto stress events.", "speaker": "Pablo D. Azar, Jeff Garofano", "type": "data_point", "entities": ["Tether", "Circle"], "conviction": "high", "so_what": "USDT and USDC function as safe havens within the crypto ecosystem during synthetic stablecoin stress events; this supports a tiered risk framework for stablecoins where fiat-backed instruments are materially more resilient than yield-engineered alternatives.", "quote": "Circle's USDC lost $280 million in market cap that day and Tether's USDT gained a nearly equivalent $282 million, while both maintained their dollar targets.", "locator": "the market-leading, asset-backed stablecoins of Tether's USDT and Circle's USDC", "quote_verified": true}, {"claim": "The total market cap of US Bitcoin, Ether, and Solana ETFs is now approximately $95 billion, and tokenized Treasury funds bring short-term government debt directly onto public blockchains—deepening crypto-TradFi linkages such that synthetic stablecoin crises increasingly have the potential to transmit volatility to traditional financial markets.", "speaker": "Pablo D. Azar, Jeff Garofano", "type": "thesis", "entities": [], "conviction": "high", "so_what": "The systemic risk from synthetic stablecoins is not contained to crypto: $95B in crypto ETFs and growing tokenized Treasuries create direct TradFi exposure; regulators and investors treating crypto as a separate silo face mounting basis risk as the systems converge.", "quote": "The total market capitalization of U.S. Bitcoin, Ether, and Solana ETFs is now around $95 billion. Tokenized Treasury funds bring short-term government debt directly onto public blockchains", "locator": "These types of crises are increasingly relevant to policymakers", "quote_verified": true}]}], "insight_total": 6, "top_entities": ["Ethena", "Tether", "Circle", "Binance"], "source_meta": {"author": "Pablo D. Azar, Jeff Garofano", "word_count": 1804, "paywalled": false}}, {"record_id": "ca833615d5d5b16a", "source_type": "concepts", "source_name": "Oxford Economics", "source_url": "https://www.oxfordeconomics.com/resource/yield-curve-likely-to-steepen-as-the-uk-changes-prime-minister-again/", "title": "Yield curve likely to steepen as the UK changes prime minister again", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro", "Geopolitics"], "gist": "Oxford Economics expects the UK gilt yield curve to steepen in coming months as Andy Burnham—the clear favourite to replace Starmer as PM by September—is perceived to favour looser fiscal policy, and pre-election tightening embedded in current fiscal plans is expected to be watered down.", "themes": [{"theme": "UK Political Transition and Yield Curve Steepening", "insights": [{"claim": "Keir Starmer's resignation means the UK will have a new Prime Minister by September at the latest, with Andy Burnham as the clear favourite; Oxford Economics does not plan major changes to its July baseline forecast given the unlikely time to develop a detailed policy platform before the autumn budget.", "speaker": "Oxford Economics", "type": "data_point", "entities": ["Andy Burnham", "Keir Starmer", "United Kingdom"], "conviction": "high", "so_what": "Oxford sees the Burnham transition as a political process story rather than an immediate macro pivot; investors should not front-run major fiscal loosening for the autumn budget, but should position for the directional shift in the yield curve that market perception alone will drive.", "quote": "Keir Starmer's resignation means the UK will have a new Prime Minister by September at the latest, with Andy Burnham the clear favourite.", "locator": "Keir Starmer's resignation means", "quote_verified": true}, {"claim": "Oxford Economics expects the UK gilt yield curve to steepen in the next few months due to perceptions that Burnham might pursue looser fiscal policy combined with fading short-end pressures, and believes pre-election fiscal tightening in current government plans will be watered down.", "speaker": "Oxford Economics", "type": "prediction", "entities": ["United Kingdom", "Andy Burnham"], "conviction": "medium", "so_what": "A steeper UK yield curve reflects a fiscal credibility discount for the incoming Burnham government; positioning for UK curve steepening (long front-end, short long-end gilts) is the actionable trade that Oxford Economics implies—a bearish signal for UK long-end bonds.", "quote": "Given the UK's poor fiscal position, perceptions that Burnham might pursue looser fiscal policy, and fading short-end pressures, we expect the yield curve to steepen in the next few months.", "locator": "Given the UK's poor fiscal position", "quote_verified": true}]}], "insight_total": 2, "top_entities": ["Andy Burnham", "Keir Starmer", "United Kingdom"], "source_meta": {"author": "Anusha Suthenthiran", "word_count": 356, "paywalled": false}}, {"record_id": "ce58f3c5f2d9a627", "source_type": "concepts", "source_name": "Oxford Economics", "source_url": "https://www.oxfordeconomics.com/resource/a-critical-review-of-hmgs-impact-assessment-on-shifting-to-npm-2018-for-promotion-and-advertising-restrictions/", "title": "A Critical Review of HMG's Impact Assessment on Shifting to NPM 2018 for Promotion and Advertising Restrictions", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Society"], "gist": "Oxford Economics, commissioned by the Food and Drink Federation, reviewed the UK government's impact assessment for expanding food advertising restrictions to the NPM 2018 standard and found the government's evidence base 'often limited with material uncertainties and evidence gaps' that materially affect the cost-benefit assessment.", "themes": [{"theme": "UK Food Advertising Regulation and Impact Assessment Quality", "insights": [{"claim": "The UK government is consulting on applying the 2018 Nutrient Profile Model (NPM 2018) to existing regulations governing promotion and advertising of 'less healthy' food and drink products—which would significantly expand the range of products subject to advertising restrictions, with implications for consumers, businesses, and the wider economy.", "speaker": "Oxford Economics", "type": "data_point", "entities": ["United Kingdom"], "conviction": "high", "so_what": "The NPM 2018 expansion would materially widen the category of products facing UK advertising restrictions; food and beverage companies with UK revenue exposure face regulatory scope creep that is not yet priced into corporate compliance costs.", "quote": "the proposal would significantly expand the range of products subject to these restrictions, with implications for consumers, businesses, and the wider economy.", "locator": "If implemented", "quote_verified": true}, {"claim": "Oxford Economics' independent review found the UK government's evidence base for the NPM 2018 advertising restriction proposal is 'often limited with material uncertainties and evidence gaps that have important implications for the overall cost-benefit assessment.'", "speaker": "Oxford Economics", "type": "contrarian", "entities": ["United Kingdom"], "conviction": "high", "so_what": "The weak evidence base identified by Oxford Economics opens the consultation to legal challenge and may delay or water down implementation; companies in the food and drink sector should engage in the consultation period as the regulatory outcome is far from determined.", "quote": "the government's evidence base is often limited with material uncertainties and evidence gaps that have important implications for the overall cost-benefit assessment.", "locator": "Our research finds that", "quote_verified": true}]}], "insight_total": 2, "top_entities": ["United Kingdom"], "source_meta": {"author": "Suki Masana", "word_count": 587, "paywalled": false}}, {"record_id": "fad621e0b2495d96", "source_type": "concepts", "source_name": "RAND Corporation", "source_url": "https://www.rand.org/pubs/commentary/2026/06/why-human-intelligence-matters-more-in-an-ai-world.html", "title": "Why Human Intelligence Matters More in an AI World", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["AI", "Geopolitics"], "gist": "RAND's Tom Mulligan argues the conventional wisdom that AI will make human spies obsolete is wrong: AI lowers barriers to technical intelligence collection, which raises the marginal value of human sources (HUMINT) that AI cannot replicate—including access to air-gapped networks, validation of synthetic media, and secure person-to-person communication in a deepfake-saturated world.", "themes": [{"theme": "AI Paradox: Greater Technical Collection Raises Marginal Value of HUMINT", "insights": [{"claim": "RAND argues AI will paradoxically increase the importance of human intelligence (HUMINT): as AI lowers barriers to technical collection (open-source encryption, commercial satellite imagery, AI analysis), the marginal value of what AI cannot replicate—human sources inside air-gapped networks or in positions of direct access—rises.", "speaker": "Tom Mulligan III", "type": "contrarian", "entities": ["RAND Corporation"], "conviction": "high", "so_what": "Intelligence budgets and private-sector threat intelligence investments that shift entirely toward AI/technical capabilities are misallocating resources: the RAND argument implies human intelligence programs retain unique, rising value that complements rather than competes with AI collection.", "quote": "AI will lower many barriers to technical intelligence collection and analysis...Human intelligence is scarcer and harder to replicate, and so its marginal value will rise.", "locator": "Economics tells us that the value of something", "quote_verified": true}, {"claim": "As AI floods electronic channels with fabricated phone calls, forged documents, and synthetic media, human agents become more valuable as validators—helping distinguish authentic source material from forgeries in a disinformation-saturated environment.", "speaker": "Tom Mulligan III", "type": "causal", "entities": [], "conviction": "high", "so_what": "The AI-driven disinformation environment creates a specific, growing demand for human verification services—from intelligence agencies but also in financial due diligence, legal discovery, and corporate intelligence contexts where the authenticity of digital evidence is increasingly contested.", "quote": "Electronic channels will be flooded with fabricated phone calls, forged documents, and other convincing synthetic media. Signals intercepts will be harder to trust on their own. A human agent can help cut through that deluge of disinformation", "locator": "Human intelligence has always helped validate", "quote_verified": true}, {"claim": "As deepfakes make digital communications less trustworthy, the rational response is to distrust electronic communications—making secure person-to-person contact (dead drops, brush passes, brief meetings) the most reliable communication method in an AI-saturated world.", "speaker": "Tom Mulligan III", "type": "causal", "entities": [], "conviction": "medium", "so_what": "The rise of AI deepfakes argues for investment in secure, verifiable identity infrastructure for high-stakes communications; in corporate espionage and intelligence contexts, traditional offline tradecraft retains strategic value that pure digital security cannot replicate.", "quote": "Secure, person-to-person communication will rise in value. Case officers have long relied on dead drops, brush passes, and brief meetings to communicate with their agents. In an AI-saturated world, these traditional techniques may be the most reliable methods of communication we have.", "locator": "AI is making digital communications less trustworthy", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["RAND Corporation"], "source_meta": {"author": "Tom Mulligan III", "word_count": 581, "paywalled": false}}, {"record_id": "1f33fa9fb720b7d5", "source_type": "concepts", "source_name": "Research Affiliates", "source_url": "https://www.researchaffiliates.com/insights/publications/articles/1119-the-future-of-indexing-passive-isnt-passive", "title": "The Future of Indexing: Passive Investing Isn't Passive", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Positioning"], "gist": "Research Affiliates' Rob Arnott and Lillian Wu argue that 'passive' market-cap-weighted index funds embed systematic hidden costs by buying recent winners at a premium and selling recent losers at a discount; they propose construction tweaks—smoothing market cap over five-year averages, applying fundamental metrics, and adding banding/seasoning rules—to achieve higher returns with lower turnover.", "themes": [{"theme": "Hidden Costs of Cap-Weighted Passive Indexing", "insights": [{"claim": "Research Affiliates argues that 'passive' market-cap-weighted index funds are not neutral: they embed hidden trading costs by systematically paying a premium for recent winners (at additions) and selling recent losers at a discount (at deletions)—making 'passive' an active bet on price momentum at every rebalance.", "speaker": "Rob Arnott", "type": "contrarian", "entities": [], "conviction": "high", "so_what": "The 'passive is neutral' narrative is empirically false at the margin: index funds systematically trade at a structural disadvantage—adding overvalued stocks and selling undervalued ones—creating a persistent, quantifiable drag on returns relative to alternatives that avoid this trading pattern.", "quote": "\"Passive\" market-cap-weighted index funds are not as neutral as they seem and often embed hidden costs within their stock-selection mechanism, paying a premium for recent winners and selling recent losers at a discount.", "locator": "Key Points", "quote_verified": true}, {"claim": "Research Affiliates proposes ameliorating cap-weighting's shortcomings through: (1) smoothing market capitalization through five-year averages, (2) aligning index eligibility with fundamental metrics of business scale such as sales and book value, and (3) adding banding and seasoning rules—preserving rules-based transparency while improving return and lowering turnover.", "speaker": "Rob Arnott", "type": "framework", "entities": [], "conviction": "high", "so_what": "The proposed tweaks represent a practical middle ground between pure passive and active—offering the cost transparency of indexing while systematically avoiding the momentum-chasing costs; a direct justification for fundamental indexing (RAFI) products over standard cap-weighted ETFs.", "quote": "Cap weighting's shortcomings can be ameliorated and its benefits maximized through simple tweaks to index construction, by, for example, smoothing market capitalization through five-year averages and aligning index eligibility with fundamental metrics of business scale, such as sales and book value.", "locator": "Key Points", "quote_verified": true}]}], "insight_total": 2, "top_entities": [], "source_meta": {"author": "Rob Arnott, Lillian Wu", "word_count": 610, "paywalled": false}}, {"record_id": "ace19a61e4992d6d", "source_type": "concepts", "source_name": "SF Fed Economic Letters", "source_url": "https://www.frbsf.org/research-and-insights/publications/economic-letter/2026/06/central-bank-bond-purchases-and-price-of-safety/", "title": "Central Bank Bond Purchases and the Price of Safety", "published_date": "2026-06-22", "language": "en", "processed_at": "2026-06-23T13:00:00Z", "processor": "claude-sonnet-4-6", "tags": ["Macro"], "gist": "SF Fed researchers find that ECB bond purchases (2015–2021, totaling ~30% of euro-area GDP) materially lowered the safety premiums on highly-rated government bonds—by as much as 30 basis points in total—as central bank reserves replaced risky bonds, expanding the supply of safe assets and partially offsetting the very yield declines the purchases aimed to achieve.", "themes": [{"theme": "ECB QE Reduced Safety Premiums, Partially Offsetting Its Own Yield Impact", "insights": [{"claim": "When a central bank buys risky high-yield bonds using safe central bank reserves, it increases the overall supply of safe assets in the economy—which lowers the 'safety premium' investors pay for high-quality government bonds, putting upward pressure on safe bond yields and partially offsetting the intended yield reduction.", "speaker": "Jens H. E. Christensen", "type": "causal", "entities": ["European Central Bank"], "conviction": "high", "so_what": "Central bank QE programs that buy risky assets using reserves are less effective at lowering safe bond yields than models assuming no safety premium effects suggest—policymakers must account for this partial offset when calibrating asset purchase programs.", "quote": "Central banks generally use bond purchases to reduce yields. However, paying for bonds using their own reserves, which are the safest and most liquid assets, has the potential to raise the amount of safe assets in the economy.", "locator": "Central banks generally use bond purchases", "quote_verified": true}, {"claim": "ECB bond purchases 2015–2021 totaled about 30% of euro-area nominal GDP; each 1 percentage point of ECB purchases (as share of GDP) is associated with approximately 1 basis point decline in safety premiums across Germany, Denmark, Sweden, and Switzerland—implying cumulative impact of up to 30 basis points total.", "speaker": "Jens H. E. Christensen", "type": "data_point", "entities": ["European Central Bank", "Germany", "Switzerland", "Sweden", "Denmark"], "conviction": "high", "so_what": "30 basis points of safety premium compression is economically significant (roughly half the average 66 bp safety premium in the sample); this quantifies a material, cross-border spillover of ECB QE that affected even non-euro countries with independent currencies (Sweden, Switzerland).", "quote": "an increase in the ECB bond purcha // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
