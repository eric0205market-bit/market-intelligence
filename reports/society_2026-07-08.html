ether for further Japanese arms exports in Southeast Asia.", "quote": null, "locator": "and to examine the possibility of transferring a naval vessel", "quote_verified": false}, {"claim": "The Philippines became the first recipient of Japan's Official Security Assistance program, announced in January 2026.", "speaker": "TAKAGI Yusuke", "type": "data_point", "entities": ["Philippines", "Japan", "Official Security Assistance"], "conviction": "high", "so_what": "Establishes the Philippines as Japan's lead test case for OSA, a template that could extend to other Indo-Pacific partners.", "quote": null, "locator": "the Philippines becoming the first recipient of Japan's Official Security Assistance", "quote_verified": false}, {"claim": "Japan agreed to support the Philippines in developing a national oil reserve system as part of expanded energy security cooperation under the new partnership.", "speaker": "TAKAGI Yusuke", "type": "data_point", "entities": ["Japan", "Philippines", "oil reserve", "energy security"], "conviction": "medium", "so_what": "Adds an energy-security dimension to the alliance, potentially opening opportunities for Japanese energy-infrastructure firms in the Philippines.", "quote": null, "locator": "strengthen energy security cooperation through Japanese support", "quote_verified": false}]}], "insight_total": 5, "top_entities": ["Japan", "Philippines", "Ferdinand Marcos Jr.", "Takaichi Sanae", "GSOMIA", "Official Security Assistance"], "source_meta": {"author": "TAKAGI Yusuke", "word_count": 169, "paywalled": false}}, {"record_id": "ba0fd924e4a32183", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/07/mr-prabowo-versus-the-market/", "title": "Mr. Prabowo Versus the Market", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-08T17:10:02Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Positioning"], "gist": "Indonesia's rupiah, stocks, and bond yields have all sold off sharply, and columnist James Guild argues this reflects markets correctly pricing a loss of confidence in President Prabowo Subianto's fiscal and investment-climate policies, not a failure to understand him as Prabowo himself claimed in a March Bloomberg interview.", "themes": [{"theme": "Market stress signals", "insights": [{"claim": "Indonesia's rupiah has depreciated significantly against the dollar, the domestic stock exchange has seen a sustained sell-off, and bond markets have forced up interest rates on government debt over the past several months.", "speaker": "James Guild", "type": "data_point", "entities": ["Indonesia", "rupiah", "Indonesian bond market", "Indonesian stock exchange"], "conviction": "high", "so_what": "A simultaneous currency, equity, and bond selloff is a classic capital-flight signal for Indonesia-exposed investors to monitor for policy response or central bank intervention.", "quote": null, "locator": "Over the last several months markets have been sending", "quote_verified": false}, {"claim": "The market stress in Indonesia is mainly driven by concerns about the investment climate, policy uncertainty, and unsustainable government spending and borrowing under the Prabowo administration.", "speaker": "James Guild", "type": "causal", "entities": ["Indonesia", "Prabowo Subianto", "government spending"], "conviction": "high", "so_what": "Names the specific risk factors - fiscal sustainability and policy unpredictability - investors should track for signs of stabilization or further deterioration.", "quote": null, "locator": "this is mainly driven by concerns", "quote_verified": false}]}, {"theme": "The Prabowo-market disconnect", "insights": [{"claim": "President Prabowo told Bloomberg in a March 2026 interview that markets do not understand him; columnist James Guild counters that markets do understand him and are instead signaling they lack confidence in his policies.", "speaker": "James Guild", "type": "contrarian", "entities": ["Prabowo Subianto", "Bloomberg"], "conviction": "high", "so_what": "Reframes the selloff as a deliberate confidence vote rather than miscommunication, implying policy change rather than better messaging is what would calm markets.", "quote": "I think markets do understand him.", "locator": "In March, President Prabowo sat for an interview with Bloomberg", "quote_verified": true}, {"claim": "The standoff between markets and Prabowo reflects a decades-old structural tension between the Indonesian state and markets that is now taking on a new dimension under the current administration.", "speaker": "James Guild", "type": "framework", "entities": ["Indonesia", "Prabowo Subianto"], "conviction": "medium", "so_what": "Frames the episode as part of a recurring pattern in Indonesian political economy, useful context for gauging how far state intervention might go before market pressure forces a reversal.", "quote": null, "locator": "This actually speaks to a fundamental tension", "quote_verified": false}]}], "insight_total": 4, "top_entities": ["Prabowo Subianto", "Indonesia", "rupiah", "Indonesian bond market", "Bloomberg", "James Guild"], "source_meta": {"author": "James Guild", "word_count": 194, "paywalled": false}}, {"record_id": "bf6380e676dbb329", "source_type": "society", "source_name": "Foreign Policy", "source_url": "https://foreignpolicy.com/2026/07/02/sports-diplomacy-politics-world-cup-sportswashing-immigration-war/", "title": "Is Sports Diplomacy Still Possible?", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-08T17:09:27Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society"], "gist": "At the 2026 US/Canada/Mexico-hosted World Cup, hard power (visa denials, military-strike fallout, FIFA's selective enforcement of 'political speech' rules) is overwhelming soft-power sports diplomacy, even as 1930s totalitarian regimes were paradoxically more accommodating to foreign athletes than the Trump administration is today.", "themes": [{"theme": "US hard power undercuts World Cup soft power", "insights": [{"claim": "The US-Paraguay World Cup opener became the most-watched soccer match broadcast on record in the United States, averaging 27.5 million viewers.", "speaker": "J. Alex Tarquinio", "type": "data_point", "entities": ["United States", "Paraguay", "World Cup"], "conviction": "high", "so_what": "Confirms soccer viewership in the US reached a genuine record scale during the 2026 tournament, a data point for media-rights and sponsorship valuation of US soccer broadcasting.", "quote": null, "locator": "Meanwhile, the U.S. opener against Paraguay", "quote_verified": false}, {"claim": "Despite co-hosting the World Cup during the US 250th-anniversary celebration, the Trump administration's tight control over entry visas for players, officials, and fans has undercut the tournament's soft-power potential, with a Somali referee turned back at Miami airport and an Iraqi team photographer denied entry in Chicago while a striker was held for questioning nearly seven hours.", "speaker": "J. Alex Tarquinio", "type": "causal", "entities": ["Donald Trump", "United States", "FIFA"], "conviction": "high", "so_what": "Visa enforcement is actively damaging the US's soft-power dividend from hosting, a tangible reputational cost that could affect future US bids for global events and diplomacy-adjacent tourism/hospitality revenue.", "quote": null, "locator": "Nearly a century later, many people traveling to the World Cup", "quote_verified": false}, {"claim": "FIFA waived a $15,000 entry bond for travelers from certain countries covering team members, close associates, and some ticket holders, in a partial concession to ease US entry friction, but many fans were still turned away — a 'mixed bag' result.", "speaker": "J. Alex Tarquinio", "type": "data_point", "entities": ["FIFA", "United States"], "conviction": "high", "so_what": "Shows FIFA's leverage over US immigration policy is limited even with direct lobbying, suggesting future US-hosted events will carry similar entry-friction risk for international visitors and sponsors.", "quote": null, "locator": "The United States waived the $15,000 bond", "quote_verified": false}, {"claim": "FIFA President Gianni Infantino's decision to award Donald Trump the much-ridiculed inaugural FIFA Peace Prize appears to have been a strategic gesture aimed at securing eased US travel restrictions for the World Cup.", "speaker": "J. Alex Tarquinio", "type": "thesis", "entities": ["Gianni Infantino", "Donald Trump", "FIFA"], "conviction": "medium", "so_what": "Illustrates how a global sports body will trade symbolic honors for practical regulatory concessions from a host government — a template likely to recur in future US-hosted global events under this administration.", "quote": null, "locator": "Infantino may have viewed the much-ridiculed awarding", "quote_verified": false}, {"claim": "Ironically, the totalitarian regimes of the 1930s were more accommodating to foreign athletes than the 2026 US hosts: fascist Italy rolled out the red carpet for the 1934 World Cup, and Nazi Germany permitted Black and Jewish foreign athletes to compete at the 1936 Berlin Olympics specifically to avoid a boycott.", "speaker": "J. Alex Tarquinio", "type": "contrarian", "entities": ["United States", "Nazi Germany", "fascist Italy"], "conviction": "high", "so_what": "A stark historical contrast that frames current US entry restrictions as more exclusionary than even historically authoritarian World Cup/Olympic hosts, a reputational benchmark for assessing soft-power erosion.", "quote": null, "locator": "Ironically, the totalitarian regimes of the 1930s", "quote_verified": false}]}, {"theme": "The fiction of apolitical sport", "insights": [{"claim": "FIFA declared in 2022 that players wearing 'One Love' LGBTQ-support armbands would receive an immediate yellow card, while at the 2026 Winter Olympics Ukrainian skeleton racer Vladyslav Heraskevych was disqualified for refusing to remove a helmet honoring Ukrainian war dead — showing sporting bodies' 'apolitical' rules are themselves political choices about what speech to permit.", "speaker": "J. Alex Tarquinio", "type": "framework", "entities": ["FIFA", "Vladyslav Heraskevych", "Ukraine"], "conviction": "high", "so_what": "Demonstrates that governing-body neutrality claims are selectively enforced, a durable pattern for anticipating how FIFA/IOC will handle future athlete political expression.", "quote": null, "locator": "Sporting associations also consistently position themselves", "quote_verified": false}, {"claim": "FIFA banned displays of Iran's prerevolutionary flag (a diaspora resistance symbol) at US-hosted matches but did not treat as political speech the Iranian team's lapel pins referencing '168' — the number killed in a US strike on an Iranian girls' primary school on Feb. 28 — exposing an inconsistent standard for what counts as political.", "speaker": "J. Alex Tarquinio", "type": "contrarian", "entities": ["FIFA", "Iran"], "conviction": "high", "so_what": "A concrete double-standard case study useful for assessing FIFA's institutional bias and predictability when adjudicating politically sensitive displays.", "quote": null, "locator": "However, when the Iranian national team", "quote_verified": false}, {"claim": "Iran's national team was forced to relocate its World Cup base to Mexico after the US limited the team's in-country time and denied entry visas to some staff, but the team received a hero's welcome in Mexico that generated sympathy and deflected criticism away from the Iranian regime — a 'boomerang effect' on the Trump administration's restrictive approach.", "speaker": "J. Alex Tarquinio", "type": "causal", "entities": ["Iran", "United States", "Mexico"], "conviction": "medium", "so_what": "Restrictive visa policy toward a geopolitical adversary's team backfired by generating third-country sympathy, a cautionary case for using hard-power immigra n as its direct battlefield role shrinks.", "speaker": "Amir Handjani", "type": "causal", "entities": ["Saudi Arabia", "UAE", "Turkey", "Pakistan", "United States"], "conviction": "medium", "so_what": "US arms and sustainment dependency is the mechanism that keeps American leverage intact despite a lower-profile posture — a bullish read-through for US defense exporters even inside a 'pullback' narrative.", "quote": "the militaries that are taking on this burden still depend on American parts, munitions, and training to keep functioning", "locator": "Together these interests describe an order", "quote_verified": true}]}, {"theme": "The Gulf becomes an independent player", "insights": [{"claim": "In May 2015, GCC rulers snubbed Obama's Camp David summit over a JCPOA negotiated without them, but in May 2026 Trump said he held off on further strikes on Iran because Qatar, Saudi Arabia, and the UAE asked him to give negotiations more room — a reversal showing the Gulf now shapes US Iran policy rather than merely reacting to it.", "speaker": "Amir Handjani", "type": "data_point", "entities": ["Camp David", "JCPOA", "Qatar", "Saudi Arabia", "UAE", "Donald Trump"], "conviction": "high", "so_what": "A direct before/after data point for how much bargaining power Gulf capitals now hold over US Iran policy — relevant to positioning around any future US-Iran escalation.", "quote": null, "locator": "Look back to 2015 for the contrast", "quote_verified": false}, {"claim": "Saudi Arabia opened its own direct diplomatic channel with Iran in 2023 because the JCPOA solved only the enrichment problem Washington cared about while ignoring Iranian missiles, IRGC proxies, and a sanctions-relief windfall that flowed to Hezbollah and the Houthis.", "speaker": "Amir Handjani", "type": "causal", "entities": ["Saudi Arabia", "Iran", "JCPOA", "Islamic Revolutionary Guard Corps", "Hezbollah", "Houthis"], "conviction": "high", "so_what": "Explains why Gulf states no longer trust Washington-brokered nuclear deals to address their actual security concerns — a durable source of Saudi-Iran bilateral diplomacy independent of US mediation.", "quote": null, "locator": "Gulf states no longer need Washington to mediate with Tehran", "quote_verified": false}, {"claim": "Chinese mediation did not stop Iran from striking Saudi pipelines and airbases when the war began in February 2026, but it did give Beijing a direct channel into Tehran that proved useful for de-escalation later in the conflict.", "speaker": "Amir Handjani", "type": "contrarian", "entities": ["China", "Saudi Arabia", "Iran"], "conviction": "medium", "so_what": "Shows the limits of Chinese diplomatic leverage as a deterrent even as it retains value as a back-channel — tempers any 'China as new Gulf security guarantor' narrative.", "quote": null, "locator": "Chinese mediation didn’t stop Iran", "quote_verified": false}, {"claim": "Unconfirmed but plausible reports describe Qatar offering to curb its own gas output if Iran spared the Ras Laffan complex, and the UAE releasing billions of dollars in frozen Iranian assets in exchange for being left alone during the war; both governments denied it.", "speaker": "Amir Handjani", "type": "data_point", "entities": ["Qatar", "Ras Laffan", "UAE", "Iran"], "conviction": "exploratory", "so_what": "If true, these are direct bilateral side-payments to Iran outside any US-brokered framework — worth monitoring for future Gulf-Iran deal-making that could affect gas output and sanctioned-asset flows.", "quote": null, "locator": "Reports described Qatar offering to curb", "quote_verified": false}]}, {"theme": "A fractured Gulf position that still adds up to leverage", "insights": [{"claim": "The Gulf Cooperation Council has never had a unified Iran policy — the UAE sought reparations from Iran and walked out of OPEC mid-crisis in a dispute with Riyadh over oil policy, Qatar and Oman argued for dialogue throughout the fighting, and Saudi Arabia expelled Iranian diplomats in March while still backing Pakistani mediation — yet together these divergent moves helped end the war.", "speaker": "Amir Handjani", "type": "data_point", "entities": ["Gulf Cooperation Council", "UAE", "OPEC", "Qatar", "Oman", "Saudi Arabia", "Iran"], "conviction": "high", "so_what": "A fractured coalition still produced a functional outcome; the UAE's mid-crisis OPEC walkout is itself worth watching as a signal on Gulf oil-supply discipline going forward.", "quote": null, "locator": "None of this adds up to a common Gulf position", "quote_verified": false}, {"claim": "Gulf states have unanimously rejected Trump's push to make Abraham Accords normalization the price of winding down the war: Saudi Arabia insists on real movement toward Palestinian statehood first, and Pakistan called the idea incompatible with its own principles.", "speaker": "Amir Handjani", "type": "contrarian", "entities": ["Abraham Accords", "Saudi Arabia", "Pakistan", "Donald Trump", "Palestinian statehood"], "conviction": "high", "so_what": "Signals Abraham Accords expansion is stalled despite US pressure — investors betting on near-term Saudi-Israel normalization should discount that timeline.", "quote": "no normalization with Israel without real movement toward Palestinian statehood", "locator": "The one place Gulf states have held firm", "quote_verified": true}]}, {"theme": "Second-order effects on Israel and Iran's regional ceiling", "insights": [{"claim": "A Washington genuinely freed from Middle East crisis management would be less inclined to underwrite open-ended Israeli military options, which would give Israel more reason to pursue a diplomatic settlement with the Palestinians as a safer path to security than continued force.", "speaker": "Amir Handjani", "type": "prediction", "entities": ["Israel", "United States", "Palestinians"], "conviction": "medium", "so_what": "A second-order thesis worth watching: reduced unconditional US military backing could be a structural push factor toward Israeli-Palestinian negotiations, relevant to regional-stability-linked assets.", "quote": null, "locator": "This same realignment could extend to Israel", "quote_verified": false}, {"claim": "The UAE absorbed more missiles and drones during the war than any other country, including Israel, and despite having two formal security partners (the US, and Israel since the Abraham Accords), neither could fully insulate it from Iran across the narrow Gulf strait — pushing Abu Dhabi toward accommodation with Tehran by the war's end.", "speaker": "Amir Handjani", "type": "causal", "entities": ["UAE", "Israel", "United States", "Iran", "Abraham Accords"], "conviction": "high", "so_what": "The UAE's outsized exposure plus Dubai's long-standing financial ties to Iran-linked business make it the Gulf state most likely to lead economic re-engagement with Tehran — a lead indicator for regional trade-normalization plays.", "quote": "The UAE absorbed more missiles and drones during the war than any other country including Israel", "locator": "Riyadh can live with an Iran that talks directly", "quote_verified": true}, {"claim": "Divergent interests among Saudi Arabia, the UAE, Turkey, and Pakistan — Turkey wants to contain rather than welcome Iranian influence in Syria and Iraq, and Pakistan's own Iran border plus its Saudi-hedging defense pact limit how far it can champion Iran — put a structural ceiling on how far Iran's reintegration into the regional order can go, even though a less-isolated Iran is what a sustainable Gulf system needs.", "speaker": "Amir Handjani", "type": "framework", "entities": ["Saudi Arabia", "UAE", "Turkey", "Pakistan", "Iran", "Syria", "Iraq"], "conviction": "high", "so_what": "Sets realistic bounds for any Iran-reintegration trade or investment thesis — expect economic opening but continued military containment, not full normalization.", "quote": null, "locator": "Together these interests describe an order", "quote_verified": false}]}], "insight_to films at the moment", "quote_verified": false}, {"claim": "All three filmmakers built their audiences as independent online content creators rather than working their way up through the traditional entertainment industry, meaning that for this generation, achieving initial internet success is 'no longer just the goal, but also the barrier to entry' for a mainstream career.", "speaker": "Tim Brinkhof", "type": "thesis", "entities": ["Curry Barker", "Kane Parsons", "Gooseworx"], "conviction": "high", "so_what": "Signals shrinking traditional entry points into entertainment careers, and that studios now effectively outsource audience-development risk to creators who build followings on their own before being signed.", "quote": "success is no longer just the goal, but also the barrier to entry", "locator": "Loss of agency, entrapment, and dissatisfaction", "quote_verified": true}, {"claim": "The creative autonomy these filmmakers had while working independently online helped them build large followings, which in turn let them retain creative control as they moved into bigger-budget work — a dynamic the author suggests could pressure studios and streaming services to give creators more freedom going forward.", "speaker": "Tim Brinkhof", "type": "prediction", "entities": ["Barker", "Parsons", "Gooseworx", "Hollywood"], "conviction": "medium", "so_what": "A structural shift worth tracking for media/entertainment investors: talent leverage is moving toward creators who arrive with a pre-built, monetizable audience rather than studio-developed talent.", "quote": null, "locator": "The filmmakers discussed in this article", "quote_verified": false}]}, {"theme": "What the films encode about Gen Z anxiety", "insights": [{"claim": "Backrooms' 'liminal space' aesthetic — empty offices, parking lots, and malls that exist solely to facilitate economic exchange — reflects a growing generational frustration with capitalism's corrosion of livable environments and mental health, a theme the piece traces back to James Howard Kunstler's 1993 book 'The Geography of Nowhere.'", "speaker": "Tim Brinkhof", "type": "causal", "entities": ["Backrooms", "James Howard Kunstler"], "conviction": "medium", "so_what": "Points to a durable cultural undercurrent of anti-consumerist, anti-sprawl sentiment among younger audiences that could shape demand for 'third place' and community-oriented retail/real-estate concepts.", "quote": null, "locator": "Some liminal spaces—like offices, parking lots", "quote_verified": false}, {"claim": "Digital Circus's AI antagonist Caine — described in the piece as 'essentially ChatGPT' — causes the trapped human characters' suffering not out of malice but because he cannot comprehend their existential dread, and the film's core message of finding meaning in a stagnant life resonates with Gen Z because Harvard Kennedy School research finds the generation deeply doubtful things will improve, citing job insecurity, wealth disparity, political dysfunction, AI, and climate change.", "speaker": "Tim Brinkhof", "type": "causal", "entities": ["The Amazing Digital Circus", "Caine", "ChatGPT", "Harvard Kennedy School"], "conviction": "high", "so_what": "An AI character read explicitly as a stand-in for ChatGPT resonating with mass Gen Z audiences is a data point on how younger consumers are processing AI's presence in daily life — relevant for how AI products are marketed to this cohort.", "quote": "essentially ChatGPT", "locator": "The AI antagonist of Digital Circus, called Caine", "quote_verified": true}, {"claim": "Backrooms ties AI-generated content directly to cultural decay, using its soundtrack (drawn from James Leyland Kirby's dementia-simulating album 'Everywhere at the End of Time') to evoke a media landscape of reboots, reaction videos to reaction videos, and 'AI slop made from regurgitated training data' that increasingly warps and dilutes cultural production.", "speaker": "Tim Brinkhof", "type": "contrarian", "entities": ["Backrooms", "James Leyland Kirby", "AI"], "conviction": "medium", "so_what": "Evidence of an emerging anti-'AI slop' backlash among Gen Z creators and audiences — a headwind for AI-generated content products targeting this demographic and a tailwind for brands positioning as human-made/authentic.", "quote": "AI slop made from regurgitated training data", "locator": "Backrooms, which features a song from Everywhere at the End of Time", "quote_verified": true}, {"claim": "Obsession functions as commentary on incel and manosphere dynamics: protagonist Bear magically forces a woman, Nikki, to love him and shows no remorse for erasing her original personality, prioritizing that she behave as he wants over her having any actual agency.", "speaker": "Tim Brinkhof", "type": "data_point", "entities": ["Obsession", "Curry Barker"], "conviction": "medium", "so_what": "Reflects mainstream entertainment directly engaging incel/manosphere culture as box-office-viable subject matter, a signal of how far that subculture's themes have penetrated popular media.", "quote": null, "locator": "Bear exhibits a mindset adjacent to incel", "quote_verified": false}]}, {"theme": "Gen Z's alienation becomes political leverage", "insights": [{"claim": "In Nepal, Gen Z protesters organized via the messaging app Discord to help select an interim prime minister as the country's first female leader, who has since been succeeded by 36-year-old Balendra Shah, currently the world's youngest national leader.", "speaker": "Tim Brinkhof", "type": "data_point", "entities": ["Nepal", "Discord", "Balendra Shah"], "conviction": "high", "so_what": "A concrete case of Gen Z digital organizing translating directly into head-of-state outcomes — a template that could recur in other fragile political systems with high youth internet penetration.", "quote": null, "locator": "Think of how, last year in Nepal", "quote_verified": false}, {"claim": "In Indonesia and elsewhere, Gen Z protesters have used symbols from the an ype": "data_point", "entities": ["Narendra Modi", "BIMSTEC"], "conviction": "high", "so_what": "Sets the headline policy backdrop against which the less-visible Northeast India MOUs should be read.", "quote": null, "locator": "Prime Minister Narendra Modi announced a 21-point action plan", "quote_verified": false}, {"claim": "Two memoranda of understanding signed on the summit's sidelines - one between India's Ministry of Development of North Eastern Region (MDoNER) and Thailand's Ministry of Foreign Affairs, another between India's North Eastern Handicrafts Development Corporation (NEHDC) and Thailand's Creative Economy Agency (CCAT) - drew far less attention than the headline action plan.", "speaker": "Shubham Kashyap Kalita", "type": "data_point", "entities": ["MDoNER", "Thailand Ministry of Foreign Affairs", "NEHDC", "Creative Economy Agency of Thailand"], "conviction": "high", "so_what": "Low-visibility institutional linkages like these are early markers of Northeast India's economic integration into BIMSTEC, worth tracking for handicraft and creative-economy trade and connectivity plays.", "quote": null, "locator": "Two memoranda of understanding signed on the sidelines", "quote_verified": false}, {"claim": "The MDoNER-NEHDC agreements carry a strategic message that India's Northeast is not merely a transit highway between BIMSTEC nations but a substantive economic pillar of the bloc in its own right.", "speaker": "Shubham Kashyap Kalita", "type": "thesis", "entities": ["Northeast India", "BIMSTEC"], "conviction": "medium", "so_what": "Reframes Northeast India from pure connectivity infrastructure to an active economic node, relevant for regional development and Act East policy-linked investment theses.", "quote": "The Northeast is not only a highway between BIMSTEC nations, but a key to the region.", "locator": "These were low-key pledges with a strong message", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["BIMSTEC", "Narendra Modi", "Northeast India", "MDoNER", "Thailand", "NEHDC"], "source_meta": {"author": "Shubham Kashyap Kalita", "word_count": 125, "paywalled": false}}, {"record_id": "e56ca94313b33dd9", "source_type": "society", "source_name": "Foreign Policy", "source_url": "https://foreignpolicy.com/2026/06/23/world-cup-china-soccer-xi-jinping-corruption-reform/", "title": "Why the World Cup Keeps Eluding China", "published_date": "2026-06-23", "language": "en", "processed_at": "2026-07-08T17:09:22Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Geopolitics"], "gist": "FP deputy editor James Palmer argues that Xi Jinping's 15-year, billions-dollar campaign to turn China into a soccer power has failed because the same pattern afflicting other 'national priority' sectors — heavy money inflows with too few institutions capable of policing them — has made Chinese soccer's domestic league rich but corrupt, keeping talent from developing abroad and driving repeated purges that never fix the underlying system.", "themes": [{"theme": "A stalled national priority", "insights": [{"claim": "China has qualified for the World Cup only once, in 2002, when it was eliminated in the group stage without scoring a goal; despite the 2026 tournament expanding from 32 to 48 teams with a record nine Asian Football Confederation slots, China still failed to qualify, losing out to newcomers such as Jordan and Uzbekistan.", "speaker": "James Palmer", "type": "data_point", "entities": ["China", "World Cup", "Jordan", "Uzbekistan", "Asian Football Confederation"], "conviction": "high", "so_what": "Quantifies the persistent gap between China's soccer investment and results, a useful baseline for judging whether the 2050 'soccer superpower' target is realistic.", "quote": null, "locator": "China has reached the World Cup only once", "quote_verified": false}, {"claim": "Xi Jinping, a longtime soccer fan, stated in 2011, before becoming president, three goals for Chinese soccer — qualify for, host, and win the World Cup — and 15 years and billions of dollars in investment later, China is no closer to any of them.", "speaker": "James Palmer", "type": "data_point", "entities": ["Xi Jinping", "China"], "conviction": "high", "so_what": "A direct, falsifiable benchmark of a named Xi personal-priority policy failing despite sustained state spending — relevant to gauging execution risk in other Xi-designated 'priority' sectors.", "quote": null, "locator": "Soccer is a personal priority of Chinese President Xi Jinping", "quote_verified": false}, {"claim": "China has a state-backed push to turn itself into a 'first-class soccer superpower' by 2050, running alongside repeated anti-corruption crackdowns, none of which have solved the sport's structural problems.", "speaker": "James Palmer", "type": "data_point", "entities": ["China"], "conviction": "high", "so_what": "Establishes a long-dated, publicly stated state target that can be tracked as a proxy for the effectiveness of China's top-down industrial-policy model more broadly.", "quote": "first-class soccer superpower", "locator": "a massive, state-backed push to turn China", "quote_verified": true}]}, {"theme": "Why the money doesn't translate to results", "insights": [{"claim": "The Chinese Super League is lucrative and one of the world's best-attended domestic leagues, which paradoxically keeps talented players at home rather than seeking experience abroad, while incompetence and corruption inside the league cause that talent to go to waste.", "speaker": "James Palmer", "type": "causal", "entities": ["Chinese Super League", "China"], "conviction": "high", "so_what": "A domestic league rich enough to retain talent but too dysfunctional to develop it is a specific, identifiable bottleneck — distinct from a simple lack-of-money story that would otherwise attract capital.", "quote": null, "locator": "Part of the problem is that the Chinese domestic league", "quote_verified": false}, {"claim": "Not a single player on China's current men's national team plays for a foreign club, compared with eight members of the US squad who play in Major League Soccer, a relatively weak league; Chinese players often go abroad in youth careers but rarely stay overseas as seniors.", "speaker": "James Palmer", "type": "data_point", "entities": ["China", "Major League Soccer", "United States"], "conviction": "high", "so_what": "A concrete, comparative talent-pipeline metric showing China's domestic system actively pulls players back rather than exporting them into more competitive environments.", "quote": null, "locator": "Not a single player on the current Chinese national team", "quote_verified": false}, {"claim": "China cannot replicate Qatar's strategy of naturalizing foreign players to quickly build a competitive squad because Chinese soccer's persistent racism and ethnic nationalism create a hostile environment for players who are not ethnically Chinese.", "speaker": "James Palmer", "type": "causal", "entities": ["China", "Qatar"], "conviction": "medium", "so_what": "Rules out a fast, capital-driven fix that has worked elsewhere, implying China's soccer problem is a longer-horizon institutional and cultural one rather than a financing gap.", "quote": null, "locator": "China also can’t easily replicate the model used by Qatar", "quote_verified": false}, {"claim": "The Chinese women's national team, the Steel Roses, has appeared in every FIFA Women's World Cup since 1991 except 2011, a sharp contrast with the men's team's near-total failure, implying China's soccer problems are specific to the men's professional pipeline rather than soccer culture broadly.", "speaker": "James Palmer", "type": "contrarian", "entities": ["China", "Steel Roses", "FIFA Women's World Cup"], "conviction": "medium", "so_what": "Isolates the failure to the men's professional system (money, corruption, incentives) rather than to Chinese sporting culture or talent base in general.", "quote": null, "locator": "the Chinese women’s national team", "quote_verified": false}]}, {"theme": "Corruption as a cross-sector pattern", "insights": [{"claim": "In January 2026, Chinese authorities handed lifetime bans to 73 players and officials for match-fixing and bribery, including former national coach Li Tie, who was already serving a prison sentence — the latest round in a cycle where officials who rose to power after earlier corruption purges are themselves later purged.", "speaker": "James Palmer", "type": "data_point", "entities": ["China", "Li Tie"], "conviction": "high", "so_what": "Evidence that anti-corruption enforcement in Chinese soccer is cyclical rather than structural, so investors or sponsors should not treat any single crackdown as a durable fix.", "quote": null, "locator": "In January, Chinese authorities announced sweeping punishments", "quote_verified": false}, {"claim": "Chinese soccer's corruption is an instance of a broader pattern that has also hit the People's Liberation Army Rocket Force and the state-backed semiconductor 'Big Fund': once Beijing designates a sector a national priority, the resulting inflow of money creates strong incentives for corruption that few institutions are capable enough to expose.", "speaker": "James Palmer", "type": "framework", "entities": ["China", "People's Liberation Army Rocket Force", "Big Fund"], "conviction": "high", "so_what": "A generalizable governance risk framework: any Chinese sector suddenly designated a 'national priority' (soccer, semiconductors, military modernization) should be discounted for elevated corruption and execution risk regardless of stated capital commitments.", "quote": null, "locator": "A familiar pattern has played out across multiple sectors", "quote_verified": false}, {"claim": "Foreign coaches brought in to revive China's national team are repeatedly constrained by entrenched interests and a sports system where Chinese Communist Party officials have final say, unlike South Korea's 2002 approach of giving Dutch coach Guus Hiddink total authority over selection and strategy, which led to a semifinal run.", "speaker": "James Palmer", "type": "contrarian", "entities": ["China", "Guus Hiddink", "South Korea"], "conviction": "high", "so_what": "Identifies a governance fix (delegated authority to technical experts) that worked for a comparable Asian program but that China's political system structurally resists, marking a durable competitive disadvantage.", "quote": null, "locator": "South Korea, by contrast, gave Dutch manager", "quote_verified": false}]}, {"theme": "Where hope remains, and its limits", "insights": [{"claim": "China's 2008 Olympic success relied on a highly centralized approach directing young athletes into individual sports like shooting or diving, which require only a handful of elite competitors and far less money or interaction with existing institutions — a model that does not transfer to soccer, which needs deep, broad talent pools.", "speaker": "James Palmer", "type": "framework", "entities": ["China", "Beijing Olympics"], "conviction": "high", "so_what": "Explains why China's proven Olympic playbook (centralized, low-headcount elite development) cannot simply be repointed at soccer, a structural constraint on any future state-led fix.", "quote": null, "locator": "When China made a big Olympic push", "quote_verified": false}, {"claim": "Grassroots village soccer leagues have surged in popularity in China over roughly the past two years, raising hopes of finding untapped talent among 1.4 billion people, but Palmer predicts any grassroots success will likely be absorbed by existing sporting authorities and dragged into the same institutional problems that have long plagued the sport.", "speaker": "James Palmer", "type": "prediction", "entities": ["China"], "conviction": "medium", "so_what": "Tempers optimism around any bottom-up Chinese soccer revival narrative — the author's base case is that existing dysfunctional institutions will co-opt and dilute grassroots gains.", "quote": null, "locator": "the depressing likelihood is that any grassroots success", "quote_verified": false}]}], "insight_total": 12, "top_entities": ["China", "Xi Jinping", "Chinese Super League", "Li Tie", "Guus Hiddink", "South Korea", "Qatar", "Major League Soccer", "People's Liberation Army Rocket Force", "Big Fund"], "source_meta": {"author": "James Palmer", "word_count": 1213, "paywalled": false}}, {"record_id": "e5cd859c5d4f99f5", "source_type": "society", "source_name": "Foreign Policy", "source_url": "https://foreignpolicy.com/2026/07/01/indonesia-blackouts-prabowo-coal/", "title": "Blackouts Are Prabowo’s Latest Problem", "published_date": "2026-07-01", "language": "en", "processed_at": "2026-07-08T17:09:22Z", "processor": "claude-code-sub-opus", "tags": ["Energy", "Geopolitics", "Society"], "gist": "Foreign Policy's Southeast Asia Brief reports that Indonesia's June 2026 rolling blackouts stem not from a supply shock but from the Prabowo government's own decision to cut coal production quotas to boost export prices, backfiring into a domestic shortage with estimated losses of $173-562 million — one of several regional flashpoints covered, alongside Bangkok's landslide mayoral reelection, the politically charged conviction of Gojek founder Nadiem Makarim, Hanoi demolition protests, and a Singapore language debate sparked by a hit Teochew-language film.", "themes": [{"theme": "Indonesia's self-inflicted blackout", "insights": [{"claim": "Indonesia's June 2026 rolling blackouts across Java, Sumatra, Bali, and Indonesian Borneo were caused by a coal shortage the government created itself, not by a global energy shock, after officials cut coal production quotas earlier in the year specifically to push up global prices and boost export earnings.", "speaker": "Joseph Rachman", "type": "causal", "entities": ["Indonesia", "coal", "Prabowo Subianto"], "conviction": "high", "so_what": "A policy-induced, not structural, supply failure means the fix is a policy reversal rather than new capacity investment — relevant for anyone pricing Indonesian coal-export volumes or power-sector risk.", "quote": null, "locator": "Instead, the government has admitted after some early denials", "quote_verified": false}, {"claim": "Faced with a gap between low mandated domestic coal prices and high international prices, Indonesian miners sold as much coal as possible abroad even where this meant missing their 'domestic market obligation,' or exported high-quality coal while dumping low-quality, less energy-dense coal onto the domestic market.", "speaker": "Joseph Rachman", "type": "causal", "entities": ["Indonesia", "coal", "domestic market obligation"], "conviction": "high", "so_what": "Shows Indonesian coal miners will arbitrage domestic price controls at the expense of compliance whenever the export-domestic price gap widens enough — a repeatable dynamic to watch whenever Jakarta manipulates quotas again.", "quote": null, "locator": "Faced with the gap between low domestic prices", "quote_verified": false}, {"claim": "An industry insider directly disputed the Indonesian government's claim that the blackout problem has been resolved, calling it a 'complete lie' and warning that worse may be to come.", "speaker": "Joseph Rachman", "type": "contrarian", "entities": ["Indonesia"], "conviction": "medium", "so_what": "An on-the-ground source contradicting the official line suggests the blackout risk is understated in government messaging, warranting caution on any Indonesia power-sector or industrial-continuity assumptions through summer 2026.", "quote": "complete lie", "locator": "an industry insider countered that this is a “complete lie”", "quote_verified": true}, {"claim": "Initial estimates put the economic losses from the June 2026 blackouts at between $173 million and $562 million, and business leaders warn that fear of future blackouts is becoming an additional deterrent to investment in Indonesia.", "speaker": "Joseph Rachman", "type": "data_point", "entities": ["Indonesia"], "conviction": "high", "so_what": "A quantified, sizable near-term GDP/investment drag directly attributable to an avoidable policy choice — a concrete input for Indonesia macro and FDI-flow models.", "quote": null, "locator": "Initial estimates of the losses already caused", "quote_verified": false}, {"claim": "Java had more electricity generation capacity than it needed for years due to 2010s overbuilding, confirming the June 2026 shortage is a policy-induced supply failure rather than a structural capacity gap; a separate three-day blackout that hit Sumatra in May 2026 was caused by weather-related transmission-line disruption, not coal supply.", "speaker": "Joseph Rachman", "type": "data_point", "entities": ["Indonesia", "Java", "Sumatra"], "conviction": "high", "so_what": "Distinguishing the two blackout causes (policy-driven coal shortage vs. weather-driven transmission failure) clarifies that Indonesia's grid has multiple independent failure modes, raising the base rate of future outage risk beyond just the coal-quota issue.", "quote": null, "locator": "For years, Indonesia actually had more electricity generation capacity", "quote_verified": false}]}, {"theme": "Political risk building around Prabowo", "insights": [{"claim": "The blackouts compound a growing perception of dysfunction under President Prabowo Subianto, whose nationalist self-sufficiency economic policies have caused broader economic turmoil, and arrive alongside renewed increases in food and fuel prices and active student protests over economic mismanagement.", "speaker": "Joseph Rachman", "type": "causal", "entities": ["Prabowo Subianto", "Indonesia"], "conviction": "medium", "so_what": "A convergence of blackouts, inflation, and street protests is a classic pre-instability pattern for Indonesia, worth flagging for any near-term political-risk assessment on the country.", "quote": null, "locator": "It is also another blow for President Prabowo Subianto", "quote_verified": false}, {"claim": "Indonesia saw its worst riots since 1998 in August 2025 against a backdrop of rising food prices, and the recurrence of both rising prices and blackouts heading into summer 2026 raises the risk of renewed unrest.", "speaker": "Joseph Rachman", "type": "prediction", "entities": ["Indonesia"], "conviction": "medium", "so_what": "Gives a specific historical precedent and trigger pattern (food-price spikes plus visible service failures) that investors can use as an early-warning indicator for Indonesian social unrest.", "quote": null, "locator": "August of last year saw Indonesia’s worst riots", "quote_verified": false}]}, {"theme": "Regional political realignments", "insights": [{"claim": "Bangkok's independent governor Chadchart Sittipunt won reelection with 67.8% of the vote, up from 52.7% in 2022, while his former party Pheu Thai — the Shinawatra family's political vehicle — has been reduced to a junior national coalition partner, fueling speculation Chadchart could seek the premiership despite denying interest.", "speaker": "Joseph Rachman", "type": "data_point", "entities": ["Chadchart Sittipunt", "Bangkok", "Pheu Thai", "Thailand"], "conviction": "high", "so_what": "A rising independent political figure eclipsing the dominant Shinawatra-aligned party is a signal worth tracking for Thai political-risk positioning ahead of any future national election.", "quote": null, "locator": "Chadchart Sittipunt, the independent governor of Bangkok", "quote_verified": false}, {"claim": "Gojek founder and former Education Minister Nadiem Makarim was sentenced to prison on June 30, 2026 over Chromebook procurement corruption charges that critics call thin and politically motivated; Indonesia's loosely defined corruption law leaves considerable scope for such prosecutions, and who pressured prosecutors to pursue a case against a non-outspoken former official remains unexplained.", "speaker": "Joseph Rachman", "type": "contrarian", "entities": ["Nadiem Makarim", "Gojek", "Indonesia"], "conviction": "medium", "so_what": "A high-profile, possibly politically motivated prosecution of Indonesia's most prominent tech founder is a chilling-effect risk for entrepreneurial and foreign investment sentiment toward Indonesia's tech sector.", "quote": null, "locator": "Indonesian tech company founder and former Education Minister Nadiem Makarim", "quote_verified": false}, {"claim": "Hanoi residents are staging rare public protests, including prayer vigils and critical banners, against a multitrillion-dollar government plan to demolish and rebuild the capital that would relocate roughly 250,000 people along the Red River on a promise of $95,000 average incomes by 2065; Vietnamese land disputes have turned deadly before, including a 2020 case near Hanoi that killed three police officers and one villager and led to two death sentences.", "speaker": "Joseph Rachman", "type": "data_point", "entities": ["Hanoi", "Vietnam", "Red River"], "conviction": "high", "so_what": "A 250,000-person forced-relocation plan with a track record of lethal land disputes is a material political and execution risk for any capital deployed into Vietnam's Hanoi redevelopment program.", "quote": null, "locator": "Residents of Hanoi are taking part in rare protests", "quote_verified": false}]}, {"theme": "Singapore's language-identity flashpoint", "insights": [{"claim": "A Teochew-language film, 'Dear You,' became a Singapore box-office hit and reignited debate over the government's decades-long policy of promoting Mandarin over southern Chinese varieties (Teochew, Hokkien, Hakka, Cantonese), forcing officials to add 50 more Teochew screenings on top of the original 22 in response to demand.", "speaker": "Joseph Rachman", "type": "data_point", "entities": ["Singapore", "Teochew"], "conviction": "high", "so_what": "Shows measurable consumer demand for non-Mandarin Chinese-language content forcing a policy concession in Singapore, relevant // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#be185d', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
