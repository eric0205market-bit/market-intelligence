:root {
  --bg: #fdf7fa;
  --surface: #ffffff;
  --border: #f3dde7;
  --border-light: #faeef3;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #be185d;          /* rose — Society accent (matches dashboard tile) */
  --accent-soft: #fce7f0;
  --quote: #9d174d;
  --yellow: #fff5b3;

  /* insight-type colors */
  --t-thesis: #2563eb;
  --t-prediction: #7c3aed;
  --t-framework: #0891b2;
  --t-data_point: #d97706;
  --t-causal: #be185d;
  --t-contrarian: #dc2626;
  --t-anecdote: #6b7280;
  --t-default: #6b7280;

  /* conviction colors */
  --c-high: #be185d;   /* rose — high conviction + ✓verified mark (matches accent) */
  --c-medium: #d97706;
  --c-low: #9ca3af;
  --c-exploratory: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;

.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.title .icon { margin-right: 6px; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* CONTROLS (display-only: sort + filter by source) */
.controls { display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
            margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 6px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-2); }

.group { margin-bottom: 4px; }

.gist { font-size: 13.5px; line-height: 1.6; color: var(--text); padding: 12px 16px 4px;

                   margin-right: 5px; }

         color: var(--quote); border-radius: 0 4px 4px 0; }
.quote .vmark { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
                color: var(--c-high); margin-left: 6px; }
.quote .vmark.no { color: var(--text-3); }

.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }

lwind for global naval and defense equipment exporters.", "quote": null, "locator": "As strategic competition intensifies across the Indo-Pacific", "quote_verified": false}]}], "insight_total": 5, "top_entities": ["Italy", "Guido Crosetto", "Giuseppe Garibaldi", "Indonesia", "Malaysia", "Shangri-La Dialogue", "Indo-Pacific"], "source_meta": {"author": "Francesco Valacchi", "word_count": 179, "paywalled": false}}, {"record_id": "364f3a8c11f343d7", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/07/guam-where-americas-250th-birthday-will-first-be-honored/", "title": "Guam: Where America’s 250th Birthday Will First Be Honored", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-08T17:10:49Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Geopolitics"], "gist": "An op-ed argues that Guam's status as the first U.S. community to see sunrise on July 4, 2026 — America's 250th anniversary — should prompt greater national recognition of the island's strategic importance and loyalty.", "themes": [{"theme": "Guam's symbolic and strategic standing", "insights": [{"claim": "As the westernmost U.S. time zone, Guam will be the first American community to see sunrise on July 4, 2026, the nation's 250th anniversary (semiquincentennial), ahead of Washington, Philadelphia, or Boston.", "speaker": "Frank F. Blas, Jr.", "type": "data_point", "entities": ["Guam", "United States", "semiquincentennial"], "conviction": "high", "so_what": "A symbolic marker the author uses to argue for greater national recognition of Guam's strategic status; watch for accompanying federal attention or funding narratives tied to the 250th anniversary.", "quote": "it will shine on Guam before reaching any other American soil", "locator": "When the sun rises on July 4, 2026", "quote_verified": true}, {"claim": "The author frames Guam's motto 'Where America's Day Begins' as reflecting a substantive strategic and political role rather than a tourism slogan, describing the island as geographically distant, strategically essential, and unwaveringly loyal to the United States.", "speaker": "Frank F. Blas, Jr.", "type": "thesis", "entities": ["Guam", "United States"], "conviction": "high", "so_what": "Signals an advocacy push for increased federal recognition and investment in Guam ahead of the 250th anniversary, relevant to watchers of U.S. territorial policy and Pacific basing infrastructure spending.", "quote": "geographically distant, strategically essential, and unwaveringly loyal", "locator": "“Where America’s Day Begins” is not a slogan", "quote_verified": true}, {"claim": "As the United States marks its 250th anniversary, the author argues Guam will again be positioned at the front of the national commemorative timeline and that the country should recognize what that means.", "speaker": "Frank F. Blas, Jr.", "type": "prediction", "entities": ["Guam", "United States"], "conviction": "medium", "so_what": "An advocacy signal from a Guam-based author likely foreshadowing policy or funding asks tied to the anniversary; a soft leading indicator for future Guam-focused U.S. legislative attention.", "quote": null, "locator": "As the United States marks its semiquincentennial", "quote_verified": false}]}], "insight_total": 3, "top_entities": ["Guam", "United States", "semiquincentennial"], "source_meta": {"author": "Frank F. Blas, Jr.", "word_count": 167, "paywalled": false}}, {"record_id": "38f5ce2a3cc856b0", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/06/why-the-heart-of-indias-indigenous-fighter-ecosystem-will-be-american-for-several-decades-to-come/", "title": "Why the Heart of India’s Indigenous Fighter Ecosystem Will be American for Several Decades to Come", "published_date": "2026-06-29", "language": "en", "processed_at": "2026-07-08T17:09:37Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Tech"], "gist": "India's push for an indigenous fighter-jet ecosystem (AMCA, LCA Mk2, AMCA-Mk1) is structurally dependent on the American General Electric F414 engine, and stalled GE-HAL negotiations over a tripled per-engine cost are delaying an already-late program.", "themes": [{"theme": "Engine dependency in India's fighter program", "insights": [{"claim": "India is negotiating with U.S. manufacturer General Electric to buy F414 jet engines for the five prototypes of its fifth-generation Advanced Medium Combat Aircraft (AMCA), but the talks have stalled because the per-engine cost has tripled.", "speaker": "Dinakar Peri", "type": "data_point", "entities": ["India", "General Electric", "F414", "AMCA"], "conviction": "high", "so_what": "A tripled unit cost on a critical program input signals both GE's pricing leverage and a concrete near-term delay risk for AMCA's prototype timeline.", "quote": null, "locator": "India is in talks with U.S. engine manufacturer General Electric", "quote_verified": false}, {"claim": "The same General Electric F414 engine has been chosen to power not only the AMCA but also the Mk2 variant of the indigenous single-engine Light Combat Aircraft (LCA) and the twin-engine AMCA-Mk1.", "speaker": "Dinakar Peri", "type": "data_point", "entities": ["General Electric", "F414", "LCA Mk2", "AMCA-Mk1"], "conviction": "high", "so_what": "A single U.S. engine underpins three separate 'indigenous' airframe programs, meaning any GE pricing or supply disruption cascades across India's entire next-generation fighter fleet.", "quote": null, "locator": "The F414 engine has also been chosen to power", "quote_verified": false}, {"claim": "The larger commercial deal under negotiation between GE and Hindustan Aeronautics Limited (HAL) for LCA Mk2 production is separate from, and unaffected by, the cost escalation specifically tied to the 15 off-the-shelf engines the Aeronautical Development Agency (ADA) is buying to power the AMCA prototypes.", "speaker": "Dinakar Peri", "type": "data_point", "entities": ["General Electric", "Hindustan Aeronautics Limited", "Aeronautical Development Agency"], "conviction": "high", "so_what": "Distinguishes two separate GE-India negotiating tracks investors should watch separately: the AMCA prototype engine buy (currently stalled) versus the larger HAL Mk2 production deal (still in commercial stage).", "quote": null, "locator": "officials in the know clarified that the larger deal", "quote_verified": false}, {"claim": "Because AMCA, LCA Mk2, and AMCA-Mk1 all rely on the same American F414 engine, the core of India's 'indigenous' fighter ecosystem will remain American-sourced propulsion for the foreseeable future, regardless of the self-reliance framing around the airframes themselves.", "speaker": "Dinakar Peri", "type": "thesis", "entities": ["India", "General Electric", "AMCA", "LCA Mk2"], "conviction": "high", "so_what": "Structural U.S. leverage over India's fighter-modernization timeline persists even as India markets these programs as indigenous — relevant to defense-supply-chain and India-U.S. relations positioning.", "quote": null, "locator": "The jet engine remains the biggest stumbling block", "quote_verified": false}]}], "insight_total": 4, "top_entities": ["India", "General Electric", "F414", "AMCA", "LCA Mk2", "AMCA-Mk1", "Hindustan Aeronautics Limited", "Aeronautical Development Agency"], "source_meta": {"author": "Dinakar Peri", "word_count": 177, "paywalled": false}}, {"record_id": "3d3bbcbaf07518eb", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/07/understanding-chinas-party-state-intelligence-system/", "title": "Understanding China’s Party-State Intelligence System", "published_date": "2026-07-03", "language": "en", "processed_at": "2026-07-08T17:09:37Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society"], "gist": "Matt Brazil argues Chinese espionage should be understood not as the work of isolated agencies (MSS, MPS, PLA) but as the output of a CCP-led, party-directed intelligence ecosystem organized around regime security, increasingly codified by Xi-era national security law and executed through a decentralized web of contractors, firms, and 'non-traditional collectors.'", "themes": [{"theme": "From cataloguing cases to explaining the system", "insights": [{"claim": "Research on Chinese espionage has moved through three phases: first establishing that a significant threat exists, then compiling hundreds of individual cases into an empirical pattern (led by researchers like Nicholas Eftimiades), and now asking what kind of political and institutional system consistently produces these operations.", "speaker": "Matt Brazil", "type": "framework", "entities": ["Nicholas Eftimiades", "CCP"], "conviction": "high", "so_what": "Reframes how analysts should model China risk going forward: as a systemic, durable feature of CCP governance rather than a series of discrete, containable incidents.", "quote": "The field has evolved from documenting espionage to explaining the party-led system behind it.", "locator": "The literature is evolving, reflecting a maturing understanding", "quote_verified": true}, {"claim": "Chinese espionage is best understood as the product of a CCP-led political system that treats intelligence as one instrument of governance, rather than merely the activity of the Ministry of State Security (MSS), Ministry of Public Security (MPS), and People's Liberation Army (PLA) in isolation.", "speaker": "Matt Brazil", "type": "thesis", "entities": ["CCP", "MSS", "MPS", "PLA"], "conviction": "high", "so_what": "Counterintelligence, export-control, and research-security policy should target the CCP's political system and its incentives, not just the named intelligence agencies.", "quote": "Chinese espionage is best understood not as the activity of a handful of intelligence agencies.", "locator": "That perspective reveals something fundamental", "quote_verified": true}]}, {"theme": "The ecosystem beyond the formal agencies", "insights": [{"claim": "Beyond the MSS (primary civilian intelligence/counterintelligence service), the MPS and its local Public Security Bureaus (domestic security plus growing overseas operations, including the network of overseas 'police stations' exposed by Safeguard Defenders), and the PLA (military intelligence, cyber, and tech collection), the CCP also draws on state-owned enterprises, private technology firms, universities, research institutes, United Front organizations, commercial contractors, and individual 'non-traditional collectors.'", "speaker": "Matt Brazil", "type": "data_point", "entities": ["MSS", "MPS", "PLA", "Safeguard Defenders", "United Front"], "conviction": "high", "so_what": "A concrete due-diligence checklist: any SOE, tech firm, university, or contractor relationship with China carries potential dual-use as an intelligence conduit.", "quote": null, "locator": "The MSS, MPS, and PLA remain the principal", "quote_verified": false}, {"claim": "Leaked material from the cyber contractor iSOON, analyzed by the research group Natto Thoughts, showed how nominally private Chinese companies can perform state-security missions while giving Beijing varying degrees of deniability.", "speaker": "Matt Brazil", "type": "data_point", "entities": ["iSOON", "Natto Thoughts"], "conviction": "high", "so_what": "A concrete precedent for treating ostensibly private Chinese cyber and tech vendors as potential state intelligence proxies in vendor and supply-chain risk assessments.", "quote": "how ostensibly private companies can perform state security missions while providing varying degrees of deniability for government agencies", "locator": "Recent leaks involving the cyber contractor iSOON", "quote_verified": true}, {"claim": "Brazil rejects the popular 'whole-of-society' description of Chinese espionage as overstated and risking alienation of diaspora communities, arguing it is more accurate to call it a 'party-directed, whole-of-system' approach in which the CCP selectively mobilizes only the sectors of society useful to its objectives.", "speaker": "Matt Brazil", "type": "contrarian", "entities": ["CCP", "United Front"], "conviction": "high", "so_what": "Blanket suspicion of ethnic-Chinese communities or firms is analytically wrong per this framing; targeted resilience measures aimed at specific co-opted sectors are the more defensible policy design.", "quote": "It is therefore more accurate to describe this as a party-directed, whole-of-system approach than a genuinely whole-of-society one.", "locator": "Describing this as a 'whole-of-society' effort", "quote_verified": true}]}, {"theme": "Regime security as the organizing logic", "insights": [{"claim": "At the center of the CCP's intelligence system is regime security — preserving the party's monopoly on political power — with intelligence collection, political influence, technology acquisition, military modernization, and economic development functioning as mutually reinforcing components of a single political strategy rather than separate missions.", "speaker": "Matt Brazil", "type": "thesis", "entities": ["CCP", "Xi Jinping"], "conviction": "high", "so_what": "Explains why China pursues cyber espionage, tech acquisition, and transnational repression simultaneously as one coherent campaign rather than opportunistic separate programs — useful for cross-sector China-risk scenario planning.", "quote": "regime security: preserving the party's monopoly on political power", "locator": "The CCP's intelligence system serves political objectives", "quote_verified": true}, {"claim": "The CCP's intelligence tradecraft integrates methods rather than deploying them independently: a cyber intrusion may facilitate human recruitment, a commercial partnership may create intelligence opportunities, and an influence operation may prepare the ground for technology acquisition, so any single detected incident is usually only one visible piece of a larger campaign.", "speaker": "Matt Brazil", "type": "causal", "entities": ["CCP"], "conviction": "high", "so_what": "Organizations that detect and remediate a single intrusion or approach should assume linked follow-on vectors rather than treating the incident as isolated.", "quote": "The individual case often represents only one visible component of a much larger campaign.", "locator": "The party's intelligence system now rarely relies", "quote_verified": true}]}, {"theme": "Legal centralization under Xi", "insights": [{"claim": "Xi Jinping's expanding national security legal architecture — the National Security Law, Counter-Espionage Law, National Intelligence Law, and Data Security Law — explicitly codifies organizations' and citizens' obligations to support state security work, replacing what was previously an unwritten norm.", "speaker": "Matt Brazil", "type": "data_point", "entities": ["Xi Jinping", "National Security Law", "Counter-Espionage Law", "National Intelligence Law", "Data Security Law"], "conviction": "high", "so_what": "Any China-based entity or joint venture operates under explicit statutory obligation to cooperate with state intelligence demands — a standing legal and compliance risk for foreign firms partnering with or operating in China.", "quote": null, "locator": "Xi Jinping's expanding national security legislation", "quote_verified": false}, {"claim": "Under Xi, China's intelligence system has become more centralized politically while growing more decentralized operationally through expanded reliance on contractors, commercial entities, technical specialists, and digital technologies — a combination that raises both scalability and plausible deniability.", "speaker": "Matt Brazil", "type": "causal", "entities": ["Xi Jinping", "CCP"], "conviction": "high", "so_what": "Signals rising, harder-to-attribute operational tempo; counterintelligence and vendor-screening resourcing should scale with the growing contractor layer, not ngthen institutional resilience", "quote_verified": false}, {"claim": "The CCP's use of intelligence as an instrument of governance dates back to the party's underground organizations of the late 1920s, making today's MSS-led system the latest expression of a nearly century-old institutional tradition rather than a Xi-era or reform-era innovation.", "speaker": "Matt Brazil", "type": "data_point", "entities": ["CCP", "MSS"], "conviction": "high", "so_what": "Undercuts the assumption that a future CCP leadership transition would meaningfully de-securitize China policy — the practice predates and is likely to outlast any single leader.", "quote": null, "locator": "policymakers should recognize that the party's intelligence system", "quote_verified": false}]}], "insight_total": 12, "top_entities": ["CCP", "MSS", "MPS", "PLA", "Xi Jinping", "iSOON", "Natto Thoughts", "Safeguard Defenders", "Nicholas Eftimiades", "National Intelligence Law", "United Front"], "source_meta": {"author": "Matt Brazil", "word_count": 1408, "paywalled": false}}, {"record_id": "3db7e32b975ee110", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/07/reckoning-with-the-evolving-china-russia-threat/", "title": "Reckoning With the Evolving China-Russia Threat", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-08T17:09:37Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics"], "gist": "Christopher Walker argues the China-Russia-North Korea-Iran military entanglement around the Ukraine war has moved far beyond what analysts thought plausible a decade ago, from Chinese economic/logistical support for Moscow's war effort to reported secret Chinese training of Russian forces in radiological, biological, and chemical warfare.", "themes": [{"theme": "China as Russia's wartime lifeline", "insights": [{"claim": "China now functions as the economic and logistical lifeline enabling Russia to wage full-scale war against Ukrain ary.", "speaker": "Brian Hioe", "type": "data_point", "entities": ["Lai Ching-te", "Taiwan"], "conviction": "high", "so_what": "Gives investors and defense-industry watchers a concrete unit count for Taiwan's planned drone procurement, useful for sizing potential order flow to Taiwanese and allied drone suppliers once/if the budget passes.", "quote": null, "locator": "The Lai administration had hoped to purchase", "quote_verified": false}, {"claim": "The composition of the blocked budget, heavily weighted toward coastal attack drones and uncrewed surface vessels, indicates Taiwan's rising strategic interest in maritime drones relative to the aerial UAVs that previously dominated discussion.", "speaker": "Brian Hioe", "type": "framework", "entities": ["Taiwan", "uncrewed surface vessels"], "conviction": "medium", "so_what": "A pivot toward maritime unmanned systems points to where Taiwan's defense-industrial demand (and potential supplier contracts) is shifting relative to legacy aerial-drone programs.", "quote": "This seems to indicate rising interest in maritime drones; there was relatively more discussion of unmanned aerial vehicles in the past.", "locator": "This seems to indicate rising interest", "quote_verified": true}]}], "insight_total": 3, "top_entities": ["Taiwan", "Kuomintang", "Taiwan People’s Party", "Democratic Progressive Party", "Lai Ching-te"], "source_meta": {"author": "Brian Hioe", "word_count": 162, "paywalled": false}}, {"record_id": "7ca1e8595e9ce76c", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/06/to-compete-in-the-pacific-the-us-needs-to-move-past-zero-sum-alignment/", "title": "To Compete in the Pacific, the US Needs to Move Past Zero-Sum Alignment", "published_date": "2026-06-29", "language": "en", "processed_at": "2026-07-08T17:10:09Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society"], "gist": "The Diplomat argues Washington's Pacific Islands strategy is hampered by demanding explicit alignment from partner states, while Beijing only requires non-interference (and separately rewards active support), giving China a lower-friction path to influence in the region. The piece calls on the US to close this framing gap to compete effectively.", "themes": [{"theme": "Competing US-China frameworks in the Pacific", "insights": [{"claim": "US policy toward Pacific Island states is built on a framework that prizes clear alignment, incentivizing partner states to demonstrate commitment to the U.S.-led order.", "speaker": "William Duncan", "type": "framework", "entities": ["United States", "Pacific Islands"], "conviction": "high", "so_what": "Investors and policy-watchers tracking US-China competition for Pacific influence should note Washington's alignment-based approach is structurally more demanding on partner states than Beijing's.", "quote": "incentivizing partner states to demonstrate commitment to the U.S.-led order", "locator": "American policymakers have generally approached", "quote_verified": true}, {"claim": "China's threshold for engagement with Pacific Island states is lower than Washington's: Beijing does not require explicit alignment, only that states refrain from actively undermining Chinese interests, while still rewarding those who actively support its positions.", "speaker": "William Duncan", "type": "framework", "entities": ["China", "Beijing", "Pacific Islands"], "conviction": "high", "so_what": "Beijing's lower-friction engagement bar makes it structurally easier for Pacific states to stay on good terms with China without fully aligning, a persistent tailwind for Chinese influence absent a US policy shift.", "quote": "it does not require explicit alignment, only that states refrain from actively undermining Chinese interests", "locator": "Beijing, by contrast, operates", "quote_verified": true}, {"claim": "This asymmetry between US and Chinese approaches creates diplomatic friction with Pacific Island states, whose foreign policies are shaped by sovereignty, development, and non-alignment imperatives, in a way Beijing's more flexible posture does not.", "speaker": "William Duncan", "type": "causal", "entities": ["Pacific Islands", "United States", "China"], "conviction": "high", "so_what": "Explains a structural reason Pacific states may drift toward China even absent ideological preference: Washington's own framework generates the friction that Beijing avoids.", "quote": "Washington’s framework creates friction that Beijing’s more flexible posture does not", "locator": "In the Pacific Islands, where strategic imperatives", "quote_verified": true}, {"claim": "The author's thesis is that bridging the gap between how Washington frames strategic competition and the on-the-ground realities of Pacific Island states is essential to advancing American interests in the region, and that understanding how Beijing exploits this gap is the necessary first step.", "speaker": "William Duncan", "type": "thesis", "entities": ["United States", "Beijing", "Pacific Islands"], "conviction": "high", "so_what": "A call for a US Pacific-strategy reframe toward more flexible partnership terms — relevant for anyone tracking US Indo-Pacific diplomatic or aid strategy shifts.", "quote": "Understanding how Beijing exploits this space is the first step toward closing it.", "locator": "Bridging this gap between how the United States frames", "quote_verified": true}]}], "insight_total": 4, "top_entities": ["United States", "China", "Beijing", "Washington", "Pacific Islands"], "source_meta": {"author": "William Duncan", "word_count": 220, "paywalled": false}}, {"record_id": "7cf26e757decb4b8", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/06/xi-jinping-just-made-it-a-crime-to-be-taiwanese/", "title": "Xi Jinping Just Made It a Crime to Be Taiwanese", "published_date": "2026-06-30", "language": "en", "processed_at": "2026-07-08T17:10:09Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society"], "gist": "The Diplomat's Kolas Yotaka argues that a week after Xi Jinping's September 2025 Tiananmen military parade, China's National People's Congress began deliberating a law that legally recasts Taiwanese people as PRC citizens (Article 21), pairing hard-power signaling with a lawfare push to absorb Taiwanese political identity.", "themes": [{"theme": "Beijing's legal campaign on Taiwanese identity", "insights": [{"claim": "Xi Jinping staged a military parade in Tiananmen Square on September 3, 2025, marking the 80th anniversary of China's WWII victory over Japan, featuring advanced weapons systems and attended by leaders of Russia and North Korea, in a deliberate display of authority to the military and legitimacy to the public.", "speaker": "Kolas Yotaka", "type": "data_point", "entities": ["Xi Jinping", "China", "Russia", "North Korea"], "conviction": "high", "so_what": "Establishes the authoritarian-bloc show-of-force baseline against which Beijing's subsequent legal moves on Taiwan should be read; the parade lineup is a proxy for coordination among China, Russia, and North Korea.", "quote": "a signal of authority to the military, a performance of legitimacy for the public", "locator": "The display was deliberate in every detail", "quote_verified": true}, {"claim": "A week after the parade, the Standing Committee of China's National People's Congress began deliberating the 'Law of the People's Republic of China on the Promotion of Ethnic Unity,' which treats Taiwanese people as citizens of the PRC.", "speaker": "Kolas Yotaka", "type": "data_point", "entities": ["National People's Congress", "China", "Taiwan"], "conviction": "high", "so_what": "A concrete legal escalation beyond rhetoric: codifying Taiwanese people as PRC citizens lays the legal groundwork for treating Taiwanese political identity as a domestic matter, a material geopolitical risk factor for cross-strait tension.", "quote": "The law ka", "word_count": 212, "paywalled": false}}, {"record_id": "808ed10ad8725807", "source_type": "society", "source_name": "The Diplomat", "source_url": "https://thediplomat.com/2026/07/in-photos-northeast-thailands-rocket-festival/", "title": "In Photos: Northeast Thailand’s Rocket Festival", "published_date": "2026-06-30", "language": "en", "processed_at": "2026-07-08T17:10:09Z", "processor": "claude-code-sub-opus", "tags": ["Society"], "gist": "A photo essay documents northeastern Thailand's bun bang fai (rocket) festival, a pre-9th-century fertility ritual in which villages launch homemade rockets to ask the rain god Phaya Thaen for rain at the start of the agricultural season.", "themes": [{"theme": "Bun bang fai rocket festival tradition", "insights": [{"claim": "The bun bang fai (merit fireworks/rocket) festival in northeastern Thailand and Laos is a pre-Buddhist fertility ritual dating to before the 9th century CE, in which rockets are launched to implore the rain god Phaya Thaen to bring rain at the start of the agricultural season.", "speaker": "Adryel Talamantes", "type": "data_point", "entities": ["Thailand", "Laos", "Phaya Thaen"], "conviction": "high", "so_what": "A cultural data point on a centuries-old regional tradition, relevant for anyone tracking Thai/Lao rural cultural tourism tied to the agricultural calendar.", "quote": "existed as a pre-Buddhist fertility ritual since before the 9th century CE", "locator": "At the start of the rainy season", "quote_verified": true}, {"claim": "The rocket element of the bun bang fai tradition is thought to have originated when black powder was introduced to the region from China.", "speaker": "Adryel Talamantes", "type": "data_point", "entities": ["China", "Thailand"], "conviction": "medium", "so_what": "Traces a long-run historical diffusion of Chinese technology into Southeast Asian ritual practice, illustrating deep cultural exchange between the two regions.", "quote": "the rocket element thought to have started when black powder was introduced to the region from China", "locator": "with the rocket element thought to have started", "quote_verified": true}, {"claim": "In its contemporary form, villages and regional cities in Thailand's Kalasin and Roi Et provinces hold multi-day bun bang fai festivals in May and June featuring parades and traditional music and dance, culminating in rocket launches near open rice fields away from population centers.", "speaker": "Adryel Talamantes", "type": "data_point", "entities": ["Thailand", "Kalasin province", "Roi Et province"], "conviction": "high", "so_what": "Identifies the specific provinces (Kalasin, Roi Et) and seasonal window (May-June) where this annual cultural event concentrates, useful for regional cultural-tourism tracking.", "quote": null, "locator": "In its contemporary iteration", "quote_verified": false}]}], "insight_total": 3, "top_entities": ["Thailand", "Laos", "Phaya Thaen", "Kalasin province", "Roi Et province", "China"], "source_meta": {"author": "Adryel Talamantes", "word_count": 766, "paywalled": false}}, {"record_id": "9c1dde78477ca92d", "source_type": "society", "source_name": "Foreign Policy", "source_url": "https://foreignpolicy.com/2026/07/03/venezuela-earthquakes-rodriguez-machado-politics/?tpcc=recirc_latest062921", "title": "Venezuela’s Bungled Earthquake Response", "published_date": "2026-07-03", "language": "en", "processed_at": "2026-07-08T17:09:27Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society", "Macro"], "gist": "Venezuela's botched response to twin earthquakes (2,295+ dead, $6.7B in direct damage) is exposing acting President Delcy Rodríguez's fragile legitimacy since the US-backed ouster of Maduro, while regional trade fault lines widen: Washington starts a 10-year USMCA sunset clock, Bolivia abandons its 15-year dollar peg, and Mercosur accelerates diversification toward Japan and Canada.", "themes": [{"theme": "Venezuela's earthquake and political fragility", "insights": [{"claim": "Venezuela's government confirmed at least 2,295 deaths from twin 7.2- and 7.5-magnitude earthquakes, while citizen-compiled registries suggest tens of thousands remain missing, implying the true toll is far higher than official figures.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["Venezuela"], "conviction": "high", "so_what": "The gap between official and citizen death counts signals state capacity failure, a leading indicator for political instability risk in Venezuela.", "quote": null, "locator": "On Shaky Ground", "quote_verified": false}, {"claim": "The UN Development Program estimated the Venezuela earthquakes caused $6.7 billion in direct physical damages alone, with broader economic disruption costs likely much higher.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["Venezuela", "United Nations Development Program"], "conviction": "high", "so_what": "A multi-billion-dollar reconstruction bill lands on an already-crisis economy just months into the post-Maduro transition, raising the odds of further US/allied aid or oil-sector concessions.", "quote": null, "locator": "On Shaky Ground", "quote_verified": false}, {"claim": "Venezuela's government response teams were slow to reach hard-hit areas and reportedly blocked would-be rescuers from accessing disaster zones, triggering viral videos of residents booing acting President Delcy Rodríguez during a tour of the destruction.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["Delcy Rodríguez", "Venezuela"], "conviction": "high", "so_what": "Visible public anger at the government just months after a US-backed leadership change is an early signal of legitimacy erosion worth tracking for Venezuela political-risk exposure.", "quote": null, "locator": "Government response teams have been slow to reach", "quote_verified": false}, {"claim": "The Caracas-Washington economic recovery program launched after the US ousted Nicolás Maduro in January bal research points to a similar conclusion", "quote_verified": true}, {"claim": "Opposition leader María Corina Machado paused plans to return to Venezuela to aid earthquake relief after both the Trump and Rodríguez administrations signaled they did not support her return, and her Venezuelan passport is reportedly expired.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["María Corina Machado", "Donald Trump", "Delcy Rodríguez"], "conviction": "high", "so_what": "Washington actively restraining the opposition's most popular figure suggests the US is prioritizing stability with the Rodríguez government over accelerating a democratic transition, tempering bullish election-timeline expectations.", "quote": null, "locator": "Venezuela's most popular opposition figure, María Corina Machado", "quote_verified": false}, {"claim": "Machado's attempted return is reportedly driving Secretary of State Marco Rubio 'crazy,' while the top US diplomat in Caracas said Washington has 'a great deal of confidence' in the Rodríguez administration; the US has deployed 2,000 military personnel and pledged $100 million in new aid, a notable exception to Trump's general pullback from foreign assistance.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["Marco Rubio", "Delcy Rodríguez", "United States", "Venezuela"], "conviction": "high", "so_what": "The scale of US military/aid commitment to Venezuela despite Trump's broader foreign-aid retrenchment signals Venezuela retains unusually high strategic priority for Washington, likely tied to oil-sector stakes.", "quote": "great deal of confidence", "locator": "Machado’s attempts to return to Venezuela", "quote_verified": true}, {"claim": "Rubio has said free elections in Venezuela are envisioned eventually, after an initial stabilization period, but a Foreign Policy reporter argued that without genuine democratization and 'technification' of state institutions there will be no reconstructed Venezuela.", "s tners, and their economic growth already fell below IMF projections last year after Trump imposed tariffs on both countries.", "speaker": "Catherine Osborn", "type": "causal", "entities": ["Canada", "Mexico", "International Monetary Fund", "Donald Trump"], "conviction": "high", "so_what": "Sustained US tariff unpredictability is a documented drag on realized Canadian and Mexican growth, and is accelerating their trade diversification away from US dependence.", "quote": null, "locator": "The prolonged uncertainty could continue", "quote_verified": false}]}, {"theme": "Bolivia's dollar-peg exit", "insights": [{"claim": "Bolivia abandoned its 15-year fixed peg of the boliviano to the dollar as part of President Rodrigo Paz's pro-market reforms; the official exchange rate devalued from about 7 to about 10 bolivianos per dollar on the first day of the new regime.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["Bolivia", "Rodrigo Paz", "boliviano"], "conviction": "high", "so_what": "A ~30% de facto devaluation signals the central bank is finally admitting the black-market/official rate gap; watch for near-term inflation pass-through and FX-driven repricing of Bolivian assets.", "quote": null, "locator": "Bolivia’s currency shift", "quote_verified": false}, {"claim": "Bolivia's central bank will now publish the next day's official exchange rate each evening rather than removing currency controls entirely, aiming to unify the official and black-market rates and increase foreign investor confidence.", "speaker": "Catherine Osborn", "type": "data_point", "entities": ["Bolivia", "Rodrigo Paz"], "conviction": "medium", "so_what": "A managed, gradual unification (not a full float) suggests Bolivia is signaling reform without fully relinquishing FX control, relevant for gauging the credibility of the reform to foreign investors.", "quote": null, "locator": "The government did not remove all currency controls", "quote_verified": false}, {"claim": "Bolivia's do // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#be185d', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
