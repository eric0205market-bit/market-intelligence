function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

  renderFilterPills();
  renderCards();

  activeCat = cat;
  activeSrc = null;

  renderCards();

  activeUrg = urg;
  activeSrc = null;
  renderFilterPills();
  renderCards();
}

function renderFilterPills() {
  var cats = ["all"];
  var catCounts = {};
  ITEMS.forEach(function(item) {
    if (!catCounts[item.cat]) catCounts[item.cat] = 0;
    catCounts[item.cat]++;
    if (cats.indexOf(item.cat) === -1) cats.push(item.cat);
  });

  var urgCounts = { all: ITEMS.length, act_now: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });

  var catHTML = '';
  cats.forEach(function(cat) {
    var isActive = (activeCat === cat && !activeSrc);
    var color = cat === 'all' ? '#333' : getColor(cat);
    var label = cat === 'all' ? 'All (' + ITEMS.length + ')' : cat + ' (' + catCounts[cat] + ')';
    catHTML += '<span class="pill' + (isActive ? ' active' : '') + (cat === 'all' ? ' all-pill' : '') + '" style="' + (isActive && cat !== 'all' ? 'background:' + color + ';border-color:' + color : '') + '" onclick="setCat(\'' + cat + '\')">' + label + '</span>';
  });
  document.getElementById('cat-filters').innerHTML = catHTML;

  var urgHTML = '';
  [['all','All'], ['act_now','🔴 Act Now'], ['deep','🔵 Deep'], ['watch','🟡 Watch']].forEach(function(pair) {
    var key = pair[0], label = pair[1];
    var isActive = (activeUrg === key && !activeSrc);
    urgHTML += '<span class="pill' + (isActive ? ' active all-pill' : '') + '" onclick="setUrg(\'' + key + '\')">' + label + ' (' + urgCounts[key] + ')</span>';
  });
  document.getElementById('urg-filters').innerHTML = urgHTML;
}

function renderReport() {
  var html = '';
  html += '<div class="window-note">Window: <strong>' + META.windowStart + '</strong> → <strong>' + META.windowEnd + '</strong>. ' + META.emailsRead + ' of ' + META.emailsInWindow + ' emails read. ' + META.itemsExtracted + ' items extracted.</div>';
  html += '<br><strong>Included Sources (' + META.includedSources.length + '):</strong><br>';
  META.includedSources.forEach(function(s) {
    html += '<span class="src-link" onclick="filterBySrc(\'' + s.name + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items > 1 ? 's' : '') + '<br>';
  });
  html += '<br><strong>Skipped Sources (' + META.skippedSources.length + '):</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += '<em>' + s.name + '</em> — ' + s.reason + '<br>';
  });
  document.getElementById('report-body').innerHTML = html;
}

function init() {
  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
  renderFilterPills();
  renderCards();
  renderReport();
}

init();
</script>
</body>
</html>
