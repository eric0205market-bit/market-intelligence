  var ta = document.createElement('textarea');
  ta.value = text;

  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = '📋 Copy'; }, 1500);
}

}

function setActiveUrg(urg) {

  if(u==='deep') return '🔵';

  rb.innerHTML = '<p><strong>Time window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</p>'
    + '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' · <strong>Read:</strong> ' + META.emailsRead + ' · <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>'
    + '<p><strong>Sources:</strong> ' + srcList + '</p>'
    + (META.skippedSources.length ? '<p><strong>Skipped:</strong> ' + META.skippedSources.join(', ') + '</p>' : '<p><strong>Skipped:</strong> none — all emails read and included</p>');
}

render();
</script>
</body>
</html>
