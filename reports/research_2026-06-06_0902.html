function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i){ return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) {
    body.classList.toggle('open');
  }
}

function toggleReport() {
  var b = document.getElementById('report-body');
  var a = document.getElementById('report-arrow');
  b.classList.toggle('open');
  a.textContent = b.classList.contains('open') ? '▲' : '▼';
}

function setFilter(type, val) {
  activeSrc = null;
  if (type === 'cat') activeCat = val;
  if (type === 'urg') activeUrg = val;
  renderFilters();
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderFilters();
  renderCards(true);
}

function urgLabel(u) {
  if (u === 'act-now') return '🔴';
  if (u === 'deep') return '🔵';
  if (u === 'watch') return '🟡';
  return '';
}

function catColor(cat) {
  return CAT_COLORS[cat] || '#888';
}

function renderFilters() {
  // Category counts
  var catCounts = {all: ITEMS.length};
  ITEMS.forEach(function(it) {
    catCounts[it.cat] = (catCounts[it.cat] || 0) + 1;
  });
  var urgCounts = {all: ITEMS.length, 'act-now': 0, deep: 0, watch: 0};
  ITEMS.forEach(function(it) {
    urgCounts[it.urgency] = (urgCounts[it.urgency] || 0) + 1;
  });

  var catEl = document.getElementById('cat-filters');
  var urgEl = document.getElementById('urg-filters');

  var cats = ['all'].concat(Object.keys(catCounts).filter(function(k){ return k !== 'all'; }).sort());
  catEl.innerHTML = cats.map(function(c) {
    var active = activeCat === c ? ' active' : '';
    var style = (c !== 'all' && activeCat === c) ? ' style="background:' + catColor(c) + '"' : '';
    var label = c === 'all' ? 'All (' + catCounts.all + ')' : c + ' (' + (catCounts[c]||0) + ')';
    return '<span class="pill cat-all' + active + '"' + style + ' onclick="setFilter(\'cat\',\'' + c + '\')">' + label + '</span>';
  }).join('');

  var urgs = [['all','All'], ['act-now','🔴 Act Now'], ['deep','🔵 Deep'], ['watch','🟡 Watch']];
  urgEl.innerHTML = urgs.map(function(u) {
    var active = activeUrg === u[0] ? ' active' : '';
    return '<span class="pill urg-all' + active + '" onclick="setFilter(\'urg\',\'' + u[0] + '\')">' + u[1] + ' (' + urgCounts[u[0]] + ')</span>';
  }).join('');
}

  }).join('');

  container.innerHTML = html;
  document.getElementById('visible-count').textContent = visible;
}

function buildSrcTable() {
  var tbody = document.getElementById('src-table');
  tbody.innerHTML = META.includedSources.map(function(s) {
    return '<tr><td><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + '</span></td><td>' + s.items + '</td><td>' + s.note + '</td></tr>';
  }).join('');
}

// ---- INIT ----
renderFilters();
renderCards();
buildSrcTable();
</script>
</body>
</html>
