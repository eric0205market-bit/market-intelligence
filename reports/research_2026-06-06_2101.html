<script>
var activeCat = 'all';
var activeUrg = 'all';
var activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (!body) return;
  body.classList.toggle('open');
}

function toggleReport() {
  var rb = document.getElementById('report-body');
  var arr = document.getElementById('report-arrow');
  rb.classList.toggle('open');
  arr.textContent = rb.classList.contains('open') ? '▲' : '▼';
}

function getColor(cat) {
  return CAT_COLORS[cat] || '#888';
}

function getUrgEmoji(u) {
  return URGENCY_MAP[u] || '🔵';
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  updateFilters();
  renderCards();
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  updateFilters();
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  updateFilters();
  renderCards();
}

function matchItem(item) {
  if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
  var catOk = activeCat === 'all' || item.cat === activeCat;
  var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
  return catOk && urgOk;
}

function buildFilters() {
  var cats = {};
  var urgs = {all:0, now:0, deep:0, watch:0};
  ITEMS.forEach(function(i) {
    cats[i.cat] = (cats[i.cat] || 0) + 1;
    urgs[i.urgency] = (urgs[i.urgency] || 0) + 1;
    urgs.all++;
  });

  var catRow = document.getElementById('cat-row');
  var allPill = document.createElement('span');
  allPill.className = 'pill active';
  allPill.id = 'cat-all';
  allPill.style.background = activeCat === 'all' ? '#555' : '';
  allPill.style.borderColor = activeCat === 'all' ? '#555' : '';
  allPill.innerHTML = 'All <span class="cnt">' + ITEMS.length + '</span>';
  allPill.onclick = function() { setCat('all'); };
  catRow.appendChild(allPill);

  var label = document.createElement('span');
  label.className = 'filter-label';
  label.textContent = '';
  catRow.appendChild(label);

  Object.keys(cats).forEach(function(cat) {
    var p = document.createElement('span');
    p.className = 'pill';
    p.id = 'cat-' + cat;
    p.style.background = activeCat === cat ? getColor(cat) : '';
    p.style.borderColor = activeCat === cat ? getColor(cat) : getColor(cat) + '66';
    p.style.color = activeCat === cat ? '#fff' : getColor(cat);
    p.innerHTML = cat + ' <span class="cnt">' + cats[cat] + '</span>';
    p.onclick = (function(c) { return function() { setCat(c); }; })(cat);
    catRow.appendChild(p);
  });

  var urgRow = document.getElementById('urg-row');
  var urgDefs = [
    {key:'all', label:'All', color:'#555'},
    {key:'now', label:'🔴 Act Now', color:'#e24b4a'},
    {key:'deep', label:'🔵 Deep', color:'#378add'},
    {key:'watch', label:'🟡 Watch', color:'#d97706'}
  ];
  urgDefs.forEach(function(ud) {
    var cnt = ud.key === 'all' ? urgs.all : (urgs[ud.key] || 0);
    var p = document.createElement('span');
    p.className = 'pill';
    p.id = 'urg-' + ud.key;
    p.style.background = activeUrg === ud.key ? ud.color : '';
    p.style.borderColor = activeUrg === ud.key ? ud.color : ud.color + '66';
    p.style.color = activeUrg === ud.key ? '#fff' : ud.color;
    p.innerHTML = ud.label + ' <span class="cnt">' + cnt + '</span>';
    p.onclick = (function(k) { return function() { setUrg(k); }; })(ud.key);
    urgRow.appendChild(p);
  });
}

function updateFilters() {
  var cats = {};
  var urgs = {all:0, now:0, deep:0, watch:0};
  ITEMS.forEach(function(i) {
    cats[i.cat] = (cats[i.cat] || 0) + 1;
    urgs[i.urgency] = (urgs[i.urgency] || 0) + 1;
    urgs.all++;
  });

  var urgDefs = [
    {key:'all', color:'#555'},
    {key:'now', color:'#e24b4a'},
    {key:'deep', color:'#378add'},
    {key:'watch', color:'#d97706'}
  ];

  Object.keys(cats).forEach(function(cat) {
    var p = document.getElementById('cat-' + cat);
    if (!p) return;
    if (activeCat === cat) {
      p.style.background = getColor(cat);
      p.style.borderColor = getColor(cat);
      p.style.color = '#fff';
    } else {
      p.style.background = '';
      p.style.borderColor = getColor(cat) + '66';
      p.style.color = getColor(cat);
    }
  });

  var allCatPill = document.getElementById('cat-all');
  if (allCatPill) {
    if (activeCat === 'all' && !activeSrc) {
      allCatPill.style.background = '#555';
      allCatPill.style.borderColor = '#555';
      allCatPill.style.color = '#fff';
    } else {
      allCatPill.style.background = '';
      allCatPill.style.borderColor = '';
      allCatPill.style.color = '';
    }
  }

  urgDefs.forEach(function(ud) {
    var p = document.getElementById('urg-' + ud.key);
    if (!p) return;
    if (activeUrg === ud.key && !activeSrc) {
      p.style.background = ud.color;
      p.style.borderColor = ud.color;
      p.style.color = '#fff';
    } else {
      p.style.background = '';
      p.style.borderColor = ud.color + '66';
      p.style.color = ud.color;
    }
  });
}

function renderCards() {
  var container = document.getElementById('cards');
  var filtered = ITEMS.filter(matchItem);
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No items match current filters.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(item) {
    var col = getColor(item.cat);
    var urg = getUrgEmoji(item.urgency);
    var chartFlag = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var angleStyle = 'border-left:2px solid ' + col + ';background:' + col + '11;';
    var tweetALabel = '<span style="color:#378add">TWEET A</span>';
    var tweetBLabel = '<span style="color:#7f77dd">TWEET B</span>';

    var chartHtml = '';
    if (item.charts.count > 0) {
      var chartClass = item.charts.hot ? 'chart-note' : 'chart-note';
      var chartStyle = item.charts.hot ? 'background:#fef3c7;border-left:3px solid #f59e0b;' : 'background:#eff6ff;border-left:3px solid #3b82f6;';
      chartHtml = '<div class="chart-note" style="' + chartStyle + '">' +
        (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart' + (item.charts.count > 1 ? 's' : '') +
        (item.charts.desc ? ' — ' + item.charts.desc : '') +
        '</div>';
    }

    html += '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span class="urgency-emoji">' + urg + '</span>' +
        '<span class="source-badge" style="background:' + col + '">' + item.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-tag">' + item.cat + '</span>' +
        (chartFlag ? '<span class="chart-flag">' + chartFlag.trim() + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="' + angleStyle + '">' + item.angle + '</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box">' +
            '<div class="tweet-label">' + tweetALabel + '</div>' +
            '<div class="tweet-text" id="ta-' + item.id + '">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label">' + tweetBLabel + '</div>' +
            '<div class="tweet-text" id="tb-' + item.id + '">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartHtml +
        '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' +
      '</div>' +
    '</div>';
  });
  container.innerHTML = html;
}

function buildReport() {
  var rb = document.getElementById('report-body');
  var srcHtml = META.includedSources.map(function(s) {
    return '<div class="src-item" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' +
      s.name + ' <span class="src-count">(' + s.items + ' items)</span></div>';
  }).join('');

  var skipHtml = META.skippedSources.length === 0 ?
    '<div class="skip-item" style="color:#aaa">None</div>' :
    META.skippedSources.map(function(s) {
      return '<div class="skip-item">' + s.name + ' — ' + s.reason + '</div>';
    }).join('');

  rb.innerHTML = '<div class="report-grid">' +
    '<div>' +
      '<h4>Stats</h4>' +
      '<div class="report-stat">Window: ' + META.windowStart + ' → ' + META.windowEnd + '</div>' +
      '<div class="report-stat">Emails in window: ' + META.emailsInWindow + '</div>' +
      '<div class="report-stat">Emails read: ' + META.emailsRead + '</div>' +
      '<div class="report-stat">Items extracted: ' + META.itemsExtracted + '</div>' +
    '</div>' +
    '<div>' +
      '<h4>Sources (click to filter)</h4>' + srcHtml +
    '</div>' +
    '<div>' +
      '<h4>Skipped Sources</h4>' + skipHtml +
    '</div>' +
  '</div>';
}

function init() {
  document.getElementById('meta-line').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsInWindow + ' emails';
  buildFilters();
  renderCards();
  buildReport();
}

init();
</script>
</body>
</html>
