const META = {
  date: "2026-07-06",
  time: "09:05 CEST",
  windowStart: "2026-07-06 03:05 CEST",
  windowEnd: "2026-07-06 09:05 CEST",
  emailsInWindow: 6,
  emailsRead: 6,
  itemsExtracted: 18,
  includedSources: [
    { name: "The Dark Side of the Boom", count: 8 },
    { name: "Michael Parekh (AI-RTZ)", count: 3 },
    { name: "MacroEdge (Don Johnson)", count: 2 },
    { name: "Daily News Wall (Princeton Chen)", count: 8 }
  ],
  skippedSources: []
};

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "ai-infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};
const CAT_LABELS = {
  macro: "Macro", credit: "Credit", positioning: "Positioning", "ai-infra": "AI/Infra",
  crypto: "Crypto", geopolitics: "Geopolitics", energy: "Energy", tech: "Tech",
  gold: "Gold", culture: "Culture", labor: "Labor", regulation: "Regulation",
  science: "Science", venture: "Venture"
};
const URG_ICON = { act: "🔴", deep: "🔵", watch: "🟡" };
const URG_LABEL = { act: "Act Now", deep: "Deep", watch: "Watch" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catCounts() {
  const c = {};
  ITEMS.forEach(i => { c[i.cat] = (c[i.cat] || 0) + 1; });
  return c;
}
function urgCounts() {
  const c = {};
  ITEMS.forEach(i => { c[i.urgency] = (c[i.urgency] || 0) + 1; });
  return c;
}

function renderFilters() {
  const cc = catCounts();
  const cats = Object.keys(cc).sort((a,b) => cc[b]-cc[a]);
  const catBar = document.getElementById('catFilters');
  let html = '<button class="pill' + (activeCat==='all' ? ' active' : '') + '" style="' + (activeCat==='all' ? 'background:#333;' : '') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  cats.forEach(cat => {
    const isActive = activeCat === cat;
    const color = CAT_COLORS[cat] || '#999';
    html += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:' + color + ';border-color:' + color + ';' : 'color:' + color + ';border-color:' + color + ';') + '" onclick="setCat(\'' + cat + '\')">' + (CAT_LABELS[cat] || cat) + ' (' + cc[cat] + ')</button>';
  });
  catBar.innerHTML = html;

  const uc = urgCounts();
  const urgBar = document.getElementById('urgFilters');
  let uhtml = '<button class="pill' + (activeUrg==='all' ? ' active' : '') + '" style="' + (activeUrg==='all' ? 'background:#333;' : '') + '" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  ['act','deep','watch'].forEach(u => {
    if (!uc[u]) return;
    const isActive = activeUrg === u;
    uhtml += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:#555;border-color:#555;' : '') + '" onclick="setUrg(\'' + u + '\')">' + URG_ICON[u] + ' ' + URG_LABEL[u] + ' (' + uc[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(cat) { activeCat = cat; activeSrc = null; renderFilters(); renderCards(); }
function setUrg(urg) { activeUrg = urg; activeSrc = null; renderFilters(); renderCards(); }

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderFilters();
  renderCards();
  document.getElementById('cards').scrollIntoView({behavior:'smooth'});
}

function renderCards() {
  const container = document.getElementById('cards');
  let html = '';
  ITEMS.forEach(item => {
    if (activeCat !== 'all' && item.cat !== activeCat) return;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return;
    if (activeSrc && item.source.indexOf(activeSrc) === -1) return;
    const color = CAT_COLORS[item.cat] || '#999';
    const isOpen = !!activeSrc;
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 || item.charts.desc ? '📊' : '');
    html += '<div class="card' + (isOpen ? ' open' : '') + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span>' + URG_ICON[item.urgency] + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source + '</span>';
    html += '<span class="cat-tag">' + (CAT_LABELS[item.cat] || item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + escapeHtml(item.title) + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + escapeHtml(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '14;">' + escapeHtml(item.angle) + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.desc) {
      html += '<div class="section-label">Charts</div>';
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + escapeHtml(item.charts.desc) + '</div>';
    }
    html += '<a class="read-link" href="' + item.link + '" target="_blank" rel="noopener">↗ Read full article</a>';
    html += '</div></div>';
  });
  if (!html) html = '<div style="padding:30px; text-align:center; color:#888;">No items match this filter.</div>';
  container.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleReport() {
  document.getElementById('reportCard').classList.toggle('open');
}

function renderReport() {
  let html = '';
  html += '<p><strong>Time window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '. Emails outside this window were not processed.</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<p><strong>Included sources</strong> (click a name to filter cards):</p><ul>';
  META.includedSources.forEach(s => {
    html += '<li><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + '</span> — ' + s.count + ' item(s)</li>';
  });
  html += '</ul>';
  if (META.skippedSources.length) {
    html += '<p><strong>Skipped:</strong></p><ul>';
    META.skippedSources.forEach(s => { html += '<li>' + s.name + ' — ' + s.reason + '</li>'; });
    html += '</ul>';
  } else {
    html += '<p><strong>Skipped:</strong> none — all 6 emails in the window contained substantive content and were fully processed.</p>';
  }
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('metaLine').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
renderFilters();
renderCards();
renderReport();
</script>

</html>
