  wrap.innerHTML = "";
  let filtered = ITEMS.filter(function(i) {
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrg !== "all" && i.urgency !== activeUrg) return false;
    return true;
  });
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty-msg">No items match this filter.</div>';
    return;
  }
  filtered.forEach(function(item, idx) {
    const card = buildCard(item, idx);
    if (activeSrc) card.classList.add("open");
    wrap.appendChild(card);
  });
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  render();
  document.getElementById("cardsWrap").scrollIntoView({ behavior: "smooth" });
}

function buildReport() {
  const body = document.getElementById("reportBody");
  let html = "";
  html += '<h4>Time Window</h4>';
  html += '<div>' + escapeHtml(META.windowStart) + ' → ' + escapeHtml(META.windowEnd) + '. Emails outside this window were not processed.</div>';
  html += '<div style="margin-top:6px">Emails in window: ' + META.emailsInWindow + ' · Emails read: ' + META.emailsRead + ' · Items extracted: ' + META.itemsExtracted + '</div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(function(s) {
    html += '<div class="src-line">• <span class="src-item" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + escapeHtml(s.name) + '</span> — ' + s.count + ' item' + (s.count === 1 ? '' : 's') + '</div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(function(s) {
    html += '<div class="skip-line">• ' + escapeHtml(s.name) + ' — ' + escapeHtml(s.reason) + '</div>';
  });
  body.innerHTML = html;
}

document.getElementById("reportHeader").onclick = function() {
  const card = document.getElementById("reportCard");
  card.classList.toggle("open");
  document.getElementById("reportChevron").textContent = card.classList.contains("open") ? "▾" : "▸";
};

buildHeader();
buildFilters();
render();
buildReport();
</script>
