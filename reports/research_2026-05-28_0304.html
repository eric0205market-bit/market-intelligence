  { id: 16, cat: 'AI/infra', urgency: 'deep', source: 'ChipStrat',
    title: 'Vera Rubin draws 3,286 amps at the die — I²R loss at 5kW GPU hits 42% efficiency',
    idea: 'GPU power delivery physics: Vera Rubin at 2.3 kW draws ~3,286 amps at the die (Vcore = 0.7V). Hopper H100 drew ~1,000 amps. Conduction loss scales as I² — so 3x the current = 9x the loss, 11x from Hopper to Vera Rubin. Intel\'s ISSCC 2026 chart: at 5 kW GPU, the system pulls 8.3 kW to deliver 3.5 kW of useful compute (42% efficiency, down from 66% at 1 kW). I²R loss goes from 89W at 1kW to 2.2kW at 5kW — a 25x jump from only 5x more current. The fix: move the voltage regulator from centimeters of lateral substrate copper to micrometers directly under the die.',
    angle: 'The power delivery bottleneck is the next major constraint on AI training performance. The companies solving this (Empower, PowerLattice) are addressing a problem that grows nonlinearly with every chip generation. ADI\'s $1.5B bet on Empower is the clearest signal of how serious the problem is.',
    tweetA: 'Vera Rubin GPU: 3,286 amps at the die. Hopper was 1,000. I²R conduction loss scales as current squared — that is 11x more loss. Intel\'s ISSCC 2026 chart shows a 5kW GPU burning 8.3kW at the wall for 3.5kW of compute. Half the system input is heat. ADI just paid $1.5B to fix this.',
    tweetB: 'At 5kW per GPU, I²R loss grows to 2.2kW — a 25x jump from 89W at 1kW, because P=I²R and you tripled I. This is not a thermal management problem. It is a physics problem. The only solution is to move the voltage regulator from inches away to micrometers under the die. $ADI $MPWR $VICR are fighting for that socket.',
    charts: { count: 2, hot: true, desc: '🔥 CHART WORTH SAVING — Intel ISSCC 2026 loss budget chart showing 66% to 42% efficiency collapse at 5kW. Charts inside.' },
    link: 'https://www.chipstrat.com/p/power-moves-into-the-package-empower' },

  { id: 21, cat: 'AI/infra', urgency: 'deep', source: 'Exponential View / Azeem Azhar',

    idea: 'Exponential View maps AI adoption onto three stages of electrification history. Stage 1 (lightbulb): individual speed, same processes. Stage 2 (group drive): workflow efficiency and cost savings, but attached to existing organizational geometry. Stage 3 (unit drive): structural reorganization around decision speed. The bottleneck moving from Stage 2 to Stage 3 is "congestion" — individual AI outputs queuing up waiting for human decision layers (review cycles, legal sign-offs, product roadmap gatekeeping). Ford\'s 1913 Highland Park plant made the Stage 3 move; US manufacturing productivity grew 5.4% per year 1919-1929 after that.',
    angle: 'The investment implication: companies that can redesign around AI decision speed (Stage 3) will dramatically outperform those stuck in Stage 2 (using AI to do the same work faster). The organizational structures that prevent Stage 3 are the bottleneck.',
    tweetA: 'The AI productivity model: Stage 1 = lightbulb (individual speed). Stage 2 = group drive (workflow efficiency, same org structure). Stage 3 = unit drive (AI takes decisions, not just assists). Most companies are in Stage 2. The gap to Stage 3 is a managerial layer problem, not a technology problem.',
    tweetB: 'Ford\'s 1913 plant went from group drive to unit drive and US manufacturing productivity grew 5.4%/year for a decade. The "congestion" blocking AI companies is identical to the factory layout blocking stage-2 electricity: the optimization of individual steps doesn\'t compound because the decision bottleneck is upstream. Fix the org structure, not the model.',
    charts: { count: 0, hot: false, desc: 'Article has framework diagrams — Charts inside worth opening' },

    { name: 'WealthVest / Tim', items: 2 },
    { name: 'Lead Lag Report / Leaders Laggards', items: 2 },
    { name: 'Not Boring / Packy McCormick', items: 2 }
  ],
  skippedSources: [
    { name: 'TheStreet.com', reason: 'Pure promotional email — subscription offer only, zero content' },
    { name: 'Substack live notification', reason: 'Automated alert for a livestream — not a newsletter' },
    { name: 'Google Security Alert', reason: 'Automated account security notification' },
    { name: 'McKinsey', reason: 'HTML-only email, no plain text body — impact report with no extractable content in email' },
    { name: 'Norseman Market Timing', reason: 'Paywall — free email contains only screenshots of portfolios, no analysis text' }
  ]
};

const CAT_COLORS = {
  'macro': '#e24b4a',
  'credit': '#378add',
  'positioning': '#ef9f27',
  'AI/infra': '#1d9e75',
  'crypto': '#7f77dd',
  'geopolitics': '#d85a30',
  'energy': '#f97316',
  'tech': '#06b6d4',
  'gold': '#d4a017',
  'culture': '#ec4899',
  'labor': '#8b5cf6',
  'regulation': '#64748b',
  'science': '#14b8a6',
  'venture': '#84cc16'
};

let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? null : name;
  activeCat = 'all';
  activeUrg = 'all';
  updateCatFilters();
  updateUrgFilters();
  renderCards();
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) { body.classList.toggle('open'); }
}

function toggleReport() {
  document.getElementById('report-body').classList.toggle('open');
}

function getCats() {
  var cats = {};
  ITEMS.forEach(function(i) { cats[i.cat] = (cats[i.cat] || 0) + 1; });
  return cats;
}

function getUrgs() {
  var urgs = { deep: 0, 'act-now': 0, watch: 0 };
  ITEMS.forEach(function(i) {
    var u = i.urgency.replace(' ', '-').toLowerCase();
    urgs[u] = (urgs[u] || 0) + 1;
  });
  return urgs;
}

function updateCatFilters() {
  var cats = getCats();
  var html = '<span class="pill pill-all ' + (activeCat === 'all' && !activeSrc ? 'active' : '') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</span>';
  Object.keys(cats).sort().forEach(function(c) {
    var color = CAT_COLORS[c] || '#888';
    var isActive = activeCat === c;
    html += '<span class="pill ' + (isActive ? 'active' : '') + '" style="' + (isActive ? 'background:' + color + ';border-color:' + color : 'border-color:' + color + ';color:' + color) + '" onclick="setCat(\'' + c + '\')">' + c + ' (' + cats[c] + ')</span>';
  });
  document.getElementById('cat-filters').innerHTML = html;
}

function updateUrgFilters() {
  var urgs = getUrgs();
  var urgLabels = { 'all': 'All', 'deep': '🔵 Deep', 'act-now': '🔴 Act Now', 'watch': '🟡 Watch' };
  var html = '';
  ['all','act-now','deep','watch'].forEach(function(u) {
    var count = u === 'all' ? ITEMS.length : (urgs[u] || 0);
    var isActive = activeUrg === u;
    html += '<span class="pill ' + (isActive ? 'active pill-all' : '') + '" onclick="setUrg(\'' + u + '\')">' + urgLabels[u] + ' (' + count + ')</span>';
  });
  document.getElementById('urg-filters').innerHTML = html;
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  updateCatFilters();
  renderCards();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  updateCatFilters();
  updateUrgFilters();
  renderCards();
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = ITEMS.filter(function(i) {
    if (activeSrc) return i.source.indexOf(activeSrc) !== -1;
    if (activeCat !== 'all' && i.cat !== activeCat) return false;
    if (activeUrg !== 'all') {
      var u = i.urgency.replace(' ', '-').toLowerCase();
      if (u !== activeUrg) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No items match the selected filters.</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var urgEmoji = item.urgency === 'act-now' ? '🔴' : item.urgency === 'watch' ? '🟡' : '🔵';
    var chartTag = item.charts.count > 0 ? ('<span class="chart-tag" title="' + item.charts.desc + '">' + (item.charts.hot ? '🔥' : '📊') + '</span>') : '';

    var angleStyle = 'border-left-color:' + color + ';background:' + color + '18;';

    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">#' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span class="urgency">' + urgEmoji + '</span>';
    html += '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartTag) html += chartTag;
    html += '<span class="card-title">' + item.title + '</span>';
    html += '</div>';

    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-block" style="' + angleStyle + '">' + item.angle + '</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box tweet-box-a"><div class="tweet-label tweet-label-a">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box tweet-box-b"><div class="tweet-label tweet-label-b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0) {
      var hotClass = item.charts.hot ? ' hot-chart' : '';
      html += '<div class="charts-line' + hotClass + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }
    html += '<div class="link-line"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function buildReport() {
  var html = '<p><strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' | <strong>Emails read:</strong> ' + META.emailsRead + ' | <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<br><p><strong>Included Sources (' + META.includedSources.length + '):</strong></p><ul style="margin-top:6px;padding-left:18px;">';
  META.includedSources.forEach(function(s) {
    html += '<li><span class="src-link" onclick="filterBySrc(\'' + s.name.split('/')[0].trim() + '\')">' + s.name + '</span> — ' + s.items + ' item(s)</li>';
  });
  html += '</ul><br><p><strong>Skipped Sources (' + META.skippedSources.length + '):</strong></p><ul style="margin-top:6px;padding-left:18px;">';
  META.skippedSources.forEach(function(s) {
    html += '<li><strong>' + s.name + '</strong>: ' + s.reason + '</li>';
  });
  html += '</ul>';
  document.getElementById('report-body').innerHTML = html;
}

function init() {
  document.getElementById('header-meta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources · Window: ' + META.windowStart + ' → ' + META.windowEnd;
  updateCatFilters();
  updateUrgFilters();
  renderCards();
  buildReport();
}

window.onload = init;
</script>
</body>
</html>
