let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function getCatColor(cat) {
  return CAT_COLORS[cat] || "#888";
}

function getUrgLabel(u) {
  if (u === "act-now") return "🔴";
  if (u === "deep") return "🔵";
  if (u === "watch") return "🟡";
  return "";
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) {
    body.classList.toggle('open');
  }
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var arrow = document.getElementById('report-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▼' : '▶';
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  updatePills();
  renderCards();
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  updatePills();
  renderCards();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  updatePills();
  renderCards();
}

function updatePills() {
  document.querySelectorAll('.cat-pill').forEach(function(p) {
    var v = p.dataset.val;
    p.classList.remove('active');
    if (v === activeCat && !activeSrc) {
      p.classList.add('active');
      if (v === 'all') {
        p.style.background = '#444';
        p.style.borderColor = '#444';
        p.style.color = '#fff';
      } else {
        p.style.background = getCatColor(v);
        p.style.color = '#fff';
        p.style.borderColor = 'transparent';
      }
    } else {
      p.style.background = '';
      p.style.color = '#555';
      p.style.borderColor = '#ccc';
    }
  });
  document.querySelectorAll('.urg-pill').forEach(function(p) {
    var v = p.dataset.val;
    p.classList.remove('active');
    if (v === activeUrg && !activeSrc) {
      p.classList.add('active');
      p.style.background = '#444';
      p.style.color = '#fff';
      p.style.borderColor = '#444';
    } else {
      p.style.background = '';
      p.style.color = '#555';
      p.style.borderColor = '#ccc';
    }
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
    var catOk = (activeCat === 'all' || item.cat === activeCat);
    var urgOk = (activeUrg === 'all' || item.urgency === activeUrg);
    return catOk && urgOk;
  });

  var html = '';
  filtered.forEach(function(item) {
    var color = getCatColor(item.cat);
    var chartBadge = '';
    if (item.charts.count > 0) {
      chartBadge = item.charts.hot ? ' <span class="chart-badge hot-chart">📊🔥</span>' : ' <span class="chart-badge">📊</span>';
    }
    var angleStyle = 'border-left-color:' + color + ';background:' + color + '18;';

    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span class="urgency">' + getUrgLabel(item.urgency) + '</span>';
    html += '<span class="source-badge" style="background:' + color + '">' + item.source.split(' / ')[0] + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    html += chartBadge;
    html += '<span class="card-title">' + item.title + '</span>';
    html += '</div>';

    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="section-title">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-title">My Angle</div>';
    html += '<div class="angle-box" style="' + angleStyle + '">' + item.angle + '</div>';
    html += '<div class="section-title">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box">';
    html += '<div class="tweet-label a">TWEET A</div>';
    html += '<div class="tweet-text">' + item.tweetA + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>';
    html += '</div>';
    html += '<div class="tweet-box">';
    html += '<div class="tweet-label b">TWEET B</div>';
    html += '<div class="tweet-text">' + item.tweetB + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>';
    html += '</div>';
    html += '</div>';
    if (item.charts.count > 0 && item.charts.desc) {
      var chartClass = item.charts.hot ? 'charts-note hot-chart' : 'charts-note';
      html += '<div class="' + chartClass + '">' + item.charts.desc + '</div>';
    }
    html += '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div>';
    html += '</div>';
  });

  if (filtered.length === 0) {
    html = '<div style="padding:20px;color:#888;text-align:center">No items match this filter.</div>';
  }
  container.innerHTML = html;
}

function buildFilterBars() {
  var cats = ["all"];
  var urgencies = ["all", "act-now", "deep", "watch"];
  var catCounts = {};

  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
    if (cats.indexOf(item.cat) === -1) cats.push(item.cat);
  });

  var urgCounts = { "all": ITEMS.length, "act-now": 0, "deep": 0, "watch": 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });

  var catBar = document.getElementById('cat-bar');
  cats.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'pill cat-pill';
    btn.dataset.val = cat;
    if (cat === 'all') {
      btn.textContent = 'All (' + ITEMS.length + ')';
      btn.style.background = '#444';
      btn.style.color = '#fff';
      btn.style.borderColor = '#444';
    } else {
      btn.textContent = cat + ' (' + (catCounts[cat] || 0) + ')';
    }
    btn.onclick = function() { setCatFilter(cat); };
    catBar.appendChild(btn);
  });

  var urgBar = document.getElementById('urg-bar');
  var urgLabels = { "all": "All", "act-now": "🔴 Act Now", "deep": "🔵 Deep", "watch": "🟡 Watch" };
  urgencies.forEach(function(urg) {
    var btn = document.createElement('button');
    btn.className = 'pill urg-pill';
    btn.dataset.val = urg;
    btn.textContent = urgLabels[urg] + ' (' + (urgCounts[urg] || 0) + ')';
    if (urg === 'all') {
      btn.style.background = '#444';
      btn.style.color = '#fff';
      btn.style.borderColor = '#444';
    }
    btn.onclick = function() { setUrgFilter(urg); };
    urgBar.appendChild(btn);
  });
}

  html += '<strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; ';
  html += '<strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; ';
  html += '<strong>Items extracted:</strong> ' + META.itemsExtracted + '<br><br>';

  html += '<strong>Included Sources:</strong><br>';
  META.includedSources.forEach(function(s) {
    var shortName = s.name.split(' / ')[0];
    html += '&nbsp;&nbsp;• <span class="src-link" onclick="filterBySrc(\'' + shortName + '\')">' + s.name + '</span> — ' + s.items + ' items<br>';
  });

  if (META.skippedSources.length > 0) {
    html += '<br><strong>Skipped / Empty:</strong><br>';
    META.skippedSources.forEach(function(s) {
      html += '&nbsp;&nbsp;• ' + s.name + ': ' + s.reason + '<br>';
    });
  }

  html += '<div class="window-note">Window: ' + META.windowStart + ' to ' + META.windowEnd + '. Emails outside this window were not processed. Current time: ' + META.time + ' ' + META.date + '.</div>';
  body.innerHTML = html;
}

function buildHeader() {
  var el = document.getElementById('header-meta');
  el.textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items · ' + META.emailsRead + ' emails read · Window: ' + META.windowStart + ' → ' + META.windowEnd;
}

function init() {
  buildHeader();
  buildFilterBars();
  buildReport();
  renderCards();
}

init();
</script>
</body>
</html>
