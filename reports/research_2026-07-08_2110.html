<script>
const ITEMS = [{"id":1,"cat":"macro","urgency":"deep","source":"Peter Boockvar","title":"FOMC minutes: 'no forward guidance' but every line still hedged with 'several/many/majority'","idea":"Minutes show participants flagging broad-based price pressures across transportation, airfares, petrochemicals and ag inputs, with risks to the inflation outlook 'still tilted to the upside' \u2014 explicitly citing the Hormuz closure as a driver. Market is pricing 100% odds of one hike and 48% odds of a second by year-end; no one at the Fed is discussing cuts.","angle":"The Fed says it has retired forward guidance, then hands you a transcript where every sentence is qualified by 'several' or 'majority.' That's guidance with a different font \u2014 and it's colliding with an actual Hormuz-driven oil shock the same week.","tweetA":"Fed says no more forward guidance. Then hands you minutes where 'several,' 'many,' and 'majority' sit next to every line about accelerating inflation. That's guidance with a different font.","tweetB":"FOMC minutes explicitly cite the Hormuz closure as an upside inflation risk. Oil already backed that up with an 8% one-day pop the same week. Market's pricing 100% odds of one hike \u2014 it should be asking whether that's enough.","charts":{"count":0,"hot":false,"desc":"No charts in this note \u2014 direct FOMC minutes quotes only."},"link":"https://peterboockvar.substack.com/p/no-more-forward-guidance-but-still"},{"id":2,"cat":"macro","urgency":"deep","source":"Peter Boockvar","title":"10yr auction stops through WI with the best cover since September \u2014 but dealers barely showed up","idea":"The 10yr auction printed a yield of 4.580%, just below the 4.586% when-issued level, with a 2.59 bid-to-cover (best since last September, above the 2.49 one-year average). Dealers took the smallest share of the auction since January, meaning direct and indirect bidders \u2014 real end demand \u2014 absorbed the rest.","angle":"Real duration demand showing up strong the same week the Fed flags upside inflation risk and oil jumps 8% is the actual tell \u2014 bond buyers aren't waiting for the inflation story to resolve.","tweetA":"10yr auction stopped through WI by 0.6bp with the best cover since September. Dealers took the smallest share since January. Someone wants duration badly, and it's not the primary dealers.","tweetB":"Good auction, hawkish minutes, and an oil shock all landed the same week. Bond market is telling you duration demand doesn't care about the inflation risk the Fed just flagged. Watch which one is wrong.","charts":{"count":0,"hot":false,"desc":"No charts \u2014 auction stats only (yield, bid-to-cover, dealer takedown)."},"link":"https://peterboockvar.substack.com/p/very-good-10-yr-note-auction"},{"id":3,"cat":"geopolitics","urgency":"act","source":"Jamesbulltard","title":"SPY loses the 50-day on an 8% oil spike \u2014 and it's getting blamed on semis instead of Iran","idea":"SPY broke below its 21-EMA and then the 50-day as oil rose 8% and VIX rose 12% on Trump saying the Iran war is 'nowhere near over.' QQQ posted its first close below the 50-day, opening an air pocket down to the 100-day at 660; SPX key levels are 740 (50-day) and 710 (100-day) below that.","angle":"Most timelines are calling this an 'AI bubble cracking' selloff. The actual trigger, per the charts, was an 8% oil spike and a war-escalation headline \u2014 the AI/semis weakness is a symptom, not the cause.","tweetA":"Everyone's blaming this selloff on the AI trade cracking. The charts say otherwise: the first close below the 50-day came from an 8% oil spike and Trump saying the Iran war 'isn't over,' not from a chip miss.","tweetB":"QQQ's air pocket down to 660 (the 100-day) isn't a valuation reset, it's a war-risk repricing \u2014 same mechanism as March. The bull case here is literally 'wait for Trump to fold on Iran again.' That's a coin flip on one man's mood, not an investment thesis.","charts":{"count":2,"hot":false,"desc":"SPY and QQQ daily charts with 21/50/100-day levels marked, showing the EMA breaks."},"link":"https://www.jamesbulltard.com/p/7826-recap"},{"id":4,"cat":"geopolitics","urgency":"act","source":"Neil Sethi","title":"Trump declares the Iran ceasefire dead, US hits 80+ sites, oil waiver revoked \u2014 and Khamenei's burial is tomorrow","idea":"The US launched fresh strikes on 80+ Iranian sites and revoked the waiver allowing Iranian oil sales; Trump called the ceasefire 'a waste of time' and called Iran's leadership 'scum.' Iran's Deputy FM vowed 'decisive actions.' Khamenei is set to be buried in Mashhad on July 9 after a week-long mass funeral, meaning any Iranian retaliation is more likely timed around or after that date.","angle":"The market has been trained by six months of Trump reversals to fade every escalation headline \u2014 intraday moves already cut back from their worst levels the same session. The actual catalyst calendar nobody's pricing is the burial date itself.","tweetA":"80 sites struck, the oil waiver revoked, ceasefire declared dead by Trump himself \u2014 and markets are still trading this like a headline instead of an active war. Khamenei's burial is tomorrow in Mashhad. That's the date to watch for the Iranian response, not today.","tweetB":"Market moves already faded off the lows within the same session Trump called Iran 'scum.' That's not de-escalation \u2014 that's a market trained by six months of Trump reversals to buy every dip. Eventually that training gets tested.","charts":{"count":7,"hot":false,"desc":"Full pre-market snapshot charts: SPX futures, 10yr yield, DXY, WTI, Gold, Copper, Nat Gas and Bitcoin futures, each with 20/50/100/200-DMA overlays plus MACD/RSI panels."},"link":"https://neilsethi.substack.com/p/as-we-approach-the-open-7826"},{"id":5,"cat":"geopolitics","urgency":"watch","source":"Neil Sethi","title":"Same Iran shock, opposite reactions: Kospi -5.4% into a bear market while Hang Seng +3% on Alibaba/Tencent","idea":"On the same morning as the US-Iran escalation, South Korea's Kospi fell 5.4% into a bear market (its lowest since late May) while Hong Kong's Hang Seng jumped as much as 3.6% \u2014 the most since May 2025 \u2014 led by Alibaba (+11%) and Tencent (+3%), per Bloomberg.","angle":"The headline 'Asia sold off on Iran' is wrong. Korea's semis-heavy index got hit; Chinese platform tech got bought, on the same shock. That's a rotation inside Asia, not a regional risk-off move \u2014 worth separating in any EM/Asia positioning model.","tweetA":"Same morning, same Iran shock: Kospi -5.4% into a bear market, Hang Seng +3% with Alibaba up 11%. 'Asia sold off' is the wrong headline \u2014 Korea's hardware exposure got hit, China's platform names got bought.","tweetB":"If you're short Asia tech as a single trade right now, you're actually running two opposite bets and don't know it \u2014 Kospi hardware vs. Hang Seng platform. Iran didn't cause this split, it just exposed it.","charts":{"count":0,"hot":false,"desc":"No standalone charts for this item \u2014 index-level moves cited from Bloomberg within the same Neil Sethi note as item #4."},"link":"https://neilsethi.substack.com/p/as-we-approach-the-open-7826"},{"id":6,"cat":"geopolitics","urgency":"watch","source":"Neil Sethi","title":"Trump threatens to cut off trade with Spain and revives the Greenland demand \u2014 same NATO summit appearance","idea":"At the NATO summit in Ankara, Trump said 'Spain is a wasted cause' and told Treasury Secretary Bessent 'I'd like you to cut it off' on trade, citing Spain's NATO spending shortfall. In the same appearance he revived US demands to control Greenland, invoking the WWII-era Danish handover. NATO is reportedly discussing skipping next year's summit partly to lower tensions.","angle":"A trade-coercion threat against one NATO member plus a territorial claim on another, in one sitting, is exactly the alliance-stress data point that belongs in a European-defense-spending or EU-fragmentation thesis \u2014 not just a quote of the day.","tweetA":"Trump threatens to cut off trade with a NATO member (Spain) and re-opens a territorial claim on a NATO member's territory (Greenland/Denmark) in the same appearance. NATO's reportedly considering skipping next year's summit just to lower the temperature. That's not a normal alliance.","tweetB":"'Spain is a wasted cause' plus 'Greenland is very important for the US' in one sitting. If you're modeling European defense-spending winners, the read isn't just 'more NATO spending' \u2014 it's which members Trump personally decides are worth defending.","charts":{"count":0,"hot":false,"desc":"No charts \u2014 direct quotes from the NATO summit."},"link":"https://neilsethi.substack.com/p/as-we-approach-the-open-7826"},{"id":7,"cat":"geopolitics","urgency":"watch","source":"Neil Sethi","title":"Le Pen cleared to run in 2027 after appellate court cuts her ban from 5 years to time served","idea":"An appellate court reduced Marine Le Pen's electoral ban from five years to the 15 months she's already observed, clearing her path to run in France's 2027 presidential race. She still carries a 3-year sentence (2 suspended, 1 serviceable via electronic bracelet) from her European Parliament funds conviction.","angle":"This resolves what looked like a settled question \u2014 RN forced to find a new candidate \u2014 back in Le Pen's favor. Any European political-risk model built on 'Le Pen is barred' needs to be rebuilt now, before the polling even shifts.","tweetA":"Le Pen's ban just got cut from 5 years to time served. She can run in 2027. Anyone who built a French political-risk model on 'RN has no candidate' needs to rerun it \u2014 the front-runner is back on the ballot.","tweetB":"She's still sentenced to a year she may serve under an electronic bracelet \u2014 campaigning under judicial surveillance is the new baseline for a French presidential front-runner. That alone is a story, before you even get to the polling.","charts":{"count":0,"hot":false,"desc":"No charts \u2014 political/legal development."},"link":"https://neilsethi.substack.com/p/as-we-approach-the-open-7826"},{"id":8,"cat":"macro","urgency":"deep","source":"Lead-Lag Report","title":"The Warsh 'no guidance' regime is itself the volatility \u2014 September hike odds swung 15pts in a week","idea":"With Warsh refusing forward guidance, the bond market has to price itself: 2s10s steepened toward 78-80bp while September hike odds swung in a 55-70% band \u2014 hitting ~70% right after Warsh's July 1 Sintra remarks before compressing to ~55% by the July 7 payrolls print, per Fed funds futures and CME FedWatch.","angle":"A 15-point swing in hike odds within a week, with zero explicit Fed communication driving it, is exactly the volatility a no-guidance regime should produce. 'No forward guidance' isn't a neutral policy stance \u2014 it's now a volatility input in its own right.","tweetA":"September hike odds went from ~70% to ~55% in a week with zero Fed communication driving it. That's the cost of 'no forward guidance' \u2014 the bond market is now the guidance, and it's noisier than Powell ever was.","tweetB":"2s10s steepening to 78-80bp while hike odds whipsaw 15 points in a week isn't a Fed story, it's a Fed-choosing-not-to-tell-you story. Warsh removed one variable (guidance) and replaced it with a bigger one (guessing).","charts":{"count":1,"hot":true,"desc":"'Chart 1' in the piece: Russell 2000 (+21.3% YTD, leadership) vs. the PHLX Semiconductor Index (widest swings, sharpest air pockets) \u2014 the 2026 market in one frame."},"link":"https://www.leadlagreport.com/p/the-warsh-regime-meets-day-130"},{"id":9,"cat":"AI/infra","urgency":"act","source":"Lead-Lag Report","title":"Samsung guides a 19-fold profit jump. Stock falls 7%. SOX follows it down 5%.","idea":"Samsung guided roughly a 19-fold surge in Q2 operating profit and its Seoul shares still fell nearly 7%, triggering Kospi's sixth circuit breaker of 2026 and dragging the SOX down about 5% (AMD -6.5%, Intel -9.7%, Micron -4.7%) \u2014 despite this being a beat, not a miss.","angle":"When a 19x profit beat gets sold this hard, the market has stopped trading the quarter and started trading the durability of the entire AI-capex cycle. That's a regime change in how AI-adjacent hardware gets priced, and it matters more than any single print.","tweetA":"Samsung guided a 19-FOLD increase in profit. Stock fell 7%. SOX followed it down 5%. When a beat this size gets sold, nobody's trading the quarter anymore \u2014 they're trading whether this capex cycle has two more years or two more quarters left in it.","tweetB":"AMD -6.5%, Intel -9.7%, Micron -4.7%, on a Samsung BEAT. If a 19x profit guide is now a sell signal, ask what a miss does. The market just told you its real fear isn't earnings, it's the duration of the AI buildout.","charts":{"count":0,"hot":false,"desc":"No standalone chart \u2014 cited alongside Chart 1/2 in the same Lead-Lag piece."},"link":"https://www.leadlagreport.com/p/the-warsh-regime-meets-day-130"},{"id":10,"cat":"macro","urgency":"deep","source":"Lead-Lag Report","title":"SOX falls 5% in a session. VIX doesn't move. That gap is the actual chart.","idea":"The VIX closed essentially flat (15.60 vs. 15.57 the prior session) the same day the SOX fell roughly 5% and Samsung's Seoul shares dropped nearly 7% \u2014 a violent single-sector unwind alongside a comatose volatility complex, which the author frames as a divergence between price damage and perceived risk that typically precedes a repricing.","angle":"Either options sellers haven't clocked that the AI-hardware trade is cracking, or the damage is still narrow enough (a handful of megacap/semis names) to stay non-systemic. You don't get to stay agnostic between those two for long.","tweetA":"SOX down 5% in a session. VIX: 15.60 vs 15.57 the day before. Rounding error. Either vol sellers haven't noticed the AI hardware trade is cracking, or it's still contained to a handful of names. Pick one \u2014 the gap closes eventually.","tweetB":"The scariest chart this week isn't the SOX drop, it's the VIX NOT moving while it happened. Complacency priced through a violent single-sector unwind is exactly the setup that front-runs a real vol event.","charts":{"count":0,"hot":false,"desc":"No standalone VIX chart shown, but the 15.60 vs 15.57 print is cited directly against the same-session SOX/Samsung moves."},"link":"https://www.leadlagreport.com/p/the-warsh-regime-meets-day-130"},{"id":11,"cat":"crypto","urgency":"deep","source":"Blocmates","title":"War reignites, oil pumps \u2014 and Bitcoin just holds $60K while ETF flows turn positive","idea":"Despite the Iran ceasefire collapsing and oil pumping, BTC (via IBIT) is holding above $60K and ETF flows just turned positive after some of the most brutal outflow weeks recently \u2014 read by the author as most of the price capitulation being behind, even if 'time capitulation' (sideways chop) could still run for months.","angle":"BTC not breaking $60K on a fresh war escalation, right as ETF flows flip positive, is the first real divergence from the 'risk-off = crypto dumps' script that's dominated since spring. Small sample, but worth flagging the first time it happens.","tweetA":"Iran ceasefire collapses, oil pumps, and Bitcoin... holds $60K while ETF inflows turn positive. That's the first time in months crypto didn't just trade as beta to oil headlines.","tweetB":"The interesting question isn't whether BTC bounces here \u2014 it's whether $60K holding through a literal war escalation resets the market's read on crypto as a risk-off casualty versus a risk-off hedge. We haven't had to ask that question in a while.","charts":{"count":2,"hot":false,"desc":"Embedded chart images referencing BTC 2022-bottom pattern comparison and recent ETF flow data (farside.co.uk)."},"link":"https://blocmates.beehiiv.com/p/war-again-btc-still-above-60k-anthropic-isn-t-slowing-down"},{"id":12,"cat":"crypto","urgency":"watch","source":"Blocmates","title":"Bitmine now owns ~5% of all ETH and keeps buying at a loss \u2014 while Strategy just started selling BTC","idea":"Tom Lee's Bitmine now holds roughly 5% of ETH's total supply and continues buying dips despite being billions of dollars underwater, framed by the newsletter as Lee becoming the 'dip-buying chad' while Saylor/Strategy has flipped into 'top blaster/bottom seller' \u2014 confirmed the same week by Strategy's own BTC sale (see item #17).","angle":"Two of crypto's most-watched corporate treasuries are now moving in opposite directions at the same time. That divergence in conviction is the real story, not either data point alone.","tweetA":"Bitmine now owns ~5% of all ETH supply and is still buying at a multi-billion dollar loss. Meanwhile Strategy just sold BTC. The corporate-treasury trade has quietly split into two completely different bets, and the market's still treating them as the same trade.","tweetB":"5% of ETH supply sitting in one company's treasury, underwater, and still buying. That's either the ETH/BTC reversal thesis finally getting real conviction behind it, or the most expensive game of chicken in crypto right now.","charts":{"count":1,"hot":false,"desc":"Referenced Bitfinex whale-chart tweet on ETH/BTC positioning, embedded in the newsletter."},"link":"https://blocmates.beehiiv.com/p/war-again-btc-still-above-60k-anthropic-isn-t-slowing-down"},{"id":13,"cat":"crypto","urgency":"deep","source":"Bespoke Investment Group","title":"Bitcoin bullish sentiment: 13%. Stock bullish sentiment: 60%+. Strongly-bearish outnumbers strongly-bullish 10-to-1.","idea":"Bespoke's mid-year client survey shows just 13% bullish on Bitcoin (12% moderate, 1% strong) versus 60%+ bullish on stocks. BTC bullish sentiment fell from 35% at end-2025 to 13% now \u2014 a 22-point collapse \u2014 while bearish sentiment rose from 25% to 40% and neutral rose from 40% to 47%. Strongly bearish (10%) outnumbers strongly bullish (1%) ten to one.","angle":"A 10-to-1 skew of strongly-bearish-to-strongly-bullish, after BTC is already down 30%+, is the exact sentiment extreme that historically marks lows rather than continuations \u2014 and it lines up with the ETF-inflow reversal in item #11.","tweetA":"13% bullish on Bitcoin. 60%+ bullish on stocks. Strongly-bearish outnumbers strongly-bullish 10 to 1. This is what capitulation sentiment looks like on a survey, not just a chart.","tweetB":"Bitcoin bullish sentiment went from 35% to 13% in six months \u2014 a bigger sentiment collapse than the price collapse itself. When the vibes fall faster than the asset, that's usually the tell you're near the bottom, not the top of a slide.","charts":{"count":1,"hot":true,"desc":"IBIT price chart described by the author as 'hard pressed to find a more depressing price chart,' plus the sentiment survey breakdown (bullish/neutral/bearish splits)."},"link":"https://bespokeinvest.substack.com/p/bitcoin-sentiment-is-dire"},{"id":14,"cat":"positioning","urgency":"deep","source":"Bespoke Investment Group","title":"Micron: +277% in three months, then -25% in eight trading days","idea":"SOXX rallied 111% off April lows through June 22 then fell 16% since (barely holding its 50-DMA). Micron rallied 277% from late March to June 25 then lost nearly a quarter of its value in just over a week. Data-center names and space-related stocks (including newly-listed SpaceX) also gave back nearly all their May-June gains within weeks.","angle":"Three baskets defined H1 2026: semis, data-center, and space. All three are unwinding in the same three weeks \u2014 this is the chart version of the Dark Side of the Boom 'momentum = AI in disguise' thesis (item #16).","tweetA":"Micron: +277% in three months, then -25% in eight trading days. That's not profit-taking, that's a crowded trade getting flushed. Same story in SOXX and every space-adjacent name since SpaceX started trading.","tweetB":"Three baskets defined H1 2026: semis, data-center, space. All three are getting unwound in the same three weeks. If you wanted a single chart for 'the AI trade got too crowded,' this is it.","charts":{"count":3,"hot":true,"desc":"QQQ flag-pattern chart, SOXX chart (111% rally then 16% pullback), and Micron chart (277% rally then 25% drawdown) \u2014 plus a Trend Analyzer sector snapshot."},"link":"https://bespokeinvest.substack.com/p/early-q3-trend-reversals"},{"id":15,"cat":"gold","urgency":"deep","source":"Tavi Costa","title":"'Two things the US can't afford: rate hikes and a prolonged war. Both are exactly what's driving the gold selloff.'","idea":"Costa's thesis: the US can't afford either more rate hikes or a prolonged, costly war, yet both are precisely what's pressuring hard assets right now \u2014 which he frames as a rare chance to buy gold at oversold levels within an intact secular bull market.","angle":"This is a falsifiable claim, not a slogan: if hikes and war spending are genuinely fiscally unsustainable, the combination pressuring gold now can't persist by construction, and the selloff should self-reverse. Worth stress-testing against actual fiscal math rather than taking on faith.","tweetA":"Costa's framing is worth sitting with: gold is selling off BECAUSE of the two things the US can least afford long-term \u2014 hikes and war. If that's right, the selloff carries the seeds of its own reversal.","tweetB":"Oversold gold, in a secular bull market, pressured by forces (rate hikes, war costs) that are themselves fiscally unsustainable. That's not a chart-pattern argument, it's a 'the causes of the dip can't last' argument \u2014 a different and more interesting claim.","charts":{"count":0,"hot":false,"desc":"Teaser/paywalled \u2014 charts referenced as being inside the full report ('review the key indicators I'm watching'). Worth opening."},"link":"https://tavicosta.substack.com/p/a-rare-opportunity"},{"id":16,"cat":"AI/infra","urgency":"deep","source":"The Dark Side of the Boom","title":"Goldman's read: this wasn't risk-off, it was a crowded-trade unwind \u2014 S&P ex-AI rose while memory/opticals cratered","idea":"Per Goldman's one-delta desk head Rich Privorotsky (via the newsletter), the S&P ex-AI actually rose ~0.5% the same session memory fell ~6% and opticals ~5% \u2014 the market rotating away from crowded AI-momentum names rather than a broad risk-off move. The call: this is a 2-3 week unwind of a crowded trade, not a 2-day tantrum, and long gamma fits a regime where leadership is wobbling and the dollar isn't a clean hedge.","angle":"'Momentum' and 'the AI trade' have become functionally the same basket \u2014 so any 'momentum crash' headline this quarter is really an AI-capex-durability story wearing a factor-investing disguise.","tweetA":"S&P ex-AI: +0.5%. Memory: -6%. Opticals: -5%. Same day. This wasn't a risk-off session, it was a crowding unwind \u2014 momentum and 'the AI trade' have become the same basket, and Goldman's desk is now saying it out loud.","tweetB":"'2-3 week unwind, not a 2-day tantrum' is the actual call here. If that's right, anyone buying the semis dip this week is early. The framework says: wait for the vol fog to clear before the rebuild, not before the first green day.","charts":{"count":0,"hot":false,"desc":"No charts in this note \u2014 desk commentary and sector-level return breakdown only."},"link":"https://thedarksideoftheboom.substack.com/p/long-gamma-looks-attractive-as-momentum"},{"id":17,"cat":"crypto","urgency":"watch","source":"Ecoinometrics","title":"Strategy just sold Bitcoin. The company whose entire brand is 'we don't sell.'","idea":"Strategy (Saylor's MicroStrategy) sold another 3,600 BTC this week \u2014 a small fraction of total holdings, but a symbolic reversal for a company that built its entire reputation on never selling. The newsletter frames the real question as whether this is a one-off or a genuine shift in treasury management going forward.","angle":"Pair this directly with item #12 (Bitmine/Tom Lee still buying ETH at a loss) \u2014 two of crypto's most-watched corporate treasuries are now moving in opposite directions, and that split matters more than either headline alone.","tweetA":"Strategy just sold Bitcoin. Not a huge amount, but Strategy's entire brand for four years has been 'we don't sell.' The number matters less than the fact that the never-sell company just did.","tweetB":"Put this next to Bitmine buying more ETH at a loss the same week: one legendary corporate treasury is now selling, the other is doubling down underwater. That split is the actual story, not either headline in isolation.","charts":{"count":0,"hot":false,"desc":"Charts inside the full post (treasury holdings data) \u2014 worth opening."},"link":"https://ecoinometrics.substack.com/p/strategy-is-now-a-bitcoin-seller"},{"id":18,"cat":"venture","urgency":"watch","source":"Robert's Sinn (Goldfinger)","title":"Junior gold miner CEO, on record: '3 of our 10 new drill targets were found by AI alone, not our geology team'","idea":"Banyan Gold CEO Tara Christie says that of 10 new drill targets identified for the Nitra zone, seven were picked using a mix of AI and human geological judgment, and three were identified by AI alone \u2014 targets her own geology team hadn't flagged. The company now holds C$70M cash and a market cap over $500M, up from a $0.25 share price a year ago.","angle":"This is a specific, checkable claim about AI finding something humans didn't, outside of software entirely. If any of the three AI-only targets hit on the current drill program, it's a real case study for AI application in physical-world exploration, not another chatbot demo.","tweetA":"Junior gold miner CEO, on the record: 'seven targets were human and AI, three targets are just AI \u2014 they weren't targets our geology team picked up.' If any of those three AI-only targets hit, that's a genuine case study for AI outside of software.","tweetB":"C$70M in the treasury, market cap up from a $0.25 stock a year ago to $500M+, and now betting drill capital on targets an algorithm found that geologists didn't. Junior mining is a strange place to find one of this year's more interesting AI-adoption stories, but here we are.","charts":{"count":1,"hot":false,"desc":"Banyan Gold daily price chart showing the run from ~$0.25 to current levels over the past 12 months."},"link":"https://robertsinn.substack.com/p/interview-with-ceo-tara-christie"},{"id":19,"cat":"energy","urgency":"watch","source":"Robert's Sinn (Goldfinger)","title":"Andina Copper confirms a third porphyry center in Argentina: 468m at 0.50% Cu from 700m downhole","idea":"Andina Copper's first two holes into the Piuquenes North target returned 468m at 0.50% Cu / 0.30 g/t Au / 3.04 g/t Ag from 700m downhole, including a higher-grade 164m core at 0.70% Cu / 0.44 g/t Au / 4.19 g/t Ag from 924m downhole \u2014 confirming a new copper-gold porphyry center distinct from the company's previously drilled Piuquenes Central and East systems.","angle":"A third confirmed deep porphyry center on one property, at grades this size 700-900m downhole, is exactly the kind of junior-exploration data point the copper-supply-deficit thesis depends on for marginal future supply.","tweetA":"468 meters at 0.50% copper starting 700 meters down, with a 164m higher-grade core at 0.70%. That's a THIRD confirmed porphyry center on one property. This is the kind of junior discovery the copper-deficit thesis needs more of, and rarely gets.","tweetB":"Everyone's copper thesis runs through majors and recycling. Meanwhile a TSX-V junior in Argentina just confirmed a new deep porphyry system. The supply side of the copper-bull math is being written in drill results like this one, not in a major's investor day.","charts":{"count":0,"hot":false,"desc":"No charts in this excerpt \u2014 drill assay data only."},"link":"https://robertsinn.substack.com/p/andina-copper-delivers-new-high-grade-porphyry-discovery"},{"id":20,"cat":"culture","urgency":"deep","source":"The Pragmatic Engineer (Gergely Orosz)","title":"He killed a finished expos\u00e9 on a neobank because one engineer's visa story changed his mind \u2014 then later exposed a startup for hiding a $3.2M error","idea":"Orosz had a fact-checked, ready-to-publish expos\u00e9 on Dutch neobank Bunq's working conditions, but spiked it after an engineer told him Bunq was the only company willing to sponsor their visa, which let them later reach Meta. It reshaped his editorial policy toward covering what works, not just what's broken. Separately, after Pollen's CEO dismissed his reporting as 'nobody' coverage, Orosz investigated and found unpaid salaries, silently cancelled US health insurance, and a CTO-caused $3.2M double-charge to customers that was never disclosed in a postmortem \u2014 at a company that had raised $200M.","angle":"'$200M raised, staff unpaid' is a genuine governance/labor-market data point, not just a media anecdote \u2014 a reminder that raised capital and paid staff are measured on entirely different axes.","tweetA":"'$200M raised, staff unpaid' isn't a headline you'd expect to be literally true, but it's what Orosz found digging into Pollen after its CEO dismissed his reporting as 'nobody' coverage. Raised capital and paid staff are not the same metric, and boards should be checking both.","tweetB":"The more interesting story here isn't the Pollen collapse, it's the Bunq piece Orosz never published \u2014 killed because one engineer said the visa sponsorship changed his life, even though the reporting was accurate. Worth remembering next time an 'exposed' thread goes viral: the reporter usually has more context than 280 characters.","charts":{"count":0,"hot":false,"desc":"No charts \u2014 podcast AMA transcript/narrative."},"link":"https://newsletter.pragmaticengineer.com/p/the-pragmatic-engineer-ama"},{"id":21,"cat":"macro","urgency":"watch","source":"PaulOMacro","title":"'Markets have achieved a state of criticality' \u2014 and the trade he says makes him want to throw up","idea":"PaulOMacro opens his mid-year note declaring markets 'highly unstable' and having 'achieved a state of criticality,' previewing a review across jobs, inflation, USD, equity positioning, platinum, and a new trade he says 'makes me want to throw up' \u2014 which he takes as a good sign given his track record. Full analysis is paywalled beyond the section headers.","angle":"'State of criticality' is systems-theory language (self-organized-criticality/sandpile-model territory), not typical newsletter phrasing \u2014 worth flagging as a signal the author sees correlated, sudden-unwind risk across multiple assets at once, consistent with the AI-momentum unwind (items #9, #14, #16) and the Iran-driven vol elsewhere in this window.","tweetA":"'Markets have achieved a state of criticality' \u2014 that's sandpile-model language, not typical markets-newsletter language. When someone reaches for systems-theory vocabulary to describe positioning, they're telling you they see multiple things ready to unwind at once, not just one.","tweetB":"A trade described as 'makes me want to throw up, so it must be decent' is the most honest sentence in any newsletter this week. Conviction that feels bad in the moment is usually the trade that's already been priced out of consensus.","charts":{"count":0,"hot":false,"desc":"Paywalled beyond section headers (Jobs, Inflation, USD, Positioning, New Trade, Platinum, Oil) \u2014 charts likely inside, worth opening."},"link":"https://paulomacro.substack.com/p/ramblings-and-ruminations-mid-year"}];

const CAT_COLORS = {
  "macro": "#e24b4a", "credit": "#378add", "positioning": "#ef9f27", "AI/infra": "#1d9e75",
  "crypto": "#7f77dd", "geopolitics": "#d85a30", "energy": "#f97316", "tech": "#06b6d4",
  "gold": "#d4a017", "culture": "#ec4899", "labor": "#8b5cf6", "regulation": "#64748b",
  "science": "#14b8a6", "venture": "#84cc16"
};
const URGENCY_META = {
  act: { emoji: "🔴", label: "Act Now" },
  deep: { emoji: "🔵", label: "Deep" },
  watch: { emoji: "🟡", label: "Watch" }
};

let activeCat = "All";
let activeUrg = "All";
let activeSrc = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildHeader() {
  document.getElementById('header-meta').textContent =
    META.date + '  •  ' + META.time + '  •  ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function buildFilters() {
  const catCounts = {};
  const urgCounts = {};
  ITEMS.forEach(it => {
    catCounts[it.cat] = (catCounts[it.cat] || 0) + 1;
    urgCounts[it.urgency] = (urgCounts[it.urgency] || 0) + 1;
  });

  const catContainer = document.getElementById('cat-filters');
  let catHtml = '<button class="pill' + (activeCat === 'All' ? ' active' : '') + '" style="' + (activeCat==='All' ? 'background:#333;' : '') + '" onclick="setCatFilter(\'All\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(cat => {
    const color = CAT_COLORS[cat] || '#888';
    const isActive = activeCat === cat;
    catHtml += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:' + color + ';border-color:' + color + ';' : 'border-color:' + color + ';color:' + color + ';') + "\" onclick='setCatFilter(" + JSON.stringify(cat) + ")'>" + esc(cat) + ' (' + catCounts[cat] + ')</button>';
  });
  catContainer.innerHTML = catHtml;

  const urgContainer = document.getElementById('urg-filters');
  const urgOrder = ['act', 'deep', 'watch'];
  let urgHtml = '<button class="pill' + (activeUrg === 'All' ? ' active' : '') + '" style="' + (activeUrg==='All' ? 'background:#333;' : '') + '" onclick="setUrgFilter(\'All\')">All (' + ITEMS.length + ')</button>';
  urgOrder.forEach(u => {
    if (!urgCounts[u]) return;
    const isActive = activeUrg === u;
    const um = URGENCY_META[u];
    urgHtml += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:#444;border-color:#444;' : '') + "\" onclick='setUrgFilter(" + JSON.stringify(u) + ")'>" + um.emoji + ' ' + um.label + ' (' + urgCounts[u] + ')</button>';
  });
  urgContainer.innerHTML = urgHtml;
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  buildFilters();
  renderCards();
}
function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  buildFilters();
  renderCards();
}
function filterBySrc(name) {
  activeCat = 'All';
  activeUrg = 'All';
  activeSrc = name;
  buildFilters();
  renderCards(true);
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('expanded');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderCards(forceExpand) {
  const container = document.getElementById('cards-container');
  let list = ITEMS.slice();
  if (activeSrc) {
    list = list.filter(it => it.source.indexOf(activeSrc) !== -1);
  } else {
    if (activeCat !== 'All') list = list.filter(it => it.cat === activeCat);
    if (activeUrg !== 'All') list = list.filter(it => it.urgency === activeUrg);
  }

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state">No items match this filter.</div>';
    return;
  }

  let html = '';
  list.forEach((item, idx) => {
    const color = CAT_COLORS[item.cat] || '#888';
    const um = URGENCY_META[item.urgency] || { emoji: '', label: '' };
    const chartFlag = item.charts && (item.charts.count > 0 || item.charts.hot) ? (item.charts.hot ? '🔥' : '📊') : '';
    const expandClass = forceExpand ? ' expanded' : '';

    html += '<div class="card' + expandClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">#' + String(idx + 1).padStart(2, '0') + '</span>';
    html += '<span class="urg-emoji">' + um.emoji + '</span>';
    html += '<span class="src-badge" style="background:' + color + '">' + esc(item.source.split('(')[0].trim()) + '</span>';
    html += '<span class="cat-tag">' + esc(item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + esc(item.title) + '</span>';
    html += '</div>';

    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left-color:' + color + '; background:' + color + '12;">' + esc(item.angle) + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + esc(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + esc(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts && (item.charts.count > 0 || item.charts.desc)) {
      html += '<div class="section-label">Charts</div>';
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + esc(item.charts.desc || 'Charts inside.') + (item.charts.count ? ' (' + item.charts.count + ' chart' + (item.charts.count > 1 ? 's' : '') + ')' : '') + '</div>';
    }
    html += '<a class="read-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">↗ Read full article</a>';
    html += '</div>'; // card-body
    html += '</div>'; // card
  });
  container.innerHTML = html;
}

function toggleReport() {
  const card = document.getElementById('report-card');
  card.classList.toggle('expanded');
  document.getElementById('report-caret').textContent = card.classList.contains('expanded') ? '▴' : '▾';
}

function buildReport() {
  let html = '';
  html += '<p><strong>Time window:</strong> ' + esc(META.windowStart) + ' &rarr; ' + esc(META.windowEnd) + ' (strict 6-hour trailing window). Emails outside this window were not processed.</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<p><strong>Included sources</strong> (click a name to filter cards to that source):</p><ul>';
  META.includedSources.forEach(s => {
    html += "<li><span class=\"report-src\" onclick='filterBySrc(" + JSON.stringify(s.name) + ")'>" + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count > 1 ? 's' : '') + '</li>';
  });
  html += '</ul>';
  if (META.skippedSources && META.skippedSources.length) {
    html += '<p><strong>Skipped sources:</strong></p><ul>';
    META.skippedSources.forEach(s => {
      html += '<li>' + esc(s.name) + ' — ' + esc(s.reason) + '</li>';
    });
    html += '</ul>';
  } else {
    html += '<p><strong>Skipped sources:</strong> none — every email in this window had substantive original content.</p>';
  }
  document.getElementById('report-body').innerHTML = html;
}

buildHeader();
buildFilters();
renderCards();
buildReport();
</script>
