function catClass(cat) {

    'macro': 'cat-macro',
    'credit': 'cat-credit',
    'positioning': 'cat-positioning',
    'AI/infra': 'cat-aiinfra',

  };
  return map[cat] || 'cat-macro';
}

function urgencyIcon(u) {
  if (u === 'act_now') return '🔴';
  if (u === 'deep') return '🔵';
  return '🟡';
}

function renderCards() {
  var list = document.getElementById('list');
  list.innerHTML = '';
  ITEMS.forEach(function(item) {
    var hidden = (activeCat !== 'all' && item.cat !== activeCat) || (activeUrgency !== 'all' && item.urgency !== activeUrgency);
    var card = document.createElement('div');
    card.className = 'card' + (hidden ? ' hidden' : '');
    card.dataset.id = item.id;
    card.dataset.cat = item.cat;
    card.dataset.urgency = item.urgency;

    var srcHtml = '<span class="src-badge" onclick="filterBySrc(event,\'' + item.source.replace(/'/g, "\\'") + '\')">' + item.source + '</span>';

    var chartsHtml = '';
    if (item.charts && item.charts.length > 0) {
      chartsHtml = '<h4>Charts / Links</h4><div class="links-row">' +
        item.charts.map(function(c) { return '<a class="chart-link" href="' + c.url + '" target="_blank">' + c.label + '</a>'; }).join('') +
        '</div>';
    }

    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<div class="cat-dot ' + catClass(item.cat) + '"></div>' +
        '<span class="urgency-icon">' + urgencyIcon(item.urgency) + '</span>' +
        '<span class="card-title">' + item.title + '</span>' +
        '<span class="card-source">' + item.source + '</span>' +
        '<span class="card-chevron">▶</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<h4>Source</h4>' + srcHtml +
        '<h4 style="margin-top:12px">Idea</h4>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<h4 style="margin-top:12px">Angle / Edge</h4>' +
        '<div class="angle-text">' + item.angle + '</div>' +
        '<h4 style="margin-top:12px">Tweets</h4>' +
        '<div class="tweet-box">' +
          '<div class="tweet-row">' +
            '<span class="tweet-label">A</span>' +
            '<span class="tweet-content">' + item.tweetA.replace(/\n/g, '<br>') + '</span>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-row" style="margin-top:10px;padding-top:10px;border-top:1px solid #2d3148">' +
            '<span class="tweet-label">B</span>' +
            '<span class="tweet-content">' + item.tweetB.replace(/\n/g, '<br>') + '</span>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        chartsHtml +
      '</div>';

    list.appendChild(card);
  });
}

function toggleCard(id) {
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    if (parseInt(cards[i].dataset.id) === id) {
      cards[i].classList.toggle('open');
      break;
    }
  }
}

function filterCat(btn, cat) {
  activeCat = cat;
  var btns = document.querySelectorAll('[data-cat]');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  btn.classList.add('active');
  applyFilters();
}

function filterUrgency(btn, urgency) {
  activeUrgency = urgency;
  var btns = document.querySelectorAll('[data-urgency]');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var catMatch = activeCat === 'all' || c.dataset.cat === activeCat;
    var urgMatch = activeUrgency === 'all' || c.dataset.urgency === activeUrgency;
    c.classList.toggle('hidden', !(catMatch && urgMatch));
  }
}

function filterBySrc(event, src) {
  event.stopPropagation();
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var item = ITEMS.find(function(it) { return it.id === parseInt(c.dataset.id); });
    if (item) {
      c.classList.toggle('hidden', item.source !== src);
    }
  }
  activeCat = 'all';
  activeUrgency = 'all';
  var allBtns = document.querySelectorAll('[data-cat]');
  for (var j = 0; j < allBtns.length; j++) {
    allBtns[j].classList.toggle('active', allBtns[j].dataset.cat === 'all');
  }
  var urgBtns = document.querySelectorAll('[data-urgency]');
  for (var k = 0; k < urgBtns.length; k++) {
    urgBtns[k].classList.toggle('active', urgBtns[k].dataset.urgency === 'all');
  }
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

renderCards();
