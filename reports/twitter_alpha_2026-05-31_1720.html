<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

f this drags on: oil higher, inflation returns, commodity volatility increases. Actual Hormuz supply shock may be smaller than feared: 6-8M bbl/day can bypass via pipelines, demand destruction and strategic reserve releases help. Gold/silver sold off initially — that looks like a liquidity event, not a fundamental change. Silver remains in structural deficit (solar, EVs, grid). Uranium: needs >$150/lb to truly incentivize Tier-2 greenfield. If deal happens → uranium & silver spike; if tensions continue → spike even harder later. Also bullish copper, potash, graphene. Commodity supercycle intact.", "tweet_url": "https://x.com/Swedish_uranium/status/2061101326952497592", "images": [], "is_thread": false, "created_at": "2026-05-31T15:03:44.000Z"}, {"author": "elerianm", "text": "Data confirms the Middle East War's inflationary impact on the global economy is universal, but the growth impact diverges by country — further fueling the theme of macro divergence. Weekly note covers transition into a data-heavy week with three main issues in play for June.", "tweet_url": "https://x.com/elerianm/status/2061129476197532059", "images": [], "is_thread": false, "created_at": "2026-05-31T16:55:35.000Z"}]}, {"title": "OpenAI Robotics Launches — Ex-Sora Team Pivots to Physical World", "category": "ai", "description": "Sam Altman formalized OpenAI Robotics from the world simulation / Sora team. Emad Mostaque contextualizes the lineage.", "items": [{"author": "sama", "text": "OpenAI Robotics is hiring — full-stack hardware, ops, systems, and ML engineers. The program evolved from Aditya Ramesh's world simulation research into a dedicated robotics team. Near-term focus: robots supporting skilled workers building future infrastructure. Long-term vision: personal robots for every individual. Progress described as rapid.", "tweet_url": "https://x.com/sama/status/2061117302528188712", "images": [], "is_thread": false, "created_at": "2026-05-31T16:07:45.000Z"}, {"author": "EMostaque", "text": "Sora team became robotics team — contextualizing the OpenAI Robotics announcement. The video generation group that built Sora has pivoted to physical-world AI.", "tweet_url": "https://x.com/EMostaque/status/2061131278091464906", "images": [], "is_thread": false, "created_at": "2026-05-31T17:02:45.000Z"}]}, {"title": "$LAB Token Scam — $8.6B FDV, CEXs (Gate/KuCoin/Bitget) Complicit", "category": "crypto", "description": "sjdedic published a detailed takedown. zachxbt followed up flagging RAIN token on the same session.", "items": [{"author": "sjdedic", "text": "The $LAB scam: up 2x this week, trading at $8.6B FDV. Shady market makers paint the chart using CEX fee-exempt accounts — the only way to do this at scale without killing yourself on costs. On PancakeSwap DEX, a $10,000 buy moves the price 70% — there is essentially no real liquidity. Gate, KuCoin, and Bitget facilitate this for quick profit while damaging the industry they depend on. Use DEXs or you're part of the problem.", "tweet_url": "https://x.com/sjdedic/status/2061010799431204905", "images": ["https://pbs.twimg.com/media/HJouZbkXkAIs_h6.jpg", "https://pbs.twimg.com/media/HJouZbmWwAAaRwu.jpg", "https://pbs.twimg.com/media/HJouZbjWwAEzAkc.jpg"], "is_thread": true, "created_at": "2026-05-31T09:04:00.000Z"}, {"author": "zachxbt", "text": "RAIN token: deployer and related addresses actively doing Uni V3 LPs. Team is tied to sketchy DAT Enlivex and launchpad Gems.vip. Co-founders Rain/Enlivex/Gems share little prior industry experience, no mutual followers with established players. CEXs only pretend to care about manipulation after tokens crash. Best move: ignore these tokens entirely — engaging only provides exit liquidity for insiders.", "tweet_url": "https://x.com/zachxbt/status/2061052599554781191", "images": ["https://pbs.twimg.com/media/HJpUaZ4a8AEjNsp.jpg", "https://pbs.twimg.com/media/HJpUaZzaQAAgBQa.jpg", "https://pbs.twimg.com/media/HJpUaZybwAAn-rG.jpg"], "is_thread": true, "created_at": "2026-05-31T11:35:00.000Z"}]}, {"title": "Bond & Equity Supply Flood — Watching Demand Absorption", "category": "macro", "description": "El-Erian flags large upcoming paper supply across bonds and equities; who has the cash to absorb it?", "items": [{"author": "elerianm", "text": "With so much paper set to hit markets over the next few months — across both bonds and equities — it's worth keeping an eye on the potential sources of cash available to absorb this supply. Pointing to FT Lex analysis. Context: last week capped off a highly active month of geopolitical developments, shifting energy markets, diverging economic data, and strong AI earnings.", "tweet_url": "https://x.com/elerianm/status/2061110255526818112", "images": ["https://pbs.twimg.com/media/HJqI2rmW4AIxTl4.jpg"], "is_thread": false, "created_at": "2026-05-31T15:39:13.000Z"}]}, {"title": "Colombia Election — Geiger Capital All-In", "category": "em", "description": "Geiger Capital had its largest portfolio position tied to the Colombia election today.", "items": [{"author": "Geiger_Capital", "text": "Today is the day — polls are open. Colombia joins the Golden Age of LatAm. Geiger was all-in with a full writeup on their largest position ahead of this.", "tweet_url": "https://x.com/Geiger_Capital/status/2061091669051621604", "images": [], "is_thread": false, "created_at": "2026-05-31T14:25:21.000Z"}]}], "insights": [{"author": "biancoresearch", "category": "macro", "text": "MAJOR THREAD — The entire 'war rally' in equities is AI-driven. Strip out AI and the rest of the market has done nothing since gasoline started rising. The key question isn't whether it's a bubble (probably yes), but WHERE in the bubble cycle we are. Analog to the internet bubble: December 1996 (Greenspan's irrational exuberance — before a 300% NASDAQ rally) vs. March 2000 (peak, before an 80% crash). biancoresearch argues we're closer to 1997, not 2000 — capex spending is massive but justified: the stock market is more concentrated around a single theme than at any point in 150 years, but the last comparable was railroads, which literally transformed America. That level of concentration was warranted then; it is warranted now. Separately: AI token usage is exploding since January when agentic AI (Claude Cowork, OpenClaw/Moltbook) went mainstream — one agent request equals ~20 general LLM prompts, driving exponential consumption growth. Data centers are also bypassing utilities entirely, bringing their own power, and are therefore NOT responsible for rising electric bills.", "tweet_url": "https://x.com/biancoresearch/status/2061120632557850888", "images": ["https://pbs.twimg.com/media/HJqI6aWWkAIJqU1.png", "https://pbs.twimg.com/media/HJqRgQyW0AM_B-c.jpg", "https://pbs.twimg.com/media/HJqV2D9WEAA2rEO.jpg"], "is_thread": true, "created_at": "2026-05-31T16:20:27.000Z"}, {"author": "ASvanevik", "category": "crypto", "text": "LONG THREAD — Ethereum maxis who wrote off Solana in 2018-2021 are now repeating the same mistake with Hyperliquid. Pattern: EOS/Tezos failed → concluded Ethereum was the only game in town → ridiculed Solana as a memecoin chain → were wrong. Now: dismissing HL because they already learned their lesson once but failed to internalize it. Key evidence: on-chain data from Nansen shows what users actually do; chain demand from Nansen customers speaks clearly. HL is a full general-purpose L1 powered by HyperBFT — HyperCore handles native perp/spot, HyperEVM runs permissionless apps. It's a finance hub, not a silo. It's here to stay. Additionally: HYPE is deflationary while almost every other token is inflationary — HYPE at ATH price but not yet ATH market cap, which is structurally unusual.", "tweet_url": "https://x.com/ASvanevik/status/2060955001112216009", "images": [], "is_thread": false, "created_at": "2026-05-31T04:56:00.000Z"}, {"author": "udiWertheimer", "category": "crypto", "text": "DETAILED ANALYSIS — Passkeys vs hardware wallets, the real threat model comparison. Hardware wallets protect well against phishing (seed phrase hygiene), malware, and vendor-compromised updates — but are NOT reliably safe against physical device theft (attacker has time). Passkeys are strictly superior: (1) Phishing resistance is best-in-class, tied to specific origins; (2) Key material is NEVER exposed to the user under any circumstance — leaking keys via human error is 100x more common than physical attacks and passkeys prevent this entirely; (3) Apple's recovery story implements strong best practices; (4) Risk of Apple pushing a compromised update is virtually zero. Conclusion: passkeys protect keys better than hardware wallets in most realistic scenarios. The problem: most crypto passkey implementations are bad — they try to use passkeys as something they're not, negating the benefits.", "tweet_url": "https://x.com/udiWertheimer/status/2061108466173747296", "images": [], "is_thread": false, "created_at": "2026-05-31T15:32:06.000Z"}, {"author": "hooeem", "category": "crypto", "text": "THREAD — Three bullish crypto narratives for the next cycle: (1) Privacy — digital IDs, CBDCs, eyeball-scanning for $50, AI models with deep personal access → privacy assets primed for a speculative bubble. (2) Decentralized AI — closed frontier models drive dangerous vendor lock-in and unchecked security risks; networks like Bittensor deploy incentivized global engineers to counter this. (3) AI Privacy — the Venn diagram intersection, likely to see extreme adoption given the privacy implications of AI holding personal data. Framed as highest-conviction sectoral thesis.", "tweet_url": "https://x.com/hooeem/status/2061023810124444077", "images": ["https://pbs.twimg.com/media/HJo6O2iWEAEnCEp.jpg"], "is_thread": true, "created_at": "2026-05-31T09:53:00.000Z"}, {"author": "hooeem", "category": "macro", "text": "Debunking the viral 'AI will mathematically destroy the economy' paper. The math assumes money saved from job displacement simply vanishes — owners never spend it, no new jobs emerge, nothing gets cheaper. Wrong on all counts: saved money gets reinvested, paid out, or shows up as lower prices, creating new demand and jobs elsewhere. The scariest result in the paper requires 'special knife-edge conditions'; letting money recirculate makes the problem shrink toward nothing. Also assumes people spend half their income on a single industry's products — wildly unrealistic.", "tweet_url": "https://x.com/hooeem/status/2061122714727760209", "images": [], "is_thread": false, "created_at": "2026-05-31T16:29:00.000Z"}, {"author": "stacy_muur", "category": "crypto", "text": "THREAD — Why prediction markets became sports books (65% of Kalshi/Polymarket volume is sports; science/research is 1.2%), and how AI fixes it. Structural trap: smart traders need gamblers to take the other side; gamblers only want fast/exciting bets → everything defaults to sports. Long-term bets also unattractive: 5% edge for a year vs. 6% risk-free in bonds. AI agents change the equation: near-zero cost, can be forced to participate in niche markets, behave rationally, explain reasoning, handle private data. Even $10 markets become viable. Real opportunity: private corporate prediction markets (HP, Eli Lilly, Google all ran successful internal markets that died from internal politics, not bad accuracy) powered by AI.", "tweet_url": "https://x.com/stacy_muur/status/2061096613456834770", "images": [], "is_thread": false, "created_at": "2026-05-31T14:45:00.000Z"}, {"author": "garrytan", "category": "tech", "text": "GBrain v0.42.1: implements Microsoft's SkillOpt paper — automatically improves markdown skill files, uniquely also writes the benchmarks for you. Open source MIT. Garry runs it with a 350k-entry markdown knowledge wiki + OpenClaw/Hermes Agent setup, ~30 min to replicate. GStack is now #100 on GitHub's all-time top open source projects list and climbing. Core thesis accompanying the release: the real AI bottleneck isn't model intelligence — it's company-specific context locked in senior employees' heads. Whoever cracks organizational knowledge extraction unlocks everything else.", "tweet_url": "https://x.com/garrytan/status/2061107022360391686", "images": ["https://pbs.twimg.com/media/HJqFsPRacAAoWRR.jpg", "https://pbs.twimg.com/media/HJqF-YkaoAEmAGe.jpg"], "is_thread": true, "created_at": "2026-05-31T15:26:22.000Z"}, {"author": "garrytan", "category": "tech", "text": "Founder time horizon essay: Bezos won on time horizon, not AWS or 1-Click. 3-year bets = crowded field, every smart funded team chasing the same problems. Stretch to 7 years and the field collapses — investors want returns, employees want vesting, founders want proof; almost nobody can hold a bet that doesn't pay for a decade. The patience is the moat. But you can't fake a 7-year horizon on a problem you don't genuinely care about — you'll bail the first hard year. The real prerequisite isn't discipline: it's knowing yourself well enough to choose a problem you'll serve for decades.", "tweet_url": "https://x.com/garrytan/status/2061080196229525808", "images": [], "is_thread": true, "created_at": "2026-05-31T13:39:46.000Z"}, {"author": "Melt_Dem", "category": "tech", "text": "THREAD — Robotics as a Service (portco Verne Robotics): the industrial robotics business model is broken. Physical intelligence deployment should mirror SaaS — low integration cost, right-sized contracts that fit a wide range of buyers. Key advantage of the model: scale across deployments makes task learning dramatically faster, 10-20 minutes for most tasks. Software ate the world; robots are next. Every business in America deserves a robot — vertically integrated players serving RaaS will make it happen.", "tweet_url": "https://x.com/Melt_Dem/status/2061121928560271362", "images": ["https://pbs.twimg.com/media/HJqSWt0aUAAMweo.jpg", "https://pbs.twimg.com/media/HJqTqMza0AA1xhT.jpg"], "is_thread": true, "created_at": "2026-05-31T16:25:00.000Z"}, {"author": "jvisserlabs", "category": "macro", "text": "A prominent financial journalist who spent 8 years researching 1929 just guaranteed a crash on national TV. After a near-decade studying the greatest crash in market history, every market starts to look like 1929. This is why investors should use AI: not to predict perfectly, but to study crashes and bubbles without narrative bias — how they formed, how they ended, what technical signals preceded them, how much fear was data vs. story. Subscription-driven bear porn actively hurts returns.", "tweet_url": "https://x.com/jvisserlabs/status/2061062641817366565", "images": ["https://pbs.twimg.com/media/HJmpAAJXUAE8Y8Y.jpg"], "is_thread": false, "created_at": "2026-05-31T12:29:00.000Z"}, {"author": "cointradernik", "category": "macro", "text": "May performance review (regime model basket): BTC -3.1%, SMH +18.87%, XLK +19.33%, IWM +4.29%, DBC -4.47%. Equal-weight basket: +6.98% vs SPY +4.86% — alpha +2.12%. Even with two losers, the basket beat SPY by 43.6% on a relative basis. June regime model now signals rotations AWAY from May winners. Additional flag from regime data: BNB surfacing as interesting per-regime — not part of any official strategy but 'long BNB and log off' was the tongue-in-cheek call.", "tweet_url": "https://x.com/cointradernik/status/2061082908060700987", "images": ["https://pbs.twimg.com/media/HJpv-wZWMAInsBg.jpg"], "is_thread": false, "created_at": "2026-05-31T13:50:33.000Z"}, {"author": "sjdedic", "category": "crypto", "text": "HYPE and CARDS as the most powerful barbell in crypto right now. HYPE = institutional appetite (best onchain trading infrastructure ever built, flipping L1 FDVs, eating CEX market share). CARDS = retail/consumer appetite (real consumers collecting, trading, spending on products they love, backed by an outperforming multi-decade asset class). Both born in the bear market, grew through it via relentless execution. Both now printing revenue and outperforming the market. HYPE is even threatening to flip LAB in FDV.", "tweet_url": "https://x.com/sjdedic/status/2061091907040633097", "images": [], "is_thread": false, "created_at": "2026-05-31T14:26:18.000Z"}, {"author": "CryptoCred", "category": "crypto", "text": "Trading psychology slop has gone too far. The genre says: 'You're not profitable because of what you do outside of trading.' Wrong. A Buddhist monk at a terminal generally won't make money. You need some sort of edge, a +EV strategy, or at minimum a coherent idea of what market effect you're trying to monetize — then psychology helps reduce unforced errors. Most trading psychology content is cope: it allows you to focus on breathing exercises instead of confronting that your clicking is completely random.", "tweet_url": "https://x.com/CryptoCred/status/2061032203371360712", "images": ["https://pbs.twimg.com/tweet_video_thumb/HJpCMWdXgAQuw_t.jpg"], "is_thread": true, "created_at": "2026-05-31T10:29:00.000Z"}, {"author": "stacy_muur", "category": "crypto", "text": "RWA space warming up quietly. Early-stage builders on watch: RealityFi (issuance via BitGet), Petradotag (institutional infra), deadstock_app (RWA collectibles), you_canton (RWA exchange), HundredExchange (equity perps on Canton chain), AssetsRWA (aggregator), fractionaxapp (agentic RWA investment), Xaue_Protocol (yield-generating gold-backed token), nota_rwa (yield platform), Arc_SLV (silver-backed cross-chain token).", "tweet_url": "https://x.com/stacy_muur/status/2061005764538650867", "images": [], "is_thread": false, "created_at": "2026-05-31T08:44:00.000Z"}, {"author": "PeterDiamandis", "category": "ai", "text": "Anthropic dropped Opus 4.8 six weeks after 4.7, reclaiming the coding crown from GPT 5.5. The leapfrogging is now monthly — will be weekly, then daily, then hourly, until the singularity updates autonomously. Regulatory bodies meeting quarterly to govern monthly model releases are already irrelevant by design. AI is coming for the boring parts of your job — the parts that drain you. What remains is time for creativity.", "tweet_url": "https://x.com/PeterDiamandis/status/2061047662502088937", "images": [], "is_thread": false, "created_at": "2026-05-31T11:21:00.000Z"}, {"author": "saxena_puru", "category": "ai", "text": "AI inference market projected to grow from $66B (2025) to $292B by 2029 — 45% CAGR. This becomes the new bottleneck in the AI story; a few infrastructure companies will capture disproportionate share. Optical/photonics stocks (AAOI, LITE) have gone parabolic and are showing early signs of rolling over — on watch for late summer/early autumn pullbacks toward 40-week moving averages as entry points.", "tweet_url": "https://x.com/saxena_puru/status/2061070439946858795", "images": [], "is_thread": true, "created_at": "2026-05-31T13:06:00.000Z"}, {"author": "cryptopunk7213", "category": "tech", "text": "Orbital data centers — widely dismissed as a dumb idea, but SpaceX already proved it works via Starlink. Starlink satellites are roughly the same size, surface area, and weight as an Nvidia GPU rack. They already have cooling systems comparable to what orbital GPUs would need. Add radiation hardening and you're 90% of the way there. Highlighted from Gavin Baker's recent podcast episode.", "tweet_url": "https://x.com/cryptopunk7213/status/2061083023118831646", "images": ["https://pbs.twimg.com/media/HJpwFPnW8AISXqr.jpg"], "is_thread": true, "created_at": "2026-05-31T13:51:00.000Z"}, {"author": "MoonOverlord", "category": "crypto", "text": "X algorithm is throttling reach to the point creators are quitting: accounts with 100K followers are getting 500 views per tweet. Multi-cycle crypto veterans who never quit market cycles are going quiet — not because they have nothing to say, but because no one sees it. Curated follower lists now yield dead silence. 'Algorithm+: it just shows you tweets from people you follow' (sardonic product pitch). If this continues, the information density of crypto Twitter degrades structurally.", "tweet_url": "https://x.com/MoonOverlord/status/2061106443307130996", "images": ["https://pbs.twimg.com/media/HJqVJfvWsAgaZ3a.png"], "is_thread": true, "created_at": "2026-05-31T15:24:04.000Z"}, {"author": "Chartfest1", "category": "macro", "text": "Weekly market sentiment poll: for the first time in 3 weeks, a small majority voted UP. Previous three consecutive polls were majority DOWN — this is the first inflection. Notably low voter participation overall, which Helene Meisler finds puzzling given historical engagement.", "tweet_url": "https://x.com/Chartfest1/status/2061024100135350550", "images": ["https://pbs.twimg.com/media/HJo6e4wW4AMNioY.png", "https://pbs.twimg.com/media/HJo6e4nWUAIZ6ZU.png"], "is_thread": true, "created_at": "2026-05-31T09:56:52.000Z"}, {"author": "qthomp", "category": "macro", "text": "Volatility is nowhere to be found and the administration has every incentive to keep it suppressed heading into midterms. However, the past few months' winning themes may pass the baton to other sectors as the administration's focus must adapt into November. Theme rotation is the key risk to existing winners.", "tweet_url": "https://x.com/qthomp/status/2061089565524578679", "images": [], "is_thread": false, "created_at": "2026-05-31T14:17:00.000Z"}, {"author": "0xJeff", "category": "crypto", "text": "Privacy season starting on Solana. Ecosystem includes: private finance (private transfers, swaps, vesting/distribution), sealed-bid auctions, and a financing layer for energy infrastructure crucial to AI datacenter buildout. Framed as early positioning ahead of a major narrative shift.", "tweet_url": "https://x.com/0xJeff/status/2060974686276866125", "images": [], "is_thread": false, "created_at": "2026-05-31T06:40:00.000Z"}, {"author": "nic_carter", "category": "society", "text": "Smartphone penetration and fertility collapse: the link appears empirically robust in developing nations — when smartphone penetration crosses a threshold, family formation collapses regardless of affluence. This suggests the relationship is causal and operates through attention/cultural disruption mechanisms, not purely economic.", "tweet_url": "https://x.com/nic_carter/status/2061096750681620778", "images": [], "is_thread": false, "created_at": "2026-05-31T14:45:33.000Z"}, {"author": "lopp", "category": "tech", "text": "After a decade of playing defense in cybersecurity — focusing on blocking attackers — grown weary. Time to take a shot at going on the offensive. Deliberate pivot signal from the Bitcoin security researcher and cypherpunk.", "tweet_url": "https://x.com/lopp/status/2061055968964702605", "images": [], "is_thread": false, "created_at": "2026-05-31T12:03:30.000Z"}, {"author": "dgt10011", "category": "society", "text": "Tocqueville (1835): 'Americans are constantly driven to engage in commerce and industry. Their origin, their social condition, their political institutions, and even the region they inhabit urge them irresistibly in this direction… This is the characteristic that most distinguishes the American people from all others at the present time.' Implicit commentary on the enduring structural advantage of American commercial culture.", "tweet_url": "https://x.com/dgt10011/status/2061098169027485847", "images": [], "is_thread": false, "created_at": "2026-05-31T14:51:00.000Z"}], "contrarian": [{"author": "Crypto_McKenna", "category": "crypto", "text": "ETH is heading to $1,000. The rotation out of Ethereum started approximately 6 months ago. Every underwater DAT (decentralized autonomous treasury) will sell ETH on their balance sheet to buy back their own tokens. There are no buyers to meet this sell flow. It will unravel slowly. Separately: Bitcoin's quantum threat is a real institutional blocker that's being ignored. Affected public keys can expose private keys — this changes the underwriting risk calculus for institutional BTC holdings. Surprised Saylor, as one of the largest BTC holders, has not been proactive on this. Post-CLARITY, if core contributors can align on a migration plan, sizable inflows would follow. Head-in-sand on this for longer increases risk and reduces flows.", "tweet_url": "https://x.com/Crypto_McKenna/status/2061129317665349800", "images": [], "is_thread": true, "created_at": "2026-05-31T16:54:57.000Z"}, {"author": "stevehou", "category": "ai", "text": "AI PC is fake demand. The scaling law governs this AI revolution — models only become useful at sufficient scale, and truly useful models must be large cloud-hosted models. You pay a high-end laptop price and get intelligence far inferior to a $20/month cloud subscription. Cloud inference costs are dropping rapidly (DeepSeek pushing efficiency to new heights), so edge AI cost-effectiveness only gets worse over time. Supply chain surveys projecting 10M Nvidia N1X AI PCs in 2 years are wildly optimistic. The correct form factor is a barbell: phone + cloud, not edge compute.", "tweet_url": "https://x.com/stevehou/status/2061125630628868311", "images": [], "is_thread": true, "created_at": "2026-05-31T16:40:18.000Z"}, {"author": "udiWertheimer", "category": "ai", "text": "Nvidia is about to announce a new laptop chip and every account on X will tell you that you need it or face the permanent underclass. They're wrong. All you need is a $700 MacBook Neo. Cloud inference is strictly superior in intelligence per dollar and getting cheaper. The 'AI PC' hardware hype cycle benefits vendors at the expense of consumers who don't need it. Save your money.", "tweet_url": "https://x.com/udiWertheimer/status/2061095335036944889", "images": [], "is_thread": true, "created_at": "2026-05-31T14:39:55.000Z"}, {"author": "buccocapital", "category": "ai", "text": "Responding to the viral framing 'Imagine replacing 90% of your employees with a team of geniuses who have no idea how your company operates — total chaos, nothing works': 'No, I don't think I will. It is as if these people have never worked in a real business in their entire life.' Grounded pushback on the dominant AI disruption narrative from someone with operational experience.", "tweet_url": "https://x.com/buccocapital/status/2061130258535829506", "images": [], "is_thread": false, "created_at": "2026-05-31T16:58:00.000Z"}, {"author": "DCinvestor", "category": "regulation", "text": "SpaceX $SPCX IPO: index providers waived the profitability requirement and cut the seasoning window from 90 days to 5 days specifically for this listing. 'Really feels like they are looting everything they possibly can at this point.' Two-tier system, rules bent for the most politically connected company — erodes index integrity and market trust.", "tweet_url": "https://x.com/DCinvestor/status/2060996884643357148", "images": [], "is_thread": false, "created_at": "2026-05-31T08:08:00.000Z"}, {"author": "mert", "category": "crypto", "text": "ZEC (Zcash) has achieved all of its growth metrics inside a bear market where capital has been exiting crypto. It has never even seen a bull market. The asymmetric setup: all the progress happened in the worst conditions possible.", "tweet_url": "https://x.com/mert/status/2061117437441941726", "images": [], "is_thread": true, "created_at": "2026-05-31T16:07:45.000Z"}], "positioning": [{"author": "sjdedic", "category": "positioning", "text": "Highest conviction crypto barbell: HYPE (institutional — best onchain trading infra, flipping L1 FDVs, eating CEX share, printing revenue) + CARDS (consumer — real buyers collecting, trading, spending on products they love, backed by outperforming decade-long asset class). Both born in bear market, grew through relentless execution.", "tweet_url": "https://x.com/sjdedic/status/2061091907040633097", "images": [], "is_thread": false, "created_at": "2026-05-31T14:26:18.000Z"}, {"author": "fejau_inc", "category": "positioning", "text": "Very optimistic on the future form factor of tokens, very bearish on 97% of current tokens. HYPE leading the charge. Contrast with Uniswap, Jupiter, Maker, Solana, Aave, Lido (all horrendous tokenomics) makes HL's model superiority obvious — 'what could have been.'", "tweet_url": "https://x.com/fejau_inc/status/2061102213196599450", "images": [], "is_thread": false, "created_at": "2026-05-31T15:07:15.000Z"}, {"author": "alpha_pls", "category": "positioning", "text": "HYPE inflow sources: AF (Assistance Fund) buybacks, ETFs, DATs, and $250B in ETH rotating into the Hyperliquid ecosystem.", "tweet_url": "https://x.com/alpha_pls/status/2060974299700252688", "images": [], "is_thread": false, "created_at": "2026-05-31T06:38:58.000Z"}, {"author": "AndreasSteno", "category": "positioning", "text": "Bitcoin is the only major risk asset NOT in melt-up mode. Current portfolio: very little crypto; heavy AI-adjacent exposure; a couple of cybersecurity trades up ~100%. Confirmation that selective non-consensus positioning is working.", "tweet_url": "https://x.com/AndreasSteno/status/2061102839762411765", "images": ["https://pbs.twimg.com/media/HJqB_UyXoAU4X-F.png"], "is_thread": true, "created_at": "2026-05-31T15:07:00.000Z"}, {"author": "ZeeContrarian1", "category": "positioning", "text": "High conviction portfolio: +143% over 12 months with nephew's savings. Past winners: ZIM, STAA, IMDX. Current top 3 highest-conviction (most asymmetric): WGS (genome sequencing), ORCL (Oracle), NOW (ServiceNow). No leverage, no options — concentrated 30%+ minimum allocations. Thesis: portfolio has potential to double again in next 12 months.", "tweet_url": "https://x.com/ZeeContrarian1/status/2061040669381329279", "images": ["https://pbs.twimg.com/media/HJpJj_lboAAYIqY.jpg"], "is_thread": true, "created_at": "2026-05-31T11:00:00.000Z"}, {"author": "Swedish_uranium", "category": "positioning", "text": "Commodity supercycle thesis intact despite volatility. Uranium picks: CCJ, KAP (majors), DNN, NXE (permitted, capex risk), UUUU, EU (US-focused). If Iran deal → uranium & silver spike. If tensions continue → spike even harder later, though short-term volatility brutal. Also bullish copper, potash, graphene. Uranium needs >$150/lb for greenfield incentive; most producers still not enjoying huge margins at current prices.", "tweet_url": "https://x.com/Swedish_uranium/status/2061101326952497592", "images": [], "is_thread": false, "created_at": "2026-05-31T15:03:44.000Z"}, {"author": "cointradernik", "category": "positioning", "text": "June rotation signals: move away from May winners (SMH +18.87%, XLK +19.33%). Regime model flagging BNB as interesting per-regime data — 'long BNB and log off' tongue-in-cheek but noted. Equal-weight approach vs. active momentum rotation in June.", "tweet_url": "https://x.com/cointradernik/status/2061082908060700987", "images": ["https://pbs.twimg.com/media/HJpv-wZWMAInsBg.jpg"], "is_thread": false, "created_at": "2026-05-31T13:50:33.000Z"}, {"author": "saxena_puru", "category": "positioning", "text": "Watch AAOI and LITE (optical/photonics) for late summer/early autumn pullbacks to 40-week moving averages as entry points — they've gone parabolic and are showing early signs of topping. AI inference infrastructure ($66B→$292B CAGR) is the longer-term focus for new positions.", "tweet_url": "https://x.com/saxena_puru/status/2061095677866938544", "images": [], "is_thread": true, "created_at": "2026-05-31T14:41:00.000Z"}, {"author": "thedefivillain", "category": "positioning", "text": "NEAR dead since the ~$3 touch — looking for short setups on the next bounce. JTO described as 'absolute cancer to trade' — avoid.", "tweet_url": "https://x.com/thedefivillain/status/2061028214609162479", "images": ["https://pbs.twimg.com/media/HJo9um4XwAE0d_W.jpg"], "is_thread": false, "created_at": "2026-05-31T10:24:00.000Z"}, {"author": "MoonOverlord", "category": "positioning", "text": "Hunting for smaller-cap tokens at $10-50M market cap doing real buybacks — 'the Hyperliquid of $10M market cap.' Revenue + buyback model as the screener. Hyperliquid proved the model works at scale; looking for early versions of that.", "tweet_url": "https://x.com/MoonOverlord/status/2061118499557195822", "images": [], "is_thread": false, "created_at": "2026-05-31T16:11:58.000Z"}], "links": [{"author": "elerianm", "url": "https://mohamedelerian.substack.com/p/the-weekly-look-at-the-global-economy-077", "description": "Weekly macro look — May recap, 3 issues for June, geopolitics/energy/AI earnings interplay"}, {"author": "JavierBlas", "url": "https://www.nytimes.com/2026/05/30/us/politics/trump-iran-peace-framework.html", "description": "NYT: Trump toughened Iran deal terms and sent back to Iran"}, {"author": "garrytan", "url": "https://github.com/garrytan/gbrain", "description": "GBrain — open source MIT knowledge agent + SkillOpt framework"}, {"author": "cointradernik", "url": "https://www.macromarketmodel.com/", "description": "Macro regime model — June rotation signals, per-asset configurable regime data"}, {"author": "jvisserlabs", "url": "https://www.youtube.com/watch?v=horXT7Agjks&feature=youtu.be", "description": "Crash caller psychology, bubble study via AI, subscription bear porn critique"}, {"author": "sama", "url": "https://openai.com/index/strengthening-societal-resilience-with-rosalind-biodefense/", "description": "OpenAI Rosalind biodefense initiative"}, {"author": "Melt_Dem", "url": "https://cruciblecapital.substack.com/p/reshaping-a-broken-industrial-robot", "description": "Crucible Capital: Reshaping the broken industrial robotics business model → RaaS"}, {"author": "Delphi_Digital", "url": "https://www.youtube.com/watch?si=hkfwmJjetyl-3V7Z&v=y188HitI4Lw", "description": "Delphi podcast: Jose on the playbook for breaking into new sectors"}, {"author": "santiagoroel", "url": "https://www.youtube.com/watch?v=HRYysSAv-Ro", "description": "'All the venture returns have been had in the public markets'"}, {"author": "elerianm", "url": "https://www.linkedin.com/pulse/weekly-look-global-economy-markets-mohamed-el-erian-awoke/", "description": "El-Erian weekly macro — LinkedIn version"}]};

// ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
