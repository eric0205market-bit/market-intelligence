    html += '<span class="urgency-icon">' + um.icon + '</span>';
    html += '<span class="source-badge" style="background:' + cm.color + '">' + cm.label + '</span>';
    html += '<span class="cat-tag">' + item.source.split('/')[0].trim() + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '</div>';

    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box ' + angleClass + '"><div class="angle-text">' + item.angle + '</div></div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';

    if (item.charts.count > 0) {
      var chartClass = item.charts.hot ? 'hot-chart' : '';
      html += '<div class="charts-row"><span class="' + chartClass + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</span></div>';
    }

    if (item.link) {
      html += '<a class="read-link" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    }

    html += '</div>';
    div.innerHTML = html;
    container.appendChild(div);

    if (activeSrc) {
      document.getElementById('body-' + item.id).classList.add('open');
    }
  });
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function initFilters() {
  // Header meta
  document.getElementById('header-meta').textContent =
    META.date + ' · ' + META.time + ' · Window: ' + META.windowStart + ' – ' + META.windowEnd + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';

  // Category filters
  var catBar = document.getElementById('cat-filter-bar');
  var catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });

  var allPill = document.createElement('span');
  allPill.className = 'pill pill-all active';
  allPill.textContent = 'All (' + ITEMS.length + ')';
  allPill.onclick = function() {
    activeCat = 'all'; activeSrc = null;
    document.querySelectorAll('#cat-filter-bar .pill').forEach(function(p) { p.classList.remove('active'); });
    allPill.classList.add('active');
    renderCards();
  };
  catBar.appendChild(allPill);

  Object.keys(catCounts).sort().forEach(function(cat) {
    var cm = CAT_META[cat] || { label: cat, color: "#888" };
    var pill = document.createElement('span');
    pill.className = 'pill';
    pill.textContent = cm.label + ' (' + catCounts[cat] + ')';
    pill.onclick = function() {
      activeCat = cat; activeSrc = null;
      document.querySelectorAll('#cat-filter-bar .pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      pill.style.background = cm.color;
      pill.style.borderColor = cm.color;
      pill.style.color = 'white';
      renderCards();
    };
    catBar.appendChild(pill);
  });

  // Urgency filters
  var urgBar = document.getElementById('urg-filter-bar');
  var urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });

  var urgAllPill = document.createElement('span');
  urgAllPill.className = 'pill pill-all active';
  urgAllPill.textContent = 'All';
  urgAllPill.onclick = function() {
    activeUrg = 'all'; activeSrc = null;
    document.querySelectorAll('#urg-filter-bar .pill').forEach(function(p) { p.classList.remove('active'); });
    urgAllPill.classList.add('active');
    renderCards();
  };
  urgBar.appendChild(urgAllPill);

  ['red', 'deep', 'watch'].forEach(function(urg) {
    if (!urgCounts[urg]) return;
    var um = URGENCY_META[urg];
    var pill = document.createElement('span');
    pill.className = 'pill';
    pill.textContent = um.icon + ' ' + um.label + ' (' + (urgCounts[urg] || 0) + ')';
    pill.onclick = function() {
      activeUrg = urg; activeSrc = null;
      document.querySelectorAll('#urg-filter-bar .pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      pill.style.background = '#1a1a1a';
      pill.style.borderColor = '#1a1a1a';
      pill.style.color = 'white';
      renderCards();
    };
    urgBar.appendChild(pill);
  });

  // Report card
  var rb = document.getElementById('report-body');
  var rcHTML = '<strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '<br>';
  rcHTML += '<strong>Emails in window:</strong> ' + META.emailsInWindow + ' | <strong>Read:</strong> ' + META.emailsRead + ' | <strong>Items extracted:</strong> ' + META.itemsExtracted + '<br><br>';
  rcHTML += '<strong>Sources included:</strong><br><div class="rc-row">';
  META.includedSources.filter(function(s) { return s.items > 0; }).forEach(function(s) {
    rcHTML += '<span><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> (' + s.items + ')</span>&nbsp; ';
  });
  rcHTML += '</div><br><strong>Skipped sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    rcHTML += '• <strong>' + s.name + '</strong>: ' + s.reason + '<br>';
  });
  rb.innerHTML = rcHTML;

  renderCards();
}

window.onload = initFilters;
</script>
</body>
</html>
