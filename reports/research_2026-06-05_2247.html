    id: 18, cat: "science", urgency: "deep",

    title: "Slowing aging by 1 year = $400B to US GDP; calorie restriction extended mouse lifespan 50-65%; no approved drug yet",
    idea: "Slowing human aging by a single year has been estimated to add ~$400B/year to US GDP. Animal evidence is strong: calorie restriction consistently extended lifespan in mice, with the strongest CR diet producing 50-65% longer lifespans vs controls. A single gene change, or rapamycin started late in life, can similarly extend lifespan. Several naked mole rat species barely age at all. In humans: statins and GLP-1s reduce overall mortality in some groups, but cutting deaths from one disease ≠ slowing aging. No drug has been approved to slow aging. Proving it requires a decade-plus trial, outlasting its own patent — so there's no financial incentive to run it.",
    angle: "The patent economics problem is the key barrier: a trial proving you slow aging would take 20+ years and outlast any patent. The financial model for aging drugs doesn't work under current IP law. This is why biomedical research stays concentrated in fast-moving areas (oncology, GLP-1s) and away from the most impactful long-term science. It's a market failure, not a scientific one.",
    tweetA: "Slowing aging by one year = $400B added to US GDP annually. Yet there's no approved drug to slow aging, and the trial to prove one works would take 20+ years — outlasting any patent. We've designed an IP system that makes the most valuable drug in human history financially impossible to develop. That's not a science problem. That's a policy failure.",
    tweetB: "GLP-1s lower overall mortality in specific patient groups. That's impressive. But cutting deaths from one disease is not the same as slowing aging itself. We need the distinction to invest clearly: GLP-1 companies are treating downstream manifestations; longevity companies attacking the mechanism are a completely different category. Both valuable — but not the same bet.",

    angle: "The analytical question — how much can rates drag equities down — is answered historically by looking at the equity risk premium vs bond yields. With 10yr at current levels, the ERP compression puts us in rare historical territory. The Capital Flows framing highlights that the answer depends entirely on whether the rate move is driven by growth (less damaging) or inflation (more damaging).",
    tweetA: "The right question for the weekend: how much can rates drag equities down? Two scenarios. Rates rise because growth is strong (earnings offset the multiple compression). Rates rise because inflation re-accelerates (earnings don't offset). Today's NFP muddles the two. The CPI print in 2 weeks will clarify which scenario we're actually in.",
    tweetB: "PURR on Hyperliquid flagged as highest conviction by Capital Flows despite pullback from highs. The framing: 'risk reward only improved.' This is the classic asymmetric setup language — more down in price, same fundamental thesis. Whether that's right or wrong depends entirely on whether the broader crypto market stabilizes here or continues its ZEC-driven liquidation.",
    charts: { count: 0, hot: false, desc: "" },
    link: "https://www.capitalflowsresearch.com"
  }
];

const META = {
  date: "2026-06-05",
  time: "22:47 CEST",
  windowStart: "2026-06-05 16:47 CEST",
  windowEnd: "2026-06-05 22:47 CEST",
  emailsInWindow: 19,
  emailsRead: 19,
  itemsExtracted: 30,
  includedSources: [
    { name: "Peter Boockvar / The Boock Report", items: 4 },
    { name: "Stephen Innes / The Dark Side of the Boom", items: 4 },
    { name: "Michael Parekh / AI Ramblings Daily", items: 4 },
    { name: "Transformer Weekly", items: 3 },
    { name: "Chamath Palihapitiya", items: 2 },
    { name: "Commodity Context", items: 2 },
    { name: "Capital Flows Research", items: 2 },
    { name: "This Week in AI", items: 1 },
    { name: "Blocmates", items: 1 },
    { name: "Young & Calculated / Quant Enthusiasts", items: 1 },
    { name: "Bespoke Investment Group", items: 1 },
    { name: "TheStreet Daily", items: 1 },
    { name: "McKinsey Global Institute", items: 1 },
    { name: "Robert Sinn / Goldfinger Capital", items: 1 },
    { name: "Haymaker / David Hay", items: 1 }
  ],
  skippedSources: [
    { name: "PEquity Research (Portfolio Update)", reason: "Paywalled after first sentence — no extractable content" },
    { name: "James Bulltard (6/25/26 Recap)", reason: "Paywalled after snippet — only confirmed SPY under 8 EMA, lower highs 4 sessions" }
  ]
};

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "AI/infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};

const URG_LABELS = {
  "act-now": "🔴 Act Now",
  "deep": "🔵 Deep",
  "watch": "🟡 Watch"
};

let activeCategory = "all";
let activeUrgency = "all";
let activeSource = null;

function init() {
  document.getElementById("meta-line").textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.includedSources.length + " sources · Window: " + META.windowStart + " → " + META.windowEnd;

  const cats = ["all", ...new Set(ITEMS.map(i => i.cat))];
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const cfr = document.getElementById("cat-filters");
  cfr.innerHTML = '<span class="filter-label">Category</span>';
  cats.forEach(c => {
    const p = document.createElement("span");
    p.className = "pill" + (c === "all" ? " active" : "");
    p.style.background = c === "all" ? "#555" : "";
    p.style.color = c === "all" ? "white" : "";
    p.style.borderColor = c === "all" ? "#555" : (CAT_COLORS[c] || "#ccc");
    p.textContent = c === "all" ? "All (" + ITEMS.length + ")" : c + " (" + (catCounts[c] || 0) + ")";
    p.onclick = function() { setCategory(c); };
    cfr.appendChild(p);
  });

  const urgs = ["all", "act-now", "deep", "watch"];
  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const ufr = document.getElementById("urg-filters");
  ufr.innerHTML = '<span class="filter-label">Urgency</span>';
  urgs.forEach(u => {
    const p = document.createElement("span");
    p.className = "pill" + (u === "all" ? " active" : "");
    p.style.background = u === "all" ? "#555" : "";
    p.style.color = u === "all" ? "white" : "";
    p.style.borderColor = u === "all" ? "#555" : "#ccc";
    p.textContent = u === "all" ? "All (" + ITEMS.length + ")" : URG_LABELS[u] + " (" + (urgCounts[u] || 0) + ")";
    p.onclick = function() { setUrgency(u); };
    ufr.appendChild(p);
  });

  const container = document.getElementById("cards-container");
  ITEMS.forEach(function(item) {
    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + item.id;
    card.dataset.cat = item.cat;
    card.dataset.urgency = item.urgency;
    card.dataset.source = item.source;

    const color = CAT_COLORS[item.cat] || "#888";
    const chartFlag = item.charts.count > 0 ? (item.charts.hot ? " 🔥" : " 📊") : "";

    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">#' + item.id + '</span>' +
        '<span class="urgency">' + (item.urgency === "act-now" ? "🔴" : item.urgency === "deep" ? "🔵" : "🟡") + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + item.cat + '</span>' +
        '<span class="cat-tag">' + item.source.split("/")[0].trim() + '</span>' +
        (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">THE IDEA</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">MY ANGLE</div>' +
        '<div class="angle-box" style="border-color:' + color + ';background:' + color + '18">' + item.angle + '</div>' +
        '<div class="section-label">TWEETS</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box a">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box b">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        (item.charts.count > 0 ? '<div class="charts-row"><strong>' + (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s):</strong> ' + item.charts.desc + '</div>' : '') +
        '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>' +
      '</div>';

    container.appendChild(card);
  });

  buildSessionReport();
}

function toggleCard(id) {
  const body = document.getElementById("body-" + id);
  body.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function setCategory(cat) {
  activeCategory = cat;
  activeSource = null;
  updateFilters();
  renderCards();
}

function setUrgency(urg) {
  activeUrgency = urg;
  activeSource = null;
  updateFilters();
  renderCards();
}

function filterBySrc(name) {
  activeSource = name;
  renderCards();
}

function updateFilters() {
  document.querySelectorAll("#cat-filters .pill").forEach(function(p) {
    const isAll = p.textContent.startsWith("All");
    const catName = isAll ? "all" : p.textContent.split(" (")[0];
    const active = catName === activeCategory;
    const color = CAT_COLORS[catName] || "#555";
    p.classList.toggle("active", active);
    if (active) {
      p.style.background = catName === "all" ? "#555" : color;
      p.style.color = "white";
    } else {
      p.style.background = "white";
      p.style.color = "#666";
    }
  });
  document.querySelectorAll("#urg-filters .pill").forEach(function(p) {
    const isAll = p.textContent.startsWith("All");
    const urgName = isAll ? "all" : Object.keys(URG_LABELS).find(k => p.textContent.startsWith(URG_LABELS[k].split(" ")[0] + " " + URG_LABELS[k].split(" ")[1])) || "all";
    const active = urgName === activeUrgency;
    p.classList.toggle("active", active);
    if (active) {
      p.style.background = "#555";
      p.style.color = "white";
    } else {
      p.style.background = "white";
      p.style.color = "#666";
    }
  });
}

function renderCards() {
  ITEMS.forEach(function(item) {
    const card = document.getElementById("card-" + item.id);
    const catMatch = activeCategory === "all" || item.cat === activeCategory;
    const urgMatch = activeUrgency === "all" || item.urgency === activeUrgency;
    const srcMatch = !activeSource || item.source.indexOf(activeSource) >= 0;
    if (catMatch && urgMatch && srcMatch) {
      card.classList.remove("hidden");
      if (activeSource) {
        document.getElementById("body-" + item.id).classList.add("open");
      }
    } else {
      card.classList.add("hidden");
      document.getElementById("body-" + item.id).classList.remove("open");
    }
  });
}

function buildSessionReport() {
  const body = document.getElementById("session-body");
  let html = '<table>';
  html += '<tr><td><strong>Window</strong></td><td>' + META.windowStart + ' → ' + META.windowEnd + '</td></tr>';
  html += '<tr><td><strong>Emails in window</strong></td><td>' + META.emailsInWindow + '</td></tr>';
  html += '<tr><td><strong>Emails read</strong></td><td>' + META.emailsRead + '</td></tr>';
  html += '<tr><td><strong>Items extracted</strong></td><td>' + META.itemsExtracted + '</td></tr>';
  html += '</table>';
  html += '<br><strong>Included Sources</strong><table>';
  META.includedSources.forEach(function(s) {
    html += '<tr><td><span class="src-link" onclick="filterBySrc(\'' + s.name.split("/")[0].trim() + '\')">' + s.name + '</span></td><td>' + s.items + ' item' + (s.items > 1 ? 's' : '') + '</td></tr>';
  });
  html += '</table>';
  html += '<br><strong>Skipped Sources</strong><table>';
  META.skippedSources.forEach(function(s) {
    html += '<tr><td>' + s.name + '</td><td style="color:#888">' + s.reason + '</td></tr>';
  });
  html += '</table>';
  body.innerHTML = html;
}

function toggleSession() {
  const body = document.getElementById("session-body");
  const arrow = document.getElementById("session-arrow");
  body.classList.toggle("open");
  arrow.textContent = body.classList.contains("open") ? "▲" : "▼";
}

init();
</script>
</body>
</html>
