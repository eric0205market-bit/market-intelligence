<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"date": "2026-05-27", "summary": "**Iran/Oman:** Trump publicly threatened to \"blow up\" Oman over Strait of Hormuz access, yet WTI fell below $90 — oil down on US-ceasefire dynamics despite escalatory rhetoric. zriboua thread argues Operation Epic Fury is far from over: sanctions enforcement and IRGC reconstitution blockage is the real war, with Saudi concessions and Arab normalization as the strategic prizes.\n\n**MSTR/BTC sell pressure:** TaikiMaeda2 lays out the math — mNAV breakeven to prefer dumping MSTR equity over BTC is 1.22x, with only 6 months of dividend coverage remaining (Saylor target: 18mo). TaikiMaeda2 fair value of BTC sale by Dec 31 >90%; long Polymarket yes from 75c. Evanss6 disagrees — \"not priced in\" for the sharp CT-native money.\n\n**Crypto AI leads all alts:** Delphi_Digital sector dashboard: GRASS +56.5%, NEAR +48.9%, WLD +45.2%, Umbra +43.7%, Peaq +29.6%. Strongest relative performer across all altcoin sectors this week.\n\n**Photonics/CPO selloff = entry:** aleabitoreddit adds aggressively on broad sector dip with no fundamental catalyst. CPO TAM rising from ~$0 to $81B over next 2 years per GS note. EU CHIPS Act 2 next week names $XFAB specifically; MSCI/Nasdaq rebalance inflow as additional near-term catalyst. SIVE -14.8%, AXTI -8.13%, IQE -12.13% on the day.\n\n**\"It's 1998\":** Evanss6 frames 2 more years of bull market with singularity + passive flows peak around 2028. Fullcarry adds context: current AI \"bubble\" NDX is only 18% above 200DMA vs dot-com's 57% at peak — nowhere near bubble territory by that measure.\n\n**Blockworks Transparency Alliance launched:** Crypto industry quasi-SEC unveils token disclosure standard. sjdedic, fejau_inc, santiagoroel, Matt_Hougan all supporting — broad industry signal toward self-regulation and legitimacy.", "stats": {"received": 224, "after_filter": 145, "authors": 53, "coverage": 0.79}, "events": [{"title": "Iran/Oman — Trump Threatens to 'Blow Up' Oman Over Hormuz", "category": "geopolitics", "description": "Trump publicly threatens Oman over Strait of Hormuz access — notably not Iran directly. WTI drops below $90 despite escalatory rhetoric, as markets read US ceasefire posture as supply-positive.", "items": [{"author": "JavierBlas", "tweet_url": "https://x.com/JavierBlas/status/2059696260655817009", "text": "Trump on the Strait of Hormuz, with a message to Oman — rather than Iran:\n\n\"… Oman will behave like everybody else or we'll have to blow them up. They understand that…\"", "images": [], "created_at": "2026-05-27T18:00:30.000Z"}, {"author": "elerianm", "tweet_url": "https://x.com/elerianm/status/2059730929472417934", "text": "Another day of notably lower oil prices, with WTI now trading below $90 a barrel. This has contributed to lower government bond yields in advanced economies, which, in turn, helped push several equity indices to new record highs.\n\nInterestingly, the reaction in both bond and stock markets was less pronounced today than in previous sessions of oil price declines. It comes ahead of tomorrow's heavy US data releases that will shed light on both growth and inflation.", "images": ["https://pbs.twimg.com/media/HJWiXS2XcAURpIs.jpg", "https://pbs.twimg.com/media/HJWiXSlWUAARWwG.jpg"], "created_at": "2026-05-27T20:18:16.000Z"}]}, {"title": "Operation Epic Fury — Economic Campaign Continues Post-Ceasefire", "category": "geopolitics", "description": "zriboua thread: the military phase may be paused but the economic war on Iran is active and escalating. Saudi concessions, US-China Middle East competition, and IRGC reconstitution blockage are the real story.", "items": [{"author": "zriboua", "tweet_url": "https://x.com/zriboua/status/2059714816118305027", "text": "Trump's statements today on Saudi Arabia deserve more attention than they are getting. Operation Epic Fury has two dimensions, one military and the other economic. Now that a ceasefire is in place, the economic campaign continues, and it's a very important one.\n\nDestroying missile stockpiles produces battlefield results, but ensuring the IRGC cannot reconstitute those stockpiles requires sustained economic pressure. The sanctions architecture matters enormously here.", "images": [], "created_at": "2026-05-27T19:14:14.000Z"}, {"author": "zriboua", "tweet_url": "https://x.com/zriboua/status/2059694612592107854", "text": "The most consequential theater of US-China competition today runs through the Middle East. Iran has been central to China's strategic position on multiple levels, and the idea that Washington could ever confront Beijing while Iranian proxies held the region hostage was always a fiction. Trump is not a \"grand strategist\", but his policy carries more coherence than most want to admit.", "images": [], "created_at": "2026-05-27T17:53:57.000Z"}, {"author": "zriboua", "tweet_url": "https://x.com/zriboua/status/2059701333197041750", "text": "Several Arab governments signaled their willingness to normalize relations with Israel and move closer to Washington. What held them back was not a lack of political inclination. The obstacle came from the shadow cast by Iran's network of armed proxies including Hezbollah in Lebanon and the Houthis in Yemen. That network made visible alignment with Israel a potentially dangerous gamble.", "images": [], "created_at": "2026-05-27T18:20:39.000Z"}]}, {"title": "MSTR / Saylor — BTC Sell Pressure Framework", "category": "crypto", "description": "TaikiMaeda2 builds out the mNAV math: breakeven to prefer dumping MSTR equity over BTC is ~1.22x. With only 6 months of dividend coverage vs Saylor's 18-month target, a BTC sale is highly probable. Crypto_McKenna adds STRC financial engineering context.", "items": [{"author": "TaikiMaeda2", "tweet_url": "https://x.com/TaikiMaeda2/status/2059718102548353401", "text": "$MSTR's mNAV breakeven to dump MSTR over BTC is ~1.22x.\n\nWith only 6 mo of div coverage left (Saylor said he wants this to be over 18mo), Saylor is very likely to sell BTC over MSTR for cash pretty soon (if he hasn't already).\n\nGiven BTC is down ~10%, this may be priced in.\n\nI also think from a game theoretical POV, Saylor likely wants to sell BTC even if mNAV is >1.22 to rip the band-aid off and say he did it.\n\nI think the \"fair value\" of MSTR selling BTC before EOY is over 90%, so I am long the December 31 \"Yes\" option on Polymarket from 75c.", "images": ["https://pbs.twimg.com/media/HJWWsrlXgAAxUCr.jpg", "https://pbs.twimg.com/media/HJWWtCnXEAMHbeG.jpg"], "created_at": "2026-05-27T19:27:18.000Z", "is_thread": true}, {"author": "Crypto_McKenna", "tweet_url": "https://x.com/Crypto_McKenna/status/2059625511224242319", "text": "I believe there is a good probability that MicroStrategy will end up selling some Bitcoin this year to meet dividend obligations.\n\nSTRC is a novel product that basically allowed MicroStrategy to move from a traditional digital asset treasury company to incorporate some elements of active management.\n\nDespite the ponzi claims, STRC is actually some interesting financial engineering and allows MicroStrategy to incorporate managed leveraged exposure using its balance sheet.", "images": [], "created_at": "2026-05-27T13:19:22.000Z"}]}, {"title": "Blockworks Transparency Alliance — Token Disclosure Standard Launch", "category": "regulation", "description": "Blockworks launches the Transparency Alliance — a crypto industry quasi-regulatory framework for token transparency and value accrual disclosure. Broadly supported across the alpha community as a signal of industry maturation.", "items": [{"author": "sjdedic", "tweet_url": "https://x.com/sjdedic/status/2059646668748857473", "text": "Incredibly excited to finally see the Transparency Alliance being revealed, and even more proud to see @MoonrockCapital alongside such strong industry players.\n\n@JasonYanowitz and @MikeIppolito_ are among the very few people genuinely trying to fix this industry and make the pie grow again.\n\nOne of crypto's biggest structural problems has undoubtedly been broken trust, combined with a lack of communication and transparency around token value accrual while regulatory clarity remains absent.", "images": [], "created_at": "2026-05-27T14:43:26.000Z", "is_thread": true}, {"author": "santiagoroel", "tweet_url": "https://x.com/santiagoroel/status/2059644063289053554", "text": "For crypto to grow we need more transparency. Biggest step forward for the industry in a long time.\n\nGreat work @Blockworks", "images": [], "created_at": "2026-05-27T14:33:05.000Z"}, {"author": "fejau_inc", "tweet_url": "https://x.com/fejau_inc/status/2059644051205550463", "text": "Excited to finally announce this!", "images": [], "created_at": "2026-05-27T14:33:02.000Z"}, {"author": "Matt_Hougan", "tweet_url": "https://x.com/Matt_Hougan/status/2059643020371525920", "text": "Love to see @Blockworks pushing the industry forward.", "images": [], "created_at": "2026-05-27T14:28:57.000Z"}]}, {"title": "$840M DeFi Hack — Security Model Debate", "category": "crypto", "description": "Following a $840M DeFi exploit, Unchained podcast covers Litecoin's dual bug chain (Mimblewimble + DDOS), private stablecoin demand, and the broader question of whether DeFi's security model is structurally broken.", "items": [{"author": "kaiynne", "tweet_url": "https://x.com/kaiynne/status/2059724341366145107", "text": "$840M Hacked: Has DeFi's Security Model Broken Down?", "images": [], "created_at": "2026-05-27T19:52:05.000Z"}, {"author": "laurashin", "tweet_url": "https://x.com/laurashin/status/2059736805470077205", "text": "Illia on the Litecoin vulnerabilities:\n\n\"The old version had the Mimbewimble bug, the new version had a DDOS bug, so attacker withdrew money from Mimblewimble, DDOSed the rest of the network so only old nodes were staying and producing blocks and then started withdrawing the money from exchanges.\"", "images": [], "created_at": "2026-05-27T20:41:37.000Z"}, {"author": "laurashin", "tweet_url": "https://x.com/laurashin/status/2059731552574001236", "text": "\"It seems really obvious to me that we need private stablecoins.\" — Kain\n\n\"Everything is private. We have 150+ assets, all of them can be private. There's a few million USDC, 8 million NEAR, a couple million ZEC.\" — Illia", "images": [], "created_at": "2026-05-27T20:20:44.000Z"}, {"author": "Fiskantes", "tweet_url": "https://x.com/Fiskantes/status/2059599886484480258", "text": "SecureFi\n\nWho is building this", "images": [], "created_at": "2026-05-27T11:37:33.000Z"}]}, {"title": "Cognition / Devin — $1B Raise at $26B, $492M ARR", "category": "AI", "description": "Cognition Labs (Devin AI code agent) closes $1B round at $26B valuation with reported $492M ARR — seen as the highest-velocity ARR growth in AI software history.", "items": [{"author": "patrick_oshag", "tweet_url": "https://x.com/patrick_oshag/status/2059699571564147049", "text": ".@ScottWu46 and team saw where the puck was and is going, and built for the right future.\n\nSome of my favorite meetings in the past two years have been sitting with Scott, Russell and others at Cognition to hear about the future.\n\nCrazy recent growth. Congrats to them all!", "images": [], "created_at": "2026-05-27T18:13:39.000Z"}]}, {"title": "Coinbase Direct Deposit + Base MCP Agent Wallet", "category": "crypto", "description": "Coinbase launches direct paycheck deposit with auto-invest/lending/card cashback. Separately, Base MCP gives AI agents native onchain wallets — two major product releases in one day from armstrong.", "items": [{"author": "brian_armstrong", "tweet_url": "https://x.com/brian_armstrong/status/2059678862775071066", "text": "You got it. Direct deposit is live on Coinbase.\n\nRoute your paycheck (or some part of it) directly to Coinbase to auto-invest it, lend it out, or spend with the Coinbase One Card to earn up to 4% on every purchase.\n\nTry it out: tap \"Deposit\" -> \"Direct Deposit\" from the Home screen on mobile.", "images": ["https://pbs.twimg.com/media/HJVy4rwXsAELK4s.jpg"], "created_at": "2026-05-27T16:51:22.000Z"}, {"author": "brian_armstrong", "tweet_url": "https://x.com/brian_armstrong/status/2059741103998243133", "text": "Your agent now has a wallet, with Base MCP.\n\nLink to get started: https://base.org/agents", "images": [], "created_at": "2026-05-27T20:58:41.000Z", "is_thread": true}]}, {"title": "Photonics Selloff — CPO Sector Weakness on No News", "category": "tech", "description": "Broad CPO/photonics selloff with no fundamental catalyst: SIVE -14.8%, IQE -12.13%, AXTI -8.13%, LITE -4.95%. aleabitoreddit frames as CPO TAM inflection ($0→$81B in 2yr per GS) approaching while sector gets cheaper. EU CHIPS Act 2 + MSCI/Nasdaq rebalance as near-term catalysts.", "items": [{"author": "aleabitoreddit", "tweet_url": "https://x.com/aleabitoreddit/status/2059634164912226613", "text": "Interesting photonics selloff today on no news?\n\n$LITE down -4.95%\n$AAOI down -4.85%\n$SIVE down -14.8%\n$SOI down -5.73%\n$AXTI down -8.13%\n$IQE down -12.13%\n\nI think it's probably the most compelling theme going forward (even more than power semis). Just tends to be very volatile on the way up.\n\nYou're basically going from ~$0 to $81B CPO TAM next 2 years (GS note) and 10x-ing the overall TAM to ~$141B.", "images": ["https://pbs.twimg.com/media/HJVKWoxbQAACsb1.jpg", "https://pbs.twimg.com/media/HJVKWo3agAAooQy.jpg"], "created_at": "2026-05-27T13:53:45.000Z", "is_thread": true}, {"author": "aleabitoreddit", "tweet_url": "https://x.com/aleabitoreddit/status/2059674880761860125", "text": "Bro media… how is $XFAB a meme stock?\n\nCan you not repeat the same mistake with $RPI this time?\n\nThey're literally getting CHIPS ACT funding from the EU because of how critical they are. And have $NVDA / $NOK evaluating their SiPH side of things, while they traded at a low ~1.28 P/B.\n\n$XFAB was literally mentioned for CHIPS ACT 2 next week in the blueprints… Which focuses around photonics. The main semiconductor sovereignty play here.", "images": ["https://pbs.twimg.com/media/HJVvYoAbwAAClXM.jpg", "https://pbs.twimg.com/media/HJVvYn-bIAAU2Ax.jpg"], "created_at": "2026-05-27T16:35:33.000Z", "is_thread": true}]}, {"title": "OpenAI Foundation — $250M Commitment to Broad Prosperity", "category": "AI", "description": "Sam Altman announces the OpenAI Foundation with an initial $250M commitment focused on measurement, transition support, and broadly shared prosperity as AI capabilities scale.", "items": [{"author": "sama", "tweet_url": "https://x.com/sama/status/2059677202917331431", "text": "AI should dramatically increase quality of life and individual freedoms for people around the world.\n\nThe OpenAI Foundation is making an initial $250M commitment to measurement, transition support, and new approaches to broadly shared prosperity.", "images": [], "created_at": "2026-05-27T16:44:46.000Z"}]}, {"title": "nic_carter vs Greg Ip — Stablecoin / Free Banking Debate", "category": "regulation", "description": "nic_carter fires a full rebuttal thread at WSJ's Greg Ip, defending the stablecoin-as-free-banking analogy using Canadian and Scottish banking history. Accuses critics of recycling the Gorton-Zhang 2021 NQA paper through a pro-central-bank lens.", "items": [{"author": "nic_carter", "tweet_url": "https://x.com/nic_carter/status/2059679675937440213", "text": "Yes, much to my chagrin, I read it in full. I am not an imbecile. Did you read my pre-emptive rebuttal that covers the actual history of Canadian (and Scottish) free banking and how it relates to stablecoins rather than the sanitized, pro central bank narrative you have cooked up?\n\nYour criticisms of stablecoins are not new. You're recycling Gorton and Zhang's 2021 paper on stablecoins and NQA which has been taken up variously by Brainard, Krugman, and Warren to undermine the sector.", "images": [], "created_at": "2026-05-27T16:54:36.000Z", "is_thread": true}, {"author": "nic_carter", "tweet_url": "https://x.com/nic_carter/status/2059678481449976123", "text": "@greg_ip this is false. It was less heavily regulated than the US. The burdensome regulation in the US is what caused antebellum \"free\" banking in the US to fail.\n\nDoes a nationwide prohibition on branching constitute more or less regulation?", "images": [], "created_at": "2026-05-27T16:49:51.000Z", "is_thread": true}]}], "insights": [{"author": "Evan_ss6", "tweet_url": "https://x.com/Evan_ss6/status/2059744491834069499", "text": "It's 1998.\n\nA full 2 years before you should be thinking about taking profit.\n\nMy quant said singularity + passive flows bubble (peak around 2028). Confirmed independently.\n\nPeople should not rule out NASDAQ tripling with BTC down.\n\nThe HYPE/BTC pair has outperformed YTD.", "images": ["https://pbs.twimg.com/media/HJWuszlXAAIG1T2.jpg"], "created_at": "2026-05-27T21:12:09.000Z", "is_thread": true, "category": "macro"}, {"author": "Fullcarry", "tweet_url": "https://x.com/Fullcarry/status/2059700942547591363", "text": "NDX made a .com bubble high of 57% above its 200DMA.\n\nCurrent AI \"bubble\" NDX is only 18% above its 200DMA.\n\nNon-tech stocks didn't participate in the final parabolic .com move — Phillip Morris was yielding ~7% and in the doldrums. That dynamic allows for rotation into other sectors and a much longer runway.", "images": ["https://pbs.twimg.com/media/HJWGtCUXkAE55xN.jpg", "https://pbs.twimg.com/media/HJWPw7qWgAQHLF-.jpg"], "created_at": "2026-05-27T18:19:06.000Z", "is_thread": true, "category": "macro"}, {"author": "Evan_ss6", "tweet_url": "https://x.com/Evan_ss6/status/2059697069435105691", "text": "Matt Hougan (@Matt_Hougan) streamed with James Seyffart (@JSeyff) talking about Hyperliquid ETFs and client demand.\n\nKey highlights:\n- Easy to understand for all investors; direct value accrual via continuous buybacks\n- Very high TAM; early virality with oil/metals/IPOs trading on weekends\n- \"99% of investors have 0% HYPE\" — market cap-adjusted, most successful ETF launches in crypto\n- Trillions in cryptoassets, HYPE is one of 5-6 entities with a real chance to be a finance superapp", "images": [], "created_at": "2026-05-27T18:03:43.000Z", "is_thread": true, "category": "crypto"}, {"author": "Crypto_McKenna", "tweet_url": "https://x.com/Crypto_McKenna/status/2059701658679152698", "text": "The Synthetic equity model is proliferating because it's easy to offer an instrument that just represents synthetic price exposure. In terms of the growth of tokenized equities at this moment in time synthetics are dominating.\n\nBut you do not win tokenization without ensuring that tokenized securities represent all the affordable rights such as dividends, voting and a direct legal claim to the security.\n\nThe custodial model will be order of magnitudes larger than synthetic equities and the total addressable tokenization opportunity.", "images": [], "created_at": "2026-05-27T18:21:57.000Z", "category": "crypto"}, {"author": "0xSammy", "tweet_url": "https://x.com/0xSammy/status/2059665712147226996", "text": "DEUS is live on Aerodrome and @virtuals_io\n\nPretty interesting watching the PA: if you take only the robotics equities and cash then DEUS is trading at 5x NAV (50m/10m equity & cash treasury).\n\nBut when you factor in the DEUS token holdings at $0.05, the implied NAV multiple becomes ~2x.\n\nUsing the treasury share method (strip out the 300m DEUS tokens held in treasury as unrealizable), the true NAV multiple is close to BOT's multiple — not far off on liquid float.", "images": ["https://pbs.twimg.com/media/HJVuy5AXgAEVzKl.jpg"], "created_at": "2026-05-27T15:59:07.000Z", "is_thread": true, "category": "crypto"}, {"author": "Pentosh1", "tweet_url": "https://x.com/Pentosh1/status/2059691332789018960", "text": "The SPR can't actually become empty.\n\nThe operational floor is around 250mb because the oil is in salt caverns built 50-60 years ago. The caverns were designed for only ~5 large drawdowns in their lifetime — each drawdown deforms them. 300mb creates operational stress. Legal limit is 150mb.\n\nReal release timeline is more like 7-10 weeks for a large drawdown.", "images": [], "created_at": "2026-05-27T17:40:55.000Z", "is_thread": true, "category": "energy"}, {"author": "VitalikButerin", "tweet_url": "https://x.com/VitalikButerin/status/2059739380785271033", "text": "Updates on self-sovereign LLM:\n\n* Deepseek v4 has a 2-bit quant that runs within 90 GB, working at ~35 tok/s on Apple hardware. On AMD, only ~7 tok/s.\n* IMO actually taking the effort to properly support more than one hardware manufacturer is a great example of the difference between mere \"decentralized AI\" and genuine \"CROPS AI\".\n* CROPS + Ethereum intersection via ZK calls is the next frontier.", "images": [], "created_at": "2026-05-27T20:51:51.000Z", "category": "AI"}, {"author": "VitalikButerin", "tweet_url": "https://x.com/VitalikButerin/status/2059622765364207619", "text": "In an ideal world all software and hardware would have \"nutrition labels\" that provide a full list of trust dependencies — what math and which actors' honest behavior (and on what time scale) the system is relying on to provide its core functionality and implied guarantees.", "images": [], "created_at": "2026-05-27T13:08:27.000Z", "category": "tech"}, {"author": "PeterDiamandis", "tweet_url": "https://x.com/PeterDiamandis/status/2059680448607838346", "text": "Two people with Claude can replicate a Fortune 500 business line in 60-90 days. 80% of enterprise AI projects are failing because companies are automating hierarchy rather than replacing it.\n\nSalim Ismail calls it the Organizational Singularity: middle management's coordination role drops ~90%. A company of 800 can run with 80.\n\nCognition Labs went from $0 to $492M ARR. Sheikh Mohammed wants 50% of UAE government services run by AI.", "images": [], "created_at": "2026-05-27T16:57:40.000Z", "is_thread": true, "category": "AI"}, {"author": "hooeem", "tweet_url": "https://x.com/hooeem/status/2059660301016891684", "text": "There's the version of you that exists before reading this article and the version after:\n\nFrom: writing one good prompt → To: building a repeatable AI system.\nFrom: asking \"what's the best prompt?\" → To: asking \"what system makes this reliable every time?\"\nFrom: hoping the model understands you → To: giving it the exact context it needs.\nFrom: vague instructions → To: clear goals, constraints and success criteria.\nFrom: \"act as an expert\" → To: defined roles, standards and decision rights.", "images": [], "created_at": "2026-05-27T15:37:37.000Z", "is_thread": true, "category": "AI"}, {"author": "laurashin", "tweet_url": "https://x.com/laurashin/status/2059746933082923055", "text": "Illia on how the Transformer was invented at Google and the moment that changed AI forever:\n\n\"My manager pitched the idea over lunch. I said that's interesting, I'm sure it doesn't work. So I went and implemented it. There was a glimmer.\"\n\n\"Before Transformers, recurrent neural networks were the state of the art. The Transformer gave a 10,000-100,000x speedup. We went from nowhere to state-of-the-art in 6-7 months with 8 people.\"\n\n\"How is it that I've known you for five years and you haven't mentioned this 250 times?!\" — Kain, on learning Illia co-authored 'Attention Is All You Need'", "images": [], "created_at": "2026-05-27T21:21:51.000Z", "is_thread": true, "category": "AI"}, {"author": "0xngmi", "tweet_url": "https://x.com/0xngmi/status/2059621758177583475", "text": "DefiLlama removes doublecounting from restaking. EigenLayer's 6.4bn TVL is real:\n\n- 5.3bn ETH in staking nodes with EigenLayer withdrawal address\n- 900m stETH held in EigenLayer contracts (NOT doublecounted — Lido TVL is not added to Ethereum DeFi TVL)\n- 200m ETHx (same methodology)\n\nThat alone is 6.4bn in restaked ETH. No doublecounting.", "images": [], "created_at": "2026-05-27T13:04:27.000Z", "is_thread": true, "category": "crypto"}, {"author": "stacy_muur", "tweet_url": "https://x.com/stacy_muur/status/2059723075109917161", "text": "I genuinely feel like Darkloom should get 10x more attention than it has now.\n\nThe thesis: AI inference needs compute, and most of that compute still comes from centralized cloud infra. Why not use millions of idle Apple Silicon Macs as part of a private AI inference network?\n\nM4 MacBook Pro, 48GB memory, Gemma 4 26B-A4B, 16 inference hours per day — provider calculator estimates ~$253/month net. 250 providers, 600M tokens processed. This could be a major compute supply layer for private inference.", "images": ["https://pbs.twimg.com/media/HJWbOMtbsAANjhn.png"], "created_at": "2026-05-27T19:47:03.000Z", "category": "AI"}, {"author": "Delphi_Digital", "tweet_url": "https://x.com/Delphi_Digital/status/2059649845108015568", "text": "Crypto AI continues to lead altcoins this week on our sector dashboard.\n\nTop performers:\n• Grass (+56.54%)\n• Near (+48.94%)\n• WLD (+45.23%)\n• Umbra (+43.72%)\n• Peaq (+29.63%)", "images": ["https://pbs.twimg.com/media/HJVYnnGaUAEnXKB.jpg"], "created_at": "2026-05-27T14:56:04.000Z", "is_thread": true, "category": "crypto"}, {"author": "aleabitoreddit", "tweet_url": "https://x.com/aleabitoreddit/status/2059646212803051722", "text": "Back when $AAOI was ~$20-30 when I went long: everyone on X was saying \"scam management.\" $AXTI at $12: \"scam company.\" FUD was extreme.\n\nGlad my thesis on $LITE, $AAOI, Innolight, $COHR, $AXTI played out so well.\n\nFeels like deja vu again — going long on the next CPO architecture wave. I actually got every single prediction right: InP substrate bottleneck, laser bottleneck, markets rewarding $AAOI with laser fabs. Did take markets 6 months to price it.", "images": ["https://pbs.twimg.com/media/HJVVT91aoAEtozd.jpg", "https://pbs.twimg.com/media/HJVVT9xb0AA4wtg.jpg", "https://pbs.twimg.com/media/HJVW-L-aMAAuW4v.jpg", "https://pbs.twimg.com/media/HJVaf3naMAEKN8J.jpg"], "created_at": "2026-05-27T14:41:38.000Z", "is_thread": true, "category": "tech"}], "contrarian": [{"author": "Evan_ss6", "tweet_url": "https://x.com/Evan_ss6/status/2059744491834069499", "text": "People should not rule out NASDAQ tripling with BTC down.\n\nThe consensus is that any macro bull run lifts crypto disproportionately. The 1998 analog argues otherwise — the final parabolic move in equities may be led entirely by tech/AI stocks, leaving BTC behind if it's perceived as risk-off by that point.", "images": [], "created_at": "2026-05-27T21:12:09.000Z", "category": "macro"}, {"author": "zriboua", "tweet_url": "https://x.com/zriboua/status/2059692553281106108", "text": "U.S. didn't lose the Iran war, the war is ongoing. IRGC is struggling to recruit, there is no JCPOA, and the whole military arsenal that Iran built thanks to China has been dismantled, so no, there is no \"losing.\"\n\nContrarian to the prevailing narrative of US strategic retreat from the Middle East.", "images": [], "created_at": "2026-05-27T17:45:46.000Z", "category": "geopolitics"}, {"author": "TaikiMaeda2", "tweet_url": "https://x.com/TaikiMaeda2/status/2059718102548353401", "text": "Given BTC is down ~10%, this [MSTR BTC sell] may be priced in.\n\nSharp CT-native money is already positioned. MSTR common holders and BTC rock heads are NOT aware. The distribution of awareness matters for actual price impact — contrarian to reflexive panic selling.", "images": [], "created_at": "2026-05-27T19:27:18.000Z", "category": "crypto"}, {"author": "nic_carter", "tweet_url": "https://x.com/nic_carter/status/2059618074702082499", "text": "I can't help but wonder how exactly our European allies are our \"allies\".\n\nThey suck up to China. They criminally repress speech about the harm of third world migration. They refuse to assist our military despite signing up to do that. They publicly deride and mock us. They fine our tech companies while producing nothing of their own.\n\nIn what respect is this the behavior of an ally?", "images": [], "created_at": "2026-05-27T12:49:49.000Z", "category": "geopolitics"}, {"author": "Crypto_McKenna", "tweet_url": "https://x.com/Crypto_McKenna/status/2059625511224242319", "text": "Despite the ponzi claims, STRC is actually some interesting financial engineering. The perception impact of MicroStrategy selling BTC will be much worse than the actual market impact — and that asymmetry is the real trade.", "images": [], "created_at": "2026-05-27T13:19:22.000Z", "category": "crypto"}], "positioning": [{"author": "TaikiMaeda2", "tweet_url": "https://x.com/TaikiMaeda2/status/2059718102548353401", "text": "Fair value of MSTR selling BTC before EOY is over 90% — long the December 31 \"Yes\" option on Polymarket from 75c.\n\nStill very long BTC, ZEC, HYPE. Closed perp longs 2 weeks ago and raised some cash. Most people are better off building medium/longer term conviction bets rather than trading the MSTR noise.", "images": [], "created_at": "2026-05-27T19:27:18.000Z", "is_thread": true, "category": "crypto"}, {"author": "SmallCapScience", "tweet_url": "https://x.com/SmallCapScience/status/2059713101549683199", "text": "We timed this rotation out of Oil nearly perfectly before the wheels fell off.\n\nWatching $CL chart closely and will probably look to enter some producers around $82.\n\nThe majority of these O&G companies will have record profits in Q2 and are being sold off entirely too hard.", "images": [], "created_at": "2026-05-27T19:07:25.000Z", "category": "energy"}, {"author": "SmallCapScience", "tweet_url": "https://x.com/SmallCapScience/status/2059711366714274170", "text": "$SG — SweetGreen 2W Chart\n\nGained nearly 20% since last week. This one should continue to send on higher time frames.\n\nPullbacks will be for buying.", "images": ["https://pbs.twimg.com/media/HJWQkr-XUAg7EcR.jpg"], "created_at": "2026-05-27T19:00:32.000Z", "category": "positioning"}, {"author": "SmallCapScience", "tweet_url": "https://x.com/SmallCapScience/status/2059710692890906783", "text": "$HYLN — This Hyl 26-05-27T12:54:59.000Z", "category": "macro"}, {"author": "spotgamma", "tweet_url": "https://x.com/spotgamma/status/2059671397744480355", "text": "SAME REACTION AGAIN WHEN SPX >7,500 — SHORT THOSE DELTAS.\n\n30k lot MM calls + ~$8bn negative delta pressure each time SPX tests 7500. Market makers forced to hedge short on each breach. $IREN has support at $60 through Friday (negative gamma pocket).", "images": ["https://pbs.twimg.com/media/HJVsAgsWAAMLSq6.jpg", "https://pbs.twimg.com/media/HJV0S7cWwAMuwXX.jpg"], "created_at": "2026-05-27T16:21:42.000Z", "category": "macro"}, {"author": "Evan_ss6", "tweet_url": "https://x.com/Evan_ss6/status/2059697069435105691", "text": "HYPE/BTC pair has outperformed YTD. If you want crypto beta with less macro tail risk, shorting BTC vs HYPE is a cleaner expression than being outright short BTC in the 1998 analog scenario.", "images": [], "created_at": "2026-05-27T18:03:43.000Z", "is_thread": true, "category": "crypto"}], "links": [{"author": "zriboua", "url": "https://www.zinebriboua.com/p/irans-economy-is-collapsing", "description": "Iran's economy is collapsing"}, {"author": "zriboua", "url": "https://www.zinebriboua.com/p/trumps-iran-card", "description": "Trump's Iran card"}, {"author": "zriboua", "url": "https://www.zinebriboua.com/p/trumps-middle-east", "description": "Trump's Middle East strategy"}, {"author": "BobEUnlimited", "url": "https://www.bloomberg.com/opinion/articles/2026-05-26/hedge-funds-are-losing-their-edge-in-a-world-of-etfs", "description": "Hedge funds losing edge to ETFs (Bloomberg Opinion)"}, {"author": "lopp", "url": "https://blog.casa.io/evolving-casas-defenses-against-social-engineering/", "description": "Evolving Casa's defenses against social engineering attacks"}, {"author": "TaikiMaeda2", "url": "https://www.youtube.com/watch?v=chp-9I6Wros&t=1867s", "description": "Phong Le on MSTR mNAV 1.22x threshold (video)"}, {"author": "nic_carter", "url": "https://murmurationstwo.substack.com/p/the-last-word-on-stablecoins-and", "description": "The last word on stablecoins and free banking (pre-emptive rebuttal)"}, {"author": "Delphi_Digital", "url": "https://members.delphidigital.io/data/apps/sector-performance", "description": "Crypto sector performance dashboard (free)"}, {"author": "sama", "url": "https://openai.com/blog/openai-foundation", "description": "OpenAI Foundation — $250M commitment to broad prosperity"}, {"author": "hooeem", "url": "https://t.co/Su3bvcwArb", "description": "From prompts to systems: the AI engineering manifesto"}]};

// ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
