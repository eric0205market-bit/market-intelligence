hardened right-wing authoritarian sentiment in the US.", "angle": "Whether or not the analogy holds militarily (Smith says it won't turn into an actual civil war), the framework is a useful lens for why 'big, bold' US policy (FDR/Reagan scale) looks structurally foreclosed for years, while narrow bipartisan wins (like the housing bill above) remain the only viable channel.", "tweetA": "Noah Smith's read on 2026 US politics: three factions, none with a workable governing program, each held together mostly by fear of the other two. That's not a hot take, that's a description of Spain in 1936 before the shooting started — he's explicit the US won't get the shooting part, but the paralysis part is already here.", "tweetB": "The actual investable takeaway buried in a political-economy essay: 'Secret Congress' — quiet, low-profile bipartisan bills — is now the ONLY mechanism left for policy to move. Anything visible enough to become a culture-war flashpoint is dead on arrival. Screen for legislation flying under the radar, not headline fights.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://open.substack.com/pub/noahpinion/p/americas-political-economy-is-pretty"}, {"id": 15, "cat": "macro", "urgency": "deep", "source": "Barry C. Knapp / Ironsides Macroeconomics", "title": "Warsh's 'Non-Exclusive List': Balance-Sheet Tools, Not Rate Cuts, Are the Real September Lever", "idea": "Knapp argues the Fed is over-relying on chain-weighted PCE (PCED) inflation data distorted by technology and seasonal-adjustment quirks, while CPI/PPI show broad disinflation. He frames Kevin Warsh's 'non-exclusive list' as favoring balance-sheet tools — ending reserve-management purchases, shortening SOMA duration — over a surprise rate move to address AI-driven capital demand, with September flagged as the likely inflection for policy rebalancing.", "angle": "If the Fed's actual lever in September is balance-sheet mechanics rather than the fed funds rate, the market narrative fixated on 'will they cut' may be watching the wrong dial entirely — worth tracking SOMA duration and reserve-purchase pace, not just the dot plot.", "tweetA": "The framing everyone's missing: the Fed's September move might not be a rate cut or hike at all. It's balance-sheet mechanics — ending reserve-management purchases, shortening SOMA duration — aimed specifically at AI-driven capital demand. Nobody's pricing balance-sheet policy risk into rate-sensitive trades.", "tweetB": "CPI says disinflation. The Fed's preferred gauge, PCED, says something messier because of tech and seasonal-adjustment noise. When the data series the Fed actually targets is the one with the dirtier read, that's not a policy debate, that's a measurement problem driving policy.", "charts": {"count": 0, "hot": false, "desc": "Paywalled — chartbook referenced but not visible in preview"}, "link": "https://open.substack.com/pub/ironsidesmacro/p/the-non-exclusive-list"}, {"id": 16, "cat": "energy", "urgency": "deep", "source": "Doomberg", "title": "Hydrocarbons Still 86.24% of Global Primary Energy — Down From 86.65%", "idea": "The Energy Institute's 2026 Statistical Review shows hydrocarbons provided 86.24% of global primary energy in 2025, barely down from 86.65% the year before, even as every major hydrocarbon set a fresh consumption record. Renewables captured 'a third of global energy growth' in 2025 — technically true, but total primary energy only grew ~1%, so a third of that is a rounding error.", "angle": "The 'a third of growth' framing is a share-of-a-tiny-denominator trick that reads as a big transition headline but nets out to almost nothing in absolute terms — a good gut-check anytime an ESG or transition narrative cites a growth-share stat instead of an absolute one.", "tweetA": "Hydrocarbons: 86.24% of global primary energy in 2025. A year earlier: 86.65%. That's the entire global energy transition in one number — 41 basis points in twelve months, after a decade of trillion-dollar headlines. Do the math before you buy the narrative.", "tweetB": "'Renewables captured a third of global energy growth' sounds like a big transition story until you check that total energy demand only grew ~1% that year. A third of almost nothing is still almost nothing. Always ask growth-share stats what the denominator actually was.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening (Doomberg typically includes a hydrocarbon-share time series)"}, "link": "https://open.substack.com/pub/doomberg/p/land-of-the-waning-sun"}, {"id": 17, "cat": "geopolitics", "urgency": "watch", "source": "Doomberg", "title": "China: 56% of World Coal Consumption, 31% of Carbon Emissions vs. US 5%/13%", "idea": "Doomberg flags that China accounts for 56% of global coal consumption and 31% of all carbon emissions, versus the US at 5% and 13% respectively — while the same Energy Institute report frames China as 'deploying renewables at unprecedented scale' and notes the increase in US emissions was '4x greater' than China's, despite China's vastly larger absolute footprint.", "angle": "The emissions-growth framing (US grew 4x more than China) obscures the absolute base — China's coal and carbon share dwarfs the US on any denominator that matters for actual climate math, which matters for how you read any China-decarbonization-driven commodity or solar-supply-chain thesis.", "tweetA": "China: 56% of world coal consumption, 31% of global carbon emissions. US: 5% and 13%. Same report says US emissions grew '4x greater in absolute terms' than China's — true, and also the kind of stat that makes a much bigger number look smaller by comparison.", "tweetB": "If you're trading the China-solar or China-decarbonization story, know the base rate: Beijing burns more than half the world's coal while being cast as the renewables hero of the same report. The stock story and the emissions story are not the same story.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://open.substack.com/pub/doomberg/p/land-of-the-waning-sun"}, {"id": 18, "cat": "credit", "urgency": "deep", "source": "Stephen Innes / The Dark Side of the Boom", "title": "Treasury's New Owners Are Price-Sensitive — and They Want a Bigger Term Premium", "idea": "Citing UBS economist Arend Kapteyn, Innes lays out how Treasury demand hasn't disappeared but has shifted ownership — from the Fed and foreign central banks toward mutual funds, ETFs, money-market funds (household savings) and leveraged, repo-dependent hedge funds. Greater reliance on bills makes debt easier to place short-term but shortens Washington's refinancing clock and raises rate-policy exposure.", "angle": "The risk isn't a buyers' strike, it's that every new marginal buyer in this ownership mix demands a higher term premium than the central-bank buyer it replaced — a structural, not cyclical, upward pressure on the cost of US government borrowing that compounds every rollover.", "tweetA": "The Treasury market didn't lose buyers, it changed buyers. Central banks out, mutual funds/ETFs/hedge funds in. Every one of those new owners wants a bigger term premium than the old one did. That's not a one-time repricing, that's a permanent tax on every future rollover.", "tweetB": "Washington leaning harder into bills makes today's auctions easier to clear and tomorrow's refinancing clock faster. It's the fiscal equivalent of switching from a 30-year mortgage to a stack of 90-day loans because the rate looks better this quarter. Convenient until the roll comes due in a stress event.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening (UBS ownership-composition chart referenced but paywalled)"}, "link": "https://open.substack.com/pub/thedarksideoftheboom/p/the-treasury-market-has-new-owners"}];
const META = {"date": "2026-07-18", "time": "15:03 CEST", "windowStart": "2026-07-18 09:03 CEST", "windowEnd": "2026-07-18 15:03 CEST", "emailsInWindow": 13, "emailsRead": 13, "itemsExtracted": 18, "includedSources": [{"name": "All Star Charts (Alfonso De Pablos)", "count": 1}, {"name": "Crypto Integrated / Salazar Slytherin — AI News", "count": 1}, {"name": "Crypto Integrated / Salazar Slytherin — Crypto News", "count": 4}, {"name": "The Blind Squirrel / Arcadianow", "count": 2}, {"name": "Quant Enthusiasts / Young & Calculated", "count": 2}, {"name": "Sebastian Raschka, PhD / Ahead of AI", "count": 1}, {"name": "Helene Meisler", "count": 1}, {"name": "Noah Smith / Noahpinion", "count": 2}, {"name": "Barry C. Knapp / Ironsides Macroeconomics", "count": 1}, {"name": "Doomberg", "count": 2}, {"name": "Stephen Innes / The Dark Side of the Boom", "count": 1}], "skippedSources": [{"name": "Marvin Liao / The Hard Fork", "reason": "Personal wellness/gratitude reflection — zero analytical, market, or data content"}, {"name": "Seven c Premium #147", "reason": "Paywalled newsletter — preview showed only a table of contents, no actual data or claims disclosed"}]};
const CAT_COLORS = {"macro": "#e24b4a", "credit": "#378add", "positioning": "#ef9f27", "AI/infra": "#1d9e75", "crypto": "#7f77dd", "geopolitics": "#d85a30", "energy": "#f97316", "tech": "#06b6d4", "gold": "#d4a017", "culture": "#ec4899", "labor": "#8b5cf6", "regulation": "#64748b", "science": "#14b8a6", "venture": "#84cc16"};
const URGENCY_LABELS = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URGENCY_ORDER = ["act", "deep", "watch"];

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function buildFilters() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat]||0) + 1; });
  const catBar = document.getElementById('catBar');
  let html = '<button class="pill active" data-cat="all" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(c => {
    html += '<button class="pill" data-cat="' + c + '" onclick="setCat(\'' + c + '\')">' + escapeHtml(c) + ' (' + catCounts[c] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency]||0) + 1; });
  const urgBar = document.getElementById('urgBar');
  let uhtml = '<button class="pill active" data-urg="all" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  URGENCY_ORDER.forEach(u => {
    if (urgCounts[u]) {
      uhtml += '<button class="pill" data-urg="' + u + '" onclick="setUrg(\'' + u + '\')">' + URGENCY_LABELS[u] + ' (' + urgCounts[u] + ')</button>';
    }
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c) {
  activeCat = c; activeSrc = null;
  document.querySelectorAll('#catBar .pill').forEach(b => {
    const isActive = b.getAttribute('data-cat') === c;
    b.classList.toggle('active', isActive);
    b.style.background = isActive && c !== 'all' ? CAT_COLORS[c] : (isActive ? '#1a1a1a' : '');
  });
  render();
}
function setUrg(u) {
  activeUrg = u; activeSrc = null;
  document.querySelectorAll('#urgBar .pill').forEach(b => {
    const isActive = b.getAttribute('data-urg') === u;
    b.classList.toggle('active', isActive);
    b.style.background = isActive ? '#1a1a1a' : '';
  });
  render();
}
function filterBySrc(name) {
  activeCat = 'all'; activeUrg = 'all'; activeSrc = name;
  document.querySelectorAll('#catBar .pill').forEach(b => b.classList.toggle('active', b.getAttribute('data-cat')==='all'));
  document.querySelectorAll('#urgBar .pill').forEach(b => b.classList.toggle('active', b.getAttribute('data-urg')==='all'));
  render();
  ITEMS.forEach(i => {
    if (i.source.indexOf(name) !== -1) {
      const el = document.getElementById('card-' + i.id);
      if (el) el.classList.add('open');
    }
  });
  window.scrollTo({top: document.getElementById('cardsWrap').offsetTop - 20, behavior: 'smooth'});
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function cardHtml(item) {
  const color = CAT_COLORS[item.cat] || '#888';
  const urgEmoji = item.urgency === 'act' ? '🔴' : (item.urgency === 'watch' ? '🟡' : '🔵');
  const chartFlag = item.charts && (item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : ''));
  let html = '';
  html += '<div class="card" id="card-' + item.id + '">';
  html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
  html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
  html += '<span class="urg">' + urgEmoji + '</span>';
  html += '<span class="badge" style="background:' + color + '">' + escapeHtml(item.source.split(' / ')[0].split(' (')[0]) + '</span>';
  html += '<span class="cattag">' + escapeHtml(item.cat) + '</span>';
  if (chartFlag) html += '<span class="chartflag">' + chartFlag + '</span>';
  html += '<span class="card-title">' + escapeHtml(item.title) + '</span>';
  html += '</div>';
  html += '<div class="card-body">';
  html += '<div class="blocklabel">The Idea</div><div class="idea-text">' + escapeHtml(item.idea) + '</div>';
  html += '<div class="blocklabel">My Angle</div><div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '14;">' + escapeHtml(item.angle) + '</div>';
  html += '<div class="blocklabel">Tweets</div>';
  html += '<div class="tweets">';
  html += '<div class="tweet-box a"><div class="tlabel">TWEET A</div><div class="tweet-text">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
  html += '<div class="tweet-box b"><div class="tlabel">TWEET B</div><div class="tweet-text">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
  html += '</div>';
  if (item.charts && (item.charts.count > 0 || item.charts.desc)) {
    html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + escapeHtml(item.charts.desc || (item.charts.count + ' chart(s)')) + '</div>';
  }
  html += '<a class="readlink" href="' + escapeHtml(item.link) + '" target="_blank">↗ Read full article</a>';
  html += '</div></div>';
  return html;
}

function render() {
  let filtered = ITEMS;
  if (activeSrc) {
    filtered = filtered.filter(i => i.source.indexOf(activeSrc) !== -1);
  } else {
    if (activeCat !== 'all') filtered = filtered.filter(i => i.cat === activeCat);
    if (activeUrg !== 'all') filtered = filtered.filter(i => i.urgency === activeUrg);
  }
  const wrap = document.getElementById('cardsWrap');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) {
    wrap.innerHTML = ''; empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    wrap.innerHTML = filtered.map(cardHtml).join('');
  }
}

function buildReport() {
  const rc = document.getElementById('reportCard');
  document.getElementById('reportToggle').onclick = () => rc.classList.toggle('open');
  let html = '';
  html += '<p><b>Window:</b> ' + escapeHtml(META.windowStart) + ' &rarr; ' + escapeHtml(META.windowEnd) + '. Emails outside this window were not processed.</p>';
  html += '<p><b>Emails in window:</b> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <b>Emails read:</b> ' + META.emailsRead + ' &nbsp;|&nbsp; <b>Items extracted:</b> ' + META.itemsExtracted + '</p>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(s => {
    html += '<div class="src-row" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')"><span>' + escapeHtml(s.name) + '</span><span class="n">' + s.count + ' item' + (s.count===1?'':'s') + '</span></div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(s => {
    html += '<div class="skip-row"><b>' + escapeHtml(s.name) + '</b> — ' + escapeHtml(s.reason) + '</div>';
  });
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('headerSub').textContent = META.date + '  ·  ' + META.time + '  ·  ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';

buildFilters();
render();
buildReport();
</script>
