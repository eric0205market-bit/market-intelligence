<!DOCTYPE html>
<html lang="en">
<head>

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

<script>
const REPORT_DATA = {"date": "2026-05-26T18:50:59Z", "summary": "The dominant story is the **Ethereum Foundation governance meltdown**: Laura Shin's Unchained podcast with **Zak Cole** and **Greg Markou** reveals Tomasz Stańczak was installed without real power and pushed out for trying to modernize; the EF is now funding \"longevity research and hippos in Asia\" while a mysterious replacement no one has met runs it.\n\n**Steve Hou** publicly updates his 2023 \"baby AI bubble\" thesis, now aligning with **@GavinSBaker** and **@tszzl**'s no-bubble view — arguing ROI from AI tokens will materialize in consumer/enterprise apps with current model intelligence levels, and flagging the market's failure to price an \"inference explosion\" from cheap non-frontier LLMs embedded in everything.\n\n**Macro:** **Ed Bradford** sees front-end UST supply and futures rolls dominating flows this week as the Iran deal buoys rates, with **30-year yields back at 5%**. **Bob Elliott** warns housing turned down in the March Case-Shiller index before the yield spike — suggesting weakness is not rate-driven alone. Taiwan chip output growth slowed to **11% y/y** (from 26%) while Chinese semi output accelerated to 22%. **Quinn Thompson** holds higher-for-longer oil is structural regardless of near-term Iran War resolution.\n\nIn equities and crypto, **Micron ($MU)** hits **$1T market cap** (from $80 to $887) as a generational AI memory trade. **$HYPE** continues to dominate YTD crypto performance vs BTC/ETH/SOL. **Simon Dedic** flags the **$DEUS TGE tomorrow** with aligned conditions: robotics crypto theme hot, $BOT at massive premium to NAV, alts catching bids. **Stacy Muur** breaks down Citrea's CTR launch — first vote-escrow model in Bitcoin ecosystem, $18M pre-deposit vault filling in minutes.\n\n**Contrarian signals:** **Udi Wertheimer** argues ZEC privacy hype has almost nothing to do with actual privacy demand, and Bitcoin privacy itself is \"pretty weak.\" **Evanss6** warns Hyperliquid's \"community tokens\" will never be released. **Nic Carter** pushes back on fiscal hawks: the US has a spending problem, not a revenue problem — effective household tax rates have held at their 1979-present average.", "events": [{"title": "Ethereum Foundation Governance Crisis — EF Exposed as Out of Touch", "category": "crypto", "items": [{"author": "laurashin", "text": "Laura Shin runs extensive podcast clips from Zak Cole and Greg Markou on the EF's dysfunction. Zak: the community pressured EF to bring in Tomasz, but \"they didn't really want to cede any control\" and \"never gave him any real power\"; when he tried to push real change, \"he got run out\" for not conforming to \"infinite garden nonsense.\" He was replaced by \"a mysterious fellow nobody even knows and has never met.\" Zak's verdict: EF is \"completely out of touch,\" funding \"hippos in Asia\" and longevity research nobody cares about; Ethereum is no longer a startup and has \"trillions of dollars on the line.\" Bottom line quote: \"Let's grow up and actually run Ethereum like an organization that can scale — or the crypto principles have no real world value.\" Greg Markou says the wave of senior EF departures is systematic, not budgetary, and the board needs \"grownups in the room\" who understand businesses at scale.", "tweet_url": "https://x.com/laurashin/status/2059332686754541717", "images": [], "is_thread": true}, {"author": "laurashin", "text": "Podcast landing tweet: @0xzak argues Vitalik created the very ETH bear cases the EF now contends with; @gregthegreek says the wave of senior departures isn't budgetary, it's systematic. Show is live on Unchained.", "tweet_url": "https://x.com/laurashin/status/2059331237362188744", "images": [], "is_thread": false}, {"author": "hosseeb", "text": "Haseeb announces this week's Chopping Block episode will feature @TrustlessState and @MaxResnick on \"ETH apostates and the state of the EF\" — asks audience what to ask them, signaling continued institutional interest in the EF dysfunction narrative.", "tweet_url": "https://x.com/hosseeb/status/2059331429994033157", "images": [], "is_thread": false}]}, {"title": "Steve Hou Updates AI View — From Baby Bubble to No-Bubble Adjacent", "category": "AI", "items": [{"author": "stevehou", "text": "Steve Hou publicly updates his 2023 \"baby bubble\" AI thesis, now saying he's \"much closer to @GavinSBaker and @tszzl, who both said we weren't ready for the scenario where there's no bubble.\" He believes ROI from AI tokens will start showing up in consumer and enterprise applications even at current SOTA intelligence levels, especially as open source catches up. Separately argues the market is not pricing an \"inference explosion\" — non-frontier, extremely cheap LLMs being incorporated into \"every single thing you can think of and not think of in society.\"", "tweet_url": "https://x.com/stevehou/status/2059334956904571237", "images": [], "is_thread": true}, {"author": "fejau_inc", "text": "Responding to Steve Hou's AI bull update: \"As long as the Taiwan old guard keep supply tight\" — flagging chip supply discipline as the key variable sustaining the no-bubble AI investment thesis. Separately notes Anthropic is now EBIT positive.", "tweet_url": "https://x.com/fejau_inc/status/2059341981357396389", "images": [], "is_thread": false}]}, {"title": "Micron ($MU) Hits $1 Trillion Market Cap", "category": "tech", "items": [{"author": "aleabitoreddit", "text": "Serenity marks $MU hitting a $1T market cap after going from $80 to $887. Notes the prior thesis — \"$MU is the next $NVDA given how memory demand looks structural with AI\" — has played out. Analogizes to early Nvidia at $400B when markets dismissed GPUs as a short-term cycle. Cites White House backing and \"Made in America\" tailwind as additional structural support. The stock \"probably made a lot of millionaires.\"", "tweet_url": "https://x.com/aleabitoreddit/status/2059321059812483077", "images": ["https://pbs.twimg.com/media/HJQtk-UaoAAHeVN.jpg"], "is_thread": false}]}, {"title": "DeepSWE — New AI Coding Benchmark Endorsed", "category": "AI", "items": [{"author": "garrytan", "text": "Garry Tan endorses DeepSWE as \"the new standard for engineering evals.\" Key insight in quoted content: top models look relatively close on public leaderboards, but DeepSWE shows where they actually diverge, reflecting realistic developer day-to-day experience. Significant for anyone benchmarking AI coding tools.", "tweet_url": "https://x.com/garrytan/status/2059326763579392130", "images": ["https://pbs.twimg.com/media/HJQyxl2acAAHM6L.jpg"], "is_thread": false}]}, {"title": "Helius Indexes Full Solana Transfer History Since Genesis", "category": "crypto", "items": [{"author": "mert", "text": "Helius (mert's company) has indexed every single token transfer in Solana's history since genesis — more data than all other blockchains combined. New `getTransfersByAddress` endpoint supports full-history analysis with filters per token (amounts, senders, receivers, dates) across any stablecoin, memecoin, or token. Thread includes link to docs and Claude/Clanker integration suggestion for developers.", "tweet_url": "https://x.com/mert/status/2059342632212431236", "images": [], "is_thread": true}, {"author": "mert", "text": "Separately defends Solana's builder moat vs @CryptoKaleo: \"it's the most usable, scalable, and battle-tested crypto app platform in existence\" — noting disproportionate share of big crypto startups (pump, axiom, jupiter, phantom, jito, prop AMMs) all started on Solana. Not an accident.", "tweet_url": "https://x.com/mert/status/2059340599585538086", "images": [], "is_thread": false}]}, {"title": "Polymarket/Kalshi Banned in Spain — Regulatory Pressure Mounts", "category": "crypto", "items": [{"author": "stacy_muur", "text": "Spain blocks Polymarket and Kalshi via ISP restrictions after regulators found the platforms operating unlicensed betting products. Stacy Muur raises a sharp rhetorical challenge: how can Polymarket claim to be the \"leading global prediction market\" if they keep getting banned in a new country every month? Regulatory overhang increasingly material.", "tweet_url": "https://x.com/stacy_muur/status/2059320929059324255", "images": ["https://pbs.twimg.com/media/HJQteNAbwAAddFP.jpg"], "is_thread": false}]}, {"title": "$DEUS TGE Tomorrow — Robotics Crypto Theme Aligned", "category": "crypto", "items": [{"author": "sjdedic", "text": "Simon Dedic flags the $DEUS TGE tomorrow for XMAQUINA — described as \"the only crypto project giving direct real-world robotics exposure to some of the most prestigious humanoid companies in the world.\" Three conditions aligned: (1) RoboStrategy's $BOT launched and is already trading at a massive premium to NAV, proving concept interest; (2) crypto market waking up, quality alts catching bids; (3) robotics-related coins outperforming. \"All eyes on $DEUS.\"", "tweet_url": "https://x.com/sjdedic/status/2059307681337286900", "images": ["https://pbs.twimg.com/media/HJQgXAuXIAAlx8F.jpg"], "is_thread": false}]}], "insights": [{"author": "stevehou", "text": "The market is not pricing an \"inference explosion\": non-frontier, extremely cheap LLM models being incorporated into every single thing in society — \"I mean every single thing you can think of and not think of.\" The real underpriced scenario is not which frontier model wins, but pervasive deployment of cheap models across all applications. This is a distinct bull case from the SOTA/capex thesis.", "tweet_url": "https://x.com/stevehou/status/2059345668062224783", "images": [], "category": "AI"}, {"author": "Pentosh1", "text": "Extended bull thesis for a 10-year \"Golden Dragon Bull Run\" across AI, robotics, medicine, defense (AI drones), and energy — with many shakeouts and peaks and valleys along the way. Key insight: every new release is the worst version we will ever see of these technologies; humans think linearly but the pace is logarithmic. \"The biggest mistake is looking at things on too low of a time frame.\" Scaling remains the binding constraint for now but not permanently. Separately warns: crypto AI is \"90% just memes parading as AI\" — real AI is up because it has products, revenues, pipelines, customers, and an estimated $7.6T in capex over the next 4 years.", "tweet_url": "https://x.com/Pentosh1/status/2059314805396078723", "images": [], "category": "AI"}, {"author": "Pentosh1", "text": "Animal spirits thread: COVID-era stimmies and lockdowns created a generation of speculative capital that is still working through cycles. The crypto sector saw 32x returns in 2-3 months on some assets; prediction markets, 0DTE, sports betting now provide alternative outlets for the same behavior. Crypto will still have boom-bust cycles but not to prior degree — it's \"flawed by design with emissions and no longer starting from 0\" (token emissions at 2 recent peaks were $500M/day). Advice: \"be like an animal that migrates with the seasons in search of food\" — don't stare at an empty bowl. Expects 2-3 distinct massive bubbles across different sectors in the next decade.", "tweet_url": "https://x.com/Pentosh1/status/2059263772208804266", "images": ["https://pbs.twimg.com/media/HJP2dYLW0AEzBqb.jpg"], "category": "macro"}, {"author": "Pentosh1", "text": "Added more BlackBerry (QNX) today and plans to continue. Bull case: CEO says the company is no longer \"in transition\" but in a profitable growth phase; 5% stock buyback; stated rule of 40; embedded in 275M vehicles; expanding into robotics, defense, and medical applications; \"digital sovereignty tailwind\" as non-US governments seek secure, US-independent communications; QNX-powered humanoid robot demo just shown; NVDA partnership integrated with THOR/Halo safety stack. Sees \"immense long-term upside\" as a multi-year play.", "tweet_url": "https://x.com/Pentosh1/status/2059290525761458514", "images": ["https://pbs.twimg.com/media/HJQR0dkWMAEBSQe.jpg"], "category": "tech"}, {"author": "qthomp", "text": "Oil continues to chop bulls and bears: Brent-WTI spread and curve time spreads have both compressed as SPR releases alleviated physical shortages. However, Quinn Thompson's core thesis remains intact — regardless of how the Iran War resolves near-term, higher-for-longer oil prices are here to stay and international oil & gas equities remain attractive. Equity investors can look through short-term flow dynamics.", "tweet_url": "https://x.com/qthomp/status/2059246672329261108", "images": [], "category": "energy"}, {"author": "Fullcarry", "text": "Front-end UST supply and futures rolls (M to U) will dominate trading flows this week. The Iran deal is buoying USTs from what Bradford calls \"the depths of despair\" — 30-year yields are back to 5%. Context: Conference Board labor market gauge shows not much improvement, a soft data overhang that may cap how much rate relief extends.", "tweet_url": "https://x.com/Fullcarry/status/2059246758744518888", "images": ["https://pbs.twimg.com/media/HJPp53kXEAAumnx.png"], "category": "macro"}, {"author": "BobEUnlimited", "text": "March Case-Shiller housing price index turned back negative before the recent spike in long-end yields. This is a bearish data point: housing weakness is not purely a rate story — it was already rolling over when yields were lower. Suggests more structural demand issues in housing.", "tweet_url": "https://x.com/BobEUnlimited/status/2059324098912583807", "images": ["https://pbs.twimg.com/media/HJQv7EmXsAAx8SS.png"], "category": "macro"}, {"author": "BobEUnlimited", "text": "Flags a potential semis slowdown: Taiwan's April manufacturing data shows chip output growth slowed to 11% y/y (was 26%), the shallowest rate in over 2 years. Meanwhile Chinese semiconductor output accelerated 22%, outpacing Taiwan. The US is currently 10% short. Bob frames this as a question: are we seeing signs of a slowdown in semis?", "tweet_url": "https://x.com/BobEUnlimited/status/2059291216303280476", "images": [], "category": "tech"}, {"author": "udiWertheimer", "text": "Bitcoin privacy is \"pretty weak\" in practice. Most promoted mitigations are \"flat-out bad.\" Anyone whose life depends on privacy would need to expertly analyze their own threat model and build a custom solution — ordinary people are better off using something else entirely. The more important signal: current ZEC hype \"has very little to do with actual desire for privacy\" — the biggest ZEC proponents hold exposure via Coinbase and Hyperliquid, signaling this is a narrative trade rather than a use-case driven one.", "tweet_url": "https://x.com/udiWertheimer/status/2059308779372425728", "images": [], "category": "crypto"}, {"author": "patrick_oshag", "text": "Patrick OShaughnessy shares extended quote from Darren Farber (defense investor, former DoD special advisor) on the Ukraine lesson: \"The rate of technological change in the commercial world becomes a direct input into military capability.\" Drones existed since Vietnam but only became mass warfare tools when commercial viability made them cheap — 50 iterations of Ukrainian drones in 3 years. \"Things that become permissive and inexpensive in the commercial world have enormously valuable inputs into fighting asymmetric war.\" The commercial capex cycle and military modernization are now tightly linked.", "tweet_url": "https://x.com/patrick_oshag/status/2059335377463209993", "images": [], "category": "geopolitics"}, {"author": "himgajria", "text": "Observes extraordinary retail wealth creation happening outside the typical fintech-bubble observer's frame: people making $200k/day on stocks with portfolios under $1M. Interprets this as a macro signal about cycle positioning. Follow-on: crypto's degen phase was 2024-2025; now only fundamentally backed assets are moving — cites HYPE and NEAR as the current quality plays.", "tweet_url": "https://x.com/himgajria/status/2059308985531142449", "images": [], "category": "macro"}, {"au // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
