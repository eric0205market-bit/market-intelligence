    var headerHtml = '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="item-num">#' + item.id + '</span>' +
      '<span class="urgency-badge">' + urgEmoji(item.urgency) + '</span>' +
      '<span class="source-badge" style="background:' + color + '">' + h(item.source.split('/')[0].trim()) + '</span>' +
      '<span class="cat-tag">' + h(item.cat) + '</span>' +
      (chartIcon ? '<span class="chart-icon">' + chartIcon + '</span>' : '') +
      '<span class="card-title">' + h(item.title) + '</span>' +
      '</div>';

    var angleStyle = 'border-left-color:' + color + ';background:' + color + '18;';

    var chartHtml = '';
    if (item.charts && item.charts.count > 0 && item.charts.desc) {
      chartHtml = '<div class="chart-note' + (item.charts.hot ? ' hot' : '') + '" style="margin-top:8px;">' +
        (item.charts.hot ? '🔥 ' : '📊 ') + h(item.charts.desc) + '</div>';
    }

    var bodyHtml = '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + h(item.idea) + '</div>' +
      '<div class="section-label" style="margin-top:12px;">My Angle</div>' +
      '<div class="angle-box" style="' + angleStyle + '">' + h(item.angle) + '</div>' +
      '<div class="section-label" style="margin-top:12px;">Tweets</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label a">TWEET A</div>' +
          '<div class="tweet-text">' + h(item.tweetA) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label b">TWEET B</div>' +
          '<div class="tweet-text">' + h(item.tweetB) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartHtml +
      '<div class="link-row"><a href="' + h(item.link) + '" target="_blank">↗ Read full article</a></div>' +
      '</div>';

    card.innerHTML = headerHtml + bodyHtml;
    container.appendChild(card);
  });

  // Build session report
  var rb = document.getElementById('report-body');
  var inclHtml = '<table><tr><th>Source</th><th>Items</th></tr>' +
    META.includedSources.map(function(s) {
      return '<tr><td><span class="src-link" onclick="filterBySrc(\'' + h(s.name.replace(/'/g, '')) + '\')">' + h(s.name) + '</span></td><td>' + s.items + '</td></tr>';
    }).join('') + '</table>';
  var skipHtml = '<table style="margin-top:10px;"><tr><th>Skipped Source</th><th>Reason</th></tr>' +
    META.skippedSources.map(function(s) {
      return '<tr><td>' + h(s.name) + '</td><td>' + h(s.reason) + '</td></tr>';
    }).join('') + '</table>';
  rb.innerHTML =
    '<div><strong>Window:</strong> ' + h(META.windowStart) + ' to ' + h(META.windowEnd) + '</div>' +
    '<div style="margin-top:6px;"><strong>Emails in window:</strong> ' + META.emailsInWindow + ' | <strong>Read:</strong> ' + META.emailsRead + ' | <strong>Items extracted:</strong> ' + META.itemsExtracted + '</div>' +
    '<div style="margin-top:10px;"><strong>Included Sources:</strong></div>' + inclHtml +
    '<div style="margin-top:10px;"><strong>Skipped Sources:</strong></div>' + skipHtml;
}

window.onload = init;
</script>
</body>
</html>
