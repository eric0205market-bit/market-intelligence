rowth curve, not just the concept, is the tradeable signal.", "quote": "The volume of trades made on its US exchange rose fourfold, from $50m a day to $200m, between May and June this year.", "locator": "Post no bills", "quote_verified": true}, {"claim": "Polymarket was only allowed to return to the US in 2025 after gaining CFTC regulatory approval, and that return is what has driven its recent growth surge; its latest formal valuation in October 2025 was $9bn.", "speaker": "Peter Hoskin", "type": "causal", "entities": ["Polymarket", "CFTC"], "conviction": "high", "so_what": "Regulatory approval, not organic demand alone, is the growth trigger — watch CFTC posture as the key swing factor for the whole prediction-market sector.", "quote": null, "locator": "it was only in 2025 that it was allowed to return to the US", "quote_verified": false}, {"claim": "Polymarket raised $45m in a May 2024 round led by Peter Thiel's Founders Fund, before it was legally able to operate in the US.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "Peter Thiel", "Founders Fund"], "conviction": "high", "so_what": "Elite VC backing pre-dated regulatory clearance, signaling investors bet on the regulatory environment shifting favorably under a Trump administration.", "quote": null, "locator": "including $45m in a May 2024 investment round", "quote_verified": false}, {"claim": "Donald Trump Jr has sat on Polymarket's advisory board since his firm, 1789 Capital, made a 'double-digit millions of dollars' investment in August 2025, and he is separately a 'strategic advisor' to competitor Kalshi.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Donald Trump Jr", "1789 Capital", "Polymarket", "Kalshi"], "conviction": "high", "so_what": "The same family figure sits on both leading platforms' boards, a direct conflict-of-interest structure that likely shaped the administration's favorable regulatory treatment of the sector.", "quote": null, "locator": "Donald Trump Jr has sat on Polymarket's advisory board", "quote_verified": false}, {"claim": "Mark Zuckerberg has tasked Meta with building a prediction-markets app, provisionally named 'Arena', reviving an earlier abortive 2020 attempt called 'Forecast'; it would initially use a video-game-like points system rather than real money.", "speaker": "Peter Hoskin", "type": "prediction", "entities": ["Meta", "Mark Zuckerberg", "Polymarket", "Kalshi"], "conviction": "medium", "so_what": "A Meta entrant would bring prediction markets to a vastly larger user base and could commoditize the category or squeeze independent platforms' growth.", "quote": "would probably rely on a video-game-like points system instead", "locator": "In June, the New York Times reported", "quote_verified": true}, {"claim": "Almost half of Polymarket's current events relate to sports, raising unresolved state-by-state US gambling-regulation conflicts since the platform is accessible to anyone over 18 while sports betting is typically restricted to 21+.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket"], "conviction": "medium", "so_what": "A material regulatory overhang: state-level gambling law could still constrain or reshape Polymarket's largest category.", "quote": null, "locator": "how do they handle a platform that's dressed up", "quote_verified": false}]}, {"theme": "Prediction markets' academic and regulatory history", "insights": [{"claim": "The Iowa Political Stock Market, launched by University of Iowa economists in the late 1980s to predict the 1988 presidential election, outperformed major pollsters including Gallup and Harris, and its successor, the Iowa Electronic Markets, has continued to do so in subsequent elections.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Iowa Political Stock Market", "Iowa Electronic Markets"], "conviction": "high", "so_what": "The original academic case for prediction markets rests on real, decades-long outperformance versus polling — the underlying mechanism is not junk, even if today's platforms distort it.", "quote": null, "locator": "The Iowa Political Stock Market outperformed major pollsters", "quote_verified": false}, {"claim": "DARPA's Policy Analysis Market (PAM), designed with economist Robin Hanson to let analysts bet on geopolitical events including assassinations and coups in Middle Eastern countries, was killed by Congress in 2003 after senators Byron Dorgan and Ron Wyden called it 'morally repugnant'.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["DARPA", "Robin Hanson", "Byron Dorgan", "Ron Wyden"], "conviction": "high", "so_what": "Political backlash, not economic failure, has historically been the binding constraint on prediction markets for sensitive events — a recurring risk for today's platforms as they price assassinations and wars.", "quote": "morally repugnant", "locator": "in 2003, Pam was strangled", "quote_verified": true}, {"claim": "Robin Hanson has developed the concept of 'futarchy' — governance that combines democratic voting on values with prediction-market forecasting on which policies best achieve them — and Polymarket founder Shayne Coplan was an early adherent who once wrote to Hanson expressing support.", "speaker": "Peter Hoskin", "type": "framework", "entities": ["Robin Hanson", "Shayne Coplan", "Polymarket"], "conviction": "medium", "so_what": "Polymarket's founding ideology was explicitly utopian/governance-oriented, useful context for evaluating gaps between its stated mission and its current gambling-heavy reality.", "quote": "could we give people more direct, better incentives to actually tell the truth and figure out the truth", "locator": "In a podcast interview in 2021", "quote_verified": true}, {"claim": "Early 2000s prediction-market firms HedgeStreet and Intrade fell into regulatory limbo between financial-instrument and gambling law, and regulation tightened further after the 2008 financial crash, delaying the sector's mainstream emergence until 2020.", "speaker": "Peter Hoskin", "type": "causal", "entities": ["HedgeStreet", "Intrade"], "conviction": "medium", "so_what": "Regulatory clarity, more than technology, has been the gating factor for the category's growth — today's favorable US stance is the real unlock.", "quote": null, "locator": "these early-moving firms often fell foul", "quote_verified": false}, {"claim": "Kalshi became the first major modern player by registering as a CFTC-regulated 'contract market' in 2020, while Polymarket launched the same year as an unregulated, blockchain-based alternative funded and built by 22-year-old founder Shayne Coplan.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Kalshi", "Polymarket", "Shayne Coplan", "CFTC"], "conviction": "high", "so_what": "Two structurally different entrants (regulated vs. crypto-native) both emerged in 2020, framing the current competitive duopoly and its differing regulatory exposure.", "quote": null, "locator": "That year, one of two new big players", "quote_verified": false}, {"claim": "The CFTC fined Polymarket $1.4m in 2022 for running an unsanctioned trading platform and effectively banned it from the US until it achieved regulatory compliance, a ban that lasted until 2025.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "CFTC"], "conviction": "high", "so_what": "The platform has a track record of regulatory violation preceding its current favorable treatment — a reversal worth watching for durability risk.", "quote": "All derivatives markets must operate within the bounds of the law regardless of the technology used", "locator": "The CFTC fined Polymarket $1.4m in 2022", "quote_verified": true}, {"claim": "As of the article's writing, the Wall Street Journal reported a source saying the CFTC is 'in the midst of a continuing investigation into Polymarket', despite the platform's recent favorable regulatory treatment.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "CFTC", "Wall Street Journal"], "conviction": "medium", "so_what": "Regulatory risk has not fully disappeared even under a friendlier administration — an active investigation is a live tail risk for the platform.", "quote": "in the midst of a continuing investigation into Polymarket", "locator": "the CFTC may have got involved again", "quote_verified": true}]}, {"theme": "Accuracy claims don't hold up under scrutiny", "insights": [{"claim": "Polymarket markets ask a binary yes/no question and price shares such that the price reflects the market's implied probability (e.g., a $0.95 'No' price implies a 95% chance); correct shares settle at $1, incorrect at $0.", "speaker": "Peter Hoskin", "type": "framework", "entities": ["Polymarket"], "conviction": "high", "so_what": "Understanding the mechanics clarifies how to read Polymarket prices as real-time probability estimates, and where their limits lie.", "quote": null, "locator": "All of its markets ask a binary, yes-or-no question", "quote_verified": false}, {"claim": "Polymarket claims its crowd-sourced predictions are accurate more than 94% of the time a month before an outcome is known, but this figure appears to trace to research measuring accuracy just four hours before market closure, when outcomes are typically already near-certain.", "speaker": "Peter Hoskin", "type": "contrarian", "entities": ["Polymarket"], "conviction": "high", "so_what": "The platform's headline accuracy statistic is likely a misleading marketing figure — investors citing Polymarket 'accuracy' should demand the actual measurement window.", "quote": "accurate more than 94% of the time an entire month before an outcome is definitively known", "locator": "Polymarket boasts that its crowd-sourced predictions", "quote_verified": true}, {"claim": "A Prospect analysis of almost 7,000 Polymarket markets from the past 18 months, each with more than $100,000 in trading volume, found markets already trading a month before closure called the outcome correctly only 81% of the time — well below the platform's own 94%+ claim.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "Prospect"], "conviction": "high", "so_what": "An independent, methodologically comparable benchmark (81% vs. claimed 94%+) is the concrete number to cite when discounting Polymarket's marketing claims.", "quote": null, "locator": "A Prospect analysis of almost 7,000 markets", "quote_verified": false}, {"claim": "A week before the assassination of Ayatollah Ali Khamenei on 28 February in a US-Israeli assault, a Polymarket market titled 'Khamenei out as Supreme Leader of Iran by February 28?' priced the probability at just 2%.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["Polymarket", "Ali Khamenei", "Iran"], "conviction": "high", "so_what": "A concrete high-profile miss undercuts the 'wisdom of crowds' narrative for tail-risk geopolitical events specifically — exactly the events investors most want forecast.", "quote": "Khamenei out as Supreme Leader of Iran by February 28?", "locator": "a week before the assassination of Ayatollah Ali Khamenei", "quote_verified": true}, {"claim": "A Polymarket market asking 'Will Jesus Christ return before 2027?' has had $64m in volume pushed through it, with the implied probability just over 2%, illustrating that large sums flow into markets with no informational basis.", "speaker": "Peter Hoskin", "type": "contrarian", "entities": ["Polymarket"], "conviction": "medium", "so_what": "Large trading volume is not proof of informational value — a caution against treating Polymarket price levels as inherently meaningful signal.", "quote": "Will Jesus Christ return before 2027?", "locator": "Among Polymarket's current markets is one", "quote_verified": true}]}, {"theme": "Insider information and market integrity risk", "insights": [{"claim": "An anonymous French investor (the 'French whale') bet roughly $80m on Trump defeating Kamala Harris in the 2024 election, contrary to pollsters' 'toss-up' narrative, partly informed by data he had specially commissioned from YouGov, and won more than double his stake, an additional $85m.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["Polymarket", "Donald Trump", "Kamala Harris", "YouGov"], "conviction": "high", "so_what": "Illustrates that large, privately-commissioned data edges — not just crowd wisdom — can drive Polymarket's most famous 'accurate' calls.", "quote": null, "locator": "an anonymous investor from France", "quote_verified": false}, {"claim": "Nine linked Polymarket accounts won more than $2.4m betting on Trump's military interventions in Iran, with a 98% win rate across bets even when priced probabilities were much lower, which the CEO of the data analytics firm that discovered it said luck alone cannot explain.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "Nicolas Vaiman"], "conviction": "high", "so_what": "Strong circumstantial evidence of information asymmetry or insider access on geopolitical/military-event markets — a live integrity risk for anyone trading alongside these flows.", "quote": "Luck alone cannot explain those numbers", "locator": "Nine Polymarket accounts thought to have one person", "quote_verified": true}, {"claim": "A US special forces soldier has been charged with (but denies) using classified information to win $400,000 betting on Nicolás Maduro's removal from office just hours before Maduro was captured by US special forces; an Israeli Air Force crew member told interrogators 'the entire squadron is on Polymarket, the entire air force is betting.'", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["Polymarket", "Nicolás Maduro"], "conviction": "high", "so_what": "Direct evidence that military/intelligence personnel with privileged information are actively trading Polymarket on events they may influence or foreknow — a structural insider-trading exposure the platform has no mechanism to police.", "quote": "The entire squadron is on Polymarket, the entire air force is betting.", "locator": "An Israeli Air Force crew member who was questioned", "quote_verified": true}, {"claim": "Polymarket's resolution of the 'Will Zelenskyy wear a suit before July?' market — ruling that a black jacket-and-trousers outfit widely described as a suit by media and its own designer was not a suit under an outside blockchain dispute-resolution process — shifted millions of dollars based on a subjective judgment call.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["Polymarket", "Volodymyr Zelensky"], "conviction": "high", "so_what": "Shows resolution-source subjectivity is itself a trading risk on ambiguous real-world questions, independent of any informational edge.", "quote": "Will Zelenskyy wear a suit before July?", "locator": "Then there was the incident of Zelensky's suit", "quote_verified": true}]}], "insight_total": 22, "top_entities": ["Polymarket", "Kalshi", "CFTC", "Donald Trump Jr", "Shayne Coplan", "Peter Thiel", "Founders Fund", "Meta", "Mark Zuckerberg", "Robin Hanson", "DARPA"], "source_meta": {"author": "Peter Hoskin", "word_count": 3148, "paywalled": false}}, {"record_id": "df86130b7ab28c10", "source_type": "society", "source_name": "Prospect Magazine", "source_url": "https://www.prospectmagazine.co.uk/views/lives/74101/rural-life-i-will-no-longer-be-ashamed-of-being-materialistic", "title": "Rural life: I will no longer be ashamed of being materialistic", "published_date": "2026-07-15", "language": "en", "processed_at": "2026-07-20T12:59:54Z", "processor": "claude-code-sub-opus", "tags": ["Society"], "gist": "A personal essay arguing that treasured possessions, not just people and places, constitute part of one's sense of 'home', reframing materialism as a legitimate emotional anchor rather than something to be ashamed of.", "themes": [{"theme": "Redefining home beyond place and people", "insights": [{"claim": "The author, who moved from London to rural Wales, came to realize she has 'many homes' after noticing that a longing for her own possessions (artwork, furniture), not just place, drove her feeling of wanting to be home after travel.", "speaker": "Kiran Sidhu", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "Illustrates a broader cultural shift toward treating personal possessions as identity-anchors rather than mere consumption — relevant to how brands and products are marketed around 'belonging' and self-expression.", "quote": null, "locator": "All that travel led me to realise something", "quote_verified": false}, {"claim": "The author argues that prevailing social norms pressure people to minimize the emotional importance of possessions ('what's a guitar or a picture compared with our friendships and family relationships?'), and that this norm is worth resisting.", "speaker": "Kiran Sidhu", "type": "contrarian", "entities": [], "conviction": "medium", "so_what": "A window into a recurring cultural tension between minimalism/anti-materialism messaging and genuine attachment to objects — relevant to consumer psychology narratives.", "quote": "In order not to be considered materialistic, we are not supposed to think that our possessions are worth much in the grand scheme of things", "locator": "In order not to be considered materialistic", "quote_verified": true}, {"claim": "The author's friend Damian, a musician, described his sense of home as being 'among his eight guitars', which the author uses as the anecdote that reframed her own thinking about possessions and identity.", "speaker": "Kiran Sidhu", "type": "anecdote", "entities": [], "conviction": "low", "so_what": "A specific, human illustration of how professional/creative tools can become identity-defining possessions, not just utilitarian assets.", "quote": null, "locator": "He said he was looking forward to being among his eight guitars", "quote_verified": false}, {"claim": "The author treated sharing a curated box of personal objects (a painting, an embossed mirror, a candlestick, and specific books including Sartre's Existentialism and Humanism) with a new romantic partner as a relationship-defining test of compatibility before he had met her friends or family.", "speaker": "Kiran Sidhu", "type": "anecdote", "entities": [], "conviction": "low", "so_what": "A concrete example of possessions being used as a proxy for emotional intimacy and vetting compatibility, ahead of traditional social introductions.", "quote": null, "locator": "When I first started dating the man who would become my husband", "quote_verified": false}, {"claim": "The author concludes that inanimate objects are not merely decorative but can function as psychological anchors that 'lead us back to ourselves' when things feel senseless, framing her own house as 'a museum dedicated to me.'", "speaker": "Kiran Sidhu", "type": "framework", "entities": [], "conviction": "medium", "so_what": "A framework for understanding consumer attachment to objects as identity-maintenance rather than pure acquisitiveness.", "quote": "The house that I live in is a museum dedicated to me.", "locator": "Inanimate objects aren't always just decorative", "quote_verified": true}]}], "insight_total": 5, "top_entities": ["Kiran Sidhu"], "source_meta": {"author": "Kiran Sidhu", "word_count": 811, "paywalled": false}}, {"record_id": "f39008ad5e241199", "source_type": "society", "source_name": "Resolution Foundation", "source_url": "https://www.resolutionfoundation.org/comment/the-balance-of-power/", "title": "The balance of power", "published_date": "2026-07-17", "language": "en", "processed_at": "2026-07-20T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Macro"], "gist": "Resolution Foundation's weekly research roundup argues the UK's fiscal framework has been chronically too loose (the OBR has wrongly projected budget balance in 23 of 31 forecasts), while also surveying rising anti-Muslim hostility, childhood inequality's effect on sharing, a puzzle in UK mental-health statistics, Japan's rural depopulation trade-offs, and gender gaps in German inheritance.", "themes": [{"theme": "UK fiscal framework and political transition", "insights": [{"claim": "A new UK Prime Minister has been confirmed and cabinet appointments (including who will hold the Chancellor's role, No. 11) are still being speculated on, with the incoming team set to inherit an economic malaise and fiscal morass.", "speaker": "Resolution Foundation", "type": "anecdote", "entities": ["Andy Burnham", "UK Treasury"], "conviction": "medium", "so_what": "Watch for the new Chancellor appointment and early fiscal signaling as a near-term catalyst for UK gilt and sterling sentiment.", "quote": null, "locator": "Morning all", "quote_verified": false}, {"claim": "Since the Office for Budget Responsibility's founding, it has projected the UK government's current budget (day-to-day spending plus debt interest, less tax revenue) to reach balance by the end of the five-year forecast period in 23 of 31 fiscal events.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Office for Budget Responsibility (OBR)", "UK Treasury"], "conviction": "high", "so_what": "A near-consistent pattern of overly optimistic OBR forecasts implies structural downside risk to any current fiscal projections used to justify UK spending or tax plans.", "quote": null, "locator": "Chart of the week", "quote_verified": false}, {"claim": "Excluding the pandemic and post-financial-crisis periods, the OBR has forecast a budget deficit at the end of a five-year window only once, yet in reality the UK government has run an actual current budget surplus only once, in 2018-19.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Office for Budget Responsibility (OBR)", "UK Treasury"], "conviction": "high", "so_what": "The gap between OBR forecasts and outturns is a track record investors can use to discount official UK fiscal projections.", "quote": null, "locator": "Chart of the week", "quote_verified": false}, {"claim": "The core problem with the UK's fiscal framework is not that it has been too tight, but that it has been too loose, since successive governments have repeatedly spent more than they raised in tax despite forecasts of balance.", "speaker": "Resolution Foundation", "type": "contrarian", "entities": ["UK Treasury", "Office for Budget Responsibility (OBR)"], "conviction": "high", "so_what": "Runs counter to the popular framing of UK fiscal rules as excessively austere; positions any incoming Chancellor's room for giveaways as more constrained than headline forecasts suggest.", "quote": "the problem with our fiscal framework is not that it has been too tight, but too loose", "locator": "Chart of the week", "quote_verified": true}, {"claim": "With UK government debt and borrowing costs continuing to rise, whoever leads the Treasury next week will need to make tough, realistic fiscal choices rather than voter-friendly announcements; a separate Resolution Foundation report on funding higher public investment via UK public financial institutions is due the following week.", "speaker": "Resolution Foundation", "type": "prediction", "entities": ["UK Treasury", "Resolution Foundation"], "conviction": "medium", "so_what": "Signals an upcoming Resolution Foundation publication on UK public investment vehicles worth tracking for policy direction on infrastructure financing.", "quote": null, "locator": "Chart of the week", "quote_verified": false}]}, {"theme": "Anti-Muslim hostility in Britain", "insights": [{"claim": "A joint British Muslim Trust and British Future survey found that over half (56 per cent) of Muslims in Britain reported experiencing religious prejudice in the past year, consistent with record-breaking hate crime levels recorded in 2025.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["British Muslim Trust", "British Future"], "conviction": "high", "so_what": "Documents a deteriorating social climate that could feed into policy responses, community relations funding, or political risk around social cohesion in the UK.", "quote": null, "locator": "A melting pot?", "quote_verified": false}, {"claim": "Following the September 'Unite the Kingdom' demonstration, 61 per cent of British Muslims surveyed said they felt more worried about their personal safety, indicating the protests directly stoked fear within the community.", "speaker": "Resolution Foundation", "type": "causal", "entities": ["British Muslim Trust", "British Future"], "conviction": "high", "so_what": "Large-scale political demonstrations are having measurable, immediate effects on minority communities' sense of safety, a signal for social-cohesion and security policy risk.", "quote": null, "locator": "A melting pot?", "quote_verified": false}, {"claim": "More than a third (37 per cent) of the British public agree that growth in the Muslim population poses a foundational threat to UK culture, according to the British Muslim Trust/British Future survey.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["British Muslim Trust", "British Future"], "conviction": "high", "so_what": "A sizeable minority holding this view underscores ongoing polarization that could shape immigration and integration policy debates in the UK.", "quote": "the growth in the Muslim population poses a foundational threat to UK culture", "locator": "A melting pot?", "quote_verified": true}]}, {"theme": "Inequality's effect on children", "insights": [{"claim": "A Fairness Foundation study combining data from 1,790 participants across 7 countries and 21 research papers found that growing up in an unequal society reduces children's willingness to share.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Fairness Foundation"], "conviction": "medium", "so_what": "Suggests income inequality has behavioral and social costs beyond economics, relevant to long-run social capital and cohesion arguments for redistribution.", "quote": null, "locator": "Learning to share", "quote_verified": false}, {"claim": "The reduced willingness to share fades as children get older, but older children perceive inequality as more unfair than younger children and are more likely to believe in the need for equitable redistribution of resources.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Fairness Foundation"], "conviction": "medium", "so_what": "Attitudes favoring redistribution appear to strengthen with age and exposure to inequality, a generational dynamic worth watching in future public opinion on tax and welfare policy.", "quote": null, "locator": "Learning to share", "quote_verified": false}]}, {"theme": "The mental health measurement puzzle", "insights": [{"claim": "Analysis by Ben Baumberg Geiger, picked up by John Burn-Murdoch in the FT, finds that reported psychological distress and mental illness have been rising in the UK even though significant activity limitations arising from poor mental health have stayed flat.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Ben Baumberg Geiger", "John Burn-Murdoch", "Financial Times"], "conviction": "medium", "so_what": "Challenges the assumption that rising mental-ill-health statistics reflect a proportional rise in functional impairment, which matters for how welfare and disability benefit systems are calibrated.", "quote": null, "locator": "How's everyone feeling?", "quote_verified": false}, {"claim": "Ben Baumberg Geiger suggests the divergence between rising distress and flat activity limitations may partly reflect pressures towards medicalisation, including welfare and employment systems that require people to identify as 'sick' to access needed support, or a broader cultural shift toward viewing mental distress as a long-term condition.", "speaker": "Resolution Foundation", "type": "causal", "entities": ["Ben Baumberg Geiger"], "conviction": "medium", "so_what": "If welfare-system incentives are inflating measured mental illness rates, that has direct implications for how policymakers interpret disability and incapacity benefit caseload growth.", "quote": null, "locator": "How's everyone feeling?", "quote_verified": false}, {"claim": "John Burn-Murdoch observes that different groups of people label the same behaviour or symptoms very differently, particularly along generational lines, with young people much more likely than older people to identify psychological distress as a symptom of a long-term condition.", "speaker": "Resolution Foundation", "type": "framework", "entities": ["John Burn-Murdoch", "Ben Baumberg Geiger"], "conviction": "medium", "so_what": "A generational shift in how symptoms are labeled could be driving apparent trends in youth mental health statistics independent of any change in underlying prevalence.", "quote": "different groups of people label the same behaviour or symptoms very differently", "locator": "How's everyone feeling?", "quote_verified": true}, {"claim": "Both Ben Baumberg Geiger and John Burn-Murdoch agree the rise in reported psychological distress is real, but Geiger cautions that more research is needed before the cause can be considered definitive.", "speaker": "Resolution Foundation", "type": "exploratory", "entities": ["Ben Baumberg Geiger", "John Burn-Murdoch"], "conviction": "low", "so_what": "The causal story behind UK mental-health trend data remains unsettled, so policy or market conclusions drawn from it should be held loosely pending further research.", "quote": "sigh – more research is needed", "locator": "How's everyone feeling?", "quote_verified": true}]}, {"theme": "Demographic ageing and regional policy trade-offs (Japan)", "insights": [{"claim": "Japan's national population aged 65 and over is projected to reach 37 per cent by 2050, but some rural municipalities already have elderly population shares approaching 50 per cent, while large cities remain younger and denser.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Japan", "Tokyo"], "conviction": "high", "so_what": "Illustrates how population ageing is spatially concentrated rather than uniform, a pattern relevant to any country (including the UK) weighing place-based demographic and fiscal policy.", "quote": null, "locator": "Ghost towns", "quote_verified": false}, {"claim": "New research on Japan finds younger people are moving to Tokyo to have their children rather than staying in or returning to the rural areas they came from, accelerating rural depopulation.", "speaker": "Resolution Foundation", "type": "causal", "entities": ["Japan", "Tokyo"], "conviction": "medium", "so_what": "Urban migration of young families is a self-reinforcing driver of rural decline that place-based policy would need to directly counteract, not just subsidize.", "quote": null, "locator": "Ghost towns", "quote_verified": false}, {"claim": "Modelling in the Japan research shows a 5 per cent income transfer targeted at the oldest prefectures could nearly double their population by 2065 by slowing the hollowing-out of rural areas.", "speaker": "Resolution Foundation", "type": "prediction", "entities": ["Japan"], "conviction": "medium", "so_what": "Quantifies how large a fiscal transfer would need to be to meaningfully reverse rural depopulation, a benchmark for evaluating similarly-aimed UK 'levelling up' style policies.", "quote": null, "locator": "Ghost towns", "quote_verified": false}, {"claim": "The same Japan modelling finds that income transfers large enough to nearly double rural prefecture populations by 2065 would also lower labour income per capita by more than 1 per cent and raise fiscal spending per capita by about 0.5 per cent, implying that policies aiming to raise growth in every locality ('every postcode') carry real costs as well as benefits.", "speaker": "Resolution Foundation", "type": "contrarian", "entities": ["Japan"], "conviction": "medium", "so_what": "A caution against assuming place-based regional levelling-up policy is a free lunch; investors and policymakers evaluating UK regional investment programs should weight these efficiency costs.", "quote": null, "locator": "Ghost towns", "quote_verified": false}]}, {"theme": "Gender gap in inheritance and gifts", "insights": [{"claim": "Analysis of more than four decades of German data finds women lose out on inheritance and gifts relative to men, with men receiving larger gifts and about €12,000 more in overall transfers.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Germany"], "conviction": "high", "so_what": "Documents a persistent, multi-decade gender gap in intergenerational wealth transfers that compounds other sources of the gender wealth gap.", "quote": null, "locator": "Herr apparent", "quote_verified": false}, {"claim": "In West Germany specifically, younger women receive €22,000 less in inheritances and €31,000 less in gifts than their male counterparts.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Germany"], "conviction": "high", "so_what": "Regional (West vs East Germany) variation in the gender transfer gap points to lingering cultural/institutional legacy effects worth isolating in any policy response.", "quote": null, "locator": "Herr apparent", "quote_verified": false}, {"claim": "The authors of the German inheritance study attribute the gender gap in transfers to persistent gendered family norms in West Germany, such as sons being viewed as custodians of familial wealth.", "speaker": "Resolution Foundation", "type": "causal", "entities": ["Germany"], "conviction": "medium", "so_what": "Cultural norms rather than purely economic factors are identified as a driver, meaning the gap may persist even as income inequality narrows.", "quote": null, "locator": "Herr apparent", "quote_verified": false}, {"claim": "Inheritances and gifts are found to contribute 7 per cent to the overall gender wealth gap in Germany; separately, Resolution Foundation's own UK research has shown high-income young people receive larger gifts earlier in life than low-income young people, meaning both gender and income inequality compound intergenerational wealth imbalances via transfers.", "speaker": "Resolution Foundation", "type": "data_point", "entities": ["Germany", "Resolution Foundation"], "conviction": "medium", "so_what": "As inheritance and lifetime gifting play a growing role in wealth accumulation, closing gender gaps in transfers becomes a distinct policy lever separate from closing income gaps.", "quote": null, "locator": "Herr apparent", "quote_verified": false}]}], "insight_total": 22, "top_entities": ["Resolution Foundation", "Office for Budget Responsibility (OBR)", "Andy Burnham", "British Muslim Trust", "British Future", "Fairness Foundation", "Ben Baumberg Geiger", "John Burn-Murdoch", "Japan", "Germany"], "source_meta": {"author": "Resolution Foundation", "word_count": 1223, "paywalled": false}}, {"record_id": "15702369bd9889a7", "source_type": "society", "source_name": "Marginal Revolution - Tyler Cowen", "source_url": "https://marginalrevolution.com/marginalrevolution/2026/07/governing-agentic-ai.html", "title": "Governing agentic AI - Marginal REVOLUTION", "published_date": "2026-07-16", "language": "en", "processed_at": "2026-07-20T13:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Society"], "gist": "A new paper by Shruti Rajagopalan argues AI-agent liability should be solved not through legal personhood but through a six-layer registration/verification/suspension stack modeled on aircraft and driverless-car regulation, since existing liability doctrines collapse when no human responsibility-bearer can be identified.", "themes": [{"theme": "Personhood is the wrong frame for AI liability", "insights": [{"claim": "A new paper by Shruti Rajagopalan argues that granting AI agents legal personhood is neither necessary nor sufficient to solve the liability problem posed by autonomous AI agents, reframing the debate from what legal status AI should have to how responsibility is enforced.", "speaker": "Tyler Cowen", "type": "thesis", "entities": ["Shruti Rajagopalan", "AI agents", "legal personhood"], "conviction": "high", "so_what": "Investors betting on an 'AI personhood' regulatory narrative should note the leading academic framing rejects that path in favor of enforcement infrastructure instead.", "quote": "This Article argues that personhood is neither necessary nor sufficient, shifting the question from status to enforcement.", "locator": "This Article argues that personhood", "quote_verified": true}, {"claim": "Agentic AI inverts the traditional design of legal personhood because it transacts, publishes, and acts on external systems without contemporaneous human approval, sometimes with no identifiable human in the responsibility-bearing role.", "speaker": "Tyler Cowen", "type": "thesis", "entities": ["AI agents"], "conviction": "high", "so_what": "Identifies the core regulatory gap that will drive AI-liability legislation and new insurance products for agentic AI deployments.", "quote": "AI agents now transact, publish, and act on external systems without contemporaneous human approval, creating new regulatory challenges.", "locator": "opening paragraph", "quote_verified": true}, {"claim": "Simply granting AI agents bare legal personhood would fail because it would create a legal caption with no representative, no assets, and no mechanism for cessation behind it.", "speaker": "Tyler Cowen", "type": "contrarian", "entities": ["AI agents", "legal personhood"], "conviction": "high", "so_what": "Undercuts simple 'give AI legal personhood' policy proposals as a workable liability solution for investors tracking AI regulation.", "quote": "Bare personhood would supply a caption without a representative, assets, or a mechanism for cessation.", "locator": "Bare personhood would supply", "quote_verified": true}]}, {"theme": "Historical precedent for nonhuman legal persons", "insights": [{"claim": "For two millennia, nonhuman legal entities -- from the Roman universitas to modern corporations, the Hindu idol, the waqf, and even legally personified rivers -- have functioned only because a human officeholder could be located, questioned, prosecuted, or replaced.", "speaker": "Tyler Cowen", "type": "framework", "entities": ["corporation", "Hindu idol", "waqf"], "conviction": "high", "so_what": "Frames the core design requirement any workable AI liability regime must replicate: a locatable, accountable human backstop.", "quote": null, "locator": "for two millennia, nonhuman legal personality", "quote_verified": false}]}, {"theme": "Existing liability doctrine breaks down without a responsibility-bearer", "insights": [{"claim": "The paper sorts agentic AI deployments into three categories by responsibility structure: a single firm that both builds and deploys the agent; a separate but known developer and deployer; and deployments with no identifiable developer or deployer at all.", "speaker": "Tyler Cowen", "type": "framework", "entities": ["AI agents", "developers", "deployers"], "conviction": "high", "so_what": "A usable taxonomy for assessing which AI companies carry more or less legal exposure depending on their deployment structure.", "quote": null, "locator": "The Article then sorts deployments into three categories", "quote_verified": false}, {"claim": "Stress-testing five existing liability doctrines -- agency law, products liability, enterprise liability, negligence, and strict liability -- against each AI deployment category shows all five fail in the third category, where no developer or deployer can be identified, because there is no responsibility-bearer to hold liable.", "speaker": "Tyler Cowen", "type": "causal", "entities": ["agency law", "products liability", "negligence", "strict liability"], "conviction": "high", "so_what": "Signals a coming legal vacuum for decentralized or fully autonomous AI agent deployments that current tort and liability frameworks cannot fill -- a target area for new compliance and insurance products.", "quote": null, "locator": "stress tests each agent deployment category", "quote_verified": false}]}, {"theme": "A six-layer alternative to personhood", "insights": [{"claim": "As an alternative to personhood, the paper proposes a six-layer governance stack for agentic AI -- registration, identification, verification, financial responsibility, lifecycle traceability, and suspension -- modeled on existing regimes for aircraft, ships, drones, driverless cars, and motor carriers.", "speaker": "Tyler Cowen", "type": "framework", "entities": ["aircraft", "drones", "driverless cars", "motor carriers"], "conviction": "high", "so_what": "A concrete regulatory template to watch for in upcoming AI-agent legislation; its components map to emerging compliance business opportunities such as agent identity verification, financial-responsibility bonding, and lifecycle logging.", "quote": null, "locator": "It develops a six-layer stack", "quote_verified": false}]}, {"theme": "A new research frontier", "insights": [{"claim": "Tyler Cowen views this line of inquiry into AI agent governance as opening a genuinely new frontier for social science and hopes the field expands in response.", "speaker": "Tyler Cowen", "type": "thesis", "entities": ["Tyler Cowen", "AI agents"], "conviction": "medium", "so_what": "Signals a leading economist expects growing academic and policy attention -- and eventually capital -- to flow into AI-agent governance research.", "quote": "I would say that social science now has new frontiers, let us hope it blossoms in response.", "locator": "closing line", "quote_verified": true}]}], "insight_total": 8, "top_entities": ["AI agents", "Shruti Rajagopalan", "legal personhood", "agency law", "products liability", "corporation", "driverless cars", "Tyler Cowen"], "source_meta": {"author": "Tyler Cowen", "word_count": 274, "paywalled": false}}, {"record_id": "287f3915ea6ec3e1", "source_type": "society", "source_name": "World Bank Blogs", "source_url": "https://blogs.worldbank.org/en/team/m/mahamat-idriss-deby-itno0", "title": "Mahamat Idriss Déby Itno", "published_date": "2026-07-16", "language": "en", "processed_at": "2026-07-20T13:01:58Z", "processor": "claude-code-sub-opus", "tags": ["Geopolitics", "Society"], "gist": "World Bank bio page tracing Chad's president Mahamat Idriss Déby Itno's path from military officer to head of a post-2021 Transitional Military Council, formed after his father's death outside the constitutional line of succession, to elected president in May 2024.", "themes": [{"theme": "Chad's military-to-electoral succession", "insights": [{"claim": "After Marshal Idriss Déby Itno died in April 2021 during military operations in northern Chad, his son Mahamat Idriss Déby Itno was appointed head of a Transitional Military Council after the President of the National Assembly declined to assume the constitutional interim presidency.", "speaker": "World Bank Blogs", "type": "data_point", "entities": ["Chad", "Mahamat Idriss Déby Itno", "Idriss Déby Itno", "Transitional Military Council"], "conviction": "high", "so_what": "A de facto military succession that bypassed the formal constitutional line is a political-risk marker for Chad, relevant to sovereign creditworthiness and investment-climate assessments.", "quote": null, "locator": "Following the death of Marshal Idriss Déby Itno in April 2021", "quote_verified": false}, {"claim": "Mahamat Idriss Déby Itno was elected President of the Republic of Chad in May 2024 following a presidential election, converting a roughly three-year military transition into an electoral mandate that he has held since.", "speaker": "World Bank Blogs", "type": "data_point", "entities": ["Chad", "Mahamat Idriss Déby Itno"], "conviction": "high", "so_what": "The electoral conversion of a military transition is a legitimacy marker worth tracking for Chad's standing with donors and regional partners.", "quote": null, "locator": "In May 2024, following a presidential election", "quote_verified": false}, {"claim": "Before becoming president, Mahamat Idriss Déby Itno rose through the presidential guard and reached the rank of General of the Army in 2021, and led Chadian Armed Forces operations in Mali, for which he received official national recognition.", "speaker": "World Bank Blogs", "type": "anecdote", "entities": ["Chad", "Mahamat Idriss Déby Itno", "Mali", "Chadian Armed Forces"], "conviction": "medium", "so_what": "Chad's military leadership has direct operational ties to Sahel security operations (Mali), relevant to regional security-risk mapping.", "quote": null, "locator": "He has also distinguished himself on the international stage", "quote_verified": false}]}], "insight_total": 3, "top_entities": ["Chad", "Mahamat Idriss Déby Itno", "Idriss Déby Itno", "Mali", "Transitional Military Council", "Chadian Armed Forces"], "source_meta": {"author": "World Bank Blogs", "word_count": 223, "paywalled": false}}, {"record_id": "390d56782d9103f8", "source_type": "society", "source_name": "World Bank Blogs", "source_url": "https://blogs.worldbank.org/en/trade/chart-trucking-goods-across-africa", "title": "Trade and Development Chart: Trucking goods across Africa", "published_date": "2026-07-15", "language": "en", "processed_at": "2026-07-20T13:01:58Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Society"], "gist": "The World Bank's Services Trade Restrictions Index shows road-freight regulation varies sharply across Africa, and because trade corridors cross multiple jurisdictions, a single highly restrictive country (e.g. Zambia, Mali, Libya) can choke an entire corridor even when its neighbors are open.", "themes": [{"theme": "STRI as a corridor-level constraint, not just a country metric", "insights": [{"claim": "One country with a highly restrictive regulatory regime for road freight services can limit the trade benefits of an entire transport corridor, even when neighboring countries in that corridor are relatively open.", "speaker": "World Bank Blogs", "type": "framework", "entities": ["Services Trade Restrictions Index", "Africa", "road freight"], "conviction": "high", "so_what": "Corridor-level trade-facilitation analysis must weight the single most restrictive link, not the corridor average — a useful screen for logistics and infrastructure investment risk in Africa.", "quote": "One country with a highly restrictive regulatory regime (high STRI) can limit the benefits of an entire corridor.", "locator": "Africa's regulatory barriers to trade in road freight services vary widely", "quote_verified": true}, {"claim": "Open and restrictive road-freight regulatory regimes in Africa often coexist within the same regional economic communities, share land borders, and depend on the same transport corridors.", "speaker": "World Bank Blogs", "type": "thesis", "entities": ["Africa", "regional economic communities"], "conviction": "high", "so_what": "Regional bloc membership (e.g. AfCFTA-adjacent communities) does not guarantee harmonized trade-facilitation policy — a structural friction point for pan-African logistics investment theses.", "quote": null, "locator": "The result is a continent where open and restrictive economies", "quote_verified": false}]}, {"theme": "Regulatory barrier types", "insights": [{"claim": "Regulatory barriers facing road transport drivers crossing African borders include cabotage restrictions, limits on the number of days a driver can stay in a transit country, and in some instances a total prohibition on providing freight services.", "speaker": "World Bank Blogs", "type": "data_point", "entities": ["road freight", "cabotage", "Africa"], "conviction": "high", "so_what": "These are concrete, addressable policy levers — trade-facilitation reforms targeting cabotage and transit-day limits would have outsized corridor impact.", "quote": null, "locator": "There can be regulatory obstacles to driving freight across Africa", "quote_verified": false}]}, {"theme": "Most and least restrictive regimes", "insights": [{"claim": "Algeria, Cameroon, Guinea, Lesotho, Libya, Mali, and Zambia record the highest Services Trade Restrictions Index scores for road freight services in Africa, signaling the most restrictive regulatory regimes.", "speaker": "World Bank Blogs", "type": "data_point", "entities": ["Algeria", "Cameroon", "Guinea", "Lesotho", "Libya", "Mali", "Zambia"], "conviction": "high", "so_what": "These seven countries are the highest-friction nodes for African road-freight logistics — a screening list for identifying corridor bottlenecks.", "quote": null, "locator": "Algeria, Cameroon, Guinea, Lesotho, Libya, Mali and Zambia record the highest indices", "quote_verified": false}, {"claim": "Kenya, Morocco, Nigeria, South Africa, and several West African economies maintain relatively open road freight services regimes, reflected in low Services Trade Restrictions Index scores.", "speaker": "World Bank Blogs", "type": "data_point", "entities": ["Kenya", "Morocco", "Nigeria", "South Africa"], "conviction": "high", "so_what": "These are the more logistics-friendly jurisdictions in Africa for road-freight-dependent supply chains and investment.", "quote": null, "locator": "Kenya, Morocco, Nigeria, South Africa, and several West African economies", "quote_verified": false}]}, {"theme": "Corridor case studies", "insights": [{"claim": "The North-South Corridor connects relatively open South Africa and Zimbabwe with relatively closed Zambia, illustrating how one restrictive link can shape an entire trade route's effectiveness.", "speaker": "World Bank Blogs", "type": "causal", "entities": ["North-South Corridor", "South Africa", "Zimbabwe", "Zambia"], "conviction": "high", "so_what": " // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#be185d', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
