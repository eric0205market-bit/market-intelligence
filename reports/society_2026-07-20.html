ype": "causal", "entities": ["France", "public debt", "interest rates"], "conviction": "high", "so_what": "Directly links the higher-rate macro environment to rising political risk around sovereign debt and redistribution in France and comparable advanced economies — relevant to European sovereign bond and political-risk positioning.", "quote": "now that higher interest rates have made public debt increasingly burdensome, less sustainable, and more politically explosive", "locator": "PRINCETON—In a new polemic", "quote_verified": true}]}], "insight_total": 4, "top_entities": ["France", "Julia Cagé", "Thomas Piketty", "Sciences Po", "Paris School of Economics", "public debt", "Harold James"], "source_meta": {"author": "HAROLD JAMES", "word_count": 184, "paywalled": false}}, {"record_id": "cefb5187c46acfeb", "source_type": "society", "source_name": "Prospect Magazine", "source_url": "https://www.prospectmagazine.co.uk/world/united-states/74075/polymarket-is-america-america-is-polymarket-trump-250", "title": "Polymarket is America, America is Polymarket", "published_date": "2026-07-15", "language": "en", "processed_at": "2026-07-20T12:59:54Z", "processor": "claude-code-sub-opus", "tags": ["Crypto", "Geopolitics", "Positioning", "Society", "Tech"], "gist": "Polymarket's US trading volume quadrupled from $50m to $200m a day between May and June 2026 after regaining CFTC approval, but a Prospect analysis of its own market data and a string of insider-trading-adjacent scandals suggest its 'accuracy' claims are overstated and its ties to the Trump family create structural conflicts of interest.", "themes": [{"theme": "Polymarket's explosive, Trump-linked growth", "insights": [{"claim": "Polymarket's US exchange trading volume rose fourfold, from $50m a day to $200m a day, between May and June 2026.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket"], "conviction": "high", "so_what": "A concrete, recent inflection in usage post-US-relaunch — the growth curve, not just the concept, is the tradeable signal.", "quote": "The volume of trades made on its US exchange rose fourfold, from $50m a day to $200m, between May and June this year.", "locator": "Post no bills", "quote_verified": true}, {"claim": "Polymarket was only allowed to return to the US in 2025 after gaining CFTC regulatory approval, and that return is what has driven its recent growth surge; its latest formal valuation in October 2025 was $9bn.", "speaker": "Peter Hoskin", "type": "causal", "entities": ["Polymarket", "CFTC"], "conviction": "high", "so_what": "Regulatory approval, not organic demand alone, is the growth trigger — watch CFTC posture as the key swing factor for the whole prediction-market sector.", "quote": null, "locator": "it was only in 2025 that it was allowed to return to the US", "quote_verified": false}, {"claim": "Polymarket raised $45m in a May 2024 round led by Peter Thiel's Founders Fund, before it was legally able to operate in the US.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "Peter Thiel", "Founders Fund"], "conviction": "high", "so_what": "Elite VC backing pre-dated regulatory clearance, signaling investors bet on the regulatory environment shifting favorably under a Trump administration.", "quote": null, "locator": "including $45m in a May 2024 investment round", "quote_verified": false}, {"claim": "Donald Trump Jr has sat on Polymarket's advisory board since his firm, 1789 Capital, made a 'double-digit millions of dollars' investment in August 2025, and he is separately a 'strategic advisor' to competitor Kalshi.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Donald Trump Jr", "1789 Capital", "Polymarket", "Kalshi"], "conviction": "high", "so_what": "The same family figure sits on both leading platforms' boards, a direct conflict-of-interest structure that likely shaped the administration's favorable regulatory treatment of the sector.", "quote": null, "locator": "Donald Trump Jr has sat on Polymarket's advisory board", "quote_verified": false}, {"claim": "Mark Zuckerberg has tasked Meta with building a prediction-markets app, provisionally named 'Arena', reviving an earlier abortive 2020 attempt called 'Forecast'; it would initially use a video-game-like points system rather than real money.", "speaker": "Peter Hoskin", "type": "prediction", "entities": ["Meta", "Mark Zuckerberg", "Polymarket", "Kalshi"], "conviction": "medium", "so_what": "A Meta entrant would bring prediction markets to a vastly larger user base and could commoditize the category or squeeze independent platforms' growth.", "quote": "would probably rely on a video-game-like points system instead", "locator": "In June, the New York Times reported", "quote_verified": true}, {"claim": "Almost half of Polymarket's current events relate to sports, raising unresolved state-by-state US gambling-regulation conflicts since the platform is accessible to anyone over 18 while sports betting is typically restricted to 21+.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket"], "conviction": "medium", "so_what": "A material regulatory overhang: state-level gambling law could still constrain or reshape Polymarket's largest category.", "quote": null, "locator": "how do they handle a platform that's dressed up", "quote_verified": false}]}, {"theme": "Prediction markets' academic and regulatory history", "insights": [{"claim": "The Iowa Political Stock Market, launched by University of Iowa economists in the late 1980s to predict the 1988 presidential election, outperformed major pollsters including Gallup and Harris, and its successor, the Iowa Electronic Markets, has continued to do so in subsequent elections.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Iowa Political Stock Market", "Iowa Electronic Markets"], "conviction": "high", "so_what": "The original academic case for prediction markets rests on real, decades-long outperformance versus polling — the underlying mechanism is not junk, even if today's platforms distort it.", "quote": null, "locator": "The Iowa Political Stock Market outperformed major pollsters", "quote_verified": false}, {"claim": "DARPA's Policy Analysis Market (PAM), designed with economist Robin Hanson to let analysts bet on geopolitical events including assassinations and coups in Middle Eastern countries, was killed by Congress in 2003 after senators Byron Dorgan and Ron Wyden called it 'morally repugnant'.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["DARPA", "Robin Hanson", "Byron Dorgan", "Ron Wyden"], "conviction": "high", "so_what": "Political backlash, not economic failure, has historically been the binding constraint on prediction markets for sensitive events — a recurring risk for today's platforms as they price assassinations and wars.", "quote": "morally repugnant", "locator": "in 2003, Pam was strangled", "quote_verified": true}, {"claim": "Robin Hanson has developed the concept of 'futarchy' — governance that combines democratic voting on values with prediction-market forecasting on which policies best achieve them — and Polymarket founder Shayne Coplan was an early adherent who once wrote to Hanson expressing support.", "speaker": "Peter Hoskin", "type": "framework", "entities": ["Robin Hanson", "Shayne Coplan", "Polymarket"], "conviction": "medium", "so_what": "Polymarket's founding ideology was explicitly utopian/governance-oriented, useful context for evaluating gaps between its stated mission and its current gambling-heavy reality.", "quote": "could we give people more direct, better incentives to actually tell the truth and figure out the truth", "locator": "In a podcast interview in 2021", "quote_verified": true}, {"claim": "Early 2000s prediction-market firms HedgeStreet and Intrade fell into regulatory limbo between financial-instrument and gambling law, and regulation tightened further after the 2008 financial crash, delaying the sector's mainstream emergence until 2020.", "speaker": "Peter Hoskin", "type": "causal", "entities": ["HedgeStreet", "Intrade"], "conviction": "medium", "so_what": "Regulatory clarity, more than technology, has been the gating factor for the category's growth — today's favorable US stance is the real unlock.", "quote": null, "locator": "these early-moving firms often fell foul", "quote_verified": false}, {"claim": "Kalshi became the first major modern player by registering as a CFTC-regulated 'contract market' in 2020, while Polymarket launched the same year as an unregulated, blockchain-based alternative funded and built by 22-year-old founder Shayne Coplan.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Kalshi", "Polymarket", "Shayne Coplan", "CFTC"], "conviction": "high", "so_what": "Two structurally different entrants (regulated vs. crypto-native) both emerged in 2020, framing the current competitive duopoly and its differing regulatory exposure.", "quote": null, "locator": "That year, one of two new big players", "quote_verified": false}, {"claim": "The CFTC fined Polymarket $1.4m in 2022 for running an unsanctioned trading platform and effectively banned it from the US until it achieved regulatory compliance, a ban that lasted until 2025.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "CFTC"], "conviction": "high", "so_what": "The platform has a track record of regulatory violation preceding its current favorable treatment — a reversal worth watching for durability risk.", "quote": "All derivatives markets must operate within the bounds of the law regardless of the technology used", "locator": "The CFTC fined Polymarket $1.4m in 2022", "quote_verified": true}, {"claim": "As of the article's writing, the Wall Street Journal reported a source saying the CFTC is 'in the midst of a continuing investigation into Polymarket', despite the platform's recent favorable regulatory treatment.", "speaker": "Peter Hoskin", ding a month before closure called the outcome correctly only 81% of the time — well below the platform's own 94%+ claim.", "speaker": "Peter Hoskin", "type": "data_point", "entities": ["Polymarket", "Prospect"], "conviction": "high", "so_what": "An independent, methodologically comparable benchmark (81% vs. claimed 94%+) is the concrete number to cite when discounting Polymarket's marketing claims.", "quote": null, "locator": "A Prospect analysis of almost 7,000 markets", "quote_verified": false}, {"claim": "A week before the assassination of Ayatollah Ali Khamenei on 28 February in a US-Israeli assault, a Polymarket market titled 'Khamenei out as Supreme Leader of Iran by February 28?' priced the probability at just 2%.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["Polymarket", "Ali Khamenei", "Iran"], "conviction": "high", "so_what": "A concrete high-profile miss undercuts the 'wisdom of crowds' narrative for tail-risk geopolitical events specifically — exactly the events investors most want forecast.", "quote": "Khamenei out as Supreme Leader of Iran by February 28?", "locator": "a week before the assassination of Ayatollah Ali Khamenei", "quote_verified": true}, {"claim": "A Polymarket market asking 'Will Jesus Christ return before 2027?' has had $64m in volume pushed through it, with the implied probability just over 2%, illustrating that large sums flow into markets with no informational basis.", "speaker": "Peter Hoskin", "type": "contrarian", "entities": ["Polymarket"], "conviction": "medium", "so_what": "Large trading volume is not proof of informational value — a caution against treating Polymarket price levels as inherently meaningful signal.", "quote": "Will Jesus Christ return before 2027?", "locator": "Among Polymarket's current markets is one", "quote_verified": true}]}, {"theme": "Insider information and market integrity risk", "insights": [{"claim": "An anonymous French investor (the 'French whale') bet roughly $80m on Trump defeat sure the platform has no mechanism to police.", "quote": "The entire squadron is on Polymarket, the entire air force is betting.", "locator": "An Israeli Air Force crew member who was questioned", "quote_verified": true}, {"claim": "Polymarket's resolution of the 'Will Zelenskyy wear a suit before July?' market — ruling that a black jacket-and-trousers outfit widely described as a suit by media and its own designer was not a suit under an outside blockchain dispute-resolution process — shifted millions of dollars based on a subjective judgment call.", "speaker": "Peter Hoskin", "type": "anecdote", "entities": ["Polymarket", "Volodymyr Zelensky"], "conviction": "high", "so_what": "Shows resolution-source subjectivity is itself a trading risk on ambiguous real-world questions, independent of any informational edge.", "quote": "Will Zelenskyy wear a suit before July?", "locator": "Then there was the incident of Zelensky's suit", "quote_verified": true}]}], "insight_total": 22, "top_entities": ["Polymarket", "Kalshi", "CFTC", "Donald Trump Jr", "Shayne Coplan", "Peter Thiel", "Founders Fund", "Meta", "Mark Zuckerberg", "Robin Hanson", "DARPA"], "source_meta": {"author": "Peter Hoskin", "word_count": 3148, "paywalled": false}}, {"record_id": "df86130b7ab28c10", "source_type": "society", "source_name": "Prospect Magazine", "source_url": "https://www.prospectmagazine.co.uk/views/lives/74101/rural-life-i-will-no-longer-be-ashamed-of-being-materialistic", "title": "Rural life: I will no longer be ashamed of being materialistic", "published_date": "2026-07-15", "language": "en", "processed_at": "2026-07-20T12:59:54Z", "processor": "claude-code-sub-opus", "tags": ["Society"], "gist": "A personal essay arguing that treasured possessions, not just people and places, constitute part of one's sense of 'home', reframing materialism as a legitimate emotional anchor rather than something to be ashamed of.", "themes": [{"theme": "Redefining home beyond place and people", "insights": [{"claim": "The author, who moved from London to rural Wales, came to realize she has 'many homes' after noticing that a longing for her own possessions (artwork, furniture), not just place, drove her feeling of wanting to be home after travel.", "speaker": "Kiran Sidhu", "type": "thesis", "entities": [], "conviction": "medium", "so_what": "Illustrates a broader cultural shift toward treating personal possessions as identity-anchors rather than mere consumption — relevant to how brands and products are marketed around 'belonging' and self-expression.", "quote": null, "locator": "All that travel led me to realise something", "quote_verified": false}, {"claim": "The author argues that prevailing social norms pressure people to minimize the emotional importance of possessions ('what's a guitar or a picture compared with our friendships and family relationships?'), and that this norm is worth resisting.", "speaker": "Kiran Sidhu", "type": "contrarian", "entities": [], "conviction": "medium", "so_what": "A window into a recurring cultural tension between minimalism/anti-materialism messaging and genuine attachment to objects — relevant to consumer psychology narratives.", "quote": "In order not to be considered materialistic, we are not supposed to think that our possessions are worth much in the grand scheme of things", "locator": "In order not to be considered materialistic", "quote_verified": true}, {"claim": "The author's friend Damian, a musician, described his sense of home as being 'among his eight guitars', which the author uses as the anecdote that reframed her own thinking about possessions and identity.", "speaker": "Kiran Sidhu", "type": "anecdote", "entities": [], "conviction": "low", "so_what": "A specific, human illustration of how professional/creative tools can become identity-defining possessions, not just utilitarian assets.", "quote": null, "locator": "He said he was looking forward to being among his eight guitars", "quote_verified": false}, {"claim": "The author treated sharing a curated box of personal objects (a painting, an embossed mirror, a candlestick, and specific books including Sartre's Existentialism and Humanism) with a new romantic partner as a relationship-defining test of compatibility before he had met her friends or family.", "speaker": "Kiran Sidhu", "type": "anecdote", "entities": [], "conviction": "low", "so_what": "A concrete example of possessions being used as a proxy for emotional intimacy and vetting compatibility, ahead of traditional social introductions.", "quote": null, "locator": "When I first started dating the man who would become my husband", "quote_verified": false}, {"claim": "The author concludes that inanimate objects are not merely decorative but can function as psychological anchors that 'lead us back to ourselves' when things feel senseless, framing her own house as 'a museum dedicated to me.'", "speaker": "Kiran Sidhu", "type": "framework", "entities": [], "conviction": "medium", "so_what": "A framework for understanding consumer attachment to objects as identity-maintenance rather than pure acquisitiveness.", "quote": "The house that I live in is a museum dedicated to me.", "locator": "Inanimate objects aren't always just decorative", "quote_verified": true}]}], "insight_total": 5, "top_entities": ["Kiran Sidhu"], "source_meta": {"author": "Kiran Sidhu", "word_count": 811, "paywalled": false}}, {"record_id": "f39008ad5e241199", "source_type": "society", "source_name": "Resolution Foundation", "source_url": "https://www.resolutionfoundation.org/comment/the-balance-of-power/", "title": "The balance of power", "published_date": "2026-07-17", "language": "en", "processed_at": "2026-07-20T12:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Macro"], "gist": "Resolution Foundation's weekly research roundup argues the UK's fiscal framework has been chronically too loose (the OBR has wrongly projected budget balance in 23 of 31 forecasts), while also surveying r // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#be185d', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
