let activeSrc = null;

function getColor(cat){return CAT_COLORS[cat]||'#888';}
function urgEmoji(u){return u==='act'?'🔴':u==='deep'?'🔵':'🟡';}
function urgLabel(u){return u==='act'?'🔴 Act Now':u==='deep'?'🔵 Deep':'🟡 Watch';}

function copyTweet(itemId, which){
  var item = ITEMS.find(function(i){return i.id===itemId;});
  var text = which==='a'?item.tweetA:item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent='✓ Copied';
  setTimeout(function(){btn.textContent='📋 Copy';},1500);
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  updatePills();
  renderCards();
}

function setCat(cat){activeCat=cat;activeSrc=null;renderCards();updatePills();}
function setUrg(urg){activeUrg=urg;activeSrc=null;renderCards();updatePills();}

function visibleItems(){
  return ITEMS.filter(function(item){
    if(activeSrc && item.source.indexOf(activeSrc)<0) return false;
    if(activeCat!=='all' && item.cat!==activeCat) return false;
    if(activeUrg!=='all' && item.urgency!==activeUrg) return false;
    return true;
  });
}

function updatePills(){
  document.querySelectorAll('.pill[data-cat]').forEach(function(p){
    p.classList.toggle('active', p.dataset.cat===activeCat && !activeSrc);
    if(p.classList.contains('active')){p.style.background=getColor(p.dataset.cat)||'#555';p.style.borderColor='transparent';}
    else{p.style.background='';p.style.borderColor='';}
  });
  document.querySelectorAll('.pill[data-urg]').forEach(function(p){
    p.classList.toggle('active', p.dataset.urg===activeUrg && !activeSrc);
    if(p.classList.contains('active')){p.style.background='#444';p.style.borderColor='transparent';}
    else{p.style.background='';p.style.borderColor='';}
  });
}

function buildFilters(){
  // Category bar
  var catBar = document.getElementById('cat-bar');
  var sp = document.createElement('span');
  sp.className='pill-label';sp.textContent='Category';
  catBar.appendChild(sp);

  var allPill = document.createElement('button');
  allPill.className='pill active';allPill.textContent='All';
  allPill.dataset.cat='all';
  allPill.style.background='#444';allPill.style.borderColor='transparent';allPill.style.color='#fff';
  allPill.onclick=function(){setCat('all');};
  catBar.appendChild(allPill);

  var cats = {};
  ITEMS.forEach(function(i){cats[i.cat]=(cats[i.cat]||0)+1;});
  Object.keys(cats).sort().forEach(function(cat){
    var p = document.createElement('button');
    p.className='pill';p.dataset.cat=cat;
    p.textContent=cat+' ('+cats[cat]+')';
    p.style.borderColor=getColor(cat);p.style.color=getColor(cat);
    p.onclick=function(){setCat(cat);};
    catBar.appendChild(p);
  });

  // Urgency bar
  var urgBar = document.getElementById('urg-bar');
  var sp2 = document.createElement('span');
  sp2.className='pill-label';sp2.textContent='Urgency';
  urgBar.appendChild(sp2);

  [['all','All'],['act','🔴 Act Now'],['deep','🔵 Deep'],['watch','🟡 Watch']].forEach(function(pair){
    var p = document.createElement('button');
    p.className='pill'+(pair[0]==='all'?' active':'');
    p.dataset.urg=pair[0];
    p.textContent=pair[1]+' ('+(pair[0]==='all'?ITEMS.length:ITEMS.filter(function(i){return i.urgency===pair[0];}).length)+')';
    if(pair[0]==='all'){p.style.background='#444';p.style.borderColor='transparent';p.style.color='#fff';}
    p.onclick=function(){setUrg(pair[0]);};
    urgBar.appendChild(p);
  });
}

function renderCards(){
  var container = document.getElementById('cards-container');
  var items = visibleItems();
  container.innerHTML='';
  if(items.length===0){
    var d=document.createElement('div');d.className='no-results';
    d.textContent='No items match the current filters.';
    container.appendChild(d);return;
  }
  items.forEach(function(item){
    var card = document.createElement('div');
    card.className='card';
    var color = getColor(item.cat);
    var chartIcon = item.charts.count>0?(item.charts.hot?' 🔥':'  📊'):'';
    card.innerHTML = '<div class="card-header" onclick="toggleCard('+item.id+')">'
      +'<span class="item-num">#'+item.id+'</span>'
      +'<span class="urgency">'+urgEmoji(item.urgency)+'</span>'
      +'<span class="source-badge" style="background:'+color+'">'+item.source.split(' /')[0]+'</span>'
      +'<span class="cat-tag">'+item.cat+'</span>'
      +(chartIcon?'<span class="chart-icon">'+chartIcon+'</span>':'')
      +'<span class="card-title">'+item.title+'</span>'
      +'</div>'
      +'<div class="card-body" id="body-'+item.id+'">'
      +'<div class="section-label">The Idea</div>'
      +'<div class="idea-text">'+item.idea+'</div>'
      +'<div class="angle-block" style="border-color:'+color+';background:'+color+'11">'+item.angle+'</div>'
      +'<div class="section-label">Tweets</div>'
      +'<div class="tweets-row">'
      +'<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">'+item.tweetA+'</div>'
      +'<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button></div>'
      +'<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">'+item.tweetB+'</div>'
      +'<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button></div>'
      +'</div>'
      +(item.charts.count>0?'<div class="chart-block'+(item.charts.hot?' hot':'')+'">📊 '+item.charts.count+' chart(s): '+item.charts.desc+'</div>':'')
      +'<a class="link-btn" href="'+item.link+'" target="_blank">↗ Read full article</a>'
      +'</div>';
    container.appendChild(card);
  });
}

function toggleCard(id){
  var body = document.getElementById('body-'+id);
  body.classList.toggle('open');
}

function toggleReport(){
  var body = document.getElementById('report-body');
  var arrow = document.getElementById('report-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open')?'▲':'▼';
}

function buildReport(){
  var body = document.getElementById('report-body');
  var html = '<table>';
  html += '<tr><td>Time Window</td><td>'+META.windowStart+' → '+META.windowEnd+'</td></tr>';
  html += '<tr><td>Emails in window</td><td>'+META.emailsInWindow+'</td></tr>';
  html += '<tr><td>Emails read</td><td>'+META.emailsRead+'</td></tr>';
  html += '<tr><td>Items extracted</td><td>'+META.itemsExtracted+'</td></tr>';
  html += '</table><br>';
  html += '<strong>Included Sources:</strong><table style="margin-top:6px">';
  META.includedSources.forEach(function(s){
    html += '<tr><td><span class="src-link" onclick="filterBySrc(\''+s.name.replace(/'/g,"\\'")+'\')">'
      +s.name+'</span></td><td>'+s.items+' items</td></tr>';
  });
  html += '</table><br><strong>Skipped:</strong><table style="margin-top:6px">';
  META.skippedSources.forEach(function(s){
    html += '<tr><td>'+s.name+'</td><td>'+s.reason+'</td></tr>';
  });
  html += '</table>';
  body.innerHTML = html;
}

function init(){
  document.getElementById('header-meta').textContent =
    META.date+' · '+META.time+' · '+META.itemsExtracted+' items from '+META.emailsRead+' emails';
  buildFilters();
  renderCards();
  buildReport();
}

window.onload = init;
</script>
</body>
</html>
