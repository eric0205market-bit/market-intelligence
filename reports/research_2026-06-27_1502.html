var activeCat="all", activeUrg="all", activeSrc=null;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function copyTweet(itemId,which){
  var item=ITEMS.find(function(i){return i.id===itemId;});
  var text=which==="a"?item.tweetA:item.tweetB;
  var ta=document.createElement("textarea");
  ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
  var btn=event.target;btn.textContent="✓ Copied";
  setTimeout(function(){btn.textContent="📋 Copy";},1500);
}

function toggleCard(id){
  var b=document.getElementById("cb-"+id);b.classList.toggle("open");
}

function toggleReport(){
  var b=document.getElementById("rep-body"),t=document.getElementById("rep-tog");
  b.classList.toggle("open");t.textContent=b.classList.contains("open")?"▲":"▼";
}

function applyFilters(){
  ITEMS.forEach(function(item){
    var el=document.getElementById("card-"+item.id);
    var cm=activeCat==="all"||item.cat===activeCat;
    var um=activeUrg==="all"||item.urgency===activeUrg;
    var sm=!activeSrc||item.source.indexOf(activeSrc)!==-1;
    el.classList.toggle("hidden",!(cm&&um&&sm));
  });
}

function setCat(cat){
  activeCat=cat;activeSrc=null;
  document.querySelectorAll("#cat-bar .filter-pill").forEach(function(p){
    var c=p.getAttribute("data-color");
    p.style.background="";p.style.color=c;p.style.borderColor=c;p.style.fontWeight="";
  });
  var ap=document.getElementById("cp-"+cat);
  var ac=ap.getAttribute("data-color")||"#444";
  ap.style.background=ac;ap.style.color="#fff";ap.style.borderColor="transparent";ap.style.fontWeight="600";
  applyFilters();
}

function setUrg(urg){
  activeUrg=urg;activeSrc=null;
  document.querySelectorAll("#urg-bar .filter-pill").forEach(function(p){
    var c=p.getAttribute("data-color")||"#444";
    p.style.background="";p.style.color=c;p.style.borderColor=c;
  });
  var ap=document.getElementById("up-"+urg);
  var ac=ap.getAttribute("data-color")||"#444";
  ap.style.background=ac;ap.style.color="#fff";ap.style.borderColor="transparent";
  applyFilters();
}

function filterBySrc(name){
  activeSrc=name;activeCat="all";activeUrg="all";
  setCat("all");setUrg("all");
  activeSrc=name;
  applyFilters();
  ITEMS.forEach(function(item){
    if(item.source.indexOf(name)!==-1)document.getElementById("cb-"+item.id).classList.add("open");
  });
}

  var counts={};
  ITEMS.forEach(function(i){counts[i.cat]=(counts[i.cat]||0)+1;});
  var html='<div class="filter-pill" id="cp-all" data-color="#444" onclick="setCat(\'all\')" style="background:#444;color:#fff;border-color:transparent;font-weight:600">All ('+ITEMS.length+')</div>';
  Object.keys(counts).forEach(function(cat){
    var cfg=CATS[cat]||{label:cat,color:"#888"};
    html+='<div class="filter-pill" id="cp-'+cat+'" data-color="'+cfg.color+'" onclick="setCat(\''+cat+'\')" style="color:'+cfg.color+';border-color:'+cfg.color+'">'+cfg.label+' ('+counts[cat]+')</div>';
  });
  document.getElementById("cat-bar").innerHTML=html;
}

function buildUrgBar(){
  var counts={};
  ITEMS.forEach(function(i){counts[i.urgency]=(counts[i.urgency]||0)+1;});
  var html='<div class="filter-pill" id="up-all" data-color="#888" onclick="setUrg(\'all\')" style="color:#555;border-color:#bbb">All</div>';
  ["actnow","deep","watch"].forEach(function(u){
    if(counts[u]){
      html+='<div class="filter-pill" id="up-'+u+'" data-color="'+URG[u].color+'" onclick="setUrg(\''+u+'\')" style="color:'+URG[u].color+';border-color:'+URG[u].color+'">'+URG[u].label+' ('+counts[u]+')</div>';

  document.getElementById("urg-bar").innerHTML=html;
  // set All active

  ap.style.background="#888";ap.style.color="#fff";ap.style.borderColor="transparent";
}

    html+='<div class="card-header" onclick="toggleCard('+item.id+')">';
    html+='<span class="card-num">'+String(item.id).padStart(2,"0")+'</span>';
    html+='<span style="font-size:15px">'+urgEmoji+'</span>';
    html+='<span class="card-badge" style="background:'+cfg.color+'">'+cfg.label+'</span>';
    html+='<span class="card-src">'+esc(srcShort)+'</span>';
    if(chartIcon)html+='<span>'+chartIcon+'</span>';
    html+='<span class="card-title">'+esc(item.title)+'</span>';
    html+='</div>';

    html+='<div class="card-body" id="cb-'+item.id+'">';
