<script>
const CAT_COLORS = {
  macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27", "AI/infra":"#1d9e75",
  crypto:"#7f77dd", geopolitics:"#d85a30", energy:"#f97316", tech:"#06b6d4",
  gold:"#d4a017", culture:"#ec4899", labor:"#8b5cf6", regulation:"#64748b",
  science:"#14b8a6", venture:"#84cc16"
};
const URGENCY_META = {
  act: { label: "🔴 Act Now", emoji: "🔴" },
  deep: { label: "🔵 Deep", emoji: "🔵" },
  watch: { label: "🟡 Watch", emoji: "🟡" }
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(cat){ return CAT_COLORS[cat] || "#999"; }

function buildFilterBars(){
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat]||0) + 1; });
  const catBar = document.getElementById('catBar');
  let html = `<button class="pill active" data-cat="all" style="background:#333;color:#fff;border-color:#333">All (${ITEMS.length})</button>`;
  Object.keys(catCounts).sort().forEach(cat => {
    html += `<button class="pill" data-cat="${cat}" style="border-color:${catColor(cat)};color:${catColor(cat)}">${cat} (${catCounts[cat]})</button>`;
  });
  catBar.innerHTML = html;
  catBar.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.getAttribute('data-cat');
      activeSrc = null;
      updateCatButtons();
      renderCards();
    });
  });

  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency]||0) + 1; });
  const urgBar = document.getElementById('urgBar');
  let uhtml = `<button class="pill active" data-urg="all" style="background:#333;color:#fff;border-color:#333">All (${ITEMS.length})</button>`;
  Object.keys(URGENCY_META).forEach(u => {
    if (urgCounts[u]) uhtml += `<button class="pill" data-urg="${u}">${URGENCY_META[u].label} (${urgCounts[u]})</button>`;
  });
  urgBar.innerHTML = uhtml;
  urgBar.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeUrg = btn.getAttribute('data-urg');
      activeSrc = null;
      updateUrgButtons();
      renderCards();
    });
  });
}

function updateCatButtons(){
  document.querySelectorAll('#catBar .pill').forEach(btn => {
    const cat = btn.getAttribute('data-cat');
    if (cat === activeCat){
      btn.classList.add('active');
      btn.style.background = cat === 'all' ? '#333' : catColor(cat);
      btn.style.color = '#fff';
      btn.style.borderColor = cat === 'all' ? '#333' : catColor(cat);
    } else {
      btn.classList.remove('active');
      btn.style.background = 'transparent';
      btn.style.color = cat === 'all' ? '#333' : catColor(cat);
      btn.style.borderColor = cat === 'all' ? '#ccc' : catColor(cat);
    }
  });
}
function updateUrgButtons(){
  document.querySelectorAll('#urgBar .pill').forEach(btn => {
    const u = btn.getAttribute('data-urg');
    if (u === activeUrg){
      btn.classList.add('active');
      btn.style.background = '#333';
      btn.style.color = '#fff';
      btn.style.borderColor = '#333';
    } else {
      btn.classList.remove('active');
      btn.style.background = 'transparent';
      btn.style.color = '#333';
      btn.style.borderColor = '#ccc';
    }
  });
}

function renderCards(){
  const container = document.getElementById('cards');
  let html = '';
  ITEMS.forEach((item, idx) => {
    const matchesCat = activeCat === 'all' || item.cat === activeCat;
    const matchesUrg = activeUrg === 'all' || item.urgency === activeUrg;
    const matchesSrc = !activeSrc || item.source.toLowerCase().indexOf(activeSrc.toLowerCase()) !== -1;
    const visible = matchesCat && matchesUrg && matchesSrc;
    const color = catColor(item.cat);
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += `<div class="card${visible ? '' : ' hidden'}" id="card-${item.id}">`;
    html += `<div class="card-header" onclick="toggleCard(${item.id})">`;
    html += `<span class="idx">${String(idx+1).padStart(2,'0')}</span>`;
    html += `<span>${URGENCY_META[item.urgency].emoji}</span>`;
    html += `<span class="badge" style="background:${color}">${item.source}</span>`;
    html += `<span class="cattag">${item.cat}</span>`;
    if (chartFlag) html += `<span>${chartFlag}</span>`;
    html += `<span class="title">${item.title}</span>`;
    html += `</div>`;
    html += `<div class="card-body">`;
    html += `<div class="label">The Idea</div><div class="idea">${item.idea}</div>`;
    html += `<div class="label">My Angle</div><div class="angle" style="border-left:2px solid ${color};background:${color}14">${item.angle}</div>`;
    html += `<div class="tweets">`;
    html += `<div class="tweet"><div class="tweet-label" style="color:#378add">TWEET A</div><div class="tweet-text">${item.tweetA}</div><button class="copy-btn" onclick="copyTweet(${item.id},'a')">📋 Copy</button></div>`;
    html += `<div class="tweet"><div class="tweet-label" style="color:#7f77dd">TWEET B</div><div class="tweet-text">${item.tweetB}</div><button class="copy-btn" onclick="copyTweet(${item.id},'b')">📋 Copy</button></div>`;
    html += `</div>`;
    html += `<div class="chart-box${item.charts.hot ? ' hot' : ''}">${item.charts.hot ? '🔥 ' : '📊 '}${item.charts.desc}</div>`;
    html += `<div class="link"><a href="${item.link}" target="_blank">↗ Read full article</a></div>`;
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function toggleCard(id){
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  updateCatButtons();
  updateUrgButtons();
  renderCards();
  ITEMS.forEach(item => {
    if (item.source.toLowerCase().indexOf(name.toLowerCase()) !== -1){
      const el = document.getElementById('card-' + item.id);
      if (el) el.classList.add('open');
    }
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function buildReport(){
  document.getElementById('metaLine').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';

  let html = '';
  html += `<div><strong>Time window:</strong> ${META.windowStart} → ${META.windowEnd}</div>`;
  html += `<div class="small">Emails outside this window were not processed.</div>`;
  html += `<div style="margin-top:10px"><strong>Emails in window:</strong> ${META.emailsInWindow} &nbsp; <strong>Emails read:</strong> ${META.emailsRead} &nbsp; <strong>Items extracted:</strong> ${META.itemsExtracted}</div>`;
  html += `<div style="margin-top:12px"><strong>Included sources:</strong><br>`;
  META.includedSources.forEach(s => {
    html += `<span class="srcname" onclick="filterBySrc('${s.name.replace(/'/g,"\\'")}')">${s.name}</span> (${s.count})<br>`;
  });
  html += `</div>`;
  html += `<div style="margin-top:12px"><strong>Skipped sources:</strong><br>`;
  META.skippedSources.forEach(s => {
    html += `${s.name} — <span class="small">${s.reason}</span><br>`;
  });
  html += `</div>`;
  document.getElementById('reportBody').innerHTML = html;
}

buildFilterBars();
renderCards();
buildReport();
</script>
