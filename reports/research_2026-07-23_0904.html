  time: "09:04 CEST",
  windowStart: "2026-07-23 03:04 CEST",

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "AI/infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};
const URG_META = {
  act: { label: "🔴 Act Now", emoji: "🔴" },
  deep: { label: "🔵 Deep", emoji: "🔵" },
  watch: { label: "🟡 Watch", emoji: "🟡" }
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catCounts(){
  const c = {};
  ITEMS.forEach(i => { c[i.cat] = (c[i.cat]||0)+1; });
  return c;
}
function urgCounts(){
  const c = {};
  ITEMS.forEach(i => { c[i.urgency] = (c[i.urgency]||0)+1; });
  return c;
}

function buildFilterBars(){
  const catBar = document.getElementById('catBar');
  const counts = catCounts();
  const cats = Object.keys(CAT_COLORS).filter(c => counts[c]);
  let html = '<button class="pill' + (activeCat==='all'?' active':'') + '" style="' + (activeCat==='all'?'background:#333;border-color:#333;':'') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  cats.forEach(c => {
    const isActive = activeCat === c;
    const style = isActive ? ('background:' + CAT_COLORS[c] + ';border-color:' + CAT_COLORS[c] + ';') : '';
    html += '<button class="pill' + (isActive?' active':'') + '" style="' + style + '" onclick="setCat(\'' + c + '\')">' + c + ' (' + counts[c] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgBar = document.getElementById('urgBar');
  const uc = urgCounts();
  let uhtml = '<button class="pill' + (activeUrg==='all'?' active':'') + '" style="' + (activeUrg==='all'?'background:#333;border-color:#333;':'') + '" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  ['act','deep','watch'].forEach(u => {
    if(!uc[u]) return;
    const isActive = activeUrg === u;
    const style = isActive ? 'background:#333;border-color:#333;' : '';
    uhtml += '<button class="pill' + (isActive?' active':'') + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + URG_META[u].label + ' (' + uc[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c){ activeCat = c; activeSrc = null; renderCards(); buildFilterBars(); }
function setUrg(u){ activeUrg = u; activeSrc = null; renderCards(); buildFilterBars(); }
function filterBySrc(name){
  activeSrc = name; activeCat = 'all'; activeUrg = 'all';
  renderCards(true);
  buildFilterBars();
}

function renderCards(expandMatching){
  const container = document.getElementById('cards');
  let html = '';
  ITEMS.forEach((item, idx) => {
    if(activeCat !== 'all' && item.cat !== activeCat) return;
    if(activeUrg !== 'all' && item.urgency !== activeUrg) return;
    if(activeSrc && item.source.indexOf(activeSrc) === -1) return;
    const color = CAT_COLORS[item.cat] || '#888';
    const openClass = (expandMatching && activeSrc) ? ' open' : '';
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += '<div class="card' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(idx+1).padStart(2,'0') + '</span>';
    html += '<span class="urg">' + URG_META[item.urgency].emoji + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source + '</span>';
    html += '<span class="tag">' + item.cat + '</span>';
    if(chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chevron">▸</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="--accent:' + color + ';--accent-bg:' + color + '18;">' + item.angle + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if(item.charts.count > 0 || item.charts.desc){
      html += '<div class="chart-box' + (item.charts.hot?' hot':'') + '">' + (item.charts.hot?'🔥 ':'📊 ') + (item.charts.desc || 'Charts inside — worth opening.') + '</div>';
    }
    html += '<div class="linkrow"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  if(!html) html = '<div style="padding:30px;text-align:center;color:#999;">No items match this filter.</div>';
  container.innerHTML = html;
}

function toggleCard(id){
  const el = document.getElementById('card-' + id);
  if(el) el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport(){
  document.getElementById('headerMeta').textContent =
    META.date + '  ·  ' + META.time + '  ·  ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';

  let html = '';
  html += '<div>Window: <b>' + META.windowStart + '</b> → <b>' + META.windowEnd + '</b>. Emails outside this window were not processed.</div>';
  html += '<div class="totals">';
  html += '<div><b>' + META.emailsInWindow + '</b>emails in window</div>';
  html += '<div><b>' + META.emailsRead + '</b>emails read</div>';
  html += '<div><b>' + META.itemsExtracted + '</b>items extracted</div>';
  html += '</div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(s => {
    html += '<div class="src-item" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + ' — ' + s.count + ' item' + (s.count>1?'s':'') + '</div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(s => {
    html += '<div class="skip-item">' + s.name + ' — ' + s.reason + '</div>';
  });
  document.getElementById('reportBody').innerHTML = html;
}

buildFilterBars();
renderCards();
buildReport();
</script>
