<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

-09T16:42:49.000Z", "is_thread": false, "images": []}, {"author": "AndreasSteno", "text": "What we're seeing is probably CTAs slamming the sell button on chips — makes sense after Friday. More technical in nature; the momentum factor changed post-NFP.", "tweet_url": "https://x.com/AndreasSteno/status/2064362034259525867", "created_at": "2026-06-09T15:00:37.000Z", "is_thread": true, "images": []}, {"author": "Tyler_Neville_", "text": "Reposting his dispersion-trade warning: the dispersion trade is unwinding today — healthy, but will hurt retail YOLO call buyers; beware brokers selling delta into the close. The Kospi -5% kicked it off.", "tweet_url": "https://x.com/Tyler_Neville_/status/2064384023531557002", "created_at": "2026-06-09T16:28:00.000Z", "is_thread": false, "images": []}, {"author": "spotgamma", "text": "Two huge waves of negative single-stock deltas today (days highs ~9:50AM, then ~10:45). $AAPL the biggest chunk; reads like algorithmic positioning changes, not a rapid 0DTE chase. 'Large, and odd.'", "tweet_url": "https://x.com/spotgamma/status/2064366191955591432", "created_at": "2026-06-09T15:17:08.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYZsvCWoAAAGCz.png"]}, {"author": "jvisserlabs", "text": "AI agentic trade showing first real signs of internal stress since early-March Iran days: names above the 20-day MA in his AI thematic portfolio fell from 73 to 39 in four weeks while the index made highs a week ago; AI Token Index down five straight days, accelerating.", "tweet_url": "https://x.com/jvisserlabs/status/2064332919120785749", "created_at": "2026-06-09T13:04:56.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKX1zfmXYAA37bw.jpg", "https://pbs.twimg.com/media/HKX3Nc2WgAAdEGl.jpg"]}]}, {"title": "SpaceX IPO — Oversubscription Hype vs Skepticism", "category": "tech", "description": "SpaceX IPO reportedly ~$150B in orders, 2x oversubscribed. Reactions split between euphoria and 'this is a cash raise that's pressuring everything else.'", "items": [{"author": "munster_gene", "text": "The SpaceX IPO is 'arguably the most exciting event in tech history.' Its unique assets and sovereign-AI mission position it to become one of the fastest-growing and most defensible companies of the next decade.", "tweet_url": "https://x.com/munster_gene/status/2064373455672291585", "created_at": "2026-06-09T15:46:00.000Z", "is_thread": false, "images": []}, {"author": "dampedspring", "text": "On reports the SpaceX IPO is multiple-times oversubscribed: 'Everybody lies.'", "tweet_url": "https://x.com/dampedspring/status/2064380062548250780", "created_at": "2026-06-09T16:12:15.000Z", "is_thread": true, "images": []}, {"author": "lord_fed", "text": "Frames Friday as 'another cash raise for the SpaceX IPO' — NFP was the catalyst but it let people sell their least-favorite shiny things to buy the new shiny thing (rocket stock). Covered SPX puts @59.6, bought 7400c @10.5.", "tweet_url": "https://x.com/lord_fed/status/2064350570207445379", "created_at": "2026-06-09T14:15:04.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKYNL7zXsAAuXhY.jpg"]}, {"author": "jimcramer", "text": "'Nvidia, NOT SpaceX remains the key to this market.' Also flags satellite data centers 'happening' and that we need to clear this week's deals before an all-clear.", "tweet_url": "https://x.com/jimcramer/status/2064337669279166848", "created_at": "2026-06-09T13:23:48.000Z", "is_thread": false, "images": []}]}, {"title": "Apple WWDC — Siri Runs on Google Gemini", "category": "ai", "description": "Apple's WWDC Siri reveal is powered by Google Gemini; stock fell ~5%. Reception ranges from 'confession of failure' to a nuanced bear case on the AI release specifically.", "items": [{"author": "PeterDiamandis", "text": "'Apple spent 15 years telling us Siri was the future. At WWDC they finally revealed the future: it's powered by Google Gemini. The stock fell 5%. That's not a pivot. That's a confession.'", "tweet_url": "https://x.com/PeterDiamandis/status/2064326351835005129", "created_at": "2026-06-09T12:38:50.000Z", "is_thread": false, "images": []}, {"author": "udiWertheimer", "text": "Bearish on the AI release specifically: Apple is shipping 'last year's baseline.' Normies already have a year+ of memory/context in the ChatGPT app, so Siri will feel noticeably dumber, and by September OpenAI/Google will be pushing always-on cloud agents. Separately thinks it's 'probably the best iOS release ever' — suspects they threw everything out around Jan-Feb and let Claude Code rebuild iOS 27 from scratch (the long list of small fixes makes it feel that way).", "tweet_url": "https://x.com/udiWertheimer/status/2064344102867513726", "created_at": "2026-06-09T13:49:22.000Z", "is_thread": true, "images": []}]}, {"title": "DeFi-History DeFi-Record Raise & Onchain Lending Debate", "category": "crypto", "description": "A $175M DeFi raise (co-led by Paradigm, a16z crypto, Ribbit) — called the largest in DeFi history — drew congratulations and notes on the maturing equity structure, amid broader debate about onchain programmatic lending.", "items": [{"author": "fejau_inc", "text": "'There is still capital out there hungry to deploy if you have a good product and good equity structure. Love to see it and the dispersion in crypto continue as the industry matures.' Notes no dual equity-token structure.", "tweet_url": "https://x.com/fejau_inc/status/2064361202311201145", "created_at": "2026-06-09T14:57:19.000Z", "is_thread": true, "images": []}, {"author": "brian_armstrong", "text": "Coinbase CEO congratulates the team on the raise.", "tweet_url": "https://x.com/brian_armstrong/status/2064350640772657646", "created_at": "2026-06-09T14:15:21.000Z", "is_thread": false, "images": []}, {"author": "0xSammy", "text": "On programmatic onchain lending: 'this is precisely what flash loans onchain were built for — programmatic lending enabled by smart contracts.'", "tweet_url": "https://x.com/0xSammy/status/2064348599253639575", "created_at": "2026-06-09T14:07:14.000Z", "is_thread": false, "images": []}]}, {"title": "Society / Regulation — Voter Mechanics & Western Migration Discourse", "category": "society", "description": "Non-market commentary that dominated several feeds today. Included for completeness; not actionable. Note Geiger_Capital ran an extended anti-immigration thread (mostly filtered as noise/lifestyle-adjacent).", "items": [{"author": "nic_carter", "text": "Long explainer on California 'ballot harvesting': a homeless person can be registered to vote by an NGO with no proof of residency, sign with an 'X', and have ballots mailed to a shelter/NGO HQ for years; loose signature verification makes a fraudulent fill-in scheme 'virtually impossible to detect.' Frames it as a structural mechanism rather than a specific allegation.", "tweet_url": "https://x.com/nic_carter/status/2064383519724314924", "created_at": "2026-06-09T16:26:00.000Z", "is_thread": false, "images": []}, {"author": "Geiger_Capital", "text": "Ran a heavy anti-immigration thread off a Belfast attack ('It's time for the West to stand up'; 'a nation is simply its people'). Flagged here as the dominant non-market content from this author today.", "tweet_url": "https://x.com/Geiger_Capital/status/2064317427979018311", "created_at": "2026-06-09T12:03:22.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKXtlfyXYAAQ6ai.jpg"]}]}], "insights": [{"category": "crypto", "author": "Crypto_McKenna", "text": "Post-AQAv2, Hyperliquid flows are material: USDC HyperEVM (CCTP) 5.37Bn + HyperCore bridge 929M = 6.3Bn total. Implied yield reserve @3.25% = $184.14M/yr; daily implied buyback pressure $504K; buyback uplift 29%. HIP-3 scaling into the venue for global price discovery of traditional markets; HIP-4 should gain traction into the World Cup and mid-terms. Hyperliquid now runs ~$800-900M revenue/yr with 99% directed to HYPE buyback-and-burn. $HYPE", "tweet_url": "https://x.com/Crypto_McKenna/status/2064372392005419184", "created_at": "2026-06-09T15:41:47.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKYenC2agAAcaHC.jpg"]}, {"category": "tech", "author": "patrick_oshag", "text": "New interview with Alex Sacerdote (Whale Rock, $17B). Core thesis: 'tremendous alpha in the largest cap.' There's a huge structural underweight of mega-cap tech because the largest capital pools believe large-cap has no alpha, so they stuff portfolios with small/mid stock-pickers. In tech the leader usually grows bigger, wins, and takes high share fast, creating massive profit pools and market caps. Most endowments bet against this. 'It takes one person to move a small cap, but a hundred diversified PMs to realize Google's a winner' — and Whale Rock figures it out before 95% of generalists. Full pod covers the AI L-curve, S-curve playbook, de-commoditization of DC hardware, and why he went net short software.", "tweet_url": "https://x.com/patrick_oshag/status/2064366857109356688", "created_at": "2026-06-09T15:19:47.000Z", "is_thread": false, "images": []}, {"category": "macro", "author": "BobEUnlimited", "text": "Two underappreciated signals: (1) Value has outperformed growth this year — 'suspect most investors don't realize' it. (2) The 30yr is increasingly NOT buying the structural nominal-growth-acceleration narrative.", "tweet_url": "https://x.com/BobEUnlimited/status/2064395354619904159", "created_at": "2026-06-09T17:13:01.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKY0oqSXsAAWTV7.jpg", "https://pbs.twimg.com/media/HKYYt87XEAAucMd.jpg"]}, {"category": "macro", "author": "qthomp", "text": "DXY back to 100 but the path from here is more complex — best bull case is 'cleanest dirty shirt.' Doesn't like long-duration bonds but thinks Fed hawkishness sees a local top in coming weeks. Separately: BTC showing one of its largest divergences from tech stocks in recent history, often a canary for liquidity/risk. 'Avoid crypto for the summer; pick it back up in late Q3 and save yourself brain damage.'", "tweet_url": "https://x.com/qthomp/status/2064352394683556320", "created_at": "2026-06-09T14:22:19.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYMsNpW0AE68lr.png"]}, {"category": "crypto", "author": "qthomp", "text": "$BMNR ramped ETH purchases into the decline last week, taking cash to $247M — a -$873M decline since its mid-April peak — while ETH fell -25% over the same span. DAT (digital-asset-treasury) firepower continues to decline into crypto's worst seasonal period.", "tweet_url": "https://x.com/qthomp/status/2064355292456931409", "created_at": "2026-06-09T14:33:50.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYPROnXkAAsZTa.png", "https://pbs.twimg.com/media/HKYPXJwWsAAYnbz.png"]}, {"category": "crypto", "author": "thedefivillain", "text": "$STRC is back at $97 two days after $90.5 — third time during this BTC drawdown. The MAIN driver of STRC is BTC price, by at least an order of magnitude; holders panic when BTC drops, STRC falls ~-10%, then BTC and STRC bottom together and STRC recovers toward peg. It's the depletion of the USD reserve or 'loss of confidence,' not Luna-like dynamics, that bears fantasize about. MSTR mNAV only -6% since the 32-BTC sale despite peak FUD.", "tweet_url": "https://x.com/thedefivillain/status/2064287172811690145", "created_at": "2026-06-09T10:03:09.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKXPwevXAAAbrom.jpg", "https://pbs.twimg.com/media/HKXqMOOXQAAERuc.jpg"]}, {"category": "ai", "author": "PeterDiamandis", "text": "Data-point dump: Argentina is first country to build a legal framework for AI personhood (Milei positioning the country as a special economic zone for the singularity), same week Anthropic called for a global pause on frontier AI. 80% of Anthropic's code is written by Claude; engineers shipping 8x more per quarter. US added 172K jobs in May vs 85K expected, unemployment 4.3%. Autonomy time horizons doubling every four months. The three highest-robotics-penetration countries (Sweden, South Korea, Germany) have the lowest unemployment.", "tweet_url": "https://x.com/PeterDiamandis/status/2064374063473045841", "created_at": "2026-06-09T15:48:25.000Z", "is_thread": true, "images": []}, {"category": "energy", "author": "JavierBlas", "text": "BP confirms reorganization back to the traditional Big Oil model of upstream and downstream. Gordon Birrell runs upstream, Richard Harding downstream (interim). Renewables leadership is downgraded massively and folded into BP's technology function.", "tweet_url": "https://x.com/JavierBlas/status/2064321542658396206", "created_at": "2026-06-09T12:19:43.000Z", "is_thread": false, "images": []}, {"category": "ai", "author": "Rewkang", "text": "Led Standard Bots' $200M Series C at $1B valuation. Industrial robots are 'the GPU of industrial work' — AI-powered welding, machine tending, assembly, dispensing, sorting. Standard Bots vertically integrates and plans to manufacture in America; AI-native robot adoption is happening now, not 5-10 years out, and is a pillar of US reindustrialization.", "tweet_url": "https://x.com/Rewkang/status/2064352012762837133", "created_at": "2026-06-09T14:20:48.000Z", "is_thread": false, "images": []}, {"category": "ai", "author": "Tyler_Neville_", "text": "AI assets are officially a national security imperative — 'the 21st Century Space Race.' China preparing to spend ~2 trillion yuan (~$295B) over five years building data centers to surpass the US in AI.", "tweet_url": "https://x.com/Tyler_Neville_/status/2064321430330745322", "created_at": "2026-06-09T12:19:16.000Z", "is_thread": false, "images": []}, {"category": "crypto", "author": "DefiIgnas", "text": "Candid note on risk tolerance: trades less now 'mostly because I got older and my risk tolerance is lower — can't sit 24/7 near the screen anymore.'", "tweet_url": "https://x.com/DefiIgnas/status/2064319073161199948", "created_at": "2026-06-09T12:09:54.000Z", "is_thread": false, "images": []}, {"category": "crypto", "author": "0xJeff", "text": "Agentic-commerce reality check: x402 volume remains stagnant at $30-50k. Pay-per-use LLM/tool aggregators (BlockRun, merit) dominate; minimal net-new demand but sellers growing 50%+ MoM. x402 toolkits are heavily subsidized — avg call costs 2-11 cents (vs 36c avg txn), great for agent users, bad for sellers. Agentic commerce needs more time to bootstrap than initially thought.", "tweet_url": "https://x.com/0xJeff/status/2064241085686178214", "created_at": "2026-06-09T07:00:01.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKTQogyakAA5CfC.jpg"]}, {"category": "macro", "author": "Fullcarry", "text": "Rates plumbing: 'Nice concession for the 3y auction after the Trump headline' — and silver has dropped below its 200-day MA ('they say nothing good happens below the 200dma; let's see if that's true for silver').", "tweet_url": "https://x.com/Fullcarry/status/2064387972326138282", "created_at": "2026-06-09T16:43:41.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYSk4nWUAAdYf4.jpg"]}, {"category": "crypto", "author": "hooeem", "text": "Nostalgia/edge note: 'it was so easy to make money then' — a false post about a known event showed it was in fact NOT priced in, then dumped, letting you full-stack the position and wait for the real event.", "tweet_url": "https://x.com/hooeem/status/2064350339432677627", "created_at": "2026-06-09T14:14:09.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKYLsSMWMAA236A.jpg", "https://pbs.twimg.com/media/HKYLsSHXQAAZsH5.jpg"]}, {"category": "ai", "author": "hooeem", "text": "On Antioch Agent: physical AI's biggest bottleneck was how expensive it was to test ('cheaper failure'); an agent now lets these tests be simulated in a closed loop from the browser, turning physical AI into a software business.", "tweet_url": "https://x.com/hooeem/status/2064348629075148841", "created_at": "2026-06-09T14:07:21.000Z", "is_thread": false, "images": []}, {"category": "society", "author": "paulg", "text": "On 'how to become a billionaire' and on whether he's giving a talk this fall: terse confirmations — keeping his signal characteristically minimal.", "tweet_url": "https://x.com/paulg/status/2064350258897801441", "created_at": "2026-06-09T14:13:50.000Z", "is_thread": true, "images": []}], "contrarian": [{"category": "crypto", "author": "udiWertheimer", "text": "Pushing back on doom: 'you guys are exaggerating — there are many levels of pain from here to 0, no need to go to extremes.' Agrees a lower price is fair but rejects the zero scenario.", "tweet_url": "https://x.com/udiWertheimer/status/2064380370024296881", "created_at": "2026-06-09T16:13:29.000Z", "is_thread": true, "images": []}, {"category": "macro", "author": "ZeeContrarian1", "text": "'Nobody knows anything.' When gold ran, every analyst called $6-8k; when crude was $55-60 every one said sub-$50. All predictions are essentially worthless and probably cause more damage than benefit — people love them because they provide a comforting illusion of control. Separately: markets are rivers, not statues; the only two forces that truly repeat are fear and greed, which is why he watches the $VIX and treats charts as worthless.", "tweet_url": "https://x.com/ZeeContrarian1/status/2064376179260289137", "created_at": "2026-06-09T15:56:50.000Z", "is_thread": false, "images": []}, {"category": "macro", "author": "stevehou", "text": "Macro being fine has nothing to do with what $SOXX does day to day. 'Market is so overbought that it's a mystery we haven't had a bigger pullback already.'", "tweet_url": "https://x.com/stevehou/status/2064390848855552217", "created_at": "2026-06-09T16:55:07.000Z", "is_thread": true, "images": []}, {"category": "crypto", "author": "himgajria", "text": "On the AI buildout: 'First they oversupplied on housing. Next they're oversupplying on compute [that will age poorly].' Also: in a world where you don't work/create/serve a purpose, signalling rises — labour and purpose in decline, capital and signalling on the rise.", "tweet_url": "https://x.com/himgajria/status/2064382524969665012", "created_at": "2026-06-09T16:22:02.000Z", "is_thread": false, "images": []}, {"category": "crypto", "author": "thedefivillain", "text": "On OpenAI's confidential S-1 / SpaceX-era IPOs and the Saylor 'too big' debate: Saylor 'is not over-leveraged, he's just too big, so the market can't stop looking at him, which is a problem.' He can use the USD reserve or sell MSTR/BTC in small drips — not concerning unless you expect ~2 years of awful BTC price action.", "tweet_url": "https://x.com/thedefivillain/status/2064381932197044612", "created_at": "2026-06-09T16:19:41.000Z", "is_thread": false, "images": []}, {"category": "crypto", "author": "zeroxkyle", "text": "War is 'back on the menu' but isn't the reason for the selloff — rather it jerks an already-fragile market rocked by trillion-dollar IPOs, massive retail interest and rich valuations. Macro matters again: good news is bad news and bad news is bad news; easy AI longs no longer rewarded. Next phase of AI = proven execution, not rising-tide-lifts-all-boats. Separately on diversification: unlearn it — 1% on a 10x makes you 10%, which isn't how you get rich.", "tweet_url": "https://x.com/zeroxkyle/status/2064388987809325290", "created_at": "2026-06-09T16:47:43.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYuQJGaMAAsnaW.jpg"]}, {"category": "crypto", "author": "TimDraper", "text": "'Bitcoin is more secure than the dollars sitting in your bank account.' Quantum will crack the banks long before it touches the blockchain; even if something happened, full-node operators can roll back to the last secure block. Eventually BTC eclipses the dollar as retailers begin to accept it.", "tweet_url": "https://x.com/TimDraper/status/2064376983992283213", "created_at": "2026-06-09T16:00:01.000Z", "is_thread": false, "images": []}, {"category": "crypto", "author": "sjdedic", "text": "'Orange man not gud for orange coin.' The man crypto celebrated as its savior 'ended up extracting more from retail than most scam projects combined' (on reports the Trump family made ~$2.3B from crypto ventures).", "tweet_url": "https://x.com/sjdedic/status/2064349189962661941", "created_at": "2026-06-09T14:09:35.000Z", "is_thread": false, "images": []}, {"category": "macro", "author": "RayDalio", "text": "Principle of the day: 'Opinions are a dime a dozen and nearly everyone will share theirs with you. Many will state them as if they are facts. Don't mistake opinions for facts.'", "tweet_url": "https://x.com/RayDalio/status/2064367005109469534", "created_at": "2026-06-09T15:20:22.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKYa2CJXkAE--Lw.png"]}, {"category": "crypto", "author": "mrjasonchoi", "text": "'Coping at Leopold's performance as being degen/high-variance/levered beta is the finance-bro version of seeing a Jackson Pollock sell for millions and saying I could have painted that.'", "tweet_url": "https://x.com/mrjasonchoi/status/2064368445341544747", "created_at": "2026-06-09T15:26:06.000Z", "is_thread": false, "images": []}, {"category": "crypto", "author": "thedefivillain", "text": "On oil's paradox (Strait of Hormuz reportedly closed for 3 months but oil not rising, down -16% in ten days): openly admits 'I still don't get it' — questioning the consensus bullish-oil thesis held by energy specialists.", "tweet_url": "https://x.com/thedefivillain/status/2064277276817010743", "created_at": "2026-06-09T09:23:49.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKXI2SiXYAAylQS.jpg"]}], "positioning": [{"category": "positioning", "author": "dampedspring", "text": "Positioning: Sept 6900 ($QQQ) and 25500 ($MNST) puts plus a couple of late-June put butterflies. On the risk-off tape: 'A- not surprisingly given risk off.'", "tweet_url": "https://x.com/dampedspring/status/2064383451315196034", "created_at": "2026-06-09T16:25:43.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKYpzxYWEAELFtV.jpg"]}, {"category": "positioning", "author": "aleabitoreddit", "text": "AI supply-chain basket in the $10-100B range (likely better ROI vs indexes or ARM/MRVL which already ran): $ASX, Sumitomo Electric, $JBL, $VICR, $GFS, $AAOI, AlChip, $TSEM, $FN, Furukawa, $CLS, $NBIS, $NOK, $AMKR, $LITE, $COHR (discloses positions in NBIS/TSEM/AAOI only). Sees no signs of capex slowing with Meta/Google raises and OpenAI going public. Thinks $XFAB valuations are 'a joke at $1.45B MC' if it's leading Europe's silicon-photonics supply chain.", "tweet_url": "https://x.com/aleabitoreddit/status/2064314680521507114", "created_at": "2026-06-09T11:52:27.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKXwBCxbUAA9onV.jpg", "https://pbs.twimg.com/media/HKXw8ZvacAAhP1Z.jpg"]}, {"category": "positioning", "author": "aleabitoreddit", "text": "$EWY 32%→58% IV expansion trade into ITM SK Hynix/Samsung — a ~383% return on a South Korea index-vol call driven by memory concentration. 'NVDA CEO said memory would be a multi-year shortage; with NAND/DRAM hikes, hyperscalers will be in debt.'", "tweet_url": "https://x.com/aleabitoreddit/status/2064345296226890026", "created_at": "2026-06-09T13:54:06.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKYHGfwbQAATnfL.jpg", "https://pbs.twimg.com/media/HKYHGfxaIAAbfWj.jpg", "https://pbs.twimg.com/media/HKYHGf1aMAASZqU.jpg"]}, {"category": "positioning", "author": "aleabitoreddit", "text": "$SIVE catalyst: Sivers announced $8.2M volume orders for Space applications (beamforming ICs for LEO/multi-orbit satcom). Bigger implication — Sivers now powers a larger defense prime via its allspace acquisition, typically leading to follow-on/volume contracts. A space/defense supply-chain chokepoint ahead of the SpaceX IPO, on top of its photonics AI-DC laser exposure; // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
