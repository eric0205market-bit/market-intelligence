function getCatColor(cat) {

function urgEmoji(u) {
  return u === "now" ? "🔴" : u === "deep" ? "🔵" : "🟡";
}

function urgLabel(u) {
  return u === "now" ? "🔴 Act Now" : u === "deep" ? "🔵 Deep" : "🟡 Watch";
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

function getFilteredItems() {
  return ITEMS.filter(function(item) {
    var catOk = activeCat === "all" || item.cat === activeCat;
    var urgOk = activeUrg === "all" || item.urgency === activeUrg;
    var srcOk = !activeSrc || item.source.indexOf(activeSrc) !== -1;
    return catOk && urgOk && srcOk;
  });
}

function renderCatFilters() {

function buildCard(item) {

    : "";

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === "a" ? item.tweetA : item.tweetB;
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = "✓ Copied";
  setTimeout(function() { btn.textContent = "📋 Copy"; }, 1500);
