<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

<script>
const REPORT_DATA = {"date":"2026-06-30 · 05:21 UTC","summary":"**China vs. US AI dominance** led overnight feeds. Meituan’s 1.6T MoE is now #1 on OpenRouter — trained entirely on 50k Chinese ASICs without GPUs. Alibaba allegedly ran 28.8M fraudulent API calls to steal Claude’s intelligence. Major Western companies (Cursor, Coinbase, Shopify, Airbnb, Uber) are migrating workloads to Chinese models at 10% of US price. ASvanevik: “Never expected China to win the AI soft-power war.”\n\n**MSTR/Strategy MNAV reset**: dampedspring argues Strategy can no longer expand its MNAV beyond 1.0x and will never again outperform a leveraged BTC ETF. sjdedic sees a local bottom bounce; thedefivillain defends the BTC-per-share thesis as unchanged; mhonkasalo notes the LP timing structural problem.\n\n**Regulatory & structural**: Jake Chervinsky puts July as final-stretch for US Crypto Clarity Act — ethics provision (restricting Presidential crypto business) is the 60-vote Senate blocker. Bitcoin BIP-110 governance debate flares with doxxing controversy. Bittensor/TAO gets first Kraken listing of 7 subnet alpha tokens — a major distribution upgrade. X Money launches with 6% APY + $10M FDIC + 3% cashback — called the most impressive CAC offer seen in years. Germany eliminated from World Cup in historic first-ever penalty shootout loss.","events":[{"category":"crypto","title":"MSTR/Strategy MNAV Reset — Saylor’s Capital Framework Overhaul","description":"Strategy announced a Digital Credit Capital Framework. dampedspring argues this ends MSTR’s MNAV expansion above 1.0x and its structural ability to outperform a leveraged BTC ETF. sjdedic sees local bottom bounce; thedefivillain defends BTC-per-share thesis; mhonkasalo flags LP timing structural problem.","items":[{"author":"dampedspring","tweet_url":"","text":"Yes I said I’m bored and done posting about $MSTR. But after today’s news I’ll write down my thoughts as an epilogue to my long term view…\n\nMSTR is now effectively a leveraged closed-end fund with MNAV near 1.0. The preferred eliminates Saylor’s ability to ever expand MNAV meaningfully above 1.0 again, and ends MSTR’s structural ability to outperform a leveraged BTC ETF. Preferred upside: a few points. I’m neutral BTC, buyer at $42,069.","images":[],"created_at":"2026-06-29T23:41:57Z"},{"author":"sjdedic","tweet_url":"","text":"Saylor has finally shown some common sense and in my opinion signaled to the market that he’s not the irrational and systemically dangerous threat everyone made him out to be. Should mark the local bottom for $BTC, $MSTR and $STRC, all of which have been massively oversold over the last few weeks. Bounce imminent. Don’t forget how quickly things can turn reflexive into the other direction again.","images":[],"created_at":"2026-06-29T18:05:25Z"},{"author":"DonAlt","tweet_url":"","text":"BTC staying sideways as Saylor authorizes Bitcoin sales. Tells you all you need to know about how retarded their strategy has been — them selling is starting to turn into good news not bad news. No one wants to deal with their retardation anymore and wants them smaller not bigger.","images":[],"created_at":"2026-06-29T22:16:18Z"},{"author":"thedefivillain","tweet_url":"","text":"The ONLY narrative that shouldn’t change because it’s the core promise of MSTR is that it’s a levered bet on BTC and that BTC-per-share should go up. Everything else is completely non-essential. Selling or not selling BTC is irrelevant wrt the BPS ratio, same for any mNAV guidance.","images":[],"created_at":"2026-06-29T18:05:14Z"},{"author":"mhonkasalo","tweet_url":"","text":"In Saylor’s defense (has been buying for years & still underwater), all crypto funds kinda have a similar problem. Especially bad for like an evergreen fund model. LP interest is highest when it’s the worst time to deploy (=prices high, everyone apeing in) & vice-versa.","images":[],"created_at":"2026-06-29T16:22:15Z"}]},{"category":"ai","title":"Chinese AI Dominance — Model Theft, Migration Wave, No-GPU Infrastructure","description":"Multiple data points converge: Meituan’s 1.6T MoE is #1 on OpenRouter trained on Chinese ASICs only; Alibaba allegedly ran 28.8M fraudulent API calls to steal Claude; major Western companies migrating to Chinese models; ASvanevik: ‘Never expected China to win the AI soft-power war.’","items":[{"author":"PeterDiamandis","tweet_url":"https://www.youtube.com/watch?v=-H7J_-zr7pA","text":"Alibaba allegedly ran 28.8 million fraudulent API exchanges across 25,000 fake accounts to steal Claude’s intelligence. If confirmed, it’s the largest AI model theft ever attempted. The same week, the White House restricted GPT 5.6 to 20 companies, OpenAI delayed its IPO, and Neuralink announced it may attempt brain-to-brain telepathy this year.\n\nOpenAI won’t IPO below $1 trillion. Revenue is $40–50B annually but they’re burning $26B. Chinese proxy services offer Western frontier models at 90% discount — the trade: your reasoning traces get harvested for distillation.","images":[],"created_at":"2026-06-29T21:18:59Z"},{"author":"EMostaque","tweet_url":"https://longcat.chat/blog/longcat-2.0/","text":"Most popular model on @OpenRouter (10tr tokens) turns out to be a 1.6tr MoE by @Meituan_LongCat (superapp/DoorDash of China). Basically Gemini / Opus 4.6 level. 35tr tokens trained entirely on 50k Chinese ASICs. No GPUs needed.","images":[],"created_at":"2026-06-29T21:06:43Z"},{"author":"marcvanderchijs","tweet_url":"","text":"If you had told me this a year ago I wouldn’t have believed it, but Chinese AI is now almost as good as US AI at 10% of the price. I use Deepseek next to paid subscriptions for Claude, ChatGPT and Grok.\n\nWestern companies moving AI workloads to Chinese models: lindy→deepseek v4, cursor→kimi k2.5, coinbase→glm-5.2+kimi 2.7, shopify→qwen, airbnb→qwen, uber→qwen","images":[],"created_at":"2026-06-30T04:52:46Z"},{"author":"ASvanevik","tweet_url":"","text":"Never expected China to win the AI soft-power war. Dario and Sam spend their airtime talking about how AI will destroy jobs. Meanwhile Chinese labs are releasing cheap models and winning the open source community. Did not see this coming!","images":[],"created_at":"2026-06-30T04:41:00Z"},{"author":"dylan522p","tweet_url":"","text":"Everyone is concerned about Chinese models being banned. The entire ecosystem of successful AI startups with real revenue are all catching pretrainitus simultaneously.","images":[],"created_at":"2026-06-29T18:22:24Z"}]},{"category":"tech","title":"SuperMicro ($SMCI) — Taiwan Raids Offices in Chip Exports Probe","description":"Breaking: Taiwan raided SuperMicro offices in an expanding chip exports investigation. ZeeContrarian1 had long flagged the CEO as a red flag — same pattern as $NKLA.","items":[{"author":"ZeeContrarian1","tweet_url":"","text":"JUST IN: Taiwan raids SuperMicro, $SMCI, offices in expanding chip exports probe.\n\nIn the past, I flagged a few companies as fraudulent just by observing their CEOs — like $NKLA and two others now delisted. The point is, you can spot questionable characters a mile away, and the $SMCI CEO was one of them.","images":[],"created_at":"2026-06-30T05:20:33Z"}]},{"category":"tech","title":"X Money Launches — 6% APY, $10M FDIC, 3% Cashback Visa","description":"X Money reportedly launching with highly aggressive customer acquisition terms. SmallCapScience: most impressive CAC offer ever seen. marcvanderchijs: Elon disrupting banking, not using crypto rails.","items":[{"author":"SmallCapScience","tweet_url":"","text":"Is there a catch? If not, that’s one of the more impressive customer acquisition offers I’ve ever seen. Activity on this app is about to explode.\n\n[X Money launching with 6% APY, up to $10M in FDIC insurance, unlimited 3% cashback and a physical Visa metal card.]","images":[],"created_at":"2026-06-30T01:39:06Z"},{"author":"marcvanderchijs","tweet_url":"","text":"Elon is doing it again, this time disrupting banking. Not using crypto rails though.","images":[],"created_at":"2026-06-30T05:00:06Z"}]},{"category":"crypto","title":"Bittensor/TAO — Kraken Lists First Subnet Alpha Tokens","description":"Kraken is set to list 7 Bittensor subnet alpha tokens — a major distribution upgrade from MEXC-only. 0xSammy: distribution unlocks broader attention to subnet fundamentals vs. meme-coin distraction.","items":[{"author":"0xSammy","tweet_url":"","text":"This is starting to get interesting… while the left curve play with memes like ‘ANSEM’ there’s projects with fundamentals that are gaining traction. Only a few Bittensor (TAO) subnets have been listed on centralized exchanges previously (and on MEXC only). Kraken is a level up for distribution for these alpha tokens.\n\nFirst subnets: Chutes.ai, TargonCompute, WeScore, Lium, Ridges, Hippius, VantaTrading","images":[],"created_at":"2026-06-29T17:55:31Z"}]},{"category":"regulation","title":"US Crypto Clarity Act — July Final Stretch, Ethics Provision Blocking 60 Votes","description":"Jake Chervinsky: no deal yet but July is the final stretch — it’s now or never. Ethics provision restricting Presidential crypto business is the key Senate blocker to 60 votes. High noise / low signal period expected.","items":[{"author":"jchervinsky","tweet_url":"","text":"It’s rare in DC for the fate of major legislation to be truly unknown, but that’s where we stand with the Clarity Act right now. July is the final stretch: it’s now or never.\n\nThe main blocker is ethics. There’s no path to 60 votes in the Senate unless Dems get some sort of provision that restricts the President, and maybe his family, from doing business in crypto.\n\nWe may be in a high noise, low signal period while the work gets done behind the scenes.","images":[],"created_at":"2026-06-29T17:34:14Z"}]},{"category":"crypto","title":"Bitcoin BIP-110 Governance — Doxxing Controversy, 200M Bitcoiners vs. 10K Debaters","description":"udiWertheimer supports BIP-110, condemns doxxing of core devs. Notes scale asymmetry: 200M bitcoiners now vs. 10K people arguing about forks. lopp challenges the ‘unknown unknowns’ framing used against upgrades.","items":[{"author":"udiWertheimer","tweet_url":"","text":"i’m a supporter of bip110 and i have been saying for years that core devs should be replaced and that many of them don’t own bitcoin… but you can still have basic human decency and not leak a specific person’s private information publicly.","images":[],"created_at":"2026-06-29T20:49:55Z"},{"author":"udiWertheimer","tweet_url":"","text":"there were 5 million bitcoiners and therefore 100,000 people having an argument about forks could conceivably impact them. there are now 200 million bitcoiners and 10,000 people arguing about forks.","images":[],"created_at":"2026-06-29T23:11:03Z"},{"author":"lopp","tweet_url":"","text":"‘We can’t know unknown unknowns’ is a meaningless statement that doesn’t help the decision making process. Why? Because there are ALWAYS unknown unknowns, for both doing something AND for doing nothing.","images":[],"created_at":"2026-06-29T17:17:23Z"}]},{"category":"macro","title":"World Cup 2026 — Germany Eliminated in Historic Penalty Shootout","description":"Germany lost to Paraguay in penalties — their first ever World Cup penalty shootout loss. elerianm: history made. RayDalio uses the World Cup as a model for international cooperation and optimism across nations.","items":[{"author":"elerianm","tweet_url":"","text":"History is made, and in such a dramatic fashion! Germany knocked out of World Cup by Paraguay in penalty shootout — first ever penalty shootout loss for Germany in a World Cup.","images":[],"created_at":"2026-06-29T23:33:59Z"},{"author":"RayDalio","tweet_url":"","text":"The World Cup games are really something else. Beyond the competition and the games themselves—which are fantastic—there’s this incredible element of how people from different countries interact with each other. People bring their unique personalities and nationalities, and everyone just gets along with so much respect. It’s a beautiful reflection of what the United Nations—and all countries—should be. It brings out a joy, laughter, and a warmth that gives us a real element of optimism. #WorldCup","images":[],"created_at":"2026-06-29T18:23:41Z"}]}],"insights":[{"category":"macro","author":"EconguyRosie","tweet_url":"","text":"I could not believe my eyes when I read what former Kansas City Fed President Esther George had to say — she wouldn’t even wait till September to start hiking rates again. Would Greenspan really be talking about a rate hike? He followed market indicators:\n\n(i) Yield curve: 2s/10s has flattened nearly +20bps since late May to just +30bps\n(ii) Dollar: DXY has strengthened nearly +6% in just five months\n(iii) Credit spreads: CCC-BB spreads widened +30bps since end of May, approaching 800bps for first time since Liberation Day\n(iv) Commodity prices: CRB index rolled over -13% from May peak\n(v) Gold: Down -10% in just past month and -27% from early-year highs","images":[],"created_at":"2026-06-29T19:06:17Z","is_thread":false},{"category":"crypto","author":"Evan_ss6","tweet_url":"https://lighter-vs-hyperliquid.vercel.app/book-depth","text":"Lighter vs Hyperliquid breakdown: Lighter gives better fills for most traders due to fees + more advanced order types (offchain smartTWAP). Hyperliquid has way better liquidity for stock perps. For crypto majors, Lighter tends to be better. Lighter’s RFQ partially solves the stock liquidity gap. \n\nKey: Lighter has a relationship with Robinhood (co-investor, founders know each other from high school). Both still have very little US institutional penetration — could be a large growth avenue for both.","images":[],"created_at":"2026-06-29T22:24:34Z","is_thread":true},{"category":"ai","author":"munster_gene","tweet_url":"","text":"While Google’s entry into the Dow captured headlines, the real story is Samsung’s and SK Hynix’s capex buildout. The combined $590B in factory investments is about 48% higher than most had expected, underscoring yet again how early we are in the AI buildout.","images":[],"created_at":"2026-06-29T21:16:16Z","is_thread":false},{"category":"ai","author":"Melt_Dem","tweet_url":"","text":"Kicking off a new Crucible series on ‘The World as Model’ — the prize: to build what HFTs built for financial markets, but for the physical world.\n\nHFTs didn’t win because they had better theories about markets. They won because they found representations in which prediction became economically useful.\n\nThe data to enable the industrial economy to reason natively doesn’t exist yet — that is beginning to change. Hardware companies building markets—not models—will determine who builds the enduring companies in physical AI.\n\nWhoever discovers the right representations for the physical world will compress reality most efficiently, make better predictions at lower cost, and ultimately determine how physical assets are financed and priced.","images":[],"created_at":"2026-06-29T16:37:40Z","is_thread":true},{"category":"tech","author":"aleabitoreddit","tweet_url":"","text":"For robotics companies, I have a favorable view on Unitree and Agility Robotics (largest concentration in Agility — prefer US humanoid players). For upstream component exposure: Harmonic Drive (6324), Vishay Precision for sensors (possible Tesla Optimus candidate).\n\nMarkets rotate from bottleneck to bottleneck. Memory from $SNDK to $MU was the main focus this month, while optical names like $AAOI corrected. Rotation back into photonics likely — personally my highest concentration theme. Reached 900k followers.","images":[],"created_at":"2026-06-29T23:01:04Z","is_thread":true},{"category":"ai","author":"Delphi_Digital","tweet_url":"https://members.delphidigital.io/data/apps/rwa-perp-funding","text":"Why the AI memory trade may be more than momentum: ‘If you think supply is going to come online or prices from memory are just going to collapse after this recent rise, you could still make the argument that these are fairly valued in that environment.’\n\nNew: RWA perp funding dashboard — track cross-venue funding rates, backtest arbitrage between exchanges. Free in the Delphi Portal.","images":[],"created_at":"2026-06-29T23:09:14Z","is_thread":true},{"category":"macro","author":"RayDalio","tweet_url":"","text":"When you apply the 80/20 rule to company analysis, you start by getting a threshold level of understanding — enough to see what really drives the business and what is just noise. The key 20% are the few data points, metrics, and insights that directly influence core outcomes: revenue drivers, cost structures, competitive positioning, and strategic risks.\n\nSeparate high-value vs. easy-but-low-impact activities by tracing cause-effect relationships to ultimate outcomes.","images":[],"created_at":"2026-06-29T21:07:21Z","is_thread":true},{"category":"crypto","author":"VitalikButerin","tweet_url":"","text":"My interpretation of FDT has always been that you’re supposed to conceive of your conscious self as simultaneously operating on all instantiations of it. Your consciousness is not situated either in the physical you alone, or in the simulated you alone. It is situated in the entire equivalence class of instantiations that are running the algorithm that is ‘you’.\n\nFolk morality is already somewhere in between CDT and FDT, even if not consciously stated.","images":[],"created_at":"2026-06-29T18:15:33Z","is_thread":true},{"category":"crypto","author":"sjdedic","tweet_url":"","text":"If prediction markets come to Solana (world_xyz) and perp DEX fills (jtx_trade, PhoenixTrade), the last two missing pieces of the puzzle are finally filled — leaving one chain that hosts everything retail and institutional finance could ask for. At which point I genuinely struggle to see what reason is left for most other chains to even exist.","images":[],"created_at":"2026-06-29T21:06:57Z","is_thread":false},{"category":"macro","author":"Pentosh1","tweet_url":" // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
