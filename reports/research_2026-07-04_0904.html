const META = {
  date: "2026-07-04",
  time: "09:04 CEST",
  windowStart: "2026-07-04 03:04 CEST",
  windowEnd: "2026-07-04 09:04 CEST",
  emailsInWindow: 8,
  emailsRead: 8,
  itemsExtracted: 19,
  includedSources: [
    {name:"The Dark Side of the Boom / thedarksideoftheboom", count:5},
    {name:"DTI Newsletter / dtinewsletter (Italian)", count:1},
    {name:"Michael Parekh / AI-RTZ #1137", count:5},
    {name:"Callum Thomas / ChartStorm", count:1},
    {name:"Princeton Chen / Daily News Wall", count:7}
  ],
  skippedSources: [
    {name:"(none within the 6-hour window)", reason:"All 8 emails received in the window contained substantive original content and were processed. One older email (00:54 UTC, 'Halftime Adjustments') fell just outside the 6-hour cutoff and was correctly excluded, not skipped."}
  ]
};

let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id){
  var body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function toggleReport(){
  document.getElementById('reportBody').classList.toggle('open');
  var chev = document.getElementById('reportChevron');
  chev.textContent = document.getElementById('reportBody').classList.contains('open') ? '▴' : '▾';
}

function setCat(c){
  activeCat = c;
  activeSrc = null;
  render();
}
function setUrg(u){
  activeUrg = u;
  activeSrc = null;
  render();
}
function filterBySrc(name){
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  render();
}
function clearSrcFilter(){
  activeSrc = null;
  render();
}

function buildBars(){
  var catCounts = {};
  ITEMS.forEach(function(i){ catCounts[i.cat] = (catCounts[i.cat]||0)+1; });
  var catBar = document.getElementById('catBar');
  var html = '<button class="pill' + (activeCat==='all'?' active':'') + '"' +
    (activeCat==='all' ? ' style="background:#333;"' : '') +
    ' onclick="setCat(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  Object.keys(CATS).forEach(function(key){
    if(!catCounts[key]) return;
    var active = activeCat === key;
    html += '<button class="pill' + (active?' active':'') + '"' +
      (active ? ' style="background:' + CATS[key].color + ';"' : '') +
      ' onclick="setCat(\'' + key + '\')">' + esc(CATS[key].label) + ' <span class="count">' + catCounts[key] + '</span></button>';
  });
  catBar.innerHTML = html;

  var urgCounts = {};
  ITEMS.forEach(function(i){ urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1; });
  var urgBar = document.getElementById('urgBar');
  var uhtml = '<button class="pill' + (activeUrg==='all'?' active':'') + '"' +
    (activeUrg==='all' ? ' style="background:#333;"' : '') +
    ' onclick="setUrg(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  Object.keys(URG).forEach(function(key){
    if(!urgCounts[key]) return;
    var active = activeUrg === key;
    uhtml += '<button class="pill' + (active?' active':'') + '"' +
      (active ? ' style="background:#555;"' : '') +
      ' onclick="setUrg(\'' + key + '\')">' + URG[key].label + ' <span class="count">' + urgCounts[key] + '</span></button>';
  });
  urgBar.innerHTML = uhtml;
}

function renderCards(){
  var list = ITEMS.filter(function(i){
    if(activeSrc && i.source !== activeSrc) return false;
    if(activeCat !== 'all' && i.cat !== activeCat) return false;
    if(activeUrg !== 'all' && i.urgency !== activeUrg) return false;
    return true;
  });
  var container = document.getElementById('cards');
  var html = '';
  list.forEach(function(item){
    var cat = CATS[item.cat];
    var urg = URG[item.urgency];
    var chartIcon = item.charts && (item.charts.count > 0 || item.charts.desc) ?
      '<span class="chart-icon">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '';
    var expand = (activeSrc === item.source) ? ' open' : '';
    html += '<div class="card">';
    html += '<div class="card-head" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + item.id + '</span>';
    html += '<span>' + urg.short + '</span>';
    html += '<span class="badge" style="background:' + cat.color + '">' + esc(item.source.split(' / ')[0]) + '</span>';
    html += '<span class="tag">' + esc(cat.label) + '</span>';
    html += chartIcon;
    html += '<span class="title">' + esc(item.title) + '</span>';
    html += '</div>';
    html += '<div class="card-body' + expand + '" id="body-' + item.id + '">';
    html += '<div class="section-label">The Idea</div><div class="idea">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle" style="border-left:2px solid ' + cat.color + '; background:' + cat.color + '14;">' + esc(item.angle) + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + esc(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + esc(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if(item.charts && (item.charts.count > 0 || item.charts.desc)){
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + esc(item.charts.desc || 'Charts inside.') + '</div>';
    }
    html += '<div class="linkrow"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html || '<div style="color:#928d84;padding:20px 0;">No items match this filter.</div>';
}

function renderMeta(){
  document.getElementById('metaLine').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
}

function renderNote(){
  var note = document.getElementById('activeFilterNote');
  if(activeSrc){
    note.style.display = 'block';
    note.innerHTML = 'Filtered by source: ' + esc(activeSrc) + ' <span class="clearFilter" onclick="clearSrcFilter()">✕ clear</span>';
  } else {
    note.style.display = 'none';
  }
}

function renderReport(){
  var body = document.getElementById('reportBody');
  var html = '';
  html += '<h4>Time Window</h4>';
  html += '<div>' + META.windowStart + ' &rarr; ' + META.windowEnd + '. Emails outside this window were not processed.</div>';
  html += '<h4>Emails</h4>';
  html += '<div>' + META.emailsInWindow + ' emails in window · ' + META.emailsRead + ' read · ' + META.itemsExtracted + ' items extracted.</div>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(function(s){
    html += '<div><span class="srcline" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count===1?'':'s') + '</div>';
  });
  html += '<h4>Skipped</h4>';
  META.skippedSources.forEach(function(s){
    html += '<div>' + esc(s.name) + ' — ' + esc(s.reason) + '</div>';
  });
  body.innerHTML = html;
}

function render(){
  buildBars();
  renderCards();
  renderNote();
}

renderMeta();
render();
renderReport();
</script>
