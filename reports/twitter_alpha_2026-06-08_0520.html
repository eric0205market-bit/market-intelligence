<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  --cat-macro: #2563eb;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-tech: #0d9488;
  --cat-ai: #4f46e5;
  --cat-geopolitics: #dc2626;
  --cat-positioning: #15803d;
  --cat-regulation: #7c3aed;
  --cat-society: #d97706;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"date":"2026-06-08 05:20 UTC","summary":"**Israel–Iran escalation** dominated overnight: IDF struck military targets across Iran in direct defiance of Trump's request. Geiger_Capital called it a total humiliation for Trump, and Zineb Riboua confirmed the outcome she had long predicted — no deal is on the table. Houthis fired a missile at Israel shortly after; Riboua notes they must have gotten something in exchange, pointing to proxy coordination.\n\n**Markets crashed hard** into the weekend. SpotGamma documented the S&P dropping **200 points** as crowded AI positioning unwound fast; Quinn Thompson flags Friday as the **2nd worst day for long beta momentum on record.** KOSPI fell **~15% in 4 sessions** (Puru Saxena, who raised cash and bought puts ahead of the move). Ed Bradford (Fullcarry) flagged a UST dump Sunday night before S&P futures showed a tentative turnaround.\n\n**Crypto pulled back sharply** on STRC depeg and Saylor-selling fear. Evan_ss6 declared the bear trade done — covered shorts at BTC **$62.9k / ETH $1,675**, bought ETH weekly calls at $1,565 for a violent bounce. Retains HYPE and LIT as perpdex longs. VIKTOR (thedefivillain) clarifies: Saylor selling MSTR for BTC is essentially neutral at ~1.2x EV mNAV — the real benefit is reducing leverage.\n\n**AI narrative split:** Haseeb (Dragonfly) pushed back on the viral Chinese model displacement chart — mostly subsidized Groupon-chasing tokens, not real displacement, though Kimi/DeepSeek are genuinely strong. Brian Armstrong argues 80% of workloads will run on 99%-cheaper models in 12–18 months; limiting factor shifts to energy and compute. Jim Bianco wrote the session's most thought-provoking piece: uniform AI briefings risk recreating 1950s-70s groupthink — active stock-picking is poised for a comeback.\n\n**Notable events:** Yuga Labs (figge) executed a whitehat NFT rescue from a Flooring Protocol exploit, saving 29 BAYC and dozens more. Serenity (aleabitoreddit) published a detailed bull thesis on **LeaderDrive (688017)** as China's dominant robotics component supplier — covered by China Securities Journal. Creator token N3on was rugged by Thrust: $1.5M collected, tokens dumped, posts deleted.","events":[{"category":"geopolitics","title":"Israel Strikes Iran — Trump Defied, No Deal in Sight","description":"IDF struck military targets across Iran overnight in direct defiance of Trump's request. Houthis then fired on Israel. Multiple sources confirm: no deal.","items":[{"author":"Geiger_Capital","tweet_url":"https://x.com/Geiger_Capital/status/2063797449936744839","text":"Israel bombed Iran in direct defiance of Trump saying not to do it. They do not want a deal. Trump was pulled into this war and now he can't get out — took over his entire 2nd term. Follow-up: \"Total humiliation for Trump.\"","images":[],"created_at":"2026-06-08T01:37:10.000Z","is_thread":false},{"author":"biancoresearch","tweet_url":"https://x.com/biancoresearch/status/2063797901617250434","text":"Bloomberg red headline crossing: *ISRAEL'S IDF SAYS STRUCK MILITARY TARGETS IN IRAN — breaking just minutes after Trump was quoted: \"Hopefully Israel is not going to retaliate. If Bibi strikes them back it's just gonna keep going like the last 47 years.\"","images":[],"created_at":"2026-06-08T01:38:57.000Z","is_thread":false},{"author":"zriboua","tweet_url":"https://x.com/zriboua/status/2063830164136497417","text":"No deal, as she has said multiple times. Reacting to Houthis firing missile at Israel. Adds: the Houthis 1000% must have gotten something in exchange for this — implying a proxy coordination deal was struck. Interesting angle on what concessions may have been exchanged.","images":[],"created_at":"2026-06-08T03:47:09.000Z","is_thread":true}]},{"category":"macro","title":"TradFi Carnage — S&P -200pts, AI Trade Unwind, Asia Circuit Breakers","description":"Friday was the 2nd worst long-beta momentum day on record. Asian markets continued the rout into the weekend with circuit breakers triggering across multiple exchanges.","items":[{"author":"spotgamma","tweet_url":"https://x.com/spotgamma/status/2063729963430486248","text":"Crowded AI positioning unwound fast — S&P dropped 200 points Friday. Spillover risk extends well beyond semiconductors. Event-heavy week ahead; near-term volatility stays elevated. On Friday: 66% of 0DTE options (2.8M of 4.3M) were puts.","images":[],"created_at":"2026-06-07T21:09:00.000Z","is_thread":false},{"author":"qthomp","tweet_url":"https://x.com/qthomp/status/2063825152895484278","text":"Friday was the 2nd worst day for long beta momentum on record. $SPX $QQQ $IWM.","images":[],"created_at":"2026-06-08T03:27:15.000Z","is_thread":false},{"author":"saxena_puru","tweet_url":"https://x.com/saxena_puru/status/2063797543096713570","text":"KOSPI down ~15% in just 4 trading sessions — chart shows still extended. Was positioned defensively: raised cash and bought puts ahead of the crash.","images":["https://pbs.twimg.com/media/HKQU2KBbcAANM_R.jpg"],"created_at":"2026-06-08T01:37:32.000Z","is_thread":false},{"author":"zeroxkyle","tweet_url":"https://x.com/zeroxkyle/status/2063793795456757763","text":"The entirety of Asia taking turns to pass the baton of circuit breaking. Follow-up: Rotation back into strong players in the meta is the only thing left to do — glass cannon builds got absolutely smoked this patch.","images":[],"created_at":"2026-06-08T01:22:38.000Z","is_thread":false},{"author":"Fullcarry","tweet_url":"https://x.com/Fullcarry/status/2063783045782474929","text":"Posted S&P futures chart: \"Turnaround Sunday night.\" Earlier flagged the UST sell-off: \"USTs just dumped. News?\" — questioning the move coinciding with Israel-Iran strike headlines.","images":["https://pbs.twimg.com/media/HKQHvihWoAAcoRI.png"],"created_at":"2026-06-08T00:39:56.000Z","is_thread":false}]},{"category":"crypto","title":"Crypto Sell-Off — STRC Depeg, Saylor Selling Fear, Bounce Trade Opened","description":"BTC fell to ~$62.9k on STRC depeg and Saylor-selling fears. Evan_ss6 declared the bear trade done and opened a long bounce position.","items":[{"author":"Evan_ss6","tweet_url":"https://x.com/Evan_ss6/status/2063767371358052691","text":"Trade closed: covered remaining crypto shorts at BTC $62.9k / ETH $1,675. Bought ETH weekly calls at $1,565 ref for a violent bounce into Friday close. Retains 2/3 of Sept puts (deeply ITM, may roll out). Still long HYPE and LIT (perpdex thesis intact). New TradFi buy: Kioxia (285A). Key insight on Saylor: can cover dividends with ~$140M of MSTR sales/day — the selling fear may be overblown short-term. Hottest streak of the year.","images":["https://pbs.twimg.com/media/HKP5cU3XkAE2hZo.jpg"],"created_at":"2026-06-07T23:37:38.000Z","is_thread":true},{"author":"thedefivillain","tweet_url":"https://x.com/thedefivillain/status/2063678372996153795","text":"MSTR framework: accretive/dilutive threshold for Saylor operations is ~1.2x EV mNAV (per their website). At current levels, selling MSTR for BTC is roughly neutral per-share. The real benefit is reducing leverage — not accretion.","images":[],"created_at":"2026-06-07T17:44:00.000Z","is_thread":false}]},{"category":"crypto","title":"Flooring Protocol Exploit — Yuga Labs Whitehat Rescue","description":"Dust WETH inflated to near-infinite fpToken balance drained Flooring pools. Yuga Labs / GrailsOTC fronted funds to rescue at-risk NFTs before broader exploitation.","items":[{"author":"mfigge","tweet_url":"https://x.com/mfigge/status/2063782936399544740","text":"Yuga Labs completed a whitehat rescue of 29 Bored Apes, 4 Mutant Apes, 1 BAKC, 2 CryptoPunks, 1 Azuki, 2 Elementals, 26 Captains, 1 Moonbird, 2 Doodles from Flooring Protocol. @coffeedev spotted a secondary vulnerability threatening BAYC and CryptoPunk pools. GrailsOTC trading desk fronted funds and NFTs to rescue assets. Protocol devs will work with Yuga to return — likely involves contract relaunches.","images":[],"created_at":"2026-06-08T00:39:29.000Z","is_thread":true}]},{"category":"crypto","title":"N3on Token Rug — Thrust Collects $1.5M, Dumps, Deletes","description":"Creator token rug with explicit utility promises: Thrust promised token-holder governance over N3on's stream.","items":[{"author":"beaniemaxi","tweet_url":"https://x.com/beaniemaxi/status/2063785873330614429","text":"Thrust launched N3on token promising \"creator capital markets\" — holders could vote on stream topics and guests. Collected $1.5M, dumped all tokens, deleted all posts.","images":["https://pbs.twimg.com/media/HKQJzLeW8AAJj_6.jpg"],"created_at":"2026-06-08T00:51:10.000Z","is_thread":false}]}],"insights":[{"author":"biancoresearch","category":"ai","tweet_url":"https://x.com/biancoresearch/status/2063771201546199075","text":"Jim Bianco's AI groupthink essay: In the 1950s–70s, information scarcity (everyone reading the same NYT on the commute) produced exploitable consensus edges — alpha was higher because groupthink created predictable mispricings. Today, AI risks recreating that dynamic at digital speed: millions of users generate daily briefings with near-identical prompts fed to overlapping models, yielding essentially the same market summaries and conclusions. Google searches (2005–2024) never did this because they were ad-hoc. \"Independent thinkers who step outside the AI echo chamber will soon regain that same advantage. Active stock-picking is poised for a comeback.\"","images":["https://pbs.twimg.com/media/HKP7zi9XoAAzgY_.jpg"],"created_at":"2026-06-07T23:52:52.000Z","is_thread":false},{"author":"hosseeb","category":"ai","tweet_url":"https://x.com/hosseeb/status/2063843326676062622","text":"Haseeb (Dragonfly) contextualizes the viral chart showing Chinese AI displacing US models among American startups. Key: Chinese labs run massive multi-week subsidized campaigns — 80%+ off, some models literally free at launch (e.g. StepFun Flash). These tokens are Groupon users who'll never pay. A proper comparison must normalize for model weight class. That said: Kimi and DeepSeek have built genuine frontier models at a fraction of US costs — real displacement is happening. Don't overread the inflated subsidized token counts.","images":[],"created_at":"2026-06-08T04:39:28.000Z","is_thread":false},{"author":"aleabitoreddit","category":"tech","tweet_url":"https://x.com/aleabitoreddit/status/2063851425462173726","text":"Serenity (dubbed \"White-Haired God of Stocks\" by China Securities Journal) makes a detailed bull case for LeaderDrive (688017, $10.65B MC) as China's dominant robotics component play. Thesis: (1) multiple high-barrier components — harmonic reduction gears and planetary roller screws; (2) high BOM value per humanoid unit; (3) mass production at low cost. Goldman Sachs Research flags it for high tech barriers. Risk: emerging Chinese competitors eroding individual component share; margin compression (sensors: $750 early production → $150). TSLA Optimus deliberately builds China supply chains for $15–20k humanoids. Current $10.65B MC looks tiny if millions of humanoids are produced annually in 3–5 years. Long-term thesis, not a short-term trade.","images":["https://pbs.twimg.com/media/HKRF18YaoAAyZtp.jpg"],"created_at":"2026-06-08T05:11:38.000Z","is_thread":false},{"author":"brian_armstrong","category":"ai","tweet_url":"https://x.com/brian_armstrong/status/2063782620815876515","text":"AI cost curve thesis: 80% of workloads will run on 99%-cheaper models within 12–18 months. 20% stay on latest-gen where IQ matters most (scientific breakthroughs, high-level orchestrators). Analogy: like what % of Macs ship with maxed specs — except costs are falling faster than Moore's Law. Limiting factor becomes energy and compute, not smarter models. At Coinbase, routing prompts to cheaper models has kept costs roughly flat while token usage grows exponentially.","images":[],"created_at":"2026-06-08T00:38:14.000Z","is_thread":false},{"author":"paulg","category":"ai","tweet_url":"https://x.com/paulg/status/2063776645895311863","text":"On making startups AI-proof: marketplaces resist AI competitors for the same reason they resist human ones — the moat is network effects, not cognitive work. Patents are similarly protective: being able to think of an idea is useless if you can't legally implement it. (AI might be better at finding patent workarounds, but filers can use AI to anticipate and seal them off.) Build where intelligence isn't the bottleneck.","images":[],"created_at":"2026-06-08T00:14:30.000Z","is_thread":true},{"author":"garrytan","category":"ai","tweet_url":"https://x.com/garrytan/status/2063786111588323780","text":"AI education has become a serious bottleneck — responding to widespread frustration that tools feel evidently the future but somehow gatekept. YC built Paxel to address this. Separate agent design take: don't build Foxconn factories making agents do the same thing repeatedly. Agents are smart and thoughtful — let them do more, not less. Also: GBrain v0.42.30 can now summarize how your thinking has changed over time.","images":[],"created_at":"2026-06-08T00:52:06.000Z","is_thread":true},{"author":"krugermacro","category":"crypto","tweet_url":"https://x.com/krugermacro/status/2063733362326667560","text":"Detailed MSTR/BTC scenario analysis. Best case: BTC rallies and Saylor selling pressure is absorbed; MSTR NAV premium reprices upward. Worst case: trust erodes around STRC as an instrument, forces panic BTC selling, structural de-rating. Short-term trade strategy: buy the dip in stocks, take profit on bounces, de-risk if peace accord materializes. Engaged with Evan_ss6 on Polymarket data suggesting MicroStrategy may have bought (not sold) BTC — which would explain Sunday's bounce. But dividend-driven selling remains a structural drag.","images":[],"created_at":"2026-06-07T21:18:00.000Z","is_thread":true},{"author":"jonchu","category":"tech","tweet_url":"https://x.com/jonchu/status/2063750278160286074","text":"Enterprise sales lesson from 2012 startup experience: distinguish technical interest from buyer interest. Many people show technical enthusiasm but have no budget authority or urgency — these are not real leads. Separate: Marvell ($MRVL) as a CXL play — PE comparison suggests potential undervaluation vs. AI infrastructure peers. Also: YC returns discussion arguing real entry valuations remain low despite high headline multiples.","images":[],"created_at":"2026-06-07T22:30:00.000Z","is_thread":true},{"author":"theallinpod","category":"macro","tweet_url":"https://x.com/theallinpod/status/2063691506548916327","text":"Full episode on the private secondary market boom with Brad Gerstner (Altimeter), Gavin Baker, and Kelly Rodriques (Forge Global). Topics: why companies stay private so long, the Forge-Schwab deal democratizing access, SPVs as exit liquidity, whether private markets are in a bubble, and the hottest secondary names right now.","images":[],"created_at":"2026-06-07T18:36:11.000Z","is_thread":false},{"author":"sama","category":"ai","tweet_url":"https://x.com/sama/status/2063779477419901071","text":"Codex 100-day usage incentive: one impressive Codex user selected per day for 10x usage limits for a month. Sam notes it creates an interesting recursive loop — AI output selecting who gets more AI access.","images":[],"created_at":"2026-06-08T00:25:45.000Z","is_thread":false},{"author":"ErikVoorhees","category":"ai","tweet_url":"https://x.com/ErikVoorhees/status/2063666104808136784","text":"Shared Bloomberg report: Trump told reporters his team might buy US stakes in AI companies, and would host AI executives as soon as next week. Potential catalyst for AI sector government investment flows.","images":["https://pbs.twimg.com/media/HKOdWb-bAAAbTCB.jpg"],"created_at":"2026-06-07T16:55:15.000Z","is_thread":false},{"author":"stevehou","category":"ai","tweet_url":"https://x.com/stevehou/status/2063801462589940054","text":"On Grok vs other LLMs for markets: logical reasoning as good as competing models; for markets it's unbeatable because of real-time access to X. Open source models are less informed of English content and news. Building a workflow around Grok's X data advantage for market intelligence.","images":[],"created_at":"2026-06-08T01:53:06.000Z","is_thread":false},{"author":"himgajria","category":"macro","tweet_url":"https://x.com/himgajria/status/2063853228371169651","text":"Chart posted at 5:18 UTC Sunday: Bitcoin now, equities next — risk-on about to collapse, temporarily. Earlier on KOSPI: was down before Wall Street puked on Friday, and this is just the beginning.","images":["https://pbs.twimg.com/media/HKRHkclaIAAaDiN.jpg"],"created_at":"2026-06-08T05:18:48.000Z","is_thread":false},{"author":"cobie","category":"society","tweet_url":"https://x.com/cobie/status/2063739644517204408","text":"Meta thread on prediction record transparency: argues that market commentators should maintain accessible tweet archives so their historical accuracy can be verified. Notes the expectation gap between how people present their track records and what the archive actually shows.","images":[],"created_at":"2026-06-07T21:48:00.000Z","is_thread":true},{"author":"hooeem","category":"tech","tweet_url":"https://x.com/hooeem/status/2063685824596594830","text":"Analysis of tiered referral distribution models (Tier 1–5 incentive structures). Most referral structures over-incentivize Tier 1 at the expense of sustainable distribution — the optimal structure aligns incentives across all tiers to create genuine network effects rather than churn.","images":[],"created_at":"2026-06-07T18:04:00.000Z","is_thread":true},{"author":"RayDalio","category":"society","tweet_url":"https://x.com/RayDalio/status/2063709302892663287","text":"Principle of the day: Make sure they're fully informed and believable. Find out who is responsible for whatever you are seeking to understand and then ask them. Listening to uninformed people is worse than having no answers at all.","images":["https://pbs.twimg // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
