us correlation of two trending series. When you look at YoY growth rates, Fed balance sheet expansion is actually negatively correlated with forward equity returns. This invalidates one of the most common macro frameworks used to justify equity bullishness."}, {"title": "Aave v4 Hub & Spoke: Credit Lines Converge Rates Between Prime ($532M) and Core ($35B)", "author": "Delphi_Digital", "tweet_url": "https://x.com/Delphi_Digital/status/2057159327065247978", "is_thread": true, "category": "crypto", "content": "Aave v4 Hub & Spoke architecture: Prime instance ($532M TVL) is isolated from Core ($35B TVL) causing rates to drift inefficiently. v4 credit lines will converge rates across instances. The structural question is whether Aave can build consumer-facing products at scale or remains a developer infrastructure play."}, {"title": "Markets Too Optimistic on Iran Deal: 54% Expect Strait Open by End of June", "author": "biancoresearch", "tweet_url": "https://x.com/biancoresearch/status/2057122037605212311", "is_thread": true, "category": "energy", "content": "Three-part thread: 54% of fund managers surveyed believe the Strait of Hormuz reopens by end of June. 76% think crude ends the year below $90. December Brent is currently $92, implying the market is already pricing the deal. Jim Cramer going 'all-in' on the Iran deal resolution is flagged as a contrarian indicator. Bianco's view: Trump gives them what they want to hear, and they buy it every time."}, {"title": "Consumer Psychology on Gas Prices: Behavioral Resilience Is Eroding", "author": "elerianm", "tweet_url": "https://x.com/elerianm/status/2057144514934956227", "is_thread": false, "category": "macro", "content": "Consumers believe the energy price surge is temporary and reversible, so they haven't changed habits. This behavioral resilience is a one-time buffer. The psychological ceiling erodes over time — especially if prices bounce back after a brief decline. The implication: once the behavioral buffer is gone, the demand destruction and second-order effects hit simultaneously."}, {"title": "Jito Q1: BAM Stake Doubled to 28-31%, FireBAM Nearly Ready, JIP May Cliff Q3 Incentives", "author": "Blockworks", "tweet_url": "https://x.com/Blockworks/status/2057152567092633808", "is_thread": false, "category": "crypto", "content": "Jito Q1 highlights: BAM (Block-level Auction Mechanism) stake doubled from 14% to 28% (now tracking 31-32%), validator count up 50%, FireBAM nearly ready for mainnet. A JIP (Jito Improvement Proposal) may restructure Q3 incentive step-downs into a single cliff — a significant tokenomics event for JTO holders."}, {"title": "RoboStrategy: MicroStrategy Model for Robotics — Andrew Kang as CEO", "author": "Rewkang", "tweet_url": "https://x.com/Rewkang/status/2057121533668085913", "is_thread": false, "category": "tech", "content": "RoboStrategy names Andrew Kang CEO. The model: public capital raised at scale, redeployed into private robotics companies, similar to MicroStrategy's bitcoin treasury model. Accretive share issuance compounds NAV. A new capital formation primitive for the robotics sector."}, {"title": "Catena Labs Raises $30M Series A, Files for National Trust Bank Charter for Agentic Finance", "author": "TheBlockCo", "tweet_url": "https://x.com/TheBlockCo/status/2057103061705793845", "is_thread": false, "category": "AI/infra", "content": "Catena Labs raised $30M in a Series A and filed for a national trust bank charter to build agentic finance infrastructure. This is the first major move toward AI agent-native financial rails with a regulatory banking framework — potentially a new primitive for autonomous trading and settlement."}, {"title": "Euro Stablecoin MiCA Recovery: Reclaimed ATH After -73% Pre-MiCA Drawdown", "author": "DefiLlama", "tweet_url": "https://x.com/DefiLlama/status/2057161099972157937", "is_thread": false, "category": "crypto", "content": "Euro-denominated stablecoins dropped 73% ahead of MiCA's December 2024 enforcement date const CAT_COLORS = {
  macro: 'var(--pill-macro)', crypto: 'var(--pill-crypto)', 'AI/infra': 'var(--pill-ai)',
  energy: 'var(--pill-energy)', geopolitics: 'var(--pill-geopolitics)', tech: 'var(--pill-tech)',
  defense: 'var(--pill-defense)', credit: 'var(--pill-credit)', labor: 'var(--pill-labor)',
  regulation: 'var(--pill-regulation)', commodities: 'var(--pill-commodities)',
  'real-estate': 'var(--pill-realestate)'
};

function catPill(cat) {
  const bg = CAT_COLORS[cat] || '#888';
  return `<span class="cat-pill" style="background:${bg}">${cat}</span>`;
}

function tweetLink(url, label) {
  if (!url) return '';
  return `<a href="${url}" target="_blank" class="tweet-link">${label || 'tweet →'}</a>`;
}

function renderHeader() {
  const d = REPORT_DATA;
  document.getElementById('report-date').textContent = d.date || '';
  const stats = [
    `${d.total_tweets_in || 0} tweets in`,
    `${d.after_filter || 0} after filter`,
    `${d.total_items || 0} curated items`,
    `${d.watchlist_count || 0} watchlist · ${d.research_count || 0} research`,
    d.api_cost ? `$${d.api_cost} API` : null
  ].filter(Boolean);
  document.getElementById('stats-bar').innerHTML = stats.map(s => `<span class="stat">${s}</span>`).join('');
}

function renderSummary() {
  const box = document.getElementById('summary-box');
  const lines = (REPORT_DATA.summary || []);
  box.innerHTML = '<h2>Summary</h2>' + lines.map(l => `<p>${l}</p>`).join('');
}

function makeSection(letter, name, count, contentHtml) {
  return `
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${name}</span>
        <span class="section-count">${count}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${contentHtml}</div>
    </div>`;
}

function renderSectionA(items) {
  if (!items || !items.length) return '';
  let html = '';
  items.forEach((cluster, i) => {
    let voicesHtml = '';
    (cluster.voices || []).forEach(v => {
      const cls = v.contrarian ? 'voice voice-contrarian' : 'voice';
      const prefix = v.contrarian ? '↩ ' : '';
      voicesHtml += `<div class="${cls}"><span class="voice-author">@${v.author}</span>: ${prefix}${v.text} ${tweetLink(v.tweet_url)}</div>`;
    });
    html += `
      <div class="cluster">
        <div class="card-header">${catPill(cluster.category)} <span class="card-id">A${i+1}</span></div>
        <div class="card-title">${cluster.title}</div>
        <div class="card-content">${cluster.description || ''}</div>
        <div class="cluster-voices">${voicesHtml}</div>
      </div>`;
  });
  return makeSection('A', 'Events & Reactions', items.length + ' clusters', html);
}

function renderCardSection(letter, name, items) {
  if (!items || !items.length) return '';
  let html = '';
  items.forEach((item, i) => {
    const threadBadge = item.is_thread ? ' <span class="thread-badge">thread</span>' : '';
    const imgHtml = (item.images || []).map(u => `<img src="${u}" class="chart-img" loading="lazy">`).join('');
    html += `
      <div class="card">
        <div class="card-header">${catPill(item.category || 'macro')} <span class="card-id">${letter}${i+1}</span>${threadBadge}</div>
        ${item.title ? `<div class="card-title">${item.title}</div>` : ''}
        <div class="card-content">${item.content}${imgHtml}</div>
        <div class="card-attribution">@${item.author} ${tweetLink(item.tweet_url)}</div>
      </div>`;
  });
  return makeSection(letter, name, items.length + ' items', html);
}

function renderSectionC(items) {
  if (!items || !items.length) return makeSection('C', 'Data & Charts', '0 images', '<div class="card"><div class="card-content" style="color:var(--text3)">No images available in this collection.</div></div>');
  let html = '';
  items.forEach((item, i) => {
    const imgs = (item.images || []).map(u => `<img src="${u}" class="chart-img" loading="lazy">`).join('');
    html += `
      <div class="card">
        <div class="card-header"><span class="card-id">C${i+1}</span></div>
        <div class="card-content">${item.label || ''} — @${item.author}${imgs}</div>
        <div class="card-attribution">${tweetLink(item.tweet_url)}</div>
      </div>`;
  });
  return makeSection('C', 'Data & Charts', items.length + ' images', html);
}

function renderSectionF(items) {
  if (!items || !items.length) return '';
  let rows = '';
  items.forEach(item => {
    const img = item.has_image ? '📊' : '';
    rows += `<tr>
      <td><strong>${item.bank || '?'}</strong></td>
      <td>${item.topic || ''}</td>
      <td>${img}</td>
      <td>${tweetLink(item.tweet_url, '@' + (item.shared_by || ''))}</td>
    </tr>`;
  });
  const html = `<table class="research-table">
    <tr><th>Bank</th><th>Topic</th><th>Chart</th><th>Shared by</th></tr>
    ${rows}</table>`;
  return makeSection('F', 'Bank Research Catalog', items.length + ' entries', html);
}

function renderSectionG(items) {
  if (!items || !items.length) return '';
  let html = '';
  items.forEach(item => {
    html += `<div class="link-item">
      <span class="link-source">@${item.author || '?'}</span>
      <span class="link-url"><a href="${item.url}" target="_blank">${item.url}</a></span>
      <span>${item.description || ''}</span>
    </div>`;
  });
  return makeSection('G', 'Link Queue', items.length + ' links', html);
}

function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function render() {
  renderHeader();
  renderSummary();
  const d = REPORT_DATA;
  const sections = document.getElementById('sections');
  sections.innerHTML = [
    renderSectionA(d.events),
    renderCardSection('B', 'Alpha & Insights', d.alpha),
    renderSectionC(d.charts),
    renderCardSection('D', 'Positioning & Trade Ideas', d.positioning),
    renderCardSection('E', 'Contrarian / Minority Views', d.contrarian),
    renderSectionF(d.bank_research),
    renderSectionG(d.links)
  ].join('');

  // Auto-open first two sections
  document.querySelectorAll('.section-header').forEach((h, i) => {
    if (i < 2) { h.classList.add('open'); h.nextElementSibling.classList.add('open'); }
  });

  document.getElementById('footer').innerHTML = `
    Generated: ${d.generated_at || ''} · Template v1.0 · ${d.total_tweets_in || 0} tweets → ${d.total_items || 0} items
  `;
}

render();
</script>
</body>
</html>
