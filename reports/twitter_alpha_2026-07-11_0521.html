<!DOCTYPE html>
<html lang="en">
<head>

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

<script>
const REPORT_DATA = {"report_type": "TWITTER ALPHA INTELLIGENCE", "collected_at": "2026-07-11T05:21:12Z", "input_stats": {"total_tweets": 140, "unique_authors": 67, "tweets_with_images": 29, "after_noise_filter": 42}, "summary": "AI capex and revenue narratives dominated the feed: **Brad Gerstner** (via **All-In Podcast**) projected **Anthropic** could add **$200B** of revenue in 2027, a possible 3-5x from roughly **$100B**, while a wave of frontier model releases (GPT-5.6 Sol, Grok 4.5, Gemini 3.5, DeepSeek v4) and a new **Apple v. OpenAI lawsuit** over alleged hardware-secret theft underscored the intensifying AI model/device race.\n\nSemiconductors produced a concrete positioning signal: **Rosenblatt** research (via @aleabitoreddit) argues optical-sector short sellers on **$AAOI**/**$LITE** don't actually believe their own CPO-delay thesis and plan to cover and flip long into 2027, favoring **$SIVE**/**$COHR**; separately **Dylan Patel** (SemiAnalysis) confirmed CPO-on-GPU delays and that **Micron** missed Rubin pin-speed targets, forcing Nvidia to adjust specs.\n\nMacro threads centered on debt, growth and the dollar: **Raoul Pal**'s \"Everything Code\" ties collapsing developed-market trend growth (~**1.75%**) to shrinking workforces and rising debt reliance, **Bob Elliott** flagged heavy equity issuance (citing the **$85bn** Google deal) as a broad market drag, and **Delphi Digital** argued stablecoins are becoming the dollar's new distribution rail abroad even as official reserve demand for Treasuries fades; **Japan**'s finance minister separately pushed pension funds toward domestic asset purchases.\n\nGeopolitically, **Zineb Riboua** laid out a detailed IRGC-fracture thesis tied to the Strait of Hormuz incident and a 60(+60)-day Iran MOU with no guaranteed final deal.\n\nOn positioning, **@_tolks** is re-entering uranium (spot + URNM 2028 leaps) while rotating AI-trade profits into uranium/BTC/gold, and a junior miner (**$CTV.V**) drew attention on high-grade fluorspar drill results, while contrarian voices pushed back on crypto momentum plays (\"onchain runners\" going to zero) and on venture/crypto SPV fee structures described as a \"feudal\" insider-access game.", "sections": {"A_events": [{"cluster": "Anthropic Revenue Trajectory Fuels IPO-Race Debate", "category": ["macro", "AI", "positioning"], "items": [{"author": "theallinpod", "summary": "All-In Podcast relayed Altimeter's Brad Gerstner arguing Anthropic could add $200B of incremental revenue in 2027 — a possible 3-5x jump from roughly $100B — calling it unprecedented \"in the history of the world\" and framing intelligence as the largest TAM ever seen; the same episode (guest-hosted by @altcap) also covers the OpenAI-vs-Anthropic IPO race, Meta's new model and price war, a possible Chinese crackdown on open-source AI, and the Trump Accounts launch.", "tweet_url": ["https://x.com/theallinpod/status/2075781535270130136", "https://x.com/theallinpod/status/2075772528652427464"], "type": "thread"}]}, {"cluster": "Apple Sues OpenAI Over Alleged Hardware Secret Theft", "category": ["tech", "AI", "regulation"], "items": [{"author": "cryptopunk7213", "summary": "Reports Apple is suing OpenAI for allegedly stealing proprietary hardware secrets for upcoming AI devices, claiming one employee convinced Apple team members to bring proprietary hardware to interviews; frames it against a backdrop where Apple and OpenAI are racing to launch competing AI consumer hardware later this year (Apple reportedly planning AirPods with cameras, smart glasses, and a pendant device).", "tweet_url": "https://x.com/cryptopunk7213/status/2075711259555799378", "images": ["https://pbs.twimg.com/media/HM5oYj_WcAAN32d.png"], "type": "tweet"}]}, {"cluster": "Frontier AI Model Release Wave & New Benchmark Data", "category": ["AI", "tech", "positioning"], "items": [{"author": "cryptopunk7213", "summary": "Weekend AI roundup: one new frontier model (GPT 5.6 Sol), two \"crazy cheap\" ~80%-of-frontier models (Grok 4.5, Meta Muse Spark 1.1), two new image models (Muse Image, Seedream 5.0), and Prime Intellect raising $130M to push more open models — with Gemini 3.5, DeepSeek v4, a Grok 4-5T model and GPT 6 all expected within weeks.", "tweet_url": "https://x.com/cryptopunk7213/status/2075635139091062953", "type": "tweet"}, {"author": "AnjneyMidha", "summary": "Published (with OpenRouter co-authors) a rigorous 100-trillion-token empirical study on open- vs closed-weight frontier model usage, now on arXiv; separately posed a discussion prompt on why so many AI labs are pretraining their own models and designing their own chips (unit economics, distrust of vendors, researcher recruitment, or all of the above).", "tweet_url": ["https://x.com/AnjneyMidha/status/2075790365362155694", "https://x.com/AnjneyMidha/status/2075705074823610760"], "images": ["https://pbs.twimg.com/media/HM6uAfMXUAAZQyc.png", "https://pbs.twimg.com/media/HM6uo2eW4AAju5G.jpg"], "type": "thread"}, {"author": "nicbstme", "summary": "GPT-5.6 Sol is becoming the preferred model across Microsoft 365 Copilot: GDPval-AA (real knowledge-work artifact creation) score jumps from 1,493.7 to 1,747.8 Elo versus GPT-5.5, long-running professional workflow completion rises from 46.9% to 52.7%, management-consulting task accuracy from 31.3% to 43.2%, and Big Finance Bench hits 53%.", "tweet_url": "https://x.com/nicbstme/status/2075623474308301238", "type": "tweet"}, {"author": "garrytan", "summary": "Asks whether open-weight LLMs will be \"the next transistor\" — a commoditization thesis — and separately notes that whatever capability gap exists can generally be closed via distillation and post-training.", "tweet_url": "https://x.com/garrytan/status/2075691911210557838", "images": ["https://pbs.twimg.com/media/HM5Wyw0bcAAaDGe.jpg"], "type": "thread"}]}, {"cluster": "Iran/IRGC Fracture and Strait of Hormuz De-escalation", "category": ["geopolitics", "energy"], "items": [{"author": "zriboua", "summary": "Argues Iranian officials privately told Trump advisers the Hormuz commercial-ship attacks stemmed from an \"errant\" hardline IRGC faction trying to undermine negotiations. She frames the IRGC's real internal divide as \"cash now\" vs. \"willing to wait\" rather than hardliner/pragmatist, explaining the push to weaponize Hormuz as a bid for economic concessions (frozen funds) that isn't working — the 60(+60)-day MOU carries no guarantee of a final deal, and she expects tit-for-tat escalation into the fall. She pushes back on \"Trump is capitulating\" narratives, noting sanctions remain and pressure continues (the MOU reads as the US buying time/stabilizing energy markets, not a concession). Separately, she argues Iran's fertility crisis is pushing the IRGC toward more aggressive foreign proxy recruitment, and that the Abraham Accords architecture has proven more durable than Tehran expected, undercutting the IRGC's regional legitimacy strategy of mobilizing the \"Arab street.\"", "tweet_url": ["https://x.com/zriboua/status/2075737685453357211", "https://x.com/zriboua/status/2075721329861390380", "https://x.com/zriboua/status/2075721862319944075", "https://x.com/zriboua/status/2075708965187473828", "https://x.com/zriboua/status/2075661509779157102"], "images": ["https://pbs.twimg.com/media/HM462MmWUAAinrp.jpg"], "type": "thread"}]}, {"cluster": "Optical/CPO Semiconductor Sector: Short-Seller Capitulation Signal", "category": ["tech", "positioning"], "items": [{"author": "aleabitoreddit", "summary": "Cites Rosenblatt research arguing optical-sector short sellers ($AAOI, $LITE) don't actually believe their bear thesis on CPO delays/China capacity — multiple shorts reportedly plan to cover late July/early August and buy back into the sector in 2027 for the CPO scale-up opportunity, seen as bullish for $SIVEF and $COHR. Separately breaks down the $AMZN/OpenAI transceiver TAM debate: Rosenblatt models rising XPU counts as offsetting fewer transceivers per chip (countering B. Riley's bearish $AAOI call that CPO cuts transceiver TAM 40-50%), and argues UHP CW lasers are the ideal CPO architecture (citing Broadcom), supporting his own $SIVE thesis.", "tweet_url": ["https://x.com/aleabitoreddit/status/2075634064518955297", "https://x.com/aleabitoreddit/status/2075645547978084371"], "images": ["https://pbs.twimg.com/media/HM4heWhbwAEOjmt.png", "https://pbs.twimg.com/media/HM4os9Jb0AECclK.png"], "type": "tweet"}, {"author": "dylan522p", "summary": "Confirms via SemiAnalysis reporting that CPO-on-GPU scale-up is delayed, as previously flagged (\"not my job to care about stocks, my job is to track the supply chain accurately\"); in a related reply notes Micron missed pin-speed targets for Nvidia's Rubin platform, which led Nvidia to lower pin-speed targets across the ecosystem to keep the supply chain shippable.", "tweet_url": ["https://x.com/dylan522p/status/2075741269066993828", "https://x.com/dylan522p/status/2075650798139183557"], "type": "thread"}]}, {"cluster": "Japan Pushes Pension Funds Toward Domestic Assets", "category": ["macro", "EM"], "items": [{"author": "pboockvar", "summary": "Flags as a \"really big deal\" that Japan's finance minister said today he wants the country's pension funds to \"substantially\" increase purchases of Japanese assets — a potential driver for JGB demand and yen dynamics.", "tweet_url": "https://x.com/pboockvar/status/2075725288403603924", "type": "tweet"}]}, {"cluster": "Equity Supply Glut Flagged as Cross-Asset Drag", "category": ["macro", "positioning"], "items": [{"author": "BobEUnlimited", "summary": "Argues the recent \"sagging feeling across assets\" reflects heavy issuance-driven supply pressure rather than a demand problem, noting that financial asset prices in aggregate peaked around the $85bn Google equity issuance announcement — implying more supply-driven softness ahead.", "tweet_url": "https://x.com/BobEUnlimited/status/2075643319619621184", "images": ["https://pbs.twimg.com/media/HM4qma0W0AAI03B.jpg"], "type": "tweet"}]}], "B_insights": [{"author": "hosseeb", "summary": "Long essay arguing Stanford's Alpaca paper (03/2023) — proving GPT-3-class capability could be distilled into a 7B model for under $600 — is the most consequential paper in AI economics/geopolitics, because it revealed distillation is nearly impossible to stop (it takes only a handful of accounts to pull enough traces to clone a model). This is why the US and China are now racing on export controls. He compares distillation to gravity: it flattens capability advantages over time, meaning intelligence monopolies are structurally temporary and intelligence itself keeps getting cheaper — which he frames as unambiguously good.", "tweet_url": "https://x.com/hosseeb/status/2075650858369663178", "images": ["https://pbs.twimg.com/media/HM4sY1RbAAAWo_n.png"], "type": "thread"}, {"author": "garrytan", "summary": "\"If you're wading in the swamp of churn prevention, it's already too late\" — argues churn-fighting is a lagging signal of a weak product, and the durable fix is building something genuinely great rather than optimizing retention tactics.", "tweet_url": "https://x.com/garrytan/status/2075722396951343420", "type": "tweet"}, {"author": "andrewchen", "summary": "Detailed thread on running local/open AI models on consumer hardware: local models (30-100B params) lag frontier cloud models (~1T params) by an estimated \"18 years\" of compute-equivalent gap; the best consumer options are a high-RAM MacBook Pro, gaming PC, or Nvidia DGX Spark, with memory bandwidth (need 30-50 tok/s) the real bottleneck; local models handle simple lookups well but are far behind for coding. He expects \"good enough\" local models to become standard-issue on white-collar work laptops within a few years, advising readers to request more RAM on their next work machine.", "tweet_url": "https://x.com/andrewchen/status/2075700790237553110", "type": "tweet"}, {"author": "andrewchen", "summary": "Notes agentic coding tools run an \"epic subscription+upsell\" pricing model — subscribe, burn through tokens, buy more, repeat — describing it as \"a subscription with a gas pedal; the meter never stops,\" a dynamic relevant to AI infra/compute spending forecasts.", "tweet_url": "https://x.com/andrewchen/status/2075686116481745305", "type": "thread"}, {"author": "ErikVoorhees", "summary": "Endorses a rival AI lab's stated philosophy that \"decentralized alignment > monolithic alignment\" is more congruent with nature, humans and markets — reacting to a lab's mission statement that the good future has many differently-shaped AIs that disagree with each other rather than one centralized aligned system.", "tweet_url": "https://x.com/ErikVoorhees/status/2075645324194939388", "images": ["https://pbs.twimg.com/media/HM4r7Q0WgAAboqT.png"], "type": "tweet"}, {"author": "RaoulGMI", "summary": "Lays out his \"Everything Code\" macro framework: GDP growth = population growth + productivity growth + debt growth. Developed-market trend growth has fallen to roughly 1.75% as working-age populations shrink structurally, forcing economies to lean increasingly on debt to sustain growth — the starting point for his broader thesis on where debasement pushes asset flows next.", "tweet_url": "https://x.com/RaoulGMI/status/2075647263616147691", "type": "thread"}, {"author": "Delphi_Digital", "summary": "Argues the world is pulling away from the dollar at the official level (reserve-asset freezes accelerated the shift out of Treasuries) even as private-sector dollar demand keeps climbing in inflation-prone economies; stablecoins are emerging as the new distribution rail letting people hold/move dollars without a US bank account, spreading fast across the developing world. Separately notes Bitcoin's recent relative strength versus traditional markets, partly attributed to ETF inflows.", "tweet_url": ["https://x.com/Delphi_Digital/status/2075641264817762364", "https://x.com/Delphi_Digital/status/2075734224204697600"], "images": ["https://pbs.twimg.com/media/HM4outrbAAAAJpY.jpg"], "type": "thread"}, {"author": "VitalikButerin", "summary": "Long essay on the \"AI 2040\" superintelligence debate, arguing proponents and detractors are talking past each other because they hold incompatible priors on takeoff speed: if AI is \"normal technology,\" the detractor camp is right; if superintelligence arrives circa 2030, the AI-2040 camp's aggressive posture is comparatively less naive. He says he's genuinely uncertain which world we're in, remains open to slowdowns/pauses, but is uneasy with framing where \"our labs get controlling global dominance\" is treated as the good outcome. He advocates his \"d/acc\" agenda (formal verification, cryptography, defensive biotech, resource security) as robust across both scenarios, and proposes pre-agreeing on empirical triggers (e.g., unemployment thresholds, bio-risk events) to resolve the pause debate rather than assuming either side's forecast by default.", "tweet_url": "https://x.com/VitalikButerin/status/2075809437428646294", "type": "tweet"}, {"author": "nicbstme", "summary": "Argues the real AI architecture question isn't whether models learn human judgment but where that judgment should live: broad preferences get baked into weights via RLHF/DPO/Constitutional AI, while personal/organizational knowledge stays external in memory files, skills, prompts, RAG and tools. Flags Thinking Machines' push to internalize more tacit knowledge directly into weights (deeper adaptation, but harder to inspect/audit/unlearn than editable context) and invokes Hayek's \"Use of Knowledge in Society\": intelligence can centralize even as knowledge stays fundamentally distributed.", "tweet_url": "https://x.com/nicbstme/status/2075643468869996687", "type": "tweet"}, {"author": "stacy_muur", "summary": "Notes onchain options remain a tiny corner of crypto derivatives (~$525M in 7-day notional versus perps' much larger volume), with Derive capturing 93% of that m rage_pct": 40}};

// ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- schema normalization ----------
// Some producer runs emit the "sections" schema documented in the routine
// spec (report_type/input_stats/sections.A_events.../coverage) instead of
// the flat schema this renderer reads (date/events/insights/contrarian/
// positioning/links/stats). Normalize so either shape renders correctly.
function firstOf(v) {
  return Array.isArray(v) ? v[0] : v;
}

function normalizeItem(it) {
  if (!it || typeof it !== 'object') return it;
  return {
    author: it.author || it.author_username,
    text: it.text != null ? it.text : it.summary,
    category: firstOf(it.category),
    tweet_url: firstOf(it.tweet_url),
    images: it.images,
    created_at: it.created_at,
    is_thread: it.is_thread != null ? it.is_thread : (it.type === 'thread'),
  };
}

function normalizeData(d) {
  if (!d || typeof d !== 'object') return {};
  const hasFlat = d.events || d.insights || d.contrarian || d.positioning || d.links || d.stats;
  if (hasFlat) return d;

  const s = d.sections;
  if (!s) return d;

  const out = Object.assign({}, d);
  out.date = d.date || (d.collected_at ? String(d.collected_at).replace('T', ' ').replace('Z', ' UTC') : '');
  if (s.A_events) {
    out.events = s.A_events.map(cl => ({
      title: cl.cluster || cl.title,
      category: firstOf(cl.category),
      description: cl.description,
      items: (cl.items || []).map(normalizeItem),
    }));
  }
  if (s.B_insights) out.insights = s.B_insights.map(normalizeItem);
  if (s.C_contrarian) out.contrarian = s.C_contrarian.map(normalizeItem);
  if (s.D_positioning) out.positioning = s.D_positioning.map(normalizeItem);
  if (s.E_links) {
    out.links = s.E_links.map(l => ({
      author: l.author,
      url: l.url,
      tweet_url: firstOf(l.tweet_url),
      description: l.note || l.description,
    }));
  }
  const stats = d.stats || {};
  out.stats = {
    received: stats.received != null ? stats.received : (d.input_stats && d.input_stats.total_tweets),
    after_filter: stats.after_filter != null ? stats.after_filter : (d.input_stats && d.input_stats.after_noise_filter),
    authors: stats.authors != null ? stats.authors : (d.coverage && d.coverage.authors_total),
    coverage: stats.coverage != null ? stats.coverage : (d.coverage && d.coverage.coverage_pct),
  };
  return out;
}

// ---------- main ----------
function renderReport(d) {
  d = normalizeData(d);
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
