  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;

  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);

  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('#cat-filters .pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.color = p.dataset.origColor || '';
  });
  var active = document.getElementById('cat-' + cat);
  if (active) {
    active.classList.add('active');
    if (cat === 'all') {
      active.style.background = '#1a1a1a';
    } else {
      active.style.background = CAT_COLORS[cat] || '#555';
      active.style.color = '#fff';
    }
  }
  renderCards();
}

function setUrgency(urg) {
  activeUrgency = urg;
  document.querySelectorAll('#urgency-filters .pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '';
    p.style.color = '';
  });
  var active = document.getElementById('urg-' + urg);
  if (active) {
    active.classList.add('active');
    if (urg === 'all') {
      active.style.background = '#1a1a1a';
      active.style.color = '#fff';
    } else {
      active.style.background = '#555';
      active.style.color = '#fff';
    }
  }
  renderCards();
}

function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';
  var visible = 0;
  ITEMS.forEach(function(item) {
    var matchCat = (activeCat === 'all' || item.cat === activeCat);
    var matchUrg = (activeUrgency === 'all' || item.urgency === activeUrgency);
    var card = buildCard(item);
    if (!matchCat || !matchUrg) {
      card.classList.add('hidden');
    } else {
      visible++;
    }
    container.appendChild(card);
  });
  if (visible === 0) {
    var msg = document.createElement('div');
    msg.style.cssText = 'padding:40px;text-align:center;color:#aaa;font-size:14px';
    msg.textContent = 'No items match the selected filters.';
    container.appendChild(msg);
  }
}

function buildCard(item) {
  var color = CAT_COLORS[item.cat] || '#888';
  var urgEmoji = {'act-now':'🔴','deep':'🔵','watch':'🟡'}[item.urgency] || '';

  var card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + item.id;

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'card-header';
  hdr.onclick = function() { toggleCard(item.id); };

  var num = document.createElement('span');
  num.className = 'item-num';
  num.textContent = String(item.id).padStart(2, '0');

  var urg = document.createElement('span');
  urg.className = 'urgency-emoji';
  urg.textContent = urgEmoji;

  var badge = document.createElement('span');
  badge.className = 'source-badge';
  badge.style.background = color;
  badge.textContent = item.source.split(' / ')[0];

  var catTag = document.createElement('span');
  catTag.className = 'cat-tag';
  catTag.textContent = item.cat;

  var title = document.createElement('span');
  title.className = 'card-title';
  title.textContent = item.title;

  var chartIco = document.createElement('span');
  if (item.charts && item.charts.count > 0) {
    chartIco.className = 'chart-icon';
    chartIco.textContent = item.charts.hot ? '🔥' : '📊';
  }

  var exp = document.createElement('span');
  exp.className = 'expand-icon';
  exp.id = 'exp-' + item.id;
  exp.textContent = '▼';

  hdr.appendChild(num);
  hdr.appendChild(urg);
  hdr.appendChild(badge);
  hdr.appendChild(catTag);
  if (item.charts && item.charts.count > 0) hdr.appendChild(chartIco);
  hdr.appendChild(title);
  hdr.appendChild(exp);
  card.appendChild(hdr);

  // Body
  var body = document.createElement('div');
  body.className = 'card-body';
  body.id = 'body-' + item.id;

  body.innerHTML = [
    '<div class="section-label">The Idea</div>',
    '<div class="idea-text">' + escHtml(item.idea) + '</div>',
    '<div class="section-label">My Angle</div>',
    '<div class="angle-block" style="border-left-color:' + color + ';background:' + hexToRgba(color, 0.05) + '">',
    '<div class="angle-text">' + escHtml(item.angle) + '</div>',
    '</div>',
    '<div class="section-label">Tweets</div>',
    '<div class="tweets">',
    '<div class="tweet-block">',
    '<div class="tweet-label a">TWEET A</div>',
    '<div class="tweet-text">' + escHtml(item.tweetA) + '</div>',
    '<button class="copy-btn" onclick="copyTweet(' + item.id + ', \'a\')">📋 Copy</button>',
    '</div>',
    '<div class="tweet-block">',
    '<div class="tweet-label b">TWEET B</div>',
    '<div class="tweet-text">' + escHtml(item.tweetB) + '</div>',
    '<button class="copy-btn" onclick="copyTweet(' + item.id + ', \'b\')">📋 Copy</button>',
    '</div>',
    '</div>',
    item.charts && item.charts.count > 0 ?
      '<div class="section-label">Charts</div><div class="chart-note' + (item.charts.hot ? ' hot' : '') + '">' +
      (item.charts.hot ? '🔥 ' : '📊 ') + item.charts.count + ' chart(s) · ' + escHtml(item.charts.desc) + '</div>'
      : '',
    '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>'
  ].join('');

  card.appendChild(body);
  return card;
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var exp = document.getElementById('exp-' + id);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    exp.textContent = '▼';
  } else {
    body.classList.add('open');
    exp.textContent = '▲';
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// ─── REPORT ────────────────────────────────────────────────────────
function buildReport() {
  var body = document.getElementById('report-body');
  var meta = [
    { label: 'Time Window', val: META.windowStart.split(' ')[1] + ' – ' + META.windowEnd.split(' ')[1] + ' CEST' },
    { label: 'Date', val: META.date },
    { label: 'Emails in Window', val: String(META.emailsInWindow) },
    { label: 'Emails Read', val: String(META.emailsRead) },
    { label: 'Items Extracted', val: String(META.itemsExtracted) },
    { label: 'Sources Included', val: String(META.includedSources.length) }
  ];

  var metaHtml = '<div class="report-meta">' +
    meta.map(function(m) {
      return '<div class="report-meta-item"><div class="report-meta-label">' + m.label + '</div><div class="report-meta-val">' + m.val + '</div></div>';
    }).join('') +
    '</div>';

  var srcHtml = '<div class="section-label">Included Sources</div><div class="source-list">' +
    META.includedSources.map(function(s) {
      return '<div class="source-item"><span>' + s.name + '</span><span class="source-count">' + s.items + ' items</span></div>';
    }).join('') + '</div>';

  var skipHtml = META.skippedSources.length > 0
    ? '<div class="section-label" style="margin-top:14px">Skipped Sources</div><div class="source-list">' +
      META.skippedSources.map(function(s) {
        return '<div class="source-item"><span>' + s.name + '</span><span style="color:#aaa;font-size:11px">' + s.reason + '</span></div>';
      }).join('') + '</div>'
    : '<div style="margin-top:12px;font-size:12px;color:#888">No sources were skipped — all 7 emails in the window were fully read.</div>';

  var noteHtml = '<div class="window-note">Window: ' + META.windowStart + ' to ' + META.windowEnd + '. Emails outside this window were not processed.</div>';

  body.innerHTML = metaHtml + srcHtml + skipHtml + noteHtml;
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var tog = document.getElementById('report-toggle');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    tog.textContent = '▼';
  } else {
    body.classList.add('open');
    tog.textContent = '▲';
  }
}

// ─── INIT ──────────────────────────────────────────────────────────
buildFilters();
renderCards();
buildReport();
</script>
