  { id:26, cat:"geopolitics", urgency:"deep", source:"ChinaTalk / Guy Ward-Jackson (Tony Blair Institute)",
    title:"Proposal: US Economic Security Latency Fund — apply nuclear latency theory to supply chains",
    idea:"A $20–30B 'Economic Security Latency Fund' modeled on nuclear latency theory: don't build the bomb, but maintain the capacity to build it quickly. The key insight: economic coercion works when it can impose pain faster than the target can adapt. Latency shrinks the time-to-substitution window, removing that leverage. The framework proposes a Tier 1 (strategic autonomy — permanent), Tier 2 (latent capacity — the $20-30B fund), Tier 3 (market resilience — leave to markets) taxonomy. Key metrics: 70%+ single-source import dependence = high vulnerability; replacement ratio <1.0 = no surge capacity.",
    angle:"The submarine cable case study is the most concrete: the global deep-sea cable repair fleet is too small for sustained disruption. If cables serving Guam or linking the US to Asian allies get cut (in an Indo-Pacific conflict scenario), the current repair system can't handle sustained multi-point disruption. Private incentives won't solve this.",
    tweetA:"'Don't build the bomb, but have the capacity to.' A proposal for a $20-30B US Economic Security Latency Fund — the supply-chain equivalent of nuclear latency. The core insight: coercion works when pain arrives faster than adaptation. Build the capacity to adapt quickly, and the coercive leverage disappears before it's ever used.",
    tweetB:"The latency fund concept is more disciplined than re-shoring everything. It proposes a 3-tier hierarchy: permanent domestic capacity for existential sectors (chips), latent surge capacity for bottlenecks (cables, rare minerals, packaging), and market solutions for everything else. The bottleneck: identifying tier 2 without political capture turning everything into tier 1.",
    charts:{count:0, hot:false, desc:""},
    link:"https://www.chinatalk.media/p/a-us-economic-security-latency-fund" },

    tweetA:"A drug just hit a Phase 3 trial that targets RAS — a protein found in 25% of ALL human cancers, considered 'undruggable' for 40 years. Daraxonrasib doubled median survival in pancreatic cancer: 6.5 months → 13.2 months. The mechanism (molecular glue) creates binding surfaces that don't exist naturally. This is not incremental progress.",
    tweetB:"The RAS breakthrough matters beyond pancreatic cancer. RAS mutations drive: ~90% of pancreatic, ~50% of colorectal, ~30% of lung cancers. 40 years of drug hunters tried and failed. The molecular glue approach just cracked it. If the mechanism generalizes, you've unlocked a target that would affect treatment across one-quarter of all cancer diagnoses.",

const URGENCY_LABELS = { "act-now": "🔴 Act Now", "deep": "🔵 Deep", "watch": "🟡 Watch" };

let activeCategory = "all";
let activeUrgency = "all";
let activeSource = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(srcName) {
  activeSource = srcName;
  activeCategory = "all";
  activeUrgency = "all";
  renderFilters();
  applyFilters();
}

function toggleCard(id) {
  var card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

function toggleReport() {
  var body = document.getElementById('report-body');
  body.classList.toggle('open');
}

function applyFilters() {
  ITEMS.forEach(function(item) {
    var el = document.getElementById('card-' + item.id);
    if (!el) return;
    var show = true;
    if (activeSource) {
      show = item.source.indexOf(activeSource) !== -1;
    } else {
      if (activeCategory !== 'all' && item.cat !== activeCategory) show = false;
      if (activeUrgency !== 'all' && item.urgency !== activeUrgency) show = false;
    }
    el.classList.toggle('hidden', !show);
    if (activeSource && show) el.classList.add('open');
  });
}

function setCat(cat) {
  activeCategory = cat;
  activeSource = null;
  renderFilters();
  applyFilters();
}

function setUrg(urg) {
  activeUrgency = urg;
  activeSource = null;
  renderFilters();
  applyFilters();
}

function renderFilters() {
  var cats = ['all'];
  var catCounts = { all: ITEMS.length };
  ITEMS.forEach(function(item) {
    if (!catCounts[item.cat]) { catCounts[item.cat] = 0; cats.push(item.cat); }
    catCounts[item.cat]++;
  });
  var urgCounts = { all: ITEMS.length, 'act-now': 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });

  var catHtml = '';
  cats.forEach(function(c) {
    var isActive = activeCategory === c && !activeSource;
    var color = CAT_COLORS[c] || '#888';
    var style = isActive ? ('background:' + (c === 'all' ? '#333' : color) + ';color:#fff;border-color:transparent;') : '';
    catHtml += '<span class="pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setCat(\'' + c + '\')">' + (c === 'all' ? 'All' : c) + ' <small>(' + catCounts[c] + ')</small></span>';
  });
  document.getElementById('cat-filters').innerHTML = catHtml;

  var urgHtml = '';
  ['all', 'act-now', 'deep', 'watch'].forEach(function(u) {
    var isActive = activeUrgency === u && !activeSource;
    var label = u === 'all' ? 'All' : URGENCY_LABELS[u];
    var style = isActive ? 'background:#333;color:#fff;border-color:transparent;' : '';
    urgHtml += '<span class="pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + label + ' <small>(' + urgCounts[u] + ')</small></span>';
  });
  document.getElementById('urg-filters').innerHTML = urgHtml;
}

    html += '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';

    html += '</div>';
    html += '<div class="card-body">';

    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div>';

    if (item.charts.count > 0) {
      html += '<div class="charts-info' + (item.charts.hot ? ' charts-hot' : '') + '">';

    html += '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div></div>';
  });
  document.getElementById('cards-container').innerHTML = html;
}

function buildReport() {

  html += '</ul>';

  html += '</ul>';
  document.getElementById('report-body').innerHTML = html;
}

function init() {
