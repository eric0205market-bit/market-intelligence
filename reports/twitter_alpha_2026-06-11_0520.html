<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

@JavierBlas** noted the death of Exxon Mobil architect **Lee Raymond at 87**.", "events": [{"title": "US Strikes on Iran / IRGC Operation — China Angle", "category": "geopolitics", "description": "Reports of US strikes beginning on Iran, framed by several accounts around the China-supply-chain dimension and fresh OFAC sanctions on Chinese entities backing the IRGC.", "items": [{"author": "lord_fed", "text": "Flags the Axios report that US strikes on Iran have started, dryly captioned \"Art of the deal.\"", "tweet_url": "https://x.com/lord_fed/status/2064823897824858562", "category": "geopolitics", "created_at": "2026-06-10T21:35:54.000Z", "is_thread": false, "images": []}, {"author": "zriboua", "text": "Argues the Iran war is fundamentally about China, quoting news of fresh US sanctions on multiple Chinese companies supporting Iran.", "tweet_url": "https://x.com/zriboua/status/2064794246868078875", "category": "geopolitics", "created_at": "2026-06-10T19:38:05.000Z", "is_thread": false, "images": []}, {"author": "zriboua", "text": "Notes a \"big operation today against IRGC.\"", "tweet_url": "https://x.com/zriboua/status/2064786413359341685", "category": "geopolitics", "created_at": "2026-06-10T19:06:57.000Z", "is_thread": false, "images": []}, {"author": "zriboua", "text": "Posts on-the-ground imagery from Tehran.", "tweet_url": "https://x.com/zriboua/status/2064782360617361660", "category": "geopolitics", "created_at": "2026-06-10T18:50:51.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKeUnNcXAAAmt1v.jpg", "https://pbs.twimg.com/media/HKeVnREWgAAySGM.jpg"]}, {"author": "zriboua", "text": "Highlights that roughly 70% of US sanctions targeting Iran have hit Chinese entities (Treasury OFAC's \"Economic Fury\" sanctioned nine individuals/entities aiding IRGC weapons procurement), calling denial of China's role \"gaslighting.\"", "tweet_url": "https://x.com/zriboua/status/2064779030155419892", "category": "geopolitics", "created_at": "2026-06-10T18:37:37.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKeRdLqWgAAcMkH.jpg"]}, {"author": "_tolks", "text": "Riffs sardonically on the war news — \"the first 72 hours are the hardest part of a decade war in the middle east everyone knows the rules\" — echoing the recurring \"two weeks to flatten the curve\" meme others used about the selloff.", "tweet_url": "https://x.com/_tolks/status/2064865672400601168", "category": "geopolitics", "created_at": "2026-06-11T00:21:54.000Z", "is_thread": true, "images": []}]}, {"title": "SpaceX IPO Mania — Retail FOMO and Allocation Frenzy", "category": "positioning", "description": "Multiple traders flag the SpaceX IPO as the latest FOMO blow-off, with retail asking how to get allocations and some tying the broader equity selloff to the listing.", "items": [{"author": "DonAlt", "text": "IRL contacts are messaging him about getting SpaceX IPO exposure and asking if he's buying — \"interesting stuff happening over here.\"", "tweet_url": "https://x.com/DonAlt/status/2064833449039659103", "category": "positioning", "created_at": "2026-06-10T22:13:51.000Z", "is_thread": false, "images": []}, {"author": "DonAlt", "text": "Lists serial FOMO blowups — housing in COVID, crypto post-COVID, gold/silver months ago, eggs and potatoes — each ripping then nuking 50% \"like it's a shitcoin,\" wondering how the IPO mania ends.", "tweet_url": "https://x.com/DonAlt/status/2064904531889234193", "category": "positioning", "created_at": "2026-06-11T02:56:19.000Z", "is_thread": false, "images": []}, {"author": "jimcramer", "text": "Sarcastically hopes \"everyone gets cut back in their SpaceX allocations.\"", "tweet_url": "https://x.com/jimcramer/status/2064825402598563983", "category": "positioning", "created_at": "2026-06-10T21:41:53.000Z", "is_thread": false, "images": []}, {"author": "_tolks", "text": "Thinks much of the recent price action and selloff will retrospectively be explained by the SpaceX IPO (even though he believes it was already in the charts), and floats the idea the market could bottom on the launch — while warning nobody is positioning for the chaotic month or two before the \"up into midterms\" trade.", "tweet_url": "https://x.com/_tolks/status/2064803872372056329", "category": "positioning", "created_at": "2026-06-10T20:16:20.000Z", "is_thread": true, "images": []}]}, {"title": "Knicks Historic Comeback — MSG Euphoria", "category": "society", "description": "Several finance accounts broke from markets to celebrate the Knicks erasing a 29-point deficit, billed as the greatest comeback in NBA history.", "items": [{"author": "Geiger_Capital", "text": "\"The most dangerous lead in sports… A 29 point lead in MSG.\"", "tweet_url": "https://x.com/Geiger_Capital/status/2064917638875111487", "category": "society", "created_at": "2026-06-11T03:48:24.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKgPpe9W8AAlkBg.jpg"]}, {"author": "Geiger_Capital", "text": "Calls it the greatest comeback in NBA history — \"The New York Fucking Knicks.\"", "tweet_url": "https://x.com/Geiger_Capital/status/2064915676922359855", "category": "society", "created_at": "2026-06-11T03:40:36.000Z", "is_thread": false, "images": []}, {"author": "dgt10011", "text": "\"KNICKSSSSS!!!!!!!!!\"", "tweet_url": "https://x.com/dgt10011/status/2064913910990352398", "category": "society", "created_at": "2026-06-11T03:33:35.000Z", "is_thread": false, "images": []}]}, {"title": "Claude Fable 5 Launch — \"Software Factory\" Hype vs Skepticism", "category": "ai", "description": "Anthropic's new Fable 5 model dominated the AI conversation, with builders declaring traditional software engineering dead and others probing its limits and security implications.", "items": [{"author": "RaoulGMI", "text": "Calls Fable 5 \"quite the amazing model\" — give Claude Code vague directions and it just executes, understanding full context; hasn't yet tested complex scenario analysis in chat mode.", "tweet_url": "https://x.com/RaoulGMI/status/2064891381424832733", "category": "ai", "created_at": "2026-06-11T02:04:03.000Z", "is_thread": false, "images": []}, {"author": "cryptopunk7213", "text": "Argues Fable 5's coding ability makes the traditional software engineer redundant: agents write, test, and monitor apps, custom software drops to pennies, smaller players get bespoke tools, and the end state is an AI orchestrating other agents — praising Anthropic's dynamic-workflow lead.", "tweet_url": "https://x.com/cryptopunk7213/status/2064806858339361079", "category": "ai", "created_at": "2026-06-10T20:28:11.000Z", "is_thread": false, "images": []}, {"author": "udiWertheimer", "text": "Agreed with a rival for the first time ever after Fable 5 changed a skeptic's mind on AI coding loops following a one-shot full-stack build.", "tweet_url": "https://x.com/udiWertheimer/status/2064870386831896623", "category": "ai", "created_at": "2026-06-11T00:40:38.000Z", "is_thread": false, "images": []}, {"author": "reidhoffman", "text": "Shares that Fable 5 recreated Monopoly with AI labs/startups as properties — full rules, money, turns, multiplayer share codes, racks and data centers — \"This is awesome.\"", "tweet_url": "https://x.com/reidhoffman/status/2064788712471548092", "category": "ai", "created_at": "2026-06-10T19:16:05.000Z", "is_thread": false, "images": []}, {"author": "nicbstme", "text": "Long demo of \"just-in-time software\": Claude Fable built a self-contained 1.2MB offline WebGL HTML map of San Francisco from real municipal data — 15,905 street segments, 168k-vertex terrain from elevation contours, 9,672 lidar-height buildings, live GTFS Muni/BART trams, and a marine-layer fog model whose 50% line landed exactly on Divisadero. \"Give the machine real data and real verification loops, and it builds you the city.\"", "tweet_url": "https://x.com/nicbstme/status/2064926406530998573", "category": "ai", "created_at": "2026-06-11T04:23:14.000Z", "is_thread": false, "images": []}, {"author": "cryptopunk7213", "text": "Details a live malware exploit against Fable 5: attackers title an npm package with a trigger phrase (e.g. \"biological weapons\") so the safety scanner reads only the title, flags it as a safety issue, and never inspects the malicious code injection in the body — shifting safety to deployment created a new attack vector.", "tweet_url": "https://x.com/cryptopunk7213/status/2064745019852890335", "category": "ai", "created_at": "2026-06-10T16:22:28.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKdyoPjWEAAL6JJ.jpg"]}, {"author": "garrytan", "text": "Posts a detailed Fable-5 \"adaptive-thinking hotfix\" for OpenClaw, explaining how Anthropic flipped claude-fable-5 to require adaptive-thinking params on 2026-06-10, breaking legacy thinking.type configs, with step-by-step patch instructions.", "tweet_url": "https://x.com/garrytan/status/2064843483396137346", "category": "ai", "created_at": "2026-06-10T22:53:44.000Z", "is_thread": false, "images": []}, {"author": "Crypto_McKenna", "text": "Notes a \"wizard\" jailbroke Fable 5 within 48 hours of public access — \"He is liberating the machines\" — quoting a thread calling it one of the most disappointing model drops.", "tweet_url": "https://x.com/Crypto_McKenna/status/2064785278657556985", "category": "ai", "created_at": "2026-06-10T19:02:26.000Z", "is_thread": false, "images": []}]}, {"title": "OpenAI Price Cuts — Is the AI Bubble Popping?", "category": "ai", "description": "News that OpenAI is considering drastic price cuts prompted bubble talk and renewed calls for open-source alternatives.", "items": [{"author": "Geiger_Capital", "text": "\"*OPENAI CONSIDERS DRASTIC PRICE CUTS — Uhhh… is the bubble already popping?\"", "tweet_url": "https://x.com/Geiger_Capital/status/2064888477657755789", "category": "ai", "created_at": "2026-06-11T01:52:31.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKf1ILlWgAA3FZU.jpg"]}, {"author": "0xSammy", "text": "Reacts that there's \"never been a more obvious call for open source alternatives.\"", "tweet_url": "https://x.com/0xSammy/status/2064814809380438425", "category": "ai", "created_at": "2026-06-10T20:59:47.000Z", "is_thread": false, "images": []}, {"author": "citrini", "text": "Predicts a new breed of AI-native PE firms that acquire companies just to migrate workflows from Claude to open-source Chinese models, then flip them.", "tweet_url": "https://x.com/citrini/status/2064860015748415647", "category": "ai", "created_at": "2026-06-10T23:59:25.000Z", "is_thread": false, "images": []}]}, {"title": "Apple as a Frontier AI Company — iOS 27 / Siri Debate", "category": "tech", "description": "WWDC reactions split between bullishness on Apple's on-device AI distribution and disappointment over execution and Vision Pro neglect.", "items": [{"author": "cryptopunk7213", "text": "Will \"die on this hill\": Apple is a frontier AI company that will inject AI everywhere — a 20B model runs privately on-device across 3.5 billion Apple devices, giving it unmatched gravitational pull on culture.", "tweet_url": "https://x.com/cryptopunk7213/status/2064864704036544690", "category": "tech", "created_at": "2026-06-11T00:18:03.000Z", "is_thread": true, "images": []}, {"author": "udiWertheimer", "text": "Speculates Apple scrapped its original iOS 27 around Jan–Feb and instead shipped 2nd-gen Siri plus a huge backlog of small fixes \"cooked by Claude Code in the background.\"", "tweet_url": "https://x.com/udiWertheimer/status/2064896904773710187", "category": "tech", "created_at": "2026-06-11T02:26:00.000Z", "is_thread": false, "images": []}, {"author": "udiWertheimer", "text": "Contrarian within the cluster: as a Vision Pro bull, calls this the most bearish WWDC for Vision Pro since launch — visionOS was a second-class citizen, denied Apple's most powerful local model despite the M5 hardware, with few platform-specific features.", "tweet_url": "https://x.com/udiWertheimer/status/2064890056163098828", "category": "tech", "created_at": "2026-06-11T01:58:47.000Z", "is_thread": false, "images": []}]}, {"title": "Hyperliquid / HYPE — AQAv2, CFTC Onshoring, Price Discovery", "category": "crypto", "description": "HYPE saw a sharp selloff after rallying on AQAv2 news and CFTC perp-onshoring signals; analysts debate where value gets exchanged and the broader lesson from Hyperliquid's model.", "items": [{"author": "Crypto_McKenna", "text": "On HYPE: sharp selloff after the AQAv2 rally and CFTC onshoring news, but argues value must be exchanged in the $50-60 zone for true price discovery — new buyers include Hyperliquid Strategies (1.12x mNAV, $1B facility) and ETFs that have taken in $155M since May 22, before AQAv2's material revenue lift kicks in.", "tweet_url": "https://x.com/Crypto_McKenna/status/2064816731135369399", "category": "crypto", "created_at": "2026-06-10T21:07:25.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKey4_bbAAA8kKl.jpg"]}, {"author": "Delphi_Digital", "text": "Shares Ashwath's takeaway from Hyperliquid: the lesson isn't to do 99% buybacks with revenue, it's that honesty, transparency and authenticity with holders pays massive long-term dividends; links free State of Token Markets report.", "tweet_url": "https://x.com/Delphi_Digital/status/2064833618791538811", "category": "crypto", "created_at": "2026-06-10T22:14:32.000Z", "is_thread": true, "images": []}, {"author": "ASvanevik", "text": "Argues CEXs won't be able to compete with thousands of frontends settling on Hyperliquid, citing HL's far lower cost base and headcount.", "tweet_url": "https://x.com/ASvanevik/status/2064901851703873815", "category": "crypto", "created_at": "2026-06-11T02:45:40.000Z", "is_thread": false, "images": []}]}, {"title": "CFTC Onshoring Perps — Coinbase Approval & Regulatory Shift", "category": "regulation", "description": "CFTC Chair Selig's push to bring crypto derivatives back onshore, with Coinbase securing approval for global perps in the US.", "items": [{"author": "brian_armstrong", "text": "Detailed thread: Coinbase got approved to offer true global crypto perps in the US — years of work and dozens of DC visits — arguing ~half of all perp volume was Americans on offshore venues via VPN; now US and international liquidity can pool, crediting Chairs Selig and Atkins.", "tweet_url": "https://x.com/brian_armstrong/status/2064804308118381041", "category": "regulation", "created_at": "2026-06-10T20:18:03.000Z", "is_thread": true, "images": []}, {"author": "Crypto_McKenna", "text": "Recommends watching CFTC Chair Selig's interview outlining how the CFTC plans to draft a framework so on-chain markets onshore to the US after a decade pushed offshore by \"lawfare and regulation by enforcement.\"", "tweet_url": "https://x.com/Crypto_McKenna/status/2064828589678489994", "category": "regulation", "created_at": "2026-06-10T21:54:33.000Z", "is_thread": false, "images": []}, {"author": "Crypto_McKenna", "text": "Notes he's spending much of his time reading on perpetuals and on-chain market regulation, finding the machinery underpinning modern markets unexpectedly interesting.", "tweet_url": "https://x.com/Crypto_McKenna/status/2064830721739599883", "category": "regulation", "created_at": "2026-06-10T22:03:01.000Z", "is_thread": false, "images": []}]}, {"title": "Optical / CPO Supply-Chain Selloff — AAOI and Photonics Names", "category": "positioning", "description": "A wave of negative sell-side notes and macro pressure hit copper/optical (CPO) and photonics names; bulls frame it as institutional liquidity-grabbing while a skeptic questions valuations.", "items": [{"author": "aleabitoreddit", "text": "Long thesis: retail front-ran the optics/photonics cycle ($SIVE, $NBIS, $RKLB precedents) before JPM/Fidelity accumulated; argues negative sell-side reports and \"uncanny\" bad news are liquidity signals, claims to have uncovered hedge-fund bot farms on X telling retail to sell, and expects Foci (3363) to be a bottleneck for NVDA and TSM optical programs.", "tweet_url": "https://x.com/aleabitoreddit/status/2064884912667439129", "category": "positioning", "created_at": "2026-06-11T01:38:21.000Z", "is_thread": true, "images": []}, {"author": "aleabitoreddit", "text": "Posts a disappointing-week update: portfolio still +3,612% YTD despite drawdowns in Foci/Shunsin $SOI, $AAOI and other CPO names; treats it as a learning process in how the market prices supply-chain links.", "tweet_url": "https://x.com/aleabitoreddit/status/2064910057767309551", "category": "positioning", "created_at": "2026-06-11T03:18:16.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKgIwKlacAAgRov.jpg"]}, {"author": "0xSammy", "text": "Says the entire market puked after the bearish CPO article, but his thesis is unchanged — \"these mechanisms are novel and everything still stands.\"", "tweet_url": "https://x.com/0xSammy/status/2064937363449471444", "category": "positioning", "created_at": "2026-06-11T05:06:46.000Z", "is_thread": false, "images": []}, {"author": "citrini", "text": "Skeptical of the optical names: incredulous AAOI is \"really still $175\" (was $2), saying it should get cut in half.", "tweet_url": "https://x.com/citrini/status/2064857827479310792", "category": "positioning", "created_at": "2026-06-10T23:50:43.000Z", "is_thread": true, "images": []}]}, {"title": "Lee Raymond, Exxon Mobil Architect, Dies at 87", "category": "energy", "description": "Obituary note for the oilman who built Exxon Mobil and long fought climate efforts.", "items": [{"author": "JavierBlas", "text": "Lee Raymond, who created Exxon Mobil via the 1998 mega-merger with Mobil and for years fought efforts to cut CO2 emissions, has died at 87; ran Exxon from 1993 and made the combined entity the world's largest public company as oil prices surged.", "tweet_url": "https://x.com/JavierBlas/status/2064835421838684363", "category": "energy", "created_at": "2026-06-10T22:21:42.000Z", "is_thread": false, "images": []}]}], "insights": [{"author": "citrini", "text": "Sardonic market-sentiment read: in past cycles people only consulted astrologer girlfriends and psychics after 15%+ index drawdowns — \"how things have changed\" — a marker of frothy capitulation chatter (\"KOSPI 5000 era\").", "tweet_url": "https://x.com/citrini/status/2064861262878515265", "category": "macro", "created_at": "2026-06-11T00:04:22.000Z", "is_thread": true, "images": []}, {"author": "Fullcarry", "text": "Rates view: the belly has cheapened mostly via backside flattening, but the market hasn't grasped the very nice positive carry now in 2s — which changes curve dynamics and sets up front-end steepening as long as hikes aren't imminent.", "tweet_url": "https://x.com/Fullcarry/status/2064778164035805397", "category": "macro", "created_at": "2026-06-10T18:34:10.000Z", "is_thread": false, "images": []}, {"author": "Fullcarry", "text": "Gold is now 7% below its 200DMA, having been 43% above it back in January — a dramatic mean-reversion in the gold trade.", "tweet_url": "https://x.com/Fullcarry/status/2064794711986962881", "category": "macro", "created_at": "2026-06-10T19:39:56.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKefnv-XsAAMpDB.png"]}, {"author": "Tyler_Neville_", "text": "Macro framing: corporate leverage is down but government debt isn't — government debt has diluted the middle and lower classes to the benefit of the corporate class.", "tweet_url": "https://x.com/Tyler_Neville_/status/2064770008652054699", "category": "macro", "created_at": "2026-06-10T18:01:46.000Z", "is_thread": false, "images": []}, {"author": "0xfoobar", "text": "Argues \"staying smart\" in the AI era will require as much deliberate effort as staying fit — an explicit hour a day reading pre-AI text disconnected from technology, because true learning is painful in a way that doesn't match AI's addictiveness. \"Farmers didn't go to the gym.\"", "tweet_url": "https://x.com/0xfoobar/status/2064774742544949627", "category": "society", "created_at": "2026-06-10T18:20:34.000Z", "is_thread": true, "images": []}, {"author": "PeterDiamandis", "text": "Predicts recursive self-improvement will arrive without alarms or headlines — \"just an average week where models began training their successors, and the majority didn't realize it.\"", "tweet_url": "https://x.com/PeterDiamandis/status/2064837646543691986", "category": "ai", "created_at": "2026-06-10T22:30:32.000Z", "is_thread": false, "images": []}, {"author": "PeterDiamandis", "text": "ChatGPT just hit 1 billion monthly users faster than any product in human history — a record likely to be broken again soon.", "tweet_url": "https://x.com/PeterDiamandis/status/2064876983457030507", "category": "ai", "created_at": "2026-06-11T01:06:51.000Z", "is_thread": false, "images": []}, {"author": "udiWertheimer", "text": "On frontier models plateauing: thinks \"mythos\" is so good it'll take a while for people to learn to use it, and that we won't get more capable models for a long time — maybe faster, cheaper, more efficient, but not more capable.", "tweet_url": "https://x.com/udiWertheimer/status/2064858471699210303", "category": "ai", "created_at": "2026-06-10T23:53:17.000Z", "is_thread": true, "images": []}, {"author": "Bluntz_Capital", "text": "Collectibles thesis: argues marketcap, not price, is the right metric for graded cards — One Piece top chases command high prices because pop counts (500-2000) are tiny vs. Pokemon's Moonbreon (~30,000 graded 10s still selling $4k+, a $120M \"marketcap\").", "tweet_url": "https://x.com/Bluntz_Capital/status/2064935144516198406", "category": "macro", "created_at": "2026-06-11T04:57:57.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKgfkEnaEAADc6Z.jpg", "https://pbs.twimg.com/media/HKgfkaNbQAA0S2i.jpg"]}, {"author": "Bluntz_Capital", "text": "Argues One Piece IP is objectively stronger than Dragon Ball — 600M copies sold (a decade younger) vs 260M — reflected in manga tankobon and zasshi prices at equal grades.", "tweet_url": "https://x.com/Bluntz_Capital/status/2064841991205335392", "category": "macro", "created_at": "2026-06-10T22:47:48.000Z", "is_thread": true, "images": []}, {"author": "0xSammy", "text": "On a legacy software/consulting name (responding to blknoiz06): it's cooked unless it embraces AI-first tooling — lost 50% of valuation in 6 months while the S&P hit ATHs, facing a full restructure, debt and bloated workforce while competing with AI-first protocols.", "tweet_url": "https://x.com/0xSammy/status/2064813320524189941", "category": "tech", "created_at": "2026-06-10T20:53:52.000Z", "is_thread": true, "images": []}, {"author": "0xngmi", "text": "Notes model-company uptime is genuinely bad; at DefiLlama they saw elevated failure rates with providers and built a fallback system — a practical datapoint on AI infra reliability.", "tweet_url": "https://x.com/0xngmi/status/2064876410905194608", "category": "ai", "created_at": "2026-06-11T01:04:34.000Z", "is_thread": false, "images": []}, {"author": "0xfoobar", "text": "Wry AI-culture jab: \"an AI that doesn't tell you how 'honest' it is a dozen times an hour, who is building this — probably not the EAs.\"", "tweet_url": "https://x.com/0xfoobar/status/2064897891970236697", "category": "ai", "created_at": "2026-06-11T02:29:56.000Z", "is_thread": false, "images": []}, {"author": "Tyler_Neville_", "text": "On founder overconfidence: it only works with embedded super-talent (Kobe, LeBron) where the world reflects the talent back; fake founder overconfidence reeks of insecurity and ruins capital markets — \"you can't fake it.\"", "tweet_url": "https://x.com/Tyler_Neville_/status/2064765849840287987", "category": "society", "created_at": "2026-06-10T17:45:14.000Z", "is_thread": false, "images": []}, {"author": "0xJeff", "text": "Super AI conference Day 2 notes: shift from copilot to autopilot; fewer builders, more non-tech attendees; mostly enterprise solutions (inference engines, agentic search, durable agentic systems, AI observability, computer-use agents, agentic commerce); most exhibitors are there to sell and cover inference cost — full coverage with startup names to come.", "tweet_url": "https://x.com/0xJeff/status/2064920562653138989", "category": "ai", "created_at": "2026-06-11T04:00:01.000Z", "is_thread": false, "images": ["https://pbs.twimg.com/media/HKf7PxQaYAANxCJ.jpg"]}], "contrarian": [{"author": "krugermacro", "text": "Contrarian on permabears: if you used the Warren Buffett Indicator to exit when stocks were \"significantly overvalued,\" you missed the entire 2026 bull market or sat in treasuries since 2023 — mock the clickbait sellers quoting Buffett, not Buffett.", "tweet_url": "https://x.com/krugermacro/status/2064770462354489762", "category": "macro", "created_at": "2026-06-10T18:03:34.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKeJdCwaYAAabLL.jpg"]}, {"author": "Chartfest1", "text": "Contrarian sentiment read: lots of folks suddenly sounding glum/bearish that you didn't hear a week ago — implicitly a contrarian tell — though she adds breadth is flat and she doesn't like the market.", "tweet_url": "https://x.com/Chartfest1/status/2064796180567953731", "category": "macro", "created_at": "2026-06-10T19:45:46.000Z", "is_thread": true, "images": []}, {"author": "beaniemaxi", "text": "Pushes back on Solana-demise narrative (replying to Kyle Samani): \"a little early to declare its demise\"; separately defends the WSOP/poker sponsorship as good for Solana while wanting the Foundation to promote non-portfolio protocols.", "tweet_url": "https://x.com/beaniemaxi/status/2064903932439048473", "category": "crypto", "created_at": "2026-06-11T02:53:56.000Z", "is_thread": false, "images": []}, {"author": "Evan_ss6", "text": "Contrarian on ETH security model: there's no mechanism linking value-secured to ETH price — the \"secure because valuable, valuable because secure\" logic is circular.", "tweet_url": "https://x.com/Evan_ss6/status/2064881697582108918", "category": "crypto", "created_at": "2026-06-11T01:25:35.000Z", "is_thread": true, "images": []}, {"author": "nic_carter", "text": "Contrarian political take: he's fine with Dems electing Graham Platner because it would permanently end the left's \"nazi\" slur against the right — \"dems elected a literal, actual neonazi… nothing they ever say from that point onwards will stick.\"", "tweet_url": "https://x.com/nic_carter/status/2064879955759005981", "category": "society", "created_at": "2026-06-11T01:18:39.000Z", "is_thread": false, "images": []}, {"author": "MoonOverlord", "text": "Cautious counter to dip-buyers: \"The market is offering large discounts but you can go broke saving money.\"", "tweet_url": "https://x.com/MoonOverlord/status/2064829729539043626", "category": "macro", "created_at": "2026-06-10T21:59:04.000Z", "is_thread": false, "images": []}, {"author": "sjdedic", "text": "Reframes the bearish \"delusional\" label on founders (replying to Marc Andreessen): \"Delusional = asymmetric upside.\"", "tweet_url": "https://x.com/sjdedic/status/2064812828448391235", "category": "society", "created_at": "2026-06-10T20:51:55.000Z", "is_thread": false, "images": []}], "positioning": [{"author": "saxena_puru", "text": "Technical sell signal: $NDX closed below its prior low and red trendline — \"the trend is now DOWN,\" with a likely trip to the 40-week MA.", "tweet_url": "https://x.com/saxena_puru/status/2064921378948870602", "category": "positioning", "created_at": "2026-06-11T04:03:15.000Z", "is_thread": true, "images": ["https://pbs.twimg.com/media/HKgSw-za4AAYCLx.jpg"]}, {"author": "rektmando", "text": "MSTR/MicroStrategy bear case: ~$6B of bonds puttable within 2 years means Saylor must sell $6B BTC or issue $6B MSTR stock (likely the latter); even a BTC rally only lets him refi via secured/high-interest debt, diluting holders for interest plus dividends — BTC can do fine while MSTR does poorly. Doesn't expect default absent // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
