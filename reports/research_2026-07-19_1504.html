function catColor(cat) { return CATEGORY_COLORS[cat] || "#64748b"; }

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function computeCatCounts() {
  const counts = {};
  ITEMS.forEach(function(i) { counts[i.cat] = (counts[i.cat] || 0) + 1; });
  return counts;
}
function computeUrgCounts() {
  const counts = { act: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(i) { counts[i.urgency] = (counts[i.urgency] || 0) + 1; });
  return counts;
}

function renderFilters() {
  const catCounts = computeCatCounts();
  const catBar = document.getElementById("catFilters");
  let html = '<button class="pill' + (activeCat === "all" ? " active" : "") + '" style="' + (activeCat === "all" ? "background:#333;" : "") + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(function(cat) {
    const isActive = activeCat === cat;
    const color = catColor(cat);
    html += '<button class="pill' + (isActive ? " active" : "") + '" style="' + (isActive ? "background:" + color + ";border-color:" + color + ";" : "color:" + color + ";border-color:" + color + ";") + '" onclick="setCat(\'' + cat + '\')">' + cat + ' (' + catCounts[cat] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = computeUrgCounts();
  const urgBar = document.getElementById("urgFilters");
  let uhtml = '<button class="pill' + (activeUrg === "all" ? " active" : "") + '" style="' + (activeUrg === "all" ? "background:#333;" : "") + '" onclick="setUrg(\'all\')">All</button>';
  ["act", "deep", "watch"].forEach(function(u) {
    const isActive = activeUrg === u;
    uhtml += '<button class="pill' + (isActive ? " active" : "") + '" style="' + (isActive ? "background:#333;" : "") + '" onclick="setUrg(\'' + u + '\')">' + URGENCY_LABELS[u] + ' (' + urgCounts[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(cat) { activeCat = cat; activeSrc = null; renderFilters(); renderCards(); }
function setUrg(urg) { activeUrg = urg; activeSrc = null; renderFilters(); renderCards(); }
function filterBySrc(name) {
  activeSrc = name; activeCat = "all"; activeUrg = "all";
  renderFilters(); renderCards(true);
}

function renderCards(expandAll) {
  const container = document.getElementById("cardContainer");
  const emptyMsg = document.getElementById("emptyMsg");
  let filtered = ITEMS.filter(function(i) {
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrg !== "all" && i.urgency !== activeUrg) return false;
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = "";
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  let html = "";
  filtered.forEach(function(item) {
    const color = catColor(item.cat);
    const chartFlag = item.charts.hot ? "🔥" : (item.charts.count > 0 || item.charts.desc ? "📊" : "");
    html += '<div class="card' + (expandAll ? " open" : "") + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + item.id + '</span>';
    html += '<span>' + URGENCY_EMOJI[item.urgency] + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source.split(" (")[0].split(" /")[0] + '</span>';
    html += '<span class="tag">' + item.cat + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="caret">▶</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="border-left:2px solid ' + color + ';background:' + color + '14;">' + item.angle + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets-wrap">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="charts-box' + (item.charts.hot ? " hot" : "") + '">' + (item.charts.hot ? "🔥 CHART WORTH SAVING — " : "📊 ") + (item.charts.desc || (item.charts.count + " chart(s) in article")) + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleCard(id) {
  document.getElementById("card-" + id).classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderReport() {
  const body = document.getElementById("reportBody");
  let html = "";
  html += "<h4>Time Window</h4>";
  html += "<div>" + META.windowStart + " → " + META.windowEnd + ". Emails outside this window were not processed.</div>";
  html += "<h4>Totals</h4>";
  html += "<div>Emails in window: " + META.emailsInWindow + " · Emails read: " + META.emailsRead + " · Items extracted: " + META.itemsExtracted + "</div>";
  html += "<h4>Included Sources</h4>";
  META.includedSources.forEach(function(s) {
    html += '<div>• <span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.count + ' item(s)</div>';
  });
  html += "<h4>Skipped Sources</h4>";
  META.skippedSources.forEach(function(s) {
    html += '<div>• ' + s.name + ' — ' + s.reason + '</div>';
  });
  body.innerHTML = html;
}

document.getElementById("metaLine").textContent = META.date + " · " + META.time + " · " + ITEMS.length + " items from " + META.includedSources.length + " sources (window: " + META.windowStart + " – " + META.windowEnd + ")";

renderFilters();

renderReport();
</script>
