  idea:"After SCOTUS reaffirmed the 14th Amendment's birthright citizenship guarantee applies to children of illegal immigrants and temporary visa holders, a Quinnipiac poll found 69% of registered voters want to keep the rule in place, while separately about half of Americans think citizenship should specifically be denied to children of illegal immigrants. The loudest rightist reactions (dissolve the Union, sterilize visitors) represent a small, hermetically sealed minority worldview, not the median voter.",
  angle:"The 69%-keep and ~50%-restrict-this-case numbers together describe a constituency that wants a narrow carve-out, not repeal — and neither party is currently offering that option, which is the actual swing-messaging opportunity for 2026.",

const CAT_COLORS = {
  macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27", "AI/infra":"#1d9e75",
  crypto:"#7f77dd", geopolitics:"#d85a30", energy:"#f97316", tech:"#06b6d4",
  gold:"#d4a017", culture:"#ec4899", labor:"#8b5cf6", regulation:"#64748b",
  science:"#14b8a6", venture:"#84cc16"
};
const URG_LABELS = { act:"🔴 Act Now", deep:"🔵 Deep", watch:"🟡 Watch" };
const URG_EMOJI = { act:"🔴", deep:"🔵", watch:"🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function setCatFilter(cat) {
  activeCat = cat; activeSrc = null;
  renderFilters(); renderCards();
}
function setUrgFilter(urg) {
  activeUrg = urg; activeSrc = null;
  renderFilters(); renderCards();
}
function filterBySrc(name) {
  activeSrc = name; activeCat = "all"; activeUrg = "all";
  renderFilters(); renderCards(true);
}

function renderFilters() {
  var cats = {};
  ITEMS.forEach(function(i){ cats[i.cat] = (cats[i.cat]||0)+1; });
  var catHtml = '<button class="pill' + (activeCat==="all"?" active":"") + '" style="' + (activeCat==="all"?"background:#333;":"") + '" onclick="setCatFilter(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(cats).sort().forEach(function(c){
    var color = CAT_COLORS[c] || "#888";
    var isActive = activeCat === c;
    catHtml += '<button class="pill' + (isActive?" active":"") + '" style="' + (isActive?("background:"+color+";border-color:"+color+";"):"") + '" onclick="setCatFilter(\'' + c + '\')">' + c + ' (' + cats[c] + ')</button>';
  });
  document.getElementById('catFilters').innerHTML = catHtml;

  var urgs = {};
  ITEMS.forEach(function(i){ urgs[i.urgency] = (urgs[i.urgency]||0)+1; });
  var urgColors = { act:"#e24b4a", deep:"#378add", watch:"#ef9f27" };
  var urgHtml = '<button class="pill' + (activeUrg==="all"?" active":"") + '" style="' + (activeUrg==="all"?"background:#333;":"") + '" onclick="setUrgFilter(\'all\')">All (' + ITEMS.length + ')</button>';
  ["act","deep","watch"].forEach(function(u){
    if(!urgs[u]) return;
    var isActive = activeUrg === u;
    urgHtml += '<button class="pill' + (isActive?" active":"") + '" style="' + (isActive?("background:"+urgColors[u]+";border-color:"+urgColors[u]+";"):"") + '" onclick="setUrgFilter(\'' + u + '\')">' + URG_LABELS[u] + ' (' + urgs[u] + ')</button>';
  });
  document.getElementById('urgFilters').innerHTML = urgHtml;
}

function renderCards(expandAll) {
  var list = ITEMS.filter(function(i){
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrg !== "all" && i.urgency !== activeUrg) return false;
    return true;
  });
  var html = "";
  list.forEach(function(item, idx){
    var color = CAT_COLORS[item.cat] || "#888";
    var chartFlag = item.charts.hot ? "🔥" : (item.charts.count > 0 ? "📊" : "");
    html += '<div class="card">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(idx+1).padStart(2,'0') + '</span>';
    html += '<span class="urg">' + URG_EMOJI[item.urgency] + '</span>';
    html += '<span class="src-badge" style="background:' + color + '">' + item.source + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chev">▾</span>';
    html += '</div>';
    html += '<div class="card-body' + (expandAll ? ' open' : '') + '" id="body-' + item.id + '">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left-color:' + color + ';background:' + color + '14;">' + item.angle + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + item.charts.desc + '</div>';
    }
    html += '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div>';
    html += '</div>';
  });
  document.getElementById('cards').innerHTML = html || '<p style="color:#888;padding:20px 0;">No items match this filter.</p>';
}

function renderReport() {
  var h = '';
  h += '<h4>Time Window</h4>';
  h += '<p>' + META.windowStart + ' &rarr; ' + META.windowEnd + '. Emails outside this window were not processed.</p>';
  h += '<h4>Coverage</h4>';
  h += '<p>' + META.emailsInWindow + ' emails in window &middot; ' + META.emailsRead + ' read &middot; ' + META.itemsExtracted + ' items extracted.</p>';
  h += '<h4>Included Sources</h4><p>';
  META.includedSources.forEach(function(s, i){
    h += '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + '</span> (' + s.count + ')';
    if (i < META.includedSources.length-1) h += ' &middot; ';
  });
  h += '</p>';
  h += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(function(s){
    h += '<p class="skip-item">' + s.name + ' — ' + s.reason + '</p>';
  });
  document.getElementById('reportBody').innerHTML = h;
}

document.getElementById('headerMeta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items';
document.getElementById('reportToggle').addEventListener('click', function(){
  document.getElementById('reportBody').classList.toggle('open');
  document.getElementById('reportChev').textContent = document.getElementById('reportBody').classList.contains('open') ? '▴' : '▾';
});

renderFilters();
renderCards();
renderReport();
