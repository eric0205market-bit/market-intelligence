let activeCat = 'all';

function catColor(cat){ return CAT_COLORS[cat]||'#888'; }

function urgEmoji(u){
  if(u==='now') return '🔴';
  if(u==='deep') return '🔵';
  return '🟡';
}

function buildFilters(){
  const cats = {};
  ITEMS.forEach(i=>{ cats[i.cat]=(cats[i.cat]||0)+1; });
  const urgs = {now:0,deep:0,watch:0};
  ITEMS.forEach(i=>{ urgs[i.urgency]++; });

  const cf = document.getElementById('cat-filters');
  let html = '<span class="pill pill-all active" onclick="filterCat(\'all\')">All ('+ITEMS.length+')</span>';
  Object.entries(cats).forEach(([c,n])=>{
    html += '<span class="pill" style="border-color:'+catColor(c)+'" onclick="filterCat(\''+c+'\')" data-cat="'+c+'">'+c+' ('+n+')</span>';
  });
  cf.innerHTML = html;

  const uf = document.getElementById('urg-filters');
  uf.innerHTML = '<span class="upill active" onclick="filterUrg(\'all\')">All</span>'+
    '<span class="upill" onclick="filterUrg(\'now\')">🔴 Act Now ('+urgs.now+')</span>'+
    '<span class="upill" onclick="filterUrg(\'deep\')">🔵 Deep ('+urgs.deep+')</span>'+
    '<span class="upill" onclick="filterUrg(\'watch\')">🟡 Watch ('+urgs.watch+')</span>';
}

function filterCat(cat){
  activeCat = cat; activeSrc = null;
  document.querySelectorAll('.pill').forEach(p=>{
    if(cat==='all') p.classList.toggle('active', p.classList.contains('pill-all'));
    else p.classList.toggle('active', p.dataset.cat===cat);
    if(p.classList.contains('active') && !p.classList.contains('pill-all')){
      p.style.background = catColor(cat); p.style.color='#fff';
    } else if(!p.classList.contains('pill-all')){
      p.style.background='#fff'; p.style.color='#555';
    }
  });
  renderCards();
}

function filterUrg(urg){
  activeUrg = urg; activeSrc = null;
  document.querySelectorAll('.upill').forEach(p=>{
    p.classList.remove('active');
  });
  event.target.classList.add('active');
  renderCards();
}

function filterBySrc(name){
  activeSrc = name; activeCat='all'; activeUrg='all';
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.upill').forEach(p=>p.classList.remove('active'));
  document.querySelector('.pill-all').classList.add('active');
  document.querySelectorAll('.upill')[0].classList.add('active');
  renderCards(true);
}

function matches(item){
  if(activeSrc) return item.source.indexOf(activeSrc) !== -1;
  const catOk = activeCat==='all' || item.cat===activeCat;
  const urgOk = activeUrg==='all' || item.urgency===activeUrg;
  return catOk && urgOk;
}

            '<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">'+item.tweetB+'</div>' +
            '<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        (item.charts.count > 0 ?
          '<div class="chart-note'+(item.charts.hot?' chart-hot':'')+'">'+
            (item.charts.hot?'🔥 CHART WORTH SAVING — ':'📊 '+item.charts.count+' chart(s) — ')+
            item.charts.desc+
          '</div>' : '') +
        (item.link ? '<a class="article-link" href="'+item.link+'" target="_blank">↗ Read full article</a>' : '') +
      '</div>';

    if(expandMatched && show){
      div.querySelector('.card-body').classList.add('open');
    }
    container.appendChild(div);
  });
}

function toggleCard(id){
  const body = document.getElementById('body-'+id);
  body.classList.toggle('open');
}

function copyTweet(itemId, which){
  var item = ITEMS.find(function(i){ return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = '📋 Copy'; }, 1500);
}

function toggleReport(){
  const body = document.getElementById('session-body');
  body.classList.toggle('open');
}

function buildSessionReport(){
  const body = document.getElementById('session-body');
  let html = '<b>Window:</b> '+META.windowStart+' → '+META.windowEnd+'<br>';
  html += '<b>Emails in window:</b> '+META.emailsInWindow+' | <b>Read:</b> '+META.emailsRead+' | <b>Items extracted:</b> '+META.itemsExtracted+'<br><br>';
  html += '<b>Included Sources:</b><br><ul style="margin:4px 0 12px 18px">';
  META.includedSources.forEach(s=>{
    html += '<li><span class="src-link" onclick="filterBySrc(\''+s.name.split('/')[0].trim()+'\')">'+s.name+'</span> — '+s.items+' item'+(s.items>1?'s':'')+'</li>';
  });
  html += '</ul>';
  html += '<b>Skipped Sources:</b><br><ul style="margin:4px 0 12px 18px">';
  META.skippedSources.forEach(s=>{
    html += '<li><b>'+s.name+'</b>: '+s.reason+'</li>';
  });
  html += '</ul>';
  body.innerHTML = html;
}

function buildHeader(){
  document.getElementById('hdr-meta').innerHTML =
    META.date + ' | ' + META.time + ' | ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function init(){
  buildHeader();
  buildFilters();
  buildSessionReport();
  renderCards();
}

init();
</script>
</body>
</html>
