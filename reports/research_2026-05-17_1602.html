  gold: '#d4a017',
  culture: '#ec4899',
  labor: '#8b5cf6',
  regulation: '#64748b',
  science: '#14b8a6',
  venture: '#84cc16'
};

const URG_META = {
  act_now: { label: '🔴 Act Now', color: '#e24b4a' },
  deep:    { label: '🔵 Deep',    color: '#378add' },
  watch:   { label: '🟡 Watch',   color: '#d97706' }
};

let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  if (!body) return;
  var isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  chev.classList.toggle('open');
  chev.textContent = isOpen ? '▶' : '▼';
}

function getFilteredItems() {
  return ITEMS.filter(function(item) {
    if (activeSrc !== null && item.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== 'all' && item.cat !== activeCat) return false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return false;
    return true;
  });
}

function buildCatFilters() {
  var cats = ['all'];
  var seen = {};
  ITEMS.forEach(function(i) { if (!seen[i.cat]) { seen[i.cat] = true; cats.push(i.cat); } });
  var counts = {};
  ITEMS.forEach(function(i) { counts[i.cat] = (counts[i.cat] || 0) + 1; });
  var bar = document.getElementById('catFilters');
  bar.innerHTML = cats.map(function(cat) {
    var color = CAT_COLORS[cat] || '#888';
    var count = cat === 'all' ? ITEMS.length : (counts[cat] || 0);
    var label = cat === 'all' ? 'All' : (cat.charAt(0).toUpperCase() + cat.slice(1));
    var isActive = cat === activeCat;
    var style = isActive ? ('background:' + color + ';border-color:' + color + ';color:#fff;') : '';
    return '<span class="filter-pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setCatFilter(\'' + cat.replace(/\//g,'\\/') + '\')">' + escHtml(label) + ' <span style="opacity:0.65;font-weight:400">' + count + '</span></span>';
  }).join('');
}

function buildUrgFilters() {
  var urgs = ['all', 'act_now', 'deep', 'watch'];
  var counts = {};
  ITEMS.forEach(function(i) { counts[i.urgency] = (counts[i.urgency] || 0) + 1; });
  var bar = document.getElementById('urgFilters');
  bar.innerHTML = urgs.map(function(urg) {
    var count = urg === 'all' ? ITEMS.length : (counts[urg] || 0);
    var label = urg === 'all' ? 'All' : URG_META[urg].label;
    var color = urg === 'all' ? '#666' : URG_META[urg].color;
    var isActive = urg === activeUrg;
    var style = isActive ? ('background:' + color + ';border-color:' + color + ';color:#fff;') : '';
    return '<span class="filter-pill' + (isActive ? ' active' : '') + '" style="' + style + '" onclick="setUrgFilter(\'' + urg + '\')">' + escHtml(label) + ' <span style="opacity:0.65;font-weight:400">' + count + '</span></span>';
  }).join('');
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  buildCatFilters();
  buildUrgFilters();
  renderCards();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  buildCatFilters();
  buildUrgFilters();
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  buildCatFilters();
  buildUrgFilters();
  renderCards();
  document.querySelectorAll('.card').forEach(function(card) {
    var id = card.id.replace('card-', '');
    var body = document.getElementById('body-' + id);
    var chev = document.getElementById('chev-' + id);
    if (body && !body.classList.contains('open')) {
      body.classList.add('open');
      if (chev) { chev.classList.add('open'); chev.textContent = '▼'; }
    }
  });
}

function buildCard(item) {
  var color = CAT_COLORS[item.cat] || '#888';
  var urgEmoji = item.urgency === 'act_now' ? '🔴' : item.urgency === 'watch' ? '🟡' : '🔵';
  var catLabel = item.cat.charAt(0).toUpperCase() + item.cat.slice(1);
  var angleStyle = 'border-left-color:' + color + ';background:' + hexToRgba(color, 0.07) + ';';
  var chartBadge = item.charts.count > 0 ? ('<span style="font-size:13px;flex-shrink:0">' + (item.charts.hot ? '🔥' : '📊') + '</span>') : '';
  var chartsHtml = '';
  if (item.charts.count > 0) {
    var hotClass = item.charts.hot ? ' hot' : '';
    chartsHtml = '<div class="chart-block' + hotClass + '"><div class="chart-block-label">📊 CHARTS (' + item.charts.count + ')</div><div class="chart-desc">' + escHtml(item.charts.desc) + '</div></div>';
  }
  return '<div class="card" id="card-' + item.id + '">' +
    '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="card-num">' + String(item.id).padStart(2,'0') + '</span>' +
      '<span class="card-urgency">' + urgEmoji + '</span>' +
      '<span class="source-badge" style="background:' + color + '">' + escHtml(item.source) + '</span>' +
      '<span class="cat-tag">' + escHtml(catLabel) + '</span>' +
      chartBadge +
      '<span class="card-title">' + escHtml(item.title) + '</span>' +
      '<span class="chevron" id="chev-' + item.id + '">▶</span>' +
    '</div>' +
    '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + escHtml(item.idea) + '</div>' +
      '<div class="section-label">My Angle</div>' +
      '<div class="angle-block" style="' + angleStyle + '">' + escHtml(item.angle) + '</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box tweet-box-a">' +
          '<div class="tweet-label tweet-label-a">TWEET A</div>' +
          '<div class="tweet-text">' + escHtml(item.tweetA) + '</div>' +
          '<button class="copy-btn copy-btn-a" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box tweet-box-b">' +
          '<div class="tweet-label tweet-label-b">TWEET B</div>' +
          '<div class="tweet-text">' + escHtml(item.tweetB) + '</div>' +
          '<button class="copy-btn copy-btn-b" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartsHtml +
      '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>' +
    '</div>' +
  '</div>';
}

function renderCards() {
  var items = getFilteredItems();
  var container = document.getElementById('cards');
  if (items.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px;font-size:13px">No items match the current filters.</div>';
    return;
  }
  container.innerHTML = items.map(buildCard).join('');
}

function buildSessionReport() {
  var el = document.getElementById('sessionReport');
  var srcLinks = META.includedSources.map(function(s) {
    return '<span class="source-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + escHtml(s.name) + '</span> (' + s.items + ' items)';
  }).join(' &nbsp;·&nbsp; ');
  var skipped = META.skippedSources.map(function(s) {
    return '<div class="skip-item">⛔ <strong>' + escHtml(s.name) + '</strong>: ' + escHtml(s.reason) + '</div>';
  }).join('');
  el.innerHTML =
    '<div class="sr-header" onclick="toggleSR()">📋 Session Report <span id="srChev">▶</span></div>' +
    '<div class="sr-body" id="srBody">' +
      '<div class="sr-row"><span class="sr-k">Time Window</span><span class="sr-v">' + META.windowStart + ' → ' + META.windowEnd + '</span></div>' +
      '<div class="sr-row"><span class="sr-k">Emails in Window</span><span class="sr-v">' + META.emailsInWindow + '</span></div>' +
      '<div class="sr-row"><span class="sr-k">Emails Read</span><span class="sr-v">' + META.emailsRead + ' / ' + META.emailsInWindow + '</span></div>' +
      '<div class="sr-row"><span class="sr-k">Items Extracted</span><span class="sr-v">' + META.itemsExtracted + '</span></div>' +
      '<div class="sr-row" style="flex-direction:column;gap:5px"><span class="sr-k">Included Sources</span><div style="line-height:2;font-size:13px">' + srcLinks + '</div></div>' +
      '<div class="sr-row" style="flex-direction:column;gap:4px;margin-top:8px"><span class="sr-k">Skipped Sources</span><div style="margin-top:4px">' + skipped + '</div></div>' +
    '</div>';
}

function toggleSR() {
  var body = document.getElementById('srBody');
  var chev = document.getElementById('srChev');
  body.classList.toggle('open');
  chev.textContent = body.classList.contains('open') ? '▼' : '▶';
}

function buildHeader() {
  document.getElementById('headerMeta').innerHTML =
    '<span>📅 ' + META.date + '</span>' +
    '<span>🕐 ' + META.time + '</span>' +
    '<span>⏰ Window: ' + META.windowStart + ' → ' + META.windowEnd + '</span>' +
    '<span>📬 ' + META.emailsRead + '/' + META.emailsInWindow + ' emails read</span>' +
    '<span>💡 ' + META.itemsExtracted + ' items extracted</span>';
}

function init() {
  buildHeader();
  buildCatFilters();
  buildUrgFilters();
  renderCards();
  buildSessionReport();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
