const CATS = [
  {key:"health",label:"health",color:"#f43f5e"},
  {key:"aiinfra",label:"AI/infra",color:"#1d9e75"},
  {key:"macro",label:"macro",color:"#e24b4a"},
  {key:"tech",label:"tech",color:"#06b6d4"},

  {key:"geopolitics",label:"geopolitics",color:"#d85a30"},

  {key:"crypto",label:"crypto",color:"#7f77dd"},
  {key:"culture",label:"culture",color:"#ec4899"},
  {key:"regulation",label:"regulation",color:"#64748b"}
];
const CAT_COLOR = {}; CATS.forEach(c=>CAT_COLOR[c.key]=c.color);
const URG = [
  {key:"act",label:"🔴 Act Now"},
  {key:"deep",label:"🔵 Deep"},
  {key:"watch",label:"🟡 Watch"}
];
const URG_EMOJI = {act:"🔴",deep:"🔵",watch:"🟡"};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catCount(key){ return key==="all"? ITEMS.length : ITEMS.filter(i=>i.cat===key).length; }
function urgCount(key){ return key==="all"? ITEMS.length : ITEMS.filter(i=>i.urgency===key).length; }

function renderFilters(){
  const catEl = document.getElementById("catFilters");
  let html = `<button class="pill ${activeCat==='all'?'active':''}" style="${activeCat==='all'?'background:#333;':''}" onclick="setCat('all')">All (${ITEMS.length})</button>`;
  CATS.forEach(c=>{
    const n = catCount(c.key);
    if(n===0) return;
    const isActive = activeCat===c.key;
    html += `<button class="pill ${isActive?'active':''}" style="${isActive?'background:'+c.color+';':''}" onclick="setCat('${c.key}')">${c.label} (${n})</button>`;
  });
  catEl.innerHTML = html;

  const urgEl = document.getElementById("urgFilters");
  let uhtml = `<button class="pill ${activeUrg==='all'?'active':''}" style="${activeUrg==='all'?'background:#333;':''}" onclick="setUrg('all')">All (${ITEMS.length})</button>`;
  URG.forEach(u=>{
    const n = urgCount(u.key);
    if(n===0) return;
    const isActive = activeUrg===u.key;
    uhtml += `<button class="pill ${isActive?'active':''}" style="${isActive?'background:#555;':''}" onclick="setUrg('${u.key}')">${u.label} (${n})</button>`;
  });
  urgEl.innerHTML = uhtml;
}

function setCat(key){ activeCat = key; activeSrc = null; renderFilters(); renderCards(); }
function setUrg(key){ activeUrg = key; activeSrc = null; renderFilters(); renderCards(); }

function filterBySrc(name){
  activeCat = "all"; activeUrg = "all"; activeSrc = name;
  renderFilters();
  renderCards();
  document.querySelectorAll(".card").forEach(function(el){
    const id = parseInt(el.getAttribute("data-id"));
    const item = ITEMS.find(function(i){ return i.id === id; });
    if(item && item.source.indexOf(name) !== -1){
      el.classList.add("open");
    }
  });
  document.getElementById("cards").scrollIntoView({behavior:"smooth"});
}

function renderCards(){
  const el = document.getElementById("cards");
  let html = "";
  ITEMS.forEach(function(item){
    let visible = true;
    if(activeCat!=="all" && item.cat!==activeCat) visible = false;
    if(activeUrg!=="all" && item.urgency!==activeUrg) visible = false;
    if(activeSrc && item.source.indexOf(activeSrc)===-1) visible = false;
    const color = CAT_COLOR[item.cat] || "#888";
    const chartFlag = item.charts.count>0 ? (item.charts.hot? "🔥" : "📊") : "";
    html += `<div class="card ${visible?'':'hidden'}" data-id="${item.id}">
      <div class="card-head" onclick="toggleCard(${item.id})">
        <span class="idx">${String(item.id).padStart(2,'0')}</span>
        <span class="urg">${URG_EMOJI[item.urgency]}</span>
        <span class="badge" style="background:${color}">${item.source}</span>
        <span class="catpill">${item.cat}</span>
        <span class="chartflag">${chartFlag}</span>
        <span class="card-title">${item.title}</span>
        <span class="chev">▾</span>
      </div>
      <div class="card-body">
        <div class="section-label">The Idea</div>
        <div class="idea">${item.idea}</div>
        <div class="section-label">My Angle</div>
        <div class="angle" style="border-left:2px solid ${color};background:${color}14;">${item.angle}</div>
        <div class="section-label">Tweets</div>
        <div class="tweets">
          <div class="tweetbox">
            <div class="tweetlabel" style="color:#378add;">TWEET A</div>
            <div class="tweettext">${item.tweetA}</div>
            <button class="copy-btn" onclick="copyTweet(${item.id},'a')">📋 Copy</button>
          </div>
          <div class="tweetbox">
            <div class="tweetlabel" style="color:#7f77dd;">TWEET B</div>
            <div class="tweettext">${item.tweetB}</div>
            <button class="copy-btn" onclick="copyTweet(${item.id},'b')">📋 Copy</button>
          </div>
        </div>
        <div class="chartbox ${item.charts.hot?'hot':''}">${item.charts.count>0 ? (item.charts.count+" chart(s) — "+item.charts.desc) : (item.charts.desc || "No charts in this email.")}</div>
        <div class="linkrow"><a href="${item.link}" target="_blank">↗ Read full article</a></div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function toggleCard(id){
  const el = document.querySelector('.card[data-id="'+id+'"]');
  if(el) el.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderReport(){
  document.getElementById("metaline").textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.emailsRead + " emails";
  let html = `<p><strong>Window:</strong> ${META.windowStart} to ${META.windowEnd}. Emails outside this window were not processed.</p>
  <p><strong>Emails in window:</strong> ${META.emailsInWindow} &nbsp;|&nbsp; <strong>Emails read:</strong> ${META.emailsRead} &nbsp;|&nbsp; <strong>Items extracted:</strong> ${META.itemsExtracted}</p>
  <div class="section-label">Included Sources</div><ul>`;
  META.includedSources.forEach(function(s){
    html += `<li class="srcrow" onclick="filterBySrc('${s.name.replace(/'/g,"\\'")}')">${s.name} — ${s.count} item(s)</li>`;
  });
  html += `</ul><div class="section-label">Skipped Sources</div>`;
  html += META.skippedSources.length ? `<ul>${META.skippedSources.map(s=>`<li>${s}</li>`).join("")}</ul>` : `<p>None — every email in the window contained at least one substantive item.</p>`;
  document.getElementById("reportBody").innerHTML = html;
}

document.getElementById("reportToggle").addEventListener("click", function(){
  document.getElementById("reportCard").classList.toggle("open");
});

renderFilters();
renderCards();
renderReport();
</script>
