<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Institutional Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #7c3aed;          /* purple — institutional report accent */
  --accent-soft: #f3eefc;
  --divergence: #d94052;      /* divergence red */
  --consensus: #15803d;       /* consensus green */
  --yellow: #fff5b3;

  /* category colors (institutional schema: rates, growth, fx, equities,
     credit, crypto, energy, commodities, geopolitics, ai_tech, em) */
  --cat-rates: #2563eb;
  --cat-growth: #d97706;
  --cat-fx: #0891b2;
  --cat-equities: #15803d;
  --cat-credit: #be185d;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-commodities: #ea580c;
  --cat-geopolitics: #b91c1c;
  --cat-ai_tech: #4f46e5;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 12px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR (top: period + coverage) */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 10px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* THEME CARD (Section A) */
.theme { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.theme:last-child { border-bottom: none; }
.theme-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
              flex-wrap: wrap; }
.theme-title { font-weight: 600; font-size: 14.5px; }
.theme-stance { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 10px; }
@media (min-width: 720px) { .theme-stance { grid-template-columns: 1fr 1fr; } }
.theme-line { font-size: 13px; padding: 8px 10px; border-radius: 4px;
              border-left: 3px solid var(--border); background: #fafafa; line-height: 1.5; }
.theme-line.consensus { border-left-color: var(--consensus); background: #f0f9f3; }
.theme-line.divergence { border-left-color: var(--divergence); background: #fdf6f7; }
.theme-line .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px;
                   text-transform: uppercase; letter-spacing: .06em;
                   color: var(--text-3); display: block; margin-bottom: 2px; }
.theme-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
               border-left: 2px solid var(--border-light); }
.theme-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-source { font-weight: 600; color: var(--accent); }
a.item-source { text-decoration: none; }
a.item-source:hover { text-decoration: underline; }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-title { font-weight: 600; font-size: 14px; margin: 4px 0 6px; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DEEP READS (Section C) — purple left border to mark flagship long-form */
.section-deepreads .item-card { border-left: 4px solid var(--accent); background: var(--accent-soft); }

/* HOUSE VIEWS — compact one-line-per-source list */
.hv-row { display: flex; gap: 10px; align-items: baseline;
          padding: 6px 16px; border-bottom: 1px solid var(--border-light);
          font-size: 13px; }
.hv-row:last-child { border-bottom: none; }
.hv-name { font-weight: 600; color: var(--accent); min-width: 180px;
           text-decoration: none; }
.hv-name:hover { text-decoration: underline; }
.hv-stance { color: var(--text); flex: 1; }

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 110px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .hv-row { flex-direction: column; gap: 2px; }
  .hv-name { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_type": "INSTITUTIONAL RESEARCH", "collected_at": "2026-07-05T02:01:31Z", "period": {"lookback_days": 10, "from": "2026-06-25", "to": "2026-07-04"}, "input_stats": {"total_articles": 439, "sources_present": 58, "after_filter": 219}, "summary": "**Rates / Fed:** Consensus is the Fed holds through 2026 under new Chair **Kevin Warsh** (JPMorgan, UBS, BCA, Standard Chartered, Deutsche Bank), who is talking hawkish precisely to avoid having to deliver the hike markets are pricing. Sharpest split: markets/**Citi** price real hike risk into year-end while **BCA, UBS, JPMorgan and Standard Chartered** all argue a hike is unlikely given a soft June payrolls print (+57k vs ~110k consensus) and fading oil-driven inflation; **BCA's** bond desk closed its flattener for a 2yr/30yr steepener betting the market's hawkishness is overpriced.\n\n**Oil / Strait of Hormuz:** Consensus is that oil has round-tripped most of its war premium (Brent ~$70-75 from a ~$120-130 peak) as the US-Iran interim deal holds and Hormuz partially reopens. Sharpest split: **UBS** expects a snapback to $85 by year-end (current prices \"overestimate\" how fast shut-in Gulf production and shipping confidence recover, 50-100mn barrels still trapped in storage) versus **JPMorgan**, which sees Brent grinding lower to $78 exiting 2026 and averaging just $64 in 2027 as flows normalize — with **Citi** flagging a $120 tail risk if the ceasefire breaks and **Brookings/Gavekal** noting Iran's minefield and new toll-charging \"Strait Authority\" mean the disruption risk premium outlasts the nominal 60-day reopening window.\n\n**US Equities:** Consensus among sell-side (**Goldman, BNP Paribas, UBS, JPMorgan, Citi, Barclays**) remains constructive — S&P 500 targets cluster at 7400-8100 on 15-20%+ EPS growth — but conviction is visibly softening. **Barclays** stays overweight equities but with \"far less conviction\" than a quarter ago; **BCA** raised its target to 8100 while simultaneously cutting its P/E assumption, arguing earnings (not re-rating) must now do the work; **Amundi and Invesco** are actively trimming US/AI concentration into value, EM and Japan; **Rosenberg Research's** bearish content was paywalled this period but its absence from the bull chorus is itself notable.\n\n**AI / Credit risk:** Consensus is the AI capex supercycle continues (annualized capex approaching $1tn, per **UBS**), but a live divergence has opened over financing risk. **Goldman, Man Group and Galaxy Digital** flag that the largest tech firms have issued $170bn+ of debt YTD (4x pre-AI norms) at credit spreads that ignore the Merton-model logic applied to firms like SpaceX (real cash flow) versus loss-making pure-AI issuers — while **UBS and Citi** treat this as a manageable \"picks and shovels\" opportunity rather than a systemic risk, and credit spreads remain at multi-year tights.\n\n**USD / FX:** Consensus is the dollar's war-driven safe-haven rally has largely played out. Sharpest split: **Lazard's Ron Temple and Amundi** hold a structural multi-year weaker-dollar view (FX hedging, Treasury diversification away from the US) versus **Gavekal and BCA**, who note the DXY hit a 13-month high and argue further upside consolidation, not breakdown, is more likely near-term — while **Standard Chartered** sits in between, bullish AUD and CNH against USD but citing intervention risk capping USD/JPY.\n\n**Korea / AI equities:** Consensus is Korea's 2026 rally (semis, momentum, heavy retail flows) has become the poster child for AI-froth concerns. **BCA** downgraded Korean equities outright and closed its long-Asia-semis/short-hyperscaler trade (+140% since November); **Franklin Templeton** finds ex-semiconductor Korea already in a value opportunity (two-thirds of listings below book) and rotates into defense/shipbuilding instead of chasing the mega-cap trade; **Standard Chartered**, by contrast, maintains a 3-4% core allocation to memory-chip equities, arguing new supply doesn't arrive until 2027-28.\n\n**Gold / Commodities:** Consensus is gold stays structurally supported by central-bank buying (750-1,000 tonnes/year) even after a sharp pullback (-20 to -26% from January highs). **UBS** is most bullish (targets $5,000-5,200/oz over 12 months) on an expected 2027 Fed cut and stretched long-USD positioning, while the **World Bank** models gold peaking this year (+37% for 2026) before falling ~9% in 2027, and **Vanguard** cautions gold only hedges debasement/tail scenarios, not routine inflation (just +1.1%/year since 2013).", "sections": {"A_debates": [{"theme": "Rates & Central Banks", "category": ["rates"], "consensus": "The dominant sell-side view (JPMorgan, UBS, BCA, Standard Chartered, Deutsche Bank, BNP Paribas) is that the Fed under new Chair Kevin Warsh holds rates through the rest of 2026, using hawkish rhetoric and a slate of new policy-review task forces as a substitute for actual tightening; June's soft nonfarm payrolls print (+57k vs ~110-115k consensus, prior months revised down) reinforced this. The ECB and BoE are seen as reluctantly hawkish given oil-shock-driven inflation upside surprises, but not embarking on full hiking cycles.", "divergence": "Market pricing itself is the divergent voice: futures imply roughly two 25bp Fed hikes over the next 12 months, which UBS explicitly calls too aggressive given decelerating wages and a 0.8pp expected fade in tariff pass-through, and which BCA is positioned against via a 2yr/30yr Treasury steepener (having closed its flattener). JPMorgan is the outlier on timing, seeing the Fed on hold all the way through 2026 with the first hike not until H2 2027, versus Citi's Markets Edition desk, which still frames a hawkish-Fed-plus-falling-oil combination as tradeable for USD longs. On the BoE, MPC members split visibly: Catherine Mann has shifted from favoring a cut to favoring a hold or possible hike given persistent energy-driven inflation, while Governor Bailey stresses the shock cannot be offset by policy and requires scenario-based 'constrained discretion' rather than a single forecast — the BoE dropped its central forecast for only the second time ever (after Covid) in its April Monetary Policy Report.", "items": [{"source": "jpmorgan", "name": "JPMorgan", "thesis": "Fed on hold through 2026, first hike not until H2 2027 (risk of an earlier hike if unemployment falls toward 4%); ECB and BOJ each deliver one more hike in Sept/Oct, BOE hikes in July.", "url": "https://www.jpmorgan.com/insights/podcast-hub/making-sense/global-mid-year-outlook", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "Market pricing of ~2x 25bp Fed hikes over 12 months is too aggressive; wage growth decelerating and tariff pass-through unwind could cut the inflation trend by 0.8pp over the next year. Favor short-to-medium maturity quality bonds.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-02072026.html", "images": []}, {"source": "bca_research", "name": "BCA Research", "thesis": "New Fed Chair Warsh's shift to less explicit guidance still carries an implicit inflation-over-employment priority; recommends tracking the 2yr Treasury/fed-funds spread as the new leading signal. Closed 5yr/30yr flattener, opened 2yr/30yr steepener, fading priced-in hawkishness ahead of the jobs report.", "url": "https://www.bcaresearch.com/marketing/insight/warshs-tactical-window/221056", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "thesis": "Hormuz reopening and sub-$70 crude mark 'peak hawkishness' for the global cycle; soft June payrolls push Fed hike odds to December, and SC is skeptical the Fed hikes at all in 2026. ECB seen on hold through year-end.", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-3-7-2026/?mvog=1", "images": []}, {"source": "boe", "name": "Bank of England", "thesis": "MPC's Catherine Mann has moved from favoring a rate cut to favoring a longer hold/possible hike as April 2026 CPI came in 0.8pp above pre-conflict expectations on energy costs; Governor Bailey says policy cannot offset a terms-of-trade shock and must use scenario-based 'constrained discretion.'", "url": "https://www.bankofengland.co.uk/speech/2026/july/catherine-l-mann-fireside-chat-at-the-natixis-cib-conference-on-private-debt", "images": []}, {"source": "federal_reserve", "name": "Federal Reserve", "thesis": "FEDS note builds a 'shortage index' from 125 years of newspaper text: it read 175 in May 2026 (75% above the historical average), driven by conflict-related energy shortages, with a modeled 0.8% hit to world GDP and 1% rise in world inflation from the current shock's magnitude after ~3 years.", "url": "https://www.federalreserve.gov/econres/notes/feds-notes/a-news-based-approach-to-measuring-shortages-and-their-effects-on-the-global-economy-20260626.html", "images": []}, {"source": "ecb", "name": "European Central Bank", "thesis": "Chinese import-price disinflation (China import prices -3.3% y/y in March) is quietly offsetting some of the energy-driven inflation impulse, cutting euro-area non-energy industrial goods inflation by an estimated 0.27pp in April 2026 even as China's import share keeps rising.", "url": "https://www.ecb.europa.eu/press/economic-bulletin/focus/2026/html/ecb.ebbox202604_06~f469938e52.en.html", "images": []}]}, {"theme": "Growth & Recession", "category": ["growth"], "consensus": "Most houses (BNP Paribas, JPMorgan, Barclays, Macquarie) see global growth holding up better than feared through the Middle East shock — roughly 3.0-3.1% in 2026 — cushioned by AI capex and inventory buffers, with the US as the dominant engine even as the labor market visibly cools (June payrolls +57k, two months of downward revisions, participation at a multi-year low).", "divergence": "China is the sharpest split: Citi holds its 4.7% 2026 GDP forecast on AI-export-driven strength even as it acknowledges a K-shaped economy (retail sales contracted in May for the first time since Covid), while Gavekal is more downbeat, citing outright negative YoY retail sales and stalled property-developer restructuring as signs the consumer side is structurally weaker than the export/AI side suggests. On Europe, Barclays forecasts eurozone growth of just 0.4% for 2026 (a contraction in Q1) while Deutsche Bank's CIO is comparatively upbeat, citing German fiscal stimulus keeping the eurozone 'near potential.' Vanguard is the most bullish outlier on the US, forecasting 3% GDP growth in 2027 (well above consensus) on the view that AI has moved from an automation into an augmentation phase — a call few other houses in this batch make explicitly.", "items": [{"source": "citi_gps", "name": "Citi GPS", "thesis": "Maintains 2026 China GDP growth at 4.7% y/y; AI supercycle (exports +34.8% y/y Jan-May) powers the 'strong leg' of a K-shaped economy while retail sales contracted in May, the first decline since Covid.", "url": "https://www.citigroup.com/global/insights/china-second-half-outlook-ai-supercycle-cuts-into-the-k-shaped-economy", "images": []}, {"source": "gavekal", "name": "Gavekal", "thesis": "China retail sales fell outright YoY in May (large retailers -5.0%) for the first time since the pandemic; attributes part of the drop to war/oil-shock confidence hit but also flags durable drags from pulled-forward demand and a weak labor market.", "url": "https://research.gavekal.com/teaser/whats-wrong-with-chinese-consumers/", "images": []}, {"source": "barclays", "name": "Barclays", "thesis": "Global growth forecast 3.1% in 2026; eurozone growth just 0.4% (contracted in Q1); China slows below 5% amid a 40-month low in retail sales. Remains overweight equities vs fixed income but with 'far less conviction' than Q2.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html", "images": []}, {"source": "vanguard", "name": "Vanguard", "thesis": "Forecasts 3% US GDP growth in 2027, well above consensus, on AI moving from automation into augmentation and eventually general-purpose-technology status; cautions AI-hyperscaler valuations already price much of the upside and that 'AI users' will capture more long-term value than builders.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/who-gains-in-an-ai-supercharged-economy.html", "images": []}, {"source": "moodys_analytics", "name": "Moody's Analytics", "thesis": "June US payrolls rose just 57,000 with downward revisions to prior months, a sharp reality check after a run of upbeat labor readings; Moody's own forecast (+90k) also missed to the downside.", "url": "https://www.economy.com/economicview/analysis/423247/Economic-Roundup-Undershoot", "images": []}, {"source": "boe", "name": "Bank of England", "thesis": "Governor Bailey: UK potential growth fell from 2.8%/year pre-GFC to 1.3%/year since, dragging national income per head growth from 2.0%/year to 0.6%/year; frames AI as the likely next general-purpose technology to revive growth but cautions gains take time and carry uncertain job effects.", "url": "https://www.bankofengland.co.uk/speech/2026/may/andrew-bailey-speech-at-cutlers-feast-sheffield", "images": []}, {"source": "oxford_economics", "name": "Oxford Economics", "thesis": "Japan's declining average working hours are offsetting labour-force headcount gains; even with AI productivity gains, potential growth is projected to fall to near zero by the early 2030s.", "url": "https://www.oxfordeconomics.com/resource/working-hours-in-japan-limit-labour-input-and-income-more-than-headcount-suggests/", "images": []}]}, {"theme": "USD & FX", "category": ["fx"], "consensus": "The dollar's war-driven safe-haven spike is seen as largely spent, with most houses expecting range-bound-to-softer USD from here as the Middle East conflict de-escalates and rate differentials normalize.", "divergence": "Lazard's Ron Temple and Amundi hold the most structurally bearish USD view — a multi-year weakening thesis built on FX-hedging normalization and gradual non-US Treasury-holder diversification, expressed via Amundi's long AUD/USD and long JPY/NOK vs EUR positioning. Gavekal and BCA push back: Gavekal notes the DXY hit a 13-month high even after the Gulf peace deal (confounding expectations that de-escalation would reverse dollar strength), and BCA expects the recent breakout to consolidate rather than extend, but not reverse outright, given elevated-but-not-stretched speculative long positioning. Standard Chartered threads a middle path — bullish AUD and CNH against the dollar in H2, but flagging intervention risk that caps USD/JPY downside around 159.6-165. Franklin Templeton says its own 'weakening dollar' 2026 call has 'only partly' played out and now expects the dollar to stay range-bound rather than resume its slide.", "items": [{"source": "lazard", "name": "Lazard", "thesis": "Ron Temple's mid-year outlook: a weaker US dollar is a multi-year conviction as investors reduce concentration in US assets — currency hedging rises first, then non-US Treasury holders gradually reduce relative exposure.", "url": "https://www.lazard.com/research-insights/ron-temples-global-mid-year-outlook-2026-three-core-convictions-shaping-markets/", "images": []}, {"source": "gavekal", "name": "Gavekal", "thesis": "Despite expectations that Gulf de-escalation would reverse the dollar's safe-haven strength, the DXY has instead hit a 13-month high.", "url": "https://research.gavekal.com/teaser/whats-driving-the-dollar/", "images": []}, {"source": "bca_research", "name": "BCA Research", "thesis": "The dollar's breakout is likely to consolidate rather than extend — its safe-haven behavior during the Iran war has already priced in the main bullish drivers, and speculative positioning is elevated but not stretched.", "url": "https://www.bcaresearch.com/marketing/insight/usd-breakout-wont-break/221061", "images": []}, {"source": "amundi", "name": "Amundi", "thesis": "Long AUD/USD and long JPY/NOK vs EUR to express a structural USD-weakness view; neutral-to-slightly-cautious US duration but constructive on the 5-year tenor with curve steepening expected.", "url": "https://research-center.amundi.com/article/global-investment-views-july-2026", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "thesis": "Bullish AUD and AUD/CNH vs USD in H2 2026 on moderating USD and strong Australian data; sees USD/JPY downside risk on BoJ intervention, likely in the 164-165 range.", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-3-7-2026/?mvog=1", "images": []}, {"source": "moodys_analytics", "name": "Moody's Analytics", "thesis": "Models the uneven G-20 impact of a 5% dollar appreciation scenario after the greenback fell almost 7% since the start of 2025 on weaker US growth expectations and Fed-independence concerns.", "url": "https://www.economy.com/economicview/analysis/423245/Winners-and-Losers-From-a-Stronger-US-Dollar", "images": []}]}, {"theme": "Equities", "category": ["equities"], "consensus": "Sell-side houses (Goldman, BNP Paribas, UBS, JPMorgan, Citi, Barclays) remain constructive on equities into H2 2026, with S&P 500 targets clustering at 7400-8100 on 15-20%+ consensus EPS growth, buyback strength, and improving breadth beyond the 'Magnificent Seven.'", "divergence": "Conviction is fraying at the edges. Barclays stays overweight equities versus fixed income but says so with 'far less conviction' than a quarter ago, citing stretched valuations (Taiwan +50% YTD, Korea +75-100% YTD) and deteriorating bond fundamentals. BCA raised its S&P 500 target to 8100 from 7700 while simultaneously cutting its year-end trailing P/E assumption to 24.5x from 25x — arguing earnings growth, not multiple expansion, must carry returns from here, with duration (not valuation) the primary risk. Amundi and Invesco are actively rotating away from US/AI concentration: Amundi trimmed US equity concentration into an equally-weighted S&P 500 and tilted toward Europe/Japan/EM, while Invesco's Kevin Holt calls health care the cheapest sector on a 10-40-year lookback and flags 'dropped dramatically' hyperscaler ROIC as a reason mega-cap tech is now the riskier trade. Franklin Templeton splits the difference, calling for 'broadening' into small/mid-caps, value and EM/Japan while still holding an oversold Magnificent Seven as a tactical buy.", "items": [{"source": "goldman_sachs", "name": "Goldman Sachs", "thesis": "Sees S&P 500 breaking above 8,000 near-term on record Q1 earnings growth (14%), record buyback breadth, and a Fed hold read as effectively bullish; flags ~$30bn of pension-driven equity-to-bond rebalancing selling as a near-term technical headwind.", "url": "https://www.goldmansachs.com/insights/the-markets/why-us-stocks-could-climb-higher", "images": []}, {"source": "bca_research", "name": "BCA Research", "thesis": "Raised 2026 S&P 500 target to 8100 from 7700 on higher EPS forecasts as earnings broaden beyond hyperscalers (forward 12-month EPS growth ~20%), but cut the year-end trailing P/E assumption to 24.5x from 25x, expecting earnings (not re-rating) to drive further gains.", "url": "https://www.bcaresearch.com/marketing/insight/returns-will-need-be-earned/221076", "images": []}, {"source": "barclays", "name": "Barclays", "thesis": "Remains overweight equities versus fixed income for Q3 2026, but with 'far less conviction' than Q2, citing stretched regional valuations and deteriorating sovereign-bond fundamentals.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html", "images": []}, {"source": "amundi", "name": "Amundi", "thesis": "Trimmed US equity concentration into an equally-weighted S&P 500, rotating toward Europe/Japan/EM; neutral India and China equities, positive Latin America/Brazil.", "url": "https://research-center.amundi.com/article/global-investment-views-july-2026", "images": []}, {"source": "invesco", "name": "Invesco", "thesis": "Health care is at its lowest relative P/E to the broad market in a 10-40 year lookback and represents a 3-5 year value opportunity, as hyperscaler return on invested capital has 'dropped dramatically' over the past 24 months, raising mega-cap tech risk; explicitly avoids Tesla and SpaceX as unmodelable.", "url": "https://www.invesco.com/us/en/insights/value-stocks-dynamic-approach-changing-world.html", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "thesis": "S&P 500 2026 target range 7400-7800 on $341 EPS (raised from $310); reiterates a 'broadening' call favoring small/mid-caps and large-cap value alongside EM/Japan, while treating the oversold Magnificent Seven (RSI 28.7, PEG ~1) as a tactical buy.", "url": "https://www.franklintempleton.com/articles/series/from-the-market-desk", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "Reiterates a positive 6-month equity outlook after MSCI ACWI's best quarter in 6 years (+14.5%) and the Philadelphia Semiconductor Index's 87.8% quarterly rally; expects continued broadening as cyclicals catch up on lower energy prices.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-01072026.html", "images": []}, {"source": "lazard", "name": "Lazard", "thesis": "H1 2026 shareholder activism review: 184 new global campaigns, the busiest six-month period on record (+20% y/y), with capital-allocation demands up to 39% of campaigns from 23% historically, heavily Japan-driven.", "url": "https://www.lazard.com/research-insights/review-of-shareholder-activism-h1-2026/", "images": []}]}, {"theme": "Credit", "category": ["credit"], "consensus": "Investment-grade credit spreads remain at or near multi-year tights across most desks (BNP Paribas, Franklin Templeton), and munis/asset-based finance are broadly favored for income in a higher-for-longer rate regime.", "divergence": "The live fault line is AI-linked debt. Goldman Sachs, Man Group and Galaxy Digital all flag that the largest tech issuers have raised $170bn+ YTD (4x the pre-AI annual pace) at spreads that treat them like SpaceX-grade credits (a real, profitable Starlink cash-flow anchor) even when the actual entity issuing (e.g., a loss-making AI unit) lacks that cushion — Man Group specifically contrasts SpaceX's 30-year bonds (2.01pp over Treasuries, near speculative-grade-like spreads despite an IG rating) with a Morgan Stanley estimate of $400bn IG plus $65bn HY/loans of AI/hyperscaler issuance this year that could widen spreads market-wide via a 'substitution effect.' Against that, PIMCO reads the same environment more benignly, favoring asset-based finance and high-quality consumer/mortgage credit over direct lending specifically because it has *lower* correlation to the corporate credit cycle — implicitly treating the AI-debt buildup as a segment to avoid rather than a system-wide risk. PIMCO's Credit Market Lens is also more cautious than consensus on business-development-company (BDC) stress, arguing BDC NAVs are directly tied to borrower debt-service capacity (unlike the 2023 non-traded REIT episode) and can surface stress faster.", "items": [{"source": "goldman_sachs", "name": "Goldman Sachs", "thesis": "The four largest tech companies have issued over $170bn in corporate debt YTD (4x the pre-AI annual average) at all-in yields near 6% and spreads at all-time tights; questions whether rising AI capex needs eventually push bond supply past demand.", "url": "https://www.goldmansachs.com/insights/videos/will-ai-driven-corporate-debt-strain-credit-markets", "images": []}, {"source": "man_group", "name": "Man Group", "thesis": "SpaceX's ~$25bn IG bond priced at 2.01pp over Treasuries (near speculative-grade spreads) anchored on profitable Starlink cash flow, not loss-making xAI; warns the Merton-model logic breaks down for AI issuers lacking a cash-generating anchor, with Morgan Stanley estimating $400bn IG + $65bn HY/loans of AI/hyperscaler issuance this year.", "url": "https://www.man.com/insights/views-from-the-floor-2026-1-july", "images": []}, {"source": "pimco", "name": "PIMCO", "thesis": "BDC NAV dispersion remains elevated versus stable time-series marks, suggesting NAVs increasingly reflect manager assumptions rather than a shared clearing price; recommends favoring asset-based finance and high-quality consumer/mortgage credit over direct lending.", "url": "https://www.pimco.com/us/en/insights/the-credit-market-lens-what-bdc-redemptions-and-nav-pressures-mean-for-investors", "images": []}, {"source": "bny", "name": "BNY", "thesis": "Investment-grade munis (avg. AA) currently out-yield BB-rated high-yield corporates on a tax-equivalent basis; muni fund flows are over 7x higher in 2026 than a year earlier, with roll-down value concentrated around the 20-year tenor.", "url": "https://www.bny.com/investments/us/en/individual/articles/fixed-income/muni-moment-tax-equivalent-yields-deserve-a-fresh-look.html", "images": []}, {"source": "moodys_analytics", "name": "Moody's Analytics", "thesis": "IMF puts Senegal's public-sector debt near 132% of GDP (highest in West Africa) after a hidden-debt scandal; the IMF has suspended its program with the country, raising recession odds.", "url": "https://www.economy.com/economicview/analysis/423239/Senegals-Debt-Crisis-Turns-Political", "images": []}, {"source": "boe", "name": "Bank of England", "thesis": "Deputy Governor Breeden: the FPC's April assessment found AI infrastructure investment is increasingly financed by rapidly rising and increasingly complex debt rather than tech-company cash flow/equity, raising the financial-stability consequences of any AI asset-price correction; an updated assessment is due July 7, 2026.", "url": "https://www.bankofengland.co.uk/speech/2026/june/sarah-breeden-panel-at-the-european-central-bank-forum-on-central-banking-2026", "images": []}]}, {"theme": "Crypto", "category": ["crypto"], "consensus": "Bitcoin is broadly read as range-bound-to-improving after a sharp correction (cycle low near $57-58k from an October 2025 peak above $126k), with CoinShares, Galaxy Digital and Chainalysis all noting that large-whale selling — the driver of the October 2025 selloff — has stopped.", "divergence": "The disagreement is over what happens next and how much stress remains in leveraged crypto-equity structures. Galaxy Digital's Q4 2025 leverage report finds crypto credit markets 'stress-tested well' (CeFi loanbooks showed zero realized losses through the largest-ever onchain liquidation event), supporting a constructive medium-term read, and Galaxy sets a $250k BTC target for year-end 2027. CoinShares is more cautious near-term, saying a genuine catalyst (real labor-market deterioration, not just soft prints) is still missing for a clean new leg higher, and flags Strategy's STRC preferred stock as a live stress point (fell to a record low before a rescue package of dividend hikes and buybacks). Vanguard is the outright skeptic in this batch, warning Bitcoin's 70-80% annualized volatility (~4x equities) makes even a 10% portfolio allocation look oversized once its positive equity correlation is accounted for.", "items": [{"source": "coinshares", "name": "CoinShares", "thesis": "Bitcoin rebounded off a cycle low near $57,000 as June payrolls (+57k vs 115k consensus) drove a dovish repricing, but a hawkish Fed dot plot (2026 median rate raised to 3.8% from 3.4%) is a headwind; whale (100k+ BTC) selling has stopped, but a genuine catalyst for a new leg higher is still missing.", "url": "https://coinshares.com/insights/research-data/market-update-03-07-2026/", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "thesis": "Sets a $250k Bitcoin price target for year-end 2027; crypto-collateralized lending contracted 9.81% q/q to $69.55bn in Q4 2025, entirely DeFi-driven, while CeFi lending grew for an eighth straight quarter and showed zero realized losses through the largest-ever onchain liquidation event (Oct. 10, 2025) — evidence the sector 'stress-tested well.'", "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "thesis": "Strategy (MSTR) unveiled a 'Digital Credit Capital Framework' after STRC preferred stock hit a record low ($71.25 vs $100 par target) on fears of forced BTC sales; new $1bn buyback authorizations for both preferred and common stock plus a dividend hike to 12% from 11.5% lifted MSTR +12.6% on the announcement.", "url": "https://www.galaxy.com/insights/research/weekly-top-stories-07-03-26-strategy-btc-strc-robinhood-chain-jpmorgan-clarity-act", "images": []}, {"source": "vanguard", "name": "Vanguard", "thesis": "Bitcoin's annualized volatility of 70-80% (~4x equities) makes a hypothetical 10% portfolio allocation look oversized once its positive equity correlation is properly accounted for; gold's 100-year record roughly tracks inflation but returned just 1.1%/year since 2013, working as a debasement hedge rather than a routine inflation hedge.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/better-vantage-season-two-episode-five.html", "images": []}, {"source": "chainalysis", "name": "Chainalysis", "thesis": "OFAC sanctioned 134 crypto wallets (131 TRON, 3 Monero) tied to ISIS-K on July 1, 2026, with Tether freezing all 131 TRON addresses — the third recent OFAC action tied to criminal-network crypto laundering, requiring immediate sanctions-screening updates from VASPs.", "url": "https://www.chainalysis.com/blog/isis-designation-crypto-addresses-july-2026/", "images": []}]}, {"theme": "Energy & Commodities", "category": ["energy", "commodities"], "consensus": "Oil has fallen sharply from its Middle East war peak (~$120-130) back toward $70-75/bbl as the US-Iran interim deal holds, but every house treats full normalization as incomplete given a mined Strait of Hormuz, damaged Gulf infrastructure, and 50-100mn barrels still trapped in floating storage.", "divergence": "UBS is the most bullish on a snapback, forecasting Brent back to $85/bbl by year-end on the view that current prices overestimate the speed of shut-in production and shipping-confidence recovery. JPMorgan takes the opposite side, forecasting Brent easing to $86 in Q3, $80 in Q4, and averaging just $64 in 2027 as flows fully normalize. Citi sits in between with a $75 base case for H2 2026 but flags a $120 tail risk (global growth below 2%, inflation toward 5%) if the ceasefire breaks — a scenario Brookings and Wood Mackenzie's on-the-ground data suggest is not fully priced, since Iran's mining of the Strait means full demining will take months beyond the nominal 60-day reopening window, and Iran has stood up a toll-charging 'Persian Gulf Strait Authority' with politically conditioned pricing. On gold, UBS's $5,000-5,200/oz 12-month target is the most bullish view against a World Bank base case of gold peaking this year (+37% in 2026) before falling ~9% in 2027 as the safe-haven/central-bank-buying impulse fades.", "items": [{"source": "ubs", "name": "UBS", "thesis": "Brent expected to recover to $85/bbl by year-end even after a drone attack near Hormuz; Iran has exported ~40mn barrels since the interim deal, with 50-100mn barrels still trapped in Gulf storage, slowing the production-recovery timeline.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-26062026.html", "images": []}, {"source": "jpmorgan", "name": "JPMorgan", "thesis": "Brent forecast: $86/bbl Q3 2026, $80/bbl Q4 2026, exiting the year near $78, averaging $64 in 2027 as Strait of Hormuz flows normalize; copper seen pushing toward $15,000/mt on US tariff-driven dynamics with China.", "url": "https://www.jpmorgan.com/insights/podcast-hub/making-sense/global-mid-year-outlook", "images": []}, {"source": "citi_gps", "name": "Citi GPS", "thesis": "Brent base case averages ~$75/bbl in H2 2026 if the Iran deal holds, but a renewed disruption pushing Brent toward $120 could cut global growth below 2% and push inflation toward 5%; rule of thumb is a 10% oil-price rise cuts global growth 15-20bp and raises headline inflation 30-40bp.", "url": "https://www.citigroup.com/global/insights/turmoil-in-the-middle-east-implications-for-supply-chains", "images": []}, {"source": "brookings", "name": "Brookings Institution", "thesis": "Iran emerged from the war stronger, having demonstrated control over a Strait through which 90% of world trade and 70% of world energy passes; under the US-Iran MOU it agreed to a 60-day reopening window but has created a toll-charging 'Persian Gulf Strait Authority,' and its mining of the strait means full demining will take months longer than the nominal window.", "url": "https://www.brookings.edu/articles/will-the-strait-of-hormuz-reopen-after-the-us-iran-deal/", "images": []}, {"source": "world_bank", "name": "World Bank", "thesis": "Precious metals price index projected +42% in 2026 y/y before falling 8% in 2027; gold specifically forecast +37% in 2026 then -9% in 2027, supported by central bank buying despite Q2 profit-taking as US rate-hike expectations firmed.", "url": "https://blogs.worldbank.org/en/opendata/precious-metals-retreat-from-record-highs", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "thesis": "High-Frequency Oil Production Monitor tracked ~11mn b/d shut in at peak during the Hormuz closure, the most significant supply disruption in a generation; Canada emerged as Asia's swing crude supplier via TMX, though that shift may not be structurally durable given 2027 pipeline takeaway-capacity constraints.", "url": "https://www.woodmac.com/news/opinion/the-hormuz-shock-what-the-data-reveals-about-global-oil-markets-in-2026/", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "thesis": "Forecasts a structural regime change in US Henry Hub gas pricing to ~$5/mmbtu (real) by 2035, up from the decade-long $2-4/mmbtu range, as AI/data-center power demand and LNG export growth collide with a maturing US supply base.", "url": "https://www.woodmac.com/horizons/why-us-henry-hub-natural-gas-prices-are-set-to-rise/", "images": []}]}, {"theme": "Geopolitics", "category": ["geopolitics"], "consensus": "The Middle East ceasefire/interim deal is treated as fragile but holding across all houses, and the AI-export-control fight between the US and China is escalating rather than resolving, with most analysts (PIIE, Brookings, Galaxy Digital) reading US restrictions as counterproductive to American AI-stack dominance.", "divergence": "PIIE's Martin Chorzempa and Brookings' Cameron Kerry both argue the US directive forcing Anthropic to cut off its Mythos/Fable models to non-US persons will accelerate global adoption of Chinese open-weight models (which can't be 'switched off' once downloaded) — a reading reinforced by Galaxy Digital's Alex Thorn, who frames the episode as a direct threat to the capex assumptions ($5.3tn of modeled hyperscaler capex through 2030, per Goldman) underpinning a US equity market where the 'Magnificent Seven' drove 42% of the S&P 500's 2025 return. Against that, some official/policy voices (per Brookings' G7 coverage) still see a path where US AI labs position as indispensable standards-setters if G7 governments make the resulting framework enforceable rather than self-regulated. On trade, Peterson Institute's Cullen Hendrix argues the US-China trade war is structurally more dangerous than past disputes (US-Japan, the Pasta War) because it lacks the alliance-based 'guardrails' that capped escalation previously, given China's ~80% share of neodymium-magnet production — a chokepoint it has already used (April 2025 rare-earth export controls).", "items": [{"source": "brookings", "name": "Brookings Institution", "thesis": "US directive restricting foreign-national access to Anthropic's Mythos 5/Fable 5 models is accelerating a global 'sovereign AI' scramble — 46 countries now fund roughly 135 sovereign AI projects — deepening foreign distrust of US AI companies and government.", "url": "https://www.brookings.edu/articles/the-trump-administrations-embargo-on-anthropics-latest-models-scorches-its-hopes-to-export-american-ai/", "images": []}, {"source": "peterson_institute", "name": "Peterson Institute for International Economics (PIIE)", "thesis": "The US Commerce Department's export-control order forcing Anthropic to cut off Mythos/Fable models worldwide is likely to boost global adoption of Chinese open-weight AI models, since Chinese providers cannot 'switch off' access once weights are downloaded — a feature now marketed as a selling point after Macron warned the G7 that Europe 'will not buy any model' that can be turned off overnight.", "url": "https://www.piie.com/blogs/realtime-economics/2026/fable-mythos-saga-ad-hoc-us-ai-model-controls-could-help-china", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "thesis": "The AI export-control freeze could push frontier development toward Chinese open-weight models (trailing the US by 'months, not years'); flags that the Magnificent Seven drove ~42% of the S&P 500's 2025 return and that Goldman models $5.3tn of hyperscaler capex through 2030 — any slowdown in frontier deployment threatens those capex/earnings assumptions.", "url": "https://www.galaxy.com/insights/research/anthropic-fable-5-export-control-ai-regulation-last-model-problem", "images": []}, {"source": "peterson_institute", "name": "Peterson Institute for International Economics (PIIE)", "thesis": "The US-China trade war lacks the alliance-based guardrails of past disputes (US-Japan, the Pasta War) since the two are security rivals, not allies; China's ~80% share of neodymium-magnet production gives it a chokepoint over EVs and manufacturing it has already used (April 2025 rare-earth controls).", "url": "https://www.piie.com/blogs/realtime-economics/2026/why-us-china-trade-war-lacks-guardrails-past", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment for International Peace", "thesis": "US economic power is eroding across several structural levers even as Trump's tariff/export-control aggression triggers global backlash: US manufacturing share of GDP fell from 13% to under 10%, semiconductor production share fell from over 30% to ~10% by 2022, and allies (EU, UK, India) are actively building alternatives to US-dominated payments infrastructure.", "url": "https://carnegieendowment.org/research/2026/06/the-future-of-american-economic-power", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "thesis": "~11 million b/d of oil production was shut in at peak during the Strait of Hormuz closure, the most significant disruption in a generation, though satellite/pipeline data suggest markets moved faster than the physical picture warranted.", "url": "https://www.woodmac.com/news/opinion/the-hormuz-shock-what-the-data-reveals-about-global-oil-markets-in-2026/", "images": []}]}, {"theme": "AI & Tech", "category": ["ai_tech"], "consensus": "The AI capex supercycle remains intact and is widely expected to approach ~$1tn in annualized spend next year (UBS, Wood Mackenzie), with power/grid infrastructure — not chip supply — increasingly cited as the binding constraint (Citi GPS, RBC, Wood Mackenzie).", "divergence": "The debate is over how much of the value accrues to builders versus users, and whether current financing/valuation is sustainable. Vanguard argues technology builders rarely capture the greatest long-term value historically and recommends rotating toward 'AI user' sectors (healthcare, financial services) rather than infrastructure; RBC's software team similarly argues AI is 'cannibalizing labor budgets' more than IT budgets and that only vertical, data-moated software is insulated from disruption, implicitly bearish on generic horizontal SaaS. Against that, UBS stays overweight AI 'picks and shovels' despite a ~20% average hyperscaler pullback this month, betting the Jevons paradox (falling token costs boosting demand) offsets slowing per-unit capex economics, and Wood Mackenzie's infrastructure read is unambiguously bullish on power/gas demand from the buildout. Goldman Sachs' own labor-market research is split internally between its economists (a manageable ~9% of US workers reallocated over 10 years, unemployment impact <1pp/year) and MIT's Daron Acemoglu, who is more cautious near-term but warns of larger losses over 10-15 years if AI investment favors replacement over complementarity.", "items": [{"source": "vanguard", "name": "Vanguard", "thesis": "History shows technology builders rarely capture the greatest long-term value from a general-purpose technology shift — that typically accrues to 'AI users' (healthcare, financial services, business services); recommends positioning in value-oriented equities and high-quality fixed income as a hedge either way.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/who-gains-in-an-ai-supercharged-economy.html", "images": []}, {"source": "rbc", "name": "RBC Capital Markets", "thesis": "AI's disruption of software is nuanced: vertical, regulated-workflow software with proprietary data is insulated, while commoditized horizontal SaaS is most at risk; AI is 'cannibalizing labor budgets' rather than displacing IT budgets. Power supply, not GPU capital, is the binding constraint on scaling.", "url": "https://www.rbccm.com/en/insights/2026/06/which-software-companies-can-avoid-the-ai-saaspocalypse", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "Remains overweight the AI 'picks and shovels' trade despite hyperscalers falling ~20% on average this month; still expects annual AI capex near $1tn next year and cloud revenue to keep accelerating from Q1's 40% growth, betting the Jevons paradox offsets slowing per-unit economics.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-29062026.html", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "thesis": "GS economists estimate AI is currently a 10-15k/month drag on job growth, with a baseline scenario of ~9% of US workers (~15 million) reallocated over a 10-year transition and an annual unemployment-rate impact staying below 1pp; MIT's Acemoglu is more cautious near-term but warns of larger losses over 10-15 years if AI investment favors replacement over complementarity.", "url": "https://www.goldmansachs.com/insights/goldman-sachs-exchanges/how-will-ai-impact-the-labor-market", "images": []}, {"source": "citi_gps", "name": "Citi GPS", "thesis": "AI data-center buildout and energy-security concerns are driving power-infrastructure demand that grids cannot match, pushing users toward distributed 'bring-your-own-generation,' especially US natural gas; ~2,500 gigawatts of renewable/storage/data-center projects are currently stalled globally.", "url": "https://www.citigroup.com/global/insights/overcoming-gridlock-2-0-solving-power-bottlenecks-to-drive-ai-energy-security", "images": []}, {"source": "t_rowe_price", "name": "T. Rowe Price", "thesis": "The 2026 Russell reconstitution plus S&P Quarterly Review and SpaceX's index inclusion is producing one of the largest benchmark-risk reshapings in over two decades (~$320bn Russell turnover, 2x the prior record) as AI exposure migrates sharply into large/mid-cap growth benchmarks.", "url": "https://www.troweprice.com/en/us/insights/russell-revolution-how-ai-is-reshaping-russell-benchmarks", "images": []}]}, {"theme": "Emerging Markets", "category": ["em"], "consensus": "PIMCO and most EM-focused desks (Franklin Templeton) see structural value in EM given a multipolar/fragmenting world, historically ities"], "url": "https://www.bcaresearch.com/marketing/insight/gangnam-style-korean-equity-tantrum/221081", "images": []}, {"source": "bca_research", "name": "BCA Research", "call": "Closed 5yr/30yr Treasury flattener; entered 2yr/30yr steepener, fading hawkishness priced into the curve.", "category": ["rates"], "url": "https://www.bcaresearch.com/marketing/insight/warshs-tactical-window/221056", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "call": "US 10-year yield range 4.25-4.5%; tactically bullish US tech/Mag 7; core 3-4% allocation to memory chip equities; bullish AUD, AUD/CNH vs USD; USD/JPY intervention likely at 164-165.", "category": ["rates", "equities", "fx"], "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-3-7-2026/?mvog=1", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "call": "Overweight UK Gilts, GBP IG, USD/Euro High Yield, EM Local Currency, US & Eurozone equities; underweight China equities; 10yr UST range 4.25-5.0%, European govvies 2.5-4.0%.", "category": ["rates", "credit", "equities"], "url": "https://viewpoint.bnpparibas-am.com/monthly-market-views-political-transitions-and-market-caution/", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "call": "Increased overweight on global equities post early-June pullback, rotating into European banks and US large caps; took profit on long 5yr German Bunds and on EM equities.", "category": ["equities", "rates"], "url": "https://www.bnpparibas-am.com/en/portfolio-perspectives/multi-asset-investments-views-midnight-oil/", "images": []}, {"source": "kkr", "name": "KKR", "call": "Above-consensus US growth call; higher-for-longer inflation ex-China; dollar seen as having peaked with no disorderly unwind; favors real assets/power infrastructure, Structured Equity/Capital Solutions, and Asia (public and private markets).", "category": ["growth", "rates", "fx"], "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}, {"source": "invesco", "name": "Invesco", "call": "Overweight health care value names on a 10-40 year cheap relative-P/E lookback; expects active value managers to beat passive Russell 1000 Value over 3/5/10-year periods; explicitly avoids Tesla and SpaceX.", "category": ["equities"], "url": "https://www.invesco.com/us/en/insights/value-stocks-dynamic-approach-changing-world.html", "images": []}, {"source": "pimco", "name": "PIMCO", "call": "Favors asset-based finance and high-quality consumer/mortgage credit over direct lending; estimates ~$14 trillion of incremental global capex over 5 years including ~$7.6 trillion in AI infrastructure.", "category": ["credit", "ai_tech"], "url": "https://www.pimco.com/us/en/resources/video-library/media/a-sturdier-foundation-for-uncertain-markets", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "call": "Bitcoin price target $250k by year-end 2027; forecasts 2026 US spot crypto ETF net inflows exceeding $50bn (vs $23bn in 2025) and total crypto-backed loans clearing $90bn.", "category": ["crypto"], "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi", "images": []}, {"source": "vanguard", "name": "Vanguard", "call": "2027 US GDP growth forecast of 3%, above consensus; recommends value-oriented US equities, non-US developed markets, and high-quality fixed income over a 5-10 year horizon.", "category": ["growth", "equities"], "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/articles/who-gains-in-an-ai-supercharged-economy.html", "images": []}, {"source": "citi_gps", "name": "Citi GPS", "call": "Maintains 2026 China GDP growth forecast at 4.7% y/y; raises 2026 China export growth forecast to 13.0% y/y; expects only a symbolic 10bp PBoC rate cut in H2 2026, not broad stimulus; USDCNY toward 6.7 over 6-12 months.", "category": ["growth", "em", "fx"], "url": "https://www.citigroup.com/global/insights/china-second-half-outlook-ai-supercycle-cuts-into-the-k-shaped-economy", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "call": "Forecasts US Henry Hub natural gas prices rising to approximately $5/mmbtu (real) by 2035, up from the decade-long $2-4/mmbtu range.", "category": ["energy"], "url": "https://www.woodmac.com/horizons/why-us-henry-hub-natural-gas-prices-are-set-to-rise/", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment for International Peace", "call": "European LFP battery cells carry a 24-50% cost gap versus Chinese imports, which would require at least a 30% tariff to close; China controls ~98% of global LFP production.", "category": ["energy", "geopolitics"], "url": "https://carnegieendowment.org/research/2026/06/battery-geopolitics-balancing-industrial-power-in-race-to-store-energy", "images": []}, {"source": "barclays", "name": "Barclays", "call": "Remains overweight equities vs fixed income for Q3 2026, with global growth forecast at 3.1%, eurozone at just 0.4%, and S&P 500 consensus EPS growth of 20%.", "category": ["equities", "growth"], "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html", "images": []}], "C_deep_reads": [{"source": "kkr", "name": "KKR", "title": "Mid-Year Outlook for 2026: The Divergence Conundrum", "summary": "Henry McVey's flagship outlook argues the global productivity boom persists longer than consensus expects, but geopolitical fragmentation and AI-input scarcity are making growth more K-shaped than at any time since the 1870s. KKR is above-consensus on US growth, sees higher-for-longer inflation ex-China, and believes the debate has shifted from whether the Fed cuts to how long policy stays restrictive. The dollar is judged to have peaked without a disorderly unwind. Its 'Security of Everything' theme (defense, cyber, supply chains, energy, critical materials) is judged bigger than originally thought, with preference for real assets/power infrastructure, Structured Equity/Capital Solutions, and Asia across public and private markets; key risks flagged are disappointing IPO valuations, faster-than-expected inflation, and a productivity slowdown driven by politics rather than technology.", "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}, {"source": "lazard", "name": "Lazard", "title": "Ron Temple's Global Mid-Year Outlook 2026: Three Core Convictions Shaping Markets", "summary": "Chief Market Strategist Ron Temple lays out three multi-year convictions: a weaker US dollar as investors reduce concentration in US assets (FX hedging rises first, then non-US Treasury holders gradually diversify); steeper developed-market yield curves as widening US/Europe/Japan fiscal deficits push long-end yields higher, benefiting EM sovereign debt and hard assets like infrastructure; and stronger relative performance of non-US equities (EM, Japan) versus the US on more attractive valuations, while flagging concentration risk in narrow US mega-cap tech gains. Regionally: US growth is solid but increasingly dependent on AI capex and upper-income wealth-effect spending (a reversal in AI enthusiasm is a key fragility risk); China's stability masks a housing crisis and weak domestic demand with structural reform unlikely; the Eurozone recovery was set back by the Iran conflict but rising defense budgets support industrial/tech investment; Japan's corporate reforms continue lifting capital returns.", "url": "https://www.lazard.com/research-insights/ron-temples-global-mid-year-outlook-2026-three-core-convictions-shaping-markets/", "images": []}, {"source": "pimco", "name": "PIMCO", "title": "A Sturdier Foundation for Uncertain Markets (Secular Outlook)", "summary": "Group CIO Dan Ivascyn and economic advisor Richard Clarida argue fixed-income starting yields are the most attractive in decades, supporting high-quality income generation and broad global/EM diversification amid geopolitical uncertainty expected to stay elevated for 5-10 years. PIMCO estimates roughly $14 trillion of incremental global capex over the next five years, including about $7.6 trillion in AI infrastructure, which it expects to fatten equity-return tails, drive a credit cycle of business-model disruption, and support a case for bonds delivering equity-like returns with less downside given current valuations.", "url": "https://www.pimco.com/us/en/resources/video-library/media/a-sturdier-foundation-for-uncertain-markets", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "title": "Mid-year outlook: Prospects remain upbeat for equity and fixed income investors", "summary": "BNP Paribas AM's mid-year outlook turns more constructive after the Iran ceasefire eased energy prices. Fixed income favors credit over duration, with a 10yr UST range of 4.25-5.0% and European govvies 2.5-4.0%; high yield and EM debt favored. On equities, tech-hardware dominance (>50% Q2 return vs 8.9%/5.9% for ex-hardware tech/everything-else) drives regional dispersion given hardware's 44% weight in EM vs 29% US, 20% Japan, 8% Europe. Bubble fears are pushed back on: global hardware forward P/E of 20.4x is only modestly above the 19.4x long-run average and far below the 57x dot-com peak, with 2026 earnings up 129% and 2027 growth still ~40%. China ex-hardware trades at a 12.2x forward P/E discount vs 21.7x historical average.", "url": "https://viewpoint.bnpparibas-am.com/mid-year-outlook-prospects-remain-upbeat-for-equity-and-fixed-income-investors/", "images": []}, {"source": "barclays", "name": "Barclays", "title": "Q3 2026 Global Outlook: Solid fundamentals, fewer bargains", "summary": "Forecasts 3.1% global growth in 2026 (slightly below 2025) with the US as the dominant engine (S&P 500 consensus EPS growth of 20%, AI infrastructure buildout spilling into materials/energy/construction/labor demand), while the eurozone grows just 0.4% and China slows below 5% amid a 40-month low in retail sales. With inflation seen staying above target across major developed economies, Barclays expects the ECB and BOJ to each deliver one more hike this year and the Fed to hold steady for a long period; the firm remains overweight equities versus fixed income but with 'far less conviction' than in Q2 2026, citing stretched valuations (S&P 500 up ~20% since March, Taiwan +50% YTD, Korea +75-100% YTD) and deteriorating bond fundamentals.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html", "images": []}, {"source": "amundi", "name": "Amundi", "title": "Mid-year Investment Outlook 2026: Power of endurance", "summary": "Amundi's central scenario assumes a fragile Middle East de-escalation and Strait of Hormuz reopening, avoiding recession while central banks stop short of a full hiking cycle. Four swing factors for H2 2026 are named: resilience to the energy shock, policymaker credibility amid higher debt/constrained central banks, US mid-term election implications for fiscal/regulatory policy, and continued broadening of the AI supercycle. Key convictions: bonds are more appealing at higher yields but require flexibility; AI remains a structural equity driver but investors should diversify across the AI value chain to avoid concentration risk; Europe's 'strategic autonomy' agenda (defence, energy security, AI infrastructure, industrial renewal) is framed as a multi-year investment cycle; and a broad inflation/USD-debasement hedging toolkit (gold, FX, alternatives) is recommended over duration alone.", "url": "https://research-center.amundi.com/article/2026-mid-year-outlook", "images": []}, {"source": "citi_gps", "name": "Citi GPS", "title": "China Second-Half Outlook: AI Supercycle Cuts Into the K-Shaped Economy", "summary": "Citi's Chief China Economist Xiangrong Yu maintains a 2026 China GDP growth forecast of 4.7% y/y, arguing the AI supercycle is powering the 'strong leg' of a K-shaped economy (exports, production, high-tech investment) while household demand and traditional sectors lag; retail sales contracted in May, the first decline since Covid. AI-related exports were 20.3% of total exports in 2025 and grew 34.8% y/y in Jan-May 2026, prompting Citi to raise its 2026 export growth forecast to 13.0% y/y (imports +22.0%, trade surplus ~$1.1tn). Nominal GDP growth could hit a five-year high of 6.7% in 2026 on producer-price reflation. Citi expects only targeted/incremental policy support rather than broad stimulus, a symbolic 10bp PBoC rate cut in H2, and gradual RMB appreciation toward 6.7 over 6-12 months.", "url": "https://www.citigroup.com/global/insights/china-second-half-outlook-ai-supercycle-cuts-into-the-k-shaped-economy", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment for International Peace", "title": "Battery Geopolitics: Balancing Industrial Power in the Race to Store Energy", "summary": "Milo McBride argues China's dominance of lithium-ion battery supply chains (~98% of global LFP production, ~43% of global battery patents in 2024 versus Europe's 21%, the US's 18%, Korea's 10% and Japan's 2%) is deepening rather than fading, and that the US, Europe, Japan and South Korea should pursue coordinated 'de-risking' rather than either conceding the industry or fully decoupling, including selective joint ventures with Chinese firms. Documents Western gigafactory struggles (Northvolt's collapse, Morrow's bankruptcy) and a roughly $50bn hit to Detroit automakers from the bursting EV bubble in February 2026, notes European LFP cells face a 24-50% cost gap to Chinese imports that would need at least a 30% tariff to close, and flags sodium-ion batteries as a wildcard that China's largest manufacturer expects could capture 30-40% of the overall battery market.", "url": "https://carnegieendowment.org/research/2026/06/battery-geopolitics-balancing-industrial-power-in-race-to-store-energy", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment for International Peace", "title": "The Future of American Economic Power", "summary": "Peter Harrell frames US economic power across six levers (productive, market, financial/dollar, chokepoint, platform/corporate, rule-setting power) and argues Trump's aggressive use of tariffs, export controls and industrial policy is triggering a global backlash that could erode the very dominance it seeks to entrench. Documents structural erosion in productive power (US manufacturing share of GDP fell from 13% to under 10%; semiconductor production share fell from over 30% to ~10% by 2022; the US builds less than 1% of the world's civilian ships) alongside growing trade dependency on the US market, even as allies and rivals actively build alternatives to US financial/payments infrastructure in response to feeling exposed to US financial leverage. Also flags Iran's demonstrated ability to threaten the ~20%-of-global-oil Strait of Hormuz chokepoint as a live illustration of geoeconomic leverage.", "url": "https://carnegieendowment.org/research/2026/06/the-future-of-american-economic-power", "images": []}, {"source": "ubs", "name": "UBS", "title": "250 years of US innovation", "summary": "UBS CIO's flagship semiquincentennial series (10 issues: railroad, electrification, aviation, assembly line, semiconductors, internet, credit cards, smartphone, recombinant DNA, capital markets) argues transformational innovation has been the recurring engine of US economic growth and draws direct investment parallels to today's AI/electrification cycle. Key takeaways include reassessing electric utilities as structurally growing (rather than defensive) given AI/reshoring power demand, treating semiconductors as the cornerstone of UBS's AI 'Transformational Innovation Opportunity' (TRIO), and the view that private capital's growing role echoes the historical shift of early-stage access away from public markets — today's AI financing debate mirrors past capital-formation cycles from // ---------- helpers ----------
const CAT_VARS = {
  rates: 'var(--cat-rates)',
  growth: 'var(--cat-growth)',
  fx: 'var(--cat-fx)',
  equities: 'var(--cat-equities)',
  credit: 'var(--cat-credit)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  commodities: 'var(--cat-commodities)',
  geopolitics: 'var(--cat-geopolitics)',
  ai_tech: 'var(--cat-ai_tech)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}
function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}
function pills(cats) {
  if (!cats) return '';
  if (Array.isArray(cats)) return cats.map(pill).join(' ');
  return pill(cats);
}
function externalLink(url, label) {
  if (!url) return '';
  return `<a class="item-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${label || 'link →'}</a>`;
}
function nameLink(url, name) {
  if (!name) return '';
  if (!url) return `<span class="item-source">${escapeHtml(name)}</span>`;
  return `<a class="item-source" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderThemeItem(it) {
  return `
    <div class="theme-item">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.thesis || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderTheme(theme) {
  const items = (theme.items || []).map(renderThemeItem).join('');
  return `
    <div class="theme">
      <div class="theme-head">
        ${pills(theme.category)}
        <div class="theme-title">${escapeHtml(theme.theme || '')}</div>
      </div>
      <div class="theme-stance">
        ${theme.consensus ? `<div class="theme-line consensus"><span class="lbl">Consensus</span>${renderBold(theme.consensus)}</div>` : ''}
        ${theme.divergence ? `<div class="theme-line divergence"><span class="lbl">Divergence</span>${renderBold(theme.divergence)}</div>` : ''}
      </div>
      ${items ? `<div class="theme-items">${items}</div>` : ''}
    </div>`;
}

function renderCall(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${pills(it.category)}
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.call || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderDeepRead(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url, 'read →')}
      </div>
      ${it.title ? `<div class="item-title">${escapeHtml(it.title)}</div>` : ''}
      <div class="item-text">${renderBold(it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderChart(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.chart || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderHouseView(hv) {
  const name = hv.name || hv.source || '';
  const nameHtml = hv.url
    ? `<a class="hv-name" href="${escapeAttr(hv.url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : `<span class="hv-name">${escapeHtml(name)}</span>`;
  return `
    <div class="hv-row">
      ${nameHtml}
      <span class="hv-stance">${renderBold(hv.stance || '')}</span>
    </div>`;
}

function renderSection(letter, name, items, render, extraClass) {
  if (!items || !items.length) return '';
  const body = items.map(render).join('');
  const cls = 'section' + (extraClass ? (' ' + extraClass) : '');
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderTopStats(d) {
  const parts = [];
  const p = d.period || {};
  const is = d.input_stats || {};
  const cv = d.coverage || {};
  if (p.from && p.to)
    parts.push(`period <strong>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</strong>`);
  else if (p.lookback_days != null)
    parts.push(`lookback <strong>${p.lookback_days}d</strong>`);
  if (is.total_articles != null) parts.push(`articles <strong>${is.total_articles}</strong>`);
  if (is.sources_present != null) parts.push(`sources <strong>${is.sources_present}</strong>`);
  if (is.after_filter != null) parts.push(`after filter <strong>${is.after_filter}</strong>`);
  if (cv.coverage_pct != null) {
    const pct = (cv.coverage_pct <= 1 ? cv.coverage_pct * 100 : cv.coverage_pct);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  } else if (cv.sources_covered != null && cv.sources_total != null) {
    parts.push(`coverage <strong>${cv.sources_covered}/${cv.sources_total}</strong>`);
  }
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.period && d.period.to) return d.period.to;
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

// ---------- interactions ----------
function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  const s = d.sections || {};
  const out = [
    renderSummary(d.summary),
    renderSection('A.', 'Debates — Consensus vs Divergence', s.A_debates,    renderTheme),
    renderSection('B.', 'Key Calls & Positioning',           s.B_calls,      renderCall),
    renderSection('C.', 'Notable Deep Reads',                s.C_deep_reads, renderDeepRead,
                  'section-deepreads'),
    renderSection('D.', 'Charts & Data',                     s.D_charts,     renderChart),
    renderSection('E.', 'House Views',                       s.house_views,  renderHouseView),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = out || '<div class="empty">No report data.</div>';

  // Auto-open Summary's section view: first two sections open by default.
  document.querySelectorAll('.section').forEach((sec, i) => {
    if (i < 2) sec.classList.add('open');
  });
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
