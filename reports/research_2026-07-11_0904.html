<script>

  watch: { emoji: "🟡", label: "Watch" }

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(cat){ return CATCOLORS[cat] || "#888"; }

function buildFilters(){
  const catCounts = {};
  ITEMS.forEach(i => catCounts[i.cat] = (catCounts[i.cat]||0)+1);
  const catRoot = document.getElementById('catFilter');
  let html = `<button class="pill active" data-cat="all" onclick="setCat('all')">All (${ITEMS.length})</button>`;
  Object.keys(catCounts).sort().forEach(c => {
    html += `<button class="pill" data-cat="${c}" onclick="setCat('${c}')">${esc(c)} (${catCounts[c]})</button>`;
  });
  catRoot.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1);
  const urgRoot = document.getElementById('urgFilter');
  let uhtml = `<button class="pill active" data-urg="all" onclick="setUrg('all')">All (${ITEMS.length})</button>`;
  ['act','deep','watch'].forEach(u => {
    if (urgCounts[u]) uhtml += `<button class="pill" data-urg="${u}" onclick="setUrg('${u}')">${URG_META[u].emoji} ${URG_META[u].label} (${urgCounts[u]})</button>`;
  });
  urgRoot.innerHTML = uhtml;
}

function setCat(c){
  activeCat = c; activeSrc = null;
  document.querySelectorAll('#catFilter .pill').forEach(p => {
    const isActive = p.getAttribute('data-cat') === c;
    p.classList.toggle('active', isActive);
    p.style.background = isActive && c !== 'all' ? catColor(c) : (isActive ? '#222' : '');
    p.style.borderColor = isActive && c !== 'all' ? catColor(c) : (isActive ? '#222' : '');
  });
  applyFilters();
}
function setUrg(u){
  activeUrg = u; activeSrc = null;
  document.querySelectorAll('#urgFilter .pill').forEach(p => {
    const isActive = p.getAttribute('data-urg') === u;
    p.classList.toggle('active', isActive);
    p.style.background = isActive ? '#222' : '';
    p.style.borderColor = isActive ? '#222' : '';
  });
  applyFilters();
}
function filterBySrc(name){
  activeCat = 'all'; activeUrg = 'all'; activeSrc = name;
  document.querySelectorAll('#catFilter .pill').forEach(p => { p.classList.toggle('active', p.getAttribute('data-cat')==='all'); p.style.background=''; p.style.borderColor=''; });
  document.querySelectorAll('#urgFilter .pill').forEach(p => { p.classList.toggle('active', p.getAttribute('data-urg')==='all'); p.style.background=''; p.style.borderColor=''; });
  applyFilters(true);
}

function applyFilters(expandMatches){
  document.querySelectorAll('.card').forEach(card => {
    const id = parseInt(card.getAttribute('data-id'));
    const item = ITEMS.find(i => i.id === id);
    let show = true;
    if (activeCat !== 'all' && item.cat !== activeCat) show = false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) show = false;
    if (activeSrc && item.source.indexOf(activeSrc) === -1) show = false;
    card.classList.toggle('hidden', !show);
    if (activeSrc) card.classList.toggle('open', show && !!expandMatches);
    else if (activeCat !== 'all' || activeUrg !== 'all') { /* keep manual open state */ }
  });
}

function toggleCard(id){
  const card = document.querySelector('.card[data-id="'+id+'"]');
  card.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

        <div class="tweets">

            <div class="tweet-label a">TWEET A</div>
            <div class="tweet-text">${esc(item.tweetA)}</div>
            <button class="copy-btn" onclick="copyTweet(${item.id},'a')">📋 Copy</button>
          </div>
          <div class="tweet-card">
            <div class="tweet-label b">TWEET B</div>
            <div class="tweet-text">${esc(item.tweetB)}</div>
            <button class="copy-btn" onclick="copyTweet(${item.id},'b')">📋 Copy</button>
          </div>
        </div>
        ${item.charts.count > 0 ? `<div class="chart-box ${item.charts.hot?'hot':''}">${item.charts.hot?'🔥 CHART WORTH SAVING — ':''}${esc(item.charts.desc)}</div>` : ''}
        <div class="linkrow"><a href="${item.link}" target="_blank" rel="noopener">↗ Read full article</a></div>
      </div>
    </div>`;
  });
  root.innerHTML = html || '<div class="empty-state">No items match this filter.</div>';
}

function renderHeader(){
  document.getElementById('headerMeta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
}

function renderReport(){
  let srcRows = META.includedSources.map(s =>
    `<div><span class="src-link" onclick="filterBySrc('${s.name.replace(/'/g,"\\'")}')">${esc(s.name)}</span> — ${s.count} items. <span style="color:#999">${esc(s.note)}</span></div>`
  ).join('');
  let skipRows = META.skippedSources.length
    ? META.skippedSources.map(s => `<div>${esc(s.name)} — ${esc(s.reason)}</div>`).join('')
    : '<div style="color:#999">None. Every email received within the window was opened and read in full.</div>';

  document.getElementById('reportBody').innerHTML = `
    <h4>Time Window</h4>
    <div>${esc(META.windowStart)} → ${esc(META.windowEnd)} (strict 6-hour lookback, CEST). Emails outside this window were not processed.</div>
    <h4>Coverage</h4>
    <div>${META.emailsInWindow} emails arrived in-window · ${META.emailsRead} read in full · ${META.itemsExtracted} items extracted.</div>
    <h4>Included Sources</h4>
    ${srcRows}
    <h4>Skipped Sources</h4>
    ${skipRows}
  `;
}

document.getElementById('reportHead').addEventListener('click', function(){
  document.getElementById('reportCard').classList.toggle('open');
  document.getElementById('reportChevron').textContent = document.getElementById('reportCard').classList.contains('open') ? '▾' : '▸';
});

buildFilters();
renderCards();
renderHeader();
renderReport();
</script>
