    { name: "Hardfork", count: 1 }
  ],
  skippedSources: [
    { name: "Lord Fed", reason: "Pure discount-code promo (25%/20% off pitch), zero analytical content" },
    { name: "Helene Meisler", reason: "Author traveling, note says no chart fest today — zero content" }
  ]
};

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "AI/infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};
const URG_LABEL = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URG_EMOJI = { act: "🔴", deep: "🔵", watch: "🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildFilters() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat]||0)+1; });
  const cats = Object.keys(catCounts).sort();

  let catHtml = '<button class="pill' + (activeCat==="all"?" active":"") + '" style="' + (activeCat==="all"?"background:#333;":"") + '" onclick="setCat(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  cats.forEach(c => {
    const color = CAT_COLORS[c] || "#888";
    const isActive = activeCat === c;
    catHtml += '<button class="pill' + (isActive?" active":"") + '" style="' + (isActive ? ("background:" + color + ";border-color:" + color + ";") : ("color:" + color + ";border-color:" + color + ";")) + '" onclick="setCat(\'' + c + '\')">' + escapeHtml(c) + ' <span class="count">' + catCounts[c] + '</span></button>';
  });
  document.getElementById("catFilters").innerHTML = catHtml;

  const urgCounts = { act: 0, deep: 0, watch: 0 };
  ITEMS.forEach(i => { urgCounts[i.urgency]++; });
  let urgHtml = '<button class="pill' + (activeUrg==="all"?" active":"") + '" style="' + (activeUrg==="all"?"background:#333;":"") + '" onclick="setUrg(\'all\')">All <span class="count">' + ITEMS.length + '</span></button>';
  ["act","deep","watch"].forEach(u => {
    const isActive = activeUrg === u;
    urgHtml += '<button class="pill' + (isActive?" active":"") + '" style="' + (isActive ? "background:#555;border-color:#555;" : "") + '" onclick="setUrg(\'' + u + '\')">' + URG_LABEL[u] + ' <span class="count">' + urgCounts[u] + '</span></button>';
  });
  document.getElementById("urgFilters").innerHTML = urgHtml;
}

function setCat(c) { activeCat = c; activeSrc = null; render(); }
function setUrg(u) { activeUrg = u; activeSrc = null; render(); }

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  render(true);
}

function matches(item) {
  if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
  if (activeCat !== "all" && item.cat !== activeCat) return false;
  if (activeUrg !== "all" && item.urgency !== activeUrg) return false;
  return true;
}

function cardHtml(item, forceOpen) {
  const color = CAT_COLORS[item.cat] || "#888";
  const chartFlag = item.charts.count > 0 || item.charts.hot ? (item.charts.hot ? "🔥" : "📊") : "";
  let body = '';
  body += '<div class="section-label">The Idea</div>';
  body += '<div class="idea-text">' + escapeHtml(item.idea) + '</div>';
  body += '<div class="section-label">My Angle</div>';
  body += '<div class="angle-box" style="border-left:3px solid ' + color + '; background:' + color + '14;">' + escapeHtml(item.angle) + '</div>';
  body += '<div class="tweet-row">';
  body += '<div class="tweet-col"><div class="tweet-label-a">TWEET A</div><div class="tweet-box">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
  body += '<div class="tweet-col"><div class="tweet-label-b">TWEET B</div><div class="tweet-box">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
  body += '</div>';
  if (item.charts.desc) {
    body += '<div class="chart-line' + (item.charts.hot ? " hot" : "") + '">' + (item.charts.hot ? "🔥 CHART WORTH SAVING — " : "📊 ") + escapeHtml(item.charts.desc) + '</div>';
  }
  body += '<div class="link-line"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';

  return '<div class="card' + (forceOpen ? " open" : "") + '" id="card-' + item.id + '">' +
    '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>' +
      '<span class="urg">' + URG_EMOJI[item.urgency] + '</span>' +
      '<span class="badge" style="background:' + color + '">' + escapeHtml(item.source.split(" / ")[0].split(" (")[0]) + '</span>' +
      '<span class="cat-tag">' + escapeHtml(item.cat) + '</span>' +
      (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
      '<span class="title-text">' + escapeHtml(item.title) + '</span>' +
      '<span class="chevron">▶</span>' +
    '</div>' +
    '<div class="card-body">' + body + '</div>' +
  '</div>';
}

function toggleCard(id) {
  const el = document.getElementById("card-" + id);
  el.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function render(forceOpenAll) {
  buildFilters();
  const visible = ITEMS.filter(matches);
  document.getElementById("cards").innerHTML = visible.map(i => cardHtml(i, !!forceOpenAll)).join("");
}

function buildReport() {
  let html = '';
  html += '<p><strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '. Emails outside this window were not processed.</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp; <strong>Read:</strong> ' + META.emailsRead + ' &nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<div class="section-label">Included Sources (click to filter)</div><ul>';
  META.includedSources.forEach(s => {
    html += '<li><span class="src-item" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + escapeHtml(s.name) + '</span> — ' + s.count + ' item' + (s.count>1?'s':'') + '</li>';
  });
  html += '</ul>';
  html += '<div class="section-label">Skipped Sources</div><ul>';
  META.skippedSources.forEach(s => {
    html += '<li>' + escapeHtml(s.name) + ' — ' + escapeHtml(s.reason) + '</li>';
  });
  html += '</ul>';
  document.getElementById("reportBody").innerHTML = html;
}

function init() {
  document.getElementById("headerMeta").textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items";
  render();
  buildReport();
}
init();
</script>
