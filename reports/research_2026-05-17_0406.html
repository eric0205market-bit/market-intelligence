const META = {
  date: "2026-05-17",
  time: "04:06 CEST",
  windowStart: "2026-05-16 22:06 CEST",
  windowEnd: "2026-05-17 04:06 CEST",
  emailsInWindow: 5,
  emailsRead: 5,
  itemsExtracted: 16,
  includedSources: [
    { name: "Six Sigma Capital", items: 9 },
    { name: "Eliant Capital", items: 4 },
    { name: "The Pressure Point", items: 3 }
  ],
  skippedSources: [
    { name: "Macro Edge & Alpha Weekly Compass (Princeton Chen / Issue 1)", reason: "Email body contained only a Google Drive link to full issue (paywalled) and subscription prompt — zero readable content in email" },
    { name: "McKinsey — Leading through disruption: What CEOs are getting right", reason: "Email body contained only HTML style/formatting tags with no readable text content" }
  ]
};

// ── STATE ──────────────────────────────────────────────────────────────────
let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

const CAT_COLORS = {
  macro:'#e24b4a', credit:'#378add', positioning:'#ef9f27', 'AI/infra':'#1d9e75',
  crypto:'#7f77dd', geopolitics:'#d85a30', energy:'#f97316', tech:'#06b6d4',
  gold:'#d4a017', culture:'#ec4899', labor:'#8b5cf6', regulation:'#64748b',
  science:'#14b8a6', venture:'#84cc16'
};

// ── COPY ───────────────────────────────────────────────────────────────────
function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

// ── FILTERS ────────────────────────────────────────────────────────────────
function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  render();
  buildFilters();
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  render();
  buildFilters();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  render();
  buildFilters();
}

// ── TOGGLE ─────────────────────────────────────────────────────────────────
function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▶' : '▼';
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var chev = document.getElementById('report-chev');
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.textContent = open ? '▶' : '▼';
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rgba(hex, a) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function urgEmoji(u) {
  return u === 'now' ? '🔴' : u === 'watch' ? '🟡' : '🔵';
}

// ── CARD BUILDER ───────────────────────────────────────────────────────────
function buildCard(item) {
  var color = CAT_COLORS[item.cat] || '#999';
  var bg = rgba(color, 0.07);
  var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
  var chartHtml = item.charts.count > 0
    ? `<div class="chart-info${item.charts.hot ? ' hot' : ''}">📊 ${item.charts.count} chart(s): ${esc(item.charts.desc)}</div>`
    : '';
  var linkHtml = item.link
    ? `<a href="${esc(item.link)}" target="_blank" class="read-link">↗ Read full article</a>`
    : '';

  return `<div class="card" id="card-${item.id}">
  <div class="card-header" onclick="toggleCard(${item.id})">
    <span class="item-num">${item.id}</span>
    <span>${urgEmoji(item.urgency)}</span>
    <span class="source-badge" style="background:${color}">${esc(item.source)}</span>
    <span class="cat-tag">${esc(item.cat)}</span>${chartIcon}
    <span class="card-title">${esc(item.title)}</span>
    <span class="chev" id="chev-${item.id}">▶</span>
  </div>
  <div class="card-body" id="body-${item.id}">
    <div class="section-label">THE IDEA</div>
    <div class="idea">${esc(item.idea)}</div>
    <div class="section-label" style="margin-top:13px">MY ANGLE</div>
    <div class="angle" style="border-left:2px solid ${color};background:${bg}">${esc(item.angle)}</div>
    <div class="section-label" style="margin-top:13px">TWEETS</div>
    <div class="tweets">
      <div class="tweet-box">
        <div class="tweet-label" style="color:#378add">TWEET A</div>
        <div class="tweet-text">${esc(item.tweetA)}</div>
        <button class="copy-btn" onclick="copyTweet(${item.id},'a')">📋 Copy</button>
      </div>
      <div class="tweet-box">
        <div class="tweet-label" style="color:#7f77dd">TWEET B</div>
        <div class="tweet-text">${esc(item.tweetB)}</div>
        <button class="copy-btn" onclick="copyTweet(${item.id},'b')">📋 Copy</button>
      </div>
    </div>
    ${chartHtml}${linkHtml}
  </div>
</div>`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  var filtered = ITEMS.filter(function(item) {
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    var srcOk = !activeSrc || item.source.indexOf(activeSrc) !== -1;
    return catOk && urgOk && srcOk;
  });
  document.getElementById('cards').innerHTML = filtered.map(buildCard).join('');
}

// ── FILTER BARS ────────────────────────────────────────────────────────────
function buildFilters() {
  var catCounts = {};
  ITEMS.forEach(function(it) { catCounts[it.cat] = (catCounts[it.cat]||0)+1; });
  var cats = Object.keys(catCounts);

  var catBar = document.getElementById('cat-bar');
  catBar.innerHTML = '<span class="filter-label">Category</span>';

  function makePill(text, isActive, color, onClick) {
    var btn = document.createElement('button');
    btn.className = 'pill' + (isActive ? ' active' : '');
    if (isActive) btn.style.background = color;
    btn.textContent = text;
    btn.onclick = onClick;
    return btn;
  }

  catBar.appendChild(makePill('All ('+ITEMS.length+')', activeCat==='all', '#444', function(){setCat('all');}));
  cats.forEach(function(cat) {
    catBar.appendChild(makePill(cat+' ('+catCounts[cat]+')', activeCat===cat, CAT_COLORS[cat]||'#999', function(){setCat(cat);}));
  });

  var urgCounts = {all:ITEMS.length, now:0, deep:0, watch:0};
  ITEMS.forEach(function(it){ urgCounts[it.urgency]=(urgCounts[it.urgency]||0)+1; });

  var urgBar = document.getElementById('urg-bar');
  urgBar.innerHTML = '<span class="filter-label">Urgency</span>';
  [['all','All'],['now','🔴 Act Now'],['deep','🔵 Deep'],['watch','🟡 Watch']].forEach(function(pair) {
    var u=pair[0], label=pair[1];
    urgBar.appendChild(makePill(label+' ('+(urgCounts[u]||0)+')', activeUrg===u, '#444', function(){setUrg(u);}));
  });
}

// ── SESSION REPORT ─────────────────────────────────────────────────────────
function buildReport() {
  var incl = META.includedSources.map(function(s) {
    return '<span class="src-link" onclick="filterBySrc(\''+s.name.replace(/'/g,"\\'")+'\')">'
      + esc(s.name) + '</span> (' + s.items + ' items)';
  }).join(' &nbsp;|&nbsp; ');

  var skip = META.skippedSources.map(function(s) {
    return '<strong>' + esc(s.name) + ':</strong> ' + esc(s.reason);
  }).join('<br>');

  document.getElementById('report-body').innerHTML =
    '<strong>Time window:</strong> ' + esc(META.windowStart) + ' → ' + esc(META.windowEnd) + '<br>' +
    '<strong>Emails in window:</strong> ' + META.emailsInWindow +
    ' &nbsp;|&nbsp; <strong>Read:</strong> ' + META.emailsRead +
    ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '<br><br>' +
    '<strong>Included sources:</strong><br>' + incl + '<br><br>' +
    '<strong>Skipped:</strong><br>' + skip;
}

// ── INIT ───────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('header-meta').textContent =
    META.date + '  ·  ' + META.time + '  ·  ' + META.itemsExtracted + ' items from ' +
    META.includedSources.length + ' sources';
  buildFilters();
  render();
  buildReport();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
