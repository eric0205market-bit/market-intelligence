y to be the main source of new reserves through 2040", "locator": "Some companies can help solve their portfolio longevity issues through exploration", "quote_verified": true}, {"claim": "Real exploration opportunities exist for well-positioned players in the Atlantic margin, the Eastern Mediterranean, and selective reopening markets across Africa.", "speaker": "Rebecca Fitz", "type": "thesis", "entities": ["Atlantic margin", "Eastern Mediterranean", "Africa"], "conviction": "medium", "so_what": "Geographic watchlist for exploration exposure; screen for names with access and technical capability in these three basins.", "quote": "opportunities in the Atlantic margin, the Eastern Mediterranean, and selective markets that are reopening across Africa", "locator": "For players with the right combination of access", "quote_verified": true}, {"claim": "Exploration returns are highly concentrated: despite similar spending levels, top performers generate significantly more positive value than laggards by managing capital exposure through phased development, infrastructure-adjacent targets, and pre-development farmdowns.", "speaker": "Rebecca Fitz", "type": "data_point", "entities": ["exploration", "farmdowns"], "conviction": "high", "so_what": "Exploration is a skill game, not a spend game; reward disciplined operators that limit capital exposure before high-risk drilling.", "quote": "despite similar levels of spending, top performers generate significantly more positive value than laggards", "locator": "Returns from exploration are highly concentrated", "quote_verified": true}]}, {"theme": "M&A dynamics", "insights": [{"claim": "M&A is most attractive precisely when it is most dangerous for resource-constrained oil and gas companies, raising the risk of overpaying, eroding strategic flexibility, and destroying value through the cycle.", "speaker": "Rebecca Fitz", "type": "contrarian", "entities": ["M&A", "oil and gas"], "conviction": "high", "so_what": "Be wary of desperate acquirers with thin portfolios; deals struck under pressure are a red flag for value destruction.", "quote": "M&A is often most attractive when it is most dangerous", "locator": "Mergers and Acquisitions", "quote_verified": true}, {"claim": "Companies with high valuations can use their equity as a sought-after currency to fund renewal plans, an advantage unavailable to lower-valued peers paying the same nominal premium.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["M&A", "equity valuation"], "conviction": "high", "so_what": "Valuation is optionality: high-multiple names can make accretive equity-financed acquisitions, compounding their lead over cheaper rivals.", "quote": "it enables them to use their paper as a sought-after currency to achieve their renewal plans", "locator": "Mergers and Acquisitions", "quote_verified": true}]}, {"theme": "Technology as game-changer", "insights": [{"claim": "Technology could be the biggest game-changer for extending oil and gas portfolios, creating value both by extracting more from existing resource bases and by acting as an access key to new state-controlled ones.", "speaker": "Rebecca Fitz", "type": "thesis", "entities": ["technology", "upstream"], "conviction": "high", "so_what": "Technical depth is a dual-purpose moat; favor operators whose capabilities both boost recovery and unlock restricted-market access.", "quote": "The biggest game-changer in enabling players to extend their portfolios could be technology.", "locator": "Technology", "quote_verified": true}, {"claim": "Some of the world's largest holders of conventional reservoirs recover less than half the average recovery for their peer group, implying large untapped upside from better technology deployment.", "speaker": "Rebecca Fitz", "type": "data_point", "entities": ["conventional reservoirs", "recovery factors"], "conviction": "high", "so_what": "A big recovery-factor gap means value hides in existing assets; reward operators closing it rather than chasing new frontier barrels.", "quote": "some of the world’s largest holders of conventional reservoirs recover less than half the average for their peer group", "locator": "In terms of existing resource bases", "quote_verified": true}, {"claim": "The most consequential technology frontier may be shale, where doubling enhanced-oil-recovery factors to around 15% would go a long way toward meeting future resource needs, though it carries real technical risk and the winning approach is unsettled.", "speaker": "Rebecca Fitz", "type": "prediction", "entities": ["shale", "enhanced oil recovery", "CO2 injection"], "conviction": "medium", "so_what": "Shale EOR is a high-upside, high-uncertainty theme; track pilots on fracturing, chemical agents, and CO2 injection for the eventual winner.", "quote": "if enhanced oil recovery technologies could double recovery factors to around 15%, it would go a long way toward meeting future resource needs", "locator": "The most consequential frontier may be shale", "quote_verified": true}, {"claim": "Equipment innovations—smaller mobile surface infrastructure, FPSO units, and multiphase subsea boosting pumps—plus AI-enabled subsurface modeling have already transformed offshore recovery economics and continue to do so.", "speaker": "Rebecca Fitz", "type": "data_point", "entities": ["FPSO", "subsea boosting pumps", "AI subsurface modeling", "offshore"], "conviction": "high", "so_what": "Offshore economics are structurally improving; suppliers of FPSOs, subsea kit, and AI modeling are levered to the recovery-technology theme.", "quote": "floating production, storage, and offloading units; and multiphase subsea boosting pumps—have already transformed the economics of offshore recovery", "locator": "Innovations in equipment", "quote_verified": true}, {"claim": "In state-controlled markets, players with genuine subsurface expertise, execution track record, or development innovation get doors opened to them that remain shut for purely financial competitors.", "speaker": "Rebecca Fitz", "type": "thesis", "entities": ["technology", "host states", "IOCs"], "conviction": "high", "so_what": "Capability, not capital, is the entry ticket to the best restricted resources; discount financial-only bidders in access competitions.", "quote": "Players that have built deep capabilities in these areas find that doors are opened to them that remain shut for purely financial competitors.", "locator": "The second way to create value is using technical capability as an access key.", "quote_verified": true}]}, {"theme": "Four-quadrant positioning framework", "insights": [{"claim": "BCG places leading oil and gas companies into four strategic categories based on two dimensions: the depth of the existing portfolio and the strategic flexibility that valuation provides.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["IOCs", "NOCs", "portfolio depth", "valuation"], "conviction": "high", "so_what": "A ready-made map for classifying upstream names by portfolio depth and valuation-driven optionality when comparing strategies.", "quote": "the depth of its existing portfolio and the strategic flexibility its valuation provides", "locator": "Responding to the New Upstream Reality", "quote_verified": true}, {"claim": "A strong valuation functions as a source of optionality—enabling equity-financed M&A, cheaper capital, and decisive action—and compounds over time, so disciplined companies enter the cycle with genuine strategic choice while undisciplined ones face constrained options.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["valuation", "capital discipline"], "conviction": "high", "so_what": "Valuation is treated as a strategic asset, not a scorecard; disciplined high-multiple operators have a compounding, self-reinforcing edge.", "quote": "valuation matters not as a scorecard but as a source of optionality", "locator": "In this context, valuation matters not as a scorecard", "quote_verified": true}, {"claim": "'Deploy and extend' companies with both portfolio depth and strategic flexibility should extend selectively within narrowing high-quality opportunities without overextending, their main risk being discipline rather than scarcity of options.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["deploy and extend"], "conviction": "high", "so_what": "For the strongest names, watch for capital-allocation discipline; overreach beyond their right to win is the key downside risk.", "quote": "The risk for this group is not scarcity of options but maintaining discipline in choosing from among them.", "locator": "Deploy and extend.", "quote_verified": true}, {"claim": "'Act now' companies with strong valuations but thinning portfolios should concentrate firepower on one or two compounding renewal opportunities rather than hedging across many bets, because geopolitically scarce assets may not be available on the same terms in a few years.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["act now", "M&A"], "conviction": "high", "so_what": "Highly valued but reserve-short names face a use-it-or-lose-it window; reward focused deals, penalize scattershot spending.", "quote": "players need to identify one or two renewal opportunities that can compound over the next decade, and concentrate their firepower here", "locator": "Act now.", "quote_verified": true}, {"claim": "'Define and focus' companies with weak portfolios and limited financial flexibility must avoid growth without advantage and instead deploy recovery-boosting technology plus aggressive high-grading around an advantaged core, exiting elsewhere.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["define and focus", "high-grading"], "conviction": "high", "so_what": "For weak upstream names, pursuing growth destroys value; the only constructive path is portfolio rationalization and concentration.", "quote": "Pursuing growth without advantage (whether based on capabilities, access, or the benefits of a strong valuation) will destroy value.", "locator": "Define and focus.", "quote_verified": true}, {"claim": "'Unlock the value' companies with strong portfolios but valuations that fail to reflect them should close the gap through business simplification, balance sheet discipline, and a credible investor narrative linking portfolio quality to future cash generation.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["unlock the value", "valuation gap"], "conviction": "high", "so_what": "Screen for reserve-rich, undervalued names where a narrative or simplification catalyst could re-rate the equity.", "quote": "developing a credible narrative that connects portfolio quality to future cash generation", "locator": "Unlock the value.", "quote_verified": true}]}, {"theme": "Partnerships and consolidation", "insights": [{"claim": "Partnerships are especially valuable for high-grading in mature basins, typically extending across country borders to create operational scale neither partner could achieve alone, or forming standalone vehicles that attract independent capital while retaining strategic influence.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["partnerships", "mature basins", "high-grading"], "conviction": "medium", "so_what": "Cross-border JVs and standalone vehicles in mature basins are a rising consolidation pattern; a template for value creation without frontier risk.", "quote": "they involve forming standalone vehicles that enable companies to attract independent capital while retaining strategic influence", "locator": "Partnerships are particularly important with high-grading", "quote_verified": true}, {"claim": "For the small group of players enjoying a structural oil and gas surplus and no longevity concerns, the challenge shifts to maximizing value through better integration across the value chain and the right partnership model.", "speaker": "Rebecca Fitz", "type": "thesis", "entities": ["structural surplus", "value chain integration"], "conviction": "medium", "so_what": "Surplus-rich producers (likely large NOCs) are a distinct bucket where downstream integration and partnerships, not reserves, drive value.", "quote": "the challenge is maximizing value through better integration across the value chain and having the right partnership model", "locator": "For the small group of players that enjoy a structural oil and gas surplus", "quote_verified": true}]}, {"theme": "Pathway selection and right to win", "insights": [{"claim": "Companies can achieve similar production-volume outcomes via pathways with materially different risk-return profiles that diverge on cash flow quality, capital intensity, above-ground risk, and capability requirements.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["scenario planning", "risk-return"], "conviction": "high", "so_what": "Volume growth alone is a poor signal; look past headline production to the quality and risk of the pathway that delivered it.", "quote": "pathways that diverge sharply on cash flow quality, capital intensity, above-ground risk, and capability requirements", "locator": "BCG’s scenario-planning work with leading upstream players", "quote_verified": true}, {"claim": "Outperforming upstream players will share one trait: honesty about where they hold a real advantage over peers, enabling better and more deliberate pathway decisions; those that fail to replenish reserves proactively risk repeating past value destruction.", "speaker": "Rebecca Fitz", "type": "thesis", "entities": ["upstream", "right to win"], "conviction": "high", "so_what": "Bet on management teams with an honest, self-aware read of their competitive advantage; that discipline separates cycle winners from losers.", "quote": "they will be honest about where they have a real advantage over peers", "locator": "The standout winners over the approaching cycle", "quote_verified": true}, {"claim": "A key discipline question for leaders is how much longevity ambition is economically superior to simply returning capital to investors, and whether investor confidence can be sustained through the required capital commitments.", "speaker": "Rebecca Fitz", "type": "framework", "entities": ["capital allocation", "shareholder returns"], "conviction": "high", "so_what": "Reserve reinvestment must clear the buyback hurdle; scrutinize whether upstream capex genuinely beats returning cash.", "quote": "How much of our portfolio longevity ambition is economically superior to simply returning capital to investors", "locator": "Many oil and gas company leaders are starting to pose important longevity-related questions", "quote_verified": true}]}], "insight_total": 32, "top_entities": ["oil and gas", "upstream", "IOCs", "NOCs", "Strait of Hormuz", "shale", "enhanced oil recovery", "exploration", "M&A", "FPSO", "Eastern Mediterranean", "Atlantic margin"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/rebecca-fitz", "word_count": 2361, "paywalled": false}}, {"record_id": "5b65f1d392bba3d6", "source_type": "concepts", "source_name": "BCG Henderson Institute", "source_url": "https://www.bcg.com/publications/2026/smart-compliance-esrs-sustainability-reporting", "title": "Sustainability Reporting in Europe: From Compliance to Strategy", "published_date": "2026-07-06", "language": "en", "processed_at": "2026-07-07T16:46:57Z", "processor": "claude-code-sub-opus", "tags": ["Society", "AI", "Macro"], "gist": "The move to ESRS Set 2 (FY2026), which cuts required sustainability data points by 60-70%, gives European companies a one-time reset to shift from costly, overreporting compliance toward strategy-led 'smart compliance' — while AI in reporting remains stuck at experimentation rather than transformation.", "themes": [{"theme": "ESRS Set 2 regulatory reset", "insights": [{"claim": "ESRS Set 2, applicable from FY2026 onward, reduces the number of required sustainability data points by approximately 60% to 70% and eliminates certain voluntary disclosures, shifting the emphasis from completeness to decision usefulness.", "speaker": "Lorenzo Fantini", "type": "data_point", "entities": ["ESRS Set 2", "ESRS", "CSRD"], "conviction": "high", "so_what": "A 60-70% data-point cut materially lowers compliance cost and reshapes what reporting-software and assurance vendors can sell into FY2026 cycles.", "quote": "The revised standards reduce the number of mandatory data points by approximately 60% to 70% and eliminate certain voluntary disclosures.", "locator": "The subsequent development of ESRS Set 2", "quote_verified": true}, {"claim": "FY2026 will be the first reporting cycle that fully enables a reimagined, strategy-led sustainability reporting approach, making it a one-time inflection point since the introduction of CSRD.", "speaker": "Lorenzo Fantini", "type": "thesis", "entities": ["CSRD", "ESRS Set 2"], "conviction": "high", "so_what": "Watch FY2026 disclosures as the test of whether companies actually restructure reporting or just trim it at the margins.", "quote": "For the first time since the introduction of CSRD, organizations are in a position to fundamentally reimagine their sustainability reporting.", "locator": "This change presents companies with a unique inflection point", "quote_verified": true}, {"claim": "The EU Omnibus Package, introduced in early 2025, extended CSRD implementation timelines and reduced the scope of the regulation, preceding the more substantive ESRS Set 2 adjustment.", "speaker": "Lorenzo Fantini", "type": "data_point", "entities": ["EU Omnibus Package", "CSRD"], "conviction": "high", "so_what": "Signals a clear EU policy direction of regulatory simplification/rollback on ESG disclosure that affects compliance-vendor demand and corporate reporting burden.", "quote": "The initial EU Omnibus Package, introduced in early 2025, extended implementation timelines and reduced the scope of the regulation.", "locator": "Recognizing these challenges", "quote_verified": true}, {"claim": "ESRS Set 2 places stronger emphasis on an explicit top-down application of double materiality, letting companies start from their strategic understanding of the business rather than exhaustively cataloging potential sustainability topics.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["ESRS Set 2", "double materiality"], "conviction": "high", "so_what": "Top-down materiality should shrink the topic list and reporting burden, favoring firms that can articulate a coherent sustainability strategy.", "quote": "ESRS Set 2 places stronger emphasis on a more explicit top-down perspective, allowing companies to use their strategic understanding of the business as a starting point to identify material topics.", "locator": "Sustainability Strategy: Reestablishing the Linkage", "quote_verified": true}]}, {"theme": "Cost and overreporting problem", "insights": [{"claim": "Recurring annual sustainability reporting costs for large organizations exceed €1 million and can be significantly higher once the full scope of internal and external effort is counted.", "speaker": "Lorenzo Fantini", "type": "data_point", "entities": ["CSRD", "ESRS"], "conviction": "high", "so_what": "Quantifies the addressable spend that simplification and AI enablement could compress — a headwind for compliance-service revenue, tailwind for efficiency tooling.", "quote": "Recurring annual costs for large organizations exceed €1 million and can be significantly higher when taking into account the full scope of internal and external endeavors.", "locator": "As a result, sustainability reporting has evolved", "quote_verified": true}, {"claim": "The prescriptive structure of ESRS Set 1 drove companies to adopt broad interpretations of materiality, producing overreporting that severed the intended link between disclosure and strategic priorities.", "speaker": "Lorenzo Fantini", "type": "causal", "entities": ["ESRS", "double materiality"], "conviction": "high", "so_what": "The regulation's design produced perverse behavior — evidence that mandatory disclosure regimes can reduce, not increase, decision usefulness.", "quote": "Faced with a highly prescriptive framework, many companies opt for a broad interpretation of materiality, resulting in disclosures that cover a multitude of topics.", "locator": "More importantly, the structure of the current standards", "quote_verified": true}, {"claim": "Most companies still cover a broad range of material topics that are only loosely connected to their business model, and many material topics are only partially backed by concrete targets or incentive schemes.", "speaker": "Lorenzo Fantini", "type": "data_point", "entities": ["ESRS", "EFRAG"], "conviction": "high", "so_what": "Disconnect between reported topics and actual targets is a red flag for investors reading current sustainability reports as strategy signals.", "quote": "This is particularly apparent from the number of material sustainability topics that companies cover in their reporting that are only partially covered by concrete targets or incentive schemes.", "locator": "A Compliance-Driven Equilibrium", "quote_verified": true}, {"claim": "Sustainability reporting under ESRS has become a cross-functional process requiring input from sustainability, finance, risk, IT, and legal teams plus external advisors and assurance providers, spanning complex value chains.", "speaker": "Lorenzo Fantini", "type": "data_point", "entities": ["ESRS", "CSRD"], "conviction": "high", "so_what": "The breadth of internal stakeholders explains why costs are high and why organizational redesign, not just software, is the bottleneck.", "quote": null, "locator": "As a result, sustainability reporting has evolved into a cross-functional process", "quote_verified": false}, {"claim": "The dominant market equilibrium across industries treats sustainability reporting primarily as a compliance exercise rather than a strategic tool, a pattern BCG classifies via distinct archetypes.", "speaker": "Lorenzo Fantini", "type": "thesis", "entities": ["BCG", "ESRS"], "conviction": "high", "so_what": "If reporting is compliance theater industry-wide, the disclosures carry limited alpha for stock-picking on sustainability performance.", "quote": "Most companies approach sustainability reporting primarily as a compliance exercise.", "locator": "A Compliance-Driven Equilibrium", "quote_verified": true}]}, {"theme": "EFRAG State of Play evidence", "insights": [{"claim": "EFRAG's State of Play study, published in early July 2026, analyzed more than 900 FY2025 reports against a structured framework of 18 key questions covering materiality assessment, target setting, and report structure.", "speaker": "Lorenzo Fantini", "type": "data_point", "entities": ["EFRAG", "ESRS Set 1"], "conviction": "high", "so_what": "A 900+ report dataset is the current empirical baseline for how European firms disclose — useful reference for benchmarking reporting quality.", "quote": "The latest State of Play study from the European Financial Reporting Advisory Group (EFRAG), published in early July 2026 and more than 900 reports for FY2025", "locator": "Challenge: Sustainability Reporting Between Market Practice and Regulatory Intent", "quote_verified": true}, {"claim": "Because the >900 FY2025 reports were prepared under ESRS Set 1, they reflect current market practice rather than the intended future state under ESRS Set 2, meaning today's disclosure quality understates the post-reform trajectory.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["ESRS Set 1", "ESRS Set 2", "EFRAG"], "conviction": "medium", "so_what": "Don't extrapolate current overreporting forward — the FY2026 regime is designed to look materially different.", "quote": null, "locator": "Because these reports were prepared under the existing ESRS Set 1", "quote_verified": false}]}, {"theme": "AI reality gap in reporting", "insights": [{"claim": "Despite vendor and advisor narratives positioning AI as a game changer for sustainability reporting, actual deployment remains limited in scope and impact, contributing more to experimentation at the margins than transformation at scale.", "speaker": "Lorenzo Fantini", "type": "contrarian", "entities": ["AI"], "conviction": "high", "so_what": "A sober counter to AI-in-ESG-tooling hype — near-term revenue from these products likely lags the marketing.", "quote": "AI in sustainability reporting today contributes less to transformation at scale and more to experimentation at the margins.", "locator": "AI as a Promised Step Change, but One That Has Yet to Materialize", "quote_verified": true}, {"claim": "The AI adoption gap in sustainability reporting is driven by four factors: use cases misaligned with actual pain points, fragmented data and weak data governance, poor integration into reporting workflows leaving isolated pilots, and lagging organizational readiness.", "speaker": "Lorenzo Fantini", "type": "causal", "entities": ["AI"], "conviction": "high", "so_what": "Winners in reporting-AI will be those solving data governance and workflow integration, not those shipping standalone models.", "quote": null, "locator": "Several underlying factors help explain this gap", "quote_verified": false}, {"claim": "Emerging agentic AI solutions aim to orchestrate end-to-end reporting workflows with limited human intervention, but current applications frequently fail to deliver anticipated efficiency gains or quality improvements.", "speaker": "Lorenzo Fantini", "type": "thesis", "entities": ["AI"], "conviction": "medium", "so_what": "Agentic reporting is still forward-looking; treat vendor claims of autonomous reporting as unproven for now.", "quote": "Many current applications fail to achieve anticipated efficiency gains or quality improvements.", "locator": "AI as a Promised Step Change", "quote_verified": true}, {"claim": "Realizing AI's value in sustainability reporting requires embedding it into the end-to-end process on high-impact use cases rather than running isolated pilots, plus targeted capability building for sustainability, finance, and data teams.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["AI"], "conviction": "high", "so_what": "Process integration and skills, not model sophistication, are the gating factors for AI ROI in this domain.", "quote": null, "locator": "Enablers: Embedding AI and Strengthening Governance", "quote_verified": false}]}, {"theme": "Smart compliance model", "insights": [{"claim": "BCG proposes a 'smart compliance' three-layer model — sustainability strategy, an end-to-end reporting process, and enablers (AI, governance, organization) — to shift firms from compliance-driven to strategy-led reporting without reducing rigor.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["BCG", "ESRS Set 2"], "conviction": "high", "so_what": "The framework is the consulting product BCG is selling around the FY2026 reset; a template for what advisory demand will pitch.", "quote": "Smart compliance does not entail less rigor. Rather, it reflects a more focused and structured approach that prioritizes material, decision-useful disclosures while minimizing unnecessary complexity and effort.", "locator": "Proposed Solution: A Strategy-Led Sustainability Reporting Model", "quote_verified": true}, {"claim": "Smart compliance structures sustainability reporting into seven interconnected steps: scope and governance, materiality scoping, disclosure/KPI design, data collection, calculation and roll-up, narrative/review/assurance, and publication with continuous improvement.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["ESRS", "CSRD"], "conviction": "high", "so_what": "A concrete operating blueprint firms can benchmark their reporting maturity against.", "quote": null, "locator": "A smart compliance approach tackles these challenges", "quote_verified": false}, {"claim": "The proposal calls for making sustainability numbers 'finance-grade' through defined calculation methodologies, systematic reconciliations, restatement mechanisms, and version control to ensure auditability.", "speaker": "Lorenzo Fantini", "type": "thesis", "entities": ["ESRS"], "conviction": "high", "so_what": "Rising assurance expectations mean sustainability data is converging toward financial-reporting controls — relevant for audit and assurance providers.", "quote": "Make Sustainability Numbers Finance-Grade.", "locator": "Calculation, Roll-up, and Control", "quote_verified": true}, {"claim": "Many organizations still run fragmented reporting setups with siloed responsibilities, multiple handovers, and heavy manual intervention, which raise cost and introduce inconsistencies that weaken controls and complicate assurance.", "speaker": "Lorenzo Fantini", "type": "causal", "entities": ["ESRS"], "conviction": "high", "so_what": "The operational mess is the value pool — automation and process redesign target these handovers directly.", "quote": null, "locator": "Building on a clear strategic foundation", "quote_verified": false}]}, {"theme": "Governance, organization and stakes", "insights": [{"claim": "Effective sustainability reporting models combine centralized coordination (a dedicated reporting function or steering body) with distributed ownership of data and content across business units, and governance must evolve to oversee AI model use and output validation.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["AI"], "conviction": "medium", "so_what": "Organizational design, including AI oversight, is becoming part of audit-readiness — a governance gap for firms scaling reporting.", "quote": null, "locator": "Effective models typically combine centralized coordination", "quote_verified": false}, {"claim": "Companies that fail to use the FY2026 reset risk becoming locked into inefficient processes with continuing cost pressure, missing the chance to turn sustainability reporting into a source of competitive advantage.", "speaker": "Lorenzo Fantini", "type": "prediction", "entities": ["ESRS Set 2"], "conviction": "high", "so_what": "The reform creates a divergence between reporting leaders and laggards worth tracking as an operational-efficiency signal.", "quote": "Inaction, on the other hand, could carry the risk of further entrenching inefficient processes.", "locator": "Executive Summary", "quote_verified": true}, {"claim": "A robust double materiality assessment should combine top-down strategic judgment with structured bottom-up validation, incorporating civil society and NGO perspectives as a counterbalance to internal strategy that may be incomplete.", "speaker": "Lorenzo Fantini", "type": "framework", "entities": ["double materiality"], "conviction": "medium", "so_what": "Guards against top-down materiality merely rationalizing the status quo — a quality marker for credible disclosures.", "quote": "external stakeholder perspectives—including those from civil society and NGOs—offer a critical counterbalance.", "locator": "At the same time, any top-down perspective", "quote_verified": true}]}], "insight_total": 22, "top_entities": ["ESRS Set 2", "CSRD", "ESRS", "EFRAG", "BCG", "EU Omnibus Package", "double materiality", "AI", "ESRS Set 1", "European Green Deal"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/lorenzo-fantini", "word_count": 2945, "paywalled": false}}, {"record_id": "8a61e37272e3751f", "source_type": "concepts", "source_name": "BCG Henderson Institute", "source_url": "https://www.bcg.com/publications/2026/how-ai-decision-agents-transform-strategy", "title": "Decision Agents Bring AI into the Boardroom", "published_date": "2026-07-07", "language": "en", "processed_at": "2026-07-07T16:46:57Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Positioning"], "gist": "BCG argues the next competitive advantage in AI is 'decision agents'—a new agent class that operates at the point of strategic choice (not execution), assembling cross-functional evidence and testing scenarios live in the boardroom. Despite AI spend doubling to 1.7% of revenues, fewer than one-fifth of leaders prioritize decision making and only 14% of agent investment goes there, leaving the highest-value use case wide open.", "themes": [{"theme": "The strategic-decision investment gap", "insights": [{"claim": "Companies expect to double their AI investment in 2026 to 1.7% of revenues, per BCG's AI Radar 2026 survey of roughly 2,400 executives worldwide.", "speaker": "Tobias Schmidt", "type": "data_point", "entities": ["BCG", "AI Radar 2026"], "conviction": "high", "so_what": "A concrete, fast-rising AI budget baseline (as a share of revenue) that investors can use to size the enterprise-AI TAM and track spend acceleration.", "quote": "companies expect to double their AI investment this year to 1.7% of revenues", "locator": "AI Remains Under the Radar for Major Decisions", "quote_verified": true}, {"claim": "Most enterprise AI investment is aimed at operations, process, and task automation, and fewer than one-fifth of leaders rank decision making among their top AI investment priorities.", "speaker": "Tobias Schmidt", "type": "data_point", "entities": ["AI Radar 2026"], "conviction": "high", "so_what": "Signals an underinvested, high-value segment (decision support) where a vendor moving early could capture outsized share before the market crowds in.", "quote": "Fewer than one-fifth of leaders ranked decision making among their top AI investment priorities.", "locator": "AI Remains Under the Radar for Major Decisions", "quote_verified": true}, {"claim": "Around 42% of CEOs report personally using AI agents on a weekly basis, showing executive adoption is not the bottleneck to using AI for decisions.", "speaker": "Tobias Schmidt", "type": "data_point", "entities": ["CEOs", "AI Radar 2026"], "conviction": "high", "so_what": "High personal CEO usage de-risks top-down adoption; the constraint is product/data, not executive willingness—watch for tooling that converts this habit into enterprise deployments.", "quote": "some 42% of CEOs report they're now personally using agents weekly", "locator": "AI Remains Under the Radar for Major Decisions", "quote_verified": true}, {"claim": "Even among companies that call decision making a top strategic AI application, actual investment in AI agents for it is the lowest of any topic at just 14%, exposing a stated-priority-versus-spending gap.", "speaker": "Tobias Schmidt", "type": "contrarian", "entities": ["AI Radar 2026"], "conviction": "high", "so_what": "A say-do gap this wide flags a whitespace market—the highest-consequence use case is the least funded, implying first-mover advantage for whoever productizes it.", "quote": "the actual investment in AI agents is the lowest of any topic, at just 14%", "locator": "AI Remains Under the Radar for Major Decisions", "quote_verified": true}, {"claim": "AI to date has improved how work gets done but not how critical decisions get made, leaving the most consequential, cross-functional, capital-deploying decisions largely untouched by AI.", "speaker": "Tobias Schmidt", "type": "thesis", "entities": ["AI"], "conviction": "high", "so_what": "Frames the next value frontier as decision quality rather than productivity—an investor lens for separating commoditized automation plays from durable strategic-decision platforms.", "quote": "while it has improved how work gets done, it hasn't yet improved how critical decisions get made", "locator": "AI Remains Under the Radar for Major Decisions", "quote_verified": true}]}, {"theme": "Decision agents as a new agent class", "insights": [{"claim": "There are two basic AI agent types: execution agents that automate operational tasks with little human intervention, and decision agents that synthesize inputs, evaluate alternatives, and generate recommendations from explicit business logic.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["execution agents", "decision agents"], "conviction": "high", "so_what": "A clean taxonomy to categorize AI vendors—execution vs. decision—helping investors distinguish crowded automation from the emergent, higher-value decision layer.", "quote": "There are essentially two basic types of AI agents.", "locator": "What Are Decision Agents—and What Makes Them Valuable?", "quote_verified": true}, {"claim": "Decision agents are differentiated by operating at the point of choice rather than the point of execution, positioning them at the strategic decision-making layer of the enterprise.", "speaker": "Tobias Schmidt", "type": "thesis", "entities": ["decision agents"], "conviction": "high", "so_what": "The 'point of choice' framing is the moat thesis—vendors that own the decision moment sit closer to capital allocation and are harder to displace than task automators.", "quote": "they operate not at the point of execution but at the point of choice", "locator": "What Are Decision Agents—and What Makes Them Valuable?", "quote_verified": true}, {"claim": "Decision agents create value in three ways: establishing a common evidence base across departments, developing and evaluating scenarios in real time, and limiting bias by grounding recommendations in shared data and explicit business logic.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["decision agents"], "conviction": "high", "so_what": "A three-part value framework to score any decision-support tool—products missing real-time scenario updates or bias reduction are weaker bets.", "quote": null, "locator": "Decision agents can support individual managers or entire functional teams", "quote_verified": false}, {"claim": "Realizing full value from decision agents requires codifying individuals' tacit knowledge into machine-usable form alongside structured and unstructured data from emails and spreadsheets.", "speaker": "Tobias Schmidt", "type": "causal", "entities": ["decision agents"], "conviction": "medium", "so_what": "The dependency on codifying tacit knowledge is a real adoption friction and a services/consulting revenue hook—watch which vendors solve knowledge capture, not just data plumbing.", "quote": "individuals' knowledge—which needs to be codified in order for the agents to perform most effectively", "locator": "They establish a common evidence base", "quote_verified": true}, {"claim": "By grounding outputs in shared data and explicit logic, decision agents reduce asymmetric preparation, unchallenged assumptions, and selective inputs, making tradeoffs transparent and recommendations traceable without eliminating subjective judgment.", "speaker": "Tobias Schmidt", "type": "causal", "entities": ["decision agents"], "conviction": "medium", "so_what": "Bias reduction and auditability are governance selling points that matter for board and regulatory acceptance—differentiators in enterprise procurement.", "quote": "they make tradeoffs more transparent, recommendations more objective, and outcomes easier to trace", "locator": "They limit bias", "quote_verified": true}]}, {"theme": "Boardroom and executive-committee deployment", "insights": [{"claim": "The most underappreciated yet most valuable use of decision agents is in executive committee meetings handling integrated business planning, portfolio investment allocation, and market-entry decisions.", "speaker": "Tobias Schmidt", "type": "thesis", "entities": ["decision agents", "executive committees"], "conviction": "high", "so_what": "Points investors at the specific high-stakes committee workflows where decision-agent demand will concentrate—capex allocation and market entry are the beachhead use cases.", "quote": "Perhaps the most underappreciated, yet most valuable, use of decision agents is in meetings of executive committees.", "locator": "Transforming Boardroom Decision Making", "quote_verified": true}, {"claim": "A custom decision agent can act as a boardroom team member—an 'omniscient chief of staff with supercomputing powers'—arriving with a preliminary memo-level assessment that it updates live as discussion unfolds.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["decision agents"], "conviction": "high", "so_what": "The 'AI board member' metaphor signals a product category (persistent, meeting-embedded agents) distinct from chatbots—watch for enterprise pricing tied to seat-in-the-room positioning.", "quote": "an omniscient chief of staff with supercomputing powers", "locator": "Transforming Boardroom Decision Making", "quote_verified": true}, {"claim": "In supply chain planning, key functions run on conflicting incentives—sales pushes volume growth, manufacturing optimizes utilization, and procurement seeks cost efficiency and supply continuity—with none having a clear view of the others' constraints.", "speaker": "Tobias Schmidt", "type": "causal", "entities": ["sales", "manufacturing", "procurement", "supply chain"], "conviction": "high", "so_what": "Identifies the misaligned-incentive problem a digital-twin agent is sold to solve; the value prop is only as strong as its ability to reconcile these functional silos.", "quote": "Sales, for instance, pushes volume growth, while manufacturing optimizes for utilization, and procurement seeks cost efficiency and supply continuity.", "locator": "Supply Chain Management", "quote_verified": true}, {"claim": "A decision agent can act as a digital twin of the supply chain, mapping responses against supplier cost curves and recalculating scenarios immediately as leaders adjust volume assumptions and supplier choices mid-meeting.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["decision agents", "supply chain"], "conviction": "high", "so_what": "Real-time recomputation against cost curves is the concrete capability buyers will test—vendors lacking live scenario recalculation are undifferentiated.", "quote": "It then helps users assess the various scenarios and evaluate the tradeoffs, offering cost implications and feasibility. And all this analysis is performed on the spot", "locator": "Supply Chain Management", "quote_verified": true}, {"claim": "Traditional executive-committee supply chain prep extends into weeks and still leaves leaders without an integrated view of options, whereas decision agents can save those weeks with a consistently maintained, codified data foundation.", "speaker": "Tobias Schmidt", "type": "causal", "entities": ["decision agents", "supply chain"], "conviction": "high", "so_what": "The 'save weeks' claim is the ROI hook for pilots—time-to-decision compression is the quantifiable benefit to underwrite investment.", "quote": "Decision agents, then, allow leaders to save weeks", "locator": "Supply Chain Management", "quote_verified": true}, {"claim": "For product innovation, a decision agent combines external competitive intelligence with internal feasibility and financial data to rank potential features, letting leaders adjust criteria weightings live while the agent updates the ranking.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["decision agents", "product committees"], "conviction": "high", "so_what": "Feature-prioritization is a second concrete workflow with clear inputs—useful for identifying which enterprise functions adopt decision agents first.", "quote": null, "locator": "Product Innovation", "quote_verified": false}, {"claim": "For risk intelligence, a decision agent scores each risk against a common metric like contribution margin and calculates the breakeven point at which active mitigation costs less than the expected impact if the risk materializes.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["decision agents", "contribution margin", "risk management"], "conviction": "high", "so_what": "Translating heterogeneous risks into a single financial metric and a mitigation breakeven is the killer feature for risk committees—a differentiator to look for in risk-AI vendors.", "quote": "calculates the point at which active mitigation is worth the cost versus the cost of the impact if the risk materializes", "locator": "Risk Intelligence Management", "quote_verified": true}]}, {"theme": "Implementation, data, and governance preconditions", "insights": [{"claim": "BCG advises starting decision-agent adoption with a pilot on one cross-functional, high-friction decision process such as integrated business planning, capex allocation, or new-market entry.", "speaker": "Tobias Schmidt", "type": "framework", "entities": ["BCG X", "Executive Decision Agent"], "conviction": "high", "so_what": "A single-process pilot is the go-to-market wedge; investors can gauge traction by how many pilots convert to enterprise-wide rollouts.", "quote": "Companies should choose one cross-functional, high-friction decision process to test, such as integrated business planning, capex allocation, or new-market entry.", "locator": "Getting Started", "quote_verified": true}, {"claim": "Without a structured cross-functional data layer—a shared data lake or consolidation layer with a semantic layer holding codified business logic and ontology—even the most sophisticated agent logic yields unreliable results.", "speaker": "Tobias Schmidt", "type": "causal", "entities": ["data lake", "semantic layers", "ontology"], "conviction": "high", "so_what": "Data infrastructure is the binding constraint on decision-agent value—strengthens the investment case for the underlying data-layer and semantic-layer tooling that agents depend on.", "quote": "Without this foundational layer, even the most sophisticated agent logic will yield unreliable results.", "locator": "Ensure the right data infrastructure is in place", "quote_verified": true}, {"claim": "Decision agents support judgment but are no substitute for accountability, so companies must set governance assigning domain owners to each data set and business logic and defining data access and quality standards.", "speaker": "Tobias Schmidt", "type": "thesis", "entities": ["governance", "decision agents"], "conviction": "high", "so_what": "Governance and clear data ownership are adoption prerequisites—buyers without them stall, a signal for where implementation-services revenue accrues.", "quote": "While agents support judgment, they are no substitute for accountability.", "locator": "Establish a governance system", "quote_verified": true}, {"claim": "Companies should not wait for perfect data because imperfect data is still usable and AI's iterative ability means it improves over time.", "speaker": "Tobias Schmidt", "type": "thesis", "entities": ["decision agents"], "conviction": "medium", "so_what": "The 'don't wait for perfection' stance is a nudge to accelerate deployment—reduces the perceived barrier to entry and supports faster market adoption.", "quote": "there is no reason to wait for perfection", "locator": "Recognize the inherent constraints of data", "quote_verified": true}, {"claim": "Decision agents expose data and process gaps and reveal where accountability is unclear, so their adoption will challenge existing organizational processes and structures rather than slot in cleanly.", "speaker": "Tobias Schmidt", "type": "causal", "entities": ["decision agents"], "conviction": "medium", "so_what": "Organizational disruption is a hidden adoption cost and change-management dependency—implementation timelines may run longer than the technology alone implies.", "quote": "They also expose data and process gaps and reveal where accountability is unclear.", "locator": "Expect adoption to challenge existing processes and structures", "quote_verified": true}, {"claim": "Decision agents should be treated as a structural, compounding investment—unlike other agents they create reusable foundations that make future generations of agents faster and cheaper.", "speaker": "Tobias Schmidt", "type": "thesis", "entities": ["decision agents"], "conviction": "high", "so_what": "The compounding-foundation thesis implies increasing returns and lock-in for early adopters—an argument for durable advantage that investors can test against actual reuse.", "quote": "that will also make future generations of agents faster and cheaper", "locator": "Regard decision agents as a structural investment, not just another initiative", "quote_verified": true}, {"claim": "BCG X markets a productized 'Executive Decision Agent' and is deploying it with clients, indicating decision agents have moved from concept to a commercial offering with first-mover client adoption.", "speaker": "Tobias Schmidt", "type": "data_point", "entities": ["BCG X", "Executive Decision Agent"], "conviction": "high", "so_what": "A named commercial product plus 'first movers' claim signals the category is live and monetizing—track BCG X client wins as a leading indicator for the segment.", "quote": "In working with clients to launch the Executive Decision Agent by BCG X", "locator": "Getting Started", "quote_verified": true}, {"claim": "Closing the gap between AI investment and strategic decision making will be the source of the next competitive advantage, one BCG says will compound over time.", "speaker": "Tobias Schmidt", "type": "prediction", "entities": ["decision agents", "AI"], "conviction": "high", "so_what": "The core investment thesis of the piece—positions decision-quality AI, not productivity AI, as the durable edge; a lens for picking winners in enterprise AI.", "quote": "Closing that gap will be the source of the next competitive advantage", "locator": "How familiar is this?", "quote_verified": true}]}], "insight_total": 25, "top_entities": ["decision agents", "BCG", "BCG X", "Executive Decision Agent", "AI Radar 2026", "execution agents", "CEOs", "supply chain", "contribution margin", "semantic layers"], "source_meta": {"author": "https://www.bcg.com/about/people/experts/tobias-schmidt", "word_count": 2052, "paywalled": false}}, {"record_id": "09ffb3d7287ee28b", "source_type": "concepts", "source_name": "Capital Economics", "source_url": "https://www.capitaleconomics.com/case-study/economic-development-board-mauritius-demonstrating-mauritius-role-africas-sustainable", "title": "Economic Development Board of Mauritius – Demonstrating Mauritius’ Role in Africa’s Sustainable Growth", "published_date": "", "language": "en", "processed_at": "2026-07-07T16:46:57Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics"], "gist": "A Capital Economics case study on a commissioned report quantifying Mauritius' role as a gateway for sustainable investment into Africa, positioning the island as a facilitator of continental development amid rising scrutiny of offshore financial centres.", "themes": [{"theme": "Mauritius as Africa investment gateway", "insights": [{"claim": "Mauritius is positioned as a gateway and critical facilitator for sustainable investment flowing into Africa via financial intermediation and investment facilitation.", "speaker": "Capital Economics", "type": "thesis", "entities": ["Mauritius", "Africa", "Economic Development Board of Mauritius"], "conviction": "high", "so_what": "Investors channeling capital into African markets should watch Mauritius as a structuring hub whose legitimacy is being actively reinforced in policy circles.", "quote": "quantifying and evidencing the country's role as a gateway for sustainable investment into Africa", "locator": "Executive Summary", "quote_verified": true}, {"claim": "Offshore financial centres like Mauritius face growing international scrutiny, creating pressure to credibly demonstrate real economic value delivered to host regions.", "speaker": "Capital Economics", "type": "causal", "entities": ["Mauritius", "offshore financial centres", "Africa"], "conviction": "high", "so_what": "Reputational and regulatory risk around offshore centres is a live headwind; jurisdictions that can evidence development impact may retain flows others lose.", "quote": "especially amid growing international scrutiny of offshore financial centres", "locator": "Challenge", "quote_verified": true}]}, {"theme": "Report reach and policy influence", "insights": [{"claim": "A commissioned economic report is being used in high-level policy discussions with African governments, the OECD, and the European Commission to reinforce Mauritius' role in African development.", "speaker": "Capital Economics", "type": "data_point", "entities": ["OECD", "European Commission", "Mauritius", "Africa"], "conviction": "high", "so_what": "OECD and EC engagement signals institutional acceptance of Mauritius' facilitator narrative, lowering the odds of punitive delisting or blacklisting.", "quote": "a key resource in policy discussions with African governments, the OECD, and the European Commission", "locator": "Executive Summary", "quote_verified": true}, {"claim": "The engagement produced a report exceeding 100 pages with original estimates of Mauritius' economic impact in Africa, built partly on a large-scale survey of Mauritius-based management companies plus in-country fieldwork and stakeholder interviews.", "speaker": "Capital Economics", "type": "anecdote", "entities": ["Capital Economics", "Mauritius", "Africa"], "conviction": "medium", "so_what": "The underlying survey and impact estimates are a potential primary-data source on Mauritius-Africa capital intermediation for anyone modeling the corridor.", "quote": "The final report, exceeding 100 pages, included original estimates of Mauritius’ economic impact in Africa", "locator": "Solution", "quote_verified": true}]}], "insight_total": 4, "top_entities": ["Mauritius", "Africa", "Economic Development Board", "Capital Economics", "OECD", "European Commission", "offshore financial centres"], "source_meta": {"author": "", "word_count": 261, "paywalled": false}}, {"record_id": "62a1a6254613302e", "source_type": "concepts", "source_name": "Capital Economics", "source_url": "https://www.capitaleconomics.com/case-study/uk-department-culture-media-sport-shaping-ai-policy-through-business-adoption-modelling", "title": "UK Department for Culture, Media & Sport – Shaping AI Policy Through Business Adoption Modelling", "published_date": "", "language": "en", "processed_at": "2026-07-07T16:46:57Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Macro"], "gist": "Capital Economics built a bespoke survey-plus-spreadsheet model of current and projected AI adoption by UK businesses for DCMS, producing the evidence base that underpins UK government AI policy and highlighting market potential, adoption barriers, and policy levers.", "themes": [{"theme": "AI adoption evidence gap", "insights": [{"claim": "Data on AI adoption by UK businesses was fragmented and inconsistent, so the UK government lacked a comprehensive quantitative view of current trends and future potential before commissioning bespoke modelling.", "speaker": "Capital Economics", "type": "causal", "entities": ["DCMS", "UK", "AI"], "conviction": "high", "so_what": "Signals that official AI-adoption baselines were thin as of the engagement, so early proprietary datasets on business AI uptake carry outsized informational value.", "quote": "With fragmented and inconsistent data on AI adoption, DCMS required a comprehensive, quantitative view of current trends and future potential.", "locator": "Challenge", "quote_verified": true}]}, {"theme": "Modelling methodology", "insights": [{"claim": "A credible view of national AI demand was built by combining a literature review, official statistics and prior surveys, expert consultation, and a bespoke new business survey into a custom spreadsheet model quantifying current and projected AI demand across UK businesses.", "speaker": "Capital Economics", "type": "framework", "entities": ["AI", "UK", "DCMS"], "conviction": "high", "so_what": "Shows the practical toolkit for sizing AI adoption when clean data is absent; investors sizing AI TAM can mirror this triangulation approac // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
