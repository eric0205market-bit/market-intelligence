const CAT_COLORS = {
  "macro": "#e24b4a", "credit": "#378add", "positioning": "#ef9f27",

function catKey(cat) { return cat.replace(/[^a-zA-Z]/g, '').toLowerCase(); }
function badgeClass(cat) { return 'badge-' + catKey(cat); }
function tintClass(cat) { return 'tint-' + catKey(cat); }

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

let activeCat = 'all';
let activeUrg = 'all';
let activeSrc = null;

function init() {
  document.getElementById('headerMeta').textContent =
    META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources · Window: ' + META.windowStart + ' → ' + META.windowEnd;

  // Category pills
  const cats = ['all', ...new Set(ITEMS.map(i => i.cat))];
  const catDiv = document.getElementById('catFilters');
  cats.forEach(function(c) {
    var count = c === 'all' ? ITEMS.length : ITEMS.filter(i => i.cat === c).length;
    var label = c === 'all' ? 'All (' + count + ')' : c + ' (' + count + ')';
    var pill = document.createElement('span');
    pill.className = 'pill' + (c === 'all' ? ' active' : '');
    pill.setAttribute('data-cat', c);
    pill.textContent = label;
    pill.onclick = function() { activeCat = c; activeSrc = null; renderFilter(); };
    catDiv.appendChild(pill);
  });

  // Urgency pills
  const urgDiv = document.getElementById('urgFilters');
  [
    { key: 'all', label: 'All Urgency', emoji: '' },
    { key: 'act', label: '🔴 Act Now', emoji: '' },
    { key: 'deep', label: '🔵 Deep', emoji: '' },
    { key: 'watch', label: '🟡 Watch', emoji: '' }
  ].forEach(function(u) {
    var count = u.key === 'all' ? ITEMS.length : ITEMS.filter(i => i.urgency === u.key).length;
    var pill = document.createElement('span');
    pill.className = 'pill' + (u.key === 'all' ? ' active' : '');
    pill.setAttribute('data-urgency', u.key);
    pill.textContent = u.label + ' (' + count + ')';
    pill.onclick = function() { activeUrg = u.key; activeSrc = null; renderFilter(); };
    urgDiv.appendChild(pill);
  });

  // Cards
  var container = document.getElementById('cardsContainer');
  ITEMS.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'card' + (item.charts && item.charts.hot ? ' hot-chart' : '');
    card.id = 'card-' + item.id;

    var urgEmoji = item.urgency === 'act' ? '🔴' : (item.urgency === 'deep' ? '🔵' : '🟡');
    var chartIcon = item.charts && item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var color = CAT_COLORS[item.cat] || '#888';

    var header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML =
      '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
      '<span>' + urgEmoji + '</span>' +
      '<span class="source-badge ' + badgeClass(item.cat) + '">' + item.cat + '</span>' +
      '<span class="card-title">' + chartIcon + ' ' + item.title + '</span>';
    header.onclick = function() {
      var body = document.getElementById('body-' + item.id);
      body.classList.toggle('open');
    };

    var body = document.createElement('div');
    body.className = 'card-body';
    body.id = 'body-' + item.id;
    body.innerHTML =
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + item.idea + '</div>' +
      '<div class="section-label">My Angle</div>' +
      '<div class="angle-box ' + tintClass(item.cat) + '">' + item.angle + '</div>' +
      '<div class="tweets">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label a">TWEET A</div>' +
          '<div class="tweet-text">' + item.tweetA + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label b">TWEET B</div>' +
          '<div class="tweet-text">' + item.tweetB + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      (item.charts && item.charts.count > 0 ? '<div class="charts-note">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>' : '') +
      (item.link ? '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>' : '');

    card.appendChild(header);
    card.appendChild(body);
    container.appendChild(card);
  });

  // Session report
  var reportHtml = '<strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '<br>' +
    META.emailsRead + ' of ' + META.emailsInWindow + ' emails read · ' + META.itemsExtracted + ' items extracted<br><br>' +
    '<strong>Included Sources:</strong><br>';
  META.includedSources.forEach(function(s) {
    reportHtml += '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> (' + s.items + ' item' + (s.items > 1 ? 's' : '') + ')<br>';
  });
  reportHtml += '<br><strong>Skipped Sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    reportHtml += s.name + ' — ' + s.reason + '<br>';
  });
  document.getElementById('reportInner').innerHTML = reportHtml;
}

function renderFilter() {
  // Update pill states
  document.querySelectorAll('.pill[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-cat') === activeCat);
  });
  document.querySelectorAll('.pill[data-urgency]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-urgency') === activeUrg);
  });

  ITEMS.forEach(function(item) {
    var card = document.getElementById('card-' + item.id);
    var catMatch = activeCat === 'all' || item.cat === activeCat;
    var urgMatch = activeUrg === 'all' || item.urgency === activeUrg;
    var srcMatch = activeSrc === null || item.source.indexOf(activeSrc) !== -1;
    card.classList.toggle('hidden', !(catMatch && urgMatch && srcMatch));
  });
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderFilter();
  // Expand matching cards
  ITEMS.forEach(function(item) {
    if (item.source.indexOf(name) !== -1) {
      document.getElementById('body-' + item.id).classList.add('open');
    }
  });
}

function toggleReport() {
  var inner = document.getElementById('reportInner');
  var toggle = document.querySelector('.report-toggle');
  inner.classList.toggle('open');
  toggle.textContent = inner.classList.contains('open') ? '▼ Session Report' : '▶ Session Report';
}

init();
</script>
