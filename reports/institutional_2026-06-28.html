<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Institutional Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #7c3aed;          /* purple — institutional report accent */
  --accent-soft: #f3eefc;
  --divergence: #d94052;      /* divergence red */
  --consensus: #15803d;       /* consensus green */
  --yellow: #fff5b3;

  /* category colors (institutional schema: rates, growth, fx, equities,
     credit, crypto, energy, commodities, geopolitics, ai_tech, em) */
  --cat-rates: #2563eb;
  --cat-growth: #d97706;
  --cat-fx: #0891b2;
  --cat-equities: #15803d;
  --cat-credit: #be185d;
  --cat-crypto: #8b5cf6;
  --cat-energy: #dc2626;
  --cat-commodities: #ea580c;
  --cat-geopolitics: #b91c1c;
  --cat-ai_tech: #4f46e5;
  --cat-em: #059669;
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 12px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR (top: period + coverage) */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--accent); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 10px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* THEME CARD (Section A) */
.theme { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.theme:last-child { border-bottom: none; }
.theme-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
              flex-wrap: wrap; }
.theme-title { font-weight: 600; font-size: 14.5px; }
.theme-stance { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 10px; }
@media (min-width: 720px) { .theme-stance { grid-template-columns: 1fr 1fr; } }
.theme-line { font-size: 13px; padding: 8px 10px; border-radius: 4px;
              border-left: 3px solid var(--border); background: #fafafa; line-height: 1.5; }
.theme-line.consensus { border-left-color: var(--consensus); background: #f0f9f3; }
.theme-line.divergence { border-left-color: var(--divergence); background: #fdf6f7; }
.theme-line .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px;
                   text-transform: uppercase; letter-spacing: .06em;
                   color: var(--text-3); display: block; margin-bottom: 2px; }
.theme-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
               border-left: 2px solid var(--border-light); }
.theme-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-source { font-weight: 600; color: var(--accent); }
a.item-source { text-decoration: none; }
a.item-source:hover { text-decoration: underline; }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-title { font-weight: 600; font-size: 14px; margin: 4px 0 6px; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }

/* DEEP READS (Section C) — purple left border to mark flagship long-form */
.section-deepreads .item-card { border-left: 4px solid var(--accent); background: var(--accent-soft); }

/* HOUSE VIEWS — compact one-line-per-source list */
.hv-row { display: flex; gap: 10px; align-items: baseline;
          padding: 6px 16px; border-bottom: 1px solid var(--border-light);
          font-size: 13px; }
.hv-row:last-child { border-bottom: none; }
.hv-name { font-weight: 600; color: var(--accent); min-width: 180px;
           text-decoration: none; }
.hv-name:hover { text-decoration: underline; }
.hv-stance { color: var(--text); flex: 1; }

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 110px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .hv-row { flex-direction: column; gap: 2px; }
  .hv-name { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>

<script>
const REPORT_DATA = {"report_type": "INSTITUTIONAL RESEARCH", "collected_at": "2026-06-28T02:01:25.000Z", "period": {"lookback_days": 10, "from": "2026-06-18", "to": "2026-06-28"}, "input_stats": {"total_articles": 439, "sources_present": 59, "after_filter": 185}, "summary": "**Rates / Warsh Fed:** Consensus is **hold at 3.50–3.75%** (all major houses), but the FOMC hawkishly revised core PCE to **3.3% for 2026** and 9 of 18 members now see a **rate hike before year-end**. Sharpest split: **Franklin Templeton** and **KKR** call Warsh \"most hawkish since Volcker\" and warn of tighter-for-longer, while **Standard Chartered** argues Warsh is talking tough precisely to *avoid* hiking — oil's 35% decline from its April peak should do the tightening work. **UBS** sides with Standard Chartered: a hike remains unlikely.\n\n**Oil / Iran / Strait of Hormuz:** Consensus is that Brent — which peaked at **~$118 in April** and has since fallen to **~$75** — has largely priced the US-Iran MoU. Sharpest divergence: **Goldman** and **Wood Mackenzie** see oil grinding lower toward pre-conflict **$60s**, while **Man Group** warns supply chains need **3 days to heal for every 1 day the Strait was closed** (4 months closed = 6+ months of disruption into early 2027), and **Brookings** flags Iran's new **Strait Authority toll-taking** as a precedent-breaking risk.\n\n**US Equities:** Broad consensus that the rally can continue — **Goldman** is \"in buy-dip mode\" (record 34bn shares traded last Thursday), **Barclays Q3 2026** keeps OW equities over bonds, **UBS** says equities can move higher. Key dissent: **BNP Paribas** flags the US consumer as the critical vulnerability — Q1 PCE revised down to **0.4%** (vs 2% long-run avg), and retail sales running below Q1 levels.\n\n**AI / Tech:** Near-universal bullishness on AI's long runway — **BNPP AM**, **Vanguard** (3% US GDP in 2027, above consensus), **Goldman** (HALO stocks). The tactical divergence: **BNP Paribas** and **Gavekal** note froth in Korean/EM tech (Nasdaq -2% to -4% from recent highs, leveraged ETF bets getting unwound), while **Vanguard** calls AI's capex trajectory comparable to the 19th-century railroad buildout.\n\n**EM:** **PIMCO**, **Goldman**, and **JPMorgan** all turning more constructive on EM. Goldman's HALO basket (capital-intensive EM) is up **+115% since late 2025** vs +7% for capital-light, trading at a 20% valuation discount with stronger earnings momentum. **PIMCO** calls fragmentation a structural tailwind for EM diversification and says Sharpe ratios are back in EM credit.\n\n**Crypto:** **Galaxy Digital** reports total crypto market cap at **$2.14 trillion** (-4.6% WoW); BTC dominance 56.1%; ETH Foundation cut 20% staff and 40% budget as Ethereum enters its \"third iteration\". **CoinShares** notes BTC daily volatility has compressed to historic lows (2.24% in 2025). Key risk: Trump's quantum computing executive orders create a Q-Day countdown threat to blockchain encryption.\n\n**Energy / Clean Power:** Structural energy security theme backed by **BlackRock** and **BNP Paribas** — two geopolitical shocks in 4 years, AI data centers consuming as much power as **100,000 households**, and renewable capex surging. **Wood Mackenzie** reports US solar and power additions running above 2026 forecast, and flags geothermal at a commercial inflection point.", "sections": {"A_debates": [{"theme": "Rates & Central Banks — The Warsh Fed", "category": ["rates"], "consensus": "The Federal Reserve under new Chair Kevin Warsh unanimously held rates at 3.50–3.75% at the June FOMC meeting, the fourth consecutive hold. However, the hawkish tone was unmistakable: the FOMC stripped forward guidance entirely, revised 2026 core PCE estimates sharply higher to 3.3% (2027: 2.5%), and 9 of 18 members' Dot Plots now project at least one rate hike before year-end. Warsh dismissed the Dot Plot as a policy tool ('it's not helpful') and announced five task forces reviewing the inflation framework, balance sheet policy, communications, data sources, and productivity/AI. Globally, the ECB raised rates on June 11, the Bank of Japan hiked 25bps to 1% (highest since 1995), while the Bank of England held at 3.75% with 2 of 9 members voting for a hike. Capital Economics groups central banks into four camps: defensive hikers that can now hold (Indonesia, Turkey), countries ready to cut (Hungary, Israel, Brazil), those with more work to do (BoJ, RBA), and those in 'wait and assess' mode (Fed, ECB, BoE).", "divergence": "The critical split is whether Warsh will ultimately hike or whether his hawkishness is strategic positioning. Franklin Templeton (Sonal Desai) and KKR call Warsh 'the most hawkish Fed chair since Paul Volcker' — Desai notes Warsh said 'inflation is a choice. You bet it is. And this committee will deliver price stability,' and that he announced a 'constitutional convention' on the Fed's frameworks rather than a policy pivot; KKR's McVey argues this represents a genuine regime change toward sustainably higher inflation expectations and tighter financial conditions. Amundi reads the same meeting and concludes short-term US yields rose correctly (pricing in more risk), but that long-term Treasuries actually rallied because Warsh's credibility on inflation is inflation-anchor-positive. By contrast, Standard Chartered argues that Warsh is deliberately talking tough to tighten financial conditions *so he doesn't have to actually hike* — with Brent oil down 35% from its April peak, easing the inflation path, Standard Chartered expects Warsh to hold all year. UBS agrees that a rate hike 'remains unlikely' and that Warsh's hawkishness is more rhetorical than policy. PIMCO is more agnostic but warns that greater monetary policy uncertainty under Warsh will likely lead to tighter financial conditions regardless of what the Fed does.", "items": [{"source": "franklin_templeton", "name": "Franklin Templeton (Sonal Desai)", "thesis": "The Warsh Fed represents a return to orthodoxy — the most hawkish positioning since Volcker. Warsh said 'inflation is a choice' and 'we've missed for five years, we're going to fix that.' Unlike Powell who acknowledged a cruel stagflationary trade-off, Warsh rejects that framing. Western Asset notes that 9 of 18 FOMC members now project a 2026 hike, median PCE revised to 3.3% for 2026. Five task forces signal a 'constitutional convention' on the Fed's frameworks. No forward guidance is now the policy — throwback to Greenspan.", "url": "https://www.franklintempleton.com/articles/2026/fixed-income/on-my-mind-the-warsh-fed-return-to-orthodoxy", "images": []}, {"source": "kkr", "name": "KKR (Henry McVey / Lauren Goodwin)", "thesis": "Warsh's inaugural FOMC was a 'constitutional convention on the Fed' — not new legislation but a comprehensive review. Warsh bought time via five task forces while signaling a return to Greenspan-style, market-reading-data approach vs. Powell/Yellen who favored direct communication. KKR's Regime Change thesis (inflation persistently above 2%) aligns with Warsh's intent to 'bend the curve' of expectations. The June meeting represents an important potential turning point where the chair seeks to attack regime-change inflation.", "url": "https://www.kkr.com/insights/flash-macro-fomc-update-june-2026", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "thesis": "Warsh's hawkishness is intentional financial-conditions management — he is talking tough so he does NOT have to actually hike. The 35% plunge in US crude from April's peak toward pre-conflict levels will ease US inflation in coming months, allowing Warsh to hold rates this year. The 10-year Treasury has already dropped 30bps since May's peak as oil prices fell. Expect the Fed to hold; a pause caps the USD and supports gold and risk assets.", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-26-6-2026/", "images": []}, {"source": "ubs", "name": "UBS", "thesis": "A Fed rate hike remains unlikely. UBS views Warsh's hawkish signals as necessary messaging for credibility purposes but not a blueprint for an actual hike path this year. Equities can still move higher despite the tech sell-off triggered by hawkish press conference expectations. Oil's fall reduces the inflation trajectory materially.", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/daily/2026-06-23-why-we-think-a-fed-hike-remains-unlikely.html", "images": []}, {"source": "amundi", "name": "Amundi", "thesis": "New Fed era under Warsh: prioritize price stability to preserve credibility, while creating task forces to adapt monetary policy. Short-term US yields rose post-FOMC (more hike risk priced in); long-term Treasuries got a boost (Warsh is more sensitive to inflation expectations → better anchoring). The focus on inflation is paramount; producer prices already rising, core inflation could follow. Balance sheet task force is the most consequential given the Fed's enormous size.", "url": "https://research-center.amundi.com/article/new-fed-era-under-warsh", "images": []}, {"source": "pimco", "name": "PIMCO", "thesis": "Greater monetary policy uncertainty under Warsh will likely lead to tighter financial conditions globally, regardless of whether the Fed actually hikes. PIMCO sees this as a reason to favor global bond diversification — higher yields in the US and internationally create new opportunities for alpha. Duration risk should be managed carefully; PIMCO prefers quality spread products.", "url": "https://www.pimco.com/us/en/insights/will-greater-monetary-policy-uncertainty-lead-to-tighter-financial-conditions", "images": []}, {"source": "capital_economics", "name": "Capital Economics (Neil Shearing)", "thesis": "Global central banks diverged sharply at June meetings — ECB and BoJ hiked, Fed and BoE held with hawkish messaging. The key swing factor is whether the US-Iran peace holds and the Strait reopens. Capital Economics divides CBs into four groups: (1) defensive hikers no longer needed (Indonesia, Turkey); (2) cuts incoming (Hungary, Israel, Brazil, Russia, Colombia); (3) more work to do (BoJ — expects hikes to ~2% by end 2027; RBA); (4) wait and assess (Fed, ECB, BoE).", "url": "https://www.capitaleconomics.com/blog/thinking-through-central-banks-next-moves", "images": []}]}, {"theme": "Oil / Energy / Iran — Strait of Hormuz", "category": ["energy", "commodities", "geopolitics"], "consensus": "Brent crude peaked at approximately $118/barrel in April during the US-Iran war, which closed the Strait of Hormuz (through which ~20% of global oil and LNG passes) for approximately four months. The US-Iran interim Memorandum of Understanding, signed around June 14, established a 60-day ceasefire framework with targeted sanctions relief, an unfreezing of Iranian assets, and a reconstruction fund. Brent has since fallen to approximately $75 (as of June 26), down 35%+ from the peak but still above the ~$60 pre-conflict level. Most major houses believe the MoU is substantially priced in and oil will continue to drift lower. The ECB notes the oil shock created a material headwind for euro area growth; Oxford Economics reports global freight rates still elevated (air +17%, ocean +40% vs pre-war avg); the Strait traffic remains below 20% of pre-war levels as of late June.", "divergence": "Goldman's Dortmans says 'the bulk of price movements are probably priced in' and oil will 'grind lower' — he sees a healthier equilibrium around mid-$70s with potential for further decline. Wood Mackenzie is directionally similar, arguing that while the oil-price 'bubble has burst,' the exact floor depends on how quickly Iranian supply is normalized. Man Group presents the most bearish read on energy supply security: for every day the Strait was closed, the global energy supply chain requires three days to normalize — meaning four months of closure translates to twelve months of supply disruption potentially extending into early 2027; they warn natural gas markets are particularly vulnerable if winter demand spikes before inventories are replenished and that metals are navigating a narrow path between cyclical recovery and stagflation. Brookings presents a structural disruption argument: Iran has established a Persian Gulf Strait Authority to collect tolls on vessels traveling through the Strait (challenging international maritime law), mines remain in the Strait and will take months to remove, and Iran is now in a stronger geopolitical position than before the war — meaning access to chokepoints is now politically conditioned rather than governed by open-transit norms. UBS is more measured, calling oil's path 'not a one-way Strait' and advising investors not to assume a straight-line return to pre-conflict prices.", "items": [{"source": "goldman_sachs", "name": "Goldman Sachs (Jerome Dortmans)", "thesis": "The bulk of price movements from the US-Iran deal are already priced in. Brent has fallen from ~$118 to ~$76 (as of June 18). Oil market has entered a 'grinding lower' paradigm — a cooled-off environment that will find a healthier balance. Not a straight-line decline (news headlines may cause temporary spikes), but the direction is toward lower prices.", "url": "https://www.goldmansachs.com/insights/articles/why-oil-prices-could-grind-lower-amid-the-us-iran-deal", "images": []}, {"source": "man_group", "name": "Man Group", "thesis": "The relief rally may have been premature. For every day the Strait was closed, supply chains require 3 days to normalize — 4 months of closure = 12 months of disruption into early 2027. Physical shortages will persist as we enter seasonally strong oil products demand. Natural gas equally vulnerable. Iran's Strait Authority toll-taking represents a fundamental challenge to global maritime law. Metals navigating narrow path between cyclical recovery and stagflationary energy costs. Gold remains a universal reserve currency as the petro-yuan gains ground.", "url": "https://www.man.com/insights/views-from-the-floor-2026-23-jun", "images": []}, {"source": "brookings", "name": "Brookings Institution", "thesis": "Iran withstood the US military barrage and is now in a *stronger* position than before the war. Iran controls the Strait, has established a Persian Gulf Strait Authority to levy tolls (breaking with international maritime law norms), and mines in the Strait will take months to remove. The 60-day deal gave Iran targeted sanctions relief and a reconstruction fund. Iran experimented with 'politically conditioned access' — discounts for friends, higher rates for enemies. Ninety percent of world trade flows by sea; this episode has permanently altered global maritime governance.", "url": "https://www.brookings.edu/articles/will-the-strait-of-hormuz-reopen-after-the-us-iran-deal/", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "thesis": "The Brent oil price 'bubble' has burst — the MoU has raised hopes that the worst-case outcome has been averted and oil market sentiment has moved sharply negative. The actual settlement price depends on pace of Iranian supply normalization and OPEC+ policy responses, but Wood Mackenzie expects a return closer to pre-conflict levels over time. Supply chain disruption remains significant but is less acute than 2021–22.", "url": "https://www.woodmac.com/blogs/the-edge/has-the-oil-price-bubble-burst/", "images": []}, {"source": "blackrock_investment_institute", "name": "BlackRock Investment Institute", "thesis": "Energy security is now a defining structural investment theme. Two geopolitical shocks in four years have exposed the concentration risk in fuel supply. Near-term: markets are placing premium on secure supply outside key chokepoints (LNG exporters, non-Hormuz routes). Long-term: structural power demand from AI and data centers adds a new layer of electricity security risk — electricity is local and real-time, unlike traded fuels. Bottlenecks in generation, transmission, and storage are becoming binding constraints.", "url": "https://www.blackrock.com/corporate/insights/blackrock-investment-institute/publications/energy-security-ai-power-demand", "images": []}, {"source": "oxford_economics", "name": "Oxford Economics", "thesis": "Supply-chain stress peaked in May 2026 (highest since 2022), driven by surging freight rates — air freight up 17%, ocean freight up 40% vs pre-war average. Strait traffic remains below 20% of pre-war levels. Oil price declines will ease US supply-chain stress; fertilizer prices stabilizing. For Africa, even with deal: full-year 2026 inflation higher, growth lower than pre-conflict forecasts. Fiscal authorities are being forced to revise budgets and fuel subsidies.", "url": "https://www.oxfordeconomics.com/resource/falling-oil-prices-will-ease-supply-chain-stress-in-the-us", "images": []}, {"source": "carnegie", "name": "Carnegie Endowment", "thesis": "Russia's oil sector is battered but not broken by Ukrainian air attacks on refineries. The attacks have created refinery bottlenecks and forced Russia to increase crude exports but cut refined product exports. Russia has been able to reroute through alternative pathways, and production has held up. The sanctions picture remains complicated.", "url": "https://carnegieendowment.org/russia-eurasia/politika/2026/06/russia-new-refineries", "images": []}]}, {"theme": "US Equities — Bulls vs. Consumer Vulnerability", "category": ["equities"], "consensus": "Most sell-side houses remain constructive on US equities. Goldman Sachs is explicitly 'in buy dip mode' — noting the Russell rebalance and 34 billion shares traded in a single session (the most active in stock market history, breaking the Liberation Day 2025 record), pointing to strong earnings and positive technicals. Barclays' Q3 2026 outlook keeps equities OW over fixed income, albeit with less conviction than Q2. UBS believes equities can move higher despite the tech sell-off. The IPO market has revived — Goldman flags SpaceX's $75 billion raise at approximately $3 trillion market cap as the defining signal of market sentiment, with the 2026 IPO pipeline (supply/demand) 'very well balanced.' The S&P 500 (IVV ETF) is up approximately +8.1% YTD as of June 26.", "divergence": "BNP Paribas (Daniel Morris) is the most prominent cautionary voice on the consumer: Q1 PCE was revised down from 1% to 0.4% (long-run non-recessionary average is 2%), and US retail sales in Q2 are running at an even lower rate. The tech sector has sold off 2–4% from recent highs as leveraged ETF bets on Korean/EM tech stocks got unwound and Warsh's press conference raised rate-hike expectations. Non-tech indices (Russell Value, MSCI Europe) have gained 2–3% since early June. BNP Paribas calls the consumer 'the key vulnerability to US equity markets.' T. Rowe Price warns that the Russell reconstitution is creating significant benchmark risk as AI stocks become disproportionately concentrated in large-cap growth indices.", "items": [{"source": "goldman_sachs", "name": "Goldman Sachs (John Flood)", "thesis": "Still in buy-dip mode. Strong earnings and positive technicals support higher prices. Record trading volume (34bn shares on June 25 — beating Liberation Day 2025) shows all investor cohorts are repositioning, not exiting. IPO boom ('very well balanced' supply/demand) is a positive sign — SpaceX's $75bn raise is the mood signal. Tech volatility going into Russell rebalance is expected and not a trend break.", "url": "https://www.goldmansachs.com/insights/the-markets/why-us-stocks-could-climb-higher", "images": []}, {"source": "barclays", "name": "Barclays (Ajay Rajadhyaksha)", "thesis": "Q3 2026 Global Outlook: 'Solid fundamentals, fewer bargains.' Global economy to grow 3.1% in 2026, slightly below 2025 but still strong. US remains the engine; East Asia broadly supportive; Europe and China weak. Inflation above target in most major economies, forcing central banks to hike or hold. Barclays remains OW equities over fixed income with far less conviction than Q2 2026 — hard to find good bargains at current valuations.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas AM (Daniel Morris)", "thesis": "The consumer is the key vulnerability to US equities. Q1 PCE revised DOWN to 0.4% (vs 2% long-run avg); US retail sales in Q2 running even lower. Manufacturing PMI at 4-year highs (AI capex-driven), services sector solid — but this is business investment, not consumer. Non-tech indices (Russell Value, MSCI Europe) up 2–3% since early June on geopolitical relief; tech stocks down 2–4% from frothy highs. Leveraged ETF bets on Korean/EM tech stocks are unwinding.", "url": "https://viewpoint.bnpparibas-am.com/view-from-the-markets-consumer-watch/", "images": []}, {"source": "vanguard", "name": "Vanguard", "thesis": "Most notable call: 3% US GDP growth in 2027, well above consensus. AI capital expenditure is already exceeding elevated late-2025 levels and tracking above Vanguard's own 2026 predictions. The AI investment cycle resembles historic periods of large-scale capital expansion — railroad buildout in the 19th century, late-1990s telecoms boom. AI is already contributing to stronger US corporate earnings. Elevated valuations suggest periodic corrections, but the transformation thesis is intact.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/ai-oil-changing-global-economy", "images": []}, {"source": "t_rowe_price", "name": "T. Rowe Price", "thesis": "The Russell revolution: AI trade is reshaping benchmark risk. AI-exposed companies are becoming disproportionately concentrated in large-cap growth indices following Russell reconstitution. This creates systematic benchmark risk for passive investors and tactical opportunities for active managers. The FAQ on reconstitution implications is a must-read for institutional allocators.", "url": "https://www.troweprice.com/en/us/insights/russell-revolution-how-ai-is-reshaping", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs (IPO Boom)", "thesis": "The 2026 IPO boom is in full swing. SpaceX raised $75 billion, with market cap rising to approximately $3 trillion in first days of trading — investors are betting on AI's economics being improved by building data centers in space. The supply/demand for new equity issuance is 'very well balanced.' Goldman expects the IPO pipeline to remain a positive technical for US equity markets.", "url": "https://www.goldmansachs.com/insights/goldman-sachs-exchanges/what-the-ipo-boom-means-for-the-us-equity-outlook", "images": []}]}, {"theme": "AI & Tech — Long Runway vs. Froth Risk", "category": ["ai_tech", "equities"], "consensus": "Most institutional research this week is structurally bullish on AI's economic and market impact. BNP Paribas AM's technology team argues AI models are getting 'smarter and cheaper' with each generation, unlocking new use cases — agentic AI systems are now executing multi-step workflows, and enterprises are beginning to deploy them at scale. Vanguard calls AI's investment trajectory comparable to the railroad buildout, expects 3% US GDP growth in 2027 (above consensus), and says AI capex is already exceeding their elevated forecasts. Goldman's HALO framework extends AI's industrial capex boom to EM and global capital goods. Barclays published a detailed primer on humanoid robots, arguing the physical AI revolution opens the service sector to automation for the first time. WisdomTree covers Trump's quantum computing executive orders as the next frontier.", "divergence": "The valuation question creates a genuine split. BNP Paribas AM (Hegarty/Glynn) are 'mindful of valuations' and try to 'avoid areas of extreme optimism' while still finding stock-specific opportunities. Gavekal's teasers flag the hardware sell-off, 'agentic AI's growing pains,' and China's competitive AI models as headwinds for the consensus narrative. Delphi Digital raised the question 'Is the AI Bubble About to Pop?' in their Hivemind piece. The Korean and Taiwanese equity markets — leading AI beneficiaries — have corrected 2–4% from frothy highs with leveraged ETF unwinding, suggesting market participants are differentiating between AI infrastructure buildout (durable) and AI-adjacent speculation (correcting).", "items": [{"source": "bnp_paribas", "name": "BNP Paribas AM (Hegarty, Glynn, Morris)", "thesis": "AI models continue to get smarter and cheaper. Agentic AI systems are increasingly capable of reasoning, planning and executing across multi-step workflows. SpaceX's $75bn IPO (data centers in space) is the mood signal. Infrastructure spending has been in line with demand and funded from operating cash flows. Products and services are being monetized rapidly. Long growth runway ahead, but mindful of valuations and avoiding areas of extreme optimism.", "url": "https://viewpoint.bnpparibas-am.com/talking-heads-cheaper-smarter-and-ever-broader-uses-ai-offers-a-long-growth-runway/", "images": []}, {"source": "barclays", "name": "Barclays (Zornitsa Todorova)", "thesis": "Humanoid robots: 10 key facts for investors. Physical AI is moving beyond science fiction — converging advanced AI and mechanical engineering. ~33% of global jobs involve lifting tasks, 53% require fine manual manipulation. YouTube's 280,000 years of footage provide training data at scale. China currently dominates deployment; large cost declines underway. Humanoids entering service sectors previously inaccessible to automation. Major investment theme for next 5–10 years.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/10-things-you-need-to-know-about-humanoid-robots.html", "images": []}, {"source": "vanguard", "name": "Vanguard (Saleheen, Ferreira)", "thesis": "Two powerful forces: AI (supporting above-trend US growth) and the oil shock (weighing on global growth). Vanguard's most notable call: 3% US GDP growth in 2027, well above consensus. AI capital expenditure exceeding elevated late-2025 levels. AI investment cycle resembles the railroad buildout in the 19th century and late-1990s telecom boom. AI increasingly likely to be a transformative technology creating meaningful economic upside and a potential rotation in market leadership.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/ai-oil-changing-global-economy", "images": []}, {"source": "wisdomtree", "name": "WisdomTree", "thesis": "Trump's two executive orders on quantum computing treat it the way Washington treats semiconductors and AI — a strategic asset worth racing for. The 'build order' targets a quantum computer capable of scientific discovery beyond classical computers (90-day DOE spec, 180-day partnership model). The 'defense order' creates a countdown clock for Q-Day — when a quantum computer will break today's encryption, including (implicitly) Bitcoin. 5-year plans across Commerce, Energy, NSF and NASA. This is quantum industrial policy, and the timeline is accelerating.", "url": "https://www.wisdomtree.com/us/insights/blog/quantum-computing-goes-mainstream-what-two-executive-orders-mean-for-investors", "images": []}, {"source": "deutsche_bank", "name": "Deutsche Bank Wealth Management", "thesis": "Macro outlook: when AI meets geopolitics. The convergence of AI-driven productivity gains and geopolitical fragmentation is reshaping capital flows and industrial policy. Countries with AI capability advantages are gaining strategic leverage; those without are accelerating domestic AI policy responses. The interplay between AI and national security is creating new investment themes in defense tech, compute infrastructure, and data sovereignty.", "url": "https://flow.db.com/topics/macro-and-markets/macro-outlook-when-ai-meets-geopolitics", "images": []}]}, {"theme": "Emerging Markets — Fragmentation as Tailwind", "category": ["em", "equities", "credit"], "consensus": "Institutional research has turned meaningfully more positive on EM this week. PIMCO, Goldman, and JPMorgan all find EM more attractive. Goldman's HALO basket of capital-intensive EM stocks (in sectors like heavy industry, infrastructure, industrials) has gained +115% since late 2025, versus only +7% for capital-light EM stocks — yet trades at a 20% valuation discount with stronger earnings momentum in 2026–27. PIMCO's fragmentation thesis holds that a multipolar world creates structural diversification demand for EM assets. JPMorgan finds liquidity conditions in EM credit improved. Franklin Templeton's Western Asset sees EM backdrop as 'supportive,' though no clear inflection point.", "divergence": "The key debate is whether EM's outperformance is durable or reflects a specific post-Iran-deal sector rally. Goldman and PIMCO are both confident in structural tailwinds — Goldman from capital expenditure cycles and HALO themes, PIMCO from geopolitical fragmentation driving diversification away from US-centric allocations. Franklin Templeton Western Asset is more nuanced: EM backdrop is supportive but there is 'no clear inflection point' — calling for selectivity by country (Latin America back on the radar per their separate piece) rather than broad-based EM optimism. Capital Economics highlights that EM central banks that were about to defensively hike (Indonesia, Turkey) can now hold, relieving rate pressure on EM equities and bonds.", "items": [{"source": "goldman_sachs", "name": "Goldman Sachs (Koul, Lalwani)", "thesis": "HALO stocks in EM — capital-intensive sectors (heavy assets, low obsolescence) — have gained 115% since late 2025 vs 7% for capital-light. Trading at 20% valuation discount. Expected to have stronger earnings momentum in 2026 and 2027. AI-driven capex boom is spurring sustained demand for tangible assets globally. Capital-light businesses (software, IT services) remain at increasing risk of AI disruption.", "url": "https://www.goldmansachs.com/insights/articles/halo-stocks-in-emerging-markets-could-extend-rally-as-heavy-industries-surge", "images": []}, {"source": "pimco", "name": "PIMCO", "thesis": "Fragmentation favors EM. A multipolar world creates structural diversification demand for EM fixed income and equities, as investors reduce overconcentration in US assets. Sharpe ratios are back in EM credit — quality spread products in EM offer compelling risk-adjusted returns. Global bond diversification provides higher yields and new alpha opportunities beyond the US Treasury market.", "url": "https://www.pimco.com/us/en/resources/video-library/media/fragmentation-favors-emerging-markets", "images": []}, {"source": "jpmorgan", "name": "JPMorgan", "thesis": "EM credit liquidity in a new era: the structural improvement in EM credit market liquidity is creating new access and pricing dynamics for institutional investors. The shift away from US-centric allocation frameworks is creating a more durable demand base for EM credit.", "url": "https://www.jpmorgan.com/insights/podcast-hub/making-sense/emerging-market-credit-liquidity-in-a-new-era", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton (Western Asset)", "thesis": "EM backdrop is supportive but there is no clear inflection point yet. Latin America specifically is back on the radar — political shifts rightward (per Gavekal's Geoeconomic Monitor) and fiscal reforms are creating selective opportunities. The Venezuela earthquake compounds hardship. Country-by-country selectivity is required rather than broad EM beta.", "url": "https://www.franklintempleton.com/articles/2026/western-asset/em-backdrop-supportive-but-no-clear-inflection-point", "images": []}]}, {"theme": "Credit — Resilience and Selectivity", "category": ["credit", "rates"], "consensus": "US high yield credit has been resilient through the Iran-war shock — BNP Paribas AM reports the max drawdown at the index level was approximately 2%, with spreads actually tightening initially when the conflict began. Net positive inflows have resumed following a solid HY earnings season. Credit spreads have returned to pre-conflict levels on US investment-grade bonds (~80bps). The structural argument for credit is intact: high all-in yields and solid fundamentals.", "divergence": "BNP Paribas AM (Jack Stephenson) emphasizes selectivity is 'increasingly paramount' as dispersion widens across industry and quality segments within HY — the short-duration segment of US HY is the preferred positioning (protection against both rate and spread volatility). PIMCO sees value in global bond diversification as a source of alpha — higher yields outside the US create opportunities that a US-only fixed income allocation misses. Man Group's 'Catching Angels Before They Fall' research (joint with PIC, Stanford, SAS) argues machine learning can materially outperform traditional methods in forecasting credit rating transitions — particularly important for insurance portfolios where unexpected downgrades can trigger capital charges.", "items": [{"source": "bnp_paribas", "name": "BNP Paribas AM (Jack Stephenson)", "thesis": "US high yield has weathered market turbulence well — max drawdown ~2%, recovered rapidly. Constructive outlook despite widening dispersion across industry and quality segments. Short-duration HY offers the best balance: protection against both rate volatility and spread volatility. Recent net positive inflows and solid earnings season are supportive. Selectivity is increasingly paramount as not all HY credits will benefit equally from oil price normalization.", "url": "https://viewpoint.bnpparibas-am.com/talking-heads-us-high-yield-resilience-against-interest-rate-and-spread-volatility/", "images": []}, {"source": "pimco", "name": "PIMCO", "thesis": "Global bond diversification offers higher yields and new sources of alpha. The US is not the only fixed income market with attractive risk-adjusted returns. PIMCO sees value in quality spread products across geographies. In EM credit specifically, Sharpe ratios have improved materially — the asset class is back in favor.", "url": "https://www.pimco.com/us/en/insights/global-bond-diversification-higher-yields-and-new-opportunities-for-alpha", "images": []}, {"source": "man_group", "name": "Man Group", "thesis": "Machine learning can advance credit rating transition forecasting for insurance portfolio optimization. Research with PIC, Stanford University, and SAS demonstrates quantitative credit processes powered by ML may offer more timely insights than traditional methods. For regulated insurers — where an unexpected downgrade simultaneously increases capital charges and erodes available regulatory capital — better rating transition forecasting is a material competitive advantage.", "url": "https://www.man.com/insights/catching-angels-before-they-fall", "images": []}]}, {"theme": "Crypto / Digital Assets — ETH Reset and BTC Volatility Compression", "category": ["crypto"], "consensus": "Total crypto market cap stands at $2.14 trillion as of June 26 (down 4.57% WoW). Bitcoin is down 4.47% WoW; ETH is down 7.59%; SOL up 1.56%. Bitcoin dominance is 56.12%. CoinShares highlights that BTC daily volatility has compressed from a peak of 7.58% in 2013 to a record low of 2.24% daily in 2025, driven by deepening institutional participation. The US spot bitcoin ETF ecosystem continues to mature. MiCA is now the operative European crypto regulatory framework. Institutional research is uniformly constructive on long-term crypto adoption.", "divergence": "The Ethereum ecosystem is at an inflection point that divides researchers. Galaxy Digital calls the Ethereum Foundation's 20% staff cut and 40% budget reduction a 'deliberate reset' toward a leaner foundation focused on protocol development and neutrality — a positive for long-term decentralization — while acknowledging significant near-term uncertainty. The emergence of alternative ETH-aligned organizations (Ethlabs) represents a division of labor across the ecosystem. The key risk highlighted by Galaxy Digital is Trump's quantum computing EOs: the 'defense order' creates a countdown clock for Q-Day, when a quantum computer running Shor's algorithm could break the cryptographic encryption securing Bitcoin and most blockchain infrastructure. This is now an active policy priority, not a hypothetical.", "items": [{"source": "galaxy_digital", "name": "Galaxy Digital (Lucas Tcheyan)", "thesis": "Ethereum Foundation cut 20% of employees (54 people) and 40% of budget as part of a 'months-long reorganization.' This marks Ethereum entering its 'third iteration' — EF narrowing to protocol stewardship and neutrality, while Ethlabs and other organizations drive adoption. Senior researcher departures (to Solana, Tempo chain) and leadership turnover preceded the reset. The Strawmap represents a rethinking of Ethereum's technical roadmap. Despite uncertainty, the pieces of a more focused operating model are coming into view.", "url": "https://www.galaxy.com/insights/research/ethereum-foundation-layoffs-20-percent-workforce/", "images": []}, {"source": "coinshares", "name": "CoinShares", "thesis": "Bitcoin volatility is real but 'worth it.' Annualized BTC volatility has compressed from 150%+ pre-ETF to a daily record low of 2.24% in 2025 as institutional participation deepened. The direction of travel is clear — BTC becoming more mature as an asset class. Volatility reflects active value discovery in an asset establishing its role in the global financial system. Macro liquidity, regulatory events, leverage cycles, and institutional adoption are the four primary drivers.", "url": "https://coinshares.com/insights/knowledge/bitcoin-is-volatile-yes-but-its-worth-it", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital (Alex Thorn, weekly)", "thesis": "Trump's quantum EOs create Q-Day urgency. The 'build order' targets a scientifically capable quantum computer; the 'defense order' creates a countdown to when quantum computers can break modern encryption (including implicitly Bitcoin's cryptography). This is industrial policy, quantum edition — with 5-year plans across DOE, Commerce, NSF, NASA, and a domestic supply chain mandate. The crypto industry needs to prepare for post-quantum cryptography migration.", "url": "https://www.galaxy.com/insights/research/weekly-top-stories-06-26-26-trump-quantum", "images": []}, {"source": "coinshares", "name": "CoinShares", "thesis": "Europe's MiCA crypto rulebook is real and operational. MiCA establishes uniform requirements for issuers of crypto-asset tokens and service providers across the EU. Key changes: licensing requirements, market integrity rules, reserve requirements for stablecoins, and consumer protection frameworks. MiCA represents the most comprehensive crypto regulatory framework in any major jurisdiction — and is already reshaping where crypto businesses are domiciling.", "url": "https://coinshares.com/insights/knowledge/europes-crypto-rulebook-is-real-what-mica-changes", "images": []}]}, {"theme": "KKR 'Divergence Conundrum' — The Defining Mid-Year Framework", "category": ["equities", "credit", "growth"], "consensus": "KKR's 2026 Mid-Year Outlook — the flagship macro framework from Henry McVey — is the most widely cited institutional thesis this week: the 'Divergence Conundrum,' where certain segments of the economy (AI, high-end services, national security, productivity) are flush with capital and driving growth, while others (housing, lower-income consumers, rate-sensitive sectors, old-economy capex) remain under pressure. The global economy is moving from a low-cost, efficiency-first model toward one where redundancy, reliability, resilience, and control carry a higher premium.", "divergence": "KKR itself notes the tension: policymakers face the challenge of setting monetary policy for an economy that is 'hot in some areas and cold in others.' For investors, the question is whether economic resilience is concentrated in a few pockets of strength rather than broad-based. KKR's prescription — 'stay up in quality, focus on durable cash flows, lean into managers and assets that can create value through operational improvement, productivity gains, and disciplined capital allocation' — aligns with private equity and private credit over public markets, which they see as 'starved for capital' in some areas versus 'flush' in others.", "items": [{"source": "kkr", "name": "KKR (Henry McVey / Lauren Goodwin)", "thesis": "Mid-Year 2026: 'The Divergence Conundrum.' The cycle continues but rules are changing. Economy moving from low-cost efficiency-first to redundancy-reliability-resilience-control premium. Two pockets: (1) AI, productivity, high-end services, national security — attracting capital, driving growth; (2) housing, lower-income consumers, old-economy capex, rate-sensitive sectors — under pressure. For investors: stay up in quality, focus on durable cash flows, lean into operational improvement. Tech-related capex (Equipment + Software IP + Data Center Construction) driving US GDP growth concentration. The Warsh Fed is attuned to this Regime Change framework and is seeking to 'bend the curve' of inflation expectations back toward mandate-consistent 2%.", "url": "https://www.kkr.com/insights/in-brief-mid-year-update-2026", "images": []}]}], "B_calls": [{"source": "standard_chartered", "name": "Standard Chartered", "call": "Hold equities, diversify across regions and sectors. Specific opportunity: OW US communications services (AI monetization + attractive valuation). Tactically bullish on AUD bonds (attractive absolute yields). Limited upside for USD/JPY (intervention risk). The Fed will hold all year — oil decline does the tightening work. Gold to rebound as rate pause caps the USD.", "category": ["equities", "fx", "rates"], "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-26-6-2026/", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "call": "Buy dips in US equities — buy any dips in the Russell rebalance volatility. OW EM HALO stocks (capital-intensive, heavy industry) vs. underweight capital-light EM stocks (software, IT services at risk of AI disruption). Oil to 'grind lower' — majority of the move already priced in. IPO pipeline ('very well balanced') is a positive technical.", "category": ["equities", "em", "energy"], "url": "https://www.goldmansachs.com/insights/the-markets/why-us-stocks-could-climb-higher", "images": []}, {"source": "barclays", "name": "Barclays", "call": "OW equities over fixed income for Q3 2026, with less conviction than Q2. Global growth 3.1% in 2026. US is the engine of growth. Inflation above target forces CBs to hike or hold — fixed income not compelling. Fewer bargains at current valuations vs. six months ago.", "category": ["equities", "rates", "growth"], "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html", "images": []}, {"source": "vanguard", "name": "Vanguard", "call": "US GDP 3% in 2027 — above consensus. AI structural transformation is real and comparable to the railroad buildout. Between earnings momentum and AI-enabled profitability, expect periodic corrections but the structural call is intact. For equities: elevated valuations suggest periodic corrections but the transformation thesis is durable.", "category": ["equities", "growth", "ai_tech"], "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/ai-oil-changing-global-economy", "images": []}, {"source": "pimco", "name": "PIMCO", "call": "Fragmentation favors EM — structurally overweight EM fixed income and equities. Global bond diversification: higher yields outside the US = new alpha opportunities. Sharpe ratios are back in EM credit; quality spread products in EM are the preferred positioning. Duration risk under Warsh requires careful management.", "category": ["em", "credit", "rates"], "url": "https://www.pimco.com/us/en/resources/video-library/media/fragmentation-favors-emerging-markets", "images": []}, {"source": "kkr", "name": "KKR", "call": "Stay up in quality; focus on durable cash flows; lean into managers with operational improvement capability. The Divergence Conundrum makes bottom-up selectivity essential. Private markets (private equity, private credit) preferred over public for accessing the value-creation opportunities in resilience, redundancy and productivity. Warsh's rate regime creates a regime change that favors quality over duration.", "category": ["equities", "credit", "growth"], "url": "https://www.kkr.com/insights/in-brief-mid-year-update-2026", "images": []}, {"source": "ubs", "name": "UBS", "call": "Fed hike is unlikely. Equities can move higher despite tech sell-off. Gold rebound opportunity as rate pause caps the USD. Oil's path is not a one-way Strait — caution on straight-line oil price decline. Record equity issuance (IPO boom) is not a headwind for equity markets — supply/demand remains balanced.", "category": ["equities", "rates", "commodities"], "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/daily/2026-06-23-why-we-think-a-fed-hike-remains-unlikely.html", "images": []}, {"source": "man_group", "name": "Man Group (Trend Following)", "call": "Trend Following deep dive: 'Cash (Equities) Is King.' Trend-following strategies show that holding cash (i.e., being out of equities in adverse trend environments) dramatically improves risk-adjusted returns. For investors using systematic approaches, the current volatility from Warsh/Iran uncertainty is precisely the environment where momentum and trend signals matter most.", "category": ["equities"], "url": "https://www.man.com/insights/trend-following-cash-is-king", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas AM (Chris Iggo)", "call": "Macro positive for H2 2026 if Iran peace deal holds: easing energy costs allow more benign macro outlook; lower bond volatility likely; equities driven by earnings exuberance. BNP remains constructive on risk assets but flags the consumer as the key vulnerability. Credit spreads (US IG at ~80bps) are back to pre-conflict levels — not cheap, but fundamentals support.", "category": ["equities", "credit", "rates"], "url": "https://viewpoint.bnpparibas-am.com/view-from-the-markets-space-oddity/", "images": []}, {"source": "blackrock_investment_institute", "name": "BlackRock Investment Institute", "call": "Energy security is a structural investment theme for two horizons. Near-term: favor secure supply, flexibility and resilience — exporters of oil and LNG outside key chokepoints, along with infrastructure assets providing supply alternatives. Long-term: electricity security is the new energy security — AI, data centers, EVs driving structural power demand; invest in generation, transmission, storage, and grid infrastructure. Deployment timeframes vary widely (note: chart showing construction timelines is key).", "category": ["energy", "commodities"], "url": "https://www.blackrock.com/corporate/insights/blackrock-investment-institute/publications/energy-security-ai-power-demand", "images": []}, {"source": "capital_economics", "name": "Capital Economics", "call": "Central banks divide into four groups: (1) Defensive hike deferral — Indonesia, Turkey; (2) Cuts incoming — Hungary, Israel, Brazil, Russia, Colombia; (3) More work to do — BoJ (expects ~2% by end 2027), RBA; (4) Wait-and-assess — Fed, ECB, BoE. The baseline for the Strait reopening reduces the worst-case global inflation tail risk, but the timeline is uncertain.", "category": ["rates", "fx"], "url": "https://www.capitaleconomics.com/blog/thinking-through-central-banks-next-moves", "images": []}, {"source": "t_rowe_price", "name": "T. Rowe Price", "call": "Russell reconstitution creates tactical volatility and systematic benchmark risk. AI stocks disproportionately concentrated in large-cap growth indices. Active managers should lean into this dislocation. Global markets weekly update: the geopolitical risk premium in energy is fading; the AI premium in equities is the dominant force. Monitor consumer data closely as the leading risk indicator.", "category": ["equities"], "url": "https://www.troweprice.com/en/us/insights/global-markets-weekly-update", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas AM (Defence ETFs)", "call": "NATO and allied country defense spending is a structural growth theme. Defense-sector ETFs offer diverse exposure to this growing investment opportunity. The structural growth in defense capex driven by geopolitical fragmentation (Ukraine, Iran) is durable. BNP is providing defense ETF product specifically to capture this theme.", "category": ["geopolitics", "equities"], "url": "https://viewpoint.bnpparibas-am.com/structural-growth-boosting-the-defence-sector/", "images": []}, {"source": "amundi", "name": "Amundi", "call": "Amundi EM Sustainable Bonds Report 2025: EM GSSS bond issuance rose 2.2% to $186.8bn in 2025; China surged 51% to $111.1bn (world's largest issuer). Outside China, issuance contracted 31% (Latin America -56%, South Asia -68%). The greenium has effectively vanished (below 1bp). Policy architecture determines where labeled bonds survive. EM GSSS bonds outside China lead developed markets in fixed-income share (2.6% vs 2.5%). Supranationals provide stable issuance anchor.", "category": ["em", "credit"], "url": "https://research-center.amundi.com/article/emerging-market-sustainable-bonds-report-2025", "images": []}, {"source": "peterson_institute", "name": "Peterson Institute for International Economics", "call": "USMCA review creates $1.5 trillion goods trade risk. Trump-voting states are at highest risk for export losses if USMCA ends — particularly agricultural and manufacturing states. The US is also driving away international students at a long-term economic cost to STEM workforce and innovation capacity.", "category": ["geopolitics", "growth"], "url": "https://www.piie.com/research/piie-charts/2026/trump-voting-states-are-highest-risk-export-losses-if-usmca-ends", "images": []}], "C_deep_reads": [{"source": "kkr", "name": "KKR — Mid-Year Outlook 2026: The Divergence Conundrum", "title": "Mid-Year Outlook for 2026: The Divergence Conundrum", "summary": "KKR's flagship mid-year macro framework from Henry McVey and Lauren Goodwin. The central thesis: the 'Divergence Conundrum' is the defining feature of this cycle. The global economy has moved from a low-cost, efficiency-first model to one where redundancy, reliability, resilience, and control carry a higher premium. Two parallel economies are running: (1) AI, productivity, high-end services, and national security are attracting capital and driving growth; (2) housing, lower-income consumers, old-economy capex, and rate-sensitive sectors remain under pressure. McVey argues this makes monetary policy uniquely difficult — the Fed cannot simultaneously be accommodative for the cold sectors and restrictive for the hot ones. For investors, the implication is not to avoid risk but to be more disciplined: stay up in quality, focus on durable cash flows, and lean into managers and assets that can create value through operational improvement, productivity gains, and disciplined capital allocation. The Warsh Fed is attuned to the Regime Change framework (inflation persistently above 2%) and is attempting to fundamentally 'bend the curve' back toward mandate-consistent inflation. KKR's 'In Brief' companion piece is the most accessible distillation of this framework — recommended reading for any macro allocator.", "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}, {"source": "vanguard", "name": "Vanguard — AI, Oil, and a Changing Global Economy", "title": "AI, oil, and a changing global economy (Mid-Year Outlook 2026)", "summary": "Vanguard's mid-year global outlook from chief economists Jumana Saleheen and Thiago Ferreira. Two powerful forces: AI (supporting above-trend US growth) and the oil shock from the Middle East conflict (weighing on global growth, adding inflationary pressure). These forces drive an 'unusual degree of divergence across regions' — US poised for structural transformation while other economies face challenging balance between technology and energy costs. Vanguard's standout call: 3% US GDP growth in 2027, well above consensus. AI capital expenditure is already exceeding elevated late-2025 levels and tracking above Vanguard's own 2026 predictions — the AI investment cycle resembles the railroad buildout in the 19th century and the late-1990s technology boom. The market views tab discusses AI-enabled corporate profitability and the potential for market leadership rotation. This piece is required reading for any investor trying to calibrate the AI structural bull case against cyclical rate and geopolitical noise.", "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/ai-oil-changing-global-economy", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton Fixed Income — On My Mind: The Warsh Fed", "title": "On My Mind: The Warsh Fed — Return to Orthodoxy", "summary": "Sonal Desai's flagship 'On My Mind' piece — the most sharply written institutional take on the Warsh FOMC available in this collection. Desai argues Warsh may be the most hawkish Fed chair since Paul Volcker. Key quotes from Warsh she cites: 'The Fed statement says that inflation is primarily determined by monetary policy. You bet it is. I've said for years inflation is a choice. You bet it is.' Unlike Powell, who acknowledged a potential stagflationary trade-off between inflation and employment, Warsh flatly rejected the 'cruel choice' framing: 'What I believe is if we do our job, we can make strong growth, low prices and strong employment mutually compatible.' Desai walks through the full significance of the five task forces, the Dot Plot dismissal, and the stripped-down statement. Her bottom line: this is a genuine return to central bank orthodoxy — not just messaging. Desai had publicly predicted this outcome when Warsh was appointed and notes she was puzzled by market consensus that he would simply cut rates to fulfill Trump's preferences. Essential read for anyone trading rates or duration under the new Fed regime.", "url": "https://www.franklintempleton.com/articles/2026/fixed-income/on-my-mind-the-warsh-fed-return-to-orthodoxy", "images": []}, {"source": "brookings", "name": "Brookings Institution — Blowback: How the Iran War May Change the World", "title": "Blowback: How the Iran war may change the world", "summary": "Brookings' comprehensive research series on the long-term geopolitical implications of the US-Israel Iran war — assembled from expert researchers across the institution. Key findings: The initial US/Israel strikes killed Ayatollah Khamenei, but the decapitation of Iran's leadership did not collapse the regime. Tehran's missile/drone counterstrikes targeted Israel, Gulf states, US military bases, and Strait of Hormuz shipping — blocking the chokepoint through which 20% of global oil and LNG typically passes. Iran withstood the military barrage and is now in a *stronger* geopolitical position than before the war. Specific structural risks: (1) Iran established a Persian Gulf Strait Authority to collect tolls on vessels — challenging international maritime law; (2) Iran has mined the Strait, which will take months to remove; (3) Iran experimented with 'politically conditioned access' — discounting for friendly nations, premium for adversaries — a historic break from open-transit norms; (4) The 60-day deal represents a temporary, fragile arrangement, not a permanent settlement; (5) Iran has established 90% of world trade flows by sea, 70% of world energy, and 99% of the world's data cables are 'all vulnerable.' The Fiona Hill essay on Ukraine/Iran demonstrating the dangers of overreliance on single powerful actors is particularly notable.", "url": "https://www.brookings.edu/collection/blowback-how-the-iran-war-may-change-the-world/", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital — 2026 Crypto Predictions (Comprehensive)", "title": "26 Cryptocurrency, Bitcoin, and DeFi Predictions for 2026", "summary": "Galaxy Digital's comprehensive 2026 crypto predictions — the annual institutional reference for digital asset trajectory. Covers BTC price targets, institutional adoption milestones, DeFi TVL growth, ETF inflows, regulatory developments, L1/L2 competition, stablecoin growth, and tokenization trends. As of late June 2026, total crypto market cap sits at $2.14 trillion with BTC dominance at 56.12%. Key mid-year check-ins: ETH Foundation restructuring represents a predicted institutional maturation rather than a negative signal; the Agentic Flywheel (AI agents + DeFi) is tracking ahead of predictions; quantum computing EOs add a new risk category not in original predictions. Galaxy's State of Crypto Leverage Q4 2025 companion piece shows the ecosystem survived a stress test with leverage better managed than in prior cycles.", "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi", "images": []}, {"source": "man_group", "name": "Man Group — The Strait of Uncertainty", "title": "Views from the Floor: The Strait of Uncertainty", "summary": "Man Group's most important piece this week — the most bearish institutional voice on the oil/energy supply normalization timeline. Key data point: for every day the Strait of Hormuz remains closed, the global energy supply chain requires three days to normalize. Given the Strait was closed for approximately four months, Man Group estimates six to twelve months of supply chain disruption potentially extending into early 2027. Physical shortages are likely to persist as we enter the seasonally strong period for oil products. Natural gas markets appear 'equally vulnerable if winter demand spikes before inventories can be replenished.' Metals navigating a narrow path between cyclical recovery and stagflationary energy costs. Gold continues as a universal reserve currency; the petro-yuan is gaining ground as nations seek payment alternatives. Man Group is recommending investors 'prepare for more short-to-medium term volatility around energy costs, driving up inflation and global geopolitical escalation.' This is the most direct challenge to the consensus view that oil is already priced for peace.", "url": "https://www.man.com/insights/views-from-the-floor-2026-23-jun", "images": []}, {"source": "barclays", "name": "Barclays — 10 Things You Need to Know About Humanoid Robots", "title": "10 things you need to know about humanoid robots", "summary": "Barclays Research analyst Zornitsa Todorova's definitive primer on physical AI as a macro investment theme. Key data: ~33% of all jobs globally involve lifting tasks and 53% require fine manual manipulation — human-form robots can operate in existing infrastructure without redesigns. YouTube alone hosts 280,000 years of footage providing foundational training data. Current cost curves are declining rapidly. Humanoids will enter service sectors that have been inaccessible to traditional factory automation — this is a paradigm shift from purpose-built industrial robots to general-purpose workforce robots. China currently dominates deployment (the article explores why). The TAM analysis is the most comprehensive available from a sell-side institution this cycle. Todorova argues this is a genuine multi-decade macro investment theme — equivalent to industrial automation in the 20th century but for the service economy.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/10-things-you-need-to-know-about-humanoid-robots.html", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital — Ethereum Foundation Cuts 20% of Workforce", "title": "Ethereum Foundation Cuts 20% of Workforce as Chain Enters 'Third Iteration'", "summary": "Galaxy Digital's (Lucas Tcheyan) detailed research note on the Ethereum Foundation's June 2026 restructuring. The EF cut 54 employees (20% of staff) and 40% of the budget in a 'months-long reorganization.' The context: a deliberate reset toward a leaner foundation focused on protocol development and neutrality, with adoption and growth handed to a new set of ETH-aligned organizations (Ethlabs, announced simultaneously). Background: senior EF researchers departed for Solana and Stripe-backed Tempo chain in 2025; leadership turnover accelerated in February 2026; co-executive directors departed successively. The Strawmap represents a rethinking of Ethereum's technical roadmap. Galaxy frames this as Ethereum entering a 'third iteration' — division of labor between EF (protocol stewardship, neutrality, self-sovereignty) and external organizations (research, adoption, ETH growth). Despite uncertainty, Galaxy's view is that the pieces of a more focused operating model are starting to come into view. This is the definitive institutional read on Ethereum's current transition.", "url": "https://www.galaxy.com/insights/research/ethereum-foundation-layoffs-20-percent-workforce/", "images": []}], "D_charts": [{"source": "bnp_paribas", "name": "BNP Paribas AM (Daniel Morris)", "chart": "Three charts: (1) Oil price drop — faster than expected toward pre-conflict levels but European natural gas still elevated; (2) PMI divergence — US manufacturing at 4-year highs vs. European PMIs weak; (3) US retail sales — running below Q1 2026 pace, flagging consumer vulnerability.", "url": "https://viewpoint.bnpparibas-am.com/view-from-the-markets-consumer-watch/", "images": ["https://viewpoint.bnpparibas-am.com/wp-content/uploads/2026/06/Oil-prices-have-dropped-far-more-quickly-than-expected-though-gas-is-still-high.jpg", "https://viewpoint.bnpparibas-am.com/wp-content/uploads/2026/06/Purchasing-Managers-Indices.jpg", "https://viewpoint.bnpparibas-am.com/wp-content/uploads/2026/06/US-retail-sales-running-at-a-lower-rate-than-in-the-first-quarter.jpg"]}, {"source": "bnp_paribas", "name": "BNP Paribas AM", "chart": "Gold's share in global central bank reserves has increased at the expense of US dollar assets — visualizing the reserve diversification trend, with China's active gold accumulation highlighted.", "url": "https://www.bnpparibas-am.com/en/front-of-mind/take-two-stocks-rise-ahead-of-middle-east-peace-deal/", "images": ["https://www.bnpparibas-am.com/wp-content/uploads/2026/06/Exhibit-1-Golds-share-in-global-reserves-has-increased-at-the-expense-of-US-assets-share.png"]}, {"source": "standard_chartered", "name": "Standard Chartered", "chart": "Two charts: (1) Cooling inflation drivers — oil price drop as CPI disinflationary force; (2) Earnings upgrade momentum — S&P 500 earnings revisions remain positive despite macro headwinds. Charts support the bull case for equities and the hold case for the Fed.", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-26-6-2026/", "images": ["https://av.sc.com/market-outlook/content/images/Screenshot-2026-06-26-at-3.32.03%E2%80%AFPM-1782459170.png", "https://av.sc.com/market-outlook/content/images/Screenshot-2026-06-26-at-3.33.47%E2%80%AFPM-1782459286.png"]}, {"source": "amundi", "name": "Amundi", "chart": "Weekly Market Directions chart: equity and bond market performance matrix across regions (MSCI World, S&P 500, Euro Stoxx 600, TOPIX, MSCI EM, Bloomberg Global Agg), alongside government bond yields table and commodity/FX summary for the week of June 18-19.", "url": "https://research-center.amundi.com/article/new-fed-era-under-warsh", "images": ["https://static.amundi.com/web-assets/awf-assets/research-center/styles/max_1300x1300/s3/2026-06/Weekly-Market-Directions-19-June-Fig2%20EN.png.webp?itok=s6R0i4gX"]}, {"source": "blackrock_investment_institute", "name": "BlackRock Investment Institute", "chart": "Deployment timeframes for different energy generation technologies — illustrating how long it takes to add new supply capacity (solar days to months; gas peakers weeks to months; wind months to years; nuclear years to decades). Key context for energy security investment thesis: AI power demand is accelerating but supply response is constrained by build times.", "url": "https://www.blackrock.com/corporate/insights/blackrock-investment-institute/publications/energy-security-ai-power-demand", "images": ["https://www.blackrock.com/blk-corp-assets/cache-1682132707000/images/media-bin/web/global/svg/highly-exposed.svg"]}, {"source": "man_group", "name": "Man Group", "chart": "Daily vessel crossings through the Strait of Hormuz in 2026 versus 2021-2025 range — visualizing the dramatic reduction in Strait traffic during the conflict and the still-depressed level following the MoU. The most important oil supply chart this week: traffic remains far below the multi-year norm.", "url": "https://www.man.com/insights/views-from-the-floor-2026-23-jun", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "chart": "Ethereum Foundation Reorganization context: ETH price performance, foundation budget timeline, and ecosystem organization chart showing EF vs. Ethlabs split of responsibilities. Background context for the 20% staff cut and 40% budget reduction.", "url": "https://www.galaxy.com/insights/research/ethereum-foundation-layoffs-20-percent-workforce/", "images": ["https://images.ctfassets.net/h62aj7eo1csj/4hevlJgZxdxFv5FmKG7nny/04885542df9b1fecad3e221aec564053/Hero_Ethereum-6.png?w=1500&q=60&fm=avif"]}, {"source": "barclays", "name": "Barclays", "chart": "Humanoid robot deployment chart: proportion of jobs globally requiring lifting tasks vs. fine manual manipulation — illustrating the TAM for humanoid robots in the workforce. Also includes China vs. US deployment comparison.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/10-things-you-need-to-know-about-humanoid-robots.html", "images": ["https://www.ib.barclays/content/dam/barclaysmicrosites/ibpublic/Images/ourinsights/EGS_2026/10Things/Humanoid_Steel_plant_624x642.jpg"]}, {"source": "coinshares", "name": "CoinShares", "chart": "Bitcoin historical volatility model with all models overlaid — showing the compression of BTC realized daily volatility from 7.58% peak in 2013 to a record low of 2.24% in 2025. Visualizes institutional maturation of BTC as an asset class.", "url": "https://coinshares.com/insights/knowledge/bitcoin-is-volatile-yes-but-its-worth-it", "images": ["https://a.storyblok.com/f/176807/1600x962/7ba388a887/40-model-with-all-models.png/m/"]}, {"source": "bnp_paribas", "name": "BNP Paribas AM", "chart": "Defence sector ETF infographic: NATO spending trajectories, defense capex by country as % of GDP vs. 2% target, and structural growth in the defense industry investment opportunity.", "url": "https://viewpoint.bnpparibas-am.com/structural-growth-boosting-the-defence-sector/", "images": ["https://viewpoint.bnpparibas-am.com/wp-content/uploads/2026/06/15210_BNP-ETF-Defence-Infographic-V5-26JUN26-009-v7-1-1-scaled.jpg"]}, {"source": "ned_davis_research", "name": "Ned Davis Research", "chart": "Tim Hayes (Chief Global Investment Strategist) on Closing Bell Overtime: bond yields are the central market narrative driver. Chart showing bond yield movements and equity market correlation — as yields rise (Warsh hawkishness), equity multiples come under pressure.", "url": "https://info.ndr.com/ndr-signals/tim-hayes-closing-bell-overtime-bond-yields", "images": ["https://info.ndr.com/hubfs/Bond%20Yields%20Driving%20the%20Market%20Narrative.png"]}, {"source": "man_group", "name": "Man Group (Catching Angels)", "chart": "Machine learning credit rating transition forecasting performance: Figure 5 showing ML model outperformance vs. traditional methods in predicting rating changes — key empirical result from the joint Man Group/PIC/Stanford/SAS research paper.", "url": "https://www.man.com/insights/catching-angels-before-they-fall", "images": ["https://www.man.com/sites/default/files/uploads/content/research/Figure_5_Catching_Angels.png"]}], "house_views": [{"source": "goldman_sachs", "name": "Goldman Sachs", "stance": "Bullish US equities (buy dips); oil grinding lower; OW EM HALO (capital-intensive) stocks; IPO boom positive signal; AI-driven structural bull case.", "category": "bank_bulge", "url": "https://www.goldmansachs.com/insights/the-markets/why-us-stocks-could-climb-higher"}, {"source": "jpmorgan", "name": "JPMorgan", "stance": "The world changed in 10 days (oil unwind + hawkish Fed); USMCA risk flagged ($1.5T trade at stake); constructive on EM credit liquidity.", "category": "bank_bulge", "url": "https://www.jpmorgan.com/insights/markets-and-economy/top-market-takeaways/tmt-the-world-changed-in-10-days"}, {"source": "ubs", "name": "UBS", "stance": "Fed hike unlikely; equities can move higher despite tech sell-off; gold rebound; oil not a one-way Strait; 250 years of US innovation = structural bull case.", "category": "bank_bulge", "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/daily/2026-06-23-why-we-think-a-fed-hike-remains-unlikely.html"}, {"source": "barclays", "name": "Barclays", "stance": "Q3 2026: OW equities over bonds (less conviction than Q2); global growth 3.1%; US the engine; inflation above target in most economies; fewer bargains.", "category": "bank_bulge", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/research/global-outlook/q3-2026-solid-fundamentals-fewer-bargains.html"}, {"source": "deutsche_bank", "name": "Deutsche Bank", "stance": "AI meets geopolitics — AI capability is reshaping geopolitical leverage and industrial policy; selective EM opportunities; CIO survey 2026 favors resilience over efficiency.", "ca
