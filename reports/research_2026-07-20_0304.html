const META = {
  date: "2026-07-20",
  time: "03:04 CEST",
  windowStart: "2026-07-19 21:04 CEST",
  windowEnd: "2026-07-20 03:04 CEST",
  emailsInWindow: 7,
  emailsRead: 7,
  itemsExtracted: 18,
  includedSources: [
    { name: "The Dark Side of the Boom", count: 7 },
    { name: "Speedrun / P Equity Research", count: 5 },
    { name: "The Week Ahead / Neil Sethi", count: 3 },
    { name: "The Pressure Point / Fulcrum", count: 2 },
    { name: "TMAD Weekly", count: 1 }
  ],
  skippedSources: [
    { name: "MacroEdge (subscriber chat thread)", reason: "Zero analytical content — a one-sentence teaser announcing a paid report drops Wednesday plus a subscribe CTA. No thesis, data, or claim to extract." }
  ]
};

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "AI/infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};
const URG_META = {
  act: { emoji: "🔴", label: "Act Now" },
  deep: { emoji: "🔵", label: "Deep" },
  watch: { emoji: "🟡", label: "Watch" }
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(cat) { return CAT_COLORS[cat] || "#888"; }

function buildFilters() {
  const catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catWrap = document.getElementById("catFilters");
  let html = '<button class="pill' + (activeCat === "all" ? " active" : "") + '" style="' + (activeCat === "all" ? "background:#333;" : "") + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(function(cat) {
    const isActive = activeCat === cat;
    html += '<button class="pill' + (isActive ? " active" : "") + '" style="' + (isActive ? "background:" + catColor(cat) + ";" : "border-color:" + catColor(cat) + ";color:" + catColor(cat) + ";") + '" onclick="setCat(\'' + cat + '\')">' + cat + ' (' + catCounts[cat] + ')</button>';
  });
  catWrap.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgWrap = document.getElementById("urgFilters");
  let uhtml = '<button class="pill' + (activeUrg === "all" ? " active" : "") + '" style="' + (activeUrg === "all" ? "background:#333;" : "") + '" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  ["act", "deep", "watch"].forEach(function(u) {
    if (!urgCounts[u]) return;
    const isActive = activeUrg === u;
    uhtml += '<button class="pill' + (isActive ? " active" : "") + '" style="' + (isActive ? "background:#333;" : "") + '" onclick="setUrg(\'' + u + '\')">' + URG_META[u].emoji + ' ' + URG_META[u].label + ' (' + urgCounts[u] + ')</button>';
  });
  urgWrap.innerHTML = uhtml;
}

function setCat(cat) { activeCat = cat; activeSrc = null; buildFilters(); renderCards(); }
function setUrg(urg) { activeUrg = urg; activeSrc = null; buildFilters(); renderCards(); }
function filterBySrc(name) {
  activeSrc = name; activeCat = "all"; activeUrg = "all";
  buildFilters(); renderCards();
  ITEMS.forEach(function(item) {
    if (item.source.indexOf(name) !== -1) {
      const el = document.getElementById("card-" + item.id);
      if (el) el.classList.add("open");
    }
  });
}

function toggleCard(id) {
  const el = document.getElementById("card-" + id);
  el.classList.toggle("open");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderCards() {
  const wrap = document.getElementById("cards");
  let items = ITEMS;
  if (activeCat !== "all") items = items.filter(function(i) { return i.cat === activeCat; });
  if (activeUrg !== "all") items = items.filter(function(i) { return i.urgency === activeUrg; });
  if (activeSrc) items = items.filter(function(i) { return i.source.indexOf(activeSrc) !== -1; });

  let html = "";
  items.forEach(function(item) {
    const color = catColor(item.cat);
    const urg = URG_META[item.urgency];
    const chartIcon = item.charts && item.charts.count > 0 ? (item.charts.hot ? "🔥" : "📊") : "";
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + item.id + '</span>';
    html += '<span class="urg">' + urg.emoji + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source.split(' /')[0].split(' (')[0] + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartIcon) html += '<span class="chart-icon">' + chartIcon + '</span>';
    html += '<span class="title-text">' + item.title + '</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box" style="border-left-color:' + color + ';background:' + color + '14;">' + item.angle + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-card a"><div class="tlabel">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-card b"><div class="tlabel">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts && (item.charts.count > 0 || item.charts.desc)) {
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.desc || "Charts inside — worth opening.") + '</div>';
    }
    html += '<a class="read-link" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div></div>';
  });
  if (items.length === 0) html = '<p style="color:#888;text-align:center;padding:40px 0;">No items match this filter.</p>';
  wrap.innerHTML = html;
}

function renderReport() {
  let html = "";
  html += "<h4>Time Window</h4><p>" + META.windowStart + " → " + META.windowEnd + ". Emails outside this window were not processed.</p>";
  html += "<h4>Totals</h4><p>" + META.emailsInWindow + " emails in window · " + META.emailsRead + " read in full · " + META.itemsExtracted + " items extracted.</p>";
  html += "<h4>Included Sources</h4><p>";
  html += META.includedSources.map(function(s) {
    return '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> (' + s.count + ')';
  }).join(" &nbsp;·&nbsp; ");
  html += "</p>";
  html += "<h4>Skipped Sources</h4>";
  META.skippedSources.forEach(function(s) {
    html += '<p class="skip-item"><strong>' + s.name + '</strong> — ' + s.reason + '</p>';
  });
  document.getElementById("reportBody").innerHTML = html;
}

document.getElementById("headerMeta").textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.emailsRead + " emails";
document.getElementById("reportToggle").addEventListener("click", function() {
  document.getElementById("reportCard").classList.toggle("open");
});

buildFilters();
renderCards();
renderReport();
</script>
