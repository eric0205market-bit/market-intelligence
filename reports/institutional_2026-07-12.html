 Economist Xiangrong Yu) argues China's AI supercycle is reinforcing the strong leg of a K-shaped economy -- boosting exports, production and new-economy investment -- while household demand and old-economy sectors stay weak. Citi maintains 2026 GDP growth at 4.7% YoY, raises 2026 export growth to 13.0% YoY (trade surplus ~$1.1tn, import growth 22.0%), and expects nominal growth to hit a five-year high of 6.7% in 2026 as producer-price reflation broadens. AI-related exports were 20.3% of total exports in 2025 and grew 34.8% YoY in the first five months of 2026; integrated-circuit output rose 25.4% YoY and industrial-robot production 28.1% YoY. Citi expects only targeted/incremental policy support (a symbolic 10bp rate cut in H2, no major fiscal expansion) rather than broad stimulus, and expects the PBOC to maintain a gradual RMB appreciation bias, with USDCNY moving toward 6.7 over the next six to 12 months.", "url": "https://www.citigroup.com/global/insights/china-second-half-outlook-ai-supercycle-cuts-into-the-k-shaped-economy", "images": []}, {"source": "lazard", "name": "Lazard", "thesis": "Lazard Chief Market Strategist Ron Temple's Global Mid-Year Outlook 2026 lays out three core convictions: a weaker US dollar as investors reduce concentration in US assets and increase currency hedging (with non-US Treasury holders likely to trim exposure over time); steeper developed-market yield curves as widening US, European and Japanese fiscal deficits push long-end yields higher, benefiting EM sovereign debt and hard assets like infrastructure; and stronger relative performance from non-US equities, particularly EM and Japan, given more attractive valuations, versus a US market whose gains remain concentrated in a narrow set of tech names. By region, he flags US growth as increasingly dependent on AI capex and wealth-effect spending (fragile to an AI-enthusiasm reversal), China's stability as masking a housing crisis and weak domestic demand, Eurozone recovery as set back by the Iran conflict but supported by rising defense budgets, and Japan's corporate reforms as continuing to lift returns on capital.", "url": "https://www.lazard.com/research-insights/ron-temples-global-mid-year-outlook-2026-three-core-convictions-shaping-markets/", "images": []}, {"source": "barclays", "name": "Barclays", "thesis": "Barclays' APAC tactical strategist Kaan Singh describes a sharp rotation in client flows away from crowded Korea/Taiwan AI positions into Japan, noting foreigners sold a record USD 40bn of Korean equities over the prior three months -- the largest three-month selling streak in a decade. He frames Korea as almost purely a high-bandwidth-memory/semiconductor trade heading into a \"sell the news\" earnings season, casts Japan as an economy-plus-AI-booster trade with less retail margin-trading risk (Japan banks and autos are outperforming, not just tech), and flags early \"bottom fishing\" interest re-emerging in China ahead of tech IPOs.", "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/barclays-brief/opportunities-in-asian-equities.html", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "thesis": "Franklin Templeton's Emerging Markets Insights (July 2, 2026) highlights three watch items: falling energy prices after the US-Iran MoU signed June 17 pushed oil close to pre-war levels (though LNG and diesel margins stay firm), which most benefits lower-income EM growth; a global rotation out of AI hyperscalers into semiconductor makers benefiting Asia, where the firm sees limited earnings risk given chip capacity sold out through 2027 despite valuations elevated versus history; and Malaysia's GLICs backing new 'Value-Up' corporate governance principles (following South Korea and Singapore) though without fresh capital commitments, limiting expected valuation impact. Outlook favors EM chipmakers in Taiwan/South Korea, China EV/battery firms, Asian robotics plays, and Latin America's copper/lithium/rare-earth exposure to the energy transition.", "url": "https://www.franklintempleton.com/articles/2026/equity/emerging-markets-insights-looking-beyond-energy-prices-0726", "images": []}, {"source": "kkr", "name": "KKR", "thesis": "KKR's Mid-Year Outlook 2026, 'The Divergence Conundrum,' argues the global cycle continues as an AI-driven productivity boom persists longer than expected, but that intensifying geopolitical competition (new strategic chokepoints, scarce critical AI inputs) is making growth more concentrated and markets more K-shaped/bifurcated than at any point since the 1870s. KKR is above-consensus on US growth, expects higher-for-longer inflation (ex-China), sees the global easing cycle fading even as the Fed stays patient, expects long-end yields to remain a pressure point as the global bond selloff broadens across countries, is constructive but increasingly earnings-dependent on equities, and believes the dollar has peaked but will not suffer a disorderly unwind. Key asset-class tilts include: continued Asia outperformance across public and private markets; more assets linked to nominal GDP; private equity returns driven by operational improvement rather than financial engineering; bullishness on Structured Equity/Capital Solutions; more opportunities in dispersed credit; and thematic overweight conviction in 'Security of Everything' (defense, cyber, supply chains, critical materials), power/energy infrastructure (AI, electrification, reshoring, defense demand colliding with permitting/grid constraints), and collateral-based real asset cash flows, especially infrastructure and energy where KKR sees investors still underweight. Key risks flagged: disappointing IPOs of trophy private assets amid slowing productivity, inflation/deficits pushing long bonds higher, unemployment gapping up, an earnings downturn, and politics (not technology) derailing the productivity cycle.", "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}]}], "B_calls": [{"source": "ubs", "name": "UBS", "call": "Forecasts Brent crude ending 2026 at $85/bbl and gold topping $5,000/oz over the next 12 months; recommends a low- to mid-single-digit portfolio allocation to broad commodities.", "category": ["energy", "commodities"], "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-03072026.html", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "call": "Recommends long dollar vs G10 funders for 3-4% annualized carry, specifically long USD/CHF call spreads (7-8x payout by year-end) and long one-year USD/CNH calls above 7 as a China-risk hedge.", "category": ["fx"], "url": "https://www.goldmansachs.com/insights/the-markets/why-the-us-dollar-could-continue-to-strengthen", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "call": "Sets an explicit S&P 500 target range of 7400-7800 (2026 EPS raised to $341 from $310) and a 10-year Treasury yield target of 4.25%-4.75%; reiterates a bullish 'broadening' call favoring US small/mid-caps, EM equities and Japan.", "category": ["equities", "rates"], "url": "https://www.franklintempleton.com/articles/series/from-the-market-desk", "images": []}, {"source": "standard_chartered", "name": "Standard Chartered", "call": "Raises semiconductor weight within Global Tech to 35-40% (from 30-35%), including adding to beaten-down memory names; favors Asia ex-Japan equities, US inflation-protected bonds, and sees Brent/WTI-style oil in a $70-90/bbl range.", "category": ["equities", "energy"], "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-10-7-2026/?mvog=1&source=podcast", "images": []}, {"source": "rbc", "name": "RBC Capital Markets", "call": "Lifts USD/CAD trading range with buyers at 1.3900/1.4000 and sellers at 1.4300/1.4400, citing AI-related capital inflows and the dollar regaining safe-haven status.", "category": ["fx"], "url": "https://www.rbccm.com/en/insights/2026/07/the-george-davis-report-july-2026-edition", "images": []}, {"source": "bca_research", "name": "BCA Research", "call": "Q3 asset-allocation stance: overweight private equity, rotate out of momentum stocks into quality and hyperscalers, downgrade late-stage venture capital.", "category": ["equities", "credit"], "url": "https://www.bcaresearch.com/marketing/webcasts/quarterly-outlook-portfolio-construction/221556", "images": []}, {"source": "barclays", "name": "Barclays", "call": "Documents a record USD 40bn three-month foreign selling streak in Korean equities and recommends rotating out of crowded Korea/Taiwan AI positioning into Japan.", "category": ["equities", "em"], "url": "https://www.ib.barclays/content/barclaysmicrosites/ibpublic/en/our-insights/barclays-brief/opportunities-in-asian-equities.html", "images": []}, {"source": "citi_gps", "name": "Citi GPS", "call": "Maintains China 2026 GDP growth at 4.7% YoY, raises 2026 export growth to 13.0% YoY, and expects USDCNY to move toward 6.7 over 6-12 months on gradual RMB appreciation.", "category": ["em", "fx"], "url": "https://www.citigroup.com/global/insights/china-second-half-outlook-ai-supercycle-cuts-into-the-k-shaped-economy", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "call": "Targets Bitcoin at $250,000 by year-end 2027, with 2026 itself staying volatile (options pricing roughly equal odds of $70k or $130k by mid-2026) and downside risk until BTC reclaims $100-105k.", "category": ["crypto"], "url": "https://www.galaxy.com/insights/research/predictions-2026-crypto-bitcoin-defi", "images": []}, {"source": "vanguard", "name": "Vanguard", "call": "Above-consensus 2027 US growth forecast near 3% (vs. the Fed's ~2%) on accelerating AI investment, while flagging emerging signs of euphoria in parts of the stock market.", "category": ["growth", "ai_tech"], "url": "https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/ai-investment-powers-growth-outlook.html", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "call": "Raises its 2030 global obesity-drug sales forecast 15% to $114 billion, with oral medications reaching ~40% of the market; sees the biotech rally (+56% trailing 12 months) extending on M&A and new Medicare obesity-drug coverage.", "category": ["equities"], "url": "https://www.goldmansachs.com/insights/articles/biotech-stocks-are-projected-to-extend-rally-amid-innovation", "images": []}, {"source": "pimco", "name": "PIMCO", "call": "Holds a continued preference for high-yield bonds over leveraged loans and direct lending, citing record BB-rated HY share (54% vs 30% in 2010) against a post-COVID underwriting glut in loans.", "category": ["credit"], "url": "https://www.pimco.com/us/en/insights/the-credit-market-lens-a-growing-divide-in-leveraged-finance", "images": []}, {"source": "ubs", "name": "UBS", "call": "Favors semiconductor equipment, foundries, CPU compute infrastructure and memory within AI 'picks and shovels', alongside defensive payment networks and data-center REITs.", "category": ["ai_tech", "equities"], "url": "https://www.ubs.com/global/en/wealthmanagement/insights/chief-investment-office/house-view/daily/2026/latest-06072026.html", "images": []}, {"source": "lazard", "name": "Lazard", "call": "Three core mid-year convictions: weaker USD, steeper DM yield curves benefiting EM debt and infrastructure, and stronger relative performance from non-US equities (especially EM and Japan) versus a narrowly-led US market.", "category": ["fx", "rates", "equities"], "url": "https://www.lazard.com/research-insights/ron-temples-global-mid-year-outlook-2026-three-core-convictions-shaping-markets/", "images": []}, {"source": "amundi", "name": "Amundi", "call": "Out-of-consensus call for zero Fed hikes in 2026 and rate cuts in 2027; contrarian bullish GBP call against extreme bearish positioning; favors gold/real assets and quality carry.", "category": ["rates", "fx"], "url": "https://research-center.amundi.com/article/midyear-investment-outlook-2026-power-endurance-outerblue-convictions", "images": []}, {"source": "kkr", "name": "KKR", "call": "Thematic overweight conviction in 'Security of Everything' (defense, cyber, supply chains, critical materials) and power/energy infrastructure; believes the dollar has peaked but will not suffer a disorderly unwind.", "category": ["geopolitics", "energy"], "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}], "C_deep_reads": [{"source": "ubs", "name": "UBS", "title": "250 years of US innovation", "summary": "UBS's capital-markets history finale traces US markets from the 1792 Buttonwood Agreement through Bretton Woods to today's AI financing boom, arguing markets evolve through a repeated cycle of innovation, excess, crisis and regulatory reform. It draws an explicit parallel to the 1976 bicentennial: periods of high inflation, energy insecurity, political division and geopolitical tension — much like today — have historically preceded major innovation waves (semiconductors, PCs, the internet, biotech). The piece notes access to early-stage opportunity has cycled from small partnerships to broad public markets and, more recently, back toward private capital, with declining IPO activity and mega-scale AI financing raising fresh questions about who captures early-stage value creation next.", "url": "https://www.ubs.com/us/en/wealth-management/insights/investment-research/250-years-of-us-innovation.html", "images": []}, {"source": "kkr", "name": "KKR", "title": "Mid-Year Outlook for 2026: The Divergence Conundrum", "summary": "KKR argues the AI-driven productivity boom is persisting longer than expected even as intensifying geopolitical competition over scarce strategic inputs makes growth more concentrated and markets more K-shaped/bifurcated than at any point since the 1870s. The firm is above-consensus on US growth, expects higher-for-longer inflation ex-China, sees the global easing cycle fading even as the Fed stays patient, and expects long-end yields to stay a pressure point as the global bond selloff broadens. Key tilts: continued Asia outperformance across public and private markets, more assets linked to nominal GDP, private-equity returns driven by operational improvement rather than financial engineering, dispersed credit opportunities, and thematic overweights in 'Security of Everything' and power/energy infrastructure. Key risks flagged: disappointing trophy-asset IPOs amid slowing productivity, inflation/deficits pushing long bonds higher, and politics — not technology — derailing the productivity cycle.", "url": "https://www.kkr.com/insights/mid-year-update-2026", "images": []}, {"source": "man_group", "name": "Man Group", "title": "H2 Technology Outlook - Still Dancing, But Moving Closer to the Door?", "summary": "Man Group argues the AI trade is maturing from broad thematic exposure into sharp winner/loser discrimination. Semiconductor valuations have decoupled from downstream software cash flows even as consensus already calls the sector a bubble; Korean retail investors are reportedly liquidating insurance to buy memory stocks, with pension money concentrated in just two names. The most concentrated risk: hyperscalers' combined ~$627bn revenue backlog is roughly 49% tied to spending commitments from just OpenAI and Anthropic, a concentration that could trigger valuation compression across the infrastructure layer if AI monetization is delayed. Separately, the piece argues China has closed a decade-long semiconductor gap (domestic semi index +~100% in six months) with open-source Chinese models winning share on cost, estimates the tech IPO pipeline could deliver ~$2 trillion of market cap across New York and Hong Kong in six months, and flags 2027 lock-up expiries as the likely pressure point for the broader rally.", "url": "https://www.man.com/insights/h2-2026-technology-outlook", "images": []}, {"source": "amundi", "name": "Amundi", "title": "Investing in a 'Low Trust' World", "summary": "Amundi's Head of Geopolitics Anna Rosenberg argues the world has entered a structurally higher-risk 'Low Trust' regime — geopolitical risk is at its highest level since WWII by Amundi's internal conflict-intensity gauge — in which resilience, not efficiency, drives capital allocation and fiscal spending stays elevated despite weak public finances. Returns and valuations become more dispersed across countries and sectors; gold, selected equities and parts of EM were 2025's best performers on this theme. Bonds are losing some hedging power as inflation risk now competes with growth risk, illustrated by gold underperforming and oil outperforming since the Middle East escalation. The piece recommends portfolios screen for and favor sectors tied to energy independence (solar, nuclear, grid), tech-supply-chain sovereignty (domestic chips, cloud/data sovereignty), defense, and food/pharma production.", "url": "https://research-center.amundi.com/article/investing-low-trust-world", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "title": "Are US Stock Market Valuations Outpacing Fundamentals?", "summary": "Goldman Sachs Research's Dominic Wilson and Vickie Chang argue the AI investment boom, while now matching 1990s dot-com-era scale on some measures (US tech investment/GDP has breached 1990s highs; 2026 hyperscaler capex plans are ~50% above estimates from six months ago), differs structurally because corporate profit margins are rising rather than eroding and the current account deficit is narrowing rather than widening. Still, AI-related companies have gained roughly $27 trillion in market value since late 2022 versus Goldman's baseline estimate of only ~$9 trillion in present-value AI-driven capital revenues — meaning market pricing requires increasingly optimistic assumptions about how long AI firms' profit share can persist. They frame the key risk as shifting from a 'valuation bubble' to an 'earnings bubble,' with earnings durability past 2-3 years the central uncertainty, particularly for AI infrastructure suppliers.", "url": "https://www.goldmansachs.com/insights/articles/are-us-stock-market-valuations-outpacing-fundamentals", "images": []}, {"source": "bridgewater", "name": "Bridgewater Associates", "title": "Two Resource Grabs Reshaping Markets: Modern Mercantilism and AI", "summary": "Bridgewater Co-CIO Greg Jensen describes two accelerating 'resource grabs' reshaping markets: modern mercantilism, marked by the weaponization of strategic economic choke points, and AI. He argues the AI 'science bet' is paying off and software disruption has reached an inflection point, with compute demand now outpacing supply in ways that will require rationing going forward — a structural, not cyclical, framing echoed by Co-CIO Karen Karniol-Tambour's separate warning that most investors remain overweight US equities and underweight real assets, poorly positioned for an environment of rising fragmentation and every country spending to close its own vulnerabilities.", "url": "https://www.bridgewater.com/research-and-insights/two-resource-grabs-reshaping-markets-modern-mercantilism-and-ai", "images": []}, {"source": "franklin_templeton", "name": "Franklin Templeton", "title": "The World Didn't Break: 2026 Mid-Year Investment Outlook", "summary": "Franklin Templeton Institute reframes its three original 2026 cyclical themes — broadening, steepening, weakening — around a single idea of resilience despite the US-Iran war, tariffs and rising inflation. 'Broadening' of opportunities across regions/asset classes is judged 'spot on' and remains the central view; 'steepening' yield curves instead flattened as war-driven inflation pushed markets from pricing cuts to pricing possible hikes, leading the Institute to now favor short-duration income (US high yield, select EM debt especially Latin America, munis); and dollar 'weakening' only partly played out, but the Institute still concludes the era of broad dollar strength is over. Longer-term, it highlights AI-driven demand for energy/infrastructure, rising defense spending, aging-population-driven healthcare demand, and opportunities in secondaries, private credit, real estate and infrastructure.", "url": "https://www.franklintempleton.com/articles/2026/institute/the-world-didnt-break-2026-mid-year-investment-outlook", "images": []}, {"source": "bnp_paribas", "name": "BNP Paribas", "title": "Mid-year outlook: Prospects remain upbeat for equity and fixed income investors", "summary": "BNP Paribas AM's H2 2026 outlook turns more constructive after the Iran ceasefire and falling energy prices, with core rates seen range-bound (US 10-year Treasury 4.25%-5.0%, European govt bonds 2.5%-4.0%) and a stated preference for credit over duration as spreads retrace to pre-conflict levels. On equities, Q2 tech-hardware stocks returned over 50% versus 8.9% for tech ex-hardware and 5.9% for the rest of the market, driven by earnings (Q2 index earnings up 129% expected); global hardware forward P/E of 20.4x is only modestly above its 19.4x long-run average versus 57x at the dot-com peak, arguing against bubble concerns. China ex-hardware trades at 12.2x forward P/E versus a 21.7x long-run average, and Japan equities are seen benefiting from a ¥370 trillion government spending plan through 2040.", "url": "https://viewpoint.bnpparibas-am.com/mid-year-outlook-prospects-remain-upbeat-for-equity-and-fixed-income-investors/", "images": []}], "D_charts": [{"source": "bnp_paribas", "name": "BNP Paribas", "chart": "Exhibit showing technology hardware as the key factor behind sharply divergent regional equity returns in Q2 2026 (tech-hardware +50% vs ex-hardware +8.9% vs rest of market +5.9%).", "url": "https://viewpoint.bnpparibas-am.com/mid-year-outlook-prospects-remain-upbeat-for-equity-and-fixed-income-investors/", "images": ["https://viewpoint.bnpparibas-am.com/wp-content/uploads/2024/09/People-walki // ---------- helpers ----------
const CAT_VARS = {
  rates: 'var(--cat-rates)',
  growth: 'var(--cat-growth)',
  fx: 'var(--cat-fx)',
  equities: 'var(--cat-equities)',
  credit: 'var(--cat-credit)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  commodities: 'var(--cat-commodities)',
  geopolitics: 'var(--cat-geopolitics)',
  ai_tech: 'var(--cat-ai_tech)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}
function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}
function pills(cats) {
  if (!cats) return '';
  if (Array.isArray(cats)) return cats.map(pill).join(' ');
  return pill(cats);
}
function externalLink(url, label) {
  if (!url) return '';
  return `<a class="item-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${label || 'link →'}</a>`;
}
function nameLink(url, name) {
  if (!name) return '';
  if (!url) return `<span class="item-source">${escapeHtml(name)}</span>`;
  return `<a class="item-source" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderThemeItem(it) {
  return `
    <div class="theme-item">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.thesis || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderTheme(theme) {
  const items = (theme.items || []).map(renderThemeItem).join('');
  return `
    <div class="theme">
      <div class="theme-head">
        ${pills(theme.category)}
        <div class="theme-title">${escapeHtml(theme.theme || '')}</div>
      </div>
      <div class="theme-stance">
        ${theme.consensus ? `<div class="theme-line consensus"><span class="lbl">Consensus</span>${renderBold(theme.consensus)}</div>` : ''}
        ${theme.divergence ? `<div class="theme-line divergence"><span class="lbl">Divergence</span>${renderBold(theme.divergence)}</div>` : ''}
      </div>
      ${items ? `<div class="theme-items">${items}</div>` : ''}
    </div>`;
}

function renderCall(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${pills(it.category)}
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.call || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderDeepRead(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url, 'read →')}
      </div>
      ${it.title ? `<div class="item-title">${escapeHtml(it.title)}</div>` : ''}
      <div class="item-text">${renderBold(it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderChart(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.chart || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderHouseView(hv) {
  const name = hv.name || hv.source || '';
  const nameHtml = hv.url
    ? `<a class="hv-name" href="${escapeAttr(hv.url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : `<span class="hv-name">${escapeHtml(name)}</span>`;
  return `
    <div class="hv-row">
      ${nameHtml}
      <span class="hv-stance">${renderBold(hv.stance || '')}</span>
    </div>`;
}

function renderSection(letter, name, items, render, extraClass) {
  if (!items || !items.length) return '';
  const body = items.map(render).join('');
  const cls = 'section' + (extraClass ? (' ' + extraClass) : '');
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderTopStats(d) {
  const parts = [];
  const p = d.period || {};
  const is = d.input_stats || {};
  const cv = d.coverage || {};
  if (p.from && p.to)
    parts.push(`period <strong>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</strong>`);
  else if (p.lookback_days != null)
    parts.push(`lookback <strong>${p.lookback_days}d</strong>`);
  if (is.total_articles != null) parts.push(`articles <strong>${is.total_articles}</strong>`);
  if (is.sources_present != null) parts.push(`sources <strong>${is.sources_present}</strong>`);
  if (is.after_filter != null) parts.push(`after filter <strong>${is.after_filter}</strong>`);
  if (cv.coverage_pct != null) {
    const pct = (cv.coverage_pct <= 1 ? cv.coverage_pct * 100 : cv.coverage_pct);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  } else if (cv.sources_covered != null && cv.sources_total != null) {
    parts.push(`coverage <strong>${cv.sources_covered}/${cv.sources_total}</strong>`);
  }
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.period && d.period.to) return d.period.to;
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

// ---------- interactions ----------
function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  const s = d.sections || {};
  const out = [
    renderSummary(d.summary),
    renderSection('A.', 'Debates — Consensus vs Divergence', s.A_debates,    renderTheme),
    renderSection('B.', 'Key Calls & Positioning',           s.B_calls,      renderCall),
    renderSection('C.', 'Notable Deep Reads',                s.C_deep_reads, renderDeepRead,
                  'section-deepreads'),
    renderSection('D.', 'Charts & Data',                     s.D_charts,     renderChart),
    renderSection('E.', 'House Views',                       s.house_views,  renderHouseView),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = out || '<div class="empty">No report data.</div>';

  // Auto-open Summary's section view: first two sections open by default.
  document.querySelectorAll('.section').forEach((sec, i) => {
    if (i < 2) sec.classList.add('open');
  });
}

renderReport(REPORT_DATA);
</script>
