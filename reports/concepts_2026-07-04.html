cult across hundreds of millions of low-friction users, mirroring the compliance buildout consumer semiconductor firms faced after 2022 export controls.", "speaker": "Martin Chorzempa", "type": "framework", "entities": ["United States", "semiconductor companies"], "conviction": "high", "so_what": "KYC obligations raise operating friction and cost for US labs while creating evasion arbitrage; compliance spend becomes a new cost line for the sector.", "quote": null, "locator": "If future US model access is restricted by nationality", "quote_verified": false}]}, {"theme": "Risk that China also closes off", "insights": [{"claim": "The main risk for the rest of the world is that China, sharing US national-security concerns, could restrict access to future powerful models, potentially triggered by nonstate actors fine-tuning guardrails out of open-weight Chinese models to launch cyberattacks.", "speaker": "Martin Chorzempa", "type": "prediction", "entities": ["China", "United States"], "conviction": "medium", "so_what": "The open-weight hedge is not permanent; a China closure would remove third countries' counterweight and could force an all-Chinese-or-all-American stack choice.", "quote": null, "locator": "The main risk for the rest of the world", "quote_verified": false}, {"claim": "Chinese labs may abandon open-weight releases for economic reasons because giving away expensively trained models undermines a sustainable business model, pushing users to APIs that entail sending sensitive data to China and complying with Chinese censorship.", "speaker": "Martin Chorzempa", "type": "prediction", "entities": ["China"], "conviction": "medium", "so_what": "Open-weight economics are fragile; if China monetizes via API, the data-sovereignty and censorship costs of Chinese models rise sharply for global buyers.", "quote": null, "locator": "Chinese labs may also shift away from open weight models", "quote_verified": false}]}, {"theme": "Policy prescription", "insights": [{"claim": "The author argues the US urgently needs a transparent, provisional model-access regime co-developed with leading firms and key allies, guaranteeing allied early access, a trusted-user certification process, and neutral emergency procedures with an appeals process, and should stop imposing nationality-based restrictions.", "speaker": "Martin Chorzempa", "type": "thesis", "entities": ["United States"], "conviction": "high", "so_what": "A stable framework would reduce the ongoing US credibility discount; its absence is the key variable to watch for whether US labs keep or lose global share.", "quote": null, "locator": "A specific proposal is beyond the scope of this article", "quote_verified": false}]}], "insight_total": 19, "top_entities": ["Anthropic", "Mythos", "Fable", "China", "OpenAI", "US Department of Commerce", "Emmanuel Macron", "NSA", "Project Glasswing", "United States", "Trump administration"], "source_meta": {"author": "Martin Chorzempa", "word_count": 3009, "paywalled": false}}, {"record_id": "a209d57742396ac9", "source_type": "concepts", "source_name": "Peterson Institute (PIIE)", "source_url": "https://www.piie.com/blogs/realtime-economics/2026/firms-allowed-hire-immigrant-manual-laborers-expand-hire-more", "title": "Firms allowed to hire immigrant manual laborers expand to hire more Americans", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-04T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Society", "Geopolitics"], "gist": "Using the H-2B visa lottery as a natural experiment across 472 firms, Clemens and Lewis find that firms randomly allowed to hire low-skill immigrant labor grow revenue 12-14 percent and increase (not reduce) their employment of Americans, because the scale effect of immigrant labor outweighs the substitution effect by more than 2 to 1. They argue the Trump administration's 2026 maximalist restrictions on lawful immigration will shrink firms and become a macroeconomic drag rather than protect native workers.", "themes": [{"theme": "2026 US immigration policy regime shift", "insights": [{"claim": "The US government in 2026 enacted the largest shift in immigration policy since the 1924 quota act, and the Trump administration has chosen maximalist restrictions on lawful immigration rather than opening offsetting lawful channels.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "thesis", "entities": ["Trump administration", "US immigration policy", "United States"], "conviction": "high", "so_what": "A structural regime change in labor supply is underway; sectors dependent on foreign labor face a durable, policy-driven supply shock worth pricing into labor-cost and wage forecasts.", "quote": "The US government has recently enacted the largest shift in immigration policy since 1924", "locator": "Body / opening paragraph", "quote_verified": true}, {"claim": "The 2026 restrictions cut, penalized, or suspended lawful admissions of refugees, students, high-skill workers, and self-sponsored workers, barred most or all visas for 39 countries, and reduced authorized immigration by more than unauthorized immigration.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "data_point", "entities": ["Trump administration", "refugees", "high-skill workers", "H-1B", "United States"], "conviction": "high", "so_what": "The cut is falling hardest on legal, high-productivity immigration channels, implying broader growth drag than the border-focused headlines suggest.", "quote": "They have cut authorized immigration by more than unauthorized immigration", "locator": "So far, Trump administration officials have chosen maximalist restrictions", "quote_verified": true}, {"claim": "American economic demand for immigrant labor remains strong in construction, care work, and food production, where lawful immigrant workers increase the supply of key services, spark growth, and reduce inflation.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "causal", "entities": ["construction", "care work", "food production", "inflation"], "conviction": "high", "so_what": "Cutting these workers is disinflation-in-reverse; watch construction, elder/child care, and food-processing wage and price indices as leading indicators of restriction-driven cost pressure.", "quote": null, "locator": "Yet Americans' economic demand for immigrant labor remains strong", "quote_verified": false}]}, {"theme": "H-2B lottery as a natural experiment", "insights": [{"claim": "Because Department of Labor demand for the H-2B visa exceeds the congressional quota, scarce slots are allocated by random lottery, creating a de facto randomized experiment in which similar firms are randomly authorized or denied the right to hire foreign manual workers.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "framework", "entities": ["H-2B visa", "Department of Labor", "US Congress"], "conviction": "high", "so_what": "Random assignment removes selection bias that plagues most immigration studies, making these causal estimates far more credible than typical labor-econ correlations analysts cite.", "quote": "the Department of Labor distributes the scarce slots the way a stadium handles oversubscribed tickets: by lottery", "locator": "A lottery for the right to hire", "quote_verified": true}, {"claim": "The H-2B visa is the largest US visa for nonfarm, low-skill labor, used by landscaping crews, hotels, seafood processors, carnivals, and forestry contractors, and it legalizes a multibillion-dollar annual industry in US imports of fundamental services.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "data_point", "entities": ["H-2B visa", "landscaping", "hotels", "seafood processing", "forestry"], "conviction": "high", "so_what": "Identifies the specific labor-intensive service sub-sectors most exposed to H-2B quota policy for screening equity and credit exposure.", "quote": null, "locator": "A lottery for the right to hire", "quote_verified": false}, {"claim": "The authors surveyed 472 winning and losing firms from the 2021 and 2022 lotteries and pre-registered their analysis methods online before collecting data, so findings could not be bent to preconceptions; losing the lottery cut a firm's foreign-labor employment by roughly half.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "data_point", "entities": ["H-2B visa"], "conviction": "high", "so_what": "Pre-registration plus a ~50 percent first-stage treatment effect makes the identification strong; a credible evidentiary base for arguing quota expansion, not just advocacy.", "quote": "We had irreversibly posted our analysis methods online before we collected the data, so the findings could not be bent to fit preconceptions.", "locator": "That presents a rare opportunity to isolate the pure effects of foreign workers", "quote_verified": true}]}, {"theme": "Banana vs pasta: substitution vs scale framework", "insights": [{"claim": "The common fear that immigrants displace native workers rests on a 'banana model' in which labor is just more sellers in a market, so more immigrant labor must eventually push out native labor.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "framework", "entities": ["native workers", "immigrant labor"], "conviction": "medium", "so_what": "Names the intuitive but incomplete mental model driving restrictionist policy; recognizing it as a partial-equilibrium error is the crux of the contrarian trade.", "quote": "If immigrants in an economic sense were just more people selling labor, by the same logic they must displace native workers sooner or later.", "locator": "Call the simple picture the banana model", "quote_verified": true}, {"claim": "Treating immigrant and native labor as complementary factors of production, the 'pasta model' shows that restricting one factor triggers both a substitution effect (swap toward native labor) and a scale effect (shrink total production), so the net effect on native-labor demand can go either way and must be measured empirically.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "framework", "entities": ["native workers", "immigrant labor"], "conviction": "high", "so_what": "A rigorous mental model: whether immigration helps or hurts native jobs is an empirical question about task complementarity, not ideology, so it varies by sector and era.", "quote": "restricting one key factor of production (immigrant labor) can either reduce or raise firms' demand for another key factor of production (native labor)", "locator": "Immigrant labor is a factor of production: Thinking about bananas and pasta", "quote_verified": true}, {"claim": "Whether native and immigrant workers are net substitutes or complements turns on how much they specialize in different, complementary tasks such as cooking versus serving or construction versus architecture.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "causal", "entities": ["native workers", "immigrant labor"], "conviction": "high", "so_what": "Task-specialization is the observable mechanism; sectors where immigrant and native roles are distinct will see scale effects dominate and suffer most from restriction.", "quote": null, "locator": "Both effects are always present", "quote_verified": false}]}, {"theme": "Empirical results: scale effect dominates", "insights": [{"claim": "Firms randomly allowed to hire H-2B workers produced more, with revenue rising 12 to 14 percent, higher profit growth, and more reinvestment, inconsistent with foreign workers merely pushing out natives doing the same tasks.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "data_point", "entities": ["H-2B visa"], "conviction": "high", "so_what": "A 12-14 percent revenue lift from visa access quantifies the firm-level cost of quota denial; H-2B-dependent private businesses face material growth and margin risk under restriction.", "quote": "Firms randomly allowed to hire H-2B workers produced more, with revenue rising 12 to 14 percent.", "locator": "What the lottery showed", "quote_verified": true}, {"claim": "For a 10 percent increase in a firm's H-2B hiring, the substitution channel would trim low-skill US employment by about 0.6 percent, but the scale channel raises US employment by about 1.4 percent, for a net positive of roughly 0.9 percent.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "data_point", "entities": ["H-2B visa", "native workers"], "conviction": "high", "so_what": "The scale effect is more than twice the substitution effect, so at the margin immigrant hires create net American jobs; the empirical decomposition directly rebuts the displacement thesis.", "quote": "The scale effect is more than twice the substitution effect, so the net change in US jobs is positive, about 0.9 percent.", "locator": "The figure above shows the two competing effects", "quote_verified": true}, {"claim": "Across all firms, randomly gaining the chance to hire foreign workers did not reduce US hiring and if anything raised US employment, with the gains concentrated in rural areas where employers had the fewest labor alternatives.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "contrarian", "entities": ["native workers", "rural areas", "H-2B visa"], "conviction": "high", "so_what": "Directly contradicts the 'immigrants take American jobs' consensus in exactly the low-skill setting where displacement fears are strongest; rural labor markets are most exposed to restriction damage.", "quote": "If anything, US employment rose, particularly in rural areas where employers had the fewest alternatives.", "locator": "What the lottery showed", "quote_verified": true}, {"claim": "An independent research team led by Catalina Amuedo-Dorantes, using the full universe of H-2B employers' administrative data, reached broadly the same conclusion that restricting low-wage foreign labor shrinks the firms that use it without protecting existing workers.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "thesis", "entities": ["Catalina Amuedo-Dorantes", "H-2B visa"], "conviction": "high", "so_what": "Independent replication on full administrative data raises confidence that the result generalizes beyond the 472-firm survey; the finding is robust, not a sampling artifact.", "quote": "Restricting low-wage foreign labor shrinks the firms that use it without protecting the workers already there.", "locator": "A skeptic might ask whether the 472 firms we surveyed are representative", "quote_verified": true}]}, {"theme": "Macro and policy implications", "insights": [{"claim": "Expanding lawful low-skill immigration channels would increase US economic growth and native job creation, while the current sharp turn toward immigrant exclusion will become a macroeconomic drag.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "prediction", "entities": ["United States", "Trump administration", "US immigration policy"], "conviction": "high", "so_what": "Frames immigration restriction as a headwind to US GDP and employment; a bearish input for growth-sensitive positioning and a watch item for 2026-27 labor-market softness.", "quote": "Without that critical step, the US government's current sharp turn toward immigrant exclusion will become a macroeconomic drag.", "locator": "Our results suggest important opportunities", "quote_verified": true}, {"claim": "Immigrant removals and militarized raids are already depressing US job creation in industries where immigrants fill key roles.", "speaker": "Michael A. Clemens,Ethan G. Lewis", "type": "causal", "entities": ["United States", "immigrant labor", "Trump administration"], "conviction": "high", "so_what": "Enforcement actions are a real-time negative shock to sector employment; monitor construction, agriculture, hospitality, and food-processing payrolls for early evidence of the drag.", "quote": "Immigrant removals and militarized raids are already depressing US job creation in industries where immigrants fill key roles.", "locator": "Our results suggest important opportunities", "quote_verified": true}]}], "insight_total": 15, "top_entities": ["H-2B visa", "Trump administration", "Department of Labor", "Catalina Amuedo-Dorantes", "construction", "care work", "food production", "rural areas", "United States"], "source_meta": {"author": "Michael A. Clemens,Ethan G. Lewis", "word_count": 1448, "paywalled": false}}, {"record_id": "dc57869c0f9ec887", "source_type": "concepts", "source_name": "Peterson Institute (PIIE)", "source_url": "https://www.piie.com/blogs/realtime-economics/2026/americas-been-arguing-over-trade-more-250-years", "title": "America's been arguing over trade for more than 250 years", "published_date": "2026-07-01", "language": "en", "processed_at": "2026-07-04T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics"], "gist": "PIIE trade historian Douglas Irwin charts 250 years of US trade openness and tariff levels, showing that intense fights over tariffs are the American baseline, not an aberration. He documents a long pendulum from 60% tariffs in 1828 to post-WWII free-trade lows, and frames the current Trump tariff escalation and post-2008 de-globalization as the latest swing in a recurring cycle.", "themes": [{"theme": "Trade-openness supercycle (trade/GDP)", "insights": [{"claim": "US merchandise trade ran 10-20% of GDP in the decade after the 1787 Constitution, then fell to 5-10% after the War of 1812 as economic weight shifted to a less Europe-integrated Midwest and tariffs and domestic manufacturing reduced import dependence.", "speaker": "Douglas A. Irwin", "type": "data_point", "entities": ["United States", "War of 1812", "Midwest", "Western Europe"], "conviction": "high", "so_what": "The long-run trade/GDP baseline is structurally lower than headline globalization narratives imply; today's de-globalization is a return toward historical norms, not uncharted collapse.", "quote": null, "locator": "Figure 1 presents one measure of the importance of merchandise trade", "quote_verified": false}, {"claim": "US trade as a share of GDP held near 5% from the Civil War through the end of the 19th century, then rose from about 5% to more than 10% starting in the 1970s during the globalization era.", "speaker": "Douglas A. Irwin", "type": "data_point", "entities": ["United States", "Civil War"], "conviction": "high", "so_what": "Frames the 1970s-onward globalization boom as a distinct regime; a reversal back toward ~5% would be a multi-decade structural shift with broad asset implications.", "quote": null, "locator": "After the war, trade settled down to between 5 and 10 percent of GDP", "quote_verified": false}, {"claim": "US imports exceeded exports for the first time in 1980, marking the onset of persistent large US trade deficits.", "speaker": "Douglas A. Irwin", "type": "data_point", "entities": ["United States"], "conviction": "high", "so_what": "Dates the structural US deficit to 1980, useful context for gauging how entrenched the imbalance driving today's tariff politics actually is.", "quote": "The globalization era also sees imports becoming greater than exports in 1980 as the United States begins to experience large trade deficits.", "locator": "The globalization era also sees imports becoming greater than exports in 1980", "quote_verified": true}, {"claim": "US trade has been falling as a share of GDP since the 2008-10 global financial crisis, a de-globalization process accelerated by the tariffs of the two Trump administrations.", "speaker": "Douglas A. Irwin", "type": "causal", "entities": ["United States", "global financial crisis", "Trump administration"], "conviction": "high", "so_what": "Signals a durable trade-intensity downtrend predating Trump; investors should treat reshoring/trade-share decline as a secular trend, not a single-administration policy spasm.", "quote": null, "locator": "Since the global financial crisis of 2008-10, trade has been falling as a share of US GDP", "quote_verified": false}]}, {"theme": "Tariff pendulum and political crises", "insights": [{"claim": "US average tariffs rose from about 10% in 1790 to 60% under the Tariff of Abominations in 1828, provoking a crisis in which South Carolina and other Southern states threatened to nullify the tariff and nearly seceded.", "speaker": "Douglas A. Irwin", "type": "data_point", "entities": ["Tariff of Abominations", "South Carolina", "United States"], "conviction": "high", "so_what": "Historical proof that extreme tariff levels are politically destabilizing and self-limiting; a benchmark for judging how far current tariffs can climb before triggering backlash.", "quote": null, "locator": "Figure 2 shows the evolution of US tariffs over the course of history", "quote_verified": false}, {"claim": "The Compromise of 1833, brokered by Senator Henry Clay, brought US tariff levels down from their 1828 peak to under 20% by 1860.", "speaker": "Douglas A. Irwin", "type": "data_point", "entities": ["Compromise of 1833", "Henry Clay"], "conviction": "high", "so_what": "Shows tariff spikes historically get negotiated back down within decades; a template for expecting eventual de-escalation after political crisis.", "quote": null, "locator": "The Compromise of 1833, brokered by Senator Henry Clay", "quote_verified": false}, {"claim": "The Civil War shifted political power to the Northern Republican party, which instituted high tariffs both to raise revenue and to protect domestic industry.", "speaker": "Douglas A. Irwin", "type": "causal", "entities": ["Civil War", "Republican party"], "conviction": "high", "so_what": "Ties tariff regimes to which coalition holds power; the revenue-plus-protection rationale is the same dual justification invoked for tariffs today.", "quote": null, "locator": "The Civil War shifted political power to the Republican party", "quote_verified": false}, {"claim": "After WWII and the creation of GATT, US tariffs stabilized and trended downward through free trade agreements such as NAFTA (in force 1994), before the Trump administration reversed course and tariff levels jumped significantly in 2025.", "speaker": "Douglas A. Irwin", "type": "framework", "entities": ["GATT", "NAFTA", "Trump administration"], "conviction": "high", "so_what": "Frames 2025 as the end of an 80-year multilateral free-trade era; a regime break that reprices supply chains, trade-exposed equities, and FX.", "quote": "However, the Trump administration has reversed many of these policies, and tariff levels jumped significantly in 2025.", "locator": "After World War II and the establishment of the General Agreement on Tariffs and Trade", "quote_verified": true}, {"claim": "Many historical US duties were specific dollar amounts per imported quantity rather than ad valorem, so their effective percentage rate moved inversely with the price level, spiking in deflation and falling in inflation.", "speaker": "Douglas A. Irwin", "type": "framework", "entities": ["Great Depression", "World War I", "World War II"], "conviction": "medium", "so_what": "A reminder that headline tariff rates are distorted by the inflation regime; useful when comparing modern ad valorem tariffs against historical series.", "quote": null, "locator": "Many duties were specific (not ad valorem)", "quote_verified": false}]}, {"theme": "Trade as founding-era political fault line", "insights": [{"claim": "British North American colonists depended on overseas trade for essential goods they could not produce locally, to the point that historians argue imports made colonial settlement viable, not merely comfortable.", "speaker": "Douglas A. Irwin", "type": "thesis", "entities": ["British America", "United States"], "conviction": "high", "so_what": "Grounds the claim that trade dependence is foundational to the US economy, undercutting the notion that autarky is a natural or costless default.", "quote": "Overseas commerce did not merely make colonial life comfortable, it made it possible.", "locator": "From the early 1600s, British settlers in North America relied on overseas trade", "quote_verified": true}, {"claim": "Taxation of foreign trade was central to the American independence movement, with the 1776 Declaration of Independence citing Britain's cutting off colonial trade and imposing taxes without consent among its grievances.", "speaker": "Douglas A. Irwin", "type": "framework", "entities": ["Declaration of Independence", "Britain", "United States"], "conviction": "high", "so_what": "Establishes that trade and tariff conflict is woven into US political origins, supporting the thesis that today's fights are the norm rather than a crisis to be resolved.", "quote": null, "locator": "No taxation without representation!", "quote_verified": false}]}, {"theme": "Implied read on today's tariff politics", "insights": [{"claim": "A PIIE trade historian argues that intense American disagreement over tariffs is a 250-year-old constant, implying the current fights over Trump-era tariffs will persist for years rather than resolve into a stable consensus.", "speaker": "Douglas A. Irwin", "type": "thesis", "entities": ["United States", "Trump administration"], "conviction": "high", "so_what": "Sets an expectation of sustained trade-policy volatility as a base case; investors should price ongoing tariff uncertainty rather than betting on quick normalization.", "quote": "This suggests that the nation's trade debates are sure to continue for years to come.", "locator": "Today, Americans disagree intensely about the Trump administration's use of tariffs", "quote_verified": true}]}], "insight_total": 12, "top_entities": ["United States", "Trump administration", "Tariff of Abominations", "Henry Clay", "NAFTA", "GATT", "War of 1812", "South Carolina", "Declaration of Independence", "Douglas A. Irwin"], "source_meta": {"author": "Douglas A. Irwin", "word_count": 926, "paywalled": false}}, {"record_id": "b5c5b24860d8360f", "source_type": "concepts", "source_name": "St. Louis Fed — FRED Blog", "source_url": "https://fredblog.stlouisfed.org/2026/07/", "title": "July | 2026 | FRED Blog", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-04T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics"], "gist": "This is a FRED Blog monthly index page (July 2026): most of the text is navigation, an archive list, and a set of recent-post titles. It fully reproduces exactly one analytical post — 'Durable goods inflation and effective tariffs' — which documents how the U.S. effective tariff rate more than quadrupled to over 11% in 2025 and coincided with durable goods prices flipping from ~3% year-over-year deflation to ~2-3% inflation.", "themes": [{"theme": "Durable goods price regime shift", "insights": [{"claim": "From mid-2023 through early 2025, U.S. durable goods prices (appliances, electronics, furniture) were in deflation, declining by as much as 3% year-over-year.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["durable goods", "appliances", "electronics", "furniture", "United States"], "conviction": "high", "so_what": "The prior deflationary baseline for durables is the reference point investors should watch to gauge how much of recent goods inflation is tariff-driven versus structural.", "quote": "Deflation was the norm from mid-2023 through early 2025, with prices declining by as much as 3% year-over-year.", "locator": "Dramatic shifts in durable goods prices and trade policy", "quote_verified": true}, {"claim": "By early 2026, U.S. durable goods prices had reversed from deflation to increases of around 2% to 3% year-over-year.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["durable goods", "United States"], "conviction": "high", "so_what": "A swing of roughly 5 percentage points in the durables inflation contribution is material for headline PCE and for Fed policy expectations.", "quote": "durable goods deflation reversed course, from declines to increases of around 2% to 3% by early 2026.", "locator": "The picture changed sharply in 2025", "quote_verified": true}]}, {"theme": "Effective tariff rate trajectory", "insights": [{"claim": "The U.S. effective tariff rate stayed relatively stable at around 2.5% through 2024, then surged to over 11% during 2025, more than quadrupling in about a year.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["effective tariff rate", "imports", "United States"], "conviction": "high", "so_what": "A more-than-4x jump in the effective tariff burden is a first-order shock to import-dependent supply chains and consumer goods margins.", "quote": "The effective tariff rate surged from roughly 2.5% to over 11%, more than quadrupling in about a year.", "locator": "The picture changed sharply in 2025", "quote_verified": true}, {"claim": "The effective tariff rate is defined as total tariff revenue collected by the government divided by the total value of all imported goods.", "speaker": "St. Louis Fed — FRED Blog", "type": "framework", "entities": ["effective tariff rate", "tariff revenue", "imports"], "conviction": "high", "so_what": "Knowing the metric is revenue-over-import-value lets investors reconstruct it from customs receipts and import data rather than relying on headline statutory rates.", "quote": "the effective tariff rate is total tariff revenue collected by the government divided by the total value of all imported goods.", "locator": "Dramatic shifts in durable goods prices and trade policy", "quote_verified": true}, {"claim": "Effective tariffs appear to have peaked in late 2025 and have since begun declining, which if sustained could moderate durable goods inflation and potentially return prices to their earlier declines.", "speaker": "St. Louis Fed — FRED Blog", "type": "prediction", "entities": ["effective tariff rate", "durable goods"], "conviction": "medium", "so_what": "A rolling-over tariff rate signals possible disinflation in goods, a tailwind for the Fed and for rate-sensitive positioning if it holds.", "quote": "effective tariffs appear to have peaked in late 2025 and have since begun declining. If this trend continues, we could see a corresponding moderation in durable goods inflation", "locator": "The current trend", "quote_verified": true}]}, {"theme": "Tariff-to-price causal link", "insights": [{"claim": "The 2025 tariff spike and the acceleration in durable goods prices coincided closely, suggesting import taxes may be a factor ending the earlier durable goods deflation, though prices reflect many other factors.", "speaker": "St. Louis Fed — FRED Blog", "type": "causal", "entities": ["effective tariff rate", "durable goods", "imports"], "conviction": "medium", "so_what": "If tariffs are a genuine driver of goods reflation, tariff policy becomes a leading indicator for the goods component of inflation and for consumer-facing pricing power.", "quote": "the coinciding tariff spike and price acceleration suggest import taxes may be playing a role in ending the deflation consumers experienced with durable goods", "locator": "The picture changed sharply in 2025", "quote_verified": true}]}, {"theme": "Index page — surfaced but not-reproduced posts", "insights": [{"claim": "The July 2026 FRED Blog page lists additional recent St. Louis Fed research posts by title only — on AI investment and semiconductor prices, U.S. household financial optimism (Bankrate Consumer Survey), the June 2026 FOMC Summary of Economic Projections, and household economic well-being (SHED) — without reproducing their content.", "speaker": "St. Louis Fed — FRED Blog", "type": "anecdote", "entities": ["FRED Blog", "St. Louis Fed", "FOMC", "Bankrate Consumer Survey", "SHED"], "conviction": "low", "so_what": "Flags adjacent FRED research topics worth pulling directly, but this record carries only their headlines, not extractable data.", "quote": null, "locator": "Recent St. Louis Fed research", "quote_verified": false}]}], "insight_total": 7, "top_entities": ["durable goods", "effective tariff rate", "imports", "appliances", "electronics", "furniture", "FOMC", "St. Louis Fed", "FRED Blog"], "source_meta": {"author": "", "word_count": 816, "paywalled": false}}, {"record_id": "ec1dc53eaf2046f3", "source_type": "concepts", "source_name": "St. Louis Fed — FRED Blog", "source_url": "https://fredblog.stlouisfed.org/2026/07/durable-goods-inflation-and-effective-tariffs/", "title": "Durable goods inflation and effective tariffs", "published_date": "", "language": "en", "processed_at": "2026-07-04T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics"], "gist": "US durable goods prices (appliances, electronics, furniture) fell as much as 3% year-over-year through early 2025 while effective tariffs sat near 2.5%; in 2025 the effective tariff rate more than quadrupled to over 11% and durable goods deflation reversed to 2-3% inflation by early 2026, suggesting import taxes helped end the deflation.", "themes": [{"theme": "Durable goods deflation regime pre-2025", "insights": [{"claim": "US durable goods prices such as appliances, electronics, and furniture were in deflation from mid-2023 through early 2025, declining by as much as 3% year-over-year while effective tariffs held near 2.5%.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["durable goods", "appliances", "electronics", "furniture", "United States"], "conviction": "high", "so_what": "Establishes a multi-year disinflationary baseline for consumer durables that a tariff shock could disrupt — a benchmark for gauging how much of recent goods inflation is policy-driven.", "quote": "Deflation was the norm from mid-2023 through early 2025, with prices declining by as much as 3% year-over-year.", "locator": "Dramatic shifts in durable goods prices and trade policy", "quote_verified": true}]}, {"theme": "Effective tariff rate methodology", "insights": [{"claim": "The effective tariff rate is defined as total tariff revenue collected by the government divided by the total value of all imported goods.", "speaker": "St. Louis Fed — FRED Blog", "type": "framework", "entities": ["effective tariff rate", "imports"], "conviction": "high", "so_what": "Gives investors a replicable, revenue-based measure of actual tariff burden rather than headline statutory rates, useful for tracking real trade-policy pressure on prices.", "quote": "the effective tariff rate is total tariff revenue collected by the government divided by the total value of all imported goods", "locator": "Dramatic shifts in durable goods prices and trade policy", "quote_verified": true}]}, {"theme": "2025 tariff surge and inflation reversal", "insights": [{"claim": "In 2025 the US effective tariff rate surged from roughly 2.5% to over 11%, more than quadrupling in about a year.", "speaker": "St. Louis Fed — FRED Blog", "type": "data_point", "entities": ["effective tariff rate", "United States", "imports"], "conviction": "high", "so_what": "A more-than-4x jump in the realized tariff burden is a material cost shock to import-dependent supply chains and a key macro variable to size against goods-price inflation.", "quote": "The effective tariff rate surged from roughly 2.5% to over 11%, more than quadrupling in about a year.", "locator": "The picture changed sharply in 2025", "quote_verified": true}, {"claim": "Shortly after the 2025 tariff surge, durable goods prices reversed from declines to increases of around 2% to 3% year-over-year by early 2026, with import taxes suggested as a factor ending the prior deflation.", "speaker": "St. Louis Fed — FRED Blog", "type": "causal", "entities": ["durable goods", "tariffs", "appliances", "electronics", "furniture"], "conviction": "medium", "so_what": "Ties consumer durables inflation directly to trade policy — a signal that tariff changes, not just demand, are moving goods CPI and margins for importers and retailers.", "quote": "the coinciding tariff spike and price acceleration suggest import taxes may be playing a role in ending the deflation consumers experienced with durable goods", "locator": "The picture changed sharply in 2025", "quote_verified": true}, {"claim": "Durable goods prices reflect many factors beyond import tariffs, so the tariff-inflation relationship is complex despite the striking timing.", "speaker": "St. Louis Fed — FRED Blog", "type": "thesis", "entities": ["durable goods", "tariffs"], "conviction": "medium", "so_what": "A caution against over-attributing goods inflation to tariffs alone — investors should weigh demand, FX, and supply factors before pricing a pure tariff pass-through.", "quote": null, "locator": "While the timing is striking", "quote_verified": false}]}, {"theme": "Tariff peak and forward outlook", "insights": [{"claim": "Effective tariffs appear to have peaked in late 2025 and have since begun declining, which if continued could moderate durable goods inflation and potentially return prices to declines.", "speaker": "St. Louis Fed — FRED Blog", "type": "prediction", "entities": ["effective tariff rate", "durable goods"], "conviction": "low", "so_what": "A falling effective tariff rate is a leading indicator that goods disinflation may resume — worth monitoring for the durable goods component of CPI/PCE and rate-path implications.", "quote": "If this trend continues, we could see a corresponding moderation in durable goods inflation and potentially even a return to the price declines that characterized the earlier period.", "locator": "The current trend", "quote_verified": true}]}], "insight_total": 6, "top_entities": ["durable goods", "effective tariff rate", "tariffs", "appliances", "electronics", "furniture", "imports"], "source_meta": {"author": "", "word_count": 379, "paywalled": false}}, {"record_id": "30ac56cabc025c06", "source_type": "concepts", "source_name": "Works in Progress", "source_url": "https://worksinprogress.co/issue/how-amsterdam-invented-the-fire-department/", "title": "How Amsterdam invented the fire department - Works in Progress Magazine", "published_date": "2026-07-01", "language": "en", "processed_at": "2026-07-04T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Society"], "gist": "Seventeenth-century Amsterdam cut fire losses to under 1% of prior levels not by inventing a single machine but by pairing Jan van der Heyden's hose-based fire engine with a redesigned institution: district companies, a citywide alarm network, and fines-and-rewards incentives, in an early example of what would later be called systems analysis. The case shows how a coordination problem was solved decades before fire insurance existed, through state capacity and incentive design rather than markets.", "themes": [{"theme": "Wealth as an amplifier of urban fire risk", "insights": [{"claim": "Rising material abundance in a seventeenth-century commercial city directly increased fire risk, as cheaper textiles like curtains near candles became a common ignition source that spread to wooden interiors.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Amsterdam", "David Garrioch"], "conviction": "high", "so_what": "Prosperity and fire-load rise together; modern analogue is how densification and new materials (lithium batteries, data centers) create novel catastrophic risks that outpace existing safety regimes.", "quote": "Curtains became far more common: easily set alight by a carelessly positioned candle, they were the source of many fires that then spread to wooden furniture and walls", "locator": "People of all ranks owned more clothes and furnishings", "quote_verified": true}, {"claim": "Concentrations of industrial inputs magnified systemic fire risk: maintaining a shipping fleet required stores of highly combustible pitch, tar, turpentine, and hemp, while brewing, printing, resin, sugar, soap, and sawmilling all added their own hazards.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Amsterdam", "shipbuilding", "sugar refining", "printing"], "conviction": "high", "so_what": "Clustered flammable inventory is a correlated-risk problem; the same logic underlies why insurers and regulators scrutinize concentration in warehousing, chemical storage, and grid infrastructure today.", "quote": null, "locator": "If its homes were vulnerable, Amsterdam's factories, workshops, and piers were in even greater peril", "quote_verified": false}, {"claim": "Despite heightened hazards, Amsterdam avoided a catastrophe like London's Great Fire of 1666, and fire losses fell dramatically over the century's last three decades due to a culture of inventiveness combined with what would today be called state capacity.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["Amsterdam", "London", "Great Fire of 1666"], "conviction": "high", "so_what": "The central claim: outcomes diverged not from luck but from institutional capacity to build and operate systems; a durable lens for comparing cities/states on disaster resilience.", "quote": null, "locator": "Yet Amsterdam avoided the disastrous equivalent of London's Great Fire of 1666", "quote_verified": false}]}, {"theme": "The Hautsch engines: capital without capability", "insights": [{"claim": "By 1670 Amsterdam had deployed roughly 60 horse-dragged water-pumping engines bought from Nuremberg inventor Hans Hautsch, plus ladders, hooks, tarpaulins, and more than 28,000 leather buckets, staffed by members of four guilds — making it the largest and best-equipped firefighting system in Europe.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Amsterdam", "Hans Hautsch", "Nuremberg"], "conviction": "high", "so_what": "Being the best-resourced player is not the same as being effective; capex leadership can mask a capability gap that only failure exposes.", "quote": null, "locator": "In the 1660s, the city purchased dozens of large water-pumping engines", "quote_verified": false}, {"claim": "The Hautsch engines' fatal limitation was hydraulic reach: their rigid nozzled pipes could only spray the exterior and lower floors, so firefighters could not deliver water to a roof or deep into a building to quench a fire at its origin.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Hans Hautsch", "Laurier Canal"], "conviction": "high", "so_what": "A binding technical constraint, not resource scarcity, was the true bottleneck — a reminder to diagnose the specific failure mode before scaling spend.", "quote": "The streams of water sprayed only the outside of the building and the lower levels", "locator": "The essential problem was that fire fighters couldn't get enough water to the roof", "quote_verified": true}, {"claim": "The December 1669 sugar-refinery fire on the Laurier Canal destroyed an estimated 195,000 guilders (perhaps $20 million today) with the owner uninsured, since fire insurance was still almost a century away, and the ruined owner died days later.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Laurier Canal", "sugar refinery"], "conviction": "high", "so_what": "Before insurance, catastrophic loss was total and personal; the absence of risk-transfer markets raised the social payoff to public loss-prevention infrastructure.", "quote": null, "locator": "On a December night in 1669, a large, new sugar refinery on the Laurier Canal caught fire", "quote_verified": false}, {"claim": "The 1672 fire at Joan Blaeu's printing office — then the largest in the world and home to the Atlas maior plates — caused 382,000 guilders in losses because the building was far from any canal and freezing temperatures rendered the water pumps useless, and Blaeu never recovered and died the following year.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["Joan Blaeu", "Atlas maior", "Amsterdam"], "conviction": "high", "so_what": "Environmental edge cases (distance from water, freezing) destroy systems designed only for average conditions; robustness to tail conditions is where value is won or lost.", "quote": null, "locator": "Even more devastating was a 1672 fire", "quote_verified": false}]}, {"theme": "Van der Heyden and systems-level invention", "insights": [{"claim": "The decisive innovator, Jan van der Heyden, was a celebrated cityscape painter (the 'Dutch Canaletto') who was simultaneously a prolific inventor and systems manager, later chronicling Amsterdam's fires in a 1690 account co-written with his son.", "speaker": "WorksInProgMag", "type": "anecdote", "entities": ["Jan van der Heyden", "Amsterdam"], "conviction": "high", "so_what": "Breakthrough operators often come from adjacent, non-obvious fields; talent scouting that over-indexes on domain credentials misses cross-disciplinary system-builders.", "quote": null, "locator": "Van der Heyden was a painter famous for his meticulously detailed city scenes", "quote_verified": false}, {"claim": "Before tackling fire, Van der Heyden built Amsterdam's street-lighting system of 1,800 purpose-designed oil lanterns installed by 1670, earning appointment as 'director of the municipal lights' at 2,000 guilders a year and making the city the best-lit in Europe.", "speaker": "WorksInProgMag", "type": "anecdote", "entities": ["Jan van der Heyden", "Amsterdam"], "conviction": "high", "so_what": "The same operator delivering a prior public-infrastructure success bought the credibility and municipal relationships that made later fire reforms adoptable — track records compound across projects.", "quote": null, "locator": "In 1669, he proposed a plan to light Amsterdam's streets with 1,800 oil lanterns", "quote_verified": false}, {"claim": "The Van der Heyden brothers' new fire engine solved the reach problem with three linked features: a leather suction hose to draw water continuously from a distance, a flexible leather 'snake' hose to aim deep inside buildings, and an air chamber delivering a continuous high-pressure stream that also resisted freezing.", "speaker": "WorksInProgMag", "type": "framework", "entities": ["Jan van der Heyden", "Nicolaas van der Heyden"], "conviction": "high", "so_what": "The winning design attacked exactly the failure modes (reach, continuity, freezing) that had destroyed the refinery and Blaeu's shop — targeted redesign around observed failures beats incremental improvement.", "quote": null, "locator": "There were three critical elements to the brothers' new fire engines", "quote_verified": false}, {"claim": "Van der Heyden's distinction was that he designed not just a machine but how it would operate in practice, an approach a translator characterized as one of the earliest instances of the method now called systems analysis.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["Jan van der Heyden", "Hans Hautsch", "Lettie Stibbe Multhauf"], "conviction": "high", "so_what": "The transferable framework: durable innovation optimizes the whole operating system, not the device — the same insight separates deployed AI/tech from lab demos today.", "quote": "one of the earliest instances of a method now called systems analysis", "locator": "Jan van der Heyden was not just an ingenious mechanic like Hans Hautsch", "quote_verified": true}]}, {"theme": "Adoption friction and the turning-point fire", "insights": [{"claim": "Even after the city council retrofitted half its engines in November 1672, adoption stalled because at a January harbor fire the lone new engine arrived late and firefighters, amid crisis, refused to risk 'new and unproven things.'", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Amsterdam", "Jan van der Heyden"], "conviction": "high", "so_what": "Superior technology stalls on operator risk-aversion under pressure; adoption is a behavioral and organizational problem, not just a performance one.", "quote": "The fire fighters did not think that this was the time to try new and unproven things", "locator": "The lone new engine arrived late", "quote_verified": true}, {"claim": "The same harbor fire became the turning point when the single new engine, put reluctantly to work on a blaze thought unwinnable, extinguished about a hundred feet of burning rubble and saved everything left standing, making it the last fire ever fought with Amsterdam's unmodified old engines.", "speaker": "WorksInProgMag", "type": "anecdote", "entities": ["Jan van der Heyden", "Elandsgracht", "Amsterdam"], "conviction": "high", "so_what": "A single vivid, verifiable demonstration flipped institutional adoption — the pattern for how disruptive tools cross the chasm once proof beats skepticism.", "quote": "A single new engine, coming late and finally reluctantly put to work on what was thought to be unavoidably lost, had preserved everything that had still been standing", "locator": "This incident showed clear as day the difference between the two engines", "quote_verified": true}, {"claim": "Full institutional rollout took nearly a decade: only in 1681 did the mayors order the Van der Heydens to supply engines to each of the city's sixty districts and to draw up regulations, after users themselves petitioned in 1679 to swap awkward retrofitted engines for lighter new ones.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["Amsterdam", "Jan van der Heyden", "Nicolaas van der Heyden"], "conviction": "high", "so_what": "Institutional and organizational change lags the technology by years; the demand pull came from front-line users, not top-down mandate — a governance pattern worth watching in any tech deployment.", "quote": null, "locator": "The transition to new technology, and the organizational changes to back it up, took time", "quote_verified": false}]}, {"theme": "Incentive design, results, and political economy", "insights": [{"claim": "The reformed fire service was engineered around market-style incentives: watchmen who failed to notify firefighters paid the firefighters' fines, householders who fought a // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
