// State
var activeCat = "all";
var activeUrgency = "all";
var activeSrc = null;

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) {
    body.classList.toggle('open');
  }
}

function toggleReport(el) {
  var body = document.getElementById('report-body');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    el.textContent = '▶ Session Report';
  } else {
    body.classList.add('open');
    el.textContent = '▼ Session Report';
  }
}

function applyFilters() {
  ITEMS.forEach(function(item) {
    var card = document.getElementById('card-' + item.id);
    if (!card) return;
    var catMatch = activeCat === 'all' || item.cat === activeCat;
    var urgMatch = activeUrgency === 'all' || item.urgency === activeUrgency;
    var srcMatch = activeSrc === null || item.source.indexOf(activeSrc) !== -1;
    if (catMatch && urgMatch && srcMatch) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('#cat-filters .filter-pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '#fff';
    p.style.color = '#555';
  });
  var active = document.querySelector('#cat-filters [data-cat="' + cat + '"]');
  if (active) {
    active.classList.add('active');
    if (cat === 'all') {
      active.style.background = '#555';
    } else {
      active.style.background = CAT_COLORS[cat] || '#555';
    }
    active.style.color = '#fff';
  }
  applyFilters();
}

function setUrgencyFilter(urgency) {
  activeUrgency = urgency;
  activeSrc = null;
  document.querySelectorAll('#urgency-filters .filter-pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '#fff';
    p.style.color = '#555';
  });
  var active = document.querySelector('#urgency-filters [data-urgency="' + urgency + '"]');
  if (active) {
    active.classList.add('active');
    active.style.background = '#555';
    active.style.color = '#fff';
  }
  applyFilters();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrgency = 'all';
  document.querySelectorAll('.filter-pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '#fff';
    p.style.color = '#555';
  });
  ITEMS.forEach(function(item) {
    var card = document.getElementById('card-' + item.id);
    if (!card) return;
    if (item.source.indexOf(name) !== -1) {
      card.classList.remove('hidden');
      var body = document.getElementById('body-' + item.id);
      if (body) body.classList.add('open');
    } else {
      card.classList.add('hidden');
    }
  });
}

function buildCatFilters() {
  var counts = { all: ITEMS.length };
  ITEMS.forEach(function(i) { counts[i.cat] = (counts[i.cat] || 0) + 1; });
  var bar = document.getElementById('cat-filters');
  var allPill = document.createElement('button');
  allPill.className = 'filter-pill active';
  allPill.setAttribute('data-cat', 'all');
  allPill.style.background = '#555';
  allPill.style.color = '#fff';
  allPill.textContent = 'All (' + counts.all + ')';
  allPill.onclick = function() { setCatFilter('all'); };
  bar.appendChild(allPill);
  var cats = Object.keys(counts).filter(function(k) { return k !== 'all'; });
  cats.sort();
  cats.forEach(function(cat) {
    var pill = document.createElement('button');
    pill.className = 'filter-pill';
    pill.setAttribute('data-cat', cat);
    pill.style.borderColor = CAT_COLORS[cat] || '#ccc';
    pill.style.color = CAT_COLORS[cat] || '#555';
    pill.textContent = cat + ' (' + counts[cat] + ')';
    pill.onclick = (function(c) { return function() { setCatFilter(c); }; })(cat);
    bar.appendChild(pill);
  });
}

function buildUrgencyFilters() {
  var urgencyCounts = { all: ITEMS.length, red: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(i) { urgencyCounts[i.urgency] = (urgencyCounts[i.urgency] || 0) + 1; });
  var bar = document.getElementById('urgency-filters');
  var defs = [
    { key: 'all', label: 'All (' + urgencyCounts.all + ')' },
    { key: 'red', label: '🔴 Act Now (' + (urgencyCounts.red || 0) + ')' },
    { key: 'deep', label: '🔵 Deep (' + (urgencyCounts.deep || 0) + ')' },
    { key: 'watch', label: '🟡 Watch (' + (urgencyCounts.watch || 0) + ')' }
  ];
  defs.forEach(function(d) {
    var pill = document.createElement('button');
    pill.className = 'filter-pill' + (d.key === 'all' ? ' active' : '');
    pill.setAttribute('data-urgency', d.key);
    if (d.key === 'all') { pill.style.background = '#555'; pill.style.color = '#fff'; }
    pill.textContent = d.label;
    pill.onclick = (function(k) { return function() { setUrgencyFilter(k); }; })(d.key);
    bar.appendChild(pill);
  });
}

function urgencyEmoji(u) {
  if (u === 'red') return '🔴';
  if (u === 'deep') return '🔵';
  if (u === 'watch') return '🟡';
  return '';
}

      '</div>';

    var angleStyle = 'border-left:2px solid ' + catColor + ';background:' + catColor + '11;';

    var chartsHtml = '';
    if (item.charts.count > 0) {
      chartsHtml = '<div class="section-label">Charts</div>' +
        '<div class="charts-box' + (item.charts.hot ? ' charts-hot' : '') + '">' +

        escapeHtml(item.charts.desc) +
        '</div>';
    }

    var bodyHtml = '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + escapeHtml(item.idea) + '</div>' +
      '<div class="section-label">My Angle</div>' +

      '<div class="section-label">Tweets</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label a">TWEET A</div>' +
          '<div class="tweet-text">' + escapeHtml(item.tweetA) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label b">TWEET B</div>' +
          '<div class="tweet-text">' + escapeHtml(item.tweetB) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartsHtml +
      '<a class="link-btn" href="' + escapeHtml(item.link) + '" target="_blank">↗ Read full article</a>' +
      '</div>';

    card.innerHTML = headerHtml + bodyHtml;
    container.appendChild(card);
  });
}

function buildReport() {
  var body = document.getElementById('report-body');
  var html = '';
  html += '<div class="report-row"><div class="report-key">Window</div><div class="report-val">' + META.windowStart + ' → ' + META.windowEnd + '</div></div>';
  html += '<div class="report-row"><div class="report-key">Emails in window</div><div class="report-val">' + META.emailsInWindow + '</div></div>';
  html += '<div class="report-row"><div class="report-key">Emails read</div><div class="report-val">' + META.emailsRead + ' of ' + META.emailsInWindow + '</div></div>';
  html += '<div class="report-row"><div class="report-key">Items extracted</div><div class="report-val">' + META.itemsExtracted + '</div></div>';
  html += '<div class="report-row"><div class="report-key" style="padding-top:10px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;">Included Sources</div><div class="report-val"></div></div>';
  META.includedSources.forEach(function(s) {
    html += '<div class="report-row"><div class="report-key"><span class="src-link" onclick="filterBySrc(\'' + escapeHtml(s.name) + '\')">' + escapeHtml(s.name) + '</span></div><div class="report-val">' + s.items + ' item' + (s.items > 1 ? 's' : '') + '</div></div>';
  });
  html += '<div class="report-row"><div class="report-key" style="padding-top:10px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;">Skipped Sources</div><div class="report-val"></div></div>';

    html += '<div class="report-row"><div class="report-key">' + escapeHtml(s.name) + '</div><div class="report-val skip-reason">' + escapeHtml(s.reason) + '</div></div>';
  });
  body.innerHTML = html;
}

function buildHeader() {
  var el = document.getElementById('header-meta');
  el.textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function init() {
  buildHeader();
  buildCatFilters();
  buildUrgencyFilters();
  buildCards();
  buildReport();
}
