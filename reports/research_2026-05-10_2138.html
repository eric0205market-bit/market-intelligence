    html += '</div>';
    html += '</div>';
    if (item.charts.count > 0) {
      html += '<div class="charts-box' + (item.charts.hot ? ' hot' : '') + '">';
      html += '<strong>📊 Charts (' + item.charts.count + '):</strong> ' + esc(item.charts.desc);
      html += '</div>';
    }
    if (item.link) {
      html += '<div class="link-row"><a href="' + esc(item.link) + '" target="_blank">↗ Read full article</a></div>';
    }
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function renderCatFilters() {
  var cats = {};
  ITEMS.forEach(function(item) {
    cats[item.cat] = (cats[item.cat] || 0) + 1;
  });
  var container = document.getElementById('cat-filters');
  var html = '<span class="filter-label">Category</span>';
  var allActive = currentCat === 'all';
  html += '<span class="pill ' + (allActive ? 'active' : 'inactive') + '" style="' + (allActive ? 'background:#555;border-color:#555;' : '') + '" onclick="setCat(\'all\')">All <span class="cnt">' + ITEMS.length + '</span></span>';
  Object.keys(cats).sort().forEach(function(cat) {
    var active = currentCat === cat;
    var color = CATS[cat] || '#888';
    html += '<span class="pill ' + (active ? 'active' : 'inactive') + '" style="' + (active ? 'background:' + color + ';border-color:' + color + ';' : 'border-color:#e0ddd8;') + '" onclick="setCat(\'' + cat + '\')">' + cat + ' <span class="cnt">' + cats[cat] + '</span></span>';
  });
  container.innerHTML = html;
}

function renderUrgencyFilters() {
  var urgCounts = { 'act-now': 0, 'deep': 0, 'watch': 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });
  var container = document.getElementById('urgency-filters');
  var html = '<span class="filter-label">Urgency</span>';
  var opts = [
    { key: 'all', label: 'All', color: '#555' },
    { key: 'act-now', label: '🔴 Act Now', color: '#e24b4a' },
    { key: 'deep', label: '🔵 Deep', color: '#378add' },
    { key: 'watch', label: '🟡 Watch', color: '#ef9f27' }
  ];
  opts.forEach(function(o) {
    var active = currentUrgency === o.key;
    var cnt = o.key === 'all' ? ITEMS.length : urgCounts[o.key];
    html += '<span class="pill ' + (active ? 'active' : 'inactive') + '" style="' + (active ? 'background:' + o.color + ';border-color:' + o.color + ';' : '') + '" onclick="setUrgency(\'' + o.key + '\')">' + o.label + ' <span class="cnt">' + cnt + '</span></span>';
  });
  container.innerHTML = html;
}

function setCat(cat) {
  currentCat = cat;
  renderCatFilters();
  renderItems();
}

function setUrgency(urg) {
  currentUrgency = urg;
  renderUrgencyFilters();
  renderItems();
}

function renderHeader() {
  document.getElementById('header-meta').textContent = META.date + ' · ' + META.time + ' · Window: ' + META.windowStart + ' → ' + META.windowEnd;
  var urgCounts = { 'act-now': 0, 'deep': 0, 'watch': 0 };
  ITEMS.forEach(function(i) { urgCounts[i.urgency]++; });
  document.getElementById('header-stats').innerHTML =
    '<div class="stat"><strong>' + META.itemsExtracted + '</strong><span>items extracted</span></div>' +
    '<div class="stat"><strong>' + META.emailsRead + '/' + META.emailsInWindow + '</strong><span>emails read</span></div>' +
    '<div class="stat"><strong>' + META.includedSources.length + '</strong><span>sources</span></div>' +
    '<div class="stat"><strong style="color:#e24b4a">' + urgCounts['act-now'] + '</strong><span>🔴 act now</span></div>' +
    '<div class="stat"><strong style="color:#378add">' + urgCounts['deep'] + '</strong><span>🔵 deep</span></div>' +
    '<div class="stat"><strong style="color:#ef9f27">' + urgCounts['watch'] + '</strong><span>🟡 watch</span></div>';
}

function renderReport() {
  document.getElementById('meta-window').innerHTML =
    '<strong>Window:</strong> ' + META.windowStart + ' to ' + META.windowEnd + '. Emails outside this window were not processed.';
  var incHtml = '';
  META.includedSources.forEach(function(s) {
    incHtml += '<div class="report-row"><span>' + esc(s.name) + '</span><span style="font-weight:600;color:#555">' + s.items + ' items</span></div>';
  });
  document.getElementById('included-sources').innerHTML = incHtml;
  var skipHtml = '';
  META.skippedSources.forEach(function(s) {
    skipHtml += '<div class="report-row"><div><strong>' + esc(s.name) + '</strong><br><span class="skip-reason">' + esc(s.reason) + '</span></div></div>';
  });
  document.getElementById('skipped-sources').innerHTML = skipHtml;
}

renderHeader();
renderCatFilters();
renderUrgencyFilters();
renderItems();
renderReport();
</script>
</body>
</html>
