  var display = expanded ? "block" : "none";
  var arrow = expanded ? "▲" : "▼";
  var chartBadge = item.charts.count > 0 ? (item.charts.hot ? " 🔥" : " 📊") : "";

  var chartHtml = "";
  if (item.charts.count > 0) {
    var bColor = item.charts.hot ? "#f59e0b" : "#ccc";
    chartHtml = "<div class=\"chart-box\" style=\"border:2px dashed " + bColor + ";\">" +
      "<strong>Charts (" + item.charts.count + "):</strong> " + item.charts.desc +
      (item.charts.hot ? " <strong style=\"color:#f59e0b;\">🔥 CHART WORTH SAVING</strong>" : "") +
      "</div>";
  }

  var linkHtml = item.link ? "<div style=\"margin-top:10px;\"><a href=\"" + item.link + "\" target=\"_blank\" class=\"article-link\" style=\"color:" + color + ";\">↗ Read full article</a></div>" : "";

  var angleColor = hexToRgba(color, 0.06);

  var html =
    "<div class=\"card\">" +
      "<div class=\"card-header\" onclick=\"toggleCard(" + item.id + ")\">" +
        "<span class=\"card-num\">" + item.id + "</span>" +
        "<span>" + urgEmoji + "</span>" +
        "<span class=\"card-source\" style=\"background:" + color + ";\">" + item.source + "</span>" +
        "<span class=\"card-cat\">" + item.cat + "</span>" +
        (item.charts.count > 0 ? "<span>" + (item.charts.hot ? "🔥" : "📊") + "</span>" : "") +
        "<span class=\"card-title\">" + item.title + "</span>" +
        "<span class=\"card-arrow\" id=\"arrow-" + item.id + "\">" + arrow + "</span>" +
      "</div>" +
      "<div class=\"card-body\" id=\"body-" + item.id + "\" style=\"display:" + display + ";\">" +
        "<div style=\"margin-bottom:12px;\">" +
          "<div class=\"section-label\">The Idea</div>" +
          "<div class=\"idea-text\">" + item.idea + "</div>" +
        "</div>" +
        "<div class=\"angle-box\" style=\"border-left:3px solid " + color + ";background:" + angleColor + ";\">" +
          "<div class=\"section-label\">My Angle</div>" +
          "<div class=\"angle-text\">" + item.angle + "</div>" +
        "</div>" +
        chartHtml +
        "<div class=\"tweets-row\">" +
          "<div class=\"tweet-box\" style=\"background:#f0f6ff;\">" +
            "<div class=\"tweet-label\" style=\"color:#378add;\">TWEET A</div>" +
            "<div class=\"tweet-text\">" + item.tweetA + "</div>" +
            "<button class=\"copy-btn\" style=\"background:#378add;\" onclick=\"copyTweet(" + item.id + ",'a')\">📋 Copy</button>" +
          "</div>" +
          "<div class=\"tweet-box\" style=\"background:#f5f3ff;\">" +
            "<div class=\"tweet-label\" style=\"color:#7f77dd;\">TWEET B</div>" +
            "<div class=\"tweet-text\">" + item.tweetB + "</div>" +
            "<button class=\"copy-btn\" style=\"background:#7f77dd;\" onclick=\"copyTweet(" + item.id + ",'b')\">📋 Copy</button>" +
          "</div>" +
        "</div>" +
        linkHtml +
      "</div>" +
    "</div>";
  return html;
}

function renderCards() {
  var container = document.getElementById("cards");
  var filtered = ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
    var catOk = activeCat === "all" || item.cat === activeCat;
    var urgOk = activeUrg === "all" || item.urgency === activeUrg;
    return catOk && urgOk;
  });
  var expanded = !!activeSrc;
  container.innerHTML = filtered.map(function(item) { return buildCard(item, expanded); }).join("");
}

function toggleReport() {
  var body = document.getElementById("report-body");
  var btn = document.querySelector(".report-toggle");
  if (body.style.display === "none" || body.style.display === "") {
    body.style.display = "block";
    btn.textContent = "▼ Session Report";
  } else {
    body.style.display = "none";
    btn.textContent = "▶ Session Report";
  }
}

function buildReport() {
  var html = "<strong>Time Window:</strong> " + META.windowStart + " → " + META.windowEnd + "<br><br>";
  html += "<strong>Emails in window:</strong> " + META.emailsInWindow + " &nbsp;|&nbsp; ";
  html += "<strong>Emails read:</strong> " + META.emailsRead + " &nbsp;|&nbsp; ";
  html += "<strong>Items extracted:</strong> " + META.itemsExtracted + "<br><br>";
  html += "<strong>Included Sources:</strong><br>";
  META.includedSources.forEach(function(src) {
    var safeName = src.name.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    html += "• <span onclick=\"filterBySrc('" + safeName + "')\" style=\"cursor:pointer;color:#378add;text-decoration:underline;\">" + src.name + "</span> — " + src.count + " item" + (src.count > 1 ? "s" : "") + "<br>";
  });
  html += "<br><strong>Skipped (4 sources):</strong><br>";
  META.skippedSources.forEach(function(src) {
    html += "• " + src.name + " — " + src.reason + "<br>";
  });
  document.getElementById("report-body").innerHTML = html;
}

window.onload = function() {
  // Build category filter bar
  var catBar = document.getElementById("cat-filters");
  var catsSeen = [];
  var catCounts = {};
  ITEMS.forEach(function(item) {
    if (catsSeen.indexOf(item.cat) === -1) catsSeen.push(item.cat);
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
  });
  var allCats = ["all"].concat(catsSeen);
  allCats.forEach(function(cat) {
    var count = cat === "all" ? ITEMS.length : (catCounts[cat] || 0);
    var color = cat === "all" ? "#555" : getColor(cat);
    var btn = document.createElement("button");
    btn.className = "cat-pill";
    btn.dataset.cat = cat;
    btn.textContent = (cat === "all" ? "All" : cat) + " (" + count + ")";
    btn.style.cssText = "border:1px solid " + color + ";color:" + color + ";";
    btn.onclick = function() { setCat(cat); updateFilterStyles(); };
    catBar.appendChild(btn);
  });

  // Build urgency filter bar
  var urgBar = document.getElementById("urg-filters");
  var urgItems = [
    { key: "all", label: "All", count: ITEMS.length },
    { key: "act-now", label: "🔴 Act Now", count: ITEMS.filter(function(i) { return i.urgency === "act-now"; }).length },
    { key: "deep", label: "🔵 Deep", count: ITEMS.filter(function(i) { return i.urgency === "deep"; }).length },
    { key: "watch", label: "🟡 Watch", count: ITEMS.filter(function(i) { return i.urgency === "watch"; }).length }
  ];
  urgItems.forEach(function(u) {
    var btn = document.createElement("button");
    btn.className = "urg-pill";
    btn.dataset.urg = u.key;
    btn.textContent = u.label + " (" + u.count + ")";
    btn.style.cssText = "border:1px solid #888;color:#555;";
    btn.onclick = function() { setUrg(u.key); updateFilterStyles(); };
    urgBar.appendChild(btn);
  });

  renderCards();
  updateFilterStyles();
  buildReport();
};
</script>
</body>
</html>
