ecause reservoirs have matured. And no new US basins of scale sit untapped.", "locator": "The best rock is found and producing", "quote_verified": true}, {"claim": "Technology gains in mature gas plays now appear incremental, as gains from re-engineered well designs and longer laterals have mostly played out and applications like refracturing never broke out, with material technology investment remaining oil-biased until gas margins compete with liquids plays.", "speaker": "Kristy Kramer", "type": "thesis", "entities": ["natural gas", "shale gas"], "conviction": "high", "so_what": "Don't expect a productivity step-change to rescue cheap gas; R&D capital follows oil economics, not gas.", "quote": null, "locator": "Future technology gains in mature plays appear incremental", "quote_verified": false}, {"claim": "Associated gas accounted for about half of US gas supply growth over the last 10 years at low-to-zero marginal cost, but over the next 10 will account for less than 20%, as maturing Permian operators focus on margins over volumes and rig activity slows.", "speaker": "Kristy Kramer", "type": "data_point", "entities": ["associated gas", "Permian"], "conviction": "high", "so_what": "The fading of free associated gas forces reliance on higher-cost dedicated gas drilling, requiring higher prices to be economic.", "quote": "Over the last 10 years, associated gas has accounted for about half of US gas supply growth, but over the next 10, it will account for less than 20%.", "locator": "Decreasing impact of associated gas", "quote_verified": true}, {"claim": "Listed US E&Ps remain committed to shareholder returns and capital discipline, even choking back production when cash prices fall below operating costs, so with supply's elasticity to price declining, domestic prices must rise further and persist longer to motivate incremental investment.", "speaker": "Kristy Kramer", "type": "causal", "entities": ["E&P", "natural gas"], "conviction": "high", "so_what": "Capital d ing Report", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-04T09:21:14Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI"], "gist": "WiMi Hologram Cloud (NASDAQ: WiMi) is researching neural networks to replace multi-variable local search algorithms for Twin-Field QKD parameter optimization, claiming order-of-magnitude reductions in computational overhead and benchmarking three network topologies (BPNN, RBFNN, GRNN) for speed-vs-accuracy tradeoffs.", "themes": [{"theme": "ML-optimized QKD", "insights": [{"claim": "WiMi is substituting traditional multi-variable Local Search Algorithms with pre-trained regression neural networks to calculate dynamic TF-QKD hardware parameters, reducing computational overhead by multiple orders of magnitude to accelerate secret key generation rates.", "speaker": "Mohamed Abdel-Kareem", "type": "data_point", "entities": ["WiMi Hologram Cloud", "TF-QKD"], "conviction": "medium", "so_what": "Lower latency in parameter tuning could improve real-world QKD throughput over noisy fiber; a differentiator if it reaches production.", "quote": "the computational overhead required to calculate dynamic hardware parameters is reduced by multiple orders of magnitude", "locator": "WiMi Hologram Cloud Inc.", "quote_verified": true}, {"claim": "WiMi benchmarked three neural network topologies for TF-QKD, finding BPNN fastest for rapid-response systems with moderate precision, while RBFNN and GRNN achieved superior accuracy managing high-dimensional variables and signal uncertainties.", "speaker": "Mohamed Abdel-Kareem", "type": "framework", "entities": ["WiMi Hologram Cloud", "BPNN", "RBFNN", "GRNN"], "conviction": "medium", "so_what": "The speed-vs-accuracy tradeoff among network types is a reusable design lens for adaptive quantum communication systems.", "quote": null, "locator": "The company’s research division trained and benchmarked", "quote_verified": false}]}, {"theme": "Roadmap and commercialization", "insights": [{"claim": "The neural network models let TF-QKD terminal stations automatically counter environmental polarization shifts and phase drift by dynamically adjusting intensity and phase parameters at acceptable computational cost.", "speaker": "Mohamed Abdel-Kareem", "type": "causal", "entities": ["WiMi Hologram Cloud", "TF-QKD"], "conviction": "medium", "so_what": "Real-time adaptability to fiber-channel fluctuations is the practical barrier to deployable QKD; progress here matters for viability.", "quote": null, "locator": "These specialized models allow TF-QKD terminal stations", "quote_verified": false}, {"claim": "WiMi plans to scale its machine learning research into deep learning and reinforcement learning for multi-party quantum communication protocols and to integrate trained algorithms directly with commercial quantum hardware, moving from simulated environments to functional high-rate networks.", "speaker": "Mohamed Abdel-Kareem", "type": "prediction", "entities": ["WiMi Hologram Cloud"], "conviction": "low", "so_what": "Still simulation-stage; track whether WiMi actually transitions to commercial hardware integration before ascribing value.", "quote": null, "locator": "Moving forward, the Beijing-headquartered holographic", "quote_verified": false}]}], "insight_total": 4, "top_entities": ["WiMi Hologram Cloud", "TF-QKD", "BPNN", "RBFNN", "GRNN"], "source_meta": {"author": "Mohamed Abdel-Kareem", "word_count": 355, "paywalled": false}}, {"record_id": "daf3f4c34d80dc11", "source_type": "technology", "source_name": "NVIDIA Developer Blog", "source_url": "https://developer.nvidia.com/blog/hardware-rooted-ai-security-that-wont-slow-you-down/", "title": "Hardware-Rooted AI Security That Won’t Slow You Down | NVIDIA Technical Blog", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-04T09:21:14Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Positioning"], "gist": "NVIDIA argues its Blackwell-embedded Confidential Computing protects data and model weights during inference at up to 98% of non-secured performance (typically under 8% overhead), benchmarked on an HGX B300 running a 397B Qwen MoE model, positioning secure inference as production-ready and removing a key enterprise adoption blocker.", "themes": [{"theme": "Performance-overhead thesis", "insights": [{"claim": "NVIDIA Confidential Computing delivers inference at up to 98% of the performance of solutions that don't enable CC, with throughput and per-token latency overhead typically under 8% across concurrency, batch sizes, and token lengths.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "data_point", "entities": ["NVIDIA Confidential Computing", "Blackwell"], "conviction": "high", "so_what": "The near-zero overhead claim is the crux that could turn confidential computing from a niche compliance feature into a default deployment mode.", "quote": "NVIDIA Confidential Computing delivers security at 98% of performance of solutions that don’t enable CC", "locator": "Hardware-Rooted AI Security That Won’t Slow You Down", "quote_verified": true}, {"claim": "On an HGX B300 with Blackwell Ultra running Qwen 3.5-397B-A17B at FP8, CC throughput/GPU degradation stayed within roughly 1-7.5% and TPOT within about 0.9-8.1% versus CC off across concurrency levels from 4 to 256.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "data_point", "entities": ["HGX B300", "Blackwell Ultra", "Qwen 3.5-397B-A17B", "FP8"], "conviction": "high", "so_what": "Benchmarked on a frontier-scale MoE model, the tight overhead band is the concrete evidence enterprises will scrutinize before adopting secure inference.", "quote": null, "locator": "Benchmark results", "quote_verified": false}, {"claim": "CC performance impact on Blackwell comes from just two sources: secure work-submission latency from encryption and kernel launches (worse for small units of work) and reduced encrypted host-to-device CPU-to-GPU bandwidth.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "framework", "entities": ["NVIDIA Confidential Computing", "Blackwell"], "conviction": "high", "so_what": "Identifies exactly where CC taxes performance, so workload architects can predict which inference patterns pay the most overhead.", "quote": "Increasing the amount of work performed per GPU work launch reduces the impact of the secure launch overhead.", "locator": "Optimizing AI inference performance in Confidential Computing", "quote_verified": true}]}, {"theme": "Hardware root of trust and attestation", "insights": [{"claim": "Every Blackwell GPU (RTX PRO 6000, HGX B200, HGX B300) maintains a private signing key fused at manufacturing that is never exposed to software, firmware, or the host system, forming the foundation of the attestation chain.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "framework", "entities": ["Blackwell", "RTX PRO 6000", "HGX B200", "HGX B300"], "conviction": "high", "so_what": "Silicon-fused keys make CC a hardware moat competitors can't replicate in software, reinforcing Blackwell's enterprise value beyond raw FLOPs.", "quote": "the GPU maintains a private signing key that is fused at the time of manufacturing and never exposed to software, firmware, or the host system", "locator": "Hardware root of trust", "quote_verified": true}, {"claim": "HGX B200 and HGX B300 support confidential computing across up to 8 GPUs using NVLink encryption, extending trusted execution beyond a single accelerator.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "data_point", "entities": ["HGX B200", "HGX B300", "NVLink"], "conviction": "high", "so_what": "Multi-GPU confidential compute via encrypted NVLink is required to secure large models that span accelerators, a differentiator for frontier-scale secure inference.", "quote": "support confidential computing across multiple GPUs (up to 8) with NVIDIA NVLink encryption", "locator": "Hardware root of trust", "quote_verified": true}, {"claim": "Remote attestation via NRAS verifies a signed evidence bundle (GPU hardware report plus CPU TEE measurements from AMD SEV-SNP or Intel TDX) against a reference integrity manifest, and because it is a one-time startup handshake it adds no per-request inference latency.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "causal", "entities": ["NRAS", "AMD SEV-SNP", "Intel TDX"], "conviction": "high", "so_what": "One-time attestation means the security handshake doesn't tax steady-state inference, key to the 'won't slow you down' claim.", "quote": "The attestation handshake is typically a one-time startup event. Once the workload is running, attestation does not add latency to individual inference requests.", "locator": "Attestation: Verification before execution", "quote_verified": true}]}, {"theme": "Software optimizations enabling CC", "insights": [{"claim": "Three specific software fixes mitigate CC overhead: FlashInfer swaps event timers for the GPU global timer register so autotuners stay accurate in CC mode, SGLang adds an async D2H copy worker to restore compute/copy overlap, and SGLang adds piecewise CUDA graph replay to cut kernel-launch overhead amplified under CC.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "framework", "entities": ["FlashInfer", "SGLang", "CUDA graph"], "conviction": "high", "so_what": "The near-native performance depends on upstream open-source framework work, not just silicon, showing CC readiness is a full-stack effort.", "quote": "CC can otherwise make many host-to-device and device-to-host copies effectively synchronous during cudaMemcpyAsync", "locator": "Optimizing AI inference performance in Confidential Computing", "quote_verified": true}, {"claim": "NVIDIA is upstreaming CC optimizations into community inference frameworks (specific PRs 28251 for SGLang and 3638 for FlashInfer), signaling a strategy to make confidential inference work across the open ecosystem rather than only proprietary tooling.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "thesis", "entities": ["SGLang", "FlashInfer", "NVIDIA"], "conviction": "medium", "so_what": "Upstreaming lowers adoption friction and embeds NVIDIA's secure-compute assumptions into widely used inference engines.", "quote": "NVIDIA continues to work with upstream communities for inference frameworks to ensure these frameworks are optimized for performance.", "locator": "Piecewise CUDA graph support", "quote_verified": true}]}, {"theme": "Enterprise and compliance positioning", "insights": [{"claim": "NVIDIA frames Confidential Computing as purpose-built for the agentic AI era, protecting enterprise data and proprietary model weights during active inference so organizations can meet regulations like HIPAA, GDPR Article 32, and NIST zero-trust while scaling any model.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen Raza and Jamie Li", "type": "thesis", "entities": ["NVIDIA Confidential Computing", "HIPAA", "GDPR", "NIST"], "conviction": "high", "so_what": "Targets regulated verticals (healthcare, finance, sovereign) where data-in-use protection is the gating requirement for AI deployment.", "quote": "CC enables the protection of enterprise data and proprietary model weights and the model itself during active inference.", "locator": "AI has transformed how organizations operate", "quote_verified": true}, {"claim": "A lead hardware architect states the goal is for confidential computing to become the default mode of GPU deployment, indicating NVIDIA intends CC to be standard rather than an opt-in premium feature.", "speaker": "Sheel Pethe, Vidhya Krishnan, Aruna Manjunatha, Matheen tor technology.", "speaker": "Daniel Nenni", "type": "thesis", "entities": ["Huawei", "TSMC", "China", "United States"], "conviction": "medium", "so_what": "A stated 2031 parity target is a strategic marker for China's self-sufficiency drive; investors should track milestone node announcements from Huawei/SMIC as progress signals.", "quote": "Huawei's assertion that it could match TSMC in producing the world's most advanced chips by 2031", "locator": "Key takeaways", "quote_verified": true}, {"claim": "US export restrictions have accelerated China's determination to build an independent semiconductor ecosystem, with Huawei positioned at the center of that national effort.", "speaker": "Daniel Nenni", "type": "causal", "entities": ["Huawei", "China", "United States"], "conviction": "high", "so_what": "Sanctions are framed as catalyzing rather than stalling Chinese chip independence—a second-order effect relevant to long-run global supply fragmentation.", "quote": "These restrictions have accelerated China's determination to develop an independent semiconductor ecosystem", "locator": "Key takeaways", "quote_verified": true}, {"claim": "Huawei's confidence rests on demonstrated resilience under sanctions, strong Chinese government support with billions invested in chip manufacturing and talent, and rapid technological learning through domestic partnerships with chip designers, equipment suppliers, and foundries.", "speaker": "Daniel Nenni", "type": "framework", "entities": ["Huawei", "China"], "conviction": "medium", "so_what": "The three pillars (resilience, state capital, ecosystem collaboration) define the bull case for Chinese chip catch-up; watch domestic equipment and foundry maturation as the binding constraints.", "quote": null, "locator": "Huawei's confidence stems from several factors.", "quote_verified": false}, {"claim": "Huawei's launch of advanced smartphones powered by domestically produced chips surprised many industry observers and showed China's semic tures live telemetry at ±0.01% precision, measuring microscopic voltage spikes and residual current drops that remain undetected by classical transformers.", "speaker": "Mohamed Abdel-Kareem", "type": "data_point", "entities": ["xDots", "xSee"], "conviction": "medium", "so_what": "Detecting losses invisible to classical instruments is the value proposition for energy-efficiency buyers; verify precision claims independently.", "quote": null, "locator": "The sub-system captures live telemetry loops", "quote_verified": false}]}, {"theme": "AI-driven energy optimization", "insights": [{"claim": "xEnergy integrates quantum sensing (xSee) with a multi-agent AI stack (xMon visibility dashboard and xOpt autonomous optimizer) to address power hyper-inflation in massive production plants and high-density data centers.", "speaker": "Mohamed Abdel-Kareem", "type": "framework", "entities": ["xDots", "xEnergy", "xMon", "xOpt"], "conviction": "medium", "so_what": "Targeting data-center power inflation ties quantum sensing to the AI-compute energy-demand boom; a topical adjacency for investors.", "quote": null, "locator": "At the center of the exhibition, xDots demonstrated", "quote_verified": false}, {"claim": "xDots' proof-of-concept pilots with South Korean conglomerates confirmed absolute energy reductions of 15-30%, including predictive refrigeration maintenance with SPC Secta9ine, pump diagnostics with Kolon Global, and active HVAC balancing with Hoban Construction's Island Resom.", "speaker": "Mohamed Abdel-Kareem", "type": "data_point", "entities": ["xDots", "SPC Secta9ine", "Kolon Global", "Hoban Construction"], "conviction": "high", "so_what": "Named enterprise pilots with quantified 15-30% savings are concrete commercial traction; watch for conversion to paid scaled deployments.", "quote": "These projects confirmed absolute energy reductions of 15–30%", "locator": "To validate the platform’s utility before scaling", "quote_verified": true}]}, {"theme": "Quantum Korea ecosystem", "insights": [{"claim": "Quantum Korea 2026, hosted by South Korea's Ministry of Science and ICT at Seoul's Dongdaemun Design Plaza, gathered 56 corporations and research institutions across 12 countries under the theme 'Quantum in Action, Grand Challenges for Innovation.'", "speaker": "Mohamed Abdel-Kareem", "type": "data_point", "entities": ["Quantum Korea 2026", "Ministry of Science and ICT", "xDots"], "conviction": "low", "so_what": "Signals Korea's growing role as a quantum commercialization hub; a venue to track for emerging vendors and government priorities.", "quote": null, "locator": "Deep-tech startup xDots has unveiled", "quote_verified": false}]}], "insight_total": 5, "top_entities": ["xDots", "xEnergy", "xSee", "diamond NV", "SPC Secta9ine", "Kolon Global", "Hoban Construction", "Quantum Korea 2026", "Ministry of Science and ICT"], "source_meta": {"author": "Mohamed Abdel-Kareem", "word_count": 439, "paywalled": false}}, {"record_id": "ec1ac54f7a27b87d", "source_type": "technology", "source_name": "IEEE Spectrum", "source_url": "https://spectrum.ieee.org/artificial-neurons-on-silicon-chips?itm_source=homepage&itm_medium=hero&itm_campaign=hero-2026-07-02&itm_content=hero1", "title": "How a Forgotten Wire Turned a Cheap Chip Into a Brainlike Neuron", "published_date": "2026-06-29", "language": "en", "processed_at": "2026-07-04T09:21:14Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Energy", "Society"], "gist": "Researchers Mario Lanza and Sebastian Pazos report that leaving a standard MOSFET's bulk terminal unconnected accidentally produces neuron-like integrate-and-fire spiking (and, in another mode, adjustable synaptic weights), letting a single cheap industry-standard transistor replace the dozens-to-hundreds of transistors today's neuromorphic neurons and synapses require, at 100% yield and CMOS-manufacturable.", "themes": [{"theme": "AI energy problem framing", "insights": [{"claim": "Data-center GPUs consume as much as 1,000 watts each while running around the clock (comparable to a vacuum cleaner or stove), versus under 1W for a newer smartphone, quantifying the energy inefficiency neuromorphic computing targets.", "speaker": "IEEE Spectrum", "type": "data_point", "entities": ["GPU"], "conviction": "high", "so_what": "The 1kW-per-GPU baseline is the cost/energy pain point that any credible neuromorphic alternative is measured against; frames the TAM for brain-inspired silicon.", "quote": "each of those GPUs achieves that by consuming as much as 1,000 watts apiece", "locator": "AI requires processing massive amounts of data", "quote_verified": true}, {"claim": "The human brain is roughly one million times as energy efficient as current AI hardware at many comparable tasks, and state-of-the-art brain-inspired chips have already achieved up to thousandfold power reductions versus GPUs/CPUs on the same task.", "speaker": "IEEE Spectrum", "type": "data_point", "entities": ["neuromorphic engineering"], "conviction": "high", "so_what": "The million-times headroom and existing 1000x demonstrations define the upside if neuromorphic scales; a long-horizon disruption vector for GPU-centric AI compute.", "quote": "The brain is roughly one million times as energy efficient at many of the comparable tasks we set for AI.", "locator": "The brain is roughly one million times", "quote_verified": true}]}, {"theme": "The accidental discovery", "insights": [{"claim": "The neuron behavior was discovered in 2024 when a student forgot to connect the bulk terminal of a transistor and observed a sudden nonlinear current increase that self-relaxed as voltage ramped down, a hysteresis loop resembling a biological neuron's action potential.", "speaker": "IEEE Spectrum", "type": "anecdote", "entities": ["MOSFET"], "conviction": "high", "so_what": "A serendipitous lab error, not a designed device, underpins the claim; noteworthy because it means the effect exists in standard silicon already fabricated everywhere.", "quote": "One day the student forgot to connect the bulk terminal of the transistor. What he observed was a sudden increase in current with high nonlinearity that self-relaxed when the voltage was ramped down", "locator": "Working in our laboratory in 2024", "quote_verified": true}, {"claim": "The MOSFETs exhibiting the effect were built on the 180-nanometer node (cutting-edge in 2000), showing the neuron behavior does not require advanced or expensive process technology.", "speaker": "IEEE Spectrum", "type": "data_point", "entities": ["MOSFET", "180-nanometer node"], "conviction": "high", "so_what": "Using ancient, cheap 180nm silicon means neuromorphic devices could be made on fully depreciated fabs, a radically low-cost manufacturing path.", "quote": null, "locator": "The MOSFETs were created in a commercial foundry", "quote_verified": false}]}, {"theme": "Device physics mechanism", "insights": [{"claim": "The neuron effect arises because a floating bulk terminal lets impact-ionization holes accumulate and raise the bulk voltage until a hidden bipolar-junction transistor inside every MOSFET triggers, producing a sharp current spike, exactly the integrate-and-fire behavior of a neuron.", "speaker": "IEEE Spectrum", "type": "framework", "entities": ["MOSFET", "bipolar-junction transistor"], "conviction": "high", "so_what": "Because the mechanism is an intrinsic parasitic BJT present in all MOSFETs, the capability is universal to CMOS, not a special material; strengthens manufacturability claims.", "quote": null, "locator": "It helps here to imagine a MOSFET as two different kinds", "quote_verified": false}, {"claim": "Adding a controlled bulk-terminal resistance (implemented via a second MOSFET) made all transistors fire at the same voltage with almost no variability, converting a flaky effect into reproducible neuron behavior.", "speaker": "IEEE Spectrum", "type": "causal", "entities": ["MOSFET"], "conviction": "high", "so_what": "The two-transistor cell offering electronic control of firing is the practical engineering unlock; variability control is what makes it manufacturable at scale.", "quote": "Simply setting that resistance suddenly caused all the transistors to fire at the same voltage with hardly any variability.", "locator": "Initially, we observed this behavior", "quote_verified": true}, {"claim": "The same MOSFET can act as a synapse: at specific bulk-resistance values, impact-ionization charge trapped in the gate dielectric produces a stable, electronically adjustable conductance, with negative bulk-source voltage decreasing and positive increasing it.", "speaker": "IEEE Spectrum", "type": "data_point", "entities": ["MOSFET", "NSRAM"], "conviction": "high", "so_what": "One device type serving as both neuron and synapse (together called NSRAM) means a whole neural fabric could be built from a single manufacturable primitive.", "quote": null, "locator": "Recall that in ordinary operation some electrons", "quote_verified": false}]}, {"theme": "Reliability and reproducibility", "insights": [{"claim": "Every tested neuron device worked over 10 million cycles with zero failures, and the behavior was reproduced on chips from a different foundry with perfect yield, addressing the reliability problems that have plagued memristor-based neuromorphic approaches.", "speaker": "IEEE Spectrum", "type": "data_point", "entities": ["MOSFET", "memristor"], "conviction": "high", "so_what": "10M-cycle endurance and 100% cross-foundry yield are the metrics that distinguish this from two decades of failed experimental neuromorphic devices; the core investability signal.", "quote": "every single one of the devices we tested worked over 10 million cycles. Not even one of them failed during our tests.", "locator": "We had to make sure the phenomenon would last", "quote_verified": true}, {"claim": "The approach exhibits 100% yield in key figures of merit with near-zero variability and is fully compatible with today's silicon manufacturing lines, unlike memristor-like devices that consumed millions of dollars over 20 years with limited success.", "speaker": "IEEE Spectrum", "type": "contrarian", "entities": ["MOSFET", "memristor"], "conviction": "high", "so_what": "Directly challenges the memristor/experimental-device thesis that has dominated neuromorphic R&D funding; a potential re-rating of where neuromorphic value accrues.", "quote": "We managed it in the cheapest and most industry-standard device: the MOSFET.", "locator": "To be honest, we were amazed", "quote_verified": true}]}, {"theme": "Efficiency advantage and path to market", "insights": [{"claim": "The single-MOSFET neuron/synapse can produce with one or two transistors the signals that today require dozens to hundreds of components, a dramatic area, cost, and performance advantage over CMOS-emulated neuromorphic circuits.", "speaker": "IEEE Spectrum", "type": "thesis", "entities": ["MOSFET", "NSRAM", "CMOS"], "conviction": "high", "so_what": "A ~100x device-count reduction is the economic case; if it holds, it reshapes the cost structure of edge-AI neuromorphic chips.", "quote": "We can produce with only one or two transistors the electronic signals that today require, at an industrial level, dozens and sometimes even hundreds of components.", "locator": "The competitive advantage", "quote_verified": true}, {"claim": "The authors expect these chips to first fit smaller-scale edge-AI tasks (battery-powered systems) and only potentially compete with state-of-the-art GPUs if they can be scaled up, tempering near-term expectations.", "speaker": "IEEE Spectrum", "type": "prediction", "entities": ["MOSFET", "GPU", "edge-AI"], "conviction": "medium", "so_what": "Realistic timeline: edge/battery applications first, datacenter GPU competition is a long-shot long-term; invest against edge-AI adoption, not imminent GPU displacement.", "quote": "These chips will first be a fit for smaller-scale, “edge-AI” tasks, such as bringing greater intelligence to battery-powered systems.", "locator": "But all that will be worthwhile", "quote_verified": true}, {"claim": "Realizing functional neuromorphic systems still requires better device models, circuit- and system-level simulation, peripheral driver circuitry, and multiple fabrication rounds, indicating meaningful engineering runway remains before products ship.", "speaker": "IEEE Spectrum", "type": "data_point", "entities": ["NSRAM"], "conviction": "medium", "so_what": "Signals the discovery is early-stage; commercialization is years out despite the strong device-level results.", "quote": null, "locator": "Building functional circuits for brain-inspired computing", "quote_verified": false}]}], "insight_total": 12, "top_entities": ["MOSFET", "NSRAM", "GPU", "memristor", "CMOS", "Mario Lanza", "Sebastian Pazos", "180-nanometer node", "neuromorphic engineering", "bipolar-junction transistor"], "source_meta": {"author": "IEEE Spectrum", "word_count": 2850, "paywalled": false}}, {"record_id": "f8f6f9c58b2c3b6b", "source_type": "technology", "source_name": "Benchmark Minerals", "source_url": "https://source.benchmarkminerals.com/article/catl-secures-safety-production-permit-for-jianxiawo-lithium-mine", "title": "CATL secures safety production permit for Jianxiawo lithium mine", "published_date": "2026-07-01", "language": "en", "processed_at": "2026-07-04T09:21:14Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "Geopolitics"], "gist": "CATL has secured the safety production permit needed to restart its idle Jianxiawo lepidolite lithium mine in Jiangxi, China; Benchmark forecasts 37kt LCE from the mine in 2026 on a September restart, with an earlier restart increasingly likely given rapid recent approvals.", "themes": [{"theme": "Permit and restart trigger", "insights": [{"claim": "CATL can likely restart its Jianxiawo lepidolite lithium mine in Jiangxi, China after securing a safety production permit that Benchmark has seen a copy of, which was considered the last official hurdle to resuming production at a mine idle since August 2025.", "speaker": "Benchmark Team", "type": "data_point", "entities": ["CATL", "Jianxiawo", "Jiangxi", "China", "Benchmark"], "conviction": "high", "so_what": "Confirms the final regulatory blocker to renewed supply is cleared; a lead indicator for added Chinese lithium output.", "quote": "Benchmark has seen a copy of the permit certificate, which was considered the last official hurdle CATL needed to overcome to resume production at the mine which has been idle since August 2025.", "locator": "CATL can likely restart", "quote_verified": true}]}, {"theme": "2026 output forecast", "insights": [{"claim": "Benchmark's Q2 Lithium Forecast anticipates 37kt lithium carbonate equivalent to be mined from Jianxiawo in 2026 assuming a September restart, accounting for roughly 1.5% of global mined lithium supply.", "speaker": "Benchmark Team", "type": "prediction", "entities": ["Benchmark", "Jianxiawo"], "conviction": "high", "so_what": "Quantifies the restart's contribution to global supply and anchors a baseline model for the year.", "quote": "Benchmark’s Q2 Lithium Forecast anticipates 37kt lithium carbonate equivalent to be mined from Jianxiawo in 2026 assuming a September restart, accounting for ~1.5% of global mined lithium supply.", "locator": "Benchmark’s Q2 Lithium Forecast anticipates", "quote_verified": true}, {"claim": "Jianxiawo's 2026 production figure could rise above 37kt LCE if the mine restarts earlier than expected, something Benchmark deems increasingly likely given the rapid pace of approvals in the past week.", "speaker": "Benchmark Team", "type": "prediction", "entities": ["Jianxiawo", "CATL", "Benchmark"], "conviction": "medium", "so_what": "Upside risk to supply forecasts; accelerating approvals signal Chinese authorities are easing the earlier crackdown.", "quote": "This production figure could increase if the mine is restarted earlier than expected, something that is increasingly likely given the rapid pace of approvals in the past week.", "locator": "This production figure could increase", "quote_verified": true}]}, {"theme": "Nameplate capacity trajectory", "insights": [{"claim": "The Jianxiawo mine is anticipated to operate at its planned capacity of 150ktpa by 2029.", "speaker": "Benchmark Team", "type": "prediction", "entities": ["Jianxiawo", "CATL"], "conviction": "high", "so_what": "Signals a multi-year ramp to full capacity, growing the mine's share of global lithium supply through the decade.", "quote": "The mine is anticipated to operate at its planned capacity of 150ktpa by 2029.", "locator": "The mine is anticipated to operate", "quote_verified": true}]}], "insight_total": 4, "top_entities": ["CATL", "Jianxiawo", "Jiangxi", "China", "Benchmark"], "source_meta": {"author": "Benchmark Team", "word_count": 147, "paywalled": false}}, {"record_id": "fb21fc3e239780c2", "source_type": "technology", "source_name": "Semiconductor Engineering", "source_url": "https://semiengineering.com/defending-against-ai-enabled-data-fusion/", "title": "Defending Against AI-Enabled Data Fusion", "published_date": "2026-07-02", "language": "en", "processed_at": "2026-07-04T09:21:14Z", "processor": "claude-code-sub-opus", "tags": ["Tech", "AI", "Society"], "gist": "Multimodal AI data fusion lets attackers build detailed digital twins of people and manipulate model outputs, shifting the security battleground from data confidentiality to data integrity and requiring hardware roots of trust, isolation, and authenticated data movement.", "themes": [{"theme": "The digital-twin attack surface", "insights": [{"claim": "By fusing white-, gray-, and black-market data, attackers can construct a detailed digital twin of a person and their environment, making targeted attacks far easier.", "speaker": "Ann Mutschler", "type": "thesis", "entities": ["Synopsys", "data fusion"], "conviction": "high", "so_what": "Data fusion turns scattered leaks into weaponizable profiles, raising the stakes for privacy tech and secure-by-design silicon.", "quote": "you can fuse all that data into a profile or a digital twin of a person", "locator": "There’s a lot of white market", "quote_verified": true}, {"claim": "Once attackers infiltrate a home via routers, PCs, phones, or wearables, they can continuously harvest location and behavioral data, and controlling the phone is worst because it controls all connected devices.", "speaker": "Ann Mutschler", "type": "causal", "entities": ["Synopsys", "IoT", "wearables"], "conviction": "high", "so_what": "The phone as central hub is the highest-value target; endpoint and device-trust security is the key defensive layer.", "quote": "If they can get into your phone, that’s even worse, because then it’s all the devices connected to and controlled by your phone.", "locator": "They either deposit Trojans", "quote_verified": true}, {"claim": "GPS-attached wearable data tied to a person guarantees total loss of privacy, illustrated by hackers using fitness-watch data to track soldiers marching around building perimeters before anonymization.", "speaker": "Ann Mutschler", "type": "anecdote", "entities": ["Synopsys", "GPS", "wearables"], "conviction": "high", "so_what": "Location-linked wearable data is a concrete national-security and privacy vector, strengthening the case for on-device anonymization.", "quote": "once you have a GPS and GPS-attached data, and you can connect that to a person, then they are 100% guaranteed to lose any semblance of privacy", "locator": "The personal wearable IoT is especially problematic", "quote_verified": true}]}, {"theme": "AI shifts the target from data to the model", "insights": [{"claim": "AI itself is the attack vector, not the individual data streams, so the key defense is to block manipulation of the fusion layer rather than control each raw data source.", "speaker": "Ann Mutschler", "type": "contrarian", "entities": ["Synaptics"], "conviction": "high", "so_what": "Reframes defense strategy: protect the fusion/inference layer, not just encrypt individual feeds — a design-priority shift.", "quote": "AI itself is actually the attack vector, not the individual data streams", "locator": "It’s how you lay the foundation", "quote_verified": true}, {"claim": "AI data fusion binds individual streams into local intelligence, so attackers who can influence the output no longer need to steal the raw data, dramatically enlarging the runtime attack surface beyond conventional secure-boot approaches.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Synaptics", "AI pipeline"], "conviction": "high", "so_what": "Runtime inference security (memory, compute paths) becomes the new frontier — secure boot alone is insufficient.", "quote": "if they can influence the output, they don’t need to steal the data", "locator": "AI has fundamentally changed data fusion", "quote_verified": true}, {"claim": "Integrity attacks have become more dangerous than simple data theft because glitching or manipulating fused input can corrupt inference and make the model useless or dangerous, yet the industry underinvests in integrity because it is a harder memory-side problem.", "speaker": "Ann Mutschler", "type": "contrarian", "entities": ["Synaptics"], "conviction": "high", "so_what": "Data integrity is an under-served security category relative to confidentiality — a gap and opportunity for integrity-protection IP.", "quote": "integrity attacks have become much more dangerous than simple data theft", "locator": "The challenge here is understanding the combinatorial risk", "quote_verified": true}, {"claim": "AI data fusion amplifies risk by combining models from semi-independent data sources never designed to trust each other, making it hard to predict how a model responds if one source injects malicious data unlike its training data.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Rambus"], "conviction": "high", "so_what": "Black-box interaction risk between disparate systems means threat modeling must cover unknown cross-system failure modes.", "quote": "you’re attempting to protect against previously unknown, black-box interactions between many disparate systems", "locator": "The big issue with AI data fusion", "quote_verified": true}]}, {"theme": "Hardware root of trust as foundation", "insights": [{"claim": "Defending fused data requires a chain of trust starting in silicon — hardware root of trust, system-level attestation, and authenticated supply-chain components — where the chip enforces trust and never assumes it.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Rambus"], "conviction": "high", "so_what": "Silicon-anchored trust is the mandatory foundation, favoring root-of-trust and attestation IP vendors like Rambus and Arm.", "quote": "The chip must enforce trust and never assume it.", "locator": "AI data fusion requires enforcing trust", "quote_verified": true}, {"claim": "Cryptographically verifying and authenticating every data source before it feeds an inference operation shrinks the exploitable attack surface, requiring tamper-resistant hardware to transform untrusted software into something trustworthy.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Rambus"], "conviction": "high", "so_what": "Per-source authentication before inference is the concrete design pattern; software without a hardware anchor is an insecure foundation.", "quote": "Without a structured, specific path to trusted hardware, everything executing in software is built on an insecure foundation.", "locator": "That starts with a hardware root of trust", "quote_verified": true}, {"claim": "Arm's Confidential Compute Architecture runs workloads in a hardware-isolated area restricting visibility to privileged software and other tenants, with attestation letting data owners verify their data is processed by intended software.", "speaker": "Ann Mutschler", "type": "data_point", "entities": ["Arm", "Confidential Compute Architecture"], "conviction": "high", "so_what": "Arm CCA is a named commercial mechanism for confidential multi-tenant AI processing — a positioning advantage in secure AI infrastructure.", "quote": null, "locator": "Arm’s Confidential Compute Architecture", "quote_verified": false}, {"claim": "Secure storage now includes PUFs, key wrapping, and storing keys in encrypted scrambled states, and devices must be made post-quantum ready because quantum threats may arrive much sooner than expected while adding PQC late causes major problems.", "speaker": "Ann Mutschler", "type": "prediction", "entities": ["Synopsys", "PUFs", "PQC"], "conviction": "high", "so_what": "Post-quantum readiness is a design-now imperative; late PQC retrofits are costly, favoring vendors with PQC-ready secure storage.", "quote": "making sure that your device is post-quantum ready, because quantum days are likely here much sooner than we think", "locator": "Databases and keys need to be encrypted", "quote_verified": true}, {"claim": "No single security measure suffices; AI data fusion requires combining hardware isolation with data provenance/integrity, access controls, secure software supply chains, and protected communications.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Arm"], "conviction": "high", "so_what": "Defense-in-depth is the required posture — point solutions won't win; integrated security stacks are the value proposition.", "quote": "No single security measure is sufficient by itself.", "locator": "No single security measure is sufficient", "quote_verified": true}]}, {"theme": "Automotive and safety-critical fusion", "insights": [{"claim": "Zonal architectures consolidating multiple sensor and software workloads onto shared compute make AI data fusion standard in vehicles but increase the car's attack surface, driving isolation of safety-critical from non-safety workloads.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Imagination Technologies", "automotive", "zonal architecture"], "conviction": "high", "so_what": "Workload isolation is the emerging architectural trend as auto compute centralizes — a design requirement for automotive SoC vendors.", "quote": "It is a key component of next-generation vehicle autonomy, but it also increases the car’s attack surface", "locator": "This becomes particularly worrisome", "quote_verified": true}, {"claim": "Imagination uses hardware virtualization assigning each VM a dedicated hardware interface and OSID-tagged memory transactions enforced via the system MMU, with QoS and deadline-based preemption to protect against denial-of-service workloads.", "speaker": "Ann Mutschler", "type": "data_point", "entities": ["Imagination Technologies", "MMU", "virtualization"], "conviction": "high", "so_what": "Concrete hardware-virtualization mechanism for freedom-from-interference is a differentiator for safety-critical GPU IP.", "quote": "It assigns each VM a dedicated hardware interface and OSID-tagged memory transactions, enforced via the system MMU", "locator": "Imagination uses hardware virtualization", "quote_verified": true}, {"claim": "An automotive multi-camera image-analysis project required an HSM to secure not just finite-size boot images but 1 gigabit-per-second streaming IPsec traffic under ASIL B, where losing packets or desynchronization could make a car lag behind its true position.", "speaker": "Ann Mutschler", "type": "anecdote", "entities": ["Secure-IC", "Cadence", "HSM", "IPsec"], "conviction": "high", "so_what": "Securing high-speed streaming data at line rate without dropping packets is a hard, safety-critical design constraint distinct from boot security.", "quote": "if you are a little bit desynchronized, and your car is lagging with where it is compared to what it thinks it is, that is scary", "locator": "The first time Sylvain Guilley", "quote_verified": true}, {"claim": "Securing AI data fusion is a system-level, data-flow-oriented problem requiring worst-case design for 1 gigabit-per-second traffic with small packets and per-packet key rolling, maintaining decapsulation and integrity verification without stalling or dropping packets.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Secure-IC", "Cadence"], "conviction": "high", "so_what": "Bandwidth/compute headroom for continuous crypto checks at worst-case load is a hard silicon spec — security sits on the critical path in automotive.", "quote": "in automotive, when you design a chip, you must design it for the worst case, and security is on the critical path", "locator": "It’s not a question of chips", "quote_verified": true}]}, {"theme": "Governing principles and outlook", "insights": [{"claim": "The intersection of AI and cybersecurity is the data itself, reducible to a simple rule: check data in and authenticate data out.", "speaker": "Ann Mutschler", "type": "framework", "entities": ["Secure-IC", "Cadence"], "conviction": "high", "so_what": "A clean mental model for AI security investment: value accrues to input verification and output attestation technologies.", "quote": "the intersection of cybersecurity and AI is data. And what we need to have in place is very simple — check data in and authenticate data out.", "locator": "Conclusion", "quote_verified": true}, {"claim": "Concentrating sensitive information via data fusion expands attack surfaces such that one weak point could expose or corrupt the entire intelligence pool as data types, owners, and systems multiply.", "speaker": "Ann Mutschler", "type": "causal", "entities": ["Arm"], "conviction": "high", "so_what": "Fusion concentration risk means aggregation itself is a liability — a driver for minimization and anonymization mandates.", "quote": "the greater the risk that one weak point could expose or corrupt the broader intelligence pool", "locator": "AI data fusion combines data from multiple sources", "quote_verified": true}, {"claim": "As agentic AI wo // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#7c3aed', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
