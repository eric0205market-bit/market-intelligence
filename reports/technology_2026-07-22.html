"KARR alarms are installed by car dealers to deter lot theft and typically remain wired into the vehicle even when buyers decline the feature, so owners possess a hackable device they never purchased or knew about.", "speaker": "Andy Greenberg", "type": "causal", "entities": ["KARR Security System", "car dealers", "Acrisure Protection Group"], "conviction": "high", "so_what": "The dealer-installed distribution model severs owners from the patch supply chain, unlike manufacturer-issued recalls.", "quote": null, "locator": "The KARR alarm devices are typically installed", "quote_verified": false}, {"claim": "A security expert who co-led the first car-hacking research in 2010-2011 called KARR 'probably the worst' car hacking threat ever discovered because the manufacturer can't fix it and owners don't know they have the problem.", "speaker": "Andy Greenberg", "type": "thesis", "entities": ["Stefan Savage", "UC San Diego", "KARR Security System"], "conviction": "high", "so_what": "Frames aftermarket components as the emerging weak link in vehicle cybersecurity, distinct from OEM software.", "quote": "It provides all the elements a car thief would want, but you have none of the advantages we normally have in terms of defending it, because you're disconnected from the supply chain that put it there.", "locator": "That difficulty of getting word out", "quote_verified": true}]}, {"theme": "Tracking and surveillance dimension", "insights": [{"claim": "The KARR device's persistent Bluetooth signature lets attackers use the WiGLE database to track a vulnerable car's historical locations and identify where it is frequently parked, a scouting mechanism for targeted theft or sabotage.", "speaker": "Andy Greenberg", "type": "causal", "entities": ["WiGLE", "KARR Security System", "Bluetooth"], "conviction": "high", "so_what": "Turns a measurement tool into a surveillance vector, broadening the harm beyond opportunistic hacking.", "quote": null, "locator": "Those WiGLE results are, however, more than just", "quote_verified": false}, {"claim": "In one 20-minute drive around UCSD's campus, researchers scanning with an ordinary Android phone found 97 vehicles with beaconing KARR alarms, illustrating pervasiveness.", "speaker": "Andy Greenberg", "type": "anecdote", "entities": ["UC San Diego", "KARR Security System"], "conviction": "high", "so_what": "Demonstrates trivial discoverability with no special equipment, raising real-world exploit likelihood.", "quote": null, "locator": "In the UCSD team’s own scanning", "quote_verified": false}]}, {"theme": "Vendor disclosure and response", "insights": [{"claim": "Acrisure Protection Group took close to 18 months to ship a firmware patch after UCSD disclosed the flaw in January of last year, releasing it only weeks before planned Defcon and Usenix presentations.", "speaker": "Andy Greenberg", "type": "data_point", "entities": ["Acrisure Protection Group", "UC San Diego", "Defcon", "Usenix"], "conviction": "high", "so_what": "Slow patch cadence despite 'prompt' claims signals weak security governance at the vendor and its SWDS subsidiary.", "quote": null, "locator": "Despite Acrisure Protection Group's claim", "quote_verified": false}, {"claim": "Acrisure characterized the vulnerability as highly complex and low risk under real-world conditions, a claim WIRED's demonstrated 'mayhem' exploits triggering horns and lights across multiple cars directly contradict.", "speaker": "Andy Greenberg", "type": "contrarian", "entities": ["Acrisure Protection Group", "UC San Diego"], "conviction": "high", "so_what": "Vendor risk-minimization language is a red flag when independent demos show one-tap mass exploitation.", "quote": "The vulnerability described in [UCSD's] research is highly complex and presents a low risk to customers under real-world conditions.", "locator": "When WIRED reached out to Acrisure", "quote_verified": true}, {"claim": "The patch requires owners to install the KARR Security app, connect to their vehicle, and manually trigger a firmware update, meaning remediation depends on owners first discovering the hidden device via a window sticker or dashboard button.", "speaker": "Andy Greenberg", "type": "causal", "entities": ["Acrisure Protection Group", "KARR Security System", "SouthWest Dealer Services"], "conviction": "high", "so_what": "Manual, owner-initiated patching guarantees low remediation rates across resold and unaware-owner vehicles.", "quote": null, "locator": "Car owners who already have the KARR Security smartphone app", "quote_verified": false}]}], "insight_total": 11, "top_entities": ["KARR Security System", "UC San Diego", "Acrisure Protection Group", "WiGLE", "Bluetooth", "Stefan Savage", "Aaron Schulman", "SouthWest Dealer Services", "Defcon", "Usenix"], "source_meta": {"author": "Andy Greenberg", "word_count": 2104, "paywalled": false}}, {"record_id": "29f318b8ebd013ef", "source_type": "technology", "source_name": "Wired", "source_url": "https://www.wired.com/story/etsy-is-in-its-flop-era-and-sellers-are-fleeing/", "title": "Etsy Is In Its Flop Era, and Sellers Are Fleeing", "published_date": "2026-07-21", "language": "en", "processed_at": "2026-07-22T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Tech", "Society"], "gist": "Longtime handmade Etsy sellers are fleeing the platform as AI-generated art and drop-shipped copies flood listings and erode trust, with the company's permissive 2024 AI policy and weak enforcement opening the door to human-moderated competitors like Fybe while Etsy's gross merchandise sales have declined since 2021.", "themes": [{"theme": "AI slop displacing human sellers", "insights": [{"claim": "AI-generated pet portraits are outranking and undercutting handmade listings in Etsy search results and selling for a fraction of the price, with buyers giving them great reviews indifferent to who or what made them.", "speaker": "Ej Dickson", "type": "causal", "entities": ["Etsy", "AI-generated art"], "conviction": "high", "so_what": "Consumer indifference to provenance means AI content structurally wins on price, compressing margins for human makers.", "quote": "They didn’t really know or care who made it, they were just eating it up", "locator": "The most frustrating part, she says", "quote_verified": true}, {"claim": "One Boulder seller's Etsy sales fell 30 percent in 2022 and 50 percent the following year as competitors, Alibaba drop-ship copies, and AI portraits proliferated, after she made over $40,000 on the platform in 2021.", "speaker": "Ej Dickson", "type": "data_point", "entities": ["Etsy", "Emily Olson", "Alibaba"], "conviction": "high", "so_what": "Illustrates the speed of income collapse for individual makers, a leading indicator of seller churn.", "quote": null, "locator": "In 2022, she says, her sales decreased by 30 percent", "quote_verified": false}, {"claim": "A UK illustrator on Etsy for 10 years says his sales fell 98 percent in a single year, attributing it to people using the platform as an easy way to make a quick buck with AI content.", "speaker": "Ej Dickson", "type": "anecdote", "entities": ["Etsy", "AI-generated art"], "conviction": "high", "so_what": "Extreme individual declines suggest a broader exodus of the artisan supply that was Etsy's differentiator.", "quote": "People have learned not to trust once-trusted sites like Etsy, because they are tired of seeing AI slop that is now infecting the site", "locator": "Viktor, a UK-based illustrator", "quote_verified": true}, {"claim": "AI-generated listings have spread beyond mugs and T-shirts into crocheting patterns, hermit crab pools, and medieval suits of armor, driven by online entrepreneurs promoting Etsy as a place for AI-driven side hustles.", "speaker": "Ej Dickson", "type": "data_point", "entities": ["Etsy", "AI-generated art"], "conviction": "medium", "so_what": "Category-wide AI infiltration erodes the whole marketplace's handmade positioning, not just art niches.", "quote": null, "locator": "It isn’t just mass-produced mugs", "quote_verified": false}]}, {"theme": "Etsy policy and enforcement gap", "insights": [{"claim": "Etsy officially decided in 2024 to keep allowing AI-generated art if sellers disclose it and barred selling custom AI prompts, but sellers say the disclosure mandate is not strictly enforced and the company is largely unresponsive to complaints.", "speaker": "Ej Dickson", "type": "causal", "entities": ["Etsy", "AI-generated art"], "conviction": "high", "so_what": "A disclosure rule without enforcement is effectively no rule, accelerating trust erosion and seller flight.", "quote": null, "locator": "In 2024, Etsy officially announced", "quote_verified": false}, {"claim": "Etsy's VP of customer operations conceded that enforcing its AI-transparency standards is complex and that the company has a lot more work to do on detecting and removing listings that don't belong.", "speaker": "Ej Dickson", "type": "data_point", "entities": ["Etsy", "James Ossman"], "conviction": "medium", "so_what": "Management's own admission of enforcement weakness signals the problem persists near-term.", "quote": "continuing to improve our ability to detect and remove listings that don't belong on Etsy", "locator": "In response to a list of questions", "quote_verified": true}]}, {"theme": "Etsy financials and competition", "insights": [{"claim": "Etsy's gross merchandise sales have declined since 2021, which analysts attribute to increased competition from Temu and Shein, and the company laid off 11 percent of its workforce in late 2023.", "speaker": "Ej Dickson", "type": "data_point", "entities": ["Etsy", "Temu", "Shein"], "conviction": "high", "so_what": "GMS decline plus low-cost-import competition frames a structurally pressured marketplace despite stable revenue.", "quote": null, "locator": "Since 2021, the company’s gross merchandise sales have declined", "quote_verified": false}, {"claim": "Etsy has roughly 5.6 million sellers and generated $2.8 billion in revenue last year, a 2.7 percent increase from 2024, showing revenue growth even as seller sentiment sours.", "speaker": "Ej Dickson", "type": "data_point", "entities": ["Etsy"], "conviction": "high", "so_what": "Revenue resilience masks supply-side discontent that could hollow out the platform's differentiation over time.", "quote": null, "locator": "In recent years, however, the platform has largely maintained", "quote_verified": false}, {"claim": "A new crafts marketplace, Fybe, opens to vendors August 1 and explicitly bans AI-generated content and drop-shipping, relying on volunteer human moderators to guarantee products are human-made.", "speaker": "Ej Dickson", "type": "data_point", "entities": ["Fybe", "Rachel Powell", "Etsy"], "conviction": "medium", "so_what": "A 'human-made only' positioning is emerging as a competitive wedge against incumbent marketplaces.", "quote": null, "locator": "Competitors are emerging. Fybe, for instance", "quote_verified": false}, {"claim": "A departing seller who pivoted from Etsy to Shopify found sales disappointing, noting it is harder to sell on your own website than on community marketplaces.", "speaker": "Ej Dickson", "type": "anecdote", "entities": ["Etsy", "Shopify", "Emily Olson"], "conviction": "medium", "so_what": "Marketplace network effects still lock sellers in despite grievances, limiting churn to Etsy's revenue.", "quote": null, "locator": "Olson has pivoted to Shopify", "quote_verified": false}]}, {"theme": "Future of handmade goods", "insights": [{"claim": "The rise of cheap AI content raises the existential question of whether handmade or crafted products have a viable future when consumers may not care about the difference and the AI version is cheaper and more accessible.", "speaker": "Ej Dickson", "type": "thesis", "entities": ["AI-generated art", "Etsy"], "conviction": "medium", "so_what": "If provenance premium erodes, the entire artisan-goods category faces demand risk, not just Etsy.", "quote": null, "locator": "But given the rising popularity of AI slop", "quote_verified": false}, {"claim": "A seller frames art as a discretionary luxury that is among the first things cut amid economic uncertainty, tying handmade-goods demand to the broader consumer spending cycle.", "speaker": "Ej Dickson", "type": "framework", "entities": ["Emily Olson"], "conviction": "medium", "so_what": "Handmade-goods demand is cyclically exposed, compounding the secular AI threat.", "quote": "Face it, art is a luxury, and with all this economic uncertainty right now, it tends to be one of the last things people want to spend money on", "locator": "“Face it, art is a luxury", "quote_verified": true}]}], "insight_total": 12, "top_entities": ["Etsy", "AI-generated art", "Fybe", "Temu", "Shein", "Shopify", "Alibaba", "Emily Olson", "James Ossman", "Rachel Powell"], "source_meta": {"author": "Ej Dickson", "word_count": 1182, "paywalled": false}}, {"record_id": "3afd1292850f9620", "source_type": "technology", "source_name": "Wired", "source_url": "https://www.wired.com/story/the-aclu-is-arming-lawyers-to-expose-state-surveillance-secrets/", "title": "The ACLU Is Arming Lawyers to Expose State Surveillance Secrets", "published_date": "2026-07-20", "language": "en", "processed_at": "2026-07-22T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Society", "Geopolitics", "AI", "Tech"], "gist": "The ACLU of Massachusetts is releasing a legal toolkit of pre-drafted motions to force prosecutors to disclose and preserve police use of surveillance tech like facial recognition, license plate readers, gunshot detection, and AI-drafted police reports, exploiting a chronic lag between adoption of surveillance tools and courts ruling on their legality.", "themes": [{"theme": "The disclosure-lag thesis", "insights": [{"claim": "Surveillance technologies with the worst disclosure records face the fewest court rulings precisely because a defendant cannot challenge a tool they were never told was used against them.", "speaker": "Dell Cameron", "type": "framework", "entities": ["ACLU of Massachusetts"], "conviction": "high", "so_what": "Secrecy self-perpetuates legal ambiguity; forcing disclosure is the lever that unlocks judicial review of surveillance vendors.", "quote": null, "locator": "The lag isn’t just the result of slow-moving courts", "quote_verified": false}, {"claim": "Most Americans carried cell phones by the late 1990s but the US Supreme Court did not require a warrant for cell phone location records until 2018, illustrating a roughly two-decade legal lag behind surveillance adoption.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["US Supreme Court"], "conviction": "high", "so_what": "Quantifies the structural lag that surveillance-tech vendors operate within before legal constraints bite.", "quote": null, "locator": "Most Americans carried cell phones", "quote_verified": false}]}, {"theme": "Hidden surveillance in the record", "insights": [{"claim": "The FBI for years required local police to sign secrecy agreements before using stingray cell-site simulators, with a Baltimore agreement instructing prosecutors to drop cases rather than reveal the device, even as the city used it more than 4,300 times between 2007 and 2015.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["FBI", "ACLU of Massachusetts", "Baltimore"], "conviction": "high", "so_what": "Documents institutionalized non-disclosure of surveillance, the practice the toolkit targets.", "quote": null, "locator": "For years, the FBI required local police departments", "quote_verified": false}, {"claim": "A Louisiana arrest warrant for a man misidentified by facial recognition and jailed nearly a week attributed his identification to 'a credible source' rather than software, showing warrants actively obscuring surveillance-tool use.", "speaker": "Dell Cameron", "type": "anecdote", "entities": ["Randal Quran Reid", "facial recognition"], "conviction": "high", "so_what": "Concrete evidence that surveillance provenance is hidden even in charging documents, raising wrongful-arrest liability.", "quote": null, "locator": "And when Louisiana authorities obtained an arrest warrant", "quote_verified": false}]}, {"theme": "Self-deleting evidence", "insights": [{"claim": "Axon's Draft One, an AI tool that writes police reports from body camera audio, discards the machine-written first draft by design, with an Axon product manager telling the EFF the choice avoids creating disclosure headaches for police and prosecutors.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["Axon", "Draft One", "Electronic Frontier Foundation"], "conviction": "high", "so_what": "Vendor design choices deliberately erase discoverable evidence, a legal and reputational risk for AI-in-policing firms.", "quote": "disclosure headaches", "locator": "Axon's Draft One, an AI tool", "quote_verified": true}, {"claim": "Flock Safety's license plate reader network deletes footage after 30 days by default and Chicago's ShotSpotter contract declared the gunfire data the vendor's own property rather than the city's.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["Flock Safety", "ShotSpotter", "Chicago"], "conviction": "high", "so_what": "Short retention and vendor data-ownership terms let exculpatory evidence vanish beyond government reach, a target for preservation motions.", "quote": null, "locator": "Elsewhere, Flock Safety’s license plate reader network", "quote_verified": false}, {"claim": "California enacted a law last year requiring agencies to keep the original AI-generated first drafts of police reports, showing legislatures moving to counter self-deleting surveillance evidence.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["California", "Axon", "Draft One"], "conviction": "medium", "so_what": "State legislation is beginning to constrain AI-policing vendors' data-retention design choices.", "quote": null, "locator": "California legislators saw the matter differently", "quote_verified": false}]}, {"theme": "Litigation leverage and precedent", "insights": [{"claim": "The Massachusetts Supreme Judicial Court in 2024 permanently threw out drug and firearm charges after police defied a court order to disclose fake social media profiles built with predominantly Black and brown avatars used to surveil a defendant.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["Massachusetts Supreme Judicial Court"], "conviction": "high", "so_what": "Demonstrates courts will impose severe sanctions for surveillance non-disclosure, giving the toolkit real teeth.", "quote": null, "locator": "In 2024, the state’s Supreme Judicial Court permanently threw out", "quote_verified": false}, {"claim": "The Massachusetts high court ruled defendants can demand a hearing forcing prosecutors to prove ShotSpotter actually works before its evidence reaches a jury, a reliability challenge to gunshot-detection vendors.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["Massachusetts Supreme Judicial Court", "ShotSpotter"], "conviction": "high", "so_what": "Reliability-hearing precedent raises the evidentiary bar for gunshot-detection tech in court.", "quote": null, "locator": "Last year, the same court ruled", "quote_verified": false}, {"claim": "Three weeks before the toolkit launch, the US Supreme Court ruled 6-3 that police use of a geofence warrant forcing Google to identify all phones near a crime scene constitutes a Fourth Amendment 'search', and the ACLU's toolkit will ship a geofencing motion into those unsettled waters.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["US Supreme Court", "Google", "ACLU of Massachusetts"], "conviction": "high", "so_what": "Fresh SCOTUS precedent expands Fourth Amendment reach over geofence warrants, creating litigation exposure for data-request compliance.", "quote": null, "locator": "The ACLU’s timing is not incidental", "quote_verified": false}]}, {"theme": "Two-front surveillance strategy", "insights": [{"claim": "The ACLU is fighting surveillance on two fronts: pressuring cities to drop tools like Flock and ShotSpotter outright, and arming defense lawyers with motions to expose surveillance in court and build a record that carries over to whatever tool comes next.", "speaker": "Dell Cameron", "type": "framework", "entities": ["ACLU of Massachusetts", "Flock", "ShotSpotter", "Jennifer Herrmann"], "conviction": "high", "so_what": "A dual procurement-and-litigation pressure model that threatens both sales pipelines and courtroom admissibility for surveillance vendors.", "quote": null, "locator": "The group is fighting a war against unregulated surveillance", "quote_verified": false}, {"claim": "The ACLU is lobbying Massachusetts to cut license plate reader retention to as little as two days from Flock's 30-day default while simultaneously using preservation motions to save that same data once a defendant is charged.", "speaker": "Dell Cameron", "type": "framework", "entities": ["ACLU of Massachusetts", "Flock", "Gideon Epstein"], "conviction": "medium", "so_what": "The nuanced retention stance shows privacy advocates want minimal collection but selective preservation, complicating vendor data policies.", "quote": null, "locator": "Epstein is careful to note the ACLU still generally wants", "quote_verified": false}]}], "insight_total": 12, "top_entities": ["ACLU of Massachusetts", "Flock Safety", "ShotSpotter", "Axon", "US Supreme Court", "Google", "FBI", "facial recognition", "Massachusetts Supreme Judicial Court", "Draft One"], "source_meta": {"author": "Dell Cameron", "word_count": 1257, "paywalled": false}}, {"record_id": "6f5da5374778d80f", "source_type": "technology", "source_name": "Wired", "source_url": "https://www.wired.com/story/mississippi-state-testing-reading-comprehension-literacy/", "title": "Stop Saying Kids Can’t Read", "published_date": "2026-07-21", "language": "en", "processed_at": "2026-07-22T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["Society", "AI"], "gist": "US reading scores have slid for 14 years, worst in middle and high school, yet Mississippi's phonics-and-accountability 'Miracle' has driven dramatic elementary gains even in its poorest county; the deeper problem is a collapse in reading stamina and willingness, blamed on smartphones, TikTok, and generative AI, that standardized-test drilling cannot fix.", "themes": [{"theme": "The national reading decline", "insights": [{"claim": "US reading performance has declined for 14 years, with the problem most extreme in middle and high school rather than elementary grades.", "speaker": "Megan Greenwell", "type": "data_point", "entities": ["NAEP"], "conviction": "high", "so_what": "Frames a durable secular decline in a core human-capital input relevant to long-run workforce quality.", "quote": null, "locator": "Across the country, reading performance has slid for 14 years", "quote_verified": false}, {"claim": "By 2025, NAEP reading scores for 13-year-olds had plunged to 256, just one point above the 1971 level, erasing gains made in the early 21st century, with one-third of 13-year-olds scoring 'below basic'.", "speaker": "Megan Greenwell", "type": "data_point", "entities": ["NAEP"], "conviction": "high", "so_what": "A half-century of educational progress effectively wiped out is a stark macro signal on human capital.", "quote": null, "locator": "Then reading performance began to drop again", "quote_verified": false}, {"claim": "Researchers from Harvard, Stanford, and Dartmouth declared earlier this year that the US is in 'a learning recession'.", "speaker": "Megan Greenwell", "type": "data_point", "entities": ["Harvard", "Stanford", "Dartmouth"], "conviction": "medium", "so_what": "Elite academic framing of a 'learning recession' elevates the issue to a systemic economic concern.", "quote": "a learning recession", "locator": "Earlier this year, a team of researchers", "quote_verified": true}, {"claim": "US adult literacy is deteriorating: a 2022 evaluation found 28 percent of Americans cannot reliably compare and contrast, paraphrase, or make basic inferences, up from 19 percent six years earlier, and even those with some higher education got worse.", "speaker": "Megan Greenwell", "type": "data_point", "entities": ["National Endowment for the Arts"], "conviction": "high", "so_what": "Declining adult functional literacy has direct implications for workforce productivity and training costs.", "quote": null, "locator": "A 2022 evaluation of adult literacy found", "quote_verified": false}]}, {"theme": "The Mississippi Miracle mechanics", "insights": [{"claim": "Mississippi rose from 49th out of 50 on NAEP fourth-grade reading in 2013 to ninth in the country by 2024, the poorest state in the US posting the most-discussed education turnaround.", "speaker": "Megan Greenwell", "type": "data_point", "entities": ["Mississippi", "NAEP"], "conviction": "high", "so_what": "Demonstrates that structured phonics plus accountability can move outcomes even in high-poverty settings, a replicable policy template.", "quote": null, "locator": "In 2013, Mississippi ranked 49th out of 50", "quote_verified": false}, {"claim": "In Jefferson County, one of the poorest US counties where 98 percent of district students are Black and 32 percent live below the poverty line, fourth-grade MAAP pass rates jumped from 43 percent in 2022 to 78 percent in 2025, a 35-point gain.", "speaker": "Megan Greenwell", "type": "data_point", "entities": ["Jefferson County", "MAAP", "Mississippi"], "conviction": "high", "so_what": "Extreme local gains in a high-poverty district undercut the assumption that demographics determine reading outcomes.", "quote": null, "locator": "Jefferson County’s growth curve was even steeper", "quote_verified": false}, {"claim": "The superintendent argues the third-grade 'reading gate'—automatic retention after failing the test three times—works not by removing weak readers from the fourth-grade pool but by making families treat passing as non-negotiable, since no Jefferson County third grader was held back in 2024 or 2025.", "speaker": "Megan Greenwell", "type": "causal", "entities": ["Adrian Hammitte", "Jefferson County", "Mississippi"], "conviction": "medium", "so_what": "Identifies the behavioral incentive, not selection bias, as the driver, informing how the model might transfer elsewhere.", "quote": null, "locator": "Hammitte believes the third-grade “reading gate”", "quote_verified": false}, {"claim": "Mississippi's Literacy-Based Promotion Act funded literacy coaches and teacher training, now $15 million a year up from $9.5 million, with a 57-coach K-3 team the associate state superintendent credits as the single biggest success factor over the reading gate or uniform materials.", "speaker": "Megan Greenwell", "type": "thesis", "entities": ["Mississippi", "Michelle Nowell", "Literacy-Based Promotion Act"], "conviction": "high", "so_what": "Points to teacher coaching, not testing mechanics, as the underappreciated lever, redirecting where education dollars should flow.", "quote": "it’s boots on the ground with our literacy coaches", "locator": "Aside from its accountability measures", "quote_verified": true}, {"claim": "Mississippi shifted to state-approved phonics-based curricula grounded in the science of reading, rejecting the 'whole language' and 'balanced literacy' methods that had children guessing at words rather than sounding them out.", "speaker": "Megan Greenwell", "type": "framework", "entities": ["Mississippi", "Sold a Story"], "conviction": "high", "so_what": "The pedagogy shift is the intellectual core of the turnaround and a signal for edtech and curriculum vendors aligned to phonics.", "quote": null, "locator": "Those materials are based on scientific research", "quote_verified": false}, {"claim": "There is zero evidence that Mississippi's improved reading scores result fro gs.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["Google", "Apple"], "conviction": "high", "so_what": "Widespread disclosure gaps undermine app-store privacy labels as a trust mechanism, a target for audit regulation.", "quote": null, "locator": "Forty percent of the apps collected or shared more data", "quote_verified": false}, {"claim": "Neither Google's Play Store Data Safety section nor Apple's App Store Privacy Labels disclose the country of origin of software running inside an app, leaving users no straightforward way to know which apps carry adversary code.", "speaker": "Dell Cameron", "type": "framework", "entities": ["Google", "Apple"], "conviction": "high", "so_what": "The missing country-of-origin disclosure is a concrete gap that policy or platform changes could address.", "quote": null, "locator": "But no user has a straightforward way to know", "quote_verified": false}]}, {"theme": "Operational security stakes", "insights": [{"claim": "In April, US Central Command confirmed to Senator Ron Wyden it had received multiple threat reports of adversaries exploiting commercial location data to target or surveil US personnel in the Middle East, the first official confirmation troops in an active war zone were being hunted through the data-broker economy.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["US Central Command", "Ron Wyden", "Strait of Hormuz", "Iran"], "conviction": "high", "so_what": "Official confirmation elevates data-broker exposure from privacy concern to active national-security threat, strengthening the case for legislation.", "quote": null, "locator": "In April, US Central Command acknowledged", "quote_verified": false}, {"claim": "Location data harvested from ordinary apps has traced US service members to their homes, children's schools, and sensitive sites including intelligence facilities and hardened shelters where nuclear weapons are believed stored.", "speaker": "Dell Cameron", "type": "causal", "entities": ["US military"], "conviction": "high", "so_what": "The demonstrated ability to map sensitive-site routines makes the ad-tech data economy a strategic vulnerability.", "quote": null, "locator": "WIRED investigations have previously shown", "quote_verified": false}]}, {"theme": "User sentiment and policy support", "insights": [{"claim": "In a survey of 103 military-affiliated Americans, more than 83 percent used at least one app with data practices that made them uncomfortable, averaging more than three such apps each, yet nearly two-thirds reported little or no institutional guidance on personal app use.", "speaker": "Dell Cameron", "type": "data_point", "entities": ["Purdue University", "Department of Defense"], "conviction": "high", "so_what": "The awareness-guidance gap points to demand for institutional and product-level mitigation solutions.", "quote": null, "locator": "The researchers also surveyed 103 military-affiliated", "quote_verified": false}, {"claim": "Participants ranked in-phone warnings about foreign or unknown third-party code as both the most effective and most-supported mitigation, with a data-broker restriction law, independent audits, and foreign-code bans drawing nearly identical support.", "speaker": "Dell Cameron", "type": "prediction", "entities": ["Department of Defense"], "conviction": "medium", "so_what": "Strong support for warnings and audits signals the likely shape of future regulation and product features in this space.", "quote": null, "locator": "Asked to weigh potential mitigations", "quote_verified": false}]}], "insight_total": 11, "top_entities": ["Huawei", "HMS Core", "Yandex", "Google", "Facebook", "Purdue University", "US Central Command", "Ron Wyden", "Apple", "National Guard"], "source_meta": {"author": "Dell Cameron", "word_count": 905, "paywalled": false}}]};

// ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#7c3aed', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#7c3aed', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
