var URGENCY_LABEL = { "act-now": "🔴 Act Now", "deep": "🔵 Deep", "watch": "🟡 Watch" };

var activeCat = "all";
var activeUrg = "all";
var activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) { body.classList.toggle('open'); }
}

function toggleReport() {
  var rb = document.getElementById('report-body');
  var icon = document.getElementById('report-toggle-icon');
  if (rb.classList.toggle('open')) { icon.textContent = '▲'; } else { icon.textContent = '▼'; }
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? null : name;
  renderCards();
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  renderCards();
  updateCatPills();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderCards();
  updateUrgPills();
}

function updateCatPills() {
  document.querySelectorAll('[data-cat]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-cat') === activeCat);
  });
}

function updateUrgPills() {
  document.querySelectorAll('[data-urgency]').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-urgency') === activeUrg);
  });
}

function getFilteredItems() {
  return ITEMS.filter(function(item) {
    if (activeSrc && item.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== 'all' && item.cat !== activeCat) return false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return false;
    return true;
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  var filtered = getFilteredItems();
  if (filtered.length === 0) {
    container.innerHTML = '<p style="color:#999;font-size:.85rem;padding:20px 0">No items match current filters.</p>';
    return;
  }
  var html = '';
  filtered.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var emoji = URGENCY_EMOJI[item.urgency] || '';
    var catLabel = item.cat.replace('ai-infra', 'AI/Infra').toUpperCase();

    var chartsHtml = '';

        '<div class="chart-placeholder' + hotClass + '">' + hotLabel + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }

    html += '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + item.id + '</span>' +
        '<span class="urgency-emoji">' + emoji + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + item.source.split(' /')[0] + '</span>' +

        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">THE IDEA</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">MY ANGLE</div>' +

}

function buildFilters() {
  var cats = {all: ITEMS.length};
  var urgs = {all: ITEMS.length};
  ITEMS.forEach(function(item) {
    cats[item.cat] = (cats[item.cat] || 0) + 1;
    urgs[item.urgency] = (urgs[item.urgency] || 0) + 1;
  });

  var catBar = document.getElementById('cat-filter-bar');
  var allPill = document.createElement('span');
  allPill.className = 'pill active';
  allPill.setAttribute('data-cat', 'all');
  allPill.textContent = 'All (' + cats.all + ')';
  allPill.onclick = function() { setCatFilter('all'); };
  catBar.appendChild(allPill);

  Object.keys(CAT_COLORS).forEach(function(cat) {
    if (!cats[cat]) return;
    var p = document.createElement('span');
    p.className = 'pill';
    p.setAttribute('data-cat', cat);
    p.textContent = cat.replace('ai-infra', 'AI/Infra').toUpperCase() + ' (' + cats[cat] + ')';
    p.onclick = function() { setCatFilter(cat); };
    catBar.appendChild(p);
  });

  var urgBar = document.getElementById('urg-filter-bar');
  var urgDefs = [{k:'all',l:'All (' + urgs.all + ')'},{k:'act-now',l:'🔴 Act Now (' + (urgs['act-now']||0) + ')'},{k:'deep',l:'🔵 Deep (' + (urgs['deep']||0) + ')'},{k:'watch',l:'🟡 Watch (' + (urgs['watch']||0) + ')'}];
  urgDefs.forEach(function(def) {
    var p = document.createElement('span');
    p.className = 'pill' + (def.k === 'all' ? ' active' : '');
    p.setAttribute('data-urgency', def.k);
    p.textContent = def.l;
    p.onclick = function() { setUrgFilter(def.k); };
    urgBar.appendChild(p);
  });
}

  var skipHtml = META.skippedSources.map(function(s) {
