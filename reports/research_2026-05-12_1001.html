  time: '10:01 CEST',

  includedSources: [

<div class="header">
  <div class="header-top">
    <div class="header-title">🔵 RESEARCH INTELLIGENCE</div>
    <div class="header-meta" id="header-meta"></div>
    <div class="header-count" id="header-count"></div>
  </div>
</div>

<div class="filters">
  <div class="filter-row">
    <span class="filter-label">Category</span>
    <button class="pill active" id="cat-all" onclick="setCat('all')">All</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Urgency</span>
    <button class="pill active" id="urg-all" onclick="setUrg('all')">All</button>
    <button class="pill" id="urg-act_now" onclick="setUrg('act_now')">🔴 Act Now</button>
    <button class="pill" id="urg-deep" onclick="setUrg('deep')">🔵 Deep</button>
    <button class="pill" id="urg-watch" onclick="setUrg('watch')">🟡 Watch</button>
  </div>
</div>

<div class="cards" id="cards-container"></div>

<div class="report-card">
  <div class="report-header" onclick="toggleReport()">
    <span>📋 Session Report</span>
    <span id="report-chevron">▶</span>
  </div>
  <div class="report-body" id="report-body">
    <table>
      <tr><td>Time Window</td><td id="r-window"></td></tr>
      <tr><td>Emails in Window</td><td id="r-emails"></td></tr>
      <tr><td>Emails Read</td><td id="r-read"></td></tr>
      <tr><td>Items Extracted</td><td id="r-items"></td></tr>
    </table>
    <div style="margin-top:12px;font-weight:600;font-size:12px;color:#999;text-transform:uppercase;letter-spacing:0.5px;">Included Sources</div>
    <div id="r-sources" style="margin-top:6px;"></div>
    <div style="margin-top:12px;font-size:12px;color:#aaa;">No sources skipped — all 9 emails in window contained extractable content.</div>
  </div>
</div>

<div style="height:40px;"></div>

<script>
var activeCat = 'all';
var activeUrg = 'all';
var openCards = {};

function urgLabel(u) {
  if (u === 'act_now') return '🔴';
  if (u === 'deep') return '🔵';
  if (u === 'watch') return '🟡';
  return '';
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  openCards[id] = !openCards[id];
  var body = document.getElementById('body-' + id);
  if (body) {
    body.className = 'card-body' + (openCards[id] ? ' open' : '');
  }
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var chev = document.getElementById('report-chevron');
  var isOpen = body.classList.contains('open');
  body.className = 'report-body' + (isOpen ? '' : ' open');
  chev.textContent = isOpen ? '▶' : '▼';
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('[id^="cat-"]').forEach(function(el) {
    el.classList.remove('active');
    el.style.background = '';
    el.style.color = '';
    el.style.borderColor = '';
  });
  var btn = document.getElementById('cat-' + cat);
  if (btn) {
    btn.classList.add('active');
    if (cat !== 'all') {
      var col = CAT_COLORS[cat] || '#555';
      btn.style.background = col;
      btn.style.borderColor = col;
      btn.style.color = '#fff';
    } else {
      btn.style.background = '#1a1a1a';
      btn.style.borderColor = '#1a1a1a';
      btn.style.color = '#fff';
    }
  }
  render();
}

function setUrg(urg) {
  activeUrg = urg;
  document.querySelectorAll('[id^="urg-"]').forEach(function(el) {
    el.classList.remove('active');
    el.style.background = '';
    el.style.color = '';
    el.style.borderColor = '';
  });
  var btn = document.getElementById('urg-' + urg);
  if (btn) {
    btn.classList.add('active');
    btn.style.background = '#1a1a1a';
    btn.style.borderColor = '#1a1a1a';
    btn.style.color = '#fff';
  }
  render();
}

function render() {
  var filtered = ITEMS.filter(function(item) {
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    return catOk && urgOk;
  });

  document.getElementById('header-count').textContent = filtered.length + ' items';

  var container = document.getElementById('cards-container');
  container.innerHTML = '';

  filtered.forEach(function(item, idx) {
    var col = CAT_COLORS[item.cat] || '#888';
    var angleStyle = 'border-left-color:' + col + ';background:' + col + '18;';
    var chartHtml = '';
    if (item.charts && item.charts.count > 0) {
      var hot = item.charts.hot;
      chartHtml = '<div class="charts-block' + (hot ? ' hot' : '') + '">' +
        (hot ? '🔥 CHART WORTH SAVING — ' : '📊 Charts: ') +
        item.charts.count + ' chart(s). ' + item.charts.desc +
        '</div>';
    } else if (item.charts && item.charts.desc) {
      chartHtml = '<div class="charts-block">' + item.charts.desc + '</div>';
    }

    var html = '<div class="card" id="card-' + item.id + '">' +
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span class="urgency-dot">' + urgLabel(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + col + '">' + item.source + '</span>' +
        '<span class="cat-tag">' + item.cat + '</span>' +
        (item.charts && (item.charts.count > 0 || item.charts.desc) ? '<span class="chart-icon">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body" id="body-' + item.id + '">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="' + angleStyle + '">' + item.angle + '</div>' +
        '<div class="tweets">' +
          '<div class="tweet-box a">' +
            '<div class="tweet-label a">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box b">' +
            '<div class="tweet-label b">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        (chartHtml ? chartHtml : '') +
        (item.link ? '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>' : '') +
      '</div>' +
    '</div>';

    container.innerHTML += html;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa;">No items match current filters.</div>';
  }
}

function buildCatFilter() {
  var cats = {};
  ITEMS.forEach(function(item) {
    cats[item.cat] = (cats[item.cat] || 0) + 1;
  });
  var row = document.querySelector('.filter-row');
  Object.keys(cats).sort().forEach(function(cat) {
    var col = CAT_COLORS[cat] || '#888';
    var btn = document.createElement('button');
    btn.className = 'pill';
    btn.id = 'cat-' + cat;
    btn.textContent = cat + ' (' + cats[cat] + ')';
    btn.onclick = function() { setCat(cat); };
    row.appendChild(btn);
  });

  // Style "All" button
  var allBtn = document.getElementById('cat-all');
  allBtn.textContent = 'All (' + ITEMS.length + ')';
  allBtn.style.background = '#1a1a1a';
  allBtn.style.borderColor = '#1a1a1a';
  allBtn.style.color = '#fff';

  // Build urgency counts
  var urgCounts = { act_now: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) { if (urgCounts[item.urgency] !== undefined) urgCounts[item.urgency]++; });
  document.getElementById('urg-all').textContent = 'All (' + ITEMS.length + ')';
  document.getElementById('urg-all').style.background = '#1a1a1a';
  document.getElementById('urg-all').style.borderColor = '#1a1a1a';
  document.getElementById('urg-all').style.color = '#fff';
  document.getElementById('urg-act_now').textContent = '🔴 Act Now (' + urgCounts.act_now + ')';
  document.getElementById('urg-deep').textContent = '🔵 Deep (' + urgCounts.deep + ')';
  document.getElementById('urg-watch').textContent = '🟡 Watch (' + urgCounts.watch + ')';
}

function buildReport() {
  document.getElementById('header-meta').textContent = META.date + ' · ' + META.time;
  document.getElementById('r-window').textContent = META.windowStart + ' → ' + META.windowEnd;
  document.getElementById('r-emails').textContent = META.emailsInWindow;
  document.getElementById('r-read').textContent = META.emailsRead + ' of ' + META.emailsInWindow;
  document.getElementById('r-items').textContent = META.itemsExtracted;

  var srcDiv = document.getElementById('r-sources');
  META.includedSources.forEach(function(s) {
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0ede8;font-size:12.5px;';
    row.innerHTML = '<span>' + s.name + '</span><span style="color:#888">' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</span>';
    srcDiv.appendChild(row);
  });
}

function init() {
  buildCatFilter();
  buildReport();
  render();
}

init();
</script>
</body>
</html>
