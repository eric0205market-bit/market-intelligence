 supply side: there's simply less BTC and ETH sitting anywhere it could be sold, and that number keeps shrinking.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://princetonchen.substack.com/p/daily-news-wall-july-9-2026"}, {"id": 13, "cat": "venture", "urgency": "watch", "source": "Princeton Chen (Daily News Wall)", "title": "SpaceX hits a new post-IPO low the same week Blue Origin closes a $10B raise at $130B", "idea": "SpaceX (SPCX) fell to a new post-IPO low near $145, just 8% above its $135 IPO price and down from a $225 record. In the same window, Blue Origin is reportedly nearing a $10B raise at a $130B valuation, led by Coatue's $4B with Bezos personally adding $2B.", "angle": "Private capital is more bullish on space right now than public markets are — that valuation spread between a public stock trading near its IPO price and a private round pricing at a record valuation rarely stays open for long.", "tweetA": "SpaceX just hit a new post-IPO low, only 8% above its IPO price and down 36% from its $225 peak. Same week, Blue Origin is closing a $10B raise at a $130B valuation with Coatue leading. Private capital is more bullish on space than public markets right now — that spread rarely stays open.", "tweetB": "$SPCX trading near its IPO price while Bezos personally adds another $2B into Blue Origin tells you retail's public-market enthusiasm for the space trade cooled faster than the smart money's conviction did.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://princetonchen.substack.com/p/daily-news-wall-july-9-2026"}, {"id": 14, "cat": "crypto", "urgency": "watch", "source": "Princeton Chen (Daily News Wall)", "title": "Real-world-asset perps now trade 1.5x spot volume — leverage arrived before adoption", "idea": "Real-world-asset perpetual futures did $26.4B in monthly volume versus $17.7B in spot RWA trading, with TradFi-style perps generating roughly 8x spot-RWA volume across 2026 so far. Binance led with roughly $500B in volume, a 36% share.", "angle": "The RWA pitch was 'tokenize real assets, bring TradFi on-chain' — what actually showed up first is leverage layered on top of the tokenized assets, not organic ownership demand. Financialization is outrunning adoption, same as every prior crypto cycle.", "tweetA": "Real-world-asset perpetuals did $26.4B in monthly volume vs $17.7B in spot — derivatives are now 1.5x spot in an asset class that's supposed to be about owning the underlying thing. Binance alone is 36% of that. TradFi speculation just found its way onto crypto rails before the actual assets did.", "tweetB": "The RWA narrative was sold as 'bring real assets on-chain.' What showed up first was leverage on top of the tokenized assets. Financialization always outruns adoption — RWA is just the latest category to prove it.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://princetonchen.substack.com/p/daily-news-wall-july-9-2026"}, {"id": 15, "cat": "regulation", "urgency": "watch", "source": "Princeton Chen (Daily News Wall)", "title": "The CLARITY Act draft could hit the Senate floor this month", "idea": "The CLARITY Act draft — the first serious attempt at a statutory US crypto market-structure framework — could arrive as soon as next week and reach a Senate vote later this month, though it still faces hurdles. This lands alongside a wave of other structural crypto news: Robinhood's Arbitrum-built L2 topped $100M TVL a week after launch, and the SEC's 'Regulation Crypto' agenda is slated for July.", "angle": "Everyone's trading the Hormuz headlines this week. The regulatory catalyst that could actually resolve years of US crypto market-structure uncertainty is sitting quietly in the Senate queue for later this month.", "tweetA": "The CLARITY Act draft could hit the Senate floor this month. If it passes, it's the first real statutory crypto market-structure framework in the US — landing right as BTC is decoupling from risk assets. Timing matters more than the headline suggests.", "tweetB": "Everyone's trading the Hormuz headlines. The regulatory catalyst that actually resolves years of crypto market-structure uncertainty is quietly sitting in the Senate queue for later this month.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://princetonchen.substack.com/p/daily-news-wall-july-9-2026"}, {"id": 16, "cat": "positioning", "urgency": "deep", "source": "The Dark Side of the Boom", "title": "G10 FX carry is back — and for the first time in years, spot isn't fighting it", "idea": "Carry-to-vol in crosses like USD/CAD and EUR/CHF is unusually rich because rate dispersion across G10 central banks remains wide while FX volatility has stayed remarkably contained. Unlike the old regime where carry was just equity beta in a costume (clipped in risk-on, wiped out in risk-off), some carry expressions are now trading closer to risk-neutral or even defensive. JPY and CHF remain the cleanest funding legs, though both carry tripwires — BOJ intervention risk and a renewed gold rally complicating the SNB's terms-of-trade channel, respectively.", "angle": "When carry stops behaving like disguised equity beta, it changes portfolio math — you can earn the coupon with less direct exposure to an equity drawdown, which is a meaningfully different risk profile than the post-GFC carry trade most people still have priced in their heads.", "tweetA": "Carry-to-vol in USD/CAD and EUR/CHF is 'unusually rich' right now because rate dispersion is wide AND vol is quiet — a combination that almost never lasts. When it breaks, watch the funding currencies first: JPY and CHF.", "tweetB": "The old carry trade was just equity beta in a costume — clip the coupon until risk-off wipes it out. This cycle's version is trading closer to risk-neutral, which means when it unwinds, equities won't be the thing that tells you first.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://thedarksideoftheboom.substack.com/p/fx-daily-g10-fx-carry-is-back-in"}, {"id": 17, "cat": "tech", "urgency": "watch", "source": "Tiger Research / Lambda256", "title": "20%+ of all blockchain transactions fail to execute — on Solana, non-vote failures top 40%", "idea": "Tiger Research's report on institutional on-chain data infrastructure states that depending on network congestion, more than 20% of all blockchain transactions fail to execute, and on Solana specifically the failure rate among non-vote transactions can exceed 40%. If a payment system mistakes one of these failed transactions for a successful one, it can reject a legitimate follow-up payment over a balance mismatch that shouldn't exist.", "angle": "This is the base-rate reliability number nobody quotes when pitching AI-agent micropayments (see the Drip/x402 item elsewhere this window) — put an autonomous agent in charge of decisions on the fastest, cheapest chain, and it's making them against data that's wrong more than 4 times in 10.", "tweetA": "More than 20% of all blockchain transactions fail to execute. On Solana, the failure rate for non-vote transactions tops 40%. Now put AI agents in charge of autonomous payments on that rail with no human checking the balance first. That's not a hypothetical risk, that's the base rate.", "tweetB": "The agentic-payments narrative assumes the chain just works. Nobody's pricing in that on the fastest, cheapest chain, nearly half of non-vote transactions don't even land — and that's before you ask an AI to make a financial decision based on that data.", "charts": {"count": 0, "hot": false, "desc": "Sponsored research report — charts likely in full PDF"}, "link": "https://reports.tiger-research.com/p/lambda256-datashare-eng"}, {"id": 18, "cat": "positioning", "urgency": "watch", "source": "Capital Flows Research", "title": "CME launches single stock futures on July 27 — overnight risk transfer comes to names like Oracle", "idea": "CME Group is launching single stock futures on individual names (including Oracle) on July 27, giving the market 24-hour overnight risk transfer on single stocks for the first time. The framework piece notes this will change how hedging flows move the underlying stocks, with dislocations increasingly trading around the clock rather than gapping at the cash open.", "angle": "Every time an exchange adds overnight risk transfer to a new asset class, realized opening-gap risk tends to fall while intraday/overnight vol rises — single names are about to get the treatment index futures already have.", "tweetA": "CME launches single stock futures on July 27 — Oracle and others get 24-hour overnight risk transfer for the first time. That's plumbing, not a headline, but it means single-name dislocations start trading around the clock instead of gapping at the open.", "tweetB": "Every time an exchange adds overnight risk transfer to a new asset class, gap risk at the open goes down and round-the-clock vol goes up. Single stocks are about to get the index-futures treatment on July 27.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.capitalflowsresearch.com/p/i-am-going-to-lay-out-my-trading"}, {"id": 19, "cat": "gold", "urgency": "deep", "source": "The Dark Side of the Boom", "title": "Gold's break below $4,050 was a positioning flush, not the end of the buying — central banks are still stacking at 2x the old pace", "idea": "Gold's drop into the low $4,020s looked like a stop-loss cascade among crowded late longs rather than a fundamental regime shift. Central banks have been accumulating gold at close to 1,000 tonnes a year over the past four years, roughly double the ~500-tonne annual pace of the prior decade. The latest reserve-manager survey shows a record share expecting their own institution's gold reserves to rise over the next 12 months, and a large majority expecting the dollar's share of global reserves to be moderately or significantly lower over five years.", "angle": "Two different clocks: the trader's clock says respect the technical damage and don't chase; the reserve clock says central banks are still buying, slowly and heavily, regardless of this week's stop-loss cascade. Don't confuse a liquidation flush with a change in the structural bid.", "tweetA": "Central banks are buying gold at ~1,000 tonnes a year now, double the ~500t/yr pace of the prior decade. This week's drop to $4,020 wasn't that buyer stepping back — it was leveraged longs getting flushed. Two totally different clocks, and only one of them just blinked.", "tweetB": "A record share of reserve managers expect their OWN gold holdings to rise this year, and most expect the dollar's reserve share to shrink over five years. That's not a trade, that's a decade-long reallocation happening quietly underneath every 'gold crashes' headline.", "charts": {"count": 0, "hot": true, "desc": "🔥 CHART WORTH SAVING — no embedded chart, but the central-bank buying pace (1,000t/yr vs 500t/yr prior decade) is a strong standalone bar chart; pull from World Gold Council survey data referenced in the piece."}, "link": "https://thedarksideoftheboom.substack.com/p/golds-latest-washout-looks-more-like"}, {"id": 20, "cat": "crypto", "urgency": "watch", "source": "Unchained (Laura Shin)", "title": "Drip wants AI agents to pay writers per-article via x402, settled in USDC", "idea": "Drip, co-founded by Justin Blau and Michael Blau, lets AI agents pay independent publishers for paywalled content on a per-use basis, built on the x402 and MPP agentic payment standards with USDC settlement on Base and Tempo. The founders chose financial analysis as their launch niche.", "angle": "Micropayments for content have failed as a business model for two decades running human friction as the excuse. The pitch this time is that the payer isn't a human anymore — it's a bot that doesn't feel friction and doesn't abandon a checkout flow.", "tweetA": "Drip wants AI agents to pay writers per-article via x402, settled in USDC on Base and Tempo. Micropayments have failed as a business model for 20 years straight — the new pitch is that the payer isn't human anymore, so the usual friction excuse doesn't apply.", "tweetB": "If this works, it inverts the paywall model completely: instead of humans subscribing to dodge the wall, AI agents pay per-scrape and humans get answers for free through the agent. Publishers become B2B data vendors to bots, not subscription businesses for people.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://unchainedcrypto.beehiiv.com/p/how-drip-is-making-ai-agents-to-pay-writers-for-their-work"}, {"id": 21, "cat": "macro", "urgency": "watch", "source": "Princeton Chen (Daily News Wall)", "title": "Japan's 10-year yield just hit a near 3-decade high", "idea": "Japan's 10-year JGB yield pushed to its highest level in nearly 30 years, described in the digest as a global-liquidity headwind that crypto markets absorbed without much visible damage this week.", "angle": "Everyone's watching the Fed's 9-8 split. The more dangerous split might be in Tokyo — a multi-decade high in JGB yields is the one macro variable that could unwind every yen-funded G10 carry position (see the FX carry item above) at once.", "tweetA": "Japan's 10-year yield just hit a near 3-decade high, at the same time the yen is the most obvious carry-funding currency risk in FX. JGB yields ripping higher is the one macro variable that could blow up every G10 carry trade simultaneously.", "tweetB": "Everyone's watching the Fed's 9-8 split this week. The more dangerous split might be in Tokyo, where multi-decade-high JGB yields are quietly pulling the rug out from under every yen-funded position in the world.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://princetonchen.substack.com/p/daily-news-wall-july-9-2026"}];
const META = {"date": "2026-07-10", "time": "09:04 CEST", "windowStart": "2026-07-10 03:04 CEST", "windowEnd": "2026-07-10 09:04 CEST", "emailsInWindow": 11, "emailsRead": 11, "itemsExtracted": 21, "includedSources": [{"name": "Princeton Chen (Daily News Wall)", "count": 9}, {"name": "The Dark Side of the Boom", "count": 4}, {"name": "Michael Parekh / AI-RTZ", "count": 2}, {"name": "McKinsey (The Weekend Read)", "count": 2}, {"name": "HFIR (Wilson)", "count": 1}, {"name": "Tiger Research / Lambda256", "count": 1}, {"name": "Capital Flows Research", "count": 1}, {"name": "Unchained (Laura Shin)", "count": 1}], "skippedSources": []};
const CATS = {"macro": {"label": "macro", "color": "#e24b4a"}, "credit": {"label": "credit", "color": "#378add"}, "positioning": {"label": "positioning", "color": "#ef9f27"}, "ai": {"label": "AI/infra", "color": "#1d9e75"}, "crypto": {"label": "crypto", "color": "#7f77dd"}, "geopolitics": {"label": "geopolitics", "color": "#d85a30"}, "energy": {"label": "energy", "color": "#f97316"}, "tech": {"label": "tech", "color": "#06b6d4"}, "gold": {"label": "gold", "color": "#d4a017"}, "culture": {"label": "culture", "color": "#ec4899"}, "labor": {"label": "labor", "color": "#8b5cf6"}, "regulation": {"label": "regulation", "color": "#64748b"}, "science": {"label": "science", "color": "#14b8a6"}, "venture": {"label": "venture", "color": "#84cc16"}};
const URGENCY = {"act": {"emoji": "🔴", "label": "Act Now"}, "deep": {"emoji": "🔵", "label": "Deep"}, "watch": {"emoji": "🟡", "label": "Watch"}};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(c) { return CATS[c] ? CATS[c].color : "#888"; }
function catLabel(c) { return CATS[c] ? CATS[c].label : c; }

function renderHeader() {
  document.getElementById('headerSub').textContent =
    META.date + " · " + META.time + " · " + ITEMS.length + " items from " + META.includedSources.length + " sources";
}

function renderFilters() {
  const catCounts = {};
  ITEMS.forEach(function(i) { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catKeys = Object.keys(CATS).filter(function(k) { return catCounts[k]; });

  const catBar = document.getElementById('catFilters');
  let html = '<button class="pill' + (activeCat === 'all' ? ' active' : '') + '" style="' + (activeCat === 'all' ? 'background:#333;' : '') + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  catKeys.forEach(function(k) {
    const active = activeCat === k;
    const style = active ? ('background:' + catColor(k) + ';border-color:' + catColor(k) + ';') : '';
    html += '<button class="pill' + (active ? ' active' : '') + '" style="' + style + '" onclick="setCat(\'' + k + '\')">' + catLabel(k) + ' (' + catCounts[k] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgBar = document.getElementById('urgFilters');
  let uhtml = '<button class="pill' + (activeUrg === 'all' ? ' active' : '') + '" style="' + (activeUrg === 'all' ? 'background:#333;' : '') + '" onclick="setUrg(\'all\')">All</button>';
  ['act','deep','watch'].forEach(function(u) {
    if (!urgCounts[u]) return;
    const active = activeUrg === u;
    const style = active ? 'background:#333;border-color:#333;' : '';
    uhtml += '<button class="pill' + (active ? ' active' : '') + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + URGENCY[u].emoji + ' ' + URGENCY[u].label + ' (' + urgCounts[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c) { activeCat = c; activeSrc = null; renderFilters(); renderCards(); }
function setUrg(u) { activeUrg = u; activeSrc = null; renderFilters(); renderCards(); }

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards(true);
}

function renderCards(expandMatched) {
  const container = document.getElementById('cards');
  let visible = ITEMS.filter(function(i) {
    if (activeCat !== 'all' && i.cat !== activeCat) return false;
    if (activeUrg !== 'all' && i.urgency !== activeUrg) return false;
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    return true;
  });

  if (visible.length === 0) {
    container.innerHTML = '<div class="empty-msg">No items match this filter.</div>';
    return;
  }

  let html = '';
  visible.forEach(function(item) {
    const openClass = (expandMatched && activeSrc) ? ' open' : '';
    const chartFlag = item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : '');
    html += '<div class="card' + openClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span>' + URGENCY[item.urgency].emoji + '</span>';
    html += '<span class="badge" style="background:' + catColor(item.cat) + '">' + item.source + '</span>';
    html += '<span class="tag">' + catLabel(item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chevron">▸</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left:2px solid ' + catColor(item.cat) + ';background:' + catColor(item.cat) + '14;">' + item.angle + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + item.tweetA + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + item.tweetB + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts.count > 0 || item.charts.desc) {
      html += '<div class="section-label">Charts</div>';
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.desc || 'No chart in email — article may contain one.') + '</div>';
    }
    html += '<div class="link-row"><a href="' + item.link + '" target="_blank" rel="noopener">↗ Read full article</a></div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderReport() {
  let html = '<div class="report-grid">';
  html += '<div><div class="section-label">Window</div>';
  html += '<div>' + META.windowStart + ' → ' + META.windowEnd + '</div>';
  html += '<div style="margin-top:6px;color:var(--text-dim);">' + META.emailsRead + ' of ' + META.emailsInWindow + ' emails read · ' + META.itemsExtracted + ' items extracted</div>';
  html += '<div class="section-label">Included Sources</div>';
  META.includedSources.forEach(function(s) {
    html += '<div class="src-line" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')"><span class="src-name">' + s.name + '</span><span>' + s.count + '</span></div>';
  });
  html += '</div>';
  html += '<div><div class="section-label">Skipped Sources</div>';
  if (META.skippedSources.length === 0) {
    html += '<div style="color:var(--text-dim);">None — every email in the window had extractable content.</div>';
  }
  META.skippedSources.forEach(function(s) {
    html += '<div class="skip-line"><b>' + s.name + '</b><br>' + s.reason + '</div>';
  });
  html += '</div></div>';
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('reportToggle').addEventListener('click', function() {
  document.getElementById('reportCard').classList.toggle('open');
});

renderHeader();
renderFilters();
renderCards();
renderReport();
</script>
