rtner diversification. GCC divisions are widening, not narrowing. Arab normalization with Israel is now less likely. Other key pieces in the Blowback series cover: Asia's economic security ('a nadir' — Mireya Solís, Brookings); strains on US and Russian power from parallel Ukraine and Iran wars; maritime chokepoint coercion; US naval power shortfalls; Turkey's post-American hesitation; China-North Korea Xi-Kim summit; new disorder at sea.", "url": "https://www.brookings.edu/collection/blowback-how-the-iran-war-may-change-the-world/", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "title": "Private Markets at an Inflection Point", "summary": "Goldman Sachs' Pete Lyon and Michael Brandmeyer argue that private markets are at a structural inflection point driven by a market structure change — similar to how public equity markets were transformed by decimalization and ETFs. PE holding periods have risen to 7 years; distributions at 8–10% vs. 15–20% historical norms; but private credit payment default rates remain below the long-term average at 2%. The secondary market is growing rapidly and could reach $500B in 3–5 years. Retail penetration is rising (now ~20% of private credit market). Goldman cautiously projects distributions recovering and deal activity exceeding the 2021 peak within 2–3 years — if the macro environment remains supportive. Infrastructure funds are a standout: $221B raised in 2025 (record), 12.8% returns, accelerating fundraising timescales (from 13–18 months in 2018–21 to 7–12 months in 2022–Q3 2025). Hyperscaler AI financing needs ($5.3T by 2030) are forcing private infra and real estate funds to play a growing role as public credit markets approach saturation limits.", "url": "https://www.goldmansachs.com/insights/goldman-sachs-exchanges/private-markets-at-an-inflection-point", "images": []}, {"source": "galaxy_digital", "name": "Galaxy Digital", "title": "Bitcoin May Not Have Bottomed Yet. Here's Where the Data Says it Could.", "summary": "Galaxy Digital's Alex Thorn delivers the most systematic Bitcoin cycle analysis of the period. The 4-year cycle is intact but compressing in amplitude: each peak has been less euphoric than the prior (indexed to prior lows), and each trough shallower. October 2025's ATH of $126,080 was the calmest top in bitcoin's history on an indexed basis — the realized price (average market cost basis) sits unusually close to the ATH at 43.7% vs. roughly one-third or less in past cycles. Applying five families of indicators (valuation, profit-taking, miner stress, trend, sentiment), Galaxy concludes: very few historical cycle-bottom indicators have fired; the drawdown is younger than historical bottoms on a time basis; the realized price can fall further if a real panic emerges. Base case bottom: $40k–$46k occurring between now and Q4 2026. After that, $250k target by end-2027. The report explicitly notes that the cycle is compressing but the amplitude has not been eliminated — a calmer top raised the floor but did not remove it.", "url": "https://www.galaxy.com/insights/research/bitcoin-four-year-cycle-where-is-the-bottom", "images": []}, {"source": "man_group", "name": "Man Group", "title": "Private Credit, Software and AI: A Manual for Markets", "summary": "Man Group's 11-minute deep read provides the most rigorous framework for navigating private credit in the AI era. Software/SaaS represents one of the largest single-sector concentrations in private credit portfolios and BDCs — many deals struck at peak 2021 valuations now face pressure from AI disruption, narrowing margins, deteriorating interest coverage, and PIK mechanisms. However, Man Group makes three critical distinctions: (1) payment defaults (2%) vs. distressed exchanges (pushed to 5%) vs. losses (much lower given recovery rates); (2) high-profile defaults are typically in large-cap BSL or non-sponsored deals, not middle-market direct lending; (3) middle-market direct lending has matched leveraged loan recovery rates historically. The analysis identifies three types of private credit opportunity in the AI era: AI-native software beneficiaries (buy), legacy SaaS under AI disruption pressure (avoid), and the intersection — companies with proprietary data moats that can monetize AI while maintaining their existing customer base (selective).", "url": "https://www.man.com/insights/private-credit-software-ai-markets-manual", "images": []}, {"source": "capital_economics", "name": "Capital Economics", "title": "Another China Shock, But with Higher Stakes and Fewer Answers", "summary": "Capital Economics' Group Chief Economist Neil Shearing delivers the most nuanced available analysis of China Shock 2.0 from a recent Brussels visit where the topic dominated discussion. Key distinctions from the original shock: China's factories have moved up the value chain and are now directly competing with advanced European manufacturers (high export similarity index with eurozone, unlike with US, UK, or Japan). Chinese export prices are falling aggressively due to China's economic model (high savings, high investment, state-backed excess capacity). The economic impact: eurozone exports to China fell ~30% since 2019 while imports from China rose ~30%. GDP impact estimated at up to 0.2% per year — concentrated heavily in Germany (manufacturing), largely bypassing Spain/Ireland (services). The benefits (Chinese import price deflation reducing eurozone CPI by 0.3–0.5pp) are real but offset by political concerns. Policy responses are uncertain and often counterproductive. Shearing's bottom line: the threat is real but the alarmism is overstated — Europe's structural challenges (weak productivity, legacy industries, demographics, expensive welfare states) are more important than Chinese competition.", "url": "https://www.capitaleconomics.com/blog/another-china-shock-higher-stakes-and-fewer-answers", "images": []}], "D_charts": [{"source": "wood_mackenzie", "name": "Wood Mackenzie", "chart": "Cushing crude stocks have fallen 11.3 million barrels since early April to less than 25 million barrels — within 2 million barrels of the operational floor. The chart shows the rapid pace of inventory draws driven by the global Hormuz supply crisis, with Wood Mackenzie's monitoring spanning fixed-roof tanks, caverns, and floating-roof tanks (more comprehensive than satellite-sourced data).", "url": "https://www.woodmac.com/press-releases/cushing-crude-stocks-near-operational-floor-global-supply-crisis/", "images": ["https://www.woodmac.com/siteassets/press-release-images/chart-cushing-wood-mackenzie.png?width=1000&height=600&rmode=max&rxy=0.5,0.5"]}, {"source": "pimco", "name": "PIMCO", "chart": "Energy sector spread outperformance vs. US HY and EM bond indices — showing that energy credit outperformance began well before the Iran conflict oil spike, supporting the argument that the move reflects structural sector discipline rather than just oil price tailwinds.", "url": "https://www.pimco.com/us/en/insights/energy-credit-market-returns-reflect-sector-discipline", "images": ["https://www.pimco.com/us/en/-/media/global-assets/insights/economic-and-market-commentary/the-credit-market-lens/06/images-of-energy-credit-market-returns-reflect-sector-discipline/lofti-w24-edit-chart-60730-v1_01.webp?rev=429f9dd993d54ef486827f4c72831a3b&la=en-US&h=720&w=1280&hash=AFFB4AD7BCEFDEACE7721F4F5053942A"]}, {"source": "schroders", "name": "Schroders", "chart": "US payrolls stabilizing in 2026: the chart shows the pace of monthly job creation across 2025–2026, with the recovery in May (172K) confirming that the labor market has stabilized meaningfully from last year's revised pace — consistent with economic expansion but not overheating.", "url": "https://www.schroders.com/en-us/us/individual/insights/weekly-bond-market-update-from-rate-cuts-to-rate-questions/", "images": ["https://mybrand.schroders.com/transform/d80d8217-3d7d-443e-9f1c-a8c5b1dd3718/US-payrolls-stabilizing-in-2026?quality=85"]}, {"source": "bnp_paribas", "name": "BNP Paribas AM", "chart": "Earnings expectations vs. actual results for S&P 500: shows that earnings expectations have been high but have so far been matched by actual reported results — validating the earnings-driven bull market thesis while flagging that any earnings disappointment would be particularly painful at current valuations.", "url": "https://viewpoint.bnpparibas-am.com/view-from-the-markets-too-much-of-a-good-thing/", "images": ["https://viewpoint.bnpparibas-am.com/wp-content/uploads/2026/06/Exhibit-1-Earnings-expectations-are-high-but-so-far-aligned-with-actual-results.png"]}, {"source": "t_rowe_price", "name": "T. Rowe Price", "chart": "Rig count vs. oil price: shows that rig count was falling despite elevated prices before the Iran war started, illustrating the structural productivity deterioration in oil exploration and production that underpins the structurally-higher oil price thesis.", "url": "https://www.troweprice.com/en/us/insights/supply-shock-sparks-energy-security-push", "images": ["https://www.troweprice.com/content/dam/trp-ecl/global/en/ipc/assets/enterprise/2026/q2/mymo-five-shifts-reshaping-markets/supply-shock-sparks-energy-security-push.jpg"]}, {"source": "t_rowe_price", "name": "T. Rowe Price", "chart": "Manufacturing PMI orders vs. destocking cycle: shows global manufacturing PMIs recovering after a three-year downtrend as the destocking cycle fades — the structural inflation driver that T. Rowe Price argues markets are currently underpricing.", "url": "https://www.troweprice.com/en/us/insights/manufacturing-revival-complicates-inflation-fight", "images": ["https://www.troweprice.com/content/dam/trp-ecl/global/en/ipc/assets/enterprise/2026/q2/mymo-five-shifts-reshaping-markets/manufacturing-revival-complicates-inflation-fight.jpg"]}, {"source": "t_rowe_price", "name": "T. Rowe Price", "chart": "AI capex broadening — hyperscaler capex trailing 4-quarter totals: shows the dramatic escalation of AI-related capital spending and its broadening scope beyond the original Mag7 names, illustrating the transition from a tech story to a full industrial investment cycle.", "url": "https://www.troweprice.com/en/us/insights/ai-moves-into-the-real-economy", "images": ["https://www.troweprice.com/content/dam/trp-ecl/global/en/ipc/assets/enterprise/2026/q2/mymo-five-shifts-reshaping-markets/ai-moves-into-the-real-economy.jpg"]}, {"source": "franklin_templeton", "name": "Franklin Templeton (ClearBridge)", "chart": "Semiconductor cycle extension charts: two exhibits showing (1) the durability of AI capex driving semi demand beyond initial expectations, and (2) the broadening of semiconductor demand types (inference ASICs, power management, HBM memory) that extend the cycle beyond GPU-centric initial investment.", "url": "https://www.franklintempleton.com/articles/2026/clearbridge-investments/can-ai-capex-extend-the-semiconductor-cycle", "images": ["https://franklintempletonprod.widen.net/content/wb97qebwmf/webp/cbi-ai-capex-ex1-06-2026.png", "https://franklintempletonprod.widen.net/content/vgiecr88z3/webp/cbi-ai-capex-ex2-06-2026.png"]}, {"source": "man_group", "name": "Man Group", "chart": "US household net wealth distribution: Federal Reserve data showing the top 10% of US households hold roughly 90% of US equity holdings — illustrating the narrow base of wealth effects currently supporting US consumption, and the systemic risk if that cohort reduces spending.", "url": "https://www.man.com/insights/views-from-the-floor-2026-9-june", "images": []}, {"source": "goldman_sachs", "name": "Goldman Sachs", "chart": "Private infrastructure fund AUM growth and dry powder: data on private infrastructure funds ($1.7 trillion AUM, $400 billion dry powder, record $221 billion raised in 2025) projected to potentially reach $3 trillion by 2030, alongside AI capex financing needs of $5.3 trillion by 2030.", "url": "https://www.goldmansachs.com/insights/articles/private-markets-expected-to-have-growing-role-in-data-center-financing", "images": ["https://www.goldmansachs.com/images/insights/articles/private-markets-expected-to-have-growing-role-in-data-center-financing/alt-asset-graph.jpg", "https://www.goldmansachs.com/images/insights/articles/private-markets-expected-to-have-growing-role-in-data-center-financing/private-infrastructure-graph.jpg"]}, {"source": "galaxy_digital", "name": "Galaxy Digital", "chart": "Bitcoin 4-year cycle comparison: each cycle's peak-to-trough decline (85%, 84%, 77% — compressing) and timing (12–13 months from top to bottom historically, current cycle only 8 months from October 2025 top as of June 2026). Realized price vs. ATH ratio across cycles — current cycle unusually close at 43.7%. Multi-indicator bottom detection framework (valuation, profit-taking, miner stress, trend, sentiment).", "url": "https://www.galaxy.com/insights/research/bitcoin-four-year-cycle-where-is-the-bottom", "images": ["https://images.ctfassets.net/h62aj7eo1csj/6GVbimZdIRuGM2VecFD0s7/b3ae2143efa054e5b164c48487fc56ef/Hero_Bitcoin-1.png?w=1500&q=60&fm=avif"]}, {"source": "coinshares", "name": "CoinShares", "chart": "TON Network validators and network growth metrics: illustrates the disconnect between Telegram's 1 billion MAU distribution advantage and the current 1.78 million monthly active TON wallets (0.12% conversion rate) — the key gap the investment case rests on closing.", "url": "https://coinshares.com/insights/research-data/the-open-network-ton-an-institutional-research-note/", "images": ["https://a.storyblok.com/f/176807/3296x1600/332934e177/new-research-cover-5.png", "https://a.storyblok.com/f/176807/1600x1120/a123209596/ton-total-network-validators.png/m/"]}, {"source": "capital_economics", "name": "Capital Economics", "chart": "China Export Similarity Index and China vs. eurozone share of global exports: three charts showing (1) China's export profile increasingly resembling Europe's (not Japan, US, or UK); (2) China's falling export prices since 2019; (3) China's rising share of global exports as eurozone's share has declined by a similar amount — the structural competitive threat.", "url": "https://www.capitaleconomics.com/blog/another-china-shock-higher-stakes-and-fewer-answers", "images": []}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "chart": "Solar inverter manufacturer global ranking 2026: Sungrow and Huawei retain top positions for second consecutive year. SMA third, GoodWe and Enphase fourth and fifth. Hoymiles and APSystems enter top 10 for the first time — intensifying competition; cybersecurity and supply chain diversification rising on procurement agenda.", "url": "https://www.woodmac.com/press-releases/solar-inverter-manufacture-ranking-2026/", "images": ["https://www.woodmac.com/link/6dbdd6356cd64790bb8eee8314bf3c09.aspx"]}, {"source": "hsbc", "name": "HSBC", "chart": "Food consumption trends related to GLP-1/weight-loss drug adoption: shows how the rapid spread of weight-loss drugs is already reducing US spending on sugary foods and shifting UK users from fast food to vegetables — an emerging force on consumption data that will grow as drug adoption rises.", "url": "https://www.business.hsbc.com/en-gb/insights/a-weight-off-consumption", "images": ["https://www.business.hsbc.com/-/media/media/global/images/articles/consumption-charts-food-consumption.png?h=601&iar=0&w=696&hash=0CDEB8FCFB48A3E432884A88BB260341"]}], "house_views": [{"source": "goldman_sachs", "name": "Goldman Sachs", "stance": "No Fed cuts until June 2027. US GDP resilient. European equities constructive (STOXX 600 target 660) but won't outperform US. Bullish AI/data center infrastructure globally. Private markets approaching distribution recovery. Spain standout in Europe.", "category": "bank_bulge", "url": "https://www.goldmansachs.com/insights/articles/why-the-fed-is-unlikely-to-cut-rates-this-year"}, {"source": "jpmorgan", "name": "JPMorgan", "stance": "Constructive on US equities mid-year — earnings doubled since 2019, AI capex now >2% of US GDP. Watching return sustainability on $700B AI capex. Private market structured financing evolving to manage distribution pressure.", "category": "bank_bulge", "url": "https://www.jpmorgan.com/insights/podcast-hub/making-sense/equities-mid-year-update"}, {"source": "kkr", "name": "KKR", "stance": "Divergence Conundrum: stay up in quality, add non-correlated exposures, own nominal-GDP-linked assets. Asia outperforms. USD peaked. Oil futures underpricing risk premium. Higher-for-longer inflation everywhere except China.", "category": "asset_manager", "url": "https://www.kkr.com/insights/mid-year-update-2026"}, {"source": "pimco", "name": "PIMCO", "stance": "OW energy credit (sector discipline, not just oil spike). Rates range-bound but cuts not likely in 2026. Credit spreads broadly tight — watching AI capex sustainability. Fixed income constructive on duration only on evidence inflation is sustainably falling.", "category": "asset_manager", "url": "https://www.pimco.com/us/en/insights/energy-credit-market-returns-reflect-sector-discipline"}, {"source": "man_group", "name": "Man Group", "stance": "Bearish: AI bubble creating dangerous two-tier economy (semis soaring, software/consumer cracking). If AI bubble bursts, US consumer cannot save the economy. Staging risk of stagflation rising. Watch hyperscaler FCF — not recovering until 2029.", "category": "hedge_fund", "url": "https://www.man.com/insights/something-has-got-to-give"}, {"source": "t_rowe_price", "name": "T. Rowe Price", "stance": "Bullish on broadening market dispersion. Favor AI real-economy plays (power/cooling/construction), oilfield services, nuclear, critical minerals. Structurally long inflation breakevens. Healthcare recovery thesis. Active management environment is the best in a decade.", "category": "asset_manager", "url": "https://www.troweprice.com/en/us/insights/concentration-makes-way-for-dispersion"}, {"source": "franklin_templeton", "name": "Franklin Templeton", "stance": "2.5% US GDP, Fed on hold, buying dips and selling rips. EM equities up 25% YTD and still attractive. Small caps and value in the broadening. Semiconductor cycle extended by HBM memory shortage and power chip pricing power. Healthcare as sector recovery.", "category": "asset_manager", "url": "https://www.franklintempleton.com/articles/series/from-the-market-desk"}, {"source": "standard_chartered", "name": "Standard Chartered", "stance": "Cautious near-term — US equity positioning still elevated (1.13σ above average). Tactically short bond duration (3–5yr). Fed rate cut expectations pushed to 2027. Equal-weight DM equities preferred. Bullish on gold pullback and CHF. Tactically bullish Hang Seng tech.", "category": "bank_bulge", "url": "https://www.sc.com/sg/market-outlook/weekly-market-view-12-6-2026/?mvog=1"}, {"source": "bca_research", "name": "BCA Research", "stance": "Earnings vs. Everything-Else: earnings are carrying markets against rising bond yields, energy costs, and potential central bank U-turn. Debate shifted from 'when cuts' to 'whether cuts at all.' Watching labor market and consumption as potential narrative-shift catalysts.", "category": "macro_independent", "url": "https://www.bcaresearch.com/marketing/webcasts/earnings-bonanza/219391"}, {"source": "gavekal", "name": "Gavekal Research", "stance": "Oil market absorbing Hormuz shock better than feared (oil at three-month low despite no deal). SpaceX IPO creating post-IPO liquidity stress syndrome risk. Korea (doubled YTD) and Latin America bull markets. Computing power futures imminent — new asset class. China regulatory crackdown returning.", "category": "macro_independent", "url": "https://research.gavekal.com/teaser/post-ipo-liquidity-stress-syndrome/"}, {"source": "oxford_economics", "name": "Oxford Economics", "stance": "World GDP 2.4% in 2026 (no recession despite Iran war). BoJ hike to 1% in June. JGB 10yr target 2.8%. US PCE to exceed 4%. Rearming Europe limited economic impact (~40% leaking abroad). Bretton Woods 3.0 as China diverts from US Treasuries.", "category": "macro_independent", "url": "https://www.oxfordeconomics.com/resource/world-economic-prospects-preview/"}, {"source": "capital_economics", "name": "Capital Economics", "stance": "China Shock 2.0 real but overstated: reducing eurozone GDP by 0.2% pa (concentrated in Germany). Chinese export prices falling aggressively. CPI deflation benefit of 0.3–0.5pp from Chinese imports. Europe's structural challenges (productivity, legacy industries, demographics) are the bigger constraint.", "category": "macro_independent", "url": "https://www.capitaleconomics.com/blog/another-china-shock-higher-stakes-and-fewer-answers"}, {"source": "rbc", "name": "RBC Capital Markets", "stance": "Late-innings 'up crash' — vol rising with market, call wing extremely expensive. Recommend callers (sell calls/buy puts) at near-zero cost. Washington urgency deficit on Iran. Healthcare M&A standout sector. AI not a bubble but software disruption risk is real.", "category": "bank_regional", "url": "https://www.rbccm.com/en/insights/2026/06/how-long-can-the-up-crash-last-and-what-might-bring-it-down"}, {"source": "schroders", "name": "Schroders", "stance": "Debate shifted: not when Fed cuts but whether it can. Favor securitized credit, munis, EM debt, idiosyncratic credit. Constructive but increasingly attentive to breadth, liquidity, valuation risks. EM debt upgraded to core portfolio allocation. $3.5T IPO wave approaching (SpaceX, OpenAI, Anthropic).", "category": "asset_manager", "url": "https://www.schroders.com/en-us/us/individual/insights/weekly-bond-market-update-from-rate-cuts-to-rate-questions/"}, {"source": "bnp_paribas", "name": "BNP Paribas AM", "stance": "Better US data paradoxically bad for risk assets (raises rates). Strong payrolls (+120K above forecast in May) reversed AI-driven unemployment fears. Eurozone inflation rising — ECB insurance hike. Too much of a good thing in the short run.", "category": "asset_manager", "url": "https://viewpoint.bnpparibas-am.com/view-from-the-markets-too-much-of-a-good-thing/"}, {"source": "galaxy_digital", "name": "Galaxy Digital", "stance": "BTC bottom not yet in — base case $40k–$46k by Q4 2026, then $250k by end-2027. 4-year cycle compressing in amplitude. CLARITY Act 60% passage odds. Stablecoin overtaking legacy rails, tokenized assets breaking into capital markets in 2026.", "category": "crypto_research", "url": "https://www.galaxy.com/insights/research/bitcoin-four-year-cycle-where-is-the-bottom"}, {"source": "coinshares", "name": "CoinShares", "stance": "$5.8B crypto outflows = sentiment shock not structural. Macro (Iran-war rate repricing) is doing the damage. BTC beaten up not broken. Incoming Chair Warsh more measured than feared. TON (Telegram) — 0.12% wallet conversion from 1B MAU is the investment thesis pivot point.", "category": "crypto_research", "url": "https://coinshares.com/insights/the-node/edito-05-06-2026/"}, {"source": "wood_mackenzie", "name": "Wood Mackenzie", "stance": "Cushing stocks within 2 million barrels of operational floor — oil supply crisis acute. Middle East conflict transforms hydrogen strategies (energy security raises alternative supply demand). Argentina Vaca Muerta as 'next Midland Basin' for global crude/LNG diversification. APAC data center power demand reshaping grid access rules.", "category": "energy_commodities", "url": "https://www.woodmac.com/press-releases/cushing-crude-stocks-near-operational-floor-global-supply-crisis/"}, {"source": "peterson_institute", "name": "Peterson Institute for International Economics", "stance": "US ARTs (trade deals with 9 partners) are constructing indirect decoupling architecture from China — first large-scale tariff-based strategic alignment since Cold War. Partners face difficult bind between US demands and Chinese retaliation risk. China's US goods import share fell from 22% to 9% since 2018-19 trade war.", "category": "consulting", "url": "https://www.piie.com/blogs/realtime-economics/2026/us-reciprocal-trade-deals-built-push-americas-trade-partners-away"}, {"source": "brookings", "name": "Brookings Institution", "stance": "Iran war blowback is significant and lasting: Iran has unprecedented Hormuz control, new hardline leadership, US soft power damaged, Gulf states diversifying. Arab-Israel normalization less likely. Brookings' 10+ expert series documents systemic consequences across Middle East, Asia, US alliances, and naval power.", "category": "general_independent", "url": "https://www.brookings.edu/collection/blowback-how-the-iran-war-may-change-the-world/"}, {"source": "carnegie", "name": "Carnegie Endowment", "stance": "Iran war is giving the Islamic Republic a new lease on life while locking in chronic US-Iran confrontation as the new normal. Society deeply fragmented. Negotiations are a rapid-fire game with changing rules. The conflict is simultaneously military, economic, and internal for Iran.", "category": "geopolitics", "url": "https://carnegieendowment.org/emissary/2026/06/us-iran-ceasefire-deal-dangerous-moment"}, {"source": "deutsche_bank", "name": "Deutsche Bank Wealth Management", "stance": "CIO Perspectives June 2026: equities on track for future gains despite recent reverses, strong earnings outlook. ECB watching inflation — markets expecting ECB lift in this week's meeting with more possibly to come. Electricity/energy theme: AI and structural electrification give bigger boost to electricity demand than AI alone. China EV sector approaching structural tipping point in higher oil price world.", "category": "bank_bulge", "url": "https://wealth.db.com/en/insights/investing-insights/economic-and-market-outlook/perspectives-economic-and-asset-class-outlook-march-2026.html"}, {"source": "hsbc", "name": "HSBC", "stance": "Not all stablecoins are equal — differentiation framework for institutional evaluation. GLP-1/weight-loss drugs are already impacting food consumption data enough to affect macro readings — a new and growing consumer spending force that will only grow as pill form adoption rises and prices fall.", "category": "bank_bulge", "url": "https://www.business.hsbc.com/en-gb/insights/not-all-stablecoins-are-created-equal"}, {"source": "lazard", "name": "Lazard", "stance": "Sovereign debt heading toward more complex and costly capital structures: geopolitical fragmentation and declining reserve currency primacy are forcing sovereigns to accept higher risk premia and more demanding creditor groups. LCOE+ data continues to document levelized cost economics of renewable energy transition.", "category": "asset_manager", "url": "https://www.lazard.com/research-insights/sovereign-debt-towards-more-complex-and-costly-capital-structures/"}, {"source": "invesco", "name": "Invesco", "stance": "Money market and liquidity conditions remain accommodating despite Fed hold. Midstream energy infrastructure: attractive defensive exposure in current energy security environment with yield characteristics. Municipal bond market: favorable near-term following sell-off that improved relative value vs. Treasuries.", "category": "asset_manager", "url": "https://www.invesco.com/us-rest/contentdetail?contentId=0c4e9a9f6ee83810VgnVCM1000006e36b50aRCRD"}]}, "coverage": {"sources_covered": 40, "sources_total": 57, "coverage_pct": 70}};

// ---------- helpers ----------
const CAT_VARS = {
  rates: 'var(--cat-rates)',
  growth: 'var(--cat-growth)',
  fx: 'var(--cat-fx)',
  equities: 'var(--cat-equities)',
  credit: 'var(--cat-credit)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  commodities: 'var(--cat-commodities)',
  geopolitics: 'var(--cat-geopolitics)',
  ai_tech: 'var(--cat-ai_tech)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}
function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}
function pills(cats) {
  if (!cats) return '';
  if (Array.isArray(cats)) return cats.map(pill).join(' ');
  return pill(cats);
}
function externalLink(url, label) {
  if (!url) return '';
  return `<a class="item-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${label || 'link →'}</a>`;
}
function nameLink(url, name) {
  if (!name) return '';
  if (!url) return `<span class="item-source">${escapeHtml(name)}</span>`;
  return `<a class="item-source" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderThemeItem(it) {
  return `
    <div class="theme-item">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.thesis || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderTheme(theme) {
  const items = (theme.items || []).map(renderThemeItem).join('');
  return `
    <div class="theme">
      <div class="theme-head">
        ${pills(theme.category)}
        <div class="theme-title">${escapeHtml(theme.theme || '')}</div>
      </div>
      <div class="theme-stance">
        ${theme.consensus ? `<div class="theme-line consensus"><span class="lbl">Consensus</span>${renderBold(theme.consensus)}</div>` : ''}
        ${theme.divergence ? `<div class="theme-line divergence"><span class="lbl">Divergence</span>${renderBold(theme.divergence)}</div>` : ''}
      </div>
      ${items ? `<div class="theme-items">${items}</div>` : ''}
    </div>`;
}

function renderCall(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${pills(it.category)}
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.call || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderDeepRead(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url, 'read →')}
      </div>
      ${it.title ? `<div class="item-title">${escapeHtml(it.title)}</div>` : ''}
      <div class="item-text">${renderBold(it.summary || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderChart(it) {
  return `
    <div class="item-card">
      <div class="item-head">
        ${nameLink(it.url, it.name || it.source)}
        ${externalLink(it.url)}
      </div>
      <div class="item-text">${renderBold(it.chart || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderHouseView(hv) {
  const name = hv.name || hv.source || '';
  const nameHtml = hv.url
    ? `<a class="hv-name" href="${escapeAttr(hv.url)}" target="_blank" rel="noopener">${escapeHtml(name)}</a>`
    : `<span class="hv-name">${escapeHtml(name)}</span>`;
  return `
    <div class="hv-row">
      ${nameHtml}
      <span class="hv-stance">${renderBold(hv.stance || '')}</span>
    </div>`;
}

function renderSection(letter, name, items, render, extraClass) {
  if (!items || !items.length) return '';
  const body = items.map(render).join('');
  const cls = 'section' + (extraClass ? (' ' + extraClass) : '');
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderTopStats(d) {
  const parts = [];
  const p = d.period || {};
  const is = d.input_stats || {};
  const cv = d.coverage || {};
  if (p.from && p.to)
    parts.push(`period <strong>${escapeHtml(p.from)} → ${escapeHtml(p.to)}</strong>`);
  else if (p.lookback_days != null)
    parts.push(`lookback <strong>${p.lookback_days}d</strong>`);
  if (is.total_articles != null) parts.push(`articles <strong>${is.total_articles}</strong>`);
  if (is.sources_present != null) parts.push(`sources <strong>${is.sources_present}</strong>`);
  if (is.after_filter != null) parts.push(`after filter <strong>${is.after_filter}</strong>`);
  if (cv.coverage_pct != null) {
    const pct = (cv.coverage_pct <= 1 ? cv.coverage_pct * 100 : cv.coverage_pct);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  } else if (cv.sources_covered != null && cv.sources_total != null) {
    parts.push(`coverage <strong>${cv.sources_covered}/${cv.sources_total}</strong>`);
  }
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.period && d.period.to) return d.period.to;
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

// ---------- interactions ----------
function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  const s = d.sections || {};
  const out = [
    renderSummary(d.summary),
    renderSection('A.', 'Debates — Consensus vs Divergence', s.A_debates,    renderTheme),
    renderSection('B.', 'Key Calls & Positioning',           s.B_calls,      renderCall),
    renderSection('C.', 'Notable Deep Reads',                s.C_deep_reads, renderDeepRead,
                  'section-deepreads'),
    renderSection('D.', 'Charts & Data',                     s.D_charts,     renderChart),
    renderSection('E.', 'House Views',                       s.house_views,  renderHouseView),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = out || '<div class="empty">No report data.</div>';

  // Auto-open Summary's section view: first two sections open by default.
  document.querySelectorAll('.section').forEach((sec, i) => {
    if (i < 2) sec.classList.add('open');
  });
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
