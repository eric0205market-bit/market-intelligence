function getCatColor(cat) {
  return CAT_COLORS[cat] || "#888";
}

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderItems();
}

function setFilter(type, val) {
  if (type === 'cat') activeCat = val;
  if (type === 'urg') activeUrg = val;
  activeSrc = null;
  renderFilters();
  renderItems();
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    body.classList.add('open');
    chev.classList.add('open');
  }
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var chev = document.getElementById('report-chevron');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
  } else {
    body.classList.add('open');
  }
}

function getFilteredItems() {
  return ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) !== -1;
    var catOk = activeCat === 'all' || item.cat === activeCat;
    var urgOk = activeUrg === 'all' || item.urgency === activeUrg;
    return catOk && urgOk;
  });
}

function urgLabel(u) {
  if (u === 'now') return '🔴';
  if (u === 'deep') return '🔵';
  if (u === 'watch') return '🟡';
  return '';
}

function renderFilters() {
  var cats = {};
  var urgs = { all: ITEMS.length, now: 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) {
    cats[item.cat] = (cats[item.cat] || 0) + 1;
    urgs[item.urgency] = (urgs[item.urgency] || 0) + 1;
  });

  var catRow = document.getElementById('cat-filter-row');
  var urgRow = document.getElementById('urg-filter-row');

  var catHTML = '';
  var catList = [['all', '#555']].concat(Object.keys(cats).map(function(c) { return [c, getCatColor(c)]; }));
  catList.forEach(function(pair) {
    var c = pair[0], col = pair[1];
    var cnt = c === 'all' ? ITEMS.length : cats[c];
    var isActive = activeCat === c && !activeSrc;
    var style = isActive
      ? 'background:' + col + ';border-color:' + col + ';color:#fff'
      : 'background:#fff;border-color:#ddd;color:#555';
    catHTML += '<div class="pill" style="' + style + '" onclick="setFilter(\'cat\',\'' + c + '\')">' + (c === 'all' ? 'All' : c) + ' <span class="count">(' + cnt + ')</span></div>';
  });
  catRow.innerHTML = catHTML;

  var urgHTML = '';
  [['all','All','#555'],['now','🔴 Act Now','#e24b4a'],['deep','🔵 Deep','#378add'],['watch','🟡 Watch','#ef9f27']].forEach(function(u) {
    var key = u[0], label = u[1], col = u[2];
    var cnt = urgs[key] || 0;
    var isActive = activeUrg === key && !activeSrc;
    var style = isActive
      ? 'background:' + col + ';border-color:' + col + ';color:#fff'
      : 'background:#fff;border-color:#ddd;color:#555';
    urgHTML += '<div class="pill" style="' + style + '" onclick="setFilter(\'urg\',\'' + key + '\')">' + label + ' <span class="count">(' + cnt + ')</span></div>';
  });
  urgRow.innerHTML = urgHTML;
}

function renderItems() {
  var container = document.getElementById('items-container');
  var noMsg = document.getElementById('no-items-msg');
  var filtered = getFilteredItems();

  if (filtered.length === 0) {
    container.innerHTML = '';
    container.appendChild(noMsg);
    noMsg.style.display = 'block';
    return;
  }
  noMsg.style.display = 'none';

  var html = '';
  filtered.forEach(function(item) {
    var col = getCatColor(item.cat);
    var chartIcon = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    html += '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="card-num">' + String(item.id).padStart(2,'0') + '</span>';
    html += '<span class="urgency-em">' + urgLabel(item.urgency) + '</span>';
    html += '<span class="src-badge" style="background:' + col + '">' + item.source.split('/')[0].trim() + '</span>';
    html += '<span class="cat-pill">' + item.cat + '</span>';
    if (chartIcon) html += '<span class="chart-icon">' + chartIcon + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="chevron" id="chev-' + item.id + '">▼</span>';
    html += '</div>';
    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-color:' + col + ';background:' + col + '18">' + item.angle + '</div>';
    if (item.charts.count > 0) {
      var chartClass = 'charts-note' + (item.charts.hot ? ' hot-chart' : '');
      html += '<div class="' + chartClass + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box" style="background:#f0f5ff;border:1px solid #c8daf0">';
    html += '<div class="tweet-label" style="color:#378add">TWEET A</div>';
    html += '<div class="tweet-text">' + item.tweetA + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>';
    html += '</div>';
    html += '<div class="tweet-box" style="background:#f5f0ff;border:1px solid #d0c8f0">';
    html += '<div class="tweet-label" style="color:#7f77dd">TWEET B</div>';
    html += '<div class="tweet-text">' + item.tweetB + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>';
    html += '</div>';
    html += '</div>';
    if (item.link) {
      html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    }
    html += '</div></div>';
  });

  container.innerHTML = html + '<div id="no-items-msg" class="no-items-msg" style="display:none">No items match this filter.</div>';
}

function renderReport() {
  var meta = META;
  var html = '<table class="report-table">';
  html += '<tr><td><b>Time Window</b></td><td>' + meta.windowStart + ' → ' + meta.windowEnd + '</td></tr>';
  html += '<tr><td><b>Emails in Window</b></td><td>' + meta.emailsInWindow + '</td></tr>';
  html += '<tr><td><b>Emails Read</b></td><td>' + meta.emailsRead + '</td></tr>';
  html += '<tr><td><b>Items Extracted</b></td><td>' + meta.itemsExtracted + '</td></tr>';
  html += '</table>';
  html += '<div class="section-label" style="margin-top:14px">Included Sources</div>';
  html += '<table class="report-table">';
  meta.includedSources.forEach(function(s) {
    html += '<tr><td><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span></td><td>' + s.items + ' item(s)</td></tr>';
  });
  html += '</table>';
  if (meta.skippedSources && meta.skippedSources.length > 0) {
    html += '<div class="section-label" style="margin-top:14px">Skipped Sources</div>';
    html += '<table class="report-table">';
    meta.skippedSources.forEach(function(s) {
      html += '<tr><td>' + s.name + '</td><td>' + s.reason + '</td></tr>';
    });
    html += '</table>';
  } else {
    html += '<div style="font-size:12px;color:#888;margin-top:8px">No sources skipped — all 12 emails read and processed.</div>';
  }
  document.getElementById('report-content').innerHTML = html;
}

function init() {
  document.getElementById('header-meta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';
  renderFilters();
  renderItems();
  renderReport();
}

init();
</script>
</body>
</html>
