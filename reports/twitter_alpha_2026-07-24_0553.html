<!DOCTYPE html>
<html lang="en">
<head>

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

<script>
const REPORT_DATA = {"report_type": "TWITTER ALPHA INTELLIGENCE", "collected_at": "2026-07-24T05:20:57Z", "input_stats": {"total_tweets": 241, "unique_authors": 67, "tweets_with_images": 48, "after_noise_filter": 44}, "summary": "**Macro/Rates:** Fresh **10-12.5% tariffs on 60 nations** (forced-labor pretext) took effect at midnight; **dampedspring** (Andy Constan) calls it \"weak tea\" that leaves the deficit at 6%+ and does nothing to reshape trade. **Bianco** warns 64 straight months of above-2% inflation means the Fed can't repeat 2010-2022-style financial repression without blowing up bonds; the 10Y sits at 4.70%, the cycle high, and **Fullcarry** flagged an \"ugly\" 10Y TIPS auction.\n\n**Energy:** Oil vol (OVX) is breaking higher while VIX stays asleep (**SpotGamma**); **fejau_inc** and **Andreas Steno Larsen** both flag the Hormuz flare-up as more dangerous than the last round given depleted inventories, while **Bianco** notes the crude rally has stalled on chatter that an Iran strike may be called off.\n\n**Earnings:** **INTC** popped 11% after-hours on results **Gene Munster** calls \"3rd inning\" of the AI buildout — 2026 capex raised to $20B (Street wanted $15B), 2027 guided \"up significantly.\" **Cramer** and **cryptopunk7213** are bullish on Intel's onshoring/agentic-AI angle; **dampedspring** is the lone skeptic (\"$INTC trades like A**\").\n\n**AI/Compute:** **Haseeb (hosseeb)** argues superhuman AI hackers make cybersecurity *better*, not worse, since commoditized intelligence collapses attacker entropy — a contrarian take against the dominant doom narrative. **Pentosh1** and **Dylan Patel** both point to compute scarcity (users hitting limits in 3 prompts, sub-2% of Americans on AI plans) as the bull case for capex to keep rising. **Meltem Demirors** flags a firmware/kernel-engineer shortage behind the \"H100 smile curve\" as a build opportunity.\n\n**Crypto:** **udiWertheimer** backs the new $15M Bitcoin Security Consortium letting treasury companies/ETF issuers drive BTC development — controversial with the \"bip110\" crowd. **Stacy Muur** thinks 95% of crypto neobanks are headed for the Cypher_HQ graveyard on broken unit economics (~$70-80 CAC per KYC). **Jeff Park** flags BitMEX shutting down the same week CME launches single-stock futures as a structural signal.\n\n**Notable:** **Simon Dedic** says he's buying aggressively into max bearishness, citing private channel checks showing teams \"quietly doing multi-million dollar revenues\" that aren't showing up in charts yet.", "sections": {"A_events": [{"cluster": "Intel Q2 Earnings — Stock +11%, Capex Raised Sharply", "category": ["tech", "AI"], "items": [{"author": "munster_gene", "summary": "Gene Munster live-tweeted the INTC print: stock +11% after-hours, 2026 capex raised to $20B vs. Street's $15B, and 2027 guided \"up significantly\" (he pegs $20-25B vs. Street's $17B). DCAI grew 59% vs. NVDA's 96%, but Intel trades at 61x CY27 EPS vs. NVDA's 17x. His bottom line: results show the AI buildout is still earlier-stage than most believe — this is the \"3rd inning,\" and 14A customers already showing up bodes well for 2028 ramp, though Deepwater itself doesn't own the stock.", "tweet_url": "https://x.com/munster_gene/status/2080392211766583684", "images": [], "type": "thread"}, {"author": "jimcramer", "summary": "\"Intel's the one\" — praised the team as disciplined capital allocators who \"count every penny\" before spending on foundry, CPU, or packaging buildout.", "tweet_url": "https://x.com/jimcramer/status/2080398942517248060", "images": [], "type": "tweet"}, {"author": "cryptopunk7213", "summary": "Bull case for why Intel crushed earnings: fast becoming the \"US version of TSMC\" with the government owning 10%; Intel CPUs are positioned as core infrastructure for agentic AI tool-calling; and major deals with Nvidia and Tesla plus the largest onshore fab footprint make it central to the administration's AI industrial policy.", "tweet_url": "https://x.com/cryptopunk7213/status/2080395976691392887", "images": [], "type": "tweet"}]}, {"cluster": "US Slaps 10-12.5% Tariffs on 60 Nations", "category": ["macro", "geopolitics"], "items": [{"author": "Geiger_Capital", "summary": "Reported the Trump administration's new 10-12.5% tariffs on 60 nations, officially justified by forced-labor concerns, taking effect at midnight.", "tweet_url": "https://x.com/Geiger_Capital/status/2080400774362751478", "images": ["https://pbs.twimg.com/media/HN8RenaXoAAHlt1.jpg"], "type": "tweet"}, {"author": "dampedspring", "summary": "Andy Constan is dismissive: these tariffs merely replace an existing 122-nation regime and leave the deficit at 6%+ and growing. Compares it to the \"empty promise of DOGE\" — a small friction to global trade that reshapes nothing and generates no real US manufacturing jobs, i.e. \"weak tea.\"", "tweet_url": "https://x.com/dampedspring/status/2080398909709467903", "images": [], "type": "thread"}]}, {"cluster": "Hormuz / Iran — Oil Vol Breaking Out", "category": ["energy", "geopolitics"], "items": [{"author": "spotgamma", "summary": "Oil vol (OVX) is breaking higher while equity vol (VIX) is so far ignoring it entirely — a divergence worth watching for spillover risk.", "tweet_url": "https://x.com/spotgamma/status/2080480424187322485", "images": ["https://pbs.twimg.com/media/HN9ZWApWoAA_HBR.jpg"], "type": "tweet"}, {"author": "fejau_inc", "summary": "Thinks this round of Hormuz disruption risk is more treacherous than the last one: tanker traffic is again approaching zero, but this time inventories are lower and China may lack the same stockpile cushion it had before.", "tweet_url": "https://x.com/fejau_inc/status/2080338947469930973", "images": [], "type": "tweet"}, {"author": "AndreasSteno", "summary": "Asks how close markets are to an \"ending a civilization\" truth-post moment before Pakistan steps in to mediate; separately estimates oil is trading roughly $50 below its spring peak.", "tweet_url": "https://x.com/AndreasSteno/status/2080328139771650082", "images": [], "type": "thread"}, {"author": "biancoresearch", "summary": "Reposted chatter that a \"massive planned attack on Iran\" may be called off at the last minute for a deal, noting the crude rally has stalled for now — flagging this de-escalation risk as the biggest threat to long-crude positioning.", "tweet_url": "https://x.com/biancoresearch/status/2080489978300174576", "images": ["https://pbs.twimg.com/media/HN9igFmWgAAvGtC.png"], "type": "tweet"}]}, {"cluster": "Bond Market: Fed Can't Repeat Financial Repression", "category": ["macro"], "items": [{"author": "biancoresearch", "summary": "Long historical argument (Babylon debt jubilees, Roman Emperor Tiberius's proto-QE, Weimar Germany, and Japan's Takahashi — assassinated in 1936 after trying to end zero rates) that every attempt at financial repression eventually blows up once inflation returns. With 64 straight months above 2% inflation (currently >3%), Bianco argues the Fed cannot repeat the 2010-2022 playbook: any attempt to artificially suppress yields would trigger a bond-investor exodus, price collapse, and soaring yields. His prescription: only elected politicians addressing the deficit directly can fix this — manipulating rates just risks the banking system.", "tweet_url": "https://x.com/biancoresearch/status/2080493761495175438", "images": ["https://pbs.twimg.com/media/HN90GXvX0AAmRba.jpg", "https://pbs.twimg.com/media/HN90wMjWAAADMgT.jpg"], "type": "thread"}, {"author": "biancoresearch", "summary": "Real 10-year yields averaged just 0.23% during the 2009-2022 money-printing era vs. 2.74% before it; Bianco argues we're back in a pre-money-printing regime and 10-year real yields can go materially higher (probably above 3%) if inflation stays sticky and the Fed doesn't act.", "tweet_url": "https://x.com/biancoresearch/status/2080357622159454567", "images": ["https://pbs.twimg.com/media/HN7nXWwXIAAawYn.png"], "type": "tweet"}, {"author": "biancoresearch", "summary": "The US 10-Year is at 4.70%, the highest of Trump's second term. Notes the Fed has historically kept hiking even as oil spiked (1999-2000, 2004-06, 2022) and pushes back on Kevin Warsh's framing that fighting inflation is a \"choice\" the Fed simply isn't making.", "tweet_url": "https://x.com/biancoresearch/status/2080349650846888034", "images": ["https://pbs.twimg.com/media/HN7iJ7ZXoAEesye.png"], "type": "tweet"}, {"author": "TruthGundlach", "summary": "Jeffrey Gundlach argues large bond issuance is fueling the AI capex boom, abetted by ratings he calls \"iffy\" — debt gets placed but soon trades down, suggesting the market doesn't believe the ratings. Expects rating agencies will soon be forced to follow the market and downgrade.", "tweet_url": "https://x.com/TruthGundlach/status/2080377045985411349", "images": [], "type": "tweet"}, {"author": "pboockvar", "summary": "Replying to Michael Burry, notes the rise in rates is global — especially in other developed bond markets — which he reads as evidence that debts and deficits now genuinely matter to markets.", "tweet_url": "https://x.com/pboockvar/status/2080452752514162896", "images": [], "type": "tweet"}, {"author": "Fullcarry", "summary": "Flagged an \"ugly\" 10-year TIPS auction — a short but concrete data point corroborating the broader weak-bond-demand narrative.", "tweet_url": "https://x.com/Fullcarry/status/2080337865624662181", "images": [], "type": "tweet"}]}, {"cluster": "Bitcoin Security Consortium — Treasury Cos. Take Dev Leadership", "category": ["crypto", "regulation"], "items": [{"author": "udiWertheimer", "summary": "Backs the newly announced Bitcoin Security Consortium — a group of financial institutions and Bitcoin companies pledging $15M over three years toward Bitcoin's long-term security — as treasury companies, ETF issuers, and exchanges finally taking a leadership role in protocol development. Argues the old model of unpaid, price-agnostic \"reddit troll\" developers stopped working roughly a decade ago and that aligning development incentives with the largest holders is the logical (if imperfect) path forward. The move is drawing backlash from the \"bip110\" fork supporters, whom Udi has been sparring with all week.", "tweet_url": "https://x.com/udiWertheimer/status/2080423105273733235", "images": [], "type": "thread"}]}, {"cluster": "Crypto Exchange Landscape Shifts: BitMEX Exits, CME Enters", "category": ["crypto", "macro"], "items": [{"author": "dgt10011", "summary": "Jeff Park flags BitMEX shutting down the same week CME launches single-stock futures as evidence of a structural theme: TradFi rails are absorbing activity that used to live natively on crypto exchanges.", "tweet_url": "https://x.com/dgt10011/status/2080429675554234851", "images": [], "type": "tweet"}]}], "B_insights": [{"author": "hosseeb", "summary": "Haseeb responds to distillation debate sparked by an ex-OpenAI researcher's essay: distillation without access to logits/intermediate states is more akin to extra pretraining and has limited value late in training/RL. Separately clarifies that RLVR requires a genuine binary reward signal — seeing another model's successful rollout trace cannot generate a reward signal for your own model's rollouts; RLAIF is a different (and for coding, far less efficient) paradigm.", "tweet_url": "https://x.com/hosseeb/status/2080496362874101767", "images": [], "type": "thread"}, {"author": "Pentosh1", "summary": "Argues compute is nowhere near saturated despite AI hype: users hit rate limits within 3 prompts, a new Chinese model had to stop selling subscriptions after just one day when everyone hit monthly limits within 48 hours, and less than 2% of the US even has an AI subscription. His conclusion: capex needs to keep scaling toward infinity, with robotics and low-margin sectors (transport, grocery) still barely touched.", "tweet_url": "https://x.com/Pentosh1/status/2080410025152090260", "images": [], "type": "thread"}, {"author": "dylan522p", "summary": "Dylan Patel (SemiAnalysis) corroborates the compute-scarcity read from a different angle: usage limits have shifted a lot, but most people still don't hit limits quickly or roll over into API spend fast — a nuance on how tight capacity really is at the margin.", "tweet_url": "https://x.com/dylan522p/status/2080398787990986829", "images": [], "type": "tweet"}, {"author": "Melt_Dem", "summary": "Meltem Demirors dispatches from Crucible Compute: an underdiscussed driver of the H100 \"smile curve\" is that deploying workloads on new hardware/firmware is hard, and there's a shortage of low-level kernel/compiler engineers — so it's often cheaper to keep running proven H100 workloads than refactor onto newer chips. As hardware heterogeneity increases, she sees a growing opportunity for abstraction-layer companies spanning workload runtime, token pricing, and timing arbitrage. Separately flags a basket of crypto-native builders in the compute frontier: neoclouds (CoreWeave, Crusoe, Hut8, TeraWulf, Together), token/compute markets (OpenRouter, Prime Intellect, Hyperbolic), and agent/harness plays (Nous Research, Venice).", "tweet_url": "https://x.com/Melt_Dem/status/2080335182230401530", "images": ["https://pbs.twimg.com/media/HN7V0qFXQAAyCO1.jpg"], "type": "tweet"}, {"author": "Rewkang", "summary": "Andrew Kang frames robots as \"the GPUs of physical labor\" — argues scaling domestic robot production will matter as much as domestic GPU production/deployment, tagging Commerce Secretary Lutnick in the pitch for onshoring robotics manufacturing capacity.", "tweet_url": "https://x.com/Rewkang/status/2080422293977596074", "images": ["https://pbs.twimg.com/media/HN8kKb0WsAAAT0c.png", "https://pbs.twimg.com/media/HN8kY26WsAAgUEl.png"], "type": "tweet"}, {"author": "RaoulGMI", "summary": "Raoul Pal's \"Economic Singularity\" framework: AI is moving faster than legislative/democratic processes can absorb, and when the ground shifts this fast, governments reach // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- schema normalization ----------
// Some producer runs emit the "sections" schema documented in the routine
// spec (report_type/input_stats/sections.A_events.../coverage) instead of
// the flat schema this renderer reads (date/events/insights/contrarian/
// positioning/links/stats). Normalize so either shape renders correctly.
function firstOf(v) {
  return Array.isArray(v) ? v[0] : v;
}

function normalizeItem(it) {
  if (!it || typeof it !== 'object') return it;
  return {
    author: it.author || it.author_username,
    text: it.text != null ? it.text : it.summary,
    category: firstOf(it.category),
    tweet_url: firstOf(it.tweet_url),
    images: it.images,
    created_at: it.created_at,
    is_thread: it.is_thread != null ? it.is_thread : (it.type === 'thread'),
  };
}

function normalizeData(d) {
  if (!d || typeof d !== 'object') return {};
  const hasFlat = d.events || d.insights || d.contrarian || d.positioning || d.links || d.stats;
  if (hasFlat) return d;

  const s = d.sections;
  if (!s) return d;

  const out = Object.assign({}, d);
  out.date = d.date || (d.collected_at ? String(d.collected_at).replace('T', ' ').replace('Z', ' UTC') : '');
  if (s.A_events) {
    out.events = s.A_events.map(cl => ({
      title: cl.cluster || cl.title,
      category: firstOf(cl.category),
      description: cl.description,
      items: (cl.items || []).map(normalizeItem),
    }));
  }
  if (s.B_insights) out.insights = s.B_insights.map(normalizeItem);
  if (s.C_contrarian) out.contrarian = s.C_contrarian.map(normalizeItem);
  if (s.D_positioning) out.positioning = s.D_positioning.map(normalizeItem);
  if (s.E_links) {
    out.links = s.E_links.map(l => ({
      author: l.author,
      url: l.url,
      tweet_url: firstOf(l.tweet_url),
      description: l.note || l.description,
    }));
  }
  const stats = d.stats || {};
  out.stats = {
    received: stats.received != null ? stats.received : (d.input_stats && d.input_stats.total_tweets),
    after_filter: stats.after_filter != null ? stats.after_filter : (d.input_stats && d.input_stats.after_noise_filter),
    authors: stats.authors != null ? stats.authors : (d.coverage && d.coverage.authors_total),
    coverage: stats.coverage != null ? stats.coverage : (d.coverage && d.coverage.coverage_pct),
  };
  return out;
}

// ---------- main ----------
function renderReport(d) {
  d = normalizeData(d);
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
