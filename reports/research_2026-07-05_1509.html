function catColor(cat) { return CAT_COLORS[cat] || "#888"; }

function buildFilters() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catRoot = document.getElementById('catFilter');
  let html = '<button class="pill active" data-cat="all" style="background:#1a1a1a;border-color:#1a1a1a;color:#fff" onclick="setCat(\'all\', event)">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(cat => {
    html += '<button class="pill" data-cat="' + cat + '" onclick="setCat(\'' + cat + '\', event)">' + cat + ' (' + catCounts[cat] + ')</button>';
  });
  catRoot.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgRoot = document.getElementById('urgFilter');
  let uhtml = '<button class="pill active" data-urg="all" style="background:#1a1a1a;border-color:#1a1a1a;color:#fff" onclick="setUrg(\'all\', event)">All (' + ITEMS.length + ')</button>';
  ['act','deep','watch'].forEach(u => {
    if (urgCounts[u]) {
      uhtml += '<button class="pill" data-urg="' + u + '" onclick="setUrg(\'' + u + '\', event)">' + URG_META[u].label + ' (' + urgCounts[u] + ')</button>';
    }
  });
  urgRoot.innerHTML = uhtml;
}

function setCat(cat, evt) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll('#catFilter .pill').forEach(function(p) {
    var isActive = p.getAttribute('data-cat') === cat;
    p.classList.toggle('active', isActive);
    if (isActive) {
      p.style.background = cat === 'all' ? '#1a1a1a' : catColor(cat);
      p.style.borderColor = cat === 'all' ? '#1a1a1a' : catColor(cat);
      p.style.color = '#fff';
    } else {
      p.style.background = '#fff';
      p.style.borderColor = '#ccc';
      p.style.color = '#444';
    }
  });
  renderCards();
}

function setUrg(urg, evt) {
  activeUrg = urg;
  activeSrc = null;
  document.querySelectorAll('#urgFilter .pill').forEach(function(p) {
    var isActive = p.getAttribute('data-urg') === urg;
    p.classList.toggle('active', isActive);
    if (isActive) {
      p.style.background = '#1a1a1a';
      p.style.borderColor = '#1a1a1a';
      p.style.color = '#fff';
    } else {
      p.style.background = '#fff';
      p.style.borderColor = '#ccc';
      p.style.color = '#444';
    }
  });
  renderCards();
}

function filterBySrc(name) {
  activeCat = "all";
  activeUrg = "all";
  activeSrc = name;
  document.querySelectorAll('#catFilter .pill, #urgFilter .pill').forEach(function(p, idx) {
    var isAll = (idx === 0);
    p.classList.toggle('active', isAll);
    p.style.background = isAll ? '#1a1a1a' : '#fff';
    p.style.borderColor = isAll ? '#1a1a1a' : '#ccc';
    p.style.color = isAll ? '#fff' : '#444';
  });
  renderCards(true);
}

function renderCards(expandAll) {
  const root = document.getElementById('cardsRoot');
  let filtered = ITEMS.filter(function(i) {
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrg !== "all" && i.urgency !== activeUrg) return false;
    return true;
  });

  if (filtered.length === 0) {
    root.innerHTML = '<div class="empty-state">No items match this filter.</div>';
    return;
  }

  let html = '';
  filtered.forEach(function(item) {
    const color = catColor(item.cat);
    const urg = URG_META[item.urgency];
    const chartIcon = item.charts.count > 0 ? (item.charts.hot ? '🔥' : '📊') : '';
    html += '<div class="card' + (expandAll ? ' open' : '') + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">' + String(item.id).padStart(2, '0') + '</span>';
    html += '<span class="urg">' + urg.emoji + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + item.source + '</span>';
    html += '<span class="cattag">' + item.cat + '</span>';
    if (chartIcon) html += '<span class="charticon">' + chartIcon + '</span>';
    html += '<span class="headline">' + item.title + '</span>';
    html += '<span class="chevron">▼</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left:3px solid ' + color + ';background:' + color + '14">' + item.angle + '</div>';
    if (item.tweetA || item.tweetB) {
      html += '<div class="section-label">Tweets</div>';
      html += '<div class="tweet-row">';
      if (item.tweetA) html += '<div class="tweet-box a"><span class="tlabel">TWEET A</span><p>' + item.tweetA + '</p><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
      if (item.tweetB) html += '<div class="tweet-box b"><span class="tlabel">TWEET B</span><p>' + item.tweetB + '</p><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
      html += '</div>';
    }
    html += '<div class="charts-line">';
    if (item.charts.count > 0) {
      html += '<div class="chart-placeholder' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    } else {
      html += '<div class="chart-placeholder">No charts in this email — text/data only.</div>';
    }
    html += '</div>';
    html += '<a class="readlink" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div>';
    html += '</div>';
  });
  root.innerHTML = html;
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

  let html = '<p><strong>Time window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + ' (strict 6-hour cutoff — nothing before ' + META.windowStart + ' was processed).</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<p><strong>Included sources:</strong><br>';
  META.includedSources.forEach(function(s) {
    html += '<span class="rc-source" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.count + ' item(s)<br>';
  });
  html += '</p>';
  html += '<p><strong>Skipped sources:</strong><br>';
  META.skippedSources.forEach(function(s) {
    html += s.name + ' — ' + s.reason + '<br>';
  });
  html += '</p>';
  document.getElementById('reportBody').innerHTML = html;
  document.getElementById('headerMeta').textContent = META.date + ' · ' + META.time + ' · ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

buildFilters();
renderCards();
buildReport();
</script>
</body>
</html>
