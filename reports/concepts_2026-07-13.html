* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;

const REPORT_DATA = {"date": "2026-07-13", "generated_at": "2026-07-13T08:49:04.000Z", "stats": {"cards": 3, "insights": 21, "sources": 2, "quote_verified_pct": 100}, "cards": [{"record_id": "473d8d266d37f034", "source_type": "concepts", "source_name": "Noema Magazine", "source_url": "https://www.noemamag.com/chinas-open-ai-models-are-advancing-its-global-soft-power", "title": "China’s Open AI Models Are Advancing Its Global Soft Power | NOEMA", "published_date": "2026-07-10", "language": "en", "processed_at": "2026-07-13T00:00:00Z", "processor": "claude-code-sub-opus", "tags": ["AI", "Geopolitics", "Tech"], "gist": "Andrew Ng argues China's strategy of releasing open-weight AI models (DeepSeek, GLM 5.2) is winning global adoption, especially in Africa and other nations wary of relying on U.S. closed models — turning open-weighting into a soft-power and supply-chain lever just as the U.S. briefly yanked foreign access to Anthropic's Fable 5, which accelerated other nations' urgency to secure sovereign AI supply.", "themes": [{"theme": "Open-weight vs. closed-weight strategy", "insights": [{"claim": "China's AI companies have pursued a strategy of releasing open-weight models (full published weights, freely downloadable) while the leading U.S. labs — OpenAI, Anthropic, Google — keep their frontier models closed-weight and prompt-only.", "speaker": "Andrew Ng", "type": "thesis", "entities": ["China", "OpenAI", "Anthropic", "Google Gemini", "DeepSeek"], "conviction": "high", "so_what": "Open-weighting is a distribution and adoption strategy, not just a technical choice — investors should track weight-openness as a leading indicator of which AI ecosystem captures downstream global market share.", "quote": "One thing that China has done really well is that a lot of its companies are releasing open-weight models, meaning they’re published on the internet free for anyone to use, including American companies.", "locator": "“One thing that China has done really well…” paragraph", "quote_verified": true}, {"claim": "Open-weighting accelerates knowledge diffusion within a company's own ecosystem, which Andrew Ng credits as a key reason China has closed the capability gap with the U.S. in AI over the last few years.", "speaker": "Andrew Ng", "type": "causal", "entities": ["China", "open-weight models"], "conviction": "high", "so_what": "Faster internal diffusion from openness is a compounding advantage — watch whether Chinese labs' pace of capability gains continues to outstrip closed-model labs over time.", "quote": "For Ng, this is a “brilliant move” by Chinese companies because open-weight models rapidly increase the rates of knowledge diffusion within their companies and ecosystem.", "locator": "paragraph after first Ng quote block", "quote_verified": true}, {"claim": "As of mid-2026, U.S. closed-weight models remain ahead of Chinese models on raw capability, but China leads the world in open-weight models, and nations seeking an open alternative are adopting Chinese models instead of American ones.", "speaker": "Andrew Ng", "type": "data_point", "entities": ["China", "United States"], "conviction": "high", "so_what": "The capability lead of U.S. labs is not translating into global adoption share where openness matters — a bifurcated market investors should model separately from raw benchmark leadership.", "quote": "Right now, the U.S.’s closed-weight models are ahead of the Chinese models, but China leads the world in open-weight models. What this means is that a lot of nations that want an open alternative are adopting Chinese models.", "locator": "“over the last few years China has raced ahead…” paragraph", "quote_verified": true}, {"claim": "In Africa, Chinese models like DeepSeek are already adopted far more widely than American AI models, which Andrew Ng says have fallen behind in that region.", "speaker": "Andrew Ng", "type": "data_point", "entities": ["DeepSeek", "China", "Africa"], "conviction": "medium", "so_what": "Africa is a live case study of where open-weight distribution is already winning market share from U.S. incumbents — a bellwether for other price- and access-sensitive regions.", "quote": "In nations across Africa, noted Ng, “the Chinese DeepSeek and a handful of other Chinese models are adopted very widely, far more than American models, which have really fallen behind.”", "locator": "“In nations across Africa…” paragraph", "quote_verified": true}]}, {"theme": "AI as soft power and supply-chain leverage", "insights": [{"claim": "Whichever nation's AI model a user queries will shape the values embedded in the answer (e.g., how a model responds to a question about Tiananmen Square), making model distribution a direct soft-power channel analogous to Hollywood storytelling.", "speaker": "Andrew Ng", "type": "framework", "entities": ["China", "United States"], "conviction": "high", "so_what": "Model market share abroad is a proxy for cultural and political influence, not just commercial revenue — relevant to how governments and firms weigh AI export policy.", "quote": "When someone asks a question of AI, such as what happened in Tiananmen Square in 1989, whose model they are using will cause the model to give an answer that reflects that nation’s values. So getting your stuff out there is a tremendous source of soft power influence.", "locator": "“First… storytelling we’ve seen in Hollywood…” paragraph", "quote_verified": true}, {"claim": "Because AI is becoming a core layer of the software supply chain, growing global reliance on Chinese-dominant AI models would weaken America's ability to steer how the technology develops.", "speaker": "Andrew Ng", "type": "causal", "entities": ["China", "United States"], "conviction": "medium", "so_what": "Frame AI adoption geography as a supply-chain dependency risk, similar to semiconductors or telecom equipment, with long-run implications for tech-policy leverage.", "quote": "AI is a key part of the supply chain of how we build a lot of software products. If more and more companies are building on a Chinese-dominant supply chain, that has implications for America.", "locator": "“Second, ‘AI is a key part of the supply chain…’” paragraph", "quote_verified": true}, {"claim": "The White House's temporary shutdown of foreign access to Anthropic's Fable 5 model (later reversed after review) signaled to the world that the U.S. can unilaterally revoke access to frontier AI, which accelerated other nations' urgency to secure sovereign AI supply via open-weight alternatives.", "speaker": "Andrew Ng", "type": "causal", "entities": ["Anthropic", "Fable 5", "White House"], "conviction": "high", "so_what": "U.S. export-control actions on frontier models carry a soft-power cost by pushing allies and neutral states toward Chinese open-weight models as an insurance policy — a second-order effect worth weighing against the security rationale for such controls.", "quote": "This has accelerated, in many capitals around the world, the urgency with which they feel like they need to secure their own supply of AI … causing many nations to look at open-weight models because once they have all the numbers no one can take it away from them.", "locator": "“Beyond this, Ng argued…” paragraph", "quote_verified": true}, {"claim": "David Sacks, co-chair of Trump's Council of Advisors on Science and Technology, publicly acknowledged that Z.ai's GLM 5.2, a Chinese open-weight model, is now competitive with the best available OpenAI and Anthropic models.", "speaker": "NATHAN GARDELS", "type": "data_point", "entities": ["David Sacks", "Z.ai", "GLM 5.2", "OpenAI", "Anthropic"], "conviction": "high", "so_what": "A frontier-level Chinese open-weight model achieving parity, confirmed by a senior U.S. policy official, is a concrete signal that the capability gap referenced elsewhere in the piece is narrowing quickly.", "quote": "We now have a Chinese open-weight model that is as good as the currently available models from OpenAI and Anthropic.", "locator": "“Reinforcing Ng’s point, last week David Sacks…” paragraph", "quote_verified": true}]}, {"theme": "Cultural bias and censorship in LLMs", "insights": [{"claim": "Every large language model, not just Chinese ones, carries the imprint of its cultural-political origin: Chinese models censor Party criticism, Western models exercise culturally driven censorship on race and gender speech, and models built in the Islamic world censor blasphemy against the Prophet Muhammad.", "speaker": "Kai-Fu Lee", "type": "framework", "entities": ["China", "Kai-Fu Lee"], "conviction": "high", "so_what": "Investors and policymakers should treat 'model bias' as a universal, region-specific feature of LLMs rather than a China-specific flaw — relevant to how AI governance debates get framed.", "quote": "Different cultural zones with different values will censor different things. While the Chinese state might censor any criticism of the Party, in the West there is a kind of culturally driven censorship over sensitive speech on race and gender. In the Islamic world, there will be censorship over blasphemy against the Prophet Muhammad.", "locator": "Kai-Fu Lee quote on cultural-political censorship", "quote_verified": true}, {"claim": "It is precisely the local adaptability of China's open-source models — alongside their lower cost — that constitutes their competitive advantage in diffusion, rather than raw capability alone.", "speaker": "NATHAN GARDELS", "type": "thesis", "entities": ["China"], "conviction": "medium", "so_what": "Cost and localizability, not benchmark scores, may be the decisive variables in global AI model market share — a different competitive axis than the one U.S. labs are optimizing for.", "quote": "Yet it is precisely the adaptability of China’s open-source models to local circumstances that, along with cost, is its competitive advantage.", "locator": "“Diversity Drives Open-Source Diffusion” section opening", "quote_verified": true}]}, {"theme": "Pro ining a genuinely new frontier-level AI model, as a first step toward mutual transparency on AI capabilities.", "speaker": "Eric Schmidt", "type": "prediction", "entities": ["Eric Schmidt", "China", "United States"], "conviction": "low", "so_what": "A concrete, if speculative, arms-control-style proposal for U.S.-China AI de-escalation — worth monitoring for any diplomatic traction given how unlikely broader AI curbs agreements are.", "quote": "One thing I think both sides should agree on is a simple requirement that, if you’re going to do training for something that’s completely new on the AI frontier, you have to tell the other side that you’re doing it. In other words, a no-surprise rule.", "locator": "“One thing I think both sides should agree on…” paragraph", "quote_verified": true}, {"claim": "The author frames the current U.S.-China AI race as running 'neck and neck' and argues this moment of converging interest in guardrails is the most propitious time for the two sides to act on establishing shared rules.", "speaker": "NATHAN GARDELS", "type": "thesis", "entities": ["China", "United States"], "conviction": "low", "so_what": "A close-race framing implies neither side has enough of a lead to unilaterally dictate terms, which is the author's rationale for why guardrail negotiations could actually happen now rather than later.", "quote": "The global AI race is running neck and neck. It is at this moment — when each side can see the convergent interest in adopting common guardrails — that is the most propitious time to act.", "locator": "closing paragraph", "quote_verified": true}]}], "insight_total": 14, "top_entities": ["China", "United States", "Andrew Ng", "DeepSeek", "Anthropic", "OpenAI", "Google Gemini", "Fable 5", "Z.ai", "GLM 5.2", "Eric Schmidt", "Kai-Fu Lee", "David Sacks"], "source_meta": {"author": "NATHAN GARDELS", "word_count": 1280, "paywalled": false}}, {"record_id": "17e4b1213185273b", "source_type": "concepts", "source_name": "World Economic F // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
