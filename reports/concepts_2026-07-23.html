he AI security-tooling market may reward inference volume and cost-efficiency over frontier-model size; watch for pressure on per-call pricing and demand for cheap high-throughput models.", "quote": "Relying on a single, expensive call to a massive language model can create a bottleneck.", "locator": "The search space problem", "quote_verified": true}, {"claim": "A lightweight cybersecurity model fine-tuned on top of Gemini 3.5 Flash is positioned as a cost-efficient alternative to large, costly cybersecurity models, and can be integrated into frequent scans, launch processes, and commit-scanning pipelines at scale.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "thesis", "entities": ["Gemini 3.5 Flash Cyber", "Gemini 3.5 Flash"], "conviction": "high", "so_what": "Continuous, at-scale scanning implies recurring high-volume inference revenue rather than one-off calls; a structural tailwind for whoever supplies the cheapest capable model.", "quote": "3.5 Flash Cyber can be easily integrated into frequent scans, time-sensitive launch processes or commit scanning pipelines at scale.", "locator": "The search space problem", "quote_verified": true}]}, {"theme": "Competitive benchmarking vs. Anthropic", "insights": [{"claim": "On the highly complex V8 JavaScript Engine, Gemini 3.5 Flash Cyber found 55 unique confirmed issues versus 47 for mainline 3.5 Flash and 36 for Claude Opus 4.6, including 10 issues neither of the other models caught.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "data_point", "entities": ["Gemini 3.5 Flash Cyber", "Gemini 3.5 Flash", "Claude Opus 4.6", "V8 JavaScript Engine"], "conviction": "high", "so_what": "Direct head-to-head claim that a specialized Google model outperforms Anthropic's frontier model on unique vulnerability discovery, sharpening the competitive narrative in agentic security.", "quote": "3.5 Flash Cyber found 55 unique confirmed issues, compared to 47 found by mainline 3.5 Flash and 36 found by Opus 4.6, including 10 issues that the other two models tested did not catch.", "locator": "Moreover, 3.5 Flash Cyber consistently", "quote_verified": true}, {"claim": "Competitor models more recent than Claude Opus 4.6 now refuse to perform offensive vulnerability-finding tasks due to built-in safety guardrails, so they are excluded from Google's Chrome commit-scanning comparison entirely.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "contrarian", "entities": ["Claude Opus 4.6", "Google Chrome"], "conviction": "medium", "so_what": "Anthropic's safety refusals create a capability gap Google is exploiting for defensive security; a differentiator that could shift government/enterprise security buyers toward less-restricted vendors.", "quote": "More recent competitor model versions after Opus 4.6 refuse to fulfill the tasks due to built-in safety guardrails, and therefore are not shown.", "locator": "Success Rate on Chrome Production Commit Scanning", "quote_verified": true}, {"claim": "On the CyberGym benchmark of hundreds of real-world vulnerabilities, an agent calling the lightweight model up to five times for a single final report achieved competitive performance against significantly larger models, with competitor results drawn from provider self-reported scores.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "data_point", "entities": ["Gemini 3.5 Flash Cyber", "CyberGym", "CodeMender"], "conviction": "medium", "so_what": "Reinforces the cost-per-result thesis; note the caveat that competitor numbers are self-reported, so cross-vendor comparability is imperfect.", "quote": "the overall agent achieved competitive performance against significantly larger models on CyberGym", "locator": "3.5 Flash Cyber benchmark results", "quote_verified": true}]}, {"theme": "Deployment strategy and dual-use control", "insights": [{"claim": "Because the vulnerability-finding technology is dual-use, the model will be restricted to governments and trusted partners via a limited-access pilot through CodeMender, rather than released broadly, to mitigate misuse.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "thesis", "entities": ["Gemini 3.5 Flash Cyber", "CodeMender"], "conviction": "high", "so_what": "Gated go-to-market limits near-term revenue but positions Google for government/defense security contracts; watch for expansion cadence as a signal of commercial ambition.", "quote": "3.5 Flash Cyber will be exclusively available to governments and trusted partners via CodeMender soon, expanding over time.", "locator": "Given the dual-use nature", "quote_verified": true}, {"claim": "Google is separately bringing CodeMender's foundational capabilities to customers through the Gemini Enterprise Agent Platform using generally available Gemini models, creating a two-tier offering alongside the gated specialized model.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "framework", "entities": ["CodeMender", "Gemini Enterprise Agent Platform"], "conviction": "medium", "so_what": "Indicates a productized enterprise security funnel on top of Gemini; a monetization path for the broader model line beyond the restricted cyber variant.", "quote": "we're also bringing CodeMender's foundational capabilities directly to customers with generally available Gemini models through the Gemini Enterprise Agent Platform", "locator": "Separately, we're also bringing", "quote_verified": true}]}, {"theme": "Data moat and real-world validation", "insights": [{"claim": "In a 2-hour run, the model uncovered remote code execution vulnerabilities in public APIs and a memory-corruption flaw in a sensitive production service, then generated a 100% reliable RCE exploit that bypassed standard mitigations like ASLR and W^X.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "anecdote", "entities": ["Gemini 3.5 Flash Cyber", "Google Cloud"], "conviction": "high", "so_what": "Demonstrates offensive capability strong enough to bypass memory-protection defenses, underscoring both the model's power and the dual-use risk driving its restricted release.", "quote": "In just 2 hours, the model uncovered remote code execution vulnerabilities in public APIs and found a memory-corruption vulnerability in a sensitive production service.", "locator": "Google's Cloud Vulnerability Research team", "quote_verified": true}, {"claim": "Google's structural advantage in this market rests on proprietary security data: OSV.dev spanning over 700,000 open-source vulnerabilities plus more than 10 years of OSS-Fuzz results, letting it train models on real professional workflows rather than synthetic examples.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "causal", "entities": ["Google", "OSV.dev", "OSS-Fuzz", "Chromium"], "conviction": "high", "so_what": "The data moat is the durable edge competitors can't easily replicate; a key reason Google may lead defensive security-model share regardless of base-model parity.", "quote": "OSV.dev, a vulnerability database run by Google spanning over 700,000 open-source vulnerabilities, and more than 10 years of OSS-Fuzz results, help us identify the most high quality vulnerabilities.", "locator": "Empowering defenders at scale", "quote_verified": true}, {"claim": "The model is already in production finding and fixing vulnerabilities across Google's internal codebases including Chrome, Android, Cloud, Ads, and YouTube, with early external validation from Wiz and Cloud CISO Security Engineering testers.", "speaker": "Raluca Ada Popa and Four Flynn", "type": "data_point", "entities": ["Google", "Chrome", "Android", "Wiz"], "conviction": "high", "so_what": "Internal-scale deployment plus third-party (Wiz) validation suggests the capability is battle-tested, not just benchmarked; a credibility signal for enterprise buyers.", "quote": "already finding and fixing vulnerabilities in Google's internal codebases including Chrome, Android, Cloud, Ads, and YouTube.", "locator": "Real-world application and scaling defenses", "quote_verified": true}]}], "insight_total": 10, "top_entities": ["Gemini 3.5 Flash Cyber", "CodeMender", "Google", "Claude Opus 4.6", "CyberGym", "V8 JavaScript Engine", "Chrome", "OSV.dev", "Gemini Enterprise Agent Platform", "Wiz"], "source_meta": {"author": "Raluca Ada Popa and Four Flynn", "word_count": 940, "paywalled": false}}, {"record_id": "10a643520b665f09", "source_type": "concepts", "source_name": "Gavekal Research", "source_url": "https://research.gavekal.com/teaser/the-energy-risk-remains-part-i/", "title": "The Energy Risk Remains (Part I)", "published_date": "2026-07-22", "language": "en", "processed_at": "2026-07-23T11:05:08Z", "processor": "claude-code-sub-opus", "tags": ["Energy", "Macro", "Positioning"], "gist": "US energy stocks were the best-performing GICS sector of the past five years and delivered returns largely uncorrelated to other assets, yet they now sit at just ~3% of the S&P 500 (near record lows) while tech dominates at ~40% weight, leaving the sector deeply under-owned.", "themes": [{"theme": "Energy's uncorrelated outperformance", "insights": [{"claim": "US energy stocks, as a GICS sector, delivered the best total return of any US sector over the past five years, and that performance was broadly uncorrelated with almost all other asset sectors and asset classes.", "speaker": "Louis-Vincent Gave", "type": "data_point", "entities": ["Energy sector", "US equities", "GICS"], "conviction": "high", "so_what": "An uncorrelated top-returning sector is a portfolio diversifier that few investors currently hold, making it a candidate for allocation.", "quote": "Energy stocks, as a GICS sector, have delivered the best total return performance of any US sector over the past five years.", "locator": "Energy stocks, as a GICS sector", "quote_verified": true}, {"claim": "Energy stocks rallied precisely when stocks and bonds fell after Russia's invasion of Ukraine, and gapped higher again when the loss of shipping insurance effectively closed ial corporate profit margins are holding near record highs (7.6% in Q1 2026 vs a post-1949 peak of 8.2%) despite cost pressures that theory says should squeeze them; AI-driven labor savings explain only part of the resilience.", "themes": [{"theme": "Resilient US profit margins near record highs", "insights": [{"claim": "Conventional theory says rising labor costs, stricter US immigration policy, the shift from just-in-time to just-in-case supply chains, and tariff-driven disruption to globalization should all be squeezing US corporate profit margins, yet margins remain remarkably resilient.", "speaker": "Gavekal Research", "type": "framework", "entities": ["US corporate margins", "labor costs", "tariffs", "supply chains", "immigration"], "conviction": "high", "so_what": "The forces most investors expect to compress margins are not showing up in the data, so bearish margin-mean-reversion trades may be premature.", "quote": "Conventional economic theory would suggest that rising labor costs, stricter immigration policies, the shift from just-in-time to just-in-case supply chains and tariff-driven disruption to globalization should all be squeezing margins.", "locator": "One of the biggest surprises", "quote_verified": true}, {"claim": "US after-tax non-financial corporate profit margins were estimated at 7.6% in the first quarter of 2026, only just below the post-1949 high of 8.2% reached in the second quarter of 2021.", "speaker": "Gavekal Research", "type": "data_point", "entities": ["US non-financial corporations", "after-tax profit margins"], "conviction": "high", "so_what": "Margins sitting near a 75-year high frame the key risk for US equities: little room to expand and historically elevated levels that could mean-revert.", "quote": "In the first quarter of 2026, US after-tax non-financial margins were estimated at 7.6%, only just below the post-1949 high of 8.2% reached in the second quarter of 2021.", "locator": "US corporate profit margins remain elevated", claude-code-sub-opus", "tags": ["Society", "AI", "Tech", "Geopolitics"], "gist": "AI capability is outpacing the institutions meant to govern and absorb it, and the authors argue that 'reverse alignment' — deliberate large-scale investment in identity, privacy, provenance, data markets, democracy, labor and education infrastructure — is a prerequisite (not a supplement) for AI to deliver broad prosperity rather than 'productivity without prosperity, execution without verification and capacity without constraint.'", "themes": [{"theme": "Reverse Alignment Thesis", "insights": [{"claim": "For every dollar spent making AI systems more capable, only a tiny fraction is spent on the institutional, educational, organizational and civic infrastructure needed to integrate those systems into society safely and productively.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "thesis", "entities": ["AI", "AI alignment"], "conviction": "high", "so_what": "Flags a massive underfunded category — 'sociotechnical' infrastructure (credentialing, provenance, workforce transition) — as the next investment and policy frontier as capex floods into raw capability.", "quote": "For every dollar spent to make AI systems more capable, a tiny fraction goes toward the institutional, educational, organizational and civic infrastructure needed to integrate these systems into society productively and safely.", "locator": "The imbalance manifests in the flow of capital", "quote_verified": true}, {"claim": "AI alignment is a two-sided problem: even a perfectly aligned system will underdeliver or cause serious harm if deployed into democracies, economies and legal systems that are unprepared to receive it.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "framework", "entities": ["AI alignment"], "conviction": "high", "so_what": "Reframes 'AI safety' to include societal readiness, expanding the addressable problem set beyond model-level alignment work.", "quote": "Even a perfectly aligned system will underdeliver on its potential or cause serious harm if it is deployed into democracies, economies and legal systems unprepared to receive it.", "locator": "alignment is a two-sided problem", "quote_verified": true}, {"claim": "The scope of institutional adaptation required by AI is comparable to the transformations that accompanied industrialization, electrification and the internet, each of which required decades of deliberate investment in organizational redesign, workforce development and legal frameworks.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "framework", "entities": ["Carlota Perez"], "conviction": "high", "so_what": "Sets a multi-decade time horizon and historical base rate for AI's real economic payoff, tempering near-term productivity expectations.", "quote": null, "locator": "We call that neglected other side “reverse alignment”", "quote_verified": false}, {"claim": "Complementary institutional investments in workforce and legal frameworks are prerequisites for a technology's success rather than optional supplements, as argued in Carlota Perez's 2002 book on technological revolutions and financial capital.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "causal", "entities": ["Carlota Perez", "Technological Revolutions and Financial Capital"], "conviction": "high", "so_what": "Grounds the thesis in Perez's technology-surge framework, useful for investors modeling the gap between an installation phase and a deployment/golden-age phase.", "quote": "History shows that such investments are not optional supplements to technological change; they are prerequisites for its success", "locator": "as the researcher Carlota Perez argues", "quote_verified": true}]}, {"theme": "Capability-Governance Gap and Frontier Risk", "insights": [{"claim": "A government order forcing Anthropic to cut off access to its two most capable models for all foreign nationals led the company to disable the systems for every customer within hours, illustrating how fast state action can shut down frontier AI access.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "anecdote", "entities": ["Anthropic", "Fable 5", "Mythos 5", "U.S. government"], "conviction": "high", "so_what": "A concrete precedent for abrupt, export-control-style disruption of AI service availability — a tail risk for any business dependent on frontier-model access.", "quote": "Within hours, the company disabled the systems for every customer.", "locator": "Last month, the U.S. government ordered Anthropic", "quote_verified": true}, {"claim": "AI capabilities are climbing at an exponential rate while policy and social institutions move at their accustomed pace, a mismatch Anthropic CEO Dario Amodei likened to seeking military aid from trees in his June 2026 essay.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "causal", "entities": ["Dario Amodei", "Anthropic"], "conviction": "high", "so_what": "Signals that even AI-lab leadership sees institutional lag as the binding constraint, supporting demand for governance and integration tooling.", "quote": null, "locator": "Policy on the AI Exponential", "quote_verified": false}, {"claim": "Anthropic's research division released internal data showing models that have begun to help build their own successors, lending fresh weight to speculation about recursive self-improvement.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "data_point", "entities": ["The Anthropic Institute", "Anthropic"], "conviction": "medium", "so_what": "If models materially accelerate their own development, capability timelines compress further, widening the institutional-readiness gap the authors warn about.", "quote": "models that have begun to help build their own successors", "locator": "The same week, the company’s research division", "quote_verified": true}]}, {"theme": "Three Failure Modes of Institutional Neglect", "insights": [{"clai risk relevant to civil-liberties tech and public-sector AI oversight.", "quote": null, "locator": "Capacity without constraint", "quote_verified": false}]}, {"theme": "Identity, Personhood and Privacy Infrastructure", "insights": [{"claim": "As the cost of producing convincing fake documents, biometrics and synthetic personas approaches zero, identity verification systems face an escalating crisis of trust, creating urgent need for cryptographic 'personhood credentials' that prove someone is a unique real human without revealing who they are.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "thesis", "entities": ["personhood credentials", "generative AI", "biometrics"], "conviction": "high", "so_what": "Identifies proof-of-personhood as a foundational new market layer; watch W3C DID/VC standards and eIDAS-aligned identity wallet providers.", "quote": "identity verification systems are facing an escalating crisis of trust", "locator": "Identification Systems", "quote_verified": true}, {"claim": "The W3C's Decentralized Identifiers protocol already underpins pilot programs for educational credentialing and healthcare verification under the EU's eIDAS 2.0 framework, making portable personal digital wallets increasingly feasible.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "data_point", "entities": ["W3C", "Decentralized Identifiers", "eIDAS 2.0", "European Union"], "conviction": "medium", "so_what": "Concrete standards and regulatory rails already exist — a signal of where interoperable digital identity infrastructure is being built first.", "quote": null, "locator": "Emerging technical standards make this increasingly feasible", "quote_verified": false}, {"claim": "Because identity is mostly relational, verifiable-credential architectures could let AI agents themselves be authenticated through social relationships, enabling agentic commerce — for example gaining system access by having two already-trusted friends vouch for you.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "framework", "entities": ["W3C", "Verifiable Credentials", "AI agents", "agentic commerce"], "conviction": "medium", "so_what": "Suggests relational/reputation-based identity, not biometrics, as the substrate for the coming agent economy — relevant to agent authentication and trust infrastructure.", "quote": null, "locator": "someone could gain access to a system by having two friends", "quote_verified": false}, {"claim": "AI gives everyone access to a personal 'Sherlock Holmes' that turns scattered digital traces like browsing, location, metadata and CCTV into detailed behavioral profiles at minimal cost, rendering the transparency/anonymity binaries encoded in laws like GDPR archaic and unworkable.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "contrarian", "entities": ["GDPR", "brain-computer interfaces"], "conviction": "high", "so_what": "Argues existing privacy law is obsolete and points toward cryptographic 'meronymity' (selective disclosure) as the replacement paradigm.", "quote": "AI allows everyone access to a personal “Sherlock Holmes,” making scattered digital traces (browsing, location, metadata, CCTV) into detailed behavioral profiles at minimal cost.", "locator": "Privacy", "quote_verified": true}, {"claim": "Zero-knowledge proofs, secure multiparty computation and federated learning already underpin real activities like social-media age verification, anonymous cryptocurrency transactions and encrypted messaging, enabling computation on data no party can see.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "data_point", "entities": ["zero-knowledge proofs", "secure multiparty computation", "federated learning", "Signal"], "conviction": "high", "so_what": "Privacy-preserving computation is already deployed, not theoretical — a maturing toolkit for compliant collaborative AI and confidential data markets.", "quote": null, "locator": "Nor are these tools tion": "medium", "so_what": "Names specific provenance standards and tooling to track as authentication infrastructure builds out.", "quote": null, "locator": "A recent industry standards effort", "quote_verified": false}, {"claim": "Society's understanding of media may need to shift from assuming photos, videos and voice recordings are direct representations of reality toward treating them like paintings, whose truth value depends on trusting the people who vouch for their authenticity.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "framework", "entities": ["deepfakes"], "conviction": "medium", "so_what": "A cultural-epistemic shift back to trust-based verification of media has second-order implications for journalism, courts, insurance and evidence.", "quote": null, "locator": "Understandings of provenance may also need to shift", "quote_verified": false}]}, {"theme": "Data Value and Training-Data Markets", "insights": [{"claim": "AI companies face a coming scarcity because the next rounds of training demand fresh, high-quality human-generated data and the easy supply has been exhausted, while content creators are stuck choosing between modest one-off licensing deals or copyright lawsuits.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "thesis", "entities": ["frontier models", "content creators"], "conviction": "high", "so_what": "Frames training-data scarcity and creator compensation as a central AI-era economic dispute — a value pool up for grabs between labs and rights holders.", "quote": "The next rounds of training will demand fresh, high-quality human-generated data, and the easy supply has been exhausted.", "locator": "Data Value", "quote_verified": true}, {"claim": "A real market in training data is feasible because AI companies already produce the two datasets required for pricing every time they train: data-mixture decisions reveal how to divide the value, and scaling laws reveal how much additional data is worth.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "contrarian", "entities": ["scaling laws", "training data"], "conviction": "high", "so_what": "Rebuts the 'data can't be priced' objection, implying royalty-style data markets are technically tractable — a potential new asset class for content owners.", "quote": "Data mixture decisions reveal how the contributions of different sources should be weighted, which settles how to divide the pie. Scaling laws reveal how much additional data improves a model, which settles the size of the pie.", "locator": "That objection does not survive scrutiny", "quote_verified": true}, {"claim": "Music-industry collective management organizations that license works and pay royalties to many rights holders without per-transaction negotiation offer a template for routing AI training-data compensation to creators at scale.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "framework", "entities": ["collective management organizations", "Scale AI"], "conviction": "medium", "so_what": "Points to a proven institutional model (CMOs/royalty pools) as the likely mechanism for scaled data compensation, and notes markets for later-stage data (steering, retrieval) via players like Scale AI are already emerging.", "quote": null, "locator": "Collective management organizations", "quote_verified": false}]}, {"theme": "Agentic Collaboration and Communal Sensemaking", "insights": [{"claim": "Today's AI agents are built to be unconditionally helpful, making them dangerously naive collaborators liable to be tricked by hackers into divulging their principals' confidential data.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "causal", "entities": ["AI agents"], "conviction": "high", "so_what": "Highlights agent trust and prompt-injection defense as a critical unmet need before multi-agent collaboration can scale safely.", "quote": "today’s agents are built to be unconditionally helpful, making them dangerously naive partners", "locator": "Agentic Collaboration", "quote_verified": true}, {"claim": "Without shared cross-provider trust standards, AI agents will only cooperate within walled gardens, letting incumbent platforms capture most of the value from agentic collaboration.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "prediction", "entities": ["AI agents", "AI model providers"], "conviction": "high", "so_what": "Interoperable agent-trust standards are the battleground that determines whether value concentrates in incumbents or spreads — a key platform-strategy watch item.", "quote": "Without shared standards, agents will cooperate only within walled gardens, letting incumbent platforms capture most of the value.", "locator": "Crucially, these trust systems must work across AI model providers", "quote_verified": true}, {"claim": "Most platform designs fuel 'pluralistic ignorance at scale' by serving content based on inferred group memberships while hiding why content is served, preventing users from knowing which communities see and assent to the same material.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "causal", "entities": ["algorithmic media", "social platforms"], "conviction": "high", "so_what": "Diagnoses a structural flaw in attention-based platforms and motivates community-coherence business models as an alternative.", "quote": null, "locator": "Communal Sensemaking", "quote_verified": false}, {"claim": "When platform business models shift so communities pay for coherence rather than advertisers paying for attention, platform incentives align with the social fabric they depend on.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "prediction", "entities": ["social platforms", "advertising"], "conviction": "medium", "so_what": "Proposes an alternative to the ad-attention model — a potential disruption vector for social-platform monetization.", "quote": "When the business model shifts so that communities pay platforms for coherence rather than advertisers for attention, platform incentives align with the social fabric they depend on.", "locator": "communal models can present issues from the vantage points", "quote_verified": true}]}, {"theme": "Historical Precedents and Proven Civic Tech", "insights": [{"claim": "India Stack gave hundreds of millions of unbanked people financial access via Aadhaar (biometric ID for over 1.3 billion), UPI and DigiLocker, but Aadhaar authentication failures have denied food rations, pensions and welfare to low-caste, tribal and migrant communities, showing technical architecture and political governance are inseparable.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "anecdote", "entities": ["India Stack", "Aadhaar", "Unified Payments Interface", "DigiLocker", "India"], "conviction": "high", "so_what": "A cautionary case that centralized biometric ID is dual-use surveillance infrastructure whose risk depends on the administering state's democratic health.", "quote": "The same system that achieved financial inclusion at extraordinary speed also created new vectors of exclusion and control", "locator": "India Stack", "quote_verified": true}, {"claim": "X's Community Notes, adopted in 2021 and since copied by Meta and TikTok, are trusted across the political spectrum and roughly halve resharing of the posts they annotate, extending Taiwan's Pol.is 'bridging statement' logic to platform scale.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "data_point", "entities": ["X", "Community Notes", "Meta", "TikTok", "Pol.is", "Taiwan"], "conviction": "high", "so_what": "Concrete evidence that bridging-based moderation works at scale and is spreading across major platforms — a template for AI-era information governance.", "quote": "trusted across the political spectrum and roughly halve resharing of the posts they annotate", "locator": "The same bridging logic now runs at platform scale", "quote_verified": tr entific publishing and evaluation, with AI-based silo-breaking metrics and 'decentralized science' funding as emerging responses.", "quote": "Models now generate hypotheses, run simulations and draft manuscripts at a pace that renders traditional peer review functionally obsolete", "locator": "Research", "quote_verified": true}, {"claim": "AI breaks the university's implicit bundling of skills with content delivery, forcing educators to make explicit which capacities matter and to use AI as a 'stationary bike for the mind' rather than the effortless 'e-bike' of Sam Altman's metaphor.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "framework", "entities": ["universities", "Sam Altman", "OpenAI"], "conviction": "high", "so_what": "Reframes the AI-in-education debate around deliberate skill-building versus effortless output — relevant to edtech design and credentialing reform.", "quote": "using AI as a stationary bike for the mind, not merely the “e-bike” of OpenAI CEO Sam Altman’s metaphor", "locator": "Education", "quote_verified": true}]}, {"theme": "Coalitions and Execution Risk", "insights": [{"claim": "Multisectoral 'smart cities' coalitions of a decade ago mostly failed to deliver because experts from different fields disagreed on what problem they were solving, a cautionary precedent for AI-era sociotechnical coalitions.", "speaker": "E. GLEN WEYL, JAMES EVANS AND CHRIS WHITE", "type": "anecdote", "entities": ["smart cities"], "conviction": "medium", "so_what": "Warns that cross-sector AI initiatives fail on coordination, not ideas — execution and coalition design, not technology, is the binding constraint.", "quote": "When experts from different fields converge on a novel challenge, they often discover they disagree on what problem they are trying to solve", "locator": "Just over a decade ago, multisectoral coalitions", "quote_verified": true}, {"claim": "Advance market commitments, where funders guarantee demand for products that do not yet nerals", "locator": "Policy for the Planet, The geopolitics behind critical", "quote_verified": true}]}], "insight_total": 4, "top_entities": ["El Nino", "PIIE", "critical minerals", "data centers", "Kimberly Clausing", "Cullen S. Hendrix", "Monica de Bolle", "US-China", "S&P Global Energy"], "source_meta": {"author": "", "word_count": 225, "paywalled": false}}, {"record_id": "bcc9ab2512f9ed65", "source_type": "concepts", "source_name": "Peterson Institute (PIIE)", "source_url": "https://www.piie.com/blogs/realtime-economics/2026/trumps-new-50-percent-tariffs-canada-and-others-train-will-likely", "title": "Trump's new 50 percent tariffs on Canada, and others in train, will likely raise US consumer prices", "published_date": "2026-07-21", "language": "en", "processed_at": "2026-07-23T11:05:08Z", "processor": "claude-code-sub-opus", "tags": ["Macro", "Geopolitics", "Positioning"], "gist": "Trump ordered new 50 percent tariffs on select Canadian imports (alcohol, dairy, motor vehicles) effective in 30 days, invoking Section 338 of the 1930 Smoot-Hawley Act for the first time. PIIE argues the tariffs are paid almost entirely by US households and businesses, likely raising consumer prices into the November 2026 midterms, while breaching zero-tariff commitments under USMCA.", "themes": [{"theme": "Consumer price pass-through of Canada tariffs", "insights": [{"claim": "President Trump on Monday ordered 50 percent tariffs on certain Canadian imports to take effect in 30 days, targeting select alcoholic beverages, dairy products, and motor vehicles.", "speaker": "Gary Clyde Hufbauer", "type": "data_point", "entities": ["Donald Trump", "Canada", "alcoholic beverages", "dairy", "motor vehicles"], "conviction": "high", "so_what": "A 30-day clock means price and supply-chain effects hit Canadian alcohol, dairy, and auto imports by late August 2026; watch those consumer categories and cross-border suppliers.", "quote": "Trump on Monday ordered the 50 percent tariffs on certain Canadian imports to take effect in 30 days.", "locator": "Trump on Monday ordered the 50 percent", "quote_verified": true}, {"claim": "Research indicates that these tariffs are paid almost entirely by US households and business consumers rather than by foreign exporters, so US prices for affected goods will likely rise.", "speaker": "Gary Clyde Hufbauer", "type": "causal", "entities": ["US households", "US businesses"], "conviction": "high", "so_what": "Tariff incidence falling on domestic buyers argues for a consumer-inflation impulse in tariffed categories, not a hit to Canadian exporter margins.", "quote": "his tariffs are paid almost entirely by US households and business consumers, rather than by foreign exporters", "locator": "Research to date indicates", "quote_verified": true}, {"claim": "Prices for the affected goods, and others in train, could start rising in the runup to the November 2026 US midterm election.", "speaker": "Gary Clyde Hufbauer", "type": "prediction", "entities": ["November 2026 midterm election"], "conviction": "medium", "so_what": "Rising tariff-driven prices ahead of the midterms create a political-economic feedback risk that could shape further trade policy and inflation prints in H2 2026.", "quote": "could start rising in the runup to the November 2026 midterm election", "locator": "Prices for the goods affected", "quote_verified": true}]}, {"theme": "Legal mechanism and treaty breach", "insights": [{"claim": "The new tariffs discard the US legal obligation of zero tariffs made in 2020 under the United States-Mexico-Canada Agreement, breaching commitments also bound under WTO and other trade pacts.", "speaker": "Gary Clyde Hufbauer", "type": "thesis", "entities": ["USMCA", "World Trade Organization", "Canada", "Mexico"], "conviction": "high", "so_what": "Unilateral breach of USMCA and WTO bindings signals rising trade-treaty instability, raising risk premia on North American cross-border trade and supply chains.", "quote": "Cast aside by the new tariffs is the US promise and legal obligation of zero tariffs made in 2020 when Trump signed the United States-Mexico-Canada Agreement.", "locator": "Cast aside by the new tariffs", "quote_verified": true}, {"claim": "Trump imposed the measures by citing, for the first time, Section 338 of the 1930 Smoot-Hawley Tariff Act, a retaliatory provision aimed at countries denying US exports most-favored-nation treatment.", "speaker": "Gary Clyde Hufbauer", "type": "framework", "entities": ["Section 338", "Tariff Act of 1930", "Smoot-Hawley"], "conviction": "high", "so_what": "First-ever use of a dormant 1930 statute opens a new, hard-to-litigate legal channel for tariffs, expanding the executive's tariff toolkit beyond the usual Section 232/301 routes.", "quote": "Trump imposed the new measures by citing, for the first time, Section 338 from the Tariff Act of 1930 (the Smoot-Hawley Tariff).", "locator": "Trump imposed the new measures by citing", "quote_verified": true}, {"claim": "Trump justified the Section 338 action by pointing to Canadian restrictions on US cheese exports, a Canadian boycott of US alcoholic beverages, and Canadian automotive-sector retaliation against earlier US tariffs.", "speaker": "Gary Clyde Hufbauer", "type": "causal", "entities": ["Canada", "US cheese exports", "automotive sector"], "conviction": "high", "so_what": "The stated grievances signal which sectors (dairy, alcohol, autos) are the flashpoints and where further tit-for-tat retaliation is most likely to escalate.", "quote": null, "locator": "Trump claimed that Canadian restrictions", "quote_verified": false}, {"claim": "The new Section 338 tariffs are accompanied by a larger suite of Section 301 tariffs (Trade Act of 1974) penalizing imports from 60 countries for their alleged failure to effectively prohibit forced labor.", "speaker": "Gary Clyde Hufbauer", "type": "data_point", "entities": ["Section 301", "Trade Act of 1974", "forced labor"], "conviction": "high", "so_what": "A tion": "high", "so_what": "Names the specific scholarly source of a widely held popular belief, making it possible to test and dispute rather than treat as folk wisdom.", "quote": "a French historian who argued in the 1960s that medieval childhood was profoundly remote in these ways", "locator": "As I grew older, I came to associate this idea", "quote_verified": true}, {"claim": "Ariès's thesis about emotionally remote medieval childhood was never fully accepted in academia yet became vastly influential on the wider public.", "speaker": "WorksInProgMag", "type": "contrarian", "entities": ["Philippe Ariès"], "conviction": "high", "so_what": "Illustrates how an idea can dominate popular imagination while being rejected by specialists, a caution about the gap between scholarship and public belief.", "quote": "Ariès’s work never attained complete acceptance in academia, but it was vastly influential on the wider public.", "locator": "Ariès’s work never attained complete acceptance", "quote_verified": true}, {"claim": "Historian Nicholas Orme, whose Medieval Children is the leading English study, states there is nothing to be said for Ariès's view and that it is mistaken in substance, not merely in detail.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["Nicholas Orme", "Medieval Children"], "conviction": "high", "so_what": "Provides the authoritative counter-evidence that overturns the prevailing mental model of a cold medieval family.", "quote": "It cannot be overemphasised that there is nothing to be said for Ariès’s view", "locator": "Nicholas Orme’s Medieval Children is the leading study", "quote_verified": true}]}, {"theme": "Medieval family demographics", "insights": [{"claim": "Most medieval English people had only three or four children, marrying late in their mid or late twenties, contrary to the assumption that medieval families were very large.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["medieval England"], "conviction": "high", "so_what": "Corrects a common misconception and reframes medieval family structure as far closer to modern norms than imagined.", "quote": "most medieval people had only three or four children, somewhat more among the rich and somewhat fewer among the very poor", "locator": "It is sometimes imagined that medieval people had a great many children", "quote_verified": true}, {"claim": "In medieval England about 25 percent of children died in their first year and another 15 percent by their tenth, leaving the median child growing up with one sibling and two parents in their thirties or forties, just like the median English child today.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["medieval England"], "conviction": "high", "so_what": "Quantifies mortality while showing the surviving household structure was strikingly similar to the present, undercutting the sense of medieval otherness.", "quote": "The median English child thus grew up in a home with one sibling and two parents in their thirties or forties, being in this respect just like the median English child today.", "locator": "About 25 percent of children died in their first year", "quote_verified": true}]}, {"theme": "Medieval attitudes to abortion and the fetus", "insights": [{"claim": "Medieval people believed early-term fetuses were alive but unconscious, like vegetables, and lacked souls, so early-term abortion was considered sinful but not homicide and was not punishable at common law.", "speaker": "WorksInProgMag", "type": "framework", "entities": ["medieval England", "common law", "church courts"], "conviction": "high", "so_what": "Reveals a more nuanced medieval moral-legal framework on abortion than the assumption of blanket prohibition, with implications for the deep history of the abortion debate.", "quote": "Medieval people did not think that early-term fetuses had souls, believing them to be alive but unconscious, like vegetables.", "locator": "Abortion was considered sinful, but the situation was more complicated", "quote_verified": true}, {"claim": "The distinction between early-term abortion (not homicide) and late-term abortion (a kind of homicide, but still not normally punished at common law) persisted until the nineteenth century.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["common law"], "conviction": "high", "so_what": "Shows a legal framework on abortion that endured for centuries, reframing modern debates as departures from a long-standing gradualist tradition.", "quote": "This distinction persisted until the nineteenth century.", "locator": "Late-term abortion was thought to be a kind of homicide", "quote_verified": true}]}, {"theme": "Economics of medieval parenting", "insights": [{"claim": "Medieval parents made immense sacrifices for their children while expecting little in return: feeding a child consumed about 15 percent of average income and parents often supported children throughout adulthood.", "speaker": "WorksInProgMag", "type": "data_point", "entities": ["medieval England"], "conviction": "high", "so_what": "The material cost of raising children undercuts the theory that parents stayed emotionally detached as a coping mechanism.", "quote": "Feeding a child consumed about 15 percent of average income, and parents often continued to support children throughout their adulthood.", "locator": "Medieval parents made immense sacrifices for their children", "quote_verified": true}, {"claim": "Children were typically sent away at age 13 or 14 for apprenticeship or service just when they could become a net economic asset, and parents generally paid for the apprenticeships rather than receiving remitted income.", "speaker": "WorksInProgMag", "type": "causal", "entities": ["medieval England", "apprenticeship"], "conviction": "high", "so_what": "Demonstrates parents invested in children beyond any economic self-interest, evidence against a purely transactional view of medieval family bonds.", "quote":  "type": "anecdote", "entities": ["Ancrene Wisse", "Oxford schoolbook"], "conviction": "high", "so_what": "Positive emotional evidence, including affectionate parent-child play used as a religious metaphor, shows warmth was a recognized and celebrated part of medieval family life.", "quote": "we wept for joy, each to other", "locator": "An Oxford schoolbook of the 1490s", "quote_verified": true}]}, {"theme": "Lessons on historical revisionism", "insights": [{"claim": "Orme concludes that medieval people were essentially ourselves five hundred or a thousand years ago, not the strange and cold figures the popular imagination has pictured.", "speaker": "WorksInProgMag", "type": "thesis", "entities": ["Nicholas Orme"], "conviction": "high", "so_what": "Reframes the past as continuous with the present rather than radically alien, challenging narratives of deep human discontinuity.", "quote": "I believe they were ourselves, five hundred or a thousand years ago", "locator": "The medieval people who emerge from Orme’s book", "quote_verified": true}, {"claim": "When a scholar makes exciting claims that some class of human beings is incomprehensibly unlike us, we should be skeptical and ask whether the claim is even plausible, just as the Ariès hypothesis fails the test of whether children could survive medieval hardship without devoted parents.", "speaker": "WorksInProgMag", "type": "framework", "entities": ["Philippe Ariès"], "conviction": "high", "so_what": "Offers a general heuristic for evaluating dramatic historical or social-science revisionism: dramatic claims of human otherness deserve heightened scrutiny.", "quote": "Next time a scholar makes exciting claims about how some class of human beings is incomprehensibly unlike us, we would do well to ask similar questions.", "locator": "Perhaps we should ask why the Ariès hypothesis", "quote_verified": true}]}], "insight_total": 14, "top_entities": ["Philippe Ariès", "Nicholas Orme", "Medieval Children", "medieval England", "Henry III", "Eleanor of Provence", "Katherine", "Matthew Parris", "Ancrene Wisse", "common law"], "source_meta": {"author": "WorksInProgMag", "word_count": 858, "paywalled": false}}, {"record_id": "04e1824d03be2a8b", "source_type": "concepts", "source_name": "World Economic Forum", "source_url": "https://www.weforum.org/podcasts/meet-the-leader/episodes/jobs-skills-mismatch-future-maria-flynn/", "title": "Fixing the Skills Mismatch: What's needed now", "published_date": "2026-07-21", "language": "en", "processed_at": "2026-07-23T11:05:08Z", "processor": "claude-code-sub-opus", "tags": ["Society", "AI", "Positioning"], "gist": "Jobs for the Future CEO Maria Flynn argues the core labour-market problem is a skills mismatch, not a talent shortage, and that legacy education/workforce systems can't keep pace with AI. She predicts AI will force adoption of skills-based hiring and rapid, continuous reskilling, while worker sentiment toward AI is souring in an uneven 'messy middle.'", "themes": [{"theme": "Skills mismatch vs talent shortage", "insights": [{"claim": "The biggest constraint on labour markets is not a talent shortage but a skills mismatch: organizations struggle to match talent to roles rather than with the supply of workers itself.", "speaker": "World Economic Forum", "type": "thesis", "entities": ["Chief People Officer Outlook", "World Economic Forum"], "conviction": "high", "so_what": "Reframes the labour-market bottleneck away from headcount toward matching and assessment, favoring skills-assessment tooling and HR-tech over pure recruiting supply plays.", "quote": "one of the biggest constraints is the skill mismatch", "locator": "According to our recent Chief People Officer Outlook", "quote_verified": true}, {"claim": "Education and public workforce systems were built for a different era and are not agile enough to keep pace with AI-driven labour-market change, risking a 'divorce' of supply and demand.", "speaker": "World Economic Forum", "type": "caus // ---------- helpers ----------
// YouTube-aligned hex colors for tinted insight chips (bg = color+"1a", text = color, border = color+"55").
const TYPE_HEX = {
  thesis: '#6366f1', prediction: '#0ea5e9', framework: '#8b5cf6',
  data_point: '#059669', causal: '#d97706', contrarian: '#dc2626',
  anecdote: '#64748b',
};
const CONV_HEX = { high: '#16a34a', medium: '#ca8a04', low: '#94a3b8', exploratory: '#94a3b8' };
function typeHex(t) { return TYPE_HEX[String(t || '').toLowerCase()] || '#475569'; }
function convHex(c) { return CONV_HEX[String(c || '').toLowerCase()] || '#64748b'; }

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

// Tinted chip (YouTube style): faint bg, colored text + border.
function tintChip(text, color) {
  return `<span class="chip" style="background:${color}1a;color:${color};border-color:${color}55">${escapeHtml(text)}</span>`;
}
function tagPills(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="pill tag">${escapeHtml(t)}</span>`).join(' ');
}

// ---------- rendering ----------
// Insight presentation ported from the YouTube digest: type/conviction tinted
// chips, speaker as a 🗣 chip, and entities as indigo chips — all in the meta row
// directly under the claim. Quote treatment is INTENTIONALLY kept as Concepts'
// verbatim + "✓ verified" (stronger than YouTube's ≈ paraphrase wording).
function renderInsight(ins) {
  if (!ins) return '';
  const cls = 'insight' + (ins.type ? (' ' + String(ins.type).toLowerCase()) : '');
  const meta = [];
  if (ins.type) meta.push(tintChip(ins.type, typeHex(ins.type)));
  if (ins.speaker) meta.push(`<span class="chip chip-spk">🗣 ${escapeHtml(ins.speaker)}</span>`);
  if (ins.conviction) meta.push(tintChip('conviction: ' + ins.conviction, convHex(ins.conviction)));
  (ins.entities || []).slice(0, 12).forEach(e => {
    if (e) meta.push(`<span class="chip chip-ent">${escapeHtml(e)}</span>`);
  });
  let quote = '';
  if (ins.quote) {
    const v = ins.quote_verified
      ? `<span class="vmark">✓ verified</span>`
      : `<span class="vmark no">unverified</span>`;
    quote = `<div class="quote">“${escapeHtml(ins.quote)}”${v}</div>`;
  }
  const so = ins.so_what
    ? `<div class="insight-so"><span class="lbl">so what</span>${escapeHtml(ins.so_what)}</div>` : '';
  return `
    <div class="${cls}">
      <div class="insight-claim">${escapeHtml(ins.claim || '')}</div>
      <div class="insight-meta">${meta.join('')}</div>
      ${so}
      ${quote}
    </div>`;
}

function renderTheme(theme) {
  const insights = (theme.insights || []).map(renderInsight).join('');
  return `
    <div class="theme">
      <div class="theme-title">${escapeHtml(theme.theme || 'Theme')}</div>
      ${insights}
    </div>`;
}

function renderCard(card) {
  if (!card) return '';
  const meta = card.source_meta || {};
  const nameHtml = card.source_url
    ? `<a class="source-name" href="${escapeAttr(card.source_url)}" target="_blank" rel="noopener">${escapeHtml(card.source_name || '')}</a>`
    : `<span class="source-name">${escapeHtml(card.source_name || '')}</span>`;
  const subBits = [];
  if (card.published_date) subBits.push(escapeHtml(card.published_date));
  if (meta.author) subBits.push(escapeHtml(meta.author));
  if (meta.word_count) subBits.push(`${meta.word_count} words`);
  if (meta.paywalled) subBits.push('paywalled');
  const themes = (card.themes || []).map(renderTheme).join('');
  const n = card.insight_total != null ? card.insight_total
            : (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
  return `
    <div class="source">
      <div class="source-head" onclick="toggleSource(this)">
        <div class="source-meta-left">
          <div class="source-name-row">${nameHtml}</div>
          <div class="source-title">${escapeHtml(card.title || '')}</div>
          <div class="source-sub">${subBits.join('  ·  ')}</div>
        </div>
        <span class="source-count">${n} insight${n === 1 ? '' : 's'}</span>
        <span class="source-arrow">▸</span>
      </div>
      <div class="source-body">
        ${card.gist ? `<div class="gist">${escapeHtml(card.gist)}</div>` : ''}
        ${card.tags && card.tags.length ? `<div class="tags">${tagPills(card.tags)}</div>` : ''}
        ${themes || '<div class="empty">No insights.</div>'}
      </div>
    </div>`;
}

function renderTopStats(d) {
  const s = d.stats || {};
  const parts = [];
  if (d.date) parts.push(`date <strong>${escapeHtml(d.date)}</strong>`);
  if (s.lookback_days != null) parts.push(`lookback <strong>${s.lookback_days}d</strong>`);
  if (s.sources != null) parts.push(`sources <strong>${s.sources}</strong>`);
  if (s.cards != null) parts.push(`cards <strong>${s.cards}</strong>`);
  if (s.insights != null) parts.push(`insights <strong>${s.insights}</strong>`);
  if (s.quote_verified_pct != null) parts.push(`quotes verified <strong>${s.quote_verified_pct}%</strong>`);
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSource(headEl) { headEl.parentElement.classList.toggle('open'); }

function insightCount(card) {
  return (card.themes || []).reduce((a, t) => a + ((t.insights || []).length), 0);
}

// Build the sort/filter control bar (display only — re-groups REPORT_DATA in place).
function buildControls(d) {
  const cards = d.cards || [];
  const names = [...new Set(cards.map(c => c.source_name || '—'))].sort((a, b) => a.localeCompare(b));
  const opts = names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join('');
  document.getElementById('controls').innerHTML =
    `<label>Sort
       <select id="sortSel">
         <option value="source">Source A–Z</option>
         <option value="insights">Insight count ▼</option>
       </select></label>
     <label>Source
       <select id="srcSel">
         <option value="__all">All sources (${names.length})</option>
         ${opts}
       </select></label>
     <span class="ctl-btns">
       <button type="button" id="expandAll">Expand all</button>
       <button type="button" id="collapseAll">Collapse all</button>
     </span>`;
  document.getElementById('sortSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('srcSel').addEventListener('change', () => renderGroups(d));
  document.getElementById('expandAll').addEventListener('click', () => setAllGroups(false));
  document.getElementById('collapseAll').addEventListener('click', () => setAllGroups(true));
}

// Group-level collapse: header click toggles one group; the control-bar buttons toggle all.
function toggleGroup(headEl) { headEl.parentElement.classList.toggle('collapsed'); }
function setAllGroups(collapsed) {
  document.querySelectorAll('.group').forEach(g => g.classList.toggle('collapsed', collapsed));
}

// Group cards by source, sort groups (and cards within), optionally filter to one source.
function renderGroups(d) {
  const sortMode = (document.getElementById('sortSel') || {}).value || 'source';
  const srcFilter = (document.getElementById('srcSel') || {}).value || '__all';
  let cards = (d.cards || []).slice();
  if (srcFilter !== '__all') cards = cards.filter(c => (c.source_name || '—') === srcFilter);

  const groups = new Map();
  cards.forEach(c => {
    const k = c.source_name || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  let entries = [...groups.entries()].map(([name, cs]) => ({
    name, cards: cs, insights: cs.reduce((a, c) => a + insightCount(c), 0),
  }));
  if (sortMode === 'insights') entries.sort((a, b) => b.insights - a.insights || a.name.localeCompare(b.name));
  else entries.sort((a, b) => a.name.localeCompare(b.name));
  // Within each source group, heaviest cards first.
  entries.forEach(e => e.cards.sort((a, b) => insightCount(b) - insightCount(a)));

  const html = entries.map(e => {
    const head = `<div class="group-head" onclick="toggleGroup(this)">`
      + `<span class="group-name">${escapeHtml(e.name)}</span>`
      + `<span class="group-meta">${e.cards.length} card${e.cards.length === 1 ? '' : 's'} · ${e.insights} insights</span>`
      + `<span class="group-arrow">▾</span></div>`;
    return `<div class="group">${head}<div class="group-body">${e.cards.map(renderCard).join('')}</div></div>`;
  }).join('');

  const app = document.getElementById('app');
  app.innerHTML = html || '<div class="empty">No cards for this source.</div>';
  // Open the first two source cards by default.
  document.querySelectorAll('.source').forEach((sec, i) => { if (i < 2) sec.classList.add('open'); });
}

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  document.getElementById('stats-top').innerHTML = renderTopStats(d);
  buildControls(d);
  renderGroups(d);   // default: grouped, sorted by source A–Z
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
