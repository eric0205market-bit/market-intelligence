function getColor(cat) { return CAT_COLORS[cat] || "#999"; }

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  var arrow = document.getElementById('arrow-' + id);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    arrow.textContent = '▾';
  } else {
    body.classList.add('open');
    arrow.textContent = '▴';
  }
}

function toggleReport() {
  var b = document.getElementById('report-body');
  b.classList.toggle('open');
}

function filterCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderPills();
  renderCards();
}

function filterUrg(u) {
  activeUrg = u;
  activeSrc = null;
  renderPills();
  renderCards();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = 'all';
  activeUrg = 'all';
  renderPills();
  renderCards();
}

function renderPills() {
  var cats = ['all'];
  ITEMS.forEach(function(i) { if (!cats.includes(i.cat)) cats.push(i.cat); });
  var catBar = document.getElementById('cat-bar');
  catBar.innerHTML = '';
  cats.forEach(function(c) {
    var count = c === 'all' ? ITEMS.length : ITEMS.filter(function(i){return i.cat===c;}).length;
    var label = c === 'all' ? 'All (' + count + ')' : c + ' (' + count + ')';
    var cls = 'pill' + (c === 'all' ? ' pill-all' : '') + (activeCat === c && !activeSrc ? ' active' : '');
    var color = c === 'all' ? '' : 'background:' + getColor(c) + ';border-color:' + getColor(c) + ';';
    var style = (activeCat === c && !activeSrc && c !== 'all') ? 'style="' + color + '"' : '';
    catBar.innerHTML += '<span class="' + cls + '" ' + style + ' onclick="filterCat(\'' + c + '\')">' + label + '</span>';
  });

  var urgs = ['all', 'act-now', 'deep', 'watch'];
  var urgBar = document.getElementById('urg-bar');
  urgBar.innerHTML = '';
  urgs.forEach(function(u) {
    var count = u === 'all' ? ITEMS.length : ITEMS.filter(function(i){return i.urgency===u;}).length;
    var label = u === 'all' ? 'All (' + count + ')' : URGENCY_LABELS[u] + ' (' + count + ')';
    var cls = 'pill pill-all' + (activeUrg === u && !activeSrc ? ' active' : '');
    urgBar.innerHTML += '<span class="' + cls + '" onclick="filterUrg(\'' + u + '\')">' + label + '</span>';
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';
  var visible = ITEMS.filter(function(i) {
    if (activeSrc) return i.source.indexOf(activeSrc) !== -1;
    var catOk = activeCat === 'all' || i.cat === activeCat;
    var urgOk = activeUrg === 'all' || i.urgency === activeUrg;
    return catOk && urgOk;
  });

  if (visible.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">No items match this filter.</div>';
    return;
  }

  visible.forEach(function(item) {
    var color = getColor(item.cat);
    var chartFlag = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var html = '<div class="card" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">' + item.id + '</span>';
    html += '<span class="urgency-badge">' + URGENCY_MAP[item.urgency] + '</span>';
    html += '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>';
    html += '<span class="cat-tag">' + item.cat + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + item.title + '</span>';
    html += '<span class="toggle-arrow" id="arrow-' + item.id + '">▾</span>';
    html += '</div>';

    html += '<div class="card-body" id="body-' + item.id + '">';
    html += '<div class="idea-block"><div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + item.idea + '</div></div>';

    html += '<div class="angle-block" style="border-color:' + color + ';background:' + color + '18">';
    html += '<div class="section-label">My Angle</div>' + item.angle + '</div>';

    html += '<div class="tweets-row">';
    html += '<div class="tweet-box"><div class="tweet-label a">TWEET A</div>';
    html += '<div class="tweet-text">' + item.tweetA + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label b">TWEET B</div>';
    html += '<div class="tweet-text">' + item.tweetB + '</div>';
    html += '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';

    if (item.charts.count > 0) {
      var chartStyle = item.charts.hot ? 'border:1.5px dashed #f59e0b;background:#fffbeb;' : 'border:1.5px dashed #ccc;background:#fafafa;';
      html += '<div style="margin-top:12px;padding:8px 12px;border-radius:6px;' + chartStyle + 'font-size:12px;color:#666;">';
      html += '📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>';
    }

    html += '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>';
    html += '</div></div>';
    container.innerHTML += html;
  });
}
