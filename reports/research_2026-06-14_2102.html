  windowEnd: "2026-06-14 21:02 CEST",
  emailsInWindow: 11,
  emailsRead: 10,
  itemsExtracted: 32,
  includedSources: [
    { name: "Citrini Research / Macro Memo", items: 3 },
    { name: "Danny Dayan / Weekly Notes", items: 2 },
    { name: "Paulo Macro / Oil Review", items: 2 },
    { name: "Chamath Palihapitiya / Weekly Digest", items: 6 },
    { name: "Callum Thomas / Weekly ChartStorm", items: 2 },
    { name: "Young and Calculated", items: 4 },
    { name: "IT Tech / On-Chain Insights", items: 6 },
    { name: "Elvis Saravia / NLP Newsletter", items: 5 },
    { name: "MacroCharts", items: 1 },
    { name: "Chamath Palihapitiya / ChartStorm / IT Tech", items: 1 }
  ],
  skippedSources: [
    { name: "McKinsey / Geopolitical Foresight", reason: "HTML-only email, null plaintext body — no extractable content" },
    { name: "MacroMornings", reason: "Purely promotional — pre-launch 70% discount offer, zero analytical content" },
    { name: "Unchained Crypto", reason: "Arrived at 15:00:53 CEST — 1 minute 7 seconds before the 15:02 CEST hard cutoff. Excluded per rule." }
  ]
};

const CAT_COLORS = {
  macro: "#e24b4a",
  credit: "#378add",
  positioning: "#ef9f27",
  "AI/infra": "#1d9e75",
  crypto: "#7f77dd",
  geopolitics: "#d85a30",
  energy: "#f97316",
  tech: "#06b6d4",
  gold: "#d4a017",
  culture: "#ec4899",
  labor: "#8b5cf6",
  regulation: "#64748b",
  science: "#14b8a6",
  venture: "#84cc16"
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === "a" ? item.tweetA : item.tweetB;
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = "✓ Copied";
  setTimeout(function() { btn.textContent = "📋 Copy"; }, 1500);
}

function toggleCard(id) {
  var body = document.getElementById("body-" + id);
  var icon = document.getElementById("icon-" + id);
  if (body.classList.contains("open")) {
    body.classList.remove("open");
    icon.textContent = "▼";
  } else {
    body.classList.add("open");
    icon.textContent = "▲";
  }
}

function toggleReport() {
  var body = document.getElementById("report-body");
  var arrow = document.getElementById("report-arrow");
  if (body.classList.contains("open")) {
    body.classList.remove("open");
    arrow.textContent = "▼";
  } else {
    body.classList.add("open");
    arrow.textContent = "▲";
  }
}

function filterBySrc(name) {
  activeSrc = name;
  renderCards();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderCards();
  document.querySelectorAll(".urg-pill").forEach(function(p) {
    p.classList.remove("active");
    p.style.background = "#fff";
    p.style.color = "#555";
  });
  var el = document.getElementById("urg-" + urg);
  if (el) {
    el.classList.add("active");
    el.style.background = "#555";
    el.style.color = "#fff";
  }
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  renderCards();
  document.querySelectorAll(".cat-pill").forEach(function(p) {
    p.classList.remove("active");
    p.style.background = "#fff";
    p.style.color = "#555";
    p.style.borderColor = "#ccc";
  });
  var el = document.getElementById("cat-" + cat);
  if (el) {
    el.classList.add("active");
    var color = cat === "all" ? "#555" : (CAT_COLORS[cat] || "#555");
    el.style.background = color;
    el.style.color = "#fff";
    el.style.borderColor = color;
  }
}

function renderCards() {
  var container = document.getElementById("cards-container");
  var filtered = ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) >= 0;
    var catOk = activeCat === "all" || item.cat === activeCat;
    var urgOk = activeUrg === "all" ||
      (activeUrg === "act-now" && item.urgency === "act-now") ||
      (activeUrg === "deep" && item.urgency === "deep") ||
      (activeUrg === "watch" && item.urgency === "watch");
    return catOk && urgOk;
  });

  var html = "";
  filtered.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || "#999";
    var urgEmoji = item.urgency === "act-now" ? "🔴" : (item.urgency === "deep" ? "🔵" : "🟡");
    var chartIcon = (item.charts && item.charts.count > 0) ? (item.charts.hot ? " 🔥" : " 📊") : "";

    var angleStyle = "border-left:3px solid " + color + ";background:" + color + "18;";

    var chartsHtml = "";
    if (item.charts && item.charts.count > 0) {
      var cls = item.charts.hot ? "charts-note hot" : "charts-note";
      chartsHtml = "<div class='" + cls + "'>" + (item.charts.hot ? "🔥 " : "📊 ") + item.charts.desc + "</div>";
    }

    html += "<div class='card' id='card-" + item.id + "'>";
    html += "<div class='card-header' onclick='toggleCard(" + item.id + ")'>";
    html += "<span class='item-num'>" + String(item.id).padStart(2, "0") + "</span>";
    html += "<span class='urgency-badge'>" + urgEmoji + "</span>";
    html += "<span class='source-badge' style='background:" + color + "'>" + item.cat + "</span>";
    html += "<span class='card-title'>" + chartIcon + " " + item.title + "</span>";
    html += "<span class='expand-icon' id='icon-" + item.id + "'>▼</span>";
    html += "</div>";
    html += "<div class='card-body' id='body-" + item.id + "'>";
    html += "<div class='section-title'>The Idea</div>";
    html += "<div class='idea-text'>" + item.idea + "</div>";
    html += "<div class='section-title'>My Angle</div>";
    html += "<div class='angle-block' style='" + angleStyle + "'>" + item.angle + "</div>";
    html += "<div class='tweets'>";
    html += "<div class='tweet-box'>";
    html += "<div class='tweet-label a'>TWEET A</div>";
    html += "<div class='tweet-text'>" + item.tweetA + "</div>";
    html += "<button class='copy-btn' onclick='copyTweet(" + item.id + ",\"a\")'>&#x1F4CB; Copy</button>";
    html += "</div>";
    html += "<div class='tweet-box'>";
    html += "<div class='tweet-label b'>TWEET B</div>";
    html += "<div class='tweet-text'>" + item.tweetB + "</div>";
    html += "<button class='copy-btn' onclick='copyTweet(" + item.id + ",\"b\")'>&#x1F4CB; Copy</button>";
    html += "</div>";
    html += "</div>";
    if (chartsHtml) html += chartsHtml;
    html += "<div style='margin-top:8px'><a class='article-link' href='" + item.link + "' target='_blank'>↗ Read full article</a></div>";
    html += "<div style='font-size:11px;color:#aaa;margin-top:6px'>Source: " + item.source + "</div>";
    html += "</div>";
    html += "</div>";
  });

  if (filtered.length === 0) {
    html = "<div style='padding:20px;color:#999;text-align:center;font-size:14px'>No items match this filter.</div>";
  }
  container.innerHTML = html;
}

function buildFilters() {
  // Category counts
  var catCounts = { all: ITEMS.length };
  ITEMS.forEach(function(item) {
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
  });
  var cats = Object.keys(catCounts).filter(function(c) { return c !== "all"; }).sort();

  var catHtml = "<div class='pill cat-pill active' id='cat-all' style='background:#555;color:#fff;border-color:#555' onclick='setCatFilter(\"all\")'>" +
    "All <span class='cnt'>" + ITEMS.length + "</span></div>";
  cats.forEach(function(cat) {
    var color = CAT_COLORS[cat] || "#999";
    catHtml += "<div class='pill cat-pill' id='cat-" + cat + "' style='border-color:" + color + ";color:" + color + "' onclick='setCatFilter(\"" + cat + "\")'>" +
      cat + " <span class='cnt'>" + catCounts[cat] + "</span></div>";
  });
  document.getElementById("cat-filters").innerHTML = catHtml;

  // Urgency counts
  var urgCounts = { "act-now": 0, deep: 0, watch: 0 };
  ITEMS.forEach(function(item) { urgCounts[item.urgency]++; });

  var urgHtml = "<div class='pill urg-pill active' id='urg-all' style='background:#555;color:#fff;border-color:#555' onclick='setUrgFilter(\"all\")'>" +
    "All <span class='cnt'>" + ITEMS.length + "</span></div>";
  urgHtml += "<div class='pill urg-pill' id='urg-act-now' onclick='setUrgFilter(\"act-now\")'>🔴 Act Now <span class='cnt'>" + urgCounts["act-now"] + "</span></div>";
  urgHtml += "<div class='pill urg-pill' id='urg-deep' onclick='setUrgFilter(\"deep\")'>🔵 Deep <span class='cnt'>" + urgCounts["deep"] + "</span></div>";
  urgHtml += "<div class='pill urg-pill' id='urg-watch' onclick='setUrgFilter(\"watch\")'>🟡 Watch <span class='cnt'>" + urgCounts["watch"] + "</span></div>";
  document.getElementById("urg-filters").innerHTML = urgHtml;
}

function buildReport() {
  var html = "<div class='window-note'>Window: " + META.windowStart + " to " + META.windowEnd +
    " &nbsp;|&nbsp; Emails in window: " + META.emailsInWindow +
    " &nbsp;|&nbsp; Emails read: " + META.emailsRead +
    " &nbsp;|&nbsp; Items extracted: " + META.itemsExtracted + "</div>";

  html += "<strong>Included Sources</strong><br>";
  META.includedSources.forEach(function(s) {
    html += "<span class='src-link' onclick='filterBySrc(\"" + s.name.split("/")[0].trim() + "\")'>" + s.name + "</span>";
    html += " &mdash; " + s.items + " item" + (s.items !== 1 ? "s" : "") + "<br>";
  });

  html += "<br><strong>Skipped</strong><br>";
  META.skippedSources.forEach(function(s) {
    html += "<span style='color:#888'>" + s.name + "</span> &mdash; <em>" + s.reason + "</em><br>";
  });

  document.getElementById("report-body").innerHTML = html;
}

function init() {
  document.getElementById("meta-line").textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.includedSources.length + " sources";
  buildFilters();
  buildReport();
  renderCards();
}

window.onload = init;
</script>
</body>
</html>
