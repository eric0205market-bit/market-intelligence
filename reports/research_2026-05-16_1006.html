function badgeClass(cat){
  var m = {macro:"badge-macro",energy:"badge-energy",geopolitics:"badge-geopolitics","AI/infra":"badge-aiinfra",crypto:"badge-crypto",positioning:"badge-positioning",regulation:"badge-regulation",credit:"badge-credit"};

function copyTweet(itemId, which){
  var item = ITEMS.find(function(i){return i.id===itemId;});
  var text = which==="a"?item.tweetA:item.tweetB;
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = "✓ Copied";
  setTimeout(function(){btn.textContent="📋 Copy";},1500);
}

function toggleCard(id){
  var el = document.getElementById("card-"+id);
  if(el) el.classList.toggle("open");
}

function toggleReport(){
  document.getElementById("reportWrap").classList.toggle("open");
}

function filterBySrc(name){
  srcFilter = name;
  catFilter = "all";
  urgFilter = "all";
  renderFilters();
  renderCards();
}

function renderFilters(){
  var cats = {all:0};
  var urgs = {all:0, red:0, blue:0, yellow:0};
  ITEMS.forEach(function(it){
    cats[it.cat] = (cats[it.cat]||0)+1;
    cats.all++;
    urgs[it.urgency] = (urgs[it.urgency]||0)+1;
    urgs.all++;
  });

  var catRow = document.getElementById("catRow");
  catRow.innerHTML = "";
  ["all"].concat(Object.keys(cats).filter(function(k){return k!=="all";})).forEach(function(k){
    var p = document.createElement("span");
    p.className = "pill"+(catFilter===k&&!srcFilter?" active":"");
    p.setAttribute("data-v",k);
    p.textContent = (k==="all"?"All":k)+" ("+cats[k]+")";
    p.onclick = function(){catFilter=k;srcFilter=null;renderFilters();renderCards();};
    catRow.appendChild(p);
  });

  var urgRow = document.getElementById("urgRow");
  urgRow.innerHTML = "";
  [{v:"all",label:"All"},{v:"red",label:"🔴 Act Now"},{v:"blue",label:"🔵 Deep"},{v:"yellow",label:"🟡 Watch"}].forEach(function(u){
    var p = document.createElement("span");
    p.className = "urgency-pill"+(urgFilter===u.v&&!srcFilter?" active":"");
    p.setAttribute("data-v",u.v);
    p.textContent = u.label+" ("+(u.v==="all"?urgs.all:urgs[u.v])+")";
    p.onclick = function(){urgFilter=u.v;srcFilter=null;renderFilters();renderCards();};
    urgRow.appendChild(p);
  });
}

  ITEMS.forEach(function(item){

    if(srcFilter){
      show = item.source.indexOf(srcFilter)>=0;
    } else {
      if(catFilter!=="all" && item.cat!==catFilter) show=false;
      if(urgFilter!=="all" && item.urgency!==urgFilter) show=false;
    }
    var div = document.createElement("div");
    div.className = "card"+(srcFilter&&show?" open":"");
    div.id = "card-"+item.id;
    if(!show) div.classList.add("hidden");

    var urg = item.urgency==="red"?"🔴":item.urgency==="blue"?"🔵":"🟡";
    var col = CAT_COLORS[item.cat]||"#999";
    var angleStyle = "border-left:2px solid "+col+";background:"+col+"18;";

    div.innerHTML =

        '<span class="item-num">'+item.id+'</span>'+
        '<span>'+urg+'</span>'+
