<!DOCTYPE html>

<title>Twitter Alpha Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #1a8cd8;
  --red: #d94052;
  --yellow: #fff5b3;
  --yellow-border: #f0d966;

  /* category colors (per spec) */
  --cat-macro: #2563eb;        /* blue */
  --cat-crypto: #8b5cf6;       /* purple */
  --cat-energy: #dc2626;       /* red */
  --cat-tech: #0d9488;         /* teal */
  --cat-ai: #4f46e5;           /* indigo */
  --cat-geopolitics: #dc2626;  /* red */
  --cat-positioning: #15803d;  /* green */
  --cat-regulation: #7c3aed;   /* purple */
  --cat-society: #d97706;      /* amber */
  --cat-em: #059669;           /* green */
  --cat-default: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* FILTER BAR */
.filter-bar { display: none; background: var(--yellow); border: 1px solid var(--yellow-border);
              border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
              align-items: center; gap: 10px; font-size: 13px; }
.filter-bar.active { display: flex; }
.filter-bar button { font-family: inherit; font-size: 12px; background: transparent;
                     border: 1px solid var(--text); padding: 3px 10px; border-radius: 4px;
                     cursor: pointer; }
.filter-bar button:hover { background: rgba(0,0,0,0.05); }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border);
           border-left: 4px solid var(--red); border-radius: 6px;
           padding: 16px 18px; margin-bottom: 20px; }
.summary p { margin-bottom: 8px; }
.summary p:last-child { margin-bottom: 0; }
.summary strong { font-weight: 600; }

/* SECTIONS */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
                  color: var(--text-3); min-width: 18px; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 6px 0; }
.section.open .section-body { display: block; }

/* CLUSTER (Section A) */
.cluster { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
.cluster:last-child { border-bottom: none; }
.cluster-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
                flex-wrap: wrap; }
.cluster-title { font-weight: 600; font-size: 14px; }
.cluster-desc { color: var(--text-2); font-size: 13px; margin: 0 0 10px 0; }
.cluster-items { display: flex; flex-direction: column; gap: 8px; padding-left: 10px;
                 border-left: 2px solid var(--border-light); }
.cluster-item { font-size: 13px; padding: 6px 8px; border-radius: 4px; }
.cluster-item .item-text { font-size: 13px; margin-top: 4px; }
.cluster-item .item-head { font-size: 12px; }

/* ITEM CARDS (Sections B/C/D) */
.item-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 6px; padding: 12px 14px; margin: 10px 16px; }
.item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
             flex-wrap: wrap; }
.item-author { font-weight: 600; color: var(--accent); cursor: pointer; }
.item-author:hover { text-decoration: underline; }
.item-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); }
.item-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--accent); text-decoration: none; }
.item-link:hover { text-decoration: underline; }
.item-text { font-size: 13.5px; line-height: 1.6; color: var(--text);
             white-space: pre-wrap; word-wrap: break-word; }
.item-thread { display: inline-block; font-size: 10px; font-weight: 600;
               background: var(--border); color: var(--text-2); padding: 1px 6px;
               border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* CONTRARIAN (Section C) — red left border + soft red bg */
.section-contrarian .item-card {
  border-left: 4px solid var(--red);
  background: #fdf6f7;
}

/* CATEGORY PILLS */
.pill { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
        font-weight: 500; padding: 2px 7px; border-radius: 3px; color: #fff;
        text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

/* IMAGES */
.thumbs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.thumb { height: 100px; border: 1px solid var(--border); border-radius: 4px;
         cursor: zoom-in; background: #f0ede4; }

/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
            align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 92vh;
                box-shadow: 0 8px 40px rgba(0,0,0,.6); }

/* LINKS (Section E) */
.link-row { padding: 8px 16px; border-bottom: 1px solid var(--border-light);
            font-size: 13px; display: flex; gap: 12px; align-items: baseline; }
.link-row:last-child { border-bottom: none; }
.link-author { color: var(--text-3); min-width: 110px; cursor: pointer; }
.link-author:hover { color: var(--accent); }
.link-url { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
            color: var(--accent); text-decoration: none; word-break: break-all; flex: 1; }
.link-url:hover { text-decoration: underline; }
.link-desc { color: var(--text-2); font-size: 12px; }

/* AUTHOR FILTER STATES */
.filterable.match { background: var(--yellow); border-color: var(--yellow-border); }
.section-contrarian .item-card.filterable.match { background: var(--yellow); }
.filterable.dim { opacity: 0.25; }

/* STATS BAR */
.stats { margin-top: 24px; padding: 10px 14px; background: var(--surface);
         border: 1px solid var(--border); border-radius: 6px;
         font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
         color: var(--text-2); display: flex; gap: 18px; flex-wrap: wrap; }
.stats strong { color: var(--text); font-weight: 600; }

/* EMPTY */
.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .item-card { margin: 8px 10px; }
  .link-row { flex-direction: column; gap: 4px; }
  .link-author { min-width: 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>

<script>
const REPORT_DATA = {"report_type": "TWITTER ALPHA INTELLIGENCE", "collected_at": "2026-06-24T05:20:51Z", "date": "2026-06-24 · 05:20 UTC", "input_stats": {"total_tweets": 181, "unique_authors": 61, "tweets_with_images": 30, "after_noise_filter": 72}, "stats": {"received": 181, "after_filter": 72, "authors": 61, "coverage": 0.82}, "summary": "**Ethereum Foundation crisis** dominates crypto discussion: 40% budget cut, 54 layoffs, 8+ senior researcher departures, and a new rival non-profit \"Eth Labs\" backed by Bitmine, Joe Lubin, and major L2s. Two funding fix proposals are circulating — a validator staking tax (capped at 10%) vs. market-funded development — with thedefiedge arguing the tax is flawed and multiple independent foundations is net bullish for ETH.\n\n**MSTR/Saylor leverage** under fire: dampedspring notes every single MSTR share and preferred issuance over 2.5 years is underwater — 186M new shares + $15B preferred all losing money — while Evan_ss6 and others debate the commons vs. mNAV premium dynamic.\n\n**Oil / Hormuz recovery**: IEA data per Javier Blas shows UAE at 85% of pre-war export levels by early June (4.3M b/d vs. 1.9M b/d in March), helped by bypass pipeline, Fujairah storage, and dark Omani coastal shipping. China slashed crude imports 40% (4.6M b/d) Feb–May.\n\n**US Politics**: NY Democratic primaries swept 3/3 by Mamdani-backed socialists openly backing abolish-ICE, open borders, and eliminate private insurance. Novogratz flags voter apathy driving primary outcomes.\n\n**Claude Tag for Slack** (AI paradigm shift): karpathy calls it the 3rd major LLM UX redesign — Claude as a persistent, async, org-wide team member vs. a website or app. udiWertheimer amplifies: \"claude tag is massive\" and explains the multiplayer team-agent dynamic. cryptopunk7213 reveals 65% of Anthropic product code now written via Claude tagged in Slack channels.\n\n**Options/Macro**: SpotGamma flags QQQ left-tail skew repricing (8/21 expiry) — a qualitative shift from recent selloffs which were about call selling, now rates are driving the agenda. qthomp/Lekker Insights sees peak hawkishness opportunity in STIR complex.\n\n**Meme Stock**: WEN/Wendy's up 20% overnight from Reddit/$RDDT viral campaign — aleabitoreddit tracks the degen community attempting to save the fast food chain as a meme.\n\n**DeFi**: stacy_muur covers EF ETH ETF outflow risk, RWA DeFi usage (Mantle $91M, Arbitrum $46M, Base $36M), and a new Zama/Morpho Steakhouse Confidential USDC vault offering encrypted position privacy with auditable totals.", "events": [{"title": "UAE Oil Exports at 85% of Pre-War Levels: IEA June Data", "category": "energy", "description": "Javier Blas reports IEA data showing the Hormuz supply shock has significantly unwound via UAE bypass logistics and dark-fleet routing.", "items": [{"author": "JavierBlas", "text": "IEA reckons UAE reached ~85% of pre-war oil exports in early June (before the MoU was signed), thanks to a combination of bypass pipeline, Fujairah strategic storage, and dark SoH crossing along the Omani coastline. UAE total oil exports (crude + condensates) at 4.3M b/d in early June, up from 1.9M b/d in March.", "tweet_url": "https://x.com/JavierBlas/status/2069519539478368457", "images": ["https://pbs.twimg.com/media/HLhpDQBXYAAedIl.jpg"], "type": "tweet", "created_at": "2026-06-23T20:34:42.000Z"}, {"author": "JavierBlas", "text": "IEA: the Hormuz shock enabled China to slash crude oil imports by 40% — or 4.6 million barrels per day — between February and May, helping significantly to ease wider pressures in the global market. Full IEA commentary at iea.org.", "tweet_url": "https://x.com/JavierBlas/status/2069515439961477170", "images": [], "type": "tweet", "created_at": "2026-06-23T20:18:25.000Z"}]}, {"title": "Ethereum Foundation Crisis: 40% Budget Cut, Talent Exodus, Eth Labs Launch", "category": "crypto", "description": "thedefiedge published a comprehensive thread synthesizing the EF funding crisis, researcher departures, staker-tax proposal, and the rival Eth Labs non-profit launch.", "items": [{"author": "thedefiedge", "text": "Full thread: Ethereum has a funding crisis. The EF is cutting 40% of its budget (~54 employees) while top researchers walk out the door — Tomasz Stańczak left in February, Hsiao-Wei Wang (co-ED) resigned this month, 8+ senior departures in 2026. trent_vanepps warned of a \"slow-burning funding crisis within 3-9 months.\" Two solutions on the table: (1) Staker tax — if 51% of validators vote to redirect up to 10% of staking rewards, it becomes mandatory for all; winner-takes-all vote on recipient list. The logic: validators benefit from development, free-rider problem solved by mandatory trigger. The risks: the monetary premium problem (forced 10% dilution to a committee dents ETH store-of-value narrative) and concentration risk (Lido + Coinbase effectively decide, creating a political funding class). (2) Market-funded development: fede_intern argues forget the tax, let market participants self-fund clients. Enter Eth Labs — a new non-profit formed by ex-EF senior talent, backed by Bitmine, Sharplink (top 2 ETH treasury cos), Joe Lubin, Dragonfly, Electric Capital, megaETH, Base, Offchain, OP, Justin Drake, and Flashbots. thedefiedge is bullish: the tax won't ship (against ETH culture), and multiple independent foundations with independent funding is the most bullish thing to happen to Ethereum in a while — EF optimizes for 'sanctuary technology', Eth Labs optimizes to pump ETH.", "tweet_url": "https://x.com/thedefiedge/status/2069605774255657390", "images": [], "type": "thread", "created_at": "2026-06-24T02:17:22.000Z"}, {"author": "stacy_muur", "text": "This is a crisis for EF. First thing companies do in crisis is cut costs — EF reducing annual budget by ~40%, cutting ~54 employees. Explained as a shift from spending organization to long-term endowment model. Expecting more ETH ETF outflows as a result.", "tweet_url": "https://x.com/stacy_muur/status/2069645917066850398", "images": [], "type": "tweet", "created_at": "2026-06-24T04:56:53.000Z"}, {"author": "stonecoldpat0", "text": "Reacting to EF researcher departures: glad former EF contributors found their next steps, noting the community concern about whether people are fighting for titles at the EF and the talent drain dynamic.", "tweet_url": "https://x.com/stonecoldpat0/status/2069453910000000000", "images": [], "type": "tweet", "created_at": "2026-06-24T04:00:00.000Z"}]}, {"title": "NY Democratic Primary: Mamdani-Backed Socialists Win 3/3", "category": "society", "description": "Geiger_Capital and novogratz react to socialist sweep of NY Democratic primaries, flagging implications for the national party direction.", "items": [{"author": "Geiger_Capital", "text": "Mamdani-backed socialists went 3/3 in tonight's New York Democratic primaries. They openly called for: citizenship + voting rights for all illegals, abolish ICE, eliminate private health insurance, pack the Supreme Court. \"This is the new Democratic party.\"", "tweet_url": "https://x.com/Geiger_Capital/status/2069616313211748505", "images": ["https://pbs.twimg.com/media/HLjBEZuXUAEvKd2.jpg"], "type": "tweet", "created_at": "2026-06-24T02:59:15.000Z"}, {"author": "Geiger_Capital", "text": "Three connected tweets: \"The dam officially broke tonight\" — Congress will be filled with open socialists. Trump spent a decade calling Democrats 'open-border socialists', only for that description to now literally define the winning primary faction. England is 99.9% white in 1950 cultural-identity framing offered as parallel cultural shift context.", "tweet_url": "https://x.com/Geiger_Capital/status/2069617799220093152", "images": [], "type": "tweet", "created_at": "2026-06-24T03:10:00.000Z"}, {"author": "novogratz", "text": "It's primary day in NY. Sad that almost no one knew — candidates get chosen by a tiny few. Should move all primaries to the same day to generate noise like Election Day.", "tweet_url": "https://x.com/novogratz/status/2069531542909526123", "images": [], "type": "tweet", "created_at": "2026-06-23T19:37:22.000Z"}]}, {"title": "Claude Tag for Slack: 3rd LLM UX Paradigm Shift", "category": "ai", "description": "Andrej Karpathy and udiWertheimer both react to Anthropic's Claude Tag for Slack launch, debating whether it's a genuine architectural shift or just a better Slack bot.", "items": [{"author": "karpathy", "text": "Claude Tag for Slack is the 3rd major redesign of LLM UX. The first paradigm: LLM as a website you go to. Second: an app you download. Third: a self-contained, persistent, asynchronous entity with org-wide tools and context, working alongside teams of humans. This is closer to Claude actually joining the team — it can be talked to like a person, helps with a large variety of workloads, and is deeply integrated, multiplayer. At Anthropic, Claude is writing the majority of code and everyone starts to feel like a manager. \"I work from Slack now.\" The key engineering work underneath: cross-tool integrations, compute environments, memory, security. Not LLM Q&A with RAG over Slack — a different way of working entirely.", "tweet_url": "https://x.com/karpathy/status/2069547676849557725", "images": [], "type": "thread", "created_at": "2026-06-23T22:26:31.000Z"}, {"author": "udiWertheimer", "text": "Claude tag is massive — and the AI influencers aren't tweeting about it because they're unemployed and can't use it. \"Oh great a Slack bot\" misses the point: it's Claude as a shared team member that all teammates interact with. Example: designer says 'make the button green', engineer intervenes 'wait for the previous deployment', Claude waits and does it later. The multiplayer, persistent, context-sharing aspect is the differentiator vs. isolated per-user agents. Disagrees with Karpathy rarely, but this is one of those times karpathy is clearly right.", "tweet_url": "https://x.com/udiWertheimer/status/2069595628229771316", "images": [], "type": "thread", "created_at": "2026-06-24T01:37:03.000Z"}, {"author": "cryptopunk7213", "text": "65% of product code at Anthropic is now written by tagging Claude in group chats of staff discussing what they want to build. Gone are the days of long product docs — you can go from Slack discussion to production-ready feature. Claude Code is barely 1+ years old.", "tweet_url": "https://x.com/cryptopunk7213/status/2069472695662629125", "images": [], "type": "tweet", "created_at": "2026-06-23T17:28:34.000Z"}]}, {"title": "MSTR: All $15B Preferred + 186M New Shares Are Underwater", "category": "crypto", "description": "dampedspring and Evan_ss6 debate MSTR capital structure deterioration — every share and preferred instrument issued over 2.5 years has lost money.", "items": [{"author": "dampedspring", "text": "Over the last 2.5 years, Saylor and MSTR has more than doubled share count, issuing 186M shares and issued $15B of preferred. Every single share sold and preferred share sold is underwater. Buyers have lost money on every single purchase. If BTC fell 33% and MNAV went to just 0.9x, the stock would be at $35 — not worthless but much much lower. Dead cat bounce in Korean?", "tweet_url": "https://x.com/dampedspring/status/2069555417634533641", "images": [], "type": "thread", "created_at": "2026-06-23T22:57:16.000Z"}, {"author": "Evan_ss6", "text": "Multi-tweet thread engaging on MSTR: the 'commons and any remaining mNAV premium' are likely what's left to lose. Pushes back on the Ponzi framing but acknowledges the structural risk. Notes 15% (referencing some ratio) is 'crisis levels.' MSTR has so far outperformed BTC over the cycle even if buying the top of a levered bet is worse than buying the underlying.", "tweet_url": "https://x.com/Evan_ss6/status/2069530938946601394", "images": [], "type": "thread", "created_at": "2026-06-23T21:00:00.000Z"}]}, {"title": "WEN/Wendy's +20% Overnight: Reddit Meme Campaign", "category": "macro", "description": "Reddit/r/WallStreetBets community starting viral campaign to 'save Wendy's' — stock up 20% overnight on pure meme momentum.", "items": [{"author": "aleabitoreddit", "text": "Degens on $RDDT are starting a viral campaign to save Wendy's ($WEN), the US fast food chain. Stock is now up 20% overnight. Background: Wendy's is a popular community meme — 'working behind the dumpster after portfolios go to 0 from 0DTE options.' Author has no positions but finds it amusing and wonders if it will work. Notes meme stocks are hard to trade with conviction since they rely on others buying as a joke vs. structural AI chokepoints which hold value and benefit from hyperscaler capex.", "tweet_url": "https://x.com/aleabitoreddit/status/2069633445903675865", "images": ["https://pbs.twimg.com/media/HLjQo4XbYAAzjCm.jpg", "https://pbs.twimg.com/media/HLjQo44XAAAY8-k.jpg"], "type": "tweet", "created_at": "2026-06-24T04:07:20.000Z"}]}, {"title": "GameStop CEO Ryan Cohen: $56B Bid for eBay, Activist Vision", "category": "macro", "description": "All-In Pod interview with Ryan Cohen on running GME, the $56B eBay bid, competitive strategy vs. Amazon, and three-part eBay transformation plan.", "items": [{"author": "theallinpod", "text": "All-In Interview: Friedberg sits with Ryan Cohen to discuss running $GME and his $56B offer for $EBAY. Topics: building and selling Chewy for $3.35B; how to compete with Amazon in e-commerce; activist investing and road to GameStop CEO; what he sees in eBay (massive potential, poor execution, slow growth, rising expenses, seller relationship failure); Ryan's three-part vision: cut costs, expand live commerce, create digital in-game collectible marketplace. eBay has rejected the offer. Cohen discusses media bias against GameStop.", "tweet_url": "https://x.com/theallinpod/status/2069531542909526123", "images": [], "type": "tweet", "created_at": "2026-06-23T21:22:24.000Z"}]}], "insights": [{"author": "stacy_muur", "text": "DeFi privacy is solving the wrong problem. It shouldn't be fully public, but it also needs to be verifiable. Users need privacy — but everyone else still needs to know the vault is solvent. The Zama/Steakhouse Confidential Prime USDC vault on Morpho is the right design: individual positions encrypted, vault totals auditable onchain. Deposit USDC or cUSDC → receive confidential shares → others see batch total but not your slice. Plus a 12-week yield boost on top of native yield. This is what private DeFi yield should look like.", "tweet_url": "https://x.com/stacy_muur/status/2069523640639762874", "images": [], "type": "tweet", "category": "crypto", "created_at": "2026-06-23T20:51:00.000Z"}, {"author": "stacy_muur", "text": "Best way to measure a chain's RWA traction: how much of that capital is used in DeFi — not just tokenized assets sitting idle. Ethereum and Solana lead by wide margin. L2 race for RWA-in-DeFi: Mantle leads at $91M, Arbitrum $46M, Base $36M. Mantle's $2.1B treasury helps seed liquidity. Better to have $90M working in DeFi than $10B parked in a treasury fund.", "tweet_url": "https://x.com/stacy_muur/status/2069496467581206717", "images": ["https://pbs.twimg.com/media/HLhUEgBbEAErUMw.jpg"], "type": "tweet", "category": "crypto", "created_at": "2026-06-23T19:03:01.000Z"}, {"author": "cryptopunk7213", "text": "\"ChatGPT moment for biology\": new AI-powered programming language built on 120 tools (including AlphaFold 3) lets you engineer proteins, DNA, or RNA in plain English. System simulates gene evolution through 4 primitives: sequence → rate → mutate → loop. Achieved 32% success rate on DNA design (3.5x better than standard). Potentially enables a novel AI-discovered gene editing therapy by end of year.", "tweet_url": "https://x.com/cryptopunk7213/status/2069625256562540575", "images": ["https://pbs.twimg.com/media/HLjJMleW8AAR0er.jpg"], "type": "tweet", "category": "tech", "created_at": "2026-06-24T03:34:47.000Z"}, {"author": "cryptopunk7213", "text": "Claude Sonnet 5 expected to drop this week after GPT-5.6 delay — would be a strong signal Anthropic has built a self-improving model loop with rapid model releases. Models building the next version of themselves with minimal human involvement. Mythos (presumably a model release) has set a new standard; Google delayed its next major model upgrade to figure out how to catch up. Talent consolidating to OpenAI and Anthropic — including top economists joining from academia.", "tweet_url": "https://x.com/cryptopunk7213/status/2069500561439744389", "images": [], "type": "thread", "category": "ai", "created_at": "2026-06-23T19:19:17.000Z"}, {"author": "buccocapital", "text": "Already watching executives have to hire back roles they fired because 'AI could do this job.' Zero remorse or reflection — just 'ah, figured I'd give it a shot.' Think we'll see a lot of this. The two-way door applies: AI replacing workers is reversible, but the human cost is real. Notes that support, QA, product documentation, and UX writing are harder to automate than executives assume.", "tweet_url": "https://x.com/buccocapital/status/2069595157742203283", "images": [], "type": "tweet", "category": "ai", "created_at": "2026-06-24T01:35:11.000Z"}, {"author": "ZeeContrarian1", "text": "Bitcoin Succeeded. BTC was the first asset to give a generation asymmetric upside — but once owned by institutions, ETFs, pension funds, corporations, and governments, the upside naturally compresses. That's not failure — it's success. Long-term BTC returns may now look more like 10–15% annually vs. 10x. AI is creating hundreds of new 10x opportunities: data centers, chips, software, robotics, infrastructure — real businesses with real cash flows. Unlike Peter Schiff, believes BTC is here to stay. Unlike Saylor, doesn't see 30% annualized returns continuing indefinitely. $120K–$150K possible in a few years. Bitcoin opened the door; now a new generation is walking through different ones.", "tweet_url": "https://x.com/ZeeContrarian1/status/2069603790299246654", "images": ["https://pbs.twimg.com/media/HLi1rUMWMAAhH-Y.jpg"], "type": "tweet", "category": "crypto", "created_at": "2026-06-24T02:09:29.000Z"}, {"author": "Melt_Dem", "text": "Never seen so many companies and funds raising going into deep summer — absolutely manic out there. Also researching industrial sensing: opportunity to ingest physical signal (lots + cheap + ubiquitous) → generate industrial data → underwrite new financial instruments. Looking for research on sensing modalities, companies, novel financing structures.", "tweet_url": "https://x.com/Melt_Dem/status/2069504705300000000", "images": [], "type": "tweet", "category": "macro", "created_at": "2026-06-23T18:57:25.000Z"}, {"author": "RayDalio", "text": "At 76, main focus for next 24 months is passing along what he has that could benefit others: wrote about mechanics of debt, still playing the investment game for his family office, building a platform so everybody can do that sort of thing. Personally focused on family, grandkids, and savoring life.", "tweet_url": "https://x.com/RayDalio/status/2069557000000000000", "images": [], "type": "tweet", "category": "macro", "created_at": "2026-06-23T22:38:34.000Z"}, {"author": "Delphi_Digital", "text": "Two podcast clips: (1) VC Sandy Kory — hiring quality can make or break startups: 'It's theoretically possible to go from 20 to 60 people in a year and keep a high bar but it's unlikely.' (2) Jose on AI vs dot-com bubble: dot-com leaders (Cisco 120x earnings, Oracle 150x) vs. Nvidia today at 47% free cash flow margins — the fundamentals are categorically different this cycle.", "tweet_url": "https://x.com/Delphi_Digital/status/2069525718418268490", "images": [], "type": "tweet", "category": "tech", "created_at": "2026-06-23T20:59:15.000Z"}, {"author": "dgt10011", "text": "Interesting regulatory question: if CLARITY (crypto regulatory bill) fails to pass, is that ultimately bullish or bearish for CME Group? CME benefits from regulatory ambiguity driving institutional futures flow vs. sp chijs/status/2069646000000000000", "images": [], "type": "tweet", "category": "ai", "created_at": "2026-06-24T04:46:02.000Z"}], "contrarian": [{"author": "dampedspring", "text": "MSTR bear case crystallized: over 2.5 years, share count more than doubled (186M new shares issued) + $15B preferred — and EVERY single instrument sold is underwater. Buyers have lost money on every single purchase. If BTC drops 33% and MNAV compresses to 0.9x, stock goes to $35. The leverage machine has only destroyed capital for outside investors since its inception.", "tweet_url": "https://x.com/dampedspring/status/2069555417634533641", "images": [], "type": "thread", "category": "crypto", "created_at": "2026-06-23T22:57:16.000Z"}, {"author": "marcvanderchijs", "text": "Open-source models near frontier parity could be the AI bubble pin. The AI bull case depends on proprietary model moats. Locally-run models reaching near-parity earlier than expected undermines subscription and API revenue models for OpenAI/Anthropic. The future may belong to open-source.", "tweet_url": "https://x.com/marcvanderchijs/status/2069646000000000000", "images": [], "type": "tweet", "category": "ai", "created_at": "2026-06-24T04:46:02.000Z"}, {"author": "ZeeContrarian1", "text": "Against the infinite Bitcoin bull: BTC returns will compress to 10–15% annually as institutional adoption completes the 'success' phase. The asymmetric era is over — AI infrastructure is the new 10x opportunity for the next generation of risk-takers. Pushes back on both Schiff (too bearish) and Saylor (too bullish).", "tweet_url": "https://x.com/ZeeContrarian1/status/2069603790299246654", "images": ["https://pbs.twimg.com/media/HLi1rUMWMAAhH-Y.jpg"], "type": "tweet", "category": "crypto", "created_at": "2026-06-24T02:09:29.000Z"}, {"author": "Pentosh1", "text": "If SPX goes below 7300, Trump will likely announce another peace deal. Tom Lee doesn't actually care about ETH or shareholders — he cares about getting paid and has always been a marketer, not an analyst. Both views skeptical of popular market narratives.", "tweet_url": "https://x.com/Pentosh1/status/2069546385100128440", "images": [], "type": "tweet", "category": "macro", "created_at": "2026-06-23T22:21:23.000Z"}, {"author": "thedefivillain", "text": "Short $WLD even after it reached new highs at $0.7 — doubts it can sustain. The real confirmation of weakness would be a lower high. Also: MSTR has technically outperformed BTC over the cycle so far, even if buyers at the top are down more than BTC buyers at the top. The levered bet has been the right trade — but that doesn't mean it will continue.", "tweet_url": "https://x.com/thedefivillain/status/2069529550086644046", "images": ["https://pbs.twimg.com/media/HLhwcCYXEAEbGd6.jpg"], "type": "tweet", "category": "crypto", "created_at": "2026-06-23T21:14:29.000Z"}, {"author": "kaiynne", "text": "sUSD / Synthetix defense: A stablecoin backed by endogenous collateral only works if the collateral has value, and SNX's value comes from protocol revenue. sUSD lasted a decade — longer than 99% of everything in crypto. Its failure was not in the design but in the collateral (SNX). If SNX started working again, the peg would return — probably only takes $2 SNX. Design criticism misidentifies the collateral failure as a stablecoin design flaw.", "tweet_url": "https://x.com/kaiynne/status/2069556634624688468", "images": [], "type": "thread", "category": "crypto", "created_at": "2026-06-23T23:02:06.000Z"}], "positioning": [{"author": "spotgamma", "text": "QQQ skew repricing specifically for the left tail — visible in 8/21 expiry skew, week-over-week. This is different from recent selloffs which were more about call selling (right-tail compression). Growing focus on rates now, something AI bros won't tell you. The market is starting to price downside tail risk more aggressively in Nasdaq options.", "tweet_url": "https://x.com/spotgamma/status/2069513727980789846", "images": ["https://pbs.twimg.com/media/HLhjTuXWgAAzEX9.jpg"], "type": "tweet", "category": "positioning", "created_at": "2026-06-23T20:11:37.000Z"}, {"author": "qthomp", "text": "Lekker Insights: The Case for Peak Hawkishness. After months stalking the STIR complex, now believe there is a swing opportunity ahead. Piece aggregates the thesis and trade structure — betting on rate expectations peaking and the STIR complex repricing toward cuts.", "tweet_url": "https://x.com/qthomp/status/2069484380826059179", "images": [], "type": "tweet", "category": "macro", "created_at": "2026-06-23T18:15:00.000Z"}, {"author": "MelMattison1", "text": "Micron ($MU) up ~750% over the past year, up ~3% over the last week (closed $1,020 last Tuesday, $1,050+ today, ~5% above 20 DMA). Bearish headline emerging already despite the strong run — classic 'love headers like these' contrarian setup. Also flagging a speculative options play for MU earnings.", "tweet_url": "https://x.com/MelMattison1/status/2069588106517573952", "images": ["https://pbs.twimg.com/media/HLinL_7a8AA-RcM.jpg"], "type": "tweet", "category": "positioning", "created_at": "2026-06-24T01:07:10.000Z"}, {"author": "Chartfest1", "text": "TA lesson on island reversals: CCL has a potential island pattern IF today's gap doesn't fill. Same rule applies to MU (Micron) — if 1150 is recaptured, no island; if the gap stays open, it is. TXN also flagged as going 'off the top' yesterday. Approximately 4.5B of Nasdaq's ~10B daily volume is in two penny stocks — last seen at this level in October. Classic speculation gauge, not sentiment.", "tweet_url": "https://x.com/Chartfest1/status/2069467420683579650", "images": ["https://pbs.twimg.com/media/HLg5paIXsAAfnb5.png", "https://pbs.twimg.com/media/HLhE6VeawAE8sBC.png"], "type": "thread", "category": "positioning", "created_at": "2026-06-23T17:07:36.000Z"}, {"author": "Fullcarry", "text": "Juicy pickup flagged: SPCX 20y +165, 30y +175 spreads. Also noting the fog-of-MOU (Memorandum of Understanding, presumably Iran/Gulf related // ---------- helpers ----------
const CAT_VARS = {
  macro: 'var(--cat-macro)',
  crypto: 'var(--cat-crypto)',
  energy: 'var(--cat-energy)',
  tech: 'var(--cat-tech)',
  ai: 'var(--cat-ai)',
  'ai/infra': 'var(--cat-ai)',
  geopolitics: 'var(--cat-geopolitics)',
  positioning: 'var(--cat-positioning)',
  regulation: 'var(--cat-regulation)',
  society: 'var(--cat-society)',
  em: 'var(--cat-em)',
};
function catColor(cat) {
  if (!cat) return 'var(--cat-default)';
  return CAT_VARS[String(cat).toLowerCase()] || 'var(--cat-default)';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function renderBold(text) {
  return escapeHtml(text).replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function relativeTime(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const secs = Math.max(0, (Date.now() - dt.getTime()) / 1000);
  if (secs < 60)   return Math.floor(secs) + 's ago';
  const mins = secs / 60;
  if (mins < 60)   return Math.floor(mins) + 'm ago';
  const hrs  = mins / 60;
  if (hrs < 48)    return Math.floor(hrs) + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function pill(cat) {
  if (!cat) return '';
  return `<span class="pill" style="background:${catColor(cat)}">${escapeHtml(cat)}</span>`;
}

function authorTag(name, cls = 'item-author') {
  if (!name) return '';
  return `<span class="${cls}" onclick="filterAuthor('${escapeAttr(name)}')">@${escapeHtml(name)}</span>`;
}

// ---------- rendering ----------
function renderThumbs(images) {
  if (!images || !images.length) return '';
  return `<div class="thumbs">` + images.map(u =>
    `<img src="${escapeAttr(u)}" class="thumb" loading="lazy" alt="" onclick="openLightbox('${escapeAttr(u)}')">`
  ).join('') + `</div>`;
}

function renderItem(item) {
  const author = item.author || item.author_username || '';
  const time = relativeTime(item.created_at);
  const thread = item.is_thread ? '<span class="item-thread">thread</span>' : '';
  const link = item.tweet_url
    ? `<a class="item-link" href="${escapeAttr(item.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="item-card filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${pill(item.category)}
        ${authorTag(author)}
        ${thread}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(item.text || '')}</div>
      ${renderThumbs(item.images)}
    </div>`;
}

function renderClusterItem(it) {
  const author = it.author || it.author_username || '';
  const time = relativeTime(it.created_at);
  const link = it.tweet_url
    ? `<a class="item-link" href="${escapeAttr(it.tweet_url)}" target="_blank" rel="noopener">tweet →</a>`
    : '';
  return `
    <div class="cluster-item filterable" data-author="${escapeAttr(author).toLowerCase()}">
      <div class="item-head">
        ${authorTag(author)}
        ${time ? `<span class="item-time">${time}</span>` : ''}
        ${link}
      </div>
      <div class="item-text">${escapeHtml(it.text || '')}</div>
      ${renderThumbs(it.images)}
    </div>`;
}

function renderCluster(cluster) {
  const itemsHtml = (cluster.items || []).map(renderClusterItem).join('');
  return `
    <div class="cluster">
      <div class="cluster-head">
        ${pill(cluster.category)}
        <div class="cluster-title">${escapeHtml(cluster.title || '')}</div>
      </div>
      ${cluster.description ? `<div class="cluster-desc">${escapeHtml(cluster.description)}</div>` : ''}
      ${itemsHtml ? `<div class="cluster-items">${itemsHtml}</div>` : ''}
    </div>`;
}

function renderLink(l) {
  const author = l.author || l.author_username || '';
  const url = l.url || (l.resolved || l.tco) || '';
  return `
    <div class="link-row filterable" data-author="${escapeAttr(author).toLowerCase()}">
      ${author
        ? authorTag(author, 'link-author')
        : '<span class="link-author">—</span>'}
      <a class="link-url" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>
      ${l.description ? `<span class="link-desc">${escapeHtml(l.description)}</span>` : ''}
    </div>`;
}

function renderSection(letter, name, items, type) {
  if (!items || !items.length) return '';
  let body;
  if (type === 'events') {
    body = items.map(renderCluster).join('');
  } else if (type === 'links') {
    body = items.map(renderLink).join('');
  } else {
    body = items.map(renderItem).join('');
  }
  const cls = type === 'contrarian' ? 'section section-contrarian' : 'section';
  return `
    <div class="${cls}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-letter">${letter}.</span>
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderSummary(text) {
  if (!text) return '';
  const paragraphs = String(text).split(/\n\n+/).filter(Boolean)
    .map(p => `<p>${renderBold(p)}</p>`).join('');
  return `<div class="summary">${paragraphs}</div>`;
}

function renderStats(d) {
  const s = (d && d.stats) || d || {};
  const parts = [];
  if (s.received    != null) parts.push(`received <strong>${s.received}</strong>`);
  if (s.after_filter!= null) parts.push(`after filter <strong>${s.after_filter}</strong>`);
  if (s.authors     != null) parts.push(`authors <strong>${s.authors}</strong>`);
  if (s.coverage    != null) {
    const pct = (s.coverage <= 1 ? s.coverage * 100 : s.coverage);
    parts.push(`coverage <strong>${pct.toFixed(0)}%</strong>`);
  }
  return parts.join(' | ');
}

// ---------- interactions ----------
function toggleSection(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function openLightbox(src) {
  const img = document.getElementById('lightbox-img');
  img.src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

let activeFilter = null;
function filterAuthor(name) {
  if (!name) return;
  activeFilter = String(name).toLowerCase();
  document.querySelectorAll('.filterable').forEach(el => {
    const a = (el.dataset.author || '').toLowerCase();
    if (a === activeFilter) {
      el.classList.add('match');
      el.classList.remove('dim');
    } else {
      el.classList.add('dim');
      el.classList.remove('match');
    }
  });
  document.getElementById('filter-name').textContent = '@' + name;
  document.getElementById('filter-bar').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearFilter() {
  activeFilter = null;
  document.querySelectorAll('.filterable').forEach(el => {
    el.classList.remove('match');
    el.classList.remove('dim');
  });
  document.getElementById('filter-bar').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (activeFilter) {
      clearFilter();
    }
  }
});

// ---------- main ----------
function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = d.date || '';
  const sections = [
    renderSummary(d.summary),
    renderSection('A', 'Events & Reactions',      d.events,                                'events'),
    renderSection('B', 'Alpha & Insights',        d.insights || d.alpha,                   'items'),
    renderSection('C', 'Contrarian Views',        d.contrarian,                            'contrarian'),
    renderSection('D', 'Positioning & Trade Ideas', d.positioning,                         'items'),
    renderSection('E', 'Link Queue',              d.links,                                 'links'),
  ].join('');
  const app = document.getElementById('app');
  app.innerHTML = sections || '<div class="empty">No report data.</div>';

  // Auto-open first two sections.
  document.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  document.getElementById('stats').innerHTML = renderStats(d);
}

renderReport(REPORT_DATA);
</script>
