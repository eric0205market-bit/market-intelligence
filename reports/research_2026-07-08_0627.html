const CAT_COLORS = {

  macro: "macro", credit: "credit", positioning: "positioning", aiinfra: "AI/infra",
  crypto: "crypto", geopolitics: "geopolitics", energy: "energy", tech: "tech",
  gold: "gold", culture: "culture", labor: "labor", regulation: "regulation",
  science: "science", venture: "venture"

const URG_LABELS = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URG_EMOJI = { act: "🔴", deep: "🔵", watch: "🟡" };

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id){
  var el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function filterBySrc(name){
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards(true);
}

function setCat(c){ activeCat = c; activeSrc = null; renderFilters(); renderCards(false); }
function setUrg(u){ activeUrg = u; activeSrc = null; renderFilters(); renderCards(false); }

function renderFilters(){
  var cats = {};
  ITEMS.forEach(function(i){ cats[i.cat] = (cats[i.cat]||0)+1; });
  var catHtml = '<span class="pill' + (activeCat==="all"?" active":"") + '" style="' + (activeCat==="all"?"background:#333;":"") + '" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</span>';
  Object.keys(cats).forEach(function(c){
    var isActive = activeCat === c;
    var color = CAT_COLORS[c] || "#999";
    var style = isActive ? ("background:" + color + ";border-color:" + color + ";") : ("color:" + color + ";border-color:" + color + ";");
    catHtml += '<span class="pill' + (isActive?" active":"") + '" style="' + style + '" onclick="setCat(\'' + c + '\')">' + esc(CAT_LABELS[c]) + ' (' + cats[c] + ')</span>';
  });
  document.getElementById('catFilter').innerHTML = catHtml;

  var urgs = {};
  ITEMS.forEach(function(i){ urgs[i.urgency] = (urgs[i.urgency]||0)+1; });
  var urgHtml = '<span class="pill' + (activeUrg==="all"?" active":"") + '" style="' + (activeUrg==="all"?"background:#333;":"") + '" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</span>';
  ["act","deep","watch"].forEach(function(u){
    if(!urgs[u]) return;
    var isActive = activeUrg === u;
    var style = isActive ? "background:#333;border-color:#333;" : "color:#333;";
    urgHtml += '<span class="pill' + (isActive?" active":"") + '" style="' + style + '" onclick="setUrg(\'' + u + '\')">' + URG_LABELS[u] + ' (' + urgs[u] + ')</span>';
  });
  document.getElementById('urgFilter').innerHTML = urgHtml;
}

function renderCards(expandMatches){
  var list = ITEMS.filter(function(i){
    if(activeSrc){ return i.source.indexOf(activeSrc) !== -1; }
    var okCat = activeCat === "all" || i.cat === activeCat;
    var okUrg = activeUrg === "all" || i.urgency === activeUrg;
    return okCat && okUrg;
  });

  var html = "";
  list.forEach(function(item){
    var color = CAT_COLORS[item.cat] || "#999";
    var chartMark = "";
    if(item.charts && item.charts.hot) chartMark = '<span class="chartmark" title="Chart worth saving">🔥📊</span>';
    else if(item.charts && item.charts.count > 0) chartMark = '<span class="chartmark" title="Has charts">📊</span>';

    var shouldOpen = expandMatches ? " open" : "";

    html += '<div class="card' + shouldOpen + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + item.id + '</span>';
    html += '<span>' + URG_EMOJI[item.urgency] + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + esc(item.source.split(" / ")[0].split(" (")[0]) + '</span>';
    html += '<span class="tag">' + esc(CAT_LABELS[item.cat]) + '</span>';
    html += chartMark;
    html += '<span class="htitle">' + esc(item.title) + '</span>';
    html += '</div>';

    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '14;">' + esc(item.angle) + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet"><div class="tweet-label a">TWEET A</div><div class="tweet-text">' + esc(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet"><div class="tweet-label b">TWEET B</div><div class="tweet-text">' + esc(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';

    if(item.charts && (item.charts.count > 0 || item.charts.desc)){
      html += '<div class="charts-box' + (item.charts.hot?" hot":"") + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + esc(item.charts.desc || "Charts inside.") + '</div>';
    }

    html += '<div class="linkrow"><a href="' + esc(item.link) + '" target="_blank">↗ Read full article</a></div>';
    html += '</div>'; // card-body
    html += '</div>'; // card

  });
  document.getElementById('cards').innerHTML = html || '<p style="color:#888;">No items match this filter.</p>';
}

function renderHeader(){
  document.getElementById('headerMeta').textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.includedSources.length + " sources · window " + META.windowStart + " – " + META.windowEnd;
}

function renderReport(){
  var html = "";
  html += "<b>Time window</b>" + esc(META.windowStart) + " to " + esc(META.windowEnd) + ". Emails outside this window were not processed.";
  html += "<b>Emails in window</b>" + META.emailsInWindow + " found, " + META.emailsRead + " read in full.";
  html += "<b>Items extracted</b>" + META.itemsExtracted;
  html += "<b>Included sources</b>";
  html += "<div>";
  META.includedSources.forEach(function(s){
    html += '<div><span class="srcline" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count===1?'':'s') + '</div>';
  });
  html += "</div>";
  html += "<b>Skipped sources</b>";
  html += "<div>";
  META.skippedSources.forEach(function(s){
    html += '<div>' + esc(s.name) + ' — ' + esc(s.reason) + '</div>';
  });
  html += "</div>";
  document.getElementById('reportBody').innerHTML = html;
}

renderHeader();
renderFilters();
renderCards(false);
