  { id:1, cat:"macro", urgency:"deep", source:"Peter Boockvar / The Boock Report",
    title:"Chicago PMI Explodes to 62.7 From 49.2 — But Prices Paid Also Surge",
    idea:`May Chicago manufacturing PMI surged to 62.7 from 49.2, with new orders jumping to the highest since January 2022. But Boockvar flags this as likely front-loading before tariffs hit: respondents note only a "slight" underlying order increase. Prices paid hit the highest since May 2022, driven by oil prices and transport fuel surcharges. The Richmond manufacturing index also rose sharply to 13 from 3.`,

    tweetB:`Every PMI beat right now needs two questions: (1) is it front-loading before tariffs? (2) are input prices rising? Chicago this week: yes to both. 62.7 headline, highest since 2022. Prices paid also highest since 2022. The divergence between orders and pricing is your stagflation tell.`,

  { id:2, cat:"macro", urgency:"act-now", source:"Phil Dauber / Morning Musings",

    idea:`Thursday's US data confirmed a stagflation-leaning mix: Q1 GDP 1.6% vs 2.0% forecast, Personal Income MoM 0.0% vs 0.4% expected, Durable Goods MoM 7.9% vs 3.5% (driven by front-loading). Core PCE came in at 0.2% vs 0.3% expected. Personal Spending was in line at 0.5%. Growth is softening, incomes stalling, and the durable goods beat is borrowed demand.`,

    tweetA:`This week's US data: Q1 GDP 1.6% (est 2.0%). Personal Income 0.0% (est 0.4%). Durable Goods 7.9% (est 3.5%) — front-loading. The durable goods spike is borrowed demand. The income miss is real. Growth softening + stalled incomes + sticky prices = the stagflation setup hasn't left. Markets are not pricing this.`,
    tweetB:`Personal Income came in flat — zero. S&P 500 is at all-time highs. BofA private clients are at 66% equities, a record. At some point the math catches up: if people aren't earning more, who's funding the consumption that supports earnings? Pension rebalances + tax refunds + leverage. That's a fragile foundation.`,

    idea:`Inflation readings across Europe's largest economies are well above target and accelerating. Spain hit 3.6%, Italy 3.3%, France 2.8% in May — all above expectations. Germany moderated to 2.7% but the decline reflects temporary VAT reductions and cheaper food; underlying pressures intensified. The ECB is now expected to hike for the first time since 2023. A eurozone-wide reading expected to exceed 3% next week. ECB blog post warned about "double scar" from 2022 price spike raising inflation expectations.`,

    tweetB:`The Fed is on hold. The ECB is about to hike. European inflation: France +2.8%, Italy +3.3%, Spain +3.6%. The ECB's own blog warned of a "double scar" from the 2022 shock permanently lifting inflation expectations. If they're right, this hiking cycle is just getting started.`,

  { id:4, cat:"macro", urgency:"deep", source:"Phil Dauber / Morning Musings",

    idea:`Japan confirmed it spent a record ¥11.73 trillion (~$73.6 billion) on yen intervention between April 28 and May 27 — the largest single-month FX operation ever recorded. The operation followed USD/JPY breaching 160. This reinforces a hard line at that level and complicates BOJ normalization messaging heading into June. The yen carry trade remains a multi-trillion dollar overhang.`,

    tweetA:`Japan spent ¥11.73 trillion (~$74B) on yen intervention in a single month. Largest FX operation in history. USD/JPY had breached 160. They're spending extraordinary sums to defend a level and the structural issue — US-Japan rate differential — hasn't changed. The yen carry trade is a multi-trillion dollar time bomb that no amount of intervention defuses.`,
    tweetB:`Largest monthly FX intervention ever: ¥11.73T from Japan. For context: that's larger than Goldman Sachs's entire market cap spent in 30 days. When Japan had to intervene this aggressively before (2022), it preceded a significant yen repricing. BOJ has to eventually choose: let the yen fall, or raise rates and blow up the carry trade.`,

    tweetA:`PCE headline inflation: 3.8% — highest since 2023. Core is also trending higher. All three major inflation measures have been moving AWAY from the Fed's 2% target for almost a year. Markets still expect rate cuts. The Fed is being asked to cut with inflation at 3.8%. That's not happening. $TLT $SPY`,

  { id:6, cat:"positioning", urgency:"deep", source:"Phil Dauber via BofA / Michael Hartnett",

    idea:`BofA's Michael Hartnett: S&P 500 is at new highs but only 21 stocks (4% of the index) are making new highs. This exact reading — 20-21 stocks — was observed at the internet bubble top in March 2000. EM leadership is even narrower: 21 of 1,224 stocks at all-time highs. Currently 222 S&P stocks are trading more than 20% below their highs; 109 are more than 40% below their highs. Hartnett's prescription: best performers next 12 months are likely "unlevered, opportunistic, diamonds-in-rough."`,

    tweetA:`S&P 500 at all-time highs. Number of S&P stocks also at all-time highs: 21. That's 4% of the index. BofA's Hartnett points out: same reading as the dot-com bubble top in March 2000. 222 stocks are currently >20% below their highs. 109 are >40% below. The index is lying to you about the market underneath it.`,

  { id:9, cat:"positioning", urgency:"deep", source:"Bespoke Investment Group",

    idea:`Global equity funds saw their first outflows in 9 weeks in the week to May 27 ($7B leaving stocks), while money market funds drew $21.9B and bonds attracted $23.6B. Japan stocks saw their largest outflow since May 2025 ($8.2B). China stocks saw $14B in outflows, extending a cumulative $218B exit since January. US pension funds are set to rotate out of equities into fixed income at month-end, with BofA estimating ~$26B in equity sales — approximately 1.2 standard deviations above a typical month-end rebalance.`,

  { id:11, cat:"credit", urgency:"deep", source:"a16z News",
    title:"Hyperscalers Issued $150B in Bonds in 2026 — 50% of All IG Net Issuance Is Now AI Capex",
    idea:`Hyperscaler bond issuance has hit ~$150B in 2026 — approximately 35% more than full-year 2025, with half the year remaining. In 2026, roughly half of investment grade net issuance and ~40% of high yield bonds are tied to AI capex. IT capex is approaching 40% of all capex for the entire S&P 500. Apollo CEO Marc Rowan: "every dollar since the invention of fire is going into this AI capex build-out — and equity can't fund it all." Notably, hyperscaler debt/equity ratio has only recently caught up with the Nasdaq 100 and still trails the broader S&P — so the binge is off a very low base.`,

    tweetA:`Hyperscalers have already issued $150 billion in bonds in 2026 — 35% more than ALL of last year. Half of all investment grade net issuance is now tied to AI capex. IT capex is approaching 40% of all S&P 500 capex. Apollo's Rowan: "every dollar since fire is going into AI — equity can't fund it all." AI is the entire credit market.`,

    idea:`IG credit OAS at approximately 80bps and HY at approximately 285bps are near multi-decade tights, leaving limited buffer for credit events. The 2s10s Treasury spread sits at approximately +50bps, retreating from the January 2026 peak of +74bps — curve positive but flattening. ERP is compressed as the 10Y at 4.47% narrows the spread vs S&P forward earnings yield. Critically: approximately $1.5 trillion in commercial real estate debt rolls over in 2026, with office values still stressed. A concentrated default at a regional lender would reprice the sector broadly and could widen spreads meaningfully.`,

    idea:`Illinois SB 315 unanimously passed the state House and will be signed by Governor Pritzker — the strictest AI law in the US to date. It applies only to the largest AI developers but requires third-party audits to verify compliance with AI companies' own safety policies, going beyond California's SB 53 and NY's RAISE Act. Notably, both OpenAI and Anthropic endorsed it. The broader point from Transformer: the tech industry's strategy to block federal AI regulation has backfired — every state law passed raises the floor for any federal preemption negotiation. Third-party audits are now "table stakes" for any federal deal.`,

    title:"Economic Data Trading Is a Fool's Errand — True Alpha Comes From Positioning, Not Predictions",
    idea:`Damped Spring argues that paying for economic data forecasts and trading around releases is value-destroying. The real structure of data-release alpha: (1) predict the release vs. expectations — extremely hard with hundreds of economists; (2) assess market positioning before release — possible but rare; (3) interpret post-release reaction faster than market — 30-minute window, spreads widen. The critical insight: most off-consensus outcomes are false signals. A handful of data releases per year are genuinely pivotal (e.g., the first soft inflation print in fall 2022 that marked the post-Covid market bottom). The alpha is ignoring noise and recognizing the pivot.`,
    angle:`This framework argues that economic research subscriptions predicting data releases are extracting rent from your P&L. The positioning read before the number is the actual edge. This is exactly what the Hartnett breadth data and BofA client allocation data represent — positioning context that matters more than the print itself.`,
    tweetA:`Damped Spring: "I recommend you pay zero dollars to research providers who predict economic data releases and do zero trades based on them." Strong. His framework: of all data releases this year, a handful are genuinely pivotal. The rest are noise. The alpha is in (a) ignoring noise and (b) positioning assessment. Not in predicting the ADP number.`,
    tweetB:`The edge in macro trading isn't in being right on the economic forecast — hundreds of economists are already converging on consensus. The edge is in knowing the positioning before the release. Hartnett's "21 stocks at new highs" and BofA's "66% equity allocation record" are positioning reads. That's more valuable than the next PCE forecast.`,

  time: "21:04 CEST",
  windowStart: "2026-05-29 15:04 CEST",
  windowEnd: "2026-05-29 21:04 CEST",
  emailsInWindow: 20,
  emailsRead: 20,
  itemsExtracted: 31,
  includedSources: [
    {name:"Peter Boockvar / The Boock Report", items:2},
    {name:"Phil Dauber / Morning Musings", items:7},
    {name:"Neil Sethi / As We Approach The Open", items:3},
    {name:"a16z News", items:5},
    {name:"Ecoinometrics", items:2},
    {name:"Transformer Newsletter / Shakeel Hashim", items:4},
    {name:"Bespoke Investment Group", items:2},
    {name:"Vik's Newsletter", items:1},
    {name:"Damped Spring", items:1},
    {name:"Messari / Matt Kreiser", items:1},
    {name:"Blocmates", items:1},
    {name:"TheStreet Daily", items:0},
    {name:"James Bulltard", items:0}
  ],
  skippedSources: [
    {name:"McKinsey (AI Banking)", reason:"Empty email body — no plaintext content"},
    {name:"McKinsey (India Electrical Equipment)", reason:"Empty email body — no plaintext content"},
    {name:"Haymaker / Friday POW", reason:"Paywalled — company name not visible, only financial stats without company identity"},
    {name:"James Bulltard / 5/29/26 Recap", reason:"Market commentary + AI option flow tool — no extractable market insight"},
    {name:"Azeem Azhar (Substack Live)", reason:"Live stream notification only — no content"},
    {name:"Lead Lag / Weekend Reading", reason:"Links to paywalled archive content only"},
    {name:"Top Down Charts / Last Chance", reason:"Pure subscription promotional email"}
  ]
};

const CAT_COLORS = {
  macro:"#e24b4a", credit:"#378add", positioning:"#ef9f27",
  "AI/infra":"#1d9e75", crypto:"#7f77dd", geopolitics:"#d85a30",
  energy:"#f97316", tech:"#06b6d4", gold:"#d4a017", culture:"#ec4899",
  labor:"#8b5cf6", regulation:"#64748b", science:"#14b8a6", venture:"#84cc16"
};

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

var activeCategory = 'all';
var activeUrgency = 'all';
var activeSource = null;

function getVisibleItems() {
  return ITEMS.filter(function(item) {
    var catOk = activeCategory === 'all' || item.cat === activeCategory;
    var urgOk = activeUrgency === 'all' || item.urgency === activeUrgency;
    var srcOk = !activeSource || item.source.indexOf(activeSource) !== -1;
    return catOk && urgOk && srcOk;
  });
}

function renderFilters() {
  var cats = ['all'];
  var catCounts = {};
  ITEMS.forEach(function(i) {
    catCounts[i.cat] = (catCounts[i.cat] || 0) + 1;
    if (cats.indexOf(i.cat) === -1) cats.push(i.cat);
  });
  var catDiv = document.getElementById('cat-filters');
  catDiv.innerHTML = '';
  cats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'pill' + (c === 'all' ? ' pill-all' : '') + (c === activeCategory ? ' active' : '');
    if (c !== 'all' && c === activeCategory) btn.style.background = CAT_COLORS[c] || '#666';
    btn.textContent = c === 'all' ? 'All (' + ITEMS.length + ')' : c + ' (' + (catCounts[c] || 0) + ')';
    btn.onclick = function() { activeCategory = c; activeSource = null; renderAll(); };
    catDiv.appendChild(btn);
  });

  var urgCounts = {deep:0, "act-now":0, watch:0};
  ITEMS.forEach(function(i) { if (urgCounts[i.urgency] !== undefined) urgCounts[i.urgency]++; });
  var urgDiv = document.getElementById('urg-filters');
  urgDiv.innerHTML = '';
  [['all','All'], ['act-now','🔴 Act Now'], ['deep','🔵 Deep'], ['watch','🟡 Watch']].forEach(function(pair) {
    var key = pair[0], label = pair[1];
    var btn = document.createElement('button');
    btn.className = 'pill pill-all' + (key === activeUrgency ? ' active' : '');
    var count = key === 'all' ? ITEMS.length : (urgCounts[key] || 0);
    btn.textContent = label + ' (' + count + ')';
    btn.onclick = function() { activeUrgency = key; activeSource = null; renderAll(); };
    urgDiv.appendChild(btn);
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '';
  var visible = getVisibleItems();
  visible.forEach(function(item) {
    var color = CAT_COLORS[item.cat] || '#888';
    var urgEmoji = item.urgency === 'act-now' ? '🔴' : item.urgency === 'watch' ? '🟡' : '🔵';
    var chartIcon = item.charts && item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', item.id);

    var headerHtml = '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="item-num">#' + item.id + '</span>' +
      '<span class="urgency-badge">' + urgEmoji + '</span>' +
      '<span class="source-badge" style="background:' + color + '">' + item.cat + '</span>' +
      '<span class="card-title">' + item.title + chartIcon + '</span>' +
      '</div>';

    var angleStyle = 'border-left-color:' + color + ';background:' + color + '18';
    var tweetAStyle = 'color:#378add';
    var tweetBStyle = 'color:#7f77dd';

    var chartHtml = '';
    if (item.charts && item.charts.count > 0) {
      var hotMark = item.charts.hot ? ' 🔥 CHART WORTH SAVING' : '';
      chartHtml = '<div class="chart-info">📊 ' + item.charts.count + ' chart(s)' + hotMark + ': ' + item.charts.desc + '</div>';
    }
    var linkHtml = item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '';

    var bodyHtml = '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + escHtml(item.idea) + '</div>' +
      '<div class="section-label">My Angle</div>' +
      '<div class="angle-box" style="' + angleStyle + '">' + escHtml(item.angle) + '</div>' +
      '<div class="section-label">Tweets</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label" style="' + tweetAStyle + '">TWEET A</div>' +
          '<div class="tweet-text">' + escHtml(item.tweetA) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label" style="' + tweetBStyle + '">TWEET B</div>' +
          '<div class="tweet-text">' + escHtml(item.tweetB) + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartHtml +
      linkHtml +
      '</div>';

    card.innerHTML = headerHtml + bodyHtml;
    container.appendChild(card);
  });
  document.getElementById('hdr-count').textContent = ITEMS.length + ' items';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCard(id) {
  var body = document.getElementById('body-' + id);
  if (body) body.classList.toggle('open');
}

function renderReport() {
  var d = document.getElementById('report-body');
  var src = META.includedSources.filter(function(s){ return s.items > 0; });
  var skip = META.skippedSources;
  var srcHtml = src.map(function(s) {
    return '<span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')">' + s.name + ' (' + s.items + ')</span>';
  }).join(' · ');
  var skipHtml = skip.map(function(s) { return '<b>' + s.name + '</b>: ' + s.reason; }).join('<br>');
  d.innerHTML = '<div class="report-section"><b>Window:</b> ' + META.windowStart + ' → ' + META.windowEnd + '</div>' +
    '<div class="report-section"><b>Emails in window:</b> ' + META.emailsInWindow + ' · <b>Read:</b> ' + META.emailsRead + ' · <b>Items extracted:</b> ' + META.itemsExtracted + '</div>' +
    '<div class="report-section"><b>Sources:</b><br>' + srcHtml + '</div>' +
    '<div class="report-section"><b>Skipped:</b><br>' + skipHtml + '</div>';
}

function filterBySrc(name) {
  activeSource = name;
  activeCategory = 'all';
  activeUrgency = 'all';
  renderAll();
}

function toggleReport() {
  var d = document.getElementById('report-body');
  var h = document.querySelector('#session-report h3');
  if (d.style.display === 'block') {
    d.style.display = 'none';
    h.textContent = '📋 Session Report ▸';
  } else {
    d.style.display = 'block';
    h.textContent = '📋 Session Report ▾';
  }
}

function renderAll() {
  renderFilters();
  renderCards();
}

window.onload = function() {
  renderAll();
  renderReport();
};
</script>
</body>
</html>
