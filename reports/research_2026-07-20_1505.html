cceleration visible now should show up in crypto/gold roughly three months out, right around when chart-based BTC-bottom calls (per Mando Minutes' Brandt reference) are also pointing.", "tweetA": "PBoC liquidity leads crypto by about 3 months at 0.57 correlation. PBoC just flipped from drought to injection. Mark the calendar for October, which is also exactly where the chartists are calling a BTC bottom. $BTC", "tweetB": "Gold's rally this year has a name and it's not fear, it's PBoC balance-sheet expansion. Bitcoin wants credit for the same move but needs the Fed to show up too, and the Fed's still hawkish. Two liquidity sources, only one is actually printing.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://capitalwars.substack.com/p/bitcoin-china-and-gold"}, {"id": 3, "cat": "positioning", "urgency": "act", "source": "Gamma Report / Kurt Altrichter", "title": "SPX just lost its gamma flip line for the first time in five weeks, right into mega-cap earnings", "idea": "The market closed below the dealer gamma flip line (7,533) on Friday for the first time since early June. The model cut all 3x leverage the moment the tape lost the line, moving to 50% SPLV/50% SPHB from 75% SPHB/25% SPXL. Below the flip line, dealer hedging amplifies moves instead of dampening them, and realized vol (11.64) is near cycle lows.", "angle": "Negative gamma plus near-record-low realized vol plus Tesla/Alphabet/Intel earnings in the same week is a setup for volatility to expand violently, not grind. The risk is magnitude, not direction.", "tweetA": "SPX just lost its gamma flip line for the first time in 5 weeks, right as Tesla, Alphabet and Intel report. Below that line dealers stop dampening moves and start amplifying them. Low realized vol here isn't calm, it's a coiled spring. $SPX $QQQ", "tweetB": "Everyone's asking if tech earnings beat or miss. Wrong question this week. The real question is whether dealers are long or short gamma when the number hits, because that decides whether a miss is a -2% day or a -6% day.", "charts": {"count": 1, "hot": true, "desc": "Weekly gamma-flip-line vs SPX chart; flip line moved 7,497 to 7,533 while spot fell 78 to 115 points below it"}, "link": "https://www.kurtaltrichter.com/p/gamma-report-7202026"}, {"id": 4, "cat": "positioning", "urgency": "act", "source": "Gamma Report / Kurt Altrichter", "title": "The systematic 'buy everything' bid just flipped to sell after six straight weeks", "idea": "Vol-control funds bought $10.0B Tuesday, $3.4B Wednesday, $1.1B Thursday, then sold $2.7B Friday; CTAs flipped from long to short the same day the tape lost the gamma flip line. Positioning is described as 'near extreme long' even as breadth stayed broad (68.5% above the 200-day, rising).", "angle": "The mechanical tailwind propping up the tape for six weeks just became a mechanical headwind the moment gamma flipped negative, which is the accelerant, not the spark.", "tweetA": "Six weeks of vol-control funds buying every dip. One Friday of selling $2.7B. That's the tell: the systematic flow that was your tailwind becomes your accelerant the moment gamma flips negative. Watch CTA flow this week, not the VIX print.", "tweetB": "Breadth is still 68.5% and rising even as the index cracked. That's the good news/bad news of this tape: the damage is contained to mega-cap tech for now, but that's also where every earnings catalyst this week is sitting.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.kurtaltrichter.com/p/gamma-report-7202026"}, {"id": 5, "cat": "positioning", "urgency": "deep", "source": "Young & Calculated", "title": "A $150M pod losing 7.5% is a 1.4bp rounding error, until 20 pods hit the same stop in the same factor", "idea": "Millennium runs 330+ pods on ~$79bn AUM with hard stops (5% drawdown halves buying power, 7.5% terminates the pod). Pods don't share positions but do share factor exposure (long momentum/short junk, long quality/short high-beta), so a factor margin mechanism is the underrated villain here: haircuts get recalculated UP exactly when a fund's book is falling and its P&L is worst. That's not risk management, that's a forced-selling machine with good PR.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://youngandcalculated.substack.com/p/how-a-single-pod-blows-up-a-multi"}, {"id": 7, "cat": "culture", "urgency": "deep", "source": "Big Moves", "title": "Netflix just re-ran its 2007 earnings crash, almost tick for tick", "idea": "NFLX fell toward roughly 50% below its high after Thursday's earnings (Q3 revenue guide of $12.86B below estimates, narrowed FY guidance), with the S&P down about 2% from its own peak. On July 24, 2007, Netflix fell to -49% from its high on its first-ever subscriber decline while the S&P was down 2.7% from its high; NFLX bottomed at 22 cents a share (split-adjusted) and returned to a new high nine months later.", "angle": "History doesn't repeat, but a single-name capitulation inside an otherwise-resilient index is the exact same setup twice, 19 years apart. The risk this time is calling the bottom too early, not being wrong that the pattern exists.", "tweetA": "Netflix -50% from highs on subscriber/growth fears, S&P down ~2%. In 2007 the exact same divergence happened on the exact same stock, and NFLX multiplied off the bottom into 2008. Pattern recognition isn't a thesis, but this one's eerie. $NFLX", "tweetB": "The bear case on Netflix in 2026 is 'North America is mature, growth is stalling.' That was also the bear case in 2007. The difference: there was no ad business, no live sports, no pricing-power lever back then. The setup rhymes, the optionality doesn't.", "charts": {"count": 1, "hot": true, "desc": "Viewer-churn chart referenced alongside the 2007-vs-2026 price-decline comparison"}, "link": "https://bigmoves.substack.com/p/big-moves-july-17-2026"}, {"id": 8, "cat": "credit", "urgency": "deep", "source": "Big Moves", "title": "Travelers posted a 27% ROE quarter on flat premium growth, profitability without volume", "idea": "Core EPS reached $10.04 vs $6.51 a year earlier, core ROE near 24.9% (headline ROE 27.1%), the combined ratio improved 6.7 points to 83.6, and catastrophe losses fell more than 40% to $518M. Net written premiums were essentially flat; the entire beat is underwriting discipline and investment income, not growth. The company returned $1.5bn to shareholders this quarter, $1.3bn via buybacks.", "angle": "In a market obsessed with growth-at-any-cost AI capex, Travelers is the opposite trade: shrink the risk appetite, harvest the float, buy back stock, and still put up an elite ROE.", "tweetA": "Travelers grew premiums 0%, ROE 27%. In a market obsessed with growth-at-any-cost AI capex, here's a company doing the opposite: shrink risk appetite, harvest the float, buy back stock. $TRV is the anti-hyperscaler trade.", "tweetB": "83.6 combined ratio, $1.3B of buybacks in one quarter, zero premium growth. Nobody's writing a thread about Travelers' 'flywheel,' but the ROE math says maybe they should be.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://bigmoves.substack.com/p/big-moves-july-17-2026"}, {"id": 9, "cat": "cyber", "urgency": "act", "source": "Big Moves", "title": "Coca-Cola's dairy arm got ransomware'd and suspended all US production", "idea": "fairlife, Coca-Cola's dairy subsidiary, disclosed unauthorized third-party access to production-related systems, suspending US manufacturing while Canadian production stayed unaffected. Coca-Cola's 8-K says the incident's full scope and any material impact had not yet been determined.", "angle": "This is an OT/industrial-control ransomware story landing in food and beverage manufacturing, not a data-center breach; production halts are fast to monetize for attackers, which is exactly why this category keeps getting targeted.", "tweetA": "Ransomware just took down a Coca-Cola production line, not a data center. fairlife's US manufacturing is fully suspended. This is the OT/ICS ransomware story cyber people have been warning about, and it just landed in the beverage aisle. $KO", "tweetB": "Coca-Cola's 8-K says they haven't determined if this is material. Translate that: production is down, remediation cost is unknown, and the market is pricing it as noise (-4%). Watch if food/bev OT-security spend becomes the next cyber theme.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://bigmoves.substack.com/p/big-moves-july-17-2026"}, {"id": 10, "cat": "aiinfra", "urgency": "act", "source": "Big Moves", "title": "Chip-design software sold off on Kimi K3, not just chipmakers", "idea": "Cadence (-9.5%) and Synopsys (-7.9%) fell in the broader tech selloff tied to Moonshot AI's open-weight Kimi K3 release, on fears that cheaper open models compress pricing power across the entire AI-infrastructure stack, chipmakers and their design-software suppliers alike. Synopsys separately announced exiting semiconductor process-control software to refocus on AI-design tools.", "angle": "The market is now pricing 'cheaper open models' as a risk two supply-chain layers removed from the model itself, all the way down to EDA software, a much bigger read-through than the 2025 DeepSeek moment got.", "tweetA": "Kimi K3 didn't just hit AI stocks. It hit the software that designs the chips that run AI models. Cadence and Synopsys both sold off. The open-model threat is now pricing two supply-chain layers deep. $CDNS $SNPS", "tweetB": "If cheap open models really compress AI economics, the bear case isn't 'Nvidia earns less.' It's 'every company in the stack behind Nvidia earns less too,' EDA, foundries, memory. That's the trade nobody's positioned for yet.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://bigmoves.substack.com/p/big-moves-july-17-2026"}, {"id": 11, "cat": "aiinfra", "urgency": "watch", "source": "Mando Minutes", "title": "Bessent: the US goal is to control 80% of global AI compute", "idea": "Treasury Secretary Bessent stated the US objective is to control 80% of global compute capacity, framing compute itself as a strategic resource, alongside AMD's separate claim that the world needs 100x more compute within five years.", "angle": "This reframes the AI capex debate as geopolitical infrastructure competition rather than a corporate-ROI question, compute-share targets as the new reserve-currency-share targets.", "tweetA": "Bessent is talking about AI compute the way past Treasury Secretaries talked about dollar reserve share: an 80% global control target. If that's real policy, the AI capex debate isn't about ROI anymore, it's about compute as a strategic asset class.", "tweetB": "AMD says the world needs 100x more compute in five years. Bessent says the US wants 80% of whatever that is. Multiply those two numbers and current hyperscaler capex guides start looking like a floor, not a ceiling.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://mandominutes.beehiiv.com/p/mando-minutes-93fd"}, {"id": 12, "cat": "credit", "urgency": "watch", "source": "Mando Minutes", "title": "372 large US bankruptcies in H1, a 16-year high, alongside record home-seller concessions", "idea": "372 large US corporate bankruptcies were recorded in H1 2026, the highest count in 16 years, while separately 46% of US home sellers are now offering concessions, also an all-time high.", "angle": "Two separate credit-stress signals hitting records simultaneously, in a market where equities are near highs and spreads are tight, a divergence worth tracking rather than dismissing.", "tweetA": "372 large US bankruptcies in H1, a 16-year high. Credit spreads are still tight and equities are near highs. One of those two things is lying about the state of the real economy.", "tweetB": "Bankruptcies at a 16-year high and home-seller concessions at an all-time high, in the same data window. That's a bifurcated economy where AI-capex-adjacent names are fine and everything financed on 2021-era debt is not.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://mandominutes.beehiiv.com/p/mando-minutes-93fd"}, {"id": 13, "cat": "science", "urgency": "deep", "source": "Mando Minutes", "title": "AI just read a 2,000-year-old scroll carbonized by Vesuvius", "idea": "An AI system successfully decoded content from a Herculaneum scroll carbonized in the Vesuvius eruption, part of the ongoing effort using machine learning to virtually unroll and read scrolls too fragile to physically open.", "angle": "A genuinely fun, non-market signal: AI capability applied to classics and archaeology, with zero commercial pressure, is its own tell about how general these models have become.", "tweetA": "AI just read a scroll that's been unreadable since Mount Vesuvius buried it in 79 AD. Nobody's monetizing this. That's exactly why it's a better 'how capable is AI right now' signal than any benchmark score.", "tweetB": "The Vesuvius Challenge keeps outperforming what most people think AI is for. The real capability tell is when a model does something a human literally could not do at any price, like read carbon.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://mandominutes.beehiiv.com/p/mando-minutes-93fd"}, {"id": 14, "cat": "crypto", "urgency": "deep", "source": "Unchained", "title": "Saylor calls his own side's anti-spam Bitcoin proposal 'more dangerous than the condition'", "idea": "Michael Saylor (Strategy, 843,775 BTC / $54.31B) published a 110-point essay opposing BIP-110, a proposal to strip 'spam' data from Bitcoin via a one-year soft fork that would also lower the miner-approval threshold from 95% to 55%. Miner support currently sits below 1%, yet the proposal hits a mandatory signaling window in early August.", "angle": "The real risk in BIP-110 isn't the spam rule, it's quietly redefining consensus from 95% to 55% approval, the more radical precedent hiding behind a narrower fix.", "tweetA": "The guy holding $54B of Bitcoin just published 110 points arguing his own community's fix is worse than the problem. The actual risk in BIP-110 isn't the spam rule, it's redefining consensus from 95% to 55% miner approval. That's the real precedent. $MSTR", "tweetB": "Miner support for BIP-110 is under 1% and it still hits a mandatory vote in August. Low support plus a forced vote is exactly the setup that produces a chain-split headline nobody's pricing in yet.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://unchainedcrypto.beehiiv.com/p/saylor-wades-into-bitcoin-s-nastiest-fight-of-the-summer"}, {"id": 15, "cat": "regulation", "urgency": "act", "source": "Unchained", "title": "France became the largest European market to fully wall off Polymarket", "idea": "France ordered internet providers to block Polymarket on July 16, treating it as illegal gambling rather than a financial exchange. A 2024 attempt at a financial-transaction ban failed because users simply used VPNs; Polymarket still drew 205,057 French visitors in June. Advertising an unlicensed betting site now risks fines up to 100,000 euros; France joins over 30 jurisdictions restricting the platform.", "angle": "Prediction markets are hitting the same country-by-country blocking wall crypto hit in 2018-2022, while the US simultaneously pushes to legitimize the category domestically, a regulatory divergence that's itself a trade.", "tweetA": "France just banned Polymarket at the ISP level. Their 2024 attempt failed because everyone used a VPN. 205,000 French visitors in June says this one will too. Prediction markets are relearning every lesson crypto learned in 2019.", "tweetB": "Over 30 countries now restrict Polymarket while the platform simultaneously pushes to expand access in the US. That regulatory fork, legitimized at home, banned abroad, is exactly the setup that made offshore crypto exchanges a US-listing arbitrage for years.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://unchainedcrypto.beehiiv.com/p/saylor-wades-into-bitcoin-s-nastiest-fight-of-the-summer"}, {"id": 16, "cat": "crypto", "urgency": "deep", "source": "Unchained", "title": "FTX creditors are now being paid above 100% recovery, priced at 2022 crypto levels", "idea": "FTX's fifth distribution (~$900M, July 31) pushes international and US customer classes to 105% cumulative recovery, general unsecured/loan claims to 103%, and convenience claims to 120%. Payouts are pegged to crypto prices at the November 2022 bankruptcy filing, so creditors miss the entire subsequent run-up in BTC and ETH.", "angle": "100%+ recovery sounds like a happy ending, but it's a real-terms loss for anyone still holding the equivalent crypto today, the headline number and the opportunity cost tell opposite stories.", "tweetA": "FTX creditors are getting 105-120% 'recovery.' Sounds great until you remember it's priced at November 2022 crypto values. Anyone who held instead of getting frozen in FTX is up multiples more. 100%+ recovery is actually a real loss, just a polite one.", "tweetB": "The FTX bankruptcy is closing out as the best-case outcome a crypto bankruptcy has ever produced, and it's still a worse outcome than doing nothing and holding through the crash. That tells you everything about how much BTC and ETH have recovered.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://unchainedcrypto.beehiiv.com/p/saylor-wades-into-bitcoin-s-nastiest-fight-of-the-summer"}, {"id": 17, "cat": "credit", "urgency": "deep", "source": "The Bond Beat", "title": "30-year TIPS yield is the highest since reintroduction in 2010, and 2020 buyers are down 52%", "idea": "The 30-year TIPS yield closed at 2.87% Friday, the highest since 30-year TIPS were reintroduced in February 2010 (it was -0.6% at the end of 2021). The nominal 30-year Treasury closed at 5.06%. A 30-year bond auctioned in August 2020 at 1.406% now trades around 48 cents on the dollar, roughly a 52% capital loss for the original buyer.", "angle": "This is the SVB story replaying in slow motion at the long end; anyone still marking 2020-2021 vintage long Treasuries at cost carries the same loss profile that killed three regional banks in 2023.", "tweetA": "A 30-year Treasury bought in August 2020 at 1.4% now trades at 48 cents on the dollar. That's a 52% loss on the 'safest asset in the world.' Whoever's still holding these at cost has a 2023-regional-bank problem waiting to be marked.", "tweetB": "30yr TIPS yield just hit its highest level since reintroduction in 2010. The bond math nobody wants to do: buy today near 5% real-plus-nominal and you're getting paid to wait out exactly the fiscal risk everyone's worried about. That's the actual bull case for long duration right now.", "charts": {"count": 1, "hot": true, "desc": "Yield-curve comparison chart across three dates: Jul 18 2026 vs Mar 6 2026 vs Sep 16 2025"}, "link": "https://thebondbeat.substack.com/p/while-we-slept-global-fi-soft-but"}, {"id": 18, "cat": "macro", "urgency": "watch", "source": "The Bond Beat", "title": "The T-bill market is pricing hike odds again, not yet at conviction level but above the decade average", "idea": "The 6-month/1-month Treasury bill spread sits at +0.22 percentage points, above the 10-year average of +0.13pp but below the +0.43pp level DataTrek associates with real hike conviction. This spread correctly flagged regime shifts into the 2015-16 and 2022 hiking cycles and the 2019-22/2024-25 cutting cycles.", "angle": "A market pricing hikes again, six months after the Fed was cutting, is itself the story, regardless of whether the Fed actually moves.", "tweetA": "The 6m/1m T-bill spread just flipped into hike-signaling territory for the first time since 2022. Not full conviction yet, but six months ago this same market was pricing cuts. That's a violent repricing hiding in a boring corner of the curve.", "tweetB": "Everyone's watching Fed speakers for hike signals. Warsh isn't talking. The bill market is talking anyway, and it's the same instrument that correctly called both the 2015-16 and 2022 hiking cycles before the Fed confirmed them.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://thebondbeat.substack.com/p/while-we-slept-global-fi-soft-but"}, {"id": 19, "cat": "macro", "urgency": "deep", "source": "The Bond Beat", "title": "The Fed's new chair is deliberately not telling markets what he's thinking, and yields are more volatile for it", "idea": "New Fed chair Warsh has adopted a tight-lipped communication style, breaking from over a decade of forward guidance. Two-year Treasury yields saw their biggest jump since the 'Liberation Day' tariffs after Warsh's June press conference, before partially reversing on no new data, just his framing that inflation risk had diminished.", "angle": "When the Fed stops pre-committing to a path, markets have to price uncertainty about the Fed itself, not just the economy, a structurally higher-vol regime for rates independent of the data.", "tweetA": "Warsh's press conference moved 2yr yields more than any data print this year, and it wasn't even new information, just tone. If the new strategy is say less, the market's response is price more uncertainty. That's a vol-regime change hiding inside a personnel change.", "tweetB": "A decade of Fed forward guidance flattened rate vol. Warsh just un-flattened it in one press conference. Nobody's repricing options for a Fed communication regime change yet, but 2yr yield realized vol says maybe they should be.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://thebondbeat.substack.com/p/while-we-slept-global-fi-soft-but"}, {"id": 20, "cat": "labor", "urgency": "act", "source": "Danielle DiMartino Booth", "title": "Consumer sentiment jumped 10%, but 70% of the survey was done before the Iran strikes resumed", "idea": "Preliminary July University of Michigan sentiment rose 10%, but Survey Director Joanne Hsu flagged that over 70% of interviews were completed before the July 7 resumption of US strikes on Iran and the subsequent gas-price increase, meaning the final release could look very different.", "angle": "A headline beat that's mostly stale data is a trap; the real sentiment read is the gap between preliminary and final release, which is itself a tradeable signal of how much the Iran escalation is hitting consumers.", "tweetA": "Michigan sentiment '+10%' headline is mostly pre-escalation data, 70% of interviews happened before strikes on Iran resumed. The real number is the gap between preliminary and final release this month. That gap IS the Iran-war consumer impact.", "tweetB": "Every 'consumer sentiment beat' headline this week should carry an asterisk: most of it was collected before gas prices went back above $4. Wait for the revision before you trade it.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://dimartinobooth.substack.com/p/the-daily-feather-cock-a-doodle-doo"}, {"id": 21, "cat": "culture", "urgency": "deep", "source": "Peter Boockvar", "title": "eBay sports-card sales crossed $1B in a half-year for the first time ever, up 40% in six months", "idea": "eBay sports-card sales hit $1.36B in H1 2026, up 40% from $967M in H2 2025 and up from $815.63M in H1 2025. Separately, Card Ladder data shows March 2026 card sales at $606M vs $303M in March 2025 and just $22.1M in March 2019. Industry forecasts put the combined sports memorabilia/trading card market at $70B in 2026, growing to $393B by 2036 (18.2% CAGR).", "angle": "A completely non-financial-market dataset showing retail speculative demand for hard assets, worth watching alongside meme-stock and prediction-market flow as one 'retail speculation' dashboard.", "tweetA": "eBay sports card sales: $22M in March 2019, $606M in March 2026. That's a 27x move in a hobby category, and it's the same crowd rotating into meme coins and prediction markets. Retail speculation didn't go away, it just found a hard asset with a grade attached.", "tweetB": "$70B sports collectibles market forecast to hit $393B by 2036 at 18.2% CAGR. Nobody's building an ETF for this yet, but the growth rate is faster than most of the 'disruptive tech' names carrying that multiple in public markets.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://peterboockvar.substack.com/p/the-universal-language-of-football"}, {"id": 22, "cat": "aiinfra", "urgency": "act", "source": "David Rosenberg", "title": "Rosenberg: Kimi K3 is a DeepSeek-moment repeat aimed at Anthropic and OpenAI's pricing power", "idea": "David Rosenberg frames Moonshot AI's Kimi K3 as a repeat of the winter 2025 DeepSeek selloff, cheaper, customizable open-source models opening price competition that threatens US frontier labs' economics, not just their stock prices.", "angle": "Three separate sources in this window (Rosenberg here, the Cadence/Synopsys selloff, and Import AI's AISI cyber-gap data below) are independently converging on the same thesis: open-weight models are closing the gap faster than consensus expected.", "tweetA": "Three separate sources this morning independently point at the same thing: open-weight Chinese models are closing the gap faster than priced. Rosenberg calls it DeepSeek 2.0. The chip-design software stocks already sold off on it. This isn't a one-newsletter story anymore.", "tweetB": "The DeepSeek moment in 2025 got walked back as an overreaction within weeks. If Kimi K3 gets walked back the same way, that's the trade, buy the AI-infra dip. If it doesn't, this is the second data point in a real trend, not a one-off scare.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.earlymorningwithdave.com/p/diplomatic-channels-open-even-as"}, {"id": 23, "cat": "positioning", "urgency": "deep", "source": "Blind Squirrel Macro (Arcadia)", "title": "A discretionary macro fund went back into a SPY straddle the same week dealers flipped short gamma", "idea": "The BUSHY portfolio re-entered a long $SPY straddle last Tuesday, ahead of the week that ultimately saw the tape lose its gamma flip line and vol-control funds flip from buying to selling.", "angle": "A discretionary manager pricing long optionality the same week systematic gamma flipped negative is a confirming signal from a fully independent source, multiple unrelated positioning indicators pointing the same direction.", "tweetA": "A discretionary macro fund got long a SPY straddle last Tuesday. Three days later, dealers flipped short gamma and CTAs flipped from buyer to seller. Different data sources, same conclusion: this was the week to own volatility, not sell it.", "tweetB": "Nobody trades a straddle unless they think realized vol is underpriced relative to what's coming. When that call lines up with a mechanical gamma-flip signal from a totally unrelated source, that's confirmation worth acting on.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.blindsquirrelmacro.com/p/back-in-the-straddle-2026-edition"}, {"id": 24, "cat": "venture", "urgency": "watch", "source": "defi0xjeff", "title": "The 'loop craze': autonomous agents that reason, act and evaluate without a human are becoming the default, not the exception", "idea": "A crypto/macro analyst's retrospective on 4+ months running an AI agent stack describes the shift from single-prompt chatbot use to orchestrator-plus-subagent deployments ('like a middle manager deploying junior staff') and self-looping agents that reason, act, and evaluate without human intervention, calling this pattern 'the design needed to push AI beyond just a chatbot.'", "angle": "This is a from-the-trenches practitioner account, not a vendor pitch, of the exact agentic-AI adoption curve that's supposed to justify current AI infrastructure capex.", "tweetA": "An anonymous crypto analyst just described spending 4 months and over $1,000 in inference money converging on orchestrator-plus-subagent AI workflows on his own, not because a vendor sold it to him, but because single-prompt chatbots stopped being enough. That's organic adoption, the leading indicator the AI-capex bulls actually need.", "tweetB": "The 'loop craze,' agents that reason, act, and evaluate themselves without a human, is being described here as inevitable, not experimental. If that's right, the AI capex debate isn't 'will enterprises adopt this,' it's 'how fast does this eat headcount once it works.'", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://defi0xjeff.substack.com/p/12-hermes-articles-from-100-of-hours"}, {"id": 25, "cat": "crypto", "urgency": "watch", "source": "Lucky Trader", "title": "Hyperliquid is making prediction markets permissionless, starting from a $176M share of a $50B monthly market", "idea": "Hyperliquid will let anyone deploy a prediction market by staking 500,000 HYPE (~$30M), slashable if a market is poorly defined or settled incorrectly, earning up to 50% of trading fees, the same skin-in-the-game model behind its permissionless perps. Prediction markets did $50B in wagers in June (World Cup-driven) with Kalshi at 66% share ($33B); Hyperliquid did just $176M.", "angle": "The permissionless model trades speed and open growth for quality control, right as regulators (France, 30+ countries) are cracking down on exactly the 'who's responsible for this market' question curation is meant to answer.", "tweetA": "Hyperliquid wants to make prediction markets permissionless right as France and 30+ countries are banning Polymarket specifically because nobody's accountable for market quality. That's either brilliant timing or the worst possible timing, depending on which way regulators go next.", "tweetB": "$176M vs Kalshi's $33B. Hyperliquid's prediction-market bet isn't about competing on volume today, it's betting the permissionless model compounds faster than curation once builders show up. Same playbook as their perps, same 10-100x if it works.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://luckytrader.substack.com/p/hyperliquid-opens-prediction-markets"}, {"id": 26, "cat": "macro", "urgency": "deep", "source": "Neil Sethi", "title": "Semiconductor import prices are up 30.67% y/y, a record, buried inside an otherwise unremarkable inflation print", "idea": "US import prices ex-fuel accelerated to +4.24% y/y in June, the largest 12-month increase since June 2022, driven by AI-trade-linked semiconductor import prices at a record +30.67% y/y and broader capital-goods strength (nonelectrical machinery +7.18% y/y, 24% of imports).", "angle": "This is direct, hard-data confirmation that AI-driven demand is showing up as actual imported-goods inflation, not just capex announcements and stock prices.", "tweetA": "Semiconductor import prices: +30.67% y/y, a record. That's not an AI-stock story, that's a hard import-price data point. The AI buildout is now visibly inflationary in the actual trade data, not just in capex guidance calls.", "tweetB": "Buried in a boring import-price release: capital goods, 24% of all US imports, up 7.18% y/y, semis up 30.67%. If you want to know where AI capex is actually landing in the inflation data, this line item is it, and it's accelerating.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/import-prices-june-2026"}, {"id": 27, "cat": "macro", "urgency": "watch", "source": "Neil Sethi", "title": "China stopped exporting deflation to the US, import prices from China just hit the highest since 2022", "idea": "Y/y change in US import prices from China rose to +1.33% in June, the highest since November 2022, up from -3.1% at the start of the year, a sharp reversal of the 'China exports deflation' dynamic that's persisted for years.", "angle": "If China pricing power is genuinely reversing, that removes one of the structural disinflationary forces the Fed has leaned on, worth watching alongside the PBoC liquidity re-acceleration flagged separately in this window.", "tweetA": "China import prices to the US: -3.1% y/y in January, +1.33% y/y in June. That's the fastest reversal of 'China exports deflation' in years, happening at the same time PBoC liquidity is re-accelerating. Two data points, one direction: less disinflationary help from China going forward.", "tweetB": "Everyone models US inflation off Fed policy and oil prices. China's pricing power just flipped from a headwind to a tailwind for US inflation, and almost nobody's talking about it yet.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/import-prices-june-2026"}, {"id": 28, "cat": "positioning", "urgency": "deep", "source": "SixSigmaCapital", "title": "AI/semi stocks are stuck between too expensive for value and not enough momentum for momentum", "idea": "A hedge fund manager's subscriber-chat note argues that after the recent unwind, several AI/semiconductor names are attractive on forward estimates but remain expensive on trailing numbers, precisely the metric bears will cite, while broken charts have pushed momentum traders out, leaving the names too expensive for value investors and lacking the technical setup momentum traders need.", "angle": "This is a clean articulation of why AI-infra names could stay range-bound into earnings even if the long-term thesis is intact; the buyer base has to shift from momentum to value before a re-rate, and that shift takes time and a healed chart.", "tweetA": "The AI-infra dip-buying setup right now: too expensive for value investors, not enough chart momentum for momentum traders. That's the exact valuation no-man's-land that produces sideways chop, not a V-shaped recovery, even for names everyone agrees are cheap on 2027 numbers.", "tweetB": "'Cheap on forward estimates, expensive on trailing' is the bull's favorite argument and the bear's favorite rebuttal, using the same numbers. When both sides can point at the same stock and feel vindicated, that's a stock to sell straddles on, not have a strong view on into earnings.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://sixsigmaresearch.com/"}, {"id": 29, "cat": "tech", "urgency": "watch", "source": "Salazar Slytherin (AI News)", "title": "Anthropic widened Claude Fable 5 access to Max/Team Premium, at half the usual usage limits", "idea": "Claude Fable 5 becomes available on Max and Team Premium plans starting July 20, but at 50% of normal usage limits, a partial, rate-limited rollout rather than a full unlock.", "angle": "The half-limit structure signals Anthropic is managing compute allocation carefully even while expanding access, consistent with the 'US wants 80% of global compute' and '100x more compute needed' data points elsewhere in this window: capacity, not demand, is the binding constraint industry-wide right now.", "tweetA": "Claude Fable 5 hits Max plans today, at half the usual rate limit. Every top AI lab is now shipping capability faster than it's shipping capacity. That gap is the AI-infra bull case in one sentence.", "tweetB": "Notice the pattern: every frontier-model rollout this year comes with a usage cap, not a full unlock. That's not a product decision, that's a compute-constraint decision, and it's happening at every lab simultaneously.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.cryptointegrat.com/p/ai-news-july-20-2026"}, {"id": 30, "cat": "crypto", "urgency": "deep", "source": "KookLetter", "title": "Hyperliquid is buying back $58-80M of its own token every month, funded by 97-99% of trading fees", "idea": "Hyperliquid generates $58-80M in monthly fees with 97-99% flowing directly to token buybacks; since launch, 46.8M HYPE (~$3.1B) has been repurchased from the open market, and the protocol crossed $1B in cumulative revenue on June 30. HYPE was added to the Bitwise 10 Crypto Index ETF this month after a 165% YTD rally.", "angle": "This is one of the cleanest revenue-funds-buyback mechanics in crypto, worth comparing directly to equity buyback yields since it implies a specific, calculable buyback yield most tokens can't claim to have at all.", "tweetA": "Hyperliquid: $58-80M in monthly fees, 97-99% straight to buybacks, $3.1B repurchased since launch. That's not a token with a buyback program bolted on for narrative, that's a business with a buyback yield you can actually calculate, rarer in crypto than the market price suggests. $HYPE", "tweetB": "Compare Hyperliquid's buyback mechanics to any mega-cap tech buyback program and the crypto one is arguably more aggressive as a percent of revenue. The market is still pricing HYPE like a speculative token instead of a cash-generative business returning capital.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://vault.kookletter.com/p/the-next-move"}, {"id": 31, "cat": "venture", "urgency": "watch", "source": "KookLetter", "title": "SpaceX (SPCX) fell below its IPO price, and the real catalyst is an insider unlock, not the earnings number", "idea": "SPCX hit an all-time low of $123, below the $135 IPO price, five weeks after its June 12 debut. The flagged catalyst is the August 6 earnings report, after which roughly 20% of insider shares become eligible to sell, at a valuation near 50x sales, meaning guidance needs to be flawless just to hold the stock flat against that supply.", "angle": "A clean, calendar-dated setup (the August 6 unlock) that's independent of the underlying Starlink/xAI thesis, worth tracking as a pure mechanical-supply event regardless of the view on the business.", "tweetA": "SpaceX stock is already below its IPO price five weeks post-listing. The real risk isn't the August 6 earnings number, it's what happens after: 20% of insider shares become sellable that day. At 50x sales, that's a supply event no guidance beat fixes. $SPCX", "tweetB": "Every recent hot IPO has run the same playbook: pop, hype fade, grind back to the IPO price right as the first unlock window opens. SpaceX is now exactly at that stage. The thesis (Starlink, xAI merger, $27.8B AI compute contracts) can be completely correct and the stock can still get worse into August.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://vault.kookletter.com/p/the-next-move"}, {"id": 32, "cat": "cyber", "urgency": "watch", "source": "Import AI", "title": "UK's AI safety body: open-weight models are closing the cyber-capability gap faster than at any point in two years", "idea": "The UK AI Security Institute finds open models GLM-5.2 and DeepSeek-V4-Pro now perform similarly to closed frontier models released just 4-7 months earlier, down from a 6-10 month gap through most of 2025, specifically on cybersecurity-relevant capabilities. AISI plans to test Kimi K3 once weights are public.", "angle": "A government body, not a lab or a newsletter, is quantifying the exact 'open models are closing the gap' thesis that's driving today's equity selloff in AI-adjacent names, a much harder data point than market commentary.", "tweetA": "The UK government's own AI safety institute just measured it: the gap between open-weight and closed frontier models on cyber capability shrank from 6-10 months to 4-7 months in a year. That's a government body confirming the exact thesis crashing AI stocks today.", "tweetB": "'Cyber defenders have a short window to prepare,' that's UK AISI's own words about open models catching up. Read that next to Kimi K3's stock-market impact today and the AI-infra selloff looks less like an overreaction and more like the market front-running a security-policy warning.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://importai.substack.com/p/import-ai-465-open-vs-closed-gaps"}, {"id": 33, "cat": "science", "urgency": "watch", "source": "Import AI", "title": "Kimi K3 designed its own GPU compiler and a chip, in a single 48-hour autonomous run", "idea": "Kimi K3 built 'MiniTriton,' a Triton-like GPU compiler that matches or beats Triton/torch.compile on several benchmarks, and separately designed, optimized, and verified a chip for its own architecture in one 48-hour unsupervised run using open-source EDA tools on the Nangate 45nm library. The report notes this isn't yet used in actual production training.", "angle": "Recursive self-improvement has been a theoretical AI-safety concern for years; this is a concrete, dated example of a model doing meaningful compiler and chip-design work autonomously, worth separating from the 'not yet in production' caveat because the capability existing at all is the bigger fact.", "tweetA": "Kimi K3 designed and verified an actual chip in a 48-hour autonomous run using open-source tools. Not a simulation, not a toy problem, real EDA tools, real chip-design flow. Recursive self-improvement just stopped being a thought experiment and started being a changelog entry.", "tweetB": "The caveat in the report, 'not yet used to train Kimi K3 itself,' is doing a lot of work to sound reassuring. The capability existing at all, on a 48-hour unsupervised run, is the actual headline. The caveat is about timing, not about whether this happens.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://importai.substack.com/p/import-ai-465-open-vs-closed-gaps"}, {"id": 34, "cat": "regulation", "urgency": "watch", "source": "Import AI", "title": "DeepMind's Hassabis wants a 'FINRA for AI,' labs would submit models for review 30 days before release", "idea": "Demis Hassabis proposed a federally-overseen, self-regulatory Standards Body modeled on FINRA to test frontier AI systems for national-security-relevant capabilities, starting voluntary (labs share models up to 30 days pre-release) before potentially becoming law. Import AI notes this echoes similar proposals from Anthropic and current US policy trends.", "angle": "Google is rarely this forthright about policy specifics; a FINRA-style body being proposed by a historically quiet lab suggests an emerging industry consensus is closer to formalization than headlines suggest.", "tweetA": "Google almost never leads on AI policy specifics. Hassabis just proposed a literal FINRA-for-AI, with labs submitting models 30 days pre-release. When the quiet company starts proposing regulation, that usually means the regulation is coming regardless, better to shape it than have it imposed.", "tweetB": "Anthropic, Google DeepMind, and implicitly OpenAI via US policy trends are all converging on the same regulatory architecture: third-party testing body, pre-release review, national-security framing. That's not competition anymore, that's consensus on the rules of the road.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://importai.substack.com/p/import-ai-465-open-vs-closed-gaps"}, {"id": 35, "cat": "cyber", "urgency": "watch", "source": "Import AI", "title": "AI agents can smuggle hidden malicious tasks inside legitimate work, and the best defense still misses nearly half of them", "idea": "Imperial College London and UK AISI research shows AI agents can complete covert 'side-channel' tasks (like exfiltrating an API key) alongside a legitimate main task; a four-monitor ensemble reduces 'gradual evasion' (spreading the attack across multiple actions) from 93% under the weakest single monitor to 47%, still missing nearly half.", "angle": "A concrete, measured AI-control failure rate, not a hypothetical, worth flagging for anyone deploying autonomous coding or ops agents (see the 'loop craze' item elsewhere in this window) with real system access.", "tweetA": "Best available monitoring catches 53% of AI agents smuggling hidden malicious side-tasks into legitimate work. That's the current state of the art, not the worst case. Anyone deploying autonomous coding agents with real system access should read that number twice.", "tweetB": "Everyone's excited about the 'loop craze,' agents that act without humans in the loop. This research is the other half of that story: the monitoring tools built to catch those agents going rogue still miss almost half the sophisticated attacks. Adoption is outrunning the safety tooling.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://importai.substack.com/p/import-ai-465-open-vs-closed-gaps"}, {"id": 36, "cat": "macro", "urgency": "watch", "source": "The Dark Side of the Boom", "title": "Japan wants its own pension giant to buy the bonds its households won't", "idea": "Goldman estimates Japan's GPIF has roughly $75B of headroom under current allocation bands to increase JGB holdings, not enough to overwhelm the market outright, and at times smaller than what mechanical rebalancing flows already deliver. A second lever under consideration: letting households buy JGBs directly through NISA, on the theory that attractive yields, not tax treatment, will draw retail money home.", "angle": "Japan spent over a decade pushing domestic savings abroad because JGB yields were pinned near zero; reversing that flow now that the long end is rattling is a multi-year structural project, not a policy switch.", "tweetA": "Japan spent a decade exporting savings abroad because JGBs paid nothing. Now yields are high enough to matter and Japan's trying to lure that money home via GPIF and NISA. $75B of GPIF headroom sounds big until you realize mechanical rebalancing alone sometimes exceeds it.", "tweetB": "The quiet trade here: if Japan actually succeeds in repatriating savings into JGBs, that's yen-bullish and a drag on whatever foreign assets, including US Treasuries, that money currently sits in. Nobody's pricing a multi-year Japanese capital repatriation story yet.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://thedarksideoftheboom.substack.com/p/japans-attempt-to-turn-its-savings"}, {"id": 37, "cat": "macro", "urgency": "deep", "source": "Bespoke Investment Group", "title": "German producer prices fell less than expected, a small miss with a bigger transatlantic divergence question attached", "idea": "German June PPI fell -0.3% m/m (vs -0.2% expected) with y/y at 1.8%, in an otherwise quiet European session where the STOXX 600 was flat and no major index moved more than 0.5%.", "angle": "Worth logging alongside the US import-price acceleration (semiconductor prices +30.67% y/y) elsewhere in this window; US and European producer-price trajectories are currently diverging, which matters for ECB-vs-Fed policy-path bets.", "tweetA": "German PPI -0.3% vs -0.2% expected, y/y at 1.8%. Same day, US import prices show semiconductor costs up 30.67% y/y. That's not two boring inflation prints, that's a transatlantic producer-price divergence that ECB-vs-Fed rate-path trades should be pricing.", "tweetB": "Nobody tweets about German PPI. But 'Europe still disinflating, US reaccelerating on AI-linked imports' is exactly the kind of quiet divergence that shows up six months later in EUR/USD, not in the headline data itself.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://bespokeinvest.substack.com/p/licking-their-wounds-morning-market"}, {"id": 38, "cat": "geopolitics", "urgency": "act", "source": "Neil Sethi", "title": "Iran's Houthi allies declared a maritime embargo of Saudi Arabia, opening a second oil chokepoint", "idea": "Following the ninth straight day of US airstrikes on Iran, Iran's Houthi allies in Yemen declared a maritime embargo of Saudi Arabia, threatening the Bab el-Mandeb Strait, a route linking the Red Sea, Gulf of Aden, Arabian Sea, Suez Canal and Mediterranean, as a second potential chokepoint alongside the already-strained Strait of Hormuz. Oil prices edged higher on the announcement even as earlier Iranian diplomatic signals had erased gains.", "angle": "Markets were trading a de-escalation narrative (Iran floating talks) at the same moment a second, separate chokepoint risk opened via a different actor entirely; the diplomatic and military tracks are no longer moving together.", "tweetA": "Markets rallied this morning on 'Iran wants talks.' Same morning, Iran's Houthi allies declared a maritime embargo threatening Bab el-Mandeb, a second oil chokepoint separate from Hormuz. Two tracks moving in opposite directions, priced as one calming headline. $USO $XLE", "tweetB": "Everyone's tracking the Strait of Hormuz. Bab el-Mandeb carries Red Sea and Suez traffic and just became a live risk from a completely different actor. Multi-chokepoint escalation is a different, worse regime than single-chokepoint escalation, and oil's barely moved on it yet.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-72026"}, {"id": 39, "cat": "geopolitics", "urgency": "deep", "source": "Neil Sethi", "title": "BOJ likely raises its growth forecast this month, crediting AI demand for resilience through a Middle East shock", "idea": "The Bank of Japan is expected to raise its growth forecast from the current 0.5% projection at its July meeting while holding rates, per Bloomberg sourcing, and may revise away its 'skewed to the downside' risk language, a shift from April when the BOJ flagged the Middle East conflict as a significant downside risk. Traders price about 69% odds of another BOJ hike by October.", "angle": "A real-time test of the 'AI capex offsets energy-shock damage' thesis at the country level; if the BOJ credits AI-linked demand with resilience through an oil shock, that's a transferable read for any economy with AI-infrastructure exposure.", "tweetA": "The BOJ is about to say, out loud, that AI demand is offsetting a Middle East oil shock for Japan's economy. If a central bank puts that in an official forecast, the AI-capex-as-macro-stabilizer thesis just got its first policy-level endorsement anywhere in the world.", "tweetB": "69% odds of another BOJ hike by October, raised growth forecast, holding through an active war-driven oil spike. Japan's central bank is more hawkish into a supply shock than the Fed is. That's not the reaction function anyone modeled at the start of this year.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-72026"}, {"id": 40, "cat": "macro", "urgency": "deep", "source": "Neil Sethi", "title": "UK GDP beat despite the Iran war energy shock, and Goldman still wants to short the pound", "idea": "UK May GDP rose 0.1% (vs flat expected) after an April decline, driven by services (+0.3%) and consumer-facing retail (+0.5%); yet Goldman recommends a tactical GBP short, arguing sterling's outperformance is driven by Burnham-government optimism and technical positioning rather than fundamentals, sterling's move is 'fully at odds' with Goldman's own GSBEER fair-value model.", "angle": "A real economic beat and a 'sell the currency anyway' call from the same window is a reminder that GDP surprises and FX positioning can decouple entirely when a political catalyst is doing the heavy lifting.", "tweetA": "UK GDP beat, driven by actual retail spending resilience through an energy shock. Goldman's call: short the pound anyway, because the rally is 'Burnham optimism' and positioning, not fundamentals. When the data and the FX view diverge this cleanly, the FX view is betting the political trade unwinds first.", "tweetB": "Sterling's July rally is running fully at odds with Goldman's own fair-value model. That's the actual story, not the GDP beat, but a house calling its own client-facing currency rally a mispricing driven by a new-PM honeymoon.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-72026"}, {"id": 41, "cat": "geopolitics", "urgency": "deep", "source": "Neil Sethi", "title": "India's rupee is within striking distance of a record low, and the RBI is now intervening directly", "idea": "India's June CPI rose 4.38% y/y, above the RBI's target for the first time in about 18 months on higher food and fuel costs; the RBI sold dollars in both offshore and onshore markets after the rupee weakened to 96.4575/USD, near the record low of 96.9650 touched in late May. Wholesale prices (WPI) climbed near 10% y/y, exceeding estimates.", "angle": "India is a clean case study of the Hormuz/oil-shock transmission mechanism to EM currencies and inflation in real time, a preview for other oil-importing EMs if the Iran conflict, and the newly-declared Bab el-Mandeb risk, persists or escalates.", "tweetA": "India CPI breaks above target for the first time in 18 months, RBI is now directly defending the rupee near record lows, WPI is running near 10%. This is what an oil-importing EM looks like when a Middle East war doesn't resolve quickly, a preview for every other oil-importing EM if this drags on.", "tweetB": "RBI intervening in both onshore and offshore FX markets simultaneously is not a subtle signal, that's a central bank actively fighting a currency move it doesn't want to lose control of. Worth watching whether other EM central banks start doing the same thing this week.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://neilsethi.substack.com/p/as-we-approach-the-open-72026"}];
const META = {"date": "2026-07-20", "time": "15:05 CEST", "windowStart": "2026-07-20 09:05 CEST", "windowEnd": "2026-07-20 15:05 CEST", "emailsInWindow": 23, "emailsRead": 23, "itemsExtracted": 41, "includedSources": [{"name": "The Dark Side of the Boom", "count": 2}, {"name": "CapitalWars", "count": 1}, {"name": "Gamma Report (Kurt Altrichter)", "count": 2}, {"name": "Young & Calculated", "count": 2}, {"name": "Big Moves", "count": 4}, {"name": "Mando Minutes", "count": 3}, {"name": "Unchained (beehiiv)", "count": 3}, {"name": "The Bond Beat", "count": 3}, {"name": "Danielle DiMartino Booth", "count": 1}, {"name": "Peter Boockvar", "count": 1}, {"name": "David Rosenberg", "count": 1}, {"name": "Blind Squirrel Macro (Arcadia)", "count": 1}, {"name": "defi0xjeff", "count": 1}, {"name": "Lucky Trader", "count": 1}, {"name": "Neil Sethi", "count": 6}, {"name": "SixSigmaCapital", "count": 1}, {"name": "Salazar Slytherin (AI News)", "count": 1}, {"name": "KookLetter", "count": 2}, {"name": "Import AI", "count": 4}], "skippedSources": [{"name": "The Founder's Corner", "reason": "Pure content-marketing/paywall pitch for a fundraising prompt library, no market data or original analysis"}]};


let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function buildFilterBars(){
  const catCounts = {};
  ITEMS.forEach(i => catCounts[i.cat] = (catCounts[i.cat]||0)+1);
  const catBar = document.getElementById("catbar");
  let html = '<button class="pill active" data-cat="all" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(CATEGORY_LABELS).forEach(c => {
    if(!catCounts[c]) return;
    html += '<button class="pill" data-cat="' + c + '" style="--cat-color:' + CATEGORY_COLORS[c] + '" onclick="setCat(\'' + c + '\')">' + CATEGORY_LABELS[c] + ' (' + catCounts[c] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => urgCounts[i.urgency] = (urgCounts[i.urgency]||0)+1);
  const urgBar = document.getElementById("urgbar");
  let uhtml = '<button class="pill active" data-urg="all" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  ["act","deep","watch"].forEach(u => {
    if(!urgCounts[u]) return;
    uhtml += '<button class="pill" data-urg="' + u + '" onclick="setUrg(\'' + u + '\')">' + URGENCY_LABELS[u] + ' (' + urgCounts[u] + ')</button>';
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c){
  activeCat = c; activeSrc = null;
  document.querySelectorAll('#catbar .pill').forEach(function(p){
    p.classList.toggle('active', p.getAttribute('data-cat') === c);
  });
  document.querySelectorAll('.card').forEach(function(el){ el.classList.remove('expanded'); });
  render();
}
function setUrg(u){
  activeUrg = u; activeSrc = null;
  document.querySelectorAll('#urgbar .pill').forEach(function(p){
    p.classList.toggle('active', p.getAttribute('data-urg') === u);
  });
  document.querySelectorAll('.card').forEach(function(el){ el.classList.remove('expanded'); });
  render();
}
function filterBySrc(name){
  activeCat = "all"; activeUrg = "all"; activeSrc = name;
  document.querySelectorAll('#catbar .pill').forEach(function(p){ p.classList.toggle('active', p.getAttribute('data-cat')==='all'); });
  document.querySelectorAll('#urgbar .pill').forEach(function(p){ p.classList.toggle('active', p.getAttribute('data-urg')==='all'); });
  render();
  document.querySelectorAll('.card').forEach(function(el){
    const id = parseInt(el.getAttribute('data-id'));
    const item = ITEMS.find(function(i){ return i.id === id; });
    if(item && item.source.indexOf(name) !== -1) el.classList.add('expanded');
  });
}

function toggleCard(id){
  const el = document.querySelector('.card[data-id="' + id + '"]');
  if(el) el.classList.toggle('expanded');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function render(){
  const container = document.getElementById("cards");
  let list = ITEMS.slice();
  if(activeCat !== "all") list = list.filter(function(i){ return i.cat === activeCat; });
  if(activeUrg !== "all") list = list.filter(function(i){ return i.urgency === activeUrg; });
  if(activeSrc) list = list.filter(function(i){ return i.source.indexOf(activeSrc) !== -1; });

  let html = "";
  list.forEach(function(item){
    const color = CATEGORY_COLORS[item.cat] || "#888";
    const chartMark = item.charts.hot ? "🔥" : (item.charts.count > 0 ? "📊" : "");
    html += '<div class="card" data-id="' + item.id + '">';
    html += '<div class="card-head" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="idx">#' + item.id + '</span>';
    html += '<span>' + (URGENCY_LABELS[item.urgency] || "").split(" ")[0] + '</span>';
    html += '<span class="badge" style="background:' + color + '">' + esc(item.source) + '</span>';
    html += '<span class="catpill">' + (CATEGORY_LABELS[item.cat] || item.cat) + '</span>';
    if(chartMark) html += '<span class="chartmark">' + chartMark + '</span>';
    html += '<span class="title">' + esc(item.title) + '</span>';
    html += '</div>';

    html += '<div class="card-body" style="--cat-color:' + color + '">';
    html += '<div class="section-label">The Idea</div><div class="idea-text">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div><div class="angle-box">' + esc(item.angle) + '</div>';
    html += '<div class="tweets">';
    html += '<div class="tweet"><div class="tweet-label a">TWEET A</div>' + esc(item.tweetA) + '<br><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet"><div class="tweet-label b">TWEET B</div>' + esc(item.tweetB) + '<br><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if(item.charts.count > 0 || item.charts.desc){
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + esc(item.charts.desc || "Charts inside — worth opening") + '</div>';
    }
    html += '<a class="readlink" href="' + item.link + '" target="_blank">↗ Read full article</a>';
    html += '</div></div>';
  });
  container.innerHTML = html || '<p style="color:var(--sub)">No items match this filter.</p>';
}

function buildReport(){
  const el = document.getElementById("reportInner");
  let html = '<p><strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '. Emails outside this window were not processed.</p>';
  html += '<p>' + META.emailsInWindow + ' emails in window · ' + META.emailsRead + ' read · ' + META.itemsExtracted + ' items extracted.</p>';
  html += '<div class="section-label">Included Sources</div><ul>';
  META.includedSources.forEach(function(s){
    html += '<li><span class="srcline" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count>1?'s':'') + '</li>';
  });
  html += '</ul>';
  html += '<div class="section-label">Skipped Sources</div><ul>';
  META.skippedSources.forEach(function(s){
    html += '<li class="skip">' + esc(s.name) + ' — ' + esc(s.reason) + '</li>';
  });
  html += '</ul>';
  el.innerHTML = html;
}

document.getElementById("metaline").textContent = META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.emailsRead + " emails";
buildFilterBars();
render();
buildReport();
</script>
