<script>
const ITEMS = [{"id": 1, "cat": "positioning", "urgency": "deep", "source": "Phil Dauber / Weekender", "title": "The President's teleprompter operator was the best-informed trader in Washington", "idea": "The President's longtime teleprompter operator — final eyes on prepared remarks — is on unpaid leave and in CFTC settlement talks over roughly $100,000 of profits made on Kalshi's word-mention markets, across more than a dozen speeches in three months. A White House memo in March had already told staff not to do exactly this. He wasn't caught by the ethics office — Kalshi's own surveillance desk flagged the trades.", "angle": "Prediction markets on political speech are turning into better insider-trading detectors than the compliance office that's supposed to police them. Worth watching what other 'edge' surfaces as more of these speech-outcome markets launch.", "tweetA": "The single best-informed trader in DC this year wasn't a hedge fund. It was the guy running the teleprompter. He knew the words before they were said and bet on Kalshi. The exchange caught him, not the White House ethics office. Compliance is now outsourced to prediction-market surveillance desks.", "tweetB": "A March memo told staff not to trade on the president's script. Someone did it 12+ times anyway and nearly got away with it, until the market itself flagged the pattern. If you want to know who's actually policing information asymmetry in Washington now, it's not the counsel's office, it's an exchange algo.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 2, "cat": "geopolitics", "urgency": "act", "source": "Phil Dauber / Weekender", "title": "Iran hit two Gulf desalination plants in two days — that's the real escalation tripwire, not the Strait", "idea": "Kuwait draws ~90% of its drinking water from desalination, Qatar ~99%, Bahrain ~85%, Saudi ~70% — none of these states has a permanent river. Iran struck a Kuwaiti desalination/power plant Friday and a second facility Saturday, sparking fires and forcing precautionary shutdowns. Every risk matrix on the author's desk specifies 'attack on Gulf oil infrastructure' as the escalation tail. That's the wrong target.", "angle": "The market is pricing this as an oil story (Brent +15.9% on the week, closing pinned at the day's high). The actual tail risk — a GCC government losing its water supply and revoking US basing rights — has no hedge and nobody is pricing it.", "tweetA": "Everyone's risk matrix says 'watch Gulf oil infrastructure.' Wrong target. Iran hit a Kuwaiti desalination plant Friday, a second Saturday. Qatar gets 99% of its water from desal, zero rivers as backup. This war doesn't end when Tehran folds. It ends when a GCC government can't keep the taps running in August and pulls US basing rights.", "tweetB": "Brent +15.9% this week and everyone's trading it as a supply curve. An oil facility hit reprices a barrel. A desalination facility hit reprices a government's survival. Nobody's hedged for the second one because nobody's watching for it.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 3, "cat": "positioning", "urgency": "deep", "source": "Phil Dauber / Weekender + Six Sigma Capital", "title": "81% of semiconductor investors were overweight going into the bear market — Kimi K3 was the trigger, not the cause", "idea": "Evercore ISI's survey shows 81% of semiconductor investors overweight and only 4% underweight, taken the same week the group entered a bear market — SMH down 17.2% from its 52-week high. Six Sigma's own chart work shows SOXX broke convincingly below its 50-day this week (down ~10%) after flagging a bearish 5/21 EMA cross the week prior. TSMC beat, raised capex to $60-64B, guided revenue growth above 40%, and still closed down 2.77% on Friday.", "angle": "When positioning is this one-sided there's no incremental buyer left to reward a beat — this reads as a liquidation dynamic, not a verdict on AI capex itself.", "tweetA": "81% overweight, 4% underweight. TSMC beat, raised capex to $64B, guided +40% revenue — and still fell 2.77% the same day. That's not the market judging the fundamentals. That's the market discovering there's no one left to sell to.", "tweetB": "A Chinese open-weight model release doesn't erase $2T of semiconductor value on its own. What it does is give an 81%-overweight crowd a reason to finally sell. Kimi K3 was the match. The positioning was the gasoline.", "charts": {"count": 0, "hot": false, "desc": "Charts inside — worth opening"}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 4, "cat": "macro", "urgency": "deep", "source": "Phil Dauber / Weekender", "title": "Single-stock volatility just hit its highest ratio to index vol since 1995", "idea": "The ratio of average single-stock 3-month implied vol to index 3-month implied vol spiked to roughly 2.7x — a record on data back to 1995, higher than 2000, 2018 or the COVID complex. Implied correlation collapsed to a record low. IBM fell 25% in a session, Netflix hit a fresh 52-week low, Micron traded a 12% intraday range — while the S&P moved just 1.0% on the week.", "angle": "The index is lying about how violent this week actually was. Index hedges (SPY puts, VIX calls) are cheap and close to useless right now; the only thing that worked was already-expensive single-name protection.", "tweetA": "IBM -25% in a session. Netflix at a 52-week low. Micron swinging 12% intraday. The S&P: -1.0% on the week. Single-stock vol vs index vol just hit the highest ratio since 1995 — higher than 2000, higher than COVID. The index isn't calm, it's just full of things cancelling each other out.", "tweetB": "If your hedge this week was index puts, it didn't work. Record dispersion means the index barely moved while everything inside it broke in opposite directions. That state doesn't stay stable — either the losers infect the winners, or correlation snaps back violently. Neither is bullish.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 5, "cat": "gold", "urgency": "deep", "source": "Phil Dauber / Weekender + Six Sigma Capital", "title": "Gold, yen and dollar were all sold during a shooting war — that's forced liquidation, not risk-off", "idea": "Seven consecutive nights of Iran/US strikes, Brent +15.9%, VIX +25% on the week — and gold still fell 2.2%, closing 5.6% below its 50-day and, per Six Sigma's chart, losing its 200-day moving average for the first time since the current bull run began in late 2023. Yen was the worst G10 performer; the dollar fell for a third straight week. Hedge fund net-long gold hit a five-month high as of July 14 — bought into the war, sold through it.", "angle": "Three of four traditional havens got offered into the exact scenario they're supposed to hedge. That reads as a de-gross — forced selling of whatever's liquid and profitable — not a rotation, and de-grosses don't end because headlines improve; they end when the selling exhausts itself.", "tweetA": "Shooting war, oil up 16%, VIX up 25% — the textbook setup to bid gold. Gold fell 2.2% and lost its 200-day for the first time since the bull run started in 2023. When the hedge doesn't hedge during the exact scenario it exists for, that's not a market view, that's someone being forced to sell whatever they can, not what they want to.", "tweetB": "Hedge funds went net-long gold into the war and sold through it. Gold, yen and dollar all got offered simultaneously this week. Real risk-off buys havens. This sold all of them. 'De-gross,' not 'rotation' — and de-grosses don't end just because the news calms down.", "charts": {"count": 1, "hot": true, "desc": "Six Sigma's gold chart: price rejected repeatedly at the descending 20-day EMA, losing the 200-day for the first time since the 2023 bull run began"}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 6, "cat": "AI/infra", "urgency": "act", "source": "Phil Dauber / Weekender", "title": "IBM fell 25% in one session — not because AI is a bubble, but because it's real and eating IBM's budget", "idea": "IBM dropped 25% Tuesday after disclosing customers are redirecting spend away from its software toward AI servers and memory, closing the week down 36% from its 52-week high. In the same week, hyperscaler AI revenue ex-China ran roughly $25B in Q1 against roughly $21B of data-center depreciation — arguably the first quarter the AI spend pays for itself.", "angle": "The AI trade isn't deflating, it's bifurcating: legacy enterprise software is the casualty, not compute. Anyone shorting semis this week on 'AI bubble' logic had the mechanism backwards.", "tweetA": "IBM -25% in a day isn't an AI-bubble signal. It's an AI-is-real signal: customers are literally telling IBM 'we're spending that money on GPUs and memory instead of your software.' The bubble story and the budget-reallocation story look identical on a chart and mean opposite things.", "tweetB": "Hyperscaler AI revenue is now roughly matching data-center depreciation for the first time. The spend is starting to pay for itself. IBM is the collateral damage of that math finally working, not proof that it doesn't.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 7, "cat": "geopolitics", "urgency": "watch", "source": "Phil Dauber / Weekender", "title": "Syria quietly became a top Mideast fuel exporter under cover of the Iran war", "idea": "Iraq and Syria revived a pipeline idle since 2003 to route northern Iraqi crude to the Mediterranean, and Iraq is trucking fuel oil through Syria by the convoy. Syria has gone from near-zero to more than a quarter of Middle Eastern fuel export volumes in a matter of months — a state that was an international pariah eighteen months ago.", "angle": "This is a durable geopolitical realignment happening in the shadow of a louder war story, and almost nobody is covering it — worth tracking Syrian energy-infrastructure and sanctions-adjacent exposure as this normalizes.", "tweetA": "While everyone watches Hormuz tanker traffic, Syria quietly became a top-tier Mideast fuel exporter — from basically zero. A pipeline dead since 2003 came back online. A country that was a pariah 18 months ago is now critical regional logistics infrastructure. Wars don't just destroy capacity, they redraw who controls it.", "tweetB": "The Hormuz story is a price. The Syria pipeline story is a permanent rewiring of who moves Middle Eastern energy. One of these reverses when the war ends. The other one doesn't.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 8, "cat": "macro", "urgency": "deep", "source": "Phil Dauber / Weekender", "title": "Fed says 'no tolerance' for inflation, market prices a 20% chance it does anything about it", "idea": "Fed Chair Warsh told the Senate the FOMC has 'no tolerance for persistently elevated inflation' and explicitly threw out forward guidance. Within 48 hours the market cut July hike odds to roughly 20%. Six other officials (Logan, Hammack, Cook, Jefferson, Waller) all leaned hawkish the same week, and the June minutes show some already making the case for a hike.", "angle": "Either the Fed has essentially zero credibility left (the market ignores the chair outright) or the market is dangerously complacent into a live July 28-29 meeting — especially since the soft CPI print everyone's citing predates this month's gasoline pass-through from the oil spike.", "tweetA": "A Fed chair says 'no tolerance for inflation' and six other officials lean hawkish the same week. Market response: cut hike odds to 20%. That gap is either 'nobody believes the Fed anymore' or 'a live FOMC meeting is being priced as a non-event.' Both are trades. Only one is priced.", "tweetB": "The soft CPI print everyone's citing to justify low hike odds predates this month's oil spike hitting the pump. The market is pricing last month's inflation data against next month's gasoline shock. That's a timing mismatch, not a forecast.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}, {"id": 9, "cat": "AI/infra", "urgency": "deep", "source": "HRMT / Quality Value — Atlassian $TEAM deep dive", "title": "Atlassian's live demo: feeding Claude Code your work context makes it 51% cheaper and 44% better", "idea": "At Atlassian's Analyst Day, using the identical complex engineering task and the same agentic harness (Claude Code), tasks run through the company's Teamwork Graph cost $1.32 vs $2.68 without it — 51% cheaper, 44% better output quality, 48% fewer tokens, finished a minute faster. Separately: customers using Atlassian's MCP server grow ARR at 2x the rate of those who don't.", "angle": "One of the first hard, apples-to-apples numbers on what enterprise 'context' is actually worth to agentic AI economics, not a vibes claim. If context genuinely halves inference cost, the moat isn't the model, it's whoever owns the data graph feeding it.", "tweetA": "Same task. Same model. Same harness. The only variable: whether the agent had access to Atlassian's work-context graph. Result: 51% cheaper, 44% better, 48% fewer tokens. If that ratio holds elsewhere, raw model intelligence is a commodity and the scarce asset is whoever owns your company's context.", "tweetB": "Everyone's debating whether AI kills SaaS seats. Atlassian just published a number that reframes the question: customers plugged into their MCP server grow ARR 2x faster than those who aren't. The bear case assumed AI shrinks the pie. The data says whoever controls the context captures more of a bigger pie.", "charts": {"count": 0, "hot": false, "desc": "Full deck referenced in the deep dive — worth opening for the one-pager visual summary"}, "link": "https://hrmt.substack.com/p/atlassian-team-saas-pocalyspe-in"}, {"id": 10, "cat": "credit", "urgency": "deep", "source": "HRMT / Quality Value — Atlassian $TEAM deep dive", "title": "Atlassian's FY27 revenue is about to look weak — and it's an accounting artifact, not a slowdown", "idea": "Atlassian pulled its Data Center end-of-life forward to March 2029, which under ASC 606 forces upfront revenue recognition on those contracts from 20% to 50% — pulling an estimated $200-250M of FY27 revenue into FY26. Meanwhile Cloud revenue (unaffected by the distortion) is accelerating to +26.5%, and RPO — signed but not-yet-recognized contracts — is growing +37% YoY, far outpacing reported revenue.", "angle": "A textbook setup for an algo-driven overreaction: headline growth mechanically decelerates in FY27 while the real business (Cloud, RPO) keeps accelerating. Worth watching for the exact moment quant/retail flows read the headline and sell.", "tweetA": "Atlassian pulled its Data Center shutdown forward a year. Under ASC 606 that yanks ~$200-250M of FY27 revenue into FY26. So FY27 headline growth is going to look like a slowdown that isn't real, while RPO — the actual signal — is up 37% and Cloud is accelerating to 26.5%. Exactly the kind of number that gets sold on the headline.", "tweetB": "The CEO literally said on stage: 'now the bears are going to come out and say we're slowing down.' He's pre-announcing the misread, on the record, months in advance. When management tells you exactly how the market is about to misprice a number, that's either supreme confidence or a tell worth trading.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://hrmt.substack.com/p/atlassian-team-saas-pocalyspe-in"}, {"id": 11, "cat": "AI/infra", "urgency": "deep", "source": "Market Sentiment — ASIC", "title": "Google's TPU7x matches Nvidia's B200 on compute at roughly a third of the price", "idea": "TPU7x runs ~$13,000 per unit vs Nvidia's B200 at ~$35,000, matching raw compute. Independent benchmarks (Artificial Analysis) show Google's TPUs delivering roughly 2x more tokens per TFLOP than Nvidia chips on open-source Llama models. The custom ASIC share of AI accelerators is projected to grow from 8% today to 19% by 2033 — a $118B segment compounding at 27% — and the author thinks that projection is understated given how fast open models are improving.", "angle": "Nvidia's 85% gross margin on AI chips is functionally a tax every hyperscaler is now incentivized to engineer around once volume clears the roughly $500M ASIC design threshold — and every hyperscaler has now crossed it.", "tweetA": "Nvidia's 85% gross margin on AI silicon isn't a permanent toll, it's the exact amount of money that funds someone else's ASIC program. TPU7x already matches B200 on compute at a third of the price. Every hyperscaler has now crossed the ~$500M scale threshold where building your own chip beats paying Jensen's margin.", "tweetB": "$100 of inference cost, roughly $50 to Nvidia. That's not a chip price, that's a toll booth. The custom-silicon share of AI accelerators is projected to more than double by 2033, and given how fast open models are catching up on capability, the incentive to escape that toll only gets stronger.", "charts": {"count": 1, "hot": true, "desc": "Artificial Analysis benchmark chart: tokens per TFLOP across hardware, TPUs roughly 2x ahead of Nvidia chips on open Llama models"}, "link": "https://www.marketsentiment.co/p/asic"}, {"id": 12, "cat": "AI/infra", "urgency": "act", "source": "Market Sentiment — ASIC", "title": "Uber burned its entire 2026 AI budget in four months. Microsoft canceled Claude Code seats for Copilot.", "idea": "Uber burned through its entire 2026 AI budget in four months on coding tools, and its COO admits it's hard to draw a line between token consumption and useful output. Microsoft reportedly canceled most of its direct Claude Code licenses this month and moved engineers to GitHub Copilot.", "angle": "The 'token-maxxing era' the author describes is visibly ending in real time at two of the largest enterprise AI buyers — an early signal of the ROI-discipline phase that decides which AI vendors actually get paid long-term.", "tweetA": "Uber spent its whole 2026 AI coding budget in 4 months and can't fully account for what it bought. Microsoft just cancelled its Claude Code seats for Copilot. Same story twice: the unlimited-token honeymoon is over, and the next 18 months are about proving ROI per token, not winning the demo.", "tweetB": "Everyone's watching model benchmarks. The number that actually matters is what happened at Uber and Microsoft this month: a Fortune-scale company hit its AI budget ceiling in a quarter, and another swapped vendors purely on cost. That's the leading indicator for AI vendor pricing power in 2027, not another eval score.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.marketsentiment.co/p/asic"}, {"id": 13, "cat": "positioning", "urgency": "deep", "source": "The Dark Side of the Boom", "title": "Simon White: part of the semiconductor surge was financed by selling gold and Bitcoin — now it's round-tripping", "idea": "Bloomberg's Simon White traces flows showing part of the money that powered the semiconductor rally came directly out of gold and Bitcoin. As semis unwind, that sets up investors rotating back into the assets they sold near the top — not out of renewed conviction, but to recoup the loss.", "angle": "This complicates the 'AI unwind = flight to safety' narrative. Some of the money flowing back into gold/BTC right now isn't a macro hedge trade, it's revenge-buying by people trying to make back what they lost in chips.", "tweetA": "Simon White's flow work says part of the semi rally was literally funded by selling gold and Bitcoin. Now that chips are down 17%, some of that money wants its old home back — not because the macro case for gold/BTC improved, but to recoup the loss. Know the difference between conviction flow and revenge flow before you read too much into the bounce.", "tweetB": "The same investor who sold gold to buy chips in the spring isn't going to sit and journal about capital-allocation theory now that semis are down. He's going to try to buy gold back before it runs without him. That's not a macro rotation story, that's retail psychology at institutional size.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://thedarksideoftheboom.substack.com/p/you-know-the-drill-follow-the-money"}, {"id": 14, "cat": "gold", "urgency": "watch", "source": "Six Sigma Capital — Preview of the Week Ahead", "title": "Gold lost its 200-day moving average for the first time since the 2023 bull run began", "idea": "Gold trades at $4,016.89, 6.93% below its 50-day SMA and 10.3% below its 200-day — the first time it has lost the 200-day since the current bull run started in late 2023. It has been repeatedly rejected at the descending 20-day EMA, which is now acting as resistance. The 200-day currently sits at $4,478.", "angle": "A multi-year bull market losing its 200-day for the first time is a technical regime-change signal worth flagging even before you have a fundamental view — $3,700-3,900 is the zone to watch for the next entry.", "tweetA": "Gold just lost its 200-day moving average for the first time since the bull run started in late 2023. Two years of trend intact, broken in one move. Doesn't mean the thesis is dead, but the easy trend-following trade is over — this is now a level-to-level fight.", "tweetB": "$4,478 is where gold's 200-day sits right now — the line bulls need to reclaim. $3,700-3,900 is where the setup gets interesting again if it doesn't. Everything in between is just noise until one of those two things happens.", "charts": {"count": 1, "hot": true, "desc": "Gold daily chart: rejected repeatedly at the descending 20-day EMA, first close below the 200-day since 2023"}, "link": "https://sixsigmaresearch.com/p/preview-of-the-week-ahead-wc-july-bab"}, {"id": 15, "cat": "culture", "urgency": "watch", "source": "McKinsey Classics", "title": "McKinsey resurfaces a 2007 CEO-transformation framework — worth asking why now", "idea": "McKinsey republished a 2007 'classic' arguing successful CEO-led transformations require four moves: make it personal, role-model the desired behavior, build a committed top team, and relentlessly pursue impact. It's their 'timeless insights' pick for July 2026.", "angle": "Worth noting which classic McKinsey chooses to resurface and when — amid an AI-driven organizational-chaos moment (see the Atlassian thesis above), 'the CEO must personally lead the transformation' is a pointed choice, not a random archive pull.", "tweetA": "McKinsey just resurfaced a 2007 framework on CEO-led transformation, unprompted, in July 2026. Read that as a signal, not trivia: consulting firms don't randomly dust off old frameworks, they publish the ones clients are currently paying to hear. AI-transformation anxiety in the C-suite is apparently high enough that 'the CEO has to personally believe in this' needs restating.", "tweetB": "Nearly two decades old and the four moves haven't changed: meaningful, role-model, top team, relentless impact. What's changed is the transformation itself. In 2007 it was probably ERP or offshoring. In 2026 it's an agentic workforce. Same playbook, much higher stakes if the CEO gets the personal buy-in wrong.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.mckinsey.com/featured-insights/leadership/the-ceos-role-in-leading-transformation"}, {"id": 16, "cat": "venture", "urgency": "deep", "source": "The Founders Corner", "title": "Anthropic and OpenAI are now worth $1.8T combined — roughly half the value of the top 30 private startups on earth", "idea": "Latest private-market rankings show Anthropic and OpenAI combined at $1.8 trillion, accounting for nearly half the value of the world's top 30 private startups. Separately, Anthropic ranked #1 in Setter Capital's Q2 secondary-market demand report, ahead of Anduril (#2) and OpenAI (#3).", "angle": "Two companies now represent roughly half of all private mega-cap value on the planet — an extraordinary concentration for an asset class that's supposed to be diversified by definition. Worth asking what happens to the entire private-markets index if either one stumbles.", "tweetA": "Anthropic and OpenAI: $1.8T combined. That's not 'two big startups.' That's roughly half the value of the entire top-30 private company list stuffed into two logos. Venture is supposed to be a diversified asset class. Right now it's a two-stock index with extra steps.", "tweetB": "Setter Capital's secondary demand data has Anthropic #1, ahead of Anduril and even OpenAI. Defense tech and frontier AI are now the two things secondary buyers actually want exposure to — everything else in the private-company universe is increasingly a rounding error by comparison.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.the-founders-corner.com/p/the-board-meeting-operating-system"}, {"id": 17, "cat": "regulation", "urgency": "watch", "source": "The Founders Corner", "title": "AI labs are suing over 'distillation' of the exact thing they built their own models from", "idea": "OpenAI, Anthropic and Google are arguing rivals copy their model outputs to build cheaper competing systems. Critics note the same companies trained their own frontier models on scraped web content under a fair-use defense, and are now arguing against the same logic being applied to their own outputs.", "angle": "The same fair-use argument the industry invented is now boomeranging back on it — watch for this tension to surface directly in the eventual AI-copyright case law, since the labs can't sustain both positions with one consistent legal theory.", "tweetA": "The labs that trained on the entire internet under 'fair use' are now suing because someone trained on their outputs. You can't build a $1.8T valuation on one reading of fair use, then sue your way out of that same reading applying to you. Somebody loses that argument in court eventually.", "tweetB": "Distillation lawsuits are the AI industry's first real test of whether 'fair use for me, not for thee' survives contact with a judge. Whoever writes the precedent here sets the ceiling on how defensible every frontier lab's moat actually is.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.the-founders-corner.com/p/the-board-meeting-operating-system"}, {"id": 18, "cat": "venture", "urgency": "deep", "source": "The Founders Corner", "title": "Anthropic is hiring an IPO-specific investor relations lead", "idea": "Anthropic is reportedly hiring a senior investor relations leader as preparations for a potential public listing continue — a role explicitly tasked with balancing public-market investor expectations against the company's public-benefit-corporation structure.", "angle": "Paired with the $1.8T combined valuation and #1 secondary-demand ranking above, this is the clearest concrete signal yet that Anthropic is building actual IPO infrastructure, not just fielding rumors.", "tweetA": "Anthropic hiring an IPO-specific IR lead isn't a rumor, it's infrastructure. Companies build investor relations teams roughly 12-18 months before they actually file. If that timeline holds, pencil in sometime around mid-to-late 2027.", "tweetB": "The interesting part of this hire isn't that it's happening, it's the job description: someone explicitly tasked with reconciling public-market expectations with a public-benefit-corp charter. That tension is going to be the actual story of the Anthropic IPO, not the valuation number.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://www.the-founders-corner.com/p/the-board-meeting-operating-system"}, {"id": 19, "cat": "AI/infra", "urgency": "watch", "source": "NLP News / Elvis Saravia", "title": "Kimi K3: the Chinese open-weight model that triggered a $2T semiconductor selloff", "idea": "Moonshot AI's Kimi K3 — a 2.8-trillion-parameter Stable LatentMoE with a 1M-token context window, native vision, and a new attention design (Kimi Delta Attention) delivering up to 6.3x faster decoding at long context — leads Terminal-Bench 2.1 and scores 67.3 on DeepSWE. Priced from $0.30 to $15 per million tokens, with open weights following July 27.", "angle": "Per Phil Dauber above, this is being misread as the cause of the semiconductor selloff when it was really the trigger for an already-overcrowded trade. Worth separating the genuine technology story from the positioning story.", "tweetA": "Kimi K3 leads Terminal-Bench 2.1 as an open-weight release priced as low as $0.30/M tokens. The market treated this as 'proof AI is cheap now, sell the chips.' Wrong read: a 2.8T-parameter model with 6.3x faster long-context decoding needs MORE compute to serve at scale, not less. The selloff was about positioning, not this model's economics.", "tweetB": "Everyone's citing Kimi K3 as the reason semis broke. Nobody's asking why an 81%-overweight crowd needed a Tuesday Chinese model release as an excuse to finally sell. The model is the headline. The positioning was the actual story.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://nlp.elvissaravia.com/p/ai-agents-weekly-kimi-k3-thinking"}, {"id": 20, "cat": "regulation", "urgency": "deep", "source": "a16z crypto — Patrick McHenry", "title": "Former House Financial Services Chair: the Clarity Act is the biggest tech law since the 1996 Telecoms Act", "idea": "Patrick McHenry argues the crypto market-structure Clarity Act is the first major non-crisis-driven financial legislation since the 1999 Gramm-Leach-Bliley Act — every major bill since 2008 (Dodd-Frank included) has been reactive, written to address a past crisis rather than build forward-looking infrastructure. The GENIUS Act (stablecoins) already passed both chambers with bipartisan support.", "angle": "The framing worth stealing isn't 'crypto regulation is coming,' it's that this would be the first proactive, not reactive, major financial law in nearly two decades — which says something about US legislative capacity independent of what you think about crypto specifically.", "tweetA": "Every major US financial law since 2008 was written to fix the last crisis — Dodd-Frank, GENIUS Act, all reactive. McHenry's real point about the Clarity Act isn't about crypto — it's that Congress hasn't passed forward-looking financial infrastructure without a crisis forcing its hand since 1999. That drought, not the bill itself, is the story.", "tweetB": "The GENIUS Act already passed both chambers. If Clarity follows, it's the first two-part financial framework built proactively rather than post-mortem in a generation. Whether or not you touch crypto, the more interesting trade is what US capacity for proactive tech policy signals for AI regulation next.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://a16zcrypto.substack.com/p/the-time-for-clarity-is-here-the"}, {"id": 21, "cat": "positioning", "urgency": "deep", "source": "Martin Bradstreet — Investing w/ Martin", "title": "The same 'flipper' executive team that sold two medical device startups just showed up at a $100M microcap", "idea": "Exagen ($XGN, ~$100M market cap) has Chas McKhann on its board — who previously flipped Apollo Endosurgery, then joined Silk Road Medical's board right before it sold. CFO Jeffrey Black also came from the Apollo deal. Chairman Tina Nova and CEO John Aballi both came from Decipher Biosciences, which Veracyte bought for $600M. Comp: LabCorp paid 3.5x revenue for a smaller competitor (Myriad's Vectra) in 2021; Exagen is ~70% larger than that deal at time of purchase, trading at 1.5x revenue.", "angle": "Pure pattern-recognition investing: betting on a repeat cast of executives who've already proven the exit playbook twice, at a valuation below what a strategic acquirer already paid for a smaller, slower-growing comparable.", "tweetA": "Two different M&A teams have now converged on the same $100M microcap. The guy who flipped Apollo Endosurgery is on the board. The CEO/Chairman pair that sold Decipher for $600M runs the show. When two separate proven-exit management pedigrees stack on one ticker, that's not a coincidence, that's a thesis with a paper trail.", "tweetB": "LabCorp already paid 3.5x revenue for a smaller, slower-growing competitor in this exact space. This microcap trades at 1.5x revenue with faster growth and the exact executives who've sold two comparable companies already on the cap table. The math doesn't require anything to go right, just for history to rhyme once more.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://martinbradstreet.substack.com/p/getting-the-band-back-together"}, {"id": 22, "cat": "positioning", "urgency": "deep", "source": "Six Sigma Capital — Preview of the Week Ahead", "title": "SNDK cratered ~25% this week and 'now looks like a broken chart' — right after MU and SOXX broke technical support", "idea": "SanDisk (SNDK) corrected almost 25% in a single week despite being +392% YTD, breaking below both its 21-day EMA and 50-day SMA after finding resistance at the 21-day, per the author's own chart annotations. Micron (MU) is 9% below its 50-day despite being +169% YTD. SOXX broke below its 50-day convincingly this week, down ~10%, after printing a bearish 5/21 EMA cross the prior week that the author flagged in real time.", "angle": "A live case of a technician calling the top of the memory/semiconductor momentum trade in his own newsletter the week before it broke — the bearish EMA cross flagged 'worth noting' turned into a 25% one-week drawdown in the most extended name in the group.", "tweetA": "SanDisk was +392% YTD. This week alone it gave back ~25% and the chart 'looks broken' per the same analyst who flagged a bearish EMA cross the week before it happened. When the most extended stock in the most extended sector breaks its 21-day AND 50-day in the same week, that's not a dip, that's the trade ending.", "tweetB": "MU and SNDK were the two cleanest 2026 momentum stories in the market — up 169% and 392% YTD respectively. Both lost their 50-day the same week SOXX broke down 10%. When the leaders of the leading sector all crack simultaneously, that's usually not noise, that's the top of the cycle getting priced in real time.", "charts": {"count": 1, "hot": true, "desc": "Six Sigma's SNDK/MU/SOXX charts showing simultaneous breaks of the 21-day EMA and 50-day SMA across all three"}, "link": "https://sixsigmaresearch.com/p/preview-of-the-week-ahead-wc-july-bab"}, {"id": 23, "cat": "macro", "urgency": "watch", "source": "Phil Dauber / Weekender", "title": "Visa and Mastercard reversed off 52-week highs the same day gasoline became the inflation story", "idea": "Visa closed at $358.56, down 1.80%, right after setting a 52-week high of $365.14 at Thursday's close. Mastercard fell 1.44% the same day. Both are the cleanest consumer-spend proxies in the market, reversing on the exact day gasoline price pass-through became the dominant CPI narrative.", "angle": "Payments data leads consumer spending by weeks; a same-day reversal in both card networks right as gas prices spike is an early tell on the real-income squeeze, well before it shows up in official retail sales prints.", "tweetA": "Visa hit a 52-week high Thursday. By Friday close it had given it back, and Mastercard moved the same way, on the exact day gasoline became the inflation story again. Card network reversals lead official retail sales data by weeks — this is the earliest read you'll get on the gas-price hit to real spending.", "tweetB": "Nobody's talking about V and MA rolling over together. Everyone's watching gold and semis. But the two purest consumer-spend proxies in the market just flinched on the same day, for the same reason — that's the tell that matters for the next CPI print, not this one.", "charts": {"count": 0, "hot": false, "desc": ""}, "link": "https://phildauber.substack.com/p/paid-not-to-notice"}];
const META = {"date": "2026-07-18", "time": "21:04 CEST", "windowStart": "2026-07-18 15:03 CEST", "windowEnd": "2026-07-18 21:04 CEST", "emailsInWindow": 12, "emailsRead": 11, "itemsExtracted": 23, "includedSources": [{"name": "Phil Dauber / Weekender", "count": 9}, {"name": "Six Sigma Capital — Preview of the Week Ahead", "count": 4}, {"name": "HRMT / Quality Value — Atlassian $TEAM deep dive", "count": 2}, {"name": "Market Sentiment — ASIC", "count": 2}, {"name": "The Founders Corner", "count": 3}, {"name": "The Dark Side of the Boom", "count": 1}, {"name": "McKinsey Classics", "count": 1}, {"name": "NLP News / Elvis Saravia", "count": 1}, {"name": "a16z crypto — Patrick McHenry", "count": 1}, {"name": "Martin Bradstreet — Investing w/ Martin", "count": 1}], "skippedSources": [{"name": "GitHub Actions (notifications@github.com)", "reason": "Automated CI failure notification for this repo's own merge workflow — zero analytical content, not a newsletter"}]};
const CAT_COLORS = {"macro": "#e24b4a", "credit": "#378add", "positioning": "#ef9f27", "AI/infra": "#1d9e75", "crypto": "#7f77dd", "geopolitics": "#d85a30", "energy": "#f97316", "tech": "#06b6d4", "gold": "#d4a017", "culture": "#ec4899", "labor": "#8b5cf6", "regulation": "#64748b", "science": "#14b8a6", "venture": "#84cc16"};
const URGENCY_LABELS = { act: "🔴 Act Now", deep: "🔵 Deep", watch: "🟡 Watch" };
const URGENCY_ORDER = ["act", "deep", "watch"];

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function buildFilters() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat]||0) + 1; });
  const catBar = document.getElementById('catBar');
  let html = '<button class="pill active" data-cat="all" onclick="setCat(\'all\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(c => {
    html += '<button class="pill" data-cat="' + c + '" onclick="setCat(\'' + c + '\')">' + escapeHtml(c) + ' (' + catCounts[c] + ')</button>';
  });
  catBar.innerHTML = html;

  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency]||0) + 1; });
  const urgBar = document.getElementById('urgBar');
  let uhtml = '<button class="pill active" data-urg="all" onclick="setUrg(\'all\')">All (' + ITEMS.length + ')</button>';
  URGENCY_ORDER.forEach(u => {
    if (urgCounts[u]) {
      uhtml += '<button class="pill" data-urg="' + u + '" onclick="setUrg(\'' + u + '\')">' + URGENCY_LABELS[u] + ' (' + urgCounts[u] + ')</button>';
    }
  });
  urgBar.innerHTML = uhtml;
}

function setCat(c) {
  activeCat = c; activeSrc = null;
  document.querySelectorAll('#catBar .pill').forEach(b => {
    const isActive = b.getAttribute('data-cat') === c;
    b.classList.toggle('active', isActive);
    b.style.background = isActive && c !== 'all' ? CAT_COLORS[c] : (isActive ? '#1a1a1a' : '');
  });
  render();
}
function setUrg(u) {
  activeUrg = u; activeSrc = null;
  document.querySelectorAll('#urgBar .pill').forEach(b => {
    const isActive = b.getAttribute('data-urg') === u;
    b.classList.toggle('active', isActive);
    b.style.background = isActive ? '#1a1a1a' : '';
  });
  render();
}
function filterBySrc(name) {
  activeCat = 'all'; activeUrg = 'all'; activeSrc = name;
  document.querySelectorAll('#catBar .pill').forEach(b => b.classList.toggle('active', b.getAttribute('data-cat')==='all'));
  document.querySelectorAll('#urgBar .pill').forEach(b => b.classList.toggle('active', b.getAttribute('data-urg')==='all'));
  render();
  ITEMS.forEach(i => {
    if (i.source.indexOf(name) !== -1) {
      const el = document.getElementById('card-' + i.id);
      if (el) el.classList.add('open');
    }
  });
  window.scrollTo({top: document.getElementById('cardsWrap').offsetTop - 20, behavior: 'smooth'});
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('open');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function cardHtml(item) {
  const color = CAT_COLORS[item.cat] || '#888';
  const urgEmoji = item.urgency === 'act' ? '🔴' : (item.urgency === 'watch' ? '🟡' : '🔵');
  const chartFlag = item.charts && (item.charts.hot ? '🔥' : (item.charts.count > 0 ? '📊' : ''));
  let html = '';
  html += '<div class="card" id="card-' + item.id + '">';
  html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
  html += '<span class="idx">' + String(item.id).padStart(2,'0') + '</span>';
  html += '<span class="urg">' + urgEmoji + '</span>';
  html += '<span class="badge" style="background:' + color + '">' + escapeHtml(item.source.split(' / ')[0].split(' (')[0]) + '</span>';
  html += '<span class="cattag">' + escapeHtml(item.cat) + '</span>';
  if (chartFlag) html += '<span class="chartflag">' + chartFlag + '</span>';
  html += '<span class="card-title">' + escapeHtml(item.title) + '</span>';
  html += '</div>';
  html += '<div class="card-body">';
  html += '<div class="blocklabel">The Idea</div><div class="idea-text">' + escapeHtml(item.idea) + '</div>';
  html += '<div class="blocklabel">My Angle</div><div class="angle-box" style="border-left:2px solid ' + color + '; background:' + color + '14;">' + escapeHtml(item.angle) + '</div>';
  html += '<div class="blocklabel">Tweets</div>';
  html += '<div class="tweets">';
  html += '<div class="tweet-box a"><div class="tlabel">TWEET A</div><div class="tweet-text">' + escapeHtml(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
  html += '<div class="tweet-box b"><div class="tlabel">TWEET B</div><div class="tweet-text">' + escapeHtml(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
  html += '</div>';
  if (item.charts && (item.charts.count > 0 || item.charts.desc)) {
    html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 ') + escapeHtml(item.charts.desc || (item.charts.count + ' chart(s)')) + '</div>';
  }
  html += '<a class="readlink" href="' + escapeHtml(item.link) + '" target="_blank">↗ Read full article</a>';
  html += '</div></div>';
  return html;
}

function render() {
  let filtered = ITEMS;
  if (activeSrc) {
    filtered = filtered.filter(i => i.source.indexOf(activeSrc) !== -1);
  } else {
    if (activeCat !== 'all') filtered = filtered.filter(i => i.cat === activeCat);
    if (activeUrg !== 'all') filtered = filtered.filter(i => i.urgency === activeUrg);
  }
  const wrap = document.getElementById('cardsWrap');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) {
    wrap.innerHTML = ''; empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    wrap.innerHTML = filtered.map(cardHtml).join('');
  }
}

function buildReport() {
  const rc = document.getElementById('reportCard');
  document.getElementById('reportToggle').onclick = () => rc.classList.toggle('open');
  let html = '';
  html += '<p><b>Window:</b> ' + escapeHtml(META.windowStart) + ' &rarr; ' + escapeHtml(META.windowEnd) + '. Emails outside this window were not processed.</p>';
  html += '<p><b>Emails in window:</b> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <b>Emails read:</b> ' + META.emailsRead + ' &nbsp;|&nbsp; <b>Items extracted:</b> ' + META.itemsExtracted + '</p>';
  html += '<h4>Included Sources</h4>';
  META.includedSources.forEach(s => {
    html += '<div class="src-row" onclick="filterBySrc(\'' + s.name.replace(/'/g,"\\'") + '\')"><span>' + escapeHtml(s.name) + '</span><span class="n">' + s.count + ' item' + (s.count===1?'':'s') + '</span></div>';
  });
  html += '<h4>Skipped Sources</h4>';
  META.skippedSources.forEach(s => {
    html += '<div class="skip-row"><b>' + escapeHtml(s.name) + '</b> — ' + escapeHtml(s.reason) + '</div>';
  });
  document.getElementById('reportBody').innerHTML = html;
}

document.getElementById('headerSub').textContent = META.date + '  ·  ' + META.time + '  ·  ' + META.itemsExtracted + ' items from ' + META.emailsRead + ' emails';

buildFilters();
render();
buildReport();
</script>
