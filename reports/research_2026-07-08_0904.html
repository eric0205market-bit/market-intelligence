    {"id":16,"cat":"labor","urgency":"deep","source":"The Dark Side of the Boom (Citadel/Sequoia data)","title":"Seed-stage startups shrank from 5 to 4 employees the quarter ChatGPT launched — and AI jobs are diffusing outside tech","idea":"Sequoia data shows median seed-stage headcount fell from 5 to 4 employees in Q1 2023, immediately after ChatGPT launched. Separately, Citadel's analysis of 2.3M CPS employment records against Budget Lab's AI exposure scores across 541 occupations finds strong 'non-home' hiring — AI-exposed roles growing in industries and metros that previously had low AI exposure.","angle":"This is Jevons Paradox in labor markets in real time — cheaper AI-augmented skill is expanding demand for that skill into new industries rather than just shrinking headcount where it already existed.","tweetA":"Seed startups went from 5 employees to 4 the same quarter ChatGPT launched. Everyone read that as 'AI kills jobs.' The follow-up data says AI-exposed roles are now growing fastest in industries and cities that never had them before. Smaller companies, more companies, more places. That's not a fixed pie.","tweetB":"A software engineer hired by a law firm instead of a software company is the tell. If AI-exposed labor is leaking out of tech into retailers, logistics and regional metros, Silicon Valley's labor demand isn't being destroyed — it's being exported into the rest of the economy.","charts":{"count":2,"hot":true,"desc":"🔥 CHART WORTH SAVING — Sequoia seed-stage headcount chart (5→4 employees) and Citadel's home-vs-non-home hiring chart across AI-exposed occupations."},"link":"https://thedarksideoftheboom.substack.com/p/citadel-ai-merican-exceptionalism"},
    {"id":17,"cat":"geopolitics","urgency":"act","source":"Bloomberg Points of Return / John Authers","title":"US launches fresh strikes on Iran, oil and yields snap back up","idea":"The US renounced Iran oil-export waivers and launched a new wave of military strikes following Iranian attacks on tankers in the Strait of Hormuz. Brent gained 3.01% — its biggest one-day rise since June 1 — and the 10-year Treasury yield jumped 8.2bps to 4.55%. Tanker crossings through the Strait remain well below normal and were declining again even before the new strikes.","angle":"One-year inflation swaps had fallen to 2.23% on hopes the war was winding down; consumers' own inflation expectations (NY Fed survey) sit at 3.67%, the highest since 2023 — the bond market was pricing peace faster than either consumers or the tanker data justified.","tweetA":"10-year up 8bps, Brent up 3% in one session, and tanker traffic through Hormuz was already sliding before the new strikes even landed. The market spent two weeks pricing a peace dividend that the actual shipping data never supported.","tweetB":"One-year inflation swaps at 2.23%. Consumer inflation expectations at 3.67%, the highest since 2023. That's the widest professional-vs-household inflation expectation gap in years, and it just widened further with fresh Iran strikes. Someone is about to be very wrong.","charts":{"count":0,"hot":false,"desc":"Charts inside — Bloomberg terminal charts on Brent futures, the 10yr yield, and Strait of Hormuz tanker-crossing counts."},"link":"https://bloom.bg/4y8GtSf"},
    {"id":18,"cat":"positioning","urgency":"act","source":"Bloomberg Points of Return / John Authers","title":"Samsung's record profit meets a record valuation discount, and quant unwinds go global","idea":"Samsung delivered record operating profit but a selloff anyway, pushing its P/E to the biggest discount to the MSCI World on record (lowest multiple since 2019). Societe Generale's Andrew Lapthorne shows it's the recovery of previous losers — not just winners falling — that's hurting quant momentum strategies, and this is primarily a US phenomenon but has also caught out quants in Japan and Europe.","angle":"A record-profit company getting a record valuation discount is a pure positioning/sentiment story, not a fundamentals story — exactly the kind of dislocation that becomes a trade once the unwind exhausts itself.","tweetA":"Samsung posted record profit and got the biggest discount to MSCI World on record. That's not a fundamentals repricing, that's a positioning flush. When 'good but not good enough' triggers a record valuation gap, the crowd was priced for perfection, not reality.","tweetB":"This quant unwind isn't just a US story — SocGen shows the same 'losers rallying' pain hitting momentum books in Japan and Europe simultaneously. When three unrelated regional momentum factors break at once with no external catalyst, that's a global positioning event, not a single-stock reaction to one earnings print.","charts":{"count":2,"hot":true,"desc":"🔥 CHART WORTH SAVING — Samsung P/E vs MSCI World discount at a record; SocGen's global (US/Japan/Europe) long-losers momentum chart."},"link":"https://bloom.bg/4voGOxD"},
    {"id":19,"cat":"regulation","urgency":"deep","source":"Bloomberg Points of Return / John Authers","title":"USMCA won't be renewed — trade terms go to annual renegotiation","idea":"The US Trade Representative announced USMCA won't be renewed in its current form; instead, terms between the US, Mexico and Canada will be renegotiated annually. The deal governs ~$2 trillion in annual trade, with autos alone ~18% of US-Mexico-Canada trade. The administration wants to raise the 'regional value content' requirement for vehicles from 75% to 82%, with 50% of a vehicle's value produced in the US specifically.","angle":"Raising the regional-content bar that high could paradoxically push automakers to source cheaper non-US content and simply eat the tariff — the opposite of the reshoring outcome the policy is designed to achieve.","tweetA":"Pushing the USMCA regional-content rule from 75% to 82% sounds protectionist until you run the math: at some threshold it's cheaper for automakers to build outside the US with non-compliant parts and just pay the tariff. Trump's own rule could accelerate the offshoring it's trying to stop.","tweetB":"Annual renegotiation of a $2 trillion trade relationship is a permanent uncertainty tax on every auto-sector capex decision in North America. Toyota already moved truck production from Mexico to Texas — that's the administration's proof point, but watch how many decisions go the other way when nobody can plan past 12 months.","charts":{"count":0,"hot":false,"desc":""},"link":"https://bloom.bg/4yfYGh0"},
    {"id":20,"cat":"culture","urgency":"deep","source":"Noahpinion / Noah Smith","title":"JD Vance's anti-GDP crusade is the American right borrowing the European left's degrowth playbook","idea":"Noah Smith argues Vance's attacks on GDP as a metric ('maybe economics is just fake') function as political cover for policies (tariffs, immigration restriction) that reduce GDP — mirroring how the European left uses 'degrowth' rhetoric to justify policies with the same effect. Smith notes the opioid epidemic alone cost an estimated $700B (3.4% of GDP) in 2018, which undercuts Vance's implicit claim that GDP-maximizing policy ignores social costs.","angle":"This is a framework point, not just a policy critique — watch for the same anti-GDP rhetorical move showing up around AI-displacement debates next.","tweetA":"Vance calling economics 'fake' and the European degrowth left both arrive at the same place: attacking GDP as a metric whenever the policy they want happens to shrink it. Same rhetorical move, opposite political tribes. Worth remembering next time either side uses it on AI regulation.","tweetB":"$700 billion. That's the 2018 economic cost of the opioid epidemic in a single year, per the Philadelphia Fed — 3.4% of GDP. If Vance actually cared about the social costs GDP misses the way he claims, curbing opioids would be priority one, not tariffs on Vietnamese sneakers.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.noahpinion.blog/p/jd-vances-crusade-against-gdp-is"},
    {"id":21,"cat":"culture","urgency":"watch","source":"Noahpinion / Noah Smith","title":"Putnam's famous diversity-trust finding is much smaller than the debate assumes","idea":"Smith cites Bryan Caplan's point that in Robert Putnam's own research, going from zero diversity to maximum diversity reduces social trust by the equivalent of just 1 point on a 100-point scale — a vanishingly small effect size relative to how heavily it's cited in immigration debates.","angle":"A widely-cited academic finding is being used to support policy conclusions the underlying effect size can't actually bear.","tweetA":"1 point on a 100-point scale. That's the actual size of Putnam's diversity-trust effect, going from zero diversity to maximum diversity. It's one of the most politically weaponized findings in social science, and the effect size barely moves the needle.","tweetB":"This is a broader pattern worth pricing into any 'the research shows' argument in policy debates — check the effect size before the citation count. Putnam's diversity-trust number has infinite citations and a 1-point effect.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.noahpinion.blog/p/jd-vances-crusade-against-gdp-is"},
    {"id":22,"cat":"credit","urgency":"deep","source":"Capital Flows Research","title":"Corporate credit issuance hits $110B in June — a credit cycle melt-up, not risk-off","idea":"Corporate credit issuance hit $110B in June, the strongest month since March and nearly double last year's pace, with YTD issuance at $685B. Single-stock volatility is at record levels against the VIX while implied correlation collapses — framed as recent index-level selling being sector rotation on excess liquidity, not risk-off, with financials printing all-time highs.","angle":"If this read is right, dips in AI/momentum names are liquidity-driven rotation, not the start of real deleveraging — which changes how you'd size any 'buy the dip' response to the momentum unwind described elsewhere in this window.","tweetA":"$685B in corporate issuance YTD, nearly double last year's pace, financials at all-time highs. That's not what risk-off looks like. If credit is still this eager to lend, the equity momentum unwind happening the same week is a rotation, not a regime change.","tweetB":"Record single-stock vol with collapsing implied correlation is the market saying 'this is a stock-picker's environment, not a macro one.' Compare that to the Lead-Lag credit-microstructure piece in this same digest — same week, two analysts, directly conflicting reads on whether credit confirms calm or conceals stress.","charts":{"count":1,"hot":true,"desc":"🔥 CHART WORTH SAVING — slide deck showing 2026 monthly corporate credit issuance pace vs. prior year."},"link":"https://www.capitalflowsresearch.com/p/is-a-liquidity-event-looming-on-the"},
    {"id":23,"cat":"macro","urgency":"watch","source":"Capital Flows Research","title":"SOFR strip is pricing ~50bps of HIKES through 2026, not cuts","idea":"The Fed is holding real rates up even as inflation swaps fall alongside crude, and the SOFR strip is pricing roughly 50 basis points of hikes (not cuts) through 2026 — a materially different rates path than the 'Fed pivots dovish' consensus embedded in most equity narratives this year.","angle":"If the market is genuinely pricing hikes while equities trade off a dovish assumption, that's a real divergence — and it directly contradicts the 'first hike pushed to October' framing in Princeton Chen's crypto note from this same window.","tweetA":"SOFR strip pricing 50bps of hikes through 2026 while equities still trade like the Fed's done tightening. Somebody's wrong, and it's an expensive bet either way. Worth checking your book's rate-sensitivity assumption against which side you're actually on.","tweetB":"Two sources in the same 6-hour window: Capital Flows says the SOFR strip prices hikes through 2026. Princeton Chen's crypto note says the market's pricing the Fed to hold through September with the next move in October. That's not a rounding error, that's a real disagreement about the rate path — and Bitcoin's rally narrative depends on which one wins.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.capitalflowsresearch.com/p/is-a-liquidity-event-looming-on-the"},
    {"id":24,"cat":"macro","urgency":"deep","source":"Capital Flows Research","title":"Japan and Germany's fiscal stimulus baskets are crushing the US: Nikkei +33% YTD vs S&P +9%","idea":"Fiscal stimulus baskets show Japan and Germany outperforming while the US basket lags — the Nikkei is up 33% YTD against 9% for the S&P, with government spending funded by short-term issuance identified as the engine, and the effect 'cooking the yen.'","angle":"This connects directly to the Lead-Lag credit piece's note on Treasury liquidity decay and negative swap spreads — global sovereign issuance patterns (Japan's short-term funding binge) plausibly feed the same balance-sheet scarcity showing up in US repo/swap markets.","tweetA":"Nikkei +33% YTD vs S&P +9%. Everyone's obsessing over the Mag-7 rotation inside the US market and missing that the bigger rotation this year is out of the US entirely and into fiscally aggressive Japan and Germany.","tweetB":"Japan funding stimulus with short-term issuance is 'cooking the yen' at the same time Japanese bond yields are rising and pressuring US yields higher (see Princeton Chen's note). That's the same global liquidity story showing up in three unrelated newsletters this morning — equities, credit and crypto are all quietly pricing the same JGB stress.","charts":{"count":1,"hot":true,"desc":"🔥 CHART WORTH SAVING — fiscal stimulus basket performance chart, Japan/Germany vs US, YTD."},"link":"https://www.capitalflowsresearch.com/p/is-a-liquidity-event-looming-on-the"},
    {"id":25,"cat":"positioning","urgency":"watch","source":"Capital Flows Research","title":"Oracle down 44% from highs, sitting exactly on its 200-week moving average","idea":"Capital Flows flags Oracle as 'one of the most asymmetric setups in the market' — down 44% from its highs, sitting on the 200-week moving average, and directly leveraged to the next stage of the AI cycle where data, memory and infrastructure converge.","angle":"A mega-cap AI-infrastructure name at a multi-year technical support level is exactly the kind of setup the momentum unwind described elsewhere could either confirm as a bottom or break decisively.","tweetA":"Oracle down 44% from its highs and sitting exactly on the 200-week moving average. Technicians call that a coin-flip level. Fundamentals call it AI infrastructure at a discount. Which one wins depends entirely on whether this week's momentum unwind is done or just getting started.","tweetB":"The AI-infra bull case says Oracle is cheap because it's caught in an indiscriminate momentum flush, not because the cloud backlog deteriorated. The bear case says a 44% drawdown to a moving-average line is exactly what a broken thesis looks like right before it breaks further. Both stories fit the same chart.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.capitalflowsresearch.com/p/is-a-liquidity-event-looming-on-the"},
    {"id":26,"cat":"positioning","urgency":"act","source":"The Dark Side of the Boom","title":"Goldman's high-beta momentum basket is down 20% in 5 sessions — SOXL down 50% from a 10-session-old high","idea":"Samsung fell 9% in Seoul on 'strong but not strong enough' earnings, and DeepSeek announced it will develop its own AI chips, together reigniting doubt about whether the AI supply chain deserves to trade as a 'one-way royalty stream.' SOXL volumes ran ~35% above its 30-day average and is down ~50% from an all-time high set just 10 sessions earlier; Goldman's high-beta momentum basket is down more than 20% over five sessions, yet breadth stayed decent with 283 S&P 500 names finishing green the same session.","angle":"DeepSeek going in-house on chips is the same strategic-control theme as Beijing's AI-model firewall story elsewhere in this digest — China moving to control both ends of its AI stack, models and silicon, at once.","tweetA":"SOXL down 50% from an all-time high set only 10 sessions ago, while 283 S&P names finished green the same day. That's not a market-wide risk-off, that's a violent, narrow unwind concentrated exactly where leverage was most crowded.","tweetB":"DeepSeek building its own chips plus Beijing weighing a firewall on its best models is the same strategy read twice in one morning: China vertically integrating its entire AI stack at the exact moment US investors were debating whether the supply chain still deserves a 'royalty' multiple.","charts":{"count":0,"hot":true,"desc":"🔥 CHART WORTH SAVING — SOXL/DRAM/SMH volume-vs-30-day-average chart and Goldman's 5-session high-beta momentum basket drawdown."},"link":"https://thedarksideoftheboom.substack.com/p/no-panic-yet-but-the-desk-is-listening"},
    {"id":27,"cat":"geopolitics","urgency":"act","source":"Bloomberg Points of Return / John Authers","title":"Iran stages Khamenei's funeral to project regime strength after US strikes","idea":"Iran made 'a show of strength' with the funeral of former Supreme Leader Ali Khamenei, demonstrating the regime remains intact and unchanged even as the US launched fresh strikes — Authers notes Iran 'seems really keen to show the world that the US has lost,' which 'more or less guarantees that volatility will continue.'","angle":"Regime-survival theater after a strike campaign is a specific signal that Tehran isn't negotiating from a position it perceives as weak — raising the odds this drags rather than resolves quickly.","tweetA":"Iran's response to fresh US strikes wasn't a ceasefire signal, it was a funeral procession designed to prove the regime is untouched. That's the opposite of what markets need to see for the 'peace dividend' oil trade to keep working.","tweetB":"Compare the two Iran reads in today's window: Bloomberg says Tehran is projecting strength and inviting more volatility; Princeton Chen's crypto note frames it as just one of 'two fresh macro headwinds.' The crypto market treating a live war as a footnote next to Japanese bond yields is itself interesting.","charts":{"count":0,"hot":false,"desc":""},"link":"https://bloom.bg/4eQrfK5"},
    {"id":28,"cat":"energy","urgency":"watch","source":"Princeton Chen (Daily News Wall)","title":"Crude still down 40%+ from its Iran-war peak even as fresh Iran headlines hit","idea":"Princeton Chen's news wall notes crude is holding below $70, down over 40% from the year's panic-driven peak from the February war (Operation Epic Fury) — even as Iran returns to headlines and reintroduces 'a modest geopolitical risk premium.' Gas is near $3.93/gal versus a $4.56 wartime peak.","angle":"Two sources, two framings, same day: Bloomberg treats the new Iran strikes as an active oil-price shock (Brent +3%), while Princeton Chen frames it as a minor watch-item against a much larger multi-month disinflation trend.","tweetA":"Oil is down 40%+ from its February war peak and gas is down from $4.56 to $3.93 at the pump. Fresh Iran strikes just knocked Brent up 3% in a session — that's a blip against the bigger disinflation dividend, not a reversal of it, unless Hormuz actually closes.","tweetB":"The bond market treated today's Iran strikes as an 8bp yield event. The oil market treated it as a 3% one-day pop against a 40% multi-month decline. Neither market is pricing an actual Hormuz closure. If that changes, both of those reactions look laughably small in hindsight.","charts":{"count":0,"hot":false,"desc":""},"link":"https://princetonchen.substack.com/p/daily-news-wall-july-7-2026"},
    {"id":29,"cat":"regulation","urgency":"deep","source":"Princeton Chen (Daily News Wall)","title":"FHFA orders Fannie Mae and Freddie Mac to count crypto as a mortgage asset","idea":"The FHFA ordered Fannie Mae/Freddie Mac to count crypto as a mortgage asset (late June), and Better + Coinbase issued the first Fannie-backed crypto mortgage as a result — a structural adoption event plugging crypto holdings directly into the US mortgage-underwriting system.","angle":"This is a much bigger structural story than any single BTC price level — the GSEs, the backbone of the multi-trillion-dollar US mortgage market, formally recognizing crypto as bankable collateral.","tweetA":"Fannie and Freddie now count crypto as a mortgage asset, and Better + Coinbase already issued the first one. That's the US housing-finance system — the largest asset class in the country — formally opening the door to Bitcoin as collateral. That's a bigger adoption milestone than any ETF inflow number.","tweetB":"Everyone's watching whether BTC spot ETF inflows turn positive for a second day. The actual structural story is that the GSEs just plugged crypto into mortgage underwriting. One is a flow number that resets weekly. The other doesn't unwind.","charts":{"count":0,"hot":false,"desc":""},"link":"https://princetonchen.substack.com/p/daily-news-wall-july-7-2026"},
    {"id":30,"cat":"crypto","urgency":"deep","source":"Princeton Chen (Daily News Wall)","title":"Clearstream expands institutional crypto custody to XRP, Solana, Cardano","idea":"Clearstream, Deutsche Börse's post-trade settlement arm, expanded crypto custody to include XRP, Solana, Cardano and more — major traditional financial-market infrastructure formally endorsing altcoins beyond BTC/ETH.","angle":"Post-trade settlement infrastructure adopting altcoins is a slower-moving but stickier signal than exchange listings — it's the plumbing layer, not the trading layer, choosing to support these assets long-term.","tweetA":"Deutsche Börse's settlement arm adding custody for XRP, Solana and Cardano is a different kind of endorsement than an exchange listing. Settlement infrastructure doesn't onboard assets it expects to delist next cycle.","tweetB":"XRP now has full MiCA compliance across the EEA AND Clearstream custody in the same week. That's the regulatory-plus-infrastructure combination that turns a speculative token into an institutionally-holdable asset — worth more than the 10% weekly price move it's getting credit for.","charts":{"count":0,"hot":false,"desc":""},"link":"https://princetonchen.substack.com/p/daily-news-wall-july-7-2026"},
    {"id":31,"cat":"crypto","urgency":"watch","source":"Princeton Chen (Daily News Wall)","title":"Citi slashes 2026 Bitcoin target to $82K from $112K","idea":"Citi cut its 2026 BTC price target to $82,000 from $112,000 on July 1 — part of a broader theme where most Wall Street 2026 BTC calls 'ran too hot' relative to where price actually sits mid-year.","angle":"A 27% target cut from a major bank mid-year is a real repricing of institutional BTC conviction, not noise — worth tracking which other banks follow Citi's revision down.","tweetA":"Citi cutting its BTC target by $30K in one revision is the kind of thing that would be a huge story if it happened to an equity. For BTC, it's a Tuesday. Worth asking why crypto price targets get this much more slack for being wrong than anything else on the Street covers.","tweetB":"Most Wall Street 2026 BTC targets 'ran too hot' at halftime. Meanwhile whales bought $16.7B over the same two weeks institutions were selling (see separate item). The sell-side and the largest holders are reading the same tape and reaching opposite conclusions.","charts":{"count":0,"hot":false,"desc":""},"link":"https://princetonchen.substack.com/p/daily-news-wall-july-7-2026"},
    {"id":32,"cat":"crypto","urgency":"deep","source":"Princeton Chen (Daily News Wall)","title":"Whales bought $16.7B of Bitcoin in two weeks even as ETFs bled a record $4.5B","idea":"Bitcoin whales bought $16.7B over two weeks even as June ETF outflows hit a record $4.5B — a divergence the note flags as 'seen near past cycle bottoms.' Spot ETF inflows just turned positive for a second straight day, though the broader 7-day/30-day ETF trend remains net-negative.","angle":"Fund flows and whale wallets are telling opposite stories at the same time — that divergence itself, not the BTC price level, is the signal worth tracking into the next print.","tweetA":"$16.7B in whale buying against a record $4.5B in ETF outflows, in the same two weeks. That's the definition of smart money buying what everyone else is selling. Whether it's actually smart depends entirely on what happens at the next resistance test.","tweetB":"ETF flows are supposed to be the 'institutional' signal and whale wallets the 'unregulated' signal, but this month it's flipped: the wrapped product is bleeding and the actual holders are accumulating. If that pattern holds, ETF flow data is about to stop being the leading indicator everyone treats it as.","charts":{"count":1,"hot":true,"desc":"🔥 CHART WORTH SAVING — whale accumulation vs. ETF flow divergence chart over the trailing two weeks."},"link":"https://princetonchen.substack.com/p/daily-news-wall-july-7-2026"},
    {"id":33,"cat":"AI/infra","urgency":"watch","source":"Princeton Chen (Daily News Wall)","title":"DRAM/memory ETF down 25% from its June ATH as capital rotates toward crypto","idea":"The Roundhill Memory ETF (DRAM) is down 25% from its June 22 all-time high, with Sandisk -10.1% and Samsung -6.9% in a single session — framed as 'the AI-chip leadership that sidelined crypto all year still cracking,' feeding an 'H2 rotation thesis' of capital shifting from the memory/AI trade into crypto.","angle":"If memory names keep cracking while crypto stabilizes, that rotation thesis gets easier to underwrite — but it directly contradicts the SK Hynix listing enthusiasm and the smartphone-sales memory-shortage story elsewhere in this window, both of which assume memory scarcity/pricing power is intact.","tweetA":"DRAM ETF -25% from its June high, Sandisk -10%, Samsung -6.9% in a day — and in the same 6-hour window, SK Hynix's $28B listing is multiple times oversubscribed (see separate item). The memory trade is simultaneously crashing in the public ETF and getting crushed with demand in the IPO market. Somebody is mispricing memory right now.","tweetB":"'Capital rotating from memory into crypto' is a clean narrative, but it only works if you ignore that memory price hikes are the actual cause of a 13% China smartphone sales drop (see the Michael Parekh item) — that's real pricing power showing up in the real economy, not a chart pattern about to break down.","charts":{"count":0,"hot":false,"desc":""},"link":"https://princetonchen.substack.com/p/daily-news-wall-july-7-2026"},
    {"id":34,"cat":"credit","urgency":"deep","source":"Lead-Lag Report","title":"CDX-cash basis is blown out — synthetic credit is pricing more stress than cash bonds","idea":"CDX.NA.HY has run 20-35bps above cash HY OAS since mid-Q2 2026 (synthetic ran to ~312bps in mid-May vs cash at ~280bps, narrowing to a still-open ~20-25bp gap by July). The report notes this exact basis blew out roughly two quarters before cash HY OAS made its real move in 2007-08.","angle":"Headline HY OAS at 274bps looks 'orderly,' but the derivative market that trades with the least friction is already pricing meaningfully more stress — a pre-dislocation pattern with a specific historical precedent.","tweetA":"CDX running 20-35bps above cash HY OAS isn't a rounding error — it's dealers signaling they can't source bonds to hedge fast enough, or real money buying protection ahead of the cash market repricing. The same basis blew out two quarters before the 2007-08 HY OAS peak. Headline spreads at 274bps are not the number to be watching.","tweetB":"Everyone quotes 'HY OAS is calm at 274bps' as the all-clear signal. Nobody mentions the market that trades faster and with less friction is pricing 300+. When the fast market and the slow market disagree this much, the fast market is usually right and the slow market just hasn't caught up.","charts":{"count":0,"hot":true,"desc":"🔥 CHART WORTH SAVING — CDX.NA.HY vs cash HY OAS basis chart, 2025-2026, with 2007-08 historical overlay referenced in the footnotes."},"link":"https://www.leadlagreport.com/p/what-credit-is-saying-that-equity-isnt-hearing"},
    {"id":35,"cat":"credit","urgency":"deep","source":"Lead-Lag Report","title":"High yield's risk premium over investment grade compressed to 3.65x from 4.4x a year ago","idea":"The HY/IG spread ratio (historically 3.5-4.5x) sits at ~3.65x today (274bps HY / 75bps IG) versus ~4.4x in July 2025 — a compression happening while both individual spread levels look unremarkable, which the report calls 'a classic late-cycle signature: not distress, but complacency about the marginal unit of risk.'","angle":"Ratio compression is a quieter, footnote-level signal that historically precedes the headline blowout — the kind of thing that doesn't show up until spreads move and it's too late to reposition cheaply.","tweetA":"4.4x to 3.65x in a year. That's the market wanting less extra compensation to hold junk bonds over investment grade than it did twelve months ago, even as both spread levels individually look calm. Ratios compress before spreads blow out, not the other way around.","tweetB":"'HY OAS is basically unchanged year-over-year' is technically true and completely misses the story. The ratio to IG has ground tighter the entire time. That's complacency building quietly underneath a headline number that looks fine.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.leadlagreport.com/p/what-credit-is-saying-that-equity-isnt-hearing"},
    {"id":36,"cat":"credit","urgency":"deep","source":"Lead-Lag Report","title":"Treasury liquidity decays 3x within two auctions of the on-the-run note","idea":"NY Fed research shows the on-the-run 2-year Treasury trades at a 0.66bp effective bid-ask spread; the first off-the-run 2-year trades at 1.22bps; the second off-the-run trades at 2.23bps — more than triple the on-the-run cost. Swap spreads are deeply negative across the curve (2yr -13.8bps, 10yr -43.2bps, 30yr -75.8bps), reflecting dealer balance-sheet constraints rather than counterparty credit risk.","angle":"Every credit spread in the market is quoted against a Treasury curve whose own liquidity degrades just one or two auctions away from the most current issue — a structural fragility that transmits directly into the cost of hedging credit risk.","tweetA":"The bid-ask on the second off-the-run 2-year Treasury is more than 3x the on-the-run note. That's the single most liquid, most 'risk-free' benchmark in the world, and its liquidity falls off a cliff within two auction cycles. Every credit spread quoted against 'the 2-year' implicitly assumes a depth that doesn't exist two issues back.","tweetB":"Negative swap spreads across the entire curve — 2yr, 10yr, 30yr, all negative — mean it's structurally expensive to finance a Treasury position via repo right now. That's a dealer balance-sheet problem, not a credit problem, and dealer balance-sheet problems are exactly what makes credit hedges expensive first, before cash bonds ever reprice.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.leadlagreport.com/p/what-credit-is-saying-that-equity-isnt-hearing"},
    {"id":37,"cat":"credit","urgency":"deep","source":"Lead-Lag Report","title":"CLO issuance down 20%+ YoY while secondary spreads stay calm — and HYG is flat while SPY is up 20%","idea":"US CLO new issuance fell to ~$77.2B in H1 2026 versus $99.8B in H1 2025 (down >20% YoY), even as AAA CLO tranche spreads held near 103bps — a split between 'primary indigestion' and secondary calm the report says means arrangers know something about demand depth the secondary quote doesn't yet reflect. Separately, HYG closed flat to slightly below its level from a year ago while SPY is up over 20% over the same period.","angle":"A high yield ETF going nowhere for a year while equities re-rate 20%+ is a standalone divergence, distinct from the April equity-credit gap — credit has simply stalled while equity kept climbing.","tweetA":"SPY up over 20% in a year. HYG flat to down over the same year. That's not a small gap — that's credit refusing to confirm the equity rally at all, for twelve straight months. At some point one of those two prices has to be wrong.","tweetB":"CLO issuance down over 20% year-over-year while AAA tranche spreads stay calm at 103bps is arrangers quietly pricing fewer deals into a market that says it'll absorb them fine. When the people structuring the deals get more cautious than the people buying them, that's usually the more informed side of the trade.","charts":{"count":1,"hot":true,"desc":"🔥 CHART WORTH SAVING — HYG vs SPY 12-month performance divergence chart; CLO issuance volume H1 2025 vs H1 2026."},"link":"https://www.leadlagreport.com/p/what-credit-is-saying-that-equity-isnt-hearing"}

    { name: "McKinsey", count: 3 },
    { name: "Michael Parekh (AI-RTZ)", count: 1 },
    { name: "Bloomberg Points of Return / John Authers", count: 4 },
    { name: "Noahpinion / Noah Smith", count: 2 },
    { name: "Capital Flows Research", count: 4 },
    { name: "Princeton Chen (Daily News Wall)", count: 6 },
    { name: "Lead-Lag Report", count: 4 }
  ],
  skippedSources: [
    { name: "jamesbulltard", reason: "\"Database Link Till The Morning\" — pure admin note fixing a broken link, zero sentences of original content." }
  ]
};

const CAT_COLORS = {
  "macro": "#e24b4a", "credit": "#378add", "positioning": "#ef9f27", "AI/infra": "#1d9e75",
  "crypto": "#7f77dd", "geopolitics": "#d85a30", "energy": "#f97316", "tech": "#06b6d4",
  "gold": "#d4a017", "culture": "#ec4899", "labor": "#8b5cf6", "regulation": "#64748b",
  "science": "#14b8a6", "venture": "#84cc16"
};
const URGENCY_META = {
  act: { emoji: "🔴", label: "Act Now" },
  deep: { emoji: "🔵", label: "Deep" },
  watch: { emoji: "🟡", label: "Watch" }
};

let activeCat = "All";
let activeUrg = "All";
let activeSrc = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildHeader() {
  document.getElementById('header-meta').textContent =
    META.date + '  •  ' + META.time + '  •  ' + META.itemsExtracted + ' items from ' + META.includedSources.length + ' sources';
}

function buildFilters() {
  const catCounts = {};
  const urgCounts = {};
  ITEMS.forEach(it => {
    catCounts[it.cat] = (catCounts[it.cat] || 0) + 1;
    urgCounts[it.urgency] = (urgCounts[it.urgency] || 0) + 1;
  });

  const catContainer = document.getElementById('cat-filters');
  let catHtml = '<button class="pill' + (activeCat === 'All' ? ' active' : '') + '" style="' + (activeCat==='All' ? 'background:#333;' : '') + '" onclick="setCatFilter(\'All\')">All (' + ITEMS.length + ')</button>';
  Object.keys(catCounts).sort().forEach(cat => {
    const color = CAT_COLORS[cat] || '#888';
    const isActive = activeCat === cat;
    catHtml += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:' + color + ';border-color:' + color + ';' : 'border-color:' + color + ';color:' + color + ';') + "\" onclick='setCatFilter(" + JSON.stringify(cat) + ")'>" + esc(cat) + ' (' + catCounts[cat] + ')</button>';
  });
  catContainer.innerHTML = catHtml;

  const urgContainer = document.getElementById('urg-filters');
  const urgOrder = ['act', 'deep', 'watch'];
  let urgHtml = '<button class="pill' + (activeUrg === 'All' ? ' active' : '') + '" style="' + (activeUrg==='All' ? 'background:#333;' : '') + '" onclick="setUrgFilter(\'All\')">All (' + ITEMS.length + ')</button>';
  urgOrder.forEach(u => {
    if (!urgCounts[u]) return;
    const isActive = activeUrg === u;
    const um = URGENCY_META[u];
    urgHtml += '<button class="pill' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:#444;border-color:#444;' : '') + "\" onclick='setUrgFilter(" + JSON.stringify(u) + ")'>" + um.emoji + ' ' + um.label + ' (' + urgCounts[u] + ')</button>';
  });
  urgContainer.innerHTML = urgHtml;
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  buildFilters();
  renderCards();
}
function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  buildFilters();
  renderCards();
}
function filterBySrc(name) {
  activeCat = 'All';
  activeUrg = 'All';
  activeSrc = name;
  buildFilters();
  renderCards(true);
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('expanded');
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function renderCards(forceExpand) {
  const container = document.getElementById('cards-container');
  let list = ITEMS.slice();
  if (activeSrc) {
    list = list.filter(it => it.source.indexOf(activeSrc) !== -1);
  } else {
    if (activeCat !== 'All') list = list.filter(it => it.cat === activeCat);
    if (activeUrg !== 'All') list = list.filter(it => it.urgency === activeUrg);
  }

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state">No items match this filter.</div>';
    return;
  }

  let html = '';
  list.forEach((item, idx) => {
    const color = CAT_COLORS[item.cat] || '#888';
    const um = URGENCY_META[item.urgency] || { emoji: '', label: '' };
    const chartFlag = item.charts && (item.charts.count > 0 || item.charts.hot) ? (item.charts.hot ? '🔥' : '📊') : '';
    const expandClass = forceExpand ? ' expanded' : '';

    html += '<div class="card' + expandClass + '" id="card-' + item.id + '">';
    html += '<div class="card-header" onclick="toggleCard(' + item.id + ')">';
    html += '<span class="item-num">#' + String(idx + 1).padStart(2, '0') + '</span>';
    html += '<span class="urg-emoji">' + um.emoji + '</span>';
    html += '<span class="src-badge" style="background:' + color + '">' + esc(item.source.split('(')[0].trim()) + '</span>';
    html += '<span class="cat-tag">' + esc(item.cat) + '</span>';
    if (chartFlag) html += '<span class="chart-flag">' + chartFlag + '</span>';
    html += '<span class="card-title">' + esc(item.title) + '</span>';
    html += '</div>';

    html += '<div class="card-body">';
    html += '<div class="section-label">The Idea</div>';
    html += '<div class="idea-text">' + esc(item.idea) + '</div>';
    html += '<div class="section-label">My Angle</div>';
    html += '<div class="angle-box" style="border-left-color:' + color + '; background:' + color + '12;">' + esc(item.angle) + '</div>';
    html += '<div class="section-label">Tweets</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#378add;">TWEET A</div><div class="tweet-text">' + esc(item.tweetA) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box"><div class="tweet-label" style="color:#7f77dd;">TWEET B</div><div class="tweet-text">' + esc(item.tweetB) + '</div><button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (item.charts && (item.charts.count > 0 || item.charts.desc)) {
      html += '<div class="section-label">Charts</div>';
      html += '<div class="chart-box' + (item.charts.hot ? ' hot' : '') + '">' + esc(item.charts.desc || 'Charts inside.') + (item.charts.count ? ' (' + item.charts.count + ' chart' + (item.charts.count > 1 ? 's' : '') + ')' : '') + '</div>';
    }
    html += '<a class="read-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">↗ Read full article</a>';
    html += '</div>'; // card-body
    html += '</div>'; // card
  });
  container.innerHTML = html;
}

function toggleReport() {
  const card = document.getElementById('report-card');
  card.classList.toggle('expanded');
  document.getElementById('report-caret').textContent = card.classList.contains('expanded') ? '▴' : '▾';
}

function buildReport() {
  let html = '';
  html += '<p><strong>Time window:</strong> ' + esc(META.windowStart) + ' &rarr; ' + esc(META.windowEnd) + ' (strict 6-hour trailing window). Emails outside this window were not processed.</p>';
  html += '<p><strong>Emails in window:</strong> ' + META.emailsInWindow + ' &nbsp;|&nbsp; <strong>Emails read:</strong> ' + META.emailsRead + ' &nbsp;|&nbsp; <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<p><strong>Included sources</strong> (click a name to filter cards to that source):</p><ul>';
  META.includedSources.forEach(s => {
    html += "<li><span class=\"report-src\" onclick='filterBySrc(" + JSON.stringify(s.name) + ")'>" + esc(s.name) + '</span> — ' + s.count + ' item' + (s.count > 1 ? 's' : '') + '</li>';
  });
  html += '</ul>';
  html += '<p><strong>Skipped sources:</strong></p><ul>';
  META.skippedSources.forEach(s => {
    html += '<li>' + esc(s.name) + ' — ' + esc(s.reason) + '</li>';
  });
  html += '</ul>';
  document.getElementById('report-body').innerHTML = html;
}

buildHeader();
buildFilters();
renderCards();
buildReport();
</script>
