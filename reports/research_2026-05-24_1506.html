    catDiv.appendChild(btn);
  });

  const urgDiv = document.getElementById("urg-filters");
  const urgs = [
    { key: "all", label: "All (" + urgCounts.all + ")" },
    { key: "act-now", label: "🔴 Act Now (" + (urgCounts["act-now"] || 0) + ")" },
    { key: "deep", label: "🔵 Deep (" + (urgCounts["deep"] || 0) + ")" },
    { key: "watch", label: "🟡 Watch (" + (urgCounts["watch"] || 0) + ")" }
  ];
  urgs.forEach(u => {
    const btn = document.createElement("button");
    btn.className = "urgency-pill" + (activeUrg === u.key ? " active" : "");
    btn.textContent = u.label;
    btn.onclick = function() { activeUrg = u.key; activeSrc = null; renderAll(); };
    urgDiv.appendChild(btn);
  });
}

function matchesFilters(item) {
  if (activeSrc && item.source.indexOf(activeSrc) === -1) return false;
  if (activeCat !== "all" && item.cat !== activeCat) return false;
  if (activeUrg !== "all" && item.urgency !== activeUrg) return false;
  return true;
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildCard(item) {
  const color = CAT_COLORS[item.cat] || "#888";
  const urg = URGENCY_MAP[item.urgency] || "🔵";
  const chartIcon = item.charts.count > 0 ? (item.charts.hot ? " 🔥" : " 📊") : "";

  const chartHtml = item.charts.count > 0
    ? '<div class="chart-info"><div class="' + (item.charts.hot ? "chart-hot" : "chart-normal") + '">' +
      (item.charts.hot ? "🔥 CHART WORTH SAVING — " : "📊 Chart: ") + item.charts.desc + '</div></div>'
    : "";

  const linkHtml = item.link
    ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>'
    : "";

  const angleStyle = 'border-left-color:' + color + '; background:' + color + '18;';

  return '<div class="card" id="card-' + item.id + '" data-cat="' + item.cat + '" data-urg="' + item.urgency + '">' +
    '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
      '<span class="item-num">' + String(item.id).padStart(2, '0') + '</span>' +
      '<span>' + urg + '</span>' +
      '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>' +
      '<span class="cat-tag">' + item.cat + '</span>' +
      (item.charts.hot ? '<span title="Chart worth saving">🔥</span>' : item.charts.count > 0 ? '<span title="Has charts">📊</span>' : '') +
      '<span class="card-title">' + item.title + '</span>' +
    '</div>' +
    '<div class="card-body" id="body-' + item.id + '">' +
      '<div class="section-label">The Idea</div>' +
      '<div class="idea-text">' + item.idea + '</div>' +
      '<div class="section-label">My Angle</div>' +
      '<div class="angle-box" style="' + angleStyle + '">' + item.angle + '</div>' +
      '<div class="tweets-row">' +
        '<div class="tweet-box">' +
          '<div class="tweet-label a">TWEET A</div>' +
          '<div class="tweet-text">' + item.tweetA + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
        '</div>' +
        '<div class="tweet-box">' +
          '<div class="tweet-label b">TWEET B</div>' +
          '<div class="tweet-text">' + item.tweetB + '</div>' +
          '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
        '</div>' +
      '</div>' +
      chartHtml +
      linkHtml +
    '</div>' +
  '</div>';
}

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function renderAll() {
  // Rebuild filter pills
  document.getElementById("cat-filters").innerHTML = "";
  document.getElementById("urg-filters").innerHTML = "";
  buildFilters();

  // Render cards
  const container = document.getElementById("cards-container");
  const filtered = ITEMS.filter(matchesFilters);
  if (filtered.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">No items match current filters.</div>';
  } else {
    container.innerHTML = filtered.map(buildCard).join('');
  }

  // Update meta
  const filtered_count = filtered.length;
  document.getElementById("meta-line").textContent =
    META.date + " · " + META.time + " · " + META.emailsRead + "/" + META.emailsInWindow + " emails · " + META.itemsExtracted + " items extracted · Window: " + META.windowStart + " → " + META.windowEnd;

  // Rebuild report
  buildReport();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderAll();
  // Expand matching cards
  setTimeout(function() {
    ITEMS.forEach(function(item) {
      if (item.source.indexOf(name) !== -1) {
        var body = document.getElementById('body-' + item.id);
        if (body) body.classList.add('open');
      }
    });
  }, 50);
}

function buildReport() {
  const inner = document.getElementById("report-inner");
  let html = '<div class="report-section">';
  html += '<p style="font-size:12px;color:#555;margin-bottom:8px;">Window: ' + META.windowStart + ' → ' + META.windowEnd + ' · Emails in window: ' + META.emailsInWindow + ' · Read: ' + META.emailsRead + ' · Items: ' + META.itemsExtracted + '</p>';
  html += '<h4>Included Sources (' + META.includedSources.length + ')</h4>';
  META.includedSources.forEach(function(s) {
    html += '<div style="margin:2px 0;font-size:12px;"><span class="src-link" onclick="filterBySrc(\'' + s.name.replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.items + ' item' + (s.items !== 1 ? 's' : '') + '</div>';
  });
  html += '</div><div class="report-section"><h4>Skipped Sources (' + META.skippedSources.length + ')</h4>';
  META.skippedSources.forEach(function(s) {
    html += '<div style="margin:2px 0;font-size:12px;"><strong>' + s.name + '</strong>: ' + s.reason + '</div>';
  });
  html += '</div>';
  inner.innerHTML = html;
}

function toggleReport() {
  document.getElementById("report-inner").classList.toggle("open");
  const h3 = document.querySelector(".report-card h3");
  h3.textContent = document.getElementById("report-inner").classList.contains("open")
    ? "▼ Session Report" : "▶ Session Report";
}

// Init
buildFilters();
renderAll();
</script>
</body>
</html>
