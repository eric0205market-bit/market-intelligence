ons in five weeks. The index most levered to the AI capex story is the most volatile thing in the market right now, and the S&P does not seem to care yet. $SOXX $SMH","tweetB":"Back-to-back 5%+ down days in semis, first time since April 2025. If you are still modeling AI capex as a smooth line up and to the right, the price action in the stocks actually building it disagrees with you.","charts":{"count":1,"hot":true,"desc":"127 SOX corrections since 1994, plotted by time and price"},"link":"https://bespokeinvest.substack.com/p/falling-sox-morning-market-note-7626"},{"id":3,"cat":"AI/infra","urgency":"watch","source":"Import AI (Jack Clark)","title":"Fable's kernel beat Opus, GLM, and GPT on CUDA speedup using one launch per token","idea":"On KernelBench-Mega, Fable achieved an 18.71x speedup writing raw CUDA versus Claude Opus 4.8's 14.4x (Triton), GLM-5.2's 11.14x, and GPT-5.5's 4.34x. The standout detail: Fable's solution uses exactly one cooperative kernel launch per decoded token, versus 4-14 launches for every other top entry.","angle":"This is a leading indicator for recursive self-improvement risk: an AI that writes better AI infrastructure than the labs building it is the benchmark that should worry people, not chatbot IQ tests.","tweetA":"Fable wrote a CUDA kernel that beats Opus 4.8, GLM-5.2, and GPT-5.5 on efficiency: one kernel launch per token versus 4 to 14 for everyone else. The model that writes the best infrastructure code is not always the biggest name, it is whoever nails the systems problem.","tweetB":"Forget chatbot benchmarks. KernelBench-Mega tests whether AI can build the tools AI research runs on. When a model gets meaningfully better at that specific task, you are measuring an input to recursive self-improvement, not a party trick.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://importai.substack.com/p/import-ai-464-fables-writes-gpu-kernels"},{"id":4,"cat":"labor","urgency":"watch","source":"Import AI (Jack Clark) / CAIS + Scale","title":"AI's success rate on real freelance work quadrupled in eight months","idea":"The Remote Labor Index, which tests AI on end-to-end freelance projects like CAD, video editing, and web apps, rose from 2.5% success at launch in October 2025 to 16.1% in July 2026. Fable 5 leads at 16.1%, ahead of Opus 4.8 at 8.3% and GPT-5.5 at 6.3%.","angle":"Sixteen percent success on real Upwork-style deliverables sounds low until you annualize the growth rate; this is the number to track for when knowledge-work labor markets actually crack, not GDP prints.","tweetA":"RLI went from 2.5% to 16.1% in eight months on real freelance deliverables: ring design, ad videos, floor plans. That is a 6x-plus improvement rate. At that pace you do not need to hit 80% to break the freelance labor market, you need two more doublings.","tweetB":"Everyone is debating whether AI accelerated this year using vibes. Here is an actual benchmark: end-to-end freelance task completion quadrupled since October. If Zuckerberg says agents disappointed him internally while this number quadruples externally, the gap is internal tooling, not capability.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://importai.substack.com/p/import-ai-464-fables-writes-gpu-kernels"},{"id":5,"cat":"AI/infra","urgency":"watch","source":"Import AI (Jack Clark) / multi-university consortium","title":"Best AI computer-use agent scores 20.6% on tasks that take humans 1.6 hours","idea":"OSWorld 2.0's median task takes a human 1.6 hours, 48x longer than v1.0's 2-minute median, spanning Slack, GitLab, AWS, and mock insurance and visa portals. The best setup, Claude Opus 4.8 with maximum thinking, hits only 20.6% binary accuracy, though OSWorld 1.0 went from about 30% to about 75% in a year.","angle":"The gap between an AI that can use one app for two minutes and one that can use twelve apps for an hour is the gap between chatbot hype and agents that replace an ops person, and it is closing on the same curve v1.0 did.","tweetA":"Best computer-use agent today: 20.6% on tasks that take a human 1.6 hours. OSWorld 1.0 went from 30% to 75% in twelve months. If that curve repeats, you are looking at a genuinely competent digital employee by mid-2027, not 2030.","tweetB":"Nobody prices in that 69.6% of OSWorld 2.0 tasks take a skilled human over an hour. The benchmark quietly moved from testing whether AI can click buttons to whether it can do a junior analyst's Tuesday. That is the real product roadmap for enterprise agents.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://importai.substack.com/p/import-ai-464-fables-writes-gpu-kernels"},{"id":6,"cat":"tech","urgency":"deep","source":"Import AI (Jack Clark) / JD.com research paper","title":"China's Amazon runs its entire inventory system on self-evolving LLMs and Huawei chips","idea":"JD's Oxygen AI Item Center processes hundreds of millions of item updates per day across tens of billions of SKUs, running inference on Huawei Ascend NPUs instead of Nvidia. Its self-evolving models use incremental learning to avoid catastrophic forgetting without full retraining.","angle":"This is the real-world proof point that China's compute-sovereignty push is not just chips for chips' sake; they are running production-scale AI on domestic silicon at Amazon-plus scale today.","tweetA":"JD runs hundreds of millions of daily inventory updates on Huawei Ascend NPUs, not Nvidia. Every China-is-stuck-without-CUDA take needs to explain how a company bigger than most S&P 500 retailers is already running production AI at scale on domestic chips.","tweetB":"The Nvidia bull case rests partly on nobody else's software stack working at scale. JD's Oxygen system is a counterexample running in production right now, not a lab demo. Export controls bought time, not a permanent moat.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://importai.substack.com/p/import-ai-464-fables-writes-gpu-kernels"},{"id":7,"cat":"culture","urgency":"deep","source":"Import AI (Jack Clark, fiction)","title":"A sci-fi vignette imagines banning general AI and rebuilding civilization on analog computers","idea":"Import AI's fiction feature imagines a 2050 where general-purpose computing was banned after AI became too dangerous, replaced by bespoke analog computers: geography implemented as physical impedance for weather models, real floodplain electronics for flood prediction. Inspired by real questions about how far analog compute could go on a $10-20 billion budget.","angle":"It is a thought experiment worth stealing for portfolio construction: if alignment fears ever force a real regulatory cap on general compute, physical and analog compute hardware becomes the only legal path to that capability, a tail-risk hedge sector nobody prices.","tweetA":"Import AI's fiction slot imagines banning general-purpose AI entirely and rebuilding civilization on physical analog computers, one per problem. Feels absurd until you remember serious alignment people already float compute governance as policy; this story is that policy's fictional endpoint.","tweetB":"Worth asking: if regulators ever cap general-purpose AI hard, what is the compliant substitute? Analog and neuromorphic compute for narrow physical-world problems is the answer this story gives, and it is also a real, tiny sector today, not just sci-fi.","charts":{"count":0,"hot":false,"desc":""},"link":"https://importai.substack.com/p/import-ai-464-fables-writes-gpu-kernels"},{"id":8,"cat":"crypto","urgency":"deep","source":"Unchained Crypto","title":"Trump family made $1.4B on crypto; nearly 1M wallets that bought the same memecoin lost $3.8B","idea":"Trump's disclosure shows $636M from the TRUMP memecoin, $594M from World Liberty Financial, and $197M from an Abu Dhabi-linked stablecoin venture. Nansen found nearly a million wallets that bought TRUMP lost a combined $3.8B, while roughly 492,000 earlier buyers are up $4B.","angle":"The $3.8B retail loss versus $4B insider gain on the same asset is a distributional story, not just a conflict-of-interest story; it is the cleanest data point yet for how memecoin issuance functions as a wealth transfer mechanism.","tweetA":"$3.8B lost by roughly 1M TRUMP memecoin retail buyers. $4B gained by about 492K earlier holders. Same asset, same time period. That is not volatility, that is a wealth pump with a name on the token.","tweetB":"The conflict-of-interest headline is boring. The real story is Nansen's wallet data: memecoins launched by insiders function as a systematic transfer from late retail to early holders, at a scale that dwarfs most scam headlines this cycle.","charts":{"count":1,"hot":true,"desc":"Wallet P&L distribution chart for TRUMP token buyers"},"link":"https://unchainedcrypto.com/trump-defends-1-4-billion-crypto-income-as-memecoin-investors-lose-3-8-billion/"},{"id":9,"cat":"crypto","urgency":"act_now","source":"Unchained Crypto / Chosun Biz","title":"Samsung and Dunamu say they never agreed to join the stablecoin alliance using their names","idea":"Open Standard unveiled OUSD on June 30, claiming backing from over 140 companies including Samsung and Dunamu. Samsung, Dunamu, Shinhan, and Kbank now all say they only agreed to review the proposal and never signed on as founding members.","angle":"A stablecoin whose entire pitch rests on a roster of 140 companies falling apart on first contact with those companies is a tell for how much diligence is happening in the institutional-stablecoin land grab.","tweetA":"OUSD's pitch is that 140-plus companies back it. Four of the named companies, Samsung, Dunamu, Shinhan, and Kbank, now say they never agreed to anything beyond looking at the deck. If the flagship names are fabricated, what is the real number?","tweetB":"Every stablecoin launch this year leads with a partner logo wall. OUSD just showed what happens when journalists actually call the partners. Assume the logo wall is aspirational until proven otherwise.","charts":{"count":0,"hot":false,"desc":""},"link":"https://unchainedcrypto.com/samsung-and-dunamu-say-they-never-agreed-to-join-open-standards-ousd-stablecoin-consortium/"},{"id":10,"cat":"regulation","urgency":"deep","source":"Unchained Crypto / ESMA","title":"EU regulator warns prediction markets could fall under its binary options retail ban","idea":"ESMA said yes-or-no event contracts could be classified as derivatives under 2018 rules if the underlying asset counts as a financial instrument, which would bar firms from marketing them to EU retail investors. This lands as Kalshi and Polymarket already face hurdles after Spain blocked both over missing gambling licenses.","angle":"Prediction markets are about to hit the same regulatory wall CFDs and binary options hit a decade ago in Europe; the US growth story does not necessarily export.","tweetA":"Kalshi and Polymarket's total addressable market just got smaller. ESMA is signaling event contracts could get the same retail ban binary options got in 2018. The US prediction market boom might be a US-only phenomenon.","tweetB":"Spain already blocked Kalshi and Polymarket over gambling licenses. Now ESMA is floating an EU-wide retail ban. If you are valuing these platforms off global TAM, subtract Europe now, not after the ban actually lands.","charts":{"count":0,"hot":false,"desc":""},"link":"https://unchainedcrypto.com/esma-warns-prediction-market-contracts-may-fall-under-eus-retail-binary-options-ban/"},{"id":11,"cat":"crypto","urgency":"deep","source":"Unchained Crypto / Vitalik Buterin","title":"Ethereum's next overhaul is a 3-4 year rebuild Vitalik says rivals the Merge","idea":"Lean Ethereum touches nearly every protocol layer: native recursive STARKs, quantum-resistant cryptography, and a new scalable state type targeting 100TB by 2030 that could cut fees more than 10x for simple tokens and NFTs while keeping the current model for complex apps like Uniswap.","angle":"A quantum-resistance push landing in the same roadmap as a 10x fee cut shows Ethereum's real competitive threat is not Solana throughput anymore, it is a security assumption breaking in the 2030s, and they are hedging a tail risk most L1s are not even discussing publicly.","tweetA":"Buried in the Lean Ethereum roadmap: quantum-resistant cryptography, three to four years out. Almost no other L1 is talking about this publicly. If quantum ever threatens ECDSA, Ethereum wants to be the chain that saw it coming.","tweetB":"10x cheaper fees for simple tokens, same expensive tier kept for Uniswap-style complexity. That is Ethereum admitting a single fee market never made sense and building a two-tier state model instead. Quietly one of the more consequential design changes in its history.","charts":{"count":0,"hot":false,"desc":""},"link":"https://unchainedcrypto.com/vitalik-buterin-says-ethereums-next-major-upgrade-will-take-three-to-four-years-and-rival-the-merge/"},{"id":12,"cat":"regulation","urgency":"deep","source":"Unchained Crypto / IMF","title":"IMF warns tokenization removes the shock absorbers that give regulators time to react","idea":"IMF Financial Counsellor Tobias Adrian said moving assets onto shared digital ledgers could shift risk from institutions' balance sheets onto the platforms and code running tokenized markets, removing traditional buffers between shocks and system-wide contagion.","angle":"This is the IMF quietly admitting tokenized RWAs, the trade every TradFi desk is piling into, could make the next crisis faster and less containable than 2008; worth weighing against every tokenization pitch deck.","tweetA":"The IMF's actual concern with tokenization is not fraud, it is speed. Remove the balance-sheet buffers between institutions and you remove the time regulators use to react to a shock. Faster settlement cuts both ways.","tweetB":"Every RWA tokenization pitch talks about unlocking liquidity. None of them mention the IMF's counterpoint: liquidity and buffers are often the same thing wearing different names. Read the fine print before buying the trillion-dollar TAM slide.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.imf.org/en/blogs/articles/2026/07/02/tokenization-can-change-the-worlds-financial-architecture"},{"id":13,"cat":"culture","urgency":"act_now","source":"Unchained Crypto / Bloomberg","title":"Spotify caught prediction markets settling a bet on 500,000 fake streams","idea":"Spotify pulled over 500,000 manipulated streams that had pushed a song up its charts, streams that a $3 million Kalshi market had already used to declare a winner. Spotify then demanded logo removal from Kalshi and Polymarket.","angle":"This is the first documented case of a prediction market getting directly gamed via manipulation of the underlying real-world metric it settles on, a preview of the oracle problem showing up in a mainstream, retail-facing product.","tweetA":"A $3M Kalshi market already paid out on a chart position built from 500,000 fake Spotify streams. This is the oracle problem, but consumer-facing: any market settled on a gameable metric is an invitation to game the metric.","tweetB":"Prediction markets scaled faster than their settlement infrastructure. Chart position, election calls, sports outcomes, anything with a manipulable input is now a market someone can rig for a payout, not just bragging rights.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.bloomberg.com/news/articles/2026-07-02/spotify-challenges-prediction-markets-after-song-chart-rigging"},{"id":14,"cat":"geopolitics","urgency":"deep","source":"Unchained Crypto / Sunday Times","title":"Nigel Farage's private security was funded by a convicted fraudster tied to a crypto gambling site","idea":"George Cottrell, convicted of wire fraud and tied to offshore crypto gambling platform Tether.bet, reportedly paid for Farage's private security, staff, and accommodation in the year before his 2024 election, undisclosed and a potential breach of UK MP disclosure rules.","angle":"Crypto-adjacent money quietly funding a major European political figure's campaign infrastructure gives regulators political cover to tighten crypto rules across the EU and UK regardless of the market's own fundamentals.","tweetA":"A convicted fraudster running an offshore crypto gambling site funded Farage's security detail, undisclosed. Every time crypto money touches a political scandal like this, it hands regulators a free excuse to tighten rules on the whole industry.","tweetB":"Nobody is pricing UK and EU crypto regulatory risk off political scandal contagion, but that is exactly the mechanism that has driven half of MiCA's stricter provisions. Watch this story's political fallout, not the platform itself.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.thetimes.com/uk/politics/article/revealed-nigel-farage-secretly-funded-by-convicted-criminal-j0brtrlnk"},{"id":15,"cat":"positioning","urgency":"deep","source":"Lord Fed","title":"Mag7 just had its first green week since May, and the ATM thesis says it is not over","idea":"After a 15% four-week selloff, Mag7 closed the week up roughly 5% versus SPX +1.7% and NDX +0.7%. The author's thesis: Mag7 became the market's ATM, the most liquid, highest-quality names sold to fund every other trade, and that selling created room to buy back. The July SPX target holds at 7,700 with an August overshoot still possible.","angle":"The sell-your-best-asset-to-fund-your-worst-idea dynamic is a classic late-cycle tell; when flight-to-quality names start outperforming again after acting as everyone's funding source, that is usually the first sign speculative excess elsewhere is running out of fuel.","tweetA":"Mag7 up 5% the week it stopped being everyone's ATM. When the highest-quality, most liquid names in the market go from source-of-funds-for-everything-else to best performer, that is usually the tell the speculative trade elsewhere just ran out of gas.","tweetB":"SPX 7,700 in July with an August overshoot on the table is a bold call the week after SOX had its second correction in a month. Either Mag7 fully decouples from semis, or one of these calls is wrong.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://www.lordfed.co.uk/p/the-pain-trade-hasnt-even-started"},{"id":16,"cat":"crypto","urgency":"act_now","source":"Lucky Trader","title":"Bitcoin ETFs flip to inflows after bleeding $4B-plus in June, whales bought $16.7B first","idea":"Spot Bitcoin ETFs swung to $223.5M net inflows on July 2 after a record outflow month; ETH ETFs added $15M and $29M on consecutive days. Whales had already absorbed $16.7B of BTC over the prior two weeks, the kind of divergence that has shown up near past bottoms.","angle":"Smart money front-running the ETF flow reversal by two weeks is the real signal here, not the headline flip itself; by the time retail sees ETF inflows are back in a headline, the whales already did the buying at the low.","tweetA":"Whales bought $16.7B of BTC over two weeks before the ETF flows even turned positive. By the time the headline says inflows are back, the people who actually move price already finished buying the bottom.","tweetB":"Bitcoin's worst first half since 2018 and 2022, a 21-month low at $57,950, then one green ETF day and STRC and MSTR both rip 21%. This market has almost no depth left in either direction; small flow changes are producing outsized price moves.","charts":{"count":1,"hot":false,"desc":"ETF flow reversal chart, BTC/ETH daily net flows"},"link":"https://luckytrader.substack.com/p/crypto-surges-over-holiday-weekend"},{"id":17,"cat":"crypto","urgency":"watch","source":"Lucky Trader","title":"Bitcoin miner stress just hit a level that has only shown up near major bottoms","idea":"The Miner Cycle Stress Composite fell to a new 2026 low, entering its undervalued range, a level that previously coincided with major bottoms in 2015, 2018, 2020, 2022, and 2024.","angle":"Miner capitulation indicators have a better hit rate calling BTC bottoms than most on-chain metrics because miners are forced sellers with real operating costs, worth tracking alongside price, not instead of it.","tweetA":"Miner stress just hit the same zone that marked every major BTC bottom since 2015. Miners are forced sellers with real electricity bills, so when they are this stressed, the marginal seller has already sold. That is usually where the floor is.","tweetB":"Five cycles, same indicator, same undervalued zone before every major bottom. Either this time is different, or the Miner Cycle Stress Composite just quietly called the low again.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://luckytrader.substack.com/p/crypto-surges-over-holiday-weekend"},{"id":18,"cat":"positioning","urgency":"deep","source":"Arcadia Now / Blind Squirrel Macro","title":"A hedge fund went sell-only on China tech in March, now sits on pending trades post-Hormuz","idea":"The author exited seven mainly-consumer China names and trimmed remaining positions starting in early March, calling China's offshore tech giants dead weight on MSCI China even as the domestic SSE STAR chip stack keeps pace with Korea's memory giants. New adds are parked in a post-Hormuz pending trades bucket.","angle":"The split between Chinese chips outperforming and Chinese consumer tech dead weight is the actual investable China thesis right now; it is a sub-sector bet, not a country bet, and most macro takes on China miss that distinction entirely.","tweetA":"China is not one trade. The domestic chip stack on SSE STAR is keeping pace with Korea's memory giants while offshore consumer tech giants are dead weight on MSCI China. Blending these into one China equities number erases the actual signal.","tweetB":"A fund parked its China re-adds in a post-Hormuz pending trades bucket back in May and still has not deployed. If professional China-focused allocators are still on the sidelines two months after the ceasefire, retail chasing the SSE STAR rally is early or late, not on time.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://www.blindsquirrelmacro.com/p/stock-take-pt-2-em-edition"},{"id":19,"cat":"macro","urgency":"deep","source":"David Rosenberg","title":"S&P earnings forecasts are rising at a pace normally seen exiting recessions, not in year four of a bull market","idea":"Consensus now sees S&P 500 earnings growing at a 25% pace for the coming year; expected operating EPS has jumped 20% in just six months, the biggest upward revision since the 2021 COVID rebound. Outside of that, you would have to go back to the mid-2000s China commodity supercycle to see something this powerful.","angle":"Earnings revisions this violent almost always mark either the start of a new cycle or the top of an unsustainable one; the fact that it is happening in year four of an expansion, not year one, is the tell worth sitting with.","tweetA":"A 20% EPS revision in six months. The only two times we have seen this: coming out of COVID in 2021, and the mid-2000s commodity supercycle. Both were regime changes. We are in year four of a bull market pretending to be year one of a new cycle.","tweetB":"Nobody is asking the obvious question: if earnings estimates are moving like a recession recovery, why does every other indicator say late-cycle? Either the estimates are wrong, or the cycle clock is wrong. One of those two things breaks first.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://www.earlymorningwithdave.com/p/is-europe-about-to-see-a-positive"},{"id":20,"cat":"macro","urgency":"deep","source":"Peter Boockvar","title":"10-year yield sits at 4.50% even as inflation breakevens crash to a 2024 low","idea":"The 2yr inflation breakeven is at 1.95%, the lowest since October 2024, and 5yr breakevens are back to December levels, yet the 10yr yield is 56bps above where it was the Friday before the Middle East conflict began. Fed funds futures now price a hike by year-end versus 100% odds of two cuts as of February 27.","angle":"When breakevens collapse but nominal yields stay elevated, the market is not pricing inflation anymore, it is pricing term premium from deficit-driven Treasury supply, a structural repricing rather than a Fed reaction function story.","tweetA":"Inflation breakevens at a 2024 low. The 10-year yield is still 56bps higher than pre-war. If the bond market actually believed the inflation story, yields would be falling with breakevens. They are not. That gap is pure term premium: deficits, not inflation.","tweetB":"In February, futures priced 100% odds of two cuts this year. Today: a hike. Same economy, same roughly 2% growth, opposite policy path priced. The swing says more about positioning extremes than about the Fed's actual reaction function.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://peterboockvar.substack.com/p/to-me-a-most-interesting-pricethe"},{"id":21,"cat":"macro","urgency":"watch","source":"Peter Boockvar","title":"Shanghai-NY freight rates hit the highest since September 2024 as shippers front-run tariffs","idea":"The World Container Index for the Shanghai-NY route rose another 10.5% last week to $7,902, the most expensive since September 2024, with similar moves on the LA and Europe routes. Boockvar attributes some of the demand to suppliers and buyers rushing ahead of a possible new round of selective tariffs.","angle":"Freight rates are a real-time tariff-anticipation indicator months before the tariffs themselves show up in CPI, worth tracking as a leading inflation signal independent of anything the Fed or BLS publishes.","tweetA":"Shanghai-NY freight is at its highest since September 2024, and it is demand-driven front-running of tariffs, not supply disruption. That is inflation pressure building in the pipeline before a single tariff has even been announced.","tweetB":"Everyone is watching CPI prints for tariff effects. Freight rates move first; they are the physical evidence of importers stockpiling ahead of policy. $7,902 on Shanghai-NY says the market already expects the next tariff round.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://peterboockvar.substack.com/p/to-me-a-most-interesting-pricethe"},{"id":22,"cat":"geopolitics","urgency":"watch","source":"ChinaTalk / SemiAnalysis (Niko Ciminelli, Reyk Knuhtsen)","title":"Robots are the first physical-world general-purpose technology in a century, and China already owns the actuator supply chain","idea":"SemiAnalysis's robotics leads argue humanoid robots decouple capital from labor for the first time in the physical world, comparing Unitree's trajectory to DJI's 2013 consumer drone flywheel. Actuators run 50-70% of a humanoid's bill of materials, and the US has no meaningful domestic capacity from rare-earth processing to CNC machine tools.","angle":"If actuators are 50-70% of humanoid BOM and China controls that supply chain end to end, the US we-will-out-AI-them argument is irrelevant; this is a manufacturing and materials-processing problem, not a model-quality problem, and those take a decade to fix, not a funding round.","tweetA":"Actuators are 50-70% of a humanoid robot's cost, and the US does not process the rare earths that go into them. You can have the best AI model in the world and still lose the robotics race on a bill-of-materials problem nobody is fixing with a Series B.","tweetB":"The DJI parallel is the important one: China did not win drones on better software, it won on iterating a cheap-enough product at scale until the flywheel started. Unitree at roughly $30K with 80% of the capability of a $100K US humanoid is the same playbook, one cycle ahead.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://www.chinatalk.media/p/the-robots-are-here"},{"id":23,"cat":"geopolitics","urgency":"watch","source":"ChinaTalk / SemiAnalysis","title":"Banning Chinese humanoid imports would stall the exact US research it is trying to protect","idea":"SemiAnalysis argues Unitree's affordable, standardized robots are the main reason US humanoid research has progressed since 2024; no non-Chinese company offers a comparable, reasonably-priced platform, and most open-source US robots still source Chinese components anyway.","angle":"This is the robotics version of the chip export-control paradox: restricting an input China already has leverage over just accelerates the West's own research stall without actually denying China anything it needs domestically.","tweetA":"Ban Unitree imports and you do not hurt Unitree, you stall every US humanoid research lab that has been using cheap G1s as its only accessible platform since 2024. China already controls the components; banning the finished product just punishes the researchers.","tweetB":"China has already put export controls on neodymium and CNC machines. The ban-their-robots crowd is proposing to remove our own negotiating leverage in a fight we are already losing on materials. That is not decoupling, that is unilateral disarmament.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.chinatalk.media/p/the-robots-are-here"},{"id":24,"cat":"macro","urgency":"deep","source":"The Bond Beat / Morgan Stanley US Equity Strategy","title":"Morgan Stanley says the broadening trade is back as semis lose momentum to hyperscalers","idea":"MS argues semiconductor EPS-revision breadth is at historical highs against the group even as falling oil stabilizes rates and drives rotation into Consumer Discretionary, Transports, and Biotech. They see Hyperscalers as having already absorbed their underperformance and now holding attractive AI optionality plus an underappreciated cost-cutting lever.","angle":"This confirms the same signal All Star Charts found in insurance and Lord Fed found in Mag7 flows; three independent sources converging on money rotating out of AI-infrastructure beta within the same 24 hours is a real regime signal, not noise.","tweetA":"Three unrelated sources this morning, a chartist, a macro trader, and Morgan Stanley's strategy desk, are all describing the same rotation: out of semis, into everything semis funded the excitement for. When technicals, flows, and sell-side research agree simultaneously, that is usually not a coincidence.","tweetB":"MS's underappreciated cost-cutting lever line on hyperscalers is doing a lot of work. Translation: if AI capex growth decelerates, the same companies get a margin story instead of a growth story, and the market may reprice that transition before the capex numbers actually slow.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://thebondbeat.substack.com/p/while-we-slept-usts-bid-earl-lower"},{"id":25,"cat":"macro","urgency":"deep","source":"The Bond Beat / Tradition (Major Markets Letter)","title":"A veteran rates desk says the real yield illusion makes 5yr TIPS the cleanest trade in fixed income","idea":"Tradition's letter argues the surge in real yields is not organic growth-driven, it is the mechanical result of falling inflation expectations (5yr breakeven at 2.25%, on target) colliding with an aggressively repriced Fed path and a shrinking term premium. Their trade: buy 5yr TIPS, positioned for real yields to converge lower as any data softening forces the repricing to reverse.","angle":"This directly contradicts the American exceptionalism narrative currently priced into the curve; if the read is right, the entire real-yield-surge story is a policy overshoot mirage, not evidence of a permanently higher neutral rate.","tweetA":"The bond market is telling itself real yields are up because growth is strong. Tradition's desk says no, it is collapsing inflation expectations plus an overpriced hawkish path. If that is right, 5yr TIPS is the asymmetric trade of the summer.","tweetB":"American exceptionalism or policy overshoot? The chart says overshoot: breakevens are on target at 2.25%, but nominal yields did not get the memo. Belly-of-the-curve TIPS captures the gap when reality catches up to the policy path.","charts":{"count":1,"hot":true,"desc":"5yr breakeven vs real yield and term premium chart"},"link":"https://thebondbeat.substack.com/p/while-we-slept-usts-bid-earl-lower"},{"id":26,"cat":"geopolitics","urgency":"deep","source":"The Bond Beat / Bloomberg Economics","title":"Bloomberg Economics says Trump's Iran war raised global rate trajectories through 2028","idea":"Even with a shaky ceasefire holding, Bloomberg Economics' forecasts show global and advanced-economy borrowing costs elevated by up to half a point or more through 2028 versus pre-war projections, driven partly by lingering energy-shock inflation and partly by AI-adoption-related price pressure.","angle":"A single geopolitical event permanently repricing the entire developed-world rate curve through 2028 is a bigger deal than any single Fed meeting this year, and it is barely discussed outside fixed-income circles.","tweetA":"One war just moved Bloomberg's global rate forecast through 2028, not just this year. If a shaky ceasefire still leaves rates 50bp higher for three years, the actual scarring event was the war, not whatever the Fed does at the next meeting.","tweetB":"Everyone is obsessing over whether the Fed hikes or holds in 2026. Bloomberg Economics is telling you the bigger number: the entire developed-world rate curve got permanently repriced higher through 2028 because of Hormuz, not because of Powell or Warsh.","charts":{"count":0,"hot":false,"desc":""},"link":"https://thebondbeat.substack.com/p/while-we-slept-usts-bid-earl-lower"},{"id":27,"cat":"macro","urgency":"act_now","source":"Mando Minutes / BofA via unusual_whales","title":"BofA says 7 of 10 market peak indicators have now triggered","idea":"Mando Minutes flags a BofA note that 7 of 10 of its market-peak indicators have triggered, alongside the Dow hitting an all-time high the same week jobs data badly missed and Trump reportedly bought 327 stocks the day before a tariff pause.","angle":"Peak-indicator counts like this rarely call the exact top, but 7-of-10 with the Dow at an all-time high into a soft jobs print is the kind of setup where the risk-reward on hedges gets cheap relative to the tail risk.","tweetA":"7 of 10 BofA peak indicators triggered, Dow at an all-time high, and the jobs report just badly missed. None of those three facts alone means much. All three at once, in the same week, is when cheap tail hedges start looking attractively priced.","tweetB":"Trump bought 327 stocks the day before a tariff pause was announced. Whatever you think about the ethics, that is also a positioning data point: someone with policy foreknowledge went risk-on right before the peak-indicator count hit 7 of 10.","charts":{"count":0,"hot":false,"desc":"Chart inside — worth opening"},"link":"https://mandominutes.beehiiv.com/p/mando-minutes-e8cf"},{"id":28,"cat":"AI/infra","urgency":"act_now","source":"Mando Minutes / unusual_whales","title":"Alibaba just banned staff from using Claude Code","idea":"Mando Minutes flags a report that Alibaba has banned employees from using Claude Code internally, landing in the same window as reports that the Pentagon designated Anthropic a supply-chain risk and that Palantir's CEO is publicly questioning closed-source AI's value proposition.","angle":"A Chinese tech giant banning a US frontier coding tool while the US's own defense-adjacent companies sour on the same lab is a rare moment where both superpowers independently push away from the same product for opposite strategic reasons.","tweetA":"Alibaba bans Claude Code for its own staff. The Pentagon flags Anthropic as a supply-chain risk. Palantir's CEO publicly questions closed-source AI. Three unrelated actors in two rival blocs are converging on the same conclusion from opposite directions, and Anthropic is the common target.","tweetB":"China banning a US AI coding tool internally is not about capability, it is about data sovereignty and substitution readiness, same logic as banning Nvidia chips. Worth watching whether this is Alibaba-specific or the start of a broader state directive.","charts":{"count":0,"hot":false,"desc":""},"link":"https://mandominutes.beehiiv.com/p/mando-minutes-e8cf"},{"id":29,"cat":"labor","urgency":"watch","source":"Mando Minutes / unusual_whales","title":"Nearly all US job growth is now coming from healthcare","idea":"Mando Minutes flags a data point that nearly all recent US job growth is concentrated in healthcare, consistent with Boockvar's same-day note that Friday's jobs report showed strength concentrated in healthcare and social assistance, along with construction, alongside holes of weakness elsewhere.","angle":"A labor market where one largely non-cyclical, government-payer-driven sector accounts for nearly all net job creation is not a healthy broad-based expansion, it is a labor market running on a single non-market-driven engine.","tweetA":"Nearly all US job growth is healthcare should be a bigger headline than the unemployment rate itself. A labor market propped up by one largely non-cyclical, government-payer-driven sector is not the same thing as a strong labor market.","tweetB":"Two sources, same day, same conclusion: Boockvar says employment strength is concentrated in healthcare and social assistance and construction, with holes of weakness everywhere else. When independent macro voices converge on the same granular data point unprompted, trust that over the headline NFP number.","charts":{"count":0,"hot":false,"desc":""},"link":"https://mandominutes.beehiiv.com/p/mando-minutes-e8cf"},{"id":30,"cat":"AI/infra","urgency":"deep","source":"The Dark Side of the Boom","title":"Burry's memory-stock bet is really a warning that Korea and China capacity arrives before the market expects","idea":"The framing: Burry is not calling the AI memory supercycle over, he is questioning whether investors are pricing a permanent scarcity structure onto what is actually a cyclical scarcity phase, and forward earnings multiples make cyclical stocks look deceptively cheap right before the top, one of memory's oldest traps.","angle":"The tell here is not Burry's specific trade, it is the mechanism: looks cheap on forward earnings is exactly how every commodity-cycle stock looks right before capacity floods in, worth checking every AI-memory name's forward multiple against this exact pattern before buying the dip.","tweetA":"Burry's actual argument is not that AI memory demand is fake, it is that investors are pricing a cyclical scarcity phase as if it is permanent. SK Hynix and Micron both look cheap on forward earnings right now, which is exactly how memory stocks look right before Korean and Chinese capacity floods in.","tweetB":"Forward P/E is the most dangerous metric in a cyclical sector at the top of the cycle, because the E has not caught up to falling prices yet. If you are buying memory names on it is so cheap, you are buying the exact trap Burry is warning about.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://thedarksideoftheboom.substack.com/p/michael-burry-is-looking-at-the-memory"},{"id":31,"cat":"labor","urgency":"deep","source":"Young and Calculated","title":"Renaissance pays its PhD researchers less base salary than Jane Street pays traders straight from undergrad","idea":"Renaissance's research scientist role pays $185K-$224K base and requires an advanced quant degree; Jane Street's quant trader role pays $300K base with no degree requirement at all. Citadel's split: roughly 65% PhD among quant researchers, roughly 80% bachelor's or master's among quant traders.","angle":"The base salary gap alone shows the hiring market has already priced a PhD as a multi-year signal of research capability, not a credential that commands a premium on its own; the real premium sits in bonus and carry structures the base figure does not show.","tweetA":"Renaissance pays its PhDs a lower base than Jane Street pays a 22-year-old with a math degree and zero finance experience. If you are choosing a PhD purely for the comp bump, you have already misread which part of quant finance pays for the credential.","tweetB":"The quant researcher versus quant trader split explains why is a PhD worth it is unanswerable as asked. It is worth it for one specific job, original signal research, and irrelevant for another, fast probabilistic decision-making. Most career advice collapses three different jobs into one label.","charts":{"count":0,"hot":false,"desc":""},"link":"https://youngandcalculated.substack.com/p/is-a-doctorate-phd-necessary-for"},{"id":32,"cat":"geopolitics","urgency":"deep","source":"Noahpinion (Noah Smith)","title":"Independent estimates say China's economy actually shrank in 2022, official data says plus 3%","idea":"Rhodium Group estimates China's GDP contracted 0.3-0.8% in 2022 versus the officially reported 3.0% growth, with only 1.5-2% growth in 2023 versus the reported 5.2%. China's own official Q2 2022 GDP number, annualized quarter-over-quarter the way the US reports it, was actually over -3%.","angle":"The gap between official Chinese GDP and independent reconstructions from Rhodium, the Bank of Finland, Capital Economics, and Nakamura et al.'s consumption-based method is now large and consistent enough across methodologies that treating headline Chinese GDP as a real number, rather than a policy signal, is simply a modeling error.","tweetA":"Official China 2022 GDP: plus 3.0%. Rhodium's independent estimate: -0.3% to -0.8%. That is not rounding error, that is a different economy. If your macro model uses headline Chinese GDP as an input, you are modeling propaganda, not output.","tweetB":"China avoided a crash the same way you avoid a fever by breaking the thermometer. Youth unemployment data got redefined in 2023 specifically because the real number was too embarrassing. The stabilization is real. The reported magnitude of it is not.","charts":{"count":2,"hot":true,"desc":"China property price decline chart plus official vs Rhodium GDP estimate comparison"},"link":"https://www.noahpinion.blog/p/no-china-did-not-manage-to-avoid"},{"id":33,"cat":"AI/infra","urgency":"act_now","source":"AI Supremacy","title":"The Pentagon restricted Anthropic's flagship model class, and Palantir's CEO is publicly siding with open-weight","idea":"The US government restricted Anthropic's Mythos-class models on June 12, months after designating Anthropic a supply-chain risk in February. Palantir CEO Alex Karp is publicly questioning closed-source AI's value proposition, while Sam Altman has offered the Trump administration a 5% stake in OpenAI.","angle":"A defense-embedded company's CEO publicly favoring Chinese-dominated open-weight architecture over an American frontier lab, while that same lab faces government restriction, is a genuinely strange alignment of incentives that could accelerate the exact Chinese AI adoption the restrictions were meant to prevent.","tweetA":"The US government restricts Anthropic's best model, then a Pentagon-embedded contractor's CEO goes on camera arguing open-weight, currently dominated by China, is the smarter bet. If the goal was keeping America ahead in AI, this is a strange way to pursue it.","tweetB":"Watch what happens to enterprise Claude usage over the next two quarters. If restricted access, expensive, and can be cut off anytime becomes the market's read on frontier US labs, that is a genuine air pocket in a growth story most investors assumed was a straight line up.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.ai-supremacy.com/p/the-token-apocalypse"},{"id":34,"cat":"AI/infra","urgency":"watch","source":"AI Supremacy / JPMorgan aggregator data","title":"Total LLM token volume is up 70% month over month, but per-token prices are falling 20% from May's high","idea":"JPMorgan's tracking shows total LLM token volume surged 70% from May to June even as the LLM Token Expenditure Index fell 20% from its May peak, consistent with Jevons Paradox: cheaper, more efficient, often Chinese open-weight inference driving up total usage while per-unit revenue compresses.","angle":"This is the AI-bubble bear case in one data pair: volume growth alone does not save model-maker revenue if price-per-token keeps falling faster than volume rises, the same commoditization dynamic that crushed margins in cloud storage and bandwidth a decade ago.","tweetA":"Token volume up 70% month over month. Token prices down 20% from the May peak. If you are modeling Anthropic or OpenAI's IPO off token-volume growth alone, you are missing the half of the equation where the model itself becomes a commodity and pricing craters faster than usage rises.","tweetB":"This is Jevons Paradox playing out in real time in AI: cheaper inference does not shrink the market, it explodes total consumption. Great for GPU demand. Terrible for anyone whose revenue model depends on premium per-token pricing surviving the transition.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.ai-supremacy.com/p/the-token-apocalypse"},{"id":35,"cat":"AI/infra","urgency":"deep","source":"AI Supremacy","title":"Tech sector earnings are re-accelerating toward 50% YoY while AI-adopting sectors' earnings are flatlining near zero","idea":"AI Supremacy cites data showing the US tech sector's earnings growth climbing toward 50% YoY even as the earnings growth of sectors that are supposed to be adopting AI to boost productivity has flattened out just above 0%.","angle":"This is the ROI-gap thesis in its cleanest form: the companies selling AI infrastructure are printing money while the companies buying it to become more productive show zero earnings benefit yet, either a lag effect or evidence the productivity story has not arrived.","tweetA":"Tech sector earnings: accelerating toward 50% YoY. The sectors supposedly getting more productive from buying AI: earnings growth flat near 0%. That gap is either the most obvious lag effect in corporate history or the first hard data that AI ROI is not showing up yet.","tweetB":"Every AI capex bull case assumes the productivity gains eventually flow to the buyers, not just the sellers. Right now essentially all of the earnings benefit sits with Nvidia, hyperscalers, and model makers. If that split does not narrow within a few quarters, the capex story has a demand-side problem, not just a supply-side one.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.ai-supremacy.com/p/the-token-apocalypse"},{"id":36,"cat":"crypto","urgency":"act_now","source":"Salazar Slytherin / Crypto News","title":"Revolut is delisting USDT on a hard deadline: new buys stop today, balances auto-convert by August 31","idea":"Revolut ends new USDT purchases July 6, stops deposits July 30, and forces users to sell or withdraw by August 31 before remaining balances auto-convert to fiat.","angle":"A major European neobank unilaterally exiting Tether is a MiCA-compliance signal worth tracking as a leading indicator for which other EU-regulated fintechs quietly do the same in the next two quarters.","tweetA":"Revolut just gave USDT holders an eight-week countdown before forced fiat conversion. This is not Tether depegging, it is a regulated EU neobank deciding MiCA compliance risk on USDT is not worth carrying anymore. Watch which bank follows next.","tweetB":"If you are holding USDT inside a regulated EU wallet, the deadline that matters is not a market event, it is a compliance calendar: August 31, forced conversion. The next leg of stablecoin market share will be won on who clears MiCA cleanly, not on yield.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.cryptointegrat.com/p/crypto-news-july-6-2025"},{"id":37,"cat":"macro","urgency":"deep","source":"The Dark Side of the Boom / FX Daily","title":"The dollar did not break on a soft jobs report, which means the dovish Fed story has not been earned yet","idea":"Despite last week's soft payrolls print, 57K versus roughly 113K expected, short-dated US yields held most of their post-April gains and money markets still price about 31bp of tightening this year, down from 43bp at the late-June peak but far from pricing cuts. USD/JPY sits near 162 after Tokyo failed to follow through on its intervention bluff.","angle":"The dollar not falling on genuinely dovish data is the cleanest read available on whether the market actually believes the Fed-is-done narrative, and right now it does not, meaning every Fed pivot trade built on the soft jobs number is priced ahead of the actual policy signal.","tweetA":"Soft jobs report, dollar barely moves, market still prices tightening, not cuts. If the Fed-is-done trade were real, the dollar would have cracked on that data. It did not. The dovish narrative is aspirational, not confirmed.","tweetB":"Tokyo threatened intervention on USD/JPY, did not follow through, and the pair climbed back to 162 anyway. The market called the bluff once. The next real test is whether Japan actually buys yen around July 16-17, not whether it threatens to again.","charts":{"count":0,"hot":false,"desc":"Charts inside — worth opening"},"link":"https://thedarksideoftheboom.substack.com/p/fx-daily-mapping-the-next-trade"},{"id":38,"cat":"venture","urgency":"watch","source":"The Founder's Corner","title":"A founder replaced a fractional CFO's cash-flow model with six Claude prompts","idea":"82% of small businesses that fail cite cash flow problems as a contributing cause per a US Bank study, and the median small business holds only about 27 days of cash buffer per JPMorgan Chase Institute research, roughly four weeks from empty at any time. The workflow feeds raw, unclean bank, AR, and AP exports directly to Claude, which reconciles, categorizes, and outputs a full audited 13-week Excel model with scenarios.","angle":"This is the actual, un-sexy AI productivity story playing out at the SMB level right now, not agents replacing knowledge workers wholesale, but a cheap tool replacing a five-figure FP&A software contract for the exact task most correlated with small business survival.","tweetA":"27 days of cash buffer is the median small business runway, and 82% of small business failures cite cash flow specifically. That is the actual stakes behind AI productivity gains, not chatbot benchmarks; it is whether a founder sees a cash crunch three weeks out instead of finding out when payroll bounces.","tweetB":"The AI adoption story that never makes headlines: unclean CSV exports straight into Claude, no data cleaning, no FP&A contract, full audit trail with every number traced to source. This is happening today at thousands of small companies while everyone argues about AGI timelines.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.the-founders-corner.com/p/i-made-claude-build-my-13-week-cash"},{"id":39,"cat":"AI/infra","urgency":"watch","source":"Salazar Slytherin / AI News","title":"xAI is building a no-code voice agent builder for Grok that can answer phone calls","idea":"xAI is prepping a Voice Agent Builder on Grok that lets users deploy no-code agents to handle inbound phone calls, pushing Grok further into the voice-agent and customer-service automation space already contested by OpenAI and various startups.","angle":"Voice-agent phone automation is the least glamorous, most immediately monetizable AI product category; SMB call centers and appointment scheduling are a bigger near-term TAM than most enterprise agent pitches, and xAI entering it signals the category maturing past startup-only territory.","tweetA":"xAI building a no-code phone-answering agent for Grok is a more interesting tell than another benchmark win. Voice agents for SMB call handling are boring, immediately billable, and do not require AGI. That is where near-term AI revenue actually shows up.","tweetB":"Every major lab eventually builds the same three products: a coding agent, a voice agent, and a browser agent. xAI just checked box two. Watch which lab is first to make the voice agent good enough that SMBs stop paying humans to answer phones.","charts":{"count":0,"hot":false,"desc":""},"link":"https://www.cryptointegrat.com/p/ai-news-july-6-2026"}]

;

const CAT_COLORS = {
  macro: "#e24b4a", credit: "#378add", positioning: "#ef9f27", "AI/infra": "#1d9e75",
  crypto: "#7f77dd", geopolitics: "#d85a30", energy: "#f97316", tech: "#06b6d4",
  gold: "#d4a017", culture: "#ec4899", labor: "#8b5cf6", regulation: "#64748b",
  science: "#14b8a6", venture: "#84cc16"
};
const URG_META = {
  act_now: { emoji: "🔴", label: "Act Now" },
  deep: { emoji: "🔵", label: "Deep" },
  watch: { emoji: "🟡", label: "Watch" }
};

let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function catColor(cat) { return CAT_COLORS[cat] || "#888"; }

function buildFilters() {
  const catCounts = {};
  ITEMS.forEach(i => { catCounts[i.cat] = (catCounts[i.cat] || 0) + 1; });
  const catRoot = document.getElementById("catFilters");
  const allPill = document.createElement("button");
  allPill.className = "pill active";
  allPill.dataset.cat = "all";
  allPill.innerHTML = "All <span class=\"count\">" + ITEMS.length + "</span>";
  allPill.onclick = () => setCatFilter("all");
  catRoot.appendChild(allPill);
  Object.keys(catCounts).sort().forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.dataset.cat = cat;
    btn.innerHTML = cat + " <span class=\"count\">" + catCounts[cat] + "</span>";
    btn.onclick = () => setCatFilter(cat);
    catRoot.appendChild(btn);
  });

  const urgCounts = {};
  ITEMS.forEach(i => { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  const urgRoot = document.getElementById("urgFilters");
  const allUrgPill = document.createElement("button");
  allUrgPill.className = "pill active";
  allUrgPill.dataset.urg = "all";
  allUrgPill.innerHTML = "All <span class=\"count\">" + ITEMS.length + "</span>";
  allUrgPill.onclick = () => setUrgFilter("all");
  urgRoot.appendChild(allUrgPill);
  ["act_now", "deep", "watch"].forEach(u => {
    if (!urgCounts[u]) return;
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.dataset.urg = u;
    btn.innerHTML = URG_META[u].emoji + " " + URG_META[u].label + " <span class=\"count\">" + urgCounts[u] + "</span>";
    btn.onclick = () => setUrgFilter(u);
    urgRoot.appendChild(btn);
  });
}

function setCatFilter(cat) {
  activeCat = cat;
  activeSrc = null;
  document.querySelectorAll("#catFilters .pill").forEach(p => {
    const on = p.dataset.cat === cat;
    p.classList.toggle("active", on);
    p.style.background = on && cat !== "all" ? catColor(cat) : (on ? "#333" : "");
    p.style.borderColor = on && cat !== "all" ? catColor(cat) : "";
  });
  render();
}

function setUrgFilter(urg) {
  activeUrg = urg;
  activeSrc = null;
  document.querySelectorAll("#urgFilters .pill").forEach(p => {
    const on = p.dataset.urg === urg;
    p.classList.toggle("active", on);
    p.style.background = on ? "#333" : "";
    p.style.borderColor = on ? "#333" : "";
  });
  render();
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  document.querySelectorAll("#catFilters .pill").forEach(p => {
    p.classList.toggle("active", p.dataset.cat === "all");
    p.style.background = p.dataset.cat === "all" ? "#333" : "";
    p.style.borderColor = p.dataset.cat === "all" ? "#333" : "";
  });
  document.querySelectorAll("#urgFilters .pill").forEach(p => {
    p.classList.toggle("active", p.dataset.urg === "all");
    p.style.background = p.dataset.urg === "all" ? "#333" : "";
    p.style.borderColor = p.dataset.urg === "all" ? "#333" : "";
  });
  render(true);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function render(expandAll) {
  const root = document.getElementById("cardsRoot");
  root.innerHTML = "";
  const filtered = ITEMS.filter(i => {
    if (activeSrc && i.source.indexOf(activeSrc) === -1) return false;
    if (activeCat !== "all" && i.cat !== activeCat) return false;
    if (activeUrg !== "all" && i.urgency !== activeUrg) return false;
    return true;
  });
  if (!filtered.length) {
    root.innerHTML = "<div class=\"empty-state\">No items match this filter.</div>";
    return;
  }
  filtered.forEach(item => {
    root.appendChild(buildCard(item, !!(expandAll && activeSrc)));
  });
}

function buildCard(item, openByDefault) {
  const card = document.createElement("div");
  card.className = "card" + (openByDefault ? " open" : "");
  card.id = "card-" + item.id;

  const head = document.createElement("div");
  head.className = "card-head";
  const urg = URG_META[item.urgency] || URG_META.deep;
  const chartFlag = item.charts && (item.charts.hot ? "🔥" : (item.charts.count > 0 ? "📊" : ""));
  head.innerHTML =
    "<span class=\"idx\">#" + String(item.id).padStart(2, "0") + "</span>" +
    "<span class=\"urg\">" + urg.emoji + "</span>" +
    "<span class=\"badge\" style=\"background:" + catColor(item.cat) + "\">" + item.source.split(" / ")[0].split(" (")[0] + "</span>" +
    "<span class=\"cat-tag\">" + item.cat + "</span>" +
    (chartFlag ? "<span class=\"chart-flag\">" + chartFlag + "</span>" : "") +
    "<span class=\"title-txt\">" + item.title + "</span>" +
    "<span class=\"chevron\">▸</span>";
  head.onclick = () => card.classList.toggle("open");
  card.appendChild(head);

  const body = document.createElement("div");
  body.className = "card-body";
  const hotClass = item.charts && item.charts.hot ? " hot" : "";
  const chartDesc = item.charts && item.charts.desc ? item.charts.desc : "No chart in this email";
  const hotFlag = item.charts && item.charts.hot ? " 🔥 CHART WORTH SAVING" : "";

  body.innerHTML =
    "<div class=\"section-label\">The Idea</div><div class=\"idea-txt\">" + item.idea + "</div>" +
    "<div class=\"section-label\">My Angle</div>" +
    "<div class=\"angle-box\" style=\"border-left:2px solid " + catColor(item.cat) + "; background:" + catColor(item.cat) + "14;\">" + item.angle + "</div>" +
    "<div class=\"section-label\">Tweets</div>" +
    "<div class=\"tweets\">" +
      "<div class=\"tweet-box\"><div class=\"tweet-label a\">TWEET A</div><div class=\"tweet-text\"></div></div>" +
      "<div class=\"tweet-box\"><div class=\"tweet-label b\">TWEET B</div><div class=\"tweet-text\"></div></div>" +
    "</div>" +
    "<div class=\"section-label\">Charts</div>" +
    "<div class=\"chart-box" + hotClass + "\">" + chartDesc + hotFlag + "</div>" +
    "<div><a class=\"read-link\" target=\"_blank\" rel=\"noopener\">↗ Read full article</a></div>";

  const tweetTexts = body.querySelectorAll(".tweet-text");
  tweetTexts[0].textContent = item.tweetA;
  tweetTexts[1].textContent = item.tweetB;

  const tweetBoxes = body.querySelectorAll(".tweet-box");
  const btnA = document.createElement("button");
  btnA.className = "copy-btn";
  btnA.textContent = "📋 Copy";
  btnA.onclick = function(event) { copyTweet(item.id, 'a'); };
  tweetBoxes[0].appendChild(btnA);
  const btnB = document.createElement("button");
  btnB.className = "copy-btn";
  btnB.textContent = "📋 Copy";
  btnB.onclick = function(event) { copyTweet(item.id, 'b'); };
  tweetBoxes[1].appendChild(btnB);

  const link = body.querySelector(".read-link");
  link.href = item.link;

  card.appendChild(body);
  return card;
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function buildReport() {
  document.getElementById("metaSub").textContent =
    META.date + " · " + META.time + " · " + META.itemsExtracted + " items from " + META.emailsRead + " emails";

  const reportBody = document.getElementById("reportBody");
  let html = "";
  html += "<div><strong>Window:</strong> " + META.windowStart + " to " + META.windowEnd + ". Emails outside this window were not processed.</div>";
  html += "<div style=\"margin-top:4px;\"><strong>Emails in window:</strong> " + META.emailsInWindow + " &nbsp;|&nbsp; <strong>Emails read:</strong> " + META.emailsRead + " &nbsp;|&nbsp; <strong>Items extracted:</strong> " + META.itemsExtracted + "</div>";
  html += "<h4>Included Sources</h4><div>";
  html += META.includedSources.map(function(s) {
    return "<span class=\"src-link\" onclick=\"filterBySrc('" + s.name.replace(/'/g, "\\'") + "')\">" + s.name + "</span> (" + s.count + ")";
  }).join(" &nbsp;·&nbsp; ");
  html += "</div>";
  if (META.skippedSources && META.skippedSources.length) {
    html += "<h4>Skipped Sources</h4><div>" + META.skippedSources.map(function(s) {
      return s.name + " — " + s.reason;
    }).join("<br>") + "</div>";
  } else {
    html += "<h4>Skipped Sources</h4><div>None — every email in the window had extractable content.</div>";
  }
  reportBody.innerHTML = html;

  document.getElementById("reportHead").onclick = function() {
    const rc = document.getElementById("reportCard");
    rc.classList.toggle("open");
    document.getElementById("reportChevron").textContent = rc.classList.contains("open") ? "▾" : "▸";
  };
}

buildFilters();
buildReport();
render();
</script>
