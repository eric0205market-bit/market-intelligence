function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

  activeSrc = name;

  document.querySelectorAll('[data-cat="all"]').forEach(function(p) { p.classList.add('active'); });

}

function updateFilters(type, el) {
  if (type === 'cat') {

  } else {
    document.querySelectorAll('[data-urg]').forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
  }
}

    shown++;
    var color = CAT_COLORS[item.cat] || '#999';
    var chartBadge = item.charts.count > 0 ? (item.charts.hot ? ' 🔥' : ' 📊') : '';

        '<span class="card-num">' + String(item.id).padStart(2, '0') + '</span>' +
        '<span class="urgency-badge">' + urgEmoji(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + item.source.split('/')[0].trim() + '</span>' +
        '<span class="cat-pill">' + item.cat + '</span>' +
        (item.charts.count > 0 ? '<span class="chart-icon">' + (item.charts.hot ? '🔥' : '📊') + '</span>' : '') +
        '<span class="card-title">' + item.title + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + item.idea + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="' + angleStyle + '">' + item.angle + '</div>' +
        '<div class="tweets-row">' +
          '<div class="tweet-box a">' +
            '<div class="tweet-label">TWEET A</div>' +
            '<div class="tweet-text">' + item.tweetA + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'a\')">📋 Copy</button>' +
          '</div>' +
          '<div class="tweet-box b">' +
            '<div class="tweet-label">TWEET B</div>' +
            '<div class="tweet-text">' + item.tweetB + '</div>' +
            '<button class="copy-btn" onclick="copyTweet(' + item.id + ',\'b\')">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        (item.charts.count > 0 ? '<div class="charts-info' + (item.charts.hot ? ' hot-chart' : '') + '">📊 ' + item.charts.count + ' chart(s): ' + item.charts.desc + '</div>' : '') +
        (item.link ? '<a class="article-link" href="' + item.link + '" target="_blank">↗ Read full article</a>' : '') +
      '</div>';
    container.appendChild(card);
  });
  if (shown === 0) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:#999;">No items match this filter.</div>';
  }
}

function renderReport() {
  var body = document.getElementById('report-body');
  var html = '<p><strong>Window:</strong> ' + META.windowStart + ' → ' + META.windowEnd + '</p>';
  html += '<p style="margin-top:8px"><strong>Emails in window:</strong> ' + META.emailsInWindow + ' | <strong>Read:</strong> ' + META.emailsRead + ' | <strong>Items extracted:</strong> ' + META.itemsExtracted + '</p>';
  html += '<p style="margin-top:12px"><strong>Included Sources:</strong></p><ul style="margin-top:6px;padding-left:18px">';
  META.includedSources.forEach(function(s) {
    html += '<li><span class="src-link" onclick="filterBySrc(\'' + s.name.split('/')[0].trim().replace(/'/g, "\\'") + '\')">' + s.name + '</span> — ' + s.items + ' item(s)</li>';
  });
  html += '</ul>';
  html += '<p style="margin-top:12px"><strong>Skipped Sources:</strong></p><ul style="margin-top:6px;padding-left:18px">';
  META.skippedSources.forEach(function(s) {
    html += '<li><em>' + s.name + '</em> — ' + s.reason + '</li>';
  });
  html += '</ul>';
  body.innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
