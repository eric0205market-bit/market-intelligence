// State
let activeCat = "all";
let activeUrg = "all";
let activeSrc = null;

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function filterBySrc(name) {
  activeSrc = (activeSrc === name) ? null : name;
  activeCat = "all";
  activeUrg = "all";
  updatePills();
  renderCards();
}

function updatePills() {
  document.querySelectorAll('.pill').forEach(function(p) {
    p.classList.remove('active');
    p.style.background = '#fff';
    p.style.color = '#666';
    p.style.borderColor = '#ccc';
  });
  var catPill = document.querySelector('[data-cat="'+activeCat+'"]');
  if (catPill) {
    catPill.classList.add('active');
    var col = activeCat === 'all' ? '#555' : (CAT_COLORS[activeCat]||'#555');
    catPill.style.background = col;
    catPill.style.color = '#fff';
    catPill.style.borderColor = col;
  }
  var urgPill = document.querySelector('[data-urg="'+activeUrg+'"]');
  if (urgPill) {
    urgPill.classList.add('active');
    var ucol = {all:'#555','act-now':'#e24b4a','deep':'#378add','watch':'#ef9f27'}[activeUrg]||'#555';
    urgPill.style.background = ucol;
    urgPill.style.color = '#fff';
    urgPill.style.borderColor = ucol;
  }
}

function setCat(cat) {
  activeCat = cat;
  activeSrc = null;
  renderCards();
  updatePills();
}

function setUrg(urg) {
  activeUrg = urg;
  activeSrc = null;
  renderCards();
  updatePills();
}

function toggleCard(id) {
  var el = document.getElementById('card-'+id);
  if (el) el.classList.toggle('open');
}

function toggleReport() {
  var body = document.getElementById('report-body');
  var arrow = document.getElementById('report-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function renderCards() {
  var main = document.getElementById('main');
  var filtered = ITEMS.filter(function(item) {
    if (activeSrc) return item.source.indexOf(activeSrc) >= 0;
    if (activeCat !== 'all' && item.cat !== activeCat) return false;
    if (activeUrg !== 'all' && item.urgency !== activeUrg) return false;
    return true;
  });
  if (filtered.length === 0) {
    main.innerHTML = '<div class="no-results">No items match the selected filters.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(item) {
    var catColor = CAT_COLORS[item.cat] || '#999';
    var urgEmoji = {'act-now':'🔴','deep':'🔵','watch':'🟡'}[item.urgency]||'🔵';
    var chartFlag = item.charts && (item.charts.count > 0 || item.charts.hot || item.charts.desc) ?
      (item.charts.hot ? '🔥' : '📊') : '';
    var angleStyle = 'border-color:'+catColor+';background:'+hexToRgba(catColor,0.06);
    var twALabel = '<span class="tweet-label" style="color:#378add">TWEET A</span>';
    var twBLabel = '<span class="tweet-label" style="color:#7f77dd">TWEET B</span>';
    var chartSection = '';
    if (item.charts && item.charts.desc) {
      var chartClass = item.charts.hot ? 'chart-info chart-hot' : 'chart-info';
      chartSection = '<div class="section-label">CHARTS</div><div class="'+chartClass+'">'+(item.charts.hot?'🔥 CHART WORTH SAVING — ':'')+item.charts.desc+'</div>';
    }
    html += '<div class="card" id="card-'+item.id+'">';
    html += '<div class="card-header" onclick="toggleCard('+item.id+')">';
    html += '<span class="item-num">#'+item.id+'</span>';
    html += '<span class="urgency-emoji">'+urgEmoji+'</span>';
    html += '<span class="source-badge" style="background:'+catColor+'">'+item.source.split('/')[0].trim()+'</span>';
    html += '<span class="cat-tag">'+item.cat+'</span>';
    if (chartFlag) html += '<span class="chart-flag">'+chartFlag+'</span>';
    html += '<span class="card-title">'+escHtml(item.title)+'</span>';
    html += '<span class="expand-arrow">▼</span>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">THE IDEA</div>';
    html += '<div class="idea-text">'+escHtml(item.idea)+'</div>';
    html += '<div class="section-label">MY ANGLE</div>';
    html += '<div class="angle-box" style="'+angleStyle+'">'+escHtml(item.angle)+'</div>';
    html += '<div class="section-label">TWEETS</div>';
    html += '<div class="tweets-row">';
    html += '<div class="tweet-box">'+twALabel+'<div class="tweet-text">'+escHtml(item.tweetA)+'</div>';
    html += '<button class="copy-btn" onclick="copyTweet('+item.id+',\'a\')">📋 Copy</button></div>';
    html += '<div class="tweet-box">'+twBLabel+'<div class="tweet-text">'+escHtml(item.tweetB)+'</div>';
    html += '<button class="copy-btn" onclick="copyTweet('+item.id+',\'b\')">📋 Copy</button></div>';
    html += '</div>';
    if (chartSection) html += chartSection;
    html += '<a class="article-link" href="'+item.link+'" target="_blank">↗ Read full article</a>';
    html += '</div></div>';
  });
  main.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hexToRgba(hex, alpha) {
  var r=0,g=0,b=0;
  if (hex.length===7) {
    r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);
  }
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

function buildFilters() {
  // Categories
  var cats = ['all'];
  ITEMS.forEach(function(i){if(cats.indexOf(i.cat)<0)cats.push(i.cat);});
  var catRow = document.getElementById('cat-filter-row');
  cats.forEach(function(cat) {
    var count = cat==='all' ? ITEMS.length : ITEMS.filter(function(i){return i.cat===cat;}).length;
    var label = cat==='all' ? 'All ('+ITEMS.length+')' : cat+' ('+count+')';
    var pill = document.createElement('span');
    pill.className='pill';
    pill.setAttribute('data-cat',cat);
    pill.textContent=label;
    pill.onclick=function(){setCat(cat);};
    catRow.appendChild(pill);
  });
  // Urgency
  var urgRow = document.getElementById('urg-filter-row');
  [['all','All'],['act-now','🔴 Act Now'],['deep','🔵 Deep'],['watch','🟡 Watch']].forEach(function(pair) {
    var urg=pair[0], lbl=pair[1];
    var count = urg==='all' ? ITEMS.length : ITEMS.filter(function(i){return i.urgency===urg;}).length;
    var pill = document.createElement('span');
    pill.className='pill';
    pill.setAttribute('data-urg',urg);
    pill.textContent=lbl+' ('+count+')';
    pill.onclick=function(){setUrg(urg);};
    urgRow.appendChild(pill);
  });
  updatePills();
}

function buildReport() {
  var body = document.getElementById('report-body');
  var html='<strong>Window:</strong> '+META.windowStart+' to '+META.windowEnd+'<br>';
  html+='<strong>Emails in window:</strong> '+META.emailsInWindow+' &nbsp;|&nbsp; ';
  html+='<strong>Read:</strong> '+META.emailsRead+' &nbsp;|&nbsp; ';
  html+='<strong>Items extracted:</strong> '+META.itemsExtracted+'<br><br>';
  html+='<strong>Included Sources:</strong><br>';
  META.includedSources.forEach(function(s){
    html+='&nbsp;&nbsp;<span class="src-link" onclick="filterBySrc(\''+s.name.replace(/'/g,"\\'")+'\')">'
      +escHtml(s.name)+'</span> — '+s.items+' item'+(s.items>1?'s':'')+'<br>';
  });
  html+='<br><strong>Skipped / Thin Sources:</strong><br>';
  META.skippedSources.forEach(function(s){
    html+='&nbsp;&nbsp;<em>'+escHtml(s.name)+'</em> — '+escHtml(s.reason)+'<br>';
  });
  body.innerHTML=html;
}

buildFilters();
renderCards();
buildReport();
