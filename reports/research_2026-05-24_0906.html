function renderMeta() {

function renderFilters() {
  var catBar = document.getElementById("cat-filter");
  catBar.innerHTML = "";
  var cats = ["all"];
  var catCounts = {};
  ITEMS.forEach(function(item) {
    if (cats.indexOf(item.cat) < 0) cats.push(item.cat);
    catCounts[item.cat] = (catCounts[item.cat] || 0) + 1;
  });
  cats.forEach(function(cat) {
    var pill = document.createElement("button");
    pill.className = "pill";
    pill.textContent = cat === "all" ? "All (" + ITEMS.length + ")" : cat + " (" + (catCounts[cat] || 0) + ")";
    if (cat === activeCat) {
      pill.classList.add("all-active");
      if (cat !== "all") pill.style.background = getCatColor(cat);
    }
    pill.onclick = (function(c) { return function() { activeCat = c; activeSrc = null; renderFilters(); renderCards(); }; })(cat);
    catBar.appendChild(pill);
  });

  var urgBar = document.getElementById("urg-filter");
  urgBar.innerHTML = "";
  var urgDefs = [
    { id: "all", label: "All Urgency" },
    { id: "now", label: "🔴 Act Now" },
    { id: "deep", label: "🔵 Deep" },
    { id: "watch", label: "\uD83D\DFE1 Watch" }
  ];
  var urgCounts = {};
  ITEMS.forEach(function(i) { urgCounts[i.urgency] = (urgCounts[i.urgency] || 0) + 1; });
  urgDefs.forEach(function(u) {
    var pill = document.createElement("button");
    var cnt = u.id === "all" ? ITEMS.length : (urgCounts[u.id] || 0);
    pill.className = "pill" + (u.id === activeUrg ? " all-active" : "");
    pill.textContent = u.label + " (" + cnt + ")";
    pill.onclick = (function(uid) { return function() { activeUrg = uid; activeSrc = null; renderFilters(); renderCards(); }; })(u.id);
    urgBar.appendChild(pill);
  });
}

function filteredItems() {
  return ITEMS.filter(function(item) {
    var catOk = activeCat === "all" || item.cat === activeCat;
    var urgOk = activeUrg === "all" || item.urgency === activeUrg;
    var srcOk = activeSrc === null || item.source.indexOf(activeSrc) >= 0;
    return catOk && urgOk && srcOk;
  });
}

function urgEmoji(u) {
  if (u === "now") return "🔴";
  if (u === "deep") return "🔵";
  return "\uD83D\DFE1";
}

function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function copyTweet(itemId, which) {
  var item = ITEMS.find(function(i) { return i.id === itemId; });
  var text = which === 'a' ? item.tweetA : item.tweetB;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var btn = event.target;
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = '📋 Copy'; }, 1500);
}

function toggleCard(id) {
  var card = document.getElementById("card-" + id);
  if (card) card.classList.toggle("open");
}

function filterBySrc(name) {
  activeSrc = name;
  activeCat = "all";
  activeUrg = "all";
  renderFilters();
  renderCards();
  setTimeout(function() {
    filteredItems().forEach(function(item) {
      var card = document.getElementById("card-" + item.id);
      if (card) card.classList.add("open");
    });
  }, 60);
}

function renderCards() {

  if (items.length === 0) {
    container.innerHTML = '<p style="color:#999;padding:20px;text-align:center;">No items match current filters.</p>';
    return;
  }
  items.forEach(function(item) {
    var color = getCatColor(item.cat);
    var chartFlag = item.charts.count > 0 ? (item.charts.hot ? " 🔥" : " 📊") : "";
    var angleStyle = "border-left-color:" + color + ";background:" + hexToRgba(color, 0.05) + ";";
    var chartsHtml = "";
    if (item.charts.count > 0) {
      chartsHtml = '<div class="charts-row' + (item.charts.hot ? ' hot' : '') + '">' +
        (item.charts.hot ? '🔥 CHART WORTH SAVING — ' : '📊 Charts: ') +
        item.charts.count + ' chart(s). ' + escHtml(item.charts.desc) + '</div>';
    }
    var linkHtml = item.link ? '<div class="link-row"><a href="' + item.link + '" target="_blank">↗ Read full article</a></div>' : '';
    var card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + item.id;
    card.innerHTML =
      '<div class="card-header" onclick="toggleCard(' + item.id + ')">' +
        '<span class="item-num">#' + item.id + '</span>' +
        '<span>' + urgEmoji(item.urgency) + '</span>' +
        '<span class="source-badge" style="background:' + color + '">' + escHtml(item.source.split('/')[0].trim()) + '</span>' +
        '<span class="cat-tag">' + escHtml(item.cat) + '</span>' +
        (chartFlag ? '<span class="chart-flag">' + chartFlag + '</span>' : '') +
        '<span class="card-title">' + escHtml(item.title) + '</span>' +
        '<span class="chevron">▼</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-label">The Idea</div>' +
        '<div class="idea-text">' + escHtml(item.idea) + '</div>' +
        '<div class="section-label">My Angle</div>' +
        '<div class="angle-block" style="' + angleStyle + '">' + escHtml(item.angle) + '</div>' +

          '<div class="tweet-box b">' +

        '</div>' +
        chartsHtml +
        linkHtml +
      '</div>';
    container.appendChild(card);
