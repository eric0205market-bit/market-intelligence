name: Merge to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout main 2>/dev/null || git checkout -b main
          git merge ${{ github.sha }} --no-edit -m "Auto-merge from routine run"

      - name: Generate index.html
        run: |
          cat > index.html << 'INDEXEOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Research Intelligence</title>
          <style>body{font-family:-apple-system,system-ui,sans-serif;max-width:600px;margin:40px auto;padding:0 20px;background:#fff;color:#1a1a1a}h1{font-size:20px;font-weight:700;font-family:monospace}a{color:#378add;text-decoration:none;display:block;padding:10px 0;border-bottom:1px solid #f0ede8;font-size:15px}a:hover{text-decoration:underline}.t{color:#999;font-size:13px;margin-bottom:20px}</style>
          </head><body><h1>🔵 RESEARCH INTELLIGENCE</h1><p class="t">Click a report to open</p>
          INDEXEOF
          ls -1r reports/*.html 2>/dev/null | while read f; do
            name=$(basename "$f" .html)
            echo "<a href=\"reports/$(basename "$f")\">📄 ${name}</a>" >> index.html
          done
          echo '</body></html>' >> index.html

      - name: Commit and push
        run: |
          git add -A
          git commit -m "Auto-merge + update index" --allow-empty
          git push origin main
