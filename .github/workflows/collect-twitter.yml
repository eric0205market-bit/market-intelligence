name: Collect Twitter

on:
  schedule:
    - cron: '30 5,17 * * *'   # 05:30 & 17:30 UTC (07:30 & 19:30 CEST)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth google-auth-oauthlib

      - name: Collect tweets
        env:
          GETXAPI_KEY: ${{ secrets.GETXAPI_KEY }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: python scripts/collect_twitter.py

      # Additive bank-research stream. `|| true` guarantees a failure here can
      # never break the working twitter collection above. Its outputs land in
      # data/twitter/latest/ and raw/twitter/, already staged by the commit step.
      - name: Collect bank research (additive)
        env:
          GETXAPI_KEY: ${{ secrets.GETXAPI_KEY }}
        run: python scripts/collect_bank_research.py || true

      - name: Commit data to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Commit collection data directly to main. Pushes made by Actions with
          # the default GITHUB_TOKEN do not trigger other workflows, so the old
          # claude/twitter-data -> merge-to-main hop never fired and data was
          # stranded on the branch. Committing straight to main removes that
          # dependency. Only data is staged here (no index.html / reports —
          # those are generated on main by merge-to-main for routine pushes,
          # which use a real token and so still trigger it).
          git checkout main 2>/dev/null || git checkout -b main
          git add raw/twitter data/twitter/latest
          if git diff --cached --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "data: twitter collection $(date -u '+%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push origin main && break
            git pull --rebase origin main
          done
