name: Collect Technology

# Technology stream of the KNOWLEDGE track. Clone of collect-concepts.yml. DAILY,
# like Concepts. Flow-heavy (67 sources = 17 Deep + 50 Flow) -> the collector
# triages Flow articles at input (watchlist + recency + per-source cap) before
# they are worklisted for extraction; Deep sources extract-all. See
# scripts/collect_technology.py and config/technology_watchlist.json.
#
# CRON IS LIVE since 2026-06-22 (after canary -> wide diagnostic -> URL-fix -> cloud
# verification -> trial report): daily COLLECTION at 10:00 UTC. Extraction stays MANUAL
# (routine_technology.md, Remote routine, Opus subscription) — the cron only collects.
on:
  schedule:
    # 10:00 UTC daily = 12:00 Europe/Zurich — aligned with Concepts (collection only).
    # No clash with the other cloud collectors (institutional Sun 06:00, research-pdfs
    # Sun 07:00, twitter 05:30 & 17:30 UTC). GitHub scheduled runs can drift/skip under
    # load; the --days 3 window self-heals a single missed/late run on the next day.
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      ids:
        description: 'Comma-separated source slugs (blank = all 67)'
        required: false
        default: ''
      days:
        description: 'Lookback window in days'
        required: false
        default: '3'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 67 text sources at 30-120s each is well under 90 minutes in practice — cap
    # defensively so a stuck site can't burn the whole day.
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium (with system deps)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run technology collector
        run: |
          python3 scripts/collect_technology.py \
            ${{ github.event.inputs.ids && format('--ids {0}', github.event.inputs.ids) || '' }} \
            --days ${{ github.event.inputs.days || '3' }}

      # Always retrievable, even when no data is committed (e.g. a branch test):
      # the per-run funnel + manifest + progress, downloadable from the run page.
      - name: Upload run diagnostics (funnel + manifest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: technology-run-${{ github.run_id }}
          path: raw/technology/_runs/
          if-no-files-found: warn

      - name: Commit data to the branch this run is on
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Commit collected data to the BRANCH THIS RUN IS ON (github.ref_name),
          # never hardcoded to main. A workflow_dispatch from a feature branch
          # commits to THAT branch, so a test run never touches main. Diagnostics
          # are also uploaded above.
          BRANCH="${{ github.ref_name }}"
          git add raw/technology
          if git diff --cached --quiet; then
            echo "No new technology data to commit"
            exit 0
          fi
          git commit -m "data: technology collection $(date -u '+%Y-%m-%d %H:%M') [$BRANCH]"
          for i in 1 2 3; do
            git push origin "HEAD:$BRANCH" && break
            git pull --rebase origin "$BRANCH"
          done
