name: Collect Institutional Research

on:
  schedule:
    - cron: '0 6 * * 0'   # 06:00 UTC every Sunday (07:00 BST / 08:00 CEST)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 100 sources at 30-120s each (bulge up to 300s) is well under 90 minutes
    # in practice — cap defensively so a stuck site can't burn the whole day.
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium (with system deps)
        # Institutional uses a real headless browser, unlike Twitter's API
        # collector. --with-deps lets Playwright install the apt packages
        # Chromium needs on Ubuntu runners (fonts, libs, etc.).
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run institutional collector (--days 10)
        run: python3 scripts/collect_institutional.py --days 10

      - name: Commit data to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Same direct-to-main pattern as collect-twitter.yml: pushes made by
          # Actions with the default GITHUB_TOKEN do NOT re-trigger workflows,
          # so a claude/** -> merge-to-main hop would silently never fire and
          # data would be stranded on a branch. Committing straight to main
          # removes that dependency. Only data + raw archive (including
          # funnel.json / funnel.txt) are staged; index.html and reports/ are
          # regenerated by merge-to-main on routine pushes.
          git checkout main 2>/dev/null || git checkout -b main
          git add raw/institutional data/institutional/latest
          if git diff --cached --quiet; then
            echo "No new institutional data to commit"
            exit 0
          fi
          git commit -m "data: institutional collection $(date -u '+%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push origin main && break
            git pull --rebase origin main
          done
