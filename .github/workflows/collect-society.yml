name: Collect Society

# Society stream of the KNOWLEDGE track. Clone of collect-technology.yml. WEEKLY
# (less perishable than Technology/Concepts). Flow-heavy (68 sources = 27 Deep +
# 41 Flow; 66 active + 2 parked) -> the collector recency-gates + per-source caps
# Flow at input before worklisting; Deep sources extract-all. WATCHLIST_GATE=False.
# See scripts/collect_society.py.
#
# CRON IS DORMANT until the STEP 4 canary passes and the owner approves scaling.
# The weekly schedule below is COMMENTED OUT on purpose; only workflow_dispatch is
# live so the canary / manual runs work. To go live after approval: uncomment the
# `schedule:` block. Extraction stays MANUAL (routine_society.md, Remote routine,
# Opus subscription) — the cron only collects.
on:
  # --- DORMANT: uncomment to enable the weekly cron after canary + owner go ---
  # schedule:
  #   # 10:00 UTC every Sunday = 12:00 Europe/Zurich. WEEKLY (Society is less
  #   # perishable). No clash with the other cloud collectors (technology/concepts
  #   # daily 10:00, institutional Sun 06:00, research-pdfs Sun 07:00, twitter
  #   # 05:30 & 17:30 UTC) — note same hour as technology/concepts but only on
  #   # Sunday. The --days 7 window self-heals a single missed/late run.
  #   - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      ids:
        description: 'Comma-separated source slugs (blank = all 66 active)'
        required: false
        default: ''
      days:
        description: 'Lookback window in days'
        required: false
        default: '7'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 66 active text sources at 30-120s each is well under 90 minutes in practice —
    # cap defensively so a stuck site can't burn the whole run.
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium (with system deps)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run society collector
        run: |
          python3 scripts/collect_society.py \
            ${{ github.event.inputs.ids && format('--ids {0}', github.event.inputs.ids) || '' }} \
            --days ${{ github.event.inputs.days || '7' }}

      # Always retrievable, even when no data is committed (e.g. a branch test):
      # the per-run funnel + manifest + progress, downloadable from the run page.
      - name: Upload run diagnostics (funnel + manifest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: society-run-${{ github.run_id }}
          path: raw/society/_runs/
          if-no-files-found: warn

      - name: Commit data to the branch this run is on
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Commit collected data to the BRANCH THIS RUN IS ON (github.ref_name),
          # never hardcoded to main. A workflow_dispatch from a feature branch
          # commits to THAT branch, so a test run never touches main. Diagnostics
          # are also uploaded above.
          BRANCH="${{ github.ref_name }}"
          git add raw/society
          if git diff --cached --quiet; then
            echo "No new society data to commit"
            exit 0
          fi
          git commit -m "data: society collection $(date -u '+%Y-%m-%d %H:%M') [$BRANCH]"
          for i in 1 2 3; do
            git push origin "HEAD:$BRANCH" && break
            git pull --rebase origin "$BRANCH"
          done
