name: Collect Concepts

# Concepts stream of the KNOWLEDGE track. Clone of collect-institutional.yml,
# but DAILY instead of weekly. The cron is DORMANT (commented out) until the
# canary passes and the owner says go — until then this runs by manual dispatch
# only. To go live: uncomment the schedule block below.
on:
  schedule:
    # 10:00 UTC daily = 12:00 CEST (current DST) — matches YouTube's 12:00 Swiss-local
    # run. No clash with other cloud collectors: institutional (Sun 06:00 UTC),
    # research-pdfs (Sun 07:00 UTC), twitter (05:30 & 17:30 UTC). GitHub scheduled
    # runs can drift a few minutes under load; the --days 3 window self-heals.
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      ids:
        description: 'Comma-separated source slugs (blank = all 78)'
        required: false
        default: ''
      days:
        description: 'Lookback window in days'
        required: false
        default: '3'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 78 text sources at 30-120s each is well under 90 minutes in practice — cap
    # defensively so a stuck site can't burn the whole day.
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium (with system deps)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run concepts collector
        run: |
          python3 scripts/collect_concepts.py \
            ${{ github.event.inputs.ids && format('--ids {0}', github.event.inputs.ids) || '' }} \
            --days ${{ github.event.inputs.days || '3' }}

      # Always retrievable, even when no data is committed (e.g. a branch test):
      # the per-run funnel + manifest + progress, downloadable from the run page.
      - name: Upload run diagnostics (funnel + manifest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: concepts-run-${{ github.run_id }}
          path: raw/concepts/_runs/
          if-no-files-found: warn

      - name: Commit data to the branch this run is on
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Commit collected data to the BRANCH THIS RUN IS ON (github.ref_name),
          # never hardcoded to main. Production cron runs on main -> commits to
          # main (same direct-to-main pattern as collect-institutional.yml, whose
          # default-GITHUB_TOKEN pushes don't re-trigger workflows). A
          # workflow_dispatch from a feature branch commits to THAT branch, so a
          # test run never touches main. Diagnostics are also uploaded above.
          BRANCH="${{ github.ref_name }}"
          git add raw/concepts
          if git diff --cached --quiet; then
            echo "No new concepts data to commit"
            exit 0
          fi
          git commit -m "data: concepts collection $(date -u '+%Y-%m-%d %H:%M') [$BRANCH]"
          for i in 1 2 3; do
            git push origin "HEAD:$BRANCH" && break
            git pull --rebase origin "$BRANCH"
          done
