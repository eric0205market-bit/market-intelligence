<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --border: #e8e6e1;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --accent: #1a8cd8;
  --green: #1d9e75;
  --red: #d94052;
  --orange: #cc8800;
  --pill-macro: #2563eb;
  --pill-crypto: #8b5cf6;
  --pill-ai: #059669;
  --pill-energy: #d97706;
  --pill-geopolitics: #dc2626;
  --pill-tech: #0891b2;
  --pill-defense: #64748b;
  --pill-credit: #b45309;
  --pill-labor: #7c3aed;
  --pill-regulation: #be185d;
  --pill-commodities: #a16207;
  --pill-realestate: #0d9488;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

/* HEADER */
.header { padding: 24px 0 16px; border-bottom: 2px solid var(--text); margin-bottom: 20px; }
.header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.header-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
.header-date { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
.stats-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.stat { font-size: 12px; color: var(--text3); background: #f0eeeb; padding: 3px 10px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; }

/* SUMMARY */
.summary { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 20px 24px; margin-bottom: 24px; }
.summary h2 { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.summary p { font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 8px; }

/* SECTIONS */
.section { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface); }
.section-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; user-select: none; background: #f8f7f5; border-bottom: 1px solid transparent; }
.section-header:hover { background: #f0eeeb; }
.section-header.open { border-bottom: 1px solid var(--border); }
.section-letter { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text3); min-width: 20px; }
.section-name { flex: 1; }
.section-count { font-size: 12px; font-weight: 500; color: var(--text3); background: #f0eeeb; padding: 2px 10px; border-radius: 20px; }
.section-arrow { color: var(--text3); font-size: 12px; transition: transform 0.2s; }
.section-header.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 0; }
.section-body.open { display: block; }

/* CARDS */
.card { padding: 16px 18px; border-bottom: 1px solid #f0eeeb; }
.card:last-child { border-bottom: none; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cat-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; color: white; }
.card-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
.card-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.card-content { font-size: 14px; color: var(--text); line-height: 1.7; }
.card-content strong { font-weight: 600; }
.card-attribution { margin-top: 8px; font-size: 12px; color: var(--text3); }
.card-attribution a { color: var(--accent); text-decoration: none; }
.card-attribution a:hover { text-decoration: underline; }
.tweet-link { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

/* CLUSTER (for Section A) */
.cluster { padding: 16px 18px; border-bottom: 1px solid #f0eeeb; }
.cluster:last-child { border-bottom: none; }
.cluster-voices { margin-top: 10px; padding-left: 12px; border-left: 2px solid #f0eeeb; }
.voice { margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
.voice-author { font-weight: 600; color: var(--accent); }
.voice-contrarian { border-left-color: var(--red); }

/* BANK RESEARCH TABLE */
.research-table { width: 100%; font-size: 13px; border-collapse: collapse; }
.research-table th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); border-bottom: 2px solid var(--border); }
.research-table td { padding: 8px 12px; border-bottom: 1px solid #f0eeeb; vertical-align: top; }
.research-table tr:hover { background: #faf9f7; }

/* LINK QUEUE */
.link-item { padding: 10px 18px; border-bottom: 1px solid #f0eeeb; display: flex; gap: 12px; align-items: baseline; font-size: 13px; }
.link-item:last-child { border-bottom: none; }
.link-url { font-family: 'JetBrains Mono', monospace; font-size: 12px; word-break: break-all; }
.link-url a { color: var(--accent); text-decoration: none; }
.link-url a:hover { text-decoration: underline; }
.link-source { color: var(--text3); min-width: 100px; }

/* IMAGES */
.chart-img { max-width: 100%; border-radius: 6px; margin-top: 8px; border: 1px solid var(--border); }

/* THREAD BADGE */
.thread-badge { font-size: 10px; font-weight: 600; background: #e8e6e1; color: var(--text2); padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

/* REPORT FOOTER */
.footer { margin-top: 24px; padding: 16px; background: #f0eeeb; border-radius: 8px; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

@media (max-width: 640px) {
  .header-date { font-size: 18px; }
  .card { padding: 12px 14px; }
  .cluster { padding: 12px 14px; }
}
</style>
</head>
<body>
<a href="../index.html" id="mi-back" style="position:fixed;top:12px;left:12px;z-index:9999;background:#1a1a2e;color:white;border-radius:20px;padding:6px 14px;font-size:14px;text-decoration:none;opacity:0.85;box-shadow:0 2px 8px rgba(0,0,0,0.3);min-height:44px;display:inline-flex;align-items:center;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">← MI</a>
<div class="container" id="app">
  <div class="header">
    <div class="header-top">
      <span class="header-label">Twitter Intelligence</span>
      <span class="header-date" id="report-date"></span>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
  </div>
  <div class="summary" id="summary-box"></div>
  <div id="sections"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
// ============================================================
// DATA — Cloud Routine replaces ONLY this block
// ============================================================
const REPORT_DATA = __REPORT_DATA__;

// ============================================================
// RENDERER — never changes
// ============================================================
const CAT_COLORS = {
  macro: 'var(--pill-macro)', crypto: 'var(--pill-crypto)', 'AI/infra': 'var(--pill-ai)',
  energy: 'var(--pill-energy)', geopolitics: 'var(--pill-geopolitics)', tech: 'var(--pill-tech)',
  defense: 'var(--pill-defense)', credit: 'var(--pill-credit)', labor: 'var(--pill-labor)',
  regulation: 'var(--pill-regulation)', commodities: 'var(--pill-commodities)',
  'real-estate': 'var(--pill-realestate)'
};

function catPill(cat) {
  const bg = CAT_COLORS[cat] || '#888';
  return `<span class="cat-pill" style="background:${bg}">${cat}</span>`;
}

function tweetLink(url, label) {
  if (!url) return '';
  return `<a href="${url}" target="_blank" class="tweet-link">${label || 'tweet →'}</a>`;
}

function renderHeader() {
  const d = REPORT_DATA;
  document.getElementById('report-date').textContent = d.date || '';
  const stats = [
    `${d.total_tweets_in || 0} tweets in`,
    `${d.after_filter || 0} after filter`,
    `${d.total_items || 0} curated items`,
    `${d.watchlist_count || 0} watchlist · ${d.research_count || 0} research`,
    d.api_cost ? `$${d.api_cost} API` : null
  ].filter(Boolean);
  document.getElementById('stats-bar').innerHTML = stats.map(s => `<span class="stat">${s}</span>`).join('');
}

function renderSummary() {
  const box = document.getElementById('summary-box');
  const lines = (REPORT_DATA.summary || []);
  box.innerHTML = '<h2>Summary</h2>' + lines.map(l => `<p>${l}</p>`).join('');
}

function makeSection(letter, name, count, contentHtml) {
  return `
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-letter">${letter}</span>
        <span class="section-name">${name}</span>
        <span class="section-count">${count}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${contentHtml}</div>
    </div>`;
}

function renderSectionA(items) {
  if (!items || !items.length) return '';
  let html = '';
  items.forEach((cluster, i) => {
    let voicesHtml = '';
    (cluster.voices || []).forEach(v => {
      const cls = v.contrarian ? 'voice voice-contrarian' : 'voice';
      const prefix = v.contrarian ? '↩ ' : '';
      voicesHtml += `<div class="${cls}"><span class="voice-author">@${v.author}</span>: ${prefix}${v.text} ${tweetLink(v.tweet_url)}</div>`;
    });
    html += `
      <div class="cluster">
        <div class="card-header">${catPill(cluster.category)} <span class="card-id">A${i+1}</span></div>
        <div class="card-title">${cluster.title}</div>
        <div class="card-content">${cluster.description || ''}</div>
        <div class="cluster-voices">${voicesHtml}</div>
      </div>`;
  });
  return makeSection('A', 'Events & Reactions', items.length + ' clusters', html);
}

function renderCardSection(letter, name, items) {
  if (!items || !items.length) return '';
  let html = '';
  items.forEach((item, i) => {
    const threadBadge = item.is_thread ? ' <span class="thread-badge">thread</span>' : '';
    const imgHtml = (item.images || []).map(u => `<img src="${u}" class="chart-img" loading="lazy">`).join('');
    html += `
      <div class="card">
        <div class="card-header">${catPill(item.category || 'macro')} <span class="card-id">${letter}${i+1}</span>${threadBadge}</div>
        ${item.title ? `<div class="card-title">${item.title}</div>` : ''}
        <div class="card-content">${item.content}${imgHtml}</div>
        <div class="card-attribution">@${item.author} ${tweetLink(item.tweet_url)}</div>
      </div>`;
  });
  return makeSection(letter, name, items.length + ' items', html);
}

function renderSectionC(items) {
  if (!items || !items.length) return makeSection('C', 'Data & Charts', '0 images', '<div class="card"><div class="card-content" style="color:var(--text3)">No images available in this collection.</div></div>');
  let html = '';
  items.forEach((item, i) => {
    const imgs = (item.images || []).map(u => `<img src="${u}" class="chart-img" loading="lazy">`).join('');
    html += `
      <div class="card">
        <div class="card-header"><span class="card-id">C${i+1}</span></div>
        <div class="card-content">${item.label || ''} — @${item.author}${imgs}</div>
        <div class="card-attribution">${tweetLink(item.tweet_url)}</div>
      </div>`;
  });
  return makeSection('C', 'Data & Charts', items.length + ' images', html);
}

function renderSectionF(items) {
  if (!items || !items.length) return '';
  let rows = '';
  items.forEach(item => {
    const img = item.has_image ? '📊' : '';
    rows += `<tr>
      <td><strong>${item.bank || '?'}</strong></td>
      <td>${item.topic || ''}</td>
      <td>${img}</td>
      <td>${tweetLink(item.tweet_url, '@' + (item.shared_by || ''))}</td>
    </tr>`;
  });
  const html = `<table class="research-table">
    <tr><th>Bank</th><th>Topic</th><th>Chart</th><th>Shared by</th></tr>
    ${rows}</table>`;
  return makeSection('F', 'Bank Research Catalog', items.length + ' entries', html);
}

function renderSectionG(items) {
  if (!items || !items.length) return '';
  let html = '';
  items.forEach(item => {
    html += `<div class="link-item">
      <span class="link-source">@${item.author || '?'}</span>
      <span class="link-url"><a href="${item.url}" target="_blank">${item.url}</a></span>
      <span>${item.description || ''}</span>
    </div>`;
  });
  return makeSection('G', 'Link Queue', items.length + ' links', html);
}

function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function render() {
  renderHeader();
  renderSummary();
  const d = REPORT_DATA;
  const sections = document.getElementById('sections');
  sections.innerHTML = [
    renderSectionA(d.events),
    renderCardSection('B', 'Alpha & Insights', d.alpha),
    renderSectionC(d.charts),
    renderCardSection('D', 'Positioning & Trade Ideas', d.positioning),
    renderCardSection('E', 'Contrarian / Minority Views', d.contrarian),
    renderSectionF(d.bank_research),
    renderSectionG(d.links)
  ].join('');

  // Auto-open first two sections
  document.querySelectorAll('.section-header').forEach((h, i) => {
    if (i < 2) { h.classList.add('open'); h.nextElementSibling.classList.add('open'); }
  });

  document.getElementById('footer').innerHTML = `
    Generated: ${d.generated_at || ''} · Template v1.0 · ${d.total_tweets_in || 0} tweets → ${d.total_items || 0} items
  `;
}

render();
</script>
</body>
</html>
