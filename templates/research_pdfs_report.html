<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Research PDFs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e3da;
  --border-light: #f0ede4;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #8a8a8a;
  --accent: #0d9488;          /* teal — research PDFs accent */
  --accent-soft: #e6f6f4;
  --auth: #0d9488;            /* authoritative marker */
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.55;
       background: var(--bg); color: var(--text); }
.container { max-width: 980px; margin: 0 auto; padding: 24px 16px 80px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: baseline;
          border-bottom: 2px solid var(--text); padding-bottom: 12px; margin-bottom: 12px; }
.title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-3); }

/* STATS BAR */
.stats-top { margin-bottom: 16px; padding: 8px 12px; background: var(--surface);
             border: 1px solid var(--border); border-radius: 6px;
             font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
             color: var(--text-2); display: flex; gap: 16px; flex-wrap: wrap; }
.stats-top strong { color: var(--text); font-weight: 600; }

/* NOTE */
.note { font-size: 12px; color: var(--text-3); margin-bottom: 18px; line-height: 1.5; }

/* SECTIONS (one per source) */
.section { background: var(--surface); border: 1px solid var(--border);
           border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
.section-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
                background: #f3efe6; cursor: pointer; user-select: none;
                font-weight: 600; font-size: 13px; }
.section-head:hover { background: #ebe6dc; }
.section-name { flex: 1; }
.section-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
                 color: var(--text-3); }
.section-arrow { font-size: 10px; color: var(--text-3); transition: transform .2s; }
.section.open .section-arrow { transform: rotate(90deg); }
.section-body { display: none; padding: 4px 0; }
.section.open .section-body { display: block; }

/* PDF ROW */
.row { display: flex; align-items: baseline; gap: 10px; padding: 9px 16px;
       border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
.row:last-child { border-bottom: none; }
.row .date { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
             color: var(--text-3); min-width: 78px; white-space: nowrap; }
.row .date.undated { color: #b08900; }
.row .body { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 2px; }
.row .ptitle { font-weight: 500; font-size: 13.5px; color: var(--accent);
               text-decoration: none; }
.row .ptitle:hover { text-decoration: underline; }
.row .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.row .domain { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
               color: var(--text-3); }
.auth { display: inline-flex; align-items: center; gap: 3px;
        font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; font-weight: 600;
        text-transform: uppercase; letter-spacing: .04em; color: #fff;
        background: var(--auth); padding: 1px 6px; border-radius: 3px; }

.empty { color: var(--text-3); font-size: 13px; padding: 14px 18px; font-style: italic; }

@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .header { flex-direction: column; align-items: flex-start; gap: 4px; }
  .row .date { min-width: 0; }
}
</style>
</head>
<body>
<a href="../index.html" id="mi-back" style="position:fixed;top:12px;left:12px;z-index:9999;background:#1a1a2e;color:white;border-radius:20px;padding:6px 14px;font-size:14px;text-decoration:none;opacity:0.85;box-shadow:0 2px 8px rgba(0,0,0,0.3);min-height:44px;display:inline-flex;align-items:center;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">← MI</a>
<div class="container">
  <div class="header">
    <div class="title">📑 Research PDFs</div>
    <div class="subtitle" id="report-date">—</div>
  </div>
  <div class="stats-top" id="stats-top"></div>
  <div class="note">
    Links-only index of publicly-available research PDFs discovered via open-web
    search. Each title links straight to the source PDF. The
    <span class="auth">authoritative</span> marker means the PDF sits on the
    house's own domain (or a known re-host portal). Nothing is downloaded or
    summarized here.
  </div>
  <div id="app"></div>
</div>

<script>
const REPORT_DATA = __REPORT_DATA__;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

function renderRow(it) {
  const dateCls = it.undated ? 'date undated' : 'date';
  const dateTxt = it.undated ? 'undated' : escapeHtml(it.date || 'undated');
  const auth = it.booster ? '<span class="auth">authoritative</span>' : '';
  return `
    <div class="row">
      <span class="${dateCls}">${dateTxt}</span>
      <span class="body">
        <a class="ptitle" href="${escapeAttr(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title)}</a>
        <span class="meta">
          <span class="domain">${escapeHtml(it.domain || '')}</span>
          ${auth}
        </span>
      </span>
    </div>`;
}

function renderSection(name, items, openByDefault) {
  if (!items || !items.length) return '';
  const body = items.map(renderRow).join('');
  return `
    <div class="section${openByDefault ? ' open' : ''}">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="section-name">${escapeHtml(name)}</span>
        <span class="section-count">${items.length}</span>
        <span class="section-arrow">▸</span>
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

function renderTopStats(d) {
  const parts = [];
  if (d.lookback_days != null) parts.push(`window <strong>${d.lookback_days}d</strong>`);
  if (d.total != null) parts.push(`PDFs <strong>${d.total}</strong>`);
  if (d.sources_processed != null) parts.push(`sources searched <strong>${d.sources_processed}</strong>`);
  const present = d.by_source ? Object.keys(d.by_source).length : 0;
  parts.push(`sources with hits <strong>${present}</strong>`);
  return parts.join(' | ');
}

function reportDate(d) {
  if (d.collected_at) return String(d.collected_at).slice(0, 10);
  return '';
}

function toggleSection(headEl) { headEl.parentElement.classList.toggle('open'); }

function renderReport(d) {
  if (!d || typeof d !== 'object') d = {};
  document.getElementById('report-date').textContent = reportDate(d);
  document.getElementById('stats-top').innerHTML = renderTopStats(d);

  // Group items by source, preserving the ranked order; first source-group to
  // appear is the one with the highest-ranked item (boosters/newest first).
  const items = Array.isArray(d.items) ? d.items : [];
  const groups = new Map();
  for (const it of items) {
    const key = it.source || it.source_id || '—';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(it);
  }
  const out = [];
  let i = 0;
  for (const [name, list] of groups) {
    out.push(renderSection(name, list, i < 3));  // first 3 open by default
    i++;
  }
  const app = document.getElementById('app');
  app.innerHTML = out.join('') || '<div class="empty">No research PDFs found this run.</div>';
}

renderReport(REPORT_DATA);
</script>
</body>
</html>
